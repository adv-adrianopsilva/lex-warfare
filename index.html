do patrimônio da PJ com o do sócio). Mera insolvência não basta.","fund":"LEI: 'Art. 50, CC: Em caso de abuso da personalidade jurídica, caracterizado pelo desvio de finalidade ou pela confusão patrimonial, pode o juiz decidir, a requerimento da parte, ou do Ministério Público quando lhe couber intervir no processo, que os efeitos de certas e determinadas relações de obrigações sejam estendidos aos bens particulares dos administradores ou sócios da pessoa jurídica beneficiados direta ou indiretamente pelo abuso.' | JURISPRUDÊNCIA: 'STJ, REsp 1.395.288/SP: a desconsideração pelo art. 50/CC exige prova de abuso de personalidade (desvio de finalidade ou confusão patrimonial); simples inadimplemento ou insolvência não autoriza a desconsideração.'","peg":"CC exige ABUSO (desvio de finalidade ou confusão patrimonial) para desconsideração. CDC (art. 28) é mais amplo — admite desconsideração por mero prejuízo ao consumidor (teoria menor). Distinção importante para provas.","jur_status":"PENDENTE"},{"n":111,"enun":"O endosso em branco de título de crédito converte-o em título ao portador, permitindo que qualquer portador o cobre do devedor, ao passo que o endosso em preto indica o endossatário, restringindo a circulação.","gab":"CERTO","com":"Certo. O endosso em branco não identifica o endossatário: o título pode circular por mera tradição, funcionando como título ao portador. O endosso em preto (cheio) nomeia o endossatário, restringindo a circulação ao indicado ou a quem este endossar.","fund":"LEI: 'Arts. 11 a 20, Lei Uniforme de Genebra (Dec. 57.663/1966): o endosso em branco não designa o endossatário; transforma o título em circulação por tradição. O endosso em preto designa endossatário específico.' | JURISPRUDÊNCIA: 'STJ, REsp 1.194.479/SP: o endosso em branco faculta ao portador a circulação por mera tradição; o posterior endosso em preto restringe a circulação ao nomeado.'","jur_status":"PENDENTE"},{"n":112,"enun":"Na recuperação judicial, o plano de recuperação deve ser aprovado pela assembleia geral de credores, sendo aprovado quando obtiver, cumulativamente, maioria simples por número de credores de cada classe e maioria absoluta do valor dos créditos.","gab":"ERRADO","com":"Errado. A Lei 11.101/2005 (LREF) prevê quórum específico por classes: na classe de credores quirografários, o plano é aprovado por mais da metade do valor dos créditos E maioria de credores (por número). Não é simples maioria por número de credores em todas as classes — o critério varia pela classe.","fund":"LEI: 'Art. 45, Lei 11.101/2005: Nas deliberações sobre o plano de recuperação judicial, todas as classes de credores referidas no art. 41 desta Lei deverão aprovar a proposta. §1º Em cada uma das classes referidas nos incisos II e III do art. 41 desta Lei, a proposta deverá ser aprovada por credores que representem mais da metade do valor total dos créditos presentes à assembleia e, cumulativamente, pela maioria simples dos credores presentes.' | JURISPRUDÊNCIA: 'STJ, REsp 1.430.710/RS: para aprovação do plano de RJ, exige-se quórum qualificado por classe; o não atingimento do quórum em uma classe não necessariamente inviabiliza o plano, admitido o cram down (art. 58, §1º, Lei 11.101/2005).'","jur_status":"PENDENTE"},{"n":113,"enun":"A falência do empresário individual ou da sociedade empresária pode ser decretada por requerimento do próprio devedor (autofalência), do credor ou do cônjuge sobrevivente.","gab":"CERTO","com":"Certo. A Lei 11.101/2005 prevê legitimidade para requerer a falência: o devedor (autofalência, art. 105), o credor (art. 97, II a IV) e, após a morte do empresário, o cônjuge sobrevivente, herdeiro ou o inventariante (art. 97, I). O cônjuge sobrevivente pode requerer a autofalência post mortem.","fund":"LEI: 'Art. 97, Lei 11.101/2005: Podem requerer a falência do devedor: I – o próprio devedor, na forma do disposto nos arts. 105 a 107 desta Lei; II – sócio, cônjuge sobrevivente, herdeiros do devedor ou inventariante; III – o cotista ou o acionista do devedor na forma da lei ou do ato constitutivo da sociedade; IV – qualquer credor.' | JURISPRUDÊNCIA: 'STJ, REsp 1.544.278/SP: a legitimidade para requerer a falência inclui o cônjuge sobrevivente nos termos do art. 97, I e II, da Lei 11.101/2005.'","jur_status":"PENDENTE"},{"n":114,"enun":"A sociedade simples distingue-se da sociedade empresária porque aquela não tem por objeto o exercício de atividade econômica organizada para a produção ou circulação de bens e serviços, sendo composta tipicamente por profissionais liberais.","gab":"CERTO","com":"Certo. A sociedade simples é voltada à prestação de serviços de natureza intelectual ou profissional, sem a organização típica da empresa (não tem fundo de comércio, estabelecimento empresarial organizado). Médicos, advogados, contadores formam típicas sociedades simples.","fund":"LEI: 'Art. 966, CC: Considera-se empresário quem exerce profissionalmente atividade econômica organizada para a produção ou a circulação de bens ou de serviços. Parágrafo único: Não se considera empresário quem exerce profissão intelectual, de natureza científica, literária ou artística, ainda com o concurso de auxiliares ou colaboradores, salvo se o exercício da profissão constituir elemento de empresa.' | JURISPRUDÊNCIA: 'STJ, REsp 1.418.899/PR: a sociedade de advogados é sociedade simples (art. 15 do EOAB); médicos e engenheiros em sociedade de profissionais exercem atividade intelectual que não os torna empresários, salvo se organizarem estrutura empresarial complexa.'","jur_status":"PENDENTE"}]},{"nome":"Conhecimentos sobre o DF / PDPM / Primeiros Socorros","comando":"Acerca da organização administrativa do Distrito Federal, do Plano Distrital de Polícia de Proteção e Monitoramento, e de técnicas básicas de primeiros socorros, julgue os itens a seguir.","itens":[{"n":115,"enun":"O Distrito Federal acumula competências legislativas e tributárias de Estado e de Município, podendo instituir todos os impostos estaduais e municipais, conforme o art. 32, §1º, da CF/88.","gab":"CERTO","com":"Certo. O art. 32, §1º, da CF/88 atribui ao DF as competências legislativas reservadas tanto aos estados quanto aos municípios. Portanto, o DF pode instituir ICMS (imposto estadual), IPTU, ISS e ITBI (impostos municipais), além dos próprios impostos estaduais.","fund":"LEI: 'Art. 32, §1º, CF/88: Ao Distrito Federal são atribuídas as competências legislativas reservadas aos Estados e Municípios. Art. 155, II e III; art. 156, I, II e III, CF/88.' | JURISPRUDÊNCIA: 'STF, ADI 2.804/DF: o DF exerce competência tributária acumulada de Estado e Município; pode instituir e cobrar todos os impostos estaduais e municipais elencados nos arts. 155 e 156 da CF.'","jur_status":"PENDENTE"},{"n":116,"enun":"A Polícia Civil do Distrito Federal, diferentemente das polícias civis estaduais, é organizada e mantida pela União Federal, conforme previsto na CF/88.","gab":"CERTO","com":"Certo. As polícias civis estaduais são organizadas pelos estados. A PCDF é exceção: por força do art. 21, XIV, da CF/88, compete à União organizar e manter a Polícia Civil do Distrito Federal (assim como a Polícia Militar e o CBMDF). A PCDF é financiada por recursos da União.","fund":"LEI: 'Art. 21, XIV, CF/88: Compete à União organizar e manter a polícia civil, a polícia penal, a polícia militar e o corpo de bombeiros militar do Distrito Federal, bem como prestar assistência financeira ao Distrito Federal para a execução de serviços públicos, por meio de fundo próprio. Art. 144, §1º, CF/88: orgânica das polícias.' | JURISPRUDÊNCIA: 'STF, ADI 2.310/DF: a PCDF tem natureza diferenciada; sua manutenção pela União é obrigação constitucional que não se confunde com as policias estaduais, sujeitas ao orçamento de cada Estado.'","jur_status":"PENDENTE"},{"n":117,"enun":"No atendimento de primeiros socorros a vítima de parada cardiorrespiratória (PCR), a sequência recomendada pelo protocolo atual é C-A-B (Compressões-Abertura de vias aéreas-Respiração de resgate), ao contrário do antigo protocolo A-B-C.","gab":"CERTO","com":"Certo. A American Heart Association (AHA), a partir de 2010, revisou as diretrizes para adultos em PCR: o protocolo passou de A-B-C (Airway-Breathing-Circulation) para C-A-B (Chest compressions-Airway-Breathing). A ênfase nas compressões torácicas precoces é prioridade para manter a perfusão cardíaca.","fund":"LEI: Diretrizes da AHA/2020 e CFM: em adultos com PCR, iniciar imediatamente compressões torácicas (C), depois abrir as vias aéreas (A) e fornecer respirações de resgate (B). Frequência: 100-120 compressões/min; profundidade ≥ 5 cm (máx. 6 cm); relação 30:2 (30 compressões : 2 ventilações) em adultos sem via aérea avançada."},{"n":118,"enun":"Em caso de suspeita de fratura de coluna cervical em vítima de acidente de trânsito, o primeiro socorrista deve realizar a manobra de hiperextensão do pescoço para abertura das vias aéreas.","gab":"ERRADO","com":"Errado. Na suspeita de fratura de coluna cervical, a manobra correta é a subluxação da mandíbula (chin lift com jaw thrust) com manutenção da cabeça em posição neutra — não a hiperextensão do pescoço. A hiperextensão poderia agravar uma lesão cervical, causando dano medular.","fund":"LEI: Diretrizes AHA/2020 e ATLS: em vítimas com suspeita de trauma cervical, a abertura das vias aéreas é feita pela tração mandibular (jaw thrust) sem extensão do pescoço; a imobilização cervical manual deve ser mantida até a estabilização com colar cervical. A hiperextensão é contraindicada nesse cenário.","peg":"Trauma cervical: JAW THRUST (sem extensão). Sem trauma: inclinação da cabeça + elevação do queixo (chin tilt/head tilt). CEBRASPE cobra essa distinção."},{"n":119,"enun":"No Plano Distrital de Polícia de Proteção e Monitoramento (PDPM), a integração das forças de segurança pública do DF contempla a atuação conjunta da PCDF, da PMDF e do CBMDF em ações de prevenção, proteção e monitoramento da ordem pública.","gab":"CERTO","com":"Certo. O PDPM prevê a integração das corporações de segurança pública do DF (PCDF, PMDF, CBMDF) em ações coordenadas de prevenção ao crime e proteção à ordem pública. A gestão integrada das forças é princípio estruturante do plano distrital de segurança.","fund":"LEI: Lei Distrital nº 5.737/2016 e normas correlatas do GDF: o PDPM estabelece diretrizes para atuação integrada e coordenada das forças de segurança pública do Distrito Federal, com ênfase em policiamento preventivo, monitoramento por câmeras e inteligência compartilhada."},{"n":120,"enun":"O Desfibrilador Externo Automático (DEA) deve ser utilizado tão logo disponível em caso de parada cardiorrespiratória, sendo recomendado que as compressões torácicas sejam interrompidas por tempo não superior a dez segundos para análise do ritmo e descarga elétrica.","gab":"CERTO","com":"Certo. As diretrizes atuais da AHA recomendam o uso do DEA o mais precocemente possível. A interrupção das compressões para análise do ritmo e para a descarga deve ser minimizada — não deve ultrapassar 10 segundos. A retomada imediata das compressões após a descarga é recomendada sem aguardar a análise do pulso.","fund":"LEI: Diretrizes AHA/2020: uso do DEA assim que disponível; interrupção das compressões < 10 segundos para análise e descarga; retomada imediata das compressões após descarga; sequência 30:2 mantida até chegada do suporte avançado de vida (SAMU/APH)."}]}]};

const TRAP_WORDS=[
  'tão somente','somente','apenas','unicamente','exclusivamente',
  'em qualquer hipótese','em nenhuma hipótese','em qualquer caso','em todo caso',
  'independentemente','independente de','mesmo que','ainda que',
  'obrigatoriamente','obrigatória','obrigatório','necessariamente',
  'imprescindível','indispensável','imediatamente','automaticamente',
  'de pleno direito','por si só','toda vez que','a qualquer tempo',
  'nunca','jamais','sempre','absolutamente','absoluta',
  'é vedado','são vedados','é proibido','são proibidos',
  'não pode','não podem','impossível','é impossível',
  'salvo','exceto','ressalvado','ressalvada',
  'expressamente','tacitamente'
].sort((a,b)=>b.length-a.length); // longer phrases first

function _escRx(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}
function highlightTraps(html){
  // html is already HTML-escaped plain text; safe to inject <mark>
  TRAP_WORDS.forEach(w=>{
    const re=new RegExp(`(?<![\\wÀ-ÿ])(${_escRx(w)})(?![\\wÀ-ÿ])`,'gi');
    html=html.replace(re,'<mark class="trap-word">$1</mark>');
  });
  return html;
}

function computeFilteredNs(type, disc){
  return S.flat.filter(x=>{
    const dm = !disc || x.discNome === disc;
    if(type==='erros')        return dm && S.respostas[x.n] && S.respostas[x.n]!==x.item.gab;
    if(type==='branco')       return dm && !S.respostas[x.n];
    if(type==='lac')          return dm && S.avaliacoes[x.n]==='lac';
    if(type==='dvd')          return dm && S.avaliacoes[x.n]==='dvd';
    if(type==='problematicos') return dm && (
      (S.respostas[x.n] && S.respostas[x.n]!==x.item.gab) ||
      !S.respostas[x.n] || S.avaliacoes[x.n]==='lac');
    if(type==='disc')         return x.discNome===disc;
    return false;
  }).map(x=>x.n);
}

function buildBlocoSummary(){
  const tot=S.flat.length;
  let ok=0,er=0,blank=0;
  S.flat.forEach(x=>{
    const r=S.respostas[x.n];
    if(r===x.item.gab) ok++;
    else if(r) er++;
    else blank++;
  });
  const disc={};
  S.bloco.disciplinas.forEach(d=>{
    let dok=0,der=0;
    d.itens.forEach(it=>{const r=S.respostas[it.n];if(r===it.gab)dok++;else if(r)der++;});
    const short=d.nome.replace('Direito ','').replace(/ e Legislação .*/,'');
    disc[short]={ok:dok,er:der,tot:d.itens.length};
  });
  const avCnt={dom:0,dvd:0,lac:0,leit:0};
  Object.values(S.avaliacoes).forEach(v=>{if(v in avCnt)avCnt[v]++;});
  return {
    blocoId:S.bloco.meta.id, data:S.bloco.meta.data||S.bloco.meta.id,
    titulo:S.bloco.meta.titulo||'',
    totalQuestoes:tot, acertos:ok, erros:er, branco:blank,
    saldo:ok-er, pct:tot>0?Math.round(ok/tot*100):0,
    tempo:S.totalMs, disciplinas:disc, avaliacoes:avCnt,
    finishedAt:Date.now()
  };
}
/* ── SM-2 SPACED REPETITION ──────────────────────────────── */
function computeSRQuality(h){
  // Mapeia desempenho do bloco para quality SM-2 (0–5)
  const pct=h.pct;
  const av=h.avaliacoes||{};
  const avTotal=(av.dom||0)+(av.dvd||0)+(av.lac||0)+(av.leit||0);
  // Base a partir do aproveitamento
  let q;
  if(pct>=90) q=5;
  else if(pct>=80) q=4;
  else if(pct>=70) q=3;
  else if(pct>=55) q=2;
  else if(pct>=40) q=1;
  else q=0;
  // Ajuste pela autoavaliação: muitas lacunas penaliza, muito domínio bonifica
  if(avTotal>0){
    const lacRatio=(av.lac||0)/avTotal;
    const domRatio=(av.dom||0)/avTotal;
    if(lacRatio>0.4 && q>1) q--;
    if(domRatio>0.6 && q<5) q++;
  }
  return Math.max(0,Math.min(5,q));
}
function applySM2(sr,quality){
  // sr = {interval, repetitions, ef} ou null (primeira vez)
  let {interval=1,repetitions=0,ef=2.5}=sr||{};
  if(quality<3){
    // Abaixo do limiar: recomeça intervalo mas mantém EF (penaliza menos)
    repetitions=0; interval=1;
  } else {
    if(repetitions===0) interval=1;
    else if(repetitions===1) interval=6;
    else interval=Math.round(interval*ef);
    ef=ef+(0.1-(5-quality)*(0.08+(5-quality)*0.02));
    ef=Math.max(1.3,Math.round(ef*100)/100);
    repetitions++;
  }
  const next=new Date();
  next.setDate(next.getDate()+interval);
  return {interval,repetitions,ef,nextReview:next.toISOString().slice(0,10)};
}
function srBadgeHtml(sr){
  if(!sr||!sr.nextReview) return '';
  const today=new Date().toISOString().slice(0,10);
  const diff=(new Date(sr.nextReview)-new Date(today))/(1000*60*60*24);
  if(diff<=0)  return `<span class="sr-badge due">⟳ Revisar hoje</span>`;
  if(diff<=2)  return `<span class="sr-badge soon">⟳ ${Math.round(diff)}d</span>`;
  return `<span class="sr-badge ok">⟳ ${fmtDateShort(sr.nextReview)}</span>`;
}

function saveToHistory(){
  try{
    let hist=loadHistory();
    const s=buildBlocoSummary();
    const idx=hist.findIndex(h=>h.blocoId===s.blocoId);
    // Preserva SR anterior (acumula repetições)
    const prevSR=idx>=0?(hist[idx].sr||null):null;
    const quality=computeSRQuality(s);
    s.sr=applySM2(prevSR,quality);
    s.srQuality=quality; // guarda para debug
    if(idx>=0) hist[idx]=s; else hist.push(s);
    if(hist.length>90) hist=hist.slice(-90);
    localStorage.setItem(HIST_KEY,JSON.stringify(hist));
  }catch(e){}
}
function loadHistory(){
  try{const r=localStorage.getItem(HIST_KEY);return r?JSON.parse(r):[]}catch(e){return [];}
}
function buildBarChart(entries){
  if(!entries.length) return '';
  const W=520,H=108,padB=17,padT=13,inner=H-padB-padT;
  const n=entries.length;
  const bW=Math.max(7,Math.min(26,Math.floor((W-16)/n)-3));
  const gap=(W-bW*n)/(n+1);
  let s=`<svg viewBox="0 0 ${W} ${H}" width="100%" xmlns="http://www.w3.org/2000/svg">`;
  // gridlines
  [50,70,90].forEach(pct=>{
    const gy=padT+Math.round((1-pct/100)*inner);
    s+=`<line x1="0" y1="${gy}" x2="${W}" y2="${gy}" stroke="var(--bord)" stroke-width="1"/>`;
    s+=`<text x="2" y="${gy-2}" font-size="7.5" fill="var(--txt3)">${pct}%</text>`;
  });
  // ref line 70%
  const ry=padT+Math.round(.3*inner);
  s+=`<line x1="0" y1="${ry}" x2="${W}" y2="${ry}" stroke="var(--green)" stroke-dasharray="4,3" opacity=".45" stroke-width="1.2"/>`;
  // bars
  entries.forEach((e,i)=>{
    const bH=Math.max(2,Math.round((e.pct/100)*inner));
    const x=gap+i*(bW+gap), y=H-padB-bH;
    const col=e.pct>=70?'var(--green)':e.pct>=50?'var(--acc)':'var(--red)';
    s+=`<rect x="${x.toFixed(1)}" y="${y}" width="${bW}" height="${bH}" rx="3" fill="${col}" opacity=".82"/>`;
    if(bH>16){s+=`<text x="${(x+bW/2).toFixed(1)}" y="${y+bH-4}" text-anchor="middle" font-size="8" fill="rgba(255,255,255,.8)" font-weight="700">${e.pct}%</text>`;}
    else{s+=`<text x="${(x+bW/2).toFixed(1)}" y="${y-2}" text-anchor="middle" font-size="7.5" fill="${col}">${e.pct}%</text>`;}
    const dl=fmtDateShort(e.data).slice(0,5);
    s+=`<text x="${(x+bW/2).toFixed(1)}" y="${H-2}" text-anchor="middle" font-size="7" fill="var(--txt3)">${dl}</text>`;
  });
  s+='</svg>';
  return s;
}

      totalMs: S.totalMs + (S.startedAt ? Date.now()-S.startedAt : 0),
      finished: S.finished
    }));
  }catch(e){}
}
function loadSaved(){
  try{
    const d = localStorage.getItem(STORE_KEY());
    return d ? JSON.parse(d) : null;
  }catch(e){return null;}
}
function clearSaved(){ try{localStorage.removeItem(STORE_KEY());}catch(e){} }

/* ── DATA ─────────────────────────────────────────────────── */
function flattenBloco(b){
  const arr=[];
  b.disciplinas.forEach((d,di)=>{
    d.itens.forEach(it=>arr.push({n:it.n,discIdx:di,discNome:d.nome,cmd:d.comando,item:it}));
  });
  return arr;
}
function loadBloco(b){
  S.bloco=b; S.flat=flattenBloco(b);
  S.respostas={}; S.gabsShown={}; S.globalGabShown=false;
  S.avaliacoes={};
  S.totalMs=0; S.startedAt=null; S.finished=false;
}

/* ── THEME ───────────────────────────────────────────────── */
const THEMES=['dark','light'];
function applyTheme(t){
  document.documentElement.setAttribute('data-theme',t);
  const ic=t==='dark'?'☀':'🌙';
  document.getElementById('btn-theme').textContent=ic;
  try{localStorage.setItem(THEME_KEY,t);}catch(e){}
}
function cycleTheme(){
  const cur=document.documentElement.getAttribute('data-theme')||'dark';
  applyTheme(cur==='dark'?'light':'dark');
  showToast('Tema alterado');
}

/* ── DATE FORMAT ─────────────────────────────────────────── */
function fmtDateShort(iso){
  // "2026-06-05" → "05.06.26"
  if(!iso) return '';
  const p=iso.split('-');
  if(p.length<3) return iso;
  return `${p[2]}.${p[1]}.${p[0].slice(2)}`;
}

/* ── TIMER ───────────────────────────────────────────────── */
function fmtTime(ms){
  const s=Math.floor(ms/1000), m=Math.floor(s/60), h=Math.floor(m/60);
  if(h>0) return `${h}h ${(m%60).toString().padStart(2,'0')}m`;
  return `${m}:${(s%60).toString().padStart(2,'0')}`;
}
function startTimer(){
  if(S.timerInterval) return;
  S.startedAt=Date.now();
  S.timerInterval=setInterval(()=>{
    const elapsed=S.totalMs+(Date.now()-S.startedAt);
    const el=document.getElementById('hdr-timer-txt');
    if(el) el.textContent=fmtTime(elapsed);
    const bpel=document.getElementById('bp-time');
    if(bpel) bpel.textContent=fmtTime(elapsed);
  },1000);
}
function stopTimer(){
  if(S.timerInterval){clearInterval(S.timerInterval);S.timerInterval=null;}
  if(S.startedAt){S.totalMs+=Date.now()-S.startedAt;S.startedAt=null;}
}

function togglePause(){
  if(S.finished) return;
  S.paused=!S.paused;
  const btn=document.getElementById('btn-pause');
  const overlay=document.getElementById('pause-overlay');
  if(S.paused){
    // Pausa: para timers, bloqueia tela
    stopTimer();
    if(QT.tickInterval){clearInterval(QT.tickInterval);QT.tickInterval=null;}
    if(QT.observer){QT.observer.disconnect();QT.observer=null;}
    QT.visible.clear();
    overlay.classList.remove('hidden');
    btn.textContent='▶';
    btn.classList.add('paused');
    btn.title='Retomar';
  } else {
    // Retoma: esconde overlay, reinicia timers
    overlay.classList.add('hidden');
    btn.textContent='⏸';
    btn.classList.remove('paused');
    btn.title='Pausar';
    // Reinicia apenas se estiver na prova ou no foco
    const inProva=!document.getElementById('sec-prova').classList.contains('hidden');
    const inFoco=FOCO.active;
    if(inProva||inFoco){
      startTimer();
      if(!QT.tickInterval&&!FOCO.active){
        // re-inicia observer e tick na prova normal
        initQTimer();
      } else if(FOCO.active){
        // no foco apenas o tick
        QT.lastTickAt=Date.now();
        QT.tickInterval=setInterval(_qtTick,500);
      }
    }
  }
}

/* ── RENDER PROVA ─────────────────────────────────────────── */
function renderProva(){

  document.getElementById('hdr-timer').classList.remove('hidden');

  S.bloco.disciplinas.forEach((d,di)=>{
    const short=d.nome.replace('Direito ','').replace(' e Legislação Especial','').replace(' e Legislação Complementar','');

function renderQBlock(it,di){
  const ans=S.respostas[it.n];
  const gabOn=S.gabsShown[it.n]||S.globalGabShown;
  const isRight=ans&&ans===it.gab;
  const isWrong=ans&&ans!==it.gab;

  const markC=ans==='CERTO'?` sel-c${gabOn?(isRight?' is-right':' is-wrong'):''}`:' ';
  const markE=ans==='ERRADO'?` sel-e${gabOn?(isRight?' is-right':' is-wrong'):''}`:' ';
  const disab=S.finished?'disabled':'';

  let enunHtml=it.enun;
  const m=enunHtml.match(/^(Situação hipotética[^.]*\.)(.*)/s);
  if(m) enunHtml=`<span class="situacao">${m[1].trim()}</span>${m[2].trim()}`;

  let statusHtml='';
  if(gabOn&&ans){
    statusHtml=`<span class="q-status">${isRight?'<span class="ok">✓ Acertou</span>':'<span class="er">✗ Errou</span>'}</span>`;
  }else if(gabOn&&!ans){
    statusHtml=`<span class="q-status" style="color:var(--txt3)">Em branco</span>`;
  }

  let feedbackHtml='';
  if(gabOn){
    const fundSafe=escHtml(it.fund||'');
    const fundCopy=(it.fund||'').replace(/\\/g,'\\\\').replace(/"/g,'&quot;').replace(/'/g,"\\'").replace(/\n/g,'\\n');
    const gabBadgeCls=ans?(isRight?'ok':'er'):'bk';
    const gabBadgeTxt=ans?(isRight?'Acertou ✓':'Errou ✗'):'Em branco';

    // ── Releitura Crítica (enunciado com traps destacados) ──
    const mR=it.enun.match(/^(Situação hipotética[^.]*\.)(.*)/s);
    let relitHtml;
    if(mR){
      relitHtml=`<span class="situacao">${highlightTraps(escHtml(mR[1].trim()))}</span>${highlightTraps(escHtml(mR[2].trim()))}`;
    } else {
      relitHtml=highlightTraps(escHtml(it.enun));
    }
    const trapCount=(relitHtml.match(/class="trap-word"/g)||[]).length;

    // ── Autoavaliação ──
    const av=S.avaliacoes[it.n];
    let avHtml;
    if(av){
      const avl=AV_LABELS[av];
      avHtml=`<div class="av-set">
        <span style="color:var(--txt3);font-size:11.5px;text-transform:uppercase;letter-spacing:.08em;font-weight:600">Autoavaliação:</span>
        <span class="av-chip ${avl.cls}">${avl.icon} ${avl.txt}</span>
        <button class="av-change" onclick="setAvaliacao(${it.n},null)">alterar</button>
      </div>`;
    } else {
      const btns=Object.entries(AV_LABELS).map(([k,v])=>
        `<button class="av-btn ${v.cls}" onclick="setAvaliacao(${it.n},'${k}')">${v.icon} ${v.txt}</button>`
      ).join('');
      avHtml=`<div class="avaliacao-row">
        <div class="avaliacao-lbl">Como você se saiu nessa questão?</div>
        ${btns}
      </div>`;
    }

    feedbackHtml=`<div class="q-feedback">
      <div class="gab-line">
        <span class="gab-label">Gabarito</span>
        <span class="gab-value">&nbsp;${it.gab}</span>
        <span class="gab-badge ${gabBadgeCls}">${gabBadgeTxt}</span>
      </div>
      ${avHtml}
      ${trapCount>0?`<div class="gab-section">
        <button class="gab-hdr" onclick="toggleGabSec(${it.n},'r')">
          <span class="gab-icon">🔍</span>
          <span class="gab-lbl">Releitura Crítica</span>
          <span style="margin-left:auto;margin-right:8px" class="trap-found">⚑ ${trapCount} armadilha${trapCount>1?'s':''}</span>
          <span class="gab-chev open" id="chev-${it.n}-r">▼</span>
        </button>
        <div class="gab-body" id="gb-${it.n}-r">
          <div class="releitura-body">${relitHtml}</div>
          <div class="trap-legend">Palavras destacadas:
            ${TRAP_WORDS.filter(w=>new RegExp(`(?<![\\wÀ-ÿ])${_escRx(w)}(?![\\wÀ-ÿ])`,'i').test(it.enun)).slice(0,8).map(w=>`<mark class="trap-word">${w}</mark>`).join(' ')}
          </div>
        </div>
      </div>`:''}
      <div class="gab-section">
        <button class="gab-hdr" onclick="toggleGabSec(${it.n},'f')">
          <span class="gab-icon">💡</span>
          <span class="gab-lbl">Explicação (Feynman)</span>
          <span class="gab-chev open" id="chev-${it.n}-f">▼</span>
        </button>
        <div class="gab-body" id="gb-${it.n}-f"><div class="feynman-text">${it.com||''}</div></div>

      </div>`:''}

  }

  return `<div class="q-block${gabOn?' gab-on':''}" id="q-${it.n}" data-n="${it.n}">
    <div class="q-line">
      <span class="q-tag">${it.n}</span>
      <div class="q-text">${enunHtml}</div>

        <button class="q-mark${markE}" onclick="markAns(${it.n},'ERRADO')" ${disab} title="Errado (E)">E</button>
      </div>
    </div>
    <div class="q-actions-row">
      <button class="q-show-gab" onclick="toggleGab(${it.n})">${gabOn?'Ocultar gabarito':'Ver gabarito'}</button>
      ${statusHtml}
      <span class="qt-badge qt-idle" id="qt-${it.n}">⏱</span>
    </div>
    ${feedbackHtml}
  </div>`;
}

function rerenderQ(n){
  const el=document.getElementById(`q-${n}`);
  if(!el) return;
  const di=S.flat.find(x=>x.n===n)?.discIdx||0;
  el.outerHTML=renderQBlock(S.flat.find(x=>x.n===n).item, di);
}

/* ── ACTIONS ─────────────────────────────────────────────── */
function markAns(n,val){
  if(S.finished) return;
  if(S.respostas[n]===val) delete S.respostas[n];
  else {
    S.respostas[n]=val;
    // Modo Foco: exibe gabarito automaticamente após responder
    if(typeof FOCO!=='undefined' && FOCO.active && !S.gabsShown[n]) S.gabsShown[n]=true;
  }
  save(); rerenderQ(n); updateProgress(); updateQuickNav();
  setTimeout(()=>_qtUpdateBadge(n),0);
}

function toggleGab(n){
  if(S.gabsShown[n]) delete S.gabsShown[n];
  else S.gabsShown[n]=true;
  save(); rerenderQ(n); updateQuickNav();
}

function toggleGabSec(n,key){
  const body=document.getElementById(`gb-${n}-${key}`);
  const chev=document.getElementById(`chev-${n}-${key}`);
  if(!body) return;
  const open=!body.classList.contains('hidden');
  body.classList.toggle('hidden',open);
  if(chev) chev.classList.toggle('open',!open);
}

function toggleAllGabaritos(){
  S.globalGabShown=!S.globalGabShown;
  if(S.globalGabShown) S.gabsShown={};
  save();
  renderProva(); // full re-render
  updateGabAllBtn();
}
function updateGabAllBtn(){
  const b=document.getElementById('btn-gab-all');
  const t=document.getElementById('tb-gab-all');
  const lbl=S.globalGabShown?'🙈':'👁';
  if(b) b.textContent=lbl;
  if(t) t.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="3"/><path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7-10-7-10-7z"/></svg> ${S.globalGabShown?'Ocultar gabaritos':'Gabaritos'}`;

/* ── QUICK NAV ───────────────────────────────────────────── */
function renderQuickNav(){
  const grid=document.getElementById('qn-grid');
  if(!grid) return;
  grid.innerHTML=S.flat.map(x=>{
    const a=S.respostas[x.n];
    const g=S.gabsShown[x.n]||S.globalGabShown;

    if(g) cls+=' gs';

    return `<button class="qn-btn ${cls}" onclick="jumpTo(${x.n})" title="Q.${x.n}${!a&&(QT.times[x.n]||0)>=QT.ALERT?' · ⏱ '+_fmtQT(QT.times[x.n]):''}">${x.n}</button>`;

function updateQuickNav(){ renderQuickNav(); }
function jumpTo(n){
  document.getElementById('quick-nav').classList.remove('open');

/* ── PROGRESS ─────────────────────────────────────────────── */
function updateProgress(){
  const tot=S.flat.length;
  let ok=0,er=0,ans=0;
  S.flat.forEach(x=>{
    const r=S.respostas[x.n];
    if(r===x.item.gab) ok++;
    else if(r) er++;
    if(r) ans++;
  });
  const pct=tot?Math.round(ans/tot*100):0;
  const blank=tot-ans;

  // Header
  document.getElementById('c-ok').textContent='✓ '+ok;
  document.getElementById('c-er').textContent='✗ '+er;
  document.getElementById('c-tot').textContent=ans+'/'+tot;
  document.getElementById('prog-fill').style.width=pct+'%';
  // Toolbar
  const tbans=document.getElementById('tb-ans');
  const tbblank=document.getElementById('tb-blank');
  if(tbans) tbans.textContent=ans;
  if(tbblank) tbblank.textContent=blank;
  // Bottom bar
  const bpok=document.getElementById('bp-ok');
  const bper=document.getElementById('bp-er');
  const bpcur=document.getElementById('bp-cur');
  const bptot=document.getElementById('bp-tot');
  const bbar=document.getElementById('bbar-fill');
  if(bpok) bpok.textContent=ok+' ✓';
  if(bper) bper.textContent=er+' ✗';
  if(bpcur) bpcur.textContent=ans;
  if(bptot) bptot.textContent=tot;
  if(bbar) bbar.style.width=pct+'%';
}

/* ── FINISH ──────────────────────────────────────────────── */
function confirmFinish(){
  const blank=S.flat.filter(x=>!S.respostas[x.n]).length;
  if(blank===0){finishProva();return;}
  const el=document.getElementById('modal-root');
  el.innerHTML=`<div class="modal-ov" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <h3>⚠️ Questões em branco</h3>
      <p>Você tem <strong>${blank} questão(ões) em branco</strong>.<br><br>
      Pela fórmula CEBRASPE, itens em branco valem 0 pontos — ao contrário dos errados (−1). Recomenda-se responder todas as questões.</p>
      <div class="modal-acts">
        <button class="btn-ghost" onclick="closeModal()">Voltar e responder</button>
        <button class="btn-warn" onclick="closeModal();finishProva()">Encerrar mesmo assim</button>
      </div>
    </div>
  </div>`;
}
function finishProva(){
  stopTimer(); stopQTimer(); S.finished=true; S.globalGabShown=true; save();
  saveToHistory(); // persiste no histórico cross-bloco
  renderPlacar();
}
function goBackToProva(jumpN){
  S.finished=false; save();
  renderProva();
  if(jumpN) setTimeout(()=>jumpTo(jumpN),300);
}

/* ── MODO FOCO ────────────────────────────────────────────── */
const FOCO={active:false, idx:0, currentN:null};

function enterFoco(startIdx){
  if(!S.bloco){showToast('Carregue um bloco primeiro');return;}
  if(S.finished){showToast('Bloco já encerrado — use a Revisão');return;}
  // Desconecta apenas o observer (para de acumular tempo via scroll),
  // mas mantém QT.tickInterval ativo para continuar contando tempo em Foco
  if(QT.observer){QT.observer.disconnect();QT.observer=null;}
  QT.visible.clear();
  if(!QT.tickInterval){QT.lastTickAt=Date.now();QT.tickInterval=setInterval(_qtTick,500);}
  FOCO.active=true;
  if(startIdx!==undefined){
    FOCO.idx=Math.max(0,Math.min(startIdx,S.flat.length-1));
  } else {
    // começa na primeira não respondida
    const first=S.flat.findIndex(x=>!S.respostas[x.n]);
    FOCO.idx=first>=0?first:0;
  }
  // oculta tudo, exibe foco
  document.getElementById('sec-prova').classList.add('hidden');
  document.getElementById('sec-placar').classList.add('hidden');
  document.getElementById('sec-historico').classList.add('hidden');
  document.getElementById('sec-revisao').classList.add('hidden');
  document.getElementById('sec-cover').innerHTML='';

/* ── QUESTION TIMER ──────────────────────────────────────── */
const QT={
  times:{},         // {n: elapsedMs}
  visible:new Set(),
  lastTickAt:null,
  tickInterval:null,
  observer:null,
  WARN:60000,       // 60s → amber
  ALERT:90000,      // 90s → red + pulse
};

function initQTimer(){
  stopQTimer();
  QT.times={}; QT.visible=new Set(); QT.lastTickAt=Date.now();

  QT.observer=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      const n=parseInt(e.target.dataset.n);
      if(e.isIntersecting) QT.visible.add(n);
      else QT.visible.delete(n);
    });
  },{rootMargin:'-28% 0px -28% 0px',threshold:0});

  document.querySelectorAll('.q-block[data-n]').forEach(el=>QT.observer.observe(el));
  QT.tickInterval=setInterval(_qtTick,500);
}

function stopQTimer(){
  if(QT.tickInterval){clearInterval(QT.tickInterval);QT.tickInterval=null;}
  if(QT.observer){QT.observer.disconnect();QT.observer=null;}
  QT.visible.clear(); QT.lastTickAt=null;
  const pill=document.getElementById('qt-pill');
  if(pill) pill.classList.add('hidden');
}

function _qtTick(){
  const now=Date.now();
  const delta=QT.lastTickAt?now-QT.lastTickAt:0;
  QT.lastTickAt=now;

  let pillN=null, pillMs=0;
  let crossedAlert=false;
  QT.visible.forEach(n=>{
    if(!S.respostas[n]){
      const prevMs=QT.times[n]||0;
      QT.times[n]=prevMs+delta;
      if(QT.times[n]>pillMs){pillMs=QT.times[n];pillN=n;}
      // detecta cruzamento do limiar para atualizar quick nav
      if(prevMs<QT.ALERT && QT.times[n]>=QT.ALERT) crossedAlert=true;
    }
    _qtUpdateBadge(n);
  });
  _qtUpdatePill(pillN,pillMs);
  if(crossedAlert) renderQuickNav();

  // Modo Foco: acumula tempo para a questão visível manualmente
  if(FOCO.active && FOCO.currentN && !S.respostas[FOCO.currentN]){
    QT.times[FOCO.currentN]=(QT.times[FOCO.currentN]||0)+delta;
    _qtUpdateBadge(FOCO.currentN);
    // atualiza % no header do foco
    const pf=document.getElementById('foco-pf');
    if(pf){const t=S.flat.length;const a=Object.keys(S.respostas).length;pf.style.width=Math.round(a/t*100)+'%';}
    const fpct=document.querySelector('.foco-pct');
    if(fpct){const t=S.flat.length;const a=Object.keys(S.respostas).length;fpct.textContent=Math.round(a/t*100)+'%';}
  }
}

function _qtUpdateBadge(n){
  const el=document.getElementById(`qt-${n}`);
  if(!el) return;
  const ms=QT.times[n]||0;
  const answered=!!S.respostas[n];
  if(answered){
    el.className='qt-badge qt-done';
    el.textContent=ms>0?`⏱ ${_fmtQT(ms)}`:'⏱';
    return;
  }
  if(ms<1000){el.className='qt-badge qt-idle';el.textContent='⏱';return;}
  if(ms>=QT.ALERT){el.className='qt-badge qt-alert';el.textContent=`⏱ ${_fmtQT(ms)}`;}
  else if(ms>=QT.WARN){el.className='qt-badge qt-warn';el.textContent=`⏱ ${_fmtQT(ms)}`;}
  else{el.className='qt-badge qt-normal';el.textContent=`⏱ ${_fmtQT(ms)}`;}
}

function _qtUpdatePill(n,ms){
  const pill=document.getElementById('qt-pill');
  if(!pill) return;
  if(!n||ms<8000){pill.classList.add('hidden');return;}
  pill.classList.remove('hidden');
  const inner=pill.querySelector('.qt-active-pill');
  if(!inner) return;
  const cls='qt-active-pill'+(ms>=QT.ALERT?' qt-alert-p':ms>=QT.WARN?' qt-warn-p':'');
  inner.className=cls;
  const icon=ms>=QT.ALERT?'⚠️':ms>=QT.WARN?'⏳':'⏱';
  inner.innerHTML=`${icon} Q.${n} — <span style="font-variant-numeric:tabular-nums">${_fmtQT(ms)}</span>`;
}

function _fmtQT(ms){
  const s=Math.floor(ms/1000);
  return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
}

/* ── REVISÃO PICKER ──────────────────────────────────────── */
function showRevisaoPicker(){
  stopQTimer(); _hideAllSections();
  document.getElementById('sec-revisao').classList.remove('hidden');
  document.getElementById('fab').classList.add('hidden');
  document.getElementById('bot-bar').classList.add('hidden');
  document.getElementById('hdr-timer').classList.add('hidden');
  document.getElementById('hdr-chips').style.display='none';
  document.getElementById('btn-gab-all').classList.add('hidden');

  // Reset picker state
  RPS.filterType=null; RPS.discNome=null; RPS.mode='releitura';

  const filters=[
    {type:'erros',      icon:'✗', cls:'cr', label:'Erros'},
    {type:'branco',     icon:'○', cls:'ct', label:'Em branco'},
    {type:'lac',        icon:'📖', cls:'cr', label:'Lacunas conceituais'},
    {type:'dvd',        icon:'🤔', cls:'ca', label:'Acertei com dúvida'},
    {type:'problematicos', icon:'⚠️', cls:'cr', label:'Todos problemáticos'},
  ];

  const cards=filters.map(f=>{
    const n=computeFilteredNs(f.type,null).length;
    return `<button class="filter-card" id="fc-${f.type}" onclick="pickRevFilter('${f.type}',null,this)" ${n===0?'disabled':''}>
      <span class="fc-icon">${f.icon}</span>
      <span class="fc-count ${f.cls}">${n}</span>
      <span class="fc-label">${f.label}</span>
    </button>`;
  }).join('');

  const discBtns=S.bloco.disciplinas.map(d=>{
    const short=d.nome.replace('Direito ','').replace(/ e Legislação .*/,'');
    const n=computeFilteredNs('disc',d.nome).length;
    return `<button class="disc-btn" id="dc-${short}" onclick="pickRevFilter('disc','${d.nome}',this)" ${n===0?'disabled':''}>
      ${short} <span style="font-size:11px;color:var(--txt3)">(${n})</span>
    </button>`;
  }).join('');

  const wrap=document.getElementById('rev-wrap');
  wrap.innerHTML=`<div class="rev-picker">
    <div class="cover-kicker">Δ Modo Revisão</div>
    <h2>O que revisar?</h2>
    <p class="sub">Selecione o conjunto e o modo de revisão. O desempenho da revisão é calculado separadamente.</p>

    <div class="filter-sec-lbl">Por tipo</div>
    <div class="filter-grid">${cards}</div>

    <div class="filter-sec-lbl">Por disciplina completa</div>
    <div class="disc-filter-row">${discBtns}</div>

    <div class="filter-sec-lbl">Modo</div>
    <div class="mode-box">
      <div class="mode-tabs">
        <button class="mode-tab active" id="rev-mt-r" onclick="pickRevMode('releitura')">📖 Releitura</button>
        <button class="mode-tab" id="rev-mt-t" onclick="pickRevMode('retestar')">🎯 Retestar</button>
      </div>
      <div class="mode-desc-txt" id="rev-mode-desc">Gabaritos visíveis desde o início — foque em entender os erros e autoavaliar seu conhecimento.</div>
    </div>

    <button class="btn-primary" id="rev-start-btn" disabled onclick="startRevisao()">Selecione um filtro acima</button>
    <button class="btn-ghost" style="margin-top:10px;width:100%" onclick="closeRevisao()">← Voltar</button>
  </div>`;
  window.scrollTo(0,0);
}

function pickRevFilter(type, disc, btn){
  // Clear all selections
  document.querySelectorAll('.filter-card,.disc-btn').forEach(b=>b.classList.remove('sel'));
  // Select this one
  btn.classList.add('sel');
  RPS.filterType=type; RPS.discNome=disc;
  _updateRevStartBtn();
}
function pickRevMode(mode){
  RPS.mode=mode;
  document.getElementById('rev-mt-r').classList.toggle('active',mode==='releitura');
  document.getElementById('rev-mt-t').classList.toggle('active',mode==='retestar');
  document.getElementById('rev-mode-desc').textContent=mode==='releitura'
    ?'Gabaritos visíveis desde o início — foque em entender os erros e autoavaliar seu conhecimento.'
    :'Gabaritos ocultos — responda novamente e veja seu desempenho na revisão.';
  _updateRevStartBtn();
}
function _updateRevStartBtn(){
  const ns=RPS.filterType?computeFilteredNs(RPS.filterType,RPS.discNome):[];
  const btn=document.getElementById('rev-start-btn');
  if(!btn) return;
  btn.disabled=ns.length===0;
  btn.textContent=ns.length>0
    ?`▶ Iniciar ${RPS.mode==='retestar'?'reteste':'releitura'} (${ns.length} questão${ns.length>1?'ões':''})`
    :'Selecione um filtro acima';
}

/* ── REVISÃO PROVA ───────────────────────────────────────── */
function startRevisao(){
  if(!RPS.filterType) return;
  REV.filteredNs=computeFilteredNs(RPS.filterType,RPS.discNome);
  if(!REV.filteredNs.length){showToast('Nenhuma questão corresponde a esse filtro');return;}
  REV.mode=RPS.mode;
  REV.respostas={}; REV.gabsShown={}; REV.finished=false;
  REV.globalGabShown = REV.mode==='releitura';
  renderRevisao();
}

function renderRevisao(){
  document.getElementById('rev-wrap').innerHTML='';
  const filtered=S.flat.filter(x=>REV.filteredNs.includes(x.n));

  // Group by discipline preserving order
  const discSeen=[]; const discMap={};
  filtered.forEach(x=>{
    if(!discMap[x.discNome]){discMap[x.discNome]=[];discSeen.push(x.discNome);}
    discMap[x.discNome].push(x);
  });

  const modeLabel=REV.mode==='releitura'?'📖 Releitura':'🎯 Retestar';
  let html=`<div class="rev-tb">
    <div class="rev-tb-inner">
      <span class="rev-badge">${modeLabel}</span>
      <span style="font-size:13px;color:var(--txt2)"><b id="rev-ans-cnt">0</b>/${REV.filteredNs.length} respondidas</span>
      <span class="tb-spacer"></span>
      ${REV.mode==='retestar'?`<button class="tb-btn" id="rev-tb-gab" onclick="toggleRevGabAll()">👁 Gabaritos</button>`:''}
      <button class="tb-btn danger" onclick="confirmFinishRevisao()">Encerrar revisão →</button>
    </div>
  </div>
  <div style="max-width:860px;margin:0 auto;padding:20px 18px 80px">`;

  discSeen.forEach(discNome=>{
    const items=discMap[discNome];
    const short=discNome.replace('Direito ','').replace(/ e Legislação .*/,'');
    html+=`<div class="disc-hdr" style="margin-top:24px"><h3>${short}</h3></div>`;
    html+=items.map(x=>renderRevQBlock(x.item)).join('');
  });
  html+='</div>';
  document.getElementById('rev-wrap').innerHTML=html;
  updateRevProgress();
  window.scrollTo(0,0);
}

function renderRevQBlock(it){
  const ans=REV.respostas[it.n];
  const gabOn=REV.gabsShown[it.n]||REV.globalGabShown;
  const isRight=ans&&ans===it.gab;
  const disab=REV.finished?'disabled':'';
  const av=S.avaliacoes[it.n];

  // Original answer badge — oculto no Retestar enquanto gabarito não foi revelado
  const orig=S.respostas[it.n];
  const origCls=orig?(orig===it.gab?'ok':'er'):'bk';
  const origTxt=orig?`orig: ${orig} ${orig===it.gab?'✓':'✗'}`:'sem resp.';
  const showOrig = REV.mode==='releitura' || gabOn;
  const origBadge=showOrig?`<span class="rev-orig ${origCls}">${origTxt}</span>`:'';

  let enunHtml=it.enun;
  const m=enunHtml.match(/^(Situação hipotética[^.]*\.)(.*)/s);
  if(m) enunHtml=`<span class="situacao">${m[1].trim()}</span>${m[2].trim()}`;

  const markC=ans==='CERTO'?` sel-c${gabOn?(isRight?' is-right':' is-wrong'):''}`:' ';
  const markE=ans==='ERRADO'?` sel-e${gabOn?(isRight?' is-right':' is-wrong'):''}`:' ';

  let statusHtml='';
  if(gabOn&&ans) statusHtml=`<span class="q-status">${isRight?'<span class="ok">✓ Acertou</span>':'<span class="er">✗ Errou</span>'}</span>`;
  else if(gabOn&&!ans) statusHtml=`<span class="q-status" style="color:var(--txt3)">Em branco</span>`;

  let feedbackHtml='';
  if(gabOn){
    const fundSafe=escHtml(it.fund||'');
    const fundCopy=(it.fund||'').replace(/\\/g,'\\\\').replace(/"/g,'&quot;').replace(/'/g,"\\'").replace(/\n/g,'\\n');
    const gabBadgeCls=ans?(isRight?'ok':'er'):'bk';
    const gabBadgeTxt=ans?(isRight?'Acertou ✓':'Errou ✗'):'Em branco';

    // Releitura Crítica
    const mR=it.enun.match(/^(Situação hipotética[^.]*\.)(.*)/s);
    let relitHtml=mR
      ?`<span class="situacao">${highlightTraps(escHtml(mR[1].trim()))}</span>${highlightTraps(escHtml(mR[2].trim()))}`
      :highlightTraps(escHtml(it.enun));
    const trapCount=(relitHtml.match(/class="trap-word"/g)||[]).length;

    // Autoavaliação
    let avHtml;
    if(av){
      const avl=AV_LABELS[av];
      avHtml=`<div class="av-set"><span style="color:var(--txt3);font-size:11.5px;text-transform:uppercase;letter-spacing:.08em;font-weight:600">Autoavaliação:</span>
        <span class="av-chip ${avl.cls}">${avl.icon} ${avl.txt}</span>
        <button class="av-change" onclick="setAvaliacao(${it.n},null)">alterar</button></div>`;
    } else {
      const btns=Object.entries(AV_LABELS).map(([k,v])=>
        `<button class="av-btn ${v.cls}" onclick="setAvaliacao(${it.n},'${k}')">${v.icon} ${v.txt}</button>`
      ).join('');
      avHtml=`<div class="avaliacao-row"><div class="avaliacao-lbl">Como você se saiu?</div>${btns}</div>`;
    }

    feedbackHtml=`<div class="q-feedback">
      <div class="gab-line"><span class="gab-label">Gabarito</span><span class="gab-value">&nbsp;${it.gab}</span>
        <span class="gab-badge ${gabBadgeCls}">${gabBadgeTxt}</span></div>
      ${avHtml}
      ${trapCount>0?`<div class="gab-section">
        <button class="gab-hdr" onclick="toggleGabSec(${it.n},'r')">
          <span class="gab-icon">🔍</span><span class="gab-lbl">Releitura Crítica</span>
          <span style="margin-left:auto;margin-right:8px" class="trap-found">⚑ ${trapCount} armadilha${trapCount>1?'s':''}</span>
          <span class="gab-chev open" id="chev-${it.n}-r">▼</span>
        </button>
        <div class="gab-body" id="gb-${it.n}-r"><div class="releitura-body">${relitHtml}</div></div>
      </div>`:''}
      <div class="gab-section">
        <button class="gab-hdr" onclick="toggleGabSec(${it.n},'f')">
          <span class="gab-icon">💡</span><span class="gab-lbl">Explicação (Feynman)</span>
          <span class="gab-chev open" id="chev-${it.n}-f">▼</span>
        </button>
        <div class="gab-body" id="gb-${it.n}-f"><div class="feynman-text">${it.com||''}</div></div>
      </div>
      <div class="gab-section">
        <button class="gab-hdr" onclick="toggleGabSec(${it.n},'l')">
          <span class="gab-icon">📖</span><span class="gab-lbl">Lei &amp; Jurisprudência</span>
          <span class="gab-chev" id="chev-${it.n}-l">▼</span>
        </button>
        <div class="gab-body hidden" id="gb-${it.n}-l">
          <div class="law-block">${fundSafe}</div>
          <button class="copy-btn" onclick="copyFund(this,'${fundCopy}')">📋 Copiar lei &amp; jurisprudência</button>
        </div>
      </div>
      ${it.peg?`<div class="gab-section" style="border-top:1px solid var(--bord)">
        <div style="padding:10px 14px"><div class="peg-box">⚠️&nbsp;<span><strong>Armadilha:</strong> ${it.peg}</span></div></div>
      </div>`:''}
    </div>`;
  }

  return `<div class="q-block${gabOn?' gab-on':''}" id="q-${it.n}" data-n="${it.n}">
    <div class="q-line">
      <span class="q-tag">${it.n}</span>
      <div class="q-text">${enunHtml}</div>
      <div class="q-marks">
        <button class="q-mark${markC}" onclick="markRevAns(${it.n},'CERTO')" ${disab}>C</button>
        <button class="q-mark${markE}" onclick="markRevAns(${it.n},'ERRADO')" ${disab}>E</button>
      </div>
    </div>
    <div class="q-actions-row">
      ${origBadge}
      <button class="q-show-gab" onclick="toggleRevGab(${it.n})">${gabOn?'Ocultar gabarito':'Ver gabarito'}</button>
      ${statusHtml}
    </div>
    ${feedbackHtml}
  </div>`;
}

function rerenderRevQ(n){
  const el=document.getElementById(`q-${n}`);
  if(!el) return;
  el.outerHTML=renderRevQBlock(S.flat.find(x=>x.n===n).item);
}

function markRevAns(n,val){
  if(REV.finished) return;
  if(REV.respostas[n]===val) delete REV.respostas[n];
  else REV.respostas[n]=val;
  rerenderRevQ(n); updateRevProgress();
}
function toggleRevGab(n){
  if(REV.gabsShown[n]) delete REV.gabsShown[n]; else REV.gabsShown[n]=true;
  rerenderRevQ(n);
}
function toggleRevGabAll(){
  REV.globalGabShown=!REV.globalGabShown;
  if(REV.globalGabShown) REV.gabsShown={};
  const btn=document.getElementById('rev-tb-gab');
  if(btn) btn.textContent=REV.globalGabShown?'🙈 Ocultar':'👁 Gabaritos';
  renderRevisao();
}
function updateRevProgress(){
  const el=document.getElementById('rev-ans-cnt');
  if(el) el.textContent=Object.keys(REV.respostas).length;
}

function confirmFinishRevisao(){
  const blank=REV.filteredNs.filter(n=>!REV.respostas[n]).length;
  if(REV.mode==='releitura'){finishRevisao();return;}
  if(blank===0){finishRevisao();return;}
  document.getElementById('modal-root').innerHTML=`<div class="modal-ov" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <h3>Questões sem resposta</h3>
      <p><strong>${blank}</strong> questão(ões) ainda sem resposta na revisão. Deseja encerrar mesmo assim?</p>
      <div class="modal-acts">
        <button class="btn-ghost" onclick="closeModal()">Voltar</button>
        <button class="btn-warn" onclick="closeModal();finishRevisao()">Encerrar</button>
      </div>
    </div>
  </div>`;
}

function finishRevisao(){
  REV.finished=true;
  renderRevisaoPlacar();
}

function renderRevisaoPlacar(){
  const tot=REV.filteredNs.length;
  let ok=0,er=0,blank=0;
  REV.filteredNs.forEach(n=>{
    const fl=S.flat.find(x=>x.n===n);
    const r=REV.respostas[n];
    if(r===fl.item.gab) ok++;
    else if(r) er++;
    else blank++;
  });
  const pct=tot>0?Math.round(ok/tot*100):0;
  const saldo=ok-er;
  const modeLabel=REV.mode==='releitura'?'Releitura':'Reteste';

  // Compare with original performance on same questions
  let origOk=0,origEr=0;
  REV.filteredNs.forEach(n=>{
    const fl=S.flat.find(x=>x.n===n);
    const r=S.respostas[n];
    if(r===fl.item.gab) origOk++;
    else if(r) origEr++;
  });
  const origPct=origOk+origEr>0?Math.round(origOk/(origOk+origEr)*100):0;
  const diff=pct-origPct;
  const diffHtml=REV.mode==='retestar'&&(origOk+origEr>0)
    ?`<p style="font-size:14px;color:var(--txt2);margin-top:8px">Na prova original: ${origPct}% nessas questões — ${diff>=0?`<span style="color:var(--green)">+${diff}pp na revisão 🎯</span>`:`<span style="color:var(--red)">${diff}pp</span>`}</p>`
    :'';

  const avCnt={dom:0,dvd:0,lac:0,leit:0};
  REV.filteredNs.forEach(n=>{const av=S.avaliacoes[n];if(av&&av in avCnt)avCnt[av]++;});
  const avTotal=Object.values(avCnt).reduce((a,b)=>a+b,0);

  document.getElementById('rev-wrap').innerHTML=`<div class="rev-placar-wrap">
    <div class="placar-hero">
      <div class="placar-kicker">${modeLabel} concluída · ${tot} questão${tot>1?'ões':''}</div>
      <h2>${pct>0?pct+'% de aproveitamento':'Releitura concluída'}</h2>
      ${diffHtml}
      <p class="placar-lead" style="margin-bottom:18px">Saldo CEBRASPE: ${saldo>=0?'+':''}${saldo}</p>
      <div class="placar-stats">

/* ── RENDER HISTÓRICO ────────────────────────────────────── */
function showHistorico(){
  stopTimer(); stopQTimer();
  document.getElementById('sec-cover').innerHTML='';
  document.getElementById('sec-prova').classList.add('hidden');
  document.getElementById('sec-placar').classList.add('hidden');
  document.getElementById('sec-revisao').classList.add('hidden');
  document.getElementById('sec-historico').classList.remove('hidden');
  document.getElementById('fab').classList.add('hidden');
  document.getElementById('bot-bar').classList.add('hidden');
  document.getElementById('hdr-timer').classList.add('hidden');
  document.getElementById('hdr-chips').style.display='none';
  document.getElementById('btn-gab-all').classList.add('hidden');

  const hist=loadHistory();
  const wrap=document.getElementById('hist-wrap');

  if(!hist.length){
    wrap.innerHTML=`<div class="hist-empty">
      <div class="hist-emoji">📊</div>
      <h2>Nenhum bloco concluído</h2>
      <p>Finalize seu primeiro bloco de questões para começar a construir seu histórico de estudo.</p>
      <button class="btn-primary" onclick="goHome()">← Voltar à capa</button>
    </div>`; window.scrollTo(0,0); return;
  }

  const sorted=[...hist].sort((a,b)=>a.finishedAt-b.finishedAt);
  const last14=sorted.slice(-14);
  const total=hist.length;
  const totQ=hist.reduce((s,h)=>s+h.totalQuestoes,0);
  const totOk=hist.reduce((s,h)=>s+h.acertos,0);
  const totEr=hist.reduce((s,h)=>s+h.erros,0);
  const media=totOk+totEr>0?Math.round(totOk/(totOk+totEr)*100):0;
  const avgSaldo=Math.round(hist.reduce((s,h)=>s+h.saldo,0)/total);

  // streak
  const diasSet=new Set(hist.map(h=>h.data));
  let streak=0,dStreak=new Date();
  for(let i=0;i<90;i++){
    const ds=dStreak.toISOString().slice(0,10);
    if(diasSet.has(ds)){streak++;dStreak.setDate(dStreak.getDate()-1);}
    else if(i===0){dStreak.setDate(dStreak.getDate()-1);}
    else break;
  }

  // disc aggregates
  const discMap={};
  hist.forEach(h=>{Object.entries(h.disciplinas||{}).forEach(([d,s])=>{
    if(!discMap[d])discMap[d]={ok:0,er:0,tot:0};
    discMap[d].ok+=s.ok;discMap[d].er+=s.er;discMap[d].tot+=s.tot;
  });});
  const discRows=Object.entries(discMap).sort((a,b)=>{
    const pa=a[1].ok+a[1].er>0?a[1].ok/(a[1].ok+a[1].er):1;
    const pb=b[1].ok+b[1].er>0?b[1].ok/(b[1].ok+b[1].er):1;
    return pa-pb;
  }).map(([d,s])=>{
    const p=s.ok+s.er>0?Math.round(s.ok/(s.ok+s.er)*100):null;
    const col=p===null?'var(--txt3)':p>=70?'var(--green)':p>=50?'var(--acc)':'var(--red)';
    return `<div class="disc-chart-row">
      <span class="nm">${d}</span>
      <div class="bar-rail"><div class="bar-fill" style="width:${p||0}%;background:${col}"></div></div>
      <span class="frac">${s.ok}/${s.tot}</span>
      <span class="pct" style="color:${col}">${p!==null?p+'%':'—'}</span>
    </div>`;
  }).join('');

  // avaliação aggregate
  const avAgg={dom:0,dvd:0,lac:0,leit:0};
  hist.forEach(h=>Object.entries(h.avaliacoes||{}).forEach(([k,v])=>{if(k in avAgg)avAgg[k]+=v;}));
  const avTotal=Object.values(avAgg).reduce((a,b)=>a+b,0);

  // weakest discipline
  const weak=Object.entries(discMap).sort((a,b)=>{
    const pa=a[1].ok+a[1].er>0?a[1].ok/(a[1].ok+a[1].er):1;
    const pb=b[1].ok+b[1].er>0?b[1].ok/(b[1].ok+b[1].er):1;
    return pa-pb;
  })[0];
  const weakPct=weak&&weak[1].ok+weak[1].er>0?Math.round(weak[1].ok/(weak[1].ok+weak[1].er)*100):null;

  // trend arrow (last 5 vs previous 5)
  let trendHtml='';
  if(sorted.length>=4){
    const half=Math.min(5,Math.floor(sorted.length/2));
    const recent=sorted.slice(-half).reduce((s,h)=>s+h.pct,0)/half;
    const prev=sorted.slice(-half*2,-half).reduce((s,h)=>s+h.pct,0)/half;
    const diff=Math.round(recent-prev);
    if(diff>0) trendHtml=`<span style="color:var(--green);font-weight:700;margin-left:8px">↑ +${diff}pp</span>`;
    else if(diff<0) trendHtml=`<span style="color:var(--red);font-weight:700;margin-left:8px">↓ ${diff}pp</span>`;
  }

  // bloco SR: fila de revisão (due ou prestes a vencer)
  const today=new Date().toISOString().slice(0,10);
  const dueBlocks=[...sorted].reverse().filter(h=>h.sr&&h.sr.nextReview&&h.sr.nextReview<=today);
  const soonBlocks=[...sorted].reverse().filter(h=>{
    if(!h.sr||!h.sr.nextReview) return false;
    const diff=(new Date(h.sr.nextReview)-new Date(today))/(1000*60*60*24);
    return diff>0&&diff<=2;
  });

  const srQueueHtml=dueBlocks.length+soonBlocks.length>0?`
    <div class="sr-queue-section">
      ${dueBlocks.length>0?`<div class="sr-queue-hdr">⟳ Para revisar hoje (${dueBlocks.length})</div>
        ${dueBlocks.map(h=>{
          const col=h.pct>=70?'var(--green)':h.pct>=50?'var(--acc)':'var(--red)';
          return `<div class="sr-queue-row">
            <span class="sr-queue-date">${fmtDateShort(h.data)}</span>
            <span class="sr-queue-title">${h.titulo||h.blocoId}</span>
            <span class="sr-queue-pct" style="color:${col}">${h.pct}%</span>
            <span class="sr-badge due">Vencido</span>
          </div>`;
        }).join('')}`:''}
      ${soonBlocks.length>0?`<div class="sr-queue-hdr" style="color:var(--amber);margin-top:${dueBlocks.length?'14px':'0'}">⟳ Revisar em breve (${soonBlocks.length})</div>
        ${soonBlocks.map(h=>{
          const diff=Math.round((new Date(h.sr.nextReview)-new Date(today))/(1000*60*60*24));
          const col=h.pct>=70?'var(--green)':h.pct>=50?'var(--acc)':'var(--red)';
          return `<div class="sr-queue-row" style="border-color:var(--amber-bord)">
            <span class="sr-queue-date">${fmtDateShort(h.data)}</span>
            <span class="sr-queue-title">${h.titulo||h.blocoId}</span>
            <span class="sr-queue-pct" style="color:${col}">${h.pct}%</span>
            <span class="sr-badge soon">em ${diff}d</span>
          </div>`;
        }).join('')}`:''}
    </div>`:'';

  // block list
  const blockList=[...sorted].reverse().map(h=>{
    const col=h.pct>=70?'var(--green)':h.pct>=50?'var(--acc)':'var(--red)';
    const avParts=[];
    if(h.avaliacoes&&h.avaliacoes.lac>0)avParts.push(`<span style="color:var(--red);font-size:11px" title="Lacunas conceituais">📖${h.avaliacoes.lac}</span>`);
    if(h.avaliacoes&&h.avaliacoes.dvd>0)avParts.push(`<span style="color:var(--amber);font-size:11px" title="Dúvidas">🤔${h.avaliacoes.dvd}</span>`);
    if(h.avaliacoes&&h.avaliacoes.dom>0)avParts.push(`<span style="color:var(--green);font-size:11px" title="Domínio">✓${h.avaliacoes.dom}</span>`);
    return `<div class="hist-row">
      <span class="hist-date">${fmtDateShort(h.data)}</span>
      <span class="hist-acertos">${h.acertos}/${h.totalQuestoes}</span>
      <span class="hist-pct" style="color:${col}">${h.pct}%</span>
      <span class="hist-tempo">${fmtTime(h.tempo)}</span>
      <span class="hist-saldo" style="color:${h.saldo>=0?'var(--green)':'var(--red)'}">${h.saldo>=0?'+':''}${h.saldo}</span>
      <span class="hist-av">${avParts.join('')||'—'}</span>
      <span>${srBadgeHtml(h.sr)}</span>
    </div>`;
  }).join('');

  // insight
  let insight='';
  if(weak&&weakPct!==null&&weakPct<65) insight=`<div style="font-size:13.5px;padding:11px 14px;background:var(--red-bg);border:1px solid var(--red-bord);border-radius:var(--r-sm);color:var(--red);margin-top:12px">⚠️ Ponto crítico: <strong>${weak[0]}</strong> com ${weakPct}% de aproveitamento acumulado — priorize revisão antes da prova.</div>`;
  else if(media>=70) insight=`<div style="font-size:13.5px;padding:11px 14px;background:var(--green-bg);border:1px solid var(--green-bord);border-radius:var(--r-sm);color:var(--green);margin-top:12px">✅ Média geral acima de 70% — bom ritmo. Mantenha a consistência e aprofunde os pontos de dúvida.</div>`;

  wrap.innerHTML=`
    <div class="placar-hero" style="margin-bottom:20px">
      <div class="placar-kicker">Δ Histórico de Estudo · PCDF 2026</div>
      <h2 style="display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:6px">${total} bloco${total>1?'s':''} concluído${total>1?'s':''}${streak>1?`<span class="streak-badge">🔥 ${streak} dias</span>`:''}</h2>
      <p class="placar-lead">${totQ} questões · média geral ${media}%${trendHtml}</p>
      <div class="placar-stats">
        <div class="p-stat"><div class="n g">${media}%</div><div class="l">Média Geral</div></div>
        <div class="p-stat"><div class="n t">${totQ}</div><div class="l">Questões</div></div>
        <div class="p-stat"><div class="n ${avgSaldo>=0?'a':'r'}">${avgSaldo>=0?'+':''}${avgSaldo}</div><div class="l">Saldo Médio</div></div>
        <div class="p-stat"><div class="n ${streak>=5?'g':'t'}">${streak}</div><div class="l">Dias Seguidos</div></div>
      </div>
    </div>

    <div class="pl-box">
      <div class="pl-title">Evolução — últimos ${last14.length} blocos</div>
      <div style="margin:10px 0 6px">${buildBarChart(last14)}</div>
      <div style="display:flex;gap:14px;font-size:12px;color:var(--txt3);flex-wrap:wrap">
        <span><span style="color:var(--green);font-weight:700">■</span> ≥70%</span>
        <span><span style="color:var(--acc);font-weight:700">■</span> 50–69%</span>
        <span><span style="color:var(--red);font-weight:700">■</span> &lt;50%</span>
        <span style="margin-left:auto">Linha tracejada = meta 70%</span>
      </div>
    </div>

    <div class="pl-box">
      <div class="pl-title">Desempenho por Disciplina (acumulado)</div>
      ${discRows}
      ${insight}
    </div>

    ${avTotal>0?`<div class="pl-box">
      <div class="pl-title">Diagnóstico Acumulado — ${avTotal} autoavaliações</div>
      <div class="diag-grid">
        ${Object.entries(AV_LABELS).map(([k,v])=>`<div class="diag-cell">
          <div class="dn" style="color:${k==='dom'?'var(--green)':k==='dvd'?'var(--amber)':k==='lac'?'var(--red)':'var(--txt2)'}">${avAgg[k]}</div>
          <div class="dl">${v.icon} ${v.txt}</div>
        </div>`).join('')}
      </div>
      ${avAgg.lac>0?`<div style="font-size:13.5px;color:var(--txt2);padding:10px 14px;background:var(--surf2);border-radius:var(--r-sm);border:1px solid var(--bord);margin-top:12px">
        📖 ${avAgg.lac} lacuna${avAgg.lac>1?'s conceituais':' conceitual'} acumulada${avAgg.lac>1?'s':''} — são os erros de maior risco na prova CEBRASPE. Revise lei seca dessas questões.
      </div>`:''}
    </div>`:''}

    ${dueBlocks.length+soonBlocks.length>0?`<div class="pl-box" style="border-color:var(--red-bord)">${srQueueHtml}</div>`:''}

    <div class="pl-box">
      <div class="pl-title">Blocos Concluídos (${total})</div>
      <div class="hist-header">
        <span>Data</span><span>Acertos</span><span>%</span><span>Tempo</span><span>Saldo</span><span>Diag.</span><span>Próx.</span>
      </div>
      ${blockList}
    </div>

    <div class="placar-actions">
      <button class="btn-ghost" onclick="goHome()">← Voltar à capa</button>
      <button class="btn-ghost" style="border-color:var(--red-bord);color:var(--red)" onclick="confirmClearHistory()">🗑 Limpar histórico</button>
    </div>`;
  window.scrollTo(0,0);
}

/* ── START / RESUME ──────────────────────────────────────── */
function startProva(){
  S.respostas={}; S.gabsShown={}; S.globalGabShown=false;
  S.totalMs=0; S.startedAt=null; S.finished=false;
  save(); renderProva();
}
function resumeFromSaved(){
  const d=loadSaved();
  if(!d){startProva();return;}
  S.respostas=d.respostas||{};
  S.gabsShown=d.gabsShown||{};
  S.globalGabShown=!!d.globalGabShown;
  S.avaliacoes=d.avaliacoes||{};
  S.totalMs=d.totalMs||0;
  S.finished=!!d.finished;
  if(S.finished) renderPlacar();
  else renderProva();
}
function confirmStart(){
  const el=document.getElementById('modal-root');
  el.innerHTML=`<div class="modal-ov" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <h3>Recomeçar do zero?</h3>
      <p>Todo o progresso atual será apagado, incluindo respostas e gabaritos vistos.</p>
      <div class="modal-acts">
        <button class="btn-ghost" onclick="closeModal()">Cancelar</button>
        <button class="btn-danger" onclick="closeModal();doReset()">Sim, reiniciar</button>
      </div>
    </div>
  </div>`;
}
function doReset(){
  clearSaved(); loadBloco(S.bloco); renderCover();
  showToast('Bloco reiniciado');
}

/* ── EXPORT / IMPORT ─────────────────────────────────────── */
function exportProgress(){
  const data={
    type:'progresso-v2', blocoId:S.bloco.meta.id,
    respostas:S.respostas, gabsShown:S.gabsShown,
    globalGabShown:S.globalGabShown,
    avaliacoes:S.avaliacoes,
    totalMs:S.totalMs+(S.startedAt?Date.now()-S.startedAt:0),
    finished:S.finished
  };
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`progresso_${S.bloco.meta.id}.json`;
  a.click();
  showToast('Progresso exportado');
}

const fi=document.getElementById('file-input');
let importMode='bloco';
function triggerImport(mode){importMode=mode;fi.value='';fi.click();}
fi.addEventListener('change',e=>{
  const f=e.target.files[0]; if(!f) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      // Auto-detect: se tem meta+disciplinas é bloco, senão é progresso
      const isBloco = !!(d.meta && d.disciplinas);
      const isProg  = d.type==='progresso-v2';
      if(isBloco){
        if(!d.meta.id||!d.disciplinas.length) throw new Error('JSON de bloco vazio ou sem questões');
        try{localStorage.removeItem(STORE_KEY());}catch(_){}
        loadBloco(d);
        try{localStorage.setItem(BLOCO_KEY,JSON.stringify(d));}catch(_){}
        renderCover();
        showToast('✅ Bloco carregado: '+(d.meta.titulo||d.meta.id));
      } else if(isProg){
        if(d.blocoId!==S.bloco.meta.id){
          showToast('⚠️ ID do bloco não corresponde — progresso pode ser incompatível');
        }
        S.respostas=d.respostas||{};
        S.gabsShown=d.gabsShown||{};
        S.globalGabShown=!!d.globalGabShown;
        S.avaliacoes=d.avaliacoes||{};
        S.totalMs=d.totalMs||0;
        S.finished=!!d.finished;
        save();
        if(S.finished) renderPlacar(); else renderProva();
        showToast('✅ Progresso importado');
      } else {
        throw new Error('Arquivo não reconhecido. Use um bloco_AAAA-MM-DD.json ou progresso exportado pelo app.');
      }
    }catch(err){showToast('❌ '+err.message);}
  };
  reader.readAsText(f,'utf-8');
});

/* ── MODAL / TOAST ───────────────────────────────────────── */
function closeModal(){ document.getElementById('modal-root').innerHTML=''; }
let toastTimer=null;
function showToast(msg,dur=2400){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  if(toastTimer) clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),dur);
}

/* ── UTILS ───────────────────────────────────────────────── */
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function copyFund(btn,text){
  navigator.clipboard.writeText(text.replace(/\\n/g,'\n')).then(()=>{
    btn.textContent='Copiado!';setTimeout(()=>btn.textContent='Copiar',1500);
  });
}

/* ── AUTOAVALIAÇÃO ───────────────────────────────────────── */
function setAvaliacao(n,val){
  if(val===null) delete S.avaliacoes[n];
  else S.avaliacoes[n]=val;
  save();
  // Usa o renderizador correto dependendo do contexto ativo
  const inRev = !document.getElementById('sec-revisao').classList.contains('hidden');
  if(inRev) rerenderRevQ(n); else rerenderQ(n);
}

/* ── ERROR GAB TOGGLES ───────────────────────────────────── */
function toggleErrGab(n){
  const gab=document.getElementById(`errgab-${n}`);
  const tog=document.getElementById(`errtog-${n}`);
  const arr=document.getElementById(`errarrow-${n}`);
  if(!gab) return;
  const open=gab.classList.contains('open');
  gab.classList.toggle('open',!open);
  if(tog) tog.classList.toggle('open',!open);
  if(arr) arr.textContent=open?'▼':'▲';
}
function toggleErrSec(n,key){
  const body=document.getElementById(`egb-${n}-${key}`);
  const chev=document.getElementById(`echev-${n}-${key}`);
  if(!body) return;
  const open=!body.classList.contains('hidden');
  body.classList.toggle('hidden',open);
  if(chev) chev.classList.toggle('open',!open);
}

/* ── KEYBOARD ─────────────────────────────────────────────── */
document.addEventListener('keydown',e=>{
  if(['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName)) return;

  // ── Espaço ou P: pausa/retoma (exceto na capa) ──
  if((e.key===' '||e.key==='p'||e.key==='P')&&!S.finished){
    const inProva=!document.getElementById('sec-prova').classList.contains('hidden');
    if(inProva||FOCO.active||S.paused){e.preventDefault();togglePause();return;}
  }

  // ── Se pausado, bloqueia todos os outros atalhos ──
  if(S.paused) return;

  // ── Modo Foco: atalhos específicos ──
  if(FOCO.active){
    if(e.key==='Escape'){exitFoco();return;}
    if(e.key==='ArrowRight'||e.key==='Enter'){e.preventDefault();focoNext();return;}
    if(e.key==='ArrowLeft'){e.preventDefault();focoPrev();return;}
    if((e.key==='c'||e.key==='C'||e.key==='e'||e.key==='E') && FOCO.currentN){
      if(S.finished) return;
      const choice=e.key.toUpperCase()==='C'?'CERTO':'ERRADO';
      markAns(FOCO.currentN,choice);
      const target=document.getElementById(`q-${FOCO.currentN}`);
      if(target){target.classList.remove('q-kb-flash');void target.offsetWidth;target.classList.add('q-kb-flash');setTimeout(()=>target.classList.remove('q-kb-flash'),600);}
      return;
    }
    return; // bloqueia outros atalhos em modo foco
  }

  if(S.finished) return;
  // C / E — responds the question nearest to viewport center
  if(e.key==='c'||e.key==='C'||e.key==='e'||e.key==='E'){
    const choice=e.key.toUpperCase()==='C'?'CERTO':'ERRADO';
    const blocks=[...document.querySelectorAll('.q-block')];
    const mid=window.innerHeight/2;
    let closest=null, minDist=Infinity;
    blocks.forEach(b=>{
      const rect=b.getBoundingClientRect();
      const dist=Math.abs(rect.top+rect.height/2-mid);
      if(dist<minDist){minDist=dist;closest=b;}
    });
    if(closest){
      const n=parseInt(closest.dataset.n);
      if(!isNaN(n)){
        markAns(n,choice);
        const target=document.getElementById(`q-${n}`);
        if(target){
          target.classList.remove('q-kb-flash');
          void target.offsetWidth;
          target.classList.add('q-kb-flash');
          setTimeout(()=>target.classList.remove('q-kb-flash'),600);
        }
      }
    }
  }
});

/* ── FAB SETUP ───────────────────────────────────────────── */
document.getElementById('fab').addEventListener('click',()=>{
  document.getElementById('quick-nav').classList.toggle('open');
});
document.addEventListener('click',e=>{
  const qn=document.getElementById('quick-nav');
  const fab=document.getElementById('fab');
  if(qn.classList.contains('open')&&!qn.contains(e.target)&&!fab.contains(e.target)){
    qn.classList.remove('open');
  }
});

/* ── TIMER PAUSE ON BLUR ─────────────────────────────────── */
window.addEventListener('blur',()=>{if(!S.finished&&!S.paused&&S.startedAt)stopTimer();});
window.addEventListener('focus',()=>{if(!S.finished&&!S.paused&&S.timerInterval===null&&document.getElementById('sec-prova')&&!document.getElementById('sec-prova').classList.contains('hidden'))startTimer();});

document.getElementById('btn-hist').onclick=showHistorico;
document.getElementById('btn-theme').onclick=cycleTheme;
document.getElementById('btn-gab-all').onclick=toggleAllGabaritos;
document.getElementById('btn-export').onclick=exportProgress;
document.getElementById('btn-import-bloco').onclick=()=>triggerImport('bloco');
document.getElementById('btn-import-prog').onclick=()=>triggerImport('prog');
document.getElementById('btn-reset').onclick=()=>{
  const el=document.getElementById('modal-root');
  el.innerHTML=`<div class="modal-ov" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <h3>Reiniciar bloco?</h3>
      <p>Todo o progresso será apagado permanentemente.</p>
      <div class="modal-acts">
        <button class="btn-ghost" onclick="closeModal()">Cancelar</button>
        <button class="btn-danger" onclick="closeModal();doReset()">Reiniciar</button>
      </div>
    </div>
  </div>`;
};
document.getElementById('tb-gab-all').onclick=toggleAllGabaritos;
document.getElementById('tb-finish').onclick=confirmFinish;

/* ── INIT ─────────────────────────────────────────────────── */
function init(){
  // Theme
  const savedTheme=localStorage.getItem(THEME_KEY)||'dark';
  applyTheme(savedTheme);
  // Bloco
  let bloco=DEFAULT_BLOCO;
  try{const s=localStorage.getItem(BLOCO_KEY);if(s){const p=JSON.parse(s);if(p.meta&&p.disciplinas&&(p.meta.id||'')>=(DEFAULT_BLOCO.meta.id||''))bloco=p;}}catch(e){}
  loadBloco(bloco);
  document.getElementById('hdr-date').textContent=fmtDateShort(bloco.meta.data)||bloco.meta.data||'';
  // Render
  loadSaved();
  renderCover();
}
init();
</script>
