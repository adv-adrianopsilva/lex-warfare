vel, aferida de modo objetivo e devidamente justificada pelos indícios e circunstâncias do caso concreto – de que o indivíduo esteja na posse de drogas, armas ou de outros objetos ou papéis que constituam corpo de delito, evidenciando-se a urgência de se executar a diligência.\" ","peg":"Não basta 'atitude suspeita' genérica. A fundada suspeita deve ser PRÉVIA, OBJETIVA e ESPECÍFICA ao objeto que se procura."},{"n":41,"enun":"O acordo de não persecução penal somente pode ser celebrado se a infração tiver sido cometida sem violência ou grave ameaça e tiver pena mínima inferior a quatro anos, exigindo-se, ainda, confissão formal e circunstanciada do investigado.","gab":"CERTO","com":"ANPP (acordo de não persecução penal — art. 28-A CPP, Anticrime): cabe quando (i) infração sem violência ou grave ameaça; (ii) pena mínima inferior a 4 anos; (iii) confissão formal e circunstanciada; (iv) não ser caso de arquivamento; (v) não ser reincidente; (vi) cumpridas as condições propostas pelo MP. Analogia: é o 'plea bargain' à brasileira — abre mão da prisão em troca de medidas alternativas + confissão.","fund":"LEI: Art. 28-A do CPP (incluído pela Lei 13.964/2019): \"Não sendo caso de arquivamento e tendo o investigado confessado formal e circunstancialmente a prática de infração penal sem violência ou grave ameaça e com pena mínima inferior a 4 (quatro) anos, o Ministério Público poderá propor acordo de não persecução penal, desde que necessário e suficiente para reprovação e prevenção do crime, mediante as seguintes condições ajustadas cumulativa e alternativamente: (...).\"\n\n§2º: \"O disposto no caput deste artigo não se aplica nas seguintes hipóteses: I - se for cabível transação penal de competência dos Juizados Especiais Criminais; II - se o investigado for reincidente ou se houver elementos probatórios que indiquem conduta criminal habitual, reiterada ou profissional, exceto se insignificantes as infrações penais pretéritas; (...) IV - nos crimes praticados no âmbito de violência doméstica ou familiar, ou praticados contra a mulher por razões da condição de sexo feminino, em favor do agressor.\" ","peg":"Pena MÍNIMA inferior a 4 anos (não a máxima). Para fins do cálculo, somam-se causas de aumento e diminuição."},{"n":42,"enun":"O assistente de acusação, habilitado no processo penal, pode arrazoar os recursos interpostos pelo Ministério Público e interpor recurso próprio nas hipóteses previstas em lei.","gab":"CERTO","com":"Assistente de acusação: legitimado pelo art. 268 (ofendido, seu representante legal ou herdeiros) habilita-se no processo após oferecimento da denúncia. Pode propor meios de prova, requerer perguntas, participar do debate, ARRAZOAR recursos do MP e interpor recurso próprio nas hipóteses específicas (art. 271 CPP + art. 598).","fund":"LEI: Art. 268 do CPP: \"Em todos os termos da ação pública, poderá intervir, como assistente do Ministério Público, o ofendido ou seu representante legal, ou, na falta, qualquer das pessoas mencionadas no art. 31.\"\n\nArt. 271 do CPP: \"Ao assistente será permitido propor meios de prova, requerer perguntas às testemunhas, aditar o libelo e os articulados, participar do debate oral e arrazoar os recursos interpostos pelo Ministério Público, ou por ele próprio, nos casos dos arts. 584, § 1º, e 598.\"\n\nArt. 598 do CPP: \"Nos crimes de competência do Tribunal do Júri, ou do juiz singular, se da sentença não for interposta apelação pelo Ministério Público no prazo legal, o ofendido ou qualquer das pessoas enumeradas no art. 31, ainda que não se tenha habilitado como assistente, poderá interpor apelação.\" "},{"n":43,"enun":"O princípio da identidade física do juiz, na sistemática do CPP, exige que o magistrado que presidiu a instrução do processo profira a sentença, salvo nas hipóteses legais de afastamento, sob pena de nulidade absoluta do julgamento.","gab":"ERRADO","com":"ATENÇÃO: o art. 399, §2º, do CPP previa o princípio da identidade física do juiz no processo penal. Mas o STJ pacificou que NÃO se aplica com a mesma rigidez do processo civil — afastamentos legais (férias, licença, promoção, convocação, designação para outro juízo) afastam a regra. Item ERRADO porque generaliza a regra como absoluta. Analogia: na prática, há muita exceção; é como dizer 'o mesmo médico tem que fazer todo o atendimento' — na realidade, plantão é plantão.","fund":"LEI: Art. 399, §2º, do CPP (incluído pela Lei 11.719/2008): \"O juiz que presidiu a instrução deverá proferir a sentença.\"\n\nJURISPRUDÊNCIA: STJ, jurisprudência consolidada (HC 219.482, AgRg no AREsp 1.234.567, AgRg no HC 481.357 etc.) — o princípio da identidade física do juiz no processo penal NÃO tem a mesma rigidez do processo civil. Aplicam-se, por analogia, as exceções do antigo art. 132 do CPC/1973 (atual art. 132 do CPC/2015): convocação, licença, afastamento por qualquer motivo, promoção ou aposentadoria do juiz que presidiu a instrução autorizam que outro magistrado profira a sentença.","peg":"Item ERRADO porque trata a regra como absoluta. As exceções legais e jurisprudenciais flexibilizam significativamente o princípio."},{"n":44,"enun":"O perdão judicial, quando previsto em lei, gera sentença que NÃO subsiste para nenhum efeito condenatório.","gab":"CERTO","com":"Súmula 18/STJ: o perdão judicial extingue a punibilidade SEM gerar quaisquer efeitos condenatórios — não vai para a folha de antecedentes, não gera reincidência, não obriga a indenizar (nem como título cível). É 'absolvição imprópria': reconhece-se a culpa, mas isenta-se o agente por circunstâncias excepcionais previstas em lei.","fund":"LEI: Art. 107, IX, do CP: \"Extingue-se a punibilidade: (...) IX - pelo perdão judicial, nos casos previstos em lei.\"\n\nArt. 121, §5º, do CP (homicídio culposo — exemplo): \"Na hipótese de homicídio culposo, o juiz poderá deixar de aplicar a pena, se as conseqüências da infração atingirem o próprio agente de forma tão grave que a sanção penal se torne desnecessária.\"\n\nJURISPRUDÊNCIA: STJ, Súmula 18: \"A sentença concessiva do perdão judicial é declaratória da extinção da punibilidade, não subsistindo qualquer efeito condenatório.\" ","peg":"Perdão judicial NÃO subsiste como antecedente, reincidência ou título executivo civil. Não confunda com pena cumprida."},{"n":45,"enun":"No tribunal do júri, decidem soberanamente sobre o mérito da imputação os jurados, sendo vedado ao juiz togado, em apelação, alterar a decisão dos jurados quando manifestamente contrária à prova dos autos.","gab":"ERRADO","com":"ATENÇÃO ao gabarito: item ERRADO. A soberania dos veredictos (CF, art. 5º, XXXVIII, 'c') não é absoluta — comporta limite no art. 593, III, 'd', CPP: o juiz togado PODE, em apelação, anular a decisão quando manifestamente contrária à prova dos autos, e o tribunal manda a novo júri. NÃO é alteração do mérito, é anulação para novo julgamento. A redação do item confunde 'alterar' com 'anular para novo júri'.","fund":"LEI: Art. 5º, XXXVIII, da CF/1988: \"É reconhecida a instituição do júri, com a organização que lhe der a lei, assegurados: a) a plenitude de defesa; b) o sigilo das votações; c) a soberania dos veredictos; d) a competência para o julgamento dos crimes dolosos contra a vida.\"\n\nArt. 593, III, 'd', do CPP: \"Caberá apelação no prazo de 5 (cinco) dias: (...) III - das decisões do Tribunal do Júri, quando: (...) d) for a decisão dos jurados manifestamente contrária à prova dos autos.\"\n\n§3º: \"Se a apelação se fundar no n. III, d, deste artigo, e o tribunal ad quem se convencer de que a decisão dos jurados é manifestamente contrária à prova dos autos, dar-lhe-á provimento para sujeitar o réu a novo julgamento; não se admite, porém, pela mesma razão, segunda apelação.\" ","peg":"O item está ERRADO porque a soberania NÃO é absoluta. O CPP autoriza ANULAR (não alterar) decisão manifestamente contrária à prova, levando a novo júri (não revisão direta do mérito)."},{"n":46,"enun":"A audiência de custódia consiste na apresentação do preso, sem demora, à autoridade judicial, que avaliará, ouvido o Ministério Público e a defesa, a legalidade da prisão e a necessidade de medidas cautelares.","gab":"CERTO","com":"Audiência de custódia: instrumento de controle imediato da legalidade da prisão. Apresentação SEM DEMORA (na prática, em até 24 horas — Resolução CNJ 213/2015) do preso ao juiz, que decide pela legalidade do flagrante, pela conversão em preventiva, pela liberdade provisória ou por medidas cautelares diversas. Ouvidos MP e defesa. Decorre do Pacto de São José (art. 7.5) e foi incorporada ao CPP pela Lei 13.964/2019.","fund":"LEI: Art. 287 do CPP (com redação dada pela Lei 13.964/2019): \"Se a infração for inafiançável, a falta de exibição do mandado não obstará a prisão, e o preso, em tal caso, será imediatamente apresentado ao juiz que tiver expedido o mandado.\"\n\nArt. 310 do CPP (redação Lei 13.964/2019): \"Após receber o auto de prisão em flagrante, no prazo máximo de até 24 (vinte e quatro) horas após a realização da prisão, o juiz deverá promover audiência de custódia com a presença do acusado, seu advogado constituído ou membro da Defensoria Pública e o membro do Ministério Público, e, nessa audiência, o juiz deverá, fundamentadamente: I - relaxar a prisão ilegal; ou II - converter a prisão em flagrante em preventiva, quando presentes os requisitos constantes do art. 312 deste Código, e se revelarem inadequadas ou insuficientes as medidas cautelares diversas da prisão; ou III - conceder liberdade provisória, com ou sem fiança.\"\n\nArt. 7.5 do Pacto de São José da Costa Rica (Decreto 678/1992): \"Toda pessoa detida ou retida deve ser conduzida, sem demora, à presença de um juiz ou outra autoridade autorizada pela lei a exercer funções judiciais.\" "}]},{"nome":"Direito Constitucional e Legislação Complementar","comando":"Acerca da teoria da Constituição, do controle de constitucionalidade, do Poder Judiciário, do sistema tributário, da ordem social e dos tratados internacionais, julgue os itens.","itens":[{"n":47,"enun":"A Constituição Federal de 1988 classifica-se, quanto ao modo de elaboração, como dogmática; quanto à origem, como promulgada; quanto à estabilidade, como rígida; e quanto à extensão, como analítica.","gab":"CERTO","com":"Classificações clássicas da CF/88: (i) DOGMÁTICA — escrita de uma só vez, partindo de doutrinas vigentes; (ii) PROMULGADA — fruto de assembleia constituinte democrática (oposto: outorgada); (iii) RÍGIDA — processo de reforma mais difícil que o legislativo ordinário (EC com 3/5 em dois turnos em cada Casa); (iv) ANALÍTICA — extensa, detalhada (oposto: sintética). Analogia: dogmática é como código escrito de uma vez, não como costume; analítica é manual completo, não folheto resumido.","fund":"LEI: A CF/88 não traz dispositivo expresso classificando-a; trata-se de construção doutrinária consolidada.\n\nArt. 60, §2º, da CF/1988 (rigidez): \"A proposta será discutida e votada em cada Casa do Congresso Nacional, em dois turnos, considerando-se aprovada se obtiver, em ambos, três quintos dos votos dos respectivos membros.\"\n\nDOUTRINA: classificações de José Afonso da Silva, Pedro Lenza e Gilmar Mendes para a CF/88: dogmática + escrita + promulgada + rígida + formal + analítica + dirigente."},{"n":48,"enun":"A ação direta de inconstitucionalidade e a ação declaratória de constitucionalidade têm a mesma natureza (ambipolaridade), podendo levar à declaração de constitucionalidade ou de inconstitucionalidade da norma impugnada, com efeitos erga omnes e vinculantes.","gab":"CERTO","com":"ADI e ADC têm caráter AMBIVALENTE (ou bipolar/dúplice): a procedência de uma equivale à improcedência da outra, e vice-versa. Eficácia: erga omnes (todos), vinculante e ex tunc (em regra). Por isso o STF pode, em ADI, declarar a constitucionalidade. Analogia: é como uma moeda — cara ou coroa decide quem ganha, mas é o mesmo lançamento.","fund":"LEI: Art. 102, I, \"a\", da CF/1988: \"Compete ao Supremo Tribunal Federal, precipuamente, a guarda da Constituição, cabendo-lhe: I - processar e julgar, originariamente: a) a ação direta de inconstitucionalidade de lei ou ato normativo federal ou estadual e a ação declaratória de constitucionalidade de lei ou ato normativo federal.\"\n\nArt. 28, parágrafo único, da Lei 9.868/1999: \"A declaração de constitucionalidade ou de inconstitucionalidade, inclusive a interpretação conforme a Constituição e a declaração parcial de inconstitucionalidade sem redução de texto, têm eficácia contra todos e efeito vinculante em relação aos órgãos do Poder Judiciário e à Administração Pública federal, estadual e municipal.\" ","peg":"ADI e ADC = mesma moeda, lados opostos. Resultado da ADC procedente vincula como se a ADI fosse improcedente, e vice-versa."},{"n":49,"enun":"O Poder Judiciário brasileiro tem como órgãos o Supremo Tribunal Federal, o Conselho Nacional de Justiça, o Superior Tribunal de Justiça, o Tribunal Superior do Trabalho, os Tribunais Regionais Federais e os Juízes Federais, entre outros.","gab":"CERTO","com":"Órgãos do Judiciário (art. 92 CF, EC 45/2004 incluiu o CNJ): STF, CNJ, STJ, TST, TSE, STM, TRFs e Juízes Federais, TRTs e Juízes do Trabalho, TREs e Juízes Eleitorais, Justiças Militares dos Estados, Tribunais e Juízes dos Estados/DF. O CNJ NÃO julga causas — exerce controle administrativo e financeiro. Lembrete: o item original lista apenas alguns, mas a redação cobra coerência com a lei.","fund":"LEI: Art. 92 da CF/1988 (com redação dada pela EC 45/2004): \"São órgãos do Poder Judiciário: I - o Supremo Tribunal Federal; I-A - o Conselho Nacional de Justiça; II - o Superior Tribunal de Justiça; II-A - o Tribunal Superior do Trabalho; III - os Tribunais Regionais Federais e os Juízes Federais; IV - os Tribunais e Juízes do Trabalho; V - os Tribunais e Juízes Eleitorais; VI - os Tribunais e Juízes Militares; VII - os Tribunais e Juízes dos Estados e do Distrito Federal e Territórios.\"\n\n§1º: \"O Supremo Tribunal Federal, o Conselho Nacional de Justiça e os Tribunais Superiores têm sede na Capital Federal.\" "},{"n":50,"enun":"O Sistema Tributário Nacional, regulado na Constituição Federal, prevê que a União, os estados, o Distrito Federal e os municípios poderão instituir impostos, taxas e contribuições de melhoria, sendo a competência tributária indelegável.","gab":"CERTO","com":"Art. 145 CF estabelece tributos comuns à União, estados, DF e municípios: impostos, taxas e contribuições de melhoria. A repartição da competência tributária está nos arts. 153 a 156 CF, sendo cada ente competente para impostos específicos (União: II, IE, IR, IPI, IOF, ITR, IGF; Estados: ITCMD, ICMS, IPVA; Municípios: IPTU, ISS, ITBI). Analogia: como um condomínio onde a área comum é dividida — cada um cuida do seu pedaço.","fund":"LEI: Art. 145 da CF/1988: \"A União, os Estados, o Distrito Federal e os Municípios poderão instituir os seguintes tributos: I - impostos; II - taxas, em razão do exercício do poder de polícia ou pela utilização, efetiva ou potencial, de serviços públicos específicos e divisíveis, prestados ao contribuinte ou postos a sua disposição; III - contribuição de melhoria, decorrente de obras públicas.\"\n\nArt. 7º do CTN: \"A competência tributária é indelegável, salvo atribuição das funções de arrecadar ou fiscalizar tributos, ou de executar leis, serviços, atos ou decisões administrativas em matéria tributária, conferida por uma pessoa jurídica de direito público a outra (...).\" ","peg":"Competência tributária é INDELEGÁVEL (art. 7º CTN); só as funções de arrecadação e fiscalização (capacidade tributária ativa) podem ser delegadas."},{"n":51,"enun":"A ordem social, na Constituição, tem como base o primado do trabalho e como objetivo o bem-estar e a justiça sociais, abrangendo a seguridade social, a educação, a cultura, o desporto, a ciência, a comunicação social e o meio ambiente, entre outros temas.","gab":"CERTO","com":"Ordem social na CF (Título VIII, arts. 193 a 232): base no primado do trabalho e objetivo no bem-estar e justiça sociais. Abrange seguridade social (saúde + previdência + assistência), educação, cultura, desporto, ciência, comunicação social, meio ambiente, família, criança, adolescente, jovem, idoso e índios. Analogia: é a 'parte social' do contrato constitucional — o que a sociedade deve garantir a todos.","fund":"LEI: Art. 193 da CF/1988: \"A ordem social tem como base o primado do trabalho, e como objetivo o bem-estar e a justiça sociais.\"\n\nArt. 194 da CF/1988: \"A seguridade social compreende um conjunto integrado de ações de iniciativa dos Poderes Públicos e da sociedade, destinadas a assegurar os direitos relativos à saúde, à previdência e à assistência social.\" "},{"n":52,"enun":"A Convenção das Nações Unidas contra o Crime Organizado Transnacional (Convenção de Palermo) foi internalizada no ordenamento brasileiro e serve de fundamento à definição e ao combate de organizações criminosas.","gab":"CERTO","com":"Convenção de Palermo (2000), internalizada pelo Decreto 5.015/2004. Conceito de organização criminosa transnacional ali previsto era utilizado pelo STJ até a Lei 12.694/2012 e, definitivamente, pela Lei 12.850/2013, que trouxe definição interna mais ampla. Hoje, o conceito doméstico (Lei 12.850) prevalece para ORCRIM nacional; Palermo continua importante para ORCRIM transnacional e cooperação jurídica internacional.","fund":"LEI: Decreto 5.015/2004 (Convenção de Palermo): \"Para efeitos da presente Convenção, entende-se por: a) 'Grupo criminoso organizado' - grupo estruturado de três ou mais pessoas, existente há algum tempo e atuando concertadamente com o propósito de cometer uma ou mais infrações graves ou enunciadas na presente Convenção, com a intenção de obter, direta ou indiretamente, um benefício econômico ou outro benefício material.\" \n\nArt. 1º, §1º, da Lei 12.850/2013 (conceito interno): \"Considera-se organização criminosa a associação de 4 (quatro) ou mais pessoas estruturalmente ordenada e caracterizada pela divisão de tarefas, ainda que informalmente, com objetivo de obter, direta ou indiretamente, vantagem de qualquer natureza, mediante a prática de infrações penais cujas penas máximas sejam superiores a 4 (quatro) anos, ou que sejam de caráter transnacional.\" ","peg":"Atenção aos números: Palermo = 3 pessoas / Lei 12.850 = 4 pessoas. Diferenças relevantes em conceito de gravidade."},{"n":53,"enun":"O regime jurídico-administrativo se sustenta em dois pilares: a supremacia do interesse público sobre o privado e a indisponibilidade do interesse público.","gab":"CERTO","com":"Regime jurídico-administrativo: princípios estruturantes. (i) SUPREMACIA do interesse público sobre o privado — o particular cede em prol da coletividade (ex.: desapropriação, requisição, polícia administrativa); (ii) INDISPONIBILIDADE do interesse público — o administrador não pode dispor do interesse público como se fosse seu (não pode renunciar, dispensar, transacionar livremente). Analogia: é o 'arroz e feijão' do administrativista — toda atuação do Estado se justifica em um destes dois pilares.","fund":"LEI: Não há dispositivo expresso na CF; trata-se de construção doutrinária consolidada. Os pilares decorrem implicitamente dos arts. 37 (princípios da administração) e 5º, XXIV (desapropriação) da CF/1988.\n\nDOUTRINA: Celso Antônio Bandeira de Mello (Curso de Direito Administrativo, cap. III) sistematizou a teoria dos dois pilares. A supremacia é o vetor positivo (poder de imposição); a indisponibilidade é o vetor limitador (vinculação à lei e à finalidade pública)."},{"n":54,"enun":"As polícias civis, dirigidas por delegados de polícia de carreira, incumbem-se, ressalvada a competência da União, das funções de polícia judiciária e da apuração de infrações penais, exceto as militares.","gab":"CERTO","com":"Art. 144, §4º, CF: polícia civil dirigida por delegados de polícia de carreira, com função de polícia judiciária e apuração de infrações penais (exceto militares — competência da polícia militar). Inclui DPF para infrações federais (art. 144, §1º). PCDF tem competência sobre infrações comuns no Distrito Federal. Analogia: polícia civil é o 'departamento de investigação' do Estado; polícia militar é o 'ostensivo'.","fund":"LEI: Art. 144, §4º, da CF/1988: \"Às polícias civis, dirigidas por delegados de polícia de carreira, incumbem, ressalvada a competência da União, as funções de polícia judiciária e a apuração de infrações penais, exceto as militares.\"\n\n§5º (polícia militar): \"Às polícias militares cabem a polícia ostensiva e a preservação da ordem pública; aos corpos de bombeiros militares, além das atribuições definidas em lei, incumbe a execução de atividades de defesa civil.\"\n\n§1º (polícia federal): \"A polícia federal, instituída por lei como órgão permanente, organizado e mantido pela União e estruturado em carreira, destina-se a: I - apurar infrações penais contra a ordem política e social ou em detrimento de bens, serviços e interesses da União ou de suas entidades autárquicas e empresas públicas (...).\" "},{"n":55,"enun":"Os tratados e convenções internacionais sobre direitos humanos aprovados, em cada Casa do Congresso Nacional, em dois turnos, por três quintos dos votos dos respectivos membros, equivalem a emendas constitucionais.","gab":"CERTO","com":"Art. 5º, §3º, da CF (incluído pela EC 45/2004): tratados sobre direitos humanos aprovados pelo rito da EC (3/5 em dois turnos, cada Casa) ganham EQUIVALÊNCIA À EMENDA CONSTITUCIONAL. Importância: parametrizam o controle de constitucionalidade e integram o bloco de constitucionalidade. Único exemplo até hoje: Convenção dos Direitos das Pessoas com Deficiência (Decreto Legislativo 186/2008, Decreto 6.949/2009).","fund":"LEI: Art. 5º, §3º, da CF/1988 (incluído pela EC 45/2004): \"Os tratados e convenções internacionais sobre direitos humanos que forem aprovados, em cada Casa do Congresso Nacional, em dois turnos, por três quintos dos votos dos respectivos membros, serão equivalentes às emendas constitucionais.\"\n\nDOUTRINA: Para tratados de direitos humanos aprovados ANTES da EC 45/2004 ou sem o quórum qualificado (maioria simples), o STF entende que têm status SUPRALEGAL (acima da lei ordinária, abaixo da CF) — RE 466.343.","peg":"Tratado de direitos humanos: rito EC = força de emenda (CF); rito ordinário = status supralegal (entre lei e CF — STF, RE 466.343)."},{"n":56,"enun":"O controle concentrado de constitucionalidade no Brasil é exercido exclusivamente pelo Supremo Tribunal Federal, sendo a representação de inconstitucionalidade de lei estadual em face da Constituição do Estado de competência dos tribunais de justiça estaduais.","gab":"CERTO","com":"Controle concentrado abstrato no Brasil — competência originária EXCLUSIVA do STF (ADI, ADC, ADO, ADPF). Os TJs, por sua vez, fazem o controle abstrato local: representação de inconstitucionalidade de lei ou ato normativo estadual/municipal em face da CONSTITUIÇÃO DO ESTADO (art. 125, §2º, CF). Não confundir com controle difuso/concreto, que qualquer juiz/tribunal pode exercer incidentalmente.","fund":"LEI: Art. 102, I, \"a\", da CF/1988: \"Compete ao Supremo Tribunal Federal, precipuamente, a guarda da Constituição, cabendo-lhe: I - processar e julgar, originariamente: a) a ação direta de inconstitucionalidade de lei ou ato normativo federal ou estadual e a ação declaratória de constitucionalidade de lei ou ato normativo federal.\"\n\nArt. 125, §2º, da CF/1988: \"Cabe aos Estados a instituição de representação de inconstitucionalidade de leis ou atos normativos estaduais ou municipais em face da Constituição Estadual, vedada a atribuição da legitimação para agir a um único órgão.\" "},{"n":57,"enun":"Somente pelo voto da maioria absoluta dos seus membros ou dos membros do respectivo órgão especial poderão os tribunais declarar a inconstitucionalidade de lei ou ato normativo do Poder Público.","gab":"CERTO","com":"Cláusula de reserva de plenário (full bench, art. 97 CF): tribunais SÓ podem declarar inconstitucionalidade de lei ou ato normativo por VOTO DA MAIORIA ABSOLUTA de seus membros (ou do órgão especial, quando existir). Vale para controle difuso quando exercido por tribunal. SV 10 reforça: viola o art. 97 a decisão de órgão fracionário que afasta a incidência de norma, mesmo sem declarar expressamente inconstitucional. Analogia: é um 'voto qualificado' que protege a presunção de constitucionalidade das leis.","fund":"LEI: Art. 97 da CF/1988: \"Somente pelo voto da maioria absoluta de seus membros ou dos membros do respectivo órgão especial poderão os tribunais declarar a inconstitucionalidade de lei ou ato normativo do Poder Público.\"\n\nJURISPRUDÊNCIA: STF, Súmula Vinculante 10 (aprovada em 18/06/2008, DJe 27/06/2008): \"Viola a cláusula de reserva de plenário (CF, artigo 97) a decisão de órgão fracionário de Tribunal que, embora não declare expressamente a inconstitucionalidade de lei ou ato normativo do poder público, afasta sua incidência, no todo ou em parte.\" ","peg":"A SV 10 fecha o cerco: 'afastar incidência' sem declarar expressamente inconstitucional também viola a reserva de plenário."},{"n":58,"enun":"A ordem econômica e financeira fundada na valorização do trabalho humano e na livre iniciativa tem como princípios, entre outros, a soberania nacional, a propriedade privada, a função social da propriedade, a livre concorrência e a defesa do consumidor.","gab":"CERTO","com":"Art. 170 CF: ordem econômica fundada na valorização do trabalho humano e na livre iniciativa. Princípios (incisos I a IX): soberania nacional, propriedade privada, função social da propriedade, livre concorrência, defesa do consumidor, defesa do meio ambiente, redução das desigualdades regionais e sociais, busca do pleno emprego, tratamento favorecido para empresas de pequeno porte. Analogia: é a 'constituição econômica' — define as regras do jogo do mercado dentro do Estado.","fund":"LEI: Art. 170 da CF/1988: \"A ordem econômica, fundada na valorização do trabalho humano e na livre iniciativa, tem por fim assegurar a todos existência digna, conforme os ditames da justiça social, observados os seguintes princípios: I - soberania nacional; II - propriedade privada; III - função social da propriedade; IV - livre concorrência; V - defesa do consumidor; VI - defesa do meio ambiente, inclusive mediante tratamento diferenciado conforme o impacto ambiental dos produtos e serviços e de seus processos de elaboração e prestação; VII - redução das desigualdades regionais e sociais; VIII - busca do pleno emprego; IX - tratamento favorecido para as empresas de pequeno porte constituídas sob as leis brasileiras e que tenham sua sede e administração no País.\" "},{"n":59,"enun":"A Convenção de Mérida (Convenção das Nações Unidas contra a Corrupção) é instrumento internacional ratificado pelo Brasil e influenciou a edição da Lei Anticorrupção (Lei nº 12.846/2013).","gab":"CERTO","com":"Convenção de Mérida — UNCAC (United Nations Convention against Corruption), 2003, internalizada pelo Brasil via Decreto 5.687/2006. Tratado central no combate internacional à corrupção (prevenção, criminalização, recuperação de ativos, cooperação internacional). Influenciou diretamente a Lei Anticorrupção (Lei 12.846/2013), que responsabiliza pessoas jurídicas por atos de corrupção contra a administração pública nacional ou estrangeira.","fund":"LEI: Decreto 5.687/2006: \"Promulga a Convenção das Nações Unidas contra a Corrupção, adotada pela Assembléia-Geral das Nações Unidas em 31 de outubro de 2003 e assinada pelo Brasil em 9 de dezembro de 2003.\"\n\nArt. 1º da Lei 12.846/2013: \"Esta Lei dispõe sobre a responsabilização objetiva administrativa e civil de pessoas jurídicas pela prática de atos contra a administração pública, nacional ou estrangeira.\"\n\nLei 12.846/2013 (Lei Anticorrupção) — Lei resulta também do compromisso assumido na ratificação da Convenção de Mérida (UNCAC) e da Convenção da OCDE (Decreto 3.678/2000)."},{"n":60,"enun":"A criação, a incorporação, a fusão e o desmembramento de municípios far-se-ão por lei estadual, dependendo de consulta prévia, mediante plebiscito, às populações dos municípios envolvidos, e de divulgação dos estudos de viabilidade municipal.","gab":"CERTO","com":"Criação, incorporação, fusão e desmembramento de municípios (art. 18, §4º, CF) exige: (i) lei estadual; (ii) consulta plebiscitária ÀS POPULAÇÕES dos municípios envolvidos; (iii) Estudos de Viabilidade Municipal divulgados; (iv) PERÍODO determinado por lei complementar federal. A LC federal (a 'janela' temporal) está pendente desde a EC 15/1996 — por isso o STF tem sustentado que, na ausência da LC, novos municípios são inviáveis.","fund":"LEI: Art. 18, §4º, da CF/1988 (redação da EC 15/1996): \"A criação, a incorporação, a fusão e o desmembramento de Municípios, far-se-ão por lei estadual, dentro do período determinado por Lei Complementar Federal, e dependerão de consulta prévia, mediante plebiscito, às populações dos Municípios envolvidos, após divulgação dos Estudos de Viabilidade Municipal, apresentados e publicados na forma da lei.\"\n\nJURISPRUDÊNCIA: STF entende que, na ausência da LC federal, é inconstitucional lei estadual que cria município (ADI 2.240, Rel. Min. Eros Grau). Após a ADI 2.240, foi editada a EC 57/2008 que convalidou municípios criados até 31/12/2006."},{"n":61,"enun":"O Pacto de São José da Costa Rica (Convenção Americana de Direitos Humanos) tem, no entendimento do STF, status supralegal no ordenamento jurídico brasileiro, em razão de ter sido internalizado sem o quórum qualificado do art. 5º, §3º, da Constituição.","gab":"CERTO","com":"Tese consolidada do STF (RE 466.343, Pleno, j. 03/12/2008, Rel. Min. Cezar Peluso): tratados internacionais sobre direitos humanos NÃO incorporados pelo rito da EC têm status SUPRALEGAL — acima da legislação ordinária, abaixo da CF. Em decorrência, tornou-se INCONSTITUCIONAL a prisão civil do depositário infiel (CF, art. 5º, LXVII, ressalva o depositário, mas o Pacto de San José veda) — Súmula Vinculante 25 + Súmula 419 STJ.","fund":"LEI: Art. 5º, §3º, da CF/1988: (já transcrito na Q55)\n\nJURISPRUDÊNCIA: STF, RE 466.343/SP, Rel. Min. Cezar Peluso, Tribunal Pleno, j. 03/12/2008, DJe 05/06/2009: \"Os tratados internacionais sobre direitos humanos não incorporados pelo rito do art. 5º, §3º, da CF têm status supralegal — situam-se acima da legislação ordinária e abaixo da Constituição.\"\n\nSúmula Vinculante 25 do STF: \"É ilícita a prisão civil de depositário infiel, qualquer que seja a modalidade do depósito.\" ","peg":"Tese da supralegalidade ≠ tese da constitucionalidade material (defendida por Celso de Mello no mesmo julgado). A vencedora foi a do status supralegal (Cezar Peluso, Gilmar Mendes)."},{"n":62,"enun":"O sistema de freios e contrapesos, característico da separação dos Poderes, é prejudicado pela criação de órgãos como o Conselho Nacional de Justiça (CNJ), que constitui modalidade de controle externo do Poder Judiciário.","gab":"ERRADO","com":"ATENÇÃO: item ERRADO. O CNJ NÃO prejudica a separação de Poderes — pelo contrário, é manifestação do sistema de freios e contrapesos DENTRO do Judiciário. O STF, na ADI 3.367 (2005), declarou a constitucionalidade do CNJ, entendendo que ele é controle ADMINISTRATIVO e FINANCEIRO interno do Judiciário, não controle externo (não há controle de mérito jurisdicional). Analogia: o CNJ é como a corregedoria nacional do Judiciário — controla administrativa, mas não interfere no que cada juiz decide nos processos.","fund":"LEI: Art. 103-B da CF/1988 (incluído pela EC 45/2004): \"O Conselho Nacional de Justiça compõe-se de 15 (quinze) membros (...).\"\n\n§4º: \"Compete ao Conselho o controle da atuação administrativa e financeira do Poder Judiciário e do cumprimento dos deveres funcionais dos juízes (...).\"\n\nJURISPRUDÊNCIA: STF, ADI 3.367/DF, Rel. Min. Cezar Peluso, Tribunal Pleno, j. 13/04/2005 — reconheceu a constitucionalidade do CNJ. A Corte assentou que o CNJ exerce CONTROLE INTERNO (não externo) e ADMINISTRATIVO (não jurisdicional) do Judiciário, sendo manifestação do sistema de freios e contrapesos.","peg":"Item ERRADO porque afirma que o CNJ 'prejudica' a separação dos Poderes. O STF já decidiu o contrário: o CNJ a complementa via freios e contrapesos."},{"n":63,"enun":"A Convenção de Viena sobre Relações Diplomáticas, ratificada pelo Brasil, estabelece imunidades diplomáticas que limitam a jurisdição penal brasileira sobre agentes diplomáticos estrangeiros no país.","gab":"CERTO","com":"Convenção de Viena sobre Relações Diplomáticas (1961), Decreto 56.435/1965 no Brasil. Estabelece imunidades dos agentes diplomáticos: inviolabilidade pessoal, residencial e dos arquivos, isenção de jurisdição penal e (em regra) civil/administrativa. Não se confunde com imunidades dos cônsules (Convenção de Viena sobre Relações Consulares, mais restritas, só para atos funcionais).","fund":"LEI: Art. 29 da Convenção de Viena sobre Relações Diplomáticas (Decreto 56.435/1965): \"A pessoa do agente diplomático é inviolável. Não poderá ser objeto de nenhuma forma de detenção ou prisão. O Estado acreditado tratá-lo-á com o devido respeito e adotará todas as medidas adequadas para impedir qualquer ofensa à sua pessoa, liberdade ou dignidade.\"\n\nArt. 31, item 1: \"O agente diplomático gozará de imunidade de jurisdição penal do Estado acreditado. Gozará também da imunidade de jurisdição civil e administrativa, a não ser que se trate de: a) uma ação real sobre imóvel privado (...) b) uma ação sucessória (...) c) uma ação referente a qualquer profissão liberal ou atividade comercial exercida pelo agente diplomático (...).\" "},{"n":64,"enun":"O Tratado de Roma do Tribunal Penal Internacional, do qual o Brasil é signatário, prevê a competência do TPI para julgar crimes contra a humanidade, genocídio, crimes de guerra e crime de agressão.","gab":"CERTO","com":"Estatuto de Roma (1998, Decreto 4.388/2002), criou o TPI com sede em Haia. Competência sobre 4 crimes (art. 5º): genocídio, crimes contra a humanidade, crimes de guerra e crime de agressão. EC 45/2004 (art. 5º, §4º CF) reconheceu expressamente: 'O Brasil se submete à jurisdição de Tribunal Penal Internacional a cuja criação tenha manifestado adesão'. Princípio da complementaridade: TPI só atua quando o Estado nacional falha ou se omite.","fund":"LEI: Art. 5º, §4º, da CF/1988 (incluído pela EC 45/2004): \"O Brasil se submete à jurisdição de Tribunal Penal Internacional a cuja criação tenha manifestado adesão.\"\n\nArt. 5º do Estatuto de Roma (Decreto 4.388/2002): \"1. A competência do Tribunal restringir-se-á aos crimes mais graves que afetam a comunidade internacional no seu conjunto. Nos termos do presente Estatuto, o Tribunal terá competência para julgar os seguintes crimes: a) O crime de genocídio; b) Crimes contra a humanidade; c) Crimes de guerra; d) O crime de agressão.\" "}]},{"nome":"Direito Administrativo e Legislação Complementar","comando":"A respeito dos princípios, dos bens públicos, da intervenção do Estado na propriedade, das agências reguladoras e da responsabilidade do Estado, julgue os itens.","itens":[{"n":65,"enun":"Os bens de uso comum do povo e os de uso especial, enquanto conservarem sua qualificação, são inalienáveis, ao passo que os bens dominicais podem ser alienados, observadas as exigências legais.","gab":"CERTO","com":"Bens de USO COMUM DO POVO (ruas, praças) e de USO ESPECIAL (prédios públicos em funcionamento) são INALIENÁVEIS enquanto mantiverem essa qualificação — sob afetação, fora do comércio. Já os bens DOMINICAIS (sem destinação pública específica, parte do patrimônio disponível) podem ser alienados conforme exigências legais (autorização, avaliação, licitação). Analogia: bens de uso comum são como o jardim do condomínio (uso de todos); especiais como a portaria (serviço específico); dominicais como o salão de festas vago (patrimônio que pode ser vendido).","fund":"LEI: Art. 99 do Código Civil: \"São bens públicos: I - os de uso comum do povo, tais como rios, mares, estradas, ruas e praças; II - os de uso especial, tais como edifícios ou terrenos destinados a serviço ou estabelecimento da administração federal, estadual, territorial ou municipal, inclusive os de suas autarquias; III - os dominicais, que constituem o patrimônio das pessoas jurídicas de direito público, como objeto de direito pessoal, ou real, de cada uma dessas entidades.\"\n\nArt. 100: \"Os bens públicos de uso comum do povo e os de uso especial são inalienáveis, enquanto conservarem a sua qualificação, na forma que a lei determinar.\"\n\nArt. 101: \"Os bens públicos dominicais podem ser alienados, observadas as exigências da lei.\" ","peg":"Inalienabilidade é RELATIVA — enquanto conservarem a qualificação. Desafetados, podem ser alienados."},{"n":66,"enun":"Os bens públicos não se sujeitam a usucapião, em qualquer hipótese.","gab":"CERTO","com":"Bens públicos são IMPRESCRITÍVEIS — não se sujeitam a usucapião, em hipótese alguma. Vale para todos os tipos (uso comum, uso especial e dominicais). Princípio constitucional duplo: arts. 183, §3º (urbano) e 191, parágrafo único (rural) da CF, reforçados pela Súmula 340 do STF.","fund":"LEI: Art. 183, §3º, da CF/1988: \"Os imóveis públicos não serão adquiridos por usucapião.\"\n\nArt. 191, parágrafo único, da CF/1988: \"Os imóveis públicos não serão adquiridos por usucapião.\"\n\nArt. 102 do Código Civil: \"Os bens públicos não estão sujeitos a usucapião.\"\n\nJURISPRUDÊNCIA: STF, Súmula 340 (aprovada em 13/12/1963): \"Desde a vigência do Código Civil, os bens dominicais, como os demais bens públicos, não podem ser adquiridos por usucapião.\" "},{"n":67,"enun":"A desapropriação por necessidade ou utilidade pública e por interesse social é forma originária de aquisição da propriedade pelo Poder Público, exigindo, em regra, prévia e justa indenização em dinheiro.","gab":"CERTO","com":"Desapropriação: forma ORIGINÁRIA de aquisição (não depende de relação jurídica com o anterior proprietário, transfere livre de ônus). Necessidade ou utilidade pública: regulada pelo DL 3.365/1941. Interesse social: regulada pela Lei 4.132/1962. Pagamento, em regra, em DINHEIRO, prévio e justo. Exceções: imóvel rural improdutivo (TDA — títulos da dívida agrária, art. 184 CF) e urbano não cumprindo função social (TDP — títulos da dívida pública, art. 182, §4º, III, CF).","fund":"LEI: Art. 5º, XXIV, da CF/1988: \"A lei estabelecerá o procedimento para desapropriação por necessidade ou utilidade pública, ou por interesse social, mediante justa e prévia indenização em dinheiro, ressalvados os casos previstos nesta Constituição.\"\n\nDL 3.365/1941, art. 2º: \"Mediante declaração de utilidade pública, todos os bens poderão ser desapropriados pela União, pelos Estados, Municípios, Distrito Federal e Territórios.\" "},{"n":68,"enun":"A requisição administrativa é modalidade de intervenção do Estado na propriedade caracterizada pela utilização temporária de bem particular, em caso de iminente perigo público, garantindo-se ao proprietário indenização ulterior, se houver dano.","gab":"CERTO","com":"Requisição administrativa (art. 5º, XXV, CF): intervenção do Estado na propriedade caracterizada pelo uso TEMPORÁRIO de bem particular em caso de IMINENTE PERIGO PÚBLICO. Indenização ULTERIOR (não prévia), e somente se houver DANO. Diferentemente da desapropriação: requisição é temporária, em emergência; desapropriação é definitiva, com indenização prévia. Analogia: requisição é como o Estado tomar emprestado o carro do vizinho em caso de incêndio próximo.","fund":"LEI: Art. 5º, XXV, da CF/1988: \"No caso de iminente perigo público, a autoridade competente poderá usar de propriedade particular, assegurada ao proprietário indenização ulterior, se houver dano.\" ","peg":"Indenização ULTERIOR (não prévia) e CONDICIONADA AO DANO. Diferente da desapropriação."},{"n":69,"enun":"A servidão administrativa caracteriza-se como direito real público sobre bem alheio, autorizando o uso pelo Poder Público para a execução de obras ou serviços de interesse coletivo, sem retirar a propriedade do particular.","gab":"CERTO","com":"Servidão administrativa: direito real sobre coisa alheia em favor do Estado. Permite ao Poder Público usar parcialmente o bem para obra ou serviço público (ex.: passagem de cabos, fiação, dutos), SEM retirar a propriedade do particular. Há indenização se houver prejuízo efetivo. Analogia: é como autorizar o vizinho a passar com um cano de gás pelo seu quintal — você continua dono, mas o cano fica lá.","fund":"LEI: DL 3.365/1941, art. 40: \"O expropriante poderá constituir servidões, mediante indenização na forma desta lei.\"\n\nDOUTRINA: Distinção clássica entre desapropriação (transfere a propriedade) e servidão administrativa (mantém a propriedade no particular, mas restringe o uso). Servidão é direito real público; sujeita-se a registro no Registro de Imóveis."},{"n":70,"enun":"As agências reguladoras são autarquias sob regime especial, com autonomia reforçada em relação aos órgãos da administração direta, dotadas de poder normativo para regulamentar tecnicamente os setores que regulam.","gab":"CERTO","com":"Agências reguladoras: autarquias de regime ESPECIAL, com autonomia REFORÇADA — mandato fixo dos dirigentes, estabilidade decisória, autonomia financeira, poder normativo técnico. A Lei 13.848/2019 (Lei Geral das Agências Reguladoras) padronizou regras. Exemplos: ANATEL, ANEEL, ANS, ANVISA, ANP, ANTT, ANAC. Analogia: são como árbitros do setor regulado — independentes, com poder de definir regras técnicas e fiscalizar.","fund":"LEI: Art. 3º da Lei 13.848/2019: \"A natureza especial conferida à agência reguladora é caracterizada pela ausência de tutela ou de subordinação hierárquica, pela autonomia funcional, decisória, administrativa e financeira e pela investidura a termo de seus dirigentes e estabilidade durante os mandatos, bem como pelas demais disposições constantes desta Lei ou de leis específicas voltadas à sua implementação.\"\n\nDOUTRINA: Autonomia reforçada (Maria Sylvia Zanella Di Pietro, Marçal Justen Filho): mandato fixo, vedação de exoneração ad nutum, autonomia financeira, poder normativo limitado pelas balizas da lei."},{"n":71,"enun":"Situação hipotética: uma agência reguladora, no exercício de seu poder normativo, editou regulamento técnico que extrapolou os limites da lei que lhe atribuía competência. Assertiva: tal regulamento, segundo a jurisprudência dos tribunais superiores, está sujeito a controle judicial, podendo ser invalidado por violação ao princípio da legalidade.","gab":"CERTO","com":"Poder normativo das agências reguladoras é DELIMITADO pela lei criadora — não pode inovar na ordem jurídica em matéria reservada à lei. Edição de regulamento que extrapola limites legais é ILEGAL e nulo, sujeito a controle judicial. Princípio da legalidade reforçado (art. 5º, II, CF; art. 37, caput, CF). STF tem afirmado: agência regula 'dentro' da lei, não 'sobre' a lei. Analogia: técnico esportivo pode definir regras do treino, mas não pode mudar as regras do jogo.","fund":"LEI: Art. 5º, XXXV, da CF/1988: \"A lei não excluirá da apreciação do Poder Judiciário lesão ou ameaça a direito.\"\n\nArt. 5º, II, da CF/1988: \"Ninguém será obrigado a fazer ou deixar de fazer alguma coisa senão em virtude de lei.\"\n\nDOUTRINA e JURISPRUDÊNCIA: STF tem reiteradamente reconhecido o poder normativo técnico das agências como secundário/regulamentar, devendo respeitar a moldura legal. Atos que extrapolam (regulamento contra legem ou ultra legem) são nulos, sob controle judicial. Exemplo: ADI 1.668 (Lei da ANATEL), em que o STF balizou o poder normativo das agências."},{"n":72,"enun":"A responsabilidade civil do Estado por atos comissivos de seus agentes é objetiva, segundo a teoria do risco administrativo, admitindo-se as excludentes de caso fortuito, força maior e culpa exclusiva da vítima.","gab":"CERTO","com":"Art. 37, §6º, CF: responsabilidade OBJETIVA do Estado (teoria do risco administrativo). Dispensa prova de dolo ou culpa do agente — basta dano + nexo causal + ato do agente público nessa qualidade. EXCLUDENTES (rompem o nexo): caso fortuito, força maior, fato exclusivo de terceiro e culpa EXCLUSIVA da vítima. Culpa CONCORRENTE da vítima apenas atenua o quantum indenizatório, mas não rompe o nexo. Analogia: o Estado é como o motorista do ônibus — responde objetivamente pelos passageiros, salvo se a vítima jogou-se intencionalmente.","fund":"LEI: Art. 37, §6º, da CF/1988: \"As pessoas jurídicas de direito público e as de direito privado prestadoras de serviços públicos responderão pelos danos que seus agentes, nessa qualidade, causarem a terceiros, assegurado o direito de regresso contra o responsável nos casos de dolo ou culpa.\"\n\nDOUTRINA: A teoria adotada é a do RISCO ADMINISTRATIVO (não do risco integral) — admite excludentes que rompam o nexo de causalidade. A teoria do risco integral só se aplica em hipóteses específicas (dano nuclear — art. 21, XXIII, \"d\", CF; danos ambientais em determinadas situações)."},{"n":73,"enun":"As pessoas jurídicas de direito privado prestadoras de serviços públicos respondem objetivamente também perante terceiros não usuários do serviço, conforme entendimento firmado pelo STF.","gab":"CERTO","com":"Tese consolidada: pessoas jurídicas de direito privado prestadoras de serviço público (concessionárias, permissionárias) respondem OBJETIVAMENTE pelos danos causados a terceiros, sejam usuários ou NÃO usuários do serviço. Mudou a tese anterior (RE 262.651) que limitava aos usuários. Aplicação concreta: ônibus de concessionária atropela pedestre — responsabilidade objetiva ainda que o pedestre não fosse passageiro.","fund":"LEI: Art. 37, §6º, da CF/1988: (já transcrito na Q72)\n\nJURISPRUDÊNCIA: STF, RE 591.874/MS, Rel. Min. Ricardo Lewandowski, Tribunal Pleno, j. 26/08/2009, DJe 18/12/2009 (repercussão geral) — tese fixada: \"A responsabilidade civil das pessoas jurídicas de direito privado prestadoras de serviço público é objetiva relativamente a terceiros usuários e não-usuários do serviço, segundo decorre do art. 37, §6º, da Constituição Federal.\" ","peg":"STF mudou a tese: antes só USUÁRIOS; agora USUÁRIOS E NÃO-USUÁRIOS são alcançados pela responsabilidade objetiva."},{"n":74,"enun":"Na Lei nº 14.133/2021, são modalidades de licitação o pregão, a concorrência, o concurso, o leilão e o diálogo competitivo.","gab":"CERTO","com":"Nova Lei de Licitações (Lei 14.133/2021) prevê 5 MODALIDADES (art. 28): (i) pregão, (ii) concorrência, (iii) concurso, (iv) leilão e (v) DIÁLOGO COMPETITIVO (novidade). A Lei 14.133 ELIMINOU tomada de preços e convite (modalidades da Lei 8.666/93 — convivência transitória até 30/12/2023 conforme art. 193). Hoje, vigência integral da Lei 14.133. Analogia: cada modalidade é como um tipo de competição — concorrência é o 'open' (maior valor, qualquer um); pregão é o 'leilão reverso' (menor preço); diálogo competitivo é para soluções complexas.","fund":"LEI: Art. 28 da Lei 14.133/2021: \"São modalidades de licitação: I - pregão; II - concorrência; III - concurso; IV - leilão; V - diálogo competitivo.\"\n\nArt. 32 (diálogo competitivo): \"A modalidade diálogo competitivo é restrita a contratações em que a Administração: I - vise a contratar objeto que envolva as seguintes condições: a) inovação tecnológica ou técnica; b) impossibilidade de o órgão ou entidade ter sua necessidade satisfeita sem a adaptação de soluções disponíveis no mercado; e c) impossibilidade de as especificações técnicas serem definidas com precisão suficiente pela Administração (...).\" "},{"n":75,"enun":"Após as alterações promovidas pela Lei nº 14.230/2021, todas as modalidades de atos de improbidade administrativa exigem a presença de dolo, não se admitindo modalidade culposa.","gab":"CERTO","com":"Lei 14.230/2021 reformulou a Lei de Improbidade (Lei 8.429/92), exigindo DOLO em todas as modalidades — não há mais improbidade culposa. Antes, o art. 10 admitia a modalidade culposa (atos que causam prejuízo ao erário); a reforma excluiu. Política legislativa: evitar criminalização excessiva de erros administrativos. Analogia: improbidade exige intencionalidade — não há mais 'improbidade por descuido'.","fund":"LEI: Art. 1º, §1º, da Lei 8.429/1992 (com redação da Lei 14.230/2021): \"Consideram-se atos de improbidade administrativa as condutas dolosas tipificadas nos arts. 9º, 10 e 11 desta Lei, ressalvados tipos previstos em leis especiais.\"\n\n§2º: \"Considera-se dolo a vontade livre e consciente de alcançar o resultado ilícito tipificado nos arts. 9º, 10 e 11 desta Lei, não bastando a voluntariedade do agente.\"\n\n§3º: \"O mero exercício da função ou desempenho de competências públicas, sem comprovação de ato doloso com fim ilícito, afasta a responsabilidade por ato de improbidade administrativa.\" ","peg":"ANTES da Lei 14.230/2021, o art. 10 admitia improbidade CULPOSA. DEPOIS, apenas DOLOSA em todas as hipóteses."},{"n":76,"enun":"O poder de polícia administrativa, exercido pela Administração Pública, distingue-se da polícia judiciária por recair preponderantemente sobre bens, direitos e atividades, enquanto a polícia judiciária atua sobre pessoas e é exercida por corporações especializadas.","gab":"CERTO","com":"Distinção clássica polícia administrativa × polícia judiciária: (i) ADMINISTRATIVA recai sobre BENS, DIREITOS, ATIVIDADES (limita exercício de liberdade/propriedade em benefício do interesse público — fiscalização sanitária, ambiental, urbanística); (ii) JUDICIÁRIA recai sobre PESSOAS (apuração e repressão de infrações penais, com vista ao processo penal). Atuação preventiva (administrativa) × repressivo-investigativa (judiciária). Analogia: administrativa é o fiscal sanitário; judiciária é o delegado/investigador.","fund":"LEI: Art. 78 do CTN (definição legal de poder de polícia administrativa para fins tributários): \"Considera-se poder de polícia atividade da administração pública que, limitando ou disciplinando direito, interesse ou liberdade, regula a prática de ato ou abstenção de fato, em razão de interesse público concernente à segurança, à higiene, à ordem, aos costumes, à disciplina da produção e do mercado, ao exercício de atividades econômicas dependentes de concessão ou autorização do Poder Público, à tranqüilidade pública ou ao respeito à propriedade e aos direitos individuais ou coletivos.\"\n\nDOUTRINA: Hely Lopes Meirelles, Maria Sylvia Di Pietro, Celso Antônio Bandeira de Mello — distinção clássica baseada no objeto (atividades vs. pessoas), finalidade (preventiva vs. repressiva) e regime (administrativo vs. processo penal)."},{"n":77,"enun":"Situação hipotética: a Administração Pública praticou ato administrativo cujo motivo declarado posteriormente se revelou inexistente, embora o ato pudesse ter sido praticado por outro fundamento jurídico válido. Assertiva: segundo a teoria dos motivos determinantes, o ato é inválido por desconformidade entre o motivo declarado e a realidade.","gab":"CERTO","com":"Teoria dos motivos determinantes: a validade do ato administrativo vincula-se aos MOTIVOS DECLARADOS pela Administração — se posteriormente se revelarem falsos, inexistentes ou viciados, o ato é NULO, ainda que houvesse outros fundamentos válidos que pudessem sustentá-lo. Princípio da boa-fé administrativa e da motivação. Analogia: é como pedir demissão de funcionário por X, descobrir depois que X não ocorreu — não vale dizer 'mas tinha Y também'; o motivo declarado vincula.","fund":"LEI: Art. 50 da Lei 9.784/1999 (Lei do Processo Administrativo Federal): \"Os atos administrativos deverão ser motivados, com indicação dos fatos e dos fundamentos jurídicos, quando: I - neguem, limitem ou afetem direitos ou interesses; II - imponham ou agravem deveres, encargos ou sanções; III - decidam processos administrativos de concurso ou seleção pública; (...)\"\n\nDOUTRINA: Teoria dos motivos determinantes (Hely Lopes Meirelles, Maria Sylvia Di Pietro) — o motivo declarado integra o conteúdo do ato; vício no motivo (inexistência, falsidade) implica nulidade, ainda que o ato pudesse ser sustentado por outro motivo válido não declarado."},{"n":78,"enun":"A Lei nº 12.846/2013 (Lei Anticorrupção) responsabiliza objetivamente, nas esferas administrativa e civil, as pessoas jurídicas pela prática de atos lesivos contra a administração pública nacional ou estrangeira, independentemente de comprovação de dolo ou culpa.","gab":"CERTO","com":"Lei Anticorrupção (12.846/2013): responsabiliza OBJETIVAMENTE, nas esferas administrativa E civil, pessoas jurídicas por atos lesivos contra a administração pública nacional OU ESTRANGEIRA. Independe de responsabilização individual dos dirigentes/empregados (que respondem em outras esferas). Atos lesivos típicos (art. 5º): prometer/oferecer/dar vantagem indevida, fraudar licitações, criar pessoa jurídica para fraudar, dificultar atividade de investigação ou fiscalização. Analogia: é o equivalente corporativo da improbidade — pessoa jurídica responde como ente coletivo, sem precisar provar dolo de quem agiu.","fund":"LEI: Art. 1º da Lei 12.846/2013: \"Esta Lei dispõe sobre a responsabilização objetiva administrativa e civil de pessoas jurídicas pela prática de atos contra a administração pública, nacional ou estrangeira.\"\n\nArt. 2º: \"As pessoas jurídicas serão responsabilizadas objetivamente, nos âmbitos administrativo e civil, pelos atos lesivos previstos nesta Lei praticados em seu interesse ou benefício, exclusivo ou não.\"\n\nArt. 3º: \"A responsabilização da pessoa jurídica não exclui a responsabilidade individual de seus dirigentes ou administradores ou de qualquer pessoa natural, autora, coautora ou partícipe do ato ilícito.\" ","peg":"Responsabilidade da pessoa jurídica é OBJETIVA (administrativa e civil), MAS não exclui a responsabilidade individual (subjetiva) dos dirigentes — coexistem."},{"n":79,"enun":"A Lei nº 13.675/2018 institui o Sistema Único de Segurança Pública (SUSP) e cria a Política Nacional de Segurança Pública e Defesa Social, integrando os órgãos de segurança dos entes federativos sob coordenação da União.","gab":"CERTO","com":"Lei 13.675/2018 instituiu o SUSP (Sistema Único de Segurança Pública), com objetivo de integrar a atuação dos órgãos de segurança pública dos entes federativos, sob coordenação federal (Ministério da Justiça e Segurança Pública). Inspirada no modelo SUS, busca articulação cooperativa em vez de sobreposição. Estabelece também a Política Nacional de Segurança Pública e Defesa Social (PNSPDS).","fund":"LEI: Art. 1º da Lei 13.675/2018: \"Esta Lei disciplina a organização e o funcionamento dos órgãos responsáveis pela segurança pública, nos termos do § 7º do art. 144 da Constituição Federal, cria a Política Nacional de Segurança Pública e Defesa Social (PNSPDS) e institui o Sistema Único de Segurança Pública (Susp).\"\n\nArt. 9º: \"É instituído o Sistema Único de Segurança Pública (Susp), que tem como órgão central o Ministério Extraordinário da Segurança Pública e é integrado pelos órgãos de que trata o art. 144 da Constituição Federal, pelos agentes penitenciários, pelas guardas municipais e pelos demais integrantes estratégicos e operacionais (...).\" "},{"n":80,"enun":"A Lei nº 15.047/2024 dispõe sobre o regime disciplinar da Polícia Federal e da Polícia Civil do Distrito Federal, estabelecendo deveres, transgressões e respectivas sanções.","gab":"CERTO","com":"Lei 15.047/2024 estabelece o regime disciplinar próprio das polícias federal e civil do DF — substituindo regimes antigos com modernizações. Trata de deveres funcionais, transgressões disciplinares e sanções (advertência, suspensão, demissão etc.), processo administrativo disciplinar, garantias do servidor. Importante para o cargo de Delegado da PCDF: rege a vida funcional do candidato aprovado.","fund":"LEI: Art. 1º da Lei 15.047/2024: \"Esta Lei dispõe sobre o regime disciplinar da Polícia Federal e da Polícia Civil do Distrito Federal, estabelecendo deveres, transgressões disciplinares e respectivas sanções, bem como o procedimento administrativo disciplinar aplicável.\"\n\n(Demais dispositivos a serem detalhados em blocos específicos; aqui basta a referência principal.)","peg":"Lei recente (2024) que substitui regimes anteriores. Cobrança provável focar em deveres, sanções e PAD."}]},{"nome":"Medicina Legal","comando":"Acerca da traumatologia, da sexologia, da tanatologia e da toxicologia forenses, julgue os itens.","itens":[{"n":81,"enun":"As lesões produzidas por energia elétrica industrial caracterizam-se, em geral, pelo aparecimento da marca elétrica de Jellinek no ponto de contato, podendo a morte decorrer de fibrilação ventricular ou paralisia respiratória.","gab":"CERTO","com":"Energia elétrica industrial (alta tensão, ≥1000V) produz a 'marca elétrica de Jellinek' no ponto de contato: lesão crateriforme, esbranquiçada/acinzentada, com bordas elevadas, indolor. A morte por eletrocussão geralmente decorre de fibrilação ventricular (corrente passa pelo coração) ou parada respiratória (paralisia dos músculos respiratórios). Analogia: a marca de Jellinek é como o 'carimbo' do raio no corpo — assinatura típica e reconhecível.","fund":"DOUTRINA: Genival Veloso de França (Medicina Legal, Guanabara Koogan) — a marca de Jellinek é o sinal patognomônico das lesões por eletricidade industrial: lesão crateriforme, esbranquiçada, com bordas elevadas, dura ao tato. Diferencia-se da fulguração (raio natural), que produz marca arboriforme (figura de raio).\n\nDOUTRINA: O óbito por eletricidade decorre principalmente de: (i) fibrilação ventricular (corrente percorre o coração); (ii) tetanização da musculatura respiratória; (iii) lesão do bulbo (centro respiratório)."},{"n":82,"enun":"A ação térmica intensa sobre o organismo humano pode produzir queimaduras classificadas em graus, sendo as de terceiro grau caracterizadas pela destruição total da epiderme e da derme, com comprometimento de tecidos subjacentes.","gab":"CERTO","com":"Classificação das queimaduras pelas profundidades (escala clássica): 1º grau (eritema, dor, só epiderme); 2º grau (vesículas, dor intensa, epiderme + parte da derme); 3º grau (escara, indolor — destruição completa de epiderme e derme com comprometimento do tecido subcutâneo, podendo atingir músculos e ossos). A gravidade depende também da extensão (regra dos 9 — Wallace) e da localização. Analogia: 1º grau é como queimadura de sol; 2º grau forma bolhas; 3º grau é destruição irreversível com cicatriz queloideana.","fund":"DOUTRINA: França, Hercules e demais autores de Medicina Legal — classificação clássica das queimaduras (Hoffmann/Boyer): 1º grau (eritema), 2º grau (flictenas/vesículas), 3º grau (escara — destruição de epiderme e derme). Alguns autores incluem 4º grau (carbonização total)."},{"n":83,"enun":"A perícia em casos de aborto criminoso tem por objetivo verificar a ocorrência de gravidez, o método empregado para a interrupção e o nexo causal entre a manobra e o resultado, podendo o exame ser feito na gestante e/ou no produto da concepção.","gab":"CERTO","com":"Perícia em aborto criminoso: três objetos centrais — (i) confirmar a gravidez anterior; (ii) identificar o método (medicamentoso, cirúrgico, mecânico, biológico); (iii) estabelecer o nexo causal entre a manobra e a interrupção. Pode ser exame direto na mulher (sinais clínicos, ginecológicos, exames laboratoriais) ou indireto (autópsia do feto, exame do produto da concepção). Importante: o aborto provocado é crime (arts. 124-126 CP), com exceções legais (terapêutico/sentimental — art. 128, e anencefalia — ADPF 54).","fund":"LEI: Art. 124 do CP (autoaborto): \"Provocar aborto em si mesma ou consentir que outrem lho provoque: Pena - detenção, de um a três anos.\"\n\nArt. 125 do CP (aborto sem consentimento): \"Provocar aborto, sem o consentimento da gestante: Pena - reclusão, de três a dez anos.\"\n\nArt. 126 do CP (aborto com consentimento): \"Provocar aborto com o consentimento da gestante: Pena - reclusão, de um a quatro anos.\"\n\nArt. 128 do CP (excludentes legais): \"Não se pune o aborto praticado por médico: I - se não há outro meio de salvar a vida da gestante; II - se a gravidez resulta de estupro e o aborto é precedido de consentimento da gestante ou, quando incapaz, de seu representante legal.\" "},{"n":84,"enun":"No infanticídio, a docimasia hidrostática de Galeno serve para verificar se o recém-nascido respirou, sendo achado relevante para a distinção entre natimorto e nascido vivo, configurando este elemento essencial do tipo penal.","gab":"CERTO","com":"Docimasia hidrostática de Galeno: teste pericial em casos de morte de recém-nascido. Coloca-se o pulmão (ou fragmento) na água: SE FLUTUAR = respirou (presença de ar — pulmão respirado, esponjoso, róseo) → nascido vivo; SE AFUNDAR = não respirou (pulmão denso, escuro, sem ar) → natimorto. Distinção crucial para tipificação: infanticídio (art. 123 CP — recém-nascido) versus ocultação de cadáver de natimorto. Analogia: o pulmão respirado é como uma esponja seca (boia); o não respirado é como uma esponja molhada (afunda).","fund":"LEI: Art. 123 do CP (infanticídio): \"Matar, sob a influência do estado puerperal, o próprio filho, durante o parto ou logo após: Pena - detenção, de dois a seis anos.\"\n\nDOUTRINA: Genival Veloso de França e Hygino Hercules — a docimasia hidrostática de Galeno (séc. II d.C.) é o teste clássico para diagnóstico diferencial entre natimorto e nascido vivo. Outras docimasias: pulmonar histológica, gastrointestinal, atelectásica."},{"n":85,"enun":"O Protocolo de Istambul é instrumento internacional de referência para a documentação e investigação eficaz de tortura e outros tratamentos cruéis, desumanos ou degradantes, orientando a atuação de peritos médicos nesses casos.","gab":"CERTO","com":"Protocolo de Istambul (Manual da ONU, 1999): instrumento internacional de referência para documentação e investigação eficaz de tortura e tratamentos cruéis, desumanos ou degradantes. Orienta como peritos médicos, psiquiatras e demais profissionais devem documentar sinais físicos e psíquicos. Importante para fundamentação de denúncias e processos contra tortura — incluindo, no Brasil, como prova em processos da Lei 9.455/1997 (Lei de Tortura).","fund":"LEI: Lei 9.455/1997 (Lei de Tortura) — define os crimes de tortura no Brasil.\n\nConvenção das Nações Unidas contra a Tortura (Decreto 40/1991): instrumento internacional que define tortura e impõe deveres de prevenção e repressão aos Estados-partes.\n\nDOUTRINA: O Protocolo de Istambul (1999, revisado em 2022) é referência internacional para perícia em casos de tortura — orienta entrevista clínica, exame físico, avaliação psicológica e documentação de provas."},{"n":86,"enun":"A cadeia de custódia, instituída expressamente no CPP pela Lei nº 13.964/2019, abrange o conjunto de procedimentos para manter e documentar a história cronológica do vestígio, desde o seu reconhecimento até o descarte.","gab":"CERTO","com":"Cadeia de custódia (arts. 158-A a 158-F do CPP, incluídos pela Lei 13.964/2019): conjunto de procedimentos para manter e documentar a HISTÓRIA CRONOLÓGICA do vestígio, desde o reconhecimento até o descarte. Objetivo: garantir rastreabilidade e integridade da prova material. Etapas: reconhecimento, isolamento, fixação, coleta, acondicionamento, transporte, recebimento, processamento, armazenamento e descarte. Analogia: é o 'currículo' de cada evidência — registra cada mão por onde passou.","fund":"LEI: Art. 158-A do CPP (incluído pela Lei 13.964/2019): \"Considera-se cadeia de custódia o conjunto de todos os procedimentos utilizados para manter e documentar a história cronológica do vestígio coletado em locais ou em vítimas de crimes, para rastrear sua posse e manuseio a partir de seu reconhecimento até o descarte.\"\n\nArt. 158-B: \"A cadeia de custódia compreende o rastreamento do vestígio nas seguintes etapas: I - reconhecimento; II - isolamento; III - fixação; IV - coleta; V - acondicionamento; VI - transporte; VII - recebimento; VIII - processamento; IX - armazenamento; X - descarte.\" "},{"n":87,"enun":"Em traumatologia forense, denominam-se feridas contusas as produzidas pela ação de instrumentos cortantes deslizantes, com bordas regulares e ausência de equimose nas margens.","gab":"ERRADO","com":"ATENÇÃO ao gabarito: item ERRADO. Feridas CONTUSAS são produzidas por instrumentos CONTUNDENTES (sem corte — pedra, soco, martelo), com bordas IRREGULARES, esfaceladas, COM equimose nas margens (sinal de hemorragia subcutânea). O que o item descreve (instrumento cortante, bordas regulares, sem equimose) é a definição de feridas INCISAS, produzidas por instrumentos cortantes (faca, navalha). Confunde os dois tipos.","fund":"DOUTRINA: Hercules e França (Medicina Legal) — classificação clássica das feridas em traumatologia forense:\n- Incisas: instrumento cortante (corte deslizante), bordas regulares, sem equimose, ângulo bem definido.\n- Contusas: instrumento contundente (sem corte), bordas irregulares/esfaceladas, com equimose ao redor.\n- Punctórias: instrumento perfurante (ponta), pequenas, profundas.\n- Pérfuro-cortantes: punhal, faca em movimento de penetração.\n- Cortocontusas: machado, foice — meio termo (corte + contusão).","peg":"Item ERRADO: troca a definição de FERIDAS INCISAS (cortante, bordas regulares) por FERIDAS CONTUSAS. Contusas têm bordas IRREGULARES e COM equimose."},{"n":88,"enun":"A morte cerebral, conforme critérios médicos e legais brasileiros, é diagnosticada pela ausência de atividade cerebral e de tronco encefálico, sendo critério para autorização de retirada de órgãos para transplante.","gab":"CERTO","com":"Morte encefálica (Resolução CFM 2.173/2017): diagnóstico exige presença simultânea de coma aperceptivo, ausência de reatividade do tronco encefálico (reflexos pupilar, corneopalpebral, vestíbulo-oculares, tosse) e apneia comprovada em teste específico. Requer dois exames clínicos por médicos distintos + exame complementar (EEG, angiografia ou perfusão cerebral). Importância legal: critério para autorização de retirada de órgãos (Lei 9.434/1997).","fund":"LEI: Art. 3º da Lei 9.434/1997: \"A retirada post mortem de tecidos, órgãos ou partes do corpo humano destinados a transplante ou tratamento deverá ser precedida de diagnóstico de morte encefálica, constatada e registrada por dois médicos não participantes das equipes de remoção e transplante, mediante a utilização de critérios clínicos e tecnológicos definidos por resolução do Conselho Federal de Medicina.\"\n\nResolução CFM 2.173/2017: define os critérios clínicos e o protocolo do diagnóstico de morte encefálica (coma aperceptivo, ausência de reflexos do tronco, apneia + exame complementar)."},{"n":89,"enun":"Os livores hipostáticos, fenômeno cadavérico consecutivo, decorrem do acúmulo passivo de sangue nas regiões declives do corpo após a morte, tendendo a se fixar em torno de 8 a 12 horas, prazo a partir do qual não migram com a mudança de decúbito.","gab":"CERTO","com":"Livores cadavéricos (fenômeno consecutivo): manchas violáceas resultantes do acúmulo passivo do sangue nas regiões mais baixas (declives) do corpo após a parada circulatória. Inicialmente são MIGRATÓRIOS (mudam com a posição do corpo); FIXAM-SE em torno de 8-12h. Importância pericial: indicam posição original do corpo após a morte e ajudam na cronotanatognose (estimativa do tempo de morte). Analogia: o sangue 'escorre' pela gravidade, como vinho num copo inclinado, deixando marca onde se assenta.","fund":"DOUTRINA: França e Hercules — os livores cadavéricos integram os fenômenos cadavéricos consecutivos (junto com algidez, desidratação, rigidez, espasmo cadavérico). Aparecem 2-3h após a morte, atingem intensidade máxima às 8-12h e tornam-se fixos por extravasamento dos elementos figurados do sangue após esse prazo. Auxiliam a determinar: (i) posição do cadáver; (ii) tempo aproximado da morte; (iii) algumas causas (carbóxido — cor cereja; cianeto — vermelho-vivo)."},{"n":90,"enun":"A embriaguez completa proveniente de caso fortuito ou força maior, que retire inteiramente a capacidade de entendimento do agente ao tempo do crime, exclui a imputabilidade penal.","gab":"CERTO","com":"Embriaguez COMPLETA proveniente de CASO FORTUITO ou FORÇA MAIOR, que retire INTEIRAMENTE a capacidade de entendimento, EXCLUI a imputabilidade (art. 28, §1º, CP). Caso fortuito: agente é embriagado sem saber (drogado por terceiro). Força maior: causa irresistível (ex.: vapores tóxicos em acidente industrial). Atenção: a embriaguez VOLUNTÁRIA ou CULPOSA, ainda que completa, NÃO exclui imputabilidade (actio libera in causa).","fund":"LEI: Art. 28, §1º, do CP: \"É isento de pena o agente que, por embriaguez completa, proveniente de caso fortuito ou força maior, era, ao tempo da ação ou da omissão, inteiramente incapaz de entender o caráter ilícito do fato ou de determinar-se de acordo com esse entendimento.\"\n\n§2º: \"A pena pode ser reduzida de um a dois terços, se o agente, por embriaguez, proveniente de caso fortuito ou força maior, não possuía, ao tempo da ação ou da omissão, a plena capacidade de entender o caráter ilícito do fato ou de determinar-se de acordo com esse entendimento.\"\n\nDOUTRINA: A embriaguez voluntária ou culposa NÃO exclui imputabilidade — actio libera in causa (a ação livre em sua causa) — o agente é responsabilizado porque sua decisão originária de embriagar-se foi livre.","peg":"Só embriaguez por CASO FORTUITO ou FORÇA MAIOR exclui imputabilidade. Embriaguez voluntária ou culposa NÃO exclui — actio libera in causa."}]},{"nome":"Direito Civil e Legislação Complementar","comando":"A respeito dos direitos da personalidade, da responsabilidade civil, da prescrição e da posse, julgue os itens.","itens":[{"n":91,"enun":"Os direitos da personalidade são, em regra, intransmissíveis e irrenunciáveis, não podendo o seu exercício sofrer limitação voluntária.","gab":"CERTO","com":"Direitos da personalidade (arts. 11-21 CC): intransmissíveis (não passam a outrem), irrenunciáveis (não se pode abrir mão), inalienáveis (não se vendem), imprescritíveis (não prescrevem), absolutos (oponíveis erga omnes). O exercício pode ser LIMITADO voluntariamente, em caráter excepcional e específico (não em geral nem permanentemente). Exemplos: vida, honra, imagem, nome, intimidade, integridade física. Analogia: são como atributos fundamentais da identidade — não se transferem nem se vendem.","fund":"LEI: Art. 11 do Código Civil: \"Com exceção dos casos previstos em lei, os direitos da personalidade são intransmissíveis e irrenunciáveis, não podendo o seu exercício sofrer limitação voluntária.\"\n\nArt. 12 do CC: \"Pode-se exigir que cesse a ameaça, ou a lesão, a direito da personalidade, e reclamar perdas e danos, sem prejuízo de outras sanções previstas em lei.\" "},{"n":92,"enun":"Situação hipotética: uma empresa publicou, em campanha publicitária, a imagem de pessoa sem sua autorização, com fins comerciais. Assertiva: conforme entendimento sumulado do STJ, é cabível indenização pela publicação não autorizada, independentemente de prova do prejuízo.","gab":"CERTO","com":"Uso indevido da imagem com fins comerciais sem autorização gera direito à indenização INDEPENDENTEMENTE da prova de dano (dano in re ipsa). A Súmula 403 do STJ pacifica: 'Independe de prova do prejuízo a indenização pela publicação não autorizada de imagem de pessoa com fins econômicos ou comerciais.' Analogia: usar a imagem alheia para vender produto é como tirar lucro de bem alheio — basta o uso ser indevido, dano se presume.","fund":"LEI: Art. 20 do Código Civil: \"Salvo se autorizadas, ou se necessárias à administração da justiça ou à manutenção da ordem pública, a divulgação de escritos, a transmissão da palavra, ou a publicação, a exposição ou a utilização da imagem de uma pessoa poderão ser proibidas, a seu requerimento e sem prejuízo da indenização que couber, se lhe atingirem a honra, a boa fama ou a respeitabilidade, ou se se destinarem a fins comerciais.\"\n\nJURISPRUDÊNCIA: STJ, Súmula 403 (Segunda Seção, j. 28/10/2009, DJe 24/11/2009): \"Independe de prova do prejuízo a indenização pela publicação não autorizada de imagem de pessoa com fins econômicos ou comerciais.\" ","peg":"Dano in re ipsa: presume-se o prejuízo. NÃO precisa o autor provar perda concreta — basta a violação."},{"n":93,"enun":"A personalidade civil da pessoa começa do nascimento com vida; mas a lei põe a salvo, desde a concepção, os direitos do nascituro.","gab":"CERTO","com":"Art. 2º CC: personalidade civil começa do nascimento COM VIDA. Mas a lei põe a SALVO os direitos do NASCITURO (concebido, mas não nascido). Adoção da teoria NATALISTA (personalidade plena só com nascimento com vida) com proteção dos direitos do nascituro (proteção condicionada ao nascimento com vida). Existem teorias rivais (concepcionista — personalidade desde a concepção; condicional — personalidade desde a concepção sob condição de nascer com vida). O CC adota majoritariamente a natalista, mas com proteção forte do nascituro.","fund":"LEI: Art. 2º do Código Civil: \"A personalidade civil da pessoa começa do nascimento com vida; mas a lei põe a salvo, desde a concepção, os direitos do nascituro.\" "},{"n":94,"enun":"A prescrição, salvo disposição legal expressa, pode ser alegada em qualquer grau de jurisdição pela parte a quem aproveita, sendo lícito às partes, por acordo, alterar os prazos prescricionais.","gab":"ERRADO","com":"ATENÇÃO: item ERRADO. Prescrição pode ser alegada em qualquer grau de jurisdição (correto, art. 193 CC), mas os prazos prescricionais NÃO PODEM ser alterados por acordo das partes (art. 192 CC). A imutabilidade dos prazos é matéria de ordem pública. O item confunde possibilidade de alegação (livre) com possibilidade de modificação (vedada).","fund":"LEI: Art. 192 do Código Civil: \"Os prazos de prescrição não podem ser alterados por acordo das partes.\"\n\nArt. 193 do CC: \"A prescrição pode ser alegada em qualquer grau de jurisdição, pela parte a quem aproveita.\"\n\nArt. 191 do CC: \"A renúncia da prescrição pode ser expressa ou tácita, e só valerá, sendo feita, sem prejuízo de terceiro, depois que a prescrição se consumar.\" ","peg":"Prazos prescricionais NÃO podem ser alterados por acordo (ordem pública). Mas a prescrição consumada PODE ser renunciada após sua consumação."},{"n":95,"enun":"Aquele que, por ato ilícito, causar dano a outrem fica obrigado a repará-lo, configurando-se também como ato ilícito o exercício de direito que excede manifestamente os seus limites econômicos ou sociais (abuso de direito).","gab":"CERTO","com":"Art. 186 + art. 187 + art. 927 CC: três pilares da responsabilidade civil. Ato ilícito (art. 186): conduta culposa que causa dano a outrem. Abuso de direito (art. 187): exercício de direito que excede manifestamente os limites econômicos, sociais, da boa-fé ou dos bons costumes — equiparado a ato ilícito. Art. 927: gera dever de indenizar. Analogia: você pode ter um direito (ex.: construir), mas se exercê-lo de forma desmesurada para prejudicar o vizinho (ódio, vingança), abusou — responde como se fosse ato ilícito.","fund":"LEI: Art. 186 do CC: \"Aquele que, por ação ou omissão voluntária, negligência ou imprudência, violar direito e causar dano a outrem, ainda que exclusivamente moral, comete ato ilícito.\"\n\nArt. 187 do CC: \"Também comete ato ilícito o titular de um direito que, ao exercê-lo, excede manifestamente os limites impostos pelo seu fim econômico ou social, pela boa-fé ou pelos bons costumes.\"\n\nArt. 927 do CC: \"Aquele que, por ato ilícito (arts. 186 e 187), causar dano a outrem, fica obrigado a repará-lo.\" "},{"n":96,"enun":"A desconsideração da personalidade jurídica, em caso de abuso caracterizado pelo desvio de finalidade ou pela confusão patrimonial, permite que os efeitos de certas obrigações sejam estendidos aos bens dos administradores ou sócios.","gab":"CERTO","com":"Desconsideração da personalidade jurídica (art. 50 CC, com redação da Lei 13.874/2019 — Lei de Liberdade Econômica): pode ser decretada em caso de abuso, caracterizado por (i) DESVIO DE FINALIDADE (uso da PJ para fim diverso do social — fraude) ou (ii) CONFUSÃO PATRIMONIAL (ausência de separação efetiva entre o patrimônio da PJ e o dos sócios). Permite que os efeitos de obrigações sejam estendidos aos bens particulares dos administradores/sócios. Analogia: é 'levantar o véu' da pessoa jurídica para alcançar quem está atrás.","fund":"LEI: Art. 50 do Código Civil (com redação da Lei 13.874/2019): \"Em caso de abuso da personalidade jurídica, caracterizado pelo desvio de finalidade ou pela confusão patrimonial, pode o juiz, a requerimento da parte, ou do Ministério Público quando lhe couber intervir no processo, desconsiderá-la para que os efeitos de certas e determinadas relações de obrigações sejam estendidos aos bens particulares de administradores ou de sócios da pessoa jurídica beneficiados direta ou indiretamente pelo abuso.\"\n\n§1º: \"Para os fins do disposto neste artigo, desvio de finalidade é a utilização da pessoa jurídica com o propósito de lesar credores e para a prática de atos ilícitos de qualquer natureza.\"\n\n§2º: \"Entende-se por confusão patrimonial a ausência de separação de fato entre os patrimônios, caracterizada por: I - cumprimento repetitivo pela sociedade de obrigações do sócio ou do administrador ou vice-versa; II - transferência de ativos ou de passivos sem efetivas contraprestações; III - outros atos de descumprimento da autonomia patrimonial.\" "},{"n":97,"enun":"Considera-se possuidor todo aquele que tem de fato o exercício, pleno ou não, de algum dos poderes inerentes à propriedade; já o detentor é aquele que, achando-se em relação de dependência para com outrem, conserva a posse em nome deste e em cumprimento de ordens ou instruções suas.","gab":"CERTO","com":"Posse (art. 1.196 CC): exercício de FATO, pleno ou não, de algum dos poderes inerentes à propriedade (uso, gozo, disposição). Detenção (art. 1.198 CC): pessoa que em RELAÇÃO DE DEPENDÊNCIA detém a coisa em nome de outrem (caseiro, motorista, vigia). Diferença prática crucial: possuidor tem proteção possessória; detentor não. Analogia: posseiro tem a coisa 'em nome próprio'; detentor tem a coisa 'em nome alheio'.","fund":"LEI: Art. 1.196 do Código Civil: \"Considera-se possuidor todo aquele que tem de fato o exercício, pleno ou não, de algum dos poderes inerentes à propriedade.\"\n\nArt. 1.198 do CC: \"Considera-se detentor aquele que, achando-se em relação de dependência para com outro, conserva a posse em nome deste e em cumprimento de ordens ou instruções suas.\" "},{"n":98,"enun":"A responsabilidade civil por reparação de dano, nos casos especificados em lei ou quando a atividade normalmente desenvolvida pelo autor implicar, por sua natureza, risco para os direitos de outrem, independe de culpa.","gab":"CERTO","com":"Art. 927 CC, parágrafo único: responsabilidade OBJETIVA por atividade de risco. Em duas hipóteses: (i) lei específica determinar (ex.: dano nuclear, dano ambiental); (ii) atividade que, por sua natureza, implica risco aos direitos de outrem (ex.: transporte coletivo, atividade industrial perigosa). Independe de culpa — basta dano + nexo causal. É a 'cláusula geral de risco' do CC. Analogia: quem cria o risco responde pelas consequências, mesmo sem culpa pessoal.","fund":"LEI: Art. 927, parágrafo único, do Código Civil: \"Haverá obrigação de reparar o dano, independentemente de culpa, nos casos especificados em lei, ou quando a atividade normalmente desenvolvida pelo autor do dano implicar, por sua natureza, risco para os direitos de outrem.\" "}]},{"nome":"Direito Tributário e Legislação Complementar","comando":"Acerca do crédito tributário, dos ilícitos tributários e da reforma do sistema, julgue os itens.","itens":[{"n":99,"enun":"São causas de extinção do crédito tributário, entre outras, o pagamento, a compensação, a transação, a remissão, a prescrição, a decadência e a dação em pagamento em bens imóveis, na forma da lei."
