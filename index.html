<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PCDF · Delegado 2026</title>
<!-- PWA -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0a0b14">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PCDF">
<link rel="apple-touch-icon" href="/icons/icon-180.png">
<link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png">
<link rel="apple-touch-icon" sizes="167x167" href="/icons/icon-167.png">
<link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180.png">
<link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png">
<style>
/* ── TOKENS ──────────────────────────────────────────────── */
:root{
  --bg:#0a0b0e; --surf:#12141a; --surf2:#181b24; --surf3:#1e2230;
  --bord:#252a3a; --bord2:#2e3448;
  --txt:#e4e8f4; --txt2:#7a8399; --txt3:#3d4562;
  --acc:#e8a020; --acc-dim:rgba(232,160,32,.13); --acc-glow:rgba(232,160,32,.28); --acc-bord:rgba(232,160,32,.32); --acc-bg:#1c1206;
  --green:#28c76f; --green-bg:rgba(40,199,111,.1); --green-bord:rgba(40,199,111,.3);
  --red:#f05252; --red-bg:rgba(240,82,82,.1); --red-bord:rgba(240,82,82,.3);
  --amber:#f59e0b; --amber-bg:rgba(245,158,11,.1); --amber-bord:rgba(245,158,11,.3);
  --mono:"SF Mono","Fira Code",monospace;
  --r:12px; --r-sm:8px; --r-xs:5px;
  --trans:140ms cubic-bezier(.4,0,.2,1);
  --shadow:0 2px 14px rgba(0,0,0,.5); --shadow-lg:0 4px 28px rgba(0,0,0,.65);
}
[data-theme=light]{
  --bg:#f1f3f8; --surf:#fff; --surf2:#f5f7fc; --surf3:#eef0f8;
  --bord:#dde2ef; --bord2:#cdd3e6;
  --txt:#0e1121; --txt2:#5a6380; --txt3:#9ea8c0;
  --acc:#c47c0a; --acc-dim:rgba(196,124,10,.08); --acc-glow:rgba(196,124,10,.2); --acc-bord:rgba(196,124,10,.28); --acc-bg:#fdf6e8;
  --green:#16a34a; --green-bg:rgba(22,163,74,.08); --green-bord:rgba(22,163,74,.28);
  --red:#dc2626; --red-bg:rgba(220,38,38,.08); --red-bord:rgba(220,38,38,.28);
  --amber:#d97706; --amber-bg:rgba(217,119,6,.08); --amber-bord:rgba(217,119,6,.28);
  --shadow:0 2px 8px rgba(0,0,0,.1); --shadow-lg:0 4px 16px rgba(0,0,0,.15);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;font-size:15px;line-height:1.6;transition:background var(--trans),color var(--trans)}
button{font-family:inherit;cursor:pointer}

/* ── HEADER ──────────────────────────────────────────────── */
.hdr{position:sticky;top:0;z-index:100;background:var(--surf);border-bottom:1px solid var(--bord);box-shadow:var(--shadow)}
.hdr-inner{max-width:860px;margin:0 auto;display:flex;align-items:center;gap:10px;height:62px;padding:0 18px}
.hdr-brand{display:flex;align-items:center;gap:11px;flex:1;min-width:0}
.delta-badge{width:42px;height:42px;border-radius:10px;background:var(--acc);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:#0a0b0e;flex-shrink:0;letter-spacing:-.02em;box-shadow:0 2px 10px var(--acc-glow)}
.hdr-name{font-weight:800;font-size:16.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.01em}
.hdr-date{font-size:12px;color:var(--txt2);margin-top:1px}
.hdr-chips{display:flex;gap:5px;align-items:center;flex-shrink:0}
.chip{border-radius:6px;padding:2px 9px;font-size:12px;font-weight:700}
.chip.g{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bord)}
.chip.r{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bord)}
.chip.n{background:var(--surf2);color:var(--txt2);border:1px solid var(--bord)}
.chip.t{background:var(--acc-dim);color:var(--acc);border:1px solid var(--acc-bord)}
.hdr-timer-wrap{display:flex;align-items:center;gap:6px;flex-shrink:0;background:var(--surf2);border:1px solid var(--bord);border-radius:8px;padding:5px 10px}
.hdr-timer-wrap.hidden{display:none!important}
.hdr-timer-wrap svg.clock-ic{width:17px;height:17px;color:var(--acc);flex-shrink:0}
.hdr-timer-txt{font-size:15px;font-weight:700;color:var(--txt);font-variant-numeric:tabular-nums;min-width:38px}
#btn-pause{background:transparent;border:none;cursor:pointer;padding:0 2px;font-size:14px;color:var(--txt2);line-height:1;transition:color var(--trans)}
#btn-pause:hover{color:var(--acc)}
#btn-pause.paused{color:var(--acc)}
/* Overlay de pausa */
#pause-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.72);backdrop-filter:blur(6px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px}
#pause-overlay.hidden{display:none!important}
.pause-card{background:var(--surf1);border:1px solid var(--bord);border-radius:16px;padding:40px 56px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:14px}
.pause-icon{font-size:48px;line-height:1}
.pause-title{font-size:22px;font-weight:700;color:var(--txt)}
.pause-sub{font-size:14px;color:var(--txt2)}
.pause-resume{background:var(--acc);color:#000;border:none;border-radius:10px;padding:13px 36px;font-size:16px;font-weight:700;cursor:pointer;transition:opacity var(--trans)}
.pause-resume:hover{opacity:.85}
.hdr-actions{display:flex;gap:3px;flex-shrink:0}
.icon-btn{background:var(--surf2);border:1px solid var(--bord);color:var(--txt2);border-radius:7px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all var(--trans)}
.icon-btn:hover{background:var(--acc-dim);border-color:var(--acc-bord);color:var(--acc)}
.prog-rail{height:2px;background:var(--surf3)}
.prog-fill{height:2px;background:var(--acc);transition:width .4s}

/* ── COVER ───────────────────────────────────────────────── */
.cover{max-width:580px;margin:0 auto;padding:48px 18px 80px;text-align:center;animation:fadeIn .4s ease}
.cover-kicker{font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--acc);font-weight:700;margin-bottom:16px}
.cover h1{font-size:clamp(32px,5vw,48px);font-weight:800;font-style:italic;margin-bottom:14px;line-height:1.1}
.cover-lead{font-size:16px;color:var(--txt2);margin-bottom:32px;line-height:1.5}
.cover-card{background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);padding:24px;text-align:left;box-shadow:var(--shadow)}
.meta-grid{display:grid;grid-template-columns:auto 1fr;gap:7px 18px;font-size:13.5px;margin-bottom:18px}
.meta-grid dt{color:var(--txt3);font-size:11px;letter-spacing:.08em;text-transform:uppercase;align-self:center}
.meta-grid dd{color:var(--txt);margin:0;font-weight:500}
.cover-note{font-size:13.5px;color:var(--txt2);font-style:italic;padding:12px 14px;background:var(--surf2);border-left:3px solid var(--acc-bord);border-radius:0 var(--r-xs) var(--r-xs) 0;margin-bottom:22px;line-height:1.5}
.cover-actions{display:flex;flex-direction:column;gap:10px}
.cover-countdown{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:18px;flex-wrap:wrap}
.ccd-box{text-align:center;background:var(--surf2);border:1px solid var(--bord2);border-radius:var(--r-sm);padding:10px 16px;min-width:62px}
.ccd-num{font-size:28px;font-weight:900;font-style:italic;line-height:1;color:var(--acc)}
.ccd-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--txt3);margin-top:2px}
.ccd-sep{font-size:22px;font-weight:900;color:var(--bord2);margin-bottom:12px}
.sr-due-nudge{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--red-bg);border:1px solid var(--red-bord);border-radius:var(--r-sm);font-size:13px;color:var(--red);margin-bottom:14px;cursor:pointer;transition:background .15s}
.sr-due-nudge:hover{background:rgba(240,82,82,.18)}
.btn-primary{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 28px;background:var(--acc);color:#0a0b0e;border:none;border-radius:var(--r-sm);font-weight:800;font-size:15px;letter-spacing:.02em;transition:all var(--trans);box-shadow:0 4px 16px var(--acc-glow)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px var(--acc-glow)}
.btn-ghost{background:var(--surf2);border:1px solid var(--bord);color:var(--txt2);padding:10px 20px;border-radius:var(--r-sm);font-size:14px;transition:all var(--trans)}
.btn-ghost:hover{border-color:var(--bord2);color:var(--txt)}

/* ── PROVA TOOLBAR ───────────────────────────────────────── */
.tb{position:sticky;top:54px;z-index:90;background:var(--surf);border-bottom:1px solid var(--bord);backdrop-filter:blur(8px)}
.tb-inner{max-width:860px;margin:0 auto;display:flex;align-items:center;gap:8px;padding:8px 18px;flex-wrap:wrap}
.tb-info{font-size:13px;color:var(--txt2);font-variant-numeric:tabular-nums}
.tb-info b{color:var(--txt)}
.tb-spacer{flex:1}
.tb-btn{background:var(--surf2);border:1px solid var(--bord);border-radius:var(--r-sm);padding:6px 13px;font-size:12.5px;color:var(--txt);transition:all var(--trans);display:inline-flex;align-items:center;gap:6px}
.tb-btn:hover{border-color:var(--bord2);background:var(--surf3)}
.tb-btn.danger{border-color:var(--acc-bord);color:var(--acc);background:var(--acc-dim)}
.tb-btn.danger:hover{background:var(--acc-bg)}
.tb-btn svg{width:12px;height:12px}

/* ── PROVA CONTENT ───────────────────────────────────────── */
#prova-wrap{max-width:860px;margin:0 auto;padding:24px 18px 100px}

/* Discipline header */
.disc-section{margin-bottom:48px}
.disc-hdr{text-align:left;margin:40px 0 16px;background:var(--surf);border-top:3px solid var(--acc);border-bottom:1px solid var(--bord);padding:13px 0 11px;position:relative}
.disc-hdr h3{font-weight:800;font-size:20px;letter-spacing:-.01em;text-transform:none;color:var(--txt);display:flex;align-items:center;gap:10px}

.comando{background:var(--surf2);border:1px solid var(--bord);border-radius:var(--r-sm);padding:12px 16px;font-size:14px;color:var(--txt2);margin-bottom:16px;font-style:italic;line-height:1.5}

/* Question block */
.q-block{border-top:1px solid var(--bord);padding:16px 0;scroll-margin-top:100px}
.q-block:first-of-type{border-top:none;padding-top:4px}
.q-line{display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:start}
.q-tag{display:inline-flex;align-items:center;gap:6px;font-weight:800;font-size:13px;color:var(--acc);flex-shrink:0;padding-top:2px;white-space:nowrap}
.q-tag::before{content:'';width:8px;height:12px;background:var(--acc);clip-path:polygon(0 0,80% 0,100% 50%,80% 100%,0 100%);display:inline-block}
.q-text{font-size:15.5px;line-height:1.65;color:var(--txt)}
.q-text .situacao{display:block;font-style:italic;color:var(--txt2);margin-bottom:8px;padding-left:12px;border-left:2px solid var(--bord2)}
.q-marks{display:flex;gap:6px;flex-shrink:0;padding-top:1px}
.q-mark{width:40px;height:40px;border:1.5px solid var(--bord);border-radius:var(--r-sm);background:var(--surf2);font-weight:800;font-size:14px;color:var(--txt2);display:inline-flex;align-items:center;justify-content:center;transition:all var(--trans)}
.q-mark:hover:not(:disabled){border-color:var(--txt2);color:var(--txt);transform:translateY(-1px)}
.q-mark.sel-c{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.q-mark.sel-e{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.q-mark:disabled{opacity:.5;cursor:default}
/* After gabarito shown, ring correct/wrong */
.q-block.gab-on .q-mark.sel-c.is-right,.q-block.gab-on .q-mark.sel-e.is-right{box-shadow:0 0 0 2px var(--green-bg),0 0 0 3px var(--green)}
.q-block.gab-on .q-mark.sel-c.is-wrong,.q-block.gab-on .q-mark.sel-e.is-wrong{box-shadow:0 0 0 2px var(--red-bg),0 0 0 3px var(--red)}

.q-actions-row{margin-top:10px;padding-left:92px;display:flex;align-items:center;gap:10px}
.q-show-gab{background:transparent;border:1px dashed var(--bord2);border-radius:var(--r-xs);padding:3px 11px;font-size:12px;color:var(--txt3);transition:all var(--trans)}
.q-show-gab:hover{border-style:solid;border-color:var(--acc-bord);color:var(--acc)}
.q-status{font-size:11.5px;color:var(--txt3)}
.q-status .ok{color:var(--green);font-weight:600}
.q-status .er{color:var(--red);font-weight:600}

/* Feedback */
.q-feedback{margin-top:14px;border-radius:var(--r-sm);overflow:hidden;border:1px solid var(--bord);animation:fadeUp .2s ease}
.gab-line{display:flex;align-items:center;gap:8px;padding:9px 14px;background:var(--surf2);border-bottom:1px solid var(--bord);font-size:13px;font-weight:700}
.gab-label{color:var(--txt3);font-size:10px;letter-spacing:.1em;text-transform:uppercase;font-weight:600}
.gab-value{color:var(--txt)}
.gab-badge{margin-left:auto;font-size:11.5px;padding:2px 10px;border-radius:99px;font-weight:700}
.gab-badge.ok{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bord)}
.gab-badge.er{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bord)}
.gab-badge.bk{background:var(--surf3);color:var(--txt3);border:1px solid var(--bord)}

.gab-section{border-top:1px solid var(--bord);background:var(--surf)}
.gab-hdr{display:flex;align-items:center;gap:8px;padding:9px 14px;cursor:pointer;font-size:13px;font-weight:600;background:var(--surf2);border:none;width:100%;text-align:left;color:var(--txt);transition:background var(--trans)}
.gab-hdr:hover{background:var(--surf3)}
.gab-icon{flex-shrink:0}
.gab-lbl{flex:1}
.gab-chev{font-size:11px;color:var(--txt3);transition:transform var(--trans)}
.gab-chev.open{transform:rotate(180deg)}
.gab-body{padding:12px 14px;font-size:14px;line-height:1.7;color:var(--txt2)}
.gab-body.hidden{display:none}
.feynman-text{color:var(--txt);font-size:14.5px;line-height:1.75}
.law-block{font-family:var(--mono);font-size:12px;background:var(--surf2);border:1px solid var(--bord);border-radius:var(--r-xs);padding:11px 13px;white-space:pre-wrap;line-height:1.65;color:var(--txt)}
.copy-btn{display:inline-flex;align-items:center;gap:5px;margin-top:8px;font-size:11.5px;padding:4px 12px;border-radius:5px;border:1px solid var(--bord2);background:var(--surf3);color:var(--txt3);cursor:pointer;transition:all var(--trans);font-family:inherit}
.copy-btn:hover{color:var(--acc);border-color:var(--acc-bord);background:var(--acc-dim)}
.peg-box{display:flex;gap:8px;align-items:flex-start;background:var(--amber-bg);border:1px solid var(--amber-bord);border-radius:var(--r-xs);padding:10px 13px;font-size:13px;color:var(--amber);line-height:1.55}

/* ── TRAP WORDS (Releitura Crítica) ──────────────────────── */
.trap-word{font-weight:800;color:var(--acc);background:var(--acc-dim);border-bottom:2px solid var(--acc);padding:0 3px;border-radius:3px}
.releitura-body{font-size:14.5px;line-height:1.8;color:var(--txt);margin-bottom:10px}
.releitura-body .situacao{display:block;font-style:italic;color:var(--txt2);margin-bottom:8px;padding-left:12px;border-left:2px solid var(--bord2)}
.trap-legend{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--txt3);margin-top:6px;flex-wrap:wrap}
.trap-legend .trap-word{font-size:11.5px;cursor:default}
.trap-found{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;color:var(--acc);font-weight:700}

/* ── AUTOAVALIAÇÃO ────────────────────────────────────────── */
.avaliacao-row{padding:11px 14px;background:var(--surf2);border-top:1px solid var(--bord);display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.avaliacao-lbl{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--txt3);font-weight:600;width:100%;margin-bottom:2px}
.av-btn{border-radius:99px;padding:5px 13px;font-size:12.5px;font-weight:700;border:1.5px solid;cursor:pointer;font-family:inherit;transition:all var(--trans);background:transparent}
.av-btn.dom{border-color:var(--green-bord);color:var(--green)}
.av-btn.dom:hover,.av-btn.dom.sel{background:var(--green-bg);box-shadow:0 0 0 2px var(--green-bord)}
.av-btn.dvd{border-color:var(--amber-bord);color:var(--amber)}
.av-btn.dvd:hover,.av-btn.dvd.sel{background:var(--amber-bg);box-shadow:0 0 0 2px var(--amber-bord)}
.av-btn.lac{border-color:var(--red-bord);color:var(--red)}
.av-btn.lac:hover,.av-btn.lac.sel{background:var(--red-bg);box-shadow:0 0 0 2px var(--red-bord)}
.av-btn.leit{border-color:var(--bord2);color:var(--txt2)}
.av-btn.leit:hover,.av-btn.leit.sel{background:var(--surf3);color:var(--txt);box-shadow:0 0 0 2px var(--bord2)}
.av-set{display:flex;align-items:center;gap:8px;padding:9px 14px;background:var(--surf2);border-top:1px solid var(--bord);font-size:13px}
.av-chip{border-radius:99px;padding:3px 12px;font-size:12px;font-weight:700;border:1.5px solid}
.av-chip.dom{background:var(--green-bg);color:var(--green);border-color:var(--green-bord)}
.av-chip.dvd{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-bord)}
.av-chip.lac{background:var(--red-bg);color:var(--red);border-color:var(--red-bord)}
.av-chip.leit{background:var(--surf3);color:var(--txt2);border-color:var(--bord2)}
.av-change{margin-left:auto;background:transparent;border:1px dashed var(--bord2);border-radius:var(--r-xs);padding:2px 9px;font-size:11.5px;color:var(--txt3);cursor:pointer;font-family:inherit;transition:all var(--trans)}
.av-change:hover{color:var(--acc);border-color:var(--acc-bord)}

/* ── DIAGNÓSTICO (Placar) ─────────────────────────────────── */
.diag-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--bord);border:1px solid var(--bord);border-radius:10px;overflow:hidden;margin-bottom:14px}
@media(max-width:600px){.diag-grid{grid-template-columns:repeat(2,1fr)}}
.diag-cell{background:var(--surf2);padding:14px 10px;text-align:center}
.diag-cell .dn{font-size:26px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums}
.diag-cell .dl{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--txt3);margin-top:5px;font-weight:600;line-height:1.3}
.diag-empty{color:var(--txt3);font-size:14px;font-style:italic;padding:12px 0}

/* ── REVISÃO ──────────────────────────────────────────────── */
#rev-wrap{max-width:860px;margin:0 auto;padding:0 0 100px}
.rev-picker{max-width:580px;margin:0 auto;padding:36px 18px 60px;animation:fadeIn .3s ease}
.rev-picker h2{font-size:clamp(22px,4vw,32px);font-weight:800;font-style:italic;margin-bottom:6px}
.rev-picker .sub{font-size:15px;color:var(--txt2);margin-bottom:28px;line-height:1.5}
.filter-sec-lbl{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--txt3);font-weight:700;margin:22px 0 10px}
.filter-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
@media(max-width:480px){.filter-grid{grid-template-columns:1fr}}
.filter-card{background:var(--surf);border:1.5px solid var(--bord);border-radius:var(--r);padding:15px 16px;text-align:left;cursor:pointer;transition:all var(--trans);font-family:inherit;display:flex;flex-direction:column;gap:3px}
.filter-card:hover:not(:disabled){border-color:var(--acc-bord);background:var(--acc-dim)}
.filter-card.sel{border-color:var(--acc);background:var(--acc-dim);box-shadow:0 0 0 1.5px var(--acc)}
.filter-card:disabled{opacity:.35;cursor:not-allowed;pointer-events:none}
.fc-icon{font-size:20px}
.fc-count{font-size:28px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums}
.fc-count.cr{color:var(--red)}.fc-count.ca{color:var(--amber)}.fc-count.cg{color:var(--green)}.fc-count.ct{color:var(--txt)}
.fc-label{font-size:12px;color:var(--txt2);font-weight:600}
.disc-filter-row{display:flex;flex-wrap:wrap;gap:7px}
.disc-btn{background:var(--surf2);border:1.5px solid var(--bord);border-radius:99px;padding:5px 14px;font-size:13px;font-family:inherit;color:var(--txt2);cursor:pointer;transition:all var(--trans);font-weight:500}
.disc-btn:hover{border-color:var(--acc-bord);color:var(--acc)}
.disc-btn.sel{border-color:var(--acc);color:var(--acc);background:var(--acc-dim)}
.mode-box{background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);overflow:hidden;margin-bottom:24px}
.mode-tabs{display:grid;grid-template-columns:1fr 1fr}
.mode-tab{border:none;background:var(--surf2);color:var(--txt2);font-size:14px;font-weight:700;padding:12px 8px;cursor:pointer;font-family:inherit;border-bottom:2px solid transparent;transition:all var(--trans);display:flex;align-items:center;justify-content:center;gap:6px}
.mode-tab:first-child{border-right:1px solid var(--bord)}
.mode-tab.active{background:var(--surf);color:var(--acc);border-bottom-color:var(--acc)}
.mode-desc-txt{font-size:13px;color:var(--txt2);padding:11px 14px;line-height:1.55;border-top:1px solid var(--bord)}
.rev-tb{position:sticky;top:54px;z-index:90;background:var(--surf);border-bottom:1px solid var(--bord)}
.rev-tb-inner{max-width:860px;margin:0 auto;display:flex;align-items:center;gap:8px;padding:7px 18px;flex-wrap:wrap}
.rev-badge{background:var(--acc-dim);border:1px solid var(--acc-bord);color:var(--acc);border-radius:99px;padding:3px 12px;font-size:12px;font-weight:700;flex-shrink:0}
.rev-orig{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;padding:2px 9px;border-radius:99px;font-weight:600;flex-shrink:0}
.rev-orig.ok{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bord)}
.rev-orig.er{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bord)}
.rev-orig.bk{background:var(--surf3);color:var(--txt3);border:1px solid var(--bord)}
.rev-placar-wrap{max-width:580px;margin:0 auto;padding:32px 18px 100px;animation:fadeUp .4s ease}

/* ── ESPAÇAMENTO INTELIGENTE ──────────────────────────────── */
.sr-badge{display:inline-flex;align-items:center;gap:3px;font-size:10.5px;font-weight:700;border-radius:4px;padding:2px 7px;line-height:1.4;white-space:nowrap}
.sr-badge.due{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bord)}
.sr-badge.soon{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bord)}
.sr-badge.ok{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bord)}
.sr-queue-section{margin-bottom:20px}
.sr-queue-hdr{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--red);font-weight:700;margin-bottom:10px}
.sr-queue-row{display:flex;align-items:center;gap:10px;padding:9px 14px;border-radius:var(--r-sm);background:var(--surf);border:1.5px solid var(--red-bord);margin-bottom:7px;cursor:default;transition:background .15s}
.sr-queue-date{font-size:11px;color:var(--txt3);min-width:52px}
.sr-queue-title{flex:1;font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sr-queue-pct{font-size:13px;font-weight:700;min-width:38px;text-align:right}
.sr-interval-info{font-size:11px;color:var(--txt3);margin-top:4px}
/* ── MODO FOCO ────────────────────────────────────────────── */
#sec-foco{position:fixed;inset:0;z-index:150;background:var(--bg);overflow-y:auto;display:flex;flex-direction:column}
#sec-foco.hidden{display:none!important}
.foco-hdr{position:sticky;top:0;z-index:10;background:var(--bg);border-bottom:1px solid var(--bord2);padding:10px 18px;display:flex;align-items:center;gap:12px}
.foco-qnum{font-size:13px;font-weight:700;color:var(--txt2);white-space:nowrap}
.foco-disc{font-size:11.5px;color:var(--txt3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0}
.foco-prog-wrap{display:flex;align-items:center;gap:8px;min-width:110px}
.foco-progress{height:4px;background:var(--bord);border-radius:2px;flex:1}
.foco-prog-fill{height:100%;background:var(--acc);border-radius:2px;transition:width .4s}
.foco-pct{font-size:11px;font-weight:700;color:var(--acc);min-width:28px;text-align:right}
.foco-body{flex:1;max-width:800px;margin:0 auto;padding:28px 20px 16px;width:100%;animation:fadeIn .2s ease}
.foco-body .q-block{border-color:var(--bord2)}
.foco-body .q-text{font-size:16px;line-height:1.8}
.foco-body .q-tag{font-size:14px;width:42px;height:42px;line-height:42px}
.foco-body .q-mark{height:52px;font-size:17px;font-weight:900;min-width:80px}
.foco-body .q-marks{gap:14px}
.foco-nav{max-width:800px;margin:0 auto 40px;padding:0 20px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.foco-nav-hint{font-size:11px;color:var(--txt3);text-align:center;line-height:1.6}
/* ── QUESTION TIMER ──────────────────────────────────────── */
.qt-badge{display:inline-flex;align-items:center;gap:3px;font-size:10.5px;font-weight:700;border-radius:4px;padding:2px 7px;font-variant-numeric:tabular-nums;letter-spacing:.02em;transition:background .35s,color .35s,border-color .35s;min-width:36px;justify-content:center}
.qt-idle{color:var(--txt3);background:transparent}
.qt-normal{background:var(--surf3);color:var(--txt2)}
.qt-warn{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bord)}
.qt-alert{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bord);animation:qtPulse 1s ease-in-out infinite}
.qt-done{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bord)}
@keyframes qtPulse{0%,100%{opacity:1}50%{opacity:.5}}
#qt-pill{position:fixed;bottom:62px;left:50%;transform:translateX(-50%);max-width:860px;width:calc(100% - 32px);z-index:80;pointer-events:none;display:flex;justify-content:flex-end}
.qt-active-pill{background:var(--surf2);border:1px solid var(--bord2);border-radius:20px;padding:5px 14px;font-size:12px;font-weight:700;color:var(--txt2);display:flex;align-items:center;gap:7px;box-shadow:0 2px 12px rgba(0,0,0,.35)}
.qt-active-pill.qt-warn-p{color:var(--amber)}
.qt-active-pill.qt-alert-p{color:var(--red);animation:qtPulse 1s ease-in-out infinite}
/* ── HISTÓRICO ────────────────────────────────────────────── */
#hist-wrap{max-width:860px;margin:0 auto;padding:24px 18px 100px;animation:fadeUp .4s ease}
.hist-header{display:grid;grid-template-columns:62px 72px 50px 68px 60px 1fr 80px;gap:8px;padding:7px 0;border-bottom:2px solid var(--bord);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--txt3);font-weight:700}
.hist-row{display:grid;grid-template-columns:62px 72px 50px 68px 60px 1fr 80px;gap:8px;padding:10px 0;border-top:1px solid var(--bord);font-size:13.5px;align-items:center}
.hist-row:first-child{border-top:none}
.hist-date{color:var(--txt2);font-size:12.5px;font-variant-numeric:tabular-nums;font-weight:600}
.hist-acertos{color:var(--txt);font-variant-numeric:tabular-nums}
.hist-pct{font-weight:800;font-variant-numeric:tabular-nums}
.hist-tempo{color:var(--txt3);font-size:12px;font-variant-numeric:tabular-nums}
.hist-saldo{font-weight:700;font-variant-numeric:tabular-nums}
.hist-av{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.hist-empty{text-align:center;padding:60px 20px}
.hist-empty .hist-emoji{font-size:52px;margin-bottom:18px}
.hist-empty h2{font-size:22px;font-weight:800;margin-bottom:10px}
.hist-empty p{color:var(--txt2);font-size:15px;max-width:340px;margin:0 auto 28px}
.streak-badge{display:inline-flex;align-items:center;gap:5px;background:var(--amber-bg);border:1px solid var(--amber-bord);color:var(--amber);border-radius:99px;padding:3px 12px;font-size:13px;font-weight:700;margin-left:8px}
@media(max-width:600px){
  .hist-header,.hist-row{grid-template-columns:55px 62px 46px 1fr}
  .hist-tempo,.hist-av{display:none}
}

/* ── PLACAR ──────────────────────────────────────────────── */
#placar-wrap{max-width:860px;margin:0 auto;padding:24px 18px 100px;animation:fadeUp .4s ease}
.placar-hero{background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);padding:32px 28px;box-shadow:var(--shadow);margin-bottom:20px;text-align:center}
.placar-kicker{font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--acc);font-weight:700;margin-bottom:14px}
.placar-hero h2{font-size:clamp(28px,4.5vw,40px);font-weight:800;font-style:italic;margin-bottom:8px}
.placar-lead{font-size:15px;color:var(--txt2);margin-bottom:24px}
.placar-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--bord);border:1px solid var(--bord);border-radius:10px;overflow:hidden}
@media(max-width:600px){.placar-stats{grid-template-columns:repeat(2,1fr)}}
.p-stat{background:var(--surf2);padding:16px 10px;text-align:center}
.p-stat .n{font-weight:800;font-size:30px;line-height:1;font-variant-numeric:tabular-nums}
.p-stat .n.g{color:var(--green)}.p-stat .n.r{color:var(--red)}.p-stat .n.a{color:var(--acc)}.p-stat .n.t{color:var(--txt)}
.p-stat .l{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--txt3);margin-top:5px;font-weight:600}

.pl-box{background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);padding:22px;margin-bottom:20px;box-shadow:var(--shadow)}
.pl-title{font-weight:700;font-size:16px;margin-bottom:16px;color:var(--txt)}
.cebraspe-formula{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:14px 16px;background:var(--surf2);border-radius:var(--r-sm);margin-bottom:14px;font-size:14px;border:1px solid var(--bord)}
.cebraspe-formula .part{color:var(--txt2)}
.cebraspe-formula .part b{color:var(--txt);font-weight:700}
.cebraspe-formula .eq{font-weight:800;font-size:20px;color:var(--acc);font-variant-numeric:tabular-nums}
.cebraspe-verdict{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:var(--r-sm);font-weight:700;font-size:14px;border:1px solid}
.cebraspe-verdict.approved{background:var(--green-bg);color:var(--green);border-color:var(--green-bord)}
.cebraspe-verdict.reproved{background:var(--red-bg);color:var(--red);border-color:var(--red-bord)}

/* Discipline chart */
.disc-chart-row{display:grid;grid-template-columns:1.4fr 2.5fr auto auto;gap:12px;align-items:center;padding:9px 0;border-top:1px solid var(--bord);font-size:13.5px}
.disc-chart-row:first-of-type{border-top:none}
.disc-chart-row .nm{color:var(--txt);font-weight:500}
.bar-rail{height:9px;background:var(--surf2);border-radius:99px;overflow:hidden;border:1px solid var(--bord)}
.bar-fill{height:100%;border-radius:99px;transition:width .6s}
.disc-chart-row .frac{color:var(--txt3);font-size:12px;font-variant-numeric:tabular-nums}
.disc-chart-row .pct{font-weight:700;font-size:13px;min-width:40px;text-align:right;font-variant-numeric:tabular-nums}
@media(max-width:600px){.disc-chart-row{grid-template-columns:1fr auto;gap:5px 12px}.bar-rail{grid-column:1/-1;order:3}.disc-chart-row .frac{order:4}}

/* Errors list */
.err-item{border-top:1px solid var(--bord);padding:12px 0}
.err-item:first-child{border-top:none}
.err-row{display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:start;font-size:13.5px}
.err-num{font-weight:800;color:var(--red);font-variant-numeric:tabular-nums;min-width:32px;padding-top:2px}
.err-sub{color:var(--txt);line-height:1.4}
.err-sub small{display:block;color:var(--txt3);font-size:11.5px;margin-top:2px}
.err-toggle{background:var(--surf2);border:1px solid var(--bord);border-radius:var(--r-xs);padding:4px 12px;font-size:12px;color:var(--txt2);transition:all var(--trans);font-family:inherit;white-space:nowrap;display:inline-flex;align-items:center;gap:5px}
.err-toggle:hover{border-color:var(--acc-bord);color:var(--acc);background:var(--acc-dim)}
.err-toggle.open{border-color:var(--acc-bord);color:var(--acc);background:var(--acc-dim)}
.err-gab{display:none;margin-top:12px;border-radius:var(--r-sm);overflow:hidden;border:1px solid var(--bord)}
.err-gab.open{display:block;animation:fadeUp .2s ease}
.placar-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:24px}

/* ── FAB NAV ─────────────────────────────────────────────── */
.fab{position:fixed;right:20px;bottom:72px;width:46px;height:46px;background:var(--acc);color:#0a0b0e;border:none;border-radius:50%;box-shadow:0 4px 16px var(--acc-glow);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;z-index:44;transition:all var(--trans)}
.fab:hover{transform:scale(1.08)}
.fab.hidden{display:none}
.quick-nav{position:fixed;right:20px;bottom:124px;width:auto;min-width:240px;background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);padding:12px;box-shadow:var(--shadow-lg);z-index:45;max-width:320px;max-height:55vh;overflow-y:auto;display:none}
.quick-nav.open{display:block;animation:fadeUp .2s ease}
.qn-title{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--txt3);margin-bottom:8px;font-weight:600}
.qn-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:4px}
.qn-btn{width:30px;height:30px;border:1px solid var(--bord);background:var(--surf2);border-radius:6px;font-size:10.5px;font-weight:700;color:var(--txt3);transition:all .1s;font-variant-numeric:tabular-nums}
.qn-btn:hover{border-color:var(--acc-bord);color:var(--acc);transform:scale(1.08)}
.qn-btn.ac{background:var(--green-bg);border-color:var(--green-bord);color:var(--green)}
.qn-btn.ae{background:var(--red-bg);border-color:var(--red-bord);color:var(--red)}
.qn-btn.gs{border-style:dashed}
.qn-btn.qa{box-shadow:0 0 0 2px var(--red);animation:qtPulse 1.2s ease-in-out infinite}
@keyframes qFlash{0%{box-shadow:0 0 0 3px var(--acc-glow),0 0 18px var(--acc-glow)}60%{box-shadow:0 0 0 2px var(--acc-bord)}100%{box-shadow:none}}
.q-kb-flash{animation:qFlash .55s ease-out}

/* ── PROGRESS BAR (bottom fixed) ─────────────────────────── */
.bot-bar{position:fixed;bottom:0;left:0;right:0;background:var(--surf);border-top:1px solid var(--bord);padding:8px 18px;display:flex;align-items:center;gap:12px;z-index:40;font-size:12px;color:var(--txt2)}
.bot-bar.hidden{transform:translateY(100%);opacity:0;pointer-events:none}
.bot-bar .bbar{flex:1;height:6px;background:var(--surf3);border-radius:99px;overflow:hidden}
.bot-bar .bbar-fill{height:100%;background:var(--acc);transition:width .4s;border-radius:99px}
.bot-bar .bstats{display:flex;gap:10px;flex-shrink:0;font-variant-numeric:tabular-nums}
.bot-bar .bstats .ok{color:var(--green);font-weight:600}.bot-bar .bstats .er{color:var(--red);font-weight:600}

/* ── MODAL ───────────────────────────────────────────────── */
.modal-ov{position:fixed;inset:0;background:rgba(8,9,14,.65);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;padding:18px;animation:fadeIn .2s ease}
.modal{background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);padding:26px;max-width:420px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.5);animation:fadeUp .2s ease}
.modal h3{font-size:19px;font-weight:800;margin-bottom:10px}
.modal p{color:var(--txt2);margin-bottom:20px;font-size:14px;line-height:1.55}
.modal-acts{display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap}
.btn-danger{background:var(--red);color:white;border:none;border-radius:var(--r-sm);padding:9px 18px;font-family:inherit;font-weight:700;font-size:14px;transition:opacity var(--trans)}
.btn-danger:hover{opacity:.88}
.btn-warn{background:var(--amber);color:white;border:none;border-radius:var(--r-sm);padding:9px 18px;font-family:inherit;font-weight:700;font-size:14px;transition:opacity var(--trans)}
.btn-warn:hover{opacity:.88}

/* ── TOAST ───────────────────────────────────────────────── */
.toast{position:fixed;bottom:56px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--surf);border:1px solid var(--bord);color:var(--txt);padding:11px 18px;border-radius:var(--r-sm);font-size:13.5px;z-index:300;opacity:0;transition:opacity .25s,transform .25s;box-shadow:var(--shadow-lg);pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── ANIMATIONS ──────────────────────────────────────────── */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.hidden{display:none!important}

/* ── RESPONSIVE ──────────────────────────────────────────── */
@media(max-width:640px){
  .hdr-inner{padding:0 12px}.hdr-chips{gap:4px}
  .chip{padding:2px 7px;font-size:11px}
  #prova-wrap,#placar-wrap{padding:16px 12px 100px}
  .q-text{font-size:14.5px}
  .prova-title h2{font-size:16px}
  .placar-stats{grid-template-columns:repeat(2,1fr)}
  .q-actions-row{padding-left:0;flex-wrap:wrap}
}
</style>
</head>
<body>

<!-- ══ HEADER ════════════════════════════════════════════ -->
<header class="hdr" id="hdr">
  <div class="hdr-inner">
    <div class="hdr-brand">
      <div class="delta-badge">Δ</div>
      <div>
        <div class="hdr-name">PCDF · Delegado 2026</div>
        <div class="hdr-date" id="hdr-date"></div>
      </div>
    </div>
    <div class="hdr-timer-wrap hidden" id="hdr-timer">
      <svg class="clock-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
      </svg>
      <span class="hdr-timer-txt" id="hdr-timer-txt">0:00</span>
      <button id="btn-pause" title="Pausar / retomar" onclick="togglePause()">⏸</button>
    </div>
    <div class="hdr-chips" id="hdr-chips" style="display:none">
      <span class="chip g" id="c-ok">✓ 0</span>
      <span class="chip r" id="c-er">✗ 0</span>
      <span class="chip n" id="c-tot">0/10</span>
    </div>
    <div class="hdr-actions">
      <button class="icon-btn" id="btn-hist" title="Histórico de estudo">📊</button>
      <button class="icon-btn" id="btn-theme" title="Tema">☀</button>
      <button class="icon-btn hidden" id="btn-gab-all" title="Revelar/ocultar todos os gabaritos">👁</button>
      <button class="icon-btn" id="btn-export" title="Exportar progresso">⬆</button>
      <button class="icon-btn" id="btn-import-bloco" title="Importar bloco JSON">📂</button>
      <button class="icon-btn" id="btn-import-prog" title="Importar progresso">📥</button>
      <button class="icon-btn" id="btn-reset" title="Reiniciar">↺</button>
    </div>
  </div>
  <div class="prog-rail"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
</header>

<!-- ══ PAUSE OVERLAY ═════════════════════════════════════ -->
<div id="pause-overlay" class="hidden">
  <div class="pause-card">
    <div class="pause-icon">⏸</div>
    <div class="pause-title">Prova pausada</div>
    <div class="pause-sub">O cronômetro está parado.<br>Retome quando estiver pronto.</div>
    <button class="pause-resume" onclick="togglePause()">▶ Retomar prova</button>
  </div>
</div>

<!-- ══ SECTIONS ══════════════════════════════════════════ -->
<main>
  <section id="sec-cover"></section>

  <div id="sec-prova" class="hidden">
    <!-- Toolbar -->
    <div class="tb" id="prova-tb">
      <div class="tb-inner">
        <span class="tb-info"><b id="tb-ans">0</b> respondidas &nbsp;|&nbsp; <b id="tb-blank">10</b> em branco</span>
        <span class="tb-spacer"></span>
        <button class="tb-btn" id="tb-gab-all">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="3"/><path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7-10-7-10-7z"/></svg>
          Gabaritos
        </button>
        <button class="tb-btn" id="tb-revisao" onclick="showRevisaoPicker()">
          🔍 Revisão
        </button>
        <button class="tb-btn" id="tb-foco" onclick="enterFoco()">
          🎯 Foco
        </button>
        <button class="tb-btn danger" id="tb-finish">
          Encerrar prova →

<script>

const DEFAULT_BLOCO = {"meta":{"id":"2026-06-29","titulo":"Bloco Diário — Sexologia Forense · Licenciamento Ambiental · Prevenção Criminal","data":"2026-06-29","totalQuestoes":120,"concurso":"Delegado PCDF 2026","edital":"Edital nº 1, de 3/2/2026","fase":"Fase 2 — Reta Final (comentários enxutos)","observacao":"Bloco gerado em execução autônoma. Distribuição: Penal(24) + PPP(22) + Const(18) + Adm(16) + MedLeg(10) + Civil(8) + Trib(6) + Amb(5) + Emp(5) + DF(6) = 120"},"disciplinas":[{"nome":"Direito Penal e Legislação Especial","comando":"Acerca da teoria geral do crime, aplicação da lei penal, crimes em espécie e legislação penal especial, julgue os itens a seguir.","itens":[{"n":1,"enun":"A atenuante genérica pode reduzir a pena abaixo do mínimo legal quando a culpabilidade do agente for muito reduzida, a critério do juiz.","gab":"ERRADO","com":"Atenuantes genéricas NÃO podem reduzir a pena abaixo do mínimo legal. Súmula 231 STJ é firme nesse ponto. O mínimo legal é um piso intransponível na 2ª fase de dosimetria.","fund":"Súmula 231 STJ: 'A incidência da circunstância atenuante não pode conduzir à redução da pena abaixo do mínimo legal.'","jur_status":"OK"},{"n":2,"enun":"O erro sobre elemento constitutivo do tipo penal exclui o dolo e, se o erro for invencível (inevitável), exclui também a culpa, tornando o fato atípico.","gab":"CERTO","com":"O erro de tipo inevitável exclui dolo e culpa (fato atípico). O evitável exclui dolo, mas permite punição por culpa se houver previsão legal — exata dicção do art. 20, caput, CP.","fund":"CP, art. 20: 'O erro sobre elemento constitutivo do tipo legal de crime exclui o dolo, mas permite a punição por crime culposo, se previsto em lei.' Parte final: se inevitável, exclui também a culpa."},{"n":3,"enun":"Na aberratio ictus com resultado único (desvio na execução), o agente responde pelo crime como se tivesse atingido a pessoa visada, considerando-se as qualidades desta — e não as da vítima efetivamente atingida — para fins de qualificação.","gab":"CERTO","com":"Na aberratio ictus (art. 73 CP), o agente responde pela conduta em relação à pessoa pretendida. As qualidades pessoais da vítima real não são consideradas — o que vale são as da vítima visada (ex.: parricídio mesmo que pai não tenha sido atingido).","fund":"CP, art. 73: 'Quando, por acidente ou erro no uso dos meios de execução, o agente, ao invés de atingir a pessoa que pretendia ofender, atinge pessoa diversa, responde como se tivesse praticado o crime contra aquela [...]'","peg":"Não confundir com erro sobre a pessoa (art. 20, §3º): na aberratio ictus há erro na execução (o disparo desviou); no error in persona há erro na representação (agente identificou errado a vítima)."},{"n":4,"enun":"O perdão judicial concedido nas hipóteses previstas no Código Penal gera sentença condenatória com efeitos civis, mas extingue a punibilidade quanto à pena.","gab":"ERRADO","com":"Perdão judicial gera sentença DECLARATÓRIA de extinção da punibilidade, sem qualquer efeito condenatório — nem penal nem civil. Quem quiser ressarcimento civil deve usar vias próprias.","fund":"Súmula 18 STJ: 'A sentença concessiva do perdão judicial é declaratória da extinção da punibilidade, não subsistindo qualquer efeito condenatório.'","jur_status":"OK"},{"n":5,"enun":"O crime de estupro de vulnerável (art. 217-A CP) configura-se com a conjunção carnal ou prática de ato libidinoso com menor de 14 anos, sendo irrelevante o eventual consentimento da vítima ou sua experiência sexual anterior.","gab":"CERTO","com":"STJ é pacífico: a vulnerabilidade do menor de 14 anos é absoluta, independendo de qualquer análise sobre consentimento, desenvolvimento mental ou história sexual da vítima.","fund":"Súmula 593 STJ: 'O crime de estupro de vulnerável se configura com a conjunção carnal ou prática de ato libidinoso com menor de 14 anos, sendo irrelevante eventual consentimento da vítima para a prática do ato, sua experiência sexual anterior ou existência de relacionamento amoroso com o agente.'","jur_status":"OK"},{"n":6,"enun":"O crime permanente tem sua consumação iniciada com a prática da conduta e encerrada apenas com a cessação da permanência; por isso, lei penal mais grave que entrar em vigor durante a permanência pode ser aplicada sem ofensa ao princípio da irretroatividade.","gab":"CERTO","com":"Súmula 711 STF confirma: enquanto o crime permanente está se consumando, a lei vigente é a que se aplica, ainda que mais grave. A irretroatividade pressupõe fato já consumado — aqui o fato ainda está ocorrendo.","fund":"Súmula 711 STF: 'A lei penal mais grave aplica-se ao crime continuado ou ao crime permanente, se a sua vigência é anterior à cessação da continuidade ou da permanência.'","peg":"Cuidado: sequestro (art. 148 CP) é permanente; receptação (art. 180) é instantâneo. A distinção é relevante para aplicação da súmula.","jur_status":"OK"},{"n":7,"enun":"O flagrante preparado pela polícia, em que agentes induzem o investigado à prática do crime para surpreendê-lo em flagrante, é reconhecido como crime impossível, não gerando ação penal válida.","gab":"CERTO","com":"A polícia artificialmente torna impossível o resultado lesivo — há eliminação absoluta da potencialidade de dano real. Súmula 145 STF consagra a hipótese como crime impossível por ineficácia do meio ou inexistência do objeto.","fund":"Súmula 145 STF: 'Não há crime, quando a preparação do flagrante pela polícia torna impossível a sua consumação.'","jur_status":"OK"},{"n":8,"enun":"A coautoria é inadmissível nos crimes próprios (que exigem qualidade especial do sujeito ativo), pois o extraneus não pode praticar o núcleo do tipo reservado ao intraneus.","gab":"ERRADO","com":"Extraneus pode sim ser coautor em crimes próprios desde que o intraneus pratique o núcleo típico e o extraneus concorra dolosamente. O que o extraneus NÃO pode é praticar o crime como autor solitário (ex.: não funcionário público não pratica peculato sozinho, mas pode ser coautor se o funcionário também aderir).","fund":"CP, art. 29: 'Quem, de qualquer modo, concorre para o crime incide nas penas a este cominadas, na medida de sua culpabilidade.' + Doutrina majoritária sobre comunicabilidade das elementares do tipo.","peg":"Diferente é a participação: extraneus que contribui sem praticar núcleo do tipo é partícipe — aqui as elementares pessoais do intraneus se comunicam ao partícipe se ele as conhecia (art. 30 CP)."},{"n":9,"enun":"No concurso formal perfeito (art. 70, caput, 1ª parte, CP), o juiz aplica somente a pena mais grave, exacerbada de 1/6 a 1/2.","gab":"CERTO","com":"Concurso formal perfeito: uma ação, dois ou mais crimes, mesmo desígnio (culposo ou unidade de desígnio). Pena: a mais grave, acrescida de 1/6 a 1/2. O imperfeito (dois ou mais desígnios) usa cúmulo material — a que for menor.","fund":"CP, art. 70: 'Quando o agente, mediante uma só ação ou omissão, pratica dois ou mais crimes, idênticos ou não, aplica-se-lhe a mais grave das penas cabíveis ou, se iguais, somente uma delas, mas aumentada, em qualquer caso, de um sexto até metade.'"},{"n":10,"enun":"A prescrição virtual ou em perspectiva, que projeta a prescrição futura com base na pena provável, é admitida como causa de extinção da punibilidade pela jurisprudência consolidada do STF e do STJ.","gab":"ERRADO","com":"STF e STJ rejeitam a prescrição em perspectiva/virtual. A extinção da punibilidade só ocorre com as hipóteses do art. 107 CP; projeção futura não está entre elas.","fund":"Súmula 438 STJ: 'É inadmissível a extinção da punibilidade pela prescrição da pretensão punitiva com fundamento em pena hipotética, independentemente da existência ou sorte do processo penal.' + Precedente STF RG 602.527.","peg":"Atenção: a prescrição retroativa (art. 110 CP), calculada com base na pena imposta, é admitida. A vedada é a virtual/em perspectiva, baseada em pena ainda hipotética.","jur_status":"OK"},{"n":11,"enun":"O peculato-desvio, previsto no art. 312, caput, do CP, ocorre quando o funcionário público dá ao dinheiro público, de que tem posse em razão do cargo, destinação diversa da prevista, em proveito próprio ou alheio.","gab":"CERTO","com":"CP, art. 312, caput, contempla as formas: (a) peculato-apropriação (apropriar-se) e (b) peculato-desvio (desviá-lo). Ambas pressupõem posse lícita anterior em razão do cargo. O desvio é a destinação indevida — não subtração, mas redirecionamento.","fund":"CP, art. 312: 'Apropriar-se o funcionário público de dinheiro, valor ou qualquer outro bem móvel, público ou particular, de que tem a posse em razão do cargo, ou desviá-lo, em proveito próprio ou alheio.'"},{"n":12,"enun":"O crime de corrupção passiva (art. 317 CP) é formal e se consuma com a mera solicitação de vantagem indevida, independentemente de o funcionário público efetivamente recebê-la.","gab":"CERTO","com":"Corrupção passiva é crime formal (de consumação antecipada). As três formas do tipo — solicitar, receber, aceitar promessa — são consumadas de modo independente. A mera solicitação já consuma.","fund":"CP, art. 317: 'Solicitar ou receber, para si ou para outrem, direta ou indiretamente, ainda que fora da função ou antes de assumi-la, mas em razão dela, vantagem indevida, ou aceitar promessa de tal vantagem.'"},{"n":13,"enun":"O crime tributário material (ex.: sonegação fiscal) somente se consuma com o lançamento definitivo do crédito tributário, sendo inadmissível a propositura de ação penal antes desse momento.","gab":"CERTO","com":"SV 24 STF é categórica: sem lançamento definitivo, não há consumação do crime tributário material. A denúncia antes do lançamento definitivo viola a garantia do nullum crimen.","fund":"Súmula Vinculante 24 STF: 'Não se tipifica crime material contra a ordem tributária, previsto no art. 1o, incisos I a IV, da Lei no 8.137/90, antes do lançamento definitivo do tributo.'","peg":"O IP pode ser instaurado antes; o que é proibido é a denúncia (início da ação penal) antes do lançamento definitivo.","jur_status":"OK"},{"n":14,"enun":"Na dosimetria da pena, o juiz pode aplicar ao réu pena superior ao máximo legal quando as circunstâncias judiciais do art. 59 do CP forem todas desfavoráveis, compensando com circunstâncias atenuantes em fase posterior.","gab":"ERRADO","com":"O sistema trifásico tem pisos e tetos em cada fase. Na 1ª fase, o juiz parte da pena base e não pode ultrapassar o máximo legal. Somente as causas de aumento (3ª fase) podem levar a pena acima do máximo.","fund":"CP, art. 59 c/c art. 68. Doutrina: as circunstâncias judiciais movimentam a pena entre o mínimo e o máximo cominados ao tipo penal."},{"n":15,"enun":"Nos crimes patrimoniais praticados sem violência ou grave ameaça, o réu que era conjugue, ascendente ou descendente da vítima está isento de pena, em razão das escusas absolutórias do art. 181 do CP.","gab":"CERTO","com":"Escusas absolutórias (art. 181 CP): o fato é típico e ilícito, mas a punibilidade é excluída em razão do vínculo familiar (cônjuge, ascendente ou descendente). Irmão, genro e nora têm imunidade relativa (art. 182 CP) — condicionada à representação.","fund":"CP, art. 181: 'É isento de pena quem comete qualquer dos crimes previstos neste título, em prejuízo: I – do cônjuge, na constância da sociedade conjugal; II – de ascendente ou descendente [...]'"},{"n":16,"enun":"O princípio da insignificância é aplicável ao crime de tráfico de drogas quando a quantidade da substância entorpecente apreendida for ínfima.","gab":"ERRADO","com":"STF e STJ são convergentes na rejeição do princípio da insignificância ao tráfico de drogas. A gravidade abstrata do tipo (crime hediondo) e a política criminal de tolerância zero ao comércio de entorpecentes afastam a aplicação.","fund":"STF HC 110.475/SC; STJ Súmula 512 (sobre porte, mas raciocínio extensível). Doutrina dominante: bem jurídico saúde pública é indivisível, tornando inviável a quantificação mínima para exclusão da tipicidade.","peg":"Diferente do descaminho, onde STF aplica insignificância até R$ 20.000,00 (RE 514.531). Para drogas, nenhum quantum legitima a insignificância.","jur_status":"PENDENTE"},{"n":17,"enun":"O roubo se consuma com a inversão da posse do bem mediante emprego de violência ou grave ameaça, ainda que por breve tempo, sendo prescindível a posse mansa e pacífica ou desvigiada.","gab":"CERTO","com":"STJ pacificou o tema pela teoria da amotio/posse de fato: a breve posse já consuma o roubo. A recuperação imediata pela vítima ou pela polícia não transforma o crime em tentativa.","fund":"Súmula 582 STJ: 'Consuma-se o crime de roubo com a inversão da posse do bem mediante emprego de violência ou grave ameaça, ainda que por breve tempo e em seguida à perseguição imediata ao agente e recuperação da coisa roubada, sendo prescindível a posse mansa e pacífica ou desvigiada.'","jur_status":"PENDENTE"},{"n":18,"enun":"A abolitio criminis extingue todos os efeitos penais da condenação, inclusive a reincidência, mas não afasta a obrigação civil de reparar o dano.","gab":"CERTO","com":"A abolitio criminis (art. 2º CP) tem eficácia ex nunc para os efeitos extrapenais, mas retroage para apagar os efeitos penais. O dever de reparar é efeito civil — sobrevive à descriminalização.","fund":"CP, art. 2º, caput: 'Ninguém pode ser punido por fato que lei posterior deixa de considerar crime, cessando em virtude dela a execução e os efeitos penais da sentença condenatória.' Nota: art. 91, I CP (reparação do dano é efeito civil, não penal)."},{"n":19,"enun":"No crime de lesão corporal seguida de morte (art. 129, §3º CP), o agente responde a título de dolo em relação à lesão e culpa em relação ao resultado agravador (morte), tratando-se de crime preterdoloso.","gab":"CERTO","com":"Crimes preterdolosos: dolo no antecedente (lesão) + culpa no resultado mais grave (morte). Se houvesse dolo também quanto à morte, configuraria homicídio (doloso ou com dolo eventual).","fund":"CP, art. 19: 'Pelo resultado que agrava especialmente a pena, só responde o agente que o houver causado ao menos culposamente.' + art. 129, §3º CP."},{"n":20,"enun":"A participação de menor importância no crime é causa obrigatória de redução da pena, que o juiz deve sempre aplicar quando reconhecida a insignificância da contribuição do partícipe.","gab":"ERRADO","com":"A participação de menor importância é FACULTATIVA — 'pode ser diminuída'. O juiz tem discricionariedade vinculada: se reconhece a menor importância, pode (não deve obrigatoriamente) reduzir de 1/6 a 1/3.","fund":"CP, art. 29, §1º: 'Se a participação for de menor importância, a pena pode ser diminuída de um sexto a um terço.'"},{"n":21,"enun":"O crime continuado exige que as infrações subsequentes sejam da mesma espécie e praticadas nas mesmas condições de tempo, lugar e modo de execução, entre outras circunstâncias que indiquem continuação.","gab":"CERTO","com":"Art. 71 CP fixa os requisitos do crime continuado: mesma espécie + condições semelhantes de tempo, lugar e modo de execução. A expressão 'outras circunstâncias' é cláusula aberta. Aplicação da teoria objetiva moderada.","fund":"CP, art. 71: 'Quando o agente, mediante mais de uma ação ou omissão, pratica dois ou mais crimes da mesma espécie e, pelas condições de tempo, lugar, maneira de execução e outras semelhantes, devem os subseqüentes ser havidos como continuação do primeiro [...]'"},{"n":22,"enun":"O crime de receptação dolosa qualificada (art. 180, §1º CP) exige que o agente exerça atividade comercial ou industrial, respondendo com pena agravada em relação à receptação simples.","gab":"CERTO","com":"A qualificadora do §1º pressupõe exercício de atividade comercial ou industrial — o legislador pune com maior rigor o comerciante/industrial que usa a atividade econômica lícita para 'lavar' produtos de crimes.","fund":"CP, art. 180, §1º: 'Adquirir, receber, transportar, conduzir, ocultar, ter em depósito, desmontar, montar, remontar, vender, expor à venda, ou de qualquer forma utilizar, em proveito próprio ou alheio, no exercício de atividade comercial ou industrial, coisa que deve saber ser produto de crime.'"},{"n":23,"enun":"O agente que supostamente pratica um crime em situação de descriminante putativa baseada em erro inevitável sobre os fatos é isento de pena.","gab":"CERTO","com":"Descriminante putativa com erro de fato inevitável: o agente supõe, justificadamente, que as circunstâncias de fato autorizariam uma excludente real (ex.: legítima defesa putativa). Sendo inevitável, exclui dolo e culpa — isenção total de pena.","fund":"CP, art. 20, §1º: 'É isento de pena quem, por erro plenamente justificado pelas circunstâncias, supõe situação de fato que, se existisse, tornaria a ação legítima. Não há isenção de pena quando o erro deriva de culpa e o fato é punível como crime culposo.'","peg":"Se o erro for evitável, pune-se por culpa se houver modalidade culposa. 'Plenamente justificado' = inevitável."},{"n":24,"enun":"O princípio da insignificância aplica-se ao crime de descaminho quando o valor do tributo iludido não ultrapassar R$ 20.000,00, conforme parâmetro estabelecido pelo STF com base na Portaria MF 75/2012.","gab":"CERTO","com":"STF consolidou: descaminho com tributo iludido até R$ 20.000,00 é atípico por insignificância. O parâmetro foi extraído da Portaria MF 75/2012 que elevou a R$ 20.000,00 o valor mínimo para execução fiscal pela PGFN.","fund":"STF, RE 514.531/SP e HC 110.964/SC (Plenário); Portaria MF 75/2012. STJ acompanha o STF nesse entendimento.","peg":"Atenção: R$ 20.000,00 é o teto — acima disso não há insignificância. Além disso, o crime de contrabando (importação de mercadoria proibida) NÃO admite insignificância, independentemente do valor.","jur_status":"PENDENTE"}]},{"nome":"Direito Processual Penal e Legislação Especial","comando":"Acerca do processo penal brasileiro, provas, medidas cautelares e garantias processuais, julgue os itens a seguir.","itens":[{"n":25,"enun":"O inquérito policial é procedimento administrativo preparatório da ação penal, dispensável quando o Ministério Público já dispuser de justa causa para oferecimento da denúncia.","gab":"CERTO","com":"IP tem natureza administrativa, informativa e dispensável. O MP pode dispensá-lo se tiver justa causa — prova suficiente da materialidade e indícios de autoria. O IP instrui; não é condição de procedibilidade.","fund":"CPP, art. 39, §5º c/c art. 46, §1º. STF ADI 1.570: MP pode dispensar IP quando dispõe de elementos suficientes."},{"n":26,"enun":"Segundo a Súmula Vinculante 14, o indiciado ou acusado tem direito amplo de acesso aos autos do inquérito policial, mesmo que decretado sigilo, hipótese em que a prerrogativa se estende ao defensor constituído.","gab":"CERTO","com":"SV 14 protege o direito de acesso do defensor — não do investigado pessoalmente — aos autos, em especial às diligências já documentadas. O sigilo do IP não pode ser oposto ao defensor constituído.","fund":"Súmula Vinculante 14 STF: 'É direito do defensor, no interesse do representado, ter acesso amplo aos elementos de prova que, já documentados em procedimento investigatório realizado por órgão com competência de polícia judiciária, digam respeito ao exercício do direito de defesa.'","jur_status":"OK"},{"n":27,"enun":"A prisão em flagrante, por si só, é suficiente para fundamentar a manutenção do réu preso durante o processo, dispensando deliberação judicial específica sobre a necessidade de prisão preventiva.","gab":"ERRADO","com":"A prisão em flagrante é provisória e deve ser convertida em preventiva por decisão fundamentada do juiz, ou relaxada, ou substituída por medidas cautelares. Não subsiste sem pronunciamento judicial (art. 310 CPP).","fund":"CPP, art. 310: 'Ao receber o auto de prisão em flagrante, no prazo máximo de até 24 (vinte e quatro) horas após a realização da prisão, o juiz deverá promover audiência de custódia [...]' e decidirá pela conversão, relaxamento ou liberdade provisória."},{"n":28,"enun":"O reconhecimento de pessoas, como meio de prova, deve ser realizado obrigatoriamente com o suspeito presente entre outras pessoas, e o ato deve ser precedido de descrição prévia pelo reconhecedor.","gab":"CERTO","com":"STJ (HC 598.886) tornou obrigatórias as formalidades do art. 226 CPP: descrição prévia + apresentação entre outros. Reconhecimento que não as observa é prova viciada e não pode, isoladamente, sustentar condenação.","fund":"CPP, art. 226, I e II. STJ HC 598.886/SC (Schietti, 6ª T., 27/10/2020): formalidades do art. 226 são obrigatórias; reconhecimento viciado não sustenta condenação isolada.","peg":"STJ Tema 1258 (REsp 1.953.602-SP, j. 11/06/2025): 6 teses sobre reconhecimento de pessoas — aprofunda o entendimento do HC 598.886.","jur_status":"OK"},{"n":29,"enun":"A busca pessoal pode ser realizada por policiais com fundamento em mera suspeita subjetiva decorrente do aspecto físico ou vestimenta do abordado, desde que realizada em área de risco.","gab":"ERRADO","com":"STJ exige fundada suspeita prévia, objetiva e específica para legitimar a busca pessoal — não mera impressão subjetiva. Suspeita baseada em aparência física, cor ou local é inválida.","fund":"STJ RHC 158.580/BA (Schietti, 6ª T., 19/04/2022): busca pessoal exige fundada suspeita prévia, objetiva e específica. CPP, art. 240, §2º.","peg":"Fundada suspeita ≠ mera suspeita ou intuição policial. Deve ser articulável e objetiva, não baseada em estereótipos.","jur_status":"OK"},{"n":30,"enun":"A entrada forçada em domicílio sem mandado judicial é lícita quando há fundadas razões, devidamente justificadas a posteriori, que indiquem situação de flagrante delito.","gab":"CERTO","com":"STF Tema 280: a invasão sem mandado é excepcionalmente lícita quando há fundadas razões que indiquem flagrante. A justificativa pode ser dada após a entrada, mas deve ser real e objetiva.","fund":"STF RE 603.616/RO (Gilmar Mendes, Pleno, j. 05/11/2015, Tema 280): entrada forçada sem mandado só lícita com fundadas razões justificadas a posteriori.","peg":"Cuidado: a mera afirmação policial de 'recebeu denúncia anônima' não supre a exigência de fundadas razões. STF exige base empírica objetiva.","jur_status":"OK"},{"n":31,"enun":"As algemas somente podem ser utilizadas em casos de resistência ou fundado receio de fuga ou de perigo à integridade física do preso ou de terceiros, devendo o uso ser justificado por escrito pela autoridade responsável.","gab":"CERTO","com":"SV 11 STF: o uso de algemas é excepcional e requer justificativa escrita. O uso desnecessário configura constrangimento ilegal e pode anular o ato processual (ex.: júri com réu algemado sem motivo).","fund":"Súmula Vinculante 11 STF: 'Só é lícito o uso de algemas em casos de resistência e de fundado receio de fuga ou de perigo à integridade física própria ou alheia [...] A autoridade a que couber a custódia do preso responderá civil e penalmente pelo uso excessivo.'","jur_status":"OK"},{"n":32,"enun":"A prova ilícita, uma vez introduzida nos autos, só pode ser desentranhada mediante requerimento da parte prejudicada, não podendo o juiz agir de ofício.","gab":"ERRADO","com":"CPP, art. 157 permite ao juiz atuar de ofício para declarar a inadmissibilidade da prova ilícita e determinar seu desentranhamento, independentemente de requerimento. A vedação constitucional às provas ilícitas é matéria de ordem pública.","fund":"CPP, art. 157, caput: 'São inadmissíveis, devendo ser desentranhadas do processo, as provas ilícitas, assim entendidas as obtidas em violação a normas constitucionais ou legais.'"},{"n":33,"enun":"Segundo o STF, a extração de dados de aparelho celular pelo Estado sem autorização judicial prévia configura violação ao direito fundamental à intimidade, sendo a prova obtida ilícita.","gab":"CERTO","com":"STF fixou no Tema 977 (RE 1.042.075) que o acesso a dados de celular sem mandado judicial viola a intimidade e a privacidade — seja o celular apreendido ou não. A EC 115/2022 reforçou a proteção constitucional dos dados digitais.","fund":"STF RE 1.042.075 (Tema 977) c/c EC 115/2022, que inseriu a proteção de dados pessoais como direito fundamental (CF, art. 5º, LXXIX).","peg":"Exceção: dados visíveis na tela desbloqueada no momento da prisão em flagrante ainda geram debate, mas o princípio geral do STF é de exigência de mandado."},{"n":34,"enun":"A nulidade processual relativa somente pode ser declarada se arguida em momento oportuno pela parte prejudicada e se demonstrado o efetivo prejuízo.","gab":"CERTO","com":"Pas de nullité sans grief: nulidade relativa exige arguição tempestiva + demonstração de prejuízo. A nulidade absoluta, ao contrário, pode ser declarada de ofício a qualquer tempo, prescindindo de prejuízo demonstrado.","fund":"CPP, art. 563: 'Nenhum ato será declarado nulo, se da nulidade não resultar prejuízo para a acusação ou para a defesa.'"},{"n":35,"enun":"A ação penal pública incondicionada permite que o Ministério Público ofereça denúncia independentemente de manifestação da vítima, mesmo em crimes contra a dignidade sexual quando o agressor não é conhecido da vítima.","gab":"CERTO","com":"Nos crimes contra a dignidade sexual, o art. 225 CP foi alterado pela Lei 13.718/2018: todos os crimes sexuais passaram a ser de ação penal pública incondicionada. Não há mais diferenciação baseada no conhecimento entre agressor e vítima.","fund":"CP, art. 225 (redação dada pela Lei 13.718/2018): 'Nos crimes definidos nos Capítulos I e II deste Título, procede-se mediante ação penal pública incondicionada.'"},{"n":36,"enun":"O juiz das garantias, previsto nos arts. 3º-A a 3º-F do CPP, inseridos pelo Pacote Anticrime (Lei 13.964/2019), encontra-se em plena vigência e eficácia desde a publicação da lei.","gab":"ERRADO","com":"O juiz das garantias foi inserido no CPP pelo Pacote Anticrime, mas sua eficácia foi imediatamente suspensa por liminar do STF nas ADIs 6.298, 6.299, 6.300 e 6.305. Existe no texto legal, mas está com eficácia suspensa por decisão judicial.","fund":"Lei 13.964/2019, arts. 3º-A a 3º-F CPP. STF: liminares nas ADIs 6.298, 6.299, 6.300, 6.305 (Min. Fux) suspendem os artigos referentes ao juiz das garantias.","peg":"Pegadinha clássica: o instituto EXISTE no CPP, mas sua eficácia está SUSPENSA. Não está em vigor nem é inconstitucional (ainda)."},{"n":37,"enun":"No procedimento do júri, a quesitação sobre a materialidade do fato e a autoria deve ser obrigatoriamente feita antes de qualquer quesito sobre causas de exclusão de ilicitude.","gab":"CERTO","com":"CPP, art. 483: quesitos em ordem: (1) materialidade, (2) autoria ou participação, (3) se o acusado deve ser absolvido, (4) qualificadoras, (5) agravantes/atenuantes, (6) causas de aumento/diminuição. A ordem é legal e obrigatória.","fund":"CPP, art. 483, incisos I a V."},{"n":38,"enun":"A mutatio libelli, prevista no art. 384 do CPP, permite ao Ministério Público adicionar novos fatos à denúncia durante a instrução, sem que seja necessário aditamento formal, desde que os fatos sejam conexos com os já descritos.","gab":"ERRADO","com":"Mutatio libelli exige ADITAMENTO FORMAL da denúncia pelo MP quando surgem novos fatos (não mencionados na peça inicial). O juiz NÃO pode condenar por fato não narrado na denúncia sem o aditamento — corolário do princípio da correlação.","fund":"CPP, art. 384: 'Encerrada a instrução probatória, se entender cabível nova definição jurídica do fato, em consequência de prova existente nos autos de infração diversa da descrita na peça acusatória, o Ministério Público deverá aditar a denúncia.'"},{"n":39,"enun":"A transferência de preso para estabelecimento federal de segurança máxima, sem oitiva prévia do detento, não ofende o contraditório e a ampla defesa.","gab":"CERTO","com":"STJ Súmula 673: a transferência para presídio federal não precisa ser precedida de oitiva do preso. O interesse público na segurança e a urgência da medida justificam a dispensa.","fund":"Súmula 673 STJ: 'A transferência de presos para estabelecimento de segurança máxima federal, sem oitiva prévia do encarcerado, não viola o contraditório e a ampla defesa.'","jur_status":"OK"},{"n":40,"enun":"Consoante o STF, os tratados e convenções internacionais sobre direitos humanos aprovados antes da EC 45/2004 pelo procedimento comum (maioria simples) têm status constitucional, equiparando-se às emendas constitucionais.","gab":"ERRADO","com":"Tratados de DH aprovados antes da EC 45/2004 têm status supralegal (acima das leis ordinárias, mas abaixo da CF), conforme entendimento pacificado no RE 466.343 STF. Somente os aprovados APÓS a EC 45 pelo rito do §3º do art. 5º CF terão status de emenda constitucional.","fund":"STF RE 466.343/SP (Peluso, Pleno, j. 03/12/2008): tratados de DH = status supralegal. CF, art. 5º, §3º (EC 45/2004): quórum de emenda constitucional para equivalência futura.","peg":"Convenção Americana de DH (Pacto de São José) tem status supralegal — não constitucional (foi aprovada antes da EC 45 pelo procedimento comum).","jur_status":"OK"},{"n":41,"enun":"No processo penal, a ausência de defesa técnica durante todo o processo gera nulidade absoluta, mesmo que o réu não demonstre prejuízo concreto.","gab":"CERTO","com":"A defesa técnica é exigência constitucional (CF, art. 5º, LV). Sua ausência configura nulidade absoluta — no processo penal, a regra pas de nullité sans grief é mitigada quando se trata de garantias fundamentais do devido processo.","fund":"CPP, art. 261: 'Nenhum acusado, ainda que ausente ou foragido, será processado ou julgado sem defensor.' Nulidade absoluta reconhecida pela jurisprudência."},{"n":42,"enun":"A sentença condenatória no processo penal deve, obrigatoriamente, fixar o valor mínimo para reparação dos danos causados pela infração penal, com base nos prejuízos sofridos pelo ofendido.","gab":"CERTO","com":"CPP, art. 387, IV (redação dada pela Lei 11.719/2008): o juiz, ao proferir sentença condenatória, deve fixar o valor mínimo da reparação civil. Isso não impede liquidação posterior na esfera cível para apurar o valor integral.","fund":"CPP, art. 387, IV: 'O juiz, ao proferir sentença condenatória: [...] IV – fixará valor mínimo para reparação dos danos causados pela infração, considerando os prejuízos sofridos pelo ofendido.'"},{"n":43,"enun":"A execução da pena privativa de liberdade somente pode ter início após o trânsito em julgado da sentença penal condenatória, sendo inconstitucional a execução provisória da pena.","gab":"CERTO","com":"ADCs 43, 44 e 54 STF (07/11/2019) consagraram o entendimento: execução da pena só após trânsito em julgado. Superou o HC 126.292/2016 que havia autorizado a execução após 2ª instância. Art. 283 CPP é constitucional.","fund":"STF ADCs 43/44/54 (Marco Aurélio, Pleno, j. 07/11/2019): execução penal exige trânsito em julgado. CF, art. 5º, LVII. CPP, art. 283.","peg":"O HC 126.292 STF (2016) AUTORIZOU a execução após 2ª instância — mas foi SUPERADO pelas ADCs 43/44/54 em 2019. Cuidado para não confundir os marcos temporais."},{"n":44,"enun":"A ação civil ex delicto não pode ser ajuizada antes do trânsito em julgado da sentença penal condenatória, devendo o ofendido aguardar o fim do processo criminal.","gab":"ERRADO","com":"A ação civil pode ser ajuizada a qualquer tempo (antes, durante ou após o processo penal). O que ocorre é a possível suspensão até a conclusão do processo penal (art. 64 CPP), mas não há vedação ao ajuizamento imediato.","fund":"CPP, art. 64: 'Sem prejuízo do disposto no artigo anterior, a ação para ressarcimento do dano poderá ser proposta no juízo cível, contra o autor do crime e, se for caso, contra o responsável civil.'"},{"n":45,"enun":"No procedimento comum ordinário, encerrada a instrução probatória, a manifestação do Ministério Público em alegações finais orais precede a manifestação da defesa, sendo esta nulidade relativa caso a ordem seja invertida.","gab":"ERRADO","com":"Alegações finais orais devem seguir a ordem: MP → defesa. A inversão (defesa antes do MP) viola o contraditório e a ampla defesa. A doutrina e jurisprudência consideram nulidade ABSOLUTA (não relativa) quando a defesa não tem a última palavra.","fund":"CPP, art. 403: manifestação oral — MP fala primeiro (20 min), depois defesa (10 + 10 min). A ordem não é invertível — violação é nulidade absoluta.","peg":"Nulidade absoluta ≠ nulidade relativa. Nas alegações finais orais, a defesa TEM que ser a última a falar."},{"n":46,"enun":"O habeas corpus é cabível para proteger não apenas o direito à liberdade de locomoção, mas também quando há ameaça direta a este direito, mesmo que a restrição não tenha se consumado.","gab":"CERTO","com":"HC preventivo (salvo-conduto) é cabível quando há fundado temor de coação à liberdade — a restrição não precisa ter se efetivado. CF, art. 5º, LXVIII. Basta a ameaça fundada.","fund":"CF, art. 5º, LXVIII: 'Conceder-se-á habeas corpus sempre que alguém sofrer ou se achar ameaçado de sofrer violência ou coação em sua liberdade de locomoção, por ilegalidade ou abuso de poder.'"}]},{"nome":"Direito Constitucional e Legislação Complementar","comando":"Acerca da organização do Estado, dos direitos e garantias fundamentais, do controle de constitucionalidade e da segurança pública, julgue os itens a seguir.","itens":[{"n":47,"enun":"A República Federativa do Brasil tem como um de seus fundamentos a dignidade da pessoa humana, valor que permeia toda a ordem constitucional e impõe ao Estado o dever de proteção ativa dos direitos fundamentais.","gab":"CERTO","com":"CF, art. 1º, III: dignidade da pessoa humana é fundamento da República. É princípio-vetor de toda a ordem constitucional — incide sobre a interpretação de todos os direitos fundamentais.","fund":"CF, art. 1º, III. Doutrina: Robert Alexy e Ingo Sarlet (dignidade como 'mínimo existencial')."},{"n":48,"enun":"Os direitos fundamentais previstos na Constituição Federal de 1988 são absolutos, não admitindo qualquer restrição ou ponderação frente a outros valores constitucionais.","gab":"ERRADO","com":"Direitos fundamentais NÃO são absolutos. Podem ser restringidos mediante proporcionalidade/razoabilidade e por reserva legal qualificada. Até o direito à vida pode ceder em caso de guerra declarada (CF, art. 5º, XLVII, a).","fund":"CF, art. 5º + doutrina de limitações implícitas e explícitas. STF: princípio da proporcionalidade como critério de ponderação entre direitos fundamentais colidentes."},{"n":49,"enun":"O mandado de injunção, previsto no art. 5º, LXXI, da CF, é cabível quando a ausência de norma regulamentadora tornar inviável o exercício dos direitos e liberdades constitucionais e das prerrogativas inerentes à nacionalidade, à soberania e à cidadania.","gab":"CERTO","com":"O MI pressupõe: (1) norma constitucional de eficácia limitada; (2) lacuna normativa que inviabilize o exercício. O STF evoluiu para posição concretista geral (ex.: Lei 7.783/89 aplicada ao direito de greve dos servidores).","fund":"CF, art. 5º, LXXI: 'Conceder-se-á mandado de injunção sempre que a falta de norma regulamentadora torne inviável o exercício dos direitos e liberdades constitucionais e das prerrogativas inerentes à nacionalidade, à soberania e à cidadania.' + Lei 13.300/2016 (regulamenta o MI)."},{"n":50,"enun":"O controle difuso de constitucionalidade pode ser exercido por qualquer juiz ou tribunal, e a declaração de inconstitucionalidade, no âmbito do controle difuso, somente produz efeitos entre as partes do processo (inter partes).","gab":"CERTO","com":"No controle difuso, a decisão tem eficácia inter partes e efeito ex tunc (retroativo) para as partes. Para efeitos erga omnes e vinculantes, seria necessária Resolução do Senado (art. 52, X CF) ou reclamação constitucional — STF tem relativizado isso com a tese da abstrativização.","fund":"CF, art. 97 (cláusula de reserva de plenário) + art. 52, X CF (Senado pode dar efeitos erga omnes à declaração difusa do STF).","peg":"Tese da abstrativização (STF): algumas decisões em controle difuso do STF têm efeito vinculante prático mesmo sem resolução senatorial. O STF debate se o art. 52, X está 'em desuso'."},{"n":51,"enun":"A Ação Direta de Inconstitucionalidade (ADI) pode ter como objeto leis e atos normativos federais e estaduais, não sendo admissível o controle de constitucionalidade concentrado de normas municipais perante o STF.","gab":"CERTO","com":"ADI no STF: objeto é lei ou ato normativo federal ou estadual em face da CF (art. 102, I, a). Leis municipais não são objeto de ADI no STF; podem ser objeto de ADPF (subsidiária) ou de controle difuso.","fund":"CF, art. 102, I, a. STF: normas municipais não são objeto de ADI. São objeto de ADPF (Lei 9.882/99) quando inexistir outro instrumento de controle concentrado hábil."},{"n":52,"enun":"A cláusula de reserva de plenário (full bench) exige que os Tribunais somente declarem a inconstitucionalidade de lei por maioria absoluta de seus membros ou do respectivo órgão especial.","gab":"CERTO","com":"CF, art. 97: 'somente pelo voto da maioria absoluta de seus membros ou dos membros do respectivo órgão especial poderão os tribunais declarar a inconstitucionalidade de lei ou ato normativo do poder público.'","fund":"CF, art. 97. Súmula Vinculante 10 STF: viola a cláusula de reserva de plenário a decisão de órgão fracionário que, embora não declare inconstitucionalidade, afasta a incidência da norma.","peg":"Exceção: juízes singulares, turmas recursais dos Juizados e controle difuso realizado por juiz de 1ª instância não precisam do plenário.","jur_status":"PENDENTE"},{"n":53,"enun":"O Conselho Nacional de Justiça (CNJ) é órgão do Poder Judiciário dotado de função jurisdicional, podendo substituir decisões dos tribunais estaduais quando houver interesse público relevante.","gab":"ERRADO","com":"O CNJ exerce controle ADMINISTRATIVO, financeiro e disciplinar — não tem função jurisdicional. Não pode rever decisões judiciais ou substituir-se a tribunais. Sua competência é administrativa e correcional.","fund":"CF, art. 103-B + STF ADI 3.367/DF (Peluso, Pleno, j. 13/04/2005): CNJ é constitucional e tem competência administrativa, não jurisdicional.","jur_status":"OK"},{"n":54,"enun":"O princípio da simetria constitucional impõe que as Constituições Estaduais adotem modelo semelhante ao da CF no que se refere à estrutura e à separação de poderes, mas os Estados têm plena autonomia para criar novos órgãos não previstos na CF.","gab":"ERRADO","com":"O princípio da simetria limita a autonomia dos Estados: eles devem observar os padrões da CF na organização dos poderes. A criação de órgãos sem simetria com o modelo federal pode ser inconstitucional por desvio do princípio federativo.","fund":"CF, art. 25 (competências estaduais) c/c princípio da simetria. STF: ADI 2.417 e outras — Estados devem respeitar o modelo federal na organização dos poderes."},{"n":55,"enun":"O STF reconhece que o Ministério Público possui poderes investigatórios e pode presidir investigações criminais de forma autônoma, sem necessidade de delegação pelo Poder Judiciário.","gab":"CERTO","com":"STF Tema 184 (RE 593.727/MG): o MP pode conduzir investigações criminais diretamente, sem delegação judicial. É poder implícito das funções constitucionais do MP (art. 129 CF). O IP é exclusivo da polícia judiciária; a investigação do MP é procedimento autônomo.","fund":"STF RE 593.727/MG (Tema 184 RG): reconhece o poder investigatório do MP. CF, art. 129, I, VI, VII, VIII.","peg":"MP pode investigar; mas não pode presidir INQUÉRITO POLICIAL, que é atribuição exclusiva da autoridade policial (art. 144 CF + art. 4º CPP).","jur_status":"PENDENTE"},{"n":56,"enun":"Segundo a CF, a PCDF é organizada e mantida pela União, sendo subordinada ao Governador do Distrito Federal.","gab":"CERTO","com":"CF, art. 21, XIV: 'Compete à União: [...] XIV – organizar e manter a polícia civil, a polícia penal, a polícia militar e o corpo de bombeiros militar do Distrito Federal, bem como determinar efetivos.' O Governador exerce a chefia operacional — portanto a PCDF é federal no financiamento mas com chefia do Governador.","fund":"CF, art. 21, XIV c/c art. 144, §6º: as po
