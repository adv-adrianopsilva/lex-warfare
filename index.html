<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PCDF · Delegado 2026</title>
<!-- PWA -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0a0b14">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PCDF">
<link rel="apple-touch-icon" href="/icons/icon-180.png">
<link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png">
<link rel="apple-touch-icon" sizes="167x167" href="/icons/icon-167.png">
<link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180.png">
<link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png">
<style>
/* ── TOKENS ──────────────────────────────────────────────── */
:root{
  --bg:#0a0b0e; --surf:#12141a; --surf2:#181b24; --surf3:#1e2230;
  --bord:#252a3a; --bord2:#2e3448;
  --txt:#e4e8f4; --txt2:#7a8399; --txt3:#3d4562;
  --acc:#e8a020; --acc-dim:rgba(232,160,32,.13); --acc-glow:rgba(232,160,32,.28); --acc-bord:rgba(232,160,32,.32); --acc-bg:#1c1206;
  --green:#28c76f; --green-bg:rgba(40,199,111,.1); --green-bord:rgba(40,199,111,.3);
  --red:#f05252; --red-bg:rgba(240,82,82,.1); --red-bord:rgba(240,82,82,.3);
  --amber:#f59e0b; --amber-bg:rgba(245,158,11,.1); --amber-bord:rgba(245,158,11,.3);
  --mono:"SF Mono","Fira Code",monospace;
  --r:12px; --r-sm:8px; --r-xs:5px;
  --trans:140ms cubic-bezier(.4,0,.2,1);
  --shadow:0 2px 14px rgba(0,0,0,.5); --shadow-lg:0 4px 28px rgba(0,0,0,.65);
}
[data-theme=light]{
  --bg:#f1f3f8; --surf:#fff; --surf2:#f5f7fc; --surf3:#eef0f8;
  --bord:#dde2ef; --bord2:#cdd3e6;
  --txt:#0e1121; --txt2:#5a6380; --txt3:#9ea8c0;
  --acc:#c47c0a; --acc-dim:rgba(196,124,10,.08); --acc-glow:rgba(196,124,10,.2); --acc-bord:rgba(196,124,10,.28); --acc-bg:#fdf6e8;
  --green:#16a34a; --green-bg:rgba(22,163,74,.08); --green-bord:rgba(22,163,74,.28);
  --red:#dc2626; --red-bg:rgba(220,38,38,.08); --red-bord:rgba(220,38,38,.28);
  --amber:#d97706; --amber-bg:rgba(217,119,6,.08); --amber-bord:rgba(217,119,6,.28);
  --shadow:0 2px 8px rgba(0,0,0,.1); --shadow-lg:0 4px 16px rgba(0,0,0,.15);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;font-size:15px;line-height:1.6;transition:background var(--trans),color var(--trans)}
button{font-family:inherit;cursor:pointer}

/* ── HEADER ──────────────────────────────────────────────── */
.hdr{position:sticky;top:0;z-index:100;background:var(--surf);border-bottom:1px solid var(--bord);box-shadow:var(--shadow)}
.hdr-inner{max-width:860px;margin:0 auto;display:flex;align-items:center;gap:10px;height:62px;padding:0 18px}
.hdr-brand{display:flex;align-items:center;gap:11px;flex:1;min-width:0}
.delta-badge{width:42px;height:42px;border-radius:10px;background:var(--acc);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:#0a0b0e;flex-shrink:0;letter-spacing:-.02em;box-shadow:0 2px 10px var(--acc-glow)}
.hdr-name{font-weight:800;font-size:16.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.01em}
.hdr-date{font-size:12px;color:var(--txt2);margin-top:1px}
.hdr-chips{display:flex;gap:5px;align-items:center;flex-shrink:0}
.chip{border-radius:6px;padding:2px 9px;font-size:12px;font-weight:700}
.chip.g{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bord)}
.chip.r{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bord)}
.chip.n{background:var(--surf2);color:var(--txt2);border:1px solid var(--bord)}
.chip.t{background:var(--acc-dim);color:var(--acc);border:1px solid var(--acc-bord)}
.hdr-timer-wrap{display:flex;align-items:center;gap:6px;flex-shrink:0;background:var(--surf2);border:1px solid var(--bord);border-radius:8px;padding:5px 10px}
.hdr-timer-wrap.hidden{display:none!important}
.hdr-timer-wrap svg.clock-ic{width:17px;height:17px;color:var(--acc);flex-shrink:0}
.hdr-timer-txt{font-size:15px;font-weight:700;color:var(--txt);font-variant-numeric:tabular-nums;min-width:38px}
#btn-pause{background:transparent;border:none;cursor:pointer;padding:0 2px;font-size:14px;color:var(--txt2);line-height:1;transition:color var(--trans)}
#btn-pause:hover{color:var(--acc)}
#btn-pause.paused{color:var(--acc)}
/* Overlay de pausa */
#pause-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.72);backdrop-filter:blur(6px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px}
#pause-overlay.hidden{display:none!important}
.pause-card{background:var(--surf1);border:1px solid var(--bord);border-radius:16px;padding:40px 56px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:14px}
.pause-icon{font-size:48px;line-height:1}
.pause-title{font-size:22px;font-weight:700;color:var(--txt)}
.pause-sub{font-size:14px;color:var(--txt2)}
.pause-resume{background:var(--acc);color:#000;border:none;border-radius:10px;padding:13px 36px;font-size:16px;font-weight:700;cursor:pointer;transition:opacity var(--trans)}
.pause-resume:hover{opacity:.85}
.hdr-actions{display:flex;gap:3px;flex-shrink:0}
.icon-btn{background:var(--surf2);border:1px solid var(--bord);color:var(--txt2);border-radius:7px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all var(--trans)}
.icon-btn:hover{background:var(--acc-dim);border-color:var(--acc-bord);color:var(--acc)}
.prog-rail{height:2px;background:var(--surf3)}
.prog-fill{height:2px;background:var(--acc);transition:width .4s}

/* ── COVER ───────────────────────────────────────────────── */
.cover{max-width:580px;margin:0 auto;padding:48px 18px 80px;text-align:center;animation:fadeIn .4s ease}
.cover-kicker{font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--acc);font-weight:700;margin-bottom:16px}
.cover h1{font-size:clamp(32px,5vw,48px);font-weight:800;font-style:italic;margin-bottom:14px;line-height:1.1}
.cover-lead{font-size:16px;color:var(--txt2);margin-bottom:32px;line-height:1.5}
.cover-card{background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);padding:24px;text-align:left;box-shadow:var(--shadow)}
.meta-grid{display:grid;grid-template-columns:auto 1fr;gap:7px 18px;font-size:13.5px;margin-bottom:18px}
.meta-grid dt{color:var(--txt3);font-size:11px;letter-spacing:.08em;text-transform:uppercase;align-self:center}
.meta-grid dd{color:var(--txt);margin:0;font-weight:500}
.cover-note{font-size:13.5px;color:var(--txt2);font-style:italic;padding:12px 14px;background:var(--surf2);border-left:3px solid var(--acc-bord);border-radius:0 var(--r-xs) var(--r-xs) 0;margin-bottom:22px;line-height:1.5}
.cover-actions{display:flex;flex-direction:column;gap:10px}
.cover-countdown{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:18px;flex-wrap:wrap}
.ccd-box{text-align:center;background:var(--surf2);border:1px solid var(--bord2);border-radius:var(--r-sm);padding:10px 16px;min-width:62px}
.ccd-num{font-size:28px;font-weight:900;font-style:italic;line-height:1;color:var(--acc)}
.ccd-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--txt3);margin-top:2px}
.ccd-sep{font-size:22px;font-weight:900;color:var(--bord2);margin-bottom:12px}
.sr-due-nudge{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--red-bg);border:1px solid var(--red-bord);border-radius:var(--r-sm);font-size:13px;color:var(--red);margin-bottom:14px;cursor:pointer;transition:background .15s}
.sr-due-nudge:hover{background:rgba(240,82,82,.18)}
.btn-primary{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 28px;background:var(--acc);color:#0a0b0e;border:none;border-radius:var(--r-sm);font-weight:800;font-size:15px;letter-spacing:.02em;transition:all var(--trans);box-shadow:0 4px 16px var(--acc-glow)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px var(--acc-glow)}
.btn-ghost{background:var(--surf2);border:1px solid var(--bord);color:var(--txt2);padding:10px 20px;border-radius:var(--r-sm);font-size:14px;transition:all var(--trans)}
.btn-ghost:hover{border-color:var(--bord2);color:var(--txt)}

/* ── PROVA TOOLBAR ───────────────────────────────────────── */
.tb{position:sticky;top:54px;z-index:90;background:var(--surf);border-bottom:1px solid var(--bord);backdrop-filter:blur(8px)}
.tb-inner{max-width:860px;margin:0 auto;display:flex;align-items:center;gap:8px;padding:8px 18px;flex-wrap:wrap}
.tb-info{font-size:13px;color:var(--txt2);font-variant-numeric:tabular-nums}
.tb-info b{color:var(--txt)}
.tb-spacer{flex:1}
.tb-btn{background:var(--surf2);border:1px solid var(--bord);border-radius:var(--r-sm);padding:6px 13px;font-size:12.5px;color:var(--txt);transition:all var(--trans);display:inline-flex;align-items:center;gap:6px}
.tb-btn:hover{border-color:var(--bord2);background:var(--surf3)}
.tb-btn.danger{border-color:var(--acc-bord);color:var(--acc);background:var(--acc-dim)}
.tb-btn.danger:hover{background:var(--acc-bg)}
.tb-btn svg{width:12px;height:12px}

/* ── PROVA CONTENT ───────────────────────────────────────── */
#prova-wrap{max-width:860px;margin:0 auto;padding:24px 18px 100px}

/* Discipline header */
.disc-section{margin-bottom:48px}
.disc-hdr{text-align:left;margin:40px 0 16px;background:var(--surf);border-top:3px solid var(--acc);border-bottom:1px solid var(--bord);padding:13px 0 11px;position:relative}
.disc-hdr h3{font-weight:800;font-size:20px;letter-spacing:-.01em;text-transform:none;color:var(--txt);display:flex;align-items:center;gap:10px}

.comando{background:var(--surf2);border:1px solid var(--bord);border-radius:var(--r-sm);padding:12px 16px;font-size:14px;color:var(--txt2);margin-bottom:16px;font-style:italic;line-height:1.5}

/* Question block */
.q-block{border-top:1px solid var(--bord);padding:16px 0;scroll-margin-top:100px}
.q-block:first-of-type{border-top:none;padding-top:4px}
.q-line{display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:start}
.q-tag{display:inline-flex;align-items:center;gap:6px;font-weight:800;font-size:13px;color:var(--acc);flex-shrink:0;padding-top:2px;white-space:nowrap}
.q-tag::before{content:'';width:8px;height:12px;background:var(--acc);clip-path:polygon(0 0,80% 0,100% 50%,80% 100%,0 100%);display:inline-block}
.q-text{font-size:15.5px;line-height:1.65;color:var(--txt)}
.q-text .situacao{display:block;font-style:italic;color:var(--txt2);margin-bottom:8px;padding-left:12px;border-left:2px solid var(--bord2)}
.q-marks{display:flex;gap:6px;flex-shrink:0;padding-top:1px}
.q-mark{width:40px;height:40px;border:1.5px solid var(--bord);border-radius:var(--r-sm);background:var(--surf2);font-weight:800;font-size:14px;color:var(--txt2);display:inline-flex;align-items:center;justify-content:center;transition:all var(--trans)}
.q-mark:hover:not(:disabled){border-color:var(--txt2);color:var(--txt);transform:translateY(-1px)}
.q-mark.sel-c{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.q-mark.sel-e{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.q-mark:disabled{opacity:.5;cursor:default}
/* After gabarito shown, ring correct/wrong */
.q-block.gab-on .q-mark.sel-c.is-right,.q-block.gab-on .q-mark.sel-e.is-right{box-shadow:0 0 0 2px var(--green-bg),0 0 0 3px var(--green)}
.q-block.gab-on .q-mark.sel-c.is-wrong,.q-block.gab-on .q-mark.sel-e.is-wrong{box-shadow:0 0 0 2px var(--red-bg),0 0 0 3px var(--red)}

.q-actions-row{margin-top:10px;padding-left:92px;display:flex;align-items:center;gap:10px}
.q-show-gab{background:transparent;border:1px dashed var(--bord2);border-radius:var(--r-xs);padding:3px 11px;font-size:12px;color:var(--txt3);transition:all var(--trans)}
.q-show-gab:hover{border-style:solid;border-color:var(--acc-bord);color:var(--acc)}
.q-status{font-size:11.5px;color:var(--txt3)}
.q-status .ok{color:var(--green);font-weight:600}
.q-status .er{color:var(--red);font-weight:600}

/* Feedback */
.q-feedback{margin-top:14px;border-radius:var(--r-sm);overflow:hidden;border:1px solid var(--bord);animation:fadeUp .2s ease}
.gab-line{display:flex;align-items:center;gap:8px;padding:9px 14px;background:var(--surf2);border-bottom:1px solid var(--bord);font-size:13px;font-weight:700}
.gab-label{color:var(--txt3);font-size:10px;letter-spacing:.1em;text-transform:uppercase;font-weight:600}
.gab-value{color:var(--txt)}
.gab-badge{margin-left:auto;font-size:11.5px;padding:2px 10px;border-radius:99px;font-weight:700}
.gab-badge.ok{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bord)}
.gab-badge.er{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bord)}
.gab-badge.bk{background:var(--surf3);color:var(--txt3);border:1px solid var(--bord)}

.gab-section{border-top:1px solid var(--bord);background:var(--surf)}
.gab-hdr{display:flex;align-items:center;gap:8px;padding:9px 14px;cursor:pointer;font-size:13px;font-weight:600;background:var(--surf2);border:none;width:100%;text-align:left;color:var(--txt);transition:background var(--trans)}
.gab-hdr:hover{background:var(--surf3)}
.gab-icon{flex-shrink:0}
.gab-lbl{flex:1}
.gab-chev{font-size:11px;color:var(--txt3);transition:transform var(--trans)}
.gab-chev.open{transform:rotate(180deg)}
.gab-body{padding:12px 14px;font-size:14px;line-height:1.7;color:var(--txt2)}
.gab-body.hidden{display:none}
.feynman-text{color:var(--txt);font-size:14.5px;line-height:1.75}
.law-block{font-family:var(--mono);font-size:12px;background:var(--surf2);border:1px solid var(--bord);border-radius:var(--r-xs);padding:11px 13px;white-space:pre-wrap;line-height:1.65;color:var(--txt)}
.copy-btn{display:inline-flex;align-items:center;gap:5px;margin-top:8px;font-size:11.5px;padding:4px 12px;border-radius:5px;border:1px solid var(--bord2);background:var(--surf3);color:var(--txt3);cursor:pointer;transition:all var(--trans);font-family:inherit}
.copy-btn:hover{color:var(--acc);border-color:var(--acc-bord);background:var(--acc-dim)}
.peg-box{display:flex;gap:8px;align-items:flex-start;background:var(--amber-bg);border:1px solid var(--amber-bord);border-radius:var(--r-xs);padding:10px 13px;font-size:13px;color:var(--amber);line-height:1.55}

/* ── TRAP WORDS (Releitura Crítica) ──────────────────────── */
.trap-word{font-weight:800;color:var(--acc);background:var(--acc-dim);border-bottom:2px solid var(--acc);padding:0 3px;border-radius:3px}
.releitura-body{font-size:14.5px;line-height:1.8;color:var(--txt);margin-bottom:10px}
.releitura-body .situacao{display:block;font-style:italic;color:var(--txt2);margin-bottom:8px;padding-left:12px;border-left:2px solid var(--bord2)}
.trap-legend{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--txt3);margin-top:6px;flex-wrap:wrap}
.trap-legend .trap-word{font-size:11.5px;cursor:default}
.trap-found{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;color:var(--acc);font-weight:700}

/* ── AUTOAVALIAÇÃO ────────────────────────────────────────── */
.avaliacao-row{padding:11px 14px;background:var(--surf2);border-top:1px solid var(--bord);display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.avaliacao-lbl{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--txt3);font-weight:600;width:100%;margin-bottom:2px}
.av-btn{border-radius:99px;padding:5px 13px;font-size:12.5px;font-weight:700;border:1.5px solid;cursor:pointer;font-family:inherit;transition:all var(--trans);background:transparent}
.av-btn.dom{border-color:var(--green-bord);color:var(--green)}
.av-btn.dom:hover,.av-btn.dom.sel{background:var(--green-bg);box-shadow:0 0 0 2px var(--green-bord)}
.av-btn.dvd{border-color:var(--amber-bord);color:var(--amber)}
.av-btn.dvd:hover,.av-btn.dvd.sel{background:var(--amber-bg);box-shadow:0 0 0 2px var(--amber-bord)}
.av-btn.lac{border-color:var(--red-bord);color:var(--red)}
.av-btn.lac:hover,.av-btn.lac.sel{background:var(--red-bg);box-shadow:0 0 0 2px var(--red-bord)}
.av-btn.leit{border-color:var(--bord2);color:var(--txt2)}
.av-btn.leit:hover,.av-btn.leit.sel{background:var(--surf3);color:var(--txt);box-shadow:0 0 0 2px var(--bord2)}
.av-set{display:flex;align-items:center;gap:8px;padding:9px 14px;background:var(--surf2);border-top:1px solid var(--bord);font-size:13px}
.av-chip{border-radius:99px;padding:3px 12px;font-size:12px;font-weight:700;border:1.5px solid}
.av-chip.dom{background:var(--green-bg);color:var(--green);border-color:var(--green-bord)}
.av-chip.dvd{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-bord)}
.av-chip.lac{background:var(--red-bg);color:var(--red);border-color:var(--red-bord)}
.av-chip.leit{background:var(--surf3);color:var(--txt2);border-color:var(--bord2)}
.av-change{margin-left:auto;background:transparent;border:1px dashed var(--bord2);border-radius:var(--r-xs);padding:2px 9px;font-size:11.5px;color:var(--txt3);cursor:pointer;font-family:inherit;transition:all var(--trans)}
.av-change:hover{color:var(--acc);border-color:var(--acc-bord)}

/* ── DIAGNÓSTICO (Placar) ─────────────────────────────────── */
.diag-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--bord);border:1px solid var(--bord);border-radius:10px;overflow:hidden;margin-bottom:14px}
@media(max-width:600px){.diag-grid{grid-template-columns:repeat(2,1fr)}}
.diag-cell{background:var(--surf2);padding:14px 10px;text-align:center}
.diag-cell .dn{font-size:26px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums}
.diag-cell .dl{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--txt3);margin-top:5px;font-weight:600;line-height:1.3}
.diag-empty{color:var(--txt3);font-size:14px;font-style:italic;padding:12px 0}

/* ── REVISÃO ──────────────────────────────────────────────── */
#rev-wrap{max-width:860px;margin:0 auto;padding:0 0 100px}
.rev-picker{max-width:580px;margin:0 auto;padding:36px 18px 60px;animation:fadeIn .3s ease}
.rev-picker h2{font-size:clamp(22px,4vw,32px);font-weight:800;font-style:italic;margin-bottom:6px}
.rev-picker .sub{font-size:15px;color:var(--txt2);margin-bottom:28px;line-height:1.5}
.filter-sec-lbl{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--txt3);font-weight:700;margin:22px 0 10px}
.filter-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
@media(max-width:480px){.filter-grid{grid-template-columns:1fr}}
.filter-card{background:var(--surf);border:1.5px solid var(--bord);border-radius:var(--r);padding:15px 16px;text-align:left;cursor:pointer;transition:all var(--trans);font-family:inherit;display:flex;flex-direction:column;gap:3px}
.filter-card:hover:not(:disabled){border-color:var(--acc-bord);background:var(--acc-dim)}
.filter-card.sel{border-color:var(--acc);background:var(--acc-dim);box-shadow:0 0 0 1.5px var(--acc)}
.filter-card:disabled{opacity:.35;cursor:not-allowed;pointer-events:none}
.fc-icon{font-size:20px}
.fc-count{font-size:28px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums}
.fc-count.cr{color:var(--red)}.fc-count.ca{color:var(--amber)}.fc-count.cg{color:var(--green)}.fc-count.ct{color:var(--txt)}
.fc-label{font-size:12px;color:var(--txt2);font-weight:600}
.disc-filter-row{display:flex;flex-wrap:wrap;gap:7px}
.disc-btn{background:var(--surf2);border:1.5px solid var(--bord);border-radius:99px;padding:5px 14px;font-size:13px;font-family:inherit;color:var(--txt2);cursor:pointer;transition:all var(--trans);font-weight:500}
.disc-btn:hover{border-color:var(--acc-bord);color:var(--acc)}
.disc-btn.sel{border-color:var(--acc);color:var(--acc);background:var(--acc-dim)}
.mode-box{background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);overflow:hidden;margin-bottom:24px}
.mode-tabs{display:grid;grid-template-columns:1fr 1fr}
.mode-tab{border:none;background:var(--surf2);color:var(--txt2);font-size:14px;font-weight:700;padding:12px 8px;cursor:pointer;font-family:inherit;border-bottom:2px solid transparent;transition:all var(--trans);display:flex;align-items:center;justify-content:center;gap:6px}
.mode-tab:first-child{border-right:1px solid var(--bord)}
.mode-tab.active{background:var(--surf);color:var(--acc);border-bottom-color:var(--acc)}
.mode-desc-txt{font-size:13px;color:var(--txt2);padding:11px 14px;line-height:1.55;border-top:1px solid var(--bord)}
.rev-tb{position:sticky;top:54px;z-index:90;background:var(--surf);border-bottom:1px solid var(--bord)}
.rev-tb-inner{max-width:860px;margin:0 auto;display:flex;align-items:center;gap:8px;padding:7px 18px;flex-wrap:wrap}
.rev-badge{background:var(--acc-dim);border:1px solid var(--acc-bord);color:var(--acc);border-radius:99px;padding:3px 12px;font-size:12px;font-weight:700;flex-shrink:0}
.rev-orig{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;padding:2px 9px;border-radius:99px;font-weight:600;flex-shrink:0}
.rev-orig.ok{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bord)}
.rev-orig.er{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bord)}
.rev-orig.bk{background:var(--surf3);color:var(--txt3);border:1px solid var(--bord)}
.rev-placar-wrap{max-width:580px;margin:0 auto;padding:32px 18px 100px;animation:fadeUp .4s ease}

/* ── ESPAÇAMENTO INTELIGENTE ──────────────────────────────── */
.sr-badge{display:inline-flex;align-items:center;gap:3px;font-size:10.5px;font-weight:700;border-radius:4px;padding:2px 7px;line-height:1.4;white-space:nowrap}
.sr-badge.due{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bord)}
.sr-badge.soon{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bord)}
.sr-badge.ok{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bord)}
.sr-queue-section{margin-bottom:20px}
.sr-queue-hdr{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--red);font-weight:700;margin-bottom:10px}
.sr-queue-row{display:flex;align-items:center;gap:10px;padding:9px 14px;border-radius:var(--r-sm);background:var(--surf);border:1.5px solid var(--red-bord);margin-bottom:7px;cursor:default;transition:background .15s}
.sr-queue-date{font-size:11px;color:var(--txt3);min-width:52px}
.sr-queue-title{flex:1;font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sr-queue-pct{font-size:13px;font-weight:700;min-width:38px;text-align:right}
.sr-interval-info{font-size:11px;color:var(--txt3);margin-top:4px}
/* ── MODO FOCO ────────────────────────────────────────────── */
#sec-foco{position:fixed;inset:0;z-index:150;background:var(--bg);overflow-y:auto;display:flex;flex-direction:column}
#sec-foco.hidden{display:none!important}
.foco-hdr{position:sticky;top:0;z-index:10;background:var(--bg);border-bottom:1px solid var(--bord2);padding:10px 18px;display:flex;align-items:center;gap:12px}
.foco-qnum{font-size:13px;font-weight:700;color:var(--txt2);white-space:nowrap}
.foco-disc{font-size:11.5px;color:var(--txt3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0}
.foco-prog-wrap{display:flex;align-items:center;gap:8px;min-width:110px}
.foco-progress{height:4px;background:var(--bord);border-radius:2px;flex:1}
.foco-prog-fill{height:100%;background:var(--acc);border-radius:2px;transition:width .4s}
.foco-pct{font-size:11px;font-weight:700;color:var(--acc);min-width:28px;text-align:right}
.foco-body{flex:1;max-width:800px;margin:0 auto;padding:28px 20px 16px;width:100%;animation:fadeIn .2s ease}
.foco-body .q-block{border-color:var(--bord2)}
.foco-body .q-text{font-size:16px;line-height:1.8}
.foco-body .q-tag{font-size:14px;width:42px;height:42px;line-height:42px}
.foco-body .q-mark{height:52px;font-size:17px;font-weight:900;min-width:80px}
.foco-body .q-marks{gap:14px}
.foco-nav{max-width:800px;margin:0 auto 40px;padding:0 20px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.foco-nav-hint{font-size:11px;color:var(--txt3);text-align:center;line-height:1.6}
/* ── QUESTION TIMER ──────────────────────────────────────── */
.qt-badge{display:inline-flex;align-items:center;gap:3px;font-size:10.5px;font-weight:700;border-radius:4px;padding:2px 7px;font-variant-numeric:tabular-nums;letter-spacing:.02em;transition:background .35s,color .35s,border-color .35s;min-width:36px;justify-content:center}
.qt-idle{color:var(--txt3);background:transparent}
.qt-normal{background:var(--surf3);color:var(--txt2)}
.qt-warn{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bord)}
.qt-alert{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bord);animation:qtPulse 1s ease-in-out infinite}
.qt-done{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bord)}
@keyframes qtPulse{0%,100%{opacity:1}50%{opacity:.5}}
#qt-pill{position:fixed;bottom:62px;left:50%;transform:translateX(-50%);max-width:860px;width:calc(100% - 32px);z-index:80;pointer-events:none;display:flex;justify-content:flex-end}
.qt-active-pill{background:var(--surf2);border:1px solid var(--bord2);border-radius:20px;padding:5px 14px;font-size:12px;font-weight:700;color:var(--txt2);display:flex;align-items:center;gap:7px;box-shadow:0 2px 12px rgba(0,0,0,.35)}
.qt-active-pill.qt-warn-p{color:var(--amber)}
.qt-active-pill.qt-alert-p{color:var(--red);animation:qtPulse 1s ease-in-out infinite}
/* ── HISTÓRICO ────────────────────────────────────────────── */
#hist-wrap{max-width:860px;margin:0 auto;padding:24px 18px 100px;animation:fadeUp .4s ease}
.hist-header{display:grid;grid-template-columns:62px 72px 50px 68px 60px 1fr 80px;gap:8px;padding:7px 0;border-bottom:2px solid var(--bord);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--txt3);font-weight:700}
.hist-row{display:grid;grid-template-columns:62px 72px 50px 68px 60px 1fr 80px;gap:8px;padding:10px 0;border-top:1px solid var(--bord);font-size:13.5px;align-items:center}
.hist-row:first-child{border-top:none}
.hist-date{color:var(--txt2);font-size:12.5px;font-variant-numeric:tabular-nums;font-weight:600}
.hist-acertos{color:var(--txt);font-variant-numeric:tabular-nums}
.hist-pct{font-weight:800;font-variant-numeric:tabular-nums}
.hist-tempo{color:var(--txt3);font-size:12px;font-variant-numeric:tabular-nums}
.hist-saldo{font-weight:700;font-variant-numeric:tabular-nums}
.hist-av{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.hist-empty{text-align:center;padding:60px 20px}
.hist-empty .hist-emoji{font-size:52px;margin-bottom:18px}
.hist-empty h2{font-size:22px;font-weight:800;margin-bottom:10px}
.hist-empty p{color:var(--txt2);font-size:15px;max-width:340px;margin:0 auto 28px}
.streak-badge{display:inline-flex;align-items:center;gap:5px;background:var(--amber-bg);border:1px solid var(--amber-bord);color:var(--amber);border-radius:99px;padding:3px 12px;font-size:13px;font-weight:700;margin-left:8px}
@media(max-width:600px){
  .hist-header,.hist-row{grid-template-columns:55px 62px 46px 1fr}
  .hist-tempo,.hist-av{display:none}
}

/* ── PLACAR ──────────────────────────────────────────────── */
#placar-wrap{max-width:860px;margin:0 auto;padding:24px 18px 100px;animation:fadeUp .4s ease}
.placar-hero{background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);padding:32px 28px;box-shadow:var(--shadow);margin-bottom:20px;text-align:center}
.placar-kicker{font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--acc);font-weight:700;margin-bottom:14px}
.placar-hero h2{font-size:clamp(28px,4.5vw,40px);font-weight:800;font-style:italic;margin-bottom:8px}
.placar-lead{font-size:15px;color:var(--txt2);margin-bottom:24px}
.placar-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--bord);border:1px solid var(--bord);border-radius:10px;overflow:hidden}
@media(max-width:600px){.placar-stats{grid-template-columns:repeat(2,1fr)}}
.p-stat{background:var(--surf2);padding:16px 10px;text-align:center}
.p-stat .n{font-weight:800;font-size:30px;line-height:1;font-variant-numeric:tabular-nums}
.p-stat .n.g{color:var(--green)}.p-stat .n.r{color:var(--red)}.p-stat .n.a{color:var(--acc)}.p-stat .n.t{color:var(--txt)}
.p-stat .l{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--txt3);margin-top:5px;font-weight:600}

.pl-box{background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);padding:22px;margin-bottom:20px;box-shadow:var(--shadow)}
.pl-title{font-weight:700;font-size:16px;margin-bottom:16px;color:var(--txt)}
.cebraspe-formula{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:14px 16px;background:var(--surf2);border-radius:var(--r-sm);margin-bottom:14px;font-size:14px;border:1px solid var(--bord)}
.cebraspe-formula .part{color:var(--txt2)}
.cebraspe-formula .part b{color:var(--txt);font-weight:700}
.cebraspe-formula .eq{font-weight:800;font-size:20px;color:var(--acc);font-variant-numeric:tabular-nums}
.cebraspe-verdict{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:var(--r-sm);font-weight:700;font-size:14px;border:1px solid}
.cebraspe-verdict.approved{background:var(--green-bg);color:var(--green);border-color:var(--green-bord)}
.cebraspe-verdict.reproved{background:var(--red-bg);color:var(--red);border-color:var(--red-bord)}

/* Discipline chart */
.disc-chart-row{display:grid;grid-template-columns:1.4fr 2.5fr auto auto;gap:12px;align-items:center;padding:9px 0;border-top:1px solid var(--bord);font-size:13.5px}
.disc-chart-row:first-of-type{border-top:none}
.disc-chart-row .nm{color:var(--txt);font-weight:500}
.bar-rail{height:9px;background:var(--surf2);border-radius:99px;overflow:hidden;border:1px solid var(--bord)}
.bar-fill{height:100%;border-radius:99px;transition:width .6s}
.disc-chart-row .frac{color:var(--txt3);font-size:12px;font-variant-numeric:tabular-nums}
.disc-chart-row .pct{font-weight:700;font-size:13px;min-width:40px;text-align:right;font-variant-numeric:tabular-nums}
@media(max-width:600px){.disc-chart-row{grid-template-columns:1fr auto;gap:5px 12px}.bar-rail{grid-column:1/-1;order:3}.disc-chart-row .frac{order:4}}

/* Errors list */
.err-item{border-top:1px solid var(--bord);padding:12px 0}
.err-item:first-child{border-top:none}
.err-row{display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:start;font-size:13.5px}
.err-num{font-weight:800;color:var(--red);font-variant-numeric:tabular-nums;min-width:32px;padding-top:2px}
.err-sub{color:var(--txt);line-height:1.4}
.err-sub small{display:block;color:var(--txt3);font-size:11.5px;margin-top:2px}
.err-toggle{background:var(--surf2);border:1px solid var(--bord);border-radius:var(--r-xs);padding:4px 12px;font-size:12px;color:var(--txt2);transition:all var(--trans);font-family:inherit;white-space:nowrap;display:inline-flex;align-items:center;gap:5px}
.err-toggle:hover{border-color:var(--acc-bord);color:var(--acc);background:var(--acc-dim)}
.err-toggle.open{border-color:var(--acc-bord);color:var(--acc);background:var(--acc-dim)}
.err-gab{display:none;margin-top:12px;border-radius:var(--r-sm);overflow:hidden;border:1px solid var(--bord)}
.err-gab.open{display:block;animation:fadeUp .2s ease}
.placar-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:24px}

/* ── FAB NAV ─────────────────────────────────────────────── */
.fab{position:fixed;right:20px;bottom:72px;width:46px;height:46px;background:var(--acc);color:#0a0b0e;border:none;border-radius:50%;box-shadow:0 4px 16px var(--acc-glow);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;z-index:44;transition:all var(--trans)}
.fab:hover{transform:scale(1.08)}
.fab.hidden{display:none}
.quick-nav{position:fixed;right:20px;bottom:124px;width:auto;min-width:240px;background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);padding:12px;box-shadow:var(--shadow-lg);z-index:45;max-width:320px;max-height:55vh;overflow-y:auto;display:none}
.quick-nav.open{display:block;animation:fadeUp .2s ease}
.qn-title{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--txt3);margin-bottom:8px;font-weight:600}
.qn-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:4px}
.qn-btn{width:30px;height:30px;border:1px solid var(--bord);background:var(--surf2);border-radius:6px;font-size:10.5px;font-weight:700;color:var(--txt3);transition:all .1s;font-variant-numeric:tabular-nums}
.qn-btn:hover{border-color:var(--acc-bord);color:var(--acc);transform:scale(1.08)}
.qn-btn.ac{background:var(--green-bg);border-color:var(--green-bord);color:var(--green)}
.qn-btn.ae{background:var(--red-bg);border-color:var(--red-bord);color:var(--red)}
.qn-btn.gs{border-style:dashed}
.qn-btn.qa{box-shadow:0 0 0 2px var(--red);animation:qtPulse 1.2s ease-in-out infinite}
@keyframes qFlash{0%{box-shadow:0 0 0 3px var(--acc-glow),0 0 18px var(--acc-glow)}60%{box-shadow:0 0 0 2px var(--acc-bord)}100%{box-shadow:none}}
.q-kb-flash{animation:qFlash .55s ease-out}

/* ── PROGRESS BAR (bottom fixed) ─────────────────────────── */
.bot-bar{position:fixed;bottom:0;left:0;right:0;background:var(--surf);border-top:1px solid var(--bord);padding:8px 18px;display:flex;align-items:center;gap:12px;z-index:40;font-size:12px;color:var(--txt2)}
.bot-bar.hidden{transform:translateY(100%);opacity:0;pointer-events:none}
.bot-bar .bbar{flex:1;height:6px;background:var(--surf3);border-radius:99px;overflow:hidden}
.bot-bar .bbar-fill{height:100%;background:var(--acc);transition:width .4s;border-radius:99px}
.bot-bar .bstats{display:flex;gap:10px;flex-shrink:0;font-variant-numeric:tabular-nums}
.bot-bar .bstats .ok{color:var(--green);font-weight:600}.bot-bar .bstats .er{color:var(--red);font-weight:600}

/* ── MODAL ───────────────────────────────────────────────── */
.modal-ov{position:fixed;inset:0;background:rgba(8,9,14,.65);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;padding:18px;animation:fadeIn .2s ease}
.modal{background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);padding:26px;max-width:420px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.5);animation:fadeUp .2s ease}
.modal h3{font-size:19px;font-weight:800;margin-bottom:10px}
.modal p{color:var(--txt2);margin-bottom:20px;font-size:14px;line-height:1.55}
.modal-acts{display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap}
.btn-danger{background:var(--red);color:white;border:none;border-radius:var(--r-sm);padding:9px 18px;font-family:inherit;font-weight:700;font-size:14px;transition:opacity var(--trans)}
.btn-danger:hover{opacity:.88}
.btn-warn{background:var(--amber);color:white;border:none;border-radius:var(--r-sm);padding:9px 18px;font-family:inherit;font-weight:700;font-size:14px;transition:opacity var(--trans)}
.btn-warn:hover{opacity:.88}

/* ── TOAST ───────────────────────────────────────────────── */
.toast{position:fixed;bottom:56px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--surf);border:1px solid var(--bord);color:var(--txt);padding:11px 18px;border-radius:var(--r-sm);font-size:13.5px;z-index:300;opacity:0;transition:opacity .25s,transform .25s;box-shadow:var(--shadow-lg);pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── ANIMATIONS ──────────────────────────────────────────── */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.hidden{display:none!important}

/* ── RESPONSIVE ──────────────────────────────────────────── */
@media(max-width:640px){
  .hdr-inner{padding:0 12px}.hdr-chips{gap:4px}
  .chip{padding:2px 7px;font-size:11px}
  #prova-wrap,#placar-wrap{padding:16px 12px 100px}
  .q-text{font-size:14.5px}
  .prova-title h2{font-size:16px}
  .placar-stats{grid-template-columns:repeat(2,1fr)}
  .q-actions-row{padding-left:0;flex-wrap:wrap}
}
</style>
</head>
<body>

<!-- ══ HEADER ════════════════════════════════════════════ -->
<header class="hdr" id="hdr">
  <div class="hdr-inner">
    <div class="hdr-brand">
      <div class="delta-badge">Δ</div>
      <div>
        <div class="hdr-name">PCDF · Delegado 2026</div>
        <div class="hdr-date" id="hdr-date"></div>
      </div>
    </div>
    <div class="hdr-timer-wrap hidden" id="hdr-timer">
      <svg class="clock-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
      </svg>
      <span class="hdr-timer-txt" id="hdr-timer-txt">0:00</span>
      <button id="btn-pause" title="Pausar / retomar" onclick="togglePause()">⏸</button>
    </div>
    <div class="hdr-chips" id="hdr-chips" style="display:none">
      <span class="chip g" id="c-ok">✓ 0</span>
      <span class="chip r" id="c-er">✗ 0</span>
      <span class="chip n" id="c-tot">0/10</span>
    </div>
    <div class="hdr-actions">
      <button class="icon-btn" id="btn-hist" title="Histórico de estudo">📊</button>
      <button class="icon-btn" id="btn-theme" title="Tema">☀</button>
      <button class="icon-btn hidden" id="btn-gab-all" title="Revelar/ocultar todos os gabaritos">👁</button>
      <button class="icon-btn" id="btn-export" title="Exportar progresso">⬆</button>
      <button class="icon-btn" id="btn-import-bloco" title="Importar bloco JSON">📂</button>
      <button class="icon-btn" id="btn-import-prog" title="Importar progresso">📥</button>
      <button class="icon-btn" id="btn-reset" title="Reiniciar">↺</button>
    </div>
  </div>
  <div class="prog-rail"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
</header>

<!-- ══ PAUSE OVERLAY ═════════════════════════════════════ -->
<div id="pause-overlay" class="hidden">
  <div class="pause-card">
    <div class="pause-icon">⏸</div>
    <div class="pause-title">Prova pausada</div>
    <div class="pause-sub">O cronômetro está parado.<br>Retome quando estiver pronto.</div>
    <button class="pause-resume" onclick="togglePause()">▶ Retomar prova</button>
  </div>
</div>

<!-- ══ SECTIONS ══════════════════════════════════════════ -->
<main>
  <section id="sec-cover"></section>

  <div id="sec-prova" class="hidden">
    <!-- Toolbar -->
    <div class="tb" id="prova-tb">
      <div class="tb-inner">
        <span class="tb-info"><b id="tb-ans">0</b> respondidas &nbsp;|&nbsp; <b id="tb-blank">10</b> em branco</span>
        <span class="tb-spacer"></span>
        <button class="tb-btn" id="tb-gab-all">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="3"/><path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7-10-7-10-7z"/></svg>
          Gabaritos
        </button>
        <button class="tb-btn" id="tb-revisao" onclick="showRevisaoPicker()">
          🔍 Revisão
        </button>
        <button class="tb-btn" id="tb-foco" onclick="enterFoco()">
          🎯 Foco
        </button>
        <button class="tb-btn danger" id="tb-finish">
          Encerrar prova →

<script>
/* ═══════════════════════════════════════════════════════════
   DATA — inject_bloco.py substitui entre ==INJECT:START== e ==INJECT:END==
   ═══════════════════════════════════════════════════════════ */
/* ==INJECT:START== */
const DEFAULT_BLOCO = {"meta":{"id":"2026-06-17","titulo":"Bloco Diário — Princípios Fundamentais (Const./Adm./Penal/PPP)","data":"2026-06-17","totalQuestoes":120,"concurso":"Delegado PCDF 2026","edital":"Edital nº 1, de 3/2/2026","fase":"Fase 1 — Comentários Expandidos","observacao":"Bloco gerado em 2026-06-17. 120 questões C/E distribuídas conforme edital. Fase 1: comentários com Feynman + fundamento jurídico transcrito."},"disciplinas":[{"nome":"Direito Penal e Legislação Especial","comando":"Acerca dos princípios, da aplicação da lei penal, da teoria do crime e de legislação penal especial, julgue os itens a seguir.","itens":[{"n":1,"enun":"À luz do princípio da legalidade penal, somente a lei em sentido formal pode criar crimes e cominar penas, sendo vedada a edição de medida provisória que institua tipo penal incriminador.","gab":"CERTO","com":"Certo. O princípio da legalidade (nullum crimen sine lege scripta) exige lei formal do Poder Legislativo para criar crimes. É como uma regra de jogo que só o juiz oficial pode mudar — o árbitro-chefe (o Presidente) não pode inventar novas faltas no meio da partida via MP.","fund":"LEI: 'Art. 62, §1º, I, b, da CF/88: É vedada a edição de medidas provisórias sobre matéria relativa a: direito penal, processual penal e processual civil.' | JURISPRUDÊNCIA: 'STF, ADI 1.055, Pleno: medida provisória que cria crime ou agrava pena é inconstitucional por violar o subprincípio lex scripta da legalidade penal.'"},{"n":2,"enun":"A proibição da analogia in malam partem, decorrente do subprincípio lex stricta, veda qualquer uso da analogia em matéria penal, inclusive para beneficiar o réu.","gab":"ERRADO","com":"Errado. A vedação se aplica apenas à analogia que prejudica o réu (in malam partem). Para beneficiar o acusado (in bonam partem), a analogia é admitida. Imagine um árbitro que, na dúvida, interpreta a regra sempre a favor do atleta menos protegido.","fund":"LEI: 'Art. 5º, XXXIX, CF/88 e art. 1º, CP: Não há crime sem lei anterior que o defina, nem pena sem prévia cominação legal.' | JURISPRUDÊNCIA: 'STJ, HC 379.763/SP, 5ª T.: a analogia in bonam partem é instrumento legítimo de integração normativa no Direito Penal, ao contrário da analogia in malam partem, que viola o princípio da reserva legal.'","peg":"Cuidado: a proibição é apenas para analogia in MALAM partem. Analogia in bonam partem é PERMITIDA e expressamente reconhecida pela jurisprudência.","jur_status":"PENDENTE"},{"n":3,"enun":"A lei penal mais benéfica retroage para beneficiar o réu, mesmo após o trânsito em julgado da sentença condenatória.","gab":"CERTO","com":"Certo. A retroatividade da lei mais benigna (lex mitior) é garantia constitucional absoluta, aplicável mesmo quando a condenação já transitou em julgado. É como descobrir que uma multa de trânsito foi anulada — você tem direito à devolução mesmo depois de ter pago.","fund":"LEI: 'Art. 5º, XL, CF/88: a lei penal não retroagirá, salvo para beneficiar o réu. Art. 2º, parágrafo único, CP: A lei posterior, que de qualquer modo favorecer o agente, aplica-se aos fatos anteriores, ainda que decididos por sentença condenatória transitada em julgado.' | JURISPRUDÊNCIA: 'STF, HC 104.859/SP, 1ª T.: a retroatividade da lei penal mais benéfica é garantia constitucional e deve ser aplicada pelo juízo da execução penal.'","jur_status":"PENDENTE"},{"n":4,"enun":"Caso duas leis penais se sucedam no tempo e cada qual apresente dispositivo mais favorável ao réu em capítulos distintos, o magistrado deve aplicar a norma que, em sua integralidade, melhor o beneficiar, sendo vedada a combinação de partes das duas leis.","gab":"CERTO","com":"Certo. O STJ e o STF vedam a lex tertia — a criação de uma lei nova por combinação de fragmentos de duas leis distintas. O juiz deve escolher a lei que, globalmente, seja mais favorável. É como escolher um menu completo do restaurante A ou do B — não se podem pegar entradas de um e sobremesa do outro.","fund":"LEI: 'Art. 2º, CP: A lei posterior, que de qualquer modo favorecer o agente, aplica-se.' | JURISPRUDÊNCIA: 'STF, HC 95.435/RS, Pleno: é vedada a combinação de leis (lex tertia). O magistrado deve aplicar integralmente a lei mais benéfica, sem mesclar dispositivos de leis diversas, pois isso implicaria criação de terceira norma inexistente no ordenamento.'","peg":"Lex tertia é PROIBIDA — não se combinam partes de duas leis. STF e STJ são convergentes nesse ponto.","jur_status":"PENDENTE"},{"n":5,"enun":"As leis temporárias e as leis excepcionais possuem ultra-atividade, razão pela qual se aplicam aos fatos praticados durante sua vigência mesmo após a sua cessação, sem que isso configure retroatividade in malam partem.","gab":"CERTO","com":"Certo. Leis temporárias (com prazo fixado) e leis excepcionais (criadas para situação emergencial) têm ultra-atividade prevista expressamente no CP. Seriam ineficazes se alguém pudesse escapar da punição simplesmente aguardando o fim do prazo da lei.","fund":"LEI: 'Art. 3º, CP: A lei excepcional ou temporária, embora decorrido o período de sua duração ou cessadas as circunstâncias que a determinaram, aplica-se ao fato praticado durante sua vigência.' | JURISPRUDÊNCIA: 'STJ, HC 134.146/SC, 5ª T.: a ultra-atividade das leis temporárias e excepcionais é constitucional e não viola o princípio da retroatividade benéfica, pois encontra autorização expressa no art. 3º do CP.'","jur_status":"PENDENTE"},{"n":6,"enun":"Para efeitos da lei penal brasileira, considera-se praticado o crime no momento em que ocorre o resultado, adotando-se a teoria do resultado.","gab":"ERRADO","com":"Errado. O CP adota a teoria da atividade para o tempo do crime: o crime é praticado quando ocorre a conduta (ação ou omissão), e não quando se produz o resultado. Isso importa especialmente para a imputabilidade: se o agente era inimputável quando agiu, não importa se o resultado ocorreu depois.","fund":"LEI: 'Art. 4º, CP: Considera-se praticado o crime no momento da ação ou omissão, ainda que outro seja o momento do resultado.' | JURISPRUDÊNCIA: 'STF, HC 108.459/RS: para fins de imputabilidade penal, aplica-se a teoria da atividade (art. 4º CP), levando-se em conta o momento da conduta, não do resultado.'","peg":"Teoria da atividade (tempo do crime, art. 4º CP) ≠ teoria do resultado (lugar do crime não é o foco aqui). CEBRASPE cobra as teorias misturadas.","jur_status":"PENDENTE"},{"n":7,"enun":"Considere que um crime de homicídio foi iniciado no Brasil mas o resultado morte ocorreu em solo estrangeiro. Nesse caso, aplica-se a lei penal brasileira, pois o CP adota, para o lugar do crime, a teoria da ubiquidade.","gab":"CERTO","com":"Certo. Para o lugar do crime, o CP adota a teoria da ubiquidade (ou mista): considera-se praticado o crime onde ocorreu a conduta OU onde se produziu o resultado. Assim, o Brasil tem jurisdição quando qualquer um desses elementos ocorreu em seu território.","fund":"LEI: 'Art. 6º, CP: Considera-se praticado o crime no lugar em que ocorreu a ação ou omissão, no todo ou em parte, bem como onde se produziu ou deveria produzir-se o resultado.' | JURISPRUDÊNCIA: 'STJ, CC 74.730/DF, 3ª S.: o art. 6º do CP consagra a teoria da ubiquidade para o lugar do crime, sendo competente a justiça do local onde qualquer elemento da infração ocorreu no território nacional.'","jur_status":"PENDENTE"},{"n":8,"enun":"A tipicidade conglobante, desenvolvida por Zaffaroni, exige, além da adequação formal da conduta ao tipo penal, que o comportamento não seja fomentado ou determinado pelo próprio ordenamento jurídico.","gab":"CERTO","com":"Certo. Para Zaffaroni, a tipicidade material exige tanto a adequação formal quanto a análise conglobante do ordenamento. Se o próprio direito determina ou incentiva a conduta, ela não pode ser típica — afinal, seria contraditório o Estado proibir o que ele mesmo manda fazer.","fund":"LEI: 'Art. 23, CP: Não há crime quando o agente pratica o fato em estado de necessidade, em legítima defesa, em estrito cumprimento de dever legal ou no exercício regular de direito.' | JURISPRUDÊNCIA: 'STJ, REsp 1.193.354/SP, 5ª T.: a tipicidade conglobante funciona como corretivo do tipo formal, excluindo do fato típico as condutas determinadas ou fomentadas pelo ordenamento jurídico.'","jur_status":"PENDENTE"},{"n":9,"enun":"O erro sobre elemento constitutivo do tipo penal exclui o dolo, podendo, entretanto, subsistir a punição por crime culposo, desde que previsto em lei.","gab":"CERTO","com":"Certo. O erro de tipo essencial exclui o dolo porque o agente não tinha representação correta da realidade. Mas se o erro decorreu de culpa (imprudência, negligência, imperícia), subsiste a punição culposa, quando prevista. É como um motorista que atropela alguém pensando ser um boneco — se o erro foi descuidado, pode responder pela morte culposa.","fund":"LEI: 'Art. 20, CP: O erro sobre elemento constitutivo do tipo legal de crime exclui o dolo, mas permite a punição por crime culposo, se previsto em lei.' | JURISPRUDÊNCIA: 'STJ, HC 162.793/SP, 5ª T.: o erro de tipo essencial exclui o dolo; permanecendo a culpa, a punição culposa é possível se o tipo culposo estiver previsto, conforme art. 20 do CP.'","jur_status":"PENDENTE"},{"n":10,"enun":"O erro de proibição inevitável exclui a culpabilidade do agente, ao passo que o erro de proibição evitável a diminui de um sexto a um terço.","gab":"CERTO","com":"Certo. O erro de proibição incide sobre a consciência da ilicitude. Se inevitável, o agente não tinha como saber que a conduta era ilícita — culpabilidade excluída. Se evitável (com mais atenção saberia), a pena é diminuída. Diferente do erro de tipo, que incide sobre o fato.","fund":"LEI: 'Art. 21, CP: O desconhecimento da lei é inescusável. O erro sobre a ilicitude do fato, se inevitável, isenta de pena; se evitável, poderá diminuí-la de um sexto a um terço.' | JURISPRUDÊNCIA: 'STJ, HC 215.843/SP, 6ª T.: o erro de proibição inevitável exclui a culpabilidade por ausência de potencial consciência da ilicitude; o evitável apenas atenua a pena.'","jur_status":"PENDENTE"},{"n":11,"enun":"A embriaguez voluntária completa, ainda que o agente não tivesse intenção de praticar o crime, não exclui a imputabilidade penal.","gab":"CERTO","com":"Certo. O CP adota a teoria da actio libera in causa: quando o agente se embriaga voluntariamente, a responsabilidade remonta ao momento livre (antes de beber). Embriaguez voluntária completa não exclui a imputabilidade — diferente da involuntária completa, que pode excluí-la.","fund":"LEI: 'Art. 28, II, CP: Não excluem a imputabilidade penal a embriaguez, voluntária ou culposa, pelo álcool ou substância de efeito análogo. §1º: É isento de pena o agente que, por embriaguez completa, proveniente de caso fortuito ou força maior, era, ao tempo da ação ou da omissão, inteiramente incapaz de entender o caráter ilícito do fato.' | JURISPRUDÊNCIA: 'STJ, HC 174.471/RJ, 6ª T.: a embriaguez voluntária não exclui a imputabilidade, aplicando-se a actio libera in causa; a exclusão só ocorre na embriaguez proveniente de caso fortuito ou força maior.'","peg":"Embriaguez voluntária NÃO exclui imputabilidade. Só a embriaguez completa por caso fortuito ou força maior exclui.","jur_status":"PENDENTE"},{"n":12,"enun":"Na legítima defesa, é necessário que a agressão seja atual ou iminente, injusta e que a reação defensiva seja proporcional, razão pela qual a legítima defesa putativa, apesar de excluir a ilicitude, não afasta a culpabilidade.","gab":"ERRADO","com":"Errado. A legítima defesa putativa não exclui a ilicitude (pois ela não é real). Trata-se de erro de tipo permissivo (erro sobre pressuposto fático de causa de justificação): se o erro for inevitável, exclui a culpabilidade; se evitável, diminui a pena. A assertiva inverteu os efeitos.","fund":"LEI: 'Art. 20, §1º, CP: É isento de pena quem, por erro plenamente justificado pelas circunstâncias, supõe situação de fato que, se existisse, tornaria a ação legítima. Art. 23, II, CP: Não há crime quando o agente pratica o fato em legítima defesa.' | JURISPRUDÊNCIA: 'STJ, REsp 1.517.916/MG, 5ª T.: a legítima defesa putativa não exclui a ilicitude, mas configura erro de tipo permissivo; se inevitável, isenta de pena; se evitável, faculta a diminuição.'","peg":"Legítima defesa putativa = erro de tipo permissivo → pode excluir CULPABILIDADE, não ilicitude. CEBRASPE adora essa inversão.","jur_status":"PENDENTE"},{"n":13,"enun":"Na teoria do domínio do fato, o autor mediato que utiliza terceiro como instrumento para a prática do crime responde pelo delito independentemente de o instrumento ser ou não penalmente responsável.","gab":"CERTO","com":"Certo. Na autoria mediata (domínio da vontade), o autor mediato instrumentaliza outra pessoa. Ele responde pelo crime mesmo quando o instrumento age sem culpabilidade (ex.: criança, inimputável). O 'dono' do crime é quem comanda o instrumento, não quem fisicamente o executa.","fund":"LEI: 'Art. 29, CP: Quem, de qualquer modo, concorre para o crime incide nas penas a este cominadas, na medida de sua culpabilidade.' | JURISPRUDÊNCIA: 'STF, AP 470/MG (Mensalão), Pleno: a teoria do domínio do fato permite a condenação do autor mediato que domina a vontade do instrumento, independentemente de o executor ser culpável; o autor mediato responde pelo resultado como se praticasse diretamente.'"},{"n":14,"enun":"No crime de homicídio qualificado-privilegiado, é possível a incidência de causas de aumento de pena relativas ao homicídio simples, mas não das qualificadoras, que ficam absorvidas pelo privilégio.","gab":"ERRADO","com":"Errado. O homicídio qualificado-privilegiado é reconhecido pelo STJ e STF: qualificadoras de natureza objetiva (modo de execução) podem coexistir com o privilégio (motivo subjetivo). Além disso, é crime hediondo se qualificado, mesmo com privilégio — e as qualificadoras não são absorvidas.","fund":"LEI: 'Art. 121, §§ 1º e 2º, CP.' | JURISPRUDÊNCIA: 'STJ, HC 153.728/MG, 6ª T.: é possível a coexistência de qualificadoras de natureza objetiva com o privilégio de natureza subjetiva no homicídio qualificado-privilegiado; o privilégio não absorve as qualificadoras objetivas.'","peg":"Homicídio qualificado-privilegiado é admitido pelo STJ/STF: qualificadoras OBJETIVAS + privilégio SUBJETIVO podem coexistir.","jur_status":"PENDENTE"},{"n":15,"enun":"Para a configuração do roubo circunstanciado pelo emprego de arma de fogo, é necessária a efetiva apreensão e perícia do armamento, não bastando a palavra da vítima.","gab":"ERRADO","com":"Errado. O STJ pacificou que a palavra da vítima ou de testemunha idônea é suficiente para reconhecer a causa de aumento de pena pelo emprego de arma de fogo no roubo, dispensando a apreensão e perícia do armamento.","fund":"LEI: 'Art. 157, §2º-A, I, CP: A pena aumenta-se de 2/3 se a violência ou ameaça é exercida com emprego de arma de fogo.' | JURISPRUDÊNCIA: 'STJ, Súmula 174 (cancelada); REsp 1.717.108/SP, 3ª S. (repetitivo): a majorante do emprego de arma de fogo no roubo pode ser reconhecida por qualquer meio de prova idôneo, incluindo depoimento da vítima, sendo desnecessárias a apreensão e perícia do armamento.'","peg":"Súmula 174 STJ foi CANCELADA. Hoje, a palavra da vítima BASTA para reconhecer a majorante de arma de fogo no roubo.","jur_status":"PENDENTE"},{"n":16,"enun":"O peculato apropriação exige que o agente público tenha a posse legítima da coisa em razão do cargo, ao passo que, no peculato furto, o agente subtraia coisa da qual não tinha a posse.","gab":"CERTO","com":"Certo. Peculato-apropriação: o servidor tem a posse do bem em razão do cargo e o desvia. Peculato-furto: o servidor não tem a posse, mas usa a facilidade do cargo para subtrair — é como um funcionário de banco que rouba dinheiro do cofre ao qual não tem acesso legítimo.","fund":"LEI: 'Art. 312, CP: Apropriar-se o funcionário público de dinheiro, valor ou qualquer outro bem móvel, público ou particular, de que tem a posse em razão do cargo, ou desviá-lo, em proveito próprio ou alheio: pena de 2 a 12 anos. §1º Aplica-se a mesma pena, se o funcionário público, embora não tendo a posse do dinheiro, valor ou bem, o subtrai, ou concorre para que seja subtraído, em proveito próprio ou alheio, valendo-se de facilidade que lhe proporciona a qualidade de funcionário.' | JURISPRUDÊNCIA: 'STJ, RHC 53.562/MG, 6ª T.: no peculato-furto, a subtração ocorre sem posse legítima, valendo-se o servidor da facilidade propiciada pelo cargo.'","jur_status":"PENDENTE"},{"n":17,"enun":"A extinção da punibilidade pelo pagamento do débito tributário, nos crimes contra a ordem tributária, é possível em qualquer fase do processo, inclusive após a sentença condenatória irrecorrível.","gab":"CERTO","com":"Certo. Nos crimes tributários materiais, o pagamento integral do tributo extingue a punibilidade a qualquer tempo — até mesmo após o trânsito em julgado. É uma política criminal de incentivo ao cumprimento da obrigação tributária, ainda que tardia.","fund":"LEI: 'Art. 69, da Lei 11.941/2009: extingue-se a punibilidade dos crimes referidos no art. 68 quando a pessoa jurídica relacionada com o agente efetuar o pagamento integral dos débitos oriundos de tributos e contribuições sociais, inclusive acessórios, que tiverem sido objeto de concessão de parcelamento. Art. 9º, §2º, Lei 10.684/2003.' | JURISPRUDÊNCIA: 'STF, HC 85.452/SP, Pleno: nos crimes tributários, o pagamento integral do débito extingue a punibilidade em qualquer fase processual, inclusive após o trânsito em julgado da condenação.'","jur_status":"PENDENTE"},{"n":18,"enun":"Segundo a Súmula Vinculante 24 do STF, o crime material contra a ordem tributária somente se consuma com o lançamento definitivo do crédito tributário, o que implica dizer que, antes disso, não corre prazo prescricional.","gab":"CERTO","com":"Certo. A SV 24 estabelece que o crime tributário material só se consuma com o lançamento definitivo (encerramento do processo administrativo fiscal). Antes disso, sequer há justa causa para ação penal. E sem consumação, não há início do prazo prescricional.","fund":"LEI: 'SV 24/STF: Não se tipifica crime material contra a ordem tributária, previsto no art. 1°, incisos I a IV, da Lei n° 8.137/90, antes do lançamento definitivo do crédito tributário.' | JURISPRUDÊNCIA: 'STF, RHC 107.972/SP, 1ª T.: o prazo prescricional dos crimes tributários materiais começa a fluir apenas com o encerramento do processo administrativo fiscal (PAF) que torna definitivo o lançamento do tributo.'","jur_status":"PENDENTE"},{"n":19,"enun":"No crime de lavagem de dinheiro, tipificado na Lei 9.613/1998, é necessária a condenação pelo crime antecedente para que o agente responda pelo crime de lavagem.","gab":"ERRADO","com":"Errado. A Lei 9.613/1998 não exige condenação prévia pelo crime antecedente para configurar a lavagem. Basta a demonstração de que os valores têm origem em infração penal antecedente. O processo de lavagem pode ser autônomo em relação ao crime anterior.","fund":"LEI: 'Art. 2º, §1º, Lei 9.613/1998: A denúncia será instruída com indícios suficientes da existência da infração penal antecedente, sendo puníveis os fatos previstos nesta Lei, ainda que desconhecido ou isento de pena o autor da infração penal antecedente, ou extinta a punibilidade desta.' | JURISPRUDÊNCIA: 'STJ, HC 300.884/SP, 5ª T.: a condenação pelo crime antecedente não é condição de procedibilidade para o crime de lavagem de dinheiro; basta indícios de que o capital tem origem criminosa.'","peg":"Lavagem de dinheiro: NÃO precisa de condenação pelo crime antecedente. Basta indícios de origem criminosa.","jur_status":"PENDENTE"},{"n":20,"enun":"O porte ilegal de arma de fogo de uso permitido é crime de perigo abstrato, razão pela qual a periculosidade da conduta é presumida, dispensando demonstração de dano concreto ou perigo real.","gab":"CERTO","com":"Certo. O STF e o STJ pacificaram que os crimes de perigo abstrato do Estatuto do Desarmamento são constitucionais. A própria conduta de portar arma sem autorização é suficiente para tipificar o delito — não se exige prova de que alguém foi efetivamente colocado em risco.","fund":"LEI: 'Art. 14, Lei 10.826/2003: Portar, deter, adquirir, fornecer, receber, ter em depósito, transportar, ceder, ainda que gratuitamente, emprestar, remeter, empregar, manter sob guarda ou ocultar arma de fogo, acessório ou munição, de uso permitido, sem autorização e em desacordo com determinação legal ou regulamentar: Pena – reclusão, de 2 a 4 anos, e multa.' | JURISPRUDÊNCIA: 'STF, HC 104.410/RS, Pleno: os crimes de perigo abstrato do Estatuto do Desarmamento são constitucionais; a presunção de periculosidade é iuris et de iure, dispensando demonstração de perigo concreto.'","jur_status":"PENDENTE"},{"n":21,"enun":"Na Lei de Drogas (Lei 11.343/2006), a diferenciação entre tráfico de drogas e uso pessoal é realizada com base na quantidade e na natureza da substância apreendida, de forma que o juiz, com base nesses elementos, determine a destinação.","gab":"CERTO","com":"Certo. O art. 28, §2º, da Lei 11.343/2006 elenca critérios que o juiz deve considerar: a natureza e a quantidade da substância, o local e as condições de apreensão, as circunstâncias sociais e pessoais do agente. Não existe uma quantidade legal que automaticamente distingue usuário de traficante.","fund":"LEI: 'Art. 28, §2º, Lei 11.343/2006: Para determinar se a droga destinava-se a consumo pessoal, o juiz atenderá à natureza e à quantidade da substância apreendida, ao local e às condições em que se desenvolveu a ação, às circunstâncias sociais e pessoais, bem como à conduta e aos antecedentes do agente.' | JURISPRUDÊNCIA: 'STF, RE 635.659/SP, Pleno (repercussão geral, j. 15/12/2021): descriminalizou o porte de drogas para consumo pessoal, mas manteve a ilicitude; a diferenciação entre usuário e traficante permanece criteriosa (art. 28, §2º, LD).'","jur_status":"PENDENTE"},{"n":22,"enun":"O agente que pratica crime permanente durante a vigência de lei mais grave tem essa lei aplicada mesmo que tenha iniciado a conduta quando vigia lei mais branda, em razão da Súmula 711 do STF.","gab":"CERTO","com":"Certo. A Súmula 711 do STF estabelece que, nos crimes permanentes e nos crimes continuados, aplica-se a lei mais grave que estava em vigor quando a conduta cessou, mesmo que mais grave do que a lei vigente no início da conduta. O crime ainda estava em curso quando a nova lei entrou em vigor.","fund":"LEI: 'Súmula 711/STF: A lei penal mais grave aplica-se ao crime continuado ou ao crime permanente, se a sua vigência é anterior à cessação da continuidade ou da permanência.' | JURISPRUDÊNCIA: 'STJ, HC 218.420/RJ, 5ª T.: aplica-se a Súmula 711 do STF ao crime de sequestro (permanente): se lei mais grave entrar em vigor antes de a vítima ser libertada, a nova lei incide sem violação à irretroatividade penal.'","peg":"Crime permanente + nova lei mais grave durante a permanência = nova lei se aplica. Isso não é retroatividade in malam partem — é tempus regit actum durante a conduta em curso.","jur_status":"PENDENTE"},{"n":23,"enun":"O princípio da insignificância, reconhecido pelo STF e pelo STJ, exclui a tipicidade material da conduta, sendo aplicável tanto em crimes de bagatela quanto em crimes praticados por reincidentes.","gab":"ERRADO","com":"Errado. A aplicação do princípio da insignificância a reincidentes é controvertida. O STJ tende a negar o benefício ao reincidente, pois a reiteração criminal demonstra tendência criminosa incompatível com a insignificância. O STF, por outro lado, analisa caso a caso. Não há uniformidade que permita afirmar que o princípio é 'aplicável tanto' em crimes de reincidentes.","fund":"LEI: 'Art. 1º, CP (implicitamente): tipicidade exige tipicidade formal e material.' | JURISPRUDÊNCIA: 'Divergência D2 (STJ × STF): STJ, HC 356.398/RS, 5ª T.: a reincidência é obstáculo à aplicação da insignificância, dada a reprovabilidade da conduta. STF, HC 123.108/MG, 1ª T.: a reincidência pode ser considerada, mas não impede automaticamente a insignificância — análise caso a caso.'","peg":"Divergência D2: insignificância + reincidente — STJ afasta; STF analisa caso a caso. NUNCA afirmar como convergente.","jur_status":"PENDENTE"},{"n":24,"enun":"O arrependimento posterior, previsto no art. 16 do CP, é causa obrigatória de redução de pena de um a dois terços, aplicável somente a crimes dolosos praticados sem violência ou grave ameaça à pessoa, e desde que o agente repare o dano ou restitua a coisa antes do recebimento da denúncia ou queixa.","gab":"CERTO","com":"Certo. O arrependimento posterior reúne os requisitos: crime cometido sem violência ou grave ameaça; reparação integral do dano antes do recebimento da denúncia ou da queixa; e redução obrigatória da pena de 1/3 a 2/3. Quanto maior a celeridade da reparação, maior a redução.","fund":"LEI: 'Art. 16, CP: Nos crimes cometidos sem violência ou grave ameaça à pessoa, reparado o dano ou restituída a coisa, até o recebimento da denúncia ou da queixa, por ato voluntário do agente, a pena será reduzida de um a dois terços.' | JURISPRUDÊNCIA: 'STJ, REsp 1.697.284/MG, 6ª T.: o arrependimento posterior é causa obrigatória de redução de pena; o critério de graduação é a presteza e eficiência da reparação — quanto mais rápida e integral, maior a redução.'","jur_status":"PENDENTE"}]},{"nome":"Direito Processual Penal e Legislação Especial","comando":"Acerca dos princípios, do inquérito policial, da ação penal, das provas e das medidas cautelares no processo penal, julgue os itens a seguir.","itens":[{"n":25,"enun":"O processo penal brasileiro adota o sistema acusatório, conforme expressamente previsto na Lei 13.964/2019, que vedou ao juiz a iniciativa probatória na fase de investigação.","gab":"CERTO","com":"Certo. O art. 3º-A do CPP, inserido pelo Pacote Anticrime (Lei 13.964/2019), positivou o sistema acusatório e vedou ao juiz a iniciativa probatória na fase investigatória e a substituição da atuação do órgão de acusação. O juiz é espectador na fase de investigação.","fund":"LEI: 'Art. 3º-A, CPP: O processo penal terá estrutura acusatória, vedadas a iniciativa do juiz na fase de investigação e a substituição da atuação probatória do órgão de acusação.' | JURISPRUDÊNCIA: 'STF, ADI 6.299/DF: o art. 3º-A do CPP é constitucional em sua essência; o sistema acusatório é exigência do modelo constitucional de 1988 (art. 129, I, CF).'","jur_status":"PENDENTE"},{"n":26,"enun":"O juiz das garantias, previsto nos arts. 3º-B a 3º-F do CPP, está plenamente em vigor desde a promulgação da Lei 13.964/2019.","gab":"ERRADO","com":"Errado. O juiz das garantias foi criado pela Lei 13.964/2019, mas sua eficácia foi suspensa por liminar do STF (ADIs 6298, 6299, 6300 e 6305) desde o início. Os dispositivos existem no CPP, mas ainda não vigem por força da suspensão cautelar do STF.","fund":"LEI: 'Arts. 3º-B a 3º-F, CPP (Lei 13.964/2019): juiz das garantias para a fase investigatória.' | JURISPRUDÊNCIA: 'STF, ADIs 6298/6299/6300/6305, Pleno: eficácia dos arts. 3º-B a 3º-F do CPP suspensa cautelarmente; o juiz das garantias não está em vigor por força de medida liminar do STF ainda pendente de julgamento de mérito.'","peg":"Juiz das garantias EXISTE no CPP, mas está SUSPENSO por liminar do STF. Não está em vigor. CEBRASPE cobra essa distinção."},{"n":27,"enun":"A sentença penal condenatória pode ser fundamentada exclusivamente nos elementos informativos colhidos na fase inquisitorial, desde que tais elementos sejam corroborados por indícios convergentes.","gab":"ERRADO","com":"Errado. O art. 155 do CPP veda a condenação fundada exclusivamente em elementos do inquérito policial. A prova para condenação deve ser produzida sob o crivo do contraditório e da ampla defesa. O IP pode embasar a denúncia, mas não a sentença isoladamente.","fund":"LEI: 'Art. 155, CPP: O juiz formará sua convicção pela livre apreciação da prova produzida em contraditório judicial, não podendo fundamentar sua decisão exclusivamente nos elementos informativos colhidos na investigação, ressalvadas as provas cautelares, não repetíveis e antecipadas.' | JURISPRUDÊNCIA: 'STJ, HC 424.527/SP, 5ª T.: a condenação lastreada exclusivamente em elementos do IP é nula, por violar o art. 155 do CPP e o princípio do contraditório.'","peg":"Art. 155 CPP: condenação NÃO pode se basear EXCLUSIVAMENTE no IP. Exceção: provas cautelares, não repetíveis e antecipadas.","jur_status":"PENDENTE"},{"n":28,"enun":"O inquérito policial tem natureza inquisitorial e, em regra, é sigiloso, mas o advogado do investigado tem direito de acesso às diligências já documentadas nos autos, mesmo quando decretado o sigilo.","gab":"CERTO","com":"Certo. A SV 14/STF garante ao defensor o acesso às diligências já concluídas e incorporadas ao IP, mesmo quando decretado sigilo. O sigilo é oponível a terceiros, não ao defensor do investigado. É como um processo fiscal: o contribuinte tem direito de ver o que o auditor já documentou.","fund":"LEI: 'SV 14/STF: É direito do defensor, no interesse do representado, ter acesso amplo aos elementos de prova que, já documentados em procedimento investigatório realizado por órgão com competência de polícia judiciária, digam respeito ao exercício do direito de defesa.' | JURISPRUDÊNCIA: 'STJ, RHC 44.218/SC, 6ª T.: o sigilo do IP não é oponível ao advogado do investigado quanto às diligências já documentadas, em conformidade com a SV 14/STF e com o Estatuto da OAB (art. 7º, XIV).'","jur_status":"PENDENTE"},{"n":29,"enun":"A prisão em flagrante tem natureza de medida cautelar precária e deve ser comunicada imediatamente ao juiz competente, ao Ministério Público e à família do preso ou a pessoa por ele indicada.","gab":"CERTO","com":"Certo. A CF/88 e o CPP exigem comunicação imediata da prisão em flagrante ao juiz e ao MP (art. 5º, LXII, CF e art. 306 CPP). A comunicação ao juiz é requisito de legalidade da prisão — dentro de 24 horas. A família ou pessoa indicada também deve ser notificada.","fund":"LEI: 'Art. 5º, LXII, CF/88: a prisão de qualquer pessoa e o local onde se encontre serão comunicados imediatamente ao juiz competente e à família do preso ou à pessoa por ele indicada. Art. 306, CPP: A prisão de qualquer pessoa e o local onde se encontre serão comunicados imediatamente ao juiz competente, ao Ministério Público e à família do preso ou à pessoa por ele indicada.' | JURISPRUDÊNCIA: 'STJ, HC 317.356/RJ, 6ª T.: o descumprimento da comunicação imediata ao juiz e ao MP configura vício formal que pode ensejar o relaxamento da prisão.'","jur_status":"PENDENTE"},{"n":30,"enun":"No reconhecimento de pessoas, previsto no art. 226 do CPP, o reconhecedor deve ser colocado previamente em condições de não ser visto pelo identificado, sob pena de nulidade absoluta do ato.","gab":"ERRADO","com":"Errado. O STJ, no Tema 1258 (REsp 1.953.602-SP, j. 11/06/2025), firmou que o descumprimento das formalidades do art. 226 do CPP gera nulidade relativa (e não absoluta), exigindo demonstração de prejuízo concreto. A exceção é quando o vício é de tal ordem que contamina todo o reconhecimento.","fund":"LEI: 'Art. 226, II, CPP: A pessoa que houver de fazer o reconhecimento será convidada a indicar a pessoa que nele figurar, se for o caso; e, antes do reconhecimento, à pessoa que o tiver de efetuar será perguntado se conhece e de vista a quem deva ser reconhecido, e em que ocasiões o viu.' | JURISPRUDÊNCIA: 'STJ, Tema 1258, REsp 1.953.602-SP, 3ª S., j. 11/06/2025: as formalidades do art. 226 do CPP são obrigatórias; o descumprimento gera nulidade relativa, devendo o interessado demonstrar prejuízo concreto para o seu reconhecimento.'","peg":"STJ Tema 1258 (junho/2025): nulidade do reconhecimento viciado é RELATIVA, não absoluta. Novidade recentíssima — alta probabilidade de aparecer na PCDF."},{"n":31,"enun":"A interceptação das comunicações telefônicas, admitida pelo art. 5º, XII, da CF/88, dispensa autorização judicial quando se tratar de investigação de crime hediondo e houver urgência comprovada pela autoridade policial.","gab":"ERRADO","com":"Errado. A interceptação telefônica somente é possível mediante ordem judicial, para investigação de infração penal punida com reclusão (não apenas hediondos). Não existe previsão de dispensa de autorização judicial por urgência policial — isso violaria diretamente o art. 5º, XII, CF/88.","fund":"LEI: 'Art. 5º, XII, CF/88: é inviolável o sigilo da correspondência e das comunicações telegráficas, de dados e das comunicações telefônicas, salvo, no último caso, por ordem judicial, nas hipóteses e na forma que a lei estabelecer para fins de investigação criminal ou instrução processual penal. Art. 2º, Lei 9.296/1996: Não será admitida a interceptação de comunicações telefônicas quando ocorrer qualquer das seguintes hipóteses: I – não houver indícios razoáveis da autoria ou participação em infração penal; II – a prova puder ser feita por outros meios disponíveis; III – o fato investigado constituir infração penal punida, no máximo, com pena de detenção.' | JURISPRUDÊNCIA: 'STF, HC 96.986/MG: a interceptação telefônica sem ordem judicial é ilícita, independentemente da gravidade do crime investigado; a autorização judicial é pressuposto de validade constitucional.'","jur_status":"PENDENTE"},{"n":32,"enun":"A busca e apreensão domiciliar sem mandado judicial somente é lícita quando o agente policial detém fundadas razões, aferidas objetivamente antes da ação, para crer que ali se pratica crime ou se encontra foragido.","gab":"CERTO","com":"Certo. O STF (RE 603.616/RO, Tema 280) admite a entrada forçada sem mandado apenas em casos de fundadas razões previamente justificáveis. A simples intuição policial não basta — é preciso elemento objetivo que permita ao juiz posterior controle da legalidade da medida.","fund":"LEI: 'Art. 5º, XI, CF/88: a casa é asilo inviolável do indivíduo, ninguém nela podendo penetrar sem consentimento do morador, salvo em caso de flagrante delito ou desastre, ou para prestar socorro, ou, durante o dia, por determinação judicial.' | JURISPRUDÊNCIA: 'STF, RE 603.616/RO (Gilmar Mendes, Pleno, j. 05/11/2015, Tema 280): a entrada forçada em domicílio sem mandado judicial só é lícita quando amparada em fundadas razões, devidamente justificadas pelas circunstâncias, e o ônus da demonstração cabe ao Estado.'","peg":"STF Tema 280: busca sem mandado exige fundadas razões OBJETIVAS e justificativas que possam ser controladas a posteriori pelo juiz. Mera denúncia anônima, por si só, não basta.","jur_status":"OK"},{"n":33,"enun":"A busca pessoal pode ser realizada pela autoridade policial independentemente de mandado judicial, bastando a fundada suspeita de que o revistado traz consigo instrumentos, armas ou objetos relacionados com infração penal.","gab":"CERTO","com":"Certo. A busca pessoal dispensa mandado quando há fundada suspeita (art. 244, CPP). Mas o STJ (RHC 158.580/BA) exige que a suspeita seja objetiva, prévia e específica — não bastam caracteres genéricos como cor, roupa ou bairro. A suspeita deve ser articulável em palavras.","fund":"LEI: 'Art. 244, CPP: A busca pessoal independerá de mandado, no caso de prisão ou quando houver fundada suspeita de que a pessoa esteja na posse de arma proibida ou de objetos ou papéis que constituam corpo de delito, ou quando a medida for determinada no curso de busca domiciliar.' | JURISPRUDÊNCIA: 'STJ, RHC 158.580/BA (Schietti, 6ª T., j. 19/04/2022): fundada suspeita para busca pessoal exige elemento objetivo, prévio e específico; não se admite suspeita baseada em estereótipos pessoais ou sociais.'","peg":"Busca pessoal exige fundada suspeita OBJETIVA e PRÉVIA. STJ não admite suspeita baseada em perfil racial, cor de pele ou bairro. Elemento articulável e concreto é exigência do STJ.","jur_status":"OK"},{"n":34,"enun":"As provas cautelares, não repetíveis e antecipadas são excepcionadas do art. 155 do CPP, podendo embasar, isoladamente, a sentença condenatória.","gab":"CERTO","com":"Certo. O próprio art. 155, caput, do CPP excepciona essas três categorias de provas. Provas cautelares (como interceptações telefônicas), não repetíveis (como exame de corpo de delito único) e antecipadas (colhidas antes do processo) podem fundamentar condenação mesmo sem contraditório imediato.","fund":"LEI: 'Art. 155, CPP: O juiz formará sua convicção pela livre apreciação da prova produzida em contraditório judicial, não podendo fundamentar sua decisão exclusivamente nos elementos informativos colhidos na investigação, ressalvadas as provas cautelares, não repetíveis e antecipadas.' | JURISPRUDÊNCIA: 'STJ, REsp 1.472.106/RS, 5ª T.: as provas cautelares, não repetíveis e antecipadas podem fundamentar isoladamente a condenação, pois ficam ressalvadas da exigência do contraditório diferido prevista no art. 155 do CPP.'","jur_status":"PENDENTE"},{"n":35,"enun":"A prisão preventiva pode ser decretada de ofício pelo juiz na fase de investigação policial, quando presentes os requisitos do art. 312 do CPP.","gab":"ERRADO","com":"Errado. Após o Pacote Anticrime (Lei 13.964/2019), o juiz não pode decretar prisão preventiva de ofício em nenhuma fase — nem na investigação, nem no processo. Somente o MP ou a autoridade policial (na investigação) e o MP (no processo) podem requerer a prisão preventiva.","fund":"LEI: 'Art. 311, CPP (redação dada pela Lei 13.964/2019): Em qualquer fase da investigação policial ou do processo penal, caberá a prisão preventiva decretada pelo juiz, a requerimento do Ministério Público, do querelante ou do assistente, ou por representação da autoridade policial.' | JURISPRUDÊNCIA: 'STF, HC 204.551/RJ, 1ª T.: após a Lei 13.964/2019, é vedada a decretação de prisão preventiva de ofício pelo juiz, em qualquer fase; a iniciativa é exclusiva do MP, querelante, assistente ou autoridade policial (investigação).'","peg":"Pós-Pacote Anticrime: juiz NÃO pode decretar prisão preventiva de OFÍCIO em nenhuma fase. Requer provocação.","jur_status":"PENDENTE"},{"n":36,"enun":"A decretação de medidas cautelares diversas da prisão, previstas no art. 319 do CPP, obedece ao princípio da proporcionalidade e deve considerar, entre outros critérios, a necessidade e a adequação da medida ao caso concreto.","gab":"CERTO","com":"Certo. As medidas cautelares diversas da prisão (art. 319 CPP) são regidas pela proporcionalidade: o juiz deve aferir se a medida é adequada (apta a tutelar o bem jurídico), necessária (menos gravosa possível) e proporcional em sentido estrito. A prisão preventiva é ultima ratio.","fund":"LEI: 'Art. 282, CPP: As medidas cautelares previstas neste Título deverão ser aplicadas observando-se a: I – necessidade para aplicação da lei penal, para a investigação ou a instrução criminal e, nos casos expressamente previstos, para evitar a prática de infrações penais; II – adequação da medida à gravidade do crime, circunstâncias do fato e condições pessoais do indiciado ou acusado.' | JURISPRUDÊNCIA: 'STF, HC 218.574/SP, 1ª T.: as medidas cautelares diversas da prisão devem ser avaliadas segundo a proporcionalidade; a prisão preventiva é ultima ratio e somente se justifica quando as medidas alternativas forem insuficientes.'","jur_status":"PENDENTE"},{"n":37,"enun":"A ação penal pública incondicionada é a regra geral no CPP, cabendo ao Ministério Público a titularidade exclusiva para promovê-la, conforme o art. 129, I, da CF/88.","gab":"CERTO","com":"Certo. O MP é o titular exclusivo da ação penal pública (incondicionada e condicionada), conforme o art. 129, I, da CF/88. A ação penal privada é exceção e cabe ao ofendido. A ação penal pública incondicionada é a mais comum — o MP age por iniciativa própria.","fund":"LEI: 'Art. 129, I, CF/88: São funções institucionais do Ministério Público: I – promover, privativamente, a ação penal pública, na forma da lei. Art. 24, CPP: Nos crimes de ação pública, esta será promovida por denúncia do Ministério Público.' | JURISPRUDÊNCIA: 'STF, INQ 3.998/DF: a titularidade da ação penal pública é do MP, que age com independência funcional e não pode ser su
