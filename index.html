idade de lei ou ato normativo, sendo exigida, nos tribunais, a observância da cláusula de reserva de plenário (art. 97 CF).","gab":"CERTO","com":"Art. 97 CF: 'Somente pelo voto da maioria absoluta de seus membros ou dos membros do respectivo órgão especial poderão os tribunais declarar a inconstitucionalidade de lei ou ato normativo.' Juízes singulares podem declarar inconstitucionalidade sem a cláusula. Súmula Vinculante 10 consolida isso.","fund":"LEI: Art. 97 CF. JURISPRUDÊNCIA: SV 10 STF: 'Viola a cláusula de reserva de plenário a decisão de órgão fracionário de tribunal que, embora não declare expressamente a inconstitucionalidade de lei ou ato normativo do Poder Público, afasta sua incidência, no todo ou em parte.'"},{"n":56,"enun":"A proposta de emenda à Constituição que vise abolir a separação dos Poderes poderá ser aprovada se obtiver apoio de três quintos dos membros de cada casa do Congresso Nacional em dois turnos de votação.","gab":"ERRADO","com":"A separação dos Poderes é cláusula pétrea (art. 60, §4º, III, CF). Proposta tendente a abolir cláusula pétrea NÃO pode ser aprovada — sequer pode ser deliberada. Não existe quórum que permita suprimir cláusulas pétreas.","fund":"LEI: Art. 60, §4º CF: 'Não será objeto de deliberação a proposta de emenda tendente a abolir: [...] III — a separação dos Poderes.'","peg":"Banca sugere que com quórum qualificado qualquer PEC passa — ERRADO para cláusulas pétreas."},{"n":57,"enun":"A intervenção federal nos estados é medida excepcional e, nos casos de recusa à execução de lei federal, deve ser decretada pelo Presidente da República após requisição do STF.","gab":"CERTO","com":"Art. 36, II, CF: a intervenção federal para assegurar execução de lei federal depende de provimento, pelo STF, de representação do PGR, seguido de requisição ao Presidente. O Presidente não pode intervir espontaneamente nesses casos — depende do Judiciário.","fund":"LEI: Art. 36, II CF: 'A decretação da intervenção dependerá: II — no caso do inciso IV, de provimento, pelo Supremo Tribunal Federal, de representação do Procurador-Geral da República, e no caso de recusa à execução de lei federal, após haver o Tribunal dado ciência ao Poder Executivo...'"},{"n":58,"enun":"O mandado de segurança coletivo pode ser impetrado por partido político com representação no Congresso Nacional para proteger direitos difusos de qualquer segmento da sociedade.","gab":"ERRADO","com":"O mandado de segurança coletivo (art. 5º, LXX, CF) protege direitos líquidos e certos dos seus membros ou associados. Partido político só pode impetrá-lo em relação a seus filiados, não para proteger direitos difusos de qualquer segmento da sociedade.","fund":"LEI: Art. 5º, LXX, CF: 'O mandado de segurança coletivo pode ser impetrado por: a) partido político com representação no Congresso Nacional; b) organização sindical, entidade de classe ou associação legalmente constituída e em funcionamento há pelo menos um ano, em defesa dos interesses de seus membros ou associados.'"},{"n":59,"enun":"O habeas corpus pode ser impetrado por qualquer pessoa, em favor de terceiro ou do próprio paciente, inclusive por estrangeiro que não domine a língua portuguesa.","gab":"CERTO","com":"O HC é o remédio mais acessível: qualquer pessoa pode impetrá-lo, sem advogado, sem formalidade especial. Pode ser redigido em língua estrangeira (STF aceita), e o estrangeiro pode impetrar em favor de si mesmo.","fund":"LEI: Art. 654 CPP: 'O habeas corpus poderá ser impetrado por qualquer pessoa, em seu favor ou de outrem.' JURISPRUDÊNCIA: STF — HC por estrangeiro sem procuração é válido; ausência de advogado não obsta."},{"n":60,"enun":"O Ministério Público possui, nos termos da Constituição Federal, autonomia funcional, administrativa e financeira, e sua chefia é exercida pelo Procurador-Geral da República no âmbito federal.","gab":"CERTO","com":"Art. 127, §§2º e 3º, CF: o MP possui autonomia funcional e administrativa. A iniciativa de lei para aumento de remuneração é do próprio MP (autonomia financeira relativa). O PGR chefia o MPF (art. 128, §1º, CF).","fund":"LEI: Art. 127, §2º CF: 'Ao Ministério Público é assegurada autonomia funcional e administrativa...' Art. 128, §1º CF: 'O Ministério Público da União tem por chefe o Procurador-Geral da República...'"},{"n":61,"enun":"A Defensoria Pública, nos termos da Constituição Federal, pode propor ação civil pública para defesa de interesses individuais homogêneos das pessoas necessitadas, incluindo os hipossuficientes econômicos.","gab":"CERTO","com":"EC 80/2014 ampliou as atribuições constitucionais da Defensoria. O STF e STJ reconhecem a legitimidade da Defensoria para propor ACP em defesa de direitos coletivos dos necessitados. Art. 134 CF c/c LC 80/1994.","fund":"LEI: Art. 134, caput CF (redação da EC 80/2014): 'A Defensoria Pública é instituição permanente, essencial à função jurisdicional do Estado, incumbindo-lhe, como expressão e instrumento do regime democrático, fundamentalmente, a orientação jurídica...'"},{"n":62,"enun":"O Presidente da República, no exercício do estado de defesa, pode restringir os direitos de reunião, sigilo de correspondência e sigilo de comunicações telegráficas e telefônicas, dependendo, contudo, de autorização prévia do Congresso Nacional.","gab":"ERRADO","com":"No estado de defesa (art. 136 CF), o Presidente DECRETA sem autorização prévia do Congresso — mas deve submeter ao Congresso em 24 horas. O Congresso aprecia a posteriori (art. 136, §4º CF): aprova ou rejeita. É diferente do estado de sítio, que exige autorização prévia.","fund":"LEI: Art. 136, §4º CF: 'Decretado o estado de defesa ou sua prorrogação, o Presidente da República, dentro de 24 horas, submeterá o ato com a respectiva justificação ao Congresso Nacional...' Não é prévia.","peg":"Estado de defesa = decreto + submissão em 24h (posterior). Estado de sítio = autorização prévia do Congresso."},{"n":63,"enun":"A repercussão geral é requisito de admissibilidade do recurso extraordinário ao STF e deve ser demonstrada pelo recorrente, presumindo-se sua ausência quando a questão debatida for de interesse exclusivamente individual.","gab":"CERTO","com":"Art. 1.035 CPC c/c art. 102, §3º CF: o recorrente deve demonstrar a repercussão geral da questão. Presume-se ausente quando a questão é relevante apenas para as partes. A RG existe quando a questão é relevante do ponto de vista econômico, político, social ou jurídico (transcendência).","fund":"LEI: Art. 102, §3º CF: 'No recurso extraordinário o recorrente deverá demonstrar a repercussão geral das questões constitucionais discutidas no caso...'"},{"n":64,"enun":"O princípio da publicidade dos atos processuais, garantido pelo art. 5º, LX, CF, é absoluto, não admitindo qualquer restrição mesmo nos casos em que a defesa da intimidade ou o interesse social o exijam.","gab":"ERRADO","com":"O art. 5º, LX, CF expressamente excepciona: 'a lei só poderá restringir a publicidade dos atos processuais quando a defesa da intimidade ou o interesse social o exigirem.' Portanto, a publicidade admite restrição legal. O segredo de justiça é exemplo de restrição constitucionalmente prevista.","fund":"LEI: Art. 5º, LX CF: 'a lei só poderá restringir a publicidade dos atos processuais quando a defesa da intimidade ou o interesse social o exigirem.'"}]},{"nome":"Direito Administrativo e Legislação Complementar","comando":"Acerca do direito administrativo e da organização da administração pública, julgue os itens a seguir.","itens":[{"n":65,"enun":"A responsabilidade civil objetiva do Estado, prevista no art. 37, §6º, da CF, aplica-se tanto às pessoas jurídicas de direito público quanto às de direito privado prestadoras de serviços públicos, inclusive em relação a danos causados a terceiros não usuários.","gab":"CERTO","com":"STF RE 591.874/MS: a responsabilidade objetiva do art. 37, §6º, CF se estende a terceiros não usuários do serviço. Concessionária que causa dano a pedestre (não usuário) responde objetivamente. A diferença está na ação de regresso: a PJ de direito público responde objetivamente; a PJ de direito privado responde em regresso contra o agente culpado.","fund":"JURISPRUDÊNCIA: STF RE 591.874/MS (Lewandowski, Pleno, j. 26/08/2009): concessionária responde objetivamente por dano a não-usuário. LEI: Art. 37, §6º CF: 'As pessoas jurídicas de direito público e as de direito privado prestadoras de serviços públicos responderão pelos danos que seus agentes, nessa qualidade, causarem a terceiros...'","jur_status":"OK"},{"n":66,"enun":"Na teoria do risco administrativo, que fundamenta a responsabilidade objetiva do Estado, admitem-se como causas excludentes ou atenuantes da responsabilidade a culpa exclusiva da vítima, o caso fortuito e a força maior.","gab":"CERTO","com":"A teoria do risco administrativo (adotada como regra no Brasil) admite as excludentes: culpa exclusiva ou concorrente da vítima, caso fortuito e força maior. Difere da teoria do risco integral (aplicada em acidentes nucleares, danos ambientais e transportes), que não admite excludentes.","fund":"LEI: Art. 37, §6º CF (risco administrativo — excludentes possíveis). Doutrina: Di Pietro, Carvalho Filho — risco integral não admite excludentes; risco administrativo admite."},{"n":67,"enun":"O prazo prescricional para propositura de ação de reparação por danos civis causados pelo Estado ao particular é de 5 anos, nos termos do Decreto 20.910/1932.","gab":"CERTO","com":"O Decreto 20.910/1932 prevê prescrição quinquenal para dívidas passivas da Fazenda Pública e para ações de reparação civil contra o Estado. O STJ consolidou a aplicação desse prazo para ações de responsabilidade civil do Estado.","fund":"LEI: Art. 1º Decreto 20.910/1932: 'As dívidas passivas da União, dos Estados e dos Municípios... prescrevem em cinco anos contados da data do ato ou fato do qual se originarem.' JURISPRUDÊNCIA: STJ — prazo de 5 anos aplica-se às ações contra o Estado."},{"n":68,"enun":"O servidor público estável (Lei 8.112/1990) somente pode ser demitido por decisão judicial transitada em julgado ou por processo administrativo disciplinar, sendo vedada a demissão por avaliação periódica de desempenho.","gab":"ERRADO","com":"Art. 41, §1º, CF prevê três hipóteses de perda do cargo do servidor estável: (I) sentença judicial transitada em julgado; (II) processo administrativo disciplinar; (III) avaliação periódica de desempenho, na forma de lei complementar. A avaliação de desempenho É hipótese constitucional de perda do cargo.","fund":"LEI: Art. 41, §1º CF: 'O servidor público estável só perderá o cargo: I — em virtude de sentença judicial transitada em julgado; II — mediante processo administrativo em que lhe seja assegurada ampla defesa; III — mediante procedimento de avaliação periódica de desempenho...'","peg":"Banca omite a avaliação periódica como causa de demissão — ERRADO: é hipótese constitucional."},{"n":69,"enun":"A contratação direta por dispensa de licitação (Lei 14.133/2021) é hipótese taxativa e somente pode ser realizada nas situações expressamente previstas na lei, devendo a autoridade competente justificar o preço e a escolha do contratado.","gab":"CERTO","com":"A Lei 14.133/2021 (Nova Lei de Licitações) prevê o rol de hipóteses de dispensa e inexigibilidade (arts. 74 e 75). O art. 72 exige, na contratação direta, justificativa de preço e da escolha do contratado, com publicação prévia no Portal Nacional de Contratações Públicas.","fund":"LEI: Art. 72 Lei 14.133/2021: 'É vedada a contratação direta, com fundamento nas hipóteses previstas no caput do art. 74 desta Lei, quando... [sem justificativa].' Art. 75 — hipóteses de dispensa taxativas."},{"n":70,"enun":"A Lei 14.230/2021, ao reformar a Lei de Improbidade Administrativa, estabeleceu que somente o dolo específico caracteriza o ato de improbidade, sendo inadmissível a condenação por conduta culposa.","gab":"CERTO","com":"A Lei 14.230/2021 alterou radicalmente a LIA: exige-se dolo específico em TODOS os tipos de improbidade. A modalidade culposa foi extinta. Além disso, o STF confirmou que a nova redação se aplica retroativamente a processos em curso (RE 852.475 com repercussão geral).","fund":"LEI: Art. 1º, §1º Lei 8.429/92 (com redação da Lei 14.230/2021): 'Consideram-se atos de improbidade administrativa as condutas dolosas tipificadas nos arts. 9º, 10 e 11 desta Lei, ressalvados tipos culposos expressamente previstos em lei.' JURISPRUDÊNCIA: STF RE 852.475."},{"n":71,"enun":"Os atos administrativos vinculados são aqueles em que a lei deixa ao agente público uma margem de liberdade para agir, podendo ele escolher entre diferentes opções de conduta consideradas igualmente legítimas.","gab":"ERRADO","com":"Os atos DISCRICIONÁRIOS são os que conferem margem de liberdade ao agente (mérito administrativo). Os atos VINCULADOS não deixam margem — a lei define todos os elementos do ato, e o agente apenas executa o que a norma determina.","fund":"DOUTRINA: Di Pietro — ato vinculado: todos os elementos ditados pela lei; ato discricionário: existe liberdade de escolha entre opções legítimas. A assertiva inverteu os conceitos.","peg":"Banca define discricionário como vinculado — inversão clássica."},{"n":72,"enun":"As autarquias são pessoas jurídicas de direito público criadas por lei para desempenhar atividade típica da administração pública, sujeitando-se ao controle da pessoa política que as criou.","gab":"CERTO","com":"Art. 37, XIX, CF: as autarquias são criadas por lei específica (não por decreto). São PJ de direito público, integrantes da administração indireta, e estão sujeitas ao controle tutelar (supervisão ministerial) do ente criador.","fund":"LEI: Art. 37, XIX CF: 'somente por lei específica poderá ser criada autarquia e autorizada a instituição de empresa pública, de sociedade de economia mista e de fundação...'"},{"n":73,"enun":"O prazo prescricional para a Administração Pública impor sanções disciplinares ao servidor público federal por ilícito que também configura crime é de 5 anos, contados do conhecimento do fato pela administração.","gab":"ERRADO","com":"Para ilícitos que também configuram crime, o prazo prescricional administrativo acompanha o prazo da prescrição penal (art. 142, §2º, Lei 8.112/90). Como os crimes têm prazos que podem superar 5 anos, o prazo administrativo pode ser superior a 5 anos nesses casos.","fund":"LEI: Art. 142, §2º Lei 8.112/1990: 'Os prazos de prescrição previstos na lei penal aplicam-se às infrações disciplinares capituladas também como crime.'"},{"n":74,"enun":"No processo administrativo federal (Lei 9.784/1999), é assegurado ao administrado o direito de vista do processo, de obter certidões e de formular alegações, não sendo, contudo, garantido o contraditório antes da tomada de decisão que afete interesses.","gab":"ERRADO","com":"A Lei 9.784/1999 garante expressamente o contraditório e a ampla defesa no processo administrativo (art. 2º, caput). O administrado tem direito à ciência dos atos, à manifestação e ao contraditório antes de decisão que o afete.","fund":"LEI: Art. 2º Lei 9.784/1999: 'A Administração Pública obedecerá, dentre outros, aos princípios da legalidade, finalidade, motivação, razoabilidade, proporcionalidade, moralidade, ampla defesa, contraditório...'"},{"n":75,"enun":"O poder de polícia da Administração Pública é discricionário e coercitivo, podendo ser delegado a pessoas jurídicas de direito privado integrantes da administração indireta.","gab":"CERTO","com":"O STF, no RE 633.782 (Tema 532, 2020), admitiu a delegação de poder de polícia a pessoas jurídicas de direito privado que integrem a administração pública (ex.: empresas públicas), desde que a atividade não envolva o uso da força coercitiva em sentido estrito. A delegação a particulares estranhos à administração permanece vedada.","fund":"JURISPRUDÊNCIA: STF RE 633.782 (Tema 532, j. 2020): poder de polícia pode ser delegado a PJ de direito privado da administração indireta. A coercitividade em sentido estrito (uso da força) não pode ser delegada a particulares externos."},{"n":76,"enun":"A anulação de ato administrativo eivado de ilegalidade pode ser feita pela própria Administração (autotutela), sem necessidade de intervenção judicial, e seus efeitos retroagem à data do ato anulado (ex tunc).","gab":"CERTO","com":"Súmulas 346 e 473 do STF consolidam a autotutela administrativa: a Administração pode anular seus próprios atos ilegais, com efeitos retroativos (ex tunc). A revogação, por sua vez, tem efeitos ex nunc.","fund":"JURISPRUDÊNCIA: Súmula 346 STF: 'A Administração Pública pode declarar a nulidade dos seus próprios atos.' Súmula 473 STF: 'A administração pode anular seus próprios atos, quando eivados de vícios que os tornam ilegais, porque deles não se originam direitos...'","jur_status":"PENDENTE"},{"n":77,"enun":"A Administração Pública, ao exercer o poder disciplinar sobre seus servidores, pode impor penalidade mais grave do que a mínima cominada sem fundamentação específica, desde que o ilícito seja grave.","gab":"ERRADO","com":"O princípio da motivação exige fundamentação específica e proporcional para qualquer penalidade imposta. A gravidade do ilícito não dispensa a fundamentação — ao contrário, deve ser explicitada. O STJ anula penalidades disciplinares sem fundamentação adequada.","fund":"LEI: Art. 50 Lei 9.784/1999: dever de motivação dos atos administrativos que imponham sanções. Art. 128 Lei 8.112/1990: graduação da penalidade conforme a gravidade da infração, mas com motivação."},{"n":78,"enun":"Os bens públicos de uso comum do povo — como ruas e praças — são inalienáveis enquanto mantiverem essa afetação, mas podem ser objeto de uso privativo por particular mediante concessão ou permissão de uso.","gab":"CERTO","com":"Bens de uso comum do povo são inalienáveis enquanto afetados ao uso público. Podem, contudo, ter seu uso privativo concedido a particulares (concessão onerosa — ex.: bancas de jornal em praça pública), o que não os desafeta. A desafetação requer lei.","fund":"LEI: Arts. 99 e 100 CC: bens públicos de uso comum são inalienáveis enquanto tiverem esse uso. DOUTRINA: uso privativo por particular (concessão de uso) é admitido sem desafetação."},{"n":79,"enun":"A desapropriação por utilidade pública é efetivada mediante declaração expropriatória do Executivo, seguida de acordo amigável ou ação judicial, com pagamento de prévia e justa indenização em dinheiro.","gab":"CERTO","com":"Art. 5º, XXIV, CF: a desapropriação por utilidade ou necessidade pública exige prévia e justa indenização em dinheiro. A desapropriação para reforma agrária (art. 184 CF) admite indenização em títulos da dívida agrária.","fund":"LEI: Art. 5º, XXIV CF: 'a lei estabelecerá o procedimento para desapropriação por necessidade ou utilidade pública, ou por interesse social, mediante justa e prévia indenização em dinheiro, ressalvados os casos previstos nesta Constituição.'"},{"n":80,"enun":"A responsabilidade do Estado por dano decorrente de ato jurisdicional — como sentença judicial — é objetiva, nos mesmos moldes da responsabilidade por atos administrativos.","gab":"ERRADO","com":"A regra é que atos jurisdicionais típicos (sentença) geram responsabilidade do Estado apenas em hipóteses excepcionais (erro judiciário reconhecido; prisão além do tempo — art. 5º, LXXV, CF). A responsabilidade objetiva é a regra para atos administrativos; para atos jurisdicionais, a responsabilidade é subjetiva e restrita.","fund":"LEI: Art. 5º, LXXV CF: 'o Estado indenizará o condenado por erro judiciário, assim como o que ficar preso além do tempo fixado na sentença.' Para atos jurisdicionais em geral: responsabilidade por dolo ou fraude (subjetiva) — doutrina majoritária e STF.","peg":"Banca afirma que ato jurisdicional segue a mesma regra de responsabilidade objetiva — ERRADO."}]},{"nome":"Medicina Legal","comando":"No que se refere à medicina legal e às perícias médico-legais, julgue os itens seguintes.","itens":[{"n":81,"enun":"A zona de tatuagem nas lesões por projétil de arma de fogo é formada por grãos de pólvora não queimada que se fixam na derme, sendo irremovível por lavagem, o que a distingue da zona de esfumaçamento.","gab":"CERTO","com":"A zona de tatuagem (pólvora não queimada cravada na derme) é irremovível — distingue-se da zona de esfumaçamento (fuligem superficial), que pode ser removida por lavagem. Esse elemento indica tiro disparado a até 60 cm da vítima.","fund":"DOUTRINA: Genival Veloso de França — Medicina Legal. Zona de tatuagem: irremovível, até 60 cm. Zona de esfumaçamento: removível, até 30–40 cm."},{"n":82,"enun":"No tiro encostado (disparo em contato com a pele), forma-se uma lesão em estrelamento ao redor do orifício de entrada, em razão da ação explosiva dos gases que precedem o projétil.","gab":"CERTO","com":"No tiro encostado, os gases penetram antes ou junto com o projétil, produzindo a câmara de mina sob a pele, com lacerações em forma de estrela (estrelamento) ao redor da ferida. Também há zona de chamuscamento e sinal de Bonnet (enfisema subcutâneo).","fund":"DOUTRINA: França — tiro encostado: câmara de mina, estrelamento, chamuscamento, sinal de Bonnet."},{"n":83,"enun":"A ferida de saída produzida por projétil de arma de fogo apresenta, em regra, bordas regulares, orla de contusão e zona de tatuagem, diferentemente da ferida de entrada.","gab":"ERRADO","com":"A ferida de ENTRADA possui orla de contusão (e zona de tatuagem/esfumaçamento em tiros próximos). A ferida de SAÍDA é caracterizada por bordas irregulares, em rasgão (ou 'explodidas'), sem orla de contusão e sem zona de tatuagem.","fund":"DOUTRINA: França — ferida de saída: maior, bordas irregulares, sem orla de contusão, sem tatuagem. Inverso da ferida de entrada.","peg":"Banca atribui características da FE à FS — ERRADO."},{"n":84,"enun":"A cauda de escoriação produzida por projétil de arma de fogo em trajetória rasante (tangencial) indica a direção do projétil: a cauda aponta para a origem do disparo.","gab":"CERTO","com":"Quando o projétil atinge obliquamente a superfície, a zona de escoriação se alonga em forma de vírgula — a cauda aponta na direção de onde veio o projétil (origem do tiro), auxiliando na reconstrução da dinâmica.","fund":"DOUTRINA: França — cauda de escoriação indica direção do projétil; cauda = origem do disparo."},{"n":85,"enun":"O residuograma (análise de resíduos de disparo — GSR) detecta partículas de chumbo, bário e antimônio nos poros da mão do atirador, sendo exame auxiliar na identificação de quem efetuou o disparo.","gab":"CERTO","com":"O GSR (Gunshot Residue) analisa partículas metálicas (Pb, Ba, Sb) que se depositam nas mãos e arredores após o disparo. É exame complementar da balística forense. Deve ser colhido precocemente, pois partículas se perdem rapidamente.","fund":"DOUTRINA: criminalística forense — GSR é o exame de resíduo de pólvora; tríade Pb+Ba+Sb é diagnóstica."},{"n":86,"enun":"A balística terminal estuda o comportamento do projétil no alvo (tecidos humanos), enquanto a balística externa estuda a trajetória do projétil no ar, entre a boca do cano e o alvo.","gab":"CERTO","com":"A balística forense divide-se em: interna (interior do cano), externa (trajeto no ar) e terminal (comportamento no alvo). Cada fase é relevante para a perícia do local de crime e para a medicina legal.","fund":"DOUTRINA: balística forense — três fases: interna, externa, terminal (ou de dano)."},{"n":87,"enun":"No exame de corpo de delito em vítima de homicídio por arma de fogo, a ausência de orifício de saída do projétil indica, necessariamente, que o disparo foi realizado a longa distância.","gab":"ERRADO","com":"A ausência de orifício de saída ocorre quando o projétil ficou retido no corpo — por fragmentação, baixa energia cinética, desvio por tecidos densos ou por ângulo de impacto. Não é indicativo de longa distância, mas de retenção do projétil.","fund":"DOUTRINA: França — ausência de FS indica projétil retido. Distância do disparo é inferida pelos efeitos secundários (tatuagem, esfumaçamento), não pela presença/ausência de FS."},{"n":88,"enun":"A perquirição da zona de esfumaçamento nas lesões por projétil de arma de fogo deve ocorrer antes da lavagem do cadáver, pois a fuligem pode ser removida pela limpeza do corpo.","gab":"CERTO","com":"A zona de esfumaçamento é formada por fuligem (carbono) que se deposita superficialmente na pele. Ao contrário da zona de tatuagem, é removível por lavagem — por isso, o exame pericial deve ser feito antes de qualquer limpeza da ferida.","fund":"DOUTRINA: França — zona de esfumaçamento removível; exame deve ser precoce. Zona de tatuagem: irremovível."},{"n":89,"enun":"A lesão decorrente de tiro a longa distância (acima de 60 cm) apresenta apenas a orla de contusão como elemento residual, sem zonas de esfumaçamento ou tatuagem.","gab":"CERTO","com":"Em tiros de longa distância (> 60 cm), os efeitos secundários (gases, pólvora, fuligem) se dispersam no ar antes de atingir o alvo. Resta somente a zona de contusão (orla mecânica produzida pelo projétil) e a orla de enxugo (resíduo do projétil).","fund":"DOUTRINA: França — tiro longo: apenas zona de contusão/enxugo. Sem tatuagem (> 60 cm), sem esfumaçamento (> 30–40 cm)."},{"n":90,"enun":"O exame de corpo de delito pode ser suprido pela prova testemunhal quando o crime não deixar vestígio, mas não pode ser dispensado quando a infração penal deixar vestígios materiais.","gab":"CERTO","com":"Art. 158 CPP: quando a infração deixar vestígios, é indispensável o exame de corpo de delito, direto ou indireto, não podendo supri-lo a confissão do acusado. Art. 167 CPP: na falta de perito, o exame indireto pode ser feito por testemunhas que tenham visto o vestígio.","fund":"LEI: Art. 158 CPP: 'Quando a infração deixar vestígios, será indispensável o exame de corpo de delito, direto ou indireto, não podendo supri-lo a confissão do acusado.'"}]},{"nome":"Direito Civil e Legislação Civil Complementar","comando":"Com relação ao direito civil e à legislação civil complementar, julgue os itens a seguir.","itens":[{"n":91,"enun":"A prescrição extingue o direito subjetivo em si, enquanto a decadência extingue apenas a pretensão de exigi-lo em juízo.","gab":"ERRADO","com":"É o CONTRÁRIO: a prescrição extingue a pretensão (direito de ação para exigir o cumprimento do direito); a decadência extingue o próprio direito potestativo (direito em si). Confusão clássica que a CEBRASPE explora.","fund":"LEI: Art. 189 CC: 'Violado o direito, nasce para o titular a pretensão, a qual se extingue, pela prescrição...' (prescrição = pretensão). Decadência: art. 207 ss. CC — extingue o direito pelo não exercício no prazo.","peg":"Inversão clássica: prescrição → pretensão; decadência → direito potestativo."},{"n":92,"enun":"Os prazos decadenciais legais não podem ser alterados por acordo das partes e não se suspendem nem se interrompem, salvo disposição legal em contrário.","gab":"CERTO","com":"Art. 207 CC: 'Salvo disposição legal em contrário, não se aplicam à decadência as normas que impedem, suspendem ou interrompem a prescrição.' A decadência convencional, ao contrário, admite renúncia pelas partes (art. 209 CC — pode ser renunciada após consumada).","fund":"LEI: Art. 207 CC: decadência legal não se suspende nem interrompe, salvo lei. Art. 209 CC: é nula a renúncia à decadência fixada em lei — mas pode ser renunciada após sua consumação."},{"n":93,"enun":"Nos termos do Código Civil, o prazo prescricional para cobrança de dívidas civis líquidas constantes de instrumento público ou particular é de 10 anos.","gab":"CERTO","com":"O prazo geral de prescrição do art. 205 CC é de 10 anos (regra residual). Dívidas líquidas constantes de instrumento assinado (art. 206, §5º, I CC) têm prazo especial de 5 anos. Para dívidas sem instrumento, aplica-se o prazo de 10 anos.","fund":"LEI: Art. 205 CC (prazo geral — 10 anos). Art. 206, §5º, I CC: 'Em cinco anos: I — a pretensão de cobrança de dívidas líquidas constantes de instrumento público ou particular.'"},{"n":94,"enun":"O negócio jurídico realizado por pessoa relativamente incapaz sem a devida assistência de seu representante legal é nulo de pleno direito.","gab":"ERRADO","com":"O negócio praticado por relativamente incapaz sem assistência é ANULÁVEL (não nulo). Nulo é o negócio praticado por absolutamente incapaz (menor de 16 anos). A distinção entre nulidade e anulabilidade é fundamental: nulidade é de pleno direito; anulabilidade requer alegação da parte interessada.","fund":"LEI: Art. 171, I CC: 'É anulável o negócio jurídico: I — por incapacidade relativa do agente.' Art. 166 CC: hipóteses de nulidade absoluta (inclui absolutamente incapaz).","peg":"Banca troca anulável por nulo para o relativamente incapaz."},{"n":95,"enun":"A lesão, como vício do negócio jurídico (CC, art. 157), ocorre quando uma pessoa assume obrigação excessivamente onerosa por necessidade ou inexperiência, havendo desproporção no valor das prestações.","gab":"CERTO","com":"Art. 157 CC: lesão é vício que torna o negócio anulável. Dois elementos: objetivo (desproporção de prestações — lucro excessivo) e subjetivo (necessidade ou inexperiência do lesado). A contraparte não precisa agir com dolo — basta o aproveitamento.","fund":"LEI: Art. 157 CC: 'Ocorre a lesão quando uma pessoa, sob premente necessidade, ou por inexperiência, se obriga a prestação manifestamente desproporcional ao valor da prestação oposta.'"},{"n":96,"enun":"No dano moral puro, segundo o STJ, não se exige comprovação do sofrimento efetivo, sendo suficiente a demonstração da conduta ilícita que, por sua natureza, gera o dano (dano in re ipsa).","gab":"CERTO","com":"STJ Súmula 403: uso indevido de imagem gera dano in re ipsa (independe de prova). O STJ também reconhece dano in re ipsa em outros casos (inscrição indevida em cadastro de inadimplentes, negativação irregular etc.).","fund":"JURISPRUDÊNCIA: STJ Súmula 403: 'Independe de prova do prejuízo a indenização pela publicação não autorizada de imagem de pessoa com fins econômicos ou comerciais.' STJ — dano in re ipsa em negativação irregular."},{"n":97,"enun":"O prazo para anulação de negócio jurídico por dolo é de 4 anos, contados do dia em que se realizou o negócio.","gab":"CERTO","com":"Art. 178, II CC: o prazo decadencial para anular negócio por dolo é de 4 anos, contados da data da realização do negócio. Os demais vícios do consentimento (erro, coação, estado de perigo, lesão) também têm prazo de 4 anos, mas com marcos distintos.","fund":"LEI: Art. 178, II CC: 'É de quatro anos o prazo de decadência para pleitear-se a anulação do negócio jurídico, contado: II — no de dolo, do dia em que o negócio foi realizado.'"},{"n":98,"enun":"A responsabilidade civil objetiva por atividade de risco criada (art. 927, parágrafo único, CC) exige que o risco seja extraordinário e específico, não bastando o risco inerente à atividade normalmente desenvolvida.","gab":"ERRADO","com":"O art. 927, parágrafo único, CC exige que a atividade implique, por sua natureza, risco para os direitos de outrem. O STJ entende que o risco deve ser DIFERENCIADO (acima do risco normal) — mas não necessariamente extraordinário; basta ser inerente à atividade e superior ao padrão ordinário.","fund":"LEI: Art. 927, parágrafo único CC: 'Haverá obrigação de reparar o dano, independentemente de culpa, nos casos especificados em lei, ou quando a atividade normalmente desenvolvida pelo autor do dano implicar, por sua natureza, risco para os direitos de outrem.' JURISPRUDÊNCIA: STJ — risco diferenciado, não necessariamente extraordinário."}]},{"nome":"Direito Tributário e Legislação Tributária Complementar","comando":"Acerca do direito tributário e do sistema tributário nacional, julgue os itens a seguir.","itens":[{"n":99,"enun":"As contribuições de melhoria somente podem ser cobradas se houver efetiva valorização imobiliária decorrente de obra pública, sendo o seu limite total fixado no custo total da obra.","gab":"CERTO","com":"Art. 81 CTN: a contribuição de melhoria é cobrada para fazer face ao custo de obras públicas de que decorra valorização imobiliária. Tem dois limites: total (custo da obra) e individual (valorização do imóvel de cada contribuinte).","fund":"LEI: Art. 81 CTN: 'A contribuição de melhoria cobrada pela União, pelos Estados, pelo Distrito Federal ou pelos Municípios, no âmbito de suas respectivas atribuições, é instituída para fazer face ao custo de obras públicas de que decorra valorização imobiliária...'"},{"n":100,"enun":"A isenção tributária, prevista em lei, pode ser revogada a qualquer tempo pelo ente federativo que a concedeu, mesmo quando outorgada por prazo certo e condicionada ao cumprimento de requisitos pelo contribuinte.","gab":"ERRADO","com":"Art. 178 CTN: a isenção outorgada por prazo certo e condicionada ao cumprimento de requisitos gera direito adquirido — não pode ser revogada durante o prazo. A isenção genérica (sem prazo ou sem condição) pode ser revogada.","fund":"LEI: Art. 178 CTN: 'A isenção, salvo se concedida por prazo certo e em função de determinadas condições, pode ser revogada ou modificada por lei, a qualquer tempo, observado o disposto no inciso III do art. 104 desta Lei.'"},{"n":101,"enun":"O crédito tributário é constituído pelo lançamento, que é o ato privativo da autoridade administrativa que verifica a ocorrência do fato gerador, determina a matéria tributável, calcula o montante do tributo devido e identifica o sujeito passivo.","gab":"CERTO","com":"Art. 142 CTN define lançamento com precisão: ato privativo da autoridade administrativa. Consiste em verificar o FG, determinar a matéria tributável, calcular o tributo, identificar o sujeito passivo e propor a penalidade, se aplicável.","fund":"LEI: Art. 142 CTN: 'Compete privativamente à autoridade administrativa constituir o crédito tributário pelo lançamento, assim entendido o procedimento administrativo tendente a verificar a ocorrência do fato gerador da obrigação correspondente...'"},{"n":102,"enun":"A denúncia espontânea, prevista no art. 138 do CTN, exclui tanto a multa punitiva quanto a multa moratória, desde que o contribuinte efetue o pagamento do tributo antes de qualquer procedimento fiscal.","gab":"ERRADO","com":"STJ Súmula 360: a denúncia espontânea não abrange a multa moratória, pois esta não tem caráter punitivo (é encargo pelo atraso). A exclusão da responsabilidade pela denúncia espontânea alcança apenas a multa de ofício (punitiva), não a mora.","fund":"JURISPRUDÊNCIA: STJ Súmula 360: 'O benefício da denúncia espontânea não se aplica aos tributos sujeitos a lançamento por homologação regularmente declarados, mas pagos a destempo.' LEI: Art. 138 CTN.","peg":"Banca diz que exclui também a moratória — ERRADO pelo STJ Súmula 360."},{"n":103,"enun":"As hipóteses de suspensão do crédito tributário estão previstas taxativamente no Código Tributário Nacional e incluem, entre outras, o depósito do montante integral, as reclamações e os recursos administrativos.","gab":"CERTO","com":"Art. 151 CTN lista as causas de suspensão do crédito tributário (taxativas, por ser matéria de normas gerais — art. 146, III, CF): moratória, depósito integral, reclamações e recursos administrativos, liminar em MS ou em tutela antecipada, e parcelamento.","fund":"LEI: Art. 151 CTN: 'Suspendem a exigibilidade do crédito tributário: I — moratória; II — o depósito do seu montante integral; III — as reclamações e os recursos, nos termos das leis reguladoras do processo tributário administrativo; IV — a concessão de medida liminar em mandado de segurança; V — a concessão de medida liminar ou de tutela antecipada, em outras espécies de ação judicial; VI — o parcelamento.'"},{"n":104,"enun":"O Imposto sobre Produtos Industrializados (IPI) é tributo federal que deve obedecer ao princípio da anterioridade nonagesimal (anterioridade de 90 dias), mas está dispensado da anterioridade anual (exercício fiscal).","gab":"CERTO","com":"Art. 150, §1º CF: o IPI está excepcionado da anterioridade anual (pode ser majorado e cobrado no mesmo exercício financeiro), mas deve observar a anterioridade nonagesimal (90 dias). Assim, um aumento de IPI publicado em outubro/2026 pode ser cobrado a partir de janeiro/2027.","fund":"LEI: Art. 150, §1º CF: 'A vedação do inciso III, b [anterioridade anual], não se aplica aos tributos previstos nos arts. 148, I, 153, I, II, IV e V; e 154, II...' IPI está listado (art. 153, IV CF). Mas a anterioridade nonagesimal (alínea c) se aplica ao IPI."}]},{"nome":"Direito Ambiental e Legislação Ambiental Complementar","comando":"No tocante ao direito ambiental e à legislação ambiental, julgue os itens a seguir.","itens":[{"n":105,"enun":"Segundo o STF (RE 548.181/PR), a responsabilidade penal da pessoa jurídica por crimes ambientais exige a simultânea denúncia da pessoa física que praticou o ato em nome da empresa (teoria da dupla imputação).","gab":"ERRADO","com":"O STF, no RE 548.181/PR (Min. Rosa Weber, 2013), superou a teoria da dupla imputação: a PJ pode ser denunciada e condenada por crime ambiental mesmo sem a concomitante imputação à pessoa física. O STJ aderiu a essa posição a partir de 2015.","fund":"JURISPRUDÊNCIA: STF RE 548.181/PR (Rosa Weber, 1ª T., j. 2013): possível condenar PJ e absolver PF. STJ — abandono da dupla imputação desde 2015. LEI: Art. 225, §3º CF + arts. 3º e 21–24 Lei 9.605/1998.","peg":"Ponto quente: banca afirma que a dupla imputação ainda é exigida — ERRADO (superada).","jur_status":"OK"},{"n":106,"enun":"A responsabilidade civil ambiental é objetiva e de risco integral, o que significa que não admite as excludentes de caso fortuito, força maior, culpa exclusiva de terceiro ou culpa exclusiva da vítima.","gab":"CERTO","com":"O STJ pacificou que a responsabilidade civil por danos ambientais é de RISCO INTEGRAL (REsp 1.374.284 e tese repetitiva). Não se admite qualquer excludente de responsabilidade — diferentemente da teoria do risco administrativo (que admite excludentes).","fund":"JURISPRUDÊNCIA: STJ REsp 1.374.284 (responsabilidade ambiental = risco integral, sem excludentes). LEI: Art. 14, §1º Lei 6.938/1981 + art. 225, §3º CF."},{"n":107,"enun":"A obrigação de reparar dano ambiental é de natureza propter rem, transferindo-se ao adquirente do imóvel degradado independentemente de ter participado da degradação.","gab":"CERTO","com":"O STJ firmou tese repetitiva (Temas 1.079 e 1.145): a obrigação ambiental é propter rem — vincula o atual proprietário ou possuidor, independentemente de ter causado o dano. O novo adquirente assume a responsabilidade pela recuperação.","fund":"JURISPRUDÊNCIA: STJ Temas 1.079/1.145 + julgamento out/2023: obrigação ambiental é propter rem; novo proprietário responde pela recuperação."},{"n":108,"enun":"As penas aplicáveis às pessoas jurídicas condenadas por crimes ambientais incluem pena privativa de liberdade, multa e prestação de serviços à comunidade, conforme o art. 21 da Lei 9.605/1998.","gab":"ERRADO","com":"As penas para PJ (art. 21 da Lei 9.605/1998) são: multa, restrição de direitos e prestação de serviços à comunidade. Pena privativa de liberdade (prisão) é exclusiva de pessoa FÍSICA — PJ não pode ser encarcerada.","fund":"LEI: Art. 21 Lei 9.605/1998: 'As penas aplicáveis isolada, cumulativa ou alternativamente às pessoas jurídicas, de acordo com o disposto no art. 3º, são: I — multa; II — restritivas de direitos; III — prestação de serviços à comunidade.'"},{"n":109,"enun":"A tríplice responsabilidade ambiental (civil, administrativa e penal) é independente: a absolvição penal por insuficiência de provas não implica automaticamente a extinção da obrigação de reparação civil do dano ambiental.","gab":"CERTO","com":"As três esferas de responsabilidade são independentes. A absolvição penal por insuficiência de provas não vincula o juízo cível nem o administrativo. Só gera repercussão cível a absolvição por inexistência material do fato ou por prova de não autoria (arts. 935 CC e 66 CPP).","fund":"LEI: Art. 225, §3º CF. Art. 935 CC: 'A responsabilidade civil é independente da criminal...' Art. 66 CPP: exceções (inexistência do fato ou negativa de autoria)."}]},{"nome":"Direito Empresarial e Legislação Complementar","comando":"No que concerne ao direito empresarial, julgue os itens subsequentes.","itens":[{"n":110,"enun":"O cheque é ordem de pagamento à vista, podendo ser apresentado ao sacado a qualquer tempo, sem sujeição ao prazo de prescrição para execução.","gab":"ERRADO","com":"O cheque é ordem de pagamento à vista, mas a execução prescreve: 6 meses após o prazo de apresentação (30 dias para a mesma praça, 60 dias para praças diferentes). Após a prescrição executiva, sobrevive apenas a ação de enriquecimento sem causa (2 anos) ou ação causal.","fund":"LEI: Art. 59 Lei 7.357/1985 (Lei do Cheque): 'Prescrevem em 6 (seis) meses, contados da expiração do prazo de apresentação, a ação que o portador pode exercer contra o emitente, os endossantes e respectivos avalistas.'"},{"n":111,"enun":"A nota promissória é título de crédito abstrato e autônomo, vinculado à relação causal que lhe deu origem quando o emitente e o tomador forem as partes originárias.","gab":"CERTO","com":"A nota promissória é abstrata: circulando para terceiro de boa-fé, o vício na relação causal não pode ser oposto ao terceiro. Mas na relação direta entre emitente e tomador (partes originárias), a discussão da causa é admitida.","fund":"DOUTRINA: Mamede — abstração e autonomia dos títulos de crédito. Lei 57/1966 (incorpora Lei Uniforme de Genebra): princípio da abstração."},{"n":112,"enun":"No processo de falência (Lei 11.101/2005), a classificação dos créditos segue ordem legal preferencial, e os créditos trabalhistas com valor superior a 150 salários mínimos por credor são classificados como quirografários no que exceder esse limite.","gab":"CERTO","com":"Art. 83, I, da Lei 11.101/2005: créditos trabalhistas têm prioridade até 150 salários mínimos por credor. O excedente é classificado como crédito quirografário. Isso visa impedir que grandes executivos use const TRAP_WORDS=[
  'tão somente','somente','apenas','unicamente','exclusivamente',

  'independentemente','independente de','mesmo que','ainda que',

  'imprescindível','indispensável','imediatamente','automaticamente',
  'de pleno direito','por si só','toda vez que','a qualquer tempo',
  'nunca','jamais','sempre','absolutamente','absoluta',
  'é vedado','são vedados','é proibido','são proibidos',
  'não pode','não podem','impossível','é impossível',
  'salvo','exceto','ressalvado','ressalvada',
  'expressamente','tacitamente'
].sort((a,b)=>b.length-a.length); // longer phrases first

function _escRx(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}
function highlightTraps(html){
  // html is already HTML-escaped plain text; safe to inject <mark>
  TRAP_WORDS.forEach(w=>{
    const re=new RegExp(`(?<![\\wÀ-ÿ])(${_escRx(w)})(?![\\wÀ-ÿ])`,'gi');
    html=html.replace(re,'<mark class="trap-word">$1</mark>');
  });
  return html;
}

function computeFilteredNs(type, disc){
  return S.flat.filter(x=>{
    const dm = !disc || x.discNome === disc;
    if(type==='erros')        return dm && S.respostas[x.n] && S.respostas[x.n]!==x.item.gab;
    if(type==='branco')       return dm && !S.respostas[x.n];
    if(type==='lac')          return dm && S.avaliacoes[x.n]==='lac';
    if(type==='dvd')          return dm && S.avaliacoes[x.n]==='dvd';
    if(type==='problematicos') return dm && (
      (S.respostas[x.n] && S.respostas[x.n]!==x.item.gab) ||
      !S.respostas[x.n] || S.avaliacoes[x.n]==='lac');
    if(type==='disc')         return x.discNome===disc;
    return false;
  }).map(x=>x.n);
}

function buildBlocoSummary(){
  const tot=S.flat.length;
  let ok=0,er=0,blank=0;
  S.flat.forEach(x=>{
    const r=S.respostas[x.n];
    if(r===x.item.gab) ok++;
    else if(r) er++;
    else blank++;
  });
  const disc={};
  S.bloco.disciplinas.forEach(d=>{
    let dok=0,der=0;
    d.itens.forEach(it=>{const r=S.respostas[it.n];if(r===it.gab)dok++;else if(r)der++;});
    const short=d.nome.replace('Direito ','').replace(/ e Legislação .*/,'');
    disc[short]={ok:dok,er:der,tot:d.itens.length};
  });
  const avCnt={dom:0,dvd:0,lac:0,leit:0};
  Object.values(S.avaliacoes).forEach(v=>{if(v in avCnt)avCnt[v]++;});
  return {
    blocoId:S.bloco.meta.id, data:S.bloco.meta.data||S.bloco.meta.id,
    titulo:S.bloco.meta.titulo||'',
    totalQuestoes:tot, acertos:ok, erros:er, branco:blank,
    saldo:ok-er, pct:tot>0?Math.round(ok/tot*100):0,
    tempo:S.totalMs, disciplinas:disc, avaliacoes:avCnt,
    finishedAt:Date.now()
  };
}
/* ── SM-2 SPACED REPETITION ──────────────────────────────── */
function computeSRQuality(h){
  // Mapeia desempenho do bloco para quality SM-2 (0–5)
  const pct=h.pct;
  const av=h.avaliacoes||{};
  const avTotal=(av.dom||0)+(av.dvd||0)+(av.lac||0)+(av.leit||0);
  // Base a partir do aproveitamento
  let q;
  if(pct>=90) q=5;
  else if(pct>=80) q=4;
  else if(pct>=70) q=3;
  else if(pct>=55) q=2;
  else if(pct>=40) q=1;
  else q=0;
  // Ajuste pela autoavaliação: muitas lacunas penaliza, muito domínio bonifica
  if(avTotal>0){
    const lacRatio=(av.lac||0)/avTotal;
    const domRatio=(av.dom||0)/avTotal;
    if(lacRatio>0.4 && q>1) q--;
    if(domRatio>0.6 && q<5) q++;
  }
  return Math.max(0,Math.min(5,q));
}
function applySM2(sr,quality){
  // sr = {interval, repetitions, ef} ou null (primeira vez)
  let {interval=1,repetitions=0,ef=2.5}=sr||{};
  if(quality<3){
    // Abaixo do limiar: recomeça intervalo mas mantém EF (penaliza menos)
    repetitions=0; interval=1;
  } else {
    if(repetitions===0) interval=1;
    else if(repetitions===1) interval=6;
    else interval=Math.round(interval*ef);
    ef=ef+(0.1-(5-quality)*(0.08+(5-quality)*0.02));
    ef=Math.max(1.3,Math.round(ef*100)/100);
    repetitions++;
  }
  const next=new Date();
  next.setDate(next.getDate()+interval);
  return {interval,repetitions,ef,nextReview:next.toISOString().slice(0,10)};
}
function srBadgeHtml(sr){
  if(!sr||!sr.nextReview) return '';
  const today=new Date().toISOString().slice(0,10);
  const diff=(new Date(sr.nextReview)-new Date(today))/(1000*60*60*24);
  if(diff<=0)  return `<span class="sr-badge due">⟳ Revisar hoje</span>`;
  if(diff<=2)  return `<span class="sr-badge soon">⟳ ${Math.round(diff)}d</span>`;
  return `<span class="sr-badge ok">⟳ ${fmtDateShort(sr.nextReview)}</span>`;
}

function saveToHistory(){
  try{
    let hist=loadHistory();
    const s=buildBlocoSummary();
    const idx=hist.findIndex(h=>h.blocoId===s.blocoId);
    // Preserva SR anterior (acumula repetições)
    const prevSR=idx>=0?(hist[idx].sr||null):null;
    const quality=computeSRQuality(s);
    s.sr=applySM2(prevSR,quality);
    s.srQuality=quality; // guarda para debug
    if(idx>=0) hist[idx]=s; else hist.push(s);
    if(hist.length>90) hist=hist.slice(-90);
    localStorage.setItem(HIST_KEY,JSON.stringify(hist));
  }catch(e){}
}
function loadHistory(){
  try{const r=localStorage.getItem(HIST_KEY);return r?JSON.parse(r):[]}catch(e){return [];}
}
function buildBarChart(entries){
  if(!entries.length) return '';
  const W=520,H=108,padB=17,padT=13,inner=H-padB-padT;
  const n=entries.length;
  const bW=Math.max(7,Math.min(26,Math.floor((W-16)/n)-3));
  const gap=(W-bW*n)/(n+1);
  let s=`<svg viewBox="0 0 ${W} ${H}" width="100%" xmlns="http://www.w3.org/2000/svg">`;
  // gridlines
  [50,70,90].forEach(pct=>{
    const gy=padT+Math.round((1-pct/100)*inner);
    s+=`<line x1="0" y1="${gy}" x2="${W}" y2="${gy}" stroke="var(--bord)" stroke-width="1"/>`;
    s+=`<text x="2" y="${gy-2}" font-size="7.5" fill="var(--txt3)">${pct}%</text>`;
  });
  // ref line 70%
  const ry=padT+Math.round(.3*inner);
  s+=`<line x1="0" y1="${ry}" x2="${W}" y2="${ry}" stroke="var(--green)" stroke-dasharray="4,3" opacity=".45" stroke-width="1.2"/>`;
  // bars
  entries.forEach((e,i)=>{
    const bH=Math.max(2,Math.round((e.pct/100)*inner));
    const x=gap+i*(bW+gap), y=H-padB-bH;
    const col=e.pct>=70?'var(--green)':e.pct>=50?'var(--acc)':'var(--red)';
    s+=`<rect x="${x.toFixed(1)}" y="${y}" width="${bW}" height="${bH}" rx="3" fill="${col}" opacity=".82"/>`;
    if(bH>16){s+=`<text x="${(x+bW/2).toFixed(1)}" y="${y+bH-4}" text-anchor="middle" font-size="8" fill="rgba(255,255,255,.8)" font-weight="700">${e.pct}%</text>`;}
    else{s+=`<text x="${(x+bW/2).toFixed(1)}" y="${y-2}" text-anchor="middle" font-size="7.5" fill="${col}">${e.pct}%</text>`;}
    const dl=fmtDateShort(e.data).slice(0,5);
    s+=`<text x="${(x+bW/2).toFixed(1)}" y="${H-2}" text-anchor="middle" font-size="7" fill="var(--txt3)">${dl}</text>`;
  });
  s+='</svg>';
  return s;
}

/* ── DATE FORMAT ─────────────────────────────────────────── */
function fmtDateShort(iso){
  // "2026-06-05" → "05.06.26"
  if(!iso) return '';
  const p=iso.split('-');
  if(p.length<3) return iso;
  return `${p[2]}.${p[1]}.${p[0].slice(2)}`;
}

/* ── TIMER ───────────────────────────────────────────────── */
function fmtTime(ms){
  const s=Math.floor(ms/1000), m=Math.floor(s/60), h=Math.floor(m/60);
  if(h>0) return `${h}h ${(m%60).toString().padStart(2,'0')}m`;
  return `${m}:${(s%60).toString().padStart(2,'0')}`;
}
function startTimer(){

    const bpel=document.getElementById('bp-time');

}
function stopTimer(){
  if(S.timerInterval){clearInterval(S.timerInterval);S.timerInterval=null;}
  if(S.startedAt){S.totalMs+=Date.now()-S.startedAt;S.startedAt=null;}
}

function togglePause(){
  if(S.finished) return;
  S.paused=!S.paused;
  const btn=document.getElementById('btn-pause');
  const overlay=document.getElementById('pause-overlay');
  if(S.paused){
    // Pausa: para timers, bloqueia tela
    stopTimer();
    if(QT.tickInterval){clearInterval(QT.tickInterval);QT.tickInterval=null;}
    if(QT.observer){QT.observer.disconnect();QT.observer=null;}
    QT.visible.clear();
    overlay.classList.remove('hidden');
    btn.textContent='▶';
    btn.classList.add('paused');
    btn.title='Retomar';
  } else {
    // Retoma: esconde overlay, reinicia timers
    overlay.classList.add('hidden');
    btn.textContent='⏸';
    btn.classList.remove('paused');
    btn.title='Pausar';
    // Reinicia apenas se estiver na prova ou no foco
    const inProva=!document.getElementById('sec-prova').classList.contains('hidden');
    const inFoco=FOCO.active;
    if(inProva||inFoco){
      startTimer();
      if(!QT.tickInterval&&!FOCO.active){
        // re-inicia observer e tick na prova normal
        initQTimer();
      } else if(FOCO.active){
        // no foco apenas o tick
        QT.lastTickAt=Date.now();
        QT.tickInterval=setInterval(_qtTick,500);
      }
    }
  }
}

/* ── RENDER PROVA ─────────────────────────────────────────── */
function renderProva(){
  document.getElementById('sec-cover').innerHTML='';
  document.getElementById('sec-placar').classList.add('hidden');
  document.getElementById('sec-prova').classList.remove('hidden');
  document.getElementById('hdr-timer').classList.remove('hidden');
  document.getElementById('hdr-chips').style.display='flex';
  document.getElementById('btn-gab-all').classList.remove('hidden');
  document.getElementById('fab').classList.remove('hidden');
  document.getElementById('bot-bar').classList.remove('hidden');

  const wrap=document.getElementById('prova-wrap');
  let html='';

  const dateLabel=fmtDateShort(S.bloco.meta.data);
  if(dateLabel){document.getElementById('hdr-date').textContent=dateLabel;}
  S.bloco.disciplinas.forEach((d,di)=>{
    const short=d.nome.replace('Direito ','').replace(' e Legislação Especial','').replace(' e Legislação Complementar','');
    html+=`<div class="disc-section" id="disc-${di}">
      <div class="disc-hdr"><h3>${short}</h3></div>
      <div class="comando">${d.comando}</div>
      ${d.itens.map(it=>renderQBlock(it,di)).join('')}
    </div>`;
  });
  wrap.innerHTML=html;

  updateProgress();
  renderQuickNav();
  updateGabAllBtn();
  startTimer();
  initQTimer();
  window.scrollTo(0,0);
}

function renderQBlock(it,di){
  const ans=S.respostas[it.n];
  const gabOn=S.gabsShown[it.n]||S.globalGabShown;
  const isRight=ans&&ans===it.gab;
  const isWrong=ans&&ans!==it.gab;

  const markC=ans==='CERTO'?` sel-c${gabOn?(isRight?' is-right':' is-wrong'):''}`:' ';
  const markE=ans==='ERRADO'?` sel-e${gabOn?(isRight?' is-right':' is-wrong'):''}`:' ';
  const disab=S.finished?'disabled':'';

  let enunHtml=it.enun;
  const m=enunHtml.match(/^(Situação hipotética[^.]*\.)(.*)/s);
  if(m) enunHtml=`<span class="situacao">${m[1].trim()}</span>${m[2].trim()}`;

  let statusHtml='';
  if(gabOn&&ans){
    statusHtml=`<span class="q-status">${isRight?'<span class="ok">✓ Acertou</span>':'<span class="er">✗ Errou</span>'}</span>`;
  }else if(gabOn&&!ans){
    statusHtml=`<span class="q-status" style="color:var(--txt3)">Em branco</span>`;
  }

  let feedbackHtml='';
  if(gabOn){
    const fundSafe=escHtml(it.fund||'');
    const fundCopy=(it.fund||'').replace(/\\/g,'\\\\').replace(/"/g,'&quot;').replace(/'/g,"\\'").replace(/\n/g,'\\n');
    const gabBadgeCls=ans?(isRight?'ok':'er'):'bk';
    const gabBadgeTxt=ans?(isRight?'Acertou ✓':'Errou ✗'):'Em branco';

    // ── Releitura Crítica (enunciado com traps destacados) ──
    const mR=it.enun.match(/^(Situação hipotética[^.]*\.)(.*)/s);
    let relitHtml;
    if(mR){
      relitHtml=`<span class="situacao">${highlightTraps(escHtml(mR[1].trim()))}</span>${highlightTraps(escHtml(mR[2].trim()))}`;
    } else {
      relitHtml=highlightTraps(escHtml(it.enun));
    }
    const trapCount=(relitHtml.match(/class="trap-word"/g)||[]).length;

    // ── Autoavaliação ──
    const av=S.avaliacoes[it.n];
    let avHtml;
    if(av){
      const avl=AV_LABELS[av];
      avHtml=`<div class="av-set">
        <span style="color:var(--txt3);font-size:11.5px;text-transform:uppercase;letter-spacing:.08em;font-weight:600">Autoavaliação:</span>
        <span class="av-chip ${avl.cls}">${avl.icon} ${avl.txt}</span>
        <button class="av-change" onclick="setAvaliacao(${it.n},null)">alterar</button>
      </div>`;
    } else {
      const btns=Object.entries(AV_LABELS).map(([k,v])=>
        `<button class="av-btn ${v.cls}" onclick="setAvaliacao(${it.n},'${k}')">${v.icon} ${v.txt}</button>`
      ).join('');
      avHtml=`<div class="avaliacao-row">
        <div class="avaliacao-lbl">Como você se saiu nessa questão?</div>
        ${btns}
      </div>`;
    }

    feedbackHtml=`<div class="q-feedback">
      <div class="gab-line">
        <span class="gab-label">Gabarito</span>
        <span class="gab-value">&nbsp;${it.gab}</span>
        <span class="gab-badge ${gabBadgeCls}">${gabBadgeTxt}</span>
      </div>
      ${avHtml}
      ${trapCount>0?`<div class="gab-section">
        <button class="gab-hdr" onclick="toggleGabSec(${it.n},'r')">
          <span class="gab-icon">🔍</span>
          <span class="gab-lbl">Releitura Crítica</span>
          <span style="margin-left:auto;margin-right:8px" class="trap-found">⚑ ${trapCount} armadilha${trapCount>1?'s':''}</span>
          <span class="gab-chev open" id="chev-${it.n}-r">▼</span>
        </button>
        <div class="gab-body" id="gb-${it.n}-r">
          <div class="releitura-body">${relitHtml}</div>
          <div class="trap-legend">Palavras destacadas:
            ${TRAP_WORDS.filter(w=>new RegExp(`(?<![\\wÀ-ÿ])${_escRx(w)}(?![\\wÀ-ÿ])`,'i').test(it.enun)).slice(0,8).map(w=>`<mark class="trap-word">${w}</mark>`).join(' ')}
          </div>
        </div>
      </div>`:''}
      <div class="gab-section">
        <button class="gab-hdr" onclick="toggleGabSec(${it.n},'f')">
          <span class="gab-icon">💡</span>
          <span class="gab-lbl">Explicação (Feynman)</span>
          <span class="gab-chev open" id="chev-${it.n}-f">▼</span>
        </button>
        <div class="gab-body" id="gb-${it.n}-f"><div class="feynman-text">${it.com||''}</div></div>
      </div>
      <div class="gab-section">
        <button class="gab-hdr" onclick="toggleGabSec(${it.n},'l')">
          <span class="gab-icon">📖</span>
          <span class="gab-lbl">Lei &amp; Jurisprudência</span>
          <span class="gab-chev open" id="chev-${it.n}-l">▼</span>
        </button>
        <div class="gab-body" id="gb-${it.n}-l">
          <div class="law-block">${fundSafe}</div>
          <button class="copy-btn" onclick="copyFund(this,'${fundCopy}')">📋 Copiar lei &amp; jurisprudência</button>
        </div>
      </div>
      ${it.peg?`<div class="gab-section" style="border-top:1px solid var(--bord)">
        <div style="padding:10px 14px"><div class="peg-box">⚠️ &nbsp;<span><strong>Armadilha:</strong> ${it.peg}</span></div></div>
      </div>`:''}
    </div>`;
  }

  return `<div class="q-block${gabOn?' gab-on':''}" id="q-${it.n}" data-n="${it.n}">
    <div class="q-line">
      <span class="q-tag">${it.n}</span>
      <div class="q-text">${enunHtml}</div>
      <div class="q-marks">
        <button class="q-mark${markC}" onclick="markAns(${it.n},'CERTO')" ${disab} title="Certo (C)">C</button>
        <button class="q-mark${markE}" onclick="markAns(${it.n},'ERRADO')" ${disab} title="Errado (E)">E</button>
      </div>
    </div>
    <div class="q-actions-row">
      <button class="q-show-gab" onclick="toggleGab(${it.n})">${gabOn?'Ocultar gabarito':'Ver gabarito'}</button>
      ${statusHtml}
      <span class="qt-badge qt-idle" id="qt-${it.n}">⏱</span>
    </div>
    ${feedbackHtml}
  </div>`;
}

function rerenderQ(n){
  const el=document.getElementById(`q-${n}`);
  if(!el) return;
  const di=S.flat.find(x=>x.n===n)?.discIdx||0;
  el.outerHTML=renderQBlock(S.flat.find(x=>x.n===n).item, di);
}

/* ── ACTIONS ─────────────────────────────────────────────── */
function markAns(n,val){
  if(S.finished) return;
  if(S.respostas[n]===val) delete S.respostas[n];
  else {
    S.respostas[n]=val;
    // Modo Foco: exibe gabarito automaticamente após responder
    if(typeof FOCO!=='undefined' && FOCO.active && !S.gabsShown[n]) S.gabsShown[n]=true;
  }
  save(); rerenderQ(n); updateProgress(); updateQuickNav();
  setTimeout(()=>_qtUpdateBadge(n),0);
}

function toggleGab(n){
  if(S.gabsShown[n]) delete S.gabsShown[n];
  else S.gabsShown[n]=true;
  save(); rerenderQ(n); updateQuickNav();
}

function toggleGabSec(n,key){
  const body=document.getElementById(`gb-${n}-${key}`);
  const chev=document.getElementById(`chev-${n}-${key}`);
  if(!body) return;
  const open=!body.classList.contains('hidden');
  body.classList.toggle('hidden',open);
  if(chev) chev.classList.toggle('open',!open);
}

function toggleAllGabaritos(){
  S.globalGabShown=!S.globalGabShown;
  if(S.globalGabShown) S.gabsShown={};
  save();
  renderProva(); // full re-render
  updateGabAllBtn();
}
function updateGabAllBtn(){
  const b=document.getElementById('btn-gab-all');
  const t=document.getElementById('tb-gab-all');
  const lbl=S.globalGabShown?'🙈':'👁';
  if(b) b.textContent=lbl;
  if(t) t.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="3"/><path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7-10-7-10-7z"/></svg> ${S.globalGabShown?'Ocultar gabaritos':'Gabaritos'}`;
}

/* ── QUICK NAV ───────────────────────────────────────────── */
function renderQuickNav(){
  const grid=document.getElementById('qn-grid');
  if(!grid) return;
  grid.innerHTML=S.flat.map(x=>{
    const a=S.respostas[x.n];
    const g=S.gabsShown[x.n]||S.globalGabShown;
    let cls=a==='CERTO'?'ac':a==='ERRADO'?'ae':'';
    if(g) cls+=' gs';
    // qa: não respondida e acima do limiar de alerta
    if(!a && (QT.times[x.n]||0)>=QT.ALERT) cls+=' qa';
    return `<button class="qn-btn ${cls}" onclick="jumpTo(${x.n})" title="Q.${x.n}${!a&&(QT.times[x.n]||0)>=QT.ALERT?' · ⏱ '+_fmtQT(QT.times[x.n]):''}">${x.n}</button>`;
  }).join('');
}
function updateQuickNav(){ renderQuickNav(); }
function jumpTo(n){
  document.getElementById('quick-nav').classList.remove('open');
  const el=document.getElementById(`q-${n}`);
  if(el) el.scrollIntoView({behavior:'smooth',block:'center'});
}

/* ── PROGRESS ─────────────────────────────────────────────── */
function updateProgress(){
  const tot=S.flat.length;
  let ok=0,er=0,ans=0;
  S.flat.forEach(x=>{
    const r=S.respostas[x.n];
    if(r===x.item.gab) ok++;
    else if(r) er++;
    if(r) ans++;
  });
  const pct=tot?Math.round(ans/tot*100):0;
  const blank=tot-ans;

  // Header
  document.getElementById('c-ok').textContent='✓ '+ok;
  document.getElementById('c-er').textContent='✗ '+er;
  document.getElementById('c-tot').textContent=ans+'/'+tot;
  document.getElementById('prog-fill').style.width=pct+'%';
  // Toolbar
  const tbans=document.getElementById('tb-ans');
  const tbblank=document.getElementById('tb-blank');
  if(tbans) tbans.textContent=ans;
  if(tbblank) tbblank.textContent=blank;
  // Bottom bar
  const bpok=document.getElementById('bp-ok');
  const bper=document.getElementById('bp-er');
  const bpcur=document.getElementById('bp-cur');
  const bptot=document.getElementById('bp-tot');
  const bbar=document.getElementById('bbar-fill');
  if(bpok) bpok.textContent=ok+' ✓';
  if(bper) bper.textContent=er+' ✗';
  if(bpcur) bpcur.textContent=ans;
  if(bptot) bptot.textContent=tot;
  if(bbar) bbar.style.width=pct+'%';
}

/* ── FINISH ──────────────────────────────────────────────── */
function confirmFinish(){
  const blank=S.flat.filter(x=>!S.respostas[x.n]).length;
  if(blank===0){finishProva();return;}
  const el=document.getElementById('modal-root');
  el.innerHTML=`<div class="modal-ov" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <h3>⚠️ Questões em branco</h3>
      <p>Você tem <strong>${blank} questão(ões) em branco</strong>.<br><br>
      Pela fórmula CEBRASPE, itens em branco valem 0 pontos — ao contrário dos errados (−1). Recomenda-se responder todas as questões.</p>
      <div class="modal-acts">
        <button class="btn-ghost" onclick="closeModal()">Voltar e responder</button>
        <button class="btn-warn" onclick="closeModal();finishProva()">Encerrar mesmo assim</button>
      </div>
    </div>
  </div>`;
}
function finishProva(){
  stopTimer(); stopQTimer(); S.finished=true; S.globalGabShown=true; save();
  saveToHistory(); // persiste no histórico cross-bloco
  renderPlacar();
}
function goBackToProva(jumpN){
  S.finished=false; save();
  renderProva();
  if(jumpN) setTimeout(()=>jumpTo(jumpN),300);
}

/* ── MODO FOCO ────────────────────────────────────────────── */
const FOCO={active:false, idx:0, currentN:null};

function enterFoco(startIdx){
  if(!S.bloco){showToast('Carregue um bloco primeiro');return;}
  if(S.finished){showToast('Bloco já encerrado — use a Revisão');return;}
  // Desconecta apenas o observer (para de acumular tempo via scroll),
  // mas mantém QT.tickInterval ativo para continuar contando tempo em Foco
  if(QT.observer){QT.observer.disconnect();QT.observer=null;}
  QT.visible.clear();
  if(!QT.tickInterval){QT.lastTickAt=Date.now();QT.tickInterval=setInterval(_qtTick,500);}
  FOCO.active=true;
  if(startIdx!==undefined){
    FOCO.idx=Math.max(0,Math.min(startIdx,S.flat.length-1));
  } else {
    // começa na primeira não respondida
    const first=S.flat.findIndex(x=>!S.respostas[x.n]);
    FOCO.idx=first>=0?first:0;
  }
  // oculta tudo, exibe foco
  document.getElementById('sec-prova').classList.add('hidden');
  document.getElementById('sec-placar').classList.add('hidden');
  document.getElementById('sec-historico').classList.add('hidden');
  document.getElementById('sec-revisao').classList.add('hidden');
  document.getElementById('sec-cover').innerHTML='';
  document.getElementById('fab').classList.add('hidden');
  document.getElementById('bot-bar').classList.add('hidden');
  document.getElementById('btn-gab-all').classList.add('hidden');
  document.getElementById('hdr-timer').classList.remove('hidden');
  document.getElementById('hdr-chips').style.display='flex';
  document.getElementById('sec-foco').classList.remove('hidden');
  renderFocoQ();
}

function exitFoco(){
  FOCO.active=false; FOCO.currentN=null;
  document.getElementById('sec-foco').classList.add('hidden');
  renderProva(); // reinicia QT via renderProva → initQTimer
}

function renderFocoQ(){
  const x=S.flat[FOCO.idx];
  if(!x) return;
  const it=x.item;
  FOCO.currentN=it.n;

  const total=S.flat.length;
  const answered=Object.keys(S.respostas).length;
  const pct=Math.round(answered/total*100);
  const discShort=x.discNome.replace('Direito ','').replace(/ e Legislação .*/,'');
  const isFirst=FOCO.idx===0;
  const isLast=FOCO.idx===total-1;
  const hasAns=!!S.respostas[it.n];

  const wrap=document.getElementById('foco-wrap');
  wrap.innerHTML=`
    <div class="foco-hdr">
      <button class="tb-btn" onclick="exitFoco()" title="Sair do Modo Foco (Esc)">✕ Sair</button>
      <span class="foco-qnum">Q.${it.n} · ${FOCO.idx+1}/${total}</span>
      <span class="foco-disc">${discShort}</span>
      <div class="foco-prog-wrap">
        <div class="foco-progress"><div class="foco-prog-fill" id="foco-pf" style="width:${pct}%"></div></div>
        <span class="foco-pct">${pct}%</span>
      </div>
    </div>
    <div class="foco-body">
      ${renderQBlock(it, x.discIdx)}
    </div>
    <div class="foco-nav">
      <button class="btn-ghost" onclick="focoPrev()" ${isFirst?'disabled':''} style="min-width:110px" title="← Seta esquerda">← Anterior</button>
      <div class="foco-nav-hint">
        <div>${answered}/${total} respondidas</div>
        <div style="color:var(--txt3)">${hasAns?'→ Enter para avançar':'C / E para responder'}</div>
      </div>
      <button class="btn-${hasAns?'primary':'ghost'}" onclick="focoNext()" ${isLast?'disabled':''} style="min-width:110px" title="→ Seta direita / Enter">
        ${isLast?'Última':'Próxima →'}
      </button>
    </div>`;

  document.getElementById('sec-foco').scrollTop=0;
  // QT: acumula tempo manualmente no tick
}

function focoNext(){
  if(FOCO.idx<S.flat.length-1){FOCO.idx++;renderFocoQ();}

/* ── QUESTION TIMER ──────────────────────────────────────── */
const QT={
  times:{},         // {n: elapsedMs}
  visible:new Set(),
  lastTickAt:null,
  tickInterval:null,
  observer:null,
  WARN:60000,       // 60s → amber
  ALERT:90000,      // 90s → red + pulse
};

function initQTimer(){
  stopQTimer();
  QT.times={}; QT.visible=new Set(); QT.lastTickAt=Date.now();

  QT.observer=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      const n=parseInt(e.target.dataset.n);
      if(e.isIntersecting) QT.visible.add(n);
      else QT.visible.delete(n);
    });
  },{rootMargin:'-28% 0px -28% 0px',threshold:0});

  document.querySelectorAll('.q-block[data-n]').forEach(el=>QT.observer.observe(el));
  QT.tickInterval=setInterval(_qtTick,500);
}

function stopQTimer(){
  if(QT.tickInterval){clearInterval(QT.tickInterval);QT.tickInterval=null;}
  if(QT.observer){QT.observer.disconnect();QT.observer=null;}
  QT.visible.clear(); QT.lastTickAt=null;
  const pill=document.getElementById('qt-pill');
  if(pill) pill.classList.add('hidden');
}

function _qtTick(){
  const now=Date.now();
  const delta=QT.lastTickAt?now-QT.lastTickAt:0;
  QT.lastTickAt=now;

  let pillN=null, pillMs=0;
  let crossedAlert=false;
  QT.visible.forEach(n=>{
    if(!S.respostas[n]){
      const prevMs=QT.times[n]||0;
      QT.times[n]=prevMs+delta;
      if(QT.times[n]>pillMs){pillMs=QT.times[n];pillN=n;}
      // detecta cruzamento do limiar para atualizar quick nav
      if(prevMs<QT.ALERT && QT.times[n]>=QT.ALERT) crossedAlert=true;
    }
    _qtUpdateBadge(n);
  });
  _qtUpdatePill(pillN,pillMs);
  if(crossedAlert) renderQuickNav();

  // Modo Foco: acumula tempo para a questão visível manualmente
  if(FOCO.active && FOCO.currentN && !S.respostas[FOCO.currentN]){
    QT.times[FOCO.currentN]=(QT.times[FOCO.currentN]||0)+delta;
    _qtUpdateBadge(FOCO.currentN);
    // atualiza % no header do foco
    const pf=document.getElementById('foco-pf');
    if(pf){const t=S.flat.length;const a=Object.keys(S.respostas).length;pf.style.width=Math.round(a/t*100)+'%';}
    const fpct=document.querySelector('.foco-pct');
    if(fpct){const t=S.flat.length;const a=Object.keys(S.respostas).length;fpct.textContent=Math.round(a/t*100)+'%';}
  }
}

function _qtUpdateBadge(n){
  const el=document.getElementById(`qt-${n}`);
  if(!el) return;
  const ms=QT.times[n]||0;
  const answered=!!S.respostas[n];
  if(answered){
    el.className='qt-badge qt-done';
    el.textContent=ms>0?`⏱ ${_fmtQT(ms)}`:'⏱';
    return;
  }
  if(ms<1000){el.className='qt-badge qt-idle';el.textContent='⏱';return;}
  if(ms>=QT.ALERT){el.className='qt-badge qt-alert';el.textContent=`⏱ ${_fmtQT(ms)}`;}
  else if(ms>=QT.WARN){el.className='qt-badge qt-warn';el.textContent=`⏱ ${_fmtQT(ms)}`;}
  else{el.className='qt-badge qt-normal';el.textContent=`⏱ ${_fmtQT(ms)}`;}
}

function _qtUpdatePill(n,ms){
  const pill=document.getElementById('qt-pill');
  if(!pill) return;
  if(!n||ms<8000){pill.classList.add('hidden');return;}
  pill.classList.remove('hidden');
  const inner=pill.querySelector('.qt-active-pill');
  if(!inner) return;
  const cls='qt-active-pill'+(ms>=QT.ALERT?' qt-alert-p':ms>=QT.WARN?' qt-warn-p':'');
  inner.className=cls;
  const icon=ms>=QT.ALERT?'⚠️':ms>=QT.WARN?'⏳':'⏱';
  inner.innerHTML=`${icon} Q.${n} — <span style="font-variant-numeric:tabular-nums">${_fmtQT(ms)}</span>`;
}

function _fmtQT(ms){
  const s=Math.floor(ms/1000);
  return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
}

  ${avCnt.lac>0?`<div style="margin-bottom:20px;padding:10px 14px;background:#fff5f5;border:1px solid #f5c6c6;border-radius:6px;font-size:12.5px;color:#8b0000">⚠️ ${avCnt.lac} lacuna${avCnt.lac>1?'s conceituais':' conceitual'} identificada${avCnt.lac>1?'s':''} — revisão prioritária antes da prova.</div>`:''}
  `:''}

  ${errors.length>0?`<div class="page-break">
  <div class="sec-lbl">Questões Erradas (${errors.length})</div>
  ${errHtmlStr}
  </div>`:`<div style="margin-top:12px">${errHtmlStr}</div>`}
