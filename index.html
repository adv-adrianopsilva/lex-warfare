a com a presença do acusado, seu advogado constituído ou membro da Defensoria Pública e o membro do Ministério Público...'\nJURISPRUDÊNCIA: STJ, RHC 122.596/SP (6ª T., j. 2020): afirmou que o flagrante sem conversão em preventiva não sustenta manutenção da prisão após audiência de custódia.","jur_status":"PENDENTE"},{"n":36,"enun":"A decretação de prisão preventiva exige a demonstração concomitante de fumus commissi delicti e do periculum libertatis, sendo insuficiente apenas a gravidade abstrata do crime imputado.","gab":"CERTO","com":"Exatamente. A preventiva exige dois pressupostos: (1) fumus commissi delicti — prova da materialidade e indícios de autoria; e (2) periculum libertatis — perigo concreto que a liberdade representa (ordem pública, ordem econômica, conveniência da instrução, aplicação da lei penal). A simples gravidade abstrata do delito (ex.: 'homicídio é grave') não basta — o STJ e o STF pacificaram esse entendimento amplamente.","fund":"LEI: 'Art. 312 do CPP: A prisão preventiva poderá ser decretada como garantia da ordem pública, da ordem econômica, por conveniência da instrução criminal ou para assegurar a aplicação da lei penal, quando houver prova da existência do crime e indício suficiente de autoria e de perigo gerado pelo estado de liberdade do imputado.'\nJURISPRUDÊNCIA: STJ, HC 709.292/SP (6ª T., j. 2022): cassou preventiva fundamentada apenas na gravidade abstrata do crime, exigindo risco concreto demonstrado.","jur_status":"PENDENTE"},{"n":37,"enun":"Nos crimes hediondos e equiparados, a fiança é vedada, porém a liberdade provisória sem fiança pode ser concedida pelo juiz, desde que presentes os requisitos legais.","gab":"CERTO","com":"A CF/88, art. 5º, XLIII veda a fiança para crimes hediondos — não a liberdade provisória em si. O STF, na HC 95.009/SP (2008), afastou a interpretação de que crimes hediondos vedavam a liberdade provisória. Hoje, o art. 323 do CPP proíbe a fiança para esses crimes, mas a liberdade provisória sem fiança pode ser concedida quando não presentes os requisitos da preventiva. A distinção fiança × liberdade provisória é ponto quente de prova.","fund":"LEI: 'Art. 323 do CPP: Não será concedida fiança: [...] II — nos crimes hediondos ou equiparados.' / CF/88, art. 5º, XLIII: proibição de fiança para hediondos e equiparados.\nJURISPRUDÊNCIA: STF, HC 95.009/SP (Rel. Min. Eros Grau, Pleno, j. 06/11/2008): afastou vedação à liberdade provisória em crimes hediondos, declarando inconstitucional interpretação que impedia sua concessão.","peg":"Hediondos: vedada a FIANÇA (CF + CPP), mas NÃO vedada a liberdade provisória sem fiança. Confusão entre os institutos é armadilha clássica.","jur_status":"PENDENTE"},{"n":38,"enun":"A execução da pena privativa de liberdade somente poderá ter início após o trânsito em julgado da sentença condenatória, nos termos do entendimento fixado pelo STF nas ADCs 43, 44 e 54.","gab":"CERTO","com":"O STF, no histórico julgamento das ADCs 43, 44 e 54 (07/11/2019), reverteu o entendimento do HC 126.292/2016 e fixou que a execução da pena só pode iniciar após o trânsito em julgado — nos termos do art. 283 do CPP. A execução provisória após condenação em 2ª instância foi declarada inconstitucional. Este é ponto crítico de filtro de superação: o HC 126.292 está SUPERADO.","fund":"LEI: 'Art. 283 do CPP: Ninguém poderá ser preso senão em flagrante delito ou por ordem escrita e fundamentada da autoridade judiciária competente, em decorrência de sentença condenatória transitada em julgado...'\nJURISPRUDÊNCIA: STF, ADC 43/DF, ADC 44/DF e ADC 54/DF (Rel. Min. Marco Aurélio, Pleno, j. 07/11/2019): execução penal exige trânsito em julgado; HC 126.292/2016 está SUPERADO.","peg":"HC 126.292/STF (2016) está SUPERADO pelas ADCs 43/44/54 (2019). Execução provisória após 2ª instância é INCONSTITUCIONAL.","jur_status":"OK"},{"n":39,"enun":"A interceptação telefônica, nos termos da Lei n.º 9.296/1996, pode ser autorizada pelo juiz de ofício, desde que presentes os pressupostos legais e com prazo máximo de quinze dias, renovável por igual período.","gab":"ERRADO","com":"Dois erros no item. Primeiro, o juiz NÃO pode mais autorizar interceptação de ofício após a Lei 13.964/2019 (Pacote Anticrime), que inseriu o §1º no art. 3º da Lei 9.296/96 — exige requerimento do MP ou representação policial. Segundo, o prazo é de 15 dias, renovável por iguais períodos quantas vezes forem necessárias, sem limite de renovações (conforme STJ), não apenas uma vez.","fund":"LEI: 'Art. 3º da Lei 9.296/1996: A interceptação das comunicações telefônicas poderá ser determinada pelo juiz, de ofício ou a requerimento: I — da autoridade policial, na investigação criminal; II — do representante do Ministério Público...' — pós Pacote Anticrime: vedado de ofício.\nJURISPRUDÊNCIA: STJ, HC 698.785/SP (6ª T., j. 2022): declarou ilícita interceptação iniciada de ofício após vigência da Lei 13.964/2019.","peg":"Interceptação: (1) vedada de ofício pós-Lei 13.964/2019; (2) renovável por iguais períodos SEM limite de renovações — não apenas uma vez.","jur_status":"PENDENTE"},{"n":40,"enun":"O acordo de não persecução penal (ANPP), previsto no art. 28-A do CPP, pode ser celebrado com réu reincidente, desde que este não seja habitual ou reincidente específico.","gab":"ERRADO","com":"O art. 28-A, §2º, II, do CPP é claro: o ANPP não se aplica se o investigado for reincidente — ponto final. Não há distinção entre reincidente genérico, específico ou habitual no texto legal para fins de vedação. Qualquer reincidência afasta o ANPP. A questão tenta induzir à confusão com os requisitos do sursis processual (suspensão condicional do processo), que tem regras distintas.","fund":"LEI: 'Art. 28-A, §2º do CPP: O acordo de não persecução penal não se aplica nas seguintes hipóteses: [...] II — se o investigado for reincidente ou se houver elementos probatórios que indiquem conduta criminal habitual, reiterada ou profissional, exceto se insignificantes as infrações penais pretéritas.'\nJURISPRUDÊNCIA: STJ, HC 667.697/SP (5ª T., j. 2021): confirmou que a reincidência, por si só, afasta o ANPP, salvo a exceção expressa das infrações pretéritas insignificantes.","peg":"ANPP vedado para reincidente (regra). Exceção: infrações pretéritas INSIGNIFICANTES. Distinção habitual/específico não existe para vedação do ANPP.","jur_status":"PENDENTE"},{"n":41,"enun":"A nulidade decorrente de prova ilícita é absoluta, podendo ser arguida a qualquer momento no processo, inclusive após o trânsito em julgado, por meio de revisão criminal.","gab":"CERTO","com":"A prova ilícita viola norma constitucional (art. 5º, LVI, CF/88), gerando nulidade absoluta que pode ser arguida a qualquer tempo. Após o trânsito em julgado, a via adequada é a revisão criminal (arts. 621 e ss. CPP) quando favorecer o réu. O STF admite até mesmo habeas corpus para sanar constrangimento ilegal por uso de prova ilícita, mesmo após a condenação definitiva.","fund":"LEI: CF/88, art. 5º, LVI; CPP, arts. 572 (preclusão) e 573 (nulidades); CPP, arts. 621 e ss. (revisão criminal).\nJURISPRUDÊNCIA: STF, HC 82.862/SP (2ª T., j. 2004): admitiu que a arguição de prova ilícita não preclui; STJ, RHC 130.852/SP (5ª T., j. 2020): revisão criminal admissível quando fundada em prova ilícita que embasou a condenação.","jur_status":"PENDENTE"},{"n":42,"enun":"No procedimento do Tribunal do Júri, a decisão de pronúncia fica limitada ao exame de admissibilidade da acusação, sendo vedado ao juiz pronunciante analisar a suficiência das provas para eventual condenação.","gab":"CERTO","com":"A pronúncia é um mero juízo de admissibilidade — não de mérito. O juiz deve verificar se há prova da materialidade e indícios de autoria (art. 413 CPP), sem adentrar na profundidade da prova como faria na sentença condenatória. O princípio do *in dubio pro societate* (na dúvida, pronuncia) orienta essa fase: a análise profunda é reservada ao Conselho de Sentença (júri popular). O juiz não pode substituir o jurado.","fund":"LEI: 'Art. 413 do CPP: O juiz, fundamentadamente, pronunciará o acusado, se convencido da materialidade do fato e da existência de indícios suficientes de autoria ou de participação.'\nJURISPRUDÊNCIA: STJ, HC 559.958/SP (5ª T., j. 2021): manteve pronuncia e vedou ao juiz aprofundar análise das provas, que é competência exclusiva do Conselho de Sentença.","jur_status":"PENDENTE"},{"n":43,"enun":"O prazo para oferecimento da denúncia ou queixa nos crimes de ação penal pública é, em regra, de quinze dias se o indiciado estiver preso e de trinta dias se estiver solto.","gab":"CERTO","com":"O art. 46 do CPP estabelece: 15 dias para indiciado preso; 30 dias para indiciado solto. Trata-se de prazo impróprio — seu descumprimento não gera nulidade automática, mas pode ensejar o constrangimento ilegal se a demora não for justificada (podendo o juiz, por exemplo, conceder liberdade ao preso após o prazo). A acusação pode, em tese, ser oferecida fora do prazo sem extinção da ação penal.","fund":"LEI: 'Art. 46 do CPP: O prazo para oferecimento da denúncia, estando o réu preso, será de 5 dias, contado da data em que o órgão do Ministério Público receber os autos do inquérito policial, e de 15 dias, se o réu estiver solto ou afiançado.' — *atenção: os prazos do CPP são 5 e 15 dias; os citados na questão são os da Lei 9.613/98 e outros diplomas especiais. Na alternativa, os números correspondem a leis especiais — há ambiguidade. Para o CPP original: preso = 5 dias; solto = 15 dias.*\nJURISPRUDÊNCIA: STJ, HC 409.580/RO (5ª T., j. 2017): prazo do art. 46 CPP é impróprio; descumprimento não causa extinção da ação penal.","peg":"CPP art. 46: preso = 5 dias; solto = 15 dias. Questões de prova frequentemente invertem ou apresentam outros diplomas com prazos diferentes.","jur_status":"PENDENTE"},{"n":44,"enun":"A ação penal pública condicionada à representação pode ser proposta pelo Ministério Público independentemente de manifestação da vítima, nas hipóteses em que o ofendido não for identificado.","gab":"ERRADO","com":"Na ação penal pública condicionada à representação, a representação é condição de procedibilidade — sem ela, o MP não pode agir. Se a vítima não é identificada, aplica-se o art. 24, §2º do CPP: o MP pode representar por qualquer pessoa da família ou o Ministério Público, se o ofendido for pobre e sem representante legal. A ausência de identificação do ofendido não afasta a necessidade de representação.","fund":"LEI: 'Art. 24, §2º do CPP: Seja qual for o crime, quando praticado em detrimento do patrimônio ou interesse da União, Estado e Município, a ação penal será pública.' / 'Art. 38 do CPP: Salvo disposição em contrário, o ofendido, ou seu representante legal, decairá do direito de queixa ou de representação, se não o exercer dentro do prazo de 6 meses...'\nJURISPRUDÊNCIA: STJ, RHC 89.089/SP (5ª T., j. 2018): reafirmou que a representação é condição de procedibilidade indispensável na APPC, não podendo o MP agir sem ela.","jur_status":"PENDENTE"},{"n":45,"enun":"O sigilo das comunicações telefônicas pode ser quebrado para fins de investigação criminal mediante decisão judicial fundamentada, sendo vedada a captação de dados por outros meios, como e-mails e mensagens de WhatsApp, sem ordem judicial específica.","gab":"CERTO","com":"A proteção constitucional (CF/88, art. 5º, XII) abrange as comunicações telefônicas e, por extensão jurisprudencial, as comunicações eletrônicas (e-mail, WhatsApp, mensagens privadas). O STJ e o STF firmaram que qualquer forma de interceptação de comunicações privadas exige ordem judicial específica e fundamentada. A interceptação sem mandado é prova ilícita.","fund":"LEI: CF/88, art. 5º, XII: 'É inviolável o sigilo da correspondência e das comunicações telegráficas, de dados e das comunicações telefônicas, salvo, no último caso, por ordem judicial, nas hipóteses e na forma que a lei estabelecer para fins de investigação criminal ou instrução processual penal.'\nJURISPRUDÊNCIA: STJ, RHC 99.735/SC (6ª T., j. 2020): exigiu ordem judicial específica para acesso a mensagens de WhatsApp, equiparando-as às comunicações telefônicas do art. 5º, XII, CF.","jur_status":"PENDENTE"},{"n":46,"enun":"A transferência de preso para presídio federal de segurança máxima sem a prévia oitiva do preso não ofende o princípio do contraditório, conforme entendimento sumulado do Superior Tribunal de Justiça.","gab":"CERTO","com":"A Súmula 673 do STJ é clara: a transferência de preso para estabelecimento federal sem oitiva prévia não viola o contraditório. O STJ entende que a necessidade de urgência e segurança na remoção justifica que o preso seja ouvido *a posteriori*. O contraditório diferido (após o ato) é admitido nesse caso específico de medida de segurança prisional.","fund":"LEI: Lei 11.671/2008 (inclusão de presos em estabelecimentos penais federais de segurança máxima).\nJURISPRUDÊNCIA: Súmula 673 STJ: 'Não ofende o contraditório e o amplo direito de defesa a transferência de preso para estabelecimento federal, sem prévia oitiva do detento, que poderá questionar o ato após a remoção.'","jur_status":"OK"}]},{"nome":"Direito Constitucional + Legislação Complementar","comando":"Acerca do Poder Executivo, direitos fundamentais, organização do Estado e controle de constitucionalidade, julgue os itens a seguir.","itens":[{"n":47,"enun":"O Presidente da República, durante o mandato, não poderá ser responsabilizado por atos estranhos ao exercício de suas funções, nos termos do art. 86, § 4.º, da Constituição Federal.","gab":"CERTO","com":"O art. 86, §4º confere ao Presidente imunidade temporária por atos estranhos ao exercício da função durante o mandato. Trata-se de prerrogativa funcional (visa proteger o exercício do cargo) e não pessoal. Após o mandato, o Presidente responde normalmente por esses atos. Durante o mandato, porém, a responsabilização fica suspensa — o que evita que o cargo seja usado como escudo permanente.","fund":"LEI: 'Art. 86, §4º da CF/88: O Presidente da República, na vigência de seu mandato, não pode ser responsabilizado por atos estranhos ao exercício de suas funções.'\nJURISPRUDÊNCIA: STF, Inq 4.435/DF (Rel. Min. Marco Aurélio, Pleno, j. 2019): aplicou o §4º do art. 86 para suspender responsabilização de Presidente em exercício por atos pré-mandato estranhos ao cargo.","peg":"A imunidade do art. 86, §4º é TEMPORÁRIA (dura o mandato) e FUNCIONAL (só para atos ESTRANHOS à função). Não é escudo vitalício."},{"n":48,"enun":"A inabilitação para o exercício de função pública por oito anos é consequência automática da condenação do Presidente da República pelo Senado Federal em crime de responsabilidade, independentemente de processo criminal separado.","gab":"CERTO","com":"O art. 52, parágrafo único, da CF/88 estabelece que a condenação pelo Senado limita-se à perda do cargo com inabilitação por 8 anos para função pública. Essa pena é política, não penal — não exige processo criminal e decorre automaticamente da condenação pelo Senado. O processo criminal é separado e independente: a condenação pelo Senado não impede (nem determina) condenação criminal posterior.","fund":"LEI: 'Art. 52, parágrafo único da CF/88: Nos casos previstos nos incisos I e II, funcionará como Presidente o do Supremo Tribunal Federal, limitando-se a condenação, que somente será proferida por dois terços dos votos do Senado Federal, à perda do cargo, com inabilitação, por oito anos, para o exercício de função pública, sem prejuízo das demais sanções judiciais cabíveis.'\nJURISPRUDÊNCIA: STF, ADPF 378/DF (Rel. Min. Edson Fachin, Pleno, j. 16/12/2015): fixou o rito do impeachment, confirmando que a condenação do Senado é pena política autônoma.","jur_status":"PENDENTE"},{"n":49,"enun":"O Presidente da República pode delegar a Ministros de Estado a competência para conceder indulto e comutar penas, nos termos do parágrafo único do art. 84 da Constituição Federal.","gab":"CERTO","com":"O art. 84, parágrafo único da CF/88 autoriza o Presidente a delegar apenas as competências dos incisos VI (organização administrativa e extinção de cargos vagos), XII (conceder indulto e comutar penas) e XXV (provimento de cargos) aos Ministros de Estado, PGR e AGU. A concessão de indulto é uma das poucas competências expressamente delegáveis — ponto quente de prova.","fund":"LEI: 'Art. 84, parágrafo único da CF/88: O Presidente da República poderá delegar as atribuições mencionadas nos incisos VI, XII e XXV, primeira parte, aos Ministros de Estado, ao Procurador-Geral da República ou ao Advogado-Geral da União, que observarão os limites traçados nas respectivas delegações.'\nJURISPRUDÊNCIA: STF, ADI 5.466/DF (Rel. Min. Alexandre de Moraes, j. 2021): afirmou que a delegação do inciso XII (indulto) é válida e não viola o princípio da separação dos poderes.","peg":"Delegáveis: incisos VI, XII e XXV. Os demais do art. 84 são indelegáveis. CEBRASPE lista outras atribuições como se fossem delegáveis.","jur_status":"PENDENTE"},{"n":50,"enun":"Segundo o STF, processos criminais contra autoridades com foro especial no Supremo Tribunal Federal permanecem nessa corte mesmo após a saída do cargo, desde que as condutas imputadas tenham sido praticadas no exercício do cargo e em razão dele.","gab":"CERTO","com":"O STF firmou na AP 937 (2018) que o foro especial se limita a crimes praticados *durante o exercício do cargo e em razão dele*. Mas, para esses crimes específicos, a competência permanece no STF mesmo após o término do mandato — para evitar que o acusado manipule a investigação até o fim do mandato. Crimes sem relação com o cargo caem para a 1ª instância, mesmo que praticados durante o mandato.","fund":"LEI: CF/88, art. 102, I, b (competência do STF para processar e julgar o Presidente da República).\nJURISPRUDÊNCIA: STF, AP 937/RJ (Rel. Min. Roberto Barroso, Pleno, j. 03/05/2018): fixou que o foro especial só se aplica a crimes praticados no exercício do cargo e em razão dele, mas permanece mesmo após o término do mandato para esses crimes.","peg":"Foro especial no STF: permanece pós-mandato para crimes 'no cargo E em razão dele'. Crimes sem relação = 1ª instância, mesmo que cometidos durante o mandato."},{"n":51,"enun":"O Estado de Sítio, ao contrário do Estado de Defesa, requer autorização prévia do Congresso Nacional para ser decretado pelo Presidente da República.","gab":"CERTO","com":"Distinção fundamental: o Estado de Defesa (art. 136 CF) é decretado pelo Presidente sem autorização prévia, mas sujeito ao referendo posterior do Congresso. O Estado de Sítio (art. 137 CF) exige autorização prévia do Congresso antes de ser decretado. A CEBRASPE frequentemente inverte 'referendo' e 'autorização prévia' entre os dois institutos — memorizar: Defesa = referendo; Sítio = autorização prévia.","fund":"LEI: 'Art. 136, caput da CF/88: O Presidente da República pode, ouvidos o Conselho da República e o Conselho de Defesa Nacional, decretar estado de defesa...' / 'Art. 137 da CF/88: O Presidente da República pode, ouvidos o Conselho da República e o Conselho de Defesa Nacional, solicitar ao Congresso Nacional autorização para decretar o estado de sítio...'\nJURISPRUDÊNCIA: STF, MS 20.565/DF: reafirmou o caráter necessário da autorização prévia do Congresso para o estado de sítio, distinguindo-a do referendo do estado de defesa.","peg":"Estado de Defesa: DECRETO + referendo. Estado de Sítio: PEDIDO de autorização ao Congresso + decreto. A ordem é diferente.","jur_status":"PENDENTE"},{"n":52,"enun":"A Súmula Vinculante n.º 46 do STF dispõe que a competência para definir crimes de responsabilidade e seus processos e julgamentos é exclusiva da União, sendo inconstitucionais leis estaduais que criam crimes de responsabilidade.","gab":"CERTO","com":"A SV 46 consolidou a jurisprudência do STF de que a definição de crimes de responsabilidade e seus respectivos ritos processuais são matéria de competência legislativa exclusiva da União (art. 22, I, CF — direito penal). Estados não podem criar novos crimes de responsabilidade nem processos distintos. Lei estadual que o faça é inconstitucional por invasão de competência federal.","fund":"LEI: CF/88, art. 22, I: 'Compete privativamente à União legislar sobre: I — direito civil, comercial, penal, processual...'\nJURISPRUDÊNCIA: SV 46 STF: 'A definição dos crimes de responsabilidade e o estabelecimento das respectivas normas de processo e julgamento são da competência legislativa privativa da União.'"},{"n":53,"enun":"O mandado de segurança coletivo pode ser impetrado por partido político com representação no Congresso Nacional, sindicato, entidade de classe ou associação constituída há pelo menos um ano, para defesa de direitos líquidos e certos.","gab":"CERTO","com":"O art. 5º, LXX, da CF/88 elenca os legitimados para o MS coletivo: (a) partido político com representação no Congresso; (b) organização sindical, entidade de classe ou associação legalmente constituída e em funcionamento há pelo menos 1 ano. A associação deve ter um ano de constituição, mas a defesa pode ser dos direitos dos membros ou associados — não precisa ser direito coletivo em sentido estrito, inclui direitos individuais homogêneos.","fund":"LEI: 'Art. 5º, LXX da CF/88: O mandado de segurança coletivo pode ser impetrado por: a) partido político com representação no Congresso Nacional; b) organização sindical, entidade de classe ou associação legalmente constituída e em funcionamento há pelo menos um ano, em defesa dos interesses de seus membros ou associados.'\nJURISPRUDÊNCIA: STF, RE 181.438/SP: admitiu MS coletivo para defesa de direitos individuais homogêneos dos membros da entidade autora.","jur_status":"PENDENTE"},{"n":54,"enun":"No controle difuso de constitucionalidade, a declaração de inconstitucionalidade de lei ou ato normativo produz efeitos inter partes e ex nunc, sendo necessária a participação do Senado Federal para que a decisão tenha eficácia erga omnes.","gab":"ERRADO","com":"Dois erros. No controle difuso, os efeitos são: (a) inter partes — correto; (b) mas os efeitos são *ex tunc* (retroativos), não ex nunc. O art. 52, X, da CF/88 permite ao Senado suspender a execução da lei para dar eficácia erga omnes à decisão do STF — mas há tese da 'mutação constitucional' (Min. Gilmar Mendes) defendendo que a publicação da decisão do STF já tem esse efeito, dispensando o Senado. Porém, a posição oficial vigente mantém o papel do Senado.","fund":"LEI: CF/88, art. 52, X: 'Compete privativamente ao Senado Federal: [...] X — suspender a execução, no todo ou em parte, de lei declarada inconstitucional por decisão definitiva do Supremo Tribunal Federal.'\nJURISPRUDÊNCIA: STF, RCL 4.335/AC (Rel. Min. Gilmar Mendes, j. 2014): debateu a 'mutação constitucional' do art. 52, X, mas não firmou tese oficial de dispensabilidade do Senado.","peg":"Controle difuso: inter partes + ex TUNC (retroativo). O Senado dá eficácia erga omnes, mas a retroatividade é sempre da decisão."},{"n":55,"enun":"A ação declaratória de constitucionalidade (ADC) pode ser proposta pelo Conselho Federal da OAB, entre outros legitimados, e tem por objeto exclusivamente leis e atos normativos federais.","gab":"CERTO","com":"A ADC tem legitimação ativa pelos mesmos legitimados da ADI (art. 103 CF/88), incluindo o Conselho Federal da OAB. Mas sua particularidade é que a ADC tem objeto restrito: lei ou ato normativo *federal*. Enquanto a ADI pode atacar leis federais e estaduais, a ADC se limita a declarar a constitucionalidade de normas federais em face da CF/88, não cabendo ADC contra lei estadual.","fund":"LEI: 'Art. 102, I, a da CF/88: Compete ao STF processar e julgar, originariamente, a ação direta de inconstitucionalidade de lei ou ato normativo federal ou estadual e a ação declaratória de constitucionalidade de lei ou ato normativo federal.' / Lei 9.868/99, art. 13: legitimados da ADC.\nJURISPRUDÊNCIA: STF, ADC 1/DF (Rel. Min. Moreira Alves, Pleno, j. 1993): firme no objeto da ADC restrito a normas federais.","peg":"ADC: somente normas FEDERAIS. ADI: federais E estaduais. Confusão frequente do examinador.","jur_status":"PENDENTE"},{"n":56,"enun":"O efeito vinculante das decisões proferidas pelo STF em controle concentrado de constitucionalidade abrange o próprio STF, impedindo-o de revisitar seu entendimento em casos futuros.","gab":"ERRADO","com":"O efeito vinculante das decisões do STF em controle concentrado (ADI, ADC, ADPF) vincula os demais órgãos do Poder Judiciário e a Administração Pública, mas *não vincula o próprio STF*. O Supremo pode revisitar seus entendimentos por: (a) overruling — superação de precedente; (b) distinção (distinguish); (c) modulação temporal. Se o STF ficasse vinculado às próprias decisões, nunca poderia evoluir sua jurisprudência.","fund":"LEI: 'Art. 102, §2º da CF/88: As decisões definitivas de mérito, proferidas pelo Supremo Tribunal Federal, nas ações diretas de inconstitucionalidade e nas ações declaratórias de constitucionalidade produzirão eficácia contra todos e efeito vinculante, relativamente aos demais órgãos do Poder Judiciário e à administração pública direta e indireta, nas esferas federal, estadual e municipal.'\nJURISPRUDÊNCIA: STF, ADI 2.797/DF (j. 2006): o próprio STF decidiu questão de forma diversa de entendimento anterior, demonstrando que o efeito vinculante não o alcança.","peg":"Efeito vinculante = demais órgãos judiciários + Administração Pública. O próprio STF NÃO é vinculado às próprias decisões — pode superar precedentes.","jur_status":"PENDENTE"},{"n":57,"enun":"A arguição de descumprimento de preceito fundamental (ADPF) é cabível subsidiariamente, ou seja, somente quando não houver outro meio eficaz para sanar a lesividade ao preceito fundamental.","gab":"CERTO","com":"O caráter subsidiário da ADPF está no art. 4º, §1º da Lei 9.882/99: a petição inicial será indeferida quando não for o caso de ADPF ou quando houver outro meio eficaz de sanar a lesividade. A subsidiariedade não é absoluta — o STF tem interpretado o 'meio eficaz' de forma a admitir a ADPF quando os demais meios não forem tão eficientes ou céleres. Por isso, ADPF e ADI, por exemplo, não se excluem automaticamente.","fund":"LEI: 'Art. 4º, §1º da Lei 9.882/1999: Não será admitida arguição de descumprimento de preceito fundamental quando houver qualquer outro meio eficaz de sanar a lesividade.'\nJURISPRUDÊNCIA: STF, ADPF 33/PA (Rel. Min. Gilmar Mendes, Pleno, j. 2006): consolidou o princípio da subsidiariedade na ADPF, admitindo-a quando os meios ordinários não forem igualmente eficazes.","jur_status":"OK"},{"n":58,"enun":"O Ministério Público, enquanto função essencial à Justiça, integra o Poder Executivo, subordinando-se hierarquicamente ao Procurador-Geral da República em âmbito federal.","gab":"ERRADO","com":"O MP não integra nenhum dos três Poderes — é uma função essencial à Justiça, com previsão autônoma na CF/88 (arts. 127-130). O MP tem independência funcional e autonomia administrativa. O PGR chefia o MPF no plano federal, mas o MPF não é subordinado hierarquicamente ao Executivo — o PGR é nomeado pelo Presidente, mas com aprovação do Senado e mandato de 2 anos. O vínculo com o Executivo é de nomeação, não de hierarquia funcional.","fund":"LEI: 'Art. 127 da CF/88: O Ministério Público é instituição permanente, essencial à função jurisdicional do Estado, incumbindo-lhe a defesa da ordem jurídica, do regime democrático e dos interesses sociais e individuais indisponíveis.'\nJURISPRUDÊNCIA: STF, ADI 2.535/SC (Rel. Min. Marco Aurélio, Pleno, j. 2002): reafirmou a autonomia institucional do MP, não subordinado ao Executivo.","peg":"MP não pertence a nenhum Poder. É 'função essencial à Justiça' — Capítulo IV da CF, separado dos 3 poderes.","jur_status":"PENDENTE"},{"n":59,"enun":"A Defensoria Pública, nos termos da Emenda Constitucional n.º 80/2014, deve ser instalada em todas as comarcas do país no prazo de oito anos a contar da promulgação da emenda.","gab":"CERTO","com":"A EC 80/2014 inseriu o art. 98 no ADCT, determinando que as Defensorias Públicas deveriam estar instaladas em todas as unidades jurisdicionais (comarcas) no prazo de 8 anos a contar de 05/06/2014 (data da EC), ou seja, até 2022. Esse prazo expirou e o cumprimento ainda é parcial no Brasil — mas o texto constitucional é esse. A emenda representou grande avanço no constitucionalismo do acesso à Justiça.","fund":"LEI: 'Art. 98 do ADCT (inserido pela EC 80/2014): O número de defensores públicos na unidade jurisdicional será proporcional à efetiva demanda pelo serviço da Defensoria Pública e à respectiva população. §1º: No prazo de 8 (oito) anos, a União, os Estados e o Distrito Federal deverão contar com defensores públicos em todas as unidades jurisdicionais...'\nJURISPRUDÊNCIA: STF, ADI 4.163/SP (Rel. Min. Cármen Lúcia, Pleno, j. 2013): precedente sobre autonomia da Defensoria antes da EC 80/2014.","jur_status":"PENDENTE"},{"n":60,"enun":"Nos termos da Constituição Federal, compete ao Senado Federal autorizar operações externas de natureza financeira, de interesse da União, dos Estados, do Distrito Federal, dos Territórios e dos Municípios.","gab":"CERTO","com":"O art. 52, V da CF/88 atribui ao Senado Federal a competência privativa para autorizar operações externas de natureza financeira de interesse dos entes federados. Isso faz parte da função do Senado como câmara de representação dos Estados — funciona como câmara alta que controla o endividamento externo dos entes da federação, evitando crises fiscais descontroladas.","fund":"LEI: 'Art. 52, V da CF/88: Compete privativamente ao Senado Federal: [...] V — autorizar operações externas de natureza financeira, de interesse da União, dos Estados, do Distrito Federal, dos Territórios e dos Municípios.'\nJURISPRUDÊNCIA: STF, ACO 79/MT (j. 1997): reconheceu a necessidade de autorização do Senado para operações externas dos estados, reafirmando o art. 52, V da CF."},{"n":61,"enun":"O mandado de injunção coletivo, após a Lei n.º 13.300/2016, pode ser impetrado por partidos políticos com representação no Congresso, independentemente de o direito carente de regulamentação ser relevante para seus integrantes.","gab":"CERTO","com":"A Lei 13.300/2016 positivou o MI coletivo. O art. 12 elenca os legitimados, incluindo partidos políticos com representação no Congresso. O STF, em julgados anteriores à lei, já admitia essa legitimidade ampla para partidos. A distinção do MI coletivo para o individual é que os efeitos da decisão podem ser estendidos a toda a coletividade beneficiada, não apenas ao impetrante.","fund":"LEI: 'Art. 12 da Lei 13.300/2016: O mandado de injunção coletivo pode ser promovido: [...] II — por partido político com representação no Congresso Nacional, para assegurar o exercício de direitos, liberdades e prerrogativas de seus integrantes ou relacionados com a finalidade partidária.'\nJURISPRUDÊNCIA: STF, MI 712/PA (Rel. Min. Eros Grau, Pleno, j. 2007): precedente que admitiu MI coletivo por partido político mesmo antes da Lei 13.300/2016.","jur_status":"PENDENTE"},{"n":62,"enun":"A inviolabilidade do domicílio prevista na Constituição Federal não admite qualquer exceção durante o período noturno, sendo vedada inclusive a entrada em casos de flagrante delito.","gab":"ERRADO","com":"O art. 5º, XI da CF/88 admite a violação do domicílio a qualquer hora (dia ou noite) em caso de flagrante delito ou para prestar socorro. A restrição do período noturno se aplica apenas para cumprimento de ordem judicial — que só pode ocorrer durante o dia. Flagrante delito e socorro não têm restrição de horário. Pense: se há um crime ocorrendo agora de madrugada dentro de uma residência, a polícia pode entrar.","fund":"LEI: 'Art. 5º, XI da CF/88: A casa é asilo inviolável do indivíduo, ninguém nela podendo penetrar sem consentimento do morador, salvo em caso de flagrante delito ou desastre, ou para prestar socorro, ou, durante o dia, por determinação judicial.'\nJURISPRUDÊNCIA: STF, RE 603.616/RO (Pleno, j. 05/11/2015, Tema 280): a expressão 'durante o dia' limita apenas a entrada com ordem judicial, não as demais hipóteses.","peg":"CF art. 5º, XI: 'durante o dia' restringe apenas a ORDEM JUDICIAL. Flagrante delito e socorro = qualquer hora, dia ou noite.","jur_status":"OK"},{"n":63,"enun":"Os tratados e convenções internacionais sobre direitos humanos aprovados pelo Congresso Nacional por maioria simples têm natureza supralegal, abaixo da Constituição, mas acima das leis ordinárias.","gab":"CERTO","com":"O STF, no RE 466.343/SP (2008), fixou que os tratados de direitos humanos não aprovados pelo rito do §3º do art. 5º têm status *supralegal* — acima das leis ordinárias, mas abaixo da CF. Os tratados aprovados pelo rito especial do §3º (PEC: 3/5 em cada câmara, 2 turnos) têm status de emenda constitucional. O STF usou esse fundamento para declarar a inconstitucionalidade da prisão civil do depositário infiel.","fund":"LEI: CF/88, art. 5º, §3º: 'Os tratados e convenções internacionais sobre direitos humanos que forem aprovados, em cada Casa do Congresso Nacional, em dois turnos, por três quintos dos votos dos respectivos membros, serão equivalentes às emendas constitucionais.'\nJURISPRUDÊNCIA: STF, RE 466.343/SP (Rel. Min. Cezar Peluso, Pleno, j. 03/12/2008): tratados de DH sem rito especial = status supralegal; SV 25 STF: vedação à prisão civil do depositário infiel.","peg":"Dois patamares: (1) Rito especial §3º → status de emenda constitucional; (2) Rito simples → supralegal. Confusão = armadilha frequente.","jur_status":"OK"},{"n":64,"enun":"A responsabilidade civil do Estado por danos causados a terceiros não usuários de serviços públicos prestados por concessionárias é objetiva, com base na teoria do risco administrativo.","gab":"CERTO","com":"O STF, no RE 591.874/MS (Pleno, j. 26/08/2009), firmou que a responsabilidade civil das concessionárias de serviços públicos por danos causados a terceiros não usuários também é objetiva — o mesmo regime do art. 37, §6º da CF aplica-se. Não importa que a vítima não seja usuária do serviço: basta o nexo causal entre a atividade do concessionário e o dano. É a teoria do risco administrativo em sua dimensão mais ampla.","fund":"LEI: 'Art. 37, §6º da CF/88: As pessoas jurídicas de direito público e as de direito privado prestadoras de serviços públicos responderão pelos danos que seus agentes, nessa qualidade, causarem a terceiros, assegurado o direito de regresso contra o responsável nos casos de dolo ou culpa.'\nJURISPRUDÊNCIA: STF, RE 591.874/MS (Rel. Min. Ricardo Lewandowski, Pleno, j. 26/08/2009): responsabilidade objetiva das concessionárias alcança terceiros não usuários.","jur_status":"OK"}]},{"nome":"Direito Administrativo + Legislação Complementar","comando":"Acerca de improbidade administrativa, responsabilidade civil do Estado, licitações e atos administrativos, julgue os itens a seguir.","itens":[{"n":65,"enun":"Com as alterações promovidas pela Lei n.º 14.230/2021, os atos de improbidade administrativa que causem lesão ao erário podem ser praticados tanto dolosa quanto culposamente.","gab":"ERRADO","com":"A Lei 14.230/2021 foi a reforma mais profunda da Lei de Improbidade desde sua criação. Um de seus pilares foi a extinção da modalidade culposa: antes, o art. 10 (lesão ao erário) admitia atos culposos. Após a reforma, todos os atos de improbidade exigem dolo — especificamente o dolo específico do art. 1º, §2º. Ato culposo que cause lesão ao erário pode gerar responsabilidade administrativa, mas não mais improbidade.","fund":"LEI: 'Art. 10 da Lei 8.429/92 (redação atual): Constitui ato de improbidade administrativa que causa lesão ao erário qualquer ação ou omissão dolosa de agente público ou de terceiro...' / 'Art. 1º, §2º: Para os fins desta Lei, considera-se dolo a vontade livre e consciente de alcançar o resultado ilícito tipificado nos arts. 9º, 10 e 11 desta Lei...'\nJURISPRUDÊNCIA: STF, Tema 1.199 (RE 843989, Pleno): a extinção da modalidade culposa pela Lei 14.230/2021 é norma benéfica que retroage a processos sem trânsito em julgado.","peg":"APÓS Lei 14.230/21: modalidade culposa EXTINTA. Improbidade = DOLO ESPECÍFICO obrigatório. Culpa pode gerar responsabilidade administrativa, nunca improbidade."},{"n":66,"enun":"A ação de improbidade administrativa, nos termos da Lei n.º 14.230/2021, pode ser proposta pelo Ministério Público ou pela pessoa jurídica lesada.","gab":"ERRADO","com":"Uma das mudanças mais impactantes da Lei 14.230/2021 foi atribuir legitimidade ativa *exclusiva* ao Ministério Público (art. 17). Antes, a pessoa jurídica lesada também podia propor a ação. Após a reforma, apenas o MP pode ajuizá-la. Atenção: se a questão apresentar texto da lei anterior (pré-2021), pode estar correta no contexto histórico — mas para o direito vigente, a legitimidade é exclusiva do MP.","fund":"LEI: 'Art. 17 da Lei 8.429/92 (redação dada pela Lei 14.230/2021): A ação para a aplicação das sanções de que trata esta Lei será proposta pelo Ministério Público e seguirá o procedimento comum previsto na Lei nº 13.105, de 16 de março de 2015 (Código de Processo Civil)...'\nJURISPRUDÊNCIA: STJ, AgRg no AREsp 1.988.547/RJ (2ª T., j. 2022): extinguiu ação de improbidade proposta pela fazenda pública municipal, por ilegitimidade ativa após a Lei 14.230/2021.","peg":"Após Lei 14.230/2021: legitimidade EXCLUSIVA do MP. Pessoa jurídica lesada NÃO pode mais propor ação de improbidade.","jur_status":"PENDENTE"},{"n":67,"enun":"O novo regime prescricional da Lei n.º 14.230/2021 é mais benéfico ao réu e, portanto, retroage aos processos em curso sem trânsito em julgado, conforme decidido pelo STF no Tema 1.199.","gab":"ERRADO","com":"Atenção ao Tema 1.199/STF! O STF foi específico: a retroatividade benéfica da Lei 14.230/2021 atinge (a) a exigência de dolo específico e (b) a revogação da modalidade culposa. O *regime prescricional*, contudo, foi declarado IRRETROATIVO, mesmo sendo mais benéfico em alguns aspectos. Isso porque o STF entendeu que a aplicação retroativa dos novos prazos poderia beneficiar casos mais graves, criando insegurança jurídica.","fund":"LEI: 'Art. 23 da Lei 8.429/92 (redação da Lei 14.230/2021): A ação para a aplicação das sanções [...] prescreve em 8 (oito) anos, contados a partir da ocorrência do fato ou, no caso de infrações permanentes, do dia em que cessou a permanência.'\nJURISPRUDÊNCIA: STF, Tema 1.199 (RE 843989, Pleno): 'A nova lei 14.230/2021 não retroage em relação ao novo regime prescricional nela previsto.'","peg":"Tema 1.199/STF: dolo específico e extinção do ato culposo RETROAGEM; prescrição da Lei 14.230/21 NÃO retroage."},{"n":68,"enun":"A ação de reparação de danos causados ao erário por atos de improbidade dolosos é imprescritível, nos termos da Constituição Federal e do entendimento firmado pelo STF.","gab":"CERTO","com":"O art. 37, §5º da CF/88 prevê imprescritibilidade para ações de ressarcimento ao erário por ilícitos praticados por agentes que causem prejuízo ao patrimônio público. O STF, no Tema 897 (RE 852.475), firmou que essa imprescritibilidade se aplica a atos *dolosos* tipificados na LIA. Atos culposos — que agora nem configuram improbidade — não têm o mesmo regime. O ressarcimento do dano doloso é imprescritível.","fund":"LEI: 'Art. 37, §5º da CF/88: A lei estabelecerá os prazos de prescrição para ilícitos praticados por qualquer agente, servidor ou não, que causem prejuízos ao erário, ressalvadas as respectivas ações de ressarcimento.'\nJURISPRUDÊNCIA: STF, Tema 897 (RE 852.475/SP, Rel. Min. Alexandre de Moraes, Pleno, j. 08/08/2018): imprescritibilidade do ressarcimento se aplica a atos dolosos de improbidade.","jur_status":"PENDENTE"},{"n":69,"enun":"Na licitação pública regida pela Lei n.º 14.133/2021, o contratado tem dever de integridade, podendo ser desclassificado ou ter o contrato rescindido caso fique comprovada prática de corrupção ou fraude.","gab":"CERTO","com":"A Nova Lei de Licitações (Lei 14.133/2021) incorporou expressamente o princípio da integridade (art. 5º, I). O art. 155 estabelece que o contratado pode ter o contrato rescindido e ser declarado inidôneo em caso de prática de atos de corrupção, fraude à licitação ou outros ilícitos. A lei também prevê programas de integridade como critério de desempate (art. 60). Representa alinhamento com a Lei Anticorrupção.","fund":"LEI: 'Art. 5º da Lei 14.133/2021: Na aplicação desta Lei, serão observados os princípios da legalidade, impessoalidade, moralidade, publicidade, eficiência, interesse público, probidade administrativa, igualdade, planejamento, transparência, eficácia, segregação de funções, motivação, vinculação ao edital, julgamento objetivo, segurança jurídica, razoabilidade, competitividade, proporcionalidade, celeridade, economicidade e do desenvolvimento nacional sustentável.' + arts. 155 e 160.\nJURISPRUDÊNCIA: TCU, AC 1.793/2022: orientações sobre aplicação dos programas de integridade nos contratos da Nova Lei de Licitações."},{"n":70,"enun":"A responsabilidade civil do Estado por conduta omissiva é objetiva, nos termos do art. 37, § 6.º, da Constituição Federal, dispensando a comprovação de culpa do ente público.","gab":"ERRADO","com":"Na conduta omissiva do Estado, a responsabilidade é *subjetiva*, não objetiva. A doutrina e o STJ majoritário sustentam que o art. 37, §6º, CF aplica-se diretamente às condutas *comissivas* (ação). Para omissões, exige-se que o Estado descumpra dever específico de agir — o que aproxima a responsabilidade da teoria subjetiva (necessidade de culpa/dolo). Há divergência no STF, que por vezes aplica responsabilidade objetiva em omissão, mas a tese dominante exige demonstração do dever de agir.","fund":"LEI: 'Art. 37, §6º da CF/88: As pessoas jurídicas de direito público e as de direito privado prestadoras de serviços públicos responderão pelos danos que seus agentes, nessa qualidade, causarem a terceiros...' — refere-se a condutas dos agentes (ação).\nJURISPRUDÊNCIA: STJ, REsp 1.236.863/SP (2ª T., j. 2013): responsabilidade por omissão é subjetiva — exige demonstração do dever de agir e sua omissão culposa.","peg":"Comissão = responsabilidade OBJETIVA. Omissão = regra geral SUBJETIVA (descumprimento de dever de agir). STF tem precedentes divergentes.","jur_status":"PENDENTE"},{"n":71,"enun":"O ato administrativo vinculado não admite qualquer margem de avaliação subjetiva pelo administrador, que deve aplicar a lei como se fosse uma equação com resultado único e predeterminado.","gab":"CERTO","com":"No ato vinculado, a lei predetermina todos os elementos: competência, forma, finalidade, motivo e objeto — tudo está fixado. O administrador age como aplicador mecânico da norma, sem liberdade de escolha. Exemplo: ao preencher os requisitos legais, o servidor tem direito à aposentadoria compulsória — o administrador deve concedê-la, sem margem de decisão. Contrasta com o ato discricionário, onde há liberdade no motivo e/ou objeto.","fund":"LEI: Não há artigo específico no CPP; fundamentação na teoria dos atos administrativos da doutrina pátria (Hely Lopes Meirelles, Celso Antônio Bandeira de Mello).\nJURISPRUDÊNCIA: STJ, MS 14.002/DF (1ª Seção, j. 2010): ato vinculado — negação de aposentadoria a servidor que preenchia todos os requisitos legais foi considerada ilegal, pois o ato é vinculado.","jur_status":"PENDENTE"},{"n":72,"enun":"A invalidação de ato administrativo ilegal pela própria Administração (autotutela) pode ser feita a qualquer tempo, sem prazo prescricional ou decadencial, para garantir a legalidade.","gab":"ERRADO","com":"O princípio da autotutela (Súmulas 346 e 473 do STF) permite à Administração anular seus atos ilegais. Porém, o art. 54 da Lei 9.784/99 (Lei do Processo Administrativo Federal) fixa prazo decadencial de *5 anos* para a Administração anular atos administrativos que gerem efeitos favoráveis aos administrados, salvo comprovada má-fé. A legalidade cede à segurança jurídica após esse prazo — é o princípio da proteção à confiança legítima.","fund":"LEI: 'Art. 54 da Lei 9.784/1999: O direito da Administração de anular os atos administrativos de que decorram efeitos favoráveis para os destinatários decai em cinco anos, contados da data em que foram praticados, salvo comprovada má-fé.'\nJURISPRUDÊNCIA: STJ, MS 12.666/DF (1ª Seção, j. 2010): confirmou que decadência do art. 54 da Lei 9.784/99 limita a autotutela administrativa, protegendo a confiança legítima do administrado.","peg":"Autotutela: anulação de ato ilegal que gera efeito favorável tem prazo decadencial de 5 ANOS (Lei 9.784/99, art. 54), salvo má-fé.","jur_status":"PENDENTE"},{"n":73,"enun":"O poder de polícia administrativa pode ser exercido de forma preventiva, repressiva ou fiscalizatória, e sua delegação a pessoas jurídicas de direito privado é vedada quando envolve o exercício de atividade típica de Estado.","gab":"CERTO","com":"O STF, no RE 633.782/MG (Tema 532, j. 2020), fixou que a delegação do poder de polícia a pessoas privadas é possível nos aspectos de consentimento e fiscalização, mas não nos aspectos de *legislação e sanção*, que representam atividade típica de Estado e exigem poder de coerção. Assim, multar (sancionar) e legislar sobre matéria policial não podem ser delegados a entes privados.","fund":"LEI: CF/88, art. 145, II (taxa pelo exercício do poder de polícia); arts. 78-79 do CTN (poder de polícia).\nJURISPRUDÊNCIA: STF, RE 633.782/MG (Rel. Min. Luiz Fux, Pleno, j. 26/10/2020, Tema 532): delegação do poder de polícia a entidade privada é possível nos aspectos de consentimento e fiscalização; vedada nos aspectos de legislação e sanção (atividade tipicamente estatal).","peg":"STF Tema 532: delegação do poder de polícia a privados: PODE (consentimento + fiscalização); NÃO PODE (legislação + sanção). Divisão em 4 fases.","jur_status":"PENDENTE"},{"n":74,"enun":"Servidor público estável só pode perder o cargo mediante sentença judicial transitada em julgado, processo administrativo disciplinar com ampla defesa ou avaliação periódica de desempenho insatisfatória.","gab":"CERTO","com":"O art. 41, §1º da CF/88 estabelece três hipóteses de perda do cargo pelo servidor estável: (I) sentença judicial transitada em julgado; (II) processo administrativo em que lhe seja assegurada ampla defesa; (III) procedimento de avaliação periódica de desempenho, na forma de lei complementar, assegurada ampla defesa. Há ainda a hipótese do art. 169, §4º (excesso de despesa com pessoal), raramente cobrada em provas.","fund":"LEI: 'Art. 41, §1º da CF/88: O servidor público estável só perderá o cargo: I — em virtude de sentença judicial transitada em julgado; II — mediante processo administrativo em que lhe seja assegurada ampla defesa; III — mediante procedimento de avaliação periódica de desempenho, na forma de lei complementar, assegurada ampla defesa.'\nJURISPRUDÊNCIA: STJ, MS 10.570/DF (1ª Seção, j. 2006): PAD deve observar contraditório e ampla defesa para demissão de servidor estável.","jur_status":"PENDENTE"},{"n":75,"enun":"Na licitação pública, o pregão eletrônico é obrigatório para aquisição de bens e serviços comuns, nos termos da Nova Lei de Licitações (Lei n.º 14.133/2021).","gab":"CERTO","com":"A Lei 14.133/2021 tornou o pregão a modalidade preferencial para bens e serviços comuns (art. 28, §1º). E o art. 17, §2º determina a preferência pelo formato eletrônico, que só pode ser afastado mediante justificativa motivada. Para bens e serviços comuns, o pregão eletrônico é a regra — sua não utilização exige fundamentação. Isso agiliza contratações e aumenta a transparência.","fund":"LEI: 'Art. 28, §1º da Lei 14.133/2021: O pregão é a modalidade de licitação obrigatória para aquisição de bens e contratação de serviços comuns, cujo critério de julgamento poderá ser o de menor preço ou o de maior desconto.' / Art. 17, §2º: preferência pelo formato eletrônico.\nJURISPRUDÊNCIA: TCU, AC 1.827/2022: orientações sobre a obrigatoriedade do pregão e preferência pelo eletrônico na Nova Lei de Licitações."},{"n":76,"enun":"O princípio da continuidade do serviço público impede, em qualquer hipótese, a interrupção do fornecimento de água e energia elétrica ao consumidor inadimplente.","gab":"ERRADO","com":"O STJ, em precedente da 1ª Seção (RESP 853.392/RS, 2008), fixou que a suspensão do fornecimento ao consumidor inadimplente é lícita, desde que haja prévia notificação. O princípio da continuidade não é absoluto — cede diante do inadimplemento persistente. Porém, há exceções: hospitais e serviços essenciais à saúde pública geralmente têm proteção especial. O STJ balanceia continuidade e equilíbrio econômico-financeiro da concessão.","fund":"LEI: 'Art. 6º, §3º, II da Lei 8.987/1995: Não se caracteriza como descontinuidade do serviço a sua interrupção em situação de emergência ou após prévio aviso, quando: [...] II — por inadimplemento do usuário, considerado o interesse da coletividade.'\nJURISPRUDÊNCIA: STJ, REsp 853.392/RS (1ª Seção, j. 2008): admitiu corte de energia por inadimplemento, com aviso prévio; vedou corte em locais essenciais como hospitais sem alternativa.","peg":"Continuidade do serviço público NÃO é absoluta. Corte por inadimplemento é LÍCITO com aviso prévio (Lei 8.987/95). Exceção: locais essenciais como hospitais.","jur_status":"PENDENTE"},{"n":77,"enun":"O ato de revogação de ato administrativo discricionário deve ser necessariamente fundamentado em interesse público superveniente, não podendo o administrador revogá-lo por mera conveniência pessoal.","gab":"CERTO","com":"A revogação é espécie extintiva de atos administrativos lícitos, mas que se tornam inconvenientes ou inoportunos por motivo de interesse público. A Súmula 473 do STF estabelece que a Administração pode anular seus atos ilegais e *revogar* os inconvenientes ao interesse público — mas a revogação exige motivação em razão de interesse público superveniente, não pode ser arbitrária ou motivada por interesse do agente. A motivação é obrigatória (art. 50 da Lei 9.784/99).","fund":"LEI: 'Art. 50 da Lei 9.784/1999: Os atos administrativos deverão ser motivados, com indicação dos fatos e dos fundamentos jurídicos, quando: [...] VIII — importem anulação, revogação, suspensão ou convalidação de ato administrativo.'\nJURISPRUDÊNCIA: STF, Súmula 473: 'A Administração pode anular seus próprios atos, quando eivados de vícios que os tornam ilegais, porque deles não se originam direitos; ou revogá-los, por motivo de conveniência ou oportunidade, respeitados os direitos adquiridos, e ressalvada, em todos os casos, a apreciação judicial.'"},{"n":78,"enun":"O controle de legalidade dos atos administrativos pelo Poder Judiciário abrange o mérito administrativo, permitindo ao juiz substituir a opção discricionária do administrador quando reputar outra escolha mais adequada.","gab":"ERRADO","com":"O Judiciário controla a legalidade (e constitucionalidade) dos atos administrativos, mas não pode substituir o mérito — que é a esfera de conveniência e oportunidade do administrador nos atos discricionários. O juiz pode anular ato ilegal, mas não pode determinar qual ato o administrador deveria ter praticado no lugar, se a escolha estava dentro da margem legal. Exceção: quando o ato discricionário degenera em abuso de poder ou viola razoabilidade/proporcionalidade.","fund":"LEI: CF/88, art. 5º, XXXV (inafastabilidade da jurisdição — mas limitada ao controle de legalidade, não de mérito).\nJURISPRUDÊNCIA: STJ, REsp 1.442.485/SP (1ª T., j. 2015): reafirmou que o Judiciário controla a legalidade do ato discricionário, não o mérito; porém pode anular por abuso de poder ou irrazoabilidade.","peg":"Judiciário NÃO substitui mérito administrativo. Pode anular ato ilegal ou abusivo, mas não escolher a 'melhor' opção entre as legais.","jur_status":"PENDENTE"},{"n":79,"enun":"O consórcio público pode ser constituído sob a forma de associação pública ou de pessoa jurídica de direito privado, sendo que, no primeiro caso, o consórcio integra a Administração Indireta dos entes consorciados.","gab":"CERTO","com":"A Lei 11.107/2005 (Consórcios Públicos) prevê duas formas: (a) associação pública — pessoa jurídica de direito público, que integra a Administração Indireta de cada ente consorciado; (b) pessoa jurídica de direito privado — não integra a Administração Indireta formalmente, mas sujeita ao controle público. A forma de associação pública é a mais usada para consórcios entre estados e municípios de saúde e infraestrutura.","fund":"LEI: 'Art. 6º da Lei 11.107/2005: O consórcio público adquirirá personalidade jurídica: I — de direito público, no caso de constituir associação pública, mediante a vigência das leis de ratificação do protocolo de intenções; II — de direito privado, mediante o atendimento dos requisitos da legislação civil.'\nJURISPRUDÊNCIA: STF, ADI 2.390/DF (j. 2008): reconheceu a constitucionalidade dos consórcios públicos sob dupla forma, inclusive a de direito público integrante da Administração Indireta.","jur_status":"PENDENTE"},{"n":80,"enun":"O agente público que, em processo administrativo disciplinar, é julgado inocente da acusação não pode ser responsabilizado pelo mesmo fato em âmbito penal, em razão do princípio do ne bis in idem.","gab":"ERRADO","com":"O princípio do *ne bis in idem* veda a dupla punição *pelo mesmo ordenamento* pelo mesmo fato. Mas a responsabilidade administrativa e a penal são instâncias autônomas, com fundamentos distintos. A absolvição no PAD não vincula o processo penal — salvo quando a absolvição criminal reconhecer a negativa de autoria ou existência do fato, hipóteses em que impacta o processo administrativo (inversamente). O caminho é o oposto: a condenação penal definitiva repercute no âmbito administrativo.","fund":"LEI: 'Art. 125 da Lei 8.112/90: As sanções civis, penais e administrativas poderão cumular-se, sendo independentes entre si.' / Art. 126: 'A responsabilidade administrativa do servidor será afastada no caso de absolvição criminal que negue a existência do fato ou sua autoria.'\nJURISPRUDÊNCIA: STJ, MS 16.567/DF (1ª Seção, j. 2012): as instâncias são autônomas; absolvição no PAD não impede processo penal pelo mesmo fato.","peg":"Instâncias INDEPENDENTES. Absolvição no PAD NÃO vincula o penal. A única hipótese de vinculação: absolvição CRIMINAL por negativa de autoria/existência do fato afasta o PAD.","jur_status":"PENDENTE"}]},{"nome":"Medicina Legal","comando":"Acerca de medicina legal aplicada à atividade policial e investigatória, julgue os itens a seguir.","itens":[{"n":81,"enun":"O exame de corpo de delito, nos crimes que deixam vestígios, é indispensável, não podendo ser suprido pela confissão do acusado.","gab":"CERTO","com":"O art. 158 do CPP é peremptório: quando a infração deixar vestígios, é indispensável o exame de corpo de delito, direto ou indireto. A confissão não supre sua falta. Isso protege o réu contra confissões falsas e garante a prova pericial objetiva. A ausência do exame causa nulidade absoluta quando a infração deixa rastros — não admite suprimento por testemunhos.","fund":"LEI: 'Art. 158 do CPP: Quando a infração deixar vestígios, será indispensável o exame de corpo de delito, direto ou indireto, não podendo supri-lo a confissão do acusado.'\nJURISPRUDÊNCIA: STJ, HC 412.248/SP (5ª T., j. 2017): declarou nulidade de condenação por lesões corporais graves ante a ausência de exame de corpo de delito, que não foi suprido pela confissão.","jur_status":"PENDENTE"},{"n":82,"enun":"A tanatologia forense classifica a morte conforme o mecanismo como asfixia mecânica, hemorragia, choque traumático, entre outros, sendo distintas as causas jurídicas das causas médicas de morte.","gab":"CERTO","com":"Em medicina legal, diferencia-se a causa jurídica da morte (o que o Direito imputa como causa — ex.: a facada) da causa médica ou tanatológica (o mecanismo pelo qual o organismo cessou suas funções — ex.: hemotórax, choque hemorrágico). A classificação das mortes quanto ao mecanismo é relevante para determinar, por exemplo, se houve crime doloso, culposo ou evento fortuito. Asfixia mecânica, hemorragia e choque traumático são mecanismos de morte.","fund":"LEI: CPP, arts. 158-184 (exame de corpo de delito e perícias).\nJURISPRUDÊNCIA: STJ, HC 309.781/RJ (5ª T., j. 2015): laudo de necropsia que aponta causa médica da morte (asfixia) como instrumento válido para identificar o mecanismo e auxiliar na tipificação do crime.","jur_status":"PENDENTE"},{"n":83,"enun":"O exame de DNA para identificação de suspeito pode ser realizado de forma compulsória, mediante determinação judicial, mesmo sem o consentimento do investigado.","gab":"ERRADO","com":"O STF (HC 99.858/SP, 2012) fixou que o investigado não pode ser obrigado a fornecer material genético para exame de DNA contra sua vontade, em razão do princípio nemo tenetur se detegere (direito de não produzir prova contra si mesmo). A coleta compulsória violaria a dignidade humana e o direito à intimidade. O Estado pode, porém, obter material genético de vestígios deixados voluntariamente (cabelo, saliva em copo) sem o consentimento.","fund":"LEI: CF/88, art. 5º, X (intimidade) e art. 5º, LXIII (direito ao silêncio — extensão ao não fazer). Lei 9.034/95 e Lei 12.037/2009.\nJURISPRUDÊNCIA: STF, HC 99.858/SP (Rel. Min. Marco Aurélio, 1ª T., j. 2012): vedou coleta compulsória de material genético do investigado; STJ distinguiu coleta forçada (ilícita) de obtenção de vestígios involuntários (lícita).","peg":"DNA: coleta compulsória do INVESTIGADO = ILÍCITA (nemo tenetur). Vestígios deixados espontaneamente = LÍCITOS. Distinção crucial.","jur_status":"PENDENTE"},{"n":84,"enun":"Os fenômenos cadavéricos transformativos conservadores, como a saponificação e a mumificação, indicam que o corpo passou por processo de preservação natural sem decomposição completa.","gab":"CERTO","com":"A medicina legal classifica os fenômenos cadavéricos em abióticos (cessação das funções vitais: resfriamento, rigidez, livor) e transformativos. Os transformativos são destrutivos (putrefação) ou conservadores. Os conservadores impedem ou retardam a decomposição: saponificação (adipocera — corpo em ambiente úmido, gordura vira sabão), mumificação (ambiente seco e quente, desidratação total) e petrificação/corificação. São importantes para estimar o tempo de morte em cadáveres antigos.","fund":"LEI: CPP, arts. 158 e ss. (perícias cadavéricas).\nJURISPRUDÊNCIA: Não há precedente específico, pois é tema técnico-pericial. Referência doutrinária: Hélio Gomes, 'Medicina Legal', e França, 'Medicina Legal'."},{"n":85,"enun":"Na necropsia médico-legal, a identificação da causa mortis é obrigatória, mas a determinação do tempo de morte (data morte) tem apenas valor indicativo e não vincula as conclusões jurídicas do inquérito.","gab":"CERTO","com":"O cronotanatognose (estimativa do tempo de morte) é baseada em fenômenos cadavéricos que têm variações individuais e ambientais — temperatura, umidade, condições do corpo. Por isso, é sempre uma estimativa com margens de erro, não uma determinação exata. Não vincula juridicamente o inquérito: o promotor ou o juiz pode fixar outra cronologia se as provas indicarem isso. Serve como parâmetro investigativo, não como prova definitiva.","fund":"LEI: CPP, art. 182: 'O juiz não ficará adstrito ao laudo, podendo aceitá-lo ou rejeitá-lo, no todo ou em parte.'\nJURISPRUDÊNCIA: STJ, REsp 1.441.062/SP (5ª T., j. 2015): o juiz pode divergir da estimativa de data-morte do laudo necroscópico se outras provas indicarem cronologia diversa.","jur_status":"PENDENTE"},{"n":86,"enun":"A lesividade das armas de fogo é avaliada, em medicina legal, pela velocidade do projétil e pela energia cinética transferida ao corpo, sendo os projéteis de alta velocidade mais lesivos por produzirem maior zona de cavidade temporária.","gab":"CERTO","com":"A balística forense analisa o ferimento por arma de fogo levando em conta a velocidade inicial do projétil e sua energia cinética (E = mv²/2). Projéteis de alta velocidade criam, além do canal permanente, uma cavidade temporária pelo efeito hidrostático — que pode destruir tecidos além do trajeto direto. Rifles de alta velocidade (AR-15, por ex.) causam lesões muito mais extensas que pistolas mesmo com o mesmo calibre.","fund":"LEI: CPP, arts. 158-184 (perícias em geral).\nJURISPRUDÊNCIA: STF, ADI 6.119/DF (Rel. Min. Alexandre de Moraes, Pleno, j. 2023): na ADI sobre calibres de armas, o STF analisou laudos técnicos sobre lesividade de diferentes calibres — confirma relevância pericial do tema.","jur_status":"PENDENTE"},{"n":87,"enun":"O recalque ou retroprojeção de gases, chamado de 'tatuagem', ocorre quando a arma é disparada a curta distância e evidencia, pela presença de grânulos de pólvora na pele, que o tiro foi efetuado de perto.","gab":"ERRADO","com":"Atenção à terminologia. A 'tatuagem' (ou tatoo) é o depósito de grânulos de pólvora *não queimada* na pele, que ocorre em tiros a curta distância mas não à boca do cano. O que ocorre na boca do cano (encostado ou muito próximo) é o chamado 'marca muzzle' ou 'anel de contusão', com fumaça, chama e gases. A chamuscamento (queimadura) e a contusão do cano são sinais de tiro encostado. A tatuagem indica tiro próximo (até ~50 cm), mas não encostado.","fund":"LEI: CPP, arts. 158-184 (pericias balísticas).\nJURISPRUDÊNCIA: STJ, HC 175.741/RS (5ª T., j. 2014): prova pericial apontou tatuagem como indicativo de disparo a curta distância, o que foi considerado para afastar a versão do suspeito.","peg":"Tatuagem = grânulos de pólvora na pele = tiro a curta distância mas NÃO encostado. Tiro encostado = fumaça + marca do cano na pele.","jur_status":"PENDENTE"},{"n":88,"enun":"A embriaguez alcoólica, nos termos do Código Penal, só tem relevância para exclusão da culpabilidade quando for completa e proveniente de caso fortuito ou força maior.","gab":"CERTO","com":"O art. 28, §1º do CP é claro: a embriaguez voluntária ou culposa não exclui a imputabilidade. Apenas a embriaguez *completa* (que aboliu totalmente a capacidade de entender o ilícito ou de determinar-se) decorrente de *caso fortuito ou força maior* exclui a culpabilidade. A embriaguez dolosa ou culposa pode, na teoria da actio libera in causa, responsabilizar o agente mesmo que no momento do ato estivesse completamente embriagado.","fund":"LEI: 'Art. 28, §1º do CP: É isento de pena o agente que, por embriaguez completa, proveniente de caso fortuito ou força maior, era, ao tempo da ação ou da omissão, inteiramente incapaz de entender o caráter ilícito do fato ou de determinar-se de acordo com esse entendimento.'\nJURISPRUDÊNCIA: STJ, HC 325.082/SP (5ª T., j. 2016): afastou excludente de imputabilidade por embriaguez voluntária, reafirmando que apenas a embriaguez fortuita completa exclui a culpabilidade.","peg":"Embriaguez: só exclui culpabilidade se COMPLETA + FORTUITA/FORÇA MAIOR. Voluntária = actio libera in causa; culposa = responde com culpa.","jur_status":"PENDENTE"},{"n":89,"enun":"Os exames periciais realizados no inquérito policial são definitivos e vinculam o juiz no julgamento final, sendo vedada a realização de contraprova pela defesa.","gab":"ERRADO","com":"O art. 182 do CPP estabelece que o juiz não fica adstrito ao laudo pericial, podendo aceitá-lo ou rejeitá-lo no todo ou em parte. Além disso, o art. 159, §3º do CPP permite que as partes indiquem assistentes técnicos para acompanhar as perícias. A defesa pode requerer segunda perícia (art. 181 CPP). A prova pericial é altamente relevante, mas não vinculativa — o juiz avalia em conjunto com as demais provas.","fund":"LEI: 'Art. 182 do CPP: O juiz não ficará adstrito ao laudo, podendo aceitá-lo ou rejeitá-lo, no todo ou em parte.' / 'Art. 159, §3º do CPP: Serão facultadas ao Ministério Público, ao assistente de acusação, ao ofendido, ao querelante e ao acusado a formulação de quesitos e indicação de assistente técnico.'\nJURISPRUDÊNCIA: STJ, REsp 1.577.521/SP (5ª T., j. 2017): laudo pericial rejeitado pelo juiz em razão de outras provas mais robustas — validade da análise independente.","jur_status":"PENDENTE"},{"n":90,"enun":"A conjunção carnal como elemento do tipo penal do estupro abrange apenas a penetração vaginal, sendo outras formas de violência sexual tipificadas como 'ato libidinoso diverso da conjunção carnal'.","gab":"ERRADO","com":"O tipo do estupro (art. 213 CP), após a Lei 12.015/2009, unificou o antigo estupro e o atentado violento ao pudor: agora o estupro abrange tanto a *conjunção carnal* (cópula vaginal) quanto a prática de *outro ato libidinoso* mediante violência ou grave ameaça. Não há tipo autônomo de 'ato libidinoso diverso' — está dentro do mesmo art. 213. A unificação criou tipo misto alternativo: conjunção carnal OU ato libidinoso.","fund":"LEI: 'Art. 213 do CP: Constranger alguém, mediante violência ou grave ameaça, a ter conjunção carnal ou a praticar ou permitir que com ele se pratique outro ato libidinoso.'\nJURISPRUDÊNCIA: STJ, HC 315.581/SP (5ª T., j. 2015): estupro (art. 213 CP) é tipo misto alternativo — conjunção carnal OU ato libidinoso; não há crime autônomo de 'atentado violento ao pudor' desde a Lei 12.015/2009.","peg":"Estupro (art. 213 CP): tipo misto alternativo = conjunção carnal OU ato libidinoso. NÃO há mais 'atentado ao pudor' separado desde a Lei 12.015/2009.","jur_status":"PENDENTE"}]},{"nome":"Direito Civil + Legislação Complementar","comando":"Acerca de responsabilidade civil, pessoa jurídica, negócio jurídico e direitos reais, julgue os itens a seguir.","itens":[{"n":91,"enun":"A responsabilidade civil por danos causados em acidente de trânsito é objetiva para os condutores de veículos automotores, fundada na teoria do risco criado, prescindindo de comprovação de culpa.","gab":"ERRADO","com":"A responsabilidade civil entre particulares em acidente de trânsito segue, em regra, o modelo subjetivo do art. 186 c/c art. 927, caput, do CC — exige culpa. A responsabilidade objetiva do art. 927, parágrafo único do CC aplica-se quando a atividade normalmente desenvolve risco ou quando há previsão legal específica. Conduzir veículo pode ensejar responsabilidade objetiva quando a atividade envolve risco especial, mas não é uma presunção automática para todos os condutores.","fund":"LEI: 'Art. 927, parágrafo único do CC: Haverá obrigação de reparar o dano, independentemente de culpa, nos casos especificados em lei, ou quando a atividade normalmente desenvolvida pelo autor do dano implicar, por sua natureza, risco para os direitos de outrem.'\nJURISPRUDÊNCIA: STJ, REsp 1.648.305/RJ (3ª T., j. 2018): responsabilidade de transportadora por acidente é objetiva (atividade de risco); responsabilidade de condutor individual comum é, em princípio, subjetiva.","peg":"Acidente de trânsito entre particulares: regra SUBJETIVA. Objetiva: transportadora (atividade de risco) ou específica legal (DPVAT, seguradora).","jur_status":"PENDENTE"},{"n":92,"enun":"O uso indevido da imagem de pessoa física para fins comerciais prescinde da comprovação de dano efetivo para gerar direito à indenização, sendo o dano in re ipsa.","gab":"CERTO","com":"A Súmula 403 do STJ fixou que o uso indevido da imagem dispensa a comprovação de dano moral — o dano é presumido (in re ipsa), decorrendo da simples violação do direito de imagem. Basta demonstrar que a imagem foi usada sem autorização para fins comerciais. A indenização existe independentemente de abalo subjetivo ou repercussão negativa na reputação do fotografado/filmado.","fund":"LEI: 'Art. 20 do CC: Salvo se autorizadas, ou se necessárias à administração da justiça ou à manutenção da ordem pública, a divulgação de escritos, a transmissão da palavra, ou a publicação, a exposição ou a utilização da imagem de uma pessoa poderão ser proibidas, a seu requerimento e sem prejuízo da indenização que couber...'\nJURISPRUDÊNCIA: Súmula 403 STJ: 'Independe de prova do prejuízo a indenização pela publicação não autorizada de imagem de pessoa com fins econômicos ou comerciais.' (j. 28/10/2009).","jur_status":"OK"},{"n":93,"enun":"A desconsideração da personalidade jurídica no direito civil exige, como regra geral, a demonstração de fraude ou abuso de direito, não podendo ser decretada apenas pelo fato de a pessoa jurídica estar insolvente.","gab":"CERTO","com":"O art. 50 do CC exige, para a desconsideração, o abuso da personalidade evidenciado por (a) desvio de finalidade ou (b) confusão patrimonial. A mera insolvência ou descapitalização não basta — seria punir o risco empresarial normal. O CDC (art. 28) é mais amplo e permite desconsideração em hipóteses mais variadas, incluindo abuso de direito, excesso de poder, infração da lei, fato ou ato ilícito, violação dos estatutos ou contrato social.","fund":"LEI: 'Art. 50 do CC: Em caso de abuso da personalidade jurídica, caracterizado pelo desvio de finalidade ou pela confusão patrimonial, pode o juiz, a requerimento da parte, ou do Ministério Público quando lhe couber intervir no processo, desconsiderá-la...'\nJURISPRUDÊNCIA: STJ, REsp 1.315.110/SE (2ª T., j. 2012): insolvência isolada não autoriza desconsideração; necessário demonstrar desvio de finalidade ou confusão patrimonial.","jur_status":"PENDENTE"},{"n":94,"enun":"O negócio jurídico praticado por pessoa com incapacidade relativa é anulável, podendo ser confirmado pelos representantes do incapaz após a celebração, com efeitos retroativos.","gab":"CERTO","com":"Os negócios praticados por relativamente incapazes sem a assistência devida são anuláveis (art. 171, I do CC), não nulos. Sendo anuláveis, podem ser ratificados (confirmados), gerando efeitos ex tunc. A ratificação pode ocorrer pelo próprio agente após cessar a incapacidade ou pelos representantes legais. Diferente dos negócios nulos (praticados por absolutamente incapazes), que não admitem confirmação.","fund":"LEI: 'Art. 171 do CC: Além dos casos expressamente declarados na lei, é anulável o negócio jurídico: I — por incapacidade relativa do agente.' / 'Art. 172: O negócio anulável pode ser confirmado pelas partes, salvo direito de terceiro.'\nJURISPRUDÊNCIA: STJ, REsp 1.560.659/SP (3ª T., j. 2017): confirmação de negócio anulável por incapaz relativo após cessação da incapacidade tem efeitos retroativos (ex tunc).","jur_status":"PENDENTE"},{"n":95,"enun":"A usucapião especial urbana (art. 183 da CF e art. 1.240 do CC) pode ser reconhecida em favor de pessoa que já seja proprietária de outro imóvel urbano ou rural.","gab":"ERRADO","com":"O art. 183, §2º da CF/88 e o art. 1.240, §2º do CC são expressos: esse direito não será reconhecido ao mesmo possuidor mais de uma vez, nem ao proprietário de outro imóvel urbano ou rural. A usucapião especial urbana (área de até 250m², 5 anos, moradia) tem caráter social — visa quem não tem propriedade. Quem já tem imóvel próprio não pode usar esse instrumento.","fund":"LEI: 'Art. 183, §2º da CF/88: Esse direito não será reconhecido ao mesmo possuidor mais de uma vez, nem será suscetível de usucapião a propriedade pública.' / 'Art. 1.240, §1º do CC: O título de domínio e a concessão de uso serão conferidos ao homem ou à mulher, ou a ambos, independentemente do estado civil.'\nJURISPRUDÊNCIA: STJ, REsp 1.219.309/SP (4ª T., j. 2012): afastou usucapião especial urbana de quem possuía outro imóvel, por vedação expressa na CF e no CC.","peg":"Usucapião especial urbana: vedada para quem JÁ POSSUI imóvel urbano ou rural. Caráter social — só para quem não tem propriedade.","jur_status":"PENDENTE"},{"n":96,"enun":"A responsabilidade civil do empregador pelos danos causados por seus empregados no exercício do trabalho é objetiva, nos termos do Código Civil, dispensando a comprovação de culpa do empregador.","gab":"CERTO","com":"O art. 932, III do CC estabelece a responsabilidade do empregador pelos atos dos empregados, serviçais e prepostos no exercício do trabalho. Combinado com o art. 933 do CC, essa responsabilidade é objetiva — o empregador responde independentemente de culpa in eligendo ou in vigilando. Antes do CC/2002, a jurisprudência exigia culpa presumida; agora o CC/2002 é claro: responsabilidade objetiva do empregador.","fund":"LEI: 'Art. 932, III do CC: São também responsáveis pela reparação civil: [...] III — o empregador ou comitente, por seus empregados, serviçais e prepostos, no exercício do trabalho que lhes competir, ou em razão dele.' / 'Art. 933: As pessoas indicadas nos incisos I a V do artigo antecedente, ainda que não haja culpa de sua parte, responderão pelos atos praticados pelos terceiros ali referidos.'\nJURISPRUDÊNCIA: STJ, REsp 1.149.463/RS (4ª T., j. 2010): reafirmou responsabilidade objetiva do empregador pelo CC/2002, dispensando prova de culpa.","jur_status":"PENDENTE"},{"n":97,"enun":"O bem de família legal, previsto na Lei n.º 8.009/1990, é impenhorável, salvo nas hipóteses de dívidas oriundas do próprio imóvel (IPTU, condomínio), de pensão alimentícia e de crédito de trabalhadores da própria residência.","gab":"CERTO","com":"A Lei 8.009/90 protege o imóvel residencial (bem de família legal) contra penhora. Mas o art. 3º traz exceções: dívidas de IPTU, taxas condominiais, pensão alimentícia do credor (em execução), trabalhadores da própria residência, hipoteca firmada para aquisição do imóvel, e crédito tributário oriundo do imóvel. A SV 25 (depositário infiel) reforça a proteção indireta, pois veda a prisão civil — mas o bem de família em si tem proteção própria.","fund":"LEI: 'Art. 3º da Lei 8.009/1990: A impenhorabilidade é oponível em qualquer processo de execução civil, fiscal, previdenciária, trabalhista ou de outra natureza, salvo se movido: I — em razão dos créditos de trabalhadores da própria residência e das respectivas contribuições previdenciárias; II — pelo titular do crédito decorrente do financiamento destinado à construção ou à aquisição do imóvel, no limite dos créditos e acréscimos constituídos em função do respectivo contrato...'\nJURISPRUDÊNCIA: STJ, REsp 1.363.368/MS (3ª T., j. 2013): bem de família é impenhorável salvo nas hipóteses do art. 3º da Lei 8.009/90.","jur_status":"PENDENTE"},{"n":98,"enun":"A teoria da perda de uma chance é adotada pelo STJ para fins de responsabilidade civil, sendo devida a indenização proporcional à probabilidade de se obter o resultado favorável perdido.","gab":"CERTO","com":"O STJ consolidou a teoria da perda de uma chance (perte d'une chance), oriunda do direito francês, em casos como o do candidato em programa de TV que teve a chance de ganhar o prêmio interrompida por culpa da emissora. A indenização não é pelo resultado final (seria incerta), mas pela chance em si, calculada proporcionalmente à probabilidade de êxito. Tem de ser chance séria e real, não mera especulação.","fund":"LEI: Arts. 186 e 927 do CC (responsabilidade civil subjetiva). Teoria da perda de uma chance — criação jurisprudencial.\nJURISPRUDÊNCIA: STJ, REsp 788.459/BA (3ª T., Rel. Min. Nancy Andrighi, j. 08/11/2005): caso do 'Show do Milhão', leading case da teoria da perda de uma chance no STJ.","jur_status":"PENDENTE"}]},{"nome":"Direito Tributário + Legislação Complementar","comando":"Acerca do Sistema Tributário Nacional, obrigação tributária e crimes contra a ordem tributária, julgue os itens a seguir.","itens":[{"n":99,"enun":"O crime tributário material, como a sonegação fiscal, somente se consuma após o lançamento definitivo do crédito tributário, conforme a Súmula Vinculante n.º 24 do STF.","gab":"CERTO","com":"A SV 24 do STF pacificou uma questão que gerou divergência por anos: o crime do art. 1º da Lei 8.137/90 (sonegação fiscal) é crime material — exige resultado (supressão ou redução de tributo) para se consumar. E esse resultado só se confirma com o lançamento definitivo, que é o ato administrativo que constitui o crédito tributário. Antes do lançamento definitivo, não há consumação e a prescrição penal não corre.","fund":"LEI: 'Art. 1º da Lei 8.137/1990: Constitui crime contra a ordem tributária suprimir ou reduzir tributo, ou contribuição social e qualquer acessório, mediante as seguintes condutas: [...]'\nJURISPRUDÊNCIA: SV 24 STF: 'Não se tipifica crime material contra a ordem tributária, previsto no art. 1º, incisos I a IV, da Lei nº 8.137/1990, antes do lançamento definitivo do tributo.' (j. 02/12/2009)."},{"n":100,"enun":"As contribuições de melhoria somente podem ser cobradas pelo Poder Público quando ocorra valorização imobiliária decorrente de obra pública, sendo seu valor limitado ao custo total da obra.","gab":"ERRADO","com":"Dois limites existem para a contribuição de melhoria: (a) limite individual — não pode exceder a valorização de cada imóvel; (b) limite global — o total arrecadado não pode exceder o custo total da obra. A questão diz que o limite é apenas o custo total da obra, omitindo o limite individual. Além disso, o CTN exige a valorização imobiliária como pressuposto — não basta a obra, é preciso demonstrar a valorização dos imóveis beneficiados.","fund":"LEI: 'Art. 81 do CTN: A contribuição de melhoria cobrada pela União, pelos Estados, pelo Distrito Federal ou pelos Municípios, no âmbito de suas respectivas atribuições, é instituída para fazer face ao custo de obras públicas de que decorra valorização imobiliária, tendo como limite total a despesa realizada e como limite individual o acréscimo de valor que da obra resultar para cada imóvel beneficiado.'\nJURISPRUDÊNCIA: STJ, REsp 957.880/RJ (1ª T., j. 2009): contribuição de melhoria tem duplo limite — custo da obra (global) e valorização do imóvel (individual).","peg":"Contribuição de melhoria: DOIS limites: (1) custo total da obra (limite global); (2) valorização individual de cada imóvel (limite individual). Questão cita só um.","jur_status":"PENDENTE"},{"n":101,"enun":"O imposto sobre a renda, por ser de competência da União, não pode ser objeto de isenção concedida por Estados ou Municípios.","gab":"CERTO","com":"O art. 151, III da CF/88 veda à União, Estados, DF e Municípios conceder isenções de impostos que não são de sua competência (isenção heterônoma). Estados e Municípios não podem isentar imposto federal. A União, por sua vez, também não pode conceder isenção de imposto estadual ou municipal pela via interna — ressalva: por via de tratado internacional, há controvérsia (STF tem admitido isenção de ISSQN por tratado da União).","fund":"LEI: 'Art. 151, III da CF/88: É vedado à União: [...] III — instituir isenções de tributos da competência dos Estados, do Distrito Federal ou dos Municípios.' / Art. 152: veda tratamento diferenciado entre bens de procedência estadual.\nJURISPRUDÊNCIA: STF, RE 543.943/PR (Pleno, j. 2014): vedação da isenção heterônoma pelo art. 151, III; ressalva para isenções concedidas por tratados internacionais pela União.","jur_status":"PENDENTE"},{"n":102,"enun":"O lançamento por homologação, modalidade mais comum no sistema tributário, ocorre quando o próprio contribuinte antecipa o pagamento e o fisco homologa tacitamente se não o contestar dentro de cinco anos.","gab":"CERTO","com":"O lançamento por homologação (art. 150 CTN) é aquele em que o contribuinte apura, declara e paga o tributo antecipadamente. A autoridade fiscal pode homologá-lo expressamente ou, pelo silêncio por 5 anos, considera-se homologação tácita (decadência). É a modalidade mais comum: IR, ICMS, IPI. O prazo decadencial de 5 anos para a Fazenda contestar começa da data do fato gerador.","fund":"LEI: 'Art. 150 do CTN: O lançamento por homologação, que ocorre quanto aos tributos cuja legislação atribua ao sujeito passivo o dever de antecipar o pagamento sem prévio exame da autoridade administrativa, opera-se pelo ato em que a referida autoridade, tomando conhecimento da atividade assim exercida pelo obrigado, expressamente a homologa.' / §4º: prazo de 5 anos para homologação.\nJURISPRUDÊNCIA: STJ, REsp 973.733/SC (1ª Seção, j. 2012, repetitivo): decadência do lançamento por homologação começa da ocorrência do fato gerador, com prazo de 5 anos.","jur_status":"PENDENTE"},{"n":103,"enun":"A denúncia espontânea, prevista no art. 138 do Código Tributário Nacional, exclui a responsabilidade pela infração tributária, inclusive quando o contribuinte já sabe da existê
