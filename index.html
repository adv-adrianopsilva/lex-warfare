const DEFAULT_BLOCO = {"meta":{"id":"2026-06-30","titulo":"Bloco Diário — Protocolo de Istambul · SISNAMA · LINDB · LODF","data":"2026-06-30","totalQuestoes":120,"concurso":"Delegado PCDF 2026","edital":"Edital nº 1, de 3/2/2026","fase":"Fase 2 — Reta Final (comentários enxutos)","observacao":"Bloco de 120 questões C/E cobrindo as 10 disciplinas do edital. Fase 2: foco em ritmo de prova."},"disciplinas":[{"nome":"Direito Penal e Legislação Especial","comando":"Acerca de direito penal e legislação penal especial, julgue os itens a seguir.","itens":[{"n":1,"enun":"A prática de crime mediante paga ou promessa de recompensa constitui circunstância agravante genérica, prevista no art. 61, II, 'a', do Código Penal.","gab":"CERTO","com":"Circunstância agravante genérica. Art. 61, II, 'a', CP: agrava a pena quando o agente comete o crime mediante paga ou promessa de recompensa.","fund":"LEI: CP, art. 61, II, 'a': 'São circunstâncias que sempre agravam a pena, quando não constituem ou qualificam o crime: [...] ter o agente cometido o crime: por motivo fútil ou torpe, ou por paga ou promessa de recompensa.'","peg":"Não confundir: paga/promessa é AGRAVANTE genérica; no homicídio, é QUALIFICADORA (art. 121, §2º, I, CP) — quando qualifica, não pode agravar."},{"n":2,"enun":"No concurso formal perfeito, quando o agente pratica dois crimes com desígnios autônomos, aplica-se a pena de um deles com aumento de um sexto até metade.","gab":"ERRADO","com":"Quando há desígnios autônomos (concurso formal imperfeito), aplica-se a regra do concurso material (cumulação das penas), e não o aumento de 1/6 a 1/2.","fund":"LEI: CP, art. 70, caput: 'Quando o agente, mediante uma só ação ou omissão, pratica dois ou mais crimes, idênticos ou não, aplica-se-lhe a mais grave das penas cabíveis ou, se iguais, somente uma delas, mas aumentada, em qualquer caso, de um sexto até metade. As penas aplicam-se, entretanto, cumulativamente, se a ação ou omissão é dolosa e os crimes concorrentes resultam de desígnios autônomos, consoante o disposto no artigo anterior.'"},{"n":3,"enun":"O crime tentado é punido com a pena correspondente ao crime consumado, diminuída de um a dois terços, salvo disposição em contrário.","gab":"CERTO","com":"Regra da punição da tentativa: pena do crime consumado, reduzida de 1/3 a 2/3 conforme a proximidade da consumação.","fund":"LEI: CP, art. 14, parágrafo único: 'Salvo disposição em contrário, pune-se a tentativa com a pena correspondente ao crime consumado, diminuída de um a dois terços.'"},{"n":4,"enun":"O agente que, por embriaguez voluntária, perde completamente a capacidade de entendimento e de autodeterminação é considerado inimputável.","gab":"ERRADO","com":"A embriaguez voluntária ou culposa não exclui a imputabilidade — aplica-se a teoria da actio libera in causa. Apenas a embriaguez completa fortuita ou por força maior exclui.","fund":"LEI: CP, art. 28, II: 'A embriaguez, voluntária ou culposa, pelo álcool ou substância de efeito análogo. [...] não excluem a imputabilidade penal.' §1º: exclui se fortuita ou força maior e completa (incapacidade de entender ou querer).","peg":"A embriaguez pré-ordenada (para praticar crime) é agravante (art. 61, II, 'l'). Voluntária completa ≠ inimputabilidade."},{"n":5,"enun":"O homicídio qualificado por motivo torpe é crime hediondo, nos termos da Lei n.º 8.072/1990.","gab":"CERTO","com":"A Lei 8.072/90 elenca como hediondos o homicídio qualificado (art. 121, §2º) e o homicídio praticado por grupo de extermínio. Motivo torpe é uma das qualificadoras (art. 121, §2º, I).","fund":"LEI: Lei 8.072/90, art. 1º, I: 'São considerados hediondos os seguintes crimes: I – homicídio (art. 121), quando praticado em atividade típica de grupo de extermínio, ainda que cometido por um só agente, e homicídio qualificado (art. 121, § 2º, incisos I, II, III, IV, V, VI, VII e VIII).'"},{"n":6,"enun":"A reincidência, por si só, impede a substituição da pena privativa de liberdade por restritiva de direitos.","gab":"ERRADO","com":"A reincidência impede a substituição apenas quando a reincidência for em crime doloso. Reincidência em crime culposo não impede, e mesmo a dolosa admite análise do juiz se a medida for socialmente recomendável.","fund":"LEI: CP, art. 44, II: 'a substituição poderá ser aplicada se o réu não for reincidente em crime doloso'; §3º: 'Se o condenado for reincidente, o juiz poderá aplicar a substituição, desde que, em face de condenação anterior, a medida seja socialmente recomendável e a reincidência não se tenha operado em virtude da prática do mesmo crime.'","peg":"Questão clássica: reincidência dolosa = impede, mas com exceção do §3º. Nunca diga 'por si só' impede sem ressalvar o §3º."},{"n":7,"enun":"O crime de peculato doloso (CP, art. 312) admite a modalidade culposa, punida com detenção de três meses a um ano.","gab":"CERTO","com":"O peculato culposo está previsto no §2º do art. 312 CP. A pena é de detenção, de 3 meses a 1 ano. Se reparado o dano antes da sentença, a punibilidade é extinta; após, reduz a pena pela metade.","fund":"LEI: CP, art. 312, §2º: 'A pena é diminuída no terço, se o funcionário concorre culposamente para o crime de outrem.' Atenção: §2º pune quem CONCORRE culposamente — a modalidade culposa própria está no §2º com outra leitura; especificamente: a pena é detenção 3 meses a 1 ano (art. 312, caput parte final para o culposo)."},{"n":8,"enun":"Na corrupção passiva, o crime consuma-se com a mera solicitação de vantagem indevida, independentemente de ser aceita.","gab":"CERTO","com":"A corrupção passiva é crime formal. Consuma-se com solicitar, receber ou aceitar promessa de vantagem — qualquer um desses verbos já perfaz o tipo, sem necessidade de resultado ulterior.","fund":"LEI: CP, art. 317: 'Solicitar ou receber, para si ou para outrem, direta ou indiretamente, ainda que fora da função ou antes de assumi-la, mas em razão dela, vantagem indevida, ou aceitar promessa de tal vantagem.'"},{"n":9,"enun":"Segundo o STF, o crime tributário material (sonegação fiscal) só se consuma com a constituição definitiva do crédito tributário pelo lançamento, tendo em vista o disposto na Súmula Vinculante 24.","gab":"CERTO","com":"SV 24 STF: 'Não se tipifica crime material contra a ordem tributária, previsto no art. 1º, incisos I a IV, da Lei n.º 8.137/90, antes do lançamento definitivo do tributo.' Julgado: RE 430.963, j. 02/12/2009.","fund":"JURISPRUDÊNCIA: SV 24 STF (j. 02/12/2009): 'Não se tipifica crime material contra a ordem tributária, previsto no art. 1º, incisos I a IV, da Lei n.º 8.137/90, antes do lançamento definitivo do tributo.'"},{"n":10,"enun":"Para que se configure o tráfico de drogas (art. 33, caput, Lei 11.343/2006), é necessário que o agente pratique ao menos dois dos verbos nucleares previstos no tipo penal.","gab":"ERRADO","com":"O tipo penal do art. 33 é de conteúdo variado (plurinuclear) — basta a prática de um dos 18 verbos para consumar o crime. A pluralidade de condutas não configura concurso, mas crime único.","fund":"LEI: Lei 11.343/06, art. 33, caput: 'Importar, exportar, remeter, preparar, produzir, fabricar, adquirir, vender, expor à venda, oferecer, ter em depósito, transportar, trazer consigo, guardar, prescrever, ministrar, entregar a consumo ou fornecer drogas, ainda que gratuitamente, sem autorização ou em desacordo com determinação legal ou regulamentar.'"},{"n":11,"enun":"A Lei n.º 11.343/2006 autoriza a conversão da pena privativa de liberdade em restritiva de direitos nos crimes de tráfico de drogas.","gab":"ERRADO","com":"A Lei de Drogas veda expressamente a substituição por penas restritivas de direitos nos crimes dos arts. 33, caput e §1º. Há julgados do STF reconhecendo a inconstitucionalidade dessa vedação em certos casos, mas o texto literal da lei proíbe.","fund":"LEI: Lei 11.343/06, art. 44: 'Os crimes previstos nos arts. 33, caput e §1º [...] são inafiançáveis e insuscetíveis de sursis, graça, indulto, anistia e liberdade provisória, vedada a conversão de suas penas em restritivas de direitos.'","peg":"Atenção: STF declarou inconstitucional a vedação absoluta (HC 97.256), mas a vedação literal da lei permanece — a CEBRASPE costuma cobrar a norma textual."},{"n":12,"enun":"O crime de infanticídio (CP, art. 123) é crime próprio, somente podendo ser praticado pela mãe em estado puerperal.","gab":"CERTO","com":"O infanticídio é crime próprio — sujeito ativo é exclusivamente a mãe, que mata o próprio filho durante o parto ou logo após, sob influência do estado puerperal (perturbação psíquica causada pelo parto).","fund":"LEI: CP, art. 123: 'Matar, sob a influência do estado puerperal, o próprio filho, durante o parto ou logo após: Pena — detenção, de dois a seis anos.'"},{"n":13,"enun":"No crime de latrocínio (CP, art. 157, §3º, in fine), se o roubo é consumado mas a morte é tentada, configura-se latrocínio tentado.","gab":"CERTO","com":"Súmula 610 STF: o que determina a consumação do latrocínio é a MORTE — não a subtração. Se a morte é tentada (mesmo com roubo consumado), há latrocínio tentado. Se a morte se consuma (mesmo sem subtração completada), há latrocínio consumado.","fund":"JURISPRUDÊNCIA: Súmula 610 STF: 'Há crime de latrocínio, quando o homicídio se consuma, ainda que não realize o agente a subtração de bens da vítima.' Logo, a MORTE define consumação/tentativa do latrocínio.","peg":"Morte consumada + sem subtração = latrocínio CONSUMADO. Morte tentada + com subtração = latrocínio TENTADO. A subtração não define a consumação.","jur_status":"PENDENTE"},{"n":14,"enun":"Conforme a Súmula 231 do STJ, a aplicação de circunstância atenuante pode reduzir a pena aquém do mínimo legal previsto para o delito.","gab":"ERRADO","com":"A Súmula 231 STJ veda que a atenuante reduza a pena abaixo do mínimo legal. Apenas causas de diminuição de pena (3ª fase) podem levá-la aquém do mínimo.","fund":"JURISPRUDÊNCIA: Súmula 231 STJ (j. 28/10/2009): 'A incidência da circunstância atenuante não pode conduzir à redução da pena abaixo do mínimo legal.'","jur_status":"OK"},{"n":15,"enun":"O agente semi-imputável que pratica crime doloso e é condenado tem direito à redução da pena de um terço a dois terços, podendo o juiz também substitui-la por medida de segurança.","gab":"CERTO","com":"O semi-imputável (art. 26, parágrafo único CP) tem responsabilidade penal reduzida. O juiz pode reduzir a pena (1/3 a 2/3) OU substituí-la por medida de segurança — sistema vicariante (nunca cumulativo).","fund":"LEI: CP, art. 26, parágrafo único + art. 98: 'Na hipótese do parágrafo único do art. 26 deste Código e necessitando o condenado de especial tratamento curativo, a pena privativa de liberdade pode ser substituída pela internação, ou tratamento ambulatorial.' Sistema vicariante — pena OU medida, nunca as duas."},{"n":16,"enun":"No crime de abuso de autoridade (Lei 13.869/2019), o elemento subjetivo específico é a finalidade de prejudicar outrem ou beneficiar a si ou a terceiro, ou ainda o mero capricho ou satisfação pessoal.","gab":"CERTO","com":"A Lei 13.869/2019 exige dolo específico: finalidade de prejudicar outrem, beneficiar a si ou terceiro, ou mero capricho/satisfação pessoal. Sem esse elemento, não há abuso de autoridade (afasta a responsabilidade objetiva).","fund":"LEI: Lei 13.869/2019, art. 1º, §1º: 'As condutas descritas nesta Lei constituem crime de abuso de autoridade quando praticadas pelo agente com a finalidade específica de prejudicar outrem ou beneficiar a si mesmo ou a terceiro, ou, ainda, por mero capricho ou satisfação pessoal.'"},{"n":17,"enun":"O crime de tortura praticado por agente público contra pessoa presa ou sujeita à sua guarda admite pena mais grave do que a forma básica prevista na Lei n.º 9.455/1997.","gab":"CERTO","com":"A Lei 9.455/97 prevê causa de aumento de pena quando o crime de tortura é praticado contra pessoa presa ou sujeita à guarda, poder ou autoridade do agente.","fund":"LEI: Lei 9.455/97, art. 1º, §4º: 'Aumenta-se a pena de um sexto até um terço: I – se o crime é cometido por agente público.'"},{"n":18,"enun":"A extinção da punibilidade pelo pagamento do débito tributário, mesmo após o trânsito em julgado, é admitida nos crimes contra a ordem tributária.","gab":"CERTO","com":"O STF firmou que o pagamento do tributo extingue a punibilidade a qualquer tempo, inclusive após o trânsito em julgado. Lei 12.382/2011 e art. 9º da Lei 10.684/03 fundamentam esse entendimento.","fund":"JURISPRUDÊNCIA: STF HC 81.929: extinção da punibilidade pelo pagamento, mesmo após condenação. LEI: art. 9º, §2º, Lei 10.684/03: 'Extingue-se a punibilidade dos crimes referidos neste artigo quando a pessoa jurídica relacionada com o agente efetuar o pagamento integral dos débitos oriundos de tributos.'"},{"n":19,"enun":"A receptação dolosa simples (CP, art. 180, caput) admite a modalidade culposa, punida com a mesma pena.","gab":"ERRADO","com":"A receptação culposa existe, mas é prevista no §3º do art. 180, com pena de detenção de 1 mês a 1 ano, ou multa — bem mais leve que a dolosa (1 a 4 anos de reclusão, mais multa).","fund":"LEI: CP, art. 180, §3º: 'Adquirir ou receber coisa que, por sua natureza ou pela desproporção entre o valor e o preço, ou pela condição de quem a oferece, deve presumir-se obtida por meio criminoso: Pena — detenção, de um mês a um ano, ou multa, ou ambas as penas.'"},{"n":20,"enun":"O perdão judicial, nos crimes de homicídio culposo e lesão corporal culposa, é sentença absolutória para fins penais.","gab":"ERRADO","com":"Súmula 18 STJ: o perdão judicial é sentença declaratória da extinção da punibilidade, sem efeitos condenatórios. Não se trata de sentença absolutória — o mérito não é apreciado. Não gera reincidência.","fund":"JURISPRUDÊNCIA: Súmula 18 STJ: 'A sentença concessiva do perdão judicial é declaratória da extinção da punibilidade, não subsistindo qualquer efeito condenatório.'","jur_status":"OK"},{"n":21,"enun":"O crime de associação para o tráfico de drogas (art. 35 da Lei 11.343/2006) exige número mínimo de três pessoas para sua configuração.","gab":"ERRADO","com":"A associação para o tráfico exige reunião de DUAS ou mais pessoas, diferenciando-se do crime organizado (4 pessoas, Lei 12.850/2013) e da quadrilha (4 pessoas antes; 3 após 2013). O art. 35 exige apenas 2.","fund":"LEI: Lei 11.343/06, art. 35: 'Associarem-se duas ou mais pessoas para o fim de praticar, reiteradamente ou não, qualquer dos crimes previstos nos arts. 33, caput e §1º, e 34 desta Lei.'"},{"n":22,"enun":"A lei penal mais grave aplica-se ao crime continuado ou permanente, se sua vigência é anterior à cessação da continuidade ou da permanência, conforme a Súmula 711 do STF.","gab":"CERTO","com":"Súmula 711 STF consagra a orientação de que, para crimes continuados e permanentes, a lei mais grave incide se estava em vigor antes de o agente cessar a conduta — lei vigente ao tempo da cessação.","fund":"JURISPRUDÊNCIA: Súmula 711 STF: 'A lei penal mais grave aplica-se ao crime continuado ou ao crime permanente, se a sua vigência é anterior à cessação da continuidade ou da permanência.'","jur_status":"OK"},{"n":23,"enun":"O tráfico de pessoas (Lei 13.344/2016) somente se configura quando a vítima é transportada para o exterior do território nacional.","gab":"ERRADO","com":"O crime de tráfico de pessoas abrange tanto o tráfico interno quanto o internacional. O CP, art. 149-A (introduzido pela Lei 13.344/16), não exige deslocamento transfronteiriço.","fund":"LEI: CP, art. 149-A: 'Agenciar, aliciar, recrutar, transportar, transferir, comprar, alojar ou acolher pessoa, mediante grave ameaça, violência, coação, fraude ou abuso, com a finalidade de: [...] independentemente de trânsito ou ingresso em território estrangeiro.'"},{"n":24,"enun":"Nos crimes hediondos, a progressão de regime de cumprimento de pena exige o cumprimento de dois quintos da pena, se o condenado for primário, e de três quintos, se reincidente.","gab":"ERRADO","com":"Após a Lei 13.964/2019 (Pacote Anticrime), os percentuais foram alterados: 40% (primário) e 60% (reincidente em crime hediondo). A fração de 2/5 e 3/5 vale para crimes hediondos com resultado morte: 50% e 60% respectivamente.","fund":"LEI: Lei 8.072/90, art. 2º, §2º (com redação da Lei 13.964/19): 'A progressão de regime, no caso dos condenados pelos crimes previstos neste artigo, dar-se-á após o cumprimento de 2/5 (dois quintos) da pena, se o apenado for primário, e de 3/5 (três quintos), se reincidente, observado o disposto nos arts. 112 e seguintes da Lei de Execução Penal.'","peg":"Cuidado: a fração de 2/5 e 3/5 ficou, mas o Pacote Anticrime criou gradação mais detalhada na LEP, art. 112. A questão pode estar desatualizada ou testando a versão anterior. No texto atual da Lei 8.072/90: 40% primário / 60% reincidente em hediondo."}]},{"nome":"Direito Processual Penal e Legislação Especial","comando":"Acerca de direito processual penal e legislação processual especial, julgue os itens a seguir.","itens":[{"n":25,"enun":"O inquérito policial tem natureza jurídica de procedimento administrativo pré-processual, e, por isso, não se submetem ao princípio do contraditório e da ampla defesa.","gab":"CERTO","com":"O IP é procedimento administrativo inquisitorial. O STF e o STJ firmaram que o contraditório e a ampla defesa não se aplicam na fase investigatória. A Súmula Vinculante 14, porém, garante acesso do defensor aos elementos já documentados.","fund":"JURISPRUDÊNCIA: SV 14 STF: 'É direito do defensor, no interesse do representado, ter acesso amplo aos elementos de prova que, já documentados em procedimento investigatório realizado por órgão com competência de polícia judiciária, digam respeito ao exercício do direito de defesa.'"},{"n":26,"enun":"A prisão em flagrante é espécie de prisão cautelar e, por isso, exige prévia ordem judicial para ser efetivada.","gab":"ERRADO","com":"A prisão em flagrante é modalidade de prisão sem mandado judicial — qualquer pessoa pode prender quem esteja em flagrante delito (flagrante facultativo); autoridades policiais têm o dever de prender (flagrante obrigatório). Não exige autorização judicial prévia.","fund":"LEI: CF/88, art. 5º, LXI: 'ninguém será preso senão em flagrante delito ou por ordem escrita e fundamentada de autoridade judiciária competente.' CPP, art. 301: 'Qualquer do povo poderá e as autoridades policiais e seus agentes deverão prender quem quer que seja encontrado em flagrante delito.'"},{"n":27,"enun":"O reconhecimento de pessoa realizado sem a observância das formalidades do art. 226 do CPP — em especial sem a presença de outras pessoas com características semelhantes ao suspeito — não pode, por si só, sustentar uma condenação criminal.","gab":"CERTO","com":"STJ HC 598.886/SC (Schietti, 6ª T., j. 27/10/2020): as formalidades do art. 226 CPP são obrigatórias, e reconhecimento viciado não sustenta condenação isolada. STJ Tema 1258 (REsp 1.953.602-SP, j. 11/06/2025): consolidou 6 teses sobre reconhecimento de pessoas.","fund":"JURISPRUDÊNCIA: STJ HC 598.886/SC (Schietti, 6ª T., j. 27/10/2020): 'As formalidades previstas no art. 226 CPP devem ser observadas; o descumprimento implica nulidade do reconhecimento, que, de forma isolada, não pode sustentar condenação.' STJ Tema 1258 (j. 11/06/2025): consolidou regras do reconhecimento de pessoas.","peg":"Não confundir: formalidades do art. 226 CPP são obrigatórias (STJ); STF ainda debate a extensão, mas a CEBRASPE tem adotado a posição do STJ sobre nulidade relativa que impede condenação isolada.","jur_status":"OK"},{"n":28,"enun":"Na busca pessoal, a fundada suspeita exigida pelo CPP deve ser objetiva, prévia e específica, não bastando mera intuição policial ou o estado de nervosismo do abordado.","gab":"CERTO","com":"STJ RHC 158.580/BA (Schietti, 6ª T., j. 19/04/2022): a fundada suspeita para busca pessoal deve ser objetiva, prévia e específica. Nervosismo isolado não basta; é preciso elemento concreto e individualizável.","fund":"LEI: CPP, art. 240, §2º: 'Proceder-se-á à busca pessoal quando houver fundada suspeita de que alguém oculte consigo arma proibida ou objetos mencionados nas letras b a f e letra h do parágrafo anterior.' JURISPRUDÊNCIA: STJ RHC 158.580/BA (j. 19/04/2022): 'fundada suspeita deve ser objetiva, específica e anterior à abordagem.'","jur_status":"OK"},{"n":29,"enun":"A entrada forçada em domicílio sem mandado judicial é lícita, nos termos do STF, quando existam razões objetivas e justificáveis para a violação, a serem avaliadas a posteriori.","gab":"CERTO","com":"STF RE 603.616/RO (Pleno, Gilmar Mendes, j. 05/11/2015): a entrada forçada sem mandado é lícita quando existam fundadas razões. Essas razões devem ser demonstradas a posteriori (comprovação após a diligência).","fund":"JURISPRUDÊNCIA: STF RE 603.616/RO (Gilmar Mendes, Pleno, j. 05/11/2015): 'A entrada forçada em domicílio sem mandado judicial só é lícita, mesmo em período noturno, quando amparada em fundadas razões, devidamente justificadas a posteriori, que indiquem que dentro da casa ocorre situação de flagrante delito.'","jur_status":"OK"},{"n":30,"enun":"A prisão temporária pode ser decretada de ofício pelo juiz no curso do inquérito policial.","gab":"ERRADO","com":"A prisão temporária (Lei 7.960/89) somente pode ser decretada mediante representação da autoridade policial ou requerimento do MP. O juiz não pode decretá-la de ofício — vigora o sistema acusatório (sistema de gestão da prova separado).","fund":"LEI: Lei 7.960/89, art. 2º: 'A prisão temporária será decretada pelo Juiz, em face da representação da autoridade policial ou de requerimento do Ministério Público, e terá o prazo de 5 (cinco) dias, prorrogável por igual período em caso de extrema e comprovada necessidade.'"},{"n":31,"enun":"O uso de algemas somente é permitido em casos de resistência e de fundado receio de fuga ou de perigo à integridade física do preso ou de terceiros, devendo ser justificado por escrito pela autoridade.","gab":"CERTO","com":"Súmula Vinculante 11 STF: uso de algemas é excepcional, exige resistência, perigo de fuga ou risco à integridade, com justificativa escrita obrigatória. Uso indevido pode gerar responsabilidade penal, civil e administrativa.","fund":"JURISPRUDÊNCIA: SV 11 STF: 'Só é lícito o uso de algemas em casos de resistência e de fundado receio de fuga ou de perigo à integridade física própria ou alheia, por parte do preso ou de terceiros, justificada a excepcionalidade por escrito, sob pena de responsabilidade disciplinar, civil e penal do agente ou da autoridade e de nulidade da prisão ou do ato processual a que se refere.'"},{"n":32,"enun":"A prova obtida por meio ilícito pode ser utilizada no processo penal quando for a única forma de provar a inocência do réu.","gab":"CERTO","com":"A vedação da prova ilícita (art. 5º LVI CF + art. 157 CPP) é relativizada pela doutrina e jurisprudência quando se tratar de prova pro reo (defesa do inocente). A proibição não pode servir como instrumento de condenação de inocentes.","fund":"LEI: CF/88, art. 5º, LVI: 'são inadmissíveis, no processo, as provas obtidas por meios ilícitos.' Doutrina majoritária e STF admitem exceção pro reo: a proporcionalidade permite usar prova ilícita para afastar condenação injusta.","peg":"Atenção: a exceção é pro reo (inocentar), não pro societate (condenar). CEBRASPE pode testar se a prova ilícita pode ser usada contra o réu — NUNCA, mesmo que seja a única prova de culpa."},{"n":33,"enun":"O Juiz das Garantias, previsto na Lei n.º 13.964/2019, encontra-se em plena vigência e é obrigatório em todo o território nacional.","gab":"ERRADO","com":"O Juiz das Garantias foi criado pelo Pacote Anticrime (arts. 3º-A a 3º-F CPP), mas sua eficácia está suspensa por liminar do STF nas ADIs 6298, 6299, 6300 e 6305. Existe no texto legal, mas ainda não está em vigor na prática.","fund":"LEI: CPP, arts. 3º-A a 3º-F (Lei 13.964/19): criou o Juiz das Garantias. JURISPRUDÊNCIA: STF ADIs 6298/6299/6300/6305: eficácia suspensa por medida cautelar; julgamento definitivo pendente.","peg":"Existe no CPP mas está suspenso. Questão típica: 'O Juiz das Garantias entrou em vigor com o Pacote Anticrime em 2020' — ERRADO, a eficácia foi suspensa."},{"n":34,"enun":"O ANPP (Acordo de Não Persecução Penal) pode ser celebrado com o réu após o início da ação penal, desde que antes da sentença final.","gab":"ERRADO","com":"O ANPP deve ser celebrado antes do oferecimento da denúncia. O art. 28-A CPP estabelece que é proposto pelo MP antes de oferecer a denúncia. Após a denúncia, não cabe ANPP (cabe, eventualmente, outros institutos despenalizadores).","fund":"LEI: CPP, art. 28-A, caput: 'Não sendo caso de arquivamento e tendo o investigado confessado formal e circunstancialmente a prática de infração penal sem violência ou grave ameaça e com pena mínima inferior a 4 (quatro) anos, o Ministério Público poderá propor acordo de não persecução penal.'","peg":"STJ: recentemente admitiu retroatividade do ANPP a processos em andamento antes de 2020, desde que não haja sentença — mas a regra é: ANTES da denúncia. A questão diz 'após início da ação penal' = errado como regra geral."},{"n":35,"enun":"A denúncia anônima, por si só, não legitima a realização de busca domiciliar, sendo necessária investigação preliminar que corrobore o seu conteúdo antes de qualquer diligência.","gab":"CERTO","com":"O STJ firmou que a denúncia anônima não tem valor probatório autônomo, mas pode deflagrar investigações. Para que legitime uma busca domiciliar, devem ser realizadas diligências preliminares que confirmem o conteúdo da delação.","fund":"JURISPRUDÊNCIA: STJ HC 512.087: 'A denúncia anônima, embora não possa ser tomada como prova, pode servir de base para abertura de investigações, devendo ser complementada por diligências prévias que confirmes a suspeita.'"},{"n":36,"enun":"Na hipótese de flagrante forjado, em que a própria autoridade policial induz o agente à prática do delito, tem-se como entendimento consolidado do STF que configura crime impossível.","gab":"CERTO","com":"Súmula 145 STF: não há crime quando a preparação do flagrante pela polícia torna impossível a consumação do delito. O flagrante preparado gera crime impossível (art. 17 CP). Diferente do flagrante esperado (lícito).","fund":"JURISPRUDÊNCIA: Súmula 145 STF: 'Não há crime, quando a preparação do flagrante pela polícia torna impossível a sua consumação.'","jur_status":"OK"},{"n":37,"enun":"A prescrição virtual (em perspectiva) é admitida no direito processual penal brasileiro conforme entendimento consolidado do STF e do STJ.","gab":"ERRADO","com":"A prescrição virtual é inadmissível, conforme Súmula 438 STJ e posição do STF (Tema 602.527). Não se antecipa a prescrição com base na pena hipotética que seria aplicada em eventual condenação.","fund":"JURISPRUDÊNCIA: Súmula 438 STJ (j. 28/04/2010): 'É inadmissível a extinção da punibilidade pela prescrição da pretensão punitiva com fundamento em pena hipotética, independentemente da existência ou sorte da ação penal.'","jur_status":"OK"},{"n":38,"enun":"As medidas cautelares diversas da prisão previstas no art. 319 do CPP não podem ser aplicadas cumulativamente, devendo o juiz escolher apenas uma delas.","gab":"ERRADO","com":"O CPP expressamente permite a cumulação de medidas cautelares diversas da prisão, desde que necessárias para atender a finalidade cautelar. Aplicação única é exceção, não regra.","fund":"LEI: CPP, art. 282, §1º: 'As medidas cautelares poderão ser aplicadas isolada ou cumulativamente.' Art. 319, parágrafo único: as medidas do art. 319 podem ser aplicadas cumulativamente."},{"n":39,"enun":"Em processo penal, a iniciativa probatória do juiz em determinar, de ofício, a realização de provas é vedada pelo sistema acusatório previsto no CPP pós-Pacote Anticrime.","gab":"ERRADO","com":"O art. 3º-A CPP (Pacote Anticrime) veda ao juiz iniciativa na fase investigatória, mas o art. 156, II CPP ainda autoriza o juiz a ordenar, de ofício, diligências para dirimir dúvida sobre ponto relevante durante a instrução. Há tensão entre os dispositivos, mas o CPP admite atividade probatória supletiva do juiz na instrução.","fund":"LEI: CPP, art. 3º-A (Lei 13.964/19): 'O processo penal terá estrutura acusatória, vedadas a iniciativa do juiz na fase de investigação e a substituição da atuação probatória do órgão de acusação.' Art. 156, II: 'O juiz poderá, no curso da instrução ou antes de proferir sentença, determinar, de ofício, diligências para dirimir dúvida sobre ponto relevante.'","peg":"O Pacote Anticrime criou tensão entre art. 3º-A e art. 156, II CPP. A CEBRASPE pode cobrar a tensão ou a literalidade de cada artigo — leia com atenção o que a questão pergunta."},{"n":40,"enun":"A transferência de preso para estabelecimento federal de segurança máxima sem oitiva prévia do condenado não viola os princípios do contraditório e da ampla defesa.","gab":"CERTO","com":"Súmula 673 STJ: a transferência para presídio federal sem oitiva prévia não ofende o contraditório porque há urgência e necessidade de preservação da segurança pública — o contraditório é postergado, não suprimido.","fund":"JURISPRUDÊNCIA: Súmula 673 STJ: 'A transferência de detentos para presídios federais de segurança máxima prescinde de oitiva prévia do condenado, sem que se configure violação do contraditório e da ampla defesa.'","jur_status":"OK"},{"n":41,"enun":"Na condução coercitiva de investigado ou réu para interrogatório, o STF considerou tal prática compatível com a Constituição Federal.","gab":"ERRADO","com":"O STF, na ADPF 395 e ADPF 444 (2018), declarou inconstitucional a condução coercitiva de investigados ou réus para interrogatório, por violar o direito ao silêncio e o princípio da não autoincriminação.","fund":"JURISPRUDÊNCIA: STF ADPF 395 e 444 (Pleno, j. 14/06/2018): 'A condução coercitiva de investigados ou réus para interrogatório é incompatível com a Constituição Federal, por violar o direito ao silêncio, à não autoincriminação e à dignidade.'"},{"n":42,"enun":"O sigilo das comunicações telefônicas pode ser levantado por autoridade policial, mediante representação, independente de autorização judicial.","gab":"ERRADO","com":"A interceptação telefônica exige ordem judicial prévia, conforme art. 5º, XII CF e Lei 9.296/96. A autoridade policial pode requerer ao juiz, mas não pode autorizar diretamente.","fund":"LEI: CF/88, art. 5º, XII: 'é inviolável o sigilo da correspondência e das comunicações telegráficas, de dados e das comunicações telefônicas, salvo, no último caso, por ordem judicial.' Lei 9.296/96, art. 1º: 'a interceptação telefônica [...] somente poderá ser autorizada pelo juiz competente.'"},{"n":43,"enun":"O Ministério Público pode requisitar a instauração de inquérito policial ao delegado de polícia, sendo que tal requisição tem caráter vinculante.","gab":"CERTO","com":"O MP pode requisitar a instauração do IP (CPP, art. 5º, II), e tal requisição é obrigatória para o delegado — não cabe ao delegado indeferir a requisição do MP. Diferente da portaria de ofício ou da representação do ofendido (que o delegado pode arquivar com informação ao MP).","fund":"LEI: CPP, art. 5º, II: 'Nos crimes de ação pública, o inquérito policial será iniciado: [...] II – mediante requisição da autoridade judiciária ou do Ministério Público.' O caráter vinculante decorre da requisição — o delegado não pode negar.","peg":"Não confundir: delegado pode arquivar de ofício (não pode mais, após a 13.245/16 para o IP). A requisição do MP é vinculante; a do ofendido não o é."},{"n":44,"enun":"Nos crimes de menor potencial ofensivo, admite-se a composição civil dos danos entre autor e vítima como forma de extinção da punibilidade na ação penal pública condicionada.","gab":"CERTO","com":"Nos JECrim (Lei 9.099/95), na audiência preliminar, a composição civil dos danos em crimes de ação penal pública condicionada à representação ou ação penal privada implica renúncia ao direito de queixa/representação, extinguindo a punibilidade.","fund":"LEI: Lei 9.099/95, art. 74, parágrafo único: 'Tratando-se de ação penal de iniciativa privada ou de ação penal pública condicionada à representação, o acordo homologado acarreta a renúncia ao direito de queixa ou representação.'"},{"n":45,"enun":"A produção antecipada de provas admite contraditório real na fase pré-processual, podendo o defensor do investigado participar de ato de colheita de prova.","gab":"CERTO","com":"O CPP, art. 3º-B, inc. VI (Pacote Anticrime) e art. 156, I permitem a produção antecipada de provas com contraditório diferido ou real. A SV 14 garante acesso ao defensor aos elementos do IP. Nos atos urgentes, o contraditório pode ser postergado.","fund":"LEI: CPP, art. 156, I: 'A prova da alegação incumbirá a quem a fizer, mas o juiz poderá, de ofício: I — ordenar, mesmo antes de iniciada a ação penal, a produção antecipada de provas consideradas urgentes e relevantes.'"},{"n":46,"enun":"O habeas corpus não é o instrumento processual adequado para questionar a legalidade de investigações criminais que não envolvam ameaça direta ou iminente ao direito de locomoção.","gab":"CERTO","com":"O HC protege a liberdade de locomoção. Sem ameaça ao direito de ir e vir, o instrumento adequado é o mandado de segurança ou o mandado de segurança coletivo. Investigações que não impliquem risco de prisão não justificam HC.","fund":"LEI: CF/88, art. 5º, LXVIII: 'conceder-se-á habeas corpus sempre que alguém sofrer ou se achar ameaçado de sofrer violência ou coação em sua liberdade de locomoção, por ilegalidade ou abuso de poder.' Sem ameaça à locomoção: não cabe HC."}]},{"nome":"Direito Constitucional e Legislação Complementar","comando":"Acerca de direito constitucional, julgue os itens a seguir.","itens":[{"n":47,"enun":"Os tratados e convenções internacionais sobre direitos humanos aprovados pelo Congresso Nacional, em dois turnos, por três quintos dos votos dos respectivos membros de cada Casa, têm status de emenda constitucional.","gab":"CERTO","com":"CF/88, art. 5º, §3º (EC 45/2004): tratados de DH aprovados com quórum qualificado (3/5, dois turnos, em cada Casa) equivalem a emendas constitucionais. Os demais tratados de DH têm status supralegal (STF RE 466.343).","fund":"LEI: CF/88, art. 5º, §3º: 'Os tratados e convenções internacionais sobre direitos humanos que forem aprovados, em cada Casa do Congresso Nacional, em dois turnos, por três quintos dos votos dos respectivos membros, serão equivalentes às emendas constitucionais.' JURISPRUDÊNCIA: STF RE 466.343/SP (Peluso, Pleno, j. 03/12/2008): status supralegal para os demais.","jur_status":"OK"},{"n":48,"enun":"A Constituição Federal admite a pena de morte no Brasil exclusivamente nos casos de crimes hediondos praticados com violência ou grave ameaça à pessoa.","gab":"ERRADO","com":"A pena de morte é admitida pela CF/88 somente em caso de guerra externa declarada (art. 5º, XLVII, 'a'). Nunca para crimes hediondos em tempo de paz.","fund":"LEI: CF/88, art. 5º, XLVII: 'não haverá penas: a) de morte, salvo em caso de guerra declarada, nos termos do art. 84, XIX.'"},{"n":49,"enun":"O mandado de segurança individual pode ser impetrado por qualquer pessoa, física ou jurídica, para proteger direito líquido e certo não amparado por habeas corpus ou habeas data.","gab":"CERTO","com":"O MS individual (CF/88, art. 5º, LXIX) protege direito líquido e certo de qualquer pessoa (física ou jurídica, nacional ou estrangeira), quando não cabível HC ou HD, contra ato ilegal ou abuso de poder de autoridade pública ou agente no exercício de atribuições públicas.","fund":"LEI: CF/88, art. 5º, LXIX: 'conceder-se-á mandado de segurança para proteger direito líquido e certo, não amparado por habeas corpus ou habeas data, quando o responsável pela ilegalidade ou abuso de poder for autoridade pública ou agente de pessoa jurídica no exercício de atribuições do Poder Público.'"},{"n":50,"enun":"Os membros do Conselho Nacional de Justiça são submetidos ao controle administrativo e financeiro do Poder Judiciário, sendo o CNJ parte integrante da estrutura do Judiciário.","gab":"CERTO","com":"ADI 3.367/DF STF (Peluso, Pleno, j. 13/04/2005): o CNJ é órgão do Poder Judiciário (CF/88, art. 92, I-A), exercendo função administrativa e financeira, não jurisdicional. Sua constitucionalidade foi reafirmada.","fund":"JURISPRUDÊNCIA: STF ADI 3.367/DF (Peluso, Pleno, j. 13/04/2005): 'O Conselho Nacional de Justiça é órgão do Poder Judiciário, com atribuições de controle da atuação administrativa e financeira, e não jurisdicional.' LEI: CF/88, art. 92, I-A: CNJ integra o Poder Judiciário.","jur_status":"OK"},{"n":51,"enun":"Na ação direta de inconstitucionalidade por omissão, o STF, ao reconhecer a mora do legislador, pode fixar prazo para que o Congresso Nacional edite a norma faltante, sob pena de sanção.","gab":"ERRADO","com":"Na ADO, o STF comunica ao órgão omisso e pode, tratando-se de omissão de órgão administrativo, fixar prazo de 30 dias para suprir a lacuna. Para omissões do Poder Legislativo, o STF apenas cientifica, sem poder de sanção ou prazo obrigatório.","fund":"LEI: CF/88, art. 103, §2º: 'Declarada a inconstitucionalidade por omissão de medida para tornar efetiva norma constitucional, será dada ciência ao Poder competente para a adoção das providências necessárias e, em se tratando de órgão administrativo, para fazê-lo em trinta dias.'"},{"n":52,"enun":"A eficácia erga omnes e o efeito vinculante das decisões do STF em controle concentrado alcançam o próprio STF, impedindo que ele reveja sua posição.","gab":"ERRADO","com":"O efeito vinculante vincula os demais órgãos do Poder Judiciário e a administração pública, mas não o próprio STF. O STF pode rever sua posição por meio de técnicas como a mutação constitucional ou superação de precedente (overruling).","fund":"LEI: CF/88, art. 102, §2º: 'As decisões definitivas de mérito, proferidas pelo Supremo Tribunal Federal, nas ações declaratórias de constitucionalidade de lei ou ato normativo federal, produzirão eficácia contra todos e efeito vinculante, relativamente aos demais órgãos do Poder Judiciário e à administração pública direta e indireta.'","peg":"Efeito vinculante vincula os DEMAIS órgãos, não o próprio STF. O Supremo pode superar seus precedentes (overruling)."},{"n":53,"enun":"A imunidade parlamentar material (inviolabilidade) dos deputados e senadores abrange quaisquer palavras, opiniões e votos proferidos, inclusive fora do Congresso Nacional.","gab":"ERRADO","com":"A imunidade material cobre palavras, opiniões e votos no exercício do mandato. Para manifestações fora do Congresso, há necessidade de conexão com o exercício do mandato. O STF consolidou que a imunidade não é absoluta para manifestações extramuros sem conexão com a função parlamentar.","fund":"LEI: CF/88, art. 53, caput: 'Os Deputados e Senadores são invioláveis, civil e penalmente, por quaisquer de suas opiniões, palavras e votos.' JURISPRUDÊNCIA: STF AP 937: a imunidade material abrange as manifestações no exercício do mandato; fora do Parlamento, exige nexo com a função."},{"n":54,"enun":"A ADPF pode ser utilizada como instrumento hábil para questionar ato normativo municipal em face de preceito fundamental da Constituição Federal.","gab":"CERTO","com":"A ADPF é o único instrumento de controle concentrado que alcança leis e atos normativos municipais violadores de preceitos fundamentais da CF. A ADI e a ADC não alcançam leis municipais.","fund":"LEI: CF/88, art. 102, §1º: 'A arguição de descumprimento de preceito fundamental [...] será apreciada pelo Supremo Tribunal Federal.' Lei 9.882/99, art. 1º, parágrafo único: 'Caberá também argüição de descumprimento de preceito fundamental quando for relevante o fundamento da controvérsia constitucional sobre lei ou ato normativo federal, estadual ou municipal, incluídos os anteriores à Constituição.'"},{"n":55,"enun":"A intervenção federal nos estados pode ser decretada pelo Presidente da República espontaneamente para assegurar a observância dos princípios constitucionais sensíveis.","gab":"ERRADO","com":"Para assegurar os princípios constitucionais sensíveis (art. 34, VII CF), a intervenção depende de provimento do STF em representação do Procurador-Geral da República (ação direta interventiva). O Presidente não age espontaneamente neste caso.","fund":"LEI: CF/88, art. 36, III: 'A decretação da intervenção dependerá de provimento, pelo Supremo Tribunal Federal, de representação do Procurador-Geral da República, na hipótese do art. 34, VII.'"},{"n":56,"enun":"A prerrogativa de foro dos parlamentares federais no STF, para crimes comuns, abrange os atos praticados antes da diplomação.","gab":"ERRADO","com":"STF AP 937 QO (Alexandre de Moraes, 2018): a prerrogativa de foro aplica-se apenas aos crimes praticados no exercício do mandato e com ele relacionados. Crimes anteriores ao mandato ou sem conexão são julgados pelo juízo de 1ª instância.","fund":"JURISPRUDÊNCIA: STF AP 937 QO (Pleno, j. 03/05/2018): 'A prerrogativa de foro, no STF, restringe-se aos crimes praticados no exercício do cargo e em razão do cargo. Os anteriores ao mandato ou sem nexo funcional devem ser processados no juízo de 1ª instância.'","peg":"Regra desde AP 937: foro por prerrogativa = exercício do mandato + relacionado ao cargo. Atos pré-diplomação: juízo comum."},{"n":57,"enun":"Compete ao Senado Federal processar e julgar o Presidente da República por crimes de responsabilidade.","gab":"CERTO","com":"CF/88, art. 52, I: compete privativamente ao Senado Federal processar e julgar o Presidente da República, o Vice-Presidente, os Ministros de Estado e os Comandantes das Forças Armadas nos crimes de responsabilidade.","fund":"LEI: CF/88, art. 52, I: 'Compete privativamente ao Senado Federal: I – processar e julgar o Presidente e o Vice-Presidente da República nos crimes de responsabilidade, bem como os Ministros de Estado e os Comandantes da Marinha, do Exército e da Aeronáutica nos crimes da mesma natureza conexos com aqueles.'"},{"n":58,"enun":"O STF, ao julgar as ADCs 43, 44 e 54 em novembro de 2019, decidiu que é inconstitucional o art. 283 do CPP e determinou que o réu pode cumprir a pena a partir da condenação em 2ª instância, mesmo sem trânsito em julgado.","gab":"ERRADO","com":"O STF nas ADCs 43/44/54 (Pleno, j. 07/11/2019) decidiu exatamente o oposto: o art. 283 CPP é CONSTITUCIONAL e exige o trânsito em julgado para o início do cumprimento de pena. O enunciado inverteu o resultado do julgamento.","fund":"JURISPRUDÊNCIA: STF ADCs 43/44/54 (Pleno, Marco Aurélio, j. 07/11/2019): 'É constitucional o art. 283 do CPP, que exige o trânsito em julgado da condenação penal para início do cumprimento da pena.' CPP, art. 283: trânsito em julgado é pressuposto da execução."},{"n":59,"enun":"O habeas data é a ação constitucional adequada para o impetrante obter informações relativas à sua pessoa, constantes de registros ou bancos de dados de entidades governamentais ou de caráter público.","gab":"CERTO","com":"CF/88, art. 5º, LXXII: o HD assegura o conhecimento de informações relativas à pessoa do impetrante, em registros de entidades governamentais ou de caráter público. Também permite a retificação e eventual complementação.","fund":"LEI: CF/88, art. 5º, LXXII, 'a': 'para assegurar o conhecimento de informações relativas à pessoa do impetrante, constantes de registros ou bancos de dados de entidades governamentais ou de caráter público.'"},{"n":60,"enun":"A concessão de liminar em mandado de injunção pelo STF permite que o órgão competente seja obrigado a legislar sobre a norma faltante em prazo determinado.","gab":"ERRADO","com":"Na ação de mandado de injunção (Lei 13.300/2016), o STF pode conceder a injunção com eficácia subjetiva (para o caso concreto) ou erga omnes (se em MI coletivo). O Judiciário não pode obrigar o Legislativo a legislar — pode apenas suprir a lacuna para o caso concreto (posição concretista do STF).","fund":"LEI: CF/88, art. 5º, LXXI: 'conceder-se-á mandado de injunção sempre que a falta de norma regulamentadora torne inviável o exercício dos direitos e liberdades constitucionais e das prerrogativas inerentes à nacionalidade, à soberania e à cidadania.' Lei 13.300/16: posição concretista — supre a omissão para o caso."},{"n":61,"enun":"A ação popular pode ser proposta por qualquer cidadão para anular ato lesivo ao patrimônio público, à moralidade administrativa, ao meio ambiente ou ao patrimônio histórico e cultural.","gab":"CERTO","com":"A ação popular (CF/88, art. 5º, LXXIII) é instrumento de democracia direta. Legitimado ativo: qualquer cidadão (pessoa física no gozo dos direitos políticos). Objeto: anulação de ato lesivo a um dos 4 bens protegidos.","fund":"LEI: CF/88, art. 5º, LXXIII: 'qualquer cidadão é parte legítima para propor ação popular que vise a anular ato lesivo ao patrimônio público ou de entidade de que o Estado participe, à moralidade administrativa, ao meio ambiente e ao patrimônio histórico e cultural, ficando o autor, salvo comprovada má-fé, isento de custas judiciais e do ônus da sucumbência.'"},{"n":62,"enun":"Os direitos e garantias expressos na Constituição Federal excluem outros decorrentes do regime e dos princípios por ela adotados, ou dos tratados internacionais em que o Brasil seja parte.","gab":"ERRADO","com":"Art. 5º, §2º CF: os direitos expressos não excluem outros decorrentes do regime constitucional e dos tratados internacionais. A CF adotou um sistema aberto de direitos fundamentais — o rol do art. 5º não é taxativo.","fund":"LEI: CF/88, art. 5º, §2º: 'Os direitos e garantias expressos nesta Constituição não excluem outros decorrentes do regime e dos princípios por ela adotados, ou dos tratados internacionais em que a República Federativa do Brasil seja parte.'"},{"n":63,"enun":"A criação de municípios exige, além de lei estadual, plebiscito das populações dos municípios envolvidos e divulgação dos estudos de viabilidade municipal.","gab":"CERTO","com":"CF/88, art. 18, §4º (com redação da EC 15/1996): a criação de municípios exige: lei ordinária federal (lei complementar, na redação atual); lei estadual; plebiscito das populações envolvidas; e estudos de viabilidade municipal.","fund":"LEI: CF/88, art. 18, §4º: 'A criação, a incorporação, a fusão e o desmembramento de Municípios, far-se-ão por lei estadual, dentro do período determinado por Lei Complementar Federal, e dependerão de consulta prévia, mediante plebiscito, às populações dos Municípios envolvidos, após divulgação dos Estudos de Viabilidade Municipal, apresentados e publicados na forma da lei.'"},{"n":64,"enun":"O direito à saúde, por ser prestação estatal positiva, não pode ser objeto de determinação judicial para fornecimento de medicamento pelo Estado, tendo em vista a separação dos poderes.","gab":"ERRADO","com":"O STF consolidou que o direito à saúde (arts. 6º e 196 CF) é direito fundamental passível de efetivação judicial. A reserva do possível é limitação, mas a proibição de retrocesso e o mínimo existencial autorizam a intervenção judicial quando há omissão estatal.","fund":"JURISPRUDÊNCIA: STF SL 47 AgR (Presidente, j. 17/03/2010): 'O direito à saúde é direito constitucionalmente garantido, e o Estado não pode recusar sua prestação invocando o princípio da reserva do possível quando o mínimo existencial está em jogo.'"}]},{"nome":"Direito Administrativo e Legislação Complementar","comando":"Acerca de direito administrativo, julgue os itens a seguir.","itens":[{"n":65,"enun":"A responsabilidade civil do Estado é objetiva para atos comissivos de seus agentes, sendo desnecessária a demonstração de dolo ou culpa do causador do dano.","gab":"CERTO","com":"CF/88, art. 37, §6º: responsabilidade objetiva do Estado por atos de seus agentes que causem danos a terceiros — basta dano + nexo causal. Para atos omissivos, a responsabilidade é subjetiva (STF ainda diverge; posição dominante: subjetiva para omissões).","fund":"LEI: CF/88, art. 37, §6º: 'As pessoas jurídicas de direito público e as de direito privado prestadoras de serviços públicos responderão pelos danos que seus agentes, nessa qualidade, causarem a terceiros, assegurado o direito de regresso contra o responsável nos casos de dolo ou culpa.'"},{"n":66,"enun":"Nos termos da jurisprudência do STF, as concessionárias de serviço público respondem objetivamente pelos danos causados não apenas aos usuários do serviço, mas também a terceiros não usuários.","gab":"CERTO","com":"STF RE 591.874/MS (Lewandowski, Pleno, j. 26/08/2009): responsabilidade objetiva das concessionárias alcança também os não-usuários do serviço. A responsabilidade objetiva decorre do art. 37, §6º CF.","fund":"JURISPRUDÊNCIA: STF RE 591.874/MS (Lewandowski, Pleno, j. 26/08/2009): 'A responsabilidade civil das pessoas jurídicas de direito privado prestadoras de serviço público é objetiva relativamente a terceiros usuários e não-usuários do serviço.'","jur_status":"OK"},{"n":67,"enun":"O ato administrativo pode ser revogado pela Administração Pública por razões de oportunidade e conveniência, com efeitos ex tunc.","gab":"ERRADO","com":"A revogação, que retira um ato legal por razões de mérito (oportunidade e conveniência), produz efeitos ex nunc (prospectivos), não ex tunc. Anulação, por vício de legalidade, produz efeitos ex tunc.","fund":"LEI: Doutrina administrativista consagrada (Di Pietro, Carvalho Filho): revogação → efeitos ex nunc (da revogação em diante, respeita direitos adquiridos). Anulação → efeitos ex tunc (retroage ao início). STJ Súmula 473."},{"n":68,"enun":"A improbidade administrativa culposa foi abolida pela Lei n.º 14.230/2021, que exige dolo para a configuração de qualquer ato de improbidade.","gab":"CERTO","com":"A Lei 14.230/2021 alterou a Lei de Improbidade (Lei 8.429/92), exigindo agora DOLO para todo ato de improbidade. A modalidade culposa (que vigorava para atos que causam lesão ao erário) foi abolida.","fund":"LEI: Lei 8.429/92, art. 1º, §1º (com redação dada pela Lei 14.230/21): 'Consideram-se atos de improbidade administrativa as condutas dolosas tipificadas nos arts. 9º, 10 e 11 desta Lei, ressalvados tipos previstos em leis especiais.' §2º: 'Considera-se dolo a vontade livre e consciente de alcançar o resultado ilícito tipificado nos arts. 9º, 10 e 11 desta Lei, não bastando a voluntariedade do agente.'"},{"n":69,"enun":"O poder de polícia pode ser exercido por pessoas jurídicas de direito privado integrantes da Administração Pública indireta quando expressamente previsto em lei.","gab":"ERRADO","com":"O STF (RE 633.782, Tema 532) fixou que a delegação de poder de polícia a entidades privadas é inconstitucional. O poder de polícia — especialmente em seu ciclo de ordem, consentimento e fiscalização — é indelegável a pessoas jurídicas de direito privado.","fund":"JURISPRUDÊNCIA: STF RE 633.782, Tema 532 (Pleno, j. 26/10/2020): 'É inconstitucional a delegação de poder de polícia, de qualquer natureza, a pessoas jurídicas de direito privado.' Exceção: poder de polícia de entidades públicas com regime de direito público."},{"n":70,"enun":"A anulação do ato administrativo ilegal pela própria Administração, em exercício da autotutela, está sujeita ao prazo decadencial de cinco anos.","gab":"CERTO","com":"Lei 9.784/99, art. 54: a Administração tem 5 anos para anular atos que gerem efeitos favoráveis a destinatários de boa-fé. A Súmula 473 STF autoriza a anulação, mas a decadência do art. 54 limita esse poder.","fund":"LEI: Lei 9.784/99, art. 54: 'O direito da Administração de anular os atos administrativos de que decorram efeitos favoráveis para os destinatários decai em cinco anos, contados da data em que foram praticados, salvo comprovada má-fé.'"},{"n":71,"enun":"Servidores públicos federais em estágio probatório têm garantia de estabilidade e, por isso, somente podem ser demitidos por processo administrativo disciplinar com ampla defesa.","gab":"ERRADO","com":"O servidor em estágio probatório não tem estabilidade — adquire-a após 3 anos de efetivo exercício (art. 41 CF). Durante o estágio, pode ser exonerado mediante avaliação de desempenho, com contraditório e ampla defesa, mas não há as mesmas garantias do estável.","fund":"LEI: CF/88, art. 41: 'São estáveis após três anos de efetivo exercício os servidores nomeados para cargo de provimento efetivo em virtude de concurso público.' Durante o estágio probatório: sem estabilidade, mas com direito ao contraditório (STF: necessidade de processo administrativo mesmo no estágio)."},{"n":72,"enun":"Nas licitações regidas pela Lei n.º 14.133/2021, o diálogo competitivo é modalidade licitatória exclusivamente aplicável a contratações de alta complexidade.","gab":"CERTO","com":"O diálogo competitivo é modalidade nova introduzida pela Lei 14.133/2021 (art. 32). Aplica-se quando a Administração não consegue definir tecnicamente a solução ótima sozinha — adequada a contratações de alta complexidade, inovação tecnológica ou soluções inéditas.","fund":"LEI: Lei 14.133/2021, art. 32: 'O diálogo competitivo é a modalidade de licitação para contratação de obras, serviços e compras em que a Administração Pública realiza diálogos com licitantes previamente selecionados mediante critérios objetivos, com o intuito de desenvolver uma ou mais alternativas capazes de atender às suas necessidades.'"},{"n":73,"enun":"A dispensa de licitação, por ser hipótese excepcional, não se admite para aquisição de bens destinados à pesquisa científica ou tecnológica.","gab":"ERRADO","com":"A Lei 14.133/2021 prevê hipótese de dispensa de licitação para contratações de instituições de pesquisa e desenvolvimento, abrangendo aquisição de bens e serviços para pesquisa científica e tecnológica.","fund":"LEI: Lei 14.133/2021, art. 75, V: 'É dispensável a licitação: V – para aquisição de componentes ou peças de origem nacional ou estrangeira, necessários à manutenção de equipamentos durante o período de garantia técnica, junto ao fornecedor original desses equipamentos, quando tal condição de exclusividade for indispensável para a vigência da garantia.' Também art. 75, XVI para pesquisa."},{"n":74,"enun":"A Lei Geral das Licitações (Lei n.º 14.133/2021) não se aplica às empresas públicas e sociedades de economia mista federais, que se submetem à Lei n.º 13.303/2016.","gab":"CERTO","com":"A Lei das Estatais (Lei 13.303/2016 — Lei das Estatais) criou regime próprio de contratações para empresas públicas e sociedades de economia mista (federais, estaduais e municipais). A Lei 14.133/2021 aplica-se à Administração Direta, autarquias e fundações.","fund":"LEI: Lei 13.303/2016, art. 1º: 'Esta Lei dispõe sobre o estatuto jurídico da empresa pública, da sociedade de economia mista e de suas subsidiárias, abrangendo toda e qualquer empresa pública e sociedade de economia mista da União, dos Estados, do Distrito Federal e dos Municípios.'"},{"n":75,"enun":"Os atos praticados por agentes de fato — que exercem função pública sem investidura regular — são nulos e não produzem quaisquer efeitos jurídicos.","gab":"ERRADO","com":"A teoria do agente de fato (ou funcionário de fato) reconhece validade aos atos por eles praticados quando terceiros de boa-fé acreditaram na aparência de legalidade. Aplicação do princípio da aparência para proteção de terceiros.","fund":"LEI: Doutrina administrativista: os atos do agente de fato (investido irregularmente) são válidos para terceiros de boa-fé que confiaram na aparência de legitimidade — teoria da aparência ou putatividade. Não afeta o dever de regularização da situação funcional."},{"n":76,"enun":"No regime da Lei n.º 8.112/1990, a sindicância de caráter punitivo deve garantir ao servidor indiciado o direito ao contraditório e à ampla defesa.","gab":"CERTO","com":"A sindicância punitiva (art. 145, II e III da Lei 8.112/90), que pode resultar em advertência ou suspensão de até 30 dias, exige contraditório e ampla defesa. A sindicância investigatória (que apenas apura fatos, sem punição) não exige.","fund":"LEI: Lei 8.112/90, art. 143 e 145: sindicância pode resultar em arquivamento, advertência, suspensão de até 30 dias ou instauração de PAD. Quando resultar em punição: contraditório e ampla defesa obrigatórios."},{"n":77,"enun":"A Administração Pública pode contratar diretamente com empresa que tenha sócio condenado por improbidade administrativa, pois a inabilitação é punição exclusivamente pessoal.","gab":"ERRADO","com":"A condenação por improbidade administrativa gera proibição de contratar com o Poder Público e receber benefícios fiscais (Lei 8.429/92, art. 12). A Lei 14.133/2021 também veda a participação de empresas com sócios em situação de inidoneidade.","fund":"LEI: Lei 8.429/92, art. 12: entre as sanções por improbidade, inclui 'proibição de contratar com o Poder Público ou receber benefícios ou incentivos fiscais ou creditícios, direta ou indiretamente, ainda que por intermédio de pessoa jurídica da qual seja sócio majoritário.'"},{"n":78,"enun":"O servidor público estável somente pode perder o cargo por sentença judicial transitada em julgado, por processo administrativo em que lhe seja assegurada ampla defesa, ou mediante procedimento de avaliação periódica de desempenho.","gab":"CERTO","com":"CF/88, art. 41, §1º: o servidor estável perde o cargo em 3 hipóteses: sentença judicial transitada em julgado; PAD com ampla defesa; e avaliação periódica de desempenho na forma de lei complementar.","fund":"LEI: CF/88, art. 41, §1º: 'O servidor público estável só perderá o cargo: I – em virtude de sentença judicial transitada em julgado; II – mediante processo administrativo em que lhe seja assegurada ampla defesa; III – mediante procedimento de avaliação periódica de desempenho, na forma de lei complementar, assegurada ampla defesa.'"},{"n":79,"enun":"Os bens dominicais do Estado podem ser usucapidos por particular que deles tenha posse ininterrupta e de boa-fé, por prazo superior a dez anos.","gab":"ERRADO","com":"Súmula 340 STF: bens dominicais são bens públicos e não estão sujeitos a usucapião. CF/88, art. 183, §3º e art. 191, parágrafo único vedam a usucapião de bens públicos de qualquer natureza.","fund":"JURISPRUDÊNCIA: Súmula 340 STF: 'Desde a vigência do Código Civil, os bens dominicais, como os demais bens públicos, não podem ser adquiridos por usucapião.' LEI: CF/88, art. 183, §3º: 'Os imóveis públicos não serão adquiridos por usucapião.'","jur_status":"OK"},{"n":80,"enun":"O princípio da moralidade administrativa, previsto no art. 37 da CF, autoriza a Administração a anular contratos firmados com observância de todos os requisitos legais, mas considerados imorais pelo gestor.","gab":"ERRADO","com":"A moralidade administrativa é parâmetro de controle do ato administrativo, mas não autoriza a Administração a anular contratos regulares por critérios subjetivos do gestor. A anulação exige ilegalidade ou imoralidade objetivamente verificável, não mera percepção pessoal.","fund":"LEI: CF/88, art. 37, caput: legalidade, impessoalidade, moralidade, publicidade, eficiência. A moralidade tem conteúdo objetivo — vinculada à boa administração, boa-fé e finalidade pública — não é critério subjetivo do agente."}]},{"nome":"Medicina Legal","comando":"Acerca de medicina legal, julgue os itens a seguir.","itens":[{"n":81,"enun":"No exame de corpo de delito em vítima de tortura, a avaliação médico-legal deve buscar a correspondência biunívoca entre cada lesão encontrada e um método específico de tortura.","gab":"ERRADO","com":"O Protocolo de Istambul determina avaliação holística do conjunto das lesões, e não correspondência individual entre cada lesão e um método de tortura. A escala de 5 níveis (não característico → diagnóstico) é aplicada ao quadro global.","fund":"REFERÊNCIA: Protocolo de Istambul (ONU, 1999/2004), adotado pelo Brasil; CNJ Resolução 414/2021 e 593/2024 — quesitos obrigatórios em exames de corpo de delito. Avaliação global das injúrias, não correspondência 1:1.","peg":"Clássico de prova: a avaliação deve ser HOLÍSTICA (global), não biunívoca (1:1). Resposta típica errada: 'o médico deve identificar qual método causou cada lesão'."},{"n":82,"enun":"A conjunção carnal forçada pode ser comprovada pela perícia médico-legal sem que haja lesão corporal na vítima.","gab":"CERTO","com":"O laudo de conjunção carnal não é indispensável e a ausência de lesões não afasta o crime. A sexologia forense admite que a violência pode ocorrer sem marcas físicas (coação moral, paralisia por medo). O CPP também admite outros meios de prova.","fund":"LEI: CPP, art. 167: 'Não sendo possível o exame de corpo de delito, por haverem desaparecido os vestígios, a prova testemunhal poderá suprir-lhe a falta.' STJ consolidou: ausência de laudo não impede condenação por crimes sexuais."},{"n":83,"enun":"A docimasia de Galeno é o método utilizado para determinar se o recém-nascido respirou antes de morrer, sendo exame essencial na perícia de infanticídio.","gab":"CERTO","com":"A docimasia pulmonar hidrostática de Galeno verifica se o pulmão do neonato flutua na água (respiro = pulmão aerado flutua; não respirou = pulmão denso afunda). Essencial para distinguir natimorto de criança nascida viva e depois morta.","fund":"REFERÊNCIA: Medicina Legal — Sexologia Forense e Tanatologia Perinatal: docimasia hidrostática de Galeno é teste clássico para vitaloidade neonatal (recém-nascido respirou?). Positivo: flutua (respirou). Negativo: afunda (natimorto ou asfixia antes de respirar)."},{"n":84,"enun":"A rigidez cadavérica (rigor mortis) começa a aparecer poucas horas após a morte, em direção craniocaudal, e desaparece na mesma ordem.","gab":"CERTO","com":"O rigor mortis segue a lei de Nysten: inicia-se na musculatura massetérica (face) e evolui craniocaudalmente (pescoço, tronco, membros superiores, membros inferiores). Desaparece na mesma sequência.","fund":"REFERÊNCIA: Tanatologia — cronotanatognose: rigor mortis inicia 1–6h após a morte; máximo em 6–12h; resolução em 24–48h (em temperatura ambiente). Direção craniocaudal (lei de Nysten). Temperatura acelera a decomposição."},{"n":85,"enun":"A zona de tatuagem observada nas lesões por projétil de arma de fogo é formada pela combustão da pólvora e pode ser retirada por lavagem da ferida.","gab":"ERRADO","com":"A zona de tatuagem é formada por partículas de pólvora não queimada incrustadas na pele — são corpúsculos sólidos que não são removidos por lavagem. Diferente da zona de esfumaçamento (fuligem negra, removível por lavagem).","fund":"REFERÊNCIA: Traumatologia por arma de fogo — zonas ao redor do orifício de entrada: (1) orla de contusão; (2) orla de enxugo; (3) zona de esfumaçamento (removível); (4) zona de tatuagem (NÃO removível — partículas incrustadas na derme); (5) zona de chamuscamento (marca térmica).","peg":"Zona de tatuagem ≠ zona de esfumaçamento. Tatuagem: partícula incrustada, NÃO removível. Esfumaçamento: fuligem superficial, removível. CEBRASPE cobra essa distinção."},{"n":86,"enun":"A imputabilidade penal em razão de doença mental é determinada exclusivamente pelo médico-legista, cuja conclusão vincula o julgador.","gab":"ERRADO","com":"A imputabilidade é questão de direito — o médico-legista realiza a perícia e emite laudo técnico, mas a conclusão sobre imputabilidade, semi-imputabilidade ou inimputabilidade é do juiz (art. 182 CPP: o juiz não está adstrito ao laudo pericial).","fund":"LEI: CPP, art. 182: 'O juiz não ficará adstrito ao laudo, podendo aceitá-lo ou rejeitá-lo, no todo ou em parte.' A perícia informa; a conclusão jurídica é do magistrado."},{"n":87,"enun":"A asfixia por afogamento pode ser confirmada pela presença de cogumelo de espuma na via aérea superior e pela presença de diatomáceas nos pulmões e órgãos internos.","gab":"CERTO","com":"No afogamento, a espuma branca ou rósea (cogumelo de espuma) na boca e narinas é sinal precoce. A prova de Revenstorf confirma: diatomáceas (microalgas) encontradas no sangue e órgãos internos demonstram que a vítima entrou viva na água.","fund":"REFERÊNCIA: Medicina Legal — Asfixia por afogamento: cogumelo de espuma (sinal externo); prova de Revenstorf (diatomáceas em vísceras) = evidência de afogamento real vs. imersão post mortem."},{"n":88,"enun":"Para fins de perícia médico-legal, o laudo de lesão corporal deve ser elaborado imediatamente após a ocorrência, sendo inútil se feito após 24 horas.","gab":"ERRADO","com":"O laudo de lesão corporal pode ser elaborado a qualquer tempo enquanto houver vestígios. O CPP admite laudo posterior (art. 168, §3º): se o exame não for feito no momento oportuno, pode ser feito depois ou suprido por prova testemunhal.","fund":"LEI: CPP, art. 168, §3º: 'No caso do §2º, a falta de exame complementar poderá ser suprida pela prova testemunhal quando a incapacidade persistir até o julgamento.'"},{"n":89,"enun":"O Protocolo de Istambul classifica as lesões em 5 categorias, sendo que a categoria 'diagnóstico' significa que a lesão é inequivocamente causada por tortura.","gab":"CERTO","com":"A 5ª categoria do Protocolo de Istambul ('diagnóstico' ou 'específico') significa que a lesão tem uma única causa possível, sendo diagnóstica de tortura por aquele método específico. É a categoria mais rara na prática clínica.","fund":"REFERÊNCIA: Protocolo de Istambul — escala de 5 níveis: (1) Não característico; (2) Compatível; (3) Consistente com; (4) Altamente indicativo; (5) Diagnóstico (específico) — única causa possível, inequivocamente causada por aquele método de tortura. CNJ Res. 414/2021."},{"n":90,"enun":"A morte presumida pode ser declarada pelo médico-legista com base em vestígios indiretos, sem necessidade de exame direto do cadáver.","gab":"ERRADO","com":"A morte real é confirmada pelo exame direto do cadáver (necropsia ou exame externo). A morte presumida é declaração judicial (CC/02, arts. 7º e 22) quando não há cadáver — mas o perito não a declara unilateralmente sem fundamento legal.","fund":"LEI: CC/02, art. 7º: 'Pode ser declarada a morte presumida, sem decretação de ausência: I – se for extremamente provável a morte de quem estava em perigo de vida; II – se alguém, desaparecido em campanha ou feito prisioneiro, não for encontrado até dois anos após o término da guerra.' É declaração JUDICIAL."}]},{"nome":"Direito Civil e Legislação Complementar","comando":"Acerca de direito civil, julgue os itens a seguir.","itens":[{"n":91,"enun":"Conforme a LINDB, na ausência de disposição expressa, a lei entra em vigor em todo o Brasil 45 dias após sua publicação oficial.","gab":"CERTO","com":"Art. 1º LINDB: regra geral de vacatio legis é 45 dias. Para vigência no exterior: 3 meses. Prazo contado da data de publicação oficial no Diário Oficial.","fund":"LEI: Dec.-Lei 4.657/42 (LINDB), art. 1º, caput: 'Salvo disposição contrária, a lei começa a vigorar em todo o país quarenta e cinco dias depois de oficialmente publicada.'"},{"n":92,"enun":"A repristinação de lei anterior revogada é regra geral no ordenamento jurídico brasileiro, ocorrendo automaticamente quando a lei revogadora é revogada.","gab":"ERRADO","com":"A repristinação automática não existe no Brasil (art. 2º, §3º LINDB). A revogação da lei revogadora não restaura a lei anterior. A repristinação exige previsão expressa.","fund":"LEI: LINDB, art. 2º, §3º: 'Salvo disposição em contrário, a lei revogada não se restaura por ter a lei revogadora perdido a vigência.'"},{"n":93,"enun":"A eficácia das normas jurídicas atinge os fatos passados (pendentes e pretéritos) quando existir expressa previsão legal para tal retroatividade.","gab":"CERTO","com":"A retroatividade de lei exige previsão expressa do legislador (LINDB, art. 6º). Mesmo com previsão expressa, a lei não pode prejudicar direito adquirido, ato jurídico perfeito e coisa julgada (CF/88, art. 5º, XXXVI).","fund":"LEI: CF/88, art. 5º, XXXVI + LINDB, art. 6º: a lei nova com efeito retroativo é possível quando expressamente prevista e desde que não atinja direito adquirido, ato jurídico perfeito e coisa julgada."},{"n":94,"enun":"A pessoa jurídica pode ser vítima de dano moral, segundo entendimento consolidado do STJ.","gab":"CERTO","com":"STJ Súmula 227: 'A pessoa jurídica pode sofrer dano moral.' A proteção refere-se à honra objetiva (reputação, credibilidade comercial), não à honra subjetiva (sentimento, dor).","fund":"JURISPRUDÊNCIA: STJ Súmula 227: 'A pessoa jurídica pode sofrer dano moral.' CC/02, art. 52: 'Aplica-se às pessoas jurídicas, no que couber, a proteção dos direitos da personalidade.'"},{"n":95,"enun":"Nos termos do Código Civil, a prescrição pode ser alegada em qualquer grau de jurisdição pela parte a quem aproveita.","gab":"CERTO","com":"CC/02, art. 193: a prescrição pode ser alegada em qualquer fase do processo e grau de jurisdição, pela parte que lhe aproveita. O juiz também pode reconhê-la de ofício (CC/02, art. 332, §1º CPC).","fund":"LEI: CC/02, art. 193: 'A prescrição pode ser alegada em qualquer grau de jurisdição, pela parte a quem aproveita.'"},{"n":96,"enun":"O dano moral decorrente do uso indevido de imagem de pessoa física prescinde de comprovação do prejuízo sofrido.","gab":"CERTO","com":"STJ Súmula 403: o dano moral pelo uso indevido de imagem é in re ipsa — presume-se pela simples violação do direito, sem necessidade de prova do dano concreto.","fund":"JURISPRUDÊNCIA: STJ Súmula 403 (j. 28/10/2009): 'Independe de prova do prejuízo a indenização pela publicação não autorizada de imagem de pessoa com fins econômicos ou comerciais.'"},{"n":97,"enun":"Os negócios jurídicos nulos podem ser ratificados pelas partes, sanando o vício de nulidade absoluta com a confirmação do ato.","gab":"ERRADO","com":"Nulidade absoluta não admite confirmação (ratificação). Apenas anulabilidade (nulidade relativa) admite confirmação, que opera efeitos retroativos. Nulidade absoluta é insanável — deve ser declarada de ofício pelo juiz.","fund":"LEI: CC/02, art. 168: 'As nulidades dos artigos antecedentes podem ser alegadas por qualquer interessado, ou pelo Ministério Público, quando lhe couber intervir.' Art. 169: 'O negócio jurídico nulo não é suscetível de confirmação, nem convalesce pelo decurso do tempo.'"},{"n":98,"enun":"O dolo como vício do negócio jurídico deve ser principal (determinante) para gerar anulabilidade; o dolo acidental apenas obriga à reparação dos danos.","gab":"CERTO","com":"CC/02, arts. 145–146: o dolo principal (determinante) gera anulabilidade do negócio. O dolo acidental (que, sem o engano, o negócio ainda seria celebrado, mas em condições diferentes) não anula — apenas obriga à reparação.","fund":"LEI: CC/02, art. 145: 'São os negócios jurídicos anuláveis por dolo, quando este for a sua causa.' Art. 146: 'O dolo acidental só obriga à satisfação das perdas e danos, e é acidental quando, a seu despeito, o negócio seria realizado, embora por outro modo.'"}]},{"nome":"Direito Tributário e Legislação Complementar","comando":"Acerca de direito tributário, julgue os itens a seguir.","itens":[{"n":99,"enun":"A União pode instituir empréstimos compulsórios mediante lei complementar para atender despesas extraordinárias decorrentes de calamidade pública.","gab":"CERTO","com":"CF/88, art. 148, I: empréstimo compulsório é tributo criado por lei complementar, privativo da União. Pode ser instituído para: (1) despesas extraordinárias decorrentes de calamidade pública, guerra ou sua iminência; (2) investimento público urgente e de relevante interesse nacional.","fund":"LEI: CF/88, art. 148: 'A União, mediante lei complementar, poderá instituir empréstimos compulsórios: I – para atender a despesas extraordinárias, decorrentes de calamidade pública, de guerra externa ou sua iminência.'"},{"n":100,"enun":"O lançamento tributário por declaração ocorre quando o sujeito passivo, sem nenhuma participação do Fisco, calcula e recolhe o tributo.","gab":"ERRADO","com":"O lançamento por declaração (misto) ocorre quando o sujeito passivo presta informações ao Fisco, que calcula e exige o tributo. O autolançamento (homologação) é onde o sujeito passivo calcula e recolhe por conta própria.","fund":"LEI: CTN, art. 147: 'O lançamento é efetuado com base na declaração do sujeito passivo ou de terceiro [...] em que preste, à autoridade administrativa, informações sobre matéria de fato, indispensáveis à sua efetivação.' Art. 150: lançamento por homologação (autolançamento)."},{"n":101,"enun":"A isenção tributária concedida por prazo certo e sob condição gera direito adquirido ao contribuinte, não podendo ser revogada antes do prazo.","gab":"CERTO","com":"CTN, art. 178 c/c SV 50 STF: isenção concedida por prazo certo e em função de determinadas condições não pode ser revogada unilateralmente antes do prazo — o contribuinte tem direito adquirido. Isenção incondicionada ou sem prazo pode ser revogada.","fund":"LEI: CTN, art. 178: 'A isenção, salvo se concedida por prazo certo e em função de determinadas condições, pode ser revogada ou modificada por lei, a qualquer tempo.' Interpretação a contrario sensu: com prazo certo e condição = direito adquirido."},{"n":102,"enun":"O princípio da anterioridade nonagesimal (noventena) aplica-se ao IPTU, vedando sua majoração com efeitos antes de 90 dias da publicação da lei que o instituiu.","gab":"ERRADO","com":"O IPTU está sujeito à anterioridade anual (art. 150, III, 'b') MAS excetuado da anterioridade nonagesimal (art. 150, III, 'c'). Ou seja: precisa respeitar o exercício seguinte, mas não os 90 dias. A majoração por prazo pode entrar em vigor em 1º de janeiro, sem noventena.","fund":"LEI: CF/88, art. 150, §1º: 'A vedação do inciso III, b, não se aplica aos tributos previstos nos arts. 148, I, 153, I, II, IV e V, e 154, II; e a vedação do inciso III, c, não se aplica aos tributos previstos nos arts. 148, I, 153, I, II, III e V, e 154, II, nem à fixação da base de cálculo dos impostos previstos nos arts. 155, III, e 156, I.'","peg":"IPTU: anterioridade anual SIM, noventena NÃO. IPVA: anterioridade anual SIM, noventena NÃO (para base de cálculo). CEBRASPE cobra sistematicamente a tabela de exceções."},{"n":103,"enun":"A responsabilidade tributária por substituição regressiva (para trás) ocorre quando o recolhimento do tributo fica diferido para uma etapa posterior da cadeia econômica.","gab":"CERTO","com":"Na substituição regressiva (para trás), o recolhimento do tributo é postergado (diferido) — quem está a frente na cadeia econômica recolhe o tributo devido pelas operações anteriores. Exemplo: laticínio que recolhe ICMS das operações do produtor rural.","fund":"LEI: CTN, art. 128 (responsabilidade por substituição): a lei pode atribuir a terceiro a responsabilidade pelo tributo. Modalidades: substituição para trás (regressiva/diferimento) e para frente (progressiva — fato gerador presumido, CF/88 art. 150, §7º)."},{"n":104,"enun":"A moratória suspende a exigibilidade do crédito tributário pelo prazo estabelecido em lei.","gab":"CERTO","com":"A moratória é hipótese de suspensão da exigibilidade do crédito tributário (CTN, art. 151, I). Concede prazo para pagamento sem imposição de sanções. Deve ser prevista em lei e pode ser geral ou individual (mediante despacho da autoridade).","fund":"LEI: CTN, art. 151, I: 'Suspendem a exigibilidade do crédito tributário: I – moratória.' CTN, arts. 152–155: condições e formas da moratória."}]},{"nome":"Direito Ambiental e Legislação Complementar","comando":"Acerca de direito ambiental, julgue os itens a seguir.","itens":[{"n":105,"enun":"O CONAMA é o principal órgão consultivo e deliberativo do SISNAMA, com competência para editar resoluções de caráter normativo sobre política ambiental.","gab":"CERTO","com":"Lei 6.938/81, art. 6º, II: CONAMA é órgão consultivo E deliberativo do SISNAMA. Suas resoluções têm caráter normativo infralegal vinculante (ex.: CONAMA 1/1986 sobre EIA/RIMA; CONAMA 237/1997 sobre licenciamento).","fund":"LEI: Lei 6.938/81 (PNMA), art. 6º, II: 'II – órgão consultivo e deliberativo: o Conselho Nacional do Meio Ambiente – Conama, com a finalidade de assessorar, estudar e propor ao Conselho de Governo, diretrizes de políticas governamentais para o meio ambiente e os recursos naturais.'"},{"n":106,"enun":"A Lei n.º 9.605/1998 admite a responsabilidade penal da pessoa jurídica pelos crimes ambientais, desde que a infração seja cometida por decisão de seu representante.","gab":"CERTO","com":"Lei 9.605/98, art. 3º: a pessoa jurídica pode ser responsabilizada penalmente por crimes ambientais, quando a infração for cometida por decisão de seu representante, mandatário, órgão ou gestor, no interesse da entidade. STJ e STF admitem a responsabilidade da PJ independentemente da condenação da pessoa física (dissociação — entendimento firmado).","fund":"LEI: Lei 9.605/98, art. 3º: 'As pessoas jurídicas serão responsabilizadas administrativa, civil e penalmente conforme o disposto nesta Lei, nos casos em que a infração seja cometida por decisão de seu representante legal ou contratual, ou de seu órgão colegiado, no interesse ou benefício da sua entidade.'"},{"n":107,"enun":"O dano ambiental é imprescritível conforme reconhecido pelo STF no julgamento do ARE 654.833.","gab":"CERTO","com":"STF ARE 654.833 (Tema 999, Pleno, j. 20/04/2020): as pretensões de reparação civil de dano ambiental são imprescritíveis — a natureza do bem ambiental (difuso, transgeracional) justifica a imprescritibilidade.","fund":"JURISPRUDÊNCIA: STF ARE 654.833 (Tema 999, Pleno, j. 20/04/2020): 'É imprescritível a pretensão de reparação civil de dano ambiental.' Tese de repercussão geral — vinculante."},{"n":108,"enun":"A responsabilidade civil por danos ambientais independe de culpa, sendo objetiva, com base na teoria do risco integral.","gab":"CERTO","com":"STJ REsp 1.374.284: responsabilidade civil ambiental é objetiva, baseada no risco integral. Não admite excludentes de responsabilidade como caso fortuito, força maior ou fato de terceiro quando há dano ambiental.","fund":"JURISPRUDÊNCIA: STJ REsp 1.374.284 (Pleno, j. 27/08/2014): 'A responsabilidade civil por dano ambiental é objetiva, baseada na teoria do risco integral, não admitindo excludentes de responsabilidade, como caso fortuito, força maior ou fato de terceiro.'"},{"n":109,"enun":"Nos crimes ambientais, a pessoa jurídica pode ser condenada à pena de prestação pecuniária, de prestação de serviços à comunidade e de interdição temporária de direitos.","gab":"CERTO","com":"Lei 9.605/98, art. 21: as penas aplicáveis à pessoa jurídica são: multa; restritivas de direitos (suspensão de atividades, interdição, proibição de contratar com o Poder Público, prestação de serviços à comunidade); prestação pecuniária; e recolhimento domiciliar.","fund":"LEI: Lei 9.605/98, art. 21: 'As penas aplicáveis isolada, cumulativa ou alternativamente às pessoas jurídicas são: I – multa; II – restritivas de direitos; III – prestação de serviços à comunidade.'"}]},{"nome":"Direito Empresarial e Legislação Complementar","comando":"Acerca de direito empresarial, julgue os itens a seguir.","itens":[{"n":110,"enun":"A desconsideração da personalidade jurídica na forma prevista no art. 50 do Código Civil exige a presença do requisito do desvio de finalidade ou da confusão patrimonial.","gab":"CERTO","com":"CC/02, art. 50 (teoria maior da desconsideração): exige prova de abuso da personalidade jurídica — desvio de finalidade OU confusão patrimonial. A mera insolvência não basta (diferente do CDC, que adota a teoria menor).","fund":"LEI: CC/02, art. 50: 'Em caso de abuso da personalidade jurídica, caracterizado pelo desvio de finalidade ou pela confusão patrimonial, pode o juiz, a requerimento da parte, ou do Ministério Público quando lhe couber intervir no processo, desconsiderá-la.'"},{"n":111,"enun":"A sociedade anônima deve sempre ter natureza empresarial, independentemente de seu objeto social.","gab":"CERTO","com":"CC/02, art. 982, parágrafo único: independentemente de seu objeto, a sociedade anônima (S.A.) é sempre considerada empresária. Mesmo que tenha objeto não empresarial, é S.A. e se rege pela Lei das S.A. (Lei 6.404/76).","fund":"LEI: CC/02, art. 982, parágrafo único: 'Independentemente de seu objeto, considera-se empresária a sociedade
