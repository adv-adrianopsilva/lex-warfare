 ilegalidade ou abuso de poder.' | LEI: 'Art. 654, CPP: O habeas corpus poderá ser impetrado por qualquer pessoa, em seu favor ou de outrem.'"},{"n":48,"enun":"É cabível habeas corpus contra decisão condenatória que aplique exclusivamente pena de multa, conforme entendimento sumulado do Supremo Tribunal Federal.","gab":"ERRADO","com":"Errado. A Súmula 693/STF veda expressamente o HC contra pena de multa. O raciocínio: multa não restringe liberdade de locomoção — e o HC protege exclusivamente a locomoção. Sem ameaça à liberdade, sem HC.","fund":"JURISPRUDÊNCIA: 'STF, Súmula 693: Não cabe habeas corpus contra decisão condenatória a pena de multa, ou relativo a processo em curso por infração penal a que a pena pecuniária seja a única cominada.'","peg":"CEBRASPE pode afirmar que 'qualquer condenação penal' enseja HC — se for só multa, não cabe."},{"n":49,"enun":"Não cabe habeas corpus quando já extinta a pena privativa de liberdade, conforme Súmula 695 do Supremo Tribunal Federal.","gab":"CERTO","com":"Certo. Se a pena privativa de liberdade já foi extinta, não há mais ameaça à locomoção — o objeto do HC desapareceu. É como chamar o bombeiro depois que o incêndio já apagou.","fund":"JURISPRUDÊNCIA: 'STF, Súmula 695: Não cabe habeas corpus quando já extinta a pena privativa de liberdade.'"},{"n":50,"enun":"O mandado de segurança pode ser impetrado contra lei em tese, conforme Súmula 266 do Supremo Tribunal Federal, desde que demonstrada a violação a direito líquido e certo.","gab":"ERRADO","com":"Errado. A Súmula 266/STF diz exatamente o contrário: NÃO cabe MS contra lei em tese. Lei em tese é norma abstrata que não atinge diretamente ninguém — para caber MS, é preciso ato concreto que viole direito líquido e certo. Exceção: lei autoexecutável (de efeitos concretos).","fund":"JURISPRUDÊNCIA: 'STF, Súmula 266: Não cabe mandado de segurança contra lei em tese.' | DOUTRINA: 'Lei de efeitos concretos, que atinge diretamente destinatários determinados, equipara-se a ato administrativo e admite MS.'","peg":"CEBRASPE inverte a Súmula 266 — afirma que 'pode' quando a súmula diz 'não cabe'."},{"n":51,"enun":"O mandado de segurança coletivo pode ser impetrado por partido político com representação no Congresso Nacional, organização sindical, entidade de classe ou associação legalmente constituída e em funcionamento há pelo menos um ano.","gab":"CERTO","com":"Certo. O art. 5º, LXX, CF lista os legitimados para o MS coletivo. O partido precisa de representação no CN (pelo menos um parlamentar em qualquer casa). As associações precisam de 1 ano de existência — requisito de seriedade e permanência.","fund":"LEI: 'Art. 5º, LXX, CF: o mandado de segurança coletivo pode ser impetrado por: a) partido político com representação no Congresso Nacional; b) organização sindical, entidade de classe ou associação legalmente constituída e em funcionamento há pelo menos um ano, em defesa dos interesses de seus membros ou associados.'"},{"n":52,"enun":"A entidade de classe não tem legitimidade para impetrar mandado de segurança coletivo quando a pretensão veiculada interessa apenas a uma parte da respectiva categoria, segundo entendimento sumulado do STF.","gab":"ERRADO","com":"Errado. A Súmula 630/STF diz justamente o contrário: a entidade de classe TEM legitimidade para MS coletivo mesmo quando o interesse é de apenas parte da categoria. Não precisa ser unanimidade — basta que parte dos membros seja beneficiada.","fund":"JURISPRUDÊNCIA: 'STF, Súmula 630: A entidade de classe tem legitimação para o mandado de segurança ainda quando a pretensão veiculada interesse apenas a uma parte da respectiva categoria.'"},{"n":53,"enun":"O prazo para impetração do mandado de segurança é de cento e vinte dias, contados da ciência do ato impugnado, sendo tal prazo de natureza decadencial, conforme a Lei 12.016/2009.","gab":"CERTO","com":"Certo. O prazo de 120 dias é decadencial (extingue o direito de impetrar, não o direito material). O STF já declarou constitucional esse prazo — não viola o princípio da inafastabilidade, pois o titular ainda pode buscar a tutela por via ordinária.","fund":"LEI: 'Art. 23, Lei 12.016/2009: O direito de requerer mandado de segurança extinguir-se-á decorridos 120 (cento e vinte) dias, contados da ciência, pelo interessado, do ato impugnado.' | JURISPRUDÊNCIA: 'STF, RE 424.663/MG: o prazo decadencial de 120 dias é constitucional.'","jur_status":"PENDENTE"},{"n":54,"enun":"O mandado de injunção destina-se a suprir omissão legislativa que inviabilize o exercício de direitos e liberdades constitucionais, tendo a Lei 13.300/2016 adotado a teoria não concretista.","gab":"ERRADO","com":"Errado. A Lei 13.300/2016 adotou a teoria concretista intermediária, não a não concretista. Na teoria não concretista, o Judiciário apenas comunicaria a omissão ao Legislativo (sem efeito prático). Na concretista intermediária, o Judiciário fixa prazo e, não suprida a omissão, viabiliza o exercício do direito.","fund":"LEI: 'Art. 8º, I e II, Lei 13.300/2016: Reconhecido o estado de mora legislativa, será deferida a injunção para: I – determinar prazo razoável para que o impetrado promova a edição da norma regulamentadora; II – estabelecer as condições em que se dará o exercício dos direitos.'","peg":"CEBRASPE troca 'concretista intermediária' por 'não concretista' — a Lei 13.300/2016 superou a não concretista."},{"n":55,"enun":"O habeas data é o remédio constitucional adequado para obter informações de interesse particular constantes de registros públicos, sendo desnecessário o prévio requerimento administrativo.","gab":"ERRADO","com":"Errado. Dois erros: (1) HD serve para dados pessoais sobre o impetrante, não informações genéricas de interesse particular — para isso, existe o direito de certidão (art. 5º, XXXIV, 'b'). (2) É necessário o prévio requerimento administrativo recusado ou não respondido (Súmula 2/STJ).","fund":"LEI: 'Art. 5º, LXXII, CF: conceder-se-á habeas data para assegurar o conhecimento de informações relativas à pessoa do impetrante, constantes de registros ou bancos de dados de entidades governamentais ou de caráter público.' | JURISPRUDÊNCIA: 'STJ, Súmula 2: Não cabe o habeas data se não houve recusa de informações por parte da autoridade administrativa.'","peg":"Dois pontos: HD = dados pessoais (não genéricos) + exige prévio requerimento."},{"n":56,"enun":"A ação popular pode ser proposta por qualquer pessoa jurídica em defesa do patrimônio público, da moralidade administrativa, do meio ambiente e do patrimônio histórico e cultural.","gab":"ERRADO","com":"Errado. A ação popular é exclusiva do cidadão (eleitor) — pessoa física no exercício dos direitos políticos. Pessoa jurídica NÃO tem legitimidade. A prova da cidadania é o título de eleitor.","fund":"LEI: 'Art. 5º, LXXIII, CF: qualquer cidadão é parte legítima para propor ação popular.' | LEI: 'Art. 1º, § 3º, Lei 4.717/1965: A prova da cidadania, para ingresso em juízo, será feita com o título eleitoral.' | JURISPRUDÊNCIA: 'STF, Súmula 365: Pessoa jurídica não tem legitimidade para propor ação popular (interpretação a contrario sensu).'"},{"n":57,"enun":"O Ministério Público tem legitimidade para propor ação popular em defesa do patrimônio público, podendo atuar tanto como autor quanto como fiscal da lei no mesmo processo.","gab":"ERRADO","com":"Errado. O MP não pode propor ação popular — a legitimidade é exclusiva do cidadão-eleitor. O MP atua como fiscal da lei (custos legis) e pode dar continuidade à ação se o autor desistir (art. 9º, Lei 4.717/65), mas jamais como autor originário.","fund":"LEI: 'Art. 6º, § 4º, Lei 4.717/1965: O Ministério Público acompanhará a ação, cabendo-lhe apressar a produção da prova.' | LEI: 'Art. 9º: Se o autor desistir da ação ou der motivo à absolvição da instância, serão publicados editais, ficando assegurado a qualquer cidadão, bem como ao representante do Ministério Público, assumir o prosseguimento da ação.'"},{"n":58,"enun":"A sentença proferida em ação popular tem eficácia erga omnes, salvo quando julgada improcedente por insuficiência de provas, hipótese em que qualquer cidadão poderá intentar outra ação com idêntico fundamento.","gab":"CERTO","com":"Certo. A coisa julgada na ação popular é secundum eventum probationis: se a improcedência for por falta de provas, não impede nova ação. Mas se for por mérito (provas suficientes), a eficácia é erga omnes e impede repropositura.","fund":"LEI: 'Art. 18, Lei 4.717/1965: A sentença terá eficácia de coisa julgada oponível erga omnes, exceto no caso de haver sido a ação julgada improcedente por deficiência de prova; neste caso, qualquer cidadão poderá intentar outra ação com idêntico fundamento, valendo-se de nova prova.'"},{"n":59,"enun":"O habeas corpus contra punições disciplinares militares é vedado pela Constituição Federal, sem qualquer exceção, conforme dispõe o art. 142, § 2º.","gab":"ERRADO","com":"Errado. O art. 142, §2º, CF veda HC contra punições disciplinares militares em regra, mas a doutrina e a jurisprudência admitem HC para verificar os pressupostos formais da punição: competência da autoridade, formalidade do ato, pena cabível e se há excesso de punição.","fund":"LEI: 'Art. 142, § 2º, CF: Não caberá habeas corpus em relação a punições disciplinares militares.' | DOUTRINA: 'A vedação refere-se ao mérito da punição disciplinar; cabe HC para verificar pressupostos de legalidade: hierarquia, poder disciplinar, ato ligado à função e pena suscetível de ser aplicada.' | JURISPRUDÊNCIA: 'STF admite HC para analisar legalidade formal da punição militar.'"},{"n":60,"enun":"O mandado de injunção coletivo segue as mesmas regras de legitimidade ativa previstas para o mandado de segurança coletivo, conforme estabelecido na Lei 13.300/2016.","gab":"CERTO","com":"Certo. O art. 12 da Lei 13.300/2016 confere legitimidade para o MI coletivo aos mesmos entes do MS coletivo: MP, partido político com representação no CN, organização sindical, entidade de classe e associação (1 ano). Além disso, inclui a Defensoria Pública.","fund":"LEI: 'Art. 12, Lei 13.300/2016: O mandado de injunção coletivo pode ser promovido: I – pelo Ministério Público; II – por partido político com representação no Congresso Nacional; III – por organização sindical, entidade de classe ou associação legalmente constituída e em funcionamento há pelo menos 1 ano; IV – pela Defensoria Pública.'"},{"n":61,"enun":"O habeas corpus pode ser impetrado de forma preventiva, hipótese em que será concedido salvo-conduto ao paciente, caso se demonstre a existência de ameaça concreta à sua liberdade de locomoção.","gab":"CERTO","com":"Certo. O HC preventivo é a modalidade que antecipa a proteção: antes que a prisão ocorra, o impetrante demonstra ameaça concreta e obtém salvo-conduto — uma ordem judicial que impede a prisão. É como um escudo jurídico contra uma agressão iminente.","fund":"LEI: 'Art. 5º, LXVIII, CF: ameaçado de sofrer violência ou coação.' | LEI: 'Art. 660, § 4º, CPP: Se a ordem de habeas corpus for concedida para evitar ameaça de violência ou coação ilegal, dar-se-á ao paciente salvo-conduto assinado pelo juiz.'"},{"n":62,"enun":"O mandado de segurança é cabível contra ato judicial de que não caiba recurso com efeito suspensivo, sendo vedada sua impetração contra decisão judicial transitada em julgado.","gab":"CERTO","com":"Certo. Duas regras complementares: (1) cabe MS contra decisão judicial quando não há recurso com efeito suspensivo disponível (art. 5º, II, Lei 12.016/09); (2) não cabe MS contra decisão transitada em julgado (Súmula 268/STF). O MS preenche lacunas recursais, mas não substitui ação rescisória.","fund":"LEI: 'Art. 5º, II, Lei 12.016/2009: Não se concederá mandado de segurança quando se tratar de decisão judicial da qual caiba recurso com efeito suspensivo.' | LEI: 'Art. 5º, III: Não se concederá MS quando se tratar de decisão judicial transitada em julgado.' | JURISPRUDÊNCIA: 'STF, Súmula 268: Não cabe MS contra decisão judicial com trânsito em julgado.'"},{"n":63,"enun":"Os direitos e garantias fundamentais previstos na Constituição Federal constituem rol taxativo, não admitindo o reconhecimento de direitos implícitos decorrentes do regime e dos princípios constitucionais.","gab":"ERRADO","com":"Errado. O art. 5º, §2º, CF estabelece cláusula de abertura: os direitos fundamentais não se limitam aos expressos — incluem direitos implícitos decorrentes do regime, dos princípios e dos tratados internacionais. O catálogo é exemplificativo, não taxativo.","fund":"LEI: 'Art. 5º, § 2º, CF: Os direitos e garantias expressos nesta Constituição não excluem outros decorrentes do regime e dos princípios por ela adotados, ou dos tratados internacionais em que a República Federativa do Brasil seja parte.'"},{"n":64,"enun":"Os tratados internacionais sobre direitos humanos aprovados pelo rito do art. 5º, § 3º, da Constituição Federal equivalem a emendas constitucionais, enquanto os demais tratados de direitos humanos possuem status supralegal, conforme entendimento do STF.","gab":"CERTO","com":"Certo. O STF criou uma hierarquia dupla: tratados de DH aprovados com quórum de EC (3/5, dois turnos, duas casas) = status constitucional. Tratados de DH sem esse quórum = supralegal (acima das leis, abaixo da CF). Tratados comuns = status legal ordinário.","fund":"LEI: 'Art. 5º, § 3º, CF: Os tratados e convenções internacionais sobre direitos humanos que forem aprovados, em cada Casa do Congresso Nacional, em dois turnos, por três quintos dos votos dos respectivos membros, serão equivalentes às emendas constitucionais.' | JURISPRUDÊNCIA: 'STF, RE 466.343/SP, Rel. Min. Cezar Peluso, Pleno, j. 03/12/2008: tratados de DH não aprovados pelo rito do § 3º possuem status supralegal.'","jur_status":"OK"}]},{"nome":"Direito Administrativo + Legislação Complementar","comando":"Acerca dos atos administrativos, da extinção dos atos administrativos e da responsabilidade civil do Estado, julgue os itens a seguir.","itens":[{"n":65,"enun":"A administração pública pode anular seus próprios atos, quando eivados de vícios que os tornem ilegais, porque deles não se originam direitos, conforme a Súmula 473 do Supremo Tribunal Federal.","gab":"CERTO","com":"Certo. A Súmula 473 é o pilar da autotutela administrativa: a Administração tem o poder-dever de anular atos ilegais, independentemente de provocação. De um ato ilegal não nascem direitos — é como um contrato nulo: nunca gerou obrigações válidas.","fund":"JURISPRUDÊNCIA: 'STF, Súmula 473: A administração pode anular seus próprios atos, quando eivados de vícios que os tornam ilegais, porque dêles não se originam direitos; ou revogá-los, por motivo de conveniência ou oportunidade, respeitados os direitos adquiridos, e ressalvada, em todos os casos, a apreciação judicial.'"},{"n":66,"enun":"A revogação de ato administrativo opera efeitos retroativos (ex tunc), retornando as partes ao estado anterior à prática do ato.","gab":"ERRADO","com":"Errado. Revogação opera efeitos prospectivos (ex nunc) — do momento da revogação em diante. O que já aconteceu permanece válido. É a anulação que retroage (ex tunc). Pense: revogar é 'parar a partir de agora'; anular é 'como se nunca tivesse existido'.","fund":"DOUTRINA: 'Maria Sylvia Di Pietro: a revogação pressupõe ato legal que se tornou inconveniente; por isso, os efeitos já produzidos são preservados (ex nunc). A anulação, por vício de legalidade, retroage (ex tunc), desfazendo todos os efeitos.'","peg":"CEBRASPE inverte ex tunc/ex nunc. Anulação = ex tunc. Revogação = ex nunc."},{"n":67,"enun":"É possível a revogação de atos administrativos vinculados pela administração pública, desde que haja razões de conveniência e oportunidade que justifiquem a medida.","gab":"ERRADO","com":"Errado. Atos vinculados não admitem revogação — porque neles não há juízo de conveniência e oportunidade. A lei predeterminou todos os elementos: se o ato atende aos requisitos legais, a Administração é obrigada a praticá-lo e não pode 'mudar de ideia'.","fund":"DOUTRINA: 'Hely Lopes Meirelles: a revogação é privativa dos atos discricionários, pois só nestes há margem de conveniência e oportunidade para ser reavaliada. Atos vinculados, se ilegais, são anuláveis; se legais, permanecem.' | MNEMÔNICO: 'VALSA — Vinculados não admitem revogação.'"},{"n":68,"enun":"A cassação de ato administrativo decorre de ilegalidade originária na sua formação, devendo a administração desfazer o ato com efeitos retroativos.","gab":"ERRADO","com":"Errado. A cassação não decorre de ilegalidade originária (isso seria anulação). A cassação ocorre quando o ato nasceu válido, mas o beneficiário descumpriu condição imposta para manter o benefício. É como perder a carteira de motorista por dirigir bêbado — a CNH era válida, mas o titular violou condição.","fund":"DOUTRINA: 'Celso Antônio Bandeira de Mello: cassação é a extinção do ato administrativo por ter o destinatário descumprido condição a cuja observância estava obrigado. Diferencia-se da anulação (vício originário) e da revogação (inconveniência superveniente).'","peg":"CEBRASPE confunde cassação com anulação — cassação é descumprimento de condição, não vício originário."},{"n":69,"enun":"O prazo decadencial para a administração anular atos administrativos de que decorram efeitos favoráveis para os destinatários é de cinco anos, contados da data em que foram praticados, salvo comprovada má-fé, conforme o art. 54 da Lei 9.784/1999.","gab":"CERTO","com":"Certo. O art. 54 estabelece a decadência quinquenal: passados 5 anos sem anulação, o ato se estabiliza — o tempo consolida a situação jurídica. A exceção é a má-fé: se o beneficiário obteve o ato por fraude, não há decadência.","fund":"LEI: 'Art. 54, Lei 9.784/1999: O direito da Administração de anular os atos administrativos de que decorram efeitos favoráveis para os destinatários decai em cinco anos, contados da data em que foram praticados, salvo comprovada má-fé.'"},{"n":70,"enun":"Segundo o Supremo Tribunal Federal, atos administrativos flagrantemente inconstitucionais não se submetem ao prazo decadencial de cinco anos previsto no art. 54 da Lei 9.784/1999.","gab":"CERTO","com":"Certo. O STF criou uma exceção jurisprudencial: quando há violação direta e flagrante à Constituição, o prazo de 5 anos não protege o ato. A lógica: a segurança jurídica (decadência) cede diante da supremacia constitucional em casos graves.","fund":"JURISPRUDÊNCIA: 'STF, MS 28.720/DF e outros: estando evidenciada violação direta ao texto constitucional, é possível a anulação de ato administrativo mesmo quando decorrido o prazo decadencial de 5 anos do art. 54, Lei 9.784/99. Reiterado em 2024-2025.'","jur_status":"PENDENTE"},{"n":71,"enun":"Na ausência de lei estadual ou municipal fixando prazo para o exercício da autotutela administrativa, aplica-se subsidiariamente o prazo de cinco anos da Lei 9.784/1999, conforme Súmula 633 do STJ.","gab":"CERTO","com":"Certo. A Súmula 633/STJ resolve o vácuo normativo de estados e municípios que não têm lei própria sobre autotutela: usa-se, por analogia, o prazo federal de 5 anos. Uniformiza a proteção do administrado em todo o território.","fund":"JURISPRUDÊNCIA: 'STJ, Súmula 633: A Lei 9.784/1999, especialmente no tocante ao prazo decadencial para a revisão de atos administrativos no âmbito da Administração Pública federal, pode ser aplicada, de forma subsidiária, aos estados e municípios, se inexistente norma local e específica que regule a matéria.'"},{"n":72,"enun":"O STF declarou constitucional lei estadual que fixou prazo decenal para a administração exercer a autotutela sobre seus atos, no julgamento da ADI 6019.","gab":"ERRADO","com":"Errado. Na ADI 6019, o STF declarou INCONSTITUCIONAL a lei estadual com prazo de 10 anos. O fundamento: prazo superior a 5 anos rompe o equilíbrio entre segurança jurídica e legalidade. O limite é quinquenal.","fund":"JURISPRUDÊNCIA: 'STF, ADI 6019/SP: declarou inconstitucional lei estadual que estabelecia prazo decadencial de 10 anos para a administração anular seus próprios atos. O prazo máximo admitido é de 5 anos, conforme parâmetro federal.'","peg":"CEBRASPE pode afirmar 'constitucional' quando o STF declarou 'inconstitucional' — inversão clássica.","jur_status":"PENDENTE"},{"n":73,"enun":"A convalidação de ato administrativo é possível quando o vício recair sobre os elementos competência ou forma, desde que o defeito seja sanável, conforme previsto no art. 55 da Lei 9.784/1999.","gab":"CERTO","com":"Certo. A convalidação é o 'conserto' do ato: só funciona para defeitos leves. Competência (desde que não exclusiva) e forma (quando não essencial) são sanáveis. Vícios de finalidade, motivo e objeto são fatais — exigem anulação.","fund":"LEI: 'Art. 55, Lei 9.784/1999: Em decisão na qual se evidencie não acarretarem lesão ao interesse público nem prejuízo a terceiros, os atos que apresentarem defeitos sanáveis poderão ser convalidados pela própria Administração.' | DOUTRINA: 'Vícios sanáveis: competência (não exclusiva) e forma (não essencial). Vícios insanáveis: finalidade, motivo e objeto.'"},{"n":74,"enun":"Os atos administrativos compostos resultam da manifestação de vontade de dois ou mais órgãos, fundindo-se em um único ato, como ocorre na aposentadoria dos servidores públicos.","gab":"ERRADO","com":"Errado. A descrição se refere a ato complexo (fusão de vontades de dois ou mais órgãos em ato único), não a ato composto. O ato composto é formado por dois atos: um principal e um acessório (como homologação ou visto). A aposentadoria (ente + Tribunal de Contas) é ato complexo.","fund":"DOUTRINA: 'Hely Lopes Meirelles: ato complexo é o que se forma pela conjugação de vontades de mais de um órgão administrativo. Ato composto é o que resulta de vontade única de um órgão, mas depende de outro ato que o confirme para produzir efeitos (ato principal + ato acessório).'","peg":"CEBRASPE troca complexo por composto — memorize: complexo = fusão de vontades; composto = ato principal + acessório."},{"n":75,"enun":"A caducidade de ato administrativo ocorre quando norma jurídica superveniente torna o ato incompatível com o novo ordenamento, extinguindo-o com efeitos prospectivos.","gab":"CERTO","com":"Certo. A caducidade é a 'morte natural por mudança de lei': uma autorização válida hoje pode se tornar incompatível com nova legislação amanhã. Os efeitos são ex nunc — o que já foi feito sob o ato válido permanece.","fund":"DOUTRINA: 'Celso Antônio Bandeira de Mello: caducidade é a retirada do ato administrativo em virtude da superveniência de norma jurídica incompatível com aquela que autorizava a prática do ato. Diferente da revogação (decisão administrativa) e da anulação (vício originário).'"},{"n":76,"enun":"A responsabilidade civil do Estado por atos de seus agentes é objetiva, bastando a demonstração do nexo causal entre a conduta do agente e o dano sofrido pela vítima, nos termos do art. 37, § 6º, da Constituição Federal.","gab":"CERTO","com":"Certo. O Estado responde sem necessidade de prova de culpa (responsabilidade objetiva). A vítima precisa provar apenas: conduta do agente, dano e nexo causal. O Estado pode se eximir provando culpa exclusiva da vítima, caso fortuito ou força maior.","fund":"LEI: 'Art. 37, § 6º, CF: As pessoas jurídicas de direito público e as de direito privado prestadoras de serviços públicos responderão pelos danos que seus agentes, nessa qualidade, causarem a terceiros, assegurado o direito de regresso contra o responsável nos casos de dolo ou culpa.'"},{"n":77,"enun":"A responsabilidade civil objetiva do Estado, prevista no art. 37, § 6º, da CF, aplica-se tanto aos usuários quanto aos não usuários do serviço público prestado por concessionárias, conforme entendimento do Supremo Tribunal Federal.","gab":"CERTO","com":"Certo. O STF (RE 591.874/MS) estendeu a responsabilidade objetiva das concessionárias a não usuários do serviço. A lógica: se um ônibus de concessionária atropela um pedestre (não usuário), a responsabilidade é objetiva — o terceiro não tem culpa de estar na calçada.","fund":"JURISPRUDÊNCIA: 'STF, RE 591.874/MS, Rel. Min. Ricardo Lewandowski, Pleno, j. 26/08/2009: a responsabilidade civil das pessoas jurídicas de direito privado prestadoras de serviço público é objetiva relativamente a terceiros usuários e não-usuários do serviço.'","jur_status":"OK"},{"n":78,"enun":"O ato administrativo que exauriu seus efeitos pode ser revogado pela administração, desde que haja interesse público superveniente.","gab":"ERRADO","com":"Errado. Ato que já exauriu seus efeitos não pode ser revogado — não há mais o que desfazer. Revogar um ato exaurido é como tentar desligar uma máquina que já parou: não faz sentido. É um dos itens do mnemônico VALSA.","fund":"DOUTRINA: 'Di Pietro: atos que já produziram todos os seus efeitos não admitem revogação, pois esta só opera para o futuro (ex nunc) e não há futuro a ser afetado.' | MNEMÔNICO: 'VALSA — A de Atos que já exauriram seus efeitos.'"},{"n":79,"enun":"A anulação de ato administrativo produz efeitos retroativos, devendo a administração, contudo, resguardar os efeitos já produzidos em relação a terceiros de boa-fé, conforme entendimento do Supremo Tribunal Federal.","gab":"CERTO","com":"Certo. A anulação é ex tunc em regra, mas há temperamento: terceiros de boa-fé que confiaram na validade do ato são protegidos. É a aplicação dos princípios da segurança jurídica e da boa-fé — o cidadão não pode ser punido por confiar no Estado.","fund":"LEI: 'Art. 54, Lei 9.784/1999: proteção dos efeitos favoráveis ao destinatário de boa-fé após 5 anos.' | JURISPRUDÊNCIA: 'STF, MS 28.720/DF: a anulação, embora retroativa, deve resguardar situações consolidadas de boa-fé, em homenagem à segurança jurídica.'","jur_status":"PENDENTE"},{"n":80,"enun":"O Poder Judiciário pode revogar atos administrativos praticados pelo Poder Executivo quando verificar razões de conveniência e oportunidade que recomendem a extinção do ato.","gab":"ERRADO","com":"Errado. Revogação é privativa da própria Administração que praticou o ato. O Judiciário pode anular atos administrativos (controle de legalidade), mas jamais revogá-los — porque revogação envolve mérito administrativo, que é insuscetível de controle judicial.","fund":"DOUTRINA: 'Hely Lopes Meirelles: a revogação é ato privativo da Administração que praticou o ato originário. O Judiciário controla a legalidade (anulação), não o mérito administrativo (revogação).' | JURISPRUDÊNCIA: 'STF, Súmula 473, parte final: ressalvada, em todos os casos, a apreciação judicial — referindo-se ao controle de legalidade, não ao mérito.'"}]},{"nome":"Medicina Legal","comando":"A respeito de medicina legal, tanatologia, traumatologia e sexologia forense, julgue os itens a seguir.","itens":[{"n":81,"enun":"A rigidez cadavérica (rigor mortis) inicia-se, em regra, pelos músculos da mandíbula e da nuca, seguindo a lei de Nysten, e constitui fenômeno abiótico consecutivo à morte.","gab":"CERTO","com":"Certo. A Lei de Nysten descreve a progressão crânio-caudal da rigidez: começa na mandíbula/nuca, desce para membros superiores, tronco e membros inferiores. É fenômeno consecutivo (não imediato) — surge horas após a morte.","fund":"DOUTRINA: 'Genival Veloso de França, Medicina Legal: a rigidez cadavérica é fenômeno abiótico consecutivo que obedece à Lei de Nysten — progressão crânio-caudal. Início: 1-2h post mortem; generalização: 6-8h; desaparecimento: 24-36h (mesma ordem de surgimento).'"},{"n":82,"enun":"As manchas de hipóstase (livores cadavéricos) são fenômenos abióticos imediatos que surgem logo após a parada cardiorrespiratória.","gab":"ERRADO","com":"Errado. Livores são fenômenos abióticos consecutivos, não imediatos. Surgem gradualmente (1-2h após a morte) pela deposição gravitacional do sangue. Os fenômenos imediatos são: perda de consciência, insensibilidade, imobilidade, parada cardiorrespiratória.","fund":"DOUTRINA: 'Hygino de Carvalho Hércules: os livores cadavéricos são fenômenos consecutivos, surgindo progressivamente nas primeiras horas após a morte. Tornam-se fixos entre 8-12h. Fenômenos imediatos: cessação da circulação, respiração e atividade cerebral.'"},{"n":83,"enun":"A asfixia mecânica por constrição do pescoço denomina-se enforcamento quando a força constritora é o próprio peso do corpo da vítima, total ou parcialmente suspenso.","gab":"CERTO","com":"Certo. Enforcamento = peso do corpo traciona o laço no pescoço. Diferencia-se do estrangulamento (força ativa externa, como mãos ou corda puxada por alguém) e da esganadura (compressão com as mãos diretamente). O corpo não precisa estar totalmente suspenso.","fund":"DOUTRINA: 'Genival Veloso de França: enforcamento é asfixia mecânica produzida pela constrição do pescoço por um laço cuja força atuante é o peso do próprio corpo. Pode ser completo (pés fora do chão) ou incompleto (corpo parcialmente apoiado).'"},{"n":84,"enun":"No exame de corpo de delito, a perícia direta é aquela realizada sobre vestígios materiais do crime, enquanto a indireta baseia-se em depoimentos testemunhais e outros elementos de prova, na impossibilidade da primeira.","gab":"CERTO","com":"Certo. A perícia direta examina os vestígios pessoalmente. Quando isso é impossível (vestígios desapareceram), usa-se a indireta: baseada em prontuários médicos, fotografias, relatos de testemunhas e outros elementos. O CPP admite ambas (art. 158, parágrafo único).","fund":"LEI: 'Art. 158, CPP: Quando a infração deixar vestígios, será indispensável o exame de corpo de delito, direto ou indireto.' | DOUTRINA: 'Perícia direta: sobre o próprio vestígio. Indireta: baseada em elementos subsidiários quando o exame direto é impossível.'"},{"n":85,"enun":"A cronotanatognose é o ramo da medicina legal que estuda a determinação da causa da morte.","gab":"ERRADO","com":"Errado. Cronotanatognose estuda a determinação do tempo da morte (cronos = tempo), não da causa. A determinação da causa da morte é objeto da tanatognose em sentido estrito (diagnóstico da causa mortis). Crono + tanato + gnose = conhecimento do tempo da morte.","fund":"DOUTRINA: 'Genival Veloso de França: cronotanatognose é a estimativa do tempo de morte com base em fenômenos cadavéricos (rigidez, livores, putrefação). A tanatognose estuda o diagnóstico da realidade da morte.'","peg":"CEBRASPE troca 'tempo da morte' por 'causa da morte' — cronotanatognose é TEMPO."},{"n":86,"enun":"A equimose é a infiltração hemorrágica nas malhas dos tecidos, caracterizada pela presença de sangue extravascular sem formação de cavidade, sendo sua coloração útil para estimar o tempo da lesão.","gab":"CERTO","com":"Certo. A equimose segue o espectro equimótico de Legrand du Saulle: vermelho → violeta → azul → esverdeado → amarelado → desaparecimento. Essa mudança de cor pela degradação da hemoglobina permite estimar quando a lesão ocorreu.","fund":"DOUTRINA: 'Hygino Hércules: equimose é extravasamento sanguíneo por ruptura de vasos, com infiltração nos tecidos sem formação de coleção. O espectro equimótico (Legrand du Saulle): vermelho (1º dia), violáceo (2º-3º), azul (3º-6º), esverdeado (7º-10º), amarelado (10º-15º).'"},{"n":87,"enun":"Na lesão por projétil de arma de fogo, o orifício de entrada típico apresenta bordas regulares evertidas e diâmetro maior que o orifício de saída.","gab":"ERRADO","com":"Errado. O orifício de entrada típico tem bordas invertidas (para dentro), não evertidas. É o orifício de saída que tem bordas evertidas (para fora) e geralmente é maior e mais irregular. Entrada: menor, regular, bordas invertidas, com orla de contusão.","fund":"DOUTRINA: 'Genival Veloso de França: orifício de entrada de PAF típico — circular ou oval, bordas invertidas, com orla de contusão (Werkgaertner), orla de enxugo e orla de tatuagem (tiro a curta distância). Orifício de saída — irregular, bordas evertidas, maior.'","peg":"CEBRASPE inverte entrada/saída — entrada = invertidas e menor; saída = evertidas e maior."},{"n":88,"enun":"O sinal de Amussat — ruptura transversal da túnica íntima da carótida — é encontrado no enforcamento e auxilia na diferenciação com o estrangulamento.","gab":"CERTO","com":"Certo. Amussat é sinal clássico do enforcamento: a tração do laço pelo peso do corpo causa ruptura transversal na camada interna (íntima) da artéria carótida. No estrangulamento, a lesão vascular tem padrão diferente por ser compressão horizontal, não tração vertical.","fund":"DOUTRINA: 'Genival Veloso de França: sinal de Amussat — ruptura transversal da túnica íntima da carótida comum. Característico do enforcamento. Outros sinais: sulco oblíquo (enforcamento) vs. horizontal (estrangulamento).'"},{"n":89,"enun":"A conjunção carnal, para fins de tipificação do crime de estupro, deve ser entendida como qualquer ato libidinoso praticado mediante violência ou grave ameaça.","gab":"ERRADO","com":"Errado. Conjunção carnal é especificamente a cópula vagínica (introdução do pênis na vagina). Outros atos libidinosos (sexo oral, anal, toques) são 'outros atos libidinosos'. O art. 213 CP tipifica ambos, mas são conceitos distintos na medicina legal e no direito.","fund":"LEI: 'Art. 213, CP: Constranger alguém, mediante violência ou grave ameaça, a ter conjunção carnal ou a praticar ou permitir que com ele se pratique outro ato libidinoso.' | DOUTRINA: 'Conjunção carnal = introductio penis in vaginam. Demais condutas sexuais são atos libidinosos diversos da conjunção carnal.'"},{"n":90,"enun":"O fenômeno da saponificação (adipocera) é um processo conservador do cadáver que ocorre em ambientes úmidos e com pouca aeração, resultando na transformação da gordura corporal em substância caseosa.","gab":"CERTO","com":"Certo. A saponificação (adipocera) é fenômeno transformativo conservador: a gordura do corpo se converte em substância semelhante a cera/sabão em ambientes úmidos e anaeróbicos. Preserva a forma externa do cadáver, dificultando a estimativa de tempo de morte mas facilitando a identificação.","fund":"DOUTRINA: 'Genival Veloso de França: a adipocera ou saponificação é fenômeno transformativo conservador. Ocorre em meios úmidos, argilosos, com pouca ventilação. A gordura subcutânea se transforma em substância amarelada, untuosa, de consistência caseosa.'"}]},{"nome":"Direito Civil + Legislação Complementar","comando":"Acerca da responsabilidade civil, dos contratos e da personalidade civil, julgue os itens que se seguem.","itens":[{"n":91,"enun":"A responsabilidade civil objetiva, prevista no art. 927, parágrafo único, do Código Civil, aplica-se quando a atividade normalmente desenvolvida pelo autor do dano implicar, por sua natureza, risco para os direitos de outrem.","gab":"CERTO","com":"Certo. O art. 927, parágrafo único, consagra a teoria do risco da atividade: quem exerce atividade que, pela própria natureza, cria risco de danos a terceiros, responde independentemente de culpa. É a objetivação da responsabilidade civil no CC/2002.","fund":"LEI: 'Art. 927, parágrafo único, CC: Haverá obrigação de reparar o dano, independentemente de culpa, nos casos especificados em lei, ou quando a atividade normalmente desenvolvida pelo autor do dano implicar, por sua natureza, risco para os direitos de outrem.'"},{"n":92,"enun":"O dano moral decorrente do uso indevido da imagem de pessoa é presumido (in re ipsa), dispensando prova do efetivo prejuízo, conforme Súmula 403 do Superior Tribunal de Justiça.","gab":"CERTO","com":"Certo. A Súmula 403/STJ estabelece que o dano moral por uso indevido de imagem é in re ipsa — o prejuízo decorre automaticamente da violação do direito de imagem, sem necessidade de provar sofrimento ou abalo concreto.","fund":"JURISPRUDÊNCIA: 'STJ, Súmula 403: Independe de prova do prejuízo a indenização pela publicação não autorizada de imagem de pessoa com fins econômicos ou comerciais (j. 28/10/2009).'"},{"n":93,"enun":"A prescrição pode ser reconhecida de ofício pelo juiz, independentemente de provocação das partes, conforme previsto no art. 487, II, do Código de Processo Civil.","gab":"CERTO","com":"Certo. Desde 2006 (Lei 11.280), a prescrição pode ser reconhecida de ofício. O CPC/2015 manteve: o juiz pode declarar a prescrição sem que qualquer parte a alegue. Diferente da decadência convencional, que depende de provocação.","fund":"LEI: 'Art. 487, II, CPC: Haverá resolução de mérito quando o juiz: II – decidir, de ofício ou a requerimento, sobre a ocorrência de decadência ou prescrição.' | LEI: 'Art. 332, § 1º, CPC: permite inclusive julgamento de improcedência liminar por prescrição ou decadência.'"},{"n":94,"enun":"O início da personalidade civil da pessoa natural, segundo o Código Civil brasileiro, dá-se com o nascimento com vida, embora a lei ponha a salvo, desde a concepção, os direitos do nascituro.","gab":"CERTO","com":"Certo. O CC/2002 adotou a teoria natalista temperada: a personalidade começa com o nascimento com vida (primeiro suspiro), mas o nascituro tem expectativa de direitos protegida. É como uma reserva de herança: o direito existe condicionado ao nascimento.","fund":"LEI: 'Art. 2º, CC: A personalidade civil da pessoa começa do nascimento com vida; mas a lei põe a salvo, desde a concepção, os direitos do nascituro.'"},{"n":95,"enun":"A responsabilidade civil por dano ambiental é objetiva e adota a teoria do risco integral, não admitindo excludentes de responsabilidade como caso fortuito, força maior ou fato de terceiro.","gab":"CERTO","com":"Certo. O dano ambiental tem tratamento especial: responsabilidade objetiva com risco integral. O poluidor responde mesmo diante de caso fortuito, força maior ou culpa de terceiro. A proteção ao meio ambiente prevalece sobre as excludentes tradicionais.","fund":"JURISPRUDÊNCIA: 'STJ, REsp 1.374.284/MG, 2ª Seção: a responsabilidade civil por danos ambientais é objetiva, informada pela teoria do risco integral, não admitindo excludentes.' | LEI: 'Art. 14, § 1º, Lei 6.938/1981: responsabilidade objetiva do poluidor.'","jur_status":"OK"},{"n":96,"enun":"A cláusula penal compensatória, quando fixada em contrato, pode ser reduzida equitativamente pelo juiz se a obrigação principal tiver sido cumprida em parte, conforme o art. 413 do Código Civil.","gab":"CERTO","com":"Certo. O art. 413 é norma de ordem pública — o juiz DEVE reduzir a cláusula penal se o cumprimento parcial justificar. Não é faculdade, é dever. Evita enriquecimento sem causa: se metade foi cumprida, a multa integral seria desproporcional.","fund":"LEI: 'Art. 413, CC: A penalidade deve ser reduzida equitativamente pelo juiz se a obrigação principal tiver sido cumprida em parte, ou se o montante da penalidade for manifestamente excessivo, tendo-se em vista a natureza e a finalidade do negócio.'"},{"n":97,"enun":"A boa-fé objetiva, prevista no art. 422 do Código Civil, impõe às partes deveres de conduta como lealdade, informação e cooperação, aplicando-se tanto na fase de execução quanto na fase pré-contratual e pós-contratual.","gab":"CERTO","com":"Certo. Embora o art. 422 mencione 'conclusão e execução', a doutrina e a jurisprudência estendem a boa-fé objetiva às fases pré-contratual (responsabilidade por ruptura injustificada de negociações) e pós-contratual (dever de sigilo, pós-eficácia das obrigações).","fund":"LEI: 'Art. 422, CC: Os contratantes são obrigados a guardar, assim na conclusão do contrato, como em sua execução, os princípios de probidade e boa-fé.' | DOUTRINA: 'Enunciado 170, III Jornada CJF: A boa-fé objetiva deve ser observada pelas partes na fase de negociações preliminares e após a execução do contrato.'"},{"n":98,"enun":"Os bens públicos dominicais podem ser objeto de usucapião, desde que não estejam afetados a qualquer destinação pública, conforme entendimento do Supremo Tribunal Federal.","gab":"ERRADO","com":"Errado. Bens públicos, de qualquer espécie (uso comum, uso especial ou dominicais), são imprescritíveis — não admitem usucapião. A CF/88 proíbe expressamente (arts. 183, §3º e 191, parágrafo único). A Súmula 340/STF ratifica.","fund":"LEI: 'Art. 183, § 3º, CF: Os imóveis públicos não serão adquiridos por usucapião.' | LEI: 'Art. 102, CC: Os bens públicos não estão sujeitos a usucapião.' | JURISPRUDÊNCIA: 'STF, Súmula 340: Desde a vigência do Código Civil, os bens dominicais, como os demais bens públicos, não podem ser adquiridos por usucapião.'"}]},{"nome":"Direito Tributário + Legislação Complementar","comando":"Acerca do sistema tributário nacional e das limitações ao poder de tributar, julgue os próximos itens.","itens":[{"n":99,"enun":"O princípio da anterioridade tributária, previsto no art. 150, III, 'b', da Constituição Federal, veda a cobrança de tributo no mesmo exercício financeiro em que haja sido publicada a lei que o instituiu ou aumentou.","gab":"CERTO","com":"Certo. A anterioridade anual (de exercício) protege o contribuinte contra surpresas fiscais: a lei que cria ou aumenta tributo só produz efeitos no exercício seguinte. É o 'prazo de aviso' do Fisco ao cidadão.","fund":"LEI: 'Art. 150, III, b, CF: Sem prejuízo de outras garantias asseguradas ao contribuinte, é vedado à União, aos Estados, ao Distrito Federal e aos Municípios cobrar tributos no mesmo exercício financeiro em que haja sido publicada a lei que os instituiu ou aumentou.'"},{"n":100,"enun":"O Imposto sobre Produtos Industrializados (IPI) é exceção ao princípio da anterioridade anual, podendo ser cobrado no mesmo exercício financeiro da lei que o aumentou, mas deve observar a anterioridade nonagesimal.","gab":"CERTO","com":"Certo. O IPI é exceção à anterioridade anual (art. 150, §1º, CF), mas deve observar a noventena (90 dias). É um equilíbrio: por ter função extrafiscal (regulação econômica), pode ser alterado rapidamente, mas com um mínimo de antecedência.","fund":"LEI: 'Art. 150, § 1º, CF: A vedação do inciso III, b, não se aplica ao IPI. Porém, o IPI deve observar o prazo de 90 dias (anterioridade nonagesimal, art. 150, III, c).'"},{"n":101,"enun":"O crime tributário material, conforme a Súmula Vinculante 24 do STF, somente se tipifica com o lançamento definitivo do tributo, constituindo condição objetiva de punibilidade.","gab":"CERTO","com":"Certo. A SV 24 exige o lançamento definitivo: sem ele, não há crime tributário material. A lógica: se o tributo ainda está sendo discutido administrativamente, não se pode afirmar que houve supressão ou redução — o crédito tributário sequer está constituído.","fund":"JURISPRUDÊNCIA: 'STF, Súmula Vinculante 24: Não se tipifica crime material contra a ordem tributária, previsto no art. 1º, incisos I a IV, da Lei nº 8.137/1990, antes do lançamento definitivo do tributo (j. 02/12/2009).'","jur_status":"OK"},{"n":102,"enun":"A imunidade tributária recíproca, prevista no art. 150, VI, 'a', da Constituição Federal, impede que os entes federativos cobrem impostos uns dos outros, abrangendo taxas e contribuições de melhoria.","gab":"ERRADO","com":"Errado. A imunidade recíproca abrange apenas impostos — não se estende a taxas nem a contribuições de melhoria. Cada ente pode cobrar taxas dos demais (contraprestação por serviço). A imunidade é sobre impostos porque eles são tributos não vinculados.","fund":"LEI: 'Art. 150, VI, a, CF: É vedado à União, aos Estados, ao Distrito Federal e aos Municípios instituir impostos sobre patrimônio, renda ou serviços, uns dos outros.' | DOUTRINA: 'A imunidade recíproca é restrita a impostos. Taxas e contribuições de melhoria não estão incluídas.'"},{"n":103,"enun":"O lançamento tributário, uma vez regularmente notificado ao sujeito passivo, somente pode ser alterado por impugnação do contribuinte, recurso de ofício ou iniciativa da autoridade administrativa, nos casos previstos em lei.","gab":"CERTO","com":"Certo. O art. 145 do CTN estabelece o princípio da imutabilidade relativa do lançamento: após notificação, só pode ser alterado nos casos taxativos do artigo. Isso protege o contribuinte contra alterações arbitrárias.","fund":"LEI: 'Art. 145, CTN: O lançamento regularmente notificado ao sujeito passivo só pode ser alterado em virtude de: I – impugnação do sujeito passivo; II – recurso de ofício; III – iniciativa de ofício da autoridade administrativa, nos casos previstos no artigo 149.'"},{"n":104,"enun":"A contribuição de melhoria pode ser instituída para fazer face ao custo de obras públicas futuras, bastando a previsão orçamentária da despesa.","gab":"ERRADO","com":"Errado. A contribuição de melhoria exige obra pública já realizada E valorização imobiliária decorrente dela. Obra futura ou em andamento não autoriza a cobrança — é preciso que a valorização tenha efetivamente ocorrido.","fund":"LEI: 'Art. 145, III, CF: A União, os Estados, o DF e os Municípios poderão instituir contribuição de melhoria, decorrente de obras públicas.' | LEI: 'Art. 81, CTN: A contribuição de melhoria cobrada pela União, pelos Estados, pelo DF ou pelos Municípios, no âmbito de suas respectivas atribuições, é instituída para fazer face ao custo de obras públicas de que decorra valorização imobiliária.'"}]},{"nome":"Direito Ambiental + Legislação Complementar","comando":"No que se refere ao direito ambiental e à proteção do meio ambiente, julgue os itens subsequentes.","itens":[{"n":105,"enun":"A responsabilidade civil por danos ambientais é objetiva e independe de culpa, sendo o poluidor obrigado a reparar os danos causados ao meio ambiente, conforme o art. 14, § 1º, da Lei 6.938/1981.","gab":"CERTO","com":"Certo. O direito ambiental brasileiro adota responsabilidade objetiva para o poluidor: basta o dano e o nexo causal, sem necessidade de provar culpa. A proteção ambiental é tão relevante que o legislador transferiu o risco integralmente ao poluidor.","fund":"LEI: 'Art. 14, § 1º, Lei 6.938/1981: Sem obstar a aplicação das penalidades previstas neste artigo, é o poluidor obrigado, independentemente da existência de culpa, a indenizar ou reparar os danos causados ao meio ambiente e a terceiros, afetados por sua atividade.'"},{"n":106,"enun":"O princípio da precaução ambiental exige que, diante de incerteza científica sobre os potenciais efeitos de determinada atividade, sejam adotadas medidas preventivas para evitar danos ao meio ambiente.","gab":"CERTO","com":"Certo. A precaução opera na incerteza: quando a ciência não tem certeza se uma atividade causará dano, presume-se o pior e adotam-se medidas protetivas. In dubio pro natura — na dúvida, protege-se o meio ambiente.","fund":"LEI: 'Art. 225, § 1º, V, CF: controlar a produção, comercialização e emprego de técnicas, métodos e substâncias que comportem risco para a vida, a qualidade de vida e o meio ambiente.' | DOUTRINA: 'Princípio 15, Declaração do Rio/1992: para proteger o meio ambiente, a abordagem precautória deve ser aplicada pelos Estados.'"},{"n":107,"enun":"A área de preservação permanente (APP) e a reserva legal são institutos equivalentes, podendo um substituir o outro para fins de cumprimento da legislação ambiental.","gab":"ERRADO","com":"Errado. APP e reserva legal são institutos distintos com funções diferentes. A APP protege áreas ecologicamente sensíveis (margens de rios, topos de morro). A reserva legal é percentual da propriedade rural destinado à conservação da vegetação nativa. São cumulativos, não alternativos.","fund":"LEI: 'Art. 3º, II, Lei 12.651/2012 (Código Florestal): APP é área protegida com a função ambiental de preservar recursos hídricos, paisagem, estabilidade geológica e biodiversidade.' | LEI: 'Art. 3º, III: Reserva Legal é área localizada no interior de uma propriedade com a função de assegurar o uso econômico sustentável dos recursos naturais.'"},{"n":108,"enun":"Os crimes ambientais previstos na Lei 9.605/1998 admitem a responsabilidade penal da pessoa jurídica, independentemente da responsabilização das pessoas físicas, conforme entendimento do Supremo Tribunal Federal.","gab":"CERTO","com":"Certo. O STF superou a tese da dupla imputação necessária: a pessoa jurídica pode ser responsabilizada criminalmente por dano ambiental mesmo sem identificação ou responsabilização da pessoa física. A CF (art. 225, §3º) autoriza sanções penais à PJ.","fund":"JURISPRUDÊNCIA: 'STF, RE 548.181/PR, Rel. Min. Rosa Weber, 1ª T., j. 06/08/2013: é possível a condenação penal de pessoa jurídica por crimes ambientais, independentemente da responsabilização concomitante da pessoa física.' | LEI: 'Art. 3º, Lei 9.605/1998: As pessoas jurídicas serão responsabilizadas administrativa, civil e penalmente.'","jur_status":"OK"},{"n":109,"enun":"O Estudo de Impacto Ambiental (EIA) e o respectivo Relatório de Impacto ao Meio Ambiente (RIMA) são exigidos para toda e qualquer atividade que utilize recursos ambientais, sem exceção.","gab":"ERRADO","com":"Errado. O EIA/RIMA é exigido apenas para atividades potencialmente causadoras de significativa degradação ambiental (art. 225, §1º, IV, CF). Atividades de baixo impacto podem ser licenciadas com estudos simplificados ou dispensadas de EIA/RIMA.","fund":"LEI: 'Art. 225, § 1º, IV, CF: exigir, na forma da lei, para instalação de obra ou atividade potencialmente causadora de significativa degradação do meio ambiente, estudo prévio de impacto ambiental.' | DOUTRINA: 'O EIA/RIMA é exigido apenas para atividades com potencial de significativa degradação — não para qualquer atividade.'"}]},{"nome":"Direito Empresarial + Legislação Complementar","comando":"Acerca do direito empresarial e das sociedades, julgue os itens a seguir.","itens":[{"n":110,"enun":"O empresário individual que exerce atividade econômica organizada para a produção de bens ou serviços deve efetuar sua inscrição no Registro Público de Empresas Mercantis antes de iniciar suas atividades, conforme o art. 967 do Código Civil.","gab":"CERTO","com":"Certo. O art. 967 obriga o registro na Junta Comercial antes do início da atividade. O registro tem natureza declaratória da condição de empresário (não constitutiva — quem exerce sem registro é empresário irregular), mas é obrigatório.","fund":"LEI: 'Art. 967, CC: É obrigatória a inscrição do empresário no Registro Público de Empresas Mercantis da respectiva sede, antes do início de sua atividade.'"},{"n":111,"enun":"A sociedade limitada é regida supletivamente pelas normas da sociedade anônima quando assim previsto no contrato social, e pelas normas da sociedade simples nos demais casos, conforme o Código Civil.","gab":"CERTO","com":"Certo. O art. 1.053 do CC estabelece dupla regência supletiva para a LTDA: se o contrato social eleger, aplicam-se as regras da S/A (Lei 6.404/76); caso contrário, aplicam-se as da sociedade simples. É a escolha do 'manual de instruções' subsidiário.","fund":"LEI: 'Art. 1.053, CC: A sociedade limitada rege-se, nas omissões deste Capítulo, pelas normas da sociedade simples.' | LEI: 'Art. 1.053, parágrafo único: O contrato social poderá prever a regência supletiva da sociedade limitada pelas normas da sociedade anônima.'"},{"n":112,"enun":"A desconsideração da personalidade jurídica, prevista no art. 50 do Código Civil, pode ser aplicada pela mera demonstração de insolvência da sociedade.","gab":"ERRADO","com":"Errado. O art. 50 (com redação da Lei 13.874/2019) exige abuso da personalidade jurídica, caracterizado por desvio de finalidade ou confusão patrimonial. A mera insolvência não basta — é preciso que os sócios tenham usado a PJ de forma abusiva.","fund":"LEI: 'Art. 50, CC (redação da Lei 13.874/2019): Em caso de abuso da personalidade jurídica, caracterizado pelo desvio de finalidade ou pela confusão patrimonial, pode o juiz, a requerimento da parte, ou do Ministério Público quando lhe couber intervir no processo, desconsiderá-la para que os efeitos de certas e determinadas relações de obrigações sejam estendidos aos bens particulares de administradores ou de sócios da pessoa jurídica.'","peg":"CEBRASPE confunde insolvência com abuso — insolvência sozinha não autoriza desconsideração no CC."},{"n":113,"enun":"A falência do empresário implica a perda automática de todos os seus direitos civis e políticos, sendo impedido de exercer qualquer atividade empresarial após a decretação.","gab":"ERRADO","com":"Errado. A falência não implica perda de direitos civis e políticos. O falido fica inabilitado para exercer atividade empresarial (art. 102, Lei 11.101/2005) até sentença de extinção das obrigações, mas seus direitos civis e políticos permanecem intactos.","fund":"LEI: 'Art. 102, Lei 11.101/2005: O falido fica inabilitado para exercer qualquer atividade empresarial a partir da decretação da falência e até a sentença que extingue suas obrigações.' | DOUTRINA: 'A inabilitação é restrita à atividade empresarial — não se estende a direitos civis, políticos ou trabalhistas.'"},{"n":114,"enun":"O estabelecimento empresarial é o complexo de bens organizado para o exercício da empresa, abrangendo bens corpóreos e incorpóreos, como máquinas, mercadorias, marcas e patentes.","gab":"CERTO","com":"Certo. O estabelecimento é uma universalidade de fato: reúne todos os bens que o empresário organiza para sua atividade. Inclui tanto bens materiais (máquinas, estoque, imóvel) quanto imateriais (marca, ponto comercial, clientela, patentes).","fund":"LEI: 'Art. 1.142, CC: Considera-se estabelecimento todo complexo de bens organizado, para exercício da empresa, por empresário, ou por sociedade empresária.' | DOUTRINA: 'O estabelecimento é universalidade de fato, composta de bens corpóreos (móveis, utensílios) e incorpóreos (marca, título, patentes, ponto comercial).'"}]},{"nome":"Conhecimentos do DF / PDPM / Primeiros Socorros","comando":"No que se refere ao Distrito Federal, à segurança pública e aos primeiros socorros, julgue os itens a seguir.","itens":[{"n":115,"enun":"A Polícia Civil do Distrito Federal é organizada e mantida pela União, cabendo-lhe as funções de polícia judiciária e a apuração de infrações penais, exceto as militares, conforme o art. 21, XIV, da Constituição Federal.","gab":"CERTO","com":"Certo. A PCDF é peculiar: embora atue no DF, é organizada e mantida pela União (art. 21, XIV, CF). É uma das polícias civis que integra o sistema federal de organização, ao lado da PMDF e do CBMDF.","fund":"LEI: 'Art. 21, XIV, CF: Compete à União organizar e manter a polícia civil, a polícia penal, a polícia militar e o corpo de bombeiros militar do Distrito Federal, bem como prestar assistência financeira ao Distrito Federal para a execução de serviços públicos, por meio de fundo próprio.'"},{"n":116,"enun":"O Distrito Federal acumula as competências legislativas reservadas aos Estados e aos Municípios, conforme previsto no art. 32, § 1º, da Constituição Federal.","gab":"CERTO","com":"Certo. O DF tem natureza híbrida: não é estado nem município, mas acumula as competências de ambos. Pode legislar sobre matérias estaduais e municipais. Contudo, não pode subdividir-se em municípios (art. 32, caput, CF).","fund":"LEI: 'Art. 32, § 1º, CF: Ao Distrito Federal são atribuídas as competências legislativas reservadas aos Estados e Municípios.'"},{"n":117,"enun":"A segurança pública é dever do Estado, direito e responsabilidade de todos, exercida por meio das polícias federal, rodoviária federal, ferroviária federal, civis, militares, penais e corpos de bombeiros militares, conforme o art. 144 da CF.","gab":"CERTO","com":"Certo. O art. 144 é o fundamento constitucional da segurança pública: define os órgãos responsáveis e estabelece que a segurança é dever estatal mas responsabilidade compartilhada com toda a sociedade.","fund":"LEI: 'Art. 144, CF: A segurança pública, dever do Estado, direito e responsabilidade de todos, é exercida para a preservação da ordem pública e da incolumidade das pessoas e do patrimônio, através dos seguintes órgãos: I – polícia federal; II – polícia rodoviária federal; III – polícia ferroviária federal; IV – polícias civis; V – polícias militares e corpos de bombeiros militares; VI – polícias penais.'"},{"n":118,"enun":"Às polícias civis, dirigidas por delegados de polícia de carreira, incumbem, ressalvada a competência da União, as funções de polícia judiciária e a apuração de infrações penais, exceto as militares.","gab":"CERTO","com":"Certo. O art. 144, §4º, CF define as atribuições da Polícia Civil com precisão: polícia judiciária + investigação criminal. Dois limites: (1) ressalvada a competência da PF (crimes federais), e (2) exceto crimes militares (competência da Justiça Militar).","fund":"LEI: 'Art. 144, § 4º, CF: Às polícias civis, dirigidas por delegados de polícia de carreira, incumbem, ressalvada a competência da União, as funções de polícia judiciária e a apuração de infrações penais, exceto as militares.'"},{"n":119,"enun":"Em uma situação de parada cardiorrespiratória, o socorrista deve iniciar as compressões torácicas antes de realizar as ventilações de resgate, seguindo a sequência C-A-B (compressões, vias aéreas, respiração) preconizada pelas diretrizes atuais de ressuscitação.","gab":"CERTO","com":"Certo. A sequência C-A-B (Compressions-Airway-Breathing) substituiu a antiga A-B-C. A prioridade é manter o fluxo sanguíneo com compressões imediatas — cada segundo sem compressão reduz a chance de sobrevivência. Comprimir primeiro, ventilar depois.","fund":"DOUTRINA: 'American Heart Association, Diretrizes 2020: a sequência C-A-B é recomendada para adultos, crianças e lactentes, priorizando compressões torácicas de alta qualidade (100-120/min, profundidade de 5-6 cm em adultos).'"},{"n":120,"enun":"O uso de torniquete para controle de hemorragias em membros é contraindicado em todas as situações, devendo ser utilizada exclusivamente a compressão direta sobre o ferimento.","gab":"ERRADO","com":"Errado. O torniquete é indicado quando a compressão direta não consegue controlar hemorragia grave em extremidades. Em hemorragias catastróficas (membros com sangramento arterial), o torniquete pode salvar vidas. As diretrizes atuais recomendam seu uso quando necessário.","fund":"DOUTRINA: 'PHTLS (Prehospital Trauma Life Support): o torniquete é indicado para controle de hemorragias exsanguinantes em membros quando a compressão direta não é eficaz. Deve ser aplicado proximal ao ferimento, com anotação do horário de aplicação.'"}]}]};

const S = {

  respostas: {}, gabsShown: {}, globalGabShown: false,
  avaliacoes: {},   // { n: 'dom'|'dvd'|'lac'|'leit' }
  startedAt: null, totalMs: 0, timerInterval: null, timerBlur: null,
  finished: false, paused: false
};

/* ── TRAP WORDS ──────────────────────────────────────────── */
const TRAP_WORDS=[
  'tão somente','somente','apenas','unicamente','exclusivamente',
  'em qualquer hipótese','em nenhuma hipótese','em qualquer caso','em todo caso',
  'independentemente','independente de','mesmo que','ainda que',
  'obrigatoriamente','obrigatória','obrigatório','necessariamente',
  'imprescindível','indispensável','imediatamente','automaticamente',
  'de pleno direito','por si só','toda vez que','a qualquer tempo',
  'nunca','jamais','sempre','absolutamente','absoluta',
  'é vedado','são vedados','é proibido','são proibidos',
  'não pode','não podem','impossível','é impossível',
  'salvo','exceto','ressalvado','ressalvada',
  'expressamente','tacitamente'
].sort((a,b)=>b.length-a.length); // longer phrases first

function _escRx(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}
function highlightTraps(html){
  // html is already HTML-escaped plain text; safe to inject <mark>
  TRAP_WORDS.forEach(w=>{
    const re=new RegExp(`(?<![\\wÀ-ÿ])(${_escRx(w)})(?![\\wÀ-ÿ])`,'gi');
    html=html.replace(re,'<mark class="trap-word">$1</mark>');
  });
  return html;
}

/* ── AVALIAÇÃO labels ────────────────────────────────────── */
const AV_LABELS={
  dom:{cls:'dom',icon:'✓',txt:'Domínio total'},
  dvd:{cls:'dvd',icon:'🤔',txt:'Acertei com dúvida'},
  lac:{cls:'lac',icon:'📖',txt:'Lacuna conceitual'},
  leit:{cls:'leit',icon:'👁',txt:'Erro de leitura'}
};

const STORE_KEY = () => `pcdf-prova-${S.bloco?.meta?.id||'x'}-v2`;
const THEME_KEY  = 'pcdf-theme-v2';
const BLOCO_KEY  = 'pcdf-current-bloco';
const HIST_KEY   = 'pcdf-historico-v1';

/* ── REVISÃO STATE ───────────────────────────────────────── */
const REV = {
  mode: 'releitura',   // 'releitura' | 'retestar'
  filteredNs: [],      // question numbers in current review
  respostas: {},       // re-answers (separate from S.respostas)
  gabsShown: {},       // per-question gab shown in review
  globalGabShown: false,
  finished: false
};
const RPS = {          // picker selection state (volatile)
  filterType: null,    // 'erros'|'branco'|'lac'|'dvd'|'problematicos'|'disc'
  discNome: null,      // only for filterType='disc'
  mode: 'releitura'
};

function computeFilteredNs(type, disc){
  return S.flat.filter(x=>{
    const dm = !disc || x.discNome === disc;
    if(type==='erros')        return dm && S.respostas[x.n] && S.respostas[x.n]!==x.item.gab;
    if(type==='branco')       return dm && !S.respostas[x.n];
    if(type==='lac')          return dm && S.avaliacoes[x.n]==='lac';
    if(type==='dvd')          return dm && S.avaliacoes[x.n]==='dvd';
    if(type==='problematicos') return dm && (
      (S.respostas[x.n] && S.respostas[x.n]!==x.item.gab) ||
      !S.respostas[x.n] || S.avaliacoes[x.n]==='lac');
    if(type==='disc')         return x.discNome===disc;
    return false;
  }).map(x=>x.n);
}

/* ── HISTÓRICO ───────────────────────────────────────────── */
function buildBlocoSummary(){
  const tot=S.flat.length;
  let ok=0,er=0,blank=0;
  S.flat.forEach(x=>{
    const r=S.respostas[x.n];
    if(r===x.item.gab) ok++;
    else if(r) er++;
    else blank++;
  });
  const disc={};
  S.bloco.disciplinas.forEach(d=>{
    let dok=0,der=0;
    d.itens.forEach(it=>{const r=S.respostas[it.n];if(r===it.gab)dok++;else if(r)der++;});
    const short=d.nome.replace('Direito ','').replace(/ e Legislação .*/,'');
    disc[short]={ok:dok,er:der,tot:d.itens.length};
  });
  const avCnt={dom:0,dvd:0,lac:0,leit:0};
  Object.values(S.avaliacoes).forEach(v=>{if(v in avCnt)avCnt[v]++;});
  return {
    blocoId:S.bloco.meta.id, data:S.bloco.meta.data||S.bloco.meta.id,
    titulo:S.bloco.meta.titulo||'',
    totalQuestoes:tot, acertos:ok, erros:er, branco:blank,
    saldo:ok-er, pct:tot>0?Math.round(ok/tot*100):0,
    tempo:S.totalMs, disciplinas:disc, avaliacoes:avCnt,
    finishedAt:Date.now()
  };
}
/* ── SM-2 SPACED REPETITION ──────────────────────────────── */
function computeSRQuality(h){
  // Mapeia desempenho do bloco para quality SM-2 (0–5)
  const pct=h.pct;
  const av=h.avaliacoes||{};
  const avTotal=(av.dom||0)+(av.dvd||0)+(av.lac||0)+(av.leit||0);
  // Base a partir do aproveitamento
  let q;
  if(pct>=90) q=5;
  else if(pct>=80) q=4;
  else if(pct>=70) q=3;
  else if(pct>=55) q=2;
  else if(pct>=40) q=1;
  else q=0;
  // Ajuste pela autoavaliação: muitas lacunas penaliza, muito domínio bonifica
  if(avTotal>0){
    const lacRatio=(av.lac||0)/avTotal;
    const domRatio=(av.dom||0)/avTotal;
    if(lacRatio>0.4 && q>1) q--;
    if(domRatio>0.6 && q<5) q++;
  }
  return Math.max(0,Math.min(5,q));
}
function applySM2(sr,quality){
  // sr = {interval, repetitions, ef} ou null (primeira vez)
  let {interval=1,repetitions=0,ef=2.5}=sr||{};
  if(quality<3){
    // Abaixo do limiar: recomeça intervalo mas mantém EF (penaliza menos)
    repetitions=0; interval=1;
  } else {
    if(repetitions===0) interval=1;
    else if(repetitions===1) interval=6;
    else interval=Math.round(interval*ef);
    ef=ef+(0.1-(5-quality)*(0.08+(5-quality)*0.02));
    ef=Math.max(1.3,Math.round(ef*100)/100);
    repetitions++;
  }
  const next=new Date();
  next.setDate(next.getDate()+interval);
  return {interval,repetitions,ef,nextReview:next.toISOString().slice(0,10)};
}
function srBadgeHtml(sr){
  if(!sr||!sr.nextReview) return '';
  const today=new Date().toISOString().slice(0,10);
  const diff=(new Date(sr.nextReview)-new Date(today))/(1000*60*60*24);
  if(diff<=0)  return `<span class="sr-badge due">⟳ Revisar hoje</span>`;
  if(diff<=2)  return `<span class="sr-badge soon">⟳ ${Math.round(diff)}d</span>`;
  return `<span class="sr-badge ok">⟳ ${fmtDateShort(sr.nextReview)}</span>`;
}

function saveToHistory(){
  try{
    let hist=loadHistory();
    const s=buildBlocoSummary();
    const idx=hist.findIndex(h=>h.blocoId===s.blocoId);
    // Preserva SR anterior (acumula repetições)
    const prevSR=idx>=0?(hist[idx].sr||null):null;
    const quality=computeSRQuality(s);
    s.sr=applySM2(prevSR,quality);
    s.srQuality=quality; // guarda para debug
    if(idx>=0) hist[idx]=s; else hist.push(s);
    if(hist.length>90) hist=hist.slice(-90);
    localStorage.setItem(HIST_KEY,JSON.stringify(hist));
  }catch(e){}
}
function loadHistory(){
  try{const r=localStorage.getItem(HIST_KEY);return r?JSON.parse(r):[]}catch(e){return [];}
}
function buildBarChart(entries){
  if(!entries.length) return '';
  const W=520,H=108,padB=17,padT=13,inner=H-padB-padT;
  const n=entries.length;
  const bW=Math.max(7,Math.min(26,Math.floor((W-16)/n)-3));
  const gap=(W-bW*n)/(n+1);
  let s=`<svg viewBox="0 0 ${W} ${H}" width="100%" xmlns="http://www.w3.org/2000/svg">`;
  // gridlines
  [50,70,90].forEach(pct=>{
    const gy=padT+Math.round((1-pct/100)*inner);
    s+=`<line x1="0" y1="${gy}" x2="${W}" y2="${gy}" stroke="var(--bord)" stroke-width="1"/>`;
    s+=`<text x="2" y="${gy-2}" font-size="7.5" fill="var(--txt3)">${pct}%</text>`;
  });
  // ref line 70%
  const ry=padT+Math.round(.3*inner);
  s+=`<line x1="0" y1="${ry}" x2="${W}" y2="${ry}" stroke="var(--green)" stroke-dasharray="4,3" opacity=".45" stroke-width="1.2"/>`;
  // bars
  entries.forEach((e,i)=>{
    const bH=Math.max(2,Math.round((e.pct/100)*inner));
    const x=gap+i*(bW+gap), y=H-padB-bH;
    const col=e.pct>=70?'var(--green)':e.pct>=50?'var(--acc)':'var(--red)';
    s+=`<rect x="${x.toFixed(1)}" y="${y}" width="${bW}" height="${bH}" rx="3" fill="${col}" opacity=".82"/>`;
    if(bH>16){s+=`<text x="${(x+bW/2).toFixed(1)}" y="${y+bH-4}" text-anchor="middle" font-size="8" fill="rgba(255,255,255,.8)" font-weight="700">${e.pct}%</text>`;}
    else{s+=`<text x="${(x+bW/2).toFixed(1)}" y="${y-2}" text-anchor="middle" font-size="7.5" fill="${col}">${e.pct}%</text>`;}
    const dl=fmtDateShort(e.data).slice(0,5);
    s+=`<text x="${(x+bW/2).toFixed(1)}" y="${H-2}" text-anchor="middle" font-size="7" fill="var(--txt3)">${dl}</text>`;
  });
  s+='</svg>';
  return s;
}

/* ── DATE FORMAT ─────────────────────────────────────────── */
function fmtDateShort(iso){
  // "2026-06-05" → "05.06.26"
  if(!iso) return '';
  const p=iso.split('-');
  if(p.length<3) return iso;
  return `${p[2]}.${p[1]}.${p[0].slice(2)}`;
}

/* ── TIMER ───────────────────────────────────────────────── */
function fmtTime(ms){
  const s=Math.floor(ms/1000), m=Math.floor(s/60), h=Math.floor(m/60);
  if(h>0) return `${h}h ${(m%60).toString().padStart(2,'0')}m`;
  return `${m}:${(s%60).toString().padStart(2,'0')}`;
}
function startTimer(){
  if(S.timerInterval) return;
  S.startedAt=Date.now();
  S.timerInterval=setInterval(()=>{
    const elapsed=S.totalMs+(Date.now()-S.startedAt);
    const el=document.getElementById('hdr-timer-txt');
    if(el) el.textContent=fmtTime(elapsed);
    const bpel=document.getElementById('bp-time');
    if(bpel) bpel.textContent=fmtTime(elapsed);
  },1000);
}
function stopTimer(){
  if(S.timerInterval){clearInterval(S.timerInterval);S.timerInterval=null;}
  if(S.startedAt){S.totalMs+=Date.now()-S.startedAt;S.startedAt=null;}
}

function togglePause(){
  if(S.finished) return;
  S.paused=!S.paused;
  const btn=document.getElementById('btn-pause');
  const overlay=document.getElementById('pause-overlay');
  if(S.paused){
    // Pausa: para timers, bloqueia tela
    stopTimer();
    if(QT.tickInterval){clearInterval(QT.tickInterval);QT.tickInterval=null;}
    if(QT.observer){QT.observer.disconnect();QT.observer=null;}
    QT.visible.clear();
    overlay.classList.remove('hidden');
    btn.textContent='▶';
    btn.classList.add('paused');
    btn.title='Retomar';
  } else {
    // Retoma: esconde overlay, reinicia timers
    overlay.classList.add('hidden');
    btn.textContent='⏸';
    btn.classList.remove('paused');
    btn.title='Pausar';
    // Reinicia apenas se estiver na prova ou no foco
    const inProva=!document.getElementById('sec-prova').classList.contains('hidden');
    const inFoco=FOCO.active;
    if(inProva||inFoco){
      startTimer();
      if(!QT.tickInterval&&!FOCO.active){
        // re-inicia observer e tick na prova normal
        initQTimer();
      } else if(FOCO.active){
        // no foco apenas o tick
        QT.lastTickAt=Date.now();
        QT.tickInterval=setInterval(_qtTick,500);
      }
    }
  }
}

/* ── PROGRESS ─────────────────────────────────────────────── */
function updateProgress(){
  const tot=S.flat.length;
  let ok=0,er=0,ans=0;
  S.flat.forEach(x=>{
    const r=S.respostas[x.n];
    if(r===x.item.gab) ok++;
    else if(r) er++;
    if(r) ans++;
  });
  const pct=tot?Math.round(ans/tot*100):0;
  const blank=tot-ans;

  // Header
  document.getElementById('c-ok').textContent='✓ '+ok;
  document.getElementById('c-er').textContent='✗ '+er;
  document.getElementById('c-tot').textContent=ans+'/'+tot;
  document.getElementById('prog-fill').style.width=pct+'%';
  // Toolbar
  const tbans=document.getElementById('tb-ans');
  const tbblank=document.getElementById('tb-blank');
  if(tbans) tbans.textContent=ans;
  if(tbblank) tbblank.textContent=blank;
  // Bottom bar
  const bpok=document.getElementById('bp-ok');
  const bper=document.getElementById('bp-er');
  const bpcur=document.getElementById('bp-cur');
  const bptot=document.getElementById('bp-tot');
  const bbar=document.getElementById('bbar-fill');
  if(bpok) bpok.textContent=ok+' ✓';
  if(bper) bper.textContent=er+' ✗';
  if(bpcur) bpcur.textContent=ans;
  if(bptot) bptot.textContent=tot;
  if(bbar) bbar.style.width=pct+'%';
}

/* ── MODO FOCO ────────────────────────────────────────────── */
const FOCO={active:false, idx:0, currentN:null};

function enterFoco(startIdx){
  if(!S.bloco){showToast('Carregue um bloco primeiro');return;}
  if(S.finished){showToast('Bloco já encerrado — use a Revisão');return;}
  // Desconecta apenas o observer (para de acumular tempo via scroll),
  // mas mantém QT.tickInterval ativo para continuar contando tempo em Foco
  if(QT.observer){QT.observer.disconnect();QT.observer=null;}
  QT.visible.clear();
  if(!QT.tickInterval){QT.lastTickAt=Date.now();QT.tickInterval=setInterval(_qtTick,500);}
  FOCO.active=true;
  if(startIdx!==undefined){
    FOCO.idx=Math.max(0,Math.min(startIdx,S.flat.length-1));
  } else {
    // começa na primeira não respondida
    const first=S.flat.findIndex(x=>!S.respostas[x.n]);
    FOCO.idx=first>=0?first:0;
  }
  // oculta tudo, exibe foco
  document.getElementById('sec-prova').classList.add('hidden');
  document.getElementById('sec-placar').classList.add('hidden');
  document.getElementById('sec-historico').classList.add('hidden');
  document.getElementById('sec-revisao').classList.add('hidden');
  document.getElementById('sec-cover').innerHTML='';
  document.getElementById('fab').classList.add('hidden');
  document.getElementById('bot-bar').classList.add('hidden');
  document.getElementById('btn-gab-all').classList.add('hidden');
  document.getElementById('hdr-timer').classList.remove('hidden');
  document.getElementById('hdr-chips').style.display='flex';
  document.getElementById('sec-foco').classList.remove('hidden');
  renderFocoQ();
}

function exitFoco(){
  FOCO.active=false; FOCO.currentN=null;
  document.getElementById('sec-foco').classList.add('hidden');
  renderProva(); // reinicia QT via renderProva → initQTimer
}

function renderFocoQ(){
  const x=S.flat[FOCO.idx];
  if(!x) return;
  const it=x.item;
  FOCO.currentN=it.n;

  const total=S.flat.length;
  const answered=Object.keys(S.respostas).length;
  const pct=Math.round(answered/total*100);
  const discShort=x.discNome.replace('Direito ','').replace(/ e Legislação .*/,'');
  const isFirst=FOCO.idx===0;
  const isLast=FOCO.idx===total-1;
  const hasAns=!!S.respostas[it.n];

  const wrap=document.getElementById('foco-wrap');
  wrap.innerHTML=`
    <div class="foco-hdr">
      <button class="tb-btn" onclick="exitFoco()" title="Sair do Modo Foco (Esc)">✕ Sair</button>
      <span class="foco-qnum">Q.${it.n} · ${FOCO.idx+1}/${total}</span>
      <span class="foco-disc">${discShort}</span>
      <div class="foco-prog-wrap">
        <div class="foco-progress"><div class="foco-prog-fill" id="foco-pf" style="width:${pct}%"></div></div>
        <span class="foco-pct">${pct}%</span>
      </div>
    </div>
    <div class="foco-body">
      ${renderQBlock(it, x.discIdx)}
    </div>
    <div class="foco-nav">
      <button class="btn-ghost" onclick="focoPrev()" ${isFirst?'disabled':''} style="min-width:110px" title="← Seta esquerda">← Anterior</button>
      <div class="foco-nav-hint">
        <div>${answered}/${total} respondidas</div>
        <div style="color:var(--txt3)">${hasAns?'→ Enter para avançar':'C / E para responder'}</div>
      </div>
      <button class="btn-${hasAns?'primary':'ghost'}" onclick="focoNext()" ${isLast?'disabled':''} style="min-width:110px" title="→ Seta direita / Enter">
        ${isLast?'Última':'Próxima →'}
      </button>
    </div>`;

  document.getElementById('sec-foco').scrollTop=0;
  // QT: acumula tempo manualmente no tick
}

function focoNext(){
  if(FOCO.idx<S.flat.length-1){FOCO.idx++;renderFocoQ();}
  else showToast('Última questão do bloco');
}
function focoPrev(){
  if(FOCO.idx>0){FOCO.idx--;renderFocoQ();}
}

// Jump para questão específica (usado futuramente por quick-nav em foco)
function focoJumpTo(n){
  const idx=S.flat.findIndex(x=>x.n===n);
  if(idx>=0){FOCO.idx=idx;renderFocoQ();}
}

/* ── QUESTION TIMER ──────────────────────────────────────── */
const QT={
  times:{},         // {n: elapsedMs}
  visible:new Set(),
  lastTickAt:null,
  tickInterval:null,
  observer:null,
  WARN:60000,       // 60s → amber
  ALERT:90000,      // 90s → red + pulse
};

function initQTimer(){
  stopQTimer();
  QT.times={}; QT.visible=new Set(); QT.lastTickAt=Date.now();

  QT.observer=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      const n=parseInt(e.target.dataset.n);
      if(e.isIntersecting) QT.visible.add(n);
      else QT.visible.delete(n);
    });
  },{rootMargin:'-28% 0px -28% 0px',threshold:0});

  document.querySelectorAll('.q-block[data-n]').forEach(el=>QT.observer.observe(el));
  QT.tickInterval=setInterval(_qtTick,500);
}

function stopQTimer(){
  if(QT.tickInterval){clearInterval(QT.tickInterval);QT.tickInterval=null;}
  if(QT.observer){QT.observer.disconnect();QT.observer=null;}
  QT.visible.clear(); QT.lastTickAt=null;
  const pill=document.getElementById('qt-pill');
  if(pill) pill.classList.add('hidden');
}

function _qtTick(){
  const now=Date.now();
  const delta=QT.lastTickAt?now-QT.lastTickAt:0;
  QT.lastTickAt=now;

  let pillN=null, pillMs=0;
  let crossedAlert=false;
  QT.visible.forEach(n=>{
    if(!S.respostas[n]){
      const prevMs=QT.times[n]||0;
      QT.times[n]=prevMs+delta;
      if(QT.times[n]>pillMs){pillMs=QT.times[n];pillN=n;}
      // detecta cruzamento do limiar para atualizar quick nav
      if(prevMs<QT.ALERT && QT.times[n]>=QT.ALERT) crossedAlert=true;
    }
    _qtUpdateBadge(n);
  });
  _qtUpdatePill(pillN,pillMs);
  if(crossedAlert) renderQuickNav();

  // Modo Foco: acumula tempo para a questão visível manualmente
  if(FOCO.active && FOCO.currentN && !S.respostas[FOCO.currentN]){
    QT.times[FOCO.currentN]=(QT.times[FOCO.currentN]||0)+delta;
    _qtUpdateBadge(FOCO.currentN);
    // atualiza % no header do foco
    const pf=document.getElementById('foco-pf');
    if(pf){const t=S.flat.length;const a=Object.keys(S.respostas).length;pf.style.width=Math.round(a/t*100)+'%';}
    const fpct=document.querySelector('.foco-pct');
    if(fpct){const t=S.flat.length;const a=Object.keys(S.respostas).length;fpct.textContent=Math.round(a/t*100)+'%';}
  }
}

function _qtUpdateBadge(n){
  const el=document.getElementById(`qt-${n}`);
  if(!el) return;
  const ms=QT.times[n]||0;
  const answered=!!S.respostas[n];
  if(answered){
    el.className='qt-badge qt-done';
    el.textContent=ms>0?`⏱ ${_fmtQT(ms)}`:'⏱';
    return;
  }
  if(ms<1000){el.className='qt-badge qt-idle';el.textContent='⏱';return;}
  if(ms>=QT.ALERT){el.className='qt-badge qt-alert';el.textContent=`⏱ ${_fmtQT(ms)}`;}
  else if(ms>=QT.WARN){el.className='qt-badge qt-warn';el.textContent=`⏱ ${_fmtQT(ms)}`;}
  else{el.className='qt-badge qt-normal';el.textContent=`⏱ ${_fmtQT(ms)}`;}
}

function _qtUpdatePill(n,ms){
  const pill=document.getElementById('qt-pill');
  if(!pill) return;
  if(!n||ms<8000){pill.classList.add('hidden');return;}
  pill.classList.remove('hidden');
  const inner=pill.querySelector('.qt-active-pill');
  if(!inner) return;
  const cls='qt-active-pill'+(ms>=QT.ALERT?' qt-alert-p':ms>=QT.WARN?' qt-warn-p':'');
  inner.className=cls;
  const icon=ms>=QT.ALERT?'⚠️':ms>=QT.WARN?'⏳':'⏱';
  inner.innerHTML=`${icon} Q.${n} — <span style="font-variant-numeric:tabular-nums">${_fmtQT(ms)}</span>`;
}

function _fmtQT(ms){
  const s=Math.floor(ms/1000);
  return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
}
