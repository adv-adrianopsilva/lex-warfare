,"gab":"CERTO","com":"Causas de EXTINÇÃO do crédito tributário (art. 156 CTN, rol taxativo): pagamento; compensação; transação; remissão; prescrição e decadência; conversão do depósito em renda; pagamento antecipado e homologação do lançamento; consignação em pagamento (procedente); decisão administrativa irreformável; decisão judicial transitada em julgado; e dação em pagamento de bens imóveis na forma da lei. Diferentes da SUSPENSÃO (art. 151) e EXCLUSÃO (art. 175 — isenção e anistia).","fund":"LEI: Art. 156 do CTN: \"Extinguem o crédito tributário: I - o pagamento; II - a compensação; III - a transação; IV - remissão; V - a prescrição e a decadência; VI - a conversão de depósito em renda; VII - o pagamento antecipado e a homologação do lançamento nos termos do disposto no artigo 150 e seus §§ 1º e 4º; VIII - a consignação em pagamento, nos termos do disposto no § 2º do artigo 164; IX - a decisão administrativa irreformável, assim entendida a definitiva na órbita administrativa, que não mais possa ser objeto de ação anulatória; X - a decisão judicial passada em julgado; XI – a dação em pagamento em bens imóveis, na forma e condições estabelecidas em lei.\" "},{"n":100,"enun":"A isenção e a anistia são modalidades de exclusão do crédito tributário, sendo que a isenção dispensa o pagamento do tributo, e a anistia, das penalidades pecuniárias relativas a infrações cometidas anteriormente à lei que a concede.","gab":"CERTO","com":"Causas de EXCLUSÃO do crédito tributário (art. 175 CTN): apenas duas — isenção e anistia. ISENÇÃO: dispensa do pagamento do TRIBUTO devido (atinge a obrigação principal antes do lançamento). ANISTIA: dispensa das PENALIDADES PECUNIÁRIAS por infrações cometidas (multas) antes da vigência da lei que a concede. Ambas são causas LEGAIS (dependem de lei), não convencionais. Analogia: isenção = perdão antecipado do tributo; anistia = perdão retrospectivo da multa.","fund":"LEI: Art. 175 do CTN: \"Excluem o crédito tributário: I - a isenção; II - a anistia. Parágrafo único: A exclusão do crédito tributário não dispensa o cumprimento das obrigações acessórias dependentes da obrigação principal cujo crédito seja excluído, ou dela conseqüente.\"\n\nArt. 176 do CTN (isenção): \"A isenção, ainda quando prevista em contrato, é sempre decorrente de lei que especifique as condições e requisitos exigidos para a sua concessão (...).\"\n\nArt. 180 do CTN (anistia): \"A anistia abrange exclusivamente as infrações cometidas anteriormente à vigência da lei que a concede, não se aplicando: I - aos atos qualificados em lei como crimes ou contravenções e aos que, mesmo sem essa qualificação, sejam praticados com dolo, fraude ou simulação pelo sujeito passivo ou por terceiro em benefício daquele; II - salvo disposição em contrário, às infrações resultantes de conluio entre duas ou mais pessoas naturais ou jurídicas.\" "},{"n":101,"enun":"Configura crime contra a ordem tributária, na Lei nº 8.137/1990, suprimir ou reduzir tributo, ou contribuição social e qualquer acessório, mediante condutas como omitir informação ou prestar declaração falsa às autoridades fazendárias.","gab":"CERTO","com":"Lei 8.137/1990, art. 1º: tipifica crimes contra a ordem tributária. Constitui crime suprimir ou reduzir tributo (ou contribuição social e qualquer acessório) mediante condutas fraudulentas: (I) omitir informação ou prestar declaração falsa; (II) fraudar fiscalização; (III) falsificar nota fiscal ou documento equivalente; (IV) elaborar/distribuir documento falso; (V) negar/deixar de fornecer nota fiscal. Pena: reclusão de 2 a 5 anos e multa.","fund":"LEI: Art. 1º da Lei 8.137/1990: \"Constitui crime contra a ordem tributária suprimir ou reduzir tributo, ou contribuição social e qualquer acessório, mediante as seguintes condutas: I - omitir informação, ou prestar declaração falsa às autoridades fazendárias; II - fraudar a fiscalização tributária, inserindo elementos inexatos, ou omitindo operação de qualquer natureza, em documento ou livro exigido pela lei fiscal; III - falsificar ou alterar nota fiscal, fatura, duplicata, nota de venda, ou qualquer outro documento relativo à operação tributável; IV - elaborar, distribuir, fornecer, emitir ou utilizar documento que saiba ou deva saber falso ou inexato; V - negar ou deixar de fornecer, quando obrigatório, nota fiscal ou documento equivalente, relativa a venda de mercadoria ou prestação de serviço, efetivamente realizada, ou fornecê-la em desacordo com a legislação. Pena - reclusão de 2 (dois) a 5 (cinco) anos, e multa.\" "},{"n":102,"enun":"Não se tipifica crime material contra a ordem tributária, previsto no art. 1º, incisos I a IV, da Lei nº 8.137/1990, antes do lançamento definitivo do tributo.","gab":"CERTO","com":"Súmula Vinculante 24 do STF: 'Não se tipifica crime material contra a ordem tributária, previsto no art. 1º, incisos I a IV, da Lei 8.137/1990, antes do lançamento definitivo do tributo.' Razão: os crimes do art. 1º, I a IV são MATERIAIS — só se consumam com a supressão ou redução efetiva do tributo, o que pressupõe o lançamento definitivo (esgotamento da via administrativa). Antes disso, falta o resultado naturalístico. Analogia: é como não poder denunciar furto antes de saber se a coisa realmente sumiu.","fund":"LEI: Art. 1º da Lei 8.137/1990: (já transcrito na Q101)\n\nJURISPRUDÊNCIA: STF, Súmula Vinculante 24 (aprovada em 02/12/2009, DJe 11/12/2009): \"Não se tipifica crime material contra a ordem tributária, previsto no art. 1º, incisos I a IV, da Lei nº 8.137/90, antes do lançamento definitivo do tributo.\" ","peg":"SV 24 SÓ se aplica aos crimes MATERIAIS (art. 1º, I-IV). Os crimes formais (art. 2º) consumam-se independentemente do lançamento."},{"n":103,"enun":"A emenda constitucional que instituiu a Reforma Tributária do Consumo criou o imposto sobre bens e serviços (IBS) e a contribuição sobre bens e serviços (CBS), em substituição a tributos sobre o consumo, com transição prevista em lei complementar.","gab":"CERTO","com":"Reforma Tributária do Consumo (EC 132/2023): criou o IBS (Imposto sobre Bens e Serviços, estadual e municipal) e a CBS (Contribuição sobre Bens e Serviços, federal), em substituição a ICMS, ISS, IPI, PIS e Cofins (extinção gradual até 2032). Modelo de IVA dual (estados/DF/municípios + União). Não cumulativo amplo, com creditamento. Princípios: neutralidade, simplicidade, transparência. Em vigor: regulamentação por leis complementares (LC 214/2025).","fund":"LEI: Art. 156-A da CF/1988 (incluído pela EC 132/2023): \"Lei complementar instituirá imposto sobre bens e serviços de competência compartilhada entre Estados, Distrito Federal e Municípios.\"\n\nArt. 195, V, da CF/1988 (incluído pela EC 132/2023): \"Sobre bens e serviços, nos termos de lei complementar\" — base para a CBS.\n\nLC 214/2025 (Lei Complementar Geral da Reforma Tributária) — regulamenta a transição e operação do IBS e da CBS."},{"n":104,"enun":"A obrigação tributária principal surge com a ocorrência do fato gerador, tem por objeto o pagamento de tributo ou penalidade pecuniária e extingue-se juntamente com o crédito dela decorrente.","gab":"CERTO","com":"Art. 113, §1º CTN: obrigação tributária PRINCIPAL — surge com a ocorrência do fato gerador, tem por objeto o PAGAMENTO de tributo ou penalidade pecuniária. Extingue-se junto com o crédito decorrente (por uma das causas do art. 156 CTN). Diferente da OBRIGAÇÃO ACESSÓRIA (§2º): tem por objeto prestações positivas ou negativas previstas no interesse da fiscalização (declarações, livros). Acessória descumprida vira principal (multa).","fund":"LEI: Art. 113 do CTN: \"A obrigação tributária é principal ou acessória.\"\n\n§1º: \"A obrigação principal surge com a ocorrência do fato gerador, tem por objeto o pagamento de tributo ou penalidade pecuniária e extingue-se juntamente com o crédito dela decorrente.\"\n\n§2º: \"A obrigação acessória decorre da legislação tributária e tem por objeto as prestações, positivas ou negativas, nela previstas no interesse da arrecadação ou da fiscalização dos tributos.\"\n\n§3º: \"A obrigação acessória, pelo simples fato da sua inobservância, converte-se em obrigação principal relativamente à penalidade pecuniária.\" "}]},{"nome":"Direito Ambiental e Legislação Complementar","comando":"A respeito do SISNAMA, das infrações administrativas, da responsabilidade ambiental e das competências, julgue os itens.","itens":[{"n":105,"enun":"O Sistema Nacional do Meio Ambiente (SISNAMA), instituído pela Lei nº 6.938/1981, é composto pelo Conselho de Governo, pelo Conselho Nacional do Meio Ambiente (CONAMA), pelo Ministério do Meio Ambiente, pelo IBAMA, pelo ICMBio, pelos órgãos seccionais (entidades estaduais) e pelos órgãos locais (entidades municipais).","gab":"CERTO","com":"SISNAMA (Lei 6.938/1981, Política Nacional do Meio Ambiente): estrutura organizacional federativa para gestão ambiental. Composto por: Conselho de Governo (órgão superior); CONAMA (consultivo e deliberativo); Ministério do Meio Ambiente (central); IBAMA e ICMBio (executores federais); órgãos seccionais (estaduais) e locais (municipais). Analogia: pirâmide federativa de proteção ambiental — coordenação federal, execução compartilhada.","fund":"LEI: Art. 6º da Lei 6.938/1981: \"Os órgãos e entidades da União, dos Estados, do Distrito Federal, dos Territórios e dos Municípios, bem como as fundações instituídas pelo Poder Público, responsáveis pela proteção e melhoria da qualidade ambiental, constituirão o Sistema Nacional do Meio Ambiente - SISNAMA, assim estruturado: I - órgão superior: o Conselho de Governo (...); II - órgão consultivo e deliberativo: o Conselho Nacional do Meio Ambiente (CONAMA) (...); III - órgão central: a Secretaria do Meio Ambiente da Presidência da República (atualmente Ministério do Meio Ambiente); IV - órgãos executores: o Instituto Brasileiro do Meio Ambiente e dos Recursos Naturais Renováveis - IBAMA e o Instituto Chico Mendes de Conservação da Biodiversidade - Instituto Chico Mendes; V - Órgãos Seccionais: os órgãos ou entidades estaduais (...); VI - Órgãos Locais: os órgãos ou entidades municipais (...).\" "},{"n":106,"enun":"O Decreto nº 6.514/2008 regulamenta as infrações e sanções administrativas ao meio ambiente, prevendo sanções como advertência, multa simples, multa diária, apreensão de animais e produtos, embargo de obra ou atividade, demolição e suspensão de venda de produtos.","gab":"CERTO","com":"Decreto 6.514/2008: regulamenta as infrações e sanções administrativas ao meio ambiente (regulamento da Lei 9.605/1998). Sanções principais (art. 3º): advertência; multa simples; multa diária; apreensão de animais, produtos e subprodutos; suspensão de venda; embargo de obra ou atividade; demolição de obra; suspensão parcial ou total de atividade; restritivas de direito. Combinação possível conforme gravidade.","fund":"LEI: Art. 3º do Decreto 6.514/2008: \"As infrações administrativas são punidas com as seguintes sanções: I - advertência; II - multa simples; III - multa diária; IV - apreensão dos animais, produtos e subprodutos da fauna e flora e demais produtos e subprodutos objeto da infração, instrumentos, petrechos, equipamentos ou veículos de qualquer natureza utilizados na infração; V - destruição ou inutilização do produto; VI - suspensão de venda e fabricação do produto; VII - embargo de obra ou atividade e suas respectivas áreas; VIII - demolição de obra; IX - suspensão parcial ou total das atividades; X - restritiva de direitos.\" "},{"n":107,"enun":"A responsabilidade civil por dano ambiental é objetiva e fundada na teoria do risco integral, não se admitindo, em regra, excludentes como o caso fortuito ou a força maior.","gab":"CERTO","com":"Responsabilidade civil ambiental: OBJETIVA, fundada na teoria do RISCO INTEGRAL (não risco administrativo). Diferença crucial: o risco integral NÃO admite excludentes (caso fortuito, força maior, fato de terceiro). Basta nexo + dano. Decorre do art. 14, §1º, da Lei 6.938/1981 e do art. 225, §3º, CF. Política: máxima proteção do meio ambiente, preservação intergeracional. Analogia: quem polui paga, ponto. Não interessa se foi tempestade ou sabotagem — responde.","fund":"LEI: Art. 14, §1º, da Lei 6.938/1981: \"Sem obstar a aplicação das penalidades previstas neste artigo, é o poluidor obrigado, independentemente da existência de culpa, a indenizar ou reparar os danos causados ao meio ambiente e a terceiros, afetados por sua atividade.\"\n\nArt. 225, §3º, da CF/1988: \"As condutas e atividades consideradas lesivas ao meio ambiente sujeitarão os infratores, pessoas físicas ou jurídicas, a sanções penais e administrativas, independentemente da obrigação de reparar os danos causados.\"\n\nDOUTRINA e JURISPRUDÊNCIA: STJ pacificou pela teoria do RISCO INTEGRAL em matéria ambiental (REsp 1.374.284, recursos repetitivos, 6ª Turma) — não se admite excludentes como caso fortuito ou força maior em dano ambiental.","peg":"Atenção: na responsabilidade civil ambiental, a teoria é do RISCO INTEGRAL (não do risco administrativo geral do art. 37, §6º, CF). Não há excludentes."},{"n":108,"enun":"Compete à União, aos estados, ao Distrito Federal e aos municípios proteger o meio ambiente e combater a poluição em qualquer de suas formas, tratando-se de competência comum.","gab":"CERTO","com":"Competência COMUM em matéria ambiental (art. 23, VI e VII, CF): UNIÃO + ESTADOS + DF + MUNICÍPIOS. Todos têm o dever de proteger o meio ambiente, combater a poluição em qualquer forma e preservar flora/fauna. Trata-se de competência ADMINISTRATIVA (executar), em oposição à legislativa (que é CONCORRENTE — art. 24, VI, CF, entre União e Estados/DF — e municípios suplementam, art. 30, II). LC 140/2011 regula a cooperação entre os entes.","fund":"LEI: Art. 23, VI e VII, da CF/1988: \"É competência comum da União, dos Estados, do Distrito Federal e dos Municípios: (...) VI - proteger o meio ambiente e combater a poluição em qualquer de suas formas; VII - preservar as florestas, a fauna e a flora.\"\n\nArt. 24, VI, da CF/1988: \"Compete à União, aos Estados e ao Distrito Federal legislar concorrentemente sobre: (...) VI - florestas, caça, pesca, fauna, conservação da natureza, defesa do solo e dos recursos naturais, proteção do meio ambiente e controle da poluição.\"\n\nLei Complementar 140/2011: regula os incisos III, VI e VII do caput e do parágrafo único do art. 23 da CF — fixa normas para cooperação entre União, Estados, DF e Municípios.","peg":"Competência ADMINISTRATIVA (executar/proteger) = COMUM (art. 23). Competência LEGISLATIVA = CONCORRENTE (art. 24). Cuidado para não confundir."},{"n":109,"enun":"As condutas e atividades lesivas ao meio ambiente sujeitarão os infratores, pessoas físicas ou jurídicas, a sanções penais e administrativas, independentemente da obrigação de reparar os danos causados.","gab":"CERTO","com":"Tríplice responsabilização ambiental (art. 225, §3º, CF): condutas lesivas sujeitam o infrator a sanções PENAIS + ADMINISTRATIVAS + obrigação de REPARAR os danos (civil). As três esferas são INDEPENDENTES e CUMULATIVAS — uma não exclui a outra. Aplicação clássica: derrame de óleo gera (i) multa do IBAMA (administrativa), (ii) crime ambiental (penal), (iii) ação de reparação (civil). Pessoa jurídica pode ser ré em todas as três (Lei 9.605/1998 — responsabilidade penal da PJ ambiental).","fund":"LEI: Art. 225, §3º, da CF/1988: \"As condutas e atividades consideradas lesivas ao meio ambiente sujeitarão os infratores, pessoas físicas ou jurídicas, a sanções penais e administrativas, independentemente da obrigação de reparar os danos causados.\"\n\nArt. 3º da Lei 9.605/1998: \"As pessoas jurídicas serão responsabilizadas administrativa, civil e penalmente conforme o disposto nesta Lei, nos casos em que a infração seja cometida por decisão de seu representante legal ou contratual, ou de seu órgão colegiado, no interesse ou benefício da sua entidade.\" "}]},{"nome":"Direito Empresarial e Legislação Complementar","comando":"Acerca das sociedades, da reorganização societária e da liberdade econômica, julgue os itens.","itens":[{"n":110,"enun":"A transformação é a operação pela qual a sociedade passa de uma espécie para outra, independentemente de dissolução e liquidação, observada a unanimidade dos sócios, salvo previsão diversa no contrato social.","gab":"CERTO","com":"Transformação (art. 220 LSA + art. 1.113 CC): mudança de tipo societário sem dissolução nem liquidação. Ex.: Ltda. vira S/A, ou vice-versa. Exige unanimidade dos sócios, salvo se o contrato/estatuto prever diversamente — neste caso, o sócio dissidente tem direito de retirada. Não afeta a continuidade da PJ — mesma personalidade jurídica, novo tipo. Analogia: é como trocar a 'forma' societária sem desfazer a 'matéria'.","fund":"LEI: Art. 1.113 do Código Civil: \"O ato de transformação independe de dissolução ou liquidação da sociedade, e obedecerá aos preceitos reguladores da constituição e inscrição próprios do tipo em que vai converter-se.\"\n\nArt. 1.114 do CC: \"A transformação depende do consentimento de todos os sócios, salvo se prevista no ato constitutivo, caso em que o dissidente poderá retirar-se da sociedade, aplicando-se, no silêncio do estatuto ou do contrato social, o disposto no art. 1.031.\"\n\nArt. 220 da Lei 6.404/1976 (S/A): \"A transformação é a operação pela qual a sociedade passa, independentemente de dissolução e liquidação, de um tipo para outro.\" "},{"n":111,"enun":"A incorporação é a operação pela qual uma ou várias sociedades são absorvidas por outra, que lhes sucede em todos os direitos e obrigações, deixando as incorporadas de existir como pessoas jurídicas.","gab":"CERTO","com":"Incorporação (art. 1.116 CC + art. 227 LSA): uma ou mais sociedades são ABSORVIDAS por outra (incorporadora), que lhes sucede em TODOS os direitos e obrigações. As incorporadas EXTINGUEM-SE como pessoas jurídicas; a incorporadora continua. Analogia: empresa grande 'engole' empresa pequena — esta deixa de existir como PJ, mas seus ativos e passivos passam para a grande.","fund":"LEI: Art. 1.116 do Código Civil: \"Na incorporação, uma ou várias sociedades são absorvidas por outra, que lhes sucede em todos os direitos e obrigações, devendo todas aprová-la, na forma estabelecida para os respectivos tipos.\"\n\nArt. 227 da Lei 6.404/1976: \"A incorporação é a operação pela qual uma ou mais sociedades são absorvidas por outra, que lhes sucede em todos os direitos e obrigações.\" "},{"n":112,"enun":"A fusão é a operação pela qual duas ou mais sociedades se unem para formar sociedade nova, que lhes sucederá em todos os direitos e obrigações.","gab":"CERTO","com":"Fusão (art. 1.119 CC + art. 228 LSA): duas ou mais sociedades se UNEM para formar uma NOVA, que lhes sucede em todos os direitos e obrigações. AS FUNDIDAS EXTINGUEM-SE; surge uma terceira entidade. Diferença com incorporação: na fusão, NENHUMA das originais sobrevive — todas formam uma nova. Na incorporação, a incorporadora sobrevive. Analogia: fusão é como casamento que cria uma terceira pessoa jurídica do zero.","fund":"LEI: Art. 1.119 do Código Civil: \"A fusão determina a extinção das sociedades que se unem, para formar sociedade nova, que a elas sucederá nos direitos e obrigações.\"\n\nArt. 228 da Lei 6.404/1976: \"A fusão é a operação pela qual se unem duas ou mais sociedades para formar sociedade nova, que lhes sucederá em todos os direitos e obrigações.\" ","peg":"FUSÃO: todas extinguem, surge uma NOVA. INCORPORAÇÃO: incorporadas extinguem, mas a incorporadora continua. Diferença essencial."},{"n":113,"enun":"A cisão é a operação pela qual a sociedade transfere parcelas do seu patrimônio para uma ou mais sociedades, constituídas para esse fim ou já existentes, podendo extinguir a sociedade cindida (cisão total) ou subsistir, caso transfira apenas parte (cisão parcial).","gab":"CERTO","com":"Cisão (art. 229 LSA): a sociedade transfere PARCELAS do seu patrimônio para uma ou mais sociedades, constituídas para esse fim ou já existentes. Pode ser TOTAL (extingue a cindida — todo patrimônio é vertido) ou PARCIAL (cindida sobrevive com patrimônio reduzido). Analogia: cisão é como dividir uma herança — parte do patrimônio segue para outros lugares.","fund":"LEI: Art. 229 da Lei 6.404/1976: \"A cisão é a operação pela qual a companhia transfere parcelas do seu patrimônio para uma ou mais sociedades, constituídas para esse fim ou já existentes, extinguindo-se a companhia cindida, se houver versão de todo o seu patrimônio, ou dividindo-se o seu capital, se parcial a versão.\" ","peg":"Cisão TOTAL: extingue a cindida (todo patrimônio sai). Cisão PARCIAL: cindida sobrevive com capital reduzido."},{"n":114,"enun":"A Lei nº 13.874/2019 (Lei de Liberdade Econômica) estabelece, entre seus princípios, a liberdade como garantia no exercício de atividades econômicas, a boa-fé do particular perante o poder público e a intervenção subsidiária e excepcional do Estado sobre o exercício de atividades econômicas.","gab":"CERTO","com":"Lei 13.874/2019 — Declaração de Direitos de Liberdade Econômica (DDLE): conjunto de princípios para garantir liberdade no exercício de atividades econômicas. Princípios principais (art. 2º): liberdade no exercício de atividades econômicas; boa-fé do particular perante o poder público; intervenção subsidiária e excepcional do Estado; reconhecimento da vulnerabilidade do particular perante o Estado. Trouxe mudanças importantes ao CC (desconsideração da PJ, fundo patrimonial), ao CLT e outras leis.","fund":"LEI: Art. 2º da Lei 13.874/2019: \"São princípios que norteiam o disposto nesta Lei: I - a liberdade como uma garantia no exercício de atividades econômicas; II - a boa-fé do particular perante o poder público; III - a intervenção subsidiária e excepcional do Estado sobre o exercício de atividades econômicas; e IV - o reconhecimento da vulnerabilidade do particular perante o Estado.\"\n\nArt. 3º: lista os direitos de liberdade econômica (exercício de atividade sem necessidade de atos públicos de liberação em hipóteses de baixo risco, presunção de boa-fé, atendimento de exigências em formato eletrônico etc.)."}]},{"nome":"Conhecimentos do Distrito Federal, Política para Mulheres e Primeiros Socorros","comando":"Acerca da realidade do DF e da RIDE, da política para mulheres e de noções de primeiros socorros, julgue os itens.","itens":[{"n":115,"enun":"O Distrito Federal apresenta acentuada desigualdade socioeconômica entre as regiões administrativas, com elevada concentração de renda no Plano Piloto em comparação com regiões periféricas, característica refletida em indicadores de IDH e renda per capita.","gab":"CERTO","com":"Distribuição socioeconômica do DF: forte desigualdade regional. Plano Piloto e Lago Sul/Norte concentram renda alta; já regiões administrativas periféricas (Ceilândia, Samambaia, Recanto das Emas, Estrutural, Sol Nascente) têm renda média muito inferior. Reflexo do desenho urbano original da capital e da migração para áreas periféricas. Análises do CODEPLAN/IBGE confirmam o quadro. Importante para o cargo de Delegado: políticas de segurança precisam levar em conta essa heterogeneidade.","fund":"DOUTRINA/DADOS: Estudos do CODEPLAN (Companhia de Planejamento do DF), IBGE e PNAD documentam o fenômeno. A Lei Orgânica do DF (1993) e o PDOT (Plano Diretor de Ordenamento Territorial) reconhecem a necessidade de redução das desigualdades intra-DF.\n\nArt. 269 da Lei Orgânica do DF: \"É objetivo da Política de Desenvolvimento Urbano a ordenação do pleno desenvolvimento das funções sociais do Distrito Federal e o uso socialmente justo e ecologicamente equilibrado de seu território, de forma a assegurar o bem-estar harmônico de seus habitantes.\" "},{"n":116,"enun":"A Região Integrada de Desenvolvimento do Distrito Federal e Entorno (RIDE) foi instituída por lei complementar federal e abrange, além do Distrito Federal, municípios dos estados de Goiás e de Minas Gerais.","gab":"CERTO","com":"RIDE-DF (Lei Complementar Federal 94/1998, ampliada por LC 163/2018): Região Integrada de Desenvolvimento, abrange DF + municípios de Goiás (a maioria) + 3 municípios de Minas Gerais (Buritis, Cabeceira Grande, Unaí). Objetivo: planejamento conjunto e execução de programas e projetos prioritários em saúde, educação, saneamento, transporte e segurança pública. Política de superação da metropolização sem incorporação territorial.","fund":"LEI: Lei Complementar 94/1998 (instituiu a RIDE-DF, com 19 municípios de GO e 3 de MG inicialmente).\n\nLei Complementar 163/2018 (ampliou a RIDE-DF para 33 municípios, totalizando 4,7 milhões de habitantes).\n\nArt. 1º da LC 94/1998: \"Fica autorizada a criação da Região Integrada de Desenvolvimento do Distrito Federal e Entorno - RIDE, constituída pelo Distrito Federal, pelos Municípios de Abadiânia, Água Fria de Goiás (...), todos do Estado de Goiás, e pelos Municípios de Buritis, Cabeceira Grande e Unaí, no Estado de Minas Gerais.\" "},{"n":117,"enun":"Diante de vítima com sangramento externo intenso, recomenda-se, como primeiro socorro, a aplicação de pressão direta e firme sobre o ferimento com pano limpo, mantendo-se a compressão até a chegada do socorro especializado.","gab":"CERTO","com":"Primeiros socorros — sangramento externo intenso: aplicar PRESSÃO DIRETA sobre o ferimento com pano limpo (preferencialmente esterilizado, mas pano limpo serve). Manter pressão FIRME e CONSTANTE até chegada do serviço médico, sem retirar o pano (mesmo se encharcar — colocar outro por cima). Elevar o membro se possível. Torniquete só em casos extremos (hemorragia que não para com pressão direta). NÃO usar substâncias caseiras (pó de café, etc.) — risco de infecção.","fund":"DOUTRINA/PROTOCOLOS: Diretrizes da Sociedade Brasileira de Cardiologia (Suporte Básico de Vida), Sociedade Americana do Coração (AHA), Cruz Vermelha Brasileira — protocolo de hemorragia externa: (i) pressão direta, (ii) elevação do membro afetado se possível, (iii) curativo compressivo, (iv) torniquete apenas em última instância para hemorragias arteriais profundas que não cedem.\n\nManual SAMU 192 — Atendimento Pré-Hospitalar (MS/CGUE)."},{"n":118,"enun":"Diante de vítima em convulsão, recomenda-se introduzir objeto entre os dentes da pessoa, de modo a impedir que ela morda a língua durante o episódio.","gab":"ERRADO","com":"ATENÇÃO: item ERRADO. Em casos de convulsão, NÃO se deve introduzir objeto algum entre os dentes — é mito perigoso que pode causar quebra de dentes, obstrução da via aérea ou lesão da boca. O correto é: (i) afastar objetos próximos para evitar lesões; (ii) virar a vítima de lado (posição lateral de segurança) para evitar aspiração de saliva; (iii) cronometrar a duração; (iv) chamar socorro se durar mais de 5 minutos ou se a pessoa não recobrar consciência. Analogia: tentar 'segurar a língua' durante a crise é como tentar consertar relógio enquanto está caindo — piora tudo.","fund":"DOUTRINA/PROTOCOLOS: Sociedade Brasileira de Neurologia, Liga Brasileira de Epilepsia, Manual SAMU — recomendações para convulsões:\n- NÃO introduzir nada na boca da vítima.\n- NÃO conter os movimentos involuntários.\n- Proteger a cabeça (apoiar com algo macio).\n- Afastar objetos próximos.\n- Virar para o lado se possível (posição lateral de segurança).\n- Cronometrar a duração da crise.\n- Chamar emergência se crise durar mais de 5 minutos (status epilepticus).","peg":"Item ERRADO: introduzir objeto na boca é MITO PERIGOSO. Conduta correta é proteger a cabeça e virar para o lado, sem conter os movimentos."},{"n":119,"enun":"O Plano Distrital de Políticas para as Mulheres organiza-se em eixos como o enfrentamento à violência contra a mulher, a autonomia econômica e a promoção da participação das mulheres nos espaços de poder e decisão.","gab":"CERTO","com":"Plano Distrital de Políticas para as Mulheres (PDPM): instrumento de política pública do DF voltado à promoção da igualdade de gênero e proteção das mulheres. Estrutura-se em eixos como: enfrentamento à violência (Lei Maria da Penha + Lei do Feminicídio); autonomia econômica (trabalho, renda, microcrédito); participação política e nos espaços de poder; saúde integral; educação para igualdade; cultura. Articulação com a rede de proteção (Casa da Mulher Brasileira, Centro de Referência da Mulher, DEAM).","fund":"LEI: Decreto Distrital nº 39.788/2019 (atualizado por decretos posteriores) — institui o Plano Distrital de Políticas para as Mulheres do DF.\n\nLei Maria da Penha (Lei 11.340/2006) e Lei do Feminicídio (Lei 13.104/2015) — base normativa federal.\n\nLei nº 6.325/2019 do DF (criação de mecanismos de proteção e enfrentamento à violência contra a mulher no DF)."},{"n":120,"enun":"Diante de vítima de intoxicação por ingestão de substância química, recomenda-se, em regra, induzir o vômito imediatamente para a eliminação do agente tóxico.","gab":"ERRADO","com":"ATENÇÃO: item ERRADO. Em intoxicação por ingestão de substância química, NÃO se deve induzir vômito sem orientação médica — pode AGRAVAR o quadro: (i) substâncias cáusticas (ácidos, álcalis) voltam a queimar a via aérea/esôfago; (ii) hidrocarbonetos (gasolina, querosene) podem ser aspirados causando pneumonia química; (iii) inconscientes/sonolentos podem aspirar o vômito. CONDUTA CORRETA: chamar 192 (SAMU) ou 0800 722 6001 (CIATox - Centro de Informação e Assistência Toxicológica) com a embalagem do produto em mãos. Não dar nada por boca sem orientação. Analogia: vômito induzido é como tentar tirar fogo com gasolina — piora o que era para resolver.","fund":"DOUTRINA/PROTOCOLOS: SBP (Sociedade Brasileira de Pediatria), CIATox/Anvisa, Manual SAMU — orientação em intoxicações por ingestão:\n- NÃO induzir vômito (risco de aspiração e agravamento por substâncias cáusticas ou hidrocarbonetos).\n- NÃO oferecer líquidos sem orientação (água, leite, vinagre não são antídotos universais).\n- Identificar a substância ingerida e ter a embalagem em mãos.\n- Ligar imediatamente para 192 (SAMU) ou 0800 722 6001 (CIATox).\n- Em caso de inconsciência, posição lateral de segurança.","peg":"Item ERRADO: induzir vômito é CONTRAINDICADO em intoxicação. Pode agravar (cáusticos voltam a queimar, hidrocarbonetos podem ser aspirados). Conduta correta: ligar para CIATox/SAMU."}]}]};

// ============================================================
// STATE
// ============================================================
const state = {
  bloco: null,
  flatItens: [],
  respostas: {},   // { n: 'CERTO' | 'ERRADO' }
  gabsShown: {},   // { n: true } — individual gabarito revelations
  globalGabShown: false, // all gabaritos revealed
  startedAt: null,
  totalMs: 0,      // accumulated active time
  timerInterval: null,
  finished: false,
};

const STORAGE_KEY = (id) => `pcdf-prova-${id}-v2`;
const THEME_KEY = 'pcdf-prova-theme';

// ============================================================
// UTILITIES
// ============================================================
const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => Array.from(document.querySelectorAll(sel));
const fmtTime = (s) => {
  if (s == null) return '–';
  const m = Math.floor(s / 60);
  const sec = s % 60;
  if (m >= 60) {
    const h = Math.floor(m / 60);
    const mm = m % 60;
    return `${h}h ${String(mm).padStart(2, '0')}m`;
  }
  return `${m}:${String(sec).padStart(2, '0')}`;
};
const showToast = (msg, dur = 2400) => {
  const t = $('#toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), dur);
};
const escapeHtml = (s) => String(s == null ? '' : s)
  .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
  .replace(/"/g, '&quot;');

// Highlight section labels (LEI:, JURISPRUDÊNCIA:, DOUTRINA:) that appear at start of paragraph
const formatFund = (text) => {
  const escaped = escapeHtml(text);
  // Match labels at the start of a line (LEI:, JURISPRUDÊNCIA:, DOUTRINA:, ANTES (...):)
  return escaped.replace(
    /(^|\n)(LEI|JURISPRUDÊNCIA|DOUTRINA|ANTES[^:]*)(:)/g,
    '$1<strong class="label">$2$3</strong>'
  );
};

// ============================================================
// BLOCO PROCESSING
// ============================================================
function flattenBloco(bloco) {
  const flat = [];
  bloco.disciplinas.forEach((disc, discIdx) => {
    disc.itens.forEach(item => {
      flat.push({ globalN: item.n, discIdx, discNome: disc.nome, comando: disc.comando, item });
    });
  });
  return flat;
}

function parseEnunciado(enun) {
  const m = enun.match(/^Situação hipotética:\s*([\s\S]+?)\s*Assertiva:\s*([\s\S]+)$/i);
  if (m) return { situacao: m[1].trim(), assertiva: m[2].trim() };
  return { situacao: null, assertiva: enun };
}

// ============================================================
// PERSISTENCE
// ============================================================
function save() {
  if (!state.bloco) return;
  const data = {
    blocoId: state.bloco.meta.id,
    respostas: state.respostas,
    gabsShown: state.gabsShown,
    globalGabShown: state.globalGabShown,
    totalMs: state.totalMs + (state.startedAt ? Date.now() - state.startedAt : 0),
    finished: state.finished,
  };
  try { localStorage.setItem(STORAGE_KEY(state.bloco.meta.id), JSON.stringify(data)); } catch(e) {}
}

function load(blocoId) {
  try {
    const raw = localStorage.getItem(STORAGE_KEY(blocoId));
    if (!raw) return null;
    return JSON.parse(raw);
  } catch(e) { return null; }
}

function clearSaved(blocoId) {
  try { localStorage.removeItem(STORAGE_KEY(blocoId)); } catch(e) {}
}

// ============================================================
// THEME
// ============================================================
function setTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  try { localStorage.setItem(THEME_KEY, t); } catch(e) {}
  updateThemeIcon();
}
function getTheme() {
  try { return localStorage.getItem(THEME_KEY) || 'auto'; } catch(e) { return 'auto'; }
}
function cycleTheme() {
  const cur = getTheme();
  const next = cur === 'auto' ? 'light' : (cur === 'light' ? 'dark' : 'auto');
  setTheme(next);
  showToast(`Tema: ${next === 'auto' ? 'automático' : (next === 'light' ? 'claro' : 'escuro')}`);
}
function updateThemeIcon() {
  const cur = getTheme();
  const ic = $('#iconTheme');
  if (cur === 'light') {
    ic.innerHTML = '<circle cx="12" cy="12" r="4" stroke-linecap="round" stroke-linejoin="round"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" stroke-linecap="round"/>';
  } else if (cur === 'dark') {
    ic.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z" stroke-linecap="round" stroke-linejoin="round"/>';
  } else {
    ic.innerHTML = '<circle cx="12" cy="12" r="9" stroke-linecap="round"/><path d="M12 3a9 9 0 0 0 0 18z" fill="currentColor"/>';
  }
}

// ============================================================
// COVER
// ============================================================
function renderCover() {
  const b = state.bloco;
  const saved = load(b.meta.id);
  const hasSaved = saved && Object.keys(saved.respostas || {}).length > 0;
  
  $('#cover').innerHTML = `
    <div class="cover-kicker">Concurso · CEBRASPE</div>
    <h1>${escapeHtml(b.meta.titulo)}</h1>
    <p class="lead">Caderno de prova com ${b.meta.totalQuestoes} itens de Certo/Errado para treino de Delegado da PCDF.</p>
    
    <div class="cover-card">
      <dl class="cover-grid">
        <dt>Concurso</dt><dd>${escapeHtml(b.meta.concurso)}</dd>
        <dt>Edital</dt><dd>${escapeHtml(b.meta.edital)}</dd>
        <dt>Data do bloco</dt><dd>${formatDate(b.meta.data)}</dd>
        <dt>Total</dt><dd>${b.meta.totalQuestoes} itens C/E em ${b.disciplinas.length} disciplinas</dd>
      </dl>
      <div class="cover-note">${escapeHtml(b.meta.observacao)}</div>
      ${hasSaved ? `
        <button class="btn-primary" onclick="resumeFromSaved()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Continuar de onde parei
        </button>
        <div class="cover-secondary">
          <button class="btn-ghost" onclick="confirmReset()">Recomeçar do zero</button>
        </div>
      ` : `
        <button class="btn-primary" onclick="startProva()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Começar prova
        </button>
      `}
    </div>
  `;
  $('#cover').classList.remove('hidden');
  $('#prova').classList.add('hidden');
  $('#placar').classList.add('hidden');
  $('#headerInfo').hidden = true;
  $('#fabNav').classList.add('hidden');
  $('#quickNav').classList.remove('open');
  stopTimer();
}
function formatDate(iso) {
  const d = new Date(iso + 'T12:00:00');
  return d.toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' });
}

// ============================================================
// PROVA — CADERNO DE PROVA
// ============================================================
function renderProva() {
  $('#cover').classList.add('hidden');
  $('#placar').classList.add('hidden');
  $('#prova').classList.remove('hidden');
  $('#headerInfo').hidden = false;
  $('#fabNav').classList.remove('hidden');
  
  let html = `
    <div class="prova-title">
      <div class="pt-bar">
        <span class="chevron"></span>
        <h2>Prova Objetiva</h2>
        <span class="chevron"></span>
      </div>
      <div class="sub">Conhecimentos Específicos · ${state.bloco.meta.totalQuestoes} itens · Certo / Errado</div>
    </div>
    <div class="prova-toolbar">
      <span class="tb-info">Respondidas <b id="tbAns">0</b>/<b>${state.flatItens.length}</b></span>
      <span class="tb-info">Pulando <b id="tbBlanks">${state.flatItens.length}</b></span>
      <span class="tb-spacer"></span>
      <button class="tb-btn" id="tbToggleGab">${state.globalGabShown ? 'Ocultar' : 'Mostrar'} todos os gabaritos</button>
      <button class="tb-btn primary" id="tbFinish">Finalizar prova
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
  `;
  
  // Render each discipline
  state.bloco.disciplinas.forEach((disc, discIdx) => {
    html += `
      <section class="disc-section" data-disc="${discIdx}">
        <div class="disc-header">
          <h3>${escapeHtml(disc.nome)}</h3>
        </div>
        <div class="comando">${escapeHtml(disc.comando)}</div>
    `;
    disc.itens.forEach(item => {
      html += renderQuestionBlock(item);
    });
    html += `</section>`;
  });
  
  $('#prova').innerHTML = html;
  
  // Wire toolbar
  $('#tbToggleGab').onclick = toggleAllGabaritos;
  $('#tbFinish').onclick = confirmFinish;
  
  updateProgress();
  startTimer();
  renderQuickNav();
}

function renderQuestionBlock(item) {
  const n = item.n;
  const ans = state.respostas[n];
  const showGab = state.gabsShown[n] || state.globalGabShown;
  const parsed = parseEnunciado(item.enun);
  
  let textHtml = '';
  if (parsed.situacao) {
    textHtml += `<span class="situacao">${escapeHtml(parsed.situacao)}</span>`;
    textHtml += `<span class="assertiva-prefix">Assertiva: </span>${escapeHtml(parsed.assertiva)}`;
  } else {
    textHtml += escapeHtml(parsed.assertiva);
  }
  
  const isC = ans === 'CERTO';
  const isE = ans === 'ERRADO';
  const correctMark = showGab && ans && ans === item.gab ? 'is-right' : '';
  const wrongMark = showGab && ans && ans !== item.gab ? 'is-wrong' : '';
  
  let cls = 'q-block';
  if (showGab) cls += ' show-gab';
  
  // feedback content
  let feedbackHtml = '';
  if (showGab) {
    const result = ans
      ? (ans === item.gab
         ? `<span class="gab-result ok">Acertou</span>`
         : `<span class="gab-result er">Errou</span>`)
      : `<span class="gab-result" style="background:var(--paper-mute);color:var(--ink-muted);">Em branco</span>`;
    
    feedbackHtml = `
      <div class="q-feedback">
        <div class="gab-line">
          <span class="gab-label">Gabarito</span>
          <span class="gab-value">${item.gab}</span>
          ${result}
        </div>
        <dl>
          <div>
            <dt>Comentário</dt>
            <dd>${escapeHtml(item.com)}</dd>
          </div>
          <div>
            <dt>Fundamento</dt>
            <dd>${formatFund(item.fund)}</dd>
          </div>
          ${item.peg ? `<div class="peg"><dt>Pegadinha</dt><dd>${escapeHtml(item.peg)}</dd></div>` : ''}
        </dl>
      </div>
    `;
  }
  
  // status inline
  let statusInline = '';
  if (ans && !showGab) {
    statusInline = `<span class="q-status-inline">marcado: <b>${ans}</b></span>`;
  } else if (!ans) {
    statusInline = `<span class="q-status-inline">em branco</span>`;
  }
  
  return `
    <div class="${cls}" id="q-${n}" data-n="${n}">
      <div class="q-line">
        <span class="q-tag">Questão ${n}</span>
        <div class="q-text">${textHtml}</div>
        <div class="q-marks">
          <button class="q-mark ${isC ? 'selected-c' : ''} ${isC ? (correctMark || wrongMark) : ''}" 
                  onclick="markAnswer(${n}, 'CERTO')" 
                  title="Certo">C</button>
          <button class="q-mark ${isE ? 'selected-e' : ''} ${isE ? (correctMark || wrongMark) : ''}" 
                  onclick="markAnswer(${n}, 'ERRADO')" 
                  title="Errado">E</button>
        </div>
      </div>
      <div class="q-actions-row">
        ${!showGab ? `<button class="q-show-gab" onclick="toggleGab(${n})">Ver gabarito</button>` : `<button class="q-show-gab" onclick="toggleGab(${n})">Ocultar gabarito</button>`}
        ${statusInline}
      </div>
      ${feedbackHtml}
    </div>
  `;
}

function markAnswer(n, choice) {
  // Toggle: clicking same answer again clears it
  if (state.respostas[n] === choice) {
    delete state.respostas[n];
  } else {
    state.respostas[n] = choice;
  }
  save();
  rerenderQuestion(n);
  updateProgress();
  updateQuickNavItem(n);
}

function toggleGab(n) {
  if (state.gabsShown[n]) {
    delete state.gabsShown[n];
  } else {
    state.gabsShown[n] = true;
  }
  save();
  rerenderQuestion(n);
  updateQuickNavItem(n);
}

function toggleAllGabaritos() {
  state.globalGabShown = !state.globalGabShown;
  save();
  $('#tbToggleGab').textContent = state.globalGabShown ? 'Ocultar todos os gabaritos' : 'Mostrar todos os gabaritos';
  // Re-render the entire prova section (preserve scroll)
  const scrollY = window.scrollY;
  renderProva();
  window.scrollTo(0, scrollY);
}

function rerenderQuestion(n) {
  const item = state.bloco.disciplinas
    .flatMap(d => d.itens)
    .find(it => it.n === n);
  if (!item) return;
  const el = $(`#q-${n}`);
  if (el) {
    el.outerHTML = renderQuestionBlock(item);
  }
}

function updateProgress() {
  const total = state.flatItens.length;
  const answered = Object.keys(state.respostas).length;
  $('#hAns').textContent = answered;
  $('#hTotal').textContent = total;
  const tbAns = $('#tbAns'); if (tbAns) tbAns.textContent = answered;
  const tbBlanks = $('#tbBlanks'); if (tbBlanks) tbBlanks.textContent = total - answered;
}

// ============================================================
// TIMER
// ============================================================
function startTimer() {
  stopTimer();
  state.startedAt = Date.now();
  state.timerInterval = setInterval(() => {
    const total = Math.floor((state.totalMs + (Date.now() - state.startedAt)) / 1000);
    $('#hTime').textContent = fmtTime(total);
  }, 1000);
}

function stopTimer() {
  if (state.timerInterval) {
    clearInterval(state.timerInterval);
    state.timerInterval = null;
  }
  if (state.startedAt) {
    state.totalMs += Date.now() - state.startedAt;
    state.startedAt = null;
  }
}

// ============================================================
// QUICK NAV (grid de questões)
// ============================================================
function renderQuickNav() {
  const nav = $('#quickNav');
  let html = `<div class="quick-nav-title">Pular para questão</div><div class="quick-nav-grid">`;
  state.flatItens.forEach(f => {
    const ans = state.respostas[f.globalN];
    const showGab = state.gabsShown[f.globalN] || state.globalGabShown;
    let cls = '';
    if (ans === 'CERTO') cls = 'answered-c';
    else if (ans === 'ERRADO') cls = 'answered-e';
    if (showGab) cls += ' gab-shown';
    html += `<button class="${cls}" onclick="jumpTo(${f.globalN})">${f.globalN}</button>`;
  });
  html += `</div>`;
  nav.innerHTML = html;
}

function updateQuickNavItem(n) {
  const nav = $('#quickNav');
  if (!nav) return;
  const btn = nav.querySelector(`button:nth-child(${n})`);
  // Easier: re-render
  renderQuickNav();
}

function jumpTo(n) {
  const el = $(`#q-${n}`);
  if (el) {
    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    $('#quickNav').classList.remove('open');
  }
}

// FAB toggle
function setupFab() {
  $('#fabNav').onclick = () => {
    $('#quickNav').classList.toggle('open');
  };
  document.addEventListener('click', (e) => {
    const nav = $('#quickNav');
    const fab = $('#fabNav');
    if (nav.classList.contains('open') && !nav.contains(e.target) && !fab.contains(e.target)) {
      nav.classList.remove('open');
    }
  });
}

// ============================================================
// FLOW
// ============================================================
function startProva() {
  state.respostas = {};
  state.gabsShown = {};
  state.globalGabShown = false;
  state.totalMs = 0;
  state.finished = false;
  save();
  renderProva();
}

function resumeFromSaved() {
  const saved = load(state.bloco.meta.id);
  if (!saved) { startProva(); return; }
  state.respostas = saved.respostas || {};
  state.gabsShown = saved.gabsShown || {};
  state.globalGabShown = saved.globalGabShown || false;
  state.totalMs = saved.totalMs || 0;
  state.finished = saved.finished || false;
  if (state.finished) {
    renderPlacar();
  } else {
    renderProva();
  }
}

function confirmFinish() {
  const answered = Object.keys(state.respostas).length;
  const total = state.flatItens.length;
  const blank = total - answered;
  
  if (blank === 0) {
    finishProva();
    return;
  }
  
  $('#modalRoot').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <h3>Finalizar com itens em branco?</h3>
        <p>Você ainda tem <b>${blank}</b> ${blank === 1 ? 'item em branco' : 'itens em branco'}. No critério CEBRASPE, itens em branco valem 0 pontos (não somam nem subtraem). Itens errados valem −1.</p>
        <div class="modal-actions">
          <button class="btn-ghost" onclick="closeModal()">Voltar para responder</button>
          <button class="btn-warn" onclick="closeModal(); finishProva();">Finalizar mesmo assim</button>
        </div>
      </div>
    </div>
  `;
}

function finishProva() {
  stopTimer();
  state.finished = true;
  state.globalGabShown = true; // reveal all when finished
  save();
  renderPlacar();
}

// ============================================================
// PLACAR
// ============================================================
function renderPlacar() {
  $('#cover').classList.add('hidden');
  $('#prova').classList.add('hidden');
  $('#placar').classList.remove('hidden');
  $('#headerInfo').hidden = false;
  $('#fabNav').classList.add('hidden');
  $('#quickNav').classList.remove('open');
  stopTimer();
  
  const total = state.flatItens.length;
  let acertos = 0, erros = 0, branco = 0;
  state.flatItens.forEach(f => {
    const ans = state.respostas[f.globalN];
    if (ans === undefined) branco++;
    else if (ans === f.item.gab) acertos++;
    else erros++;
  });
  
  const pctGeral = total ? Math.round((acertos / total) * 100) : 0;
  const saldoCebraspe = acertos - erros;
  const corte = 36;
  const aprovado = saldoCebraspe >= corte;
  const tempoTotalSec = Math.floor(state.totalMs / 1000);
  const tempoMedio = (acertos + erros) > 0 ? Math.round(tempoTotalSec / (acertos + erros)) : 0;
  
  const discStats = state.bloco.disciplinas.map((d, idx) => {
    const itens = state.flatItens.filter(f => f.discIdx === idx);
    let ok = 0, er = 0;
    itens.forEach(f => {
      const ans = state.respostas[f.globalN];
      if (ans !== undefined) {
        if (ans === f.item.gab) ok++; else er++;
      }
    });
    return { nome: d.nome, total: itens.length, ok, er };
  });
  
  const errados = state.flatItens
    .filter(f => state.respostas[f.globalN] !== undefined && state.respostas[f.globalN] !== f.item.gab)
    .map(f => ({
      n: f.globalN,
      disc: f.discNome,
      sub: f.item.fund.split(';')[0].split(',')[0].trim(),
    }));
  
  $('#placar').innerHTML = `
    <div class="placar">
      <div class="placar-hero">
        <div class="placar-kicker">Resultado da Prova</div>
        <h2>Placar Final</h2>
        <p class="placar-lead">${escapeHtml(state.bloco.meta.titulo)} · ${formatDate(state.bloco.meta.data)}</p>
        <div class="placar-stats">
          <div class="placar-stat"><div class="num correct">${acertos}</div><div class="lbl">Acertos</div></div>
          <div class="placar-stat"><div class="num wrong">${erros}</div><div class="lbl">Erros</div></div>
          <div class="placar-stat"><div class="num">${pctGeral}<small style="font-size:.5em">%</small></div><div class="lbl">Aproveitamento</div></div>
          <div class="placar-stat"><div class="num">${fmtTime(tempoTotalSec)}</div><div class="lbl">Tempo total</div></div>
        </div>
      </div>
      
      <div class="cebraspe-box">
        <div class="cebraspe-title">Nota no critério CEBRASPE</div>
        <div class="cebraspe-formula">
          <span class="part"><b>${acertos}</b> acertos × (+1)</span>
          <span class="part">−</span>
          <span class="part"><b>${erros}</b> erros × (−1)</span>
          <span class="part">+</span>
          <span class="part"><b>${branco}</b> branco × (0)</span>
          <span class="equals">= ${saldoCebraspe}</span>
        </div>
        <div class="cebraspe-verdict ${aprovado ? 'approved' : 'reproved'}">
          ${aprovado ? checkIcon() : xIcon()}
          ${aprovado
            ? `<span>Saldo <b>${saldoCebraspe}</b> ≥ corte de ${corte} pontos · simulação de aprovação</span>`
            : `<span>Saldo <b>${saldoCebraspe}</b> &lt; corte de ${corte} pontos · simulação de reprovação (faltam ${corte - saldoCebraspe})</span>`}
        </div>
        <p style="font-size:13px;color:var(--ink-muted);margin-top:12px;font-style:italic;">
          O corte de ${corte}/120 é referência pedagógica para concursos CEBRASPE. Tempo médio por questão respondida: <b>${fmtTime(tempoMedio)}</b>.
        </p>
      </div>
      
      <div class="disc-stats">
        <div class="disc-stats-title">Desempenho por disciplina</div>
        ${discStats.map(d => {
          const pct = d.total ? Math.round((d.ok / d.total) * 100) : 0;
          return `
            <div class="disc-row">
              <div class="nm">${escapeHtml(d.nome.replace(/^Direito /, '').replace(/ e Legislação.*$/, ''))}</div>
              <div class="bar"><i style="width:${pct}%"></i></div>
              <div class="frac">${d.ok}/${d.total}</div>
              <div class="pct">${pct}%</div>
            </div>
          `;
        }).join('')}
      </div>
      
      ${errados.length > 0 ? `
        <div class="errors-list">
          <h3>Questões erradas (${errados.length})</h3>
          <ul>
            ${errados.map(e => `
              <li>
                <span class="e-num">Q${e.n}</span>
                <span class="e-sub">${escapeHtml(e.sub)}<small>${escapeHtml(e.disc)}</small></span>
                <button class="e-go" onclick="goBackToProva(${e.n})">revisar →</button>
              </li>
            `).join('')}
          </ul>
        </div>
      ` : `
        <div class="errors-list">
          <h3>Resultado perfeito</h3>
          <p style="color:var(--ink-soft);">Nenhuma questão errada. Parabéns!</p>
        </div>
      `}
      
      <div style="display:flex;gap:10px;justify-content:center;margin-top:30px;flex-wrap:wrap;">
        <button class="btn-ghost" onclick="goBackToProva()">Voltar ao caderno (revisar tudo)</button>
        <button class="btn-ghost" onclick="confirmReset()">Reiniciar prova</button>
      </div>
    </div>
  `;
}

function goBackToProva(jumpToN) {
  state.finished = false;
  state.globalGabShown = true; // keep gabaritos visible in review
  save();
  renderProva();
  if (jumpToN) {
    setTimeout(() => jumpTo(jumpToN), 100);
  }
}

function checkIcon() {
  return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12l5 5L20 7" stroke-linecap="round" stroke-linejoin="round"/></svg>';
}
function xIcon() {
  return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 6l12 12M18 6L6 18" stroke-linecap="round"/></svg>';
}

// ============================================================
// IMPORT / EXPORT
// ============================================================
function exportProgress() {
  if (!state.bloco) return;
  const data = {
    type: 'progresso-v2',
    blocoId: state.bloco.meta.id,
    exportedAt: new Date().toISOString(),
    respostas: state.respostas,
    gabsShown: state.gabsShown,
    globalGabShown: state.globalGabShown,
    totalMs: state.totalMs + (state.startedAt ? Date.now() - state.startedAt : 0),
    finished: state.finished,
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `progresso_${state.bloco.meta.id}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('Progresso exportado');
}

function triggerImport(mode) {
  const input = $('#fileInput');
  input.dataset.mode = mode;
  input.value = '';
  input.click();
}

function handleFileImport(evt) {
  const file = evt.target.files[0];
  if (!file) return;
  const mode = evt.target.dataset.mode;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (mode === 'bloco') {
        if (!data.meta || !data.disciplinas) {
          showToast('Arquivo não parece ser um bloco válido'); return;
        }
        loadBloco(data);
        try { localStorage.setItem('pcdf-prova-current-bloco', JSON.stringify(data)); } catch(e) {}
        showToast(`Bloco "${data.meta.titulo}" carregado`);
        renderCover();
      } else if (mode === 'progresso') {
        if (!data.respostas) { showToast('Arquivo não parece ser de progresso'); return; }
        if (data.blocoId !== state.bloco.meta.id) {
          if (!confirm(`Este progresso é de outro bloco (${data.blocoId}). Importar mesmo assim?`)) return;
        }
        state.respostas = data.respostas || {};
        state.gabsShown = data.gabsShown || {};
        state.globalGabShown = data.globalGabShown || false;
        state.totalMs = data.totalMs || 0;
        state.finished = data.finished || false;
        save();
        showToast('Progresso importado');
        if (state.finished) renderPlacar();
        else renderProva();
      }
    } catch (err) {
      showToast('Erro ao ler o arquivo');
    }
  };
  reader.readAsText(file);
}

function loadBloco(bloco) {
  state.bloco = bloco;
  state.flatItens = flattenBloco(bloco);
  state.respostas = {};
  state.gabsShown = {};
  state.globalGabShown = false;
  state.totalMs = 0;
  state.finished = false;
}

// ============================================================
// RESET
// ============================================================
function confirmReset() {
  $('#modalRoot').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <h3>Reiniciar bloco?</h3>
        <p>Suas respostas atuais serão apagadas. Esta ação não pode ser desfeita.</p>
        <div class="modal-actions">
          <button class="btn-ghost" onclick="closeModal()">Cancelar</button>
          <button class="btn-danger" onclick="doReset()">Sim, reiniciar</button>
        </div>
      </div>
    </div>
  `;
}
function closeModal() { $('#modalRoot').innerHTML = ''; }
function doReset() {
  if (!state.bloco) return;
  clearSaved(state.bloco.meta.id);
  state.respostas = {};
  state.gabsShown = {};
  state.globalGabShown = false;
  state.totalMs = 0;
  state.finished = false;
  closeModal();
  showToast('Bloco reiniciado');
  renderCover();
}

// ============================================================
// INIT
// ============================================================
function init() {
  setTheme(getTheme());
  let bloco = DEFAULT_BLOCO;
  try {
    const stored = localStorage.getItem('pcdf-prova-current-bloco');
    if (stored) {
      const parsed = JSON.parse(stored);
      if (parsed.meta && parsed.disciplinas) bloco = parsed;
    }
  } catch(e) {}
  loadBloco(bloco);
  
  $('#btnTheme').onclick = cycleTheme;
  $('#btnImportBloco').onclick = () => triggerImport('bloco');
  $('#btnExport').onclick = exportProgress;
  $('#btnImportProg').onclick = () => triggerImport('progresso');
  $('#btnReset').onclick = confirmReset;
  $('#fileInput').addEventListener('change', handleFileImport);
  setupFab();
  
  const saved = load(state.bloco.meta.id);
  if (saved && Object.keys(saved.respostas || {}).length > 0) {
    state.respostas = saved.respostas || {};
    state.gabsShown = saved.gabsShown || {};
    state.globalGabShown = saved.globalGabShown || false;
    state.totalMs = saved.totalMs || 0;
    state.finished = saved.finished || false;
    renderCover();
  } else {
    renderCover();
  }
}

window.addEventListener('DOMContentLoaded', init);
window.addEventListener('beforeunload', () => { if (state.bloco) save(); });
window.addEventListener('blur', () => { if (state.startedAt && !state.finished) { stopTimer(); save(); } });
window.addEventListener('focus', () => { if (state.bloco && !state.finished && !$('#prova').classList.contains('hidden')) { startTimer(); } });
</script>
