nto, exige conexão com o exercício do mandato. A imunidade material é causa de exclusão da tipicidade — a conduta não é crime.","fund":"CF/88, art. 53: 'Os Deputados e Senadores são invioláveis, civil e penalmente, por quaisquer de suas opiniões, palavras e votos.' A imunidade é material (atipicidade) e segue o parlamentar no exercício do mandato."},{"n":55,"enun":"A cláusula de reserva de plenário (full bench) exige que a declaração de inconstitucionalidade de lei pelo tribunal seja feita pela maioria absoluta de seus membros, não podendo o órgão fracionário fazê-lo.","gab":"CERTO","com":"A cláusula do full bench (art. 97, CF) veda que turmas e câmaras declarem incidentalmente a inconstitucionalidade de lei. É exceção: quando o Pleno ou órgão especial do próprio tribunal já tiver se pronunciado, o fracionário pode aplicar sem nova deliberação (Súmula Vinculante 10 STF).","fund":"CF/88, art. 97: 'Somente pelo voto da maioria absoluta de seus membros ou dos membros do respectivo órgão especial poderão os tribunais declarar a inconstitucionalidade de lei ou ato normativo do Poder Público.' SV 10: viola full bench o fracionário afastar a lei sem remeter ao Pleno."},{"n":56,"enun":"O Conselho Nacional de Justiça (CNJ) exerce controle administrativo e disciplinar sobre o Poder Judiciário, podendo avocar processos disciplinares e rever decisões administrativas de tribunais, mas não controlar atos jurisdicionais.","gab":"CERTO","com":"O CNJ tem competência administrativa e disciplinar, não jurisdicional. Não revisa, reforma ou anula decisões judiciais. Sua atuação é limitada ao controle da regularidade administrativa e disciplinar dos órgãos e membros do Judiciário.","fund":"CF/88, art. 103-B, §4º. STF, ADI 3.367/DF (Peluso, Pleno, j. 13/04/2005): o CNJ é constitucional e exerce controle administrativo, jamais jurisdicional.","jur_status":"OK"},{"n":57,"enun":"A Constituição Federal veda, de forma absoluta, a pena de morte no Brasil.","gab":"ERRADO","com":"A CF veda a pena de morte, salvo em caso de guerra declarada (CF, art. 5º, XLVII, 'a'). Trata-se de exceção expressa ao núcleo duro do direito fundamental à vida. É cláusula pétrea a vedação em tempo de paz — mas a exceção de guerra declarada existe.","fund":"CF/88, art. 5º, XLVII: 'Não haverá penas: a) de morte, salvo em caso de guerra declarada, nos termos do art. 84, XIX.' A vedação absoluta é desmentida pela exceção constitucional expressa.","peg":"A vedação à pena de morte em tempo de paz é absoluta. Em guerra declarada, é possível. O item ao dizer 'de forma absoluta' erra."},{"n":58,"enun":"A anterioridade eleitoral, prevista na CF/88, impede a alteração de leis eleitorais no prazo de um ano antes das eleições, sendo aplicável tanto às leis que ampliam quanto às que restringem direitos eleitorais.","gab":"CERTO","com":"A anterioridade eleitoral (art. 16 CF) é norma de proteção ao processo democrático: nenhuma lei que altere o processo eleitoral pode ser aplicada à eleição que ocorra em menos de 1 ano de sua vigência. O STF já firmou que se aplica tanto à ampliação quanto à restrição de direitos.","fund":"CF/88, art. 16: 'A lei que alterar o processo eleitoral entrará em vigor na data de sua publicação, não se aplicando à eleição que ocorra até 1 (um) ano da data de sua vigência.' STF: norma de caráter pétrio implícito."},{"n":59,"enun":"A Constituição Federal estabelece que a criação de municípios depende de lei estadual, dentro do período determinado por lei complementar federal, e de consulta prévia, mediante plebiscito, às populações dos municípios envolvidos.","gab":"CERTO","com":"A CF, art. 18, §4º, fixa os requisitos para criação de municípios: (i) lei estadual; (ii) dentro do período estabelecido por lei complementar federal; (iii) divulgação de estudos de viabilidade; (iv) plebiscito com as populações dos municípios envolvidos.","fund":"CF/88, art. 18, §4º: 'A criação, a incorporação, a fusão e o desmembramento de municípios far-se-ão por lei estadual, dentro do período determinado por lei complementar federal, e dependerão de consulta prévia, mediante plebiscito, às populações dos municípios envolvidos, após divulgação dos estudos de viabilidade municipal.'"},{"n":60,"enun":"O habeas data é o remédio constitucional adequado para obter informações relativas a terceiros constantes de registros de entidades governamentais ou de caráter público.","gab":"ERRADO","com":"O habeas data assegura ao próprio impetrante o conhecimento de informações A SEU RESPEITO, não de terceiros. Para informações de interesse pessoal do próprio requerente. Para obter informações de terceiros, o remédio adequado é o mandado de segurança ou, em casos específicos, o direito de acesso à informação (Lei 12.527/2011).","fund":"CF/88, art. 5º, LXXII: 'Conceder-se-á habeas data: a) para assegurar o conhecimento de informações relativas à pessoa do impetrante, constantes de registros ou bancos de dados de entidades governamentais ou de caráter público...' — informações DA PRÓPRIA PESSOA."},{"n":61,"enun":"O princípio da proporcionalidade tem como subprincípios a adequação, a necessidade (menor restrição possível) e a proporcionalidade em sentido estrito (ponderação de valores), que devem ser verificados sequencialmente.","gab":"CERTO","com":"Os três subprincípios da proporcionalidade (desenvolvidos por Alexy a partir de jurisprudência alemã) são analisados em sequência: (1) adequação — o meio é apto a atingir o fim? (2) necessidade — é o meio menos restritivo possível? (3) proporcionalidade stricto sensu — os benefícios superam os custos?","fund":"Doutrina constitucional (Robert Alexy, Virgílio Afonso da Silva). STF: proporcionalidade aplicada amplamente no controle de constitucionalidade. Subprincípios: adequação, necessidade e proporcionalidade em sentido estrito."},{"n":62,"enun":"A ação popular pode ser proposta por qualquer cidadão brasileiro, inclusive pessoa jurídica, para anular ato lesivo ao patrimônio público ou à moralidade administrativa.","gab":"ERRADO","com":"Apenas CIDADÃOS (pessoas naturais no gozo de seus direitos políticos — portadores de título de eleitor) têm legitimidade para propor ação popular. Pessoa jurídica NUNCA tem legitimidade para a ação popular.","fund":"CF/88, art. 5º, LXXIII: 'Qualquer cidadão é parte legítima para propor ação popular...' Lei 4.717/1965, art. 1º, §3º: 'A prova da cidadania, para ingresso em juízo, será feita com o título eleitoral.' Pessoa jurídica = sem legitimidade.","peg":"CEBRASPE frequentemente inclui 'pessoa jurídica' como legitimada para ação popular — sempre ERRADO."},{"n":63,"enun":"A CF/88 admite a edição de medida provisória sobre matéria penal, desde que para beneficiar o réu ou o indiciado.","gab":"CERTO","com":"A MP é vedada em matéria penal gravosa (art. 62, §1º, I, 'b'). Porém, o STF (HC 76.659/SC) admite MP que beneficie o réu — por aplicação da proporcionalidade: a vedação existe para proteger o réu, não para prejudicá-lo. A norma mais favorável não encontra óbice constitucional.","fund":"CF/88, art. 62, §1º, I, 'b': veda MP sobre direito penal. STF, HC 76.659/SC: admite MP benéfica ao réu. Doutrina majoritária: a restrição é teleológica (proteger direitos) — MP favorável não viola o art. 62.","jur_status":"PENDENTE"},{"n":64,"enun":"O fenômeno da constitucionalização do direito privado implica que normas de Direito Civil, Processual e outros ramos passam a ser interpretadas à luz dos valores e princípios constitucionais.","gab":"CERTO","com":"A constitucionalização do direito (eficácia horizontal dos direitos fundamentais) impõe que todas as normas infraconstitucionais sejam interpretadas conforme a CF. Isso é especialmente relevante no Direito Civil: dignidade humana, solidariedade e função social permeiam contratos, família e propriedade.","fund":"CF/88, arts. 1º, III (dignidade) e 3º (objetivos). Doutrina: Paulo Lôbo, Gustavo Tepedino — a constitucionalização do direito civil. STF: ADPF 132 e ADI 4.277 (família homoafetiva) — valores constitucionais incidindo sobre o Direito de Família."}]},{"nome":"Direito Administrativo e Legislação Complementar","comando":"Acerca de Direito Administrativo, controle da administração pública e jurisprudência, julgue os itens a seguir.","itens":[{"n":65,"enun":"A responsabilidade civil extracontratual do Estado é objetiva, fundada na teoria do risco administrativo, respondendo o Estado pelos danos causados por seus agentes a terceiros, ainda que estes não sejam usuários do serviço.","gab":"CERTO","com":"O STF (RE 591.874/MS — Lewandowski, Pleno, j. 26/08/2009) firmou que a responsabilidade civil objetiva do Estado alcança terceiros não usuários do serviço (vítimas externas). Funda-se na teoria do risco administrativo (CF, art. 37, §6º).","fund":"CF/88, art. 37, §6º: 'As pessoas jurídicas de direito público e as de direito privado prestadoras de serviços públicos responderão pelos danos que seus agentes, nessa qualidade, causarem a terceiros...' STF, RE 591.874/MS (j. 26/08/2009): responsabilidade objetiva perante não usuários.","jur_status":"OK"},{"n":66,"enun":"Na teoria do risco administrativo, o Estado pode excluir ou atenuar sua responsabilidade mediante comprovação de culpa exclusiva ou concorrente da vítima, respectivamente.","gab":"CERTO","com":"O risco administrativo (não o risco integral) admite causas excludentes/atenuantes: culpa exclusiva da vítima exclui a responsabilidade; culpa concorrente a atenua. A teoria do risco integral (atividades nucleares, dano ambiental, terrorismo) não admite excludentes.","fund":"CF/88, art. 37, §6º. REsp 1.374.284 STJ: risco integral no dano ambiental. Doutrina: risco administrativo = regra para o Estado; risco integral = exceção para atividades especialmente perigosas."},{"n":67,"enun":"O princípio da autotutela administrativa permite que a administração pública anule seus próprios atos ilegais, independentemente de intervenção judicial.","gab":"CERTO","com":"A administração não precisa de autorização judicial para anular atos ilegais — pode fazê-lo de ofício, pelo poder de autotutela. Contudo, atos anuláveis (vícios sanáveis) podem ser convalidados. O prazo decadencial do art. 54 da Lei 9.784/99 limita a anulação de atos que geraram efeitos favoráveis.","fund":"Súmula 346 STF: 'A administração pública pode declarar a nulidade dos seus próprios atos.' Súmula 473 STF: 'A administração pode anular seus próprios atos quando eivados de vícios que os tornam ilegais, porque deles não se originam direitos; ou revogá-los, por motivo de conveniência ou oportunidade, respeitados os direitos adquiridos e ressalvada em todos os casos a apreciação judicial.'","jur_status":"PENDENTE"},{"n":68,"enun":"A improbidade administrativa, nos termos da Lei 8.429/1992 com as alterações da Lei 14.230/2021, passou a exigir a comprovação de dolo para todos os atos de improbidade, sendo vedada a modalidade culposa.","gab":"CERTO","com":"A Lei 14.230/2021 reformou a Lei de Improbidade e extinguiu a modalidade culposa, exigindo DOLO ESPECÍFICO para todos os atos de improbidade (arts. 9º, 10 e 11). A culpa, por si só, não configura mais improbidade — diferentemente do regime anterior (pré-2021).","fund":"Lei 8.429/1992, art. 1º, §1º (Lei 14.230/2021): 'Consideram-se atos de improbidade administrativa as condutas dolosas tipificadas nos arts. 9º, 10 e 11 desta Lei, ressalvados tipos previstos em leis especiais.' A modalidade culposa foi extinta.","peg":"Antes de 2021, o art. 10 previa improbidade por culpa (atos que causam dano ao erário). Após a Lei 14.230/2021, apenas dolo — mudança crítica para a prova."},{"n":69,"enun":"O prazo para a administração pública anular atos administrativos de que decorram efeitos favoráveis para os destinatários é de cinco anos, contados da data em que foram praticados, salvo comprovada má-fé.","gab":"CERTO","com":"A Lei 9.784/99 (art. 54) fixa prazo decadencial de 5 anos para a administração anular atos que geraram efeitos favoráveis. Se houver má-fé do beneficiário, esse prazo não se aplica e a anulação pode ocorrer a qualquer tempo.","fund":"Lei 9.784/1999, art. 54: 'O direito da Administração de anular os atos administrativos de que decorram efeitos favoráveis para os destinatários decai em 5 (cinco) anos, contados da data em que foram praticados, salvo comprovada má-fé.'"},{"n":70,"enun":"Os bens públicos dominicais, por não terem afetação específica, podem ser adquiridos por usucapião por particulares que os possuam mansa e pacificamente por longo período.","gab":"ERRADO","com":"Nenhum bem público (incluindo os dominicais) pode ser adquirido por usucapião. A Súmula 340 do STF é expressa: 'desde a vigência do Código Civil, os bens dominicais, como os demais bens públicos, não podem ser adquiridos por usucapião.' A CF/88, arts. 183, §3º e 191, §ún também vedam.","fund":"Súmula 340 STF: 'Desde a vigência do Código Civil, os bens dominicais, como os demais bens públicos, não podem ser adquiridos por usucapião.' CF/88, arts. 183, §3º e 191, §ún: vedação expressa a usucapião de imóveis públicos.","jur_status":"OK"},{"n":71,"enun":"A polícia judiciária, exercida pela Polícia Civil dos estados e pela Polícia Federal, está subordinada hierarquicamente ao Poder Judiciário durante o inquérito policial.","gab":"ERRADO","com":"A polícia judiciária está subordinada ao Poder Executivo (secretarias de segurança pública), não ao Judiciário. Durante o inquérito, o juiz exerce controle JUDICIAL (não hierárquico) sobre os atos que demandam autorização judicial (interceptação, prisão temporária, busca domiciliar).","fund":"CF/88, art. 144, §1º (Polícia Federal) e §4º (Polícias Civis): subordinação ao Executivo. O Judiciário exerce controle de legalidade, não hierarquia sobre a polícia judiciária."},{"n":72,"enun":"O servidor público estável somente perde o cargo nos casos de sentença judicial transitada em julgado, processo administrativo em que seja assegurada a ampla defesa, e avaliação periódica de desempenho, na forma da lei.","gab":"CERTO","com":"O art. 41, §1º da CF prevê exatamente três hipóteses de perda do cargo pelo estável: (i) sentença judicial transitada em julgado; (ii) processo administrativo com ampla defesa; (iii) insuficiência de desempenho avaliada periodicamente. A demissão por excesso de quadros (art. 169, §4º, CF) é caso especial.","fund":"CF/88, art. 41, §1º: 'O servidor público estável só perderá o cargo: I – em virtude de sentença judicial transitada em julgado; II – mediante processo administrativo em que lhe seja assegurada ampla defesa; III – mediante procedimento de avaliação periódica de desempenho...'"},{"n":73,"enun":"O poder de polícia administrativa difere do poder disciplinar porque este incide sobre a conduta do particular em geral, ao passo que aquele é exercido sobre os servidores e administrados com vínculo especial com a administração.","gab":"ERRADO","com":"É exatamente o contrário: o PODER DE POLÍCIA incide sobre a conduta do particular (administrado em geral, não vinculado por relação especial). O PODER DISCIPLINAR incide sobre servidores e pessoas com vínculo especial com a administração (concessionárias, permissionárias, etc.).","fund":"Doutrina: poder de polícia = restrição à liberdade e propriedade do particular em geral (Código Tributário, art. 78). Poder disciplinar = sanção de servidores e administrados com vínculo especial. O item inverteu os conceitos.","peg":"A inversão poder de polícia ↔ poder disciplinar é clássica na CEBRASPE. Memorize: disciplinar = servidores/vínculos especiais; polícia = particulares em geral."},{"n":74,"enun":"A licitação na modalidade pregão, destinada à aquisição de bens e serviços comuns, é obrigatória na forma eletrônica, admitida a forma presencial apenas em hipóteses excepcionais justificadas.","gab":"CERTO","com":"A Lei 14.133/2021 (Nova Lei de Licitações) consolidou o pregão eletrônico como regra para bens e serviços comuns. O pregão presencial é admitido excepcionalmente, desde que justificado e autorizado pela autoridade competente.","fund":"Lei 14.133/2021, art. 17, §2º: 'O pregão, na forma eletrônica, será a modalidade de licitação preferencial para a aquisição de bens e serviços comuns.' Lei 10.520/2002 (revogada gradualmente pela 14.133/21): fundamento original do pregão."},{"n":75,"enun":"O ato administrativo discricionário não está sujeito a controle pelo Poder Judiciário, que se limita a verificar a legalidade do ato e não pode adentrar no mérito administrativo.","gab":"ERRADO","com":"O Judiciário pode controlar o ato discricionário quando houver ilegalidade, abuso de poder ou desvio de finalidade — mesmo que no âmbito do mérito. A teoria dos motivos determinantes, os princípios da razoabilidade e proporcionalidade permitem ao Judiciário invalidar o ato discricionário ilegal ou desproporcional.","fund":"CF/88, art. 5º, XXXV: inafastabilidade da jurisdição. STF e STJ: o Judiciário não substitui a discricionariedade legítima, mas pode e deve controlar vícios de legalidade, razoabilidade, proporcionalidade, desvio de finalidade e abuso de poder."},{"n":76,"enun":"A concessão de serviço público transfere ao concessionário a titularidade do serviço, razão pela qual o Estado não responde solidariamente pelos danos causados pelo concessionário a terceiros.","gab":"ERRADO","com":"A concessão transfere apenas a EXECUÇÃO (não a titularidade) do serviço, que permanece com o Estado. O Estado tem responsabilidade subsidiária (não solidária) pelos danos causados pelos concessionários quando estes se tornarem insolventes e não puderem reparar o dano.","fund":"Lei 8.987/1995, art. 25: 'Incumbe à concessionária a execução do serviço concedido...' A titularidade permanece com o poder concedente. STF, RE 591.874/MS: responsabilidade objetiva do concessionário perante terceiros não usuários; Estado responde subsidiariamente.","jur_status":"OK"},{"n":77,"enun":"O processo administrativo disciplinar (PAD) é obrigatório para demissão de servidor público estável, assegurando-se o contraditório e a ampla defesa, sob pena de nulidade do ato demissório.","gab":"CERTO","com":"O PAD é garantia constitucional do servidor estável (CF, art. 41, §1º, II). Sem PAD regular — com contraditório e ampla defesa — a demissão é nula. O STF e o STJ já pacificaram que a nulidade é absoluta quando violados esses princípios.","fund":"CF/88, art. 41, §1º, II. Lei 8.112/1990, arts. 143 a 182 (PAD). STJ Súmula 591: 'É permitida a 'prova emprestada' no processo administrativo disciplinar, desde que devidamente autorizada pelo juízo competente e respeitados o contraditório e a ampla defesa.'"},{"n":78,"enun":"O princípio da supremacia do interesse público sobre o privado justifica que a administração restrinja direitos individuais sem qualquer compensação ao particular prejudicado.","gab":"ERRADO","com":"Mesmo quando o interesse público prevalece, o Estado tem o dever de indenizar o particular prejudicado, em razão do princípio da isonomia na distribuição dos encargos públicos (teoria da repartição igual dos ônus). A supremacia do interesse público autoriza a restrição, mas não a eliminação do direito à indenização.","fund":"CF/88, art. 5º, XXIV (desapropriação mediante justa e prévia indenização) e art. 37, §6º (responsabilidade objetiva). Doutrina: a limitação ao interesse público deve ser sempre indenizável quando causar dano especial ao administrado."},{"n":79,"enun":"O regime jurídico administrativo é caracterizado pela presença de prerrogativas e sujeições especiais da administração, que se justificam pela necessidade de realização do interesse público.","gab":"CERTO","com":"O regime jurídico-administrativo é marcado por dois vetores: prerrogativas (poderes especiais da administração — expropriar, aplicar sanções, contratar com cláusulas exorbitantes) e sujeições (restrições à atividade administrativa — legalidade, controle, transparência). Ambos derivam do interesse público.","fund":"Doutrina: Celso Antônio Bandeira de Mello. Os dois pilares do regime jurídico-administrativo: (1) supremacia do interesse público; (2) indisponibilidade do interesse público. Prerrogativas e sujeições decorrem desses princípios."},{"n":80,"enun":"A improbidade administrativa, nos termos do novo regime da Lei 14.230/2021, possui prazo prescricional de 8 anos para o ajuizamento da ação, contados da ocorrência do fato ou, se servidor, a partir da data de instauração do PAD.","gab":"CERTO","com":"A Lei 14.230/2021 fixou prazo prescricional de 8 anos (ação de improbidade) — unificando os prazos anteriores diferenciados. O prazo é contado da ocorrência do fato ou, no caso de servidores, da instauração do processo administrativo ou inquérito civil.","fund":"Lei 8.429/1992, art. 23 (Lei 14.230/2021): 'A ação para apurar ato de improbidade administrativa prescreve em 8 (oito) anos, contados do fato ou, no caso de infrações permanentes, do dia em que cessar a permanência.' Para servidores: prazo interrompido pela instauração do PAD.","peg":"Antes da Lei 14.230/2021, o prazo era variável (5 ou 10 anos). Após: 8 anos para todos os casos."}]},{"nome":"Medicina Legal","comando":"Acerca de medicina legal e ciências forenses, julgue os itens seguintes.","itens":[{"n":81,"enun":"O Protocolo de Istambul, adotado pelas Nações Unidas, estabelece que a avaliação de cada lesão isolada é o critério determinante para confirmar a prática de tortura, sendo necessário que cada lesão corresponda a uma forma específica de tortura.","gab":"ERRADO","com":"O Protocolo de Istambul adota avaliação holística: é a análise geral do conjunto de lesões e do relato que confirma ou não a tortura — não a correspondência individual de cada lesão com um método específico. A CEBRASPE já cobrou exatamente esse ponto.","fund":"Protocolo de Istambul (ONU, 1999): avaliação global das lesões físicas e psicológicas. Princípio da avaliação holística: a totalidade do quadro importa, não a correspondência lesão-por-lesão."},{"n":82,"enun":"O exame de corpo de delito em vítima de tortura, conforme a Resolução CNJ 414/2021, deve ser realizado antes da audiência de custódia quando houver sinais de possível tortura ou maus-tratos.","gab":"CERTO","com":"A Resolução CNJ 414/2021 determina que o preso com sinais de tortura ou maus-tratos seja submetido a exame de corpo de delito ANTES da audiência de custódia, garantindo que a prova pericial preceda a audiência.","fund":"Resolução CNJ 414/2021 — exame de corpo de delito em conformidade com o Protocolo de Istambul, obrigatório antes da audiência de custódia quando houver sinais de violência."},{"n":83,"enun":"A tanatologia forense estuda o fenômeno da morte e os fenômenos cadavéricos, sendo os livores cadavéricos (hipóstases) formados pela ação da gravidade e fixados definitivamente após 8 a 12 horas do óbito.","gab":"CERTO","com":"Os livores cadavéricos surgem nas 2-4h após a morte, tornam-se confluentes por volta de 6-8h e se fixam (não se movem mais com mudança de posição do cadáver) entre 8 e 12h após o óbito. São importantes para determinar a posição do corpo no momento da morte.","fund":"Medicina Legal — tanatologia: livores cadavéricos = fenômeno abiótico transformativo mediato. Fixação em 8-12h. Desvio de livores indica movimentação do cadáver antes da fixação."},{"n":84,"enun":"Na sexologia forense, o exame pericial do hímen é imprescindível para caracterizar a prática de conjunção carnal ou outro ato libidinoso, sendo sua integridade incompatível com a prática de atos sexuais.","gab":"ERRADO","com":"O exame pericial de hímen NÃO é imprescindível para o estupro — o crime se consuma independentemente de lesão himeneal. Além disso, o hímen complacente permite a conjunção carnal sem ruptura. A ausência de lesão não exclui a violência sexual.","fund":"CP, art. 213: estupro = constranger alguém mediante violência ou grave ameaça, não limitado à penetração vaginal. Medicina legal: hímen complacente; ausência de lesão não afasta o crime. STJ Súmula 593: estupro de vulnerável — consentimento irrelevante."},{"n":85,"enun":"As lesões por arma de fogo de curta distância (até 50 cm) apresentam zona de tatuagem formada por grãos de pólvora não queimados incrustados na pele, que não pode ser removida por lavagem.","gab":"CERTO","com":"A zona de tatuagem (grãos de pólvora sólida incrustados na pele) é característica do disparo a curta distância. Por estar incrustada, não se remove por lavagem — diferencia-se da zona de esfumaçamento (fuligem depositada superficialmente, removível por lavagem).","fund":"Medicina Legal — traumatologia: zona de tatuagem = grãos de pólvora sólida. Zona de esfumaçamento = fuligem removível. Zona de queimadura = chama/calor. Orifício de entrada com bordas invertidas. Distância: curta (tatuagem), média (esfumaçamento), longa (sem marcas)."},{"n":86,"enun":"A psicopatologia forense analisa os transtornos mentais com relevância para o direito penal, sendo a inimputabilidade absoluta do doente mental estabelecida pelo critério biológico puro adotado no Código Penal brasileiro.","gab":"ERRADO","com":"O CP adotou o critério BIOPSICOLÓGICO (ou misto): exige tanto a doença mental (biológico) quanto que ela cause a incapacidade de entender o caráter ilícito do fato ou de determinar-se segundo esse entendimento (psicológico). O critério biológico puro não é adotado.","fund":"CP, art. 26: 'É isento de pena o agente que, por doença mental ou desenvolvimento mental incompleto ou retardado, era, ao tempo da ação ou da omissão, inteiramente incapaz de entender o caráter ilícito do fato ou de determinar-se de acordo com esse entendimento.' Critério biopsicológico."},{"n":87,"enun":"O laudo toxicológico é obrigatório nos processos por tráfico de drogas, podendo sua ausência ensejar a absolvição do réu quando não houver outros meios de prova sobre a natureza da substância.","gab":"CERTO","com":"O STF e o STJ consolidaram que o laudo pericial é prova técnica obrigatória para comprovar a natureza e quantidade da substância entorpecente nos crimes da Lei 11.343/2006. A ausência do laudo definitivo — não suprida por outros meios — compromete a prova da materialidade.","fund":"Lei 11.343/2006, art. 50, §1º: 'Para efeito da lavratura do auto de prisão em flagrante e estabelecimento da materialidade do delito, é suficiente o laudo de constatação da natureza e quantidade da droga, firmado por perito oficial ou, na falta deste, por pessoa idônea.' Mas o laudo definitivo é imprescindível para a condenação."},{"n":88,"enun":"O fenômeno da adipocera, que ocorre em cadáveres expostos a ambiente úmido por longo período, consiste na saponificação (transformação em substância gordurosa) dos tecidos, conservando o corpo por tempo indeterminado.","gab":"CERTO","com":"A adipocera é fenômeno conservador do cadáver: em ambiente úmido e quente, as gorduras corporais se transformam em ácidos graxos (saponificação), criando uma substância esbranquiçada que preserva a forma externa do corpo por longo período.","fund":"Medicina Legal — fenômenos cadavéricos conservadores: mumificação (ambiente seco/quente), saponificação/adipocera (ambiente úmido/quente), petrificação (corpos em minerais), congelamento (criomificação)."},{"n":89,"enun":"As equimoses são lesões hemorrágicas superficiais que surgem imediatamente após o trauma, permitindo sua datação precisa com base na coloração da lesão.","gab":"ERRADO","com":"As equimoses NÃO surgem imediatamente — levam horas para aparecer externamente. Além disso, a datação por coloração é IMPRECISA, variando conforme a localização, profundidade e condições do indivíduo. A cronologia das cores (vermelha → violácea → verde → amarelada) é apenas aproximativa.","fund":"Medicina Legal: equimose = extravasamento de sangue no tecido subcutâneo. Evolução cromática aproximada: início (vermelha/azul) → dias 2-3 (violeta/verde) → dias 5-7 (amarelo/esverdeado). Não permite datação precisa."},{"n":90,"enun":"Na asfixia por afogamento, o corpo da vítima pode apresentar cogumelo de espuma na boca e nariz, resultante da mistura de ar, água e muco das vias respiratórias.","gab":"CERTO","com":"O 'cogumelo de espuma' (espuma branca e aderente na boca/nariz) é sinal clássico de afogamento, resultante da agitação da água com o muco bronquial e o ar residual. É sinal de reação vital — indica que a vítima estava viva ao entrar em contato com a água.","fund":"Medicina Legal — asfixiologia: afogamento. Sinais externos: cogumelo de espuma, maceração da pele (mãos em luvas), cianose periférica. Sinais internos: enfisema aquoso, bolha de Brisseau, diatomáceas nos pulmões e órgãos."}]},{"nome":"Direito Civil e Legislação Complementar","comando":"Acerca de Direito Civil, julgue os itens a seguir.","itens":[{"n":91,"enun":"Os direitos da personalidade são intransmissíveis e irrenunciáveis, não podendo o seu exercício sofrer qualquer limitação voluntária pelo titular, conforme dispõe o art. 11 do Código Civil.","gab":"ERRADO","com":"Embora o art. 11 do CC preveja a intransmissibilidade e irrenunciabilidade, as Jornadas de Direito Civil (CJF, Enunciado 4) flexibilizaram: o exercício dos direitos da personalidade pode sofrer limitação voluntária, desde que não seja permanente nem geral. Contrato de uso de imagem por prazo determinado é válido.","fund":"CC/2002, art. 11. CJF, Enunciado 4: 'O exercício dos direitos da personalidade pode sofrer limitação voluntária, desde que não seja permanente nem geral.' Limitação temporária e específica = válida; renúncia total e permanente = vedada."},{"n":92,"enun":"A publicação não autorizada de imagem de pessoa com fins comerciais ou econômicos gera dano moral presumido (in re ipsa), dispensando comprovação de prejuízo concreto.","gab":"CERTO","com":"O STJ consolidou que a utilização indevida da imagem para fins econômicos ou comerciais gera dano in re ipsa — o dano é inerente à própria violação, não precisando ser demonstrado. (STJ, Jurisprudência em Teses, Edição 137).","fund":"CC/2002, art. 20. STJ, Súmula 403: 'Independe de prova do prejuízo a indenização pela publicação não autorizada de imagem de pessoa com fins econômicos ou comerciais.' (j. 28/10/2009)."},{"n":93,"enun":"A pretensão de reconhecimento de ofensa a direito da personalidade sujeita-se ao prazo prescricional geral de 10 anos, nos termos do art. 205 do Código Civil.","gab":"ERRADO","com":"O STJ firmou que a pretensão de reconhecimento de ofensa a direito da personalidade é IMPRESCRITÍVEL. Não se aplica o prazo geral de 10 anos do art. 205 do CC. (STJ, Jurisprudência em Teses, Edição 137).","fund":"STJ, Jurisprudência em Teses, Edição 137: 'É imprescritível a pretensão de reconhecimento de ofensa a direito da personalidade.' A pretensão indenizatória pode ter prazo diferenciado, mas o mero reconhecimento é imprescritível."},{"n":94,"enun":"A tutela inibitória prevista no art. 12 do Código Civil permite que se impeça a ameaça de lesão a direito da personalidade ainda não consumada, sem necessidade de se aguardar a efetivação do dano.","gab":"CERTO","com":"A tutela inibitória é preventiva: atua antes do dano se consumar. O art. 12 do CC prevê expressamente que quem sofrer ameaça de violação a direito da personalidade pode requerer que se faça cessar a ameaça — sem esperar o prejuízo.","fund":"CC/2002, art. 12: 'Pode-se exigir que cesse a ameaça, ou a lesão, a direito da personalidade, e reclamar perdas e danos, sem prejuízo de outras sanções previstas em lei.'"},{"n":95,"enun":"A pessoa jurídica não possui direitos da personalidade, pois estes são exclusivos das pessoas naturais, titulares de capacidade de fato e direito.","gab":"ERRADO","com":"O STJ e as Jornadas CJF reconhecem que a pessoa jurídica pode titularizar direitos da personalidade compatíveis com sua natureza, como honra objetiva (reputação), nome e imagem. (CJF, Enunciado 5: 'A tutela dos direitos da personalidade é admitida também às pessoas jurídicas.')","fund":"CC/2002, art. 52: 'Aplica-se às pessoas jurídicas, no que couber, a proteção dos direitos da personalidade.' CJF, Enunciado 5: admissibilidade da tutela para PJ."},{"n":96,"enun":"O nome civil é imutável por princípio, sendo vedada a sua alteração, inclusive nos casos de exposição ao ridículo ou de erros evidentes de grafia.","gab":"ERRADO","com":"O nome é imutável como REGRA, mas admite exceções legais expressas: erros de grafia, exposição ao ridículo, adoção, reconhecimento de paternidade/maternidade, casamento/divórcio, entre outras. A imutabilidade é relativa, não absoluta.","fund":"Lei 6.015/1973 (Lei de Registros Públicos), arts. 55, §ún (exposição ao ridículo) e 110 (erros de grafia). CC/2002, art. 16. STJ, Edição 138 da Jurisprudência em Teses: hipóteses de alteração do nome civil."},{"n":97,"enun":"A remoção de conteúdo de natureza ofensiva ao direito da personalidade de página da internet depende de indicação da URL específica da publicação, não sendo suficiente a mera descrição do tipo de conteúdo.","gab":"CERTO","com":"O STJ exige que o pedido de remoção indique a URL inequívoca da publicação ofensiva para que a ordem judicial seja eficaz e proporcional. Indicar apenas o tipo de conteúdo é genérico demais e ineficaz.","fund":"STJ, Jurisprudência em Teses, Edição 137: 'Os pedidos de remoção de conteúdo de natureza ofensiva a direitos da personalidade das páginas de internet dependem da localização inequívoca da publicação, por meio de sua URL (Uniform Resource Locator).'"},{"n":98,"enun":"É válida, com objetivo científico ou altruístico, a disposição gratuita do próprio corpo, no todo ou em parte, para depois da morte, podendo o ato ser revogado a qualquer momento.","gab":"CERTO","com":"O art. 14 do CC admite a disposição do próprio corpo post-mortem para fins científicos ou altruísticos, desde que gratuita. E o §ún prevê expressamente que o ato de disposição é revogável a qualquer tempo.","fund":"CC/2002, art. 14: 'É válida, com objetivo científico, ou altruístico, a disposição gratuita do próprio corpo, no todo ou em parte, para depois da morte. Parágrafo único. O ato de disposição pode ser livremente revogado a qualquer tempo.'"}]},{"nome":"Direito Tributário e Legislação Complementar","comando":"Acerca de Direito Tributário e jurisprudência tributária, julgue os itens.","itens":[{"n":99,"enun":"O crime tributário material (como sonegação fiscal, art. 1º da Lei 8.137/1990) somente se consuma com o lançamento definitivo do crédito tributário, conforme Súmula Vinculante 24 do STF.","gab":"CERTO","com":"A SV 24 fixou que, nos crimes tributários materiais, o tipo só se consuma com o lançamento definitivo — o que impede a persecução penal antes de esgotada a via administrativa tributária.","fund":"SV 24 STF: 'Não se tipifica crime material contra a ordem tributária, previsto no art. 1.°, incisos I a IV, da Lei n.° 8.137/90, antes do lançamento definitivo do tributo.' (j. 02/12/2009)."},{"n":100,"enun":"O Código Tributário Nacional adota o critério do lançamento por homologação como regra geral para os impostos de maior arrecadação no Brasil, como o ICMS e o IR.","gab":"CERTO","com":"O lançamento por homologação (art. 150 CTN) é aquele em que o sujeito passivo calcula, declara e paga antecipadamente, cabendo à Fazenda confirmar (homologar) o valor. É o modalidade mais comum: ICMS, IR, IPI, PIS/COFINS, entre outros.","fund":"CTN, art. 150: 'O lançamento por homologação, que ocorre quanto aos tributos cuja legislação atribua ao sujeito passivo o dever de antecipar o pagamento sem prévio exame da autoridade administrativa...'"},{"n":101,"enun":"A prescrição tributária do crédito devidamente constituído pelo lançamento extingue o crédito tributário após 5 anos, contados da data da constituição definitiva do crédito.","gab":"CERTO","com":"A prescrição tributária (ação de cobrança pelo Fisco) é de 5 anos a partir da constituição definitiva do crédito. A decadência (prazo para o Fisco lançar) é de 5 anos a partir de marcos diferentes (art. 173 ou 150, §4º, CTN). São institutos distintos.","fund":"CTN, art. 174: 'A ação para a cobrança do crédito tributário prescreve em 5 (cinco) anos, contados da data da sua constituição definitiva.'"},{"n":102,"enun":"A imunidade tributária recíproca, prevista na CF/88, impede que a União, os Estados, o DF e os Municípios cobrem impostos uns dos outros sobre patrimônio, renda e serviços, mas não abrange as taxas e contribuições.","gab":"CERTO","com":"A imunidade recíproca (CF, art. 150, VI, 'a') é exclusiva de IMPOSTOS — não alcança taxas e contribuições, que podem ser cobradas entre entes federados quando houver fato gerador e base de cálculo próprios.","fund":"CF/88, art. 150, VI, 'a': 'Sem prejuízo de outras garantias asseguradas ao contribuinte, é vedado à União, aos Estados, ao Distrito Federal e aos Municípios: VI – instituir impostos sobre: a) patrimônio, renda ou serviços, uns dos outros.' Imunidade = só impostos."},{"n":103,"enun":"A sonegação fiscal tipificada no art. 1º da Lei 8.137/1990 é crime de ação penal pública incondicionada, podendo o Ministério Público ofertar denúncia independentemente de conclusão do processo administrativo fiscal.","gab":"ERRADO","com":"A SV 24 do STF condiciona a persecução penal dos crimes tributários materiais ao lançamento definitivo do crédito tributário. Enquanto pendente o processo administrativo fiscal, o MP não pode oferecer denúncia — embora seja ação penal pública incondicionada.","fund":"SV 24 STF: aguardar o lançamento definitivo. STF, HC 81.611/DF: 'Antes do lançamento definitivo do tributo, não se tipifica crime material contra a ordem tributária.' A natureza de ação incondicionada é uma coisa; a condição objetiva de procedibilidade é outra.","peg":"Ação pública incondicionada ≠ dispensar o lançamento definitivo. São questões distintas — a SV 24 impõe condição objetiva de procedibilidade.","jur_status":"PENDENTE"},{"n":104,"enun":"O princípio da anterioridade tributária anual exige que a lei que institui ou majora tributo seja publicada antes do exercício financeiro em que o tributo será exigido, vedando a cobrança no mesmo exercício de publicação.","gab":"CERTO","com":"A anterioridade anual (CF, art. 150, III, 'b') veda a cobrança no mesmo exercício em que publicada a lei. A anterioridade nonagesimal (CF, art. 150, III, 'c') veda antes de 90 dias. Muitos tributos submetem-se a ambas cumulativamente (ex: IR submete-se à anual, mas não à nonagesimal).","fund":"CF/88, art. 150, III, 'b': vedado cobrar tributos 'no mesmo exercício financeiro em que haja sido publicada a lei que os instituiu ou aumentou.' Exceções: IPI, II, IE, IOF, IEG, CIDE-combustíveis (parcial), ICMS-combustíveis."}]},{"nome":"Direito Ambiental e Legislação Complementar","comando":"Acerca de Direito Ambiental e legislação ambiental brasileira, julgue os itens.","itens":[{"n":105,"enun":"A responsabilidade civil por dano ambiental é objetiva e fundada na teoria do risco integral, não admitindo excludentes de responsabilidade como caso fortuito, força maior ou culpa exclusiva da vítima.","gab":"CERTO","com":"O STJ consolidou (REsp 1.374.284 e recurso repetitivo) que a responsabilidade ambiental adota o risco integral — não admite as excludentes clássicas (fortuito, força maior, fato de terceiro, culpa da vítima). A teoria do risco integral é a mais rigorosa.","fund":"REsp 1.374.284 STJ: risco integral no dano ambiental. Lei 6.938/1981, art. 14, §1º: responsabilidade civil objetiva sem a restrição das excludentes. CF/88, art. 225: proteção ambiental como bem de uso comum do povo."},{"n":106,"enun":"A pessoa jurídica pode ser responsabilizada penalmente por crimes ambientais, conforme autorização constitucional e legislação específica, sem exclusão da responsabilidade das pessoas físicas autoras ou partícipes.","gab":"CERTO","com":"A CF/88 (art. 225, §3º) e a Lei 9.605/1998 (art. 3º) preveem a responsabilidade penal da pessoa jurídica por crimes ambientais, acumulada com a da pessoa física. Não há exclusão — ambas podem responder simultaneamente.","fund":"CF/88, art. 225, §3º. Lei 9.605/1998, art. 3º: 'As pessoas jurídicas serão responsabilizadas administrativamente, civil e penalmente conforme o disposto nesta Lei, nos casos em que a infração seja cometida por decisão de seu representante legal ou contratual, ou de seu órgão colegiado, no interesse ou benefício da sua entidade.'"},{"n":107,"enun":"A ação popular ambiental, diferentemente da ação popular comum, prescinde da prova de lesividade ao erário, bastando a demonstração de lesão ao meio ambiente.","gab":"CERTO","com":"Na ação popular ambiental (CF, art. 5º, LXXIII), a lesividade ao meio ambiente já constitui, por si só, fundamento suficiente — sem necessidade de demonstrar lesão ao patrimônio público financeiro. A CF, art. 5º, LXXIII ampliou os bens tuteláveis para além do patrimônio pecuniário.","fund":"CF/88, art. 5º, LXXIII: 'Qualquer cidadão é parte legítima para propor ação popular que vise a anular ato lesivo ao patrimônio público ou de entidade de que o Estado participe, à moralidade administrativa, ao meio ambiente e ao patrimônio histórico e cultural...'"},{"n":108,"enun":"O licenciamento ambiental é procedimento administrativo pelo qual o órgão ambiental competente licencia a localização, instalação, ampliação e operação de empreendimentos e atividades utilizadoras de recursos ambientais ou capazes de causar degradação ambiental.","gab":"CERTO","com":"O licenciamento ambiental (Lei Complementar 140/2011 e Resolução CONAMA 237/1997) é o instrumento preventivo de controle ambiental. É procedimento trifásico: LP (Licença Prévia), LI (Licença de Instalação) e LO (Licença de Operação).","fund":"Res. CONAMA 237/1997, art. 1º, I: 'Licenciamento Ambiental: procedimento administrativo pelo qual o órgão ambiental competente licencia a localização, instalação, ampliação e a operação de empreendimentos e atividades utilizadoras de recursos ambientais...'"},{"n":109,"enun":"Nos crimes ambientais tipificados na Lei 9.605/1998, a pena privativa de liberdade pode ser substituída por penas restritivas de direitos, ainda que o crime seja praticado com violência contra a pessoa.","gab":"ERRADO","com":"A Lei 9.605/98 (art. 7º) permite a substituição por restritivas de direito nas mesmas condições do CP (art. 44), inclusive para crimes com violência quando a pena não ultrapassar o limite. Mas para crimes praticados COM violência ou grave ameaça, a substituição é vedada — mesma regra do CP, art. 44, I.","fund":"Lei 9.605/1998, art. 7º: condições para substituição seguem o CP, art. 44. CP, art. 44, I: vedação quando o crime é praticado com violência ou grave ameaça à pessoa."}]},{"nome":"Direito Empresarial e Legislação Complementar","comando":"Acerca de Direito Empresarial, julgue os itens seguintes.","itens":[{"n":110,"enun":"O empresário individual responde de forma ilimitada pelas obrigações da empresa, alcançando seu patrimônio pessoal para satisfação das dívidas empresariais.","gab":"CERTO","com":"O empresário individual não tem separação patrimonial entre seu patrimônio pessoal e o empresarial — responde de forma ilimitada. Diferencia-se da EIRELI e da Sociedade Limitada Unipessoal, em que a responsabilidade é limitada ao capital integralizado.","fund":"CC/2002, art. 966: empresário individual — sem separação patrimonial. Contraste: EIRELI (Lei 12.441/2011) e Sociedade Limitada Unipessoal (Lei 13.874/2019): responsabilidade limitada ao capital social integralizado."},{"n":111,"enun":"A teoria da desconsideração da personalidade jurídica, no âmbito do Direito Empresarial, exige a comprovação de abuso de forma ou confusão patrimonial, podendo ser decretada de ofício pelo juiz.","gab":"ERRADO","com":"A desconsideração da personalidade jurídica NÃO pode ser decretada de ofício pelo juiz — exige requerimento da parte ou do MP. O CPC/2015 criou o incidente de desconsideração (arts. 133 a 137) que garante o contraditório antes da medida.","fund":"CC/2002, art. 50 (teoria maior): requer abuso de forma ou confusão patrimonial + requerimento. CDC, art. 28 (teoria menor): basta o prejuízo ao consumidor. CPC/2015, arts. 133-137: incidente — NÃO pode ser de ofício. iedade Industrial), prorrogáveis por iguais períodos successivos, a pedido do titular, sem limite de prorrogações.","fund":"Lei 9.279/1996, art. 133: 'O registro da marca vigorará pelo prazo de 10 (dez) anos, contados da data da concessão do registro, prorrogável por períodos iguais e sucessivos.'"}]},{"nome":"Conhecimentos do DF, PDPM e Primeiros Socorros","comando":"Acerca do Distrito Federal, suas instituições, legislação aplicável e noções de primeiros socorros, julgue os itens.","itens":[{"n":115,"enun":"Durante uma convulsão, o socorrista deve inserir um objeto rígido entre os dentes da vítima para evitar que ela morda a própria língua.","gab":"ERRADO","com":"É completamente contraindicado inserir qualquer objeto na boca da vítima durante a convulsão. Isso pode causar fraturas dentárias, lesão na boca do socorrista e risco de aspiração de fragmentos. A vítima não engole a própria língua — é um mito.","fund":"Protocolo de primeiros socorros: convulsão ativa — proteger a cabeça, afastar objetos, não conter à força, NÃO inserir objeto na boca. Após a convulsão: PLS (Posição Lateral de Segurança)."},{"n":116,"enun":"Em caso de ingestão de substância cáustica (ácido ou base forte), o procedimento correto de primeiros socorros é induzir o vômito imediatamente para reduzir o tempo de contato da substância com o tubo digestivo.","gab":"ERRADO","com":"Nunca se induz vômito em caso de ingestão de cáusticos. O vômito faz a substância percorrer novamente o esôfago no sentido inverso, aprofundando as queimaduras. A conduta correta é oferecer pequenos goles de água e acionar o SAMU (192) imediatamente.","fund":"Protocolo de intoxicação por cáusticos: NUNCA induzir vômito; NUNCA dar leite ou neutralizantes; SIM dar pequenos goles de água; acionar CIATOX (0800 722 6001) ou SAMU (192)."},{"n":117,"enun":"A Região Integrada de Desenvolvimento do Distrito Federal e Entorno (RIDE-DF) foi criada por lei complementar federal e abrange, além do DF, municípios dos estados de Goiás e Minas Gerais.","gab":"CERTO","com":"A RIDE-DF foi criada pela LC 94/1998 e regulamentada pelo Decreto 7.469/2011. Abrange o DF e municípios dos estados de Goiás (a maioria) e de Minas Gerais (municípios limítrofes).","fund":"LC 94/1998: criação da RIDE-DF. Decreto 7.469/2011: regulamentação. Composição: DF + municípios de Goiás (ex: Águas Lindas, Luziânia, Planaltina-GO, etc.) + municípios de MG (ex: Unaí, Buritis)."},{"n":118,"enun":"O torniquete improvisado deve ser aplicado como primeira medida nos sangramentos externos intensos de membros, com anotação do horário de aplicação para controle médico.","gab":"ERRADO","com":"O torniquete é o ÚLTIMO recurso após falha das demais medidas (compressão direta, elevação do membro, ponto de pressão). Não deve ser a primeira medida. Quando necessário, é obrigatório anotar o horário de aplicação, pois isquemia > 2h pode levar à amputação.","fund":"Protocolo de primeiros socorros em sangramentos: 1º compressão direta; 2º elevação do membro; 3º ponto de pressão proximal; 4º torniquete (último recurso). Torniquete: anotar horário obrigatoriamente."},{"n":119,"enun":"O Distrito Federal possui organização político-administrativa peculiar: é vedada sua divisão em municípios, cumprindo funções tanto de Estado quanto de Município.","gab":"CERTO","com":"O DF é ente federativo singular (CF, art. 32): não pode ser dividido em municípios e acumula competências estaduais e municipais. É governado por Governador (eleito), tem Câmara Legislativa e organização judiciária própria.","fund":"CF/88, art. 32: 'O Distrito Federal, vedada sua divisão em municípios, reger-se-á por lei orgânica, votada em dois turnos com interstício mínimo de dez dias, e aprovada por dois terços da Câmara Legislativa...' CF/88, art. 32, §1º: competências estaduais e municipais do DF."},{"n":120,"enun":"A Política Distrital de Atenção à Mulher em Situação de Violência (PDPM), no âmbito do Distrito Federal, articula-se com a Lei Maria da Penha (Lei 11.340/2006) para garantir medidas protetivas de urgência às vítimas de violência doméstica.","gab":"CERTO","com":"A PDPM do DF complementa a Lei Maria da Penha no âmbito local, articulando redes de proteção, atendimento especializado e medidas protetivas. O Distrito Federal tem competência para legislar sobre proteção às mulheres em violência doméstica em complementação à lei federal.","fund":"Lei 11.340/2006 (Lei Maria da Penha): medidas protetivas de urgência. PDPM/DF: lei distrital que estrutura a rede de proteção local. O DF, ao acumular funções de Estado e município, tem ampla competência legislativa no tema."}]}]};

const TRAP_WORDS=[
  'tão somente','somente','apenas','unicamente','exclusivamente',
  'em qualquer hipótese','em nenhuma hipótese','em qualquer caso','em todo caso',
  'independentemente','independente de','mesmo que','ainda que',
  'obrigatoriamente','obrigatória','obrigatório','necessariamente',
  'imprescindível','indispensável','imediatamente','automaticamente',
  'de pleno direito','por si só','toda vez que','a qualquer tempo',
  'nunca','jamais','sempre','absolutamente','absoluta',
  'é vedado','são vedados','é proibido','são proibidos',
  'não pode','não podem','impossível','é impossível',
  'salvo','exceto','ressalvado','ressalvada',
  'expressamente','tacitamente'
].sort((a,b)=>b.length-a.length); // longer phrases first

function _escRx(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}
function highlightTraps(html){
  // html is already HTML-escaped plain text; safe to inject <mark>
  TRAP_WORDS.forEach(w=>{
    const re=new RegExp(`(?<![\\wÀ-ÿ])(${_escRx(w)})(?![\\wÀ-ÿ])`,'gi');
    html=html.replace(re,'<mark class="trap-word">$1</mark>');
  });
  return html;
}

function computeFilteredNs(type, disc){
  return S.flat.filter(x=>{
    const dm = !disc || x.discNome === disc;
    if(type==='erros')        return dm && S.respostas[x.n] && S.respostas[x.n]!==x.item.gab;
    if(type==='branco')       return dm && !S.respostas[x.n];
    if(type==='lac')          return dm && S.avaliacoes[x.n]==='lac';
    if(type==='dvd')          return dm && S.avaliacoes[x.n]==='dvd';
    if(type==='problematicos') return dm && (
      (S.respostas[x.n] && S.respostas[x.n]!==x.item.gab) ||
      !S.respostas[x.n] || S.avaliacoes[x.n]==='lac');
    if(type==='disc')         return x.discNome===disc;
    return false;
  }).map(x=>x.n);
}

/* ── HISTÓRICO ───────────────────────────────────────────── */
function buildBlocoSummary(){
  const tot=S.flat.length;
  let ok=0,er=0,blank=0;
  S.flat.forEach(x=>{
    const r=S.respostas[x.n];
    if(r===x.item.gab) ok++;
    else if(r) er++;
    else blank++;
  });
  const disc={};
  S.bloco.disciplinas.forEach(d=>{
    let dok=0,der=0;
    d.itens.forEach(it=>{const r=S.respostas[it.n];if(r===it.gab)dok++;else if(r)der++;});
    const short=d.nome.replace('Direito ','').replace(/ e Legislação .*/,'');
    disc[short]={ok:dok,er:der,tot:d.itens.length};
  });
  const avCnt={dom:0,dvd:0,lac:0,leit:0};
  Object.values(S.avaliacoes).forEach(v=>{if(v in avCnt)avCnt[v]++;});
  return {
    blocoId:S.bloco.meta.id, data:S.bloco.meta.data||S.bloco.meta.id,
    titulo:S.bloco.meta.titulo||'',
    totalQuestoes:tot, acertos:ok, erros:er, branco:blank,
    saldo:ok-er, pct:tot>0?Math.round(ok/tot*100):0,
    tempo:S.totalMs, disciplinas:disc, avaliacoes:avCnt,
    finishedAt:Date.now()
  };
}
/* ── SM-2 SPACED REPETITION ──────────────────────────────── */
function computeSRQuality(h){
  // Mapeia desempenho do bloco para quality SM-2 (0–5)
  const pct=h.pct;
  const av=h.avaliacoes||{};
  const avTotal=(av.dom||0)+(av.dvd||0)+(av.lac||0)+(av.leit||0);
  // Base a partir do aproveitamento
  let q;
  if(pct>=90) q=5;
  else if(pct>=80) q=4;
  else if(pct>=70) q=3;
  else if(pct>=55) q=2;
  else if(pct>=40) q=1;
  else q=0;
  // Ajuste pela autoavaliação: muitas lacunas penaliza, muito domínio bonifica
  if(avTotal>0){
    const lacRatio=(av.lac||0)/avTotal;
    const domRatio=(av.dom||0)/avTotal;
    if(lacRatio>0.4 && q>1) q--;
    if(domRatio>0.6 && q<5) q++;
  }
  return Math.max(0,Math.min(5,q));
}
function applySM2(sr,quality){
  // sr = {interval, repetitions, ef} ou null (primeira vez)
  let {interval=1,repetitions=0,ef=2.5}=sr||{};
  if(quality<3){
    // Abaixo do limiar: recomeça intervalo mas mantém EF (penaliza menos)
    repetitions=0; interval=1;
  } else {
    if(repetitions===0) interval=1;
    else if(repetitions===1) interval=6;
    else interval=Math.round(interval*ef);
    ef=ef+(0.1-(5-quality)*(0.08+(5-quality)*0.02));
    ef=Math.max(1.3,Math.round(ef*100)/100);
    repetitions++;
  }
  const next=new Date();
  next.setDate(next.getDate()+interval);
  return {interval,repetitions,ef,nextReview:next.toISOString().slice(0,10)};
}
function srBadgeHtml(sr){
  if(!sr||!sr.nextReview) return '';
  const today=new Date().toISOString().slice(0,10);
  const diff=(new Date(sr.nextReview)-new Date(today))/(1000*60*60*24);
  if(diff<=0)  return `<span class="sr-badge due">⟳ Revisar hoje</span>`;
  if(diff<=2)  return `<span class="sr-badge soon">⟳ ${Math.round(diff)}d</span>`;
  return `<span class="sr-badge ok">⟳ ${fmtDateShort(sr.nextReview)}</span>`;
}

function saveToHistory(){
  try{
    let hist=loadHistory();
    const s=buildBlocoSummary();
    const idx=hist.findIndex(h=>h.blocoId===s.blocoId);
    // Preserva SR anterior (acumula repetições)
    const prevSR=idx>=0?(hist[idx].sr||null):null;
    const quality=computeSRQuality(s);
    s.sr=applySM2(prevSR,quality);
    s.srQuality=quality; // guarda para debug
    if(idx>=0) hist[idx]=s; else hist.push(s);
    if(hist.length>90) hist=hist.slice(-90);
    localStorage.setItem(HIST_KEY,JSON.stringify(hist));
  }catch(e){}
}
function loadHistory(){
  try{const r=localStorage.getItem(HIST_KEY);return r?JSON.parse(r):[]}catch(e){return [];}
}
function buildBarChart(entries){
  if(!entries.length) return '';
  const W=520,H=108,padB=17,padT=13,inner=H-padB-padT;
  const n=entries.length;
  const bW=Math.max(7,Math.min(26,Math.floor((W-16)/n)-3));
  const gap=(W-bW*n)/(n+1);
  let s=`<svg viewBox="0 0 ${W} ${H}" width="100%" xmlns="http://www.w3.org/2000/svg">`;
  // gridlines
  [50,70,90].forEach(pct=>{
    const gy=padT+Math.round((1-pct/100)*inner);
    s+=`<line x1="0" y1="${gy}" x2="${W}" y2="${gy}" stroke="var(--bord)" stroke-width="1"/>`;
    s+=`<text x="2" y="${gy-2}" font-size="7.5" fill="var(--txt3)">${pct}%</text>`;
  });
  // ref line 70%
  const ry=padT+Math.round(.3*inner);
  s+=`<line x1="0" y1="${ry}" x2="${W}" y2="${ry}" stroke="var(--green)" stroke-dasharray="4,3" opacity=".45" stroke-width="1.2"/>`;
  // bars
  entries.forEach((e,i)=>{
    const bH=Math.max(2,Math.round((e.pct/100)*inner));
    const x=gap+i*(bW+gap), y=H-padB-bH;
    const col=e.pct>=70?'var(--green)':e.pct>=50?'var(--acc)':'var(--red)';
    s+=`<rect x="${x.toFixed(1)}" y="${y}" width="${bW}" height="${bH}" rx="3" fill="${col}" opacity=".82"/>`;
    if(bH>16){s+=`<text x="${(x+bW/2).toFixed(1)}" y="${y+bH-4}" text-anchor="middle" font-size="8" fill="rgba(255,255,255,.8)" font-weight="700">${e.pct}%</text>`;}
    else{s+=`<text x="${(x+bW/2).toFixed(1)}" y="${y-2}" text-anchor="middle" font-size="7.5" fill="${col}">${e.pct}%</text>`;}
    const dl=fmtDateShort(e.data).slice(0,5);
    s+=`<text x="${(x+bW/2).toFixed(1)}" y="${H-2}" text-anchor="middle" font-size="7" fill="var(--txt3)">${dl}</text>`;
  });
  s+='</svg>';
  return s;
}

function loadBloco(b){
  S.bloco=b; S.flat=flattenBloco(b);
  S.respostas={}; S.gabsShown={}; S.globalGabShown=false;
  S.avaliacoes={};
  S.totalMs=0; S.startedAt=null; S.finished=false;
}

/* ── THEME ───────────────────────────────────────────────── */
const THEMES=['dark','light'];
function applyTheme(t){
  document.documentElement.setAttribute('data-theme',t);
  const ic=t==='dark'?'☀':'🌙';
  document.getElementById('btn-theme').textContent=ic;
  try{localStorage.setItem(THEME_KEY,t);}catch(e){}
}
function cycleTheme(){
  const cur=document.documentElement.getAttribute('data-theme')||'dark';
  applyTheme(cur==='dark'?'light':'dark');
  showToast('Tema alterado');
}

/* ── DATE FORMAT ─────────────────────────────────────────── */
function fmtDateShort(iso){
  // "2026-06-05" → "05.06.26"
  if(!iso) return '';
  const p=iso.split('-');
  if(p.length<3) return iso;
  return `${p[2]}.${p[1]}.${p[0].slice(2)}`;
}

/* ── TIMER ───────────────────────────────────────────────── */
function fmtTime(ms){
  const s=Math.floor(ms/1000), m=Math.floor(s/60), h=Math.floor(m/60);
  if(h>0) return `${h}h ${(m%60).toString().padStart(2,'0')}m`;
  return `${m}:${(s%60).toString().padStart(2,'0')}`;
}
function startTimer(){
  if(S.timerInterval) return;
  S.startedAt=Date.now();
  S.timerInterval=setInterval(()=>{
    const elapsed=S.totalMs+(Date.now()-S.startedAt);
    const el=document.getElementById('hdr-timer-txt');
    if(el) el.textContent=fmtTime(elapsed);
    const bpel=document.getElementById('bp-time');
    if(bpel) bpel.textContent=fmtTime(elapsed);
  },1000);
}
function stopTimer(){
  if(S.timerInterval){clearInterval(S.timerInterval);S.timerInterval=null;}
  if(S.startedAt){S.totalMs+=Date.now()-S.startedAt;S.startedAt=null;}
}

function togglePause(){
  if(S.finished) return;
  S.paused=!S.paused;
  const btn=document.getElementById('btn-pause');
  const overlay=document.getElementById('pause-overlay');
  if(S.paused){
    // Pausa: para timers, bloqueia tela
    stopTimer();
    if(QT.tickInterval){clearInterval(QT.tickInterval);QT.tickInterval=null;}
    if(QT.observer){QT.observer.disconnect();QT.observer=null;}
    QT.visible.clear();
    overlay.classList.remove('hidden');
    btn.textContent='▶';
    btn.classList.add('paused');
    btn.title='Retomar';
  } else {
    // Retoma: esconde overlay, reinicia timers
    overlay.classList.add('hidden');
    btn.textContent='⏸';
    btn.classList.remove('paused');
    btn.title='Pausar';
    // Reinicia apenas se estiver na prova ou no foco
    const inProva=!document.getElementById('sec-prova').classList.contains('hidden');
    const inFoco=FOCO.active;
    if(inProva||inFoco){
      startTimer();
      if(!QT.tickInterval&&!FOCO.active){
        // re-inicia observer e tick na prova normal
        initQTimer();
      } else if(FOCO.active){
        // no foco apenas o tick
        QT.lastTickAt=Date.now();
        QT.tickInterval=setInterval(_qtTick,500);
      }
    }
  }
}

/* ── RENDER PROVA ─────────────────────────────────────────── */
function renderProva(){
  document.getElementById('sec-cover').innerHTML='';
  document.getElementById('sec-placar').classList.add('hidden');
  document.getElementById('sec-prova').classList.remove('hidden');
  document.getElementById('hdr-timer').classList.remove('hidden');
  document.getElementById('hdr-chips').style.display='flex';
  document.getElementById('btn-gab-all').classList.remove('hidden');
  document.getElementById('fab').classList.remove('hidden');
  document.getElementById('bot-bar').classList.remove('hidden');

  const wrap=document.getElementById('prova-wrap');
  let html='';

  const dateLabel=fmtDateShort(S.bloco.meta.data);
  if(dateLabel){document.getElementById('hdr-date').textContent=dateLabel;}
  S.bloco.disciplinas.forEach((d,di)=>{
    const short=d.nome.replace('Direito ','').replace(' e Legislação Especial','').replace(' e Legislação Complementar','');
    html+=`<div class="disc-section" id="disc-${di}">
      <div class="disc-hdr"><h3>${short}</h3></div>
      <div class="comando">${d.comando}</div>
      ${d.itens.map(it=>renderQBlock(it,di)).join('')}
    </div>`;
  });
  wrap.innerHTML=html;

  updateProgress();
  renderQuickNav();
  updateGabAllBtn();
  startTimer();
  initQTimer();
  window.scrollTo(0,0);
}

function renderQBlock(it,di){
  const ans=S.respostas[it.n];
  const gabOn=S.gabsShown[it.n]||S.globalGabShown;
  const isRight=ans&&ans===it.gab;
  const isWrong=ans&&ans!==it.gab;

  const markC=ans==='CERTO'?` sel-c${gabOn?(isRight?' is-right':' is-wrong'):''}`:' ';
  const markE=ans==='ERRADO'?` sel-e${gabOn?(isRight?' is-right':' is-wrong'):''}`:' ';
  const disab=S.finished?'disabled':'';

  let enunHtml=it.enun;
  const m=enunHtml.match(/^(Situação hipotética[^.]*\.)(.*)/s);
  if(m) enunHtml=`<span class="situacao">${m[1].trim()}</span>${m[2].trim()}`;

  let statusHtml='';
  if(gabOn&&ans){
    statusHtml=`<span class="q-status">${isRight?'<span class="ok">✓ Acertou</span>':'<span class="er">✗ Errou</span>'}</span>`;
  }else if(gabOn&&!ans){
    statusHtml=`<span class="q-status" style="color:var(--txt3)">Em branco</span>`;
  }

  let feedbackHtml='';
  if(gabOn){
    const fundSafe=escHtml(it.fund||'');
    const fundCopy=(it.fund||'').replace(/\\/g,'\\\\').replace(/"/g,'&quot;').replace(/'/g,"\\'").replace(/\n/g,'\\n');
    const gabBadgeCls=ans?(isRight?'ok':'er'):'bk';
    const gabBadgeTxt=ans?(isRight?'Acertou ✓':'Errou ✗'):'Em branco';

    // ── Releitura Crítica (enunciado com traps destacados) ──
    const mR=it.enun.match(/^(Situação hipotética[^.]*\.)(.*)/s);
    let relitHtml;
    if(mR){
      relitHtml=`<span class="situacao">${highlightTraps(escHtml(mR[1].trim()))}</span>${highlightTraps(escHtml(mR[2].trim()))}`;
    } else {
      relitHtml=highlightTraps(escHtml(it.enun));
    }
    const trapCount=(relitHtml.match(/class="trap-word"/g)||[]).length;

    // ── Autoavaliação ──
    const av=S.avaliacoes[it.n];
    let avHtml;
    if(av){
      const avl=AV_LABELS[av];
      avHtml=`<div class="av-set">
        <span style="color:var(--txt3);font-size:11.5px;text-transform:uppercase;letter-spacing:.08em;font-weight:600">Autoavaliação:</span>
        <span class="av-chip ${avl.cls}">${avl.icon} ${avl.txt}</span>
        <button class="av-change" onclick="setAvaliacao(${it.n},null)">alterar</button>
      </div>`;
    } else {
      const btns=Object.entries(AV_LABELS).map(([k,v])=>
        `<button class="av-btn ${v.cls}" onclick="setAvaliacao(${it.n},'${k}')">${v.icon} ${v.txt}</button>`
      ).join('');
      avHtml=`<div class="avaliacao-row">
        <div class="avaliacao-lbl">Como você se saiu nessa questão?</div>
        ${btns}
      </div>`;
    }

    feedbackHtml=`<div class="q-feedback">
      <div class="gab-line">
        <span class="gab-label">Gabarito</span>
        <span class="gab-value">&nbsp;${it.gab}</span>
        <span class="gab-badge ${gabBadgeCls}">${gabBadgeTxt}</span>
      </div>
      ${avHtml}
      ${trapCount>0?`<div class="gab-section">
        <button class="gab-hdr" onclick="toggleGabSec(${it.n},'r')">
          <span class="gab-icon">🔍</span>
          <span class="gab-lbl">Releitura Crítica</span>
          <span style="margin-left:auto;margin-right:8px" class="trap-found">⚑ ${trapCount} armadilha${trapCount>1?'s':''}</span>
          <span class="gab-chev open" id="chev-${it.n}-r">▼</span>
        </button>
        <div class="gab-body" id="gb-${it.n}-r">
          <div class="releitura-body">${relitHtml}</div>
          <div class="trap-legend">Palavras destacadas:
            ${TRAP_WORDS.filter(w=>new RegExp(`(?<![\\wÀ-ÿ])${_escRx(w)}(?![\\wÀ-ÿ])`,'i').test(it.enun)).slice(0,8).map(w=>`<mark class="trap-word">${w}</mark>`).join(' ')}
          </div>
        </div>
      </div>`:''}
      <div class="gab-section">
        <button class="gab-hdr" onclick="toggleGabSec(${it.n},'f')">
          <span class="gab-icon">💡</span>
          <span class="gab-lbl">Explicação (Feynman)</span>
          <span class="gab-chev open" id="chev-${it.n}-f">▼</span>
        </button>
        <div class="gab-body" id="gb-${it.n}-f"><div class="feynman-text">${it.com||''}</div></div>
      </div>
      <div class="gab-section">
        <button class="gab-hdr" onclick="toggleGabSec(${it.n},'l')">
          <span class="gab-icon">📖</span>
          <span class="gab-lbl">Lei &amp; Jurisprudência</span>
          <span class="gab-chev open" id="chev-${it.n}-l">▼</span>
        </button>
        <div class="gab-body" id="gb-${it.n}-l">
          <div class="law-block">${fundSafe}</div>
          <button class="copy-btn" onclick="copyFund(this,'${fundCopy}')">📋 Copiar lei &amp; jurisprudência</button>
        </div>
      </div>
      ${it.peg?`<div class="gab-section" style="border-top:1px solid var(--bord)">
        <div style="padding:10px 14px"><div class="peg-box">⚠️ &nbsp;<span><strong>Armadilha:</strong> ${it.peg}</span></div></div>
      </div>`:''}
    </div>`;
  }

  return `<div class="q-block${gabOn?' gab-on':''}" id="q-${it.n}" data-n="${it.n}">
    <div class="q-line">
      <span class="q-tag">${it.n}</span>
      <div class="q-text">${enunHtml}</div>
      <div class="q-marks">
        <button class="q-mark${markC}" onclick="markAns(${it.n},'CERTO')" ${disab} title="Certo (C)">C</button>
        <button class="q-mark${markE}" onclick="markAns(${it.n},'ERRADO')" ${disab} title="Errado (E)">E</button>
      </div>
    </div>
    <div class="q-actions-row">
      <button class="q-show-gab" onclick="toggleGab(${it.n})">${gabOn?'Ocultar gabarito':'Ver gabarito'}</button>
      ${statusHtml}
      <span class="qt-badge qt-idle" id="qt-${it.n}">⏱</span>
    </div>
    ${feedbackHtml}
  </div>`;
}

function rerenderQ(n){
  const el=document.getElementById(`q-${n}`);
  if(!el) return;
  const di=S.flat.find(x=>x.n===n)?.discIdx||0;
  el.outerHTML=renderQBlock(S.flat.find(x=>x.n===n).item, di);
}

/* ── ACTIONS ─────────────────────────────────────────────── */
function markAns(n,val){
  if(S.finished) return;
  if(S.respostas[n]===val) delete S.respostas[n];
  else {
    S.respostas[n]=val;
    // Modo Foco: exibe gabarito automaticamente após responder
    if(typeof FOCO!=='undefined' && FOCO.active && !S.gabsShown[n]) S.gabsShown[n]=true;
  }
  save(); rerenderQ(n); updateProgress(); updateQuickNav();
  setTimeout(()=>_qtUpdateBadge(n),0);
}

function toggleGab(n){
  if(S.gabsShown[n]) delete S.gabsShown[n];
  else S.gabsShown[n]=true;
  save(); rerenderQ(n); updateQuickNav();
}

function toggleGabSec(n,key){
  const body=document.getElementById(`gb-${n}-${key}`);
  const chev=document.getElementById(`chev-${n}-${key}`);
  if(!body) return;
  const open=!body.classList.contains('hidden');
  body.classList.toggle('hidden',open);
  if(chev) chev.classList.toggle('open',!open);
}

function toggleAllGabaritos(){
  S.globalGabShown=!S.globalGabShown;
  if(S.globalGabShown) S.gabsShown={};
  save();
  renderProva(); // full re-render
  updateGabAllBtn();
}
function updateGabAllBtn(){
  const b=document.getElementById('btn-gab-all');
  const t=document.getElementById('tb-gab-all');
  const lbl=S.globalGabShown?'🙈':'👁';
  if(b) b.textContent=lbl;
  if(t) t.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="3"/><path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7-10-7-10-7z"/></svg> ${S.globalGabShown?'Ocultar gabaritos':'Gabaritos'}`;
}

/* ── QUICK NAV ───────────────────────────────────────────── */
function renderQuickNav(){
  const grid=document.getElementById('qn-grid');
  if(!grid) return;
  grid.innerHTML=S.flat.map(x=>{
    const a=S.respostas[x.n];
    const g=S.gabsShown[x.n]||S.globalGabShown;
    let cls=a==='CERTO'?'ac':a==='ERRADO'?'ae':'';
    if(g) cls+=' gs';
    // qa: não respondida e acima do limiar de alerta
    if(!a && (QT.times[x.n]||0)>=QT.ALERT) cls+=' qa';
    return `<button class="qn-btn ${cls}" onclick="jumpTo(${x.n})" title="Q.${x.n}${!a&&(QT.times[x.n]||0)>=QT.ALERT?' · ⏱ '+_fmtQT(QT.times[x.n]):''}">${x.n}</button>`;
  }).join('');
}
function updateQuickNav(){ renderQuickNav(); }
function jumpTo(n){
  document.getElementById('quick-nav').classList.remove('open');
  const el=document.getElementById(`q-${n}`);
  if(el) el.scrollIntoView({behavior:'smooth',block:'center'});
}

/* ── PROGRESS ─────────────────────────────────────────────── */
function updateProgress(){
  const tot=S.flat.length;
  let ok=0,er=0,ans=0;
  S.flat.forEach(x=>{
    const r=S.respostas[x.n];
    if(r===x.item.gab) ok++;
    else if(r) er++;
    if(r) ans++;
  });
  const pct=tot?Math.round(ans/tot*100):0;
  const blank=tot-ans;

  // Header
  document.getElementById('c-ok').textContent='✓ '+ok;
  document.getElementById('c-er').textContent='✗ '+er;
  document.getElementById('c-tot').textContent=ans+'/'+tot;
  document.getElementById('prog-fill').style.width=pct+'%';
  // Toolbar
  const tbans=document.getElementById('tb-ans');
  const tbblank=document.getElementById('tb-blank');
  if(tbans) tbans.textContent=ans;
  if(tbblank) tbblank.textContent=blank;
  // Bottom bar
  const bpok=document.getElementById('bp-ok');
  const bper=document.getElementById('bp-er');
  const bpcur=document.getElementById('bp-cur');
  const bptot=document.getElementById('bp-tot');
  const bbar=document.getElementById('bbar-fill');
  if(bpok) bpok.textContent=ok+' ✓';
  if(bper) bper.textContent=er+' ✗';
  if(bpcur) bpcur.textContent=ans;
  if(bptot) bptot.textContent=tot;
  if(bbar) bbar.style.width=pct+'%';
}

/* ── FINISH ──────────────────────────────────────────────── */
function confirmFinish(){
  const blank=S.flat.filter(x=>!S.respostas[x.n]).length;
  if(blank===0){finishProva();return;}
  const el=document.getElementById('modal-root');
  el.innerHTML=`<div class="modal-ov" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <h3>⚠️ Questões em branco</h3>
      <p>Você tem <strong>${blank} questão(ões) em branco</strong>.<br><br>
      Pela fórmula CEBRASPE, itens em branco valem 0 pontos — ao contrário dos errados (−1). Recomenda-se responder todas as questões.</p>
      <div class="modal-acts">
        <button class="btn-ghost" onclick="closeModal()">Voltar e responder</button>
        <button class="btn-warn" onclick="closeModal();finishProva()">Encerrar mesmo assim</button>
      </div>
    </div>
  </div>`;
}
function finishProva(){
  stopTimer(); stopQTimer(); S.finished=true; S.globalGabShown=true; save();
  saveToHistory(); // persiste no histórico cross-bloco
  renderPlacar();
}
function goBackToProva(jumpN){
  S.finished=false; save();
  renderProva();
  if(jumpN) setTimeout(()=>jumpTo(jumpN),300);
}

/* ── MODO FOCO ────────────────────────────────────────────── */
const FOCO={active:false, idx:0, currentN:null};

function enterFoco(startIdx){
  if(!S.bloco){showToast('Carregue um bloco primeiro');return;}
  if(S.finished){showToast('Bloco já encerrado — use a Revisão');return;}
  // Desconecta apenas o observer (para de acumular tempo via scroll),
  // mas mantém QT.tickInterval ativo para continuar contando tempo em Foco
  if(QT.observer){QT.observer.disconnect();QT.observer=null;}
  QT.visible.clear();
  if(!QT.tickInterval){QT.lastTickAt=Date.now();QT.tickInterval=setInterval(_qtTick,500);}
  FOCO.active=true;
  if(startIdx!==undefined){
    FOCO.idx=Math.max(0,Math.min(startIdx,S.flat.length-1));
  } else {
    // começa na primeira não respondida
    const first=S.flat.findIndex(x=>!S.respostas[x.n]);
    FOCO.idx=first>=0?first:0;
  }
  // oculta tudo, exibe foco
  document.getElementById('sec-prova').classList.add('hidden');
  document.getElementById('sec-placar').classList.add('hidden');
  document.getElementById('sec-historico').classList.add('hidden');
  document.getElementById('sec-revisao').classList.add('hidden');
  document.getElementById('sec-cover').innerHTML='';
  document.getElementById('fab').classList.add('hidden');
  document.getElementById('bot-bar').classList.add('hidden');
  document.getElementById('btn-gab-all').classList.add('hidden');
  document.getElementById('hdr-timer').classList.remove('hidden');
  document.getElementById('hdr-chips').style.display='flex';
  document.getElementById('sec-foco').classList.remove('hidden');
  renderFocoQ();
}

function exitFoco(){
  FOCO.active=false; FOCO.currentN=null;
  document.getElementById('sec-foco').classList.add('hidden');
  renderProva(); // reinicia QT via renderProva → initQTimer
}

function renderFocoQ(){
  const x=S.flat[FOCO.idx];
  if(!x) return;
  const it=x.item;
  FOCO.currentN=it.n;

  const total=S.flat.length;
  const answered=Object.keys(S.respostas).length;

/* ── QUESTION TIMER ──────────────────────────────────────── */
const QT={
  times:{},         // {n: elapsedMs}
  visible:new Set(),
  lastTickAt:null,
  tickInterval:null,
  observer:null,
  WARN:60000,       // 60s → amber
  ALERT:90000,      // 90s → red + pulse
};

function initQTimer(){
  stopQTimer();
  QT.times={}; QT.visible=new Set(); QT.lastTickAt=Date.now();

  QT.observer=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      const n=parseInt(e.target.dataset.n);
      if(e.isIntersecting) QT.visible.add(n);
      else QT.visible.delete(n);
    });
  },{rootMargin:'-28% 0px -28% 0px',threshold:0});

  document.querySelectorAll('.q-block[data-n]').forEach(el=>QT.observer.observe(el));
  QT.tickInterval=setInterval(_qtTick,500);
}

function stopQTimer(){
  if(QT.tickInterval){clearInterval(QT.tickInterval);QT.tickInterval=null;}
  if(QT.observer){QT.observer.disconnect();QT.observer=null;}
  QT.visible.clear(); QT.lastTickAt=null;
  const pill=document.getElementById('qt-pill');
  if(pill) pill.classList.add('hidden');
}

function _qtTick(){
  const now=Date.now();
  const delta=QT.lastTickAt?now-QT.lastTickAt:0;
  QT.lastTickAt=now;

  let pillN=null, pillMs=0;
  let crossedAlert=false;
  QT.visible.forEach(n=>{
    if(!S.respostas[n]){
      const prevMs=QT.times[n]||0;
      QT.times[n]=prevMs+delta;
      if(QT.times[n]>pillMs){pillMs=QT.times[n];pillN=n;}
      // detecta cruzamento do limiar para atualizar quick nav
      if(prevMs<QT.ALERT && QT.times[n]>=QT.ALERT) crossedAlert=true;
    }
    _qtUpdateBadge(n);
  });
  _qtUpdatePill(pillN,pillMs);
  if(crossedAlert) renderQuickNav();

  // Modo Foco: acumula tempo para a questão visível manualmente
  if(FOCO.active && FOCO.currentN && !S.respostas[FOCO.currentN]){
    QT.times[FOCO.currentN]=(QT.times[FOCO.currentN]||0)+delta;
    _qtUpdateBadge(FOCO.currentN);
    // atualiza % no header do foco
    const pf=document.getElementById('foco-pf');
    if(pf){const t=S.flat.length;const a=Object.keys(S.respostas).length;pf.style.width=Math.round(a/t*100)+'%';}
    const fpct=document.querySelector('.foco-pct');
    if(fpct){const t=S.flat.length;const a=Object.keys(S.respostas).length;fpct.textContent=Math.round(a/t*100)+'%';}
  }
}

function _qtUpdateBadge(n){
  const el=document.getElementById(`qt-${n}`);
  if(!el) return;
  const ms=QT.times[n]||0;
  const answered=!!S.respostas[n];
  if(answered){
    el.className='qt-badge qt-done';
    el.textContent=ms>0?`⏱ ${_fmtQT(ms)}`:'⏱';
    return;
  }
  if(ms<1000){el.className='qt-badge qt-idle';el.textContent='⏱';return;}
  if(ms>=QT.ALERT){el.className='qt-badge qt-alert';el.textContent=`⏱ ${_fmtQT(ms)}`;}
  else if(ms>=QT.WARN){el.className='qt-badge qt-warn';el.textContent=`⏱ ${_fmtQT(ms)}`;}
  else{el.className='qt-badge qt-normal';el.textContent=`⏱ ${_fmtQT(ms)}`;}
}

function _qtUpdatePill(n,ms){
  const pill=document.getElementById('qt-pill');
  if(!pill) return;
  if(!n||ms<8000){pill.classList.add('hidden');return;}
  pill.classList.remove('hidden');
  const inner=pill.querySelector('.qt-active-pill');
  if(!inner) return;
  const cls='qt-active-pill'+(ms>=QT.ALERT?' qt-alert-p':ms>=QT.WARN?' qt-warn-p':'');
  inner.className=cls;
  const icon=ms>=QT.ALERT?'⚠️':ms>=QT.WARN?'⏳':'⏱';
  inner.innerHTML=`${icon} Q.${n} — <span style="font-variant-numeric:tabular-nums">${_fmtQT(ms)}</span>`;
}

function _fmtQT(ms){
  const s=Math.floor(ms/1000);
  return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
}

    .footer{margin-top:32px;padding-top:12px;border-top:1px solid #ddd;font-size:10px;color:#aaa;display:flex;justify-content:space-between}
  </style></head><body>
  <button class="print-btn no-print" onclick="window.print()">⬆ Salvar como PDF</button>
  <div class="logo">Δ <em>PCDF</em></div>
  <div class="rpt-title">Projeto Delegado de Polícia · PCDF 2026</div>

  <div class="sec-lbl">Resultado Geral — ${tot} questões</div>

  ${avTotal>0?`<div class="sec-lbl">Diagnóstico — Autoavaliação (${avTotal} respostas)</div>
  <div class="diag-row">
    <div class="diag-cell"><div class="dn ng">${avCnt.dom}</div><div class="dl">✓ Domínio total</div></div>
    <div class="diag-cell"><div class="dn na">${avCnt.dvd}</div><div class="dl">🤔 Com dúvida</div></div>
    <div class="diag-cell"><div class="dn nr">${avCnt.lac}</div><div class="dl">📖 Lacuna conceitual</div></div>
    <div class="diag-cell"><div class="dn nt">${avCnt.leit}</div><div class="dl">👁 Erro de leitura</div></div>
  </div>
  ${avCnt.lac>0?`<div style="margin-bottom:20px;padding:10px 14px;background:#fff5f5;border:1px solid #f5c6c6;border-radius:6px;font-size:12.5px;color:#8b0000">⚠️ ${avCnt.lac} lacuna${avCnt.lac>1?'s conceituais':' conceitual'} identificada${avCnt.lac>1?'s':''} — revisão prioritária antes da prova.</div>`:''}
  `:''}

  ${errors.length>0?`<div class="page-break">
  <div class="sec-lbl">Questões Erradas (${errors.length})</div>
  ${errHtmlStr}
  </div>`:`<div style="margin-top:12px">${errHtmlStr}</div>`}

  <div class="footer">
