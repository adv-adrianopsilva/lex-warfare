<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PCDF · Delegado 2026</title>
<!-- PWA -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0a0b14">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PCDF">
<link rel="apple-touch-icon" href="/icons/icon-180.png">
<link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png">
<link rel="apple-touch-icon" sizes="167x167" href="/icons/icon-167.png">
<link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180.png">
<link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png">
<style>
/* ── TOKENS ──────────────────────────────────────────────── */
:root{
  --bg:#0a0b0e; --surf:#12141a; --surf2:#181b24; --surf3:#1e2230;
  --bord:#252a3a; --bord2:#2e3448;
  --txt:#e4e8f4; --txt2:#7a8399; --txt3:#3d4562;
  --acc:#e8a020; --acc-dim:rgba(232,160,32,.13); --acc-glow:rgba(232,160,32,.28); --acc-bord:rgba(232,160,32,.32); --acc-bg:#1c1206;
  --green:#28c76f; --green-bg:rgba(40,199,111,.1); --green-bord:rgba(40,199,111,.3);
  --red:#f05252; --red-bg:rgba(240,82,82,.1); --red-bord:rgba(240,82,82,.3);
  --amber:#f59e0b; --amber-bg:rgba(245,158,11,.1); --amber-bord:rgba(245,158,11,.3);
  --mono:"SF Mono","Fira Code",monospace;
  --r:12px; --r-sm:8px; --r-xs:5px;
  --trans:140ms cubic-bezier(.4,0,.2,1);
  --shadow:0 2px 14px rgba(0,0,0,.5); --shadow-lg:0 4px 28px rgba(0,0,0,.65);
}
[data-theme=light]{
  --bg:#f1f3f8; --surf:#fff; --surf2:#f5f7fc; --surf3:#eef0f8;
  --bord:#dde2ef; --bord2:#cdd3e6;
  --txt:#0e1121; --txt2:#5a6380; --txt3:#9ea8c0;
  --acc:#c47c0a; --acc-dim:rgba(196,124,10,.08); --acc-glow:rgba(196,124,10,.2); --acc-bord:rgba(196,124,10,.28); --acc-bg:#fdf6e8;
  --green:#16a34a; --green-bg:rgba(22,163,74,.08); --green-bord:rgba(22,163,74,.28);
  --red:#dc2626; --red-bg:rgba(220,38,38,.08); --red-bord:rgba(220,38,38,.28);
  --amber:#d97706; --amber-bg:rgba(217,119,6,.08); --amber-bord:rgba(217,119,6,.28);
  --shadow:0 2px 8px rgba(0,0,0,.1); --shadow-lg:0 4px 16px rgba(0,0,0,.15);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;font-size:15px;line-height:1.6;transition:background var(--trans),color var(--trans)}
button{font-family:inherit;cursor:pointer}

/* ── HEADER ──────────────────────────────────────────────── */
.hdr{position:sticky;top:0;z-index:100;background:var(--surf);border-bottom:1px solid var(--bord);box-shadow:var(--shadow)}
.hdr-inner{max-width:860px;margin:0 auto;display:flex;align-items:center;gap:10px;height:62px;padding:0 18px}
.hdr-brand{display:flex;align-items:center;gap:11px;flex:1;min-width:0}
.delta-badge{width:42px;height:42px;border-radius:10px;background:var(--acc);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:#0a0b0e;flex-shrink:0;letter-spacing:-.02em;box-shadow:0 2px 10px var(--acc-glow)}
.hdr-name{font-weight:800;font-size:16.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.01em}
.hdr-date{font-size:12px;color:var(--txt2);margin-top:1px}
.hdr-chips{display:flex;gap:5px;align-items:center;flex-shrink:0}
.chip{border-radius:6px;padding:2px 9px;font-size:12px;font-weight:700}
.chip.g{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bord)}
.chip.r{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bord)}
.chip.n{background:var(--surf2);color:var(--txt2);border:1px solid var(--bord)}
.chip.t{background:var(--acc-dim);color:var(--acc);border:1px solid var(--acc-bord)}
.hdr-timer-wrap{display:flex;align-items:center;gap:6px;flex-shrink:0;background:var(--surf2);border:1px solid var(--bord);border-radius:8px;padding:5px 10px}
.hdr-timer-wrap.hidden{display:none!important}
.hdr-timer-wrap svg.clock-ic{width:17px;height:17px;color:var(--acc);flex-shrink:0}
.hdr-timer-txt{font-size:15px;font-weight:700;color:var(--txt);font-variant-numeric:tabular-nums;min-width:38px}
#btn-pause{background:transparent;border:none;cursor:pointer;padding:0 2px;font-size:14px;color:var(--txt2);line-height:1;transition:color var(--trans)}
#btn-pause:hover{color:var(--acc)}
#btn-pause.paused{color:var(--acc)}
/* Overlay de pausa */
#pause-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.72);backdrop-filter:blur(6px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px}
#pause-overlay.hidden{display:none!important}
.pause-card{background:var(--surf1);border:1px solid var(--bord);border-radius:16px;padding:40px 56px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:14px}
.pause-icon{font-size:48px;line-height:1}
.pause-title{font-size:22px;font-weight:700;color:var(--txt)}
.pause-sub{font-size:14px;color:var(--txt2)}
.pause-resume{background:var(--acc);color:#000;border:none;border-radius:10px;padding:13px 36px;font-size:16px;font-weight:700;cursor:pointer;transition:opacity var(--trans)}
.pause-resume:hover{opacity:.85}
.hdr-actions{display:flex;gap:3px;flex-shrink:0}
.icon-btn{background:var(--surf2);border:1px solid var(--bord);color:var(--txt2);border-radius:7px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all var(--trans)}
.icon-btn:hover{background:var(--acc-dim);border-color:var(--acc-bord);color:var(--acc)}
.prog-rail{height:2px;background:var(--surf3)}
.prog-fill{height:2px;background:var(--acc);transition:width .4s}

/* ── COVER ───────────────────────────────────────────────── */
.cover{max-width:580px;margin:0 auto;padding:48px 18px 80px;text-align:center;animation:fadeIn .4s ease}
.cover-kicker{font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--acc);font-weight:700;margin-bottom:16px}
.cover h1{font-size:clamp(32px,5vw,48px);font-weight:800;font-style:italic;margin-bottom:14px;line-height:1.1}
.cover-lead{font-size:16px;color:var(--txt2);margin-bottom:32px;line-height:1.5}
.cover-card{background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);padding:24px;text-align:left;box-shadow:var(--shadow)}
.meta-grid{display:grid;grid-template-columns:auto 1fr;gap:7px 18px;font-size:13.5px;margin-bottom:18px}
.meta-grid dt{color:var(--txt3);font-size:11px;letter-spacing:.08em;text-transform:uppercase;align-self:center}
.meta-grid dd{color:var(--txt);margin:0;font-weight:500}
.cover-note{font-size:13.5px;color:var(--txt2);font-style:italic;padding:12px 14px;background:var(--surf2);border-left:3px solid var(--acc-bord);border-radius:0 var(--r-xs) var(--r-xs) 0;margin-bottom:22px;line-height:1.5}
.cover-actions{display:flex;flex-direction:column;gap:10px}
.cover-countdown{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:18px;flex-wrap:wrap}
.ccd-box{text-align:center;background:var(--surf2);border:1px solid var(--bord2);border-radius:var(--r-sm);padding:10px 16px;min-width:62px}
.ccd-num{font-size:28px;font-weight:900;font-style:italic;line-height:1;color:var(--acc)}
.ccd-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--txt3);margin-top:2px}
.ccd-sep{font-size:22px;font-weight:900;color:var(--bord2);margin-bottom:12px}
.sr-due-nudge{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--red-bg);border:1px solid var(--red-bord);border-radius:var(--r-sm);font-size:13px;color:var(--red);margin-bottom:14px;cursor:pointer;transition:background .15s}
.sr-due-nudge:hover{background:rgba(240,82,82,.18)}
.btn-primary{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 28px;background:var(--acc);color:#0a0b0e;border:none;border-radius:var(--r-sm);font-weight:800;font-size:15px;letter-spacing:.02em;transition:all var(--trans);box-shadow:0 4px 16px var(--acc-glow)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px var(--acc-glow)}
.btn-ghost{background:var(--surf2);border:1px solid var(--bord);color:var(--txt2);padding:10px 20px;border-radius:var(--r-sm);font-size:14px;transition:all var(--trans)}
.btn-ghost:hover{border-color:var(--bord2);color:var(--txt)}

/* ── PROVA TOOLBAR ───────────────────────────────────────── */
.tb{position:sticky;top:54px;z-index:90;background:var(--surf);border-bottom:1px solid var(--bord);backdrop-filter:blur(8px)}
.tb-inner{max-width:860px;margin:0 auto;display:flex;align-items:center;gap:8px;padding:8px 18px;flex-wrap:wrap}
.tb-info{font-size:13px;color:var(--txt2);font-variant-numeric:tabular-nums}
.tb-info b{color:var(--txt)}
.tb-spacer{flex:1}
.tb-btn{background:var(--surf2);border:1px solid var(--bord);border-radius:var(--r-sm);padding:6px 13px;font-size:12.5px;color:var(--txt);transition:all var(--trans);display:inline-flex;align-items:center;gap:6px}
.tb-btn:hover{border-color:var(--bord2);background:var(--surf3)}
.tb-btn.danger{border-color:var(--acc-bord);color:var(--acc);background:var(--acc-dim)}
.tb-btn.danger:hover{background:var(--acc-bg)}
.tb-btn svg{width:12px;height:12px}

/* ── PROVA CONTENT ───────────────────────────────────────── */
#prova-wrap{max-width:860px;margin:0 auto;padding:24px 18px 100px}

/* Discipline header */
.disc-section{margin-bottom:48px}
.disc-hdr{text-align:left;margin:40px 0 16px;background:var(--surf);border-top:3px solid var(--acc);border-bottom:1px solid var(--bord);padding:13px 0 11px;position:relative}
.disc-hdr h3{font-weight:800;font-size:20px;letter-spacing:-.01em;text-transform:none;color:var(--txt);display:flex;align-items:center;gap:10px}

.comando{background:var(--surf2);border:1px solid var(--bord);border-radius:var(--r-sm);padding:12px 16px;font-size:14px;color:var(--txt2);margin-bottom:16px;font-style:italic;line-height:1.5}

/* Question block */
.q-block{border-top:1px solid var(--bord);padding:16px 0;scroll-margin-top:100px}
.q-block:first-of-type{border-top:none;padding-top:4px}
.q-line{display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:start}
.q-tag{display:inline-flex;align-items:center;gap:6px;font-weight:800;font-size:13px;color:var(--acc);flex-shrink:0;padding-top:2px;white-space:nowrap}
.q-tag::before{content:'';width:8px;height:12px;background:var(--acc);clip-path:polygon(0 0,80% 0,100% 50%,80% 100%,0 100%);display:inline-block}
.q-text{font-size:15.5px;line-height:1.65;color:var(--txt)}
.q-text .situacao{display:block;font-style:italic;color:var(--txt2);margin-bottom:8px;padding-left:12px;border-left:2px solid var(--bord2)}
.q-marks{display:flex;gap:6px;flex-shrink:0;padding-top:1px}
.q-mark{width:40px;height:40px;border:1.5px solid var(--bord);border-radius:var(--r-sm);background:var(--surf2);font-weight:800;font-size:14px;color:var(--txt2);display:inline-flex;align-items:center;justify-content:center;transition:all var(--trans)}
.q-mark:hover:not(:disabled){border-color:var(--txt2);color:var(--txt);transform:translateY(-1px)}
.q-mark.sel-c{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.q-mark.sel-e{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.q-mark:disabled{opacity:.5;cursor:default}
/* After gabarito shown, ring correct/wrong */
.q-block.gab-on .q-mark.sel-c.is-right,.q-block.gab-on .q-mark.sel-e.is-right{box-shadow:0 0 0 2px var(--green-bg),0 0 0 3px var(--green)}
.q-block.gab-on .q-mark.sel-c.is-wrong,.q-block.gab-on .q-mark.sel-e.is-wrong{box-shadow:0 0 0 2px var(--red-bg),0 0 0 3px var(--red)}

.q-actions-row{margin-top:10px;padding-left:92px;display:flex;align-items:center;gap:10px}
.q-show-gab{background:transparent;border:1px dashed var(--bord2);border-radius:var(--r-xs);padding:3px 11px;font-size:12px;color:var(--txt3);transition:all var(--trans)}
.q-show-gab:hover{border-style:solid;border-color:var(--acc-bord);color:var(--acc)}
.q-status{font-size:11.5px;color:var(--txt3)}
.q-status .ok{color:var(--green);font-weight:600}
.q-status .er{color:var(--red);font-weight:600}

/* Feedback */
.q-feedback{margin-top:14px;border-radius:var(--r-sm);overflow:hidden;border:1px solid var(--bord);animation:fadeUp .2s ease}
.gab-line{display:flex;align-items:center;gap:8px;padding:9px 14px;background:var(--surf2);border-bottom:1px solid var(--bord);font-size:13px;font-weight:700}
.gab-label{color:var(--txt3);font-size:10px;letter-spacing:.1em;text-transform:uppercase;font-weight:600}
.gab-value{color:var(--txt)}
.gab-badge{margin-left:auto;font-size:11.5px;padding:2px 10px;border-radius:99px;font-weight:700}
.gab-badge.ok{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bord)}
.gab-badge.er{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bord)}
.gab-badge.bk{background:var(--surf3);color:var(--txt3);border:1px solid var(--bord)}

.gab-section{border-top:1px solid var(--bord);background:var(--surf)}
.gab-hdr{display:flex;align-items:center;gap:8px;padding:9px 14px;cursor:pointer;font-size:13px;font-weight:600;background:var(--surf2);border:none;width:100%;text-align:left;color:var(--txt);transition:background var(--trans)}
.gab-hdr:hover{background:var(--surf3)}
.gab-icon{flex-shrink:0}
.gab-lbl{flex:1}
.gab-chev{font-size:11px;color:var(--txt3);transition:transform var(--trans)}
.gab-chev.open{transform:rotate(180deg)}
.gab-body{padding:12px 14px;font-size:14px;line-height:1.7;color:var(--txt2)}
.gab-body.hidden{display:none}
.feynman-text{color:var(--txt);font-size:14.5px;line-height:1.75}
.law-block{font-family:var(--mono);font-size:12px;background:var(--surf2);border:1px solid var(--bord);border-radius:var(--r-xs);padding:11px 13px;white-space:pre-wrap;line-height:1.65;color:var(--txt)}
.copy-btn{display:inline-flex;align-items:center;gap:5px;margin-top:8px;font-size:11.5px;padding:4px 12px;border-radius:5px;border:1px solid var(--bord2);background:var(--surf3);color:var(--txt3);cursor:pointer;transition:all var(--trans);font-family:inherit}
.copy-btn:hover{color:var(--acc);border-color:var(--acc-bord);background:var(--acc-dim)}
.peg-box{display:flex;gap:8px;align-items:flex-start;background:var(--amber-bg);border:1px solid var(--amber-bord);border-radius:var(--r-xs);padding:10px 13px;font-size:13px;color:var(--amber);line-height:1.55}

/* ── TRAP WORDS (Releitura Crítica) ──────────────────────── */
.trap-word{font-weight:800;color:var(--acc);background:var(--acc-dim);border-bottom:2px solid var(--acc);padding:0 3px;border-radius:3px}
.releitura-body{font-size:14.5px;line-height:1.8;color:var(--txt);margin-bottom:10px}
.releitura-body .situacao{display:block;font-style:italic;color:var(--txt2);margin-bottom:8px;padding-left:12px;border-left:2px solid var(--bord2)}
.trap-legend{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--txt3);margin-top:6px;flex-wrap:wrap}
.trap-legend .trap-word{font-size:11.5px;cursor:default}
.trap-found{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;color:var(--acc);font-weight:700}

/* ── AUTOAVALIAÇÃO ────────────────────────────────────────── */
.avaliacao-row{padding:11px 14px;background:var(--surf2);border-top:1px solid var(--bord);display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.avaliacao-lbl{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--txt3);font-weight:600;width:100%;margin-bottom:2px}
.av-btn{border-radius:99px;padding:5px 13px;font-size:12.5px;font-weight:700;border:1.5px solid;cursor:pointer;font-family:inherit;transition:all var(--trans);background:transparent}
.av-btn.dom{border-color:var(--green-bord);color:var(--green)}
.av-btn.dom:hover,.av-btn.dom.sel{background:var(--green-bg);box-shadow:0 0 0 2px var(--green-bord)}
.av-btn.dvd{border-color:var(--amber-bord);color:var(--amber)}
.av-btn.dvd:hover,.av-btn.dvd.sel{background:var(--amber-bg);box-shadow:0 0 0 2px var(--amber-bord)}
.av-btn.lac{border-color:var(--red-bord);color:var(--red)}
.av-btn.lac:hover,.av-btn.lac.sel{background:var(--red-bg);box-shadow:0 0 0 2px var(--red-bord)}
.av-btn.leit{border-color:var(--bord2);color:var(--txt2)}
.av-btn.leit:hover,.av-btn.leit.sel{background:var(--surf3);color:var(--txt);box-shadow:0 0 0 2px var(--bord2)}
.av-set{display:flex;align-items:center;gap:8px;padding:9px 14px;background:var(--surf2);border-top:1px solid var(--bord);font-size:13px}
.av-chip{border-radius:99px;padding:3px 12px;font-size:12px;font-weight:700;border:1.5px solid}
.av-chip.dom{background:var(--green-bg);color:var(--green);border-color:var(--green-bord)}
.av-chip.dvd{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-bord)}
.av-chip.lac{background:var(--red-bg);color:var(--red);border-color:var(--red-bord)}
.av-chip.leit{background:var(--surf3);color:var(--txt2);border-color:var(--bord2)}
.av-change{margin-left:auto;background:transparent;border:1px dashed var(--bord2);border-radius:var(--r-xs);padding:2px 9px;font-size:11.5px;color:var(--txt3);cursor:pointer;font-family:inherit;transition:all var(--trans)}
.av-change:hover{color:var(--acc);border-color:var(--acc-bord)}

/* ── DIAGNÓSTICO (Placar) ─────────────────────────────────── */
.diag-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--bord);border:1px solid var(--bord);border-radius:10px;overflow:hidden;margin-bottom:14px}
@media(max-width:600px){.diag-grid{grid-template-columns:repeat(2,1fr)}}
.diag-cell{background:var(--surf2);padding:14px 10px;text-align:center}
.diag-cell .dn{font-size:26px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums}
.diag-cell .dl{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--txt3);margin-top:5px;font-weight:600;line-height:1.3}
.diag-empty{color:var(--txt3);font-size:14px;font-style:italic;padding:12px 0}

/* ── REVISÃO ──────────────────────────────────────────────── */
#rev-wrap{max-width:860px;margin:0 auto;padding:0 0 100px}
.rev-picker{max-width:580px;margin:0 auto;padding:36px 18px 60px;animation:fadeIn .3s ease}
.rev-picker h2{font-size:clamp(22px,4vw,32px);font-weight:800;font-style:italic;margin-bottom:6px}
.rev-picker .sub{font-size:15px;color:var(--txt2);margin-bottom:28px;line-height:1.5}
.filter-sec-lbl{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--txt3);font-weight:700;margin:22px 0 10px}
.filter-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
@media(max-width:480px){.filter-grid{grid-template-columns:1fr}}
.filter-card{background:var(--surf);border:1.5px solid var(--bord);border-radius:var(--r);padding:15px 16px;text-align:left;cursor:pointer;transition:all var(--trans);font-family:inherit;display:flex;flex-direction:column;gap:3px}
.filter-card:hover:not(:disabled){border-color:var(--acc-bord);background:var(--acc-dim)}
.filter-card.sel{border-color:var(--acc);background:var(--acc-dim);box-shadow:0 0 0 1.5px var(--acc)}
.filter-card:disabled{opacity:.35;cursor:not-allowed;pointer-events:none}
.fc-icon{font-size:20px}
.fc-count{font-size:28px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums}
.fc-count.cr{color:var(--red)}.fc-count.ca{color:var(--amber)}.fc-count.cg{color:var(--green)}.fc-count.ct{color:var(--txt)}
.fc-label{font-size:12px;color:var(--txt2);font-weight:600}
.disc-filter-row{display:flex;flex-wrap:wrap;gap:7px}
.disc-btn{background:var(--surf2);border:1.5px solid var(--bord);border-radius:99px;padding:5px 14px;font-size:13px;font-family:inherit;color:var(--txt2);cursor:pointer;transition:all var(--trans);font-weight:500}
.disc-btn:hover{border-color:var(--acc-bord);color:var(--acc)}
.disc-btn.sel{border-color:var(--acc);color:var(--acc);background:var(--acc-dim)}
.mode-box{background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);overflow:hidden;margin-bottom:24px}
.mode-tabs{display:grid;grid-template-columns:1fr 1fr}
.mode-tab{border:none;background:var(--surf2);color:var(--txt2);font-size:14px;font-weight:700;padding:12px 8px;cursor:pointer;font-family:inherit;border-bottom:2px solid transparent;transition:all var(--trans);display:flex;align-items:center;justify-content:center;gap:6px}
.mode-tab:first-child{border-right:1px solid var(--bord)}
.mode-tab.active{background:var(--surf);color:var(--acc);border-bottom-color:var(--acc)}
.mode-desc-txt{font-size:13px;color:var(--txt2);padding:11px 14px;line-height:1.55;border-top:1px solid var(--bord)}
.rev-tb{position:sticky;top:54px;z-index:90;background:var(--surf);border-bottom:1px solid var(--bord)}
.rev-tb-inner{max-width:860px;margin:0 auto;display:flex;align-items:center;gap:8px;padding:7px 18px;flex-wrap:wrap}
.rev-badge{background:var(--acc-dim);border:1px solid var(--acc-bord);color:var(--acc);border-radius:99px;padding:3px 12px;font-size:12px;font-weight:700;flex-shrink:0}
.rev-orig{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;padding:2px 9px;border-radius:99px;font-weight:600;flex-shrink:0}
.rev-orig.ok{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bord)}
.rev-orig.er{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bord)}
.rev-orig.bk{background:var(--surf3);color:var(--txt3);border:1px solid var(--bord)}
.rev-placar-wrap{max-width:580px;margin:0 auto;padding:32px 18px 100px;animation:fadeUp .4s ease}

/* ── ESPAÇAMENTO INTELIGENTE ──────────────────────────────── */
.sr-badge{display:inline-flex;align-items:center;gap:3px;font-size:10.5px;font-weight:700;border-radius:4px;padding:2px 7px;line-height:1.4;white-space:nowrap}
.sr-badge.due{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bord)}
.sr-badge.soon{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bord)}
.sr-badge.ok{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bord)}
.sr-queue-section{margin-bottom:20px}
.sr-queue-hdr{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--red);font-weight:700;margin-bottom:10px}
.sr-queue-row{display:flex;align-items:center;gap:10px;padding:9px 14px;border-radius:var(--r-sm);background:var(--surf);border:1.5px solid var(--red-bord);margin-bottom:7px;cursor:default;transition:background .15s}
.sr-queue-date{font-size:11px;color:var(--txt3);min-width:52px}
.sr-queue-title{flex:1;font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sr-queue-pct{font-size:13px;font-weight:700;min-width:38px;text-align:right}
.sr-interval-info{font-size:11px;color:var(--txt3);margin-top:4px}
/* ── MODO FOCO ────────────────────────────────────────────── */
#sec-foco{position:fixed;inset:0;z-index:150;background:var(--bg);overflow-y:auto;display:flex;flex-direction:column}
#sec-foco.hidden{display:none!important}
.foco-hdr{position:sticky;top:0;z-index:10;background:var(--bg);border-bottom:1px solid var(--bord2);padding:10px 18px;display:flex;align-items:center;gap:12px}
.foco-qnum{font-size:13px;font-weight:700;color:var(--txt2);white-space:nowrap}
.foco-disc{font-size:11.5px;color:var(--txt3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0}
.foco-prog-wrap{display:flex;align-items:center;gap:8px;min-width:110px}
.foco-progress{height:4px;background:var(--bord);border-radius:2px;flex:1}
.foco-prog-fill{height:100%;background:var(--acc);border-radius:2px;transition:width .4s}
.foco-pct{font-size:11px;font-weight:700;color:var(--acc);min-width:28px;text-align:right}
.foco-body{flex:1;max-width:800px;margin:0 auto;padding:28px 20px 16px;width:100%;animation:fadeIn .2s ease}
.foco-body .q-block{border-color:var(--bord2)}
.foco-body .q-text{font-size:16px;line-height:1.8}
.foco-body .q-tag{font-size:14px;width:42px;height:42px;line-height:42px}
.foco-body .q-mark{height:52px;font-size:17px;font-weight:900;min-width:80px}
.foco-body .q-marks{gap:14px}
.foco-nav{max-width:800px;margin:0 auto 40px;padding:0 20px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.foco-nav-hint{font-size:11px;color:var(--txt3);text-align:center;line-height:1.6}
/* ── QUESTION TIMER ──────────────────────────────────────── */
.qt-badge{display:inline-flex;align-items:center;gap:3px;font-size:10.5px;font-weight:700;border-radius:4px;padding:2px 7px;font-variant-numeric:tabular-nums;letter-spacing:.02em;transition:background .35s,color .35s,border-color .35s;min-width:36px;justify-content:center}
.qt-idle{color:var(--txt3);background:transparent}
.qt-normal{background:var(--surf3);color:var(--txt2)}
.qt-warn{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bord)}
.qt-alert{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bord);animation:qtPulse 1s ease-in-out infinite}
.qt-done{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bord)}
@keyframes qtPulse{0%,100%{opacity:1}50%{opacity:.5}}
#qt-pill{position:fixed;bottom:62px;left:50%;transform:translateX(-50%);max-width:860px;width:calc(100% - 32px);z-index:80;pointer-events:none;display:flex;justify-content:flex-end}
.qt-active-pill{background:var(--surf2);border:1px solid var(--bord2);border-radius:20px;padding:5px 14px;font-size:12px;font-weight:700;color:var(--txt2);display:flex;align-items:center;gap:7px;box-shadow:0 2px 12px rgba(0,0,0,.35)}
.qt-active-pill.qt-warn-p{color:var(--amber)}
.qt-active-pill.qt-alert-p{color:var(--red);animation:qtPulse 1s ease-in-out infinite}
/* ── HISTÓRICO ────────────────────────────────────────────── */
#hist-wrap{max-width:860px;margin:0 auto;padding:24px 18px 100px;animation:fadeUp .4s ease}
.hist-header{display:grid;grid-template-columns:62px 72px 50px 68px 60px 1fr 80px;gap:8px;padding:7px 0;border-bottom:2px solid var(--bord);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--txt3);font-weight:700}
.hist-row{display:grid;grid-template-columns:62px 72px 50px 68px 60px 1fr 80px;gap:8px;padding:10px 0;border-top:1px solid var(--bord);font-size:13.5px;align-items:center}
.hist-row:first-child{border-top:none}
.hist-date{color:var(--txt2);font-size:12.5px;font-variant-numeric:tabular-nums;font-weight:600}
.hist-acertos{color:var(--txt);font-variant-numeric:tabular-nums}
.hist-pct{font-weight:800;font-variant-numeric:tabular-nums}
.hist-tempo{color:var(--txt3);font-size:12px;font-variant-numeric:tabular-nums}
.hist-saldo{font-weight:700;font-variant-numeric:tabular-nums}
.hist-av{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.hist-empty{text-align:center;padding:60px 20px}
.hist-empty .hist-emoji{font-size:52px;margin-bottom:18px}
.hist-empty h2{font-size:22px;font-weight:800;margin-bottom:10px}
.hist-empty p{color:var(--txt2);font-size:15px;max-width:340px;margin:0 auto 28px}
.streak-badge{display:inline-flex;align-items:center;gap:5px;background:var(--amber-bg);border:1px solid var(--amber-bord);color:var(--amber);border-radius:99px;padding:3px 12px;font-size:13px;font-weight:700;margin-left:8px}
@media(max-width:600px){
  .hist-header,.hist-row{grid-template-columns:55px 62px 46px 1fr}
  .hist-tempo,.hist-av{display:none}
}

/* ── PLACAR ──────────────────────────────────────────────── */
#placar-wrap{max-width:860px;margin:0 auto;padding:24px 18px 100px;animation:fadeUp .4s ease}
.placar-hero{background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);padding:32px 28px;box-shadow:var(--shadow);margin-bottom:20px;text-align:center}
.placar-kicker{font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--acc);font-weight:700;margin-bottom:14px}
.placar-hero h2{font-size:clamp(28px,4.5vw,40px);font-weight:800;font-style:italic;margin-bottom:8px}
.placar-lead{font-size:15px;color:var(--txt2);margin-bottom:24px}
.placar-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--bord);border:1px solid var(--bord);border-radius:10px;overflow:hidden}
@media(max-width:600px){.placar-stats{grid-template-columns:repeat(2,1fr)}}
.p-stat{background:var(--surf2);padding:16px 10px;text-align:center}
.p-stat .n{font-weight:800;font-size:30px;line-height:1;font-variant-numeric:tabular-nums}
.p-stat .n.g{color:var(--green)}.p-stat .n.r{color:var(--red)}.p-stat .n.a{color:var(--acc)}.p-stat .n.t{color:var(--txt)}
.p-stat .l{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--txt3);margin-top:5px;font-weight:600}

.pl-box{background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);padding:22px;margin-bottom:20px;box-shadow:var(--shadow)}
.pl-title{font-weight:700;font-size:16px;margin-bottom:16px;color:var(--txt)}
.cebraspe-formula{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:14px 16px;background:var(--surf2);border-radius:var(--r-sm);margin-bottom:14px;font-size:14px;border:1px solid var(--bord)}
.cebraspe-formula .part{color:var(--txt2)}
.cebraspe-formula .part b{color:var(--txt);font-weight:700}
.cebraspe-formula .eq{font-weight:800;font-size:20px;color:var(--acc);font-variant-numeric:tabular-nums}
.cebraspe-verdict{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:var(--r-sm);font-weight:700;font-size:14px;border:1px solid}
.cebraspe-verdict.approved{background:var(--green-bg);color:var(--green);border-color:var(--green-bord)}
.cebraspe-verdict.reproved{background:var(--red-bg);color:var(--red);border-color:var(--red-bord)}

/* Discipline chart */
.disc-chart-row{display:grid;grid-template-columns:1.4fr 2.5fr auto auto;gap:12px;align-items:center;padding:9px 0;border-top:1px solid var(--bord);font-size:13.5px}
.disc-chart-row:first-of-type{border-top:none}
.disc-chart-row .nm{color:var(--txt);font-weight:500}
.bar-rail{height:9px;background:var(--surf2);border-radius:99px;overflow:hidden;border:1px solid var(--bord)}
.bar-fill{height:100%;border-radius:99px;transition:width .6s}
.disc-chart-row .frac{color:var(--txt3);font-size:12px;font-variant-numeric:tabular-nums}
.disc-chart-row .pct{font-weight:700;font-size:13px;min-width:40px;text-align:right;font-variant-numeric:tabular-nums}
@media(max-width:600px){.disc-chart-row{grid-template-columns:1fr auto;gap:5px 12px}.bar-rail{grid-column:1/-1;order:3}.disc-chart-row .frac{order:4}}

/* Errors list */
.err-item{border-top:1px solid var(--bord);padding:12px 0}
.err-item:first-child{border-top:none}
.err-row{display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:start;font-size:13.5px}
.err-num{font-weight:800;color:var(--red);font-variant-numeric:tabular-nums;min-width:32px;padding-top:2px}
.err-sub{color:var(--txt);line-height:1.4}
.err-sub small{display:block;color:var(--txt3);font-size:11.5px;margin-top:2px}
.err-toggle{background:var(--surf2);border:1px solid var(--bord);border-radius:var(--r-xs);padding:4px 12px;font-size:12px;color:var(--txt2);transition:all var(--trans);font-family:inherit;white-space:nowrap;display:inline-flex;align-items:center;gap:5px}
.err-toggle:hover{border-color:var(--acc-bord);color:var(--acc);background:var(--acc-dim)}
.err-toggle.open{border-color:var(--acc-bord);color:var(--acc);background:var(--acc-dim)}
.err-gab{display:none;margin-top:12px;border-radius:var(--r-sm);overflow:hidden;border:1px solid var(--bord)}
.err-gab.open{display:block;animation:fadeUp .2s ease}
.placar-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:24px}

/* ── FAB NAV ─────────────────────────────────────────────── */
.fab{position:fixed;right:20px;bottom:72px;width:46px;height:46px;background:var(--acc);color:#0a0b0e;border:none;border-radius:50%;box-shadow:0 4px 16px var(--acc-glow);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;z-index:44;transition:all var(--trans)}
.fab:hover{transform:scale(1.08)}
.fab.hidden{display:none}
.quick-nav{position:fixed;right:20px;bottom:124px;width:auto;min-width:240px;background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);padding:12px;box-shadow:var(--shadow-lg);z-index:45;max-width:320px;max-height:55vh;overflow-y:auto;display:none}
.quick-nav.open{display:block;animation:fadeUp .2s ease}
.qn-title{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--txt3);margin-bottom:8px;font-weight:600}
.qn-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:4px}
.qn-btn{width:30px;height:30px;border:1px solid var(--bord);background:var(--surf2);border-radius:6px;font-size:10.5px;font-weight:700;color:var(--txt3);transition:all .1s;font-variant-numeric:tabular-nums}
.qn-btn:hover{border-color:var(--acc-bord);color:var(--acc);transform:scale(1.08)}
.qn-btn.ac{background:var(--green-bg);border-color:var(--green-bord);color:var(--green)}
.qn-btn.ae{background:var(--red-bg);border-color:var(--red-bord);color:var(--red)}
.qn-btn.gs{border-style:dashed}
.qn-btn.qa{box-shadow:0 0 0 2px var(--red);animation:qtPulse 1.2s ease-in-out infinite}
@keyframes qFlash{0%{box-shadow:0 0 0 3px var(--acc-glow),0 0 18px var(--acc-glow)}60%{box-shadow:0 0 0 2px var(--acc-bord)}100%{box-shadow:none}}
.q-kb-flash{animation:qFlash .55s ease-out}

/* ── PROGRESS BAR (bottom fixed) ─────────────────────────── */
.bot-bar{position:fixed;bottom:0;left:0;right:0;background:var(--surf);border-top:1px solid var(--bord);padding:8px 18px;display:flex;align-items:center;gap:12px;z-index:40;font-size:12px;color:var(--txt2)}
.bot-bar.hidden{transform:translateY(100%);opacity:0;pointer-events:none}
.bot-bar .bbar{flex:1;height:6px;background:var(--surf3);border-radius:99px;overflow:hidden}
.bot-bar .bbar-fill{height:100%;background:var(--acc);transition:width .4s;border-radius:99px}
.bot-bar .bstats{display:flex;gap:10px;flex-shrink:0;font-variant-numeric:tabular-nums}
.bot-bar .bstats .ok{color:var(--green);font-weight:600}.bot-bar .bstats .er{color:var(--red);font-weight:600}

/* ── MODAL ───────────────────────────────────────────────── */
.modal-ov{position:fixed;inset:0;background:rgba(8,9,14,.65);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;padding:18px;animation:fadeIn .2s ease}
.modal{background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);padding:26px;max-width:420px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.5);animation:fadeUp .2s ease}
.modal h3{font-size:19px;font-weight:800;margin-bottom:10px}
.modal p{color:var(--txt2);margin-bottom:20px;font-size:14px;line-height:1.55}
.modal-acts{display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap}
.btn-danger{background:var(--red);color:white;border:none;border-radius:var(--r-sm);padding:9px 18px;font-family:inherit;font-weight:700;font-size:14px;transition:opacity var(--trans)}
.btn-danger:hover{opacity:.88}
.btn-warn{background:var(--amber);color:white;border:none;border-radius:var(--r-sm);padding:9px 18px;font-family:inherit;font-weight:700;font-size:14px;transition:opacity var(--trans)}
.btn-warn:hover{opacity:.88}

/* ── TOAST ───────────────────────────────────────────────── */
.toast{position:fixed;bottom:56px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--surf);border:1px solid var(--bord);color:var(--txt);padding:11px 18px;border-radius:var(--r-sm);font-size:13.5px;z-index:300;opacity:0;transition:opacity .25s,transform .25s;box-shadow:var(--shadow-lg);pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── ANIMATIONS ──────────────────────────────────────────── */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.hidden{display:none!important}

/* ── RESPONSIVE ──────────────────────────────────────────── */
@media(max-width:640px){
  .hdr-inner{padding:0 12px}.hdr-chips{gap:4px}
  .chip{padding:2px 7px;font-size:11px}
  #prova-wrap,#placar-wrap{padding:16px 12px 100px}
  .q-text{font-size:14.5px}
  .prova-title h2{font-size:16px}
  .placar-stats{grid-template-columns:repeat(2,1fr)}
  .q-actions-row{padding-left:0;flex-wrap:wrap}
}
</style>
</head>
<body>

<!-- ══ HEADER ════════════════════════════════════════════ -->
<header class="hdr" id="hdr">
  <div class="hdr-inner">
    <div class="hdr-brand">
      <div class="delta-badge">Δ</div>
      <div>
        <div class="hdr-name">PCDF · Delegado 2026</div>
        <div class="hdr-date" id="hdr-date"></div>
      </div>
    </div>
    <div class="hdr-timer-wrap hidden" id="hdr-timer">
      <svg class="clock-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
      </svg>
      <span class="hdr-timer-txt" id="hdr-timer-txt">0:00</span>
      <button id="btn-pause" title="Pausar / retomar" onclick="togglePause()">⏸</button>
    </div>
    <div class="hdr-chips" id="hdr-chips" style="display:none">
      <span class="chip g" id="c-ok">✓ 0</span>
      <span class="chip r" id="c-er">✗ 0</span>
      <span class="chip n" id="c-tot">0/10</span>
    </div>
    <div class="hdr-actions">
      <button class="icon-btn" id="btn-hist" title="Histórico de estudo">📊</button>
      <button class="icon-btn" id="btn-theme" title="Tema">☀</button>
      <button class="icon-btn hidden" id="btn-gab-all" title="Revelar/ocultar todos os gabaritos">👁</button>
      <button class="icon-btn" id="btn-export" title="Exportar progresso">⬆</button>
      <button class="icon-btn" id="btn-import-bloco" title="Importar bloco JSON">📂</button>
      <button class="icon-btn" id="btn-import-prog" title="Importar progresso">📥</button>
      <button class="icon-btn" id="btn-reset" title="Reiniciar">↺</button>
    </div>
  </div>
  <div class="prog-rail"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
</header>

<!-- ══ PAUSE OVERLAY ═════════════════════════════════════ -->
<div id="pause-overlay" class="hidden">
  <div class="pause-card">
    <div class="pause-icon">⏸</div>
    <div class="pause-title">Prova pausada</div>
    <div class="pause-sub">O cronômetro está parado.<br>Retome quando estiver pronto.</div>
    <button class="pause-resume" onclick="togglePause()">▶ Retomar prova</button>
  </div>
</div>

<!-- ══ SECTIONS ══════════════════════════════════════════ -->
<main>
  <section id="sec-cover"></section>

  <div id="sec-prova" class="hidden">
    <!-- Toolbar -->
    <div class="tb" id="prova-tb">
      <div class="tb-inner">
        <span class="tb-info"><b id="tb-ans">0</b> respondidas &nbsp;|&nbsp; <b id="tb-blank">10</b> em branco</span>
        <span class="tb-spacer"></span>
        <button class="tb-btn" id="tb-gab-all">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="3"/><path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7-10-7-10-7z"/></svg>
          Gabaritos
        </button>
        <button class="tb-btn" id="tb-revisao" onclick="showRevisaoPicker()">
          🔍 Revisão
        </button>
        <button class="tb-btn" id="tb-foco" onclick="enterFoco()">
          🎯 Foco
        </button>
        <button class="tb-btn danger" id="tb-finish">
          Encerrar prova →

<script>
/* ═══════════════════════════════════════════════════════════
   DATA — inject_bloco.py substitui entre ==INJECT:START== e ==INJECT:END==
   ═══════════════════════════════════════════════════════════ */
/* ==INJECT:START== */
const DEFAULT_BLOCO = {"meta":{"id":"2026-06-27","titulo":"Bloco Diário — Psicopatologia Forense | RCP/Heimlich | Vitimologia | Prescrição/Decadência","data":"2026-06-27","totalQuestoes":120,"fase":"Fase 2 — Reta Final (comentários enxutos)","concurso":"Delegado PCDF 2026","edital":"Edital nº 1, de 3/2/2026","observacao":"Calibragem: 20% diretos / 45% médios / 35% difíceis. ~40 itens com campo peg."},"disciplinas":[{"nome":"Direito Penal e Legislação Penal Especial","comando":"Acerca dos institutos de direito penal e da legislação penal especial aplicáveis ao cargo de Delegado de Polícia do DF, julgue os itens a seguir.","itens":[{"n":1,"enun":"O crime doloso de homicídio qualificado (art. 121, §2º, do CP) é compatível com a forma tentada, desde que o agente não tenha consumado o resultado morte por circunstâncias alheias à sua vontade.","gab":"CERTO","com":"O homicídio qualificado admite tentativa; o CP reconhece a tentativa quando o crime não se consuma por circunstâncias alheias à vontade do agente (art. 14, II). A qualificadora incide na tentativa da mesma forma que na consumação.","fund":"LEI: Art. 14, II, CP: 'tentado, quando, iniciada a execução, não se consuma por circunstâncias alheias à vontade do agente'. Art. 121, §2º, CP: qualificadoras do homicídio doloso."},{"n":2,"enun":"O arrependimento posterior (art. 16 do CP) pode ser aplicado nos crimes cometidos com violência ou grave ameaça à pessoa, desde que a reparação do dano à vítima ocorra voluntariamente e antes do recebimento da denúncia.","gab":"ERRADO","com":"O arrependimento posterior exige que o crime não tenha sido cometido com violência ou grave ameaça à pessoa. Em crimes violentos, é inadmissível, independentemente da reparação do dano.","fund":"LEI: Art. 16, CP: 'Nos crimes cometidos sem violência ou grave ameaça à pessoa, reparado o dano [...].'","peg":"Não há exceção para crimes violentos — a vedação é absoluta no art. 16 CP."},{"n":3,"enun":"Conforme a jurisprudência consolidada do STF, a entrada forçada em domicílio sem mandado judicial somente é lícita quando amparada por fundadas razões, devidamente justificadas a posteriori.","gab":"CERTO","com":"O STF, no RE 603.616/RO (Tema 280, Pleno, j. 05/11/2015), fixou que a entrada forçada sem mandado é lícita quando há fundadas razões, mas exige justificativa a posteriori. A mera denúncia anônima desacompanhada de diligências não basta.","fund":"JURISPRUDÊNCIA: STF, RE 603.616/RO, Gilmar Mendes, Pleno, j. 05/11/2015 (Tema 280): 'A entrada forçada em domicílio sem mandado judicial só é lícita, mesmo em período noturno, quando amparada em fundadas razões, devidamente justificadas a posteriori.'","jur_status":"OK"},{"n":4,"enun":"Na teoria finalista, adotada pelo Código Penal brasileiro, o dolo e a culpa integram a conduta como elementos do fato típico, não sendo analisados na culpabilidade.","gab":"CERTO","com":"O finalismo welzeliano, adotado pelo CP de 1940 (Reforma de 1984), transferiu o dolo e a culpa da culpabilidade para o fato típico (conduta). Na culpabilidade, analisa-se a imputabilidade, a potencial consciência da ilicitude e a exigibilidade de conduta diversa.","fund":"LEI: Art. 18, CP: dolo e culpa como elementos da conduta. Art. 26 a 28, CP: culpabilidade. Doutrina: adoção do finalismo pela Reforma Penal de 1984 (Exposição de Motivos da Lei 7.209/84)."},{"n":5,"enun":"O crime permanente, quando em execução ao tempo da entrada em vigor de lei mais grave, sujeita-se à aplicação desta, ainda que a conduta tenha se iniciado sob a vigência da lei anterior mais benéfica.","gab":"CERTO","com":"A Súmula 711 do STF é expressa: a lei penal mais grave aplica-se ao crime permanente ou continuado se sua vigência é anterior à cessação da permanência ou continuidade. A lei alcança apenas o segmento da conduta sob sua vigência.","fund":"JURISPRUDÊNCIA: Súmula 711/STF: 'A lei penal mais grave aplica-se ao crime continuado ou ao crime permanente, se a sua vigência é anterior à cessação da continuidade ou da permanência.'"},{"n":6,"enun":"A legítima defesa putativa, em que o agente imagina erroneamente estar sendo agredido, exclui a culpabilidade do agente em qualquer circunstância, ainda que o erro seja evitável.","gab":"ERRADO","com":"Na legítima defesa putativa, aplica-se o regime do erro de tipo (se incide sobre elementos fáticos da excludente) ou do erro de proibição. Se o erro é evitável (vencível), não exclui a culpabilidade — apenas a reduz. Só o erro invencível exclui totalmente.","fund":"LEI: Art. 20, §1º, CP: erro sobre excludentes reais — se evitável, responde por crime culposo; art. 21, CP: erro de proibição — se escusável, exclui culpabilidade; se inescusável, diminui a pena.","peg":"A putatividade exclui culpabilidade apenas se o erro for invencível. Erro evitável reduz, mas não exclui."},{"n":7,"enun":"O agente que pratica o crime de porte ilegal de arma de fogo (art. 14 da Lei 10.826/2003) em situação de flagrante não pode ser autuado nessa circunstância se a arma de fogo estiver desmuniciada.","gab":"ERRADO","com":"O STJ e o STF pacificaram que o porte de arma desmuniciada configura o crime do art. 14 do Estatuto do Desarmamento (Lei 10.826/03). A potencialidade lesiva não é exigida para a consumação do tipo penal de perigo abstrato.","fund":"LEI: Art. 14, Lei 10.826/03: porte ilegal de arma de fogo — crime de perigo abstrato; a munição não é elementar do tipo. JURISPRUDÊNCIA: STJ, Súmula 513 (extrapolação — verificar). Posição consolidada: arma desmuniciada configura o crime.","peg":"O tipo do art. 14 é de perigo abstrato: não exige arma municiada nem capacidade de disparar imediata."},{"n":8,"enun":"O crime de abuso de autoridade previsto na Lei 13.869/2019 exige, para sua configuração, que o agente atue com a finalidade específica de prejudicar outrem ou beneficiar a si próprio ou a terceiro, ou ainda por mero capricho ou satisfação pessoal.","gab":"CERTO","com":"A Lei 13.869/19 exige elemento subjetivo especial (dolo específico): o agente deve ter finalidade de prejudicar outrem, beneficiar a si ou terceiro, ou agir por capricho/satisfação pessoal. Sem esse especial fim de agir, o fato é atípico.","fund":"LEI: Art. 1º, §1º, Lei 13.869/2019: 'As condutas descritas nesta Lei são dolosas e com a finalidade específica de prejudicar outrem ou beneficiar a si mesmo ou a terceiro, ou, ainda, por mero capricho ou satisfação pessoal.'"},{"n":9,"enun":"Na hipótese de crime continuado (art. 71 do CP), aplica-se a pena do crime mais grave, aumentada de um sexto a dois terços, podendo o juiz aumentar a pena até o triplo se a continuação for entre crimes dolosos, com vítimas diferentes, e contra vítimas vulneráveis.","gab":"CERTO","com":"O art. 71, parágrafo único, do CP prevê o crime continuado específico: quando os crimes dolosos atingem vítimas diferentes, com grave violência, ou contra pessoa maior de 60 anos, criança ou vulnerável, o aumento pode chegar ao triplo.","fund":"LEI: Art. 71, CP: crime continuado — pena do mais grave aumentada de 1/6 a 2/3. Parágrafo único: nas condições especiais, até o triplo — limitada ao que resultaria pelo concurso material."},{"n":10,"enun":"A emoção e a paixão, de acordo com o art. 28 do CP, constituem causas de exclusão da imputabilidade quando de intensidade suficiente para comprometer totalmente a capacidade de autodeterminação do agente.","gab":"ERRADO","com":"O art. 28 do CP é expresso: a emoção e a paixão não excluem a imputabilidade. Somente estados psicopatológicos clinicamente diagnosticáveis (doença mental), enquadráveis no art. 26, podem excluir ou reduzir a culpabilidade.","fund":"LEI: Art. 28, CP: 'Não excluem a imputabilidade penal: I — a emoção ou a paixão; II — a embriaguez voluntária ou culposa pelo álcool ou substância de efeito análogo.'","peg":"A banca explora a tese de que emoção intensa excluiria a imputabilidade — o CP é taxativo em sentido contrário."},{"n":11,"enun":"No crime de roubo majorado pelo emprego de arma de fogo (art. 157, §2º-A, I, do CP), o reconhecimento da majorante independe de apreensão ou perícia da arma, desde que haja outros elementos de prova que atestem o seu uso.","gab":"CERTO","com":"O STJ consolidou que a majorante do uso de arma de fogo no roubo pode ser comprovada por outros meios (testemunho da vítima, por exemplo), sem necessidade de apreensão e perícia. A periculosidade é pressuposta.","fund":"LEI: Art. 157, §2º-A, I, CP: causa de aumento de pena pelo uso de arma de fogo. JURISPRUDÊNCIA: STJ, posição consolidada — ausência de apreensão não impede o reconhecimento da majorante se outros elementos probatórios a confirmam."},{"n":12,"enun":"O delito de receptação dolosa qualificada (art. 180, §1º, do CP) pode ser praticado somente por comerciante ou industrial, exigindo habitualidade na conduta.","gab":"ERRADO","com":"A receptação qualificada do art. 180, §1º, CP é aquela praticada por comerciante ou industrial e prescinde de habitualidade — a simples qualidade de comerciante/industrial já qualifica o crime. A habitualidade é irrelevante para o tipo.","fund":"LEI: Art. 180, §1º, CP: 'Adquirir, receber, transportar, conduzir, ocultar, ter em depósito, desmontar, montar, remontar, vender, expor à venda, ou de qualquer forma utilizar, em proveito próprio ou alheio, no exercício de atividade comercial ou industrial, coisa que deve saber ser produto de crime.'"},{"n":13,"enun":"De acordo com a teoria da imputação objetiva, a criação de um risco não permitido e sua realização no resultado típico são pressupostos para que se possa atribuir objetivamente o resultado ao agente.","gab":"CERTO","com":"A teoria da imputação objetiva (Roxin) exige: (a) criação de risco juridicamente desaprovado; (b) realização desse risco no resultado concreto; (c) que o resultado esteja dentro do âmbito de proteção da norma. Riscos permitidos excluem a imputação.","fund":"LEI: Art. 13, CP (nexo de causalidade) — a imputação objetiva é complemento à teoria da equivalência dos antecedentes. Doutrina majoritária (Roxin, Jakobs) aplicada subsidiariamente pelo STJ."},{"n":14,"enun":"O tráfico privilegiado de drogas (art. 33, §4º, da Lei 11.343/2006) não é equiparado a crime hediondo, conforme entendimento consolidado do Supremo Tribunal Federal.","gab":"CERTO","com":"O STF, no HC 118.533/MS (Pleno, j. 23/06/2016), fixou que o tráfico privilegiado (art. 33, §4º, Lei 11.343/06) não constitui crime hediondo nem equiparado, por ser modalidade menos grave. O tráfico simples (caput) e o tráfico majorado são equiparados a hediondo.","fund":"JURISPRUDÊNCIA: STF, HC 118.533/MS, Min. Carmen Lúcia, Pleno, j. 23/06/2016: tráfico privilegiado não é hediondo. Posição confirmada como vinculante ao STJ.","jur_status":"PENDENTE"},{"n":15,"enun":"Na associação para o tráfico de drogas (art. 35 da Lei 11.343/2006), exige-se que a reunião de pessoas seja para o fim de praticar reiteradamente crimes de tráfico, sendo atípica a associação para prática de um único ato.","gab":"CERTO","com":"A associação para o tráfico exige estabilidade e permanência na reunião, não bastando a mera coautoria eventual. A jurisprudência distingue a associação (estável) da coautoria eventual (que configura apenas concurso de pessoas no art. 33).","fund":"LEI: Art. 35, Lei 11.343/2006: 'Associarem-se duas ou mais pessoas para o fim de praticar, reiteradamente ou não, qualquer dos crimes previstos nos arts. 33, caput e §1º, e 34 desta Lei.' Obs.: o texto da lei diz 'reiteradamente ou não', mas a jurisprudência exige estabilidade/permanência.","peg":"Atenção: o texto do art. 35 diz 'reiteradamente ou não', mas a doutrina e STJ exigem estabilidade do vínculo associativo — não se confunde com mera coautoria."},{"n":16,"enun":"Nos crimes de tortura previstos na Lei 9.455/1997, admite-se a modalidade culposa, diferentemente do que ocorre nos crimes de abuso de autoridade da Lei 13.869/2019.","gab":"ERRADO","com":"A Lei 9.455/97 (Tortura) prevê apenas crimes dolosos, com exceção do art. 1º, §2º, que pune o omitente por culpa. A Lei 13.869/19 (Abuso de Autoridade) exige dolo com finalidade específica — não admite culpa. Ambas são dolosas.","fund":"LEI: Art. 1º, §2º, Lei 9.455/97: modalidade omissiva (quem omite tendo poder de impedir) — dolo eventual ou culpa em relação ao resultado. Art. 1º, §1º, Lei 13.869/19: exclusivamente dolosa com finalidade específica.","peg":"A 'omissão' do §2º da Lei de Tortura não é culposa no sentido estrito — é forma especial do tipo omissivo."},{"n":17,"enun":"O perdão judicial, nos termos da Súmula 18 do STJ, constitui sentença condenatória, e os seus efeitos penais devem ser normalmente aplicados.","gab":"ERRADO","com":"A Súmula 18 do STJ é expressa em sentido contrário: 'A sentença concessiva do perdão judicial é declaratória da extinção da punibilidade, não subsistindo qualquer efeito condenatório.' O perdão judicial não gera maus antecedentes, reincidência nem outros efeitos.","fund":"JURISPRUDÊNCIA: Súmula 18/STJ: 'A sentença concessiva do perdão judicial é declaratória da extinção da punibilidade, não subsistindo qualquer efeito condenatório.'"},{"n":18,"enun":"O crime de furto qualificado pelo abuso de confiança (art. 155, §4º, II, do CP) exige que a confiança tenha sido previamente depositada na pessoa do agente pela vítima, não sendo suficiente a mera relação de familiaridade.","gab":"CERTO","com":"O abuso de confiança no furto qualificado pressupõe relação de confiança previamente estabelecida entre vítima e agente, que é então violada. Não basta a mera familiaridade ou convivência — é necessário que a vítima tenha efetivamente conferido ao agente uma posição de confiança.","fund":"LEI: Art. 155, §4º, II, CP: furto qualificado pelo abuso de confiança. Doutrina: confiança como elemento normativo — exige prévia delegação de fidúcia da vítima ao agente."},{"n":19,"enun":"A prescrição da pretensão punitiva (prescrição em abstrato) tem como termo inicial a data do fato criminoso e é regulada pela pena máxima cominada ao crime, conforme o art. 109 do CP.","gab":"CERTO","com":"A prescrição da pretensão punitiva abstrata toma como parâmetro a pena máxima em abstrato do tipo penal e começa a correr da data do fato (art. 111, I, CP). É a prescrição calculada antes da sentença final.","fund":"LEI: Art. 109, CP: prazos prescricionais calculados sobre pena máxima. Art. 111, I, CP: começa a correr do dia em que o crime se consumou (para crimes instantâneos)."},{"n":20,"enun":"O Estatuto do Desarmamento (Lei 10.826/2003) classifica os crimes de porte e posse ilegais de arma de fogo como crimes hediondos.","gab":"ERRADO","com":"Os crimes do Estatuto do Desarmamento não são hediondos nem equiparados. São inafiançáveis e insuscetíveis de liberdade provisória (art. 21 da lei), mas não integram o rol da Lei 8.072/90 nem são expressamente equiparados a hediondos.","fund":"LEI: Art. 1º, Lei 8.072/90 (crimes hediondos): não inclui os crimes do Estatuto do Desarmamento. Lei 10.826/03, art. 21: inafiançáveis e insuscetíveis de liberdade provisória (mas não hediondos).","peg":"A inafiançabilidade e a vedação de liberdade provisória não equivalem à hediondez — são vedações autônomas."},{"n":21,"enun":"Nos crimes contra a honra, a exceptio veritatis não é admitida na calúnia quando o fato imputado for crime de ação penal privada e o ofendido não tiver sido condenado por sentença irrecorrível.","gab":"CERTO","com":"A exceção da verdade na calúnia tem restrições: não se admite quando o fato é crime de ação privada e o ofendido não foi condenado por sentença irrecorrível, para preservar a presunção de inocência e evitar nova investigação do mesmo fato.","fund":"LEI: Art. 138, §3º, CP: a exceção da verdade não é admitida nos casos expressamente vedados — entre eles, quando o fato imputado é crime de ação privada e não houve condenação irrecorrível."},{"n":22,"enun":"Nos crimes de responsabilidade dos funcionários públicos, o peculato culposo (art. 312, §2º, do CP) comporta extinção da punibilidade pela reparação do dano antes da sentença irrecorrível.","gab":"CERTO","com":"O art. 312, §3º, do CP prevê que no peculato culposo, se o agente repara o dano antes da sentença irrecorrível, extingue-se a punibilidade; se reparado depois da sentença, reduz-se pela metade a pena imposta. É exceção expressa no próprio CP.","fund":"LEI: Art. 312, §3º, CP: 'No caso do parágrafo anterior, a reparação do dano, se precede à sentença irrecorrível, extingue a punibilidade; se lhe é posterior, reduz de metade a pena imposta.'"},{"n":23,"enun":"A multa penal, conforme decisão do STF na ADI 3.150/DF, deve ser executada pelo Ministério Público com preferência em relação à Fazenda Pública, que tem legitimidade subsidiária.","gab":"CERTO","com":"Na ADI 3.150/DF (STF, Pleno, j. 13/12/2018), o STF declarou a constitucionalidade do art. 51, §1º, do CP (redação da Lei 13.964/19) e fixou que o MP tem legitimidade prioritária para executar a multa penal; a Fazenda Pública tem legitimidade subsidiária. A Súmula 521 do STJ foi superada.","fund":"JURISPRUDÊNCIA: STF, ADI 3.150/DF, Marco Aurélio, Pleno, j. 13/12/2018: MP tem legitimidade prioritária para executar multa penal. Art. 51, §1º, CP (Lei 13.964/19): corrobora esse entendimento. ⚠️ Súmula 521/STJ: SUPERADA.","jur_status":"OK"},{"n":24,"enun":"O princípio da insignificância é inaplicável ao crime de moeda falsa (art. 289 do CP), ainda que a falsificação envolva pequena quantidade de notas de baixo valor.","gab":"CERTO","com":"Os tribunais superiores recusam o princípio da insignificância ao crime de moeda falsa porque a tutela penal não é apenas patrimonial, mas atinge a fé pública e o sistema monetário, bem jurídico supraindividual. A quantidade ou valor das notas é irrelevante para afastar a tipicidade.","fund":"LEI: Art. 289, CP: moeda falsa — bem jurídico protegido é a fé pública e a ordem econômica. JURISPRUDÊNCIA: STJ e STF: inaplicabilidade do princípio da insignificância ao crime de moeda falsa — não há limite de valor."}]},{"nome":"Direito Processual Penal e Legislação Processual Especial","comando":"Com relação ao direito processual penal e à legislação processual especial aplicáveis ao cargo de Delegado de Polícia do DF, julgue os itens a seguir.","itens":[{"n":25,"enun":"O reconhecimento de pessoas realizado em sede policial, nos termos do art. 226 do CPP, exige que o suspeito seja colocado ao lado de outras pessoas com características semelhantes. O descumprimento de tal formalidade torna o reconhecimento prova absolutamente nula.","gab":"CERTO","com":"O STJ, no HC 598.886/SC (6ª T., j. 27/10/2020, Schietti), fixou que as formalidades do art. 226 do CPP são obrigatórias e que o reconhecimento irregular não pode, de forma isolada, sustentar uma condenação. O descumprimento gera nulidade relativa (ou absoluta, conforme o caso).","fund":"LEI: Art. 226, CPP: formalidades do reconhecimento de pessoas. JURISPRUDÊNCIA: STJ, HC 598.886/SC, Schietti, 6ª T., j. 27/10/2020: reconhecimento sem observância do art. 226 — prova inválida; não sustenta condenação isolada.","peg":"O STJ não a declarou absolutamente nula — a expressão correta é prova inválida que não pode sustentar condenação isolada.","jur_status":"OK"},{"n":26,"enun":"O acordo de não persecução penal (ANPP), previsto no art. 28-A do CPP, pode ser celebrado nos crimes cometidos com violência ou grave ameaça à pessoa, desde que a pena mínima seja inferior a quatro anos.","gab":"ERRADO","com":"O ANPP é expressamente vedado nos crimes cometidos com violência ou grave ameaça à pessoa (art. 28-A, caput, in fine). A pena mínima inferior a 4 anos é requisito, mas não afasta a vedação para crimes violentos.","fund":"LEI: Art. 28-A, CPP: 'Não sendo caso de arquivamento e tendo o investigado confessado formal e circunstancialmente a prática de infração penal sem violência ou grave ameaça e com pena mínima inferior a 4 (quatro) anos [...].'","peg":"A vedação para crimes violentos é absoluta — não há exceção pela quantidade de pena mínima."},{"n":27,"enun":"A prisão preventiva pode ser decretada de ofício pelo juiz no curso da instrução criminal ou na fase de investigação policial, independentemente de requerimento.","gab":"ERRADO","com":"Após a Lei 13.964/2019 (Pacote Anticrime), o juiz não pode mais decretar a prisão preventiva de ofício em nenhuma fase — nem na instrução, nem na investigação. Exige-se sempre requerimento do MP, da autoridade policial ou do querelante (art. 311 CPP).","fund":"LEI: Art. 311, CPP (redação da Lei 13.964/19): 'Em qualquer fase da investigação policial ou do processo penal, caberá a prisão preventiva decretada pelo juiz, a requerimento do Ministério Público, do querelante ou do assistente, ou por representação da autoridade policial.' Decretação ex officio: vedada.","peg":"Antes do Pacote Anticrime, o juiz podia decretar de ofício na instrução — essa regra foi revogada expressamente."},{"n":28,"enun":"A busca pessoal independe de fundada suspeita, podendo ser realizada pelo delegado de polícia ou seus agentes com base na mera intuição do policial, conforme entendimento do STJ.","gab":"ERRADO","com":"O STJ, no RHC 158.580/BA (Schietti, 6ª T., j. 19/04/2022), fixou que a busca pessoal exige fundada suspeita prévia, objetiva e específica — não basta a mera intuição ou suspeição genérica. A ausência de fundada suspeita torna a busca ilegal.","fund":"LEI: Art. 240, §2º, CPP: 'Proceder-se-á à busca pessoal quando houver fundada suspeita de que a pessoa esteja na posse de arma proibida [...].' JURISPRUDÊNCIA: STJ, RHC 158.580/BA, Schietti, 6ª T., j. 19/04/2022: fundada suspeita prévia, objetiva e específica é imprescindível.","peg":"Fundada suspeita ≠ intuição — exige elementos concretos e objetivos, não mera suposição.","jur_status":"OK"},{"n":29,"enun":"A cadeia de custódia da prova, disciplinada nos arts. 158-A a 158-F do CPP (inseridos pela Lei 13.964/2019), tem como finalidade assegurar a rastreabilidade, a integridade e a autenticidade dos elementos de prova.","gab":"CERTO","com":"A cadeia de custódia, introduzida pelo Pacote Anticrime, garante a integridade e rastreabilidade dos elementos probatórios desde o reconhecimento até o descarte. A violação da cadeia pode afetar a validade probatória do elemento.","fund":"LEI: Art. 158-A, CPP: 'Considera-se cadeia de custódia o conjunto de todos os procedimentos utilizados para manter e documentar a história cronológica do vestígio coletado em locais ou em vítimas de crimes [...].' Arts. 158-B a 158-F: etapas da cadeia."},{"n":30,"enun":"O defensor constituído tem direito de acesso a todos os elementos de informação colhidos no inquérito policial, inclusive em relação a diligências em andamento, independentemente de sigilo decretado.","gab":"ERRADO","com":"A Súmula Vinculante 14 assegura ao defensor acesso aos autos do IP e a todos os elementos colhidos, mas somente quanto às diligências já documentadas — não alcança diligências em curso ou futuras, cujo sigilo pode ser mantido para preservar a eficácia investigatória.","fund":"JURISPRUDÊNCIA: Súmula Vinculante 14/STF: 'É direito do defensor, no interesse do representado, ter acesso amplo aos elementos de prova que, já documentados em procedimento investigatório realizado por órgão com competência de polícia judiciária, digam respeito ao exercício do direito de defesa.'","peg":"SV 14 garante acesso ao que já está documentado — não inclui diligências em andamento.","jur_status":"OK"},{"n":31,"enun":"A interceptação telefônica, nos termos da Lei 9.296/1996, pode ser determinada de ofício pelo juiz, independentemente de requerimento do MP ou representação da autoridade policial.","gab":"CERTO","com":"O art. 3º da Lei 9.296/96 permite expressamente que a interceptação seja determinada de ofício pelo juiz ou a requerimento da autoridade policial ou do MP. Diferente da prisão preventiva, a interceptação ainda admite decretação ex officio.","fund":"LEI: Art. 3º, Lei 9.296/1996: 'A interceptação das comunicações telefônicas poderá ser determinada pelo juiz, de ofício ou a requerimento: I — da autoridade policial, na investigação criminal; II — do representante do Ministério Público, na investigação criminal e na instrução processual penal.'"},{"n":32,"enun":"No flagrante delito, é vedado ao delegado de polícia relaxar a prisão em flagrante antes do exame de legalidade pelo juízo competente.","gab":"ERRADO","com":"O delegado de polícia tem poder-dever de não lavrar o auto de prisão em flagrante — ou de fazê-lo e depois determinar a soltura — se verificar que a prisão é manifestamente ilegal. O art. 304, §1º, CPP permite que a prisão não seja lavrada quando o fato for atípico ou a prisão for irregular.","fund":"LEI: Art. 304, §1º, CPP: o delegado pode deixar de lavrar o auto se a prisão for manifestamente ilegal. Art. 310, III, CPP: juiz pode relaxar a prisão ilegal — mas o delegado tem prerrogativa anterior.","peg":"O delegado não 'relaxa' tecnicamente (poder do juiz), mas pode recusar o auto se a prisão for manifestamente ilegal."},{"n":33,"enun":"A confissão, no processo penal brasileiro, não tem valor probatório absoluto e não vincula o julgador, que a avalia em conjunto com os demais elementos probatórios.","gab":"CERTO","com":"O CPP adota o sistema do livre convencimento motivado (persuasão racional). A confissão não tem valor tarifado — o juiz a aprecia livremente, podendo condená-lo ou absolvê-lo mesmo com a confissão, se outros elementos não a corroborarem.","fund":"LEI: Art. 197, CPP: 'O valor da confissão se aferirá pelos critérios adotados para os outros elementos de prova, e para a sua apreciação o juiz deverá confrontá-la com as demais provas do processo, verificando se entre ela e estas existe compatibilidade ou concordância.'"},{"n":34,"enun":"A teoria dos frutos da árvore envenenada (fruit of the poisonous tree), consagrada no art. 157, §1º, do CPP, determina a inadmissibilidade das provas derivadas das ilícitas, salvo quando não evidenciado o nexo de causalidade com a prova ilícita originária.","gab":"CERTO","com":"O art. 157, §1º, CPP incorpora a teoria dos frutos da árvore envenenada: as provas derivadas das ilícitas também são inadmissíveis, salvo se puderem ser obtidas por fonte independente ou se não houver nexo causal demonstrado com a prova ilícita.","fund":"LEI: Art. 157, §1º, CPP: 'São também inadmissíveis as provas derivadas das ilícitas, salvo quando não evidenciado o nexo de causalidade entre umas e outras, ou quando as derivadas puderem ser obtidas por uma fonte independente das primeiras.'"},{"n":35,"enun":"As medidas cautelares diversas da prisão (art. 319 do CPP) devem ser aplicadas de forma progressiva, somente sendo admitida a prisão preventiva quando as medidas alternativas se revelarem inadequadas ou insuficientes.","gab":"CERTO","com":"O Pacote Anticrime reforçou a subsidiariedade da prisão preventiva: ela só é admissível quando as medidas cautelares do art. 319 forem inadequadas ou insuficientes. O juiz deve motivar expressamente por que as alternativas não bastam.","fund":"LEI: Art. 282, §6º, CPP: 'A prisão preventiva somente será determinada quando não for cabível a sua substituição por outra medida cautelar [...].' Art. 312, CPP (redação Lei 13.964/19): fundamentos da preventiva."},{"n":36,"enun":"A prisão em flagrante por crime permanente pode ocorrer enquanto durar a permanência, sendo desnecessário que a autoridade policial aguarde o início ou o término do ato para efetuar a prisão.","gab":"CERTO","com":"Nos crimes permanentes, o flagrante se protrai no tempo enquanto dura a permanência delitiva. A autoridade policial pode prender o agente a qualquer momento durante a execução do crime, sem necessidade de esperar o início ou o fim da conduta.","fund":"LEI: Art. 303, CPP: 'Nas infrações permanentes, entende-se o agente em flagrante delito enquanto não cessar a permanência.'"},{"n":37,"enun":"A ação penal nos crimes de lesão corporal leve e culposa praticados no âmbito doméstico e familiar contra a mulher, nos termos da Lei 11.340/2006, é pública incondicionada, independentemente de representação da vítima.","gab":"CERTO","com":"O STF, na ADI 4.424 e na ADC 19 (Pleno, j. 09/02/2012), fixou que a ação penal por lesão corporal leve ou culposa em contexto doméstico é pública incondicionada. A representação da vítima não é exigível — o STJ também tem súmula no mesmo sentido.","fund":"LEI: Art. 41, Lei 11.340/06: afasta a Lei 9.099/95 para crimes domésticos. JURISPRUDÊNCIA: STF, ADI 4.424/DF e ADC 19/DF, Pleno, j. 09/02/2012: ação pública incondicionada. Súmula 542/STJ: 'A ação penal relativa ao crime de lesão corporal resultante de violência doméstica contra a mulher é pública incondicionada.'","jur_status":"PENDENTE"},{"n":38,"enun":"Nos termos da Lei 7.960/1989, a prisão temporária somente pode ser decretada na fase de investigação policial e tem prazo de cinco dias, prorrogável por igual período, nos crimes não hediondos.","gab":"CERTO","com":"A Lei 7.960/89 limita a prisão temporária à fase de investigação policial e fixa prazo de 5 dias + 5 dias de prorrogação para crimes comuns. Nos crimes hediondos e equiparados, a Lei 8.072/90 amplia para 30 + 30 dias.","fund":"LEI: Art. 2º, Lei 7.960/89: prazo de 5 dias, prorrogável por igual período, decretada somente na fase de inquérito. Art. 2º, §4º, Lei 8.072/90: crimes hediondos — 30 dias, prorrogável por mais 30."},{"n":39,"enun":"O inquérito policial é peça informativa de natureza administrativa e inquisitória, não havendo contraditório obrigatório, razão pela qual o indiciado não possui direito ao silêncio durante o interrogatório perante o delegado.","gab":"ERRADO","com":"O indiciado tem direito constitucional ao silêncio (art. 5º, LXIII, CF) em qualquer fase do processo ou investigação, inclusive no IP. O silêncio não pode ser interpretado em seu desfavor e não configura confissão.","fund":"LEI: Art. 5º, LXIII, CF: 'o preso será informado de seus direitos, entre os quais o de permanecer calado.' Art. 6º, V, CPP: o delegado cientifica o indiciado de seu direito ao silêncio.","peg":"A natureza inquisitória do IP não afasta o direito ao silêncio — direito constitucional aplicável em qualquer fase."},{"n":40,"enun":"O uso de algemas por autoridade policial é condicionado à existência de resistência ou fundado receio de fuga ou perigo à integridade física do preso, devendo haver justificativa escrita, conforme a Súmula Vinculante 11 do STF.","gab":"CERTO","com":"A SV 11 do STF limita o uso de algemas a situações específicas (resistência, risco de fuga, perigo à integridade do preso ou de terceiros) e exige que a autoridade faça justificativa por escrito. O uso desnecessário de algemas constitui abuso de autoridade.","fund":"JURISPRUDÊNCIA: Súmula Vinculante 11/STF: 'Só é lícito o uso de algemas em casos de resistência e de fundado receio de fuga ou de perigo à integridade física própria ou alheia, por parte do preso ou de terceiros, justificada a excepcionalidade por escrito.'","jur_status":"OK"},{"n":41,"enun":"A delação premiada (colaboração premiada), prevista na Lei 12.850/2013, constitui meio de obtenção de prova e não meio de prova em si mesma, razão pela qual as declarações do colaborador devem ser corroboradas por outros elementos probatórios.","gab":"CERTO","com":"A Lei 12.850/13 e o STF classificam a colaboração premiada como meio de obtenção de prova (não meio de prova), e exigem que as declarações do colaborador sejam sempre corroboradas por outros elementos independentes — não servem, sozinhas, para condenar.","fund":"LEI: Art. 4º, §16, Lei 12.850/13: 'Nenhuma sentença condenatória será proferida com fundamento apenas nas declarações de agente colaborador.' Doutrina e STF: colaboração = meio de obtenção de prova."},{"n":42,"enun":"O princípio da identidade física do juiz, previsto no art. 399, §2º, do CPP, obriga o magistrado que presidiu a instrução a proferir a sentença, sendo a regra absoluta e sem exceções.","gab":"ERRADO","com":"O princípio da identidade física do juiz tem exceções: convocação, licença, promoção, aposentadoria, óbito, remoção ou outros casos. A ausência temporária ou definitiva do magistrado justifica que outro profira a sentença, sem nulidade.","fund":"LEI: Art. 399, §2º, CPP: 'O juiz que presidiu a instrução deverá proferir a sentença.' A doutrina e a jurisprudência reconhecem exceções para as situações de afastamento legítimo do magistrado instrutor.","peg":"O princípio é a regra, não é absoluto — há exceções legítimas expressamente reconhecidas."},{"n":43,"enun":"A teoria da descoberta inevitável permite o aproveitamento de provas derivadas de provas ilícitas quando se demonstra que seriam obtidas por meios lícitos de forma independente.","gab":"CERTO","com":"A teoria da descoberta inevitável (inevitable discovery doctrine, de Nix v. Williams, EUA) é acolhida pelo CPP: se a prova derivada seria inevitavelmente descoberta por meios lícitos, ela pode ser aproveitada, pois o nexo causal com a ilicitude é quebrado.","fund":"LEI: Art. 157, §2º, CPP: 'Considera-se fonte independente aquela que por si só, seguindo os trâmites típicos e de praxe, próprios da investigação ou instrução criminal, seria capaz de conduzir ao fato objeto da prova.' Doutrina: inclui descoberta inevitável."},{"n":44,"enun":"No procedimento do Tribunal do Júri, após a pronúncia, o réu somente poderá ser conduzido a novo julgamento se for absolvido pelo primeiro júri.","gab":"ERRADO","com":"A soberania dos veredictos não impede revisão criminal em benefício do réu, mas o segundo julgamento só cabe por decisão manifestamente contrária à prova dos autos (art. 593, III, d, CPP). O réu condenado é que pode ter novo julgamento após recurso do MP ou assistente.","fund":"LEI: Art. 593, III, d, CPP: cabe apelação quando a decisão for manifestamente contrária à prova dos autos. Art. 591, CPP: o réu condenado pelo 2º júri não pode ser submetido a 3º julgamento.","peg":"Não é 'após pronúncia' nem 'somente se absolvido' — o segundo julgamento ocorre após reforma pelo TJ, por decisão manifestamente contrária à prova."},{"n":45,"enun":"A revisão criminal, prevista nos arts. 621 a 631 do CPP, pode ser proposta somente em favor do réu condenado, sendo vedada a revisão pro societate no processo penal brasileiro.","gab":"CERTO","com":"A revisão criminal é exclusivamente pró-réu (favor rei). O ordenamento brasileiro não admite revisão pro societate — instrumento que permitiria reabrir processo com absolvição trânsita. O STF e a doutrina pacificam esse ponto.","fund":"LEI: Art. 621, CPP: 'A revisão dos processos findos será admitida [...] em favor do réu' — vedada em desfavor do absolvido. Princípio ne bis in idem: vedação à revisão pro societate."},{"n":46,"enun":"O Supremo Tribunal Federal, nas ADCs 43, 44 e 54, julgadas em novembro de 2019, fixou que a execução da pena somente é permitida após o trânsito em julgado da condenação criminal.","gab":"CERTO","com":"No julgamento das ADCs 43/44/54 (Pleno, j. 07/11/2019), o STF retornou ao entendimento de que a execução da pena exige o trânsito em julgado (art. 283 CPP e art. 5º, LVII, CF), afastando o precedente do HC 126.292/2016.","fund":"JURISPRUDÊNCIA: STF, ADCs 43/44/54, Marco Aurélio, Pleno, j. 07/11/2019: execução da pena só após trânsito em julgado. Art. 5º, LVII, CF: 'ninguém será considerado culpado até o trânsito em julgado de sentença penal condenatória.'"}]},{"nome":"Direito Constitucional e Legislação Complementar","comando":"No que se refere ao direito constitucional e à organização do Estado brasileiro, julgue os itens a seguir.","itens":[{"n":47,"enun":"A Constituição Federal de 1988 estabelece que os direitos e garantias fundamentais expressos no seu art. 5º não excluem outros decorrentes do regime e dos princípios adotados pela Constituição, ou dos tratados internacionais de que o Brasil seja parte.","gab":"CERTO","com":"O §2º do art. 5º da CF consagra a cláusula de abertura material dos direitos fundamentais: o rol do art. 5º é exemplificativo, não taxativo. Outros direitos podem decorrer da Constituição, dos princípios nela expressos e dos tratados internacionais.","fund":"LEI: Art. 5º, §2º, CF: 'Os direitos e garantias expressos nesta Constituição não excluem outros decorrentes do regime e dos princípios por ela adotados, ou dos tratados internacionais em que a República Federativa do Brasil seja parte.'"},{"n":48,"enun":"Os tratados internacionais de direitos humanos aprovados por procedimento equivalente ao das emendas constitucionais (art. 5º, §3º, CF) têm hierarquia de emenda constitucional. Os demais tratados de direitos humanos têm status de lei ordinária.","gab":"ERRADO","com":"Segundo o STF (RE 466.343/SP, Pleno, j. 03/12/2008), os tratados de DH não incorporados pelo rito do §3º têm status supralegal (acima das leis, abaixo da CF). Apenas os aprovados pelo rito do §3º têm nível constitucional. Tratados comuns (não-DH) têm nível de lei ordinária.","fund":"JURISPRUDÊNCIA: STF, RE 466.343/SP, Cezar Peluso, Pleno, j. 03/12/2008: tratados de DH sem §3º = status supralegal; tratados comuns = lei ordinária.","peg":"Tratados de DH sem o rito especial não são lei ordinária — são supralegais (acima da lei, abaixo da CF).","jur_status":"OK"},{"n":49,"enun":"O Conselho Nacional de Justiça (CNJ), criado pela EC 45/2004, tem natureza de órgão administrativo de controle do Poder Judiciário, e sua constitucionalidade foi reconhecida pelo STF na ADI 3.367/DF.","gab":"CERTO","com":"O STF, na ADI 3.367/DF (Pleno, j. 13/04/2005), declarou a constitucionalidade do CNJ e fixou que ele é órgão administrativo (não jurisdicional) de controle interno do Judiciário, sem que isso viole a separação de poderes ou o pacto federativo.","fund":"JURISPRUDÊNCIA: STF, ADI 3.367/DF, Cezar Peluso, Pleno, j. 13/04/2005: CNJ é constitucional; é órgão de controle administrativo, financeiro e disciplinar do Judiciário. Art. 103-B, CF: composição e competências do CNJ.","jur_status":"OK"},{"n":50,"enun":"A inviolabilidade do domicílio prevista no art. 5º, XI, da CF admite exceção durante o período noturno nos casos de flagrante delito e de desastre, mas não para prestar socorro.","gab":"ERRADO","com":"O art. 5º, XI, CF admite entrada na residência alheia sem consentimento, a qualquer hora, nos casos de: flagrante delito, desastre e para prestar socorro. As três hipóteses são admissíveis tanto de dia quanto de noite. Apenas a execução de mandado judicial é restrita ao período diurno.","fund":"LEI: Art. 5º, XI, CF: 'a casa é asilo inviolável do indivíduo, ninguém nela podendo penetrar sem consentimento do morador, salvo em caso de flagrante delito ou desastre, ou para prestar socorro, ou, durante o dia, por determinação judicial.'","peg":"Flagrante, desastre e socorro: dia ou noite. Mandado judicial: somente durante o dia."},{"n":51,"enun":"A proporcionalidade do Congresso Nacional não é exigência expressa na Constituição Federal de 1988 para a composição das comissões parlamentares de inquérito (CPIs).","gab":"ERRADO","com":"A CF (art. 58, §1º) exige que as CPIs sejam constituídas pela representação proporcional dos partidos e blocos parlamentares. A proporcionalidade é requisito constitucional, e sua inobservância pode ser controlada pelo STF.","fund":"LEI: Art. 58, §1º, CF: 'Na constituição das Mesas e de cada Comissão, é assegurada, tanto quanto possível, a representação proporcional dos partidos ou dos blocos parlamentares que participam da respectiva Casa.' Art. 58, §3º, CF: CPIs criadas por requerimento de 1/3 dos membros."},{"n":52,"enun":"No controle concentrado de constitucionalidade, a declaração de inconstitucionalidade pelo STF em ação direta produz efeitos, em regra, ex tunc (retroativos) e erga omnes, vinculando os demais órgãos do Poder Judiciário e a Administração Pública.","gab":"CERTO","com":"Na ADI, a decisão do STF tem eficácia erga omnes e efeito vinculante (art. 102, §2º, CF), e opera, em regra, ex tunc. O STF pode modular os efeitos temporais para ex nunc ou pro futuro, mediante quórum de 2/3 e razões de segurança jurídica.","fund":"LEI: Art. 102, §2º, CF: 'As decisões
