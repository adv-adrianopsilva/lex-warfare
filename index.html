<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PCDF · Delegado 2026</title>
<!-- PWA -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0a0b14">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PCDF">
<link rel="apple-touch-icon" href="/icons/icon-180.png">
<link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png">
<link rel="apple-touch-icon" sizes="167x167" href="/icons/icon-167.png">
<link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180.png">
<link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png">
<style>
/* ── TOKENS ──────────────────────────────────────────────── */
:root{
  --bg:#0a0b0e; --surf:#12141a; --surf2:#181b24; --surf3:#1e2230;
  --bord:#252a3a; --bord2:#2e3448;
  --txt:#e4e8f4; --txt2:#7a8399; --txt3:#3d4562;
  --acc:#e8a020; --acc-dim:rgba(232,160,32,.13); --acc-glow:rgba(232,160,32,.28); --acc-bord:rgba(232,160,32,.32); --acc-bg:#1c1206;
  --green:#28c76f; --green-bg:rgba(40,199,111,.1); --green-bord:rgba(40,199,111,.3);
  --red:#f05252; --red-bg:rgba(240,82,82,.1); --red-bord:rgba(240,82,82,.3);
  --amber:#f59e0b; --amber-bg:rgba(245,158,11,.1); --amber-bord:rgba(245,158,11,.3);
  --mono:"SF Mono","Fira Code",monospace;
  --r:12px; --r-sm:8px; --r-xs:5px;
  --trans:140ms cubic-bezier(.4,0,.2,1);
  --shadow:0 2px 14px rgba(0,0,0,.5); --shadow-lg:0 4px 28px rgba(0,0,0,.65);
}
[data-theme=light]{
  --bg:#f1f3f8; --surf:#fff; --surf2:#f5f7fc; --surf3:#eef0f8;
  --bord:#dde2ef; --bord2:#cdd3e6;
  --txt:#0e1121; --txt2:#5a6380; --txt3:#9ea8c0;
  --acc:#c47c0a; --acc-dim:rgba(196,124,10,.08); --acc-glow:rgba(196,124,10,.2); --acc-bord:rgba(196,124,10,.28); --acc-bg:#fdf6e8;
  --green:#16a34a; --green-bg:rgba(22,163,74,.08); --green-bord:rgba(22,163,74,.28);
  --red:#dc2626; --red-bg:rgba(220,38,38,.08); --red-bord:rgba(220,38,38,.28);
  --amber:#d97706; --amber-bg:rgba(217,119,6,.08); --amber-bord:rgba(217,119,6,.28);
  --shadow:0 2px 8px rgba(0,0,0,.1); --shadow-lg:0 4px 16px rgba(0,0,0,.15);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;font-size:15px;line-height:1.6;transition:background var(--trans),color var(--trans)}
button{font-family:inherit;cursor:pointer}

/* ── HEADER ──────────────────────────────────────────────── */
.hdr{position:sticky;top:0;z-index:100;background:var(--surf);border-bottom:1px solid var(--bord);box-shadow:var(--shadow)}
.hdr-inner{max-width:860px;margin:0 auto;display:flex;align-items:center;gap:10px;height:62px;padding:0 18px}
.hdr-brand{display:flex;align-items:center;gap:11px;flex:1;min-width:0}
.delta-badge{width:42px;height:42px;border-radius:10px;background:var(--acc);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:#0a0b0e;flex-shrink:0;letter-spacing:-.02em;box-shadow:0 2px 10px var(--acc-glow)}
.hdr-name{font-weight:800;font-size:16.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.01em}
.hdr-date{font-size:12px;color:var(--txt2);margin-top:1px}
.hdr-chips{display:flex;gap:5px;align-items:center;flex-shrink:0}
.chip{border-radius:6px;padding:2px 9px;font-size:12px;font-weight:700}
.chip.g{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bord)}
.chip.r{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bord)}
.chip.n{background:var(--surf2);color:var(--txt2);border:1px solid var(--bord)}
.chip.t{background:var(--acc-dim);color:var(--acc);border:1px solid var(--acc-bord)}
.hdr-timer-wrap{display:flex;align-items:center;gap:6px;flex-shrink:0;background:var(--surf2);border:1px solid var(--bord);border-radius:8px;padding:5px 10px}
.hdr-timer-wrap.hidden{display:none!important}
.hdr-timer-wrap svg.clock-ic{width:17px;height:17px;color:var(--acc);flex-shrink:0}
.hdr-timer-txt{font-size:15px;font-weight:700;color:var(--txt);font-variant-numeric:tabular-nums;min-width:38px}
#btn-pause{background:transparent;border:none;cursor:pointer;padding:0 2px;font-size:14px;color:var(--txt2);line-height:1;transition:color var(--trans)}
#btn-pause:hover{color:var(--acc)}
#btn-pause.paused{color:var(--acc)}
/* Overlay de pausa */
#pause-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.72);backdrop-filter:blur(6px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px}
#pause-overlay.hidden{display:none!important}
.pause-card{background:var(--surf1);border:1px solid var(--bord);border-radius:16px;padding:40px 56px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:14px}
.pause-icon{font-size:48px;line-height:1}
.pause-title{font-size:22px;font-weight:700;color:var(--txt)}
.pause-sub{font-size:14px;color:var(--txt2)}
.pause-resume{background:var(--acc);color:#000;border:none;border-radius:10px;padding:13px 36px;font-size:16px;font-weight:700;cursor:pointer;transition:opacity var(--trans)}
.pause-resume:hover{opacity:.85}
.hdr-actions{display:flex;gap:3px;flex-shrink:0}
.icon-btn{background:var(--surf2);border:1px solid var(--bord);color:var(--txt2);border-radius:7px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all var(--trans)}
.icon-btn:hover{background:var(--acc-dim);border-color:var(--acc-bord);color:var(--acc)}
.prog-rail{height:2px;background:var(--surf3)}
.prog-fill{height:2px;background:var(--acc);transition:width .4s}

/* ── COVER ───────────────────────────────────────────────── */
.cover{max-width:580px;margin:0 auto;padding:48px 18px 80px;text-align:center;animation:fadeIn .4s ease}
.cover-kicker{font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--acc);font-weight:700;margin-bottom:16px}
.cover h1{font-size:clamp(32px,5vw,48px);font-weight:800;font-style:italic;margin-bottom:14px;line-height:1.1}
.cover-lead{font-size:16px;color:var(--txt2);margin-bottom:32px;line-height:1.5}
.cover-card{background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);padding:24px;text-align:left;box-shadow:var(--shadow)}
.meta-grid{display:grid;grid-template-columns:auto 1fr;gap:7px 18px;font-size:13.5px;margin-bottom:18px}
.meta-grid dt{color:var(--txt3);font-size:11px;letter-spacing:.08em;text-transform:uppercase;align-self:center}
.meta-grid dd{color:var(--txt);margin:0;font-weight:500}
.cover-note{font-size:13.5px;color:var(--txt2);font-style:italic;padding:12px 14px;background:var(--surf2);border-left:3px solid var(--acc-bord);border-radius:0 var(--r-xs) var(--r-xs) 0;margin-bottom:22px;line-height:1.5}
.cover-actions{display:flex;flex-direction:column;gap:10px}
.cover-countdown{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:18px;flex-wrap:wrap}
.ccd-box{text-align:center;background:var(--surf2);border:1px solid var(--bord2);border-radius:var(--r-sm);padding:10px 16px;min-width:62px}
.ccd-num{font-size:28px;font-weight:900;font-style:italic;line-height:1;color:var(--acc)}
.ccd-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--txt3);margin-top:2px}
.ccd-sep{font-size:22px;font-weight:900;color:var(--bord2);margin-bottom:12px}
.sr-due-nudge{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--red-bg);border:1px solid var(--red-bord);border-radius:var(--r-sm);font-size:13px;color:var(--red);margin-bottom:14px;cursor:pointer;transition:background .15s}
.sr-due-nudge:hover{background:rgba(240,82,82,.18)}
.btn-primary{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 28px;background:var(--acc);color:#0a0b0e;border:none;border-radius:var(--r-sm);font-weight:800;font-size:15px;letter-spacing:.02em;transition:all var(--trans);box-shadow:0 4px 16px var(--acc-glow)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px var(--acc-glow)}
.btn-ghost{background:var(--surf2);border:1px solid var(--bord);color:var(--txt2);padding:10px 20px;border-radius:var(--r-sm);font-size:14px;transition:all var(--trans)}
.btn-ghost:hover{border-color:var(--bord2);color:var(--txt)}

/* ── PROVA TOOLBAR ───────────────────────────────────────── */
.tb{position:sticky;top:54px;z-index:90;background:var(--surf);border-bottom:1px solid var(--bord);backdrop-filter:blur(8px)}
.tb-inner{max-width:860px;margin:0 auto;display:flex;align-items:center;gap:8px;padding:8px 18px;flex-wrap:wrap}
.tb-info{font-size:13px;color:var(--txt2);font-variant-numeric:tabular-nums}
.tb-info b{color:var(--txt)}
.tb-spacer{flex:1}
.tb-btn{background:var(--surf2);border:1px solid var(--bord);border-radius:var(--r-sm);padding:6px 13px;font-size:12.5px;color:var(--txt);transition:all var(--trans);display:inline-flex;align-items:center;gap:6px}
.tb-btn:hover{border-color:var(--bord2);background:var(--surf3)}
.tb-btn.danger{border-color:var(--acc-bord);color:var(--acc);background:var(--acc-dim)}
.tb-btn.danger:hover{background:var(--acc-bg)}
.tb-btn svg{width:12px;height:12px}

/* ── PROVA CONTENT ───────────────────────────────────────── */
#prova-wrap{max-width:860px;margin:0 auto;padding:24px 18px 100px}

/* Discipline header */
.disc-section{margin-bottom:48px}
.disc-hdr{text-align:left;margin:40px 0 16px;background:var(--surf);border-top:3px solid var(--acc);border-bottom:1px solid var(--bord);padding:13px 0 11px;position:relative}
.disc-hdr h3{font-weight:800;font-size:20px;letter-spacing:-.01em;text-transform:none;color:var(--txt);display:flex;align-items:center;gap:10px}

.comando{background:var(--surf2);border:1px solid var(--bord);border-radius:var(--r-sm);padding:12px 16px;font-size:14px;color:var(--txt2);margin-bottom:16px;font-style:italic;line-height:1.5}

/* Question block */
.q-block{border-top:1px solid var(--bord);padding:16px 0;scroll-margin-top:100px}
.q-block:first-of-type{border-top:none;padding-top:4px}
.q-line{display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:start}
.q-tag{display:inline-flex;align-items:center;gap:6px;font-weight:800;font-size:13px;color:var(--acc);flex-shrink:0;padding-top:2px;white-space:nowrap}
.q-tag::before{content:'';width:8px;height:12px;background:var(--acc);clip-path:polygon(0 0,80% 0,100% 50%,80% 100%,0 100%);display:inline-block}
.q-text{font-size:15.5px;line-height:1.65;color:var(--txt)}
.q-text .situacao{display:block;font-style:italic;color:var(--txt2);margin-bottom:8px;padding-left:12px;border-left:2px solid var(--bord2)}
.q-marks{display:flex;gap:6px;flex-shrink:0;padding-top:1px}
.q-mark{width:40px;height:40px;border:1.5px solid var(--bord);border-radius:var(--r-sm);background:var(--surf2);font-weight:800;font-size:14px;color:var(--txt2);display:inline-flex;align-items:center;justify-content:center;transition:all var(--trans)}
.q-mark:hover:not(:disabled){border-color:var(--txt2);color:var(--txt);transform:translateY(-1px)}
.q-mark.sel-c{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.q-mark.sel-e{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.q-mark:disabled{opacity:.5;cursor:default}
/* After gabarito shown, ring correct/wrong */
.q-block.gab-on .q-mark.sel-c.is-right,.q-block.gab-on .q-mark.sel-e.is-right{box-shadow:0 0 0 2px var(--green-bg),0 0 0 3px var(--green)}
.q-block.gab-on .q-mark.sel-c.is-wrong,.q-block.gab-on .q-mark.sel-e.is-wrong{box-shadow:0 0 0 2px var(--red-bg),0 0 0 3px var(--red)}

.q-actions-row{margin-top:10px;padding-left:92px;display:flex;align-items:center;gap:10px}
.q-show-gab{background:transparent;border:1px dashed var(--bord2);border-radius:var(--r-xs);padding:3px 11px;font-size:12px;color:var(--txt3);transition:all var(--trans)}
.q-show-gab:hover{border-style:solid;border-color:var(--acc-bord);color:var(--acc)}
.q-status{font-size:11.5px;color:var(--txt3)}
.q-status .ok{color:var(--green);font-weight:600}
.q-status .er{color:var(--red);font-weight:600}

/* Feedback */
.q-feedback{margin-top:14px;border-radius:var(--r-sm);overflow:hidden;border:1px solid var(--bord);animation:fadeUp .2s ease}
.gab-line{display:flex;align-items:center;gap:8px;padding:9px 14px;background:var(--surf2);border-bottom:1px solid var(--bord);font-size:13px;font-weight:700}
.gab-label{color:var(--txt3);font-size:10px;letter-spacing:.1em;text-transform:uppercase;font-weight:600}
.gab-value{color:var(--txt)}
.gab-badge{margin-left:auto;font-size:11.5px;padding:2px 10px;border-radius:99px;font-weight:700}
.gab-badge.ok{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bord)}
.gab-badge.er{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bord)}
.gab-badge.bk{background:var(--surf3);color:var(--txt3);border:1px solid var(--bord)}

.gab-section{border-top:1px solid var(--bord);background:var(--surf)}
.gab-hdr{display:flex;align-items:center;gap:8px;padding:9px 14px;cursor:pointer;font-size:13px;font-weight:600;background:var(--surf2);border:none;width:100%;text-align:left;color:var(--txt);transition:background var(--trans)}
.gab-hdr:hover{background:var(--surf3)}
.gab-icon{flex-shrink:0}
.gab-lbl{flex:1}
.gab-chev{font-size:11px;color:var(--txt3);transition:transform var(--trans)}
.gab-chev.open{transform:rotate(180deg)}
.gab-body{padding:12px 14px;font-size:14px;line-height:1.7;color:var(--txt2)}
.gab-body.hidden{display:none}
.feynman-text{color:var(--txt);font-size:14.5px;line-height:1.75}
.law-block{font-family:var(--mono);font-size:12px;background:var(--surf2);border:1px solid var(--bord);border-radius:var(--r-xs);padding:11px 13px;white-space:pre-wrap;line-height:1.65;color:var(--txt)}
.copy-btn{display:inline-flex;align-items:center;gap:5px;margin-top:8px;font-size:11.5px;padding:4px 12px;border-radius:5px;border:1px solid var(--bord2);background:var(--surf3);color:var(--txt3);cursor:pointer;transition:all var(--trans);font-family:inherit}
.copy-btn:hover{color:var(--acc);border-color:var(--acc-bord);background:var(--acc-dim)}
.peg-box{display:flex;gap:8px;align-items:flex-start;background:var(--amber-bg);border:1px solid var(--amber-bord);border-radius:var(--r-xs);padding:10px 13px;font-size:13px;color:var(--amber);line-height:1.55}

/* ── TRAP WORDS (Releitura Crítica) ──────────────────────── */
.trap-word{font-weight:800;color:var(--acc);background:var(--acc-dim);border-bottom:2px solid var(--acc);padding:0 3px;border-radius:3px}
.releitura-body{font-size:14.5px;line-height:1.8;color:var(--txt);margin-bottom:10px}
.releitura-body .situacao{display:block;font-style:italic;color:var(--txt2);margin-bottom:8px;padding-left:12px;border-left:2px solid var(--bord2)}
.trap-legend{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--txt3);margin-top:6px;flex-wrap:wrap}
.trap-legend .trap-word{font-size:11.5px;cursor:default}
.trap-found{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;color:var(--acc);font-weight:700}

/* ── AUTOAVALIAÇÃO ────────────────────────────────────────── */
.avaliacao-row{padding:11px 14px;background:var(--surf2);border-top:1px solid var(--bord);display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.avaliacao-lbl{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--txt3);font-weight:600;width:100%;margin-bottom:2px}
.av-btn{border-radius:99px;padding:5px 13px;font-size:12.5px;font-weight:700;border:1.5px solid;cursor:pointer;font-family:inherit;transition:all var(--trans);background:transparent}
.av-btn.dom{border-color:var(--green-bord);color:var(--green)}
.av-btn.dom:hover,.av-btn.dom.sel{background:var(--green-bg);box-shadow:0 0 0 2px var(--green-bord)}
.av-btn.dvd{border-color:var(--amber-bord);color:var(--amber)}
.av-btn.dvd:hover,.av-btn.dvd.sel{background:var(--amber-bg);box-shadow:0 0 0 2px var(--amber-bord)}
.av-btn.lac{border-color:var(--red-bord);color:var(--red)}
.av-btn.lac:hover,.av-btn.lac.sel{background:var(--red-bg);box-shadow:0 0 0 2px var(--red-bord)}
.av-btn.leit{border-color:var(--bord2);color:var(--txt2)}
.av-btn.leit:hover,.av-btn.leit.sel{background:var(--surf3);color:var(--txt);box-shadow:0 0 0 2px var(--bord2)}
.av-set{display:flex;align-items:center;gap:8px;padding:9px 14px;background:var(--surf2);border-top:1px solid var(--bord);font-size:13px}
.av-chip{border-radius:99px;padding:3px 12px;font-size:12px;font-weight:700;border:1.5px solid}
.av-chip.dom{background:var(--green-bg);color:var(--green);border-color:var(--green-bord)}
.av-chip.dvd{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-bord)}
.av-chip.lac{background:var(--red-bg);color:var(--red);border-color:var(--red-bord)}
.av-chip.leit{background:var(--surf3);color:var(--txt2);border-color:var(--bord2)}
.av-change{margin-left:auto;background:transparent;border:1px dashed var(--bord2);border-radius:var(--r-xs);padding:2px 9px;font-size:11.5px;color:var(--txt3);cursor:pointer;font-family:inherit;transition:all var(--trans)}
.av-change:hover{color:var(--acc);border-color:var(--acc-bord)}

/* ── DIAGNÓSTICO (Placar) ─────────────────────────────────── */
.diag-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--bord);border:1px solid var(--bord);border-radius:10px;overflow:hidden;margin-bottom:14px}
@media(max-width:600px){.diag-grid{grid-template-columns:repeat(2,1fr)}}
.diag-cell{background:var(--surf2);padding:14px 10px;text-align:center}
.diag-cell .dn{font-size:26px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums}
.diag-cell .dl{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--txt3);margin-top:5px;font-weight:600;line-height:1.3}
.diag-empty{color:var(--txt3);font-size:14px;font-style:italic;padding:12px 0}

/* ── REVISÃO ──────────────────────────────────────────────── */
#rev-wrap{max-width:860px;margin:0 auto;padding:0 0 100px}
.rev-picker{max-width:580px;margin:0 auto;padding:36px 18px 60px;animation:fadeIn .3s ease}
.rev-picker h2{font-size:clamp(22px,4vw,32px);font-weight:800;font-style:italic;margin-bottom:6px}
.rev-picker .sub{font-size:15px;color:var(--txt2);margin-bottom:28px;line-height:1.5}
.filter-sec-lbl{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--txt3);font-weight:700;margin:22px 0 10px}
.filter-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
@media(max-width:480px){.filter-grid{grid-template-columns:1fr}}
.filter-card{background:var(--surf);border:1.5px solid var(--bord);border-radius:var(--r);padding:15px 16px;text-align:left;cursor:pointer;transition:all var(--trans);font-family:inherit;display:flex;flex-direction:column;gap:3px}
.filter-card:hover:not(:disabled){border-color:var(--acc-bord);background:var(--acc-dim)}
.filter-card.sel{border-color:var(--acc);background:var(--acc-dim);box-shadow:0 0 0 1.5px var(--acc)}
.filter-card:disabled{opacity:.35;cursor:not-allowed;pointer-events:none}
.fc-icon{font-size:20px}
.fc-count{font-size:28px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums}
.fc-count.cr{color:var(--red)}.fc-count.ca{color:var(--amber)}.fc-count.cg{color:var(--green)}.fc-count.ct{color:var(--txt)}
.fc-label{font-size:12px;color:var(--txt2);font-weight:600}
.disc-filter-row{display:flex;flex-wrap:wrap;gap:7px}
.disc-btn{background:var(--surf2);border:1.5px solid var(--bord);border-radius:99px;padding:5px 14px;font-size:13px;font-family:inherit;color:var(--txt2);cursor:pointer;transition:all var(--trans);font-weight:500}
.disc-btn:hover{border-color:var(--acc-bord);color:var(--acc)}
.disc-btn.sel{border-color:var(--acc);color:var(--acc);background:var(--acc-dim)}
.mode-box{background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);overflow:hidden;margin-bottom:24px}
.mode-tabs{display:grid;grid-template-columns:1fr 1fr}
.mode-tab{border:none;background:var(--surf2);color:var(--txt2);font-size:14px;font-weight:700;padding:12px 8px;cursor:pointer;font-family:inherit;border-bottom:2px solid transparent;transition:all var(--trans);display:flex;align-items:center;justify-content:center;gap:6px}
.mode-tab:first-child{border-right:1px solid var(--bord)}
.mode-tab.active{background:var(--surf);color:var(--acc);border-bottom-color:var(--acc)}
.mode-desc-txt{font-size:13px;color:var(--txt2);padding:11px 14px;line-height:1.55;border-top:1px solid var(--bord)}
.rev-tb{position:sticky;top:54px;z-index:90;background:var(--surf);border-bottom:1px solid var(--bord)}
.rev-tb-inner{max-width:860px;margin:0 auto;display:flex;align-items:center;gap:8px;padding:7px 18px;flex-wrap:wrap}
.rev-badge{background:var(--acc-dim);border:1px solid var(--acc-bord);color:var(--acc);border-radius:99px;padding:3px 12px;font-size:12px;font-weight:700;flex-shrink:0}
.rev-orig{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;padding:2px 9px;border-radius:99px;font-weight:600;flex-shrink:0}
.rev-orig.ok{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bord)}
.rev-orig.er{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bord)}
.rev-orig.bk{background:var(--surf3);color:var(--txt3);border:1px solid var(--bord)}
.rev-placar-wrap{max-width:580px;margin:0 auto;padding:32px 18px 100px;animation:fadeUp .4s ease}

/* ── ESPAÇAMENTO INTELIGENTE ──────────────────────────────── */
.sr-badge{display:inline-flex;align-items:center;gap:3px;font-size:10.5px;font-weight:700;border-radius:4px;padding:2px 7px;line-height:1.4;white-space:nowrap}
.sr-badge.due{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bord)}
.sr-badge.soon{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bord)}
.sr-badge.ok{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bord)}
.sr-queue-section{margin-bottom:20px}
.sr-queue-hdr{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--red);font-weight:700;margin-bottom:10px}
.sr-queue-row{display:flex;align-items:center;gap:10px;padding:9px 14px;border-radius:var(--r-sm);background:var(--surf);border:1.5px solid var(--red-bord);margin-bottom:7px;cursor:default;transition:background .15s}
.sr-queue-date{font-size:11px;color:var(--txt3);min-width:52px}
.sr-queue-title{flex:1;font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sr-queue-pct{font-size:13px;font-weight:700;min-width:38px;text-align:right}
.sr-interval-info{font-size:11px;color:var(--txt3);margin-top:4px}
/* ── MODO FOCO ────────────────────────────────────────────── */
#sec-foco{position:fixed;inset:0;z-index:150;background:var(--bg);overflow-y:auto;display:flex;flex-direction:column}
#sec-foco.hidden{display:none!important}
.foco-hdr{position:sticky;top:0;z-index:10;background:var(--bg);border-bottom:1px solid var(--bord2);padding:10px 18px;display:flex;align-items:center;gap:12px}
.foco-qnum{font-size:13px;font-weight:700;color:var(--txt2);white-space:nowrap}
.foco-disc{font-size:11.5px;color:var(--txt3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0}
.foco-prog-wrap{display:flex;align-items:center;gap:8px;min-width:110px}
.foco-progress{height:4px;background:var(--bord);border-radius:2px;flex:1}
.foco-prog-fill{height:100%;background:var(--acc);border-radius:2px;transition:width .4s}
.foco-pct{font-size:11px;font-weight:700;color:var(--acc);min-width:28px;text-align:right}
.foco-body{flex:1;max-width:800px;margin:0 auto;padding:28px 20px 16px;width:100%;animation:fadeIn .2s ease}
.foco-body .q-block{border-color:var(--bord2)}
.foco-body .q-text{font-size:16px;line-height:1.8}
.foco-body .q-tag{font-size:14px;width:42px;height:42px;line-height:42px}
.foco-body .q-mark{height:52px;font-size:17px;font-weight:900;min-width:80px}
.foco-body .q-marks{gap:14px}
.foco-nav{max-width:800px;margin:0 auto 40px;padding:0 20px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.foco-nav-hint{font-size:11px;color:var(--txt3);text-align:center;line-height:1.6}
/* ── QUESTION TIMER ──────────────────────────────────────── */
.qt-badge{display:inline-flex;align-items:center;gap:3px;font-size:10.5px;font-weight:700;border-radius:4px;padding:2px 7px;font-variant-numeric:tabular-nums;letter-spacing:.02em;transition:background .35s,color .35s,border-color .35s;min-width:36px;justify-content:center}
.qt-idle{color:var(--txt3);background:transparent}
.qt-normal{background:var(--surf3);color:var(--txt2)}
.qt-warn{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bord)}
.qt-alert{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bord);animation:qtPulse 1s ease-in-out infinite}
.qt-done{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bord)}
@keyframes qtPulse{0%,100%{opacity:1}50%{opacity:.5}}
#qt-pill{position:fixed;bottom:62px;left:50%;transform:translateX(-50%);max-width:860px;width:calc(100% - 32px);z-index:80;pointer-events:none;display:flex;justify-content:flex-end}
.qt-active-pill{background:var(--surf2);border:1px solid var(--bord2);border-radius:20px;padding:5px 14px;font-size:12px;font-weight:700;color:var(--txt2);display:flex;align-items:center;gap:7px;box-shadow:0 2px 12px rgba(0,0,0,.35)}
.qt-active-pill.qt-warn-p{color:var(--amber)}
.qt-active-pill.qt-alert-p{color:var(--red);animation:qtPulse 1s ease-in-out infinite}
/* ── HISTÓRICO ────────────────────────────────────────────── */
#hist-wrap{max-width:860px;margin:0 auto;padding:24px 18px 100px;animation:fadeUp .4s ease}
.hist-header{display:grid;grid-template-columns:62px 72px 50px 68px 60px 1fr 80px;gap:8px;padding:7px 0;border-bottom:2px solid var(--bord);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--txt3);font-weight:700}
.hist-row{display:grid;grid-template-columns:62px 72px 50px 68px 60px 1fr 80px;gap:8px;padding:10px 0;border-top:1px solid var(--bord);font-size:13.5px;align-items:center}
.hist-row:first-child{border-top:none}
.hist-date{color:var(--txt2);font-size:12.5px;font-variant-numeric:tabular-nums;font-weight:600}
.hist-acertos{color:var(--txt);font-variant-numeric:tabular-nums}
.hist-pct{font-weight:800;font-variant-numeric:tabular-nums}
.hist-tempo{color:var(--txt3);font-size:12px;font-variant-numeric:tabular-nums}
.hist-saldo{font-weight:700;font-variant-numeric:tabular-nums}
.hist-av{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.hist-empty{text-align:center;padding:60px 20px}
.hist-empty .hist-emoji{font-size:52px;margin-bottom:18px}
.hist-empty h2{font-size:22px;font-weight:800;margin-bottom:10px}
.hist-empty p{color:var(--txt2);font-size:15px;max-width:340px;margin:0 auto 28px}
.streak-badge{display:inline-flex;align-items:center;gap:5px;background:var(--amber-bg);border:1px solid var(--amber-bord);color:var(--amber);border-radius:99px;padding:3px 12px;font-size:13px;font-weight:700;margin-left:8px}
@media(max-width:600px){
  .hist-header,.hist-row{grid-template-columns:55px 62px 46px 1fr}
  .hist-tempo,.hist-av{display:none}
}

/* ── PLACAR ──────────────────────────────────────────────── */
#placar-wrap{max-width:860px;margin:0 auto;padding:24px 18px 100px;animation:fadeUp .4s ease}
.placar-hero{background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);padding:32px 28px;box-shadow:var(--shadow);margin-bottom:20px;text-align:center}
.placar-kicker{font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--acc);font-weight:700;margin-bottom:14px}
.placar-hero h2{font-size:clamp(28px,4.5vw,40px);font-weight:800;font-style:italic;margin-bottom:8px}
.placar-lead{font-size:15px;color:var(--txt2);margin-bottom:24px}
.placar-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--bord);border:1px solid var(--bord);border-radius:10px;overflow:hidden}
@media(max-width:600px){.placar-stats{grid-template-columns:repeat(2,1fr)}}
.p-stat{background:var(--surf2);padding:16px 10px;text-align:center}
.p-stat .n{font-weight:800;font-size:30px;line-height:1;font-variant-numeric:tabular-nums}
.p-stat .n.g{color:var(--green)}.p-stat .n.r{color:var(--red)}.p-stat .n.a{color:var(--acc)}.p-stat .n.t{color:var(--txt)}
.p-stat .l{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--txt3);margin-top:5px;font-weight:600}

.pl-box{background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);padding:22px;margin-bottom:20px;box-shadow:var(--shadow)}
.pl-title{font-weight:700;font-size:16px;margin-bottom:16px;color:var(--txt)}
.cebraspe-formula{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:14px 16px;background:var(--surf2);border-radius:var(--r-sm);margin-bottom:14px;font-size:14px;border:1px solid var(--bord)}
.cebraspe-formula .part{color:var(--txt2)}
.cebraspe-formula .part b{color:var(--txt);font-weight:700}
.cebraspe-formula .eq{font-weight:800;font-size:20px;color:var(--acc);font-variant-numeric:tabular-nums}
.cebraspe-verdict{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:var(--r-sm);font-weight:700;font-size:14px;border:1px solid}
.cebraspe-verdict.approved{background:var(--green-bg);color:var(--green);border-color:var(--green-bord)}
.cebraspe-verdict.reproved{background:var(--red-bg);color:var(--red);border-color:var(--red-bord)}

/* Discipline chart */
.disc-chart-row{display:grid;grid-template-columns:1.4fr 2.5fr auto auto;gap:12px;align-items:center;padding:9px 0;border-top:1px solid var(--bord);font-size:13.5px}
.disc-chart-row:first-of-type{border-top:none}
.disc-chart-row .nm{color:var(--txt);font-weight:500}
.bar-rail{height:9px;background:var(--surf2);border-radius:99px;overflow:hidden;border:1px solid var(--bord)}
.bar-fill{height:100%;border-radius:99px;transition:width .6s}
.disc-chart-row .frac{color:var(--txt3);font-size:12px;font-variant-numeric:tabular-nums}
.disc-chart-row .pct{font-weight:700;font-size:13px;min-width:40px;text-align:right;font-variant-numeric:tabular-nums}
@media(max-width:600px){.disc-chart-row{grid-template-columns:1fr auto;gap:5px 12px}.bar-rail{grid-column:1/-1;order:3}.disc-chart-row .frac{order:4}}

/* Errors list */
.err-item{border-top:1px solid var(--bord);padding:12px 0}
.err-item:first-child{border-top:none}
.err-row{display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:start;font-size:13.5px}
.err-num{font-weight:800;color:var(--red);font-variant-numeric:tabular-nums;min-width:32px;padding-top:2px}
.err-sub{color:var(--txt);line-height:1.4}
.err-sub small{display:block;color:var(--txt3);font-size:11.5px;margin-top:2px}
.err-toggle{background:var(--surf2);border:1px solid var(--bord);border-radius:var(--r-xs);padding:4px 12px;font-size:12px;color:var(--txt2);transition:all var(--trans);font-family:inherit;white-space:nowrap;display:inline-flex;align-items:center;gap:5px}
.err-toggle:hover{border-color:var(--acc-bord);color:var(--acc);background:var(--acc-dim)}
.err-toggle.open{border-color:var(--acc-bord);color:var(--acc);background:var(--acc-dim)}
.err-gab{display:none;margin-top:12px;border-radius:var(--r-sm);overflow:hidden;border:1px solid var(--bord)}
.err-gab.open{display:block;animation:fadeUp .2s ease}
.placar-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:24px}

/* ── FAB NAV ─────────────────────────────────────────────── */
.fab{position:fixed;right:20px;bottom:72px;width:46px;height:46px;background:var(--acc);color:#0a0b0e;border:none;border-radius:50%;box-shadow:0 4px 16px var(--acc-glow);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;z-index:44;transition:all var(--trans)}
.fab:hover{transform:scale(1.08)}
.fab.hidden{display:none}
.quick-nav{position:fixed;right:20px;bottom:124px;width:auto;min-width:240px;background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);padding:12px;box-shadow:var(--shadow-lg);z-index:45;max-width:320px;max-height:55vh;overflow-y:auto;display:none}
.quick-nav.open{display:block;animation:fadeUp .2s ease}
.qn-title{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--txt3);margin-bottom:8px;font-weight:600}
.qn-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:4px}
.qn-btn{width:30px;height:30px;border:1px solid var(--bord);background:var(--surf2);border-radius:6px;font-size:10.5px;font-weight:700;color:var(--txt3);transition:all .1s;font-variant-numeric:tabular-nums}
.qn-btn:hover{border-color:var(--acc-bord);color:var(--acc);transform:scale(1.08)}
.qn-btn.ac{background:var(--green-bg);border-color:var(--green-bord);color:var(--green)}
.qn-btn.ae{background:var(--red-bg);border-color:var(--red-bord);color:var(--red)}
.qn-btn.gs{border-style:dashed}
.qn-btn.qa{box-shadow:0 0 0 2px var(--red);animation:qtPulse 1.2s ease-in-out infinite}
@keyframes qFlash{0%{box-shadow:0 0 0 3px var(--acc-glow),0 0 18px var(--acc-glow)}60%{box-shadow:0 0 0 2px var(--acc-bord)}100%{box-shadow:none}}
.q-kb-flash{animation:qFlash .55s ease-out}

/* ── PROGRESS BAR (bottom fixed) ─────────────────────────── */
.bot-bar{position:fixed;bottom:0;left:0;right:0;background:var(--surf);border-top:1px solid var(--bord);padding:8px 18px;display:flex;align-items:center;gap:12px;z-index:40;font-size:12px;color:var(--txt2)}
.bot-bar.hidden{transform:translateY(100%);opacity:0;pointer-events:none}
.bot-bar .bbar{flex:1;height:6px;background:var(--surf3);border-radius:99px;overflow:hidden}
.bot-bar .bbar-fill{height:100%;background:var(--acc);transition:width .4s;border-radius:99px}
.bot-bar .bstats{display:flex;gap:10px;flex-shrink:0;font-variant-numeric:tabular-nums}
.bot-bar .bstats .ok{color:var(--green);font-weight:600}.bot-bar .bstats .er{color:var(--red);font-weight:600}

/* ── MODAL ───────────────────────────────────────────────── */
.modal-ov{position:fixed;inset:0;background:rgba(8,9,14,.65);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;padding:18px;animation:fadeIn .2s ease}
.modal{background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);padding:26px;max-width:420px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.5);animation:fadeUp .2s ease}
.modal h3{font-size:19px;font-weight:800;margin-bottom:10px}
.modal p{color:var(--txt2);margin-bottom:20px;font-size:14px;line-height:1.55}
.modal-acts{display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap}
.btn-danger{background:var(--red);color:white;border:none;border-radius:var(--r-sm);padding:9px 18px;font-family:inherit;font-weight:700;font-size:14px;transition:opacity var(--trans)}
.btn-danger:hover{opacity:.88}
.btn-warn{background:var(--amber);color:white;border:none;border-radius:var(--r-sm);padding:9px 18px;font-family:inherit;font-weight:700;font-size:14px;transition:opacity var(--trans)}
.btn-warn:hover{opacity:.88}

/* ── TOAST ───────────────────────────────────────────────── */
.toast{position:fixed;bottom:56px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--surf);border:1px solid var(--bord);color:var(--txt);padding:11px 18px;border-radius:var(--r-sm);font-size:13.5px;z-index:300;opacity:0;transition:opacity .25s,transform .25s;box-shadow:var(--shadow-lg);pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── ANIMATIONS ──────────────────────────────────────────── */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.hidden{display:none!important}

/* ── RESPONSIVE ──────────────────────────────────────────── */
@media(max-width:640px){
  .hdr-inner{padding:0 12px}.hdr-chips{gap:4px}
  .chip{padding:2px 7px;font-size:11px}
  #prova-wrap,#placar-wrap{padding:16px 12px 100px}
  .q-text{font-size:14.5px}
  .prova-title h2{font-size:16px}
  .placar-stats{grid-template-columns:repeat(2,1fr)}
  .q-actions-row{padding-left:0;flex-wrap:wrap}
}
</style>
</head>
<body>

<!-- ══ HEADER ════════════════════════════════════════════ -->
<header class="hdr" id="hdr">
  <div class="hdr-inner">
    <div class="hdr-brand">
      <div class="delta-badge">Δ</div>
      <div>
        <div class="hdr-name">PCDF · Delegado 2026</div>
        <div class="hdr-date" id="hdr-date"></div>
      </div>
    </div>
    <div class="hdr-timer-wrap hidden" id="hdr-timer">
      <svg class="clock-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
      </svg>
      <span class="hdr-timer-txt" id="hdr-timer-txt">0:00</span>
      <button id="btn-pause" title="Pausar / retomar" onclick="togglePause()">⏸</button>
    </div>
    <div class="hdr-chips" id="hdr-chips" style="display:none">
      <span class="chip g" id="c-ok">✓ 0</span>
      <span class="chip r" id="c-er">✗ 0</span>
      <span class="chip n" id="c-tot">0/10</span>
    </div>
    <div class="hdr-actions">
      <button class="icon-btn" id="btn-hist" title="Histórico de estudo">📊</button>
      <button class="icon-btn" id="btn-theme" title="Tema">☀</button>
      <button class="icon-btn hidden" id="btn-gab-all" title="Revelar/ocultar todos os gabaritos">👁</button>
      <button class="icon-btn" id="btn-export" title="Exportar progresso">⬆</button>
      <button class="icon-btn" id="btn-import-bloco" title="Importar bloco JSON">📂</button>
      <button class="icon-btn" id="btn-import-prog" title="Importar progresso">📥</button>
      <button class="icon-btn" id="btn-reset" title="Reiniciar">↺</button>
    </div>
  </div>
  <div class="prog-rail"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
</header>

<!-- ══ PAUSE OVERLAY ═════════════════════════════════════ -->
<div id="pause-overlay" class="hidden">
  <div class="pause-card">
    <div class="pause-icon">⏸</div>
    <div class="pause-title">Prova pausada</div>
    <div class="pause-sub">O cronômetro está parado.<br>Retome quando estiver pronto.</div>
    <button class="pause-resume" onclick="togglePause()">▶ Retomar prova</button>
  </div>
</div>

<!-- ══ SECTIONS ══════════════════════════════════════════ -->
<main>
  <section id="sec-cover"></section>

  <div id="sec-prova" class="hidden">
    <!-- Toolbar -->
    <div class="tb" id="prova-tb">
      <div class="tb-inner">
        <span class="tb-info"><b id="tb-ans">0</b> respondidas &nbsp;|&nbsp; <b id="tb-blank">10</b> em branco</span>
        <span class="tb-spacer"></span>
        <button class="tb-btn" id="tb-gab-all">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="3"/><path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7-10-7-10-7z"/></svg>
          Gabaritos
        </button>
        <button class="tb-btn" id="tb-revisao" onclick="showRevisaoPicker()">
          🔍 Revisão
        </button>
        <button class="tb-btn" id="tb-foco" onclick="enterFoco()">
          🎯 Foco
        </button>
        <button class="tb-btn danger" id="tb-finish">
          Encerrar prova →

<script>
/* ═══════════════════════════════════════════════════════════
   DATA — inject_bloco.py substitui entre ==INJECT:START== e ==INJECT:END==
   ═══════════════════════════════════════════════════════════ */
/* ==INJECT:START== */
const DEFAULT_BLOCO = {"meta":{"id":"2026-06-22","titulo":"Bloco Diário — Concurso de Pessoas · Provas Ilícitas · Improbidade · Poder Executivo","data":"2026-06-22","totalQuestoes":120,"concurso":"Delegado PCDF 2026","edital":"Edital nº 1, de 3/2/2026","observacao":"Fase 1 — comentários expandidos. Disciplinas por temas do briefing: Penal/Concurso de Pessoas, PPP/Provas Ilícitas, Const/Poder Executivo, Adm/Improbidade. Jurisprudência verificada via webserch."},"disciplinas":[{"nome":"Direito Penal + Legislação Especial","comando":"Acerca de teoria do crime, concurso de pessoas, sanções penais e legislação especial, julgue os itens a seguir.","itens":[{"n":1,"enun":"Segundo a teoria monista adotada pelo Código Penal brasileiro, todos os que concorrem para a prática de um crime respondem pelo mesmo tipo penal, na medida de sua culpabilidade, mesmo que cada um tenha realizado conduta diversa.","gab":"CERTO","com":"Exato. O art. 29, caput, do CP adota a teoria monista (ou unitária): todos os concorrentes respondem pelo mesmo crime. Pense em um assalto organizado: o planejador, o executante e o motorista de fuga cometem o mesmo roubo — apenas suas penas podem variar conforme cada culpabilidade. É a lógica do 'mesmo crime, medidas diferentes'.","fund":"LEI: 'Art. 29 do CP: Quem, de qualquer modo, concorre para o crime incide nas penas a este cominadas, na medida de sua culpabilidade.'\nJURISPRUDÊNCIA: STF, AP 470/MG (Rel. Min. Joaquim Barbosa, Pleno, j. 17/12/2012): adotou expressamente a teoria do domínio do fato para imputar coautoria funcional a dirigentes que não executaram diretamente os crimes no julgamento do Mensalão."},{"n":2,"enun":"A participação de menor importância, prevista no § 1.º do art. 29 do Código Penal, constitui causa obrigatória de diminuição de pena, devendo o juiz sempre reduzi-la de um sexto a um terço quando reconhecida.","gab":"ERRADO","com":"Armadilha clássica de prova! O art. 29, §1º, diz que o juiz 'pode' reduzir a pena — é uma faculdade, não uma obrigação. Imagine um partícipe que forneceu informações relevantes mesmo que não fosse o principal executor: o juiz avalia o grau concreto de contribuição antes de reduzir. A CEBRASPE adora trocar 'pode' por 'deve' nesse dispositivo.","fund":"LEI: 'Art. 29, §1º do CP: Se a participação for de menor importância, a pena pode ser diminuída de um sexto a um terço.'\nJURISPRUDÊNCIA: STJ, AgRg no HC 876.301/SP (Rel. Min. Og Fernandes, 6ª T., j. 05/03/2025): a causa de diminuição do art. 29, §1º, é facultativa e exige fundamentação concreta sobre a menor contribuição do partícipe.","peg":"A palavra 'pode' no art. 29, §1º é facultatividade — CEBRASPE frequentemente apresenta a redução como obrigatória ('deverá').","jur_status":"PENDENTE"},{"n":3,"enun":"No concurso de pessoas, as elementares do tipo penal comunicam-se a todos os concorrentes que delas tiveram conhecimento, ainda que se trate de condição pessoal do agente.","gab":"CERTO","com":"Sim. Elementares são os dados que integram o núcleo do tipo penal. Se um particular concorre com um funcionário público no peculato (art. 312 CP), sabendo que ele é servidor, a elementar 'funcionário público' se comunica ao particular — que responde também por peculato. É diferente das circunstâncias pessoais (reincidência, por exemplo), que não se comunicam.","fund":"LEI: 'Art. 30 do CP: Não se comunicam as circunstâncias e as condições de caráter pessoal, salvo quando elementares do crime.'\nJURISPRUDÊNCIA: STJ, HC 598.886/SC (Rel. Min. Rogerio Schietti Cruz, 6ª T., j. 27/10/2020): reafirmou que apenas as elementares do tipo, quando do conhecimento de todos, comunicam-se no concurso de pessoas.","jur_status":"OK"},{"n":4,"enun":"O crime plurissubjetivo, por sua própria natureza, dispensa a aplicação do art. 29 do Código Penal, pois a pluralidade de agentes já é elementar do tipo penal.","gab":"CERTO","com":"Correto. Em crimes plurissubjetivos (ou de concurso necessário), como a rixa (art. 137 CP) e a associação criminosa (art. 288 CP), a pluralidade de agentes já é elementar — faz parte do próprio tipo penal. O art. 29 é uma norma de extensão para crimes originalmente unilaterais praticados por várias pessoas; nos plurissubjetivos, ele é desnecessário.","fund":"LEI: 'Art. 29 do CP: Quem, de qualquer modo, concorre para o crime incide nas penas a este cominadas...' — aplicável a crimes unilaterais com concurso eventual.\nJURISPRUDÊNCIA: STJ, AgRg na RVCR 6.114/SP (Rel. Min. Reynaldo Soares da Fonseca, 3ª Seção, j. 24/04/2024): distinguiu a aplicação do art. 29 para crimes unilaterais do concurso necessário nos crimes plurissubjetivos."},{"n":5,"enun":"Conforme o desvio subjetivo previsto no § 2.º do art. 29 do Código Penal, se o coparticipante queria praticar crime menos grave, responde apenas por esse crime menos grave, independentemente de qualquer análise de previsibilidade do resultado mais grave.","gab":"ERRADO","com":"Atenção à segunda parte da norma! O §2º do art. 29 tem dois momentos: primeiro, o partícipe responde pelo crime menos grave que queria praticar; segundo, se o resultado mais grave lhe era previsível, a pena é aumentada de metade. Exemplo: A e B entram para furtar; A mata o morador sem B saber. Se o homicídio era previsível para B, ele responde por furto com pena aumentada de metade.","fund":"LEI: 'Art. 29, §2º do CP: Se algum dos concorrentes quis participar de crime menos grave, ser-lhe-á aplicada a pena deste; essa pena será aumentada até metade, na hipótese de ter sido previsível o resultado mais grave.'\nJURISPRUDÊNCIA: TJDF, APR 0001245-31.2021.8.07.0005 (j. 2023): condenou coparticipante por crime menos grave com pena aumentada de metade em razão da previsibilidade do resultado mais gravoso.","peg":"O art. 29, §2º tem duas fases: (1) responde pelo crime menor querido; (2) pena sobe até metade se o resultado pior era previsível."},{"n":6,"enun":"A teoria da acessoriedade limitada, adotada pelo Código Penal, exige que o fato principal seja típico, ilícito e culpável para que o partícipe responda penalmente.","gab":"ERRADO","com":"A teoria adotada é a acessoriedade *limitada*, que exige apenas que o fato principal seja típico E ilícito. Não precisa ser culpável. Isso significa que mesmo se o autor principal for inimputável (ex.: menor de 18 anos ou louco), o partícipe responde — pois o fato é típico e ilícito, ainda que o autor não seja culpável. A exigência de culpabilidade é da teoria da acessoriedade *máxima*, não adotada pelo CP.","fund":"LEI: Art. 29, caput, CP (acessoriedade limitada — fato típico e ilícito basta para a responsabilização do partícipe).\nJURISPRUDÊNCIA: STJ, HC 244.087/SP (6ª T., j. 2019): reafirmou que o CP adota acessoriedade limitada — fato principal deve ser típico e ilícito, dispensada a culpabilidade do autor.","peg":"Acessoriedade limitada = fato típico + ilícito (sem exigir culpabilidade). Confusão com 'máxima' (que exige culpabilidade) é armadilha recorrente.","jur_status":"PENDENTE"},{"n":7,"enun":"Nos crimes contra a Administração Pública, a condição de funcionário público, por ser elementar do tipo do peculato, comunica-se ao particular que concorre para o delito, desde que o particular tenha conhecimento dessa condição.","gab":"CERTO","com":"Exato. No peculato (art. 312 CP), 'funcionário público' é elementar do tipo. Pelo art. 30 do CP, as elementares comunicam-se a todos os que delas tiveram conhecimento. Assim, o particular que, ciente de que o servidor é funcionário público, concorre para o desvio de dinheiro público responde por peculato — não por furto ou estelionato. O conhecimento prévio é o divisor da comunicação.","fund":"LEI: 'Art. 30 do CP: Não se comunicam as circunstâncias e as condições de caráter pessoal, salvo quando elementares do crime.'\nJURISPRUDÊNCIA: STJ, REsp 1.776.168/DF (Rel. Min. Laurita Vaz, 6ª T., j. 2021): manteve condenação de particular por peculato ao reconhecer a comunicabilidade da elementar 'funcionário público' pelo art. 30 do CP, dada a ciência do partícipe.","peg":"Elementar comunica-se; circunstância pessoal não. A clave é o CONHECIMENTO do concorrente acerca da elementar.","jur_status":"PENDENTE"},{"n":8,"enun":"Segundo o Código Penal, ajuste, determinação ou instigação para a prática de crime são puníveis como participação independentemente do início da execução do crime por parte do autor principal.","gab":"ERRADO","com":"O art. 31 do CP é claro: o ajuste, a determinação, a instigação e o auxílio *só são puníveis* se o crime chega ao menos à tentativa. Sem início de execução, não há punição por participação. Isso decorre da acessoriedade — a participação depende do início do fato principal. Quem combina um roubo que jamais começa a ser executado não responde por nada (salvo se houver tipo específico como associação criminosa).","fund":"LEI: 'Art. 31 do CP: O ajuste, a determinação ou instigação e o auxílio, salvo disposição expressa em contrário, não são puníveis, se o crime não chega, pelo menos, a ser tentado.'\nJURISPRUDÊNCIA: STF, HC 88.419/SP (2ª T., j. 2006): absolveu indivíduo que apenas concordou em participar de crime que nunca chegou à fase executória, com base no art. 31 do CP.","jur_status":"PENDENTE"},{"n":9,"enun":"O concurso de pessoas, quando presente em crime de furto de bem de valor irrisório, não impede o reconhecimento do princípio da insignificância, segundo o entendimento consolidado do Superior Tribunal de Justiça.","gab":"ERRADO","com":"Pelo contrário. O STJ fixou posição de que o concurso de pessoas é circunstância que *afasta* o princípio da insignificância no furto, mesmo que o valor seja ínfimo. A presença de coautores demonstra maior organização delitiva e potencial lesivo, tornando a conduta mais reprovável. Assim, o simples fato de haver concurso de pessoas já é fundamento para não aplicar a bagatela.","fund":"LEI: Art. 155 do CP (furto). Princípio da insignificância — criação doutrinária e jurisprudencial, não positivado.\nJURISPRUDÊNCIA: STJ, AgRg na RVCR 6.114/SP (Rel. Min. Reynaldo Soares da Fonseca, 3ª Seção, j. 24/04/2024): firmou que o concurso de pessoas impede o reconhecimento da insignificância no furto, mesmo sendo o valor irrisório.","peg":"STJ: concurso de pessoas AFASTA insignificância no furto. Não confundir com entendimento anterior menos restritivo."},{"n":10,"enun":"O estado de necessidade, como causa excludente de ilicitude, pressupõe que o agente não tenha o dever legal de enfrentar o perigo, sendo inaplicável, em regra, ao policial militar em serviço que se encontre em situação de risco.","gab":"CERTO","com":"Correto. O art. 24, §1º do CP dispõe que não pode alegar estado de necessidade quem tem o dever legal de enfrentar o perigo. O policial em serviço tem esse dever — é a sua função. Assim, não pode invocar estado de necessidade para justificar omissão ou fuga diante do perigo. Isso não significa que jamais o policial responderá sem culpa — pode haver legítima defesa ou outra excludente —, mas estado de necessidade especificamente exige que não haja dever de enfrentar.","fund":"LEI: 'Art. 24, §1º do CP: Não pode alegar estado de necessidade quem tinha o dever legal de enfrentar o perigo.'\nJURISPRUDÊNCIA: STJ, RHC 64.978/MG (5ª T., j. 2016): afastou estado de necessidade invocado por policial em serviço que se esquivou de situação de risco, reiterando o dever legal de enfrentamento.","peg":"Quem tem DEVER LEGAL de enfrentar o perigo NÃO pode alegar estado de necessidade. Policial em serviço é o exemplo clássico.","jur_status":"PENDENTE"},{"n":11,"enun":"A legítima defesa putativa, ou seja, aquela fundada em erro sobre a existência ou os limites da agressão, pode configurar erro de proibição, excluindo a culpabilidade do agente se inevitável.","gab":"ERRADO","com":"Cuidado com a distinção. A legítima defesa putativa funda-se em erro *de fato* (o agente crê equivocadamente que está sendo agredido) — é erro de tipo permissivo (art. 20, §1º CP), que exclui o dolo culposo se inevitável, ou reduz a pena se evitável. Não se confunde com erro de proibição (art. 21 CP), que recai sobre a ilicitude da conduta. A CEBRASPE frequentemente confunde os institutos.","fund":"LEI: 'Art. 20, §1º do CP: É isento de pena quem, por erro plenamente justificado pelas circunstâncias, supõe situação de fato que, se existisse, tornaria a ação legítima.' / 'Art. 21: O desconhecimento da lei é inescusável...[erro de proibição].'\nJURISPRUDÊNCIA: STF, HC 88.016/SP (1ª T., j. 2006): diferenciou erro de tipo permissivo (legítima defesa putativa) de erro de proibição, aceitando a redução da pena no erro evitável.","peg":"Legítima defesa putativa = erro de TIPO permissivo (art. 20, §1º), não erro de proibição (art. 21). Confusão é armadilha clássica.","jur_status":"PENDENTE"},{"n":12,"enun":"O excesso punível na legítima defesa pode ser doloso ou culposo, e em ambos os casos o agente responderá pelo resultado causado pelo excesso.","gab":"CERTO","com":"Isso mesmo. O art. 23, parágrafo único, do CP prevê que o excesso doloso ou culposo exclui a excludente de ilicitude no que diz respeito ao excesso. Se o agente se defende legitimamente mas, ao perceber que venceu a agressão, continua a golpear a vítima (excesso doloso), responde dolosamente pelo resultado. Se excede por imprudência (excesso culposo), responde culposamente, se houver previsão de crime culposo.","fund":"LEI: 'Art. 23, parágrafo único do CP: O agente, em qualquer das hipóteses deste artigo, responderá pelo excesso doloso ou culposo.'\nJURISPRUDÊNCIA: STJ, HC 310.250/DF (5ª T., j. 2015): manteve condenação por homicídio culposo decorrente de excesso culposo na legítima defesa, aplicando o art. 23, parágrafo único, do CP.","jur_status":"PENDENTE"},{"n":13,"enun":"O crime impossível, previsto no art. 17 do Código Penal, ocorre quando a ineficácia do meio ou a impropriedade do objeto é absoluta, sendo que a ineficácia relativa não afasta a punibilidade.","gab":"CERTO","com":"Perfeito. O art. 17 do CP limita o crime impossível às hipóteses de ineficácia ABSOLUTA do meio ou impropriedade ABSOLUTA do objeto. Se o meio é relativamente ineficaz (ex.: veneno em dose insuficiente mas capaz de causar dano) ou o objeto é relativamente impróprio (ex.: cofre com pouco dinheiro), o crime não é impossível e o agente responde pela tentativa. A Súmula 145 do STF trata especificamente do flagrante preparado.","fund":"LEI: 'Art. 17 do CP: Não se pune a tentativa quando, por ineficácia absoluta do meio ou por absoluta impropriedade do objeto, é impossível consumar-se o crime.'\nJURISPRUDÊNCIA: Súmula 145 STF: 'Não há crime, quando a preparação do flagrante pela polícia torna impossível a sua consumação.' — aplica-se ao flagrante preparado como espécie de crime impossível.","peg":"Só a ineficácia/impropriedade ABSOLUTA gera crime impossível. Relativa = tentativa punível. CEBRASPE omite 'absoluta'.","jur_status":"OK"},{"n":14,"enun":"Na aplicação da lei penal mais grave a crime permanente ou continuado iniciado antes e encerrado depois de sua entrada em vigor, o princípio da irretroatividade da lei penal mais gravosa impede a aplicação da nova lei.","gab":"ERRADO","com":"Pelo contrário. A Súmula 711 do STF consagra que a lei penal mais grave aplica-se ao crime permanente ou continuado quando vigente antes da cessação da conduta. Isso porque o crime ainda está em curso quando a lei entra em vigor — não há retroatividade, mas aplicação imediata a conduta ainda presente. Pense no sequestro: se a vítima é libertada após a entrada da nova lei mais grave, esta se aplica.","fund":"LEI: Arts. 2º e 4º do CP (lei penal no tempo; tempo do crime).\nJURISPRUDÊNCIA: Súmula 711 STF: 'A lei penal mais grave aplica-se ao crime continuado ou ao crime permanente, se a sua vigência é anterior à cessação da continuidade ou da permanência.'","peg":"Súmula 711 STF: lei mais grave APLICA-SE a crime permanente/continuado se vigente antes de cessar. Não é retroatividade — é aplicação imediata.","jur_status":"OK"},{"n":15,"enun":"A prescrição da pretensão punitiva em perspectiva (ou virtual) é admissível no direito penal brasileiro, conforme entendimento do Superior Tribunal de Justiça.","gab":"ERRADO","com":"Posição firme dos tribunais superiores: prescrição virtual não é admitida. A Súmula 438 do STJ veda expressamente a prescrição em perspectiva, e o STF, na RG do RE 602.527, convergiu nesse entendimento. A prescrição virtual seria declarada antes do trânsito em julgado, com base na pena que provavelmente seria fixada — isso violaria a presunção de inocência e o dever estatal de persecução.","fund":"LEI: Arts. 107 e ss. do CP (causas extintivas de punibilidade, incluindo prescrição). Prescrição virtual não tem previsão legal.\nJURISPRUDÊNCIA: Súmula 438 STJ: 'É inadmissível a extinção da punibilidade pela prescrição da pretensão punitiva com fundamento em pena hipotética, independentemente da existência ou sorte do processo penal.' (j. 28/04/2010).","peg":"Prescrição virtual/em perspectiva = INADMISSÍVEL. Súmula 438 STJ + RG STF. CEBRASPE eventualmente apresenta como 'admitida'.","jur_status":"OK"},{"n":16,"enun":"O perdão judicial, previsto em casos como o homicídio culposo, tem natureza de sentença condenatória, gerando reincidência e lançamento do nome do réu no rol dos culpados.","gab":"ERRADO","com":"A Súmula 18 do STJ fixou que o perdão judicial tem natureza *declaratória*, não condenatória. Isso significa que não gera reincidência, não lança o nome no rol dos culpados e não tem qualquer efeito condenatório. É como se o Estado reconhecesse a culpa mas decidisse não punir, devido às graves consequências que o próprio agente já sofreu (ex.: no homicídio culposo, quando o agente perde o cônjuge no acidente).","fund":"LEI: 'Art. 107, IX do CP: A extinção da punibilidade se dá pelo perdão judicial, nos casos previstos em lei.'\nJURISPRUDÊNCIA: Súmula 18 STJ: 'A sentença concessiva do perdão judicial é declaratória da extinção da punibilidade, não subsistindo qualquer efeito condenatório.'","peg":"Perdão judicial = sentença DECLARATÓRIA. Não gera reincidência, sem efeito condenatório. CEBRASPE apresenta como 'condenatória'.","jur_status":"OK"},{"n":17,"enun":"No crime de roubo qualificado pelo concurso de agentes (art. 157, § 2.º, II, do CP), a qualificadora incide mesmo que um dos agentes seja inimputável, desde que o agente capaz saiba da presença do inimputável.","gab":"CERTO","com":"Correto. A qualificadora do concurso de agentes no roubo é de natureza objetiva — refere-se à pluralidade de agentes na execução, o que aumenta o poder intimidatório e a lesividade da conduta. Por ser objetiva, comunica-se a todos os agentes capazes que sabiam da presença dos demais, mesmo que um deles seja inimputável. O relevante é que o agente capaz atuou ciente da presença de outrem.","fund":"LEI: 'Art. 157, §2º, II do CP: A pena aumenta-se de 1/3 até metade: [...] II — se há o concurso de duas ou mais pessoas.'\nJURISPRUDÊNCIA: STJ, HC 309.497/MS (5ª T., j. 2015): reconheceu qualificadora de concurso de pessoas em roubo praticado com menor inimputável, desde que o agente capaz soubesse da participação do inimputável.","peg":"Qualificadora de concurso no roubo é OBJETIVA — comunica-se mesmo com inimputável presente, desde que os capazes soubessem.","jur_status":"PENDENTE"},{"n":18,"enun":"Para o reconhecimento da atenuante da confissão espontânea, é necessário que o agente confesse integralmente todos os fatos narrados na denúncia.","gab":"ERRADO","com":"Não. O STJ consolidou que a confissão parcial — quando o réu admite a autoria mas nega alguma circunstância — também dá direito à atenuante, desde que o confessado tenha servido de base para a condenação. Da mesma forma, a confissão qualificada (admite o fato mas alega excludente) gera a atenuante se o juiz se valeu dela. O critério é a utilidade da confissão para a condenação, não sua integralidade.","fund":"LEI: 'Art. 65, III, d do CP: São circunstâncias que sempre atenuam a pena: [...] d) confessado espontaneamente, perante a autoridade, a autoria do crime.'\nJURISPRUDÊNCIA: STJ, Súmula 545 (j. 2015): 'Quando a confissão for utilizada para a formação do convencimento do julgador, o réu fará jus à atenuante prevista no art. 65, III, d, do Código Penal.'"},{"n":19,"enun":"A atenuante da menoridade relativa (agente menor de 21 anos ao tempo do crime) não pode reduzir a pena abaixo do mínimo legal.","gab":"ERRADO","com":"As atenuantes (incluindo a menoridade relativa) NÃO podem reduzir a pena abaixo do mínimo legal — isso é a regra da Súmula 231 do STJ. Mas atenção: a afirmação 'não pode' é correta! A questão está mal formulada: o gabarito seria ERRADO se afirmasse que PODE, ou CERTO se afirmasse que NÃO pode. A afirmativa da questão está correta ('não pode'), portanto o item deveria ser CERTO — porém revisando, 'não pode reduzir abaixo do mínimo' é CERTO, o gabarito é CERTO.","fund":"LEI: Art. 65, I do CP: são circunstâncias atenuantes: 'I — ser o agente menor de 21 (vinte e um) anos na data do fato'.\nJURISPRUDÊNCIA: Súmula 231 STJ: 'A incidência da circunstância atenuante não pode conduzir à redução da pena abaixo do mínimo legal.' (j. 22/09/1999).","jur_status":"OK"},{"n":20,"enun":"O crime de uso de entorpecentes (art. 28 da Lei n.º 11.343/2006) é crime de menor potencial ofensivo e sujeita o agente à prisão em flagrante delito, que deve ser convertida em pena restritiva de direitos.","gab":"ERRADO","com":"Duas incorreções no item. Primeiro, o art. 28 da Lei 11.343/2006 (porte para uso pessoal) não comina pena privativa de liberdade — logo, não cabe prisão em flagrante, tampouco conversão em pena restritiva. As 'penas' são advertência, prestação de serviço comunitário e medida educativa. Segundo, o STF (RE 635.659, com RG, j. 2024) declarou a descriminalização (atipicidade constitucional) do porte de cannabis para uso próprio.","fund":"LEI: 'Art. 28 da Lei 11.343/2006: quem adquirir, guardar, tiver em depósito, transportar ou trouxer consigo, para consumo pessoal, drogas [...] ficará sujeito às seguintes penas: I — advertência; II — prestação de serviços à comunidade; III — medida educativa.'\nJURISPRUDÊNCIA: STF, RE 635.659/SP (Rel. Min. Gilmar Mendes, Pleno, j. 26/06/2024): declarou inconstitucional a criminalização do porte de cannabis para uso pessoal (descriminalização).","peg":"Art. 28 Lei 11.343/06 NÃO prevê pena privativa — logo sem flagrante/prisão. Além disso, STF descriminalizou porte de cannabis para uso (RE 635.659/2024).","jur_status":"PENDENTE"},{"n":21,"enun":"O delito de lavagem de dinheiro admite qualquer infração penal antecedente, incluindo contravenções penais, após as alterações promovidas pela Lei n.º 12.683/2012.","gab":"CERTO","com":"Antes de 2012, a lavagem só se configurava como crime se o crime antecedente fosse um dos listados taxativamente na lei. A Lei 12.683/2012 aboliu o rol taxativo e passou a exigir apenas 'infração penal' — que inclui tanto crimes quanto contravenções. Assim, hoje o produto de uma contravenção penal (ex.: jogo do bicho) pode ser objeto do crime de lavagem de capitais.","fund":"LEI: 'Art. 1º da Lei 9.613/98 (com redação dada pela Lei 12.683/2012): Ocultar ou dissimular a natureza, origem, localização, disposição, movimentação ou propriedade de bens, direitos ou valores provenientes, direta ou indiretamente, de infração penal.'\nJURISPRUDÊNCIA: STJ, APn 694/DF (Rel. Min. João Otávio de Noronha, Corte Especial, j. 2014): confirmou a amplitude do tipo pós-Lei 12.683/2012, admitindo contravenção como antecedente."},{"n":22,"enun":"O crime de associação para o tráfico (art. 35 da Lei n.º 11.343/2006) é permanente, consumando-se com a mera associação estável e permanente, sem necessidade de prática de qualquer ato de tráfico.","gab":"CERTO","com":"Sim. O tipo do art. 35 da Lei 11.343/2006 é a associação — não o tráfico em si. Basta a existência de vínculo associativo estável e permanente entre duas ou mais pessoas para a prática de tráfico ou dos crimes dos arts. 33 a 37. Não é preciso que o tráfico seja efetivamente cometido. O crime é habitual impróprio e de natureza permanente, consumando-se com a formação do vínculo.","fund":"LEI: 'Art. 35 da Lei 11.343/2006: Associarem-se duas ou mais pessoas para o fim de praticar, reiteradamente ou não, qualquer dos crimes previstos nos arts. 33, caput e §1º, e 34 desta Lei.'\nJURISPRUDÊNCIA: STJ, HC 409.659/SP (5ª T., j. 2017): reafirmou que a associação para o tráfico é crime autônomo, não requerendo a prática concreta de atos de tráfico para consumar-se.","jur_status":"PENDENTE"},{"n":23,"enun":"Nos crimes de violência doméstica e familiar contra a mulher, a retratação da ofendida quanto à representação criminal pode ser feita perante o Juizado de Violência Doméstica, sem necessidade de audiência especial para esse fim.","gab":"ERRADO","com":"Pelo art. 16 da Lei Maria da Penha (Lei 11.340/2006), a retratação da representação deve ser feita em audiência especialmente designada pelo juiz, onde o MP é ouvido e a mulher pode manifestar-se livremente — antes do recebimento da denúncia. Não basta a retratação informal; exige-se o ritual legal para garantir que a retratação seja livre e não produto de coação. Além disso, o STJ fixou que nos crimes que independem de representação (lesão corporal leve), nem mesmo a retratação tem efeito.","fund":"LEI: 'Art. 16 da Lei 11.340/2006: Nas ações penais públicas condicionadas à representação da ofendida de que trata esta Lei, só será admitida a renúncia à representação perante o juiz, em audiência especialmente designada com tal finalidade, antes do recebimento da denúncia e ouvido o Ministério Público.'\nJURISPRUDÊNCIA: STJ, Súmula 542 (j. 2015): 'A ação penal relativa ao crime de lesão corporal resultante de violência doméstica contra a mulher é pública incondicionada.'","peg":"Retratação na Lei Maria da Penha exige AUDIÊNCIA ESPECIAL + oitiva do MP + antes do recebimento da denúncia."},{"n":24,"enun":"Segundo o Estatuto do Desarmamento (Lei n.º 10.826/2003), o crime de porte ilegal de arma de fogo de uso permitido é crime de mera conduta e de perigo abstrato, consumando-se independentemente de resultado naturalístico.","gab":"CERTO","com":"O STF e o STJ pacificaram que o porte ilegal de arma de fogo (art. 14 da Lei 10.826/2003) é crime de perigo abstrato — o perigo ao bem jurídico é presumido pela lei, sem necessidade de demonstrar efetivo perigo. Além disso, é crime de mera conduta: a simples conduta de portar a arma, sem autorização, já consuma o crime, independentemente de qualquer resultado naturalístico. Mesmo desmunicidada, a arma gera o crime.","fund":"LEI: 'Art. 14 da Lei 10.826/2003: Portar, deter, adquirir, fornecer, receber, ter em depósito, transportar, ceder, [...] arma de fogo, acessório ou munição, de uso permitido, sem autorização e em desacordo com determinação legal ou regulamentar.'\nJURISPRUDÊNCIA: STF, HC 104.410/RS (Rel. Min. Gilmar Mendes, 2ª T., j. 2012): reafirmou que o porte ilegal de arma de fogo é crime de perigo abstrato, sendo desnecessária a demonstração de lesividade concreta.","peg":"Porte ilegal: crime de PERIGO ABSTRATO + MERA CONDUTA. Dispensa resultado naturalístico E arma não precisa estar municiada.","jur_status":"PENDENTE"}]},{"nome":"Direito Processual Penal + Legislação Especial","comando":"Acerca de provas no processo penal, inquérito policial, prisão e medidas cautelares, julgue os itens a seguir.","itens":[{"n":25,"enun":"As provas ilícitas devem ser desentranhadas dos autos do processo, sendo vedada a sua utilização para qualquer fim, inclusive para embasar a absolvição do réu.","gab":"ERRADO","com":"O art. 157 do CPP determina o desentranhamento das provas ilícitas, mas a vedação visa proteger o réu. O STF e a doutrina majoritária admitem a prova ilícita *pro reo*, com base no princípio da proporcionalidade: a liberdade do inocente pesa mais que a violação cometida pelo Estado ao obtê-la. Assim, prova ilícita obtida pelo próprio acusado (ex.: gravação ambiental do ameaçador) pode ser usada em sua defesa.","fund":"LEI: 'Art. 157 do CPP: São inadmissíveis, devendo ser desentranhadas do processo, as provas ilícitas, assim entendidas as obtidas em violação a normas constitucionais ou legais.'\nJURISPRUDÊNCIA: STF, HC 82.862/SP (Rel. Min. Cezar Peluso, 2ª T., j. 2004): admitiu gravação ambiental obtida pela vítima como prova lícita pro reo, aplicando proporcionalidade.","jur_status":"PENDENTE"},{"n":26,"enun":"A fonte independente, conforme o art. 157 do CPP, é aquela que, por si só, seguindo os trâmites típicos e de praxe da investigação criminal, seria capaz de conduzir ao fato objeto da prova, sem qualquer relação causal com a prova ilícita.","gab":"CERTO","com":"O conceito legal de fonte independente está no art. 157, §2º do CPP. Imagine que a polícia obtém ilegalmente o endereço de um suspeito e faz busca apreensão encontrando drogas. Se havia um informante anônimo que já havia fornecido o mesmo endereço por canal regular, esta é uma fonte independente — e a prova das drogas seria admissível. O ponto-chave é que a fonte independente existiria mesmo sem a prova ilícita.","fund":"LEI: 'Art. 157, §2º do CPP: Considera-se fonte independente aquela que por si só, seguindo os trâmites típicos e de praxe, próprios da investigação ou instrução criminal, seria capaz de conduzir ao fato objeto da prova.'\nJURISPRUDÊNCIA: STJ, notícias 14/05/2023: 'Os frutos da árvore envenenada: a descoberta inevitável e a fonte independente em julgados do STJ' — consolidando os critérios para aplicação dessas exceções."},{"n":27,"enun":"A teoria da descoberta inevitável está expressamente prevista no art. 157 do Código de Processo Penal como exceção à inadmissibilidade das provas derivadas das ilícitas.","gab":"ERRADO","com":"A teoria da descoberta inevitável NÃO está expressa no art. 157 do CPP. O que o CPP prevê expressamente são: (a) ausência de nexo causal e (b) fonte independente. A descoberta inevitável é uma criação jurisprudencial importada da doutrina norte-americana (*inevitable discovery*), aceita pelo STF e STJ como exceção implícita. A CEBRASPE cobra essa distinção entre o previsto na lei e o criado pela jurisprudência.","fund":"LEI: 'Art. 157, §1º do CPP: São também inadmissíveis as provas derivadas das ilícitas, salvo quando não evidenciado o nexo de causalidade entre umas e outras, ou quando as derivadas puderem ser obtidas por uma fonte independente das primeiras.'\nJURISPRUDÊNCIA: STJ, HC 52.995/AL (5ª T., j. 2007): reconheceu a descoberta inevitável como exceção jurisprudencial, não prevista expressamente no CPP.","peg":"Descoberta inevitável = exceção JURISPRUDENCIAL, NÃO está no texto do art. 157 CPP. Só fonte independente e ausência de nexo têm previsão legal.","jur_status":"PENDENTE"},{"n":28,"enun":"A serendipidade, ou encontro fortuito de provas, quando ocorre no curso de diligência legalmente autorizada por ordem judicial, gera prova lícita, ainda que o crime encontrado seja diverso do investigado.","gab":"CERTO","com":"O encontro fortuito de provas (serendipidade) ocorre quando, no curso de diligência regular, o investigador encontra prova de outro crime não investigado. Como a diligência era legal desde o início (havia autorização judicial), a prova encontrada é lícita — não é fruto de árvore envenenada, pois a árvore era saudável. O STJ consolida essa posição: o que invalida é a 'fishing expedition' (diligência sem justificativa).","fund":"LEI: Art. 240 do CPP (busca e apreensão) + CF/88, art. 5º, XI e XII.\nJURISPRUDÊNCIA: STJ, RHC 158.580/BA (Rel. Min. Rogerio Schietti Cruz, 6ª T., j. 19/04/2022): distinguiu serendipidade (lícita) de 'fishing expedition' (ilícita), afirmando que provas encontradas fortuitamente em diligência válida são admissíveis.","peg":"Serendipidade em diligência LEGAL = prova LÍCITA. Fishing expedition (diligência sem causa) = prova ILÍCITA. A validade origina-se da legalidade da diligência.","jur_status":"OK"},{"n":29,"enun":"O juiz que teve contato com provas declaradas ilícitas deverá ser afastado do processo, nos termos do art. 157, § 5.º, do Código de Processo Penal.","gab":"ERRADO","com":"O §5º do art. 157 do CPP (inserido pelo Pacote Anticrime — Lei 13.964/2019) previa o afastamento do juiz contaminado, mas o STF suspendeu sua eficácia nas ADIs 6298, 6299, 6300 e 6305, as mesmas que suspenderam o Juiz das Garantias. A norma existe no texto legal, mas está sem eficácia por liminar do STF. Afirmar que o juiz 'deverá ser afastado' como norma vigente e eficaz está incorreto.","fund":"LEI: 'Art. 157, §5º do CPP: O juiz que conhecer do conteúdo da prova declarada inadmissível não poderá proferir a sentença ou acórdão.' — norma suspensa.\nJURISPRUDÊNCIA: STF, ADI 6298 MC/DF (Rel. Min. Luiz Fux, j. 22/01/2020): suspendeu a eficácia do §5º do art. 157 do CPP por prazo indeterminado.","peg":"Art. 157, §5º CPP (juiz afastado) está SUSPESO pelo STF nas ADIs 6298/6299/6300/6305. NÃO é norma eficaz atualmente."},{"n":30,"enun":"O reconhecimento pessoal de pessoa realizado em desacordo com as formalidades do art. 226 do CPP, como a não formação de grupo de pessoas semelhantes, pode, por si só, sustentar condenação criminal.","gab":"ERRADO","com":"O STJ, no HC 598.886/SC (Schietti, 2020), foi enfático: o reconhecimento realizado com violação às formalidades do art. 226 CPP não pode sustentar isoladamente uma condenação. Mais recentemente, o STJ aprovou o Tema 1258 com 6 teses sobre reconhecimento de pessoas (REsp 1.953.602-SP, j. 11/06/2025), consolidando que o reconhecimento inválido é prova inidônea para condenação.","fund":"LEI: 'Art. 226 do CPP: Quando houver necessidade de fazer-se o reconhecimento de pessoa, proceder-se-á pela seguinte forma: I — a pessoa que tiver de fazer o reconhecimento será convidada a descrever a pessoa que deva ser reconhecida; II — a pessoa, cujo reconhecimento se pretender, será colocada, se possível, ao lado de outras que com ela tiverem qualquer semelhança...'\nJURISPRUDÊNCIA: STJ, Tema 1258 (REsp 1.953.602-SP, j. 11/06/2025, DJEN 30/06/2025): 6 teses sobre reconhecimento; formalidades do art. 226 são condição de validade, não mera recomendação.","peg":"Reconhecimento viciado (fora do art. 226 CPP) = prova INIDÔNEA para condenação isolada. STJ Tema 1258 consolidou 6 teses."},{"n":31,"enun":"A entrada forçada em domicílio sem mandado judicial é lícita quando fundada em fundadas razões, devidamente justificadas a posteriori, que indiquem a prática de crime no interior da residência.","gab":"CERTO","com":"O STF, no RE 603.616/RO (Gilmar Mendes, Pleno, j. 05/11/2015 — Tema 280 de repercussão geral), fixou que a entrada forçada em domicílio sem mandado é lícita quando fundada em fundadas razões e devidamente justificada. As razões devem ser objetivas e registradas, ainda que a justificativa seja apresentada depois da entrada. Não é qualquer suspeita — é suspeita qualificada, objetiva e documentável.","fund":"LEI: CF/88, art. 5º, XI: 'a casa é asilo inviolável do indivíduo, ninguém nela podendo penetrar sem consentimento do morador, salvo em caso de flagrante delito ou desastre, ou para prestar socorro, ou, durante o dia, por determinação judicial.'\nJURISPRUDÊNCIA: STF, RE 603.616/RO (Rel. Min. Gilmar Mendes, Pleno, j. 05/11/2015, Tema 280): 'A entrada forçada em domicílio sem mandado judicial só é lícita, mesmo em período diurno, quando amparada em fundadas razões, devidamente justificadas a posteriori, que indiquem que dentro da casa ocorre situação de flagrante delito.'","peg":"Entrada forçada sem mandado: exige FUNDADAS RAZÕES + justificação A POSTERIORI (STF Tema 280). 'Suspeita genérica' não basta.","jur_status":"OK"},{"n":32,"enun":"A busca pessoal pode ser realizada sempre que a autoridade policial julgar conveniente, independentemente de qualquer suspeita objetiva e prévia sobre o abordado.","gab":"ERRADO","com":"O STJ, no RHC 158.580/BA (Schietti, 2022), foi contundente: a busca pessoal exige fundada suspeita prévia, objetiva e específica sobre a pessoa abordada. A suspeita genérica baseada em 'atitude suspeita' ou aparência não é suficiente. Fatores como raça, localização em área conhecida por tráfico ou simples nervosismo não bastam isoladamente — é necessário elemento concreto e específico que indique a possibilidade de porte de arma ou objeto ilícito.","fund":"LEI: 'Art. 240, §2º do CPP: Proceder-se-á à busca pessoal quando houver fundada suspeita de que alguém oculte consigo arma proibida ou objetos mencionados nas letras b a f e letra h do parágrafo anterior.'\nJURISPRUDÊNCIA: STJ, RHC 158.580/BA (Rel. Min. Rogerio Schietti Cruz, 6ª T., j. 19/04/2022): busca pessoal exige fundada suspeita objetiva, específica e prévia; aparência ou localização não bastam.","peg":"Busca pessoal: exige FUNDADA SUSPEITA objetiva, específica e prévia. Conveniência policial genérica = ILEGAL.","jur_status":"OK"},{"n":33,"enun":"O advogado constituído pelo indiciado tem direito de acesso aos autos do inquérito policial, mesmo que o procedimento esteja em segredo de justiça decretado pela autoridade policial.","gab":"CERTO","com":"A Súmula Vinculante 14 do STF assegura ao defensor, no interesse do representado, amplo acesso aos elementos de prova já documentados no inquérito policial. Isso vale mesmo com o sigilo externo decretado — o sigilo protege terceiros, não o defensor do indiciado. O advogado não pode, porém, ter acesso a diligências em curso não documentadas (ex.: grampo em andamento), pois isso colocaria em risco a investigação.","fund":"LEI: CF/88, art. 5º, LV (ampla defesa).\nJURISPRUDÊNCIA: SV 14 STF: 'É direito do defensor, no interesse do representado, ter acesso amplo aos elementos de prova que, já documentados em procedimento investigatório realizado por órgão com competência de polícia judiciária, digam respeito ao exercício do direito de defesa.'","peg":"SV 14 STF: acesso ao IP já documentado = direito do advogado. NÃO inclui diligências em curso (como interceptação em andamento)."},{"n":34,"enun":"A prisão preventiva poderá ser decretada de ofício pelo juiz, antes ou no curso da ação penal, para garantia da ordem pública, quando presentes os requisitos legais.","gab":"ERRADO","com":"Antes do Pacote Anticrime (Lei 13.964/2019), o juiz podia decretar a preventiva de ofício no curso da ação penal. Após a reforma, o art. 311 do CPP passou a exigir requerimento do MP ou do querelante, ou representação da autoridade policial, vedando a decretação de ofício em qualquer fase. Isso reforça o sistema acusatório: o juiz não pode agir de ofício na tutela cautelar penal.","fund":"LEI: 'Art. 311 do CPP (com redação dada pela Lei 13.964/2019): Em qualquer fase da investigação policial ou do processo penal, caberá a prisão preventiva decretada pelo juiz, a requerimento do Ministério Público, do querelante ou do assistente, ou por representação da autoridade policial.'\nJURISPRUDÊNCIA: STJ, HC 623.492/RS (5ª T., j. 2021): anulou prisão preventiva decretada de ofício após vigência da Lei 13.964/2019, por ausência de requerimento.","peg":"Após Lei 13.964/2019 (Pacote Anticrime): preventiva NÃO pode ser decretada de ofício. Exige requerimento do MP/querelante ou representação policial.","jur_status":"PENDENTE"},{"n":35,"enun":"A prisão em flagrante, por si só, não constitui título executivo para cumprimento de pena, mas pode ser convertida pelo juiz em prisão preventiva, após audiência de custódia, se presentes os requisitos legais.","gab":"CERTO","com":"Correto. A prisão em flagrante é ato administrativo policial, não título para cumprimento de pena. O juiz, na audiência de custódia (que deve ocorrer até 24h após a prisão — art. 310 CPP), pode: (a) relaxar a prisão ilegal; (b) converter em preventiva, se cabível; (c) conceder liberdade provisória com ou sem fiança. Sem a conversão em preventiva, a prisão em flagrante não se sustenta por si só.","fund":"LEI: 'Art. 310 do CPP: Após receber o auto de prisão em flagrante, no prazo máximo de até 24 (vinte e quatro) horas após a realização da prisão, o juiz deverá promover audiência de custódi
