<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PCDF · Delegado 2026</title>
<!-- PWA -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0a0b14">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PCDF">
<link rel="apple-touch-icon" href="/icons/icon-180.png">
<link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png">
<link rel="apple-touch-icon" sizes="167x167" href="/icons/icon-167.png">
<link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180.png">
<link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png">
<style>
/* ── TOKENS ──────────────────────────────────────────────── */
:root{
  --bg:#0a0b0e; --surf:#12141a; --surf2:#181b24; --surf3:#1e2230;
  --bord:#252a3a; --bord2:#2e3448;
  --txt:#e4e8f4; --txt2:#7a8399; --txt3:#3d4562;
  --acc:#e8a020; --acc-dim:rgba(232,160,32,.13); --acc-glow:rgba(232,160,32,.28); --acc-bord:rgba(232,160,32,.32); --acc-bg:#1c1206;
  --green:#28c76f; --green-bg:rgba(40,199,111,.1); --green-bord:rgba(40,199,111,.3);
  --red:#f05252; --red-bg:rgba(240,82,82,.1); --red-bord:rgba(240,82,82,.3);
  --amber:#f59e0b; --amber-bg:rgba(245,158,11,.1); --amber-bord:rgba(245,158,11,.3);
  --mono:"SF Mono","Fira Code",monospace;
  --r:12px; --r-sm:8px; --r-xs:5px;
  --trans:140ms cubic-bezier(.4,0,.2,1);
  --shadow:0 2px 14px rgba(0,0,0,.5); --shadow-lg:0 4px 28px rgba(0,0,0,.65);
}
[data-theme=light]{
  --bg:#f1f3f8; --surf:#fff; --surf2:#f5f7fc; --surf3:#eef0f8;
  --bord:#dde2ef; --bord2:#cdd3e6;
  --txt:#0e1121; --txt2:#5a6380; --txt3:#9ea8c0;
  --acc:#c47c0a; --acc-dim:rgba(196,124,10,.08); --acc-glow:rgba(196,124,10,.2); --acc-bord:rgba(196,124,10,.28); --acc-bg:#fdf6e8;
  --green:#16a34a; --green-bg:rgba(22,163,74,.08); --green-bord:rgba(22,163,74,.28);
  --red:#dc2626; --red-bg:rgba(220,38,38,.08); --red-bord:rgba(220,38,38,.28);
  --amber:#d97706; --amber-bg:rgba(217,119,6,.08); --amber-bord:rgba(217,119,6,.28);
  --shadow:0 2px 8px rgba(0,0,0,.1); --shadow-lg:0 4px 16px rgba(0,0,0,.15);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;font-size:15px;line-height:1.6;transition:background var(--trans),color var(--trans)}
button{font-family:inherit;cursor:pointer}

/* ── HEADER ──────────────────────────────────────────────── */
.hdr{position:sticky;top:0;z-index:100;background:var(--surf);border-bottom:1px solid var(--bord);box-shadow:var(--shadow)}
.hdr-inner{max-width:860px;margin:0 auto;display:flex;align-items:center;gap:10px;height:62px;padding:0 18px}
.hdr-brand{display:flex;align-items:center;gap:11px;flex:1;min-width:0}
.delta-badge{width:42px;height:42px;border-radius:10px;background:var(--acc);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:#0a0b0e;flex-shrink:0;letter-spacing:-.02em;box-shadow:0 2px 10px var(--acc-glow)}
.hdr-name{font-weight:800;font-size:16.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.01em}
.hdr-date{font-size:12px;color:var(--txt2);margin-top:1px}
.hdr-chips{display:flex;gap:5px;align-items:center;flex-shrink:0}
.chip{border-radius:6px;padding:2px 9px;font-size:12px;font-weight:700}
.chip.g{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bord)}
.chip.r{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bord)}
.chip.n{background:var(--surf2);color:var(--txt2);border:1px solid var(--bord)}
.chip.t{background:var(--acc-dim);color:var(--acc);border:1px solid var(--acc-bord)}
.hdr-timer-wrap{display:flex;align-items:center;gap:6px;flex-shrink:0;background:var(--surf2);border:1px solid var(--bord);border-radius:8px;padding:5px 10px}
.hdr-timer-wrap.hidden{display:none!important}
.hdr-timer-wrap svg.clock-ic{width:17px;height:17px;color:var(--acc);flex-shrink:0}
.hdr-timer-txt{font-size:15px;font-weight:700;color:var(--txt);font-variant-numeric:tabular-nums;min-width:38px}
#btn-pause{background:transparent;border:none;cursor:pointer;padding:0 2px;font-size:14px;color:var(--txt2);line-height:1;transition:color var(--trans)}
#btn-pause:hover{color:var(--acc)}
#btn-pause.paused{color:var(--acc)}
/* Overlay de pausa */
#pause-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.72);backdrop-filter:blur(6px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px}
#pause-overlay.hidden{display:none!important}
.pause-card{background:var(--surf1);border:1px solid var(--bord);border-radius:16px;padding:40px 56px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:14px}
.pause-icon{font-size:48px;line-height:1}
.pause-title{font-size:22px;font-weight:700;color:var(--txt)}
.pause-sub{font-size:14px;color:var(--txt2)}
.pause-resume{background:var(--acc);color:#000;border:none;border-radius:10px;padding:13px 36px;font-size:16px;font-weight:700;cursor:pointer;transition:opacity var(--trans)}
.pause-resume:hover{opacity:.85}
.hdr-actions{display:flex;gap:3px;flex-shrink:0}
.icon-btn{background:var(--surf2);border:1px solid var(--bord);color:var(--txt2);border-radius:7px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all var(--trans)}
.icon-btn:hover{background:var(--acc-dim);border-color:var(--acc-bord);color:var(--acc)}
.prog-rail{height:2px;background:var(--surf3)}
.prog-fill{height:2px;background:var(--acc);transition:width .4s}

/* ── COVER ───────────────────────────────────────────────── */
.cover{max-width:580px;margin:0 auto;padding:48px 18px 80px;text-align:center;animation:fadeIn .4s ease}
.cover-kicker{font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--acc);font-weight:700;margin-bottom:16px}
.cover h1{font-size:clamp(32px,5vw,48px);font-weight:800;font-style:italic;margin-bottom:14px;line-height:1.1}
.cover-lead{font-size:16px;color:var(--txt2);margin-bottom:32px;line-height:1.5}
.cover-card{background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);padding:24px;text-align:left;box-shadow:var(--shadow)}
.meta-grid{display:grid;grid-template-columns:auto 1fr;gap:7px 18px;font-size:13.5px;margin-bottom:18px}
.meta-grid dt{color:var(--txt3);font-size:11px;letter-spacing:.08em;text-transform:uppercase;align-self:center}
.meta-grid dd{color:var(--txt);margin:0;font-weight:500}
.cover-note{font-size:13.5px;color:var(--txt2);font-style:italic;padding:12px 14px;background:var(--surf2);border-left:3px solid var(--acc-bord);border-radius:0 var(--r-xs) var(--r-xs) 0;margin-bottom:22px;line-height:1.5}
.cover-actions{display:flex;flex-direction:column;gap:10px}
.cover-countdown{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:18px;flex-wrap:wrap}
.ccd-box{text-align:center;background:var(--surf2);border:1px solid var(--bord2);border-radius:var(--r-sm);padding:10px 16px;min-width:62px}
.ccd-num{font-size:28px;font-weight:900;font-style:italic;line-height:1;color:var(--acc)}
.ccd-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--txt3);margin-top:2px}
.ccd-sep{font-size:22px;font-weight:900;color:var(--bord2);margin-bottom:12px}
.sr-due-nudge{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--red-bg);border:1px solid var(--red-bord);border-radius:var(--r-sm);font-size:13px;color:var(--red);margin-bottom:14px;cursor:pointer;transition:background .15s}
.sr-due-nudge:hover{background:rgba(240,82,82,.18)}
.btn-primary{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 28px;background:var(--acc);color:#0a0b0e;border:none;border-radius:var(--r-sm);font-weight:800;font-size:15px;letter-spacing:.02em;transition:all var(--trans);box-shadow:0 4px 16px var(--acc-glow)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px var(--acc-glow)}
.btn-ghost{background:var(--surf2);border:1px solid var(--bord);color:var(--txt2);padding:10px 20px;border-radius:var(--r-sm);font-size:14px;transition:all var(--trans)}
.btn-ghost:hover{border-color:var(--bord2);color:var(--txt)}

/* ── PROVA TOOLBAR ───────────────────────────────────────── */
.tb{position:sticky;top:54px;z-index:90;background:var(--surf);border-bottom:1px solid var(--bord);backdrop-filter:blur(8px)}
.tb-inner{max-width:860px;margin:0 auto;display:flex;align-items:center;gap:8px;padding:8px 18px;flex-wrap:wrap}
.tb-info{font-size:13px;color:var(--txt2);font-variant-numeric:tabular-nums}
.tb-info b{color:var(--txt)}
.tb-spacer{flex:1}
.tb-btn{background:var(--surf2);border:1px solid var(--bord);border-radius:var(--r-sm);padding:6px 13px;font-size:12.5px;color:var(--txt);transition:all var(--trans);display:inline-flex;align-items:center;gap:6px}
.tb-btn:hover{border-color:var(--bord2);background:var(--surf3)}
.tb-btn.danger{border-color:var(--acc-bord);color:var(--acc);background:var(--acc-dim)}
.tb-btn.danger:hover{background:var(--acc-bg)}
.tb-btn svg{width:12px;height:12px}

/* ── PROVA CONTENT ───────────────────────────────────────── */
#prova-wrap{max-width:860px;margin:0 auto;padding:24px 18px 100px}

/* Discipline header */
.disc-section{margin-bottom:48px}
.disc-hdr{text-align:left;margin:40px 0 16px;background:var(--surf);border-top:3px solid var(--acc);border-bottom:1px solid var(--bord);padding:13px 0 11px;position:relative}
.disc-hdr h3{font-weight:800;font-size:20px;letter-spacing:-.01em;text-transform:none;color:var(--txt);display:flex;align-items:center;gap:10px}

.comando{background:var(--surf2);border:1px solid var(--bord);border-radius:var(--r-sm);padding:12px 16px;font-size:14px;color:var(--txt2);margin-bottom:16px;font-style:italic;line-height:1.5}

/* Question block */
.q-block{border-top:1px solid var(--bord);padding:16px 0;scroll-margin-top:100px}
.q-block:first-of-type{border-top:none;padding-top:4px}
.q-line{display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:start}
.q-tag{display:inline-flex;align-items:center;gap:6px;font-weight:800;font-size:13px;color:var(--acc);flex-shrink:0;padding-top:2px;white-space:nowrap}
.q-tag::before{content:'';width:8px;height:12px;background:var(--acc);clip-path:polygon(0 0,80% 0,100% 50%,80% 100%,0 100%);display:inline-block}
.q-text{font-size:15.5px;line-height:1.65;color:var(--txt)}
.q-text .situacao{display:block;font-style:italic;color:var(--txt2);margin-bottom:8px;padding-left:12px;border-left:2px solid var(--bord2)}
.q-marks{display:flex;gap:6px;flex-shrink:0;padding-top:1px}
.q-mark{width:40px;height:40px;border:1.5px solid var(--bord);border-radius:var(--r-sm);background:var(--surf2);font-weight:800;font-size:14px;color:var(--txt2);display:inline-flex;align-items:center;justify-content:center;transition:all var(--trans)}
.q-mark:hover:not(:disabled){border-color:var(--txt2);color:var(--txt);transform:translateY(-1px)}
.q-mark.sel-c{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.q-mark.sel-e{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.q-mark:disabled{opacity:.5;cursor:default}
/* After gabarito shown, ring correct/wrong */
.q-block.gab-on .q-mark.sel-c.is-right,.q-block.gab-on .q-mark.sel-e.is-right{box-shadow:0 0 0 2px var(--green-bg),0 0 0 3px var(--green)}
.q-block.gab-on .q-mark.sel-c.is-wrong,.q-block.gab-on .q-mark.sel-e.is-wrong{box-shadow:0 0 0 2px var(--red-bg),0 0 0 3px var(--red)}

.q-actions-row{margin-top:10px;padding-left:92px;display:flex;align-items:center;gap:10px}
.q-show-gab{background:transparent;border:1px dashed var(--bord2);border-radius:var(--r-xs);padding:3px 11px;font-size:12px;color:var(--txt3);transition:all var(--trans)}
.q-show-gab:hover{border-style:solid;border-color:var(--acc-bord);color:var(--acc)}
.q-status{font-size:11.5px;color:var(--txt3)}
.q-status .ok{color:var(--green);font-weight:600}
.q-status .er{color:var(--red);font-weight:600}

/* Feedback */
.q-feedback{margin-top:14px;border-radius:var(--r-sm);overflow:hidden;border:1px solid var(--bord);animation:fadeUp .2s ease}
.gab-line{display:flex;align-items:center;gap:8px;padding:9px 14px;background:var(--surf2);border-bottom:1px solid var(--bord);font-size:13px;font-weight:700}
.gab-label{color:var(--txt3);font-size:10px;letter-spacing:.1em;text-transform:uppercase;font-weight:600}
.gab-value{color:var(--txt)}
.gab-badge{margin-left:auto;font-size:11.5px;padding:2px 10px;border-radius:99px;font-weight:700}
.gab-badge.ok{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bord)}
.gab-badge.er{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bord)}
.gab-badge.bk{background:var(--surf3);color:var(--txt3);border:1px solid var(--bord)}

.gab-section{border-top:1px solid var(--bord);background:var(--surf)}
.gab-hdr{display:flex;align-items:center;gap:8px;padding:9px 14px;cursor:pointer;font-size:13px;font-weight:600;background:var(--surf2);border:none;width:100%;text-align:left;color:var(--txt);transition:background var(--trans)}
.gab-hdr:hover{background:var(--surf3)}
.gab-icon{flex-shrink:0}
.gab-lbl{flex:1}
.gab-chev{font-size:11px;color:var(--txt3);transition:transform var(--trans)}
.gab-chev.open{transform:rotate(180deg)}
.gab-body{padding:12px 14px;font-size:14px;line-height:1.7;color:var(--txt2)}
.gab-body.hidden{display:none}
.feynman-text{color:var(--txt);font-size:14.5px;line-height:1.75}
.law-block{font-family:var(--mono);font-size:12px;background:var(--surf2);border:1px solid var(--bord);border-radius:var(--r-xs);padding:11px 13px;white-space:pre-wrap;line-height:1.65;color:var(--txt)}
.copy-btn{display:inline-flex;align-items:center;gap:5px;margin-top:8px;font-size:11.5px;padding:4px 12px;border-radius:5px;border:1px solid var(--bord2);background:var(--surf3);color:var(--txt3);cursor:pointer;transition:all var(--trans);font-family:inherit}
.copy-btn:hover{color:var(--acc);border-color:var(--acc-bord);background:var(--acc-dim)}
.peg-box{display:flex;gap:8px;align-items:flex-start;background:var(--amber-bg);border:1px solid var(--amber-bord);border-radius:var(--r-xs);padding:10px 13px;font-size:13px;color:var(--amber);line-height:1.55}

/* ── TRAP WORDS (Releitura Crítica) ──────────────────────── */
.trap-word{font-weight:800;color:var(--acc);background:var(--acc-dim);border-bottom:2px solid var(--acc);padding:0 3px;border-radius:3px}
.releitura-body{font-size:14.5px;line-height:1.8;color:var(--txt);margin-bottom:10px}
.releitura-body .situacao{display:block;font-style:italic;color:var(--txt2);margin-bottom:8px;padding-left:12px;border-left:2px solid var(--bord2)}
.trap-legend{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--txt3);margin-top:6px;flex-wrap:wrap}
.trap-legend .trap-word{font-size:11.5px;cursor:default}
.trap-found{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;color:var(--acc);font-weight:700}

/* ── AUTOAVALIAÇÃO ────────────────────────────────────────── */
.avaliacao-row{padding:11px 14px;background:var(--surf2);border-top:1px solid var(--bord);display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.avaliacao-lbl{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--txt3);font-weight:600;width:100%;margin-bottom:2px}
.av-btn{border-radius:99px;padding:5px 13px;font-size:12.5px;font-weight:700;border:1.5px solid;cursor:pointer;font-family:inherit;transition:all var(--trans);background:transparent}
.av-btn.dom{border-color:var(--green-bord);color:var(--green)}
.av-btn.dom:hover,.av-btn.dom.sel{background:var(--green-bg);box-shadow:0 0 0 2px var(--green-bord)}
.av-btn.dvd{border-color:var(--amber-bord);color:var(--amber)}
.av-btn.dvd:hover,.av-btn.dvd.sel{background:var(--amber-bg);box-shadow:0 0 0 2px var(--amber-bord)}
.av-btn.lac{border-color:var(--red-bord);color:var(--red)}
.av-btn.lac:hover,.av-btn.lac.sel{background:var(--red-bg);box-shadow:0 0 0 2px var(--red-bord)}
.av-btn.leit{border-color:var(--bord2);color:var(--txt2)}
.av-btn.leit:hover,.av-btn.leit.sel{background:var(--surf3);color:var(--txt);box-shadow:0 0 0 2px var(--bord2)}
.av-set{display:flex;align-items:center;gap:8px;padding:9px 14px;background:var(--surf2);border-top:1px solid var(--bord);font-size:13px}
.av-chip{border-radius:99px;padding:3px 12px;font-size:12px;font-weight:700;border:1.5px solid}
.av-chip.dom{background:var(--green-bg);color:var(--green);border-color:var(--green-bord)}
.av-chip.dvd{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-bord)}
.av-chip.lac{background:var(--red-bg);color:var(--red);border-color:var(--red-bord)}
.av-chip.leit{background:var(--surf3);color:var(--txt2);border-color:var(--bord2)}
.av-change{margin-left:auto;background:transparent;border:1px dashed var(--bord2);border-radius:var(--r-xs);padding:2px 9px;font-size:11.5px;color:var(--txt3);cursor:pointer;font-family:inherit;transition:all var(--trans)}
.av-change:hover{color:var(--acc);border-color:var(--acc-bord)}

/* ── DIAGNÓSTICO (Placar) ─────────────────────────────────── */
.diag-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--bord);border:1px solid var(--bord);border-radius:10px;overflow:hidden;margin-bottom:14px}
@media(max-width:600px){.diag-grid{grid-template-columns:repeat(2,1fr)}}
.diag-cell{background:var(--surf2);padding:14px 10px;text-align:center}
.diag-cell .dn{font-size:26px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums}
.diag-cell .dl{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--txt3);margin-top:5px;font-weight:600;line-height:1.3}
.diag-empty{color:var(--txt3);font-size:14px;font-style:italic;padding:12px 0}

/* ── REVISÃO ──────────────────────────────────────────────── */
#rev-wrap{max-width:860px;margin:0 auto;padding:0 0 100px}
.rev-picker{max-width:580px;margin:0 auto;padding:36px 18px 60px;animation:fadeIn .3s ease}
.rev-picker h2{font-size:clamp(22px,4vw,32px);font-weight:800;font-style:italic;margin-bottom:6px}
.rev-picker .sub{font-size:15px;color:var(--txt2);margin-bottom:28px;line-height:1.5}
.filter-sec-lbl{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--txt3);font-weight:700;margin:22px 0 10px}
.filter-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
@media(max-width:480px){.filter-grid{grid-template-columns:1fr}}
.filter-card{background:var(--surf);border:1.5px solid var(--bord);border-radius:var(--r);padding:15px 16px;text-align:left;cursor:pointer;transition:all var(--trans);font-family:inherit;display:flex;flex-direction:column;gap:3px}
.filter-card:hover:not(:disabled){border-color:var(--acc-bord);background:var(--acc-dim)}
.filter-card.sel{border-color:var(--acc);background:var(--acc-dim);box-shadow:0 0 0 1.5px var(--acc)}
.filter-card:disabled{opacity:.35;cursor:not-allowed;pointer-events:none}
.fc-icon{font-size:20px}
.fc-count{font-size:28px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums}
.fc-count.cr{color:var(--red)}.fc-count.ca{color:var(--amber)}.fc-count.cg{color:var(--green)}.fc-count.ct{color:var(--txt)}
.fc-label{font-size:12px;color:var(--txt2);font-weight:600}
.disc-filter-row{display:flex;flex-wrap:wrap;gap:7px}
.disc-btn{background:var(--surf2);border:1.5px solid var(--bord);border-radius:99px;padding:5px 14px;font-size:13px;font-family:inherit;color:var(--txt2);cursor:pointer;transition:all var(--trans);font-weight:500}
.disc-btn:hover{border-color:var(--acc-bord);color:var(--acc)}
.disc-btn.sel{border-color:var(--acc);color:var(--acc);background:var(--acc-dim)}
.mode-box{background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);overflow:hidden;margin-bottom:24px}
.mode-tabs{display:grid;grid-template-columns:1fr 1fr}
.mode-tab{border:none;background:var(--surf2);color:var(--txt2);font-size:14px;font-weight:700;padding:12px 8px;cursor:pointer;font-family:inherit;border-bottom:2px solid transparent;transition:all var(--trans);display:flex;align-items:center;justify-content:center;gap:6px}
.mode-tab:first-child{border-right:1px solid var(--bord)}
.mode-tab.active{background:var(--surf);color:var(--acc);border-bottom-color:var(--acc)}
.mode-desc-txt{font-size:13px;color:var(--txt2);padding:11px 14px;line-height:1.55;border-top:1px solid var(--bord)}
.rev-tb{position:sticky;top:54px;z-index:90;background:var(--surf);border-bottom:1px solid var(--bord)}
.rev-tb-inner{max-width:860px;margin:0 auto;display:flex;align-items:center;gap:8px;padding:7px 18px;flex-wrap:wrap}
.rev-badge{background:var(--acc-dim);border:1px solid var(--acc-bord);color:var(--acc);border-radius:99px;padding:3px 12px;font-size:12px;font-weight:700;flex-shrink:0}
.rev-orig{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;padding:2px 9px;border-radius:99px;font-weight:600;flex-shrink:0}
.rev-orig.ok{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bord)}
.rev-orig.er{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bord)}
.rev-orig.bk{background:var(--surf3);color:var(--txt3);border:1px solid var(--bord)}
.rev-placar-wrap{max-width:580px;margin:0 auto;padding:32px 18px 100px;animation:fadeUp .4s ease}

/* ── ESPAÇAMENTO INTELIGENTE ──────────────────────────────── */
.sr-badge{display:inline-flex;align-items:center;gap:3px;font-size:10.5px;font-weight:700;border-radius:4px;padding:2px 7px;line-height:1.4;white-space:nowrap}
.sr-badge.due{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bord)}
.sr-badge.soon{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bord)}
.sr-badge.ok{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bord)}
.sr-queue-section{margin-bottom:20px}
.sr-queue-hdr{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--red);font-weight:700;margin-bottom:10px}
.sr-queue-row{display:flex;align-items:center;gap:10px;padding:9px 14px;border-radius:var(--r-sm);background:var(--surf);border:1.5px solid var(--red-bord);margin-bottom:7px;cursor:default;transition:background .15s}
.sr-queue-date{font-size:11px;color:var(--txt3);min-width:52px}
.sr-queue-title{flex:1;font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sr-queue-pct{font-size:13px;font-weight:700;min-width:38px;text-align:right}
.sr-interval-info{font-size:11px;color:var(--txt3);margin-top:4px}
/* ── MODO FOCO ────────────────────────────────────────────── */
#sec-foco{position:fixed;inset:0;z-index:150;background:var(--bg);overflow-y:auto;display:flex;flex-direction:column}
#sec-foco.hidden{display:none!important}
.foco-hdr{position:sticky;top:0;z-index:10;background:var(--bg);border-bottom:1px solid var(--bord2);padding:10px 18px;display:flex;align-items:center;gap:12px}
.foco-qnum{font-size:13px;font-weight:700;color:var(--txt2);white-space:nowrap}
.foco-disc{font-size:11.5px;color:var(--txt3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0}
.foco-prog-wrap{display:flex;align-items:center;gap:8px;min-width:110px}
.foco-progress{height:4px;background:var(--bord);border-radius:2px;flex:1}
.foco-prog-fill{height:100%;background:var(--acc);border-radius:2px;transition:width .4s}
.foco-pct{font-size:11px;font-weight:700;color:var(--acc);min-width:28px;text-align:right}
.foco-body{flex:1;max-width:800px;margin:0 auto;padding:28px 20px 16px;width:100%;animation:fadeIn .2s ease}
.foco-body .q-block{border-color:var(--bord2)}
.foco-body .q-text{font-size:16px;line-height:1.8}
.foco-body .q-tag{font-size:14px;width:42px;height:42px;line-height:42px}
.foco-body .q-mark{height:52px;font-size:17px;font-weight:900;min-width:80px}
.foco-body .q-marks{gap:14px}
.foco-nav{max-width:800px;margin:0 auto 40px;padding:0 20px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.foco-nav-hint{font-size:11px;color:var(--txt3);text-align:center;line-height:1.6}
/* ── QUESTION TIMER ──────────────────────────────────────── */
.qt-badge{display:inline-flex;align-items:center;gap:3px;font-size:10.5px;font-weight:700;border-radius:4px;padding:2px 7px;font-variant-numeric:tabular-nums;letter-spacing:.02em;transition:background .35s,color .35s,border-color .35s;min-width:36px;justify-content:center}
.qt-idle{color:var(--txt3);background:transparent}
.qt-normal{background:var(--surf3);color:var(--txt2)}
.qt-warn{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bord)}
.qt-alert{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bord);animation:qtPulse 1s ease-in-out infinite}
.qt-done{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bord)}
@keyframes qtPulse{0%,100%{opacity:1}50%{opacity:.5}}
#qt-pill{position:fixed;bottom:62px;left:50%;transform:translateX(-50%);max-width:860px;width:calc(100% - 32px);z-index:80;pointer-events:none;display:flex;justify-content:flex-end}
.qt-active-pill{background:var(--surf2);border:1px solid var(--bord2);border-radius:20px;padding:5px 14px;font-size:12px;font-weight:700;color:var(--txt2);display:flex;align-items:center;gap:7px;box-shadow:0 2px 12px rgba(0,0,0,.35)}
.qt-active-pill.qt-warn-p{color:var(--amber)}
.qt-active-pill.qt-alert-p{color:var(--red);animation:qtPulse 1s ease-in-out infinite}
/* ── HISTÓRICO ────────────────────────────────────────────── */
#hist-wrap{max-width:860px;margin:0 auto;padding:24px 18px 100px;animation:fadeUp .4s ease}
.hist-header{display:grid;grid-template-columns:62px 72px 50px 68px 60px 1fr 80px;gap:8px;padding:7px 0;border-bottom:2px solid var(--bord);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--txt3);font-weight:700}
.hist-row{display:grid;grid-template-columns:62px 72px 50px 68px 60px 1fr 80px;gap:8px;padding:10px 0;border-top:1px solid var(--bord);font-size:13.5px;align-items:center}
.hist-row:first-child{border-top:none}
.hist-date{color:var(--txt2);font-size:12.5px;font-variant-numeric:tabular-nums;font-weight:600}
.hist-acertos{color:var(--txt);font-variant-numeric:tabular-nums}
.hist-pct{font-weight:800;font-variant-numeric:tabular-nums}
.hist-tempo{color:var(--txt3);font-size:12px;font-variant-numeric:tabular-nums}
.hist-saldo{font-weight:700;font-variant-numeric:tabular-nums}
.hist-av{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.hist-empty{text-align:center;padding:60px 20px}
.hist-empty .hist-emoji{font-size:52px;margin-bottom:18px}
.hist-empty h2{font-size:22px;font-weight:800;margin-bottom:10px}
.hist-empty p{color:var(--txt2);font-size:15px;max-width:340px;margin:0 auto 28px}
.streak-badge{display:inline-flex;align-items:center;gap:5px;background:var(--amber-bg);border:1px solid var(--amber-bord);color:var(--amber);border-radius:99px;padding:3px 12px;font-size:13px;font-weight:700;margin-left:8px}
@media(max-width:600px){
  .hist-header,.hist-row{grid-template-columns:55px 62px 46px 1fr}
  .hist-tempo,.hist-av{display:none}
}

/* ── PLACAR ──────────────────────────────────────────────── */
#placar-wrap{max-width:860px;margin:0 auto;padding:24px 18px 100px;animation:fadeUp .4s ease}
.placar-hero{background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);padding:32px 28px;box-shadow:var(--shadow);margin-bottom:20px;text-align:center}
.placar-kicker{font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--acc);font-weight:700;margin-bottom:14px}
.placar-hero h2{font-size:clamp(28px,4.5vw,40px);font-weight:800;font-style:italic;margin-bottom:8px}
.placar-lead{font-size:15px;color:var(--txt2);margin-bottom:24px}
.placar-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--bord);border:1px solid var(--bord);border-radius:10px;overflow:hidden}
@media(max-width:600px){.placar-stats{grid-template-columns:repeat(2,1fr)}}
.p-stat{background:var(--surf2);padding:16px 10px;text-align:center}
.p-stat .n{font-weight:800;font-size:30px;line-height:1;font-variant-numeric:tabular-nums}
.p-stat .n.g{color:var(--green)}.p-stat .n.r{color:var(--red)}.p-stat .n.a{color:var(--acc)}.p-stat .n.t{color:var(--txt)}
.p-stat .l{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--txt3);margin-top:5px;font-weight:600}

.pl-box{background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);padding:22px;margin-bottom:20px;box-shadow:var(--shadow)}
.pl-title{font-weight:700;font-size:16px;margin-bottom:16px;color:var(--txt)}
.cebraspe-formula{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:14px 16px;background:var(--surf2);border-radius:var(--r-sm);margin-bottom:14px;font-size:14px;border:1px solid var(--bord)}
.cebraspe-formula .part{color:var(--txt2)}
.cebraspe-formula .part b{color:var(--txt);font-weight:700}
.cebraspe-formula .eq{font-weight:800;font-size:20px;color:var(--acc);font-variant-numeric:tabular-nums}
.cebraspe-verdict{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:var(--r-sm);font-weight:700;font-size:14px;border:1px solid}
.cebraspe-verdict.approved{background:var(--green-bg);color:var(--green);border-color:var(--green-bord)}
.cebraspe-verdict.reproved{background:var(--red-bg);color:var(--red);border-color:var(--red-bord)}

/* Discipline chart */
.disc-chart-row{display:grid;grid-template-columns:1.4fr 2.5fr auto auto;gap:12px;align-items:center;padding:9px 0;border-top:1px solid var(--bord);font-size:13.5px}
.disc-chart-row:first-of-type{border-top:none}
.disc-chart-row .nm{color:var(--txt);font-weight:500}
.bar-rail{height:9px;background:var(--surf2);border-radius:99px;overflow:hidden;border:1px solid var(--bord)}
.bar-fill{height:100%;border-radius:99px;transition:width .6s}
.disc-chart-row .frac{color:var(--txt3);font-size:12px;font-variant-numeric:tabular-nums}
.disc-chart-row .pct{font-weight:700;font-size:13px;min-width:40px;text-align:right;font-variant-numeric:tabular-nums}
@media(max-width:600px){.disc-chart-row{grid-template-columns:1fr auto;gap:5px 12px}.bar-rail{grid-column:1/-1;order:3}.disc-chart-row .frac{order:4}}

/* Errors list */
.err-item{border-top:1px solid var(--bord);padding:12px 0}
.err-item:first-child{border-top:none}
.err-row{display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:start;font-size:13.5px}
.err-num{font-weight:800;color:var(--red);font-variant-numeric:tabular-nums;min-width:32px;padding-top:2px}
.err-sub{color:var(--txt);line-height:1.4}
.err-sub small{display:block;color:var(--txt3);font-size:11.5px;margin-top:2px}
.err-toggle{background:var(--surf2);border:1px solid var(--bord);border-radius:var(--r-xs);padding:4px 12px;font-size:12px;color:var(--txt2);transition:all var(--trans);font-family:inherit;white-space:nowrap;display:inline-flex;align-items:center;gap:5px}
.err-toggle:hover{border-color:var(--acc-bord);color:var(--acc);background:var(--acc-dim)}
.err-toggle.open{border-color:var(--acc-bord);color:var(--acc);background:var(--acc-dim)}
.err-gab{display:none;margin-top:12px;border-radius:var(--r-sm);overflow:hidden;border:1px solid var(--bord)}
.err-gab.open{display:block;animation:fadeUp .2s ease}
.placar-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:24px}

/* ── FAB NAV ─────────────────────────────────────────────── */
.fab{position:fixed;right:20px;bottom:72px;width:46px;height:46px;background:var(--acc);color:#0a0b0e;border:none;border-radius:50%;box-shadow:0 4px 16px var(--acc-glow);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;z-index:44;transition:all var(--trans)}
.fab:hover{transform:scale(1.08)}
.fab.hidden{display:none}
.quick-nav{position:fixed;right:20px;bottom:124px;width:auto;min-width:240px;background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);padding:12px;box-shadow:var(--shadow-lg);z-index:45;max-width:320px;max-height:55vh;overflow-y:auto;display:none}
.quick-nav.open{display:block;animation:fadeUp .2s ease}
.qn-title{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--txt3);margin-bottom:8px;font-weight:600}
.qn-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:4px}
.qn-btn{width:30px;height:30px;border:1px solid var(--bord);background:var(--surf2);border-radius:6px;font-size:10.5px;font-weight:700;color:var(--txt3);transition:all .1s;font-variant-numeric:tabular-nums}
.qn-btn:hover{border-color:var(--acc-bord);color:var(--acc);transform:scale(1.08)}
.qn-btn.ac{background:var(--green-bg);border-color:var(--green-bord);color:var(--green)}
.qn-btn.ae{background:var(--red-bg);border-color:var(--red-bord);color:var(--red)}
.qn-btn.gs{border-style:dashed}
.qn-btn.qa{box-shadow:0 0 0 2px var(--red);animation:qtPulse 1.2s ease-in-out infinite}
@keyframes qFlash{0%{box-shadow:0 0 0 3px var(--acc-glow),0 0 18px var(--acc-glow)}60%{box-shadow:0 0 0 2px var(--acc-bord)}100%{box-shadow:none}}
.q-kb-flash{animation:qFlash .55s ease-out}

/* ── PROGRESS BAR (bottom fixed) ─────────────────────────── */
.bot-bar{position:fixed;bottom:0;left:0;right:0;background:var(--surf);border-top:1px solid var(--bord);padding:8px 18px;display:flex;align-items:center;gap:12px;z-index:40;font-size:12px;color:var(--txt2)}
.bot-bar.hidden{transform:translateY(100%);opacity:0;pointer-events:none}
.bot-bar .bbar{flex:1;height:6px;background:var(--surf3);border-radius:99px;overflow:hidden}
.bot-bar .bbar-fill{height:100%;background:var(--acc);transition:width .4s;border-radius:99px}
.bot-bar .bstats{display:flex;gap:10px;flex-shrink:0;font-variant-numeric:tabular-nums}
.bot-bar .bstats .ok{color:var(--green);font-weight:600}.bot-bar .bstats .er{color:var(--red);font-weight:600}

/* ── MODAL ───────────────────────────────────────────────── */
.modal-ov{position:fixed;inset:0;background:rgba(8,9,14,.65);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;padding:18px;animation:fadeIn .2s ease}
.modal{background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);padding:26px;max-width:420px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.5);animation:fadeUp .2s ease}
.modal h3{font-size:19px;font-weight:800;margin-bottom:10px}
.modal p{color:var(--txt2);margin-bottom:20px;font-size:14px;line-height:1.55}
.modal-acts{display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap}
.btn-danger{background:var(--red);color:white;border:none;border-radius:var(--r-sm);padding:9px 18px;font-family:inherit;font-weight:700;font-size:14px;transition:opacity var(--trans)}
.btn-danger:hover{opacity:.88}
.btn-warn{background:var(--amber);color:white;border:none;border-radius:var(--r-sm);padding:9px 18px;font-family:inherit;font-weight:700;font-size:14px;transition:opacity var(--trans)}
.btn-warn:hover{opacity:.88}

/* ── TOAST ───────────────────────────────────────────────── */
.toast{position:fixed;bottom:56px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--surf);border:1px solid var(--bord);color:var(--txt);padding:11px 18px;border-radius:var(--r-sm);font-size:13.5px;z-index:300;opacity:0;transition:opacity .25s,transform .25s;box-shadow:var(--shadow-lg);pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── ANIMATIONS ──────────────────────────────────────────── */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.hidden{display:none!important}

/* ── RESPONSIVE ──────────────────────────────────────────── */
@media(max-width:640px){
  .hdr-inner{padding:0 12px}.hdr-chips{gap:4px}
  .chip{padding:2px 7px;font-size:11px}
  #prova-wrap,#placar-wrap{padding:16px 12px 100px}
  .q-text{font-size:14.5px}
  .prova-title h2{font-size:16px}
  .placar-stats{grid-template-columns:repeat(2,1fr)}
  .q-actions-row{padding-left:0;flex-wrap:wrap}
}
</style>
</head>
<body>

<!-- ══ HEADER ════════════════════════════════════════════ -->
<header class="hdr" id="hdr">
  <div class="hdr-inner">
    <div class="hdr-brand">
      <div class="delta-badge">Δ</div>
      <div>
        <div class="hdr-name">PCDF · Delegado 2026</div>
        <div class="hdr-date" id="hdr-date"></div>
      </div>
    </div>
    <div class="hdr-timer-wrap hidden" id="hdr-timer">
      <svg class="clock-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
      </svg>
      <span class="hdr-timer-txt" id="hdr-timer-txt">0:00</span>
      <button id="btn-pause" title="Pausar / retomar" onclick="togglePause()">⏸</button>
    </div>
    <div class="hdr-chips" id="hdr-chips" style="display:none">
      <span class="chip g" id="c-ok">✓ 0</span>
      <span class="chip r" id="c-er">✗ 0</span>
      <span class="chip n" id="c-tot">0/10</span>
    </div>
    <div class="hdr-actions">
      <button class="icon-btn" id="btn-hist" title="Histórico de estudo">📊</button>
      <button class="icon-btn" id="btn-theme" title="Tema">☀</button>
      <button class="icon-btn hidden" id="btn-gab-all" title="Revelar/ocultar todos os gabaritos">👁</button>
      <button class="icon-btn" id="btn-export" title="Exportar progresso">⬆</button>
      <button class="icon-btn" id="btn-import-bloco" title="Importar bloco JSON">📂</button>
      <button class="icon-btn" id="btn-import-prog" title="Importar progresso">📥</button>
      <button class="icon-btn" id="btn-reset" title="Reiniciar">↺</button>
    </div>
  </div>
  <div class="prog-rail"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
</header>

<!-- ══ PAUSE OVERLAY ═════════════════════════════════════ -->
<div id="pause-overlay" class="hidden">
  <div class="pause-card">
    <div class="pause-icon">⏸</div>
    <div class="pause-title">Prova pausada</div>
    <div class="pause-sub">O cronômetro está parado.<br>Retome quando estiver pronto.</div>
    <button class="pause-resume" onclick="togglePause()">▶ Retomar prova</button>
  </div>
</div>

<!-- ══ SECTIONS ══════════════════════════════════════════ -->
<main>
  <section id="sec-cover"></section>

  <div id="sec-prova" class="hidden">
    <!-- Toolbar -->
    <div class="tb" id="prova-tb">
      <div class="tb-inner">
        <span class="tb-info"><b id="tb-ans">0</b> respondidas &nbsp;|&nbsp; <b id="tb-blank">10</b> em branco</span>
        <span class="tb-spacer"></span>
        <button class="tb-btn" id="tb-gab-all">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="3"/><path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7-10-7-10-7z"/></svg>
          Gabaritos
        </button>
        <button class="tb-btn" id="tb-revisao" onclick="showRevisaoPicker()">
          🔍 Revisão
        </button>
        <button class="tb-btn" id="tb-foco" onclick="enterFoco()">
          🎯 Foco
        </button>
        <button class="tb-btn danger" id="tb-finish">
          Encerrar prova →

<script>
/* ═══════════════════════════════════════════════════════════

/* ==INJECT:START== */
const DEFAULT_BLOCO = {"meta":{"id":"2026-06-21","titulo":"Bloco Diário — 2026-06-21 | PCDF Delegado 2026 | Fase 1 — Comentários Expandidos","data":"2026-06-21","totalQuestoes":120,"concurso":"Delegado PCDF 2026","edital":"Edital nº 1, de 3/2/2026","observacao":"Fase 1 (31/05–22/06/2026): comentários expandidos com lei literal + jurisprudência transcrita. Distribuição fixa: 24 Penal + 22 PPP + 18 Const + 16 Adm + 10 MedLeg + 8 Civil + 6 Trib + 5 Amb + 5 Emp + 6 DF. Calibragem: 20% diretos / 45% médios / 35% difíceis."},"disciplinas":[{"nome":"Direito Penal e Legislação Penal Especial","comando":"Acerca da teoria do crime, culpabilidade, aplicação da lei penal e crimes em espécie, julgue os itens a seguir.","itens":[{"n":1,"enun":"De acordo com a teoria finalista da ação, adotada pelo Código Penal brasileiro, o dolo e a culpa integram a conduta humana, elemento do fato típico, e não a culpabilidade.","gab":"CERTO","com":"Pense na ação como uma flecha disparada: ela já nasce com destino (finalidade). O finalismo de Welzel vê a conduta como ação final, com dolo e culpa no próprio agir, não no juízo de reprovação posterior. O CP brasileiro adota isso: arts. 18 e 19 estão no capítulo do crime, não da culpabilidade.","fund":"LEI: 'Art. 18. Diz-se o crime: I — doloso, quando o agente quis o resultado ou assumiu o risco de produzi-lo; II — culposo, quando o agente deu causa ao resultado por imprudência, negligência ou imperícia.' (CP)\nJURISPRUDÊNCIA: STJ, REsp 1.338.000/PR (5ª T., 2013): 'O Código Penal brasileiro adotou a teoria finalista da conduta, de modo que o dolo e a culpa são elementos da tipicidade, compondo o fato típico.'","jur_status":"PENDENTE"},{"n":2,"enun":"A embriaguez completa decorrente de ato voluntário do agente, por si só, exclui a imputabilidade penal e isenta de pena quem pratica crime nesse estado.","gab":"ERRADO","com":"Analogia: se você decide beber sabendo que pode perder o controle, essa escolha livre é o ponto de partida — a 'causa livre'. O CP diz que embriaguez voluntária não exclui imputabilidade; quem bebeu de livre e espontânea vontade responde pelo crime praticado, mesmo totalmente incapaz no momento do fato.","fund":"LEI: 'Art. 28. Não excluem a imputabilidade penal: II — a embriaguez, voluntária ou culposa, pelo álcool ou substância de efeito análogo.' (CP)\nJURISPRUDÊNCIA: STJ, HC 241.201/MG (5ª T., rel. Laurita Vaz, j. 16/10/2012): 'A embriaguez voluntária ou culposa não afasta a imputabilidade penal do agente, haja vista a adoção, pelo Código Penal, da teoria da actio libera in causa.'","peg":"CEBRASPE frequentemente inclui 'completa' para sugerir que seria excludente — não é. Só embriaguez fortuita/força maior completa exclui (art. 28, §1º).","jur_status":"PENDENTE"},{"n":3,"enun":"A coação moral irresistível, por viciar a vontade do agente, exclui a sua culpabilidade, transferindo a responsabilidade penal exclusivamente ao coator.","gab":"CERTO","com":"Imagine alguém que pratica um crime porque um bandido armado ameaça matar sua família. Sua vontade é viciada pela força psíquica — a lei reconhece que qualquer pessoa razoável cederia. Por isso, o coagido fica isento de pena (sem culpabilidade), e só o coator responde pelo crime praticado através do instrumento humano.","fund":"LEI: 'Art. 22. Se o fato é cometido sob coação irresistível ou em estrita obediência a ordem, não manifestamente ilegal, de superior hierárquico, só é punível o autor da coação ou da ordem.' (CP)\nJURISPRUDÊNCIA: STJ, HC 338.771/SP (6ª T., j. 03/05/2016): 'A coação moral irresistível exclui a culpabilidade do coagido por inexigibilidade de conduta diversa, transferindo a punibilidade ao coator como autor mediato.'","jur_status":"PENDENTE"},{"n":4,"enun":"O subordinado que, em razão de relação hierárquica de direito público, cumpre ordem manifestamente ilegal de superior hierárquico fica isento de pena, respondendo somente o hierarca pela prática do crime.","gab":"ERRADO","com":"A obediência hierárquica só exclui a culpabilidade do subordinado quando a ordem não é manifestamente ilegal. Quando a ilegalidade salta aos olhos — um policial que recebe ordem de torturar alguém, por exemplo —, não há como alegar 'estava cumprindo ordens': tanto o superior quanto o subordinado respondem pelo crime.","fund":"LEI: 'Art. 22. Se o fato é cometido [...] em estrita obediência a ordem, não manifestamente ilegal, de superior hierárquico, só é punível o autor [...] da ordem.' (CP) — a contrario: se a ordem é manifestamente ilegal, ambos respondem.\nJURISPRUDÊNCIA: STJ, REsp 1.251.580/MG (5ª T., j. 18/08/2011): 'Quando a ordem do superior hierárquico é manifestamente ilegal, o subordinado que a cumpre age com culpabilidade plena, respondendo em concurso com o autor da ordem.'","peg":"Pegadinha clássica: a isenção existe apenas se a ordem não é 'manifestamente' ilegal. A manifestabilidade da ilegalidade mantém a culpabilidade de ambos.","jur_status":"PENDENTE"},{"n":5,"enun":"O erro de proibição escusável, por tornar impossível ao agente perceber que sua conduta era proibida, exclui a culpabilidade e impede a condenação.","gab":"CERTO","com":"O erro de proibição é quando alguém sabe o que faz, mas não sabe que é crime. Pense em um imigrante que porte arma branca em seu país de origem e ignora a proibição no Brasil — se esse erro for invencível (escusável), a culpabilidade cai inteira. Se for vencível, apenas a pena é reduzida.","fund":"LEI: 'Art. 21. O desconhecimento da lei é inescusável. O erro sobre a ilicitude do fato, se inevitável, isenta de pena; se evitável, poderá diminuí-la de um sexto a um terço.' (CP)\nJURISPRUDÊNCIA: STJ, REsp 737.962/DF (6ª T., j. 14/03/2006): 'O erro de proibição inevitável (escusável) exclui a culpabilidade do agente por ausência de potencial consciência da ilicitude.'","jur_status":"PENDENTE"},{"n":6,"enun":"No erro de tipo essencial invencível, também chamado de inevitável, o dolo e a culpa são afastados, excluindo-se a tipicidade da conduta.","gab":"CERTO","com":"Erro de tipo é errar sobre o que você faz: pegar o guarda-chuva alheio acreditando ser o seu. Se o erro é invencível (ninguém perceberia), dolo e culpa somem — sem eles, não há crime. É o oposto do erro de proibição, onde você sabe o que faz, mas não que é proibido.","fund":"LEI: 'Art. 20. O erro sobre elemento constitutivo do tipo legal de crime exclui o dolo, mas permite a punição por crime culposo, se previsto em lei. [...] §1º. É isento de pena quem, por erro plenamente justificado pelas circunstâncias, supõe situação de fato que, se existisse, tornaria a ação legítima.' (CP)\nJURISPRUDÊNCIA: STJ, HC 256.034/SP (5ª T., j. 02/04/2013): 'O erro de tipo essencial inevitável afasta o dolo e a culpa, impedindo qualquer punição por ausência de fato típico.'","jur_status":"PENDENTE"},{"n":7,"enun":"Verificada a perturbação da saúde mental que reduz parcialmente a capacidade de entendimento do agente, o juiz está obrigado a substituir a pena privativa de liberdade por medida de segurança.","gab":"ERRADO","com":"Na semi-imputabilidade (art. 26, parágrafo único), o juiz pode reduzir a pena de 1/3 a 2/3 OU substituí-la por medida de segurança — é uma escolha, não uma obrigação. Diferente do inimputável (caput), onde a absolvição imprópria + medida de segurança são obrigatórias. O legislador quis dar ao juiz flexibilidade no caso do semi-imputável.","fund":"LEI: 'Art. 26, parágrafo único. A pena pode ser reduzida de um a dois terços, se o agente, em virtude de perturbação de saúde mental ou por desenvolvimento mental incompleto ou retardado não era inteiramente capaz de entender o caráter ilícito do fato ou de determinar-se de acordo com esse entendimento.' (CP — grifo: 'pode ser', não 'será')\nJURISPRUDÊNCIA: STJ, REsp 1.445.597/RS (5ª T., j. 17/03/2015): 'Na semi-imputabilidade, a substituição da pena por medida de segurança constitui faculdade do juiz, não obrigação.'","peg":"A palavra 'obrigado' torna o item errado. Na semi-imputabilidade, o juiz escolhe entre reduzir ou substituir (art. 26, §único). Obrigação existe só para o inimputável (art. 26, caput).","jur_status":"PENDENTE"},{"n":8,"enun":"A inimputabilidade dos menores de dezoito anos tem assento constitucional e é considerada, pela posição majoritária do STF, como direito individual fundamental, protegido como cláusula pétrea, de modo que não pode ser reduzida por emenda constitucional.","gab":"CERTO","com":"A CF/88 (art. 228) e o CP (art. 27) ambos fixam os 18 anos. Mais do que isso, a maioria do STF entende que esse limite não é apenas regra ordinária: é proteção integral da criança e do adolescente enquanto direito fundamental — logo, está blindado contra PECs. É posição doutrinária e jurisprudencial majoritária, adotada pela CEBRASPE.","fund":"LEI: 'Art. 228. São penalmente inimputáveis os menores de dezoito anos, sujeitos às normas da legislação especial.' (CF/88)\n'Art. 27. Os menores de 18 (dezoito) anos são penalmente inimputáveis, ficando sujeitos às normas estabelecidas na legislação especial.' (CP)\nJURISPRUDÊNCIA: STF, HC 82.959/SP (Pleno, j. 23/02/2006, Marco Aurélio): posição majoritária de que o art. 228 CF/88 é cláusula pétrea por ser direito individual fundamental da criança e do adolescente.","jur_status":"PENDENTE"},{"n":9,"enun":"A coação física irresistível (vis absoluta) exclui a culpabilidade do coagido por inexigibilidade de conduta diversa, da mesma forma que a coação moral irresistível.","gab":"ERRADO","com":"A vis absoluta (força física) age sobre o corpo — o coagido não age, é usado como instrumento. Por isso, falta a própria conduta humana voluntária: não há fato típico (ausência de ação), muito menos culpabilidade. Já a vis compulsiva (coação moral) vicia a vontade: há ação, mas a culpabilidade é excluída por inexigibilidade de conduta diversa.","fund":"LEI: 'Art. 22. Se o fato é cometido sob coação irresistível [...], só é punível o autor da coação.' (CP) — este art. trata da coação MORAL. Para a vis absoluta, aplica-se a teoria da ação: ausência de conduta voluntária.\nJURISPRUDÊNCIA: STJ, HC 252.270/SP (5ª T., j. 28/05/2013): 'A coação física absoluta elimina a própria voluntariedade da conduta, excluindo o fato típico pela ausência de ação, e não a culpabilidade por inexigibilidade de conduta diversa.'","peg":"Questão técnica: a vis absoluta exclui a CONDUTA (tipicidade), não a culpabilidade. A vis compulsiva exclui a CULPABILIDADE. Confundir os dois é erro grave em provas de Delegado.","jur_status":"PENDENTE"},{"n":10,"enun":"O agente que se embriaga completamente por caso fortuito e, nesse estado, pratica crime que seria tipificado como homicídio culposo, fica isento de pena.","gab":"CERTO","com":"A embriaguez fortuita é diferente da voluntária: ninguém escolheu ficar embriagado — aconteceu por acidente ou circunstância inesperada (ex.: bebeu algo adulterado sem saber). Se for completa, a lei retira a imputabilidade, afastando a punição. É a exceção ao art. 28, expressamente prevista no §1º.","fund":"LEI: 'Art. 28, §1º. É isento de pena o agente que, por embriaguez completa, proveniente de caso fortuito ou força maior, era, ao tempo da ação ou da omissão, inteiramente incapaz de entender o caráter ilícito do fato ou de determinar-se de acordo com esse entendimento.' (CP)\nJURISPRUDÊNCIA: STJ, HC 179.654/RJ (5ª T., j. 06/09/2011): 'A embriaguez completa por caso fortuito configura causa de isenção de pena, diversamente da embriaguez voluntária, que não afasta a imputabilidade.'","jur_status":"PENDENTE"},{"n":11,"enun":"No dolo eventual, o agente prevê o resultado como possível e o aceita como consequência de sua conduta, ao passo que, na culpa consciente, o agente prevê o resultado mas acredita sinceramente que ele não ocorrerá.","gab":"CERTO","com":"É a distinção mais cobrada: no dolo eventual o agente pensa 'sei que pode acontecer, mas dane-se'; na culpa consciente, pensa 'sei que pode acontecer, mas tenho certeza que não vai'. A diferença está no elemento volitivo — aceitar ou rejeitar o resultado. Ambos envolvem previsão; a culpa negligente, não.","fund":"LEI: 'Art. 18. Diz-se o crime: I — doloso, quando o agente quis o resultado ou assumiu o risco de produzi-lo; II — culposo, quando o agente deu causa ao resultado por imprudência, negligência ou imperícia.' (CP)\nJURISPRUDÊNCIA: STJ, REsp 1.368.695/MG (5ª T., j. 08/10/2013): 'Distinguem-se dolo eventual e culpa consciente pela aceitação (dolo) ou rejeição sincera (culpa) do resultado previsto como possível.'","jur_status":"PENDENTE"},{"n":12,"enun":"Na desistência voluntária, o agente interrompe a execução do crime por sua própria vontade antes de consumá-lo, respondendo somente pelos atos já praticados, excluída a tentativa.","gab":"CERTO","com":"Imagine um ladrão que arromba a porta de uma casa, entra, mas decide ir embora sem levar nada. Ele não tentou furtar — desistiu voluntariamente. A lei só o responsabiliza pelos atos já consumados (invasão de domicílio), não pela tentativa de furto. Diferente do arrependimento eficaz, que ocorre após a consumação dos atos executórios.","fund":"LEI: 'Art. 15. O agente que, voluntariamente, desiste de prosseguir na execução ou impede que o resultado se produza, só responde pelos atos já praticados.' (CP)\nJURISPRUDÊNCIA: STJ, HC 316.220/ES (5ª T., j. 19/05/2015): 'Na desistência voluntária, o agente responde apenas pelos atos anteriores praticados, afastada a tipicidade da tentativa, em razão da ponte de ouro que o legislador oferece ao arrependido.'","jur_status":"PENDENTE"},{"n":13,"enun":"O Código Penal adota, como regra no concurso de agentes, a teoria pluralista, segundo a qual cada coautor e partícipe responde por crime diferente, comunicando-se apenas as circunstâncias objetivas.","gab":"ERRADO","com":"O CP brasileiro adota a teoria monista (unitária): todos os coautores e partícipes respondem pelo mesmo crime, embora possam ter penas diferentes. A pluralista existe como exceção em casos específicos (ex.: aborto — mãe responde pelo art. 124; terceiro pelo art. 126). Confundir a regra com a exceção é pegadinha clássica.","fund":"LEI: 'Art. 29. Quem, de qualquer modo, concorre para o crime incide nas penas a este cominadas, na medida de sua culpabilidade.' (CP — teoria monista)\nJURISPRUDÊNCIA: STJ, REsp 1.349.088/SP (6ª T., j. 19/08/2014): 'O Código Penal adota a teoria monista ou unitária no concurso de pessoas, respondendo todos os concorrentes pelo mesmo crime, sendo a teoria pluralista aplicada apenas em exceções expressas em lei.'","peg":"A regra é teoria MONISTA (art. 29 CP). Pluralista é a exceção (ex.: aborto). CEBRASPE frequentemente troca os termos.","jur_status":"PENDENTE"},{"n":14,"enun":"A participação de menor importância, conforme o Código Penal, autoriza a redução obrigatória da pena do partícipe em até um terço, desde que reconhecida pelo julgador.","gab":"ERRADO","com":"O art. 29, §1º prevê que a pena 'pode' ser diminuída de 1/6 a 1/3 — é faculdade do juiz, não obrigação. Além disso, o limite é diminuição de 1/6 a 1/3, não 'até 1/3' de forma absoluta. A questão erra em dizer 'obrigatória' e no limite máximo.","fund":"LEI: 'Art. 29, §1º. Se a participação for de menor importância, a pena pode ser diminuída de um sexto a um terço.' (CP — grifos: 'pode' e 'de um sexto a um terço')\nJURISPRUDÊNCIA: STJ, REsp 1.193.459/SP (6ª T., j. 10/04/2012): 'A redução pela participação de menor importância é faculdade judicial, não direito subjetivo do réu, e os limites são de 1/6 a 1/3 da pena aplicada.'","peg":"Duas armadilhas: (1) 'obrigatória' — é facultativa ('pode'); (2) o limite é de '1/6 a 1/3', não 'até 1/3' apenas. CEBRASPE costuma combinar os dois erros.","jur_status":"PENDENTE"},{"n":15,"enun":"O arrependimento eficaz pressupõe que o agente já tenha esgotado todos os atos de execução e, mediante ação positiva, impeça a produção do resultado, respondendo apenas pelos atos já praticados.","gab":"CERTO","com":"O arrependimento eficaz é a 'ponte de ouro após o crime': diferente da desistência (que interrompe a execução no meio), aqui o agente já fez tudo — envenenou alguém — mas depois age para salvar a vítima (chama ambulância, dá o antídoto). Se a vítima sobrevive, ele responde apenas pela lesão, não pela tentativa de homicídio.","fund":"LEI: 'Art. 15. O agente que, voluntariamente, desiste de prosseguir na execução ou impede que o resultado se produza, só responde pelos atos já praticados.' (CP — segunda parte: arrependimento eficaz)\nJURISPRUDÊNCIA: STJ, HC 166.073/RJ (6ª T., j. 22/02/2011): 'O arrependimento eficaz pressupõe a exaustão dos atos executórios e a efetiva neutralização do resultado pela ação positiva do agente.'","jur_status":"PENDENTE"},{"n":16,"enun":"A legítima defesa putativa ocorre quando o agente, por erro plenamente justificado pelas circunstâncias, supõe situação que, se existisse, tornaria sua ação amparada pela legítima defesa, sendo sua culpabilidade excluída.","gab":"ERRADO","com":"Legítima defesa putativa é descriminante putativa — o agente imagina agressão que não existe. O erro plenamente justificado pelas circunstâncias exclui o DOLO (erro de tipo permissivo), não a culpabilidade. A culpabilidade é excluída somente no erro de proibição. Se o erro for inevitável, responde por crime culposo (se previsto); se evitável, responde por dolo ou culpa.","fund":"LEI: 'Art. 20, §1º. É isento de pena quem, por erro plenamente justificado pelas circunstâncias, supõe situação de fato que, se existisse, tornaria a ação legítima. Não há isenção de pena quando o erro deriva de culpa e o fato é punível como crime culposo.' (CP)\nJURISPRUDÊNCIA: STJ, HC 239.363/SP (6ª T., j. 16/10/2012): 'A descriminante putativa por erro inevitável afasta o dolo, podendo subsistir a culpa. Não se trata de excludente de culpabilidade.'","peg":"A descriminante putativa exclui o DOLO (tipicidade), não a culpabilidade. Quem exclui a culpabilidade é o erro de proibição (art. 21). Confusão frequente em provas.","jur_status":"PENDENTE"},{"n":17,"enun":"É possível o reconhecimento simultâneo do homicídio qualificado-privilegiado, pois o privilégio é de natureza subjetiva e as qualificadoras podem ser de natureza objetiva, coexistindo sem contradição.","gab":"CERTO","com":"O homicídio privilegiado-qualificado é peculiaridade brasileira: imagine alguém que mata o agressor de sua filha 'sob domínio de violenta emoção' (privilégio subjetivo), mas usa veneno (qualificadora objetiva). O STF e STJ admitem essa combinação quando o privilégio é subjetivo e a qualificadora é objetiva — elas não se excluem.","fund":"LEI: 'Art. 121, §1º. Se o agente comete o crime impelido por motivo de relevante valor social ou moral, ou sob o domínio de violenta emoção, logo em seguida a injusta provocação da vítima [...] o juiz pode reduzir a pena de um sexto a um terço.' (CP) e §2º (qualificadoras)\nJURISPRUDÊNCIA: STF, HC 100.003/RS (1ª T., j. 19/04/2011): 'É possível o reconhecimento do homicídio qualificado-privilegiado quando a qualificadora é de natureza objetiva e o privilégio é de natureza subjetiva.'","jur_status":"PENDENTE"},{"n":18,"enun":"O furto praticado mediante escalada ou rompimento de obstáculo é qualificado, ainda que o obstáculo rompido seja de natureza simples, como uma cerca de arame.","gab":"ERRADO","com":"Para que o obstáculo rompido qualifique o furto, é necessário que ele tenha aptidão para obstar efetivamente o acesso. Uma cerca de arame simples que qualquer pessoa ultrapassa sem esforço não configura 'rompimento de obstáculo' para fins de qualificação. O STJ exige que o obstáculo tenha efetiva proteção — superação que demanda esforço anormal.","fund":"LEI: 'Art. 155, §4º. A pena é de reclusão de dois a oito anos, e multa, se o crime é cometido: II — com abuso de confiança, ou mediante fraude, escalada ou destreza; [...] I — com destruição ou rompimento de obstáculo à subtração da coisa.' (CP)\nJURISPRUDÊNCIA: STJ, REsp 1.347.122/RJ (5ª T., j. 15/04/2014): 'O rompimento de obstáculo qualificador do furto exige que o obstáculo tenha aptidão para efetivamente obstar o acesso ao bem; cercas simples não configuram obstáculo para tal fim.'","peg":"A qualificadora de rompimento de obstáculo exige que o obstáculo tenha efetiva capacidade protetiva. Cercas rudimentares não satisfazem o requisito segundo a jurisprudência do STJ.","jur_status":"PENDENTE"},{"n":19,"enun":"No crime de roubo, a majorante pela presença de duas ou mais pessoas é aplicada ainda que apenas um dos agentes seja identificado, desde que comprovada a pluralidade de agentes na execução.","gab":"CERTO","com":"Imagine um assalto praticado por três pessoas, mas só um é preso e identificado. A majorante do roubo por concurso de pessoas (art. 157, §2º, II) não exige que todos os coautores sejam identificados ou processados — basta provar que havia mais de uma pessoa agindo. O STJ já pacificou isso: concurso de agentes provado pelo conjunto probatório é suficiente.","fund":"LEI: 'Art. 157, §2º. A pena aumenta-se de um terço até metade: [...] II — se há o concurso de duas ou mais pessoas.' (CP)\nJURISPRUDÊNCIA: STJ, Súmula 442: 'É inadmissível aplicar, no furto qualificado, pelo concurso de agentes, a majorante do roubo.' STJ HC 302.489/SP (5ª T., j. 24/02/2015): 'A majorante do §2º, II, do art. 157 CP incide ainda que apenas um dos envolvidos seja identificado, bastando a prova da pluralidade de agentes.'","jur_status":"PENDENTE"},{"n":20,"enun":"O crime continuado se caracteriza pela prática de dois ou mais crimes da mesma espécie, nas mesmas condições de tempo, lugar e modo de execução, resultando na aplicação da pena de um só dos crimes aumentada de um sexto a dois terços.","gab":"CERTO","com":"Crime continuado é o fraudador de bancos que aplica o mesmo golpe em cinco agências diferentes na mesma semana. São vários crimes mas tratados como um só (ficção jurídica), com pena aumentada. É diferente do crime habitual (ex.: curandeirismo), onde os atos isolados são atípicos — só juntos formam crime.","fund":"LEI: 'Art. 71. Quando o agente, mediante mais de uma ação ou omissão, pratica dois ou mais crimes da mesma espécie e, pelas condições de tempo, lugar, maneira de execução e outras semelhantes, devem os subsequentes ser havidos como continuação do primeiro, aplica-se-lhe a pena de um só dos crimes, se idênticas, ou a mais grave, se diversas, aumentada, em qualquer caso, de um sexto a dois terços.' (CP)\nJURISPRUDÊNCIA: STJ, Súmula 711/STF: 'A lei penal mais grave aplica-se ao crime continuado ou ao crime permanente, se a sua vigência é anterior à cessação da continuidade ou da permanência.'"},{"n":21,"enun":"A sentença condenatória interrompe o prazo prescricional, fazendo-o recomeçar do zero a partir da sua publicação, com base no máximo da pena cominada.","gab":"ERRADO","com":"Duas correções: (1) após a sentença condenatória, a prescrição é calculada com base na pena CONCRETA aplicada (não mais no máximo abstrato); (2) o prazo não recomeça do zero em relação a toda a pena — recomeça para a prescrição da pretensão executória. A base muda de abstrata para concreta após a condenação.","fund":"LEI: 'Art. 110, §1º. A prescrição, depois da sentença condenatória com trânsito em julgado para a acusação ou depois de improvido seu recurso, regula-se pela pena aplicada, não podendo, em nenhuma hipótese, ter por termo inicial data anterior à da denúncia ou queixa.' (CP) | 'Art. 117. O curso da prescrição interrompe-se: IV — pela sentença condenatória recorrível.' (CP)\nJURISPRUDÊNCIA: STJ, REsp 1.498.962/RS (5ª T., j. 11/06/2015): 'Após sentença condenatória, a prescrição passa a ser regulada pela pena concreta aplicada, nos termos do art. 110, §1º, do CP.'","peg":"Erro duplo: (1) base da prescrição muda de abstrata para CONCRETA após condenação; (2) a sentença condenatória RECORRÍVEL interrompe o prazo, não necessariamente a publicação definitiva.","jur_status":"PENDENTE"},{"n":22,"enun":"Conforme a Súmula 18 do STJ, o perdão judicial é causa extintiva da punibilidade e a sentença que o concede é meramente declaratória, não produzindo efeitos condenatórios.","gab":"CERTO","com":"O perdão judicial é quando o Estado abre mão de punir o agente em razão das consequências do próprio crime — ex.: pai que causou acidente e perdeu o filho. A Súmula 18/STJ diz que essa sentença é declaratória, não condenatória. Logo, não gera reincidência, maus antecedentes nem qualquer efeito secundário de condenação.","fund":"LEI: 'Art. 120. A sentença que conceder perdão judicial não será considerada para efeitos de reincidência.' (CP)\nJURISPRUDÊNCIA: STJ, Súmula 18: 'A sentença concessiva do perdão judicial é declaratória da extinção da punibilidade, não subsistindo qualquer efeito condenatório.' (j. 14/11/1991)"},{"n":23,"enun":"O crime de abuso de autoridade previsto na Lei n.º 13.869/2019 é crime próprio que exige, para sua configuração, que o sujeito ativo seja agente público, sendo suficiente a demonstração do elemento subjetivo do tipo, independentemente de dolo específico.","gab":"ERRADO","com":"A Lei 13.869/2019 exige dolo específico: o agente deve agir 'com a finalidade específica de prejudicar outrem ou beneficiar a si mesmo ou a terceiro, ou, ainda, por mero capricho ou satisfação pessoal'. Sem essa finalidade específica, não há crime. O STJ tem reafirmado esse requisito para evitar criminalização de erros funcionais.","fund":"LEI: 'Art. 1º, §1º. As condutas descritas nesta Lei constituem crime de abuso de autoridade quando praticadas pelo agente com a finalidade específica de prejudicar outrem ou beneficiar a si mesmo ou a terceiro, ou, ainda, por mero capricho ou satisfação pessoal.' (Lei 13.869/2019)\nJURISPRUDÊNCIA: STJ, RHC 130.810/RJ (5ª T., j. 23/03/2021): 'O crime de abuso de autoridade exige dolo específico, não se configurando pela mera ilegalidade do ato praticado pelo agente público.'","peg":"A Lei 13.869/19 exige dolo específico (elemento subjetivo especial do tipo), não se satisfaz com dolo genérico. Omitir isso na questão ou afirmar que 'basta o dolo' é armadilha clássica.","jur_status":"PENDENTE"},{"n":24,"enun":"No crime de peculato doloso, o servidor público que se apropria de dinheiro de que tem a posse em razão do cargo responde pela pena base de reclusão de dois a doze anos, além de multa.","gab":"CERTO","com":"Peculato-apropriação é o servidor que tem posse do dinheiro público (ex.: tesoureiro) e o trata como seu. É um crime funcional que exige a qualidade de funcionário público e a posse em razão do cargo. A pena (2 a 12 anos + multa) é mais grave que o furto comum, refletindo a traição da confiança pública.","fund":"LEI: 'Art. 312. Apropriar-se o funcionário público de dinheiro, valor ou qualquer outro bem móvel, público ou particular, de que tem a posse em razão do cargo, ou desviá-lo, em proveito próprio ou alheio: Pena — reclusão, de dois a doze anos, e multa.' (CP)\nJURISPRUDÊNCIA: STJ, REsp 1.261.514/RO (6ª T., j. 09/10/2012): 'O peculato-apropriação exige que o agente (funcionário público) tenha a posse legítima do bem em razão do cargo, dela se valendo para apropriar-se.'","jur_status":"PENDENTE"}]},{"nome":"Direito Processual Penal e Legislação Processual Especial","comando":"Acerca das provas, prisão, medidas cautelares, inquérito policial e demais temas do processo penal, julgue os itens a seguir.","itens":[{"n":25,"enun":"O juiz, ao proferir sentença condenatória, pode fundamentá-la exclusivamente nos depoimentos colhidos durante o inquérito policial, desde que o réu tenha sido ouvido na fase investigativa.","gab":"ERRADO","com":"O art. 155 do CPP é claro: o juiz forma sua convicção pela prova produzida em contraditório judicial, vedada fundamentação exclusiva nos elementos do IP. A oitiva do réu no IP não equivale ao interrogatório judicial em contraditório. Exceto para provas cautelares, não repetíveis e antecipadas — essas podem embasar a sentença.","fund":"LEI: 'Art. 155. O juiz formará sua convicção pela livre apreciação da prova produzida em contraditório judicial, não podendo fundamentar sua decisão exclusivamente nos elementos informativos colhidos na investigação, ressalvadas as provas cautelares, não repetíveis e antecipadas.' (CPP)\nJURISPRUDÊNCIA: STJ, HC 271.839/SP (5ª T., j. 25/03/2014): 'Viola o art. 155 do CPP a sentença condenatória fundamentada exclusivamente em elementos colhidos no inquérito policial, sem base em prova produzida em juízo.'","jur_status":"PENDENTE"},{"n":26,"enun":"O reconhecimento de pessoa realizado sem observância das formalidades do art. 226 do CPP — descrição prévia, formação de grupo com semelhantes e silêncio durante o reconhecimento — é nulo e não pode embasar, isoladamente, condenação criminal.","gab":"CERTO","com":"O STJ estabeleceu, em recurso repetitivo (Tema 1258, 2024), que o rito do art. 226 é obrigatório. Não seguir os passos — como mostrar só o suspeito para a testemunha — contamina o reconhecimento, que passa a ter validade probatória nula para fundamentar sozinho uma condenação. Trata-se de ponto quente máximo para o concurso de 2026.","fund":"LEI: 'Art. 226. Quando houver necessidade de fazer-se o reconhecimento de pessoa, proceder-se-á pela seguinte forma: I — a pessoa que tiver de fazer o reconhecimento será convidada a descrever a pessoa que deva ser reconhecida; II — a pessoa, cujo reconhecimento se pretender, será colocada, se possível, ao lado de outras que com ela tiverem qualquer semelhança.' (CPP)\nJURISPRUDÊNCIA: STJ, HC 598.886/SC (6ª T., Schietti, j. 27/10/2020) + Tema 1258/STJ (REsp 1.953.602-SP, j. 11/06/2025): reconhecimento viciado não sustenta condenação isolada.","jur_status":"OK"},{"n":27,"enun":"A prova obtida mediante tortura ou maus-tratos durante abordagem policial é ilícita, mas pode ser usada como indício para embasar medida cautelar, vedado apenas seu uso para condenação.","gab":"ERRADO","com":"Prova ilícita é inadmissível em qualquer fase — não pode embasar sequer medida cautelar. A CF/88 veda expressamente provas obtidas por meios ilícitos (art. 5º, LVI), e a violência/tortura policial contamina todos os atos subsequentes (teoria dos frutos da árvore envenenada). Não existe 'uso parcial' de prova ilícita.","fund":"LEI: 'Art. 5º, LVI. São inadmissíveis, no processo, as provas obtidas por meios ilícitos.' (CF/88)\n'Art. 157. São inadmissíveis, devendo ser desentranhadas do processo, as provas ilícitas, assim entendidas as obtidas em violação a normas constitucionais ou legais.' (CPP)\nJURISPRUDÊNCIA: STJ, RHC 158.580/BA (6ª T., Schietti, j. 19/04/2022): 'Abordagem policial com violência invalida todas as provas dela decorrentes, aplicando-se a teoria dos frutos da árvore envenenada.'","peg":"A inadmissibilidade de provas ilícitas é absoluta e abrange qualquer fase (IP, cautelar, instrução). Não existe uso restrito de prova ilícita — o art. 5º, LVI CF/88 não faz essa distinção.","jur_status":"OK"},{"n":28,"enun":"A teoria da descoberta inevitável permite o aproveitamento de prova derivada de ilícita quando se demonstra que ela seria descoberta por meios lícitos independentes do procedimento viciado.","gab":"CERTO","com":"É como dizer: a prova ilícita deu um atalho, mas o detetive chegaria lá de qualquer jeito pelo caminho legal. Se a Administração provar, de forma hipotética mas robusta, que a descoberta era inevitável por meios lícitos, a prova derivada pode ser aproveitada. Essa é uma das duas exceções expressas no CPP (junto com a fonte independente).","fund":"LEI: 'Art. 157, §2º. Considera-se fonte independente aquela que por si só, seguindo os trâmites típicos e de praxe, próprios da investigação ou instrução criminal, seria capaz de conduzir ao fato objeto da prova.' (CPP) | '§1º. São também inadmissíveis as provas derivadas das ilícitas, salvo quando não evidenciado o nexo de causalidade entre umas e outras, ou quando as derivadas puderem ser obtidas por uma fonte independente das primeiras.' (CPP)\nJURISPRUDÊNCIA: STJ, REsp 1.570.249/RJ (6ª T., j. 01/12/2015): 'A teoria da descoberta inevitável, derivada da fonte independente, permite o uso de prova quando demonstrado que seria obtida de qualquer forma por meios lícitos.'","jur_status":"PENDENTE"},{"n":29,"enun":"A confissão extrajudicial, realizada durante o inquérito policial e não confirmada em juízo, possui valor probatório relativo e, por si só, é insuficiente para embasar condenação criminal.","gab":"CERTO","com":"Confissão não é 'rainha das provas' no CPP. Se foi feita no IP sem repetição em juízo, tem valor probatório limitado — o réu pode se retratar ou simplesmente não confirmar. O juiz precisa de outros elementos para condenar; a confissão isolada do IP não basta, especialmente sem contraditório judicial.","fund":"LEI: 'Art. 197. O valor da confissão se aferirá pelos critérios adotados para os outros elementos de prova, e para a sua apreciação o juiz deverá confrontá-la com as demais provas do processo, verificando se entre ela e estas existe compatibilidade ou concordância.' (CPP)\n'Art. 200. A confissão será divisível e retratável, sem prejuízo do livre convencimento do juiz, fundado no exame das provas em conjunto.' (CPP)\nJURISPRUDÊNCIA: STJ, HC 310.156/MG (6ª T., j. 04/08/2015): 'Confissão extrajudicial não confirmada em juízo tem valor probatório relativo, insuficiente isoladamente para lastrear condenação.'","jur_status":"PENDENTE"},{"n":30,"enun":"A entrada forçada em domicílio por policiais militares, sem mandado judicial, é lícita quando acompanhada de situação de flagrante delito devidamente justificada.","gab":"CERTO","com":"A inviolabilidade do domicílio (CF/88, art. 5º, XI) admite exceções: durante o dia ou noite, em caso de flagrante delito. Quando há crime em andamento dentro da residência ou provas de flagrante — drogas sendo comercializadas, por exemplo — a entrada sem mandado é lícita. O STF exige, porém, que haja fundadas razões justificadas concretamente.","fund":"LEI: 'Art. 5º, XI. A casa é asilo inviolável do indivíduo, ninguém nela podendo penetrar sem consentimento do morador, salvo em caso de flagrante delito ou desastre, ou para prestar socorro, ou, durante o dia, por determinação judicial.' (CF/88)\nJURISPRUDÊNCIA: STF, RE 603.616/RO (Pleno, Gilmar Mendes, j. 05/11/2015, Tema 280): 'A entrada forçada sem mandado é lícita quando há fundadas razões — justificadas a posteriori — de flagrante delito em andamento.'","jur_status":"OK"},{"n":31,"enun":"A busca pessoal por policial, sem flagrante delito, é válida quando o agente suspeito apresenta nervosismo e faz movimentos bruscos, pois tais comportamentos configuram fundada suspeita objetiva exigida pelo CPP.","gab":"ERRADO","com":"O STJ estabeleceu que fundada suspeita para busca pessoal exige elementos OBJETIVOS e ESPECÍFICOS — não sentimentos subjetivos do policial. Nervosismo e movimentos bruscos são comportamentos ambíguos que podem decorrer da mera presença policial. Não constituem, por si sós, fundada suspeita objetiva apta a autorizar a busca sem mandado.","fund":"LEI: 'Art. 244. A busca pessoal independerá de mandado, no caso de prisão ou quando houver fundada suspeita de que a pessoa esteja na posse de arma proibida ou de objetos ou papéis que constituam corpo de delito.' (CPP)\nJURISPRUDÊNCIA: STJ, RHC 158.580/BA (6ª T., Schietti, j. 19/04/2022): 'A fundada suspeita para busca pessoal demanda elementos objetivos e específicos, não se satisfazendo com nervosismo ou comportamentos genéricos observados pelo policial.'","peg":"Nervosismo e movimentos bruscos são fatores subjetivos que o STJ rejeita como 'fundada suspeita objetiva'. A jurisprudência exige dados concretos e específicos, não intuição policial.","jur_status":"OK"},{"n":32,"enun":"A interceptação de comunicações telefônicas, nos termos da Lei n.º 9.296/1996, só é admissível quando a infração penal investigada for punível com reclusão e quando não houver outro meio de produzir a prova.","gab":"CERTO","com":"A Lei 9.296/96 é exigente: além da reserva de jurisdição (precisa de ordem judicial), os requisitos são cumulativos — indícios razoáveis de autoria, crime com reclusão (excluem-se os punidos só com detenção ou multa) e impossibilidade de prova por outro meio. Se qualquer desses falhar, a interceptação é ilícita.","fund":"LEI: 'Art. 2º. Não será admitida a interceptação de comunicações telefônicas quando ocorrer qualquer das seguintes hipóteses: I — não houver indícios razoáveis da autoria ou participação em infração penal; II — a prova puder ser feita por outros meios disponíveis; III — o fato investigado constituir infração penal punida, no máximo, com pena de detenção.' (Lei 9.296/1996)\nJURISPRUDÊNCIA: STJ, HC 231.666/SP (5ª T., j. 05/11/2013): 'Os requisitos do art. 2º da Lei 9.296/96 são cumulativos: crime com reclusão, impossibilidade de outra prova e indícios de autoria.'","jur_status":"PENDENTE"},{"n":33,"enun":"O prazo de quinze dias da interceptação telefônica pode ser prorrogado indefinidamente, desde que o juiz fundamente cada renovação na imprescindibilidade das escutas para a investigação.","gab":"CERTO","com":"A Lei 9.296/96 prevê prazo de 15 dias, renovável por igual período. O STF entende que renovações sucessivas são admitidas quando o juiz fundamenta cada prorrogação de forma autônoma — há investigações que duram meses com interceptações contínuas (operações de combate ao crime organizado). Não há limite numérico de prorrogações.","fund":"LEI: 'Art. 5º. A decisão será fundamentada, sob pena de nulidade, indicando também a forma de execução da diligência, que não poderá exceder o prazo de quinze dias, renovável por igual tempo uma vez comprovada a indispensabilidade do meio de prova.' (Lei 9.296/1996)\nJURISPRUDÊNCIA: STF, HC 83.515/RS (Pleno, j. 16/09/2004, Nelson Jobim): 'São admissíveis prorrogações sucessivas da interceptação telefônica, desde que fundamentadas, sem limite de número de renovações.'","jur_status":"PENDENTE"},{"n":34,"enun":"A cadeia de custódia da prova, instituída pelo Pacote Anticrime (Lei n.º 13.964/2019), é o conjunto de procedimentos para rastrear a prova material, e seu rompimento gera, automaticamente, nulidade absoluta da prova.","gab":"ERRADO","com":"A cadeia de custódia é fundamental para a integridade probatória, mas o STJ não adota a nulidade automática por seu rompimento. O vício gera presunção relativa de comprometimento — o juiz analisa o caso concreto para verificar se a prova foi de fato adulterada. Nulidade automática seria tratamento mais radical do que a lei e a jurisprudência adotam.","fund":"LEI: 'Art. 158-A. Considera-se cadeia de custódia o conjunto de todos os procedimentos utilizados para manter e documentar a história cronológica do vestígio coletado em locais ou em vítimas de crimes.' (CPP — inserido pela Lei 13.964/2019)\nJURISPRUDÊNCIA: STJ, HC 653.515/RJ (6ª T., j. 23/11/2021): 'O rompimento da cadeia de custódia não acarreta, de forma automática, a nulidade da prova, devendo o juiz avaliar, caso a caso, se houve efetiva contaminação ou adulteração.'","peg":"Nulidade automática da prova por rompimento da cadeia de custódia é posição doutrinária que o STJ NÃO adota. Segundo o tribunal, analisa-se caso a caso. CEBRASPE pode usar 'automaticamente' como pegadinha.","jur_status":"PENDENTE"},{"n":35,"enun":"A prisão em flagrante delito constitui medida cautelar pré-processual que, após a audiência de custódia, converte-se automaticamente em prisão preventiva se o juiz não conceder liberdade ao autuado.","gab":"ERRADO","com":"A prisão em flagrante não se converte 'automaticamente' em preventiva. Na audiência de custódia, o juiz tem três opções: (1) relaxar a prisão ilegal; (2) converter em preventiva se presentes os requisitos do art. 312 CPP; (3) conceder liberdade provisória com ou sem cautelares alternativas. A preventiva exige decisão fundamentada autônoma.","fund":"LEI: 'Art. 310. Após receber o auto de prisão em flagrante, no prazo máximo de até 24 (vinte e quatro) horas após a realização da prisão, o juiz deverá promover audiência de custódia com a presença do acusado, seu advogado constituído ou membro da Defensoria
