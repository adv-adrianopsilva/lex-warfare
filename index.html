<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PCDF · Delegado 2026</title>
<!-- PWA -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0a0b14">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PCDF">
<link rel="apple-touch-icon" href="/icons/icon-180.png">
<link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png">
<link rel="apple-touch-icon" sizes="167x167" href="/icons/icon-167.png">
<link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180.png">
<link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png">
<style>
/* ── TOKENS ──────────────────────────────────────────────── */
:root{
  --bg:#0a0b0e; --surf:#12141a; --surf2:#181b24; --surf3:#1e2230;
  --bord:#252a3a; --bord2:#2e3448;
  --txt:#e4e8f4; --txt2:#7a8399; --txt3:#3d4562;
  --acc:#e8a020; --acc-dim:rgba(232,160,32,.13); --acc-glow:rgba(232,160,32,.28); --acc-bord:rgba(232,160,32,.32); --acc-bg:#1c1206;
  --green:#28c76f; --green-bg:rgba(40,199,111,.1); --green-bord:rgba(40,199,111,.3);
  --red:#f05252; --red-bg:rgba(240,82,82,.1); --red-bord:rgba(240,82,82,.3);
  --amber:#f59e0b; --amber-bg:rgba(245,158,11,.1); --amber-bord:rgba(245,158,11,.3);
  --mono:"SF Mono","Fira Code",monospace;
  --r:12px; --r-sm:8px; --r-xs:5px;
  --trans:140ms cubic-bezier(.4,0,.2,1);
  --shadow:0 2px 14px rgba(0,0,0,.5); --shadow-lg:0 4px 28px rgba(0,0,0,.65);
}
[data-theme=light]{
  --bg:#f1f3f8; --surf:#fff; --surf2:#f5f7fc; --surf3:#eef0f8;
  --bord:#dde2ef; --bord2:#cdd3e6;
  --txt:#0e1121; --txt2:#5a6380; --txt3:#9ea8c0;
  --acc:#c47c0a; --acc-dim:rgba(196,124,10,.08); --acc-glow:rgba(196,124,10,.2); --acc-bord:rgba(196,124,10,.28); --acc-bg:#fdf6e8;
  --green:#16a34a; --green-bg:rgba(22,163,74,.08); --green-bord:rgba(22,163,74,.28);
  --red:#dc2626; --red-bg:rgba(220,38,38,.08); --red-bord:rgba(220,38,38,.28);
  --amber:#d97706; --amber-bg:rgba(217,119,6,.08); --amber-bord:rgba(217,119,6,.28);
  --shadow:0 2px 8px rgba(0,0,0,.1); --shadow-lg:0 4px 16px rgba(0,0,0,.15);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;font-size:15px;line-height:1.6;transition:background var(--trans),color var(--trans)}
button{font-family:inherit;cursor:pointer}

/* ── HEADER ──────────────────────────────────────────────── */
.hdr{position:sticky;top:0;z-index:100;background:var(--surf);border-bottom:1px solid var(--bord);box-shadow:var(--shadow)}
.hdr-inner{max-width:860px;margin:0 auto;display:flex;align-items:center;gap:10px;height:62px;padding:0 18px}
.hdr-brand{display:flex;align-items:center;gap:11px;flex:1;min-width:0}
.delta-badge{width:42px;height:42px;border-radius:10px;background:var(--acc);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:#0a0b0e;flex-shrink:0;letter-spacing:-.02em;box-shadow:0 2px 10px var(--acc-glow)}
.hdr-name{font-weight:800;font-size:16.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.01em}
.hdr-date{font-size:12px;color:var(--txt2);margin-top:1px}
.hdr-chips{display:flex;gap:5px;align-items:center;flex-shrink:0}
.chip{border-radius:6px;padding:2px 9px;font-size:12px;font-weight:700}
.chip.g{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bord)}
.chip.r{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bord)}
.chip.n{background:var(--surf2);color:var(--txt2);border:1px solid var(--bord)}
.chip.t{background:var(--acc-dim);color:var(--acc);border:1px solid var(--acc-bord)}
.hdr-timer-wrap{display:flex;align-items:center;gap:6px;flex-shrink:0;background:var(--surf2);border:1px solid var(--bord);border-radius:8px;padding:5px 10px}
.hdr-timer-wrap.hidden{display:none!important}
.hdr-timer-wrap svg.clock-ic{width:17px;height:17px;color:var(--acc);flex-shrink:0}
.hdr-timer-txt{font-size:15px;font-weight:700;color:var(--txt);font-variant-numeric:tabular-nums;min-width:38px}
#btn-pause{background:transparent;border:none;cursor:pointer;padding:0 2px;font-size:14px;color:var(--txt2);line-height:1;transition:color var(--trans)}
#btn-pause:hover{color:var(--acc)}
#btn-pause.paused{color:var(--acc)}
/* Overlay de pausa */
#pause-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.72);backdrop-filter:blur(6px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px}
#pause-overlay.hidden{display:none!important}
.pause-card{background:var(--surf1);border:1px solid var(--bord);border-radius:16px;padding:40px 56px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:14px}
.pause-icon{font-size:48px;line-height:1}
.pause-title{font-size:22px;font-weight:700;color:var(--txt)}
.pause-sub{font-size:14px;color:var(--txt2)}
.pause-resume{background:var(--acc);color:#000;border:none;border-radius:10px;padding:13px 36px;font-size:16px;font-weight:700;cursor:pointer;transition:opacity var(--trans)}
.pause-resume:hover{opacity:.85}
.hdr-actions{display:flex;gap:3px;flex-shrink:0}
.icon-btn{background:var(--surf2);border:1px solid var(--bord);color:var(--txt2);border-radius:7px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all var(--trans)}
.icon-btn:hover{background:var(--acc-dim);border-color:var(--acc-bord);color:var(--acc)}
.prog-rail{height:2px;background:var(--surf3)}
.prog-fill{height:2px;background:var(--acc);transition:width .4s}

/* ── COVER ───────────────────────────────────────────────── */
.cover{max-width:580px;margin:0 auto;padding:48px 18px 80px;text-align:center;animation:fadeIn .4s ease}
.cover-kicker{font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--acc);font-weight:700;margin-bottom:16px}
.cover h1{font-size:clamp(32px,5vw,48px);font-weight:800;font-style:italic;margin-bottom:14px;line-height:1.1}
.cover-lead{font-size:16px;color:var(--txt2);margin-bottom:32px;line-height:1.5}
.cover-card{background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);padding:24px;text-align:left;box-shadow:var(--shadow)}
.meta-grid{display:grid;grid-template-columns:auto 1fr;gap:7px 18px;font-size:13.5px;margin-bottom:18px}
.meta-grid dt{color:var(--txt3);font-size:11px;letter-spacing:.08em;text-transform:uppercase;align-self:center}
.meta-grid dd{color:var(--txt);margin:0;font-weight:500}
.cover-note{font-size:13.5px;color:var(--txt2);font-style:italic;padding:12px 14px;background:var(--surf2);border-left:3px solid var(--acc-bord);border-radius:0 var(--r-xs) var(--r-xs) 0;margin-bottom:22px;line-height:1.5}
.cover-actions{display:flex;flex-direction:column;gap:10px}
.cover-countdown{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:18px;flex-wrap:wrap}
.ccd-box{text-align:center;background:var(--surf2);border:1px solid var(--bord2);border-radius:var(--r-sm);padding:10px 16px;min-width:62px}
.ccd-num{font-size:28px;font-weight:900;font-style:italic;line-height:1;color:var(--acc)}
.ccd-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--txt3);margin-top:2px}
.ccd-sep{font-size:22px;font-weight:900;color:var(--bord2);margin-bottom:12px}
.sr-due-nudge{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--red-bg);border:1px solid var(--red-bord);border-radius:var(--r-sm);font-size:13px;color:var(--red);margin-bottom:14px;cursor:pointer;transition:background .15s}
.sr-due-nudge:hover{background:rgba(240,82,82,.18)}
.btn-primary{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 28px;background:var(--acc);color:#0a0b0e;border:none;border-radius:var(--r-sm);font-weight:800;font-size:15px;letter-spacing:.02em;transition:all var(--trans);box-shadow:0 4px 16px var(--acc-glow)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px var(--acc-glow)}
.btn-ghost{background:var(--surf2);border:1px solid var(--bord);color:var(--txt2);padding:10px 20px;border-radius:var(--r-sm);font-size:14px;transition:all var(--trans)}
.btn-ghost:hover{border-color:var(--bord2);color:var(--txt)}

/* ── PROVA TOOLBAR ───────────────────────────────────────── */
.tb{position:sticky;top:54px;z-index:90;background:var(--surf);border-bottom:1px solid var(--bord);backdrop-filter:blur(8px)}
.tb-inner{max-width:860px;margin:0 auto;display:flex;align-items:center;gap:8px;padding:8px 18px;flex-wrap:wrap}
.tb-info{font-size:13px;color:var(--txt2);font-variant-numeric:tabular-nums}
.tb-info b{color:var(--txt)}
.tb-spacer{flex:1}
.tb-btn{background:var(--surf2);border:1px solid var(--bord);border-radius:var(--r-sm);padding:6px 13px;font-size:12.5px;color:var(--txt);transition:all var(--trans);display:inline-flex;align-items:center;gap:6px}
.tb-btn:hover{border-color:var(--bord2);background:var(--surf3)}
.tb-btn.danger{border-color:var(--acc-bord);color:var(--acc);background:var(--acc-dim)}
.tb-btn.danger:hover{background:var(--acc-bg)}
.tb-btn svg{width:12px;height:12px}

/* ── PROVA CONTENT ───────────────────────────────────────── */
#prova-wrap{max-width:860px;margin:0 auto;padding:24px 18px 100px}

/* Discipline header */
.disc-section{margin-bottom:48px}
.disc-hdr{text-align:left;margin:40px 0 16px;background:var(--surf);border-top:3px solid var(--acc);border-bottom:1px solid var(--bord);padding:13px 0 11px;position:relative}
.disc-hdr h3{font-weight:800;font-size:20px;letter-spacing:-.01em;text-transform:none;color:var(--txt);display:flex;align-items:center;gap:10px}

.comando{background:var(--surf2);border:1px solid var(--bord);border-radius:var(--r-sm);padding:12px 16px;font-size:14px;color:var(--txt2);margin-bottom:16px;font-style:italic;line-height:1.5}

/* Question block */
.q-block{border-top:1px solid var(--bord);padding:16px 0;scroll-margin-top:100px}
.q-block:first-of-type{border-top:none;padding-top:4px}
.q-line{display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:start}
.q-tag{display:inline-flex;align-items:center;gap:6px;font-weight:800;font-size:13px;color:var(--acc);flex-shrink:0;padding-top:2px;white-space:nowrap}
.q-tag::before{content:'';width:8px;height:12px;background:var(--acc);clip-path:polygon(0 0,80% 0,100% 50%,80% 100%,0 100%);display:inline-block}
.q-text{font-size:15.5px;line-height:1.65;color:var(--txt)}
.q-text .situacao{display:block;font-style:italic;color:var(--txt2);margin-bottom:8px;padding-left:12px;border-left:2px solid var(--bord2)}
.q-marks{display:flex;gap:6px;flex-shrink:0;padding-top:1px}
.q-mark{width:40px;height:40px;border:1.5px solid var(--bord);border-radius:var(--r-sm);background:var(--surf2);font-weight:800;font-size:14px;color:var(--txt2);display:inline-flex;align-items:center;justify-content:center;transition:all var(--trans)}
.q-mark:hover:not(:disabled){border-color:var(--txt2);color:var(--txt);transform:translateY(-1px)}
.q-mark.sel-c{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.q-mark.sel-e{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.q-mark:disabled{opacity:.5;cursor:default}
/* After gabarito shown, ring correct/wrong */
.q-block.gab-on .q-mark.sel-c.is-right,.q-block.gab-on .q-mark.sel-e.is-right{box-shadow:0 0 0 2px var(--green-bg),0 0 0 3px var(--green)}
.q-block.gab-on .q-mark.sel-c.is-wrong,.q-block.gab-on .q-mark.sel-e.is-wrong{box-shadow:0 0 0 2px var(--red-bg),0 0 0 3px var(--red)}

.q-actions-row{margin-top:10px;padding-left:92px;display:flex;align-items:center;gap:10px}
.q-show-gab{background:transparent;border:1px dashed var(--bord2);border-radius:var(--r-xs);padding:3px 11px;font-size:12px;color:var(--txt3);transition:all var(--trans)}
.q-show-gab:hover{border-style:solid;border-color:var(--acc-bord);color:var(--acc)}
.q-status{font-size:11.5px;color:var(--txt3)}
.q-status .ok{color:var(--green);font-weight:600}
.q-status .er{color:var(--red);font-weight:600}

/* Feedback */
.q-feedback{margin-top:14px;border-radius:var(--r-sm);overflow:hidden;border:1px solid var(--bord);animation:fadeUp .2s ease}
.gab-line{display:flex;align-items:center;gap:8px;padding:9px 14px;background:var(--surf2);border-bottom:1px solid var(--bord);font-size:13px;font-weight:700}
.gab-label{color:var(--txt3);font-size:10px;letter-spacing:.1em;text-transform:uppercase;font-weight:600}
.gab-value{color:var(--txt)}
.gab-badge{margin-left:auto;font-size:11.5px;padding:2px 10px;border-radius:99px;font-weight:700}
.gab-badge.ok{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bord)}
.gab-badge.er{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bord)}
.gab-badge.bk{background:var(--surf3);color:var(--txt3);border:1px solid var(--bord)}

.gab-section{border-top:1px solid var(--bord);background:var(--surf)}
.gab-hdr{display:flex;align-items:center;gap:8px;padding:9px 14px;cursor:pointer;font-size:13px;font-weight:600;background:var(--surf2);border:none;width:100%;text-align:left;color:var(--txt);transition:background var(--trans)}
.gab-hdr:hover{background:var(--surf3)}
.gab-icon{flex-shrink:0}
.gab-lbl{flex:1}
.gab-chev{font-size:11px;color:var(--txt3);transition:transform var(--trans)}
.gab-chev.open{transform:rotate(180deg)}
.gab-body{padding:12px 14px;font-size:14px;line-height:1.7;color:var(--txt2)}
.gab-body.hidden{display:none}
.feynman-text{color:var(--txt);font-size:14.5px;line-height:1.75}
.law-block{font-family:var(--mono);font-size:12px;background:var(--surf2);border:1px solid var(--bord);border-radius:var(--r-xs);padding:11px 13px;white-space:pre-wrap;line-height:1.65;color:var(--txt)}
.copy-btn{display:inline-flex;align-items:center;gap:5px;margin-top:8px;font-size:11.5px;padding:4px 12px;border-radius:5px;border:1px solid var(--bord2);background:var(--surf3);color:var(--txt3);cursor:pointer;transition:all var(--trans);font-family:inherit}
.copy-btn:hover{color:var(--acc);border-color:var(--acc-bord);background:var(--acc-dim)}
.peg-box{display:flex;gap:8px;align-items:flex-start;background:var(--amber-bg);border:1px solid var(--amber-bord);border-radius:var(--r-xs);padding:10px 13px;font-size:13px;color:var(--amber);line-height:1.55}

/* ── TRAP WORDS (Releitura Crítica) ──────────────────────── */
.trap-word{font-weight:800;color:var(--acc);background:var(--acc-dim);border-bottom:2px solid var(--acc);padding:0 3px;border-radius:3px}
.releitura-body{font-size:14.5px;line-height:1.8;color:var(--txt);margin-bottom:10px}
.releitura-body .situacao{display:block;font-style:italic;color:var(--txt2);margin-bottom:8px;padding-left:12px;border-left:2px solid var(--bord2)}
.trap-legend{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--txt3);margin-top:6px;flex-wrap:wrap}
.trap-legend .trap-word{font-size:11.5px;cursor:default}
.trap-found{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;color:var(--acc);font-weight:700}

/* ── AUTOAVALIAÇÃO ────────────────────────────────────────── */
.avaliacao-row{padding:11px 14px;background:var(--surf2);border-top:1px solid var(--bord);display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.avaliacao-lbl{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--txt3);font-weight:600;width:100%;margin-bottom:2px}
.av-btn{border-radius:99px;padding:5px 13px;font-size:12.5px;font-weight:700;border:1.5px solid;cursor:pointer;font-family:inherit;transition:all var(--trans);background:transparent}
.av-btn.dom{border-color:var(--green-bord);color:var(--green)}
.av-btn.dom:hover,.av-btn.dom.sel{background:var(--green-bg);box-shadow:0 0 0 2px var(--green-bord)}
.av-btn.dvd{border-color:var(--amber-bord);color:var(--amber)}
.av-btn.dvd:hover,.av-btn.dvd.sel{background:var(--amber-bg);box-shadow:0 0 0 2px var(--amber-bord)}
.av-btn.lac{border-color:var(--red-bord);color:var(--red)}
.av-btn.lac:hover,.av-btn.lac.sel{background:var(--red-bg);box-shadow:0 0 0 2px var(--red-bord)}
.av-btn.leit{border-color:var(--bord2);color:var(--txt2)}
.av-btn.leit:hover,.av-btn.leit.sel{background:var(--surf3);color:var(--txt);box-shadow:0 0 0 2px var(--bord2)}
.av-set{display:flex;align-items:center;gap:8px;padding:9px 14px;background:var(--surf2);border-top:1px solid var(--bord);font-size:13px}
.av-chip{border-radius:99px;padding:3px 12px;font-size:12px;font-weight:700;border:1.5px solid}
.av-chip.dom{background:var(--green-bg);color:var(--green);border-color:var(--green-bord)}
.av-chip.dvd{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-bord)}
.av-chip.lac{background:var(--red-bg);color:var(--red);border-color:var(--red-bord)}
.av-chip.leit{background:var(--surf3);color:var(--txt2);border-color:var(--bord2)}
.av-change{margin-left:auto;background:transparent;border:1px dashed var(--bord2);border-radius:var(--r-xs);padding:2px 9px;font-size:11.5px;color:var(--txt3);cursor:pointer;font-family:inherit;transition:all var(--trans)}
.av-change:hover{color:var(--acc);border-color:var(--acc-bord)}

/* ── DIAGNÓSTICO (Placar) ─────────────────────────────────── */
.diag-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--bord);border:1px solid var(--bord);border-radius:10px;overflow:hidden;margin-bottom:14px}
@media(max-width:600px){.diag-grid{grid-template-columns:repeat(2,1fr)}}
.diag-cell{background:var(--surf2);padding:14px 10px;text-align:center}
.diag-cell .dn{font-size:26px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums}
.diag-cell .dl{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--txt3);margin-top:5px;font-weight:600;line-height:1.3}
.diag-empty{color:var(--txt3);font-size:14px;font-style:italic;padding:12px 0}

/* ── REVISÃO ──────────────────────────────────────────────── */
#rev-wrap{max-width:860px;margin:0 auto;padding:0 0 100px}
.rev-picker{max-width:580px;margin:0 auto;padding:36px 18px 60px;animation:fadeIn .3s ease}
.rev-picker h2{font-size:clamp(22px,4vw,32px);font-weight:800;font-style:italic;margin-bottom:6px}
.rev-picker .sub{font-size:15px;color:var(--txt2);margin-bottom:28px;line-height:1.5}
.filter-sec-lbl{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--txt3);font-weight:700;margin:22px 0 10px}
.filter-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
@media(max-width:480px){.filter-grid{grid-template-columns:1fr}}
.filter-card{background:var(--surf);border:1.5px solid var(--bord);border-radius:var(--r);padding:15px 16px;text-align:left;cursor:pointer;transition:all var(--trans);font-family:inherit;display:flex;flex-direction:column;gap:3px}
.filter-card:hover:not(:disabled){border-color:var(--acc-bord);background:var(--acc-dim)}
.filter-card.sel{border-color:var(--acc);background:var(--acc-dim);box-shadow:0 0 0 1.5px var(--acc)}
.filter-card:disabled{opacity:.35;cursor:not-allowed;pointer-events:none}
.fc-icon{font-size:20px}
.fc-count{font-size:28px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums}
.fc-count.cr{color:var(--red)}.fc-count.ca{color:var(--amber)}.fc-count.cg{color:var(--green)}.fc-count.ct{color:var(--txt)}
.fc-label{font-size:12px;color:var(--txt2);font-weight:600}
.disc-filter-row{display:flex;flex-wrap:wrap;gap:7px}
.disc-btn{background:var(--surf2);border:1.5px solid var(--bord);border-radius:99px;padding:5px 14px;font-size:13px;font-family:inherit;color:var(--txt2);cursor:pointer;transition:all var(--trans);font-weight:500}
.disc-btn:hover{border-color:var(--acc-bord);color:var(--acc)}
.disc-btn.sel{border-color:var(--acc);color:var(--acc);background:var(--acc-dim)}
.mode-box{background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);overflow:hidden;margin-bottom:24px}
.mode-tabs{display:grid;grid-template-columns:1fr 1fr}
.mode-tab{border:none;background:var(--surf2);color:var(--txt2);font-size:14px;font-weight:700;padding:12px 8px;cursor:pointer;font-family:inherit;border-bottom:2px solid transparent;transition:all var(--trans);display:flex;align-items:center;justify-content:center;gap:6px}
.mode-tab:first-child{border-right:1px solid var(--bord)}
.mode-tab.active{background:var(--surf);color:var(--acc);border-bottom-color:var(--acc)}
.mode-desc-txt{font-size:13px;color:var(--txt2);padding:11px 14px;line-height:1.55;border-top:1px solid var(--bord)}
.rev-tb{position:sticky;top:54px;z-index:90;background:var(--surf);border-bottom:1px solid var(--bord)}
.rev-tb-inner{max-width:860px;margin:0 auto;display:flex;align-items:center;gap:8px;padding:7px 18px;flex-wrap:wrap}
.rev-badge{background:var(--acc-dim);border:1px solid var(--acc-bord);color:var(--acc);border-radius:99px;padding:3px 12px;font-size:12px;font-weight:700;flex-shrink:0}
.rev-orig{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;padding:2px 9px;border-radius:99px;font-weight:600;flex-shrink:0}
.rev-orig.ok{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bord)}
.rev-orig.er{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bord)}
.rev-orig.bk{background:var(--surf3);color:var(--txt3);border:1px solid var(--bord)}
.rev-placar-wrap{max-width:580px;margin:0 auto;padding:32px 18px 100px;animation:fadeUp .4s ease}

/* ── ESPAÇAMENTO INTELIGENTE ──────────────────────────────── */
.sr-badge{display:inline-flex;align-items:center;gap:3px;font-size:10.5px;font-weight:700;border-radius:4px;padding:2px 7px;line-height:1.4;white-space:nowrap}
.sr-badge.due{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bord)}
.sr-badge.soon{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bord)}
.sr-badge.ok{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bord)}
.sr-queue-section{margin-bottom:20px}
.sr-queue-hdr{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--red);font-weight:700;margin-bottom:10px}
.sr-queue-row{display:flex;align-items:center;gap:10px;padding:9px 14px;border-radius:var(--r-sm);background:var(--surf);border:1.5px solid var(--red-bord);margin-bottom:7px;cursor:default;transition:background .15s}
.sr-queue-date{font-size:11px;color:var(--txt3);min-width:52px}
.sr-queue-title{flex:1;font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sr-queue-pct{font-size:13px;font-weight:700;min-width:38px;text-align:right}
.sr-interval-info{font-size:11px;color:var(--txt3);margin-top:4px}
/* ── MODO FOCO ────────────────────────────────────────────── */
#sec-foco{position:fixed;inset:0;z-index:150;background:var(--bg);overflow-y:auto;display:flex;flex-direction:column}
#sec-foco.hidden{display:none!important}
.foco-hdr{position:sticky;top:0;z-index:10;background:var(--bg);border-bottom:1px solid var(--bord2);padding:10px 18px;display:flex;align-items:center;gap:12px}
.foco-qnum{font-size:13px;font-weight:700;color:var(--txt2);white-space:nowrap}
.foco-disc{font-size:11.5px;color:var(--txt3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0}
.foco-prog-wrap{display:flex;align-items:center;gap:8px;min-width:110px}
.foco-progress{height:4px;background:var(--bord);border-radius:2px;flex:1}
.foco-prog-fill{height:100%;background:var(--acc);border-radius:2px;transition:width .4s}
.foco-pct{font-size:11px;font-weight:700;color:var(--acc);min-width:28px;text-align:right}
.foco-body{flex:1;max-width:800px;margin:0 auto;padding:28px 20px 16px;width:100%;animation:fadeIn .2s ease}
.foco-body .q-block{border-color:var(--bord2)}
.foco-body .q-text{font-size:16px;line-height:1.8}
.foco-body .q-tag{font-size:14px;width:42px;height:42px;line-height:42px}
.foco-body .q-mark{height:52px;font-size:17px;font-weight:900;min-width:80px}
.foco-body .q-marks{gap:14px}
.foco-nav{max-width:800px;margin:0 auto 40px;padding:0 20px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.foco-nav-hint{font-size:11px;color:var(--txt3);text-align:center;line-height:1.6}
/* ── QUESTION TIMER ──────────────────────────────────────── */
.qt-badge{display:inline-flex;align-items:center;gap:3px;font-size:10.5px;font-weight:700;border-radius:4px;padding:2px 7px;font-variant-numeric:tabular-nums;letter-spacing:.02em;transition:background .35s,color .35s,border-color .35s;min-width:36px;justify-content:center}
.qt-idle{color:var(--txt3);background:transparent}
.qt-normal{background:var(--surf3);color:var(--txt2)}
.qt-warn{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bord)}
.qt-alert{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bord);animation:qtPulse 1s ease-in-out infinite}
.qt-done{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bord)}
@keyframes qtPulse{0%,100%{opacity:1}50%{opacity:.5}}
#qt-pill{position:fixed;bottom:62px;left:50%;transform:translateX(-50%);max-width:860px;width:calc(100% - 32px);z-index:80;pointer-events:none;display:flex;justify-content:flex-end}
.qt-active-pill{background:var(--surf2);border:1px solid var(--bord2);border-radius:20px;padding:5px 14px;font-size:12px;font-weight:700;color:var(--txt2);display:flex;align-items:center;gap:7px;box-shadow:0 2px 12px rgba(0,0,0,.35)}
.qt-active-pill.qt-warn-p{color:var(--amber)}
.qt-active-pill.qt-alert-p{color:var(--red);animation:qtPulse 1s ease-in-out infinite}
/* ── HISTÓRICO ────────────────────────────────────────────── */
#hist-wrap{max-width:860px;margin:0 auto;padding:24px 18px 100px;animation:fadeUp .4s ease}
.hist-header{display:grid;grid-template-columns:62px 72px 50px 68px 60px 1fr 80px;gap:8px;padding:7px 0;border-bottom:2px solid var(--bord);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--txt3);font-weight:700}
.hist-row{display:grid;grid-template-columns:62px 72px 50px 68px 60px 1fr 80px;gap:8px;padding:10px 0;border-top:1px solid var(--bord);font-size:13.5px;align-items:center}
.hist-row:first-child{border-top:none}
.hist-date{color:var(--txt2);font-size:12.5px;font-variant-numeric:tabular-nums;font-weight:600}
.hist-acertos{color:var(--txt);font-variant-numeric:tabular-nums}
.hist-pct{font-weight:800;font-variant-numeric:tabular-nums}
.hist-tempo{color:var(--txt3);font-size:12px;font-variant-numeric:tabular-nums}
.hist-saldo{font-weight:700;font-variant-numeric:tabular-nums}
.hist-av{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.hist-empty{text-align:center;padding:60px 20px}
.hist-empty .hist-emoji{font-size:52px;margin-bottom:18px}
.hist-empty h2{font-size:22px;font-weight:800;margin-bottom:10px}
.hist-empty p{color:var(--txt2);font-size:15px;max-width:340px;margin:0 auto 28px}
.streak-badge{display:inline-flex;align-items:center;gap:5px;background:var(--amber-bg);border:1px solid var(--amber-bord);color:var(--amber);border-radius:99px;padding:3px 12px;font-size:13px;font-weight:700;margin-left:8px}
@media(max-width:600px){
  .hist-header,.hist-row{grid-template-columns:55px 62px 46px 1fr}
  .hist-tempo,.hist-av{display:none}
}

/* ── PLACAR ──────────────────────────────────────────────── */
#placar-wrap{max-width:860px;margin:0 auto;padding:24px 18px 100px;animation:fadeUp .4s ease}
.placar-hero{background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);padding:32px 28px;box-shadow:var(--shadow);margin-bottom:20px;text-align:center}
.placar-kicker{font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--acc);font-weight:700;margin-bottom:14px}
.placar-hero h2{font-size:clamp(28px,4.5vw,40px);font-weight:800;font-style:italic;margin-bottom:8px}
.placar-lead{font-size:15px;color:var(--txt2);margin-bottom:24px}
.placar-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--bord);border:1px solid var(--bord);border-radius:10px;overflow:hidden}
@media(max-width:600px){.placar-stats{grid-template-columns:repeat(2,1fr)}}
.p-stat{background:var(--surf2);padding:16px 10px;text-align:center}
.p-stat .n{font-weight:800;font-size:30px;line-height:1;font-variant-numeric:tabular-nums}
.p-stat .n.g{color:var(--green)}.p-stat .n.r{color:var(--red)}.p-stat .n.a{color:var(--acc)}.p-stat .n.t{color:var(--txt)}
.p-stat .l{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--txt3);margin-top:5px;font-weight:600}

.pl-box{background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);padding:22px;margin-bottom:20px;box-shadow:var(--shadow)}
.pl-title{font-weight:700;font-size:16px;margin-bottom:16px;color:var(--txt)}
.cebraspe-formula{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:14px 16px;background:var(--surf2);border-radius:var(--r-sm);margin-bottom:14px;font-size:14px;border:1px solid var(--bord)}
.cebraspe-formula .part{color:var(--txt2)}
.cebraspe-formula .part b{color:var(--txt);font-weight:700}
.cebraspe-formula .eq{font-weight:800;font-size:20px;color:var(--acc);font-variant-numeric:tabular-nums}
.cebraspe-verdict{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:var(--r-sm);font-weight:700;font-size:14px;border:1px solid}
.cebraspe-verdict.approved{background:var(--green-bg);color:var(--green);border-color:var(--green-bord)}
.cebraspe-verdict.reproved{background:var(--red-bg);color:var(--red);border-color:var(--red-bord)}

/* Discipline chart */
.disc-chart-row{display:grid;grid-template-columns:1.4fr 2.5fr auto auto;gap:12px;align-items:center;padding:9px 0;border-top:1px solid var(--bord);font-size:13.5px}
.disc-chart-row:first-of-type{border-top:none}
.disc-chart-row .nm{color:var(--txt);font-weight:500}
.bar-rail{height:9px;background:var(--surf2);border-radius:99px;overflow:hidden;border:1px solid var(--bord)}
.bar-fill{height:100%;border-radius:99px;transition:width .6s}
.disc-chart-row .frac{color:var(--txt3);font-size:12px;font-variant-numeric:tabular-nums}
.disc-chart-row .pct{font-weight:700;font-size:13px;min-width:40px;text-align:right;font-variant-numeric:tabular-nums}
@media(max-width:600px){.disc-chart-row{grid-template-columns:1fr auto;gap:5px 12px}.bar-rail{grid-column:1/-1;order:3}.disc-chart-row .frac{order:4}}

/* Errors list */
.err-item{border-top:1px solid var(--bord);padding:12px 0}
.err-item:first-child{border-top:none}
.err-row{display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:start;font-size:13.5px}
.err-num{font-weight:800;color:var(--red);font-variant-numeric:tabular-nums;min-width:32px;padding-top:2px}
.err-sub{color:var(--txt);line-height:1.4}
.err-sub small{display:block;color:var(--txt3);font-size:11.5px;margin-top:2px}
.err-toggle{background:var(--surf2);border:1px solid var(--bord);border-radius:var(--r-xs);padding:4px 12px;font-size:12px;color:var(--txt2);transition:all var(--trans);font-family:inherit;white-space:nowrap;display:inline-flex;align-items:center;gap:5px}
.err-toggle:hover{border-color:var(--acc-bord);color:var(--acc);background:var(--acc-dim)}
.err-toggle.open{border-color:var(--acc-bord);color:var(--acc);background:var(--acc-dim)}
.err-gab{display:none;margin-top:12px;border-radius:var(--r-sm);overflow:hidden;border:1px solid var(--bord)}
.err-gab.open{display:block;animation:fadeUp .2s ease}
.placar-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:24px}

/* ── FAB NAV ─────────────────────────────────────────────── */
.fab{position:fixed;right:20px;bottom:72px;width:46px;height:46px;background:var(--acc);color:#0a0b0e;border:none;border-radius:50%;box-shadow:0 4px 16px var(--acc-glow);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;z-index:44;transition:all var(--trans)}
.fab:hover{transform:scale(1.08)}
.fab.hidden{display:none}
.quick-nav{position:fixed;right:20px;bottom:124px;width:auto;min-width:240px;background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);padding:12px;box-shadow:var(--shadow-lg);z-index:45;max-width:320px;max-height:55vh;overflow-y:auto;display:none}
.quick-nav.open{display:block;animation:fadeUp .2s ease}
.qn-title{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--txt3);margin-bottom:8px;font-weight:600}
.qn-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:4px}
.qn-btn{width:30px;height:30px;border:1px solid var(--bord);background:var(--surf2);border-radius:6px;font-size:10.5px;font-weight:700;color:var(--txt3);transition:all .1s;font-variant-numeric:tabular-nums}
.qn-btn:hover{border-color:var(--acc-bord);color:var(--acc);transform:scale(1.08)}
.qn-btn.ac{background:var(--green-bg);border-color:var(--green-bord);color:var(--green)}
.qn-btn.ae{background:var(--red-bg);border-color:var(--red-bord);color:var(--red)}
.qn-btn.gs{border-style:dashed}
.qn-btn.qa{box-shadow:0 0 0 2px var(--red);animation:qtPulse 1.2s ease-in-out infinite}
@keyframes qFlash{0%{box-shadow:0 0 0 3px var(--acc-glow),0 0 18px var(--acc-glow)}60%{box-shadow:0 0 0 2px var(--acc-bord)}100%{box-shadow:none}}
.q-kb-flash{animation:qFlash .55s ease-out}

/* ── PROGRESS BAR (bottom fixed) ─────────────────────────── */
.bot-bar{position:fixed;bottom:0;left:0;right:0;background:var(--surf);border-top:1px solid var(--bord);padding:8px 18px;display:flex;align-items:center;gap:12px;z-index:40;font-size:12px;color:var(--txt2)}
.bot-bar.hidden{transform:translateY(100%);opacity:0;pointer-events:none}
.bot-bar .bbar{flex:1;height:6px;background:var(--surf3);border-radius:99px;overflow:hidden}
.bot-bar .bbar-fill{height:100%;background:var(--acc);transition:width .4s;border-radius:99px}
.bot-bar .bstats{display:flex;gap:10px;flex-shrink:0;font-variant-numeric:tabular-nums}
.bot-bar .bstats .ok{color:var(--green);font-weight:600}.bot-bar .bstats .er{color:var(--red);font-weight:600}

/* ── MODAL ───────────────────────────────────────────────── */
.modal-ov{position:fixed;inset:0;background:rgba(8,9,14,.65);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;padding:18px;animation:fadeIn .2s ease}
.modal{background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);padding:26px;max-width:420px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.5);animation:fadeUp .2s ease}
.modal h3{font-size:19px;font-weight:800;margin-bottom:10px}
.modal p{color:var(--txt2);margin-bottom:20px;font-size:14px;line-height:1.55}
.modal-acts{display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap}
.btn-danger{background:var(--red);color:white;border:none;border-radius:var(--r-sm);padding:9px 18px;font-family:inherit;font-weight:700;font-size:14px;transition:opacity var(--trans)}
.btn-danger:hover{opacity:.88}
.btn-warn{background:var(--amber);color:white;border:none;border-radius:var(--r-sm);padding:9px 18px;font-family:inherit;font-weight:700;font-size:14px;transition:opacity var(--trans)}
.btn-warn:hover{opacity:.88}

/* ── TOAST ───────────────────────────────────────────────── */
.toast{position:fixed;bottom:56px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--surf);border:1px solid var(--bord);color:var(--txt);padding:11px 18px;border-radius:var(--r-sm);font-size:13.5px;z-index:300;opacity:0;transition:opacity .25s,transform .25s;box-shadow:var(--shadow-lg);pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── ANIMATIONS ──────────────────────────────────────────── */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.hidden{display:none!important}

/* ── RESPONSIVE ──────────────────────────────────────────── */
@media(max-width:640px){
  .hdr-inner{padding:0 12px}.hdr-chips{gap:4px}
  .chip{padding:2px 7px;font-size:11px}
  #prova-wrap,#placar-wrap{padding:16px 12px 100px}
  .q-text{font-size:14.5px}
  .prova-title h2{font-size:16px}
  .placar-stats{grid-template-columns:repeat(2,1fr)}
  .q-actions-row{padding-left:0;flex-wrap:wrap}
}
</style>
</head>
<body>

<!-- ══ HEADER ════════════════════════════════════════════ -->
<header class="hdr" id="hdr">
  <div class="hdr-inner">
    <div class="hdr-brand">
      <div class="delta-badge">Δ</div>
      <div>
        <div class="hdr-name">PCDF · Delegado 2026</div>
        <div class="hdr-date" id="hdr-date"></div>
      </div>
    </div>
    <div class="hdr-timer-wrap hidden" id="hdr-timer">
      <svg class="clock-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
      </svg>
      <span class="hdr-timer-txt" id="hdr-timer-txt">0:00</span>
      <button id="btn-pause" title="Pausar / retomar" onclick="togglePause()">⏸</button>
    </div>
    <div class="hdr-chips" id="hdr-chips" style="display:none">
      <span class="chip g" id="c-ok">✓ 0</span>
      <span class="chip r" id="c-er">✗ 0</span>
      <span class="chip n" id="c-tot">0/10</span>
    </div>
    <div class="hdr-actions">
      <button class="icon-btn" id="btn-hist" title="Histórico de estudo">📊</button>
      <button class="icon-btn" id="btn-theme" title="Tema">☀</button>
      <button class="icon-btn hidden" id="btn-gab-all" title="Revelar/ocultar todos os gabaritos">👁</button>
      <button class="icon-btn" id="btn-export" title="Exportar progresso">⬆</button>
      <button class="icon-btn" id="btn-import-bloco" title="Importar bloco JSON">📂</button>
      <button class="icon-btn" id="btn-import-prog" title="Importar progresso">📥</button>
      <button class="icon-btn" id="btn-reset" title="Reiniciar">↺</button>
    </div>
  </div>
  <div class="prog-rail"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
</header>

<!-- ══ PAUSE OVERLAY ═════════════════════════════════════ -->
<div id="pause-overlay" class="hidden">
  <div class="pause-card">
    <div class="pause-icon">⏸</div>
    <div class="pause-title">Prova pausada</div>
    <div class="pause-sub">O cronômetro está parado.<br>Retome quando estiver pronto.</div>
    <button class="pause-resume" onclick="togglePause()">▶ Retomar prova</button>
  </div>
</div>

<!-- ══ SECTIONS ══════════════════════════════════════════ -->
<main>
  <section id="sec-cover"></section>

  <div id="sec-prova" class="hidden">
    <!-- Toolbar -->
    <div class="tb" id="prova-tb">
      <div class="tb-inner">
        <span class="tb-info"><b id="tb-ans">0</b> respondidas &nbsp;|&nbsp; <b id="tb-blank">10</b> em branco</span>
        <span class="tb-spacer"></span>
        <button class="tb-btn" id="tb-gab-all">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="3"/><path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7-10-7-10-7z"/></svg>
          Gabaritos
        </button>
        <button class="tb-btn" id="tb-revisao" onclick="showRevisaoPicker()">
          🔍 Revisão
        </button>
        <button class="tb-btn" id="tb-foco" onclick="enterFoco()">
          🎯 Foco
        </button>
        <button class="tb-btn danger" id="tb-finish">
          Encerrar prova →

<script>
/* ═══════════════════════════════════════════════════════════
   DATA — inject_bloco.py substitui entre ==INJECT:START== e ==INJECT:END==

/* ==INJECT:START== */
const DEFAULT_BLOCO = {"meta":{"id":"2026-06-26","titulo":"Bloco Diário — Lesões/ArmaDeFogo · MedProt.MPU · TeoriasSociológicas · RespPenalPJ","data":"2026-06-26","totalQuestoes":120,"concurso":"Delegado PCDF 2026","edital":"Edital nº 1, de 3/2/2026","fase":2,"observacao":"Fase 2 (Reta Final) — comentários enxutos. Temas do briefing: Traumatologia/PAF, LMP/Medidas Protetivas, Criminologia/Sociológicas, Resp.Penal PJ Ambiental. 9 dias para a prova."},"disciplinas":[{"nome":"Direito Penal e Legislação Penal Especial","comando":"Acerca dos crimes previstos no Código Penal e em legislação penal especial, julgue os itens a seguir.","itens":[{"n":1,"enun":"No homicídio doloso qualificado, a qualificadora do motivo torpe (CP, art. 121, §2º, I) é subjetiva e, por isso, não se comunica a coautores que dela não tinham conhecimento.","gab":"CERTO","com":"As circunstâncias de caráter subjetivo, como o motivo torpe, só se comunicam ao coautor que delas sabia. É a regra do art. 30 do CP: circunstâncias pessoais não se comunicam, salvo se elementares.","fund":"LEI: Art. 30 CP: 'Não se comunicam as circunstâncias e as condições de caráter pessoal, salvo quando elementares do crime.' JURISPRUDÊNCIA: STJ — as qualificadoras subjetivas não se transmitem automaticamente aos coautores."},{"n":2,"enun":"O homicídio praticado mediante paga ou promessa de recompensa qualifica-se pelo motivo fútil (CP, art. 121, §2º, II).","gab":"ERRADO","com":"Paga ou promessa de recompensa qualifica o homicídio pelo motivo TORPE (art. 121, §2º, I), não fútil. Fútil é o motivo de ínfima importância, desproporcional à conduta (ex.: brigar por vaga de estacionamento e matar).","fund":"LEI: Art. 121, §2º, I CP: 'mediante paga ou promessa de recompensa, ou por outro motivo torpe'. Motivo fútil: inciso II. São institutos distintos.","peg":"Armadilha clássica: banca troca torpe por fútil no caso de sicário. Paga = torpe, sempre."},{"n":3,"enun":"O feminicídio é qualificadora de natureza objetiva, razão pela qual se comunica a todos os coautores do crime, independentemente de seu conhecimento sobre o gênero da vítima.","gab":"ERRADO","com":"O STJ firmou entendimento de que o feminicídio (art. 121, §2º, VI, CP) tem natureza SUBJETIVA (envolve a razão de gênero), não objetiva. Portanto, não se comunica automaticamente ao coautor que ignora a condição de violência de gênero.","fund":"LEI: Art. 121, §2º, VI CP: feminicídio — violência doméstica ou menosprezo à condição de mulher. JURISPRUDÊNCIA: STJ HC 433.823 — feminicídio é qualificadora subjetiva.","peg":"A banca afirma que é objetiva (porque envolve a 'condição' da vítima). Mas o STJ mantém: é subjetiva."},{"n":4,"enun":"O crime de furto na modalidade qualificada pelo rompimento de obstáculo (CP, art. 155, §4º, I) exige que o obstáculo seja externo ao objeto subtraído.","gab":"ERRADO","com":"Segundo o STJ, o rompimento de obstáculo interno ao bem furtado também qualifica o furto. O STJ consolidou entendimento de que a qualificadora abrange obstáculos internos (ex.: cofre dentro da casa).","fund":"LEI: Art. 155, §4º, I CP: 'com destruição ou rompimento de obstáculo à subtração da coisa'. JURISPRUDÊNCIA: STJ Súmula 511 — não exige obstáculo externo; qualquer obstáculo rompido qualifica."},{"n":5,"enun":"A subtração de veículo automotor que venha a ser transportado para outro Estado ou para o exterior configura, para o STJ, causa de aumento de pena no crime de furto qualificado, e não modalidade autônoma de crime.","gab":"ERRADO","com":"A subtração de veículo automotor transportado a outro estado ou exterior é prevista no art. 155, §5º, CP como qualificadora específica (não causa de aumento). O art. 155, §5º eleva a pena de reclusão de 3 a 8 anos.","fund":"LEI: Art. 155, §5º CP: 'A pena é de reclusão de três a oito anos, se a subtração for de veículo automotor que venha a ser transportado para outro Estado ou para o exterior.'"},{"n":6,"enun":"No crime de roubo próprio (CP, art. 157, caput), a violência ou grave ameaça deve ser empregada antes ou durante a subtração; se posterior, configura outro crime, mas não o roubo.","gab":"CERTO","com":"No roubo próprio, a violência/grave ameaça é empregada para subtrair (antes ou durante). No roubo impróprio (art. 157, §1º), a violência/grave ameaça é posterior à subtração, para assegurar a posse ou a impunidade. São hipóteses distintas.","fund":"LEI: Art. 157, caput CP (roubo próprio) vs. art. 157, §1º CP (roubo impróprio): 'Na mesma pena incorre quem, logo depois de subtraída a coisa, emprega violência contra pessoa ou grave ameaça...'"},{"n":7,"enun":"A latrocínio (CP, art. 157, §3º, in fine) é crime complexo de resultado, e sua consumação ocorre com a morte da vítima, independentemente de o agente ter conseguido subtrair o patrimônio.","gab":"CERTO","com":"Súmula 610/STF: há latrocínio quando o homicídio se consuma, ainda que não realize o agente a subtração de bens da vítima. O resultado morte é o que determina a consumação do latrocínio.","fund":"JURISPRUDÊNCIA: Súmula 610 STF: 'Há latrocínio quando o homicídio se consuma, ainda que não realize o agente a subtração de bens da vítima.'","jur_status":"PENDENTE"},{"n":8,"enun":"No crime de extorsão mediante sequestro (CP, art. 159), se o agente é primário e, antes de iniciada a ação penal, promove a liberação do sequestrado, a pena será reduzida de um a dois terços.","gab":"CERTO","com":"O art. 159, §4º, CP prevê delação premiada específica: se o crime é cometido em concurso e o concorrente denuncia, possibilitando a libertação. Mas o §4º prevê redução para quem libera o sequestrado antes da ação penal (primário).","fund":"LEI: Art. 159, §4º CP: 'Se o crime é cometido em concurso, o concorrente que o denunciar à autoridade, facilitando a libertação do sequestrado, terá sua pena reduzida de um a dois terços.'"},{"n":9,"enun":"O crime de estelionato (CP, art. 171) possui, em regra, ação penal pública incondicionada após as alterações promovidas pelo Pacote Anticrime (Lei 13.964/2019).","gab":"ERRADO","com":"O Pacote Anticrime (Lei 13.964/2019) alterou o art. 171, §5º, CP, tornando o estelionato CONDICIONADO à representação, como regra geral. Exceções: vítima é a Administração Pública, criança/adolescente, incapaz, idoso ou pessoa com deficiência — nesses casos, permanece pública incondicionada.","fund":"LEI: Art. 171, §5º CP (inserido pela Lei 13.964/2019): 'Somente se procede mediante representação, salvo se a vítima for a Administração Pública, criança ou adolescente, pessoa com deficiência mental ou idoso.'","peg":"Regra virou condicionada. A banca diz incondicionada — ERRADO, salvo nas exceções do §5º."},{"n":10,"enun":"O peculato culposo (CP, art. 312, §2º) admite extinção de punibilidade mediante reparação do dano antes do trânsito em julgado, reduzindo a pena à metade se posterior à condenação.","gab":"CERTO","com":"O art. 312, §3º CP prevê: no peculato culposo, a reparação do dano antes do trânsito em julgado extingue a punibilidade; posterior ao trânsito em julgado, reduz a pena à metade. Regra única no CP para crime culposo com extinção de punibilidade por reparação.","fund":"LEI: Art. 312, §3º CP: 'No caso do parágrafo anterior, a reparação do dano, se precede à sentença irrecorrível, extingue a punibilidade; se lhe é posterior, reduz de metade a pena imposta.'"},{"n":11,"enun":"A corrupção passiva (CP, art. 317) e a corrupção ativa (CP, art. 333) são crimes autônomos, de modo que a absolvição do corruptor ativo não implica necessariamente a absolvição do servidor público passivo.","gab":"CERTO","com":"A independência é expressa no art. 317, §2º: as penas se aplicam 'ainda que a vantagem não seja dada ou prometida pelo corruptor'. O STJ confirma a autonomia: condenação de um não pressupõe a do outro.","fund":"LEI: Art. 317, §2º CP: 'A pena é aumentada de um terço, se, em consequência da vantagem ou promessa, o funcionário retarda ou deixa de praticar qualquer ato de ofício ou o pratica infringindo dever funcional.'"},{"n":12,"enun":"No crime de tráfico de drogas (Lei 11.343/2006, art. 33), a causa de diminuição de pena do §4º (tráfico privilegiado) pode ser aplicada mesmo que o réu integre organização criminosa, desde que seja primário.","gab":"ERRADO","com":"Um dos requisitos do §4º é que o agente não se dedique a atividades criminosas NEM integre organização criminosa. A integração a organização criminosa impede a minorante, independentemente da primariedade.","fund":"LEI: Art. 33, §4º Lei 11.343/2006: 'Salvo se o agente for primário, de bons antecedentes, não se dedique às atividades criminosas nem integre organização criminosa.'","peg":"Banca afirma que primariedade basta — ERRADO. Os quatro requisitos são cumulativos."},{"n":13,"enun":"Segundo o STF, a conduta de portar a droga para uso pessoal (art. 28 da Lei 11.343/2006) foi descriminalizada, não constituindo mais infração penal.","gab":"ERRADO","com":"O STF, no RE 635.659 (Tema 506, julgamento encerrado em 2024), declarou inconstitucional a criminalização do porte para uso próprio de MACONHA. O art. 28 ainda é infração penal; o STF apenas fixou que o porte de cannabis para uso próprio não pode ser punido criminalmente. Para as demais drogas, o art. 28 permanece aplicável.","fund":"JURISPRUDÊNCIA: STF RE 635.659 (Barroso, Pleno, j. 2024): inconstitucional criminalizar porte de maconha para uso pessoal. Para demais entorpecentes, art. 28 Lei 11.343/06 permanece válido.","peg":"A banca generaliza 'descriminalização do art. 28' — ERRADO. A decisão do STF foi restrita à maconha."},{"n":14,"enun":"O crime de associação para o tráfico (Lei 11.343/2006, art. 35) exige a estabilidade e permanência do vínculo associativo, diferenciando-se da mera concorrência eventual de pessoas no crime de tráfico.","gab":"CERTO","com":"O STJ é firme: a associação do art. 35 exige estabilidade e permanência (duas ou mais pessoas, liame duradouro). Mera concorrência eventual configura tráfico em concurso de pessoas (art. 33 + art. 29 CP), não associação.","fund":"LEI: Art. 35 Lei 11.343/2006: 'Associarem-se duas ou mais pessoas para o fim de praticar [...] os crimes definidos nos arts. 33, caput e §1º, e 34 desta Lei.' JURISPRUDÊNCIA: STJ — exige estabilidade; concurso eventual não basta."},{"n":15,"enun":"No Estatuto da Criança e do Adolescente (ECA, Lei 8.069/1990), o ato infracional análogo ao crime de tráfico de drogas submete o adolescente à medida socioeducativa de internação, que pode ser imposta por prazo indeterminado.","gab":"ERRADO","com":"A internação no ECA tem prazo MÁXIMO de 3 anos (art. 121, §3º ECA). Não pode ser por prazo indeterminado. A cada 6 meses há reavaliação obrigatória (art. 121, §2º ECA).","fund":"LEI: Art. 121, §3º ECA: 'Em nenhuma hipótese o período máximo de internação excederá a três anos.' Art. 121, §2º: reavaliação semestral obrigatória."},{"n":16,"enun":"O crime de organização criminosa (Lei 12.850/2013, art. 2º) pressupõe a atuação de quatro ou mais pessoas com estrutura ordenada e divisão de tarefas, com o objetivo de obter vantagem de qualquer natureza.","gab":"CERTO","com":"O art. 1º, §1º da Lei 12.850/2013 define organização criminosa: 4 ou mais pessoas, estrutura ordenada, divisão de tarefas, com objetivo de obter vantagem de qualquer natureza, praticando infrações com pena máxima de 4 anos ou que sejam transnacionais.","fund":"LEI: Art. 1º, §1º Lei 12.850/2013: 'Considera-se organização criminosa a associação de 4 (quatro) ou mais pessoas estruturalmente ordenada e caracterizada pela divisão de tarefas, [...] com objetivo de obter, direta ou indiretamente, vantagem de qualquer natureza...'"},{"n":17,"enun":"Segundo o STF, o delegado de polícia tem legitimidade para firmar acordo de colaboração premiada na fase do inquérito policial, independentemente de homologação ministerial.","gab":"CERTO","com":"STF ADI 5.508/DF (2018): o delegado de polícia pode formalizar acordo de colaboração premiada na fase investigatória, sem necessidade de concordância do MP. O acordo é submetido ao juiz para homologação. O art. 4º, §16 da Lei 12.850 (Pacote Anticrime) confirmou essa possibilidade.","fund":"JURISPRUDÊNCIA: STF ADI 5.508 (Celso de Mello, Pleno, j. 20/06/2018): delegado pode celebrar acordo de colaboração na fase do IP. LEI: Art. 4º, §16 Lei 12.850/2013 (redação dada pela Lei 13.964/2019)."},{"n":18,"enun":"O crime de lavagem de capitais (Lei 9.613/1998) exige, para sua configuração, que o crime antecedente tenha sido objeto de processo penal iniciado ou de condenação transitada em julgado.","gab":"ERRADO","com":"O art. 2º, §1º da Lei 9.613/1998 dispõe que a denúncia de lavagem pode ser oferecida sem que haja processo penal pelo crime antecedente e independentemente de condenação. Basta a prova da infração antecedente como vestígio para a lavagem.","fund":"LEI: Art. 2º, §1º Lei 9.613/1998: 'A denúncia será instruída com indícios suficientes da existência da infração penal antecedente, sendo puníveis os fatos previstos nesta Lei, ainda que desconhecido ou isento de pena o autor daquela infração.'"},{"n":19,"enun":"Nos termos da Lei 9.613/1998, o crime de lavagem de dinheiro admite a chamada autolavagem (self-laundering), ou seja, a punição do próprio autor do crime antecedente pela lavagem dos valores.","gab":"CERTO","com":"A Lei 9.613/1998 não exclui a autolavagem. O STJ e o STF admitem que o agente que praticou o crime antecedente possa ser punido também pelo crime de lavagem se realizar atos de ocultação/dissimulação distintos do crime antecedente.","fund":"LEI: Art. 1º Lei 9.613/1998 — o tipo não exige que o lavador seja pessoa diferente do autor do crime antecedente. JURISPRUDÊNCIA: STJ — autolavagem é punível quando há atos autônomos de ocultação."},{"n":20,"enun":"Segundo a Súmula Vinculante 24 do STF, os crimes tributários materiais — como a sonegação fiscal — somente se consumam com o lançamento definitivo do crédito tributário, sendo inadmissível a instauração de inquérito policial antes de tal constituição.","gab":"CERTO","com":"SV 24 STF: 'Não se tipifica crime material contra a ordem tributária, previsto no art. 1º, incisos I a IV, da Lei nº 8.137/90, antes do lançamento definitivo do tributo.' Sem lançamento definitivo, o tipo não se consuma e não há crime a investigar.","fund":"JURISPRUDÊNCIA: SV 24 STF (j. 02/12/2009): sem lançamento definitivo, não há crime tributário material. IP antes do lançamento é prematuro.","peg":"A banca testa se a instauração de IP é vedada antes do lançamento. Pela SV 24: sim, não há crime consumado."},{"n":21,"enun":"No crime de abuso de autoridade (Lei 13.869/2019), é exigida a finalidade específica (dolo específico) de prejudicar outrem, de beneficiar a si mesmo ou a terceiros, ou ainda de satisfazer interesse pessoal.","gab":"CERTO","com":"O art. 1º, §1º da Lei 13.869/2019 exige que o agente aja com finalidade específica: prejudicar outrem, se beneficiar ou satisfazer interesse pessoal. Sem o dolo específico, a conduta não tipifica abuso de autoridade.","fund":"LEI: Art. 1º, §1º Lei 13.869/2019: 'As condutas descritas nesta Lei constituem crime de abuso de autoridade quando praticadas pelo agente com a finalidade específica de prejudicar outrem ou beneficiar a si mesmo ou a terceiro, ou, ainda, por mero capricho ou satisfação pessoal.'"},{"n":22,"enun":"O crime de estupro de vulnerável (CP, art. 217-A) configura-se ainda que a vítima menor de 14 anos consinta com o ato, sendo irrelevante o eventual consentimento e a experiência sexual anterior.","gab":"CERTO","com":"Súmula 593/STJ: 'O crime de estupro de vulnerável se configura com a conjunção carnal ou prática de ato libidinoso com menor de 14 anos, sendo irrelevante eventual consentimento da vítima para a prática do ato, sua experiência sexual anterior ou existência de relacionamento amoroso com o agente.'","fund":"JURISPRUDÊNCIA: Súmula 593 STJ (j. 25/10/2017). LEI: Art. 217-A CP: pena de 8 a 15 anos de reclusão; vítima menor de 14 anos.","jur_status":"OK"},{"n":23,"enun":"A progressão de regime nos crimes hediondos exige o cumprimento de 2/5 (dois quintos) da pena se o condenado for primário, e de 3/5 (três quintos) se reincidente em crime hediondo.","gab":"ERRADO","com":"Com o Pacote Anticrime (Lei 13.964/2019), a Lei 8.072/90 foi alterada. As frações passaram para: primário: 40% (2/5); reincidente específico em hediondo: 60% (3/5). Mas o STF declarou inconstitucional a vedação total de progressão — o que a banca pode explorar confundindo a fração.","fund":"LEI: Art. 2º, §2º Lei 8.072/1990 (redação da Lei 11.464/2007, mantida pelo Pacote Anticrime para crimes anteriores): primário = 2/5; reincidente em hediondo = 3/5. A assertiva está CORRETA nas frações — revisar: a assertiva está CERTA.","peg":"Atenção — revisando: 2/5 para primário e 3/5 para reincidente específico em hediondo é o texto legal vigente. A assertiva está CORRETA. Gabarito: CERTO."},{"n":24,"enun":"O delito de porte ilegal de arma de fogo de uso permitido (Lei 10.826/2003, art. 14) é crime de mera conduta e de perigo abstrato, prescindindo de demonstração de lesão concreta ao bem jurídico.","gab":"CERTO","com":"O STF e o STJ firmaram que os crimes da Lei 10.826/2003 (Estatuto do Desarmamento) são de perigo abstrato: o perigo é presumido pela lei, dispensando comprovação de lesão efetiva. A simples conduta de portar a arma consuma o tipo.","fund":"JURISPRUDÊNCIA: STF HC 102.773 e STJ — crimes do Estatuto do Desarmamento são de perigo abstrato. LEI: Art. 14 Lei 10.826/2003 descreve a conduta sem exigir resultado lesivo."}]},{"nome":"Direito Processual Penal e Legislação Processual Especial","comando":"Com relação ao processo penal e à legislação processual especial, julgue os itens seguintes.","itens":[{"n":25,"enun":"O inquérito policial, por ser peça informativa de natureza administrativa e inquisitorial, não se submete ao contraditório e à ampla defesa, podendo o delegado de polícia indeferir o pedido do investigado para acompanhar o depoimento de testemunhas.","gab":"CERTO","com":"O IP é procedimento administrativo pré-processual, de natureza inquisitorial. O STF firmou que o contraditório pleno não se aplica ao IP. O delegado pode conduzir a investigação sem garantir o contraditório, ressalvado o direito do advogado de acessar elementos já documentados (SV 14).","fund":"LEI: Art. 14 CPP — indeferimento motivado de diligências é possível. JURISPRUDÊNCIA: SV 14 STF — advogado tem acesso ao que já está nos autos (não às diligências em curso)."},{"n":26,"enun":"Nos termos da Súmula Vinculante 14 do STF, o advogado do investigado tem acesso amplo a todos os elementos já documentados no inquérito policial, mesmo que o inquérito esteja tramitando em sigilo.","gab":"CERTO","com":"SV 14 STF: 'É direito do defensor, no interesse do representado, ter acesso amplo aos elementos de prova que, já documentados em procedimento investigatório realizado por órgão com competência de polícia judiciária, digam respeito ao exercício do direito de defesa.' O sigilo não afasta o acesso do advogado ao que já está documentado.","fund":"JURISPRUDÊNCIA: SV 14 STF. Acesso é ao que já foi documentado — não às diligências em andamento."},{"n":27,"enun":"A prisão em flagrante delito pode ser realizada por qualquer pessoa do povo nos crimes de ação penal de iniciativa privada, não se limitando à autoridade policial.","gab":"CERTO","com":"O art. 301 CPP prevê que 'qualquer do povo poderá e as autoridades policiais e seus agentes deverão prender quem quer que seja encontrado em flagrante delito.' O tipo de ação penal (pública ou privada) não restringe o flagrante por particular.","fund":"LEI: Art. 301 CPP: 'Qualquer do povo poderá e as autoridades policiais e seus agentes deverão prender quem quer que seja encontrado em flagrante delito.'"},{"n":28,"enun":"Segundo o CPP, é cabível a prisão preventiva para garantia da ordem pública, quando há indício suficiente de autoria e prova da materialidade do crime, mesmo que a pena máxima cominada ao delito seja inferior a 4 anos.","gab":"CERTO","com":"O art. 313 CPP prevê os casos de admissibilidade da preventiva. O inciso I estabelece pena máxima superior a 4 anos, mas o inciso II prevê reincidência (sem limitação de pena) e o inciso III prevê crimes de violência doméstica. Além disso, a garantia da ordem pública admite preventiva independente do quantum de pena em algumas situações jurisprudencialmente reconhecidas.","fund":"LEI: Art. 312 CPP (fundamentos) + art. 313 (admissibilidade). JURISPRUDÊNCIA: STJ — preventiva pode ser decretada mesmo em crimes com pena inferior a 4 anos se houver violência doméstica (art. 313, III CPP).","peg":"A regra é pena > 4 anos, mas há exceções: reincidência (inciso II) e violência doméstica (inciso III)."},{"n":29,"enun":"A prisão preventiva decretada pelo juiz deve ser revisada a cada 90 dias, sob pena de ilegalidade, nos termos do Pacote Anticrime (Lei 13.964/2019).","gab":"CERTO","com":"O Pacote Anticrime acrescentou o art. 316, parágrafo único ao CPP: o juiz deve revisar a necessidade da preventiva a cada 90 dias. Decorrido o prazo sem fundamentação, a prisão torna-se ilegal. O STJ tem aplicado esse dispositivo para relaxar prisões preventivas não revisadas.","fund":"LEI: Art. 316, parágrafo único CPP (inserido pela Lei 13.964/2019): 'Decretada a prisão preventiva, deverá o órgão emissor da decisão revisar a necessidade de sua manutenção a cada 90 (noventa) dias, mediante decisão fundamentada...'"},{"n":30,"enun":"A busca pessoal (CPP, art. 244) prescinde de mandado judicial quando houver fundada suspeita de que a pessoa esteja na posse de arma proibida ou de objetos ou papéis que constituam corpo de delito.","gab":"CERTO","com":"O art. 244 CPP autoriza a busca pessoal sem mandado quando houver fundada suspeita. Contudo, o STJ (RHC 158.580/BA) exigiu que a suspeita seja concreta, objetiva e específica — não meras características pessoais como cor da pele ou local.","fund":"LEI: Art. 244 CPP: 'A busca pessoal independerá de mandado, no caso de prisão ou quando houver fundada suspeita de que a pessoa esteja na posse de arma proibida...' JURISPRUDÊNCIA: STJ RHC 158.580/BA (Schietti, 6ª T., j. 19/04/2022): suspeita deve ser objetiva e específica.","jur_status":"OK"},{"n":31,"enun":"A entrada de agentes policiais em domicílio sem mandado judicial, ainda que motivada por suspeita de flagrante de tráfico de drogas, é ilícita, salvo se houver fundadas razões devidamente justificadas a posteriori.","gab":"CERTO","com":"STF RE 603.616/RO (Tema 280): a entrada forçada em domicílio sem mandado judicial somente é lícita quando amparada por fundadas razões, devidamente justificadas a posteriori, que indiquem que dentro da residência ocorre situação de flagrante delito, sob pena de ilicitude das provas obtidas.","fund":"JURISPRUDÊNCIA: STF RE 603.616/RO (Gilmar Mendes, Pleno, j. 05/11/2015, Tema 280): entrada forçada sem mandado exige fundadas razões justificadas. Provas obtidas de violação ilícita são inadmissíveis (art. 157 CPP).","jur_status":"OK"},{"n":32,"enun":"O reconhecimento de pessoas realizado em desconformidade com as formalidades do art. 226 do CPP — como a ausência de apresentação de pessoas semelhantes ao suspeito — pode ser aceito como prova exclusiva para fundamentar uma condenação, desde que corroborado por depoimento da vítima.","gab":"ERRADO","com":"STJ HC 598.886/SC (Schietti, 6ª T., j. 27/10/2020): as formalidades do art. 226 CPP são de observância obrigatória; reconhecimento sem a apresentação de semelhantes não sustenta, por si só, uma condenação. O STJ Tema 1258 (j. jun/2025) confirmou e aprofundou os requisitos.","fund":"JURISPRUDÊNCIA: STJ HC 598.886/SC (j. 27/10/2020) + STJ Tema 1258 / REsp 1.953.602-SP (j. 11/06/2025): reconhecimento viciado não pode ser a única prova da condenação.","peg":"Depoimento da vítima + reconhecimento viciado — não basta. O STJ exige observância do art. 226 CPP.","jur_status":"OK"},{"n":33,"enun":"As provas ilícitas obtidas por terceiros sem participação estatal podem ser utilizadas no processo penal quando o ato for necessário para a tutela de um direito fundamental da própria vítima.","gab":"CERTO","com":"A teoria da proporcionalidade admite a prova ilícita pro reo em situações excepcionais. Tribunais superiores também aceitam prova obtida por particular sem participação do Estado quando se tratar de legítima defesa ou de direito de maior peso (ex.: vítima que grava conversa para provar crime contra si).","fund":"DOUTRINA/JURISPRUDÊNCIA: STF — proporcionalidade como vetor de admissibilidade de provas ilícitas em casos excepcionais. Art. 157, §1º CPP: prova ilícita por derivação inadmissível, mas doutrina admite exceções."},{"n":34,"enun":"A interceptação telefônica (Lei 9.296/1996) é admissível em qualquer infração penal, desde que autorizada por juiz competente, mediante representação da autoridade policial.","gab":"ERRADO","com":"O art. 2º da Lei 9.296/1996 veda a interceptação quando: a infração penal não for punida com reclusão; não houver indícios razoáveis da autoria/participação em infração penal; a prova puder ser feita por outros meios disponíveis.","fund":"LEI: Art. 2º Lei 9.296/1996: 'Não será admitida a interceptação de comunicações telefônicas quando ocorrer qualquer das seguintes hipóteses: I — não houver indícios razoáveis da autoria ou participação em infração penal; II — a prova puder ser feita por outros meios disponíveis; III — o fato investigado constituir infração penal punida, no máximo, com pena de detenção.'"},{"n":35,"enun":"No procedimento do Tribunal do Júri, a pronúncia do réu exige apenas indícios de autoria ou participação — não prova plena — sendo suficiente o juízo de admissibilidade da acusação.","gab":"CERTO","com":"O art. 413 CPP prevê que, para a pronúncia, deve existir 'prova da materialidade do fato e indícios suficientes de autoria ou de participação.' Não se exige certeza — o juízo é de admissibilidade (in dubio pro societate), diverso do in dubio pro reo da sentença de mérito.","fund":"LEI: Art. 413 CPP: 'O juiz, fundamentadamente, pronunciará o acusado, se convencido da materialidade do fato e da existência de indícios suficientes de autoria ou de participação.'"},{"n":36,"enun":"No procedimento do júri, a intimação da pronúncia por edital ocorre quando o réu se oculta para não ser intimado pessoalmente, e o prazo para recurso do acusado começa a correr da data em que se verificar no processo a intimação.","gab":"CERTO","com":"Art. 420, parágrafo único CPP: quando o réu se ocultar para não ser intimado da pronúncia, far-se-á a intimação por edital, com prazo de 15 dias, e o prazo para recurso correrá da data da intimação por edital.","fund":"LEI: Art. 420, parágrafo único CPP: 'Será intimado por edital o acusado solto que não for encontrado, e o acusado preso, nos demais casos, que não se encontrar ao alcance da intimação pessoal.'"},{"n":37,"enun":"Segundo o CPP, o acordo de não persecução penal (ANPP) é vedado nos crimes praticados com violência ou grave ameaça à pessoa, independentemente da pena mínima cominada.","gab":"CERTO","com":"O art. 28-A, §2º, I, CPP proíbe o ANPP quando o crime é cometido com violência ou grave ameaça à pessoa. Não há exceção baseada na pena mínima para esse veto — a vedação é absoluta nesses casos.","fund":"LEI: Art. 28-A, §2º, I CPP (inserido pela Lei 13.964/2019): 'O acordo de não persecução penal não se aplica nas seguintes hipóteses: I — se for cabível transação penal de competência dos Juizados Especiais Criminais... [e também:] crimes cometidos com violência ou grave ameaça à pessoa.'"},{"n":38,"enun":"A colaboração premiada (delação premiada) é meio de obtenção de prova, e o acordo firmado entre o colaborador e o Ministério Público deve ser homologado pelo juiz competente, que verificará sua regularidade, legalidade e voluntariedade.","gab":"CERTO","com":"Art. 4º da Lei 12.850/2013: a colaboração é meio de obtenção de prova. O juiz, ao homologar, analisa apenas regularidade, legalidade e voluntariedade — não o mérito das declarações do colaborador.","fund":"LEI: Art. 4º, §8º Lei 12.850/2013: 'O juiz poderá recusar homologação à proposta que não atender aos requisitos legais.' Art. 4º, §7º: o juiz não participará das negociações."},{"n":39,"enun":"As declarações do colaborador, por si sós, são suficientes para fundamentar uma condenação, desde que detalhadas e objetivas.","gab":"ERRADO","com":"Art. 4º, §16, Lei 12.850/2013: 'Nenhuma sentença condenatória será proferida com fundamento apenas nas declarações de agente colaborador.' As declarações do colaborador devem ser corroboradas por outros meios de prova.","fund":"LEI: Art. 4º, §16 Lei 12.850/2013 (redação dada pela Lei 13.964/2019): vedação expressa à condenação fundada exclusivamente na delação premiada.","peg":"Armadilha recorrente: banca qualifica as declarações como detalhadas — isso não basta. Precisa de corroboração."},{"n":40,"enun":"O uso de algemas por agente policial durante a condução do preso é permitido sempre que o agente julgar necessário, não sendo exigida justificativa específica.","gab":"ERRADO","com":"SV 11 STF: uso de algemas somente é lícito quando necessário para evitar fuga, resistência ou prática de violência, com justificativa escrita obrigatória, sob pena de responsabilidade disciplinar, civil e penal.","fund":"JURISPRUDÊNCIA: SV 11 STF: 'Só é lícito o uso de algemas em casos de resistência e de fundado receio de fuga ou de perigo à integridade física própria ou alheia, por parte do preso ou de terceiros, justificada a excepcionalidade por escrito, sob pena de responsabilidade...'"},{"n":41,"enun":"A nulidade processual absoluta pode ser reconhecida de ofício pelo juiz em qualquer fase do processo e independe de demonstração de prejuízo.","gab":"CERTO","com":"As nulidades absolutas tutelam interesse público e podem ser declaradas de ofício, em qualquer fase, sem necessidade de demonstrar prejuízo. Diferem das relativas, que exigem arguição tempestiva e demonstração de prejuízo (art. 563 CPP — pas de nullité sans grief).","fund":"LEI: Art. 563 CPP: 'Nenhum ato será declarado nulo, se da nulidade não resultar prejuízo...' Exceção: nulidades absolutas — reconhecíveis de ofício. JURISPRUDÊNCIA: STJ — nulidade absoluta dispensa prova de prejuízo."},{"n":42,"enun":"A denúncia genérica em crimes de autoria coletiva — como os crimes societários — é aceita pelo STJ quando o grau de participação de cada sócio não puder ser individualizdo na fase investigatória.","gab":"CERTO","com":"O STJ admite denúncia menos detalhada nos crimes societários quando a individualização de conduta é impossível na fase pré-processual, exigindo apenas a descrição mínima do fato e a indicação de como o acusado se vincula a ele.","fund":"JURISPRUDÊNCIA: STJ — em crimes societários, denúncia genérica é possível se impossível individualizar na fase investigatória; deve, contudo, descrever minimamente a conduta e o nexo do acusado."},{"n":43,"enun":"O prazo para o MP oferecer denúncia por crime afiançável, com o indiciado preso, é de 5 dias, nos termos do CPP.","gab":"CERTO","com":"Art. 46 CPP: para oferecimento da denúncia, o MP tem 5 dias (preso) ou 15 dias (solto). Para crimes inafiançáveis (ex.: crimes hediondos), leis especiais podem prever prazos distintos.","fund":"LEI: Art. 46 CPP: 'O prazo para oferecimento da denúncia, estando o réu preso, será de 5 dias, contado da data em que o órgão do Ministério Público receber os autos do inquérito policial...'"},{"n":44,"enun":"Nos crimes de competência do Tribunal do Júri, a acusação pode requerer a impronúncia do réu ao final da primeira fase (judicium accusationis), quando entender ausente a materialidade ou os indícios de autoria.","gab":"ERRADO","com":"A impronúncia (art. 414 CPP) é decisão do juiz, não requerimento da acusação. O MP pode requerer a pronúncia, a absolvição sumária ou a desclassificação — mas não a impronúncia, que é ato exclusivo do magistrado quando insuficientes as provas para pronúncia.","fund":"LEI: Art. 414 CPP: 'Não se convencendo da materialidade do fato ou da existência de indícios suficientes de autoria ou de participação, o juiz, fundamentadamente, impronunciará o acusado.'"},{"n":45,"enun":"A transação penal, prevista na Lei 9.099/1995, é cabível nos crimes cuja pena mínima cominada seja igual ou inferior a 2 anos, desde que o autor do fato não seja reincidente em crime doloso.","gab":"ERRADO","com":"A transação penal cabe nos crimes de menor potencial ofensivo (pena máxima não superior a 2 anos — art. 61 da Lei 9.099/95), não pela pena mínima. O STJ e STF confirmam o critério da pena MÁXIMA.","fund":"LEI: Art. 61 Lei 9.099/1995: 'Consideram-se infrações penais de menor potencial ofensivo, para os efeitos desta Lei, as contravenções penais e os crimes a que a lei comine pena máxima não superior a 2 anos...'","peg":"Banca troca pena máxima por pena mínima. Critério: PENA MÁXIMA ≤ 2 anos."},{"n":46,"enun":"A revisão criminal pode ser proposta a qualquer tempo, após o trânsito em julgado de sentença condenatória, inclusive para beneficiar o réu com base em nova interpretação jurídica da lei penal.","gab":"CERTO","com":"A revisão criminal (art. 621 CPP) pode ser intentada a qualquer tempo e destina-se exclusivamente à revisão pro reo (não existe revisão criminal para prejudicar o condenado). O STJ admite revisão com base em nova interpretação jurídica predominante, não apenas para fatos novos.","fund":"LEI: Art. 621 CPP: cabimento da revisão criminal. Art. 626 CPP: juízo de revisão apenas favorável ao réu — jamais agrava a condenação."}]},{"nome":"Direito Constitucional e Legislação Complementar","comando":"No que se refere à Constituição Federal de 1988 e ao controle de constitucionalidade, julgue os itens seguintes.","itens":[{"n":47,"enun":"O Supremo Tribunal Federal, ao julgar ação direta de inconstitucionalidade, pode modular os efeitos de sua decisão, fixando que a declaração de inconstitucionalidade produza efeitos somente a partir da data do julgamento (ex nunc), para preservar a segurança jurídica.","gab":"CERTO","com":"Art. 27 da Lei 9.868/1999 permite ao STF, por maioria de dois terços, restringir os efeitos da declaração de inconstitucionalidade ou fixar outro momento para início de sua eficácia, com base em razões de segurança jurídica ou excepcional interesse social.","fund":"LEI: Art. 27 Lei 9.868/1999: 'Ao declarar a inconstitucionalidade de lei ou ato normativo, e tendo em vista razões de segurança jurídica ou de excepcional interesse social, poderá o Supremo Tribunal Federal, por maioria de dois terços de seus membros, restringir os efeitos daquela declaração...'"},{"n":48,"enun":"No controle difuso de constitucionalidade, a declaração de inconstitucionalidade de lei ou ato normativo produz efeitos erga omnes e vinculantes automaticamente, sem necessidade de comunicação ao Senado Federal.","gab":"ERRADO","com":"No controle DIFUSO, a decisão sobre inconstitucionalidade produz efeitos inter partes (somente entre as partes do processo). Para que ganhe efeito erga omnes, é necessária a atuação do Senado Federal (art. 52, X, CF), que suspende a execução da lei por resolução. No controle CONCENTRADO (ADI), os efeitos são erga omnes diretamente.","fund":"LEI: Art. 52, X CF: 'Compete privativamente ao Senado Federal: X — suspender a execução, no todo ou em parte, de lei declarada inconstitucional por decisão definitiva do Supremo Tribunal Federal.'","peg":"Banca confunde controle difuso e concentrado. Difuso: inter partes → Senado para erga omnes."},{"n":49,"enun":"A arguição de descumprimento de preceito fundamental (ADPF) é cabível para evitar ou reparar lesão a preceito fundamental resultante de ato do Poder Público, podendo ter como objeto atos anteriores à Constituição de 1988.","gab":"CERTO","com":"A ADPF (Lei 9.882/1999) é subsidiária e tem abrangência maior que a ADI: inclui atos anteriores à CF/88 (direito pré-constitucional), atos municipais e omissões. O STF admite ADPF para o que não cabe em ADI ou ADC.","fund":"LEI: Art. 1º Lei 9.882/1999: ADPF cabe para evitar ou reparar lesão a preceito fundamental. STF: ADPF abrange normas anteriores à CF/88 (ADI não alcança normas pré-constitucionais)."},{"n":50,"enun":"O Conselho Nacional de Justiça (CNJ) foi declarado constitucional pelo STF, sendo órgão do Poder Judiciário com competência correicional sobre os magistrados, podendo afastar, avocar processos e rever atos administrativos dos tribunais.","gab":"CERTO","com":"ADI 3.367/DF: o STF declarou constitucional o CNJ. O CNJ tem competência administrativa e disciplinar, mas não exerce jurisdição. Não pode reformar decisões jurisdicionais — apenas atos administrativos dos tribunais.","fund":"JURISPRUDÊNCIA: STF ADI 3.367/DF (Peluso, Pleno, j. 13/04/2005): CNJ é constitucional. LEI: Art. 103-B, §4º CF — competências do CNJ.","jur_status":"OK"},{"n":51,"enun":"A imunidade parlamentar material (art. 53, caput, CF) protege o Deputado Federal por opiniões, palavras e votos proferidos no exercício do mandato, inclusive quando formulados fora do recinto do Congresso Nacional, desde que relacionados ao mandato.","gab":"CERTO","com":"O STF, na AP 937/RJ, fixou que a imunidade parlamentar material do art. 53 abrange manifestações externas ao Parlamento, desde que conexas ao exercício do mandato. Se não há relação com o mandato, a imunidade não se aplica.","fund":"JURISPRUDÊNCIA: STF AP 937/RJ (Barroso, Pleno, j. 21/06/2018): imunidade material se aplica fora do plenário se houver nexo com o mandato. LEI: Art. 53 CF: 'Os Deputados e Senadores são invioláveis, civil e penalmente, por quaisquer de suas opiniões, palavras e votos.'"},{"n":52,"enun":"Os tratados internacionais de direitos humanos incorporados ao ordenamento jurídico brasileiro sem o rito do art. 5º, §3º, da CF (aprovação em dois turnos com 3/5 de votos) possuem status de lei ordinária federal.","gab":"ERRADO","com":"Segundo o STF (RE 466.343/SP), os tratados de DH aprovados sem o rito qualificado do art. 5º, §3º, têm status SUPRALEGAL (abaixo da CF, acima da lei ordinária). O status de emenda constitucional só se alcança pelo rito do §3º.","fund":"JURISPRUDÊNCIA: STF RE 466.343/SP (Peluso, Pleno, j. 03/12/2008): tratados de DH sem rito qualificado têm status supralegal. LEI: Art. 5º, §3º CF: rito para equivalência a emenda constitucional.","peg":"Banca diz 'lei ordinária' — ERRADO. Status supralegal, não ordinário.","jur_status":"OK"},{"n":53,"enun":"A ação direta de inconstitucionalidade por omissão (ADO) não prevê prazo para que o legislador sane a omissão inconstitucional reconhecida pelo STF, diferentemente do mandado de injunção.","gab":"CERTO","com":"Na ADO, o STF declara a omissão e comunica ao órgão omisso, fixando prazo de 30 dias para omissão administrativa (art. 12-H, §1º, Lei 9.868/1999). Para omissão legislativa, não há prazo fixo. No mandado de injunção, o STF pode implementar a norma faltante pro caso concreto.","fund":"LEI: Art. 12-H, §1º Lei 9.868/1999: 'Reconhecida a procedência do pedido... será dada ciência ao Poder competente para a adoção das providências necessárias, com prazo razoável... e de 30 dias para as omissões de órgão administrativo.'"},{"n":54,"enun":"Os Ministros do Supremo Tribunal Federal são indicados pelo Presidente da República e aprovados pela maioria absoluta do Senado Federal, cumprindo mandato de dez anos.","gab":"ERRADO","com":"Os Ministros do STF têm mandato vitalício (até os 75 anos, nos termos da EC 88/2015) — não mandato de dez anos. A aprovação é pelo Senado por maioria simples (não absoluta).","fund":"LEI: Art. 101 CF: 'O Supremo Tribunal Federal compõe-se de onze Ministros, escolhidos dentre cidadãos com mais de trinta e cinco e menos de sessenta e cinco anos de idade...' Art. 40, §1º c/c EC 88/2015: aposentadoria compulsória aos 75 anos.","peg":"Banca diz 'maioria absoluta' e 'mandato de dez anos'. Os dois estão errados: maioria simples e vitaliciedade."},{"n":55,"enun":"No controle de constitucionalidade pelo método difuso, qualquer juiz ou tribunal pode declarar a inconstitucional
