ncia de procedimento fiscal iniciado pela administração.","gab":"ERRADO","com":"O art. 138 do CTN exclui a responsabilidade apenas quando a denúncia é *espontânea* — antes do início do procedimento fiscal. Se já houver procedimento iniciado contra o contribuinte, não há espontaneidade: o ato é tardio e a exclusão não se aplica. O STJ (Súmula 360) fixou que a denúncia espontânea é inaplicável quando já iniciado procedimento de fiscalização. Há também controvérsia se abrange as multas de mora ou apenas as punitivas.","fund":"LEI: 'Art. 138 do CTN: A responsabilidade é excluída pela denúncia espontânea da infração, acompanhada, se for o caso, do pagamento do tributo devido e dos juros de mora, ou do depósito da importância arbitrada pela autoridade administrativa...'\nJURISPRUDÊNCIA: Súmula 360 STJ: 'O benefício da denúncia espontânea não se aplica aos tributos sujeitos a lançamento por homologação regularmente declarados, mas pagos a destempo.'","peg":"Denúncia espontânea: só funciona ANTES do procedimento fiscal. Com procedimento iniciado = NÃO há espontaneidade = exclusão NÃO se aplica.","jur_status":"OK"},{"n":104,"enun":"As imunidades tributárias recíprocas entre os entes federados (art. 150, VI, a, da CF) alcançam empresas públicas e sociedades de economia mista que prestem serviços públicos, desde que não concorram com a iniciativa privada.","gab":"CERTO","com":"O STF estendeu a imunidade recíproca a empresas públicas e SEM que prestem serviços públicos sem fins lucrativos e sem concorrência com a iniciativa privada (RE 599.176 — Correios; RE 253.472 — INFRAERO). A ratio é que essas empresas atuam como braço do Estado — tributá-las seria o mesmo que tributar o próprio ente federado. Se houver concorrência com o setor privado, a imunidade não se aplica.","fund":"LEI: 'Art. 150, VI, a da CF/88: Sem prejuízo de outras garantias asseguradas ao contribuinte, é vedado à União, aos Estados, ao Distrito Federal e aos Municípios: [...] VI — instituir impostos sobre: a) patrimônio, renda ou serviços, uns dos outros.'\nJURISPRUDÊNCIA: STF, RE 599.176/PR (Rel. Min. Joaquim Barbosa, Pleno, j. 2013): imunidade recíproca estendida aos Correios, empresa pública federal prestadora de serviço público sem concorrência.","peg":"Imunidade recíproca: EP e SEM = protegidas se prestam SERVIÇO PÚBLICO e NÃO concorrem com privados. Concorrência = imunidade NÃO se aplica.","jur_status":"PENDENTE"}]},{"nome":"Direito Ambiental + Legislação Complementar","comando":"Acerca de proteção ambiental, responsabilidade e crimes ambientais, julgue os itens a seguir.","itens":[{"n":105,"enun":"A responsabilidade civil por danos ambientais é objetiva e fundada na teoria do risco integral, não admitindo excludentes de responsabilidade como caso fortuito, força maior ou fato de terceiro.","gab":"CERTO","com":"O STJ, no REsp 1.374.284/MG (Repetitivo, Tema 681), fixou que a responsabilidade por dano ambiental é objetiva (art. 14, §1º da Lei 6.938/81 + art. 225, §3º CF), fundamentada na teoria do risco integral. Diferente da teoria do risco administrativo (que admite excludentes), o risco integral não admite caso fortuito, força maior ou fato de terceiro como excludentes. O poluidor responde pelo resultado danoso, independentemente de qualquer causa alheia.","fund":"LEI: 'Art. 14, §1º da Lei 6.938/1981: Sem obstar a aplicação das penalidades previstas neste artigo, é o poluidor obrigado, independentemente da existência de culpa, a indenizar ou reparar os danos causados ao meio ambiente e a terceiros, afetados por sua atividade.'\nJURISPRUDÊNCIA: STJ, REsp 1.374.284/MG (Rel. Min. Luis Felipe Salomão, 4ª T., j. 27/08/2014, Tema 681): responsabilidade ambiental = objetiva + risco integral + sem excludentes.","peg":"Dano ambiental: RISCO INTEGRAL (não risco administrativo). NÃO admite excludentes: caso fortuito, força maior e fato de terceiro são irrelevantes.","jur_status":"OK"},{"n":106,"enun":"A área de preservação permanente (APP) pode ser suprimida mediante autorização do órgão ambiental competente, nas hipóteses de utilidade pública, interesse social ou baixo impacto ambiental previstas em lei.","gab":"CERTO","com":"O Código Florestal (Lei 12.651/2012) prevê que a vegetação de APP só pode ser suprimida ou explorada em casos específicos: (a) utilidade pública (art. 3º, VIII e IX); (b) interesse social (art. 3º, IX); (c) baixo impacto ambiental (art. 3º, X). Fora dessas hipóteses, a APP é absolutamente protegida. A autorização do órgão ambiental é necessária, devendo ser precedida de estudo de impacto quando exigido.","fund":"LEI: 'Art. 8º da Lei 12.651/2012: A intervenção ou a supressão de vegetação nativa em Área de Preservação Permanente somente ocorrerá nas hipóteses de utilidade pública, de interesse social ou de baixo impacto ambiental previstas nesta Lei.'\nJURISPRUDÊNCIA: STF, ADI 4.901/DF (Rel. Min. Luiz Fux, Pleno, j. 2018): declarou constitucional a maioria das normas do Código Florestal sobre APPs, incluindo as hipóteses de supressão autorizada.","jur_status":"PENDENTE"},{"n":107,"enun":"A pessoa jurídica pode ser responsabilizada criminalmente por crimes ambientais, podendo sofrer as sanções de multa, restrição de direitos e até prestação de serviços à comunidade.","gab":"CERTO","com":"O art. 225, §3º da CF/88 prevê expressamente a responsabilidade penal das pessoas jurídicas por crimes ambientais. A Lei 9.605/98 regulamentou as sanções aplicáveis às PJs: multa (art. 18), penas restritivas de direitos (suspensão de atividades, interdição temporária, proibição de contratar — art. 22), e prestação de serviços à comunidade (art. 23). O STJ confirmou a dupla imputação — pessoa física E jurídica podem ser condenadas conjuntamente.","fund":"LEI: 'Art. 3º da Lei 9.605/1998: As pessoas jurídicas serão responsabilizadas administrativa, civil e penalmente conforme o disposto nesta Lei, nos casos em que a infração seja cometida por decisão de seu representante legal ou contratual, ou de seu órgão colegiado, no interesse ou benefício da sua entidade.'\nJURISPRUDÊNCIA: STF, RE 548.181/PR (Rel. Min. Rosa Weber, 1ª T., j. 2013): pessoa jurídica pode ser processada por crime ambiental sem necessidade de concomitante persecução da pessoa física (superando a teoria da dupla imputação obrigatória).","jur_status":"OK"},{"n":108,"enun":"A reparação do dano ambiental é imprescritível, pois o direito ao meio ambiente ecologicamente equilibrado é um direito difuso que pertence às presentes e futuras gerações.","gab":"ERRADO","com":"A pretensão de reparação de dano ambiental *individual* (dano a pessoa determinada) segue o prazo prescricional comum. O STJ, na Súmula 412, fixa prazo de 3 anos para responsabilidade civil ambiental individual. Já a pretensão do Estado (ação civil pública) para responsabilidade ambiental difusa é imprescritível segundo o STJ (REsp 1.120.117). A confusão entre dano individual e difuso é frequente em provas.","fund":"LEI: Art. 14, §1º, Lei 6.938/81 (responsabilidade ambiental); Súmula 412 STJ: 'A ação de reparação de danos à ribeirinha é prescritível, observado o prazo de 3 anos.'\nJURISPRUDÊNCIA: STJ, REsp 1.120.117/AC (2ª T., j. 2012): pretensão de reparação de dano ambiental difuso pela coletividade é imprescritível; dano individual tem prazo do Código Civil.","peg":"Dano ambiental DIFUSO (coletividade) = imprescritível. Dano ambiental INDIVIDUAL = prescritível (3 anos, Súmula 412 STJ). Distinção crucial.","jur_status":"PENDENTE"},{"n":109,"enun":"O princípio do poluidor-pagador, previsto na Política Nacional do Meio Ambiente, impõe ao poluidor os custos de prevenção, precaução e reparação dos danos ambientais, independentemente de culpa.","gab":"CERTO","com":"O princípio do poluidor-pagador (art. 4º, VII da Lei 6.938/81) vai além da responsabilidade civil: impõe ao poluidor os custos de prevenção (para evitar poluição futura), precaução (diante de riscos incertos) e reparação (dos danos já causados). É fundamento da responsabilidade civil objetiva ambiental. Não é penalidade — é internalização do custo ambiental da atividade econômica.","fund":"LEI: 'Art. 4º, VII da Lei 6.938/1981: A Política Nacional do Meio Ambiente visará: [...] VII — à imposição, ao poluidor e ao predador, da obrigação de recuperar e/ou indenizar os danos causados e, ao usuário, da contribuição pela utilização de recursos ambientais com fins econômicos.'\nJURISPRUDÊNCIA: STJ, REsp 1.374.284/MG (Tema 681): o princípio poluidor-pagador embasa a responsabilidade objetiva e integral do poluidor por danos ambientais.","jur_status":"OK"}]},{"nome":"Direito Empresarial + Legislação Complementar","comando":"Acerca de direito empresarial, recuperação judicial e crimes falimentares, julgue os itens a seguir.","itens":[{"n":110,"enun":"No âmbito da recuperação judicial, o stay period de suspensão das ações e execuções contra o devedor é de 180 dias improrrogáveis, contados do deferimento do processamento da recuperação.","gab":"ERRADO","com":"A Lei 11.101/2005, com as alterações da Lei 14.112/2020, estabeleceu que o stay period é de 180 dias, mas *prorrogável por igual período* em casos excepcionais (art. 6º, §4º). Antes da reforma de 2020, o prazo era interpretado como improrrogável; após a reform, a prorrogação passou a ser expressamente admitida. Créditos tributários e créditos de proprietário fiduciário não são suspensos pelo stay period.","fund":"LEI: 'Art. 6º, §4º da Lei 11.101/2005 (redação da Lei 14.112/2020): Na recuperação judicial, a suspensão de que trata o caput deste artigo em hipótese alguma excederá o prazo improrrogável de 180 (cento e oitenta) dias contado do deferimento do processamento da recuperação, restabelecendo-se, após o decurso do prazo, o direito dos credores de iniciar ou continuar suas ações e execuções, independentemente de pronunciamento judicial.'\nJURISPRUDÊNCIA: STJ, REsp 1.712.439/SP (3ª T., j. 2021): após a Lei 14.112/2020, o stay period de 180 dias admite prorrogação em situações excepcionais, conforme prevê a legislação reformada.","peg":"Stay period = 180 dias. Após Lei 14.112/2020: prorrogável por igual período em casos excepcionais. A palavra 'improrrogáveis' torna o item ERRADO.","jur_status":"PENDENTE"},{"n":111,"enun":"O empresário individual e a sociedade empresária são os únicos que podem requerer recuperação judicial, estando excluídas as sociedades simples e as cooperativas.","gab":"CERTO","com":"O art. 1º da Lei 11.101/2005 define os sujeitos que podem requerer recuperação judicial: empresário e sociedade empresária (arts. 966 e 982 do CC). Ficam excluídos: empresas públicas e sociedades de economia mista (art. 2º, I), financeiras (art. 2º, II), e as sociedades simples (cooperativas, associações, fundações), que não são empresariais. A distinção entre sociedade empresária (objeto empresarial) e simples (profissão intelectual ou trabalho pessoal) é crucial.","fund":"LEI: 'Art. 1º da Lei 11.101/2005: Esta Lei disciplina a recuperação judicial, a recuperação extrajudicial e a falência do empresário e da sociedade empresária, doravante referidos simplesmente como devedor.' / 'Art. 2º: Esta Lei não se aplica a: I — empresa pública e sociedade de economia mista...'\nJURISPRUDÊNCIA: STJ, REsp 1.799.004/SP (3ª T., j. 2020): cooperativas não podem requerer recuperação judicial, por serem sociedades simples — sujeitas ao Código Civil.","jur_status":"PENDENTE"},{"n":112,"enun":"O título de crédito que não preenche os requisitos essenciais previstos na lei que o rege, com exceção do vencimento (que se presume à vista), não produz efeitos cambiais.","gab":"CERTO","com":"O princípio da literalidade dos títulos de crédito exige o preenchimento dos requisitos formais essenciais. A ausência de qualquer elemento essencial (exceto os presumidos em lei) retira do documento a natureza de título de crédito. O vencimento é um exemplo de elemento que, se ausente, não invalida o título — a lei presume que é à vista. Outros elementos presumidos: praça de pagamento (domicílio do devedor), data de emissão em alguns títulos.","fund":"LEI: 'Art. 75 da LUG (Decreto 57.663/66 — Nota Promissória): A nota promissória que não contenha a menção das condições enumeradas no artigo antecedente não produz efeito como nota promissória, exceto nos casos previstos nos parágrafos seguintes.' — presunção de vencimento à vista.\nJURISPRUDÊNCIA: STJ, REsp 1.106.963/PR (3ª T., j. 2012): ausência de data de vencimento em nota promissória não invalida o título — presume-se à vista.","jur_status":"PENDENTE"},{"n":113,"enun":"No crime falimentar de desvio de bens (art. 173 da Lei n.º 11.101/2005), o sujeito ativo é apenas o devedor empresário, não alcançando sócios, diretores e administradores da empresa.","gab":"ERRADO","com":"O art. 179 da Lei 11.101/2005 estende a aplicação dos crimes falimentares (arts. 168-178) às pessoas que, em razão de seu ofício ou atividade, tenham tomado parte nos atos criminosos praticados pela empresa falida. Sócios, gerentes, diretores, administradores e contadores que participam dos desvios são também sujeitos ativos. A condição de devedor não é elementar exclusiva — é crime que pode ter vários sujeitos ativos.","fund":"LEI: 'Art. 179 da Lei 11.101/2005: Na falência, na recuperação judicial e na recuperação extrajudicial de que trata esta Lei, as pessoas referidas nos arts. 168 a 178 desta Lei serão punidas quando praticarem, antes ou depois da sentença que decretar a falência, conceder a recuperação judicial ou homologar o plano de recuperação extrajudicial, ato que lei qualifica como crime.'\nJURISPRUDÊNCIA: STJ, HC 297.458/SP (5ª T., j. 2015): sócios e administradores podem ser condenados por crime falimentar como coautores ou partícipes.","jur_status":"PENDENTE"},{"n":114,"enun":"A responsabilidade dos sócios de sociedade limitada pelas obrigações sociais é limitada ao valor de suas cotas, salvo integralização do capital social, hipótese em que respondem solidariamente com os demais sócios.","gab":"CERTO","com":"No art. 1.052 do CC: nas LTDA, a responsabilidade de cada sócio é restrita ao valor de suas quotas, mas todos respondem solidariamente pela integralização do capital social. Ou seja: cada sócio responde pelas suas próprias cotas, mas enquanto o capital social total não estiver integralizado, todos os sócios respondem solidariamente pela diferença. Após a integralização total, a responsabilidade é limitada às cotas de cada um.","fund":"LEI: 'Art. 1.052 do CC: Na sociedade limitada, a responsabilidade de cada sócio é restrita ao valor de suas quotas, mas todos respondem solidariamente pela integralização do capital social.'\nJURISPRUDÊNCIA: STJ, REsp 1.480.633/SP (3ª T., j. 2016): enquanto o capital não estiver integralizado, qualquer sócio pode ser demandado pela parcela não integralizada, mesmo que a sua cota esteja paga.","jur_status":"PENDENTE"}]},{"nome":"Conhecimentos sobre o DF, PDPM e Primeiros Socorros","comando":"Acerca do Distrito Federal, Plano Distrital de Políticas para Mulheres e primeiros socorros em situações de emergência, julgue os itens a seguir.","itens":[{"n":115,"enun":"O Distrito Federal acumula as competências legislativas dos Estados e dos Municípios, vedado que lei orgânica do DF regule matérias de competência municipal.","gab":"ERRADO","com":"O art. 32, §1º da CF/88 é expresso: ao DF são atribuídas as competências legislativas reservadas aos Estados e Municípios — justamente porque o DF não pode ser dividido em municípios (art. 32, caput). A Lei Orgânica do DF pode, portanto, legislar sobre matérias tipicamente municipais, como transporte local, educação básica e saúde. Essa acumulação de competências é a particularidade constitucional do DF.","fund":"LEI: 'Art. 32, §1º da CF/88: Ao Distrito Federal são atribuídas as competências legislativas reservadas aos Estados e Municípios.'\nJURISPRUDÊNCIA: STF, ADI 2.855/DF (Rel. Min. Eros Grau, Pleno, j. 2004): reconheceu que o DF pode legislar sobre matérias municipais, em razão da atribuição constitucional do art. 32, §1º.","peg":"DF acumula competências de Estado E Município. Lei Orgânica do DF PODE legislar sobre matérias municipais — essa é exatamente a sua função constitucional.","jur_status":"PENDENTE"},{"n":116,"enun":"A Polícia Civil do Distrito Federal é organizada e mantida pela União, ao contrário das Polícias Civis dos demais estados, que são organizadas e mantidas pelos estados.","gab":"CERTO","com":"O art. 21, XIV da CF/88 atribui à União a competência para organizar e manter a Polícia Civil do DF, a Polícia Militar do DF e o Corpo de Bombeiros Militar do DF. Nos estados, as polícias civis são estaduais. A PCDF tem essa natureza federal-distrital: é organizada pela União (estatuto, carreira, remuneração), mas presta serviço à segurança do DF. Por isso a PCDF tem concurso nacional, com questões de âmbito federal.","fund":"LEI: 'Art. 21, XIV da CF/88: Compete à União: [...] XIV — organizar e manter a polícia civil, a polícia penal, a polícia militar e o corpo de bombeiros militar do Distrito Federal, bem como prestar apoio técnico e financeiro ao Distrito Federal para a execução de atividades de policiamento ostensivo.'\nJURISPRUDÊNCIA: STF, ADI 2.827/DF (Rel. Min. Gilmar Mendes, Pleno, j. 2006): reafirmou que a PCDF é mantida pela União, distinta das polícias civis estaduais.","jur_status":"PENDENTE"},{"n":117,"enun":"Na abordagem de uma vítima de trauma em cena de acidente, o protocolo básico de suporte à vida determina que o socorrista deve verificar a coluna cervical antes de qualquer outra conduta, mesmo que a vítima esteja em parada cardiorrespiratória.","gab":"ERRADO","com":"O protocolo de suporte básico de vida (SBV) prioriza a cadeia de sobrevivência: chamar ajuda → checar responsividade → iniciar RCP (circulação antes de vias aéreas, em adultos, conforme protocolo AHA 2015 — C-A-B: Chest compressions, Airway, Breathing). Em parada cardiorrespiratória, o risco de morte imediata supera o de lesão cervical — inicia-se a RCP. A estabilização cervical é procedimento de suporte avançado que não deve retardar a RCP.","fund":"LEI: Portaria GM/MS 1.010/2012 (SAMU/atendimento pré-hospitalar). Diretrizes AHA 2020 para RCP incorporadas pelo CFM.\nJURISPRUDÊNCIA: Não há precedente judicial específico; trata-se de protocolo médico-técnico do Conselho Federal de Medicina e SAMU.","peg":"Em PCR: PRIORIDADE = início imediato da RCP (C-A-B). Estabilização cervical NÃO precede a RCP — risco de morte imediata supera o de lesão cervical."},{"n":118,"enun":"No atendimento a vítima de hemorragia externa grave, o torniquete deve ser evitado e somente utilizado como último recurso, pois causa lesão isquêmica irreversível no membro afetado.","gab":"ERRADO","com":"Os protocolos militares e civis modernos (TCCC — Tactical Combat Casualty Care e ATLS — Advanced Trauma Life Support) reabilitaram o torniquete como medida de PRIMEIRA escolha em hemorragias graves de membros (amputações, ferimentos por arma de fogo com sangramento arterial). A crença de que causa isquemia irreversível levou ao seu abandono por décadas — mas estudos mostraram que, aplicado corretamente por até 2h, raramente causa dano permanente. O sangramento exsanguinante mata em minutos.","fund":"LEI: Portaria GM/MS 1.010/2012 e protocolos SAMU. TCCC (Tactical Combat Casualty Care) e ATLS (Advanced Trauma Life Support — 10ª ed.).\nJURISPRUDÊNCIA: Não há precedente judicial; fundamentação em protocolos médicos atualizados.","peg":"Torniquete = PRIMEIRA opção em hemorragia grave de membro. Não é 'último recurso'. Isquemia irreversível era mito superado pelos protocolos modernos."},{"n":119,"enun":"O choque anafilático deve ser tratado primariamente com adrenalina (epinefrina) por via intramuscular na face anterolateral da coxa, sendo a anti-histamínico a medicação de primeira escolha.","gab":"ERRADO","com":"A epinefrina (adrenalina) é o tratamento de PRIMEIRA escolha na anafilaxia — não o anti-histamínico. A via intramuscular na face anterolateral da coxa é a via correta (mais rápida absorção). Anti-histamínicos e corticosteroides são adjuvantes, não primários. O erro em dar anti-histamínico primeiro pode ser fatal — a reação anafilática precisa da epinefrina para reverter broncoespasmo, vasodilatação e colapso cardiovascular.","fund":"LEI: Resolução CFM 2.266/2019; diretrizes SBAI (Sociedade Brasileira de Alergia e Imunologia).\nJURISPRUDÊNCIA: Não há precedente judicial específico; protocolo médico do CFM e SBAI.","peg":"Anafilaxia: epinefrina IM na coxa = PRIMEIRA escolha. Anti-histamínico = adjuvante. Trocar a ordem = conduta médica incorreta e perigosa."},{"n":120,"enun":"Em caso de suspeita de intoxicação por monóxido de carbono, a medida imediata de primeiros socorros é remover a vítima do ambiente contaminado e administrar oxigênio em alta concentração.","gab":"CERTO","com":"O monóxido de carbono (CO) liga-se à hemoglobina com afinidade 200x maior que o oxigênio, formando carboxiemoglobina e impedindo o transporte de O2. O tratamento básico é: (1) retirar do ambiente contaminado — crucial e imediato; (2) administrar O2 em alta concentração (100% por máscara não-reinalante) para deslocar o CO da hemoglobina. Em casos graves, câmara hiperbárica. O O2 em alta concentração reduz a meia-vida da carboxiemoglobina de 5h (ar ambiente) para cerca de 1h.","fund":"LEI: Portaria GM/MS 1.010/2012 (SAMU). Diretrizes de toxicologia clínica.\nJURISPRUDÊNCIA: Não há precedente judicial; protocolo médico de atendimento a intoxicados pelo SAMU e UTI."}]}]};

].sort((a,b)=>b.length-a.length); // longer phrases first

function _escRx(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}
function highlightTraps(html){
  // html is already HTML-escaped plain text; safe to inject <mark>
  TRAP_WORDS.forEach(w=>{
    const re=new RegExp(`(?<![\\wÀ-ÿ])(${_escRx(w)})(?![\\wÀ-ÿ])`,'gi');
    html=html.replace(re,'<mark class="trap-word">$1</mark>');
  });
  return html;
}

function buildBlocoSummary(){
  const tot=S.flat.length;
  let ok=0,er=0,blank=0;
  S.flat.forEach(x=>{
    const r=S.respostas[x.n];
    if(r===x.item.gab) ok++;
    else if(r) er++;
    else blank++;
  });
  const disc={};
  S.bloco.disciplinas.forEach(d=>{
    let dok=0,der=0;
    d.itens.forEach(it=>{const r=S.respostas[it.n];if(r===it.gab)dok++;else if(r)der++;});
    const short=d.nome.replace('Direito ','').replace(/ e Legislação .*/,'');
    disc[short]={ok:dok,er:der,tot:d.itens.length};
  });
  const avCnt={dom:0,dvd:0,lac:0,leit:0};
  Object.values(S.avaliacoes).forEach(v=>{if(v in avCnt)avCnt[v]++;});
  return {
    blocoId:S.bloco.meta.id, data:S.bloco.meta.data||S.bloco.meta.id,
    titulo:S.bloco.meta.titulo||'',
    totalQuestoes:tot, acertos:ok, erros:er, branco:blank,
    saldo:ok-er, pct:tot>0?Math.round(ok/tot*100):0,
    tempo:S.totalMs, disciplinas:disc, avaliacoes:avCnt,
    finishedAt:Date.now()
  };
}
/* ── SM-2 SPACED REPETITION ──────────────────────────────── */
function computeSRQuality(h){
  // Mapeia desempenho do bloco para quality SM-2 (0–5)
  const pct=h.pct;
  const av=h.avaliacoes||{};
  const avTotal=(av.dom||0)+(av.dvd||0)+(av.lac||0)+(av.leit||0);
  // Base a partir do aproveitamento
  let q;
  if(pct>=90) q=5;
  else if(pct>=80) q=4;
  else if(pct>=70) q=3;
  else if(pct>=55) q=2;
  else if(pct>=40) q=1;
  else q=0;
  // Ajuste pela autoavaliação: muitas lacunas penaliza, muito domínio bonifica
  if(avTotal>0){
    const lacRatio=(av.lac||0)/avTotal;
    const domRatio=(av.dom||0)/avTotal;
    if(lacRatio>0.4 && q>1) q--;
    if(domRatio>0.6 && q<5) q++;
  }
  return Math.max(0,Math.min(5,q));
}
function applySM2(sr,quality){
  // sr = {interval, repetitions, ef} ou null (primeira vez)
  let {interval=1,repetitions=0,ef=2.5}=sr||{};
  if(quality<3){
    // Abaixo do limiar: recomeça intervalo mas mantém EF (penaliza menos)
    repetitions=0; interval=1;
  } else {
    if(repetitions===0) interval=1;
    else if(repetitions===1) interval=6;
    else interval=Math.round(interval*ef);
    ef=ef+(0.1-(5-quality)*(0.08+(5-quality)*0.02));
    ef=Math.max(1.3,Math.round(ef*100)/100);
    repetitions++;
  }
  const next=new Date();
  next.setDate(next.getDate()+interval);
  return {interval,repetitions,ef,nextReview:next.toISOString().slice(0,10)};
}
function srBadgeHtml(sr){
  if(!sr||!sr.nextReview) return '';
  const today=new Date().toISOString().slice(0,10);
  const diff=(new Date(sr.nextReview)-new Date(today))/(1000*60*60*24);
  if(diff<=0)  return `<span class="sr-badge due">⟳ Revisar hoje</span>`;
  if(diff<=2)  return `<span class="sr-badge soon">⟳ ${Math.round(diff)}d</span>`;
  return `<span class="sr-badge ok">⟳ ${fmtDateShort(sr.nextReview)}</span>`;
}

function saveToHistory(){
  try{
    let hist=loadHistory();
    const s=buildBlocoSummary();
    const idx=hist.findIndex(h=>h.blocoId===s.blocoId);
    // Preserva SR anterior (acumula repetições)
    const prevSR=idx>=0?(hist[idx].sr||null):null;
    const quality=computeSRQuality(s);
    s.sr=applySM2(prevSR,quality);
    s.srQuality=quality; // guarda para debug
    if(idx>=0) hist[idx]=s; else hist.push(s);
    if(hist.length>90) hist=hist.slice(-90);
    localStorage.setItem(HIST_KEY,JSON.stringify(hist));
  }catch(e){}
}
function loadHistory(){
  try{const r=localStorage.getItem(HIST_KEY);return r?JSON.parse(r):[]}catch(e){return [];}
}
function buildBarChart(entries){
  if(!entries.length) return '';
  const W=520,H=108,padB=17,padT=13,inner=H-padB-padT;
  const n=entries.length;
  const bW=Math.max(7,Math.min(26,Math.floor((W-16)/n)-3));
  const gap=(W-bW*n)/(n+1);
  let s=`<svg viewBox="0 0 ${W} ${H}" width="100%" xmlns="http://www.w3.org/2000/svg">`;
  // gridlines
  [50,70,90].forEach(pct=>{
    const gy=padT+Math.round((1-pct/100)*inner);
    s+=`<line x1="0" y1="${gy}" x2="${W}" y2="${gy}" stroke="var(--bord)" stroke-width="1"/>`;
    s+=`<text x="2" y="${gy-2}" font-size="7.5" fill="var(--txt3)">${pct}%</text>`;
  });
  // ref line 70%
  const ry=padT+Math.round(.3*inner);
  s+=`<line x1="0" y1="${ry}" x2="${W}" y2="${ry}" stroke="var(--green)" stroke-dasharray="4,3" opacity=".45" stroke-width="1.2"/>`;
  // bars
  entries.forEach((e,i)=>{
    const bH=Math.max(2,Math.round((e.pct/100)*inner));
    const x=gap+i*(bW+gap), y=H-padB-bH;
    const col=e.pct>=70?'var(--green)':e.pct>=50?'var(--acc)':'var(--red)';
    s+=`<rect x="${x.toFixed(1)}" y="${y}" width="${bW}" height="${bH}" rx="3" fill="${col}" opacity=".82"/>`;
    if(bH>16){s+=`<text x="${(x+bW/2).toFixed(1)}" y="${y+bH-4}" text-anchor="middle" font-size="8" fill="rgba(255,255,255,.8)" font-weight="700">${e.pct}%</text>`;}
    else{s+=`<text x="${(x+bW/2).toFixed(1)}" y="${y-2}" text-anchor="middle" font-size="7.5" fill="${col}">${e.pct}%</text>`;}
    const dl=fmtDateShort(e.data).slice(0,5);
    s+=`<text x="${(x+bW/2).toFixed(1)}" y="${H-2}" text-anchor="middle" font-size="7" fill="var(--txt3)">${dl}</text>`;
  });
  s+='</svg>';
  return s;
}

/* ── DATE FORMAT ─────────────────────────────────────────── */
function fmtDateShort(iso){
  // "2026-06-05" → "05.06.26"
  if(!iso) return '';
  const p=iso.split('-');
  if(p.length<3) return iso;
  return `${p[2]}.${p[1]}.${p[0].slice(2)}`;
}

/* ── TIMER ───────────────────────────────────────────────── */
function fmtTime(ms){
  const s=Math.floor(ms/1000), m=Math.floor(s/60), h=Math.floor(m/60);
  if(h>0) return `${h}h ${(m%60).toString().padStart(2,'0')}m`;
  return `${m}:${(s%60).toString().padStart(2,'0')}`;
}
function startTimer(){
  if(S.timerInterval) return;
  S.startedAt=Date.now();
  S.timerInterval=setInterval(()=>{
    const elapsed=S.totalMs+(Date.now()-S.startedAt);
    const el=document.getElementById('hdr-timer-txt');
    if(el) el.textContent=fmtTime(elapsed);
    const bpel=document.getElementById('bp-time');
    if(bpel) bpel.textContent=fmtTime(elapsed);
  },1000);
}
function stopTimer(){
  if(S.timerInterval){clearInterval(S.timerInterval);S.timerInterval=null;}
  if(S.startedAt){S.totalMs+=Date.now()-S.startedAt;S.startedAt=null;}
}

function togglePause(){
  if(S.finished) return;
  S.paused=!S.paused;
  const btn=document.getElementById('btn-pause');
  const overlay=document.getElementById('pause-overlay');
  if(S.paused){
    // Pausa: para timers, bloqueia tela
    stopTimer();
    if(QT.tickInterval){clearInterval(QT.tickInterval);QT.tickInterval=null;}
    if(QT.observer){QT.observer.disconnect();QT.observer=null;}
    QT.visible.clear();
    overlay.classList.remove('hidden');
    btn.textContent='▶';
    btn.classList.add('paused');
    btn.title='Retomar';
  } else {
    // Retoma: esconde overlay, reinicia timers
    overlay.classList.add('hidden');
    btn.textContent='⏸';
    btn.classList.remove('paused');
    btn.title='Pausar';
    // Reinicia apenas se estiver na prova ou no foco
    const inProva=!document.getElementById('sec-prova').classList.contains('hidden');
    const inFoco=FOCO.active;
    if(inProva||inFoco){
      startTimer();
      if(!QT.tickInterval&&!FOCO.active){
        // re-inicia observer e tick na prova normal
        initQTimer();
      } else if(FOCO.active){
        // no foco apenas o tick
        QT.lastTickAt=Date.now();
        QT.tickInterval=setInterval(_qtTick,500);
      }
    }
  }
}

            ${TRAP_WORDS.filter(w=>new RegExp(`(?<![\\wÀ-ÿ])${_escRx(w)}(?![\\wÀ-ÿ])`,'i').test(it.enun)).slice(0,8).map(w=>`<mark class="trap-word">${w}</mark>`).join(' ')}
          </div>
        </div>
      </div>`:''}
      <div class="gab-section">
        <button class="gab-hdr" onclick="toggleGabSec(${it.n},'f')">
          <span class="gab-icon">💡</span>
          <span class="gab-lbl">Explicação (Feynman)</span>
          <span class="gab-chev open" id="chev-${it.n}-f">▼</span>
        </button>
        <div class="gab-body" id="gb-${it.n}-f"><div class="feynman-text">${it.com||''}</div></div>
      </div>
      <div class="gab-section">
        <button class="gab-hdr" onclick="toggleGabSec(${it.n},'l')">
          <span class="gab-icon">📖</span>
          <span class="gab-lbl">Lei &amp; Jurisprudência</span>
          <span class="gab-chev open" id="chev-${it.n}-l">▼</span>
        </button>
        <div class="gab-body" id="gb-${it.n}-l">
          <div class="law-block">${fundSafe}</div>
          <button class="copy-btn" onclick="copyFund(this,'${fundCopy}')">📋 Copiar lei &amp; jurisprudência</button>
        </div>

      ${it.peg?`<div class="gab-section" style="border-top:1px solid var(--bord)">
        <div style="padding:10px 14px"><div class="peg-box">⚠️ &nbsp;<span><strong>Armadilha:</strong> ${it.peg}</span></div></div>
      </div>`:''}
    </div>`;
  }

  return `<div class="q-block${gabOn?' gab-on':''}" id="q-${it.n}" data-n="${it.n}">
    <div class="q-line">
      <span class="q-tag">${it.n}</span>
      <div class="q-text">${enunHtml}</div>
      <div class="q-marks">
        <button class="q-mark${markC}" onclick="markAns(${it.n},'CERTO')" ${disab} title="Certo (C)">C</button>
        <button class="q-mark${markE}" onclick="markAns(${it.n},'ERRADO')" ${disab} title="Errado (E)">E</button>
      </div>
    </div>
    <div class="q-actions-row">
      <button class="q-show-gab" onclick="toggleGab(${it.n})">${gabOn?'Ocultar gabarito':'Ver gabarito'}</button>
      ${statusHtml}
      <span class="qt-badge qt-idle" id="qt-${it.n}">⏱</span>
    </div>
    ${feedbackHtml}
  </div>`;
}

function rerenderQ(n){
  const el=document.getElementById(`q-${n}`);
  if(!el) return;
  const di=S.flat.find(x=>x.n===n)?.discIdx||0;
  el.outerHTML=renderQBlock(S.flat.find(x=>x.n===n).item, di);
}

/* ── ACTIONS ─────────────────────────────────────────────── */
function markAns(n,val){
  if(S.finished) return;
  if(S.respostas[n]===val) delete S.respostas[n];
  else {
    S.respostas[n]=val;
    // Modo Foco: exibe gabarito automaticamente após responder
    if(typeof FOCO!=='undefined' && FOCO.active && !S.gabsShown[n]) S.gabsShown[n]=true;
  }
  save(); rerenderQ(n); updateProgress(); updateQuickNav();
  setTimeout(()=>_qtUpdateBadge(n),0);
}

function toggleGab(n){
  if(S.gabsShown[n]) delete S.gabsShown[n];
  else S.gabsShown[n]=true;
  save(); rerenderQ(n); updateQuickNav();
}

function toggleGabSec(n,key){
  const body=document.getElementById(`gb-${n}-${key}`);
  const chev=document.getElementById(`chev-${n}-${key}`);
  if(!body) return;
  const open=!body.classList.contains('hidden');
  body.classList.toggle('hidden',open);
  if(chev) chev.classList.toggle('open',!open);
}

function toggleAllGabaritos(){
  S.globalGabShown=!S.globalGabShown;
  if(S.globalGabShown) S.gabsShown={};
  save();
  renderProva(); // full re-render
  updateGabAllBtn();
}
function updateGabAllBtn(){
  const b=document.getElementById('btn-gab-all');
  const t=document.getElementById('tb-gab-all');
  const lbl=S.globalGabShown?'🙈':'👁';
  if(b) b.textContent=lbl;
  if(t) t.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="3"/><path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7-10-7-10-7z"/></svg> ${S.globalGabShown?'Ocultar gabaritos':'Gabaritos'}`;
}

/* ── QUICK NAV ───────────────────────────────────────────── */
function renderQuickNav(){
  const grid=document.getElementById('qn-grid');
  if(!grid) return;
  grid.innerHTML=S.flat.map(x=>{
    const a=S.respostas[x.n];
    const g=S.gabsShown[x.n]||S.globalGabShown;
    let cls=a==='CERTO'?'ac':a==='ERRADO'?'ae':'';
    if(g) cls+=' gs';
    // qa: não respondida e acima do limiar de alerta
    if(!a && (QT.times[x.n]||0)>=QT.ALERT) cls+=' qa';
    return `<button class="qn-btn ${cls}" onclick="jumpTo(${x.n})" title="Q.${x.n}${!a&&(QT.times[x.n]||0)>=QT.ALERT?' · ⏱ '+_fmtQT(QT.times[x.n]):''}">${x.n}</button>`;
  }).join('');
}
function updateQuickNav(){ renderQuickNav(); }
function jumpTo(n){
  document.getElementById('quick-nav').classList.remove('open');
  const el=document.getElementById(`q-${n}`);
  if(el) el.scrollIntoView({behavior:'smooth',block:'center'});
}

/* ── PROGRESS ─────────────────────────────────────────────── */
function updateProgress(){
  const tot=S.flat.length;
  let ok=0,er=0,ans=0;
  S.flat.forEach(x=>{
    const r=S.respostas[x.n];
    if(r===x.item.gab) ok++;
    else if(r) er++;
    if(r) ans++;
  });
  const pct=tot?Math.round(ans/tot*100):0;
  const blank=tot-ans;

  // Header
  document.getElementById('c-ok').textContent='✓ '+ok;
  document.getElementById('c-er').textContent='✗ '+er;
  document.getElementById('c-tot').textContent=ans+'/'+tot;
  document.getElementById('prog-fill').style.width=pct+'%';
  // Toolbar
  const tbans=document.getElementById('tb-ans');
  const tbblank=document.getElementById('tb-blank');
  if(tbans) tbans.textContent=ans;
  if(tbblank) tbblank.textContent=blank;
  // Bottom bar
  const bpok=document.getElementById('bp-ok');
  const bper=document.getElementById('bp-er');
  const bpcur=document.getElementById('bp-cur');
  const bptot=document.getElementById('bp-tot');
  const bbar=document.getElementById('bbar-fill');
  if(bpok) bpok.textContent=ok+' ✓';
  if(bper) bper.textContent=er+' ✗';
  if(bpcur) bpcur.textContent=ans;
  if(bptot) bptot.textContent=tot;
  if(bbar) bbar.style.width=pct+'%';
}

/* ── FINISH ──────────────────────────────────────────────── */
function confirmFinish(){
  const blank=S.flat.filter(x=>!S.respostas[x.n]).length;
  if(blank===0){finishProva();return;}
  const el=document.getElementById('modal-root');
  el.innerHTML=`<div class="modal-ov" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <h3>⚠️ Questões em branco</h3>
      <p>Você tem <strong>${blank} questão(ões) em branco</strong>.<br><br>
      Pela fórmula CEBRASPE, itens em branco valem 0 pontos — ao contrário dos errados (−1). Recomenda-se responder todas as questões.</p>
      <div class="modal-acts">
        <button class="btn-ghost" onclick="closeModal()">Voltar e responder</button>
        <button class="btn-warn" onclick="closeModal();finishProva()">Encerrar mesmo assim</button>
      </div>
    </div>
  </div>`;
}
function finishProva(){
  stopTimer(); stopQTimer(); S.finished=true; S.globalGabShown=true; save();
  saveToHistory(); // persiste no histórico cross-bloco
  renderPlacar();
}
function goBackToProva(jumpN){
  S.finished=false; save();
  renderProva();
  if(jumpN) setTimeout(()=>jumpTo(jumpN),300);
}

/* ── MODO FOCO ────────────────────────────────────────────── */
const FOCO={active:false, idx:0, currentN:null};

function enterFoco(startIdx){
  if(!S.bloco){showToast('Carregue um bloco primeiro');return;}
  if(S.finished){showToast('Bloco já encerrado — use a Revisão');return;}
  // Desconecta apenas o observer (para de acumular tempo via scroll),
  // mas mantém QT.tickInterval ativo para continuar contando tempo em Foco
  if(QT.observer){QT.observer.disconnect();QT.observer=null;}
  QT.visible.clear();
  if(!QT.tickInterval){QT.lastTickAt=Date.now();QT.tickInterval=setInterval(_qtTick,500);}
  FOCO.active=true;
  if(startIdx!==undefined){
    FOCO.idx=Math.max(0,Math.min(startIdx,S.flat.length-1));
  } else {
    // começa na primeira não respondida
    const first=S.flat.findIndex(x=>!S.respostas[x.n]);
    FOCO.idx=first>=0?first:0;
  }
  // oculta tudo, exibe foco
  document.getElementById('sec-prova').classList.add('hidden');
  document.getElementById('sec-placar').classList.add('hidden');
  document.getElementById('sec-historico').classList.add('hidden');
  document.getElementById('sec-revisao').classList.add('hidden');
  document.getElementById('sec-cover').innerHTML='';
  document.getElementById('fab').classList.add('hidden');
  document.getElementById('bot-bar').classList.add('hidden');
  document.getElementById('btn-gab-all').classList.add('hidden');
  document.getElementById('hdr-timer').classList.remove('hidden');
  document.getElementById('hdr-chips').style.display='flex';
  document.getElementById('sec-foco').classList.remove('hidden');
  renderFocoQ();
}

function exitFoco(){
  FOCO.active=false; FOCO.currentN=null;
  document.getElementById('sec-foco').classList.add('hidden');
  renderProva(); // reinicia QT via renderProva → initQTimer
}

function renderFocoQ(){
  const x=S.flat[FOCO.idx];
  if(!x) return;
  const it=x.item;
  FOCO.currentN=it.n;

  const total=S.flat.length;
  const answered=Object.keys(S.respostas).length;
  const pct=Math.round(answered/total*100);
  const discShort=x.discNome.replace('Direito ','').replace(/ e Legislação .*/,'');
  const isFirst=FOCO.idx===0;
  const isLast=FOCO.idx===total-1;
  const hasAns=!!S.respostas[it.n];

  const wrap=document.getElementById('foco-wrap');
  wrap.innerHTML=`
    <div class="foco-hdr">
      <button class="tb-btn" onclick="exitFoco()" title="Sair do Modo Foco (Esc)">✕ Sair</button>
      <span class="foco-qnum">Q.${it.n} · ${FOCO.idx+1}/${total}</span>
      <span class="foco-disc">${discShort}</span>
      <div class="foco-prog-wrap">
        <div class="foco-progress"><div class="foco-prog-fill" id="foco-pf" style="width:${pct}%"></div></div>
        <span class="foco-pct">${pct}%</span>
      </div>
    </div>
    <div class="foco-body">
      ${renderQBlock(it, x.discIdx)}
    </div>
    <div class="foco-nav">
      <button class="btn-ghost" onclick="focoPrev()" ${isFirst?'disabled':''} style="min-width:110px" title="← Seta esquerda">← Anterior</button>
      <div class="foco-nav-hint">
        <div>${answered}/${total} respondidas</div>
        <div style="color:var(--txt3)">${hasAns?'→ Enter para avançar':'C / E para responder'}</div>
      </div>
      <button class="btn-${hasAns?'primary':'ghost'}" onclick="focoNext()" ${isLast?'disabled':''} style="min-width:110px" title="→ Seta direita / Enter">
        ${isLast?'Última':'Próxima →'}
      </button>
    </div>`;

  document.getElementById('sec-foco').scrollTop=0;
  // QT: acumula tempo manualmente no tick
}

function focoNext(){
  if(FOCO.idx<S.flat.length-1){FOCO.idx++;renderFocoQ();}
  else showToast('Última questão do bloco');
}
function focoPrev(){
  if(FOCO.idx>0){FOCO.idx--;renderFocoQ();}
}

// Jump para questão específica (usado futuramente por quick-nav em foco)
function focoJumpTo(n){
  const idx=S.flat.findIndex(x=>x.n===n);
  if(idx>=0){FOCO.idx=idx;renderFocoQ();}
}

/* ── QUESTION TIMER ──────────────────────────────────────── */
const QT={
  times:{},         // {n: elapsedMs}
  visible:new Set(),
  lastTickAt:null,
  tickInterval:null,
  observer:null,
  WARN:60000,       // 60s → amber
  ALERT:90000,      // 90s → red + pulse
};

function initQTimer(){
  stopQTimer();
  QT.times={}; QT.visible=new Set(); QT.lastTickAt=Date.now();

  QT.observer=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      const n=parseInt(e.target.dataset.n);
      if(e.isIntersecting) QT.visible.add(n);
      else QT.visible.delete(n);
    });
  },{rootMargin:'-28% 0px -28% 0px',threshold:0});

  document.querySelectorAll('.q-block[data-n]').forEach(el=>QT.observer.observe(el));
  QT.tickInterval=setInterval(_qtTick,500);
}

function stopQTimer(){
  if(QT.tickInterval){clearInterval(QT.tickInterval);QT.tickInterval=null;}
  if(QT.observer){QT.observer.disconnect();QT.observer=null;}
  QT.visible.clear(); QT.lastTickAt=null;
  const pill=document.getElementById('qt-pill');
  if(pill) pill.classList.add('hidden');
}

function _qtTick(){
  const now=Date.now();
  const delta=QT.lastTickAt?now-QT.lastTickAt:0;
  QT.lastTickAt=now;

  let pillN=null, pillMs=0;
  let crossedAlert=false;
  QT.visible.forEach(n=>{
    if(!S.respostas[n]){
      const prevMs=QT.times[n]||0;
      QT.times[n]=prevMs+delta;
      if(QT.times[n]>pillMs){pillMs=QT.times[n];pillN=n;}
      // detecta cruzamento do limiar para atualizar quick nav
      if(prevMs<QT.ALERT && QT.times[n]>=QT.ALERT) crossedAlert=true;
    }
    _qtUpdateBadge(n);
  });
  _qtUpdatePill(pillN,pillMs);
  if(crossedAlert) renderQuickNav();

  // Modo Foco: acumula tempo para a questão visível manualmente
  if(FOCO.active && FOCO.currentN && !S.respostas[FOCO.currentN]){
    QT.times[FOCO.currentN]=(QT.times[FOCO.currentN]||0)+delta;
    _qtUpdateBadge(FOCO.currentN);
    // atualiza % no header do foco
    const pf=document.getElementById('foco-pf');
    if(pf){const t=S.flat.length;const a=Object.keys(S.respostas).length;pf.style.width=Math.round(a/t*100)+'%';}
    const fpct=document.querySelector('.foco-pct');
    if(fpct){const t=S.flat.length;const a=Object.keys(S.respostas).length;fpct.textContent=Math.round(a/t*100)+'%';}
  }
}

function _qtUpdateBadge(n){
  const el=document.getElementById(`qt-${n}`);
  if(!el) return;
  const ms=QT.times[n]||0;
  const answered=!!S.respostas[n];
  if(answered){
    el.className='qt-badge qt-done';
    el.textContent=ms>0?`⏱ ${_fmtQT(ms)}`:'⏱';
    return;
  }
  if(ms<1000){el.className='qt-badge qt-idle';el.textContent='⏱';return;}
  if(ms>=QT.ALERT){el.className='qt-badge qt-alert';el.textContent=`⏱ ${_fmtQT(ms)}`;}
  else if(ms>=QT.WARN){el.className='qt-badge qt-warn';el.textContent=`⏱ ${_fmtQT(ms)}`;}
  else{el.className='qt-badge qt-normal';el.textContent=`⏱ ${_fmtQT(ms)}`;}
}

function _qtUpdatePill(n,ms){
  const pill=document.getElementById('qt-pill');
  if(!pill) return;
  if(!n||ms<8000){pill.classList.add('hidden');return;}
  pill.classList.remove('hidden');
  const inner=pill.querySelector('.qt-active-pill');
  if(!inner) return;
  const cls='qt-active-pill'+(ms>=QT.ALERT?' qt-alert-p':ms>=QT.WARN?' qt-warn-p':'');
  inner.className=cls;
  const icon=ms>=QT.ALERT?'⚠️':ms>=QT.WARN?'⏳':'⏱';
  inner.innerHTML=`${icon} Q.${n} — <span style="font-variant-numeric:tabular-nums">${_fmtQT(ms)}</span>`;
}

function _fmtQT(ms){
  const s=Math.floor(ms/1000);
  return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
}

/* ── PLACAR ──────────────────────────────────────────────── */
function renderPlacar(){
  stopQTimer(); // para timers por questão
  document.getElementById('sec-prova').classList.add('hidden');
  document.getElementById('sec-cover').innerHTML='';
  document.getElementById('sec-placar').classList.remove('hidden');
  document.getElementById('fab').classList.add('hidden');
  document.getElementById('bot-bar').classList.add('hidden');
  document.getElementById('hdr-timer').classList.remove('hidden');
  document.getElementById('hdr-chips').style.display='flex';
  document.getElementById('btn-gab-all').classList.add('hidden');

  const tot=S.flat.length;
  let ok=0,er=0,blank=0;
  S.flat.forEach(x=>{
    const r=S.respostas[x.n];
    if(r===x.item.gab) ok++;
    else if(r) er++;
    else blank++;
  });
  const saldo=ok-er;
  const pct=tot?Math.round(ok/tot*100):0;
  const totalElapsed=S.totalMs;
  const avgMs=ok+er>0?Math.round(totalElapsed/(ok+er)):0;
  const corte=Math.ceil(tot*0.6); // referência 60%
  const approved=saldo>=corte;

  // Disc stats
  const discStats=S.bloco.disciplinas.map(d=>{
    let dok=0,der=0,dtot=d.itens.length;
    d.itens.forEach(it=>{
      const r=S.respostas[it.n];
      if(r===it.gab) dok++;
      else if(r) der++;
    });
    const dpct=dok+der>0?Math.round(dok/(dok+der)*100):null;
    const barColor=dpct===null?'var(--txt3)':dpct>=70?'var(--green)':dpct>=50?'var(--acc)':'var(--red)';
    const short=d.nome.replace('Direito ','').replace(' e Legislação Especial','').replace(' e Legislação Complementar','');
    return {short,ok:dok,er:der,tot:dtot,pct:dpct,barColor};
  });

  const discChartHtml=discStats.map(d=>
    `<div class="disc-chart-row">
      <span class="nm">${d.short}</span>
      <div class="bar-rail"><div class="bar-fill" style="width:${d.pct||0}%;background:${d.barColor}"></div></div>
      <span class="frac">${d.ok}/${d.tot}</span>
      <span class="pct" style="color:${d.barColor}">${d.pct!==null?d.pct+'%':'—'}</span>
    </div>`
  ).join('');

  // Errors list
  const errors=S.flat.filter(x=>S.respostas[x.n]&&S.respostas[x.n]!==x.item.gab);
  function buildErrGab(it){
    const fundSafe=it.fund?it.fund.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):'';
    const fundCopy=it.fund?(it.fund.replace(/\\/g,'\\\\').replace(/"/g,'&quot;').replace(/'/g,"\\'").replace(/\n/g,'\\n')):'';
    return `<div class="gab-line">
        <span class="gab-label">Gabarito</span>
        <span class="gab-value" style="margin-left:6px;font-weight:700">${it.gab}</span>
        <span class="gab-badge er" style="margin-left:auto">Errou ✗</span>
      </div>
      <div class="gab-section">
        <button class="gab-hdr" onclick="toggleErrSec(${it.n},'f')">
          <span class="gab-icon">💡</span>
          <span class="gab-lbl">Explicação (Feynman)</span>
          <span class="gab-chev open" id="echev-${it.n}-f">▼</span>
        </button>
        <div class="gab-body" id="egb-${it.n}-f"><div class="feynman-text">${it.com||''}</div></div>
      </div>
      ${it.fund?`<div class="gab-section">
        <button class="gab-hdr" onclick="toggleErrSec(${it.n},'l')">
          <span class="gab-icon">📖</span>
          <span class="gab-lbl">Lei &amp; Jurisprudência</span>
          <span class="gab-chev open" id="echev-${it.n}-l">▼</span>
        </button>
        <div class="gab-body" id="egb-${it.n}-l">
          <div class="law-block">${fundSafe}</div>
          <button class="copy-btn" onclick="copyFund(this,'${fundCopy}')">📋 Copiar lei &amp; jurisprudência</button>
        </div>
      </div>`:''}
      ${it.peg?`<div class="gab-section" style="border-top:1px solid var(--bord)">
        <div style="padding:10px 14px"><div class="peg-box">⚠️ &nbsp;<span><strong>Armadilha:</strong> ${it.peg}</span></div></div>
      </div>`:''}`;
  }
  const errHtml=errors.length===0
    ?'<p style="color:var(--txt3);font-size:14px">Nenhum erro. Excelente! 🎯</p>'
    :errors.map(x=>{
      const enunShort=x.item.enun.length>90?x.item.enun.slice(0,90)+'…':x.item.enun;
      return `<div class="err-item">
        <div class="err-row">
          <span class="err-num">Q${x.n}</span>
          <div class="err-sub">${enunShort}<small>${x.discNome}</small></div>
          <button class="err-toggle" id="errtog-${x.n}" onclick="toggleErrGab(${x.n})">
            Ver gabarito <span id="errarrow-${x.n}">▼</span>
          </button>
        </div>
        <div class="err-gab" id="errgab-${x.n}">
          ${buildErrGab(x.item)}
        </div>
      </div>`;
    }).join('');

  const wrap=document.getElementById('placar-wrap');
  wrap.innerHTML=`
    <div class="placar-hero">
      <div class="placar-kicker">Resultado Final</div>
      <h2>${pct}% de aproveitamento</h2>
      <p class="placar-lead">Tempo total: ${fmtTime(totalElapsed)} · ${avgMs?'média '+fmtTime(avgMs)+'/questão':''}</p>
      <div class="placar-stats">
        <div class="p-stat"><div class="n g">${ok}</div><div class="l">Acertos</div></div>
        <div class="p-stat"><div class="n r">${er}</div><div class="l">Erros</div></div>
        <div class="p-stat"><div class="n t">${blank}</div><div class="l">Em branco</div></div>
        <div class="p-stat"><div class="n a">${saldo}</div><div class="l">Saldo CEBRASPE</div></div>
      </div>
    </div>

    <div class="pl-box">
      <div class="pl-title">Fórmula CEBRASPE</div>
      <div class="cebraspe-formula">
        <span class="part"><b>${ok}</b> acertos × (+1)</span>
        <span>−</span>
        <span class="part"><b>${er}</b> erros × (−1)</span>
        <span>+</span>
        <span class="part"><b>${blank}</b> em branco × (0)</span>
        <span>=</span>
        <span class="eq">${saldo}</span>
      </div>
      <div class="cebraspe-verdict ${approved?'approved':'reproved'}">
        ${approved?'✅ Simulação: aprovado no corte de referência (saldo ≥ '+corte+')':'❌ Simulação: abaixo do corte de referência (saldo '+saldo+' < '+corte+')'}
      </div>
    </div>

    <div class="pl-box">
      <div class="pl-title">Diagnóstico de Desempenho</div>
      ${(()=>{
        const cnt={dom:0,dvd:0,lac:0,leit:0};
        let total=0;
        S.flat.forEach(x=>{const av=S.avaliacoes[x.n];if(av&&cnt[av]!==undefined){cnt[av]++;total++;}});
        if(total===0) return `<p class="diag-empty">Nenhuma autoavaliação preenchida ainda. Responda as questões e classifique seu desempenho ao ver o gabarito.</p>`;
        const cells=Object.entries(AV_LABELS).map(([k,v])=>`
          <div class="diag-cell">
            <div class="dn" style="color:${k==='dom'?'var(--green)':k==='dvd'?'var(--amber)':k==='lac'?'var(--red)':'var(--txt2)'}">${cnt[k]}</div>
            <div class="dl">${v.icon} ${v.txt}</div>
          </div>`).join('');
        const insight=(()=>{
          if(cnt.lac>0) return `⚠️ ${cnt.lac} lacuna${cnt.lac>1?'s conceituais':' conceitual'} identificada${cnt.lac>1?'s':''} — priorize revisão de lei seca e doutrina.`;
          if(cnt.dvd>0) return `🤔 ${cnt.dvd} questão${cnt.dvd>1?'ões':''} com dúvida — consolide a certeza antes da prova.`;
          if(cnt.leit>0) return `👁 ${cnt.leit} erro${cnt.leit>1?'s':''} de leitura — treine a leitura lenta e marcação de palavras-chave.`;
          return `✅ ${total} questão${total>1?'ões':''} com domínio total avaliado.`;
        })();
        return `<div class="diag-grid">${cells}</div>
          <div style="font-size:13.5px;color:var(--txt2);padding:10px 14px;background:var(--surf2);border-radius:var(--r-sm);border:1px solid var(--bord)">${insight}</div>`;
      })()}
    </div>

    <div class="pl-box">
      <div class="pl-title">Desempenho por Disciplina</div>
      ${discChartHtml}
    </div>

    ${(()=>{
      // QT timing insight — questões mais lentas
      const qtEntries=Object.entries(QT.times)
        .map(([n,ms])=>({n:parseInt(n),ms,answered:!!S.respostas[parseInt(n)],item:S.flat.find(x=>x.n===parseInt(n))?.item}))
        .filter(e=>e.ms>=QT.ALERT && e.item)
        .sort((a,b)=>b.ms-a.ms)
        .slice(0,5);
      if(!qtEntries.length) return '';
      const rows=qtEntries.map(e=>{
        const r=S.respostas[e.n];
        const isRight=r&&r===e.item.gab;
        const statusCls=r?(isRight?'ok':'er'):'bk';
        const statusTxt=r?(isRight?'✓ Acertou':'✗ Errou'):'Não respondida';
        return `<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-top:1px solid var(--bord)">
          <span class="q-tag" style="min-width:36px">${e.n}</span>
          <span class="qt-badge ${r?'qt-done':'qt-alert'}">⏱ ${_fmtQT(e.ms)}</span>
          <span style="flex:1;font-size:12.5px;color:var(--txt2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e.item.enun.replace(/<[^>]+>/g,' ').trim().slice(0,90)}…</span>
          <span style="font-size:11px;font-weight:700;color:${statusCls==='ok'?'var(--green)':statusCls==='er'?'var(--red)':'var(--txt3)'}">${statusTxt}</span>
        </div>`;
      }).join('');
      return `<div class="pl-box">
        <div class="pl-title">⏱ Questões com mais de 1:30 de atenção (${qtEntries.length})</div>
        <p style="font-size:13px;color:var(--txt2);margin-bottom:8px">Questões onde você passou mais tempo — foque nesses pontos na revisão.</p>
        ${rows}
      </div>`;
    })()}

    <div class="pl-box">
      <div class="pl-title">Lista de Erros (${errors.length})</div>
      ${errHtml}
    </div>

    <div class="placar-actions">
      <button class="btn-ghost" onclick="goBackToProva()">← Revisar caderno</button>
      <button class="btn-ghost" onclick="showHistorico()">📊 Histórico</button>
      <button class="btn-ghost" onclick="showRevisaoPicker()">🔍 Revisão</button>
      <button class="btn-ghost" onclick="exportPDF()">⬆ Exportar PDF</button>
      <button class="btn-primary" onclick="confirmStart()">↺ Novo bloco</button>
    </div>`;

  updateProgress();
  window.scrollTo(0,0);
}

/* ── EXPORTAR PDF ────────────────────────────────────────── */
function exportPDF(){
  if(!S.bloco||!S.finished){showToast('Finalize o bloco antes de exportar');return;}
  const w=window.open('','_blank','width=960,height=800');
  if(!w){showToast('Permita pop-ups para exportar o PDF');return;}
  w.document.write(buildReportHTML());
  w.document.close();
}

function buildReportHTML(){
  const tot=S.flat.length;
  let ok=0,er=0,blank=0;
  S.flat.forEach(x=>{
    const r=S.respostas[x.n];
    if(r===x.item.gab) ok++;
    else if(r) er++;
    else blank++;
  });
  const pct=tot>0?Math.round(ok/tot*100):0;
  const saldo=ok-er;
  const totalMs=S.totalMs+(S.startedAt?Date.now()-S.startedAt:0);

  // Discipline rows
  const discRowsHtml=S.bloco.disciplinas.map(d=>{
    let dok=0,der=0;
    d.itens.forEach(it=>{const r=S.respostas[it.n];if(r===it.gab)dok++;else if(r)der++;});
    const dtot=d.itens.length;
    const dpct=dok+der>0?Math.round(dok/(dok+der)*100):null;
    const dsal=dok-der;
    const col=dpct===null?'#888':dpct>=70?'#1a7a3a':dpct>=50?'#b87400':'#c0392b';
    // Mini bar inline SVG
    const bw=dpct!==null?dpct:0;

  // Autoavaliação

      return `<div style="margin-bottom:14px;padding:12px 14px;border:1px solid #e0e0e0;border-radius:6px;border-left:4px solid #c0392b;page-break-inside:avoid">

    .metric .num{font-size:30px;font-weight:900;font-style:italic;line-height:1}

/* ── REVISÃO PICKER ──────────────────────────────────────── */

  stopQTimer(); _hideAllSections();
  document.getElementById('sec-revisao').classList.remove('hidden');
  document.getElementById('fab').classList.add('hidden');
  document.getElementById('bot-bar').classList.add('hidden');
  document.getElementById('hdr-timer').classList.add('hidden');
  document.getElementById('hdr-chips').style.display='none';
  document.getElementById('btn-gab-all').classList.add('hidden');

  // Reset picker state
  RPS.filterType=null; RPS.discNome=null; RPS.mode='releitura';

  const filters=[
    {type:'erros',      icon:'✗', cls:'cr', label:'Erros'},
    {type:'branco',     icon:'○', cls:'ct', label:'Em branco'},
    {type:'lac',        icon:'📖', cls:'cr', label:'Lacunas conceituais'},
    {type:'dvd',        icon:'🤔', cls:'ca', label:'Acertei com dúvida'},

  const cards=filters.map(f=>{
    const n=computeFilteredNs(f.type,null).length;
    return `<button class="filter-card" id="fc-${f.type}" onclick="pickRevFilter('${f.type}',null,this)" ${n===0?'disabled':''}>
      <span class="fc-icon">${f.icon}</span>
      <span class="fc-count ${f.cls}">${n}</span>
      <span class="fc-label">${f.label}</span>
    </button>`;
  }).join('');

  const discBtns=S.bloco.disciplinas.map(d=>{
    const short=d.nome.replace('Direito ','').replace(/ e Legislação .*/,'');
    const n=computeFilteredNs('disc',d.nome).length;
    return `<button class="disc-btn" id="dc-${short}" onclick="pickRevFilter('disc','${d.nome}',this)" ${n===0?'disabled':''}>
      ${short} <span style="font-size:11px;color:var(--txt3)">(${n})</span>
    </button>`;
  }).join('');

  const wrap=document.getElementById('rev-wrap');
  wrap.innerHTML=`<div class="rev-picker">
    <div class="cover-kicker">Δ Modo Revisão</div>
    <h2>O que revisar?</h2>
    <p class="sub">Selecione o conjunto e o modo de revisão. O desempenho da revisão é calculado separadamente.</p>

    <div class="filter-sec-lbl">Por tipo</div>
    <div class="filter-grid">${cards}</div>

    <div class="filter-sec-lbl">Por disciplina completa</div>

        <button class="mode-tab active" id="rev-mt-r" onclick="pickRevMode('releitura')">📖 Releitura</button>

    <button class="btn-ghost" style="margin-top:10px;width:100%" onclick="closeRevisao()">← Voltar</button>
  </div>`;
  window.scrollTo(0,0);
