<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PCDF · Delegado 2026</title>
<!-- PWA -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0a0b14">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PCDF">
<link rel="apple-touch-icon" href="/icons/icon-180.png">
<link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png">
<link rel="apple-touch-icon" sizes="167x167" href="/icons/icon-167.png">
<link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180.png">
<link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png">
<style>
/* ── TOKENS ──────────────────────────────────────────────── */
:root{
  --bg:#0a0b0e; --surf:#12141a; --surf2:#181b24; --surf3:#1e2230;
  --bord:#252a3a; --bord2:#2e3448;
  --txt:#e4e8f4; --txt2:#7a8399; --txt3:#3d4562;
  --acc:#e8a020; --acc-dim:rgba(232,160,32,.13); --acc-glow:rgba(232,160,32,.28); --acc-bord:rgba(232,160,32,.32); --acc-bg:#1c1206;
  --green:#28c76f; --green-bg:rgba(40,199,111,.1); --green-bord:rgba(40,199,111,.3);
  --red:#f05252; --red-bg:rgba(240,82,82,.1); --red-bord:rgba(240,82,82,.3);
  --amber:#f59e0b; --amber-bg:rgba(245,158,11,.1); --amber-bord:rgba(245,158,11,.3);
  --mono:"SF Mono","Fira Code",monospace;
  --r:12px; --r-sm:8px; --r-xs:5px;
  --trans:140ms cubic-bezier(.4,0,.2,1);
  --shadow:0 2px 14px rgba(0,0,0,.5); --shadow-lg:0 4px 28px rgba(0,0,0,.65);
}
[data-theme=light]{
  --bg:#f1f3f8; --surf:#fff; --surf2:#f5f7fc; --surf3:#eef0f8;
  --bord:#dde2ef; --bord2:#cdd3e6;
  --txt:#0e1121; --txt2:#5a6380; --txt3:#9ea8c0;
  --acc:#c47c0a; --acc-dim:rgba(196,124,10,.08); --acc-glow:rgba(196,124,10,.2); --acc-bord:rgba(196,124,10,.28); --acc-bg:#fdf6e8;
  --green:#16a34a; --green-bg:rgba(22,163,74,.08); --green-bord:rgba(22,163,74,.28);
  --red:#dc2626; --red-bg:rgba(220,38,38,.08); --red-bord:rgba(220,38,38,.28);
  --amber:#d97706; --amber-bg:rgba(217,119,6,.08); --amber-bord:rgba(217,119,6,.28);
  --shadow:0 2px 8px rgba(0,0,0,.1); --shadow-lg:0 4px 16px rgba(0,0,0,.15);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;font-size:15px;line-height:1.6;transition:background var(--trans),color var(--trans)}
button{font-family:inherit;cursor:pointer}

/* ── HEADER ──────────────────────────────────────────────── */
.hdr{position:sticky;top:0;z-index:100;background:var(--surf);border-bottom:1px solid var(--bord);box-shadow:var(--shadow)}
.hdr-inner{max-width:860px;margin:0 auto;display:flex;align-items:center;gap:10px;height:62px;padding:0 18px}
.hdr-brand{display:flex;align-items:center;gap:11px;flex:1;min-width:0}
.delta-badge{width:42px;height:42px;border-radius:10px;background:var(--acc);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:#0a0b0e;flex-shrink:0;letter-spacing:-.02em;box-shadow:0 2px 10px var(--acc-glow)}
.hdr-name{font-weight:800;font-size:16.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.01em}
.hdr-date{font-size:12px;color:var(--txt2);margin-top:1px}
.hdr-chips{display:flex;gap:5px;align-items:center;flex-shrink:0}
.chip{border-radius:6px;padding:2px 9px;font-size:12px;font-weight:700}
.chip.g{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bord)}
.chip.r{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bord)}
.chip.n{background:var(--surf2);color:var(--txt2);border:1px solid var(--bord)}
.chip.t{background:var(--acc-dim);color:var(--acc);border:1px solid var(--acc-bord)}
.hdr-timer-wrap{display:flex;align-items:center;gap:6px;flex-shrink:0;background:var(--surf2);border:1px solid var(--bord);border-radius:8px;padding:5px 10px}
.hdr-timer-wrap.hidden{display:none!important}
.hdr-timer-wrap svg.clock-ic{width:17px;height:17px;color:var(--acc);flex-shrink:0}
.hdr-timer-txt{font-size:15px;font-weight:700;color:var(--txt);font-variant-numeric:tabular-nums;min-width:38px}
#btn-pause{background:transparent;border:none;cursor:pointer;padding:0 2px;font-size:14px;color:var(--txt2);line-height:1;transition:color var(--trans)}
#btn-pause:hover{color:var(--acc)}
#btn-pause.paused{color:var(--acc)}
/* Overlay de pausa */
#pause-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.72);backdrop-filter:blur(6px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px}
#pause-overlay.hidden{display:none!important}
.pause-card{background:var(--surf1);border:1px solid var(--bord);border-radius:16px;padding:40px 56px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:14px}
.pause-icon{font-size:48px;line-height:1}
.pause-title{font-size:22px;font-weight:700;color:var(--txt)}
.pause-sub{font-size:14px;color:var(--txt2)}
.pause-resume{background:var(--acc);color:#000;border:none;border-radius:10px;padding:13px 36px;font-size:16px;font-weight:700;cursor:pointer;transition:opacity var(--trans)}
.pause-resume:hover{opacity:.85}
.hdr-actions{display:flex;gap:3px;flex-shrink:0}
.icon-btn{background:var(--surf2);border:1px solid var(--bord);color:var(--txt2);border-radius:7px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all var(--trans)}
.icon-btn:hover{background:var(--acc-dim);border-color:var(--acc-bord);color:var(--acc)}
.prog-rail{height:2px;background:var(--surf3)}
.prog-fill{height:2px;background:var(--acc);transition:width .4s}

/* ── COVER ───────────────────────────────────────────────── */
.cover{max-width:580px;margin:0 auto;padding:48px 18px 80px;text-align:center;animation:fadeIn .4s ease}
.cover-kicker{font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--acc);font-weight:700;margin-bottom:16px}
.cover h1{font-size:clamp(32px,5vw,48px);font-weight:800;font-style:italic;margin-bottom:14px;line-height:1.1}
.cover-lead{font-size:16px;color:var(--txt2);margin-bottom:32px;line-height:1.5}
.cover-card{background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);padding:24px;text-align:left;box-shadow:var(--shadow)}
.meta-grid{display:grid;grid-template-columns:auto 1fr;gap:7px 18px;font-size:13.5px;margin-bottom:18px}
.meta-grid dt{color:var(--txt3);font-size:11px;letter-spacing:.08em;text-transform:uppercase;align-self:center}
.meta-grid dd{color:var(--txt);margin:0;font-weight:500}
.cover-note{font-size:13.5px;color:var(--txt2);font-style:italic;padding:12px 14px;background:var(--surf2);border-left:3px solid var(--acc-bord);border-radius:0 var(--r-xs) var(--r-xs) 0;margin-bottom:22px;line-height:1.5}
.cover-actions{display:flex;flex-direction:column;gap:10px}
.cover-countdown{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:18px;flex-wrap:wrap}
.ccd-box{text-align:center;background:var(--surf2);border:1px solid var(--bord2);border-radius:var(--r-sm);padding:10px 16px;min-width:62px}
.ccd-num{font-size:28px;font-weight:900;font-style:italic;line-height:1;color:var(--acc)}
.ccd-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--txt3);margin-top:2px}
.ccd-sep{font-size:22px;font-weight:900;color:var(--bord2);margin-bottom:12px}
.sr-due-nudge{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--red-bg);border:1px solid var(--red-bord);border-radius:var(--r-sm);font-size:13px;color:var(--red);margin-bottom:14px;cursor:pointer;transition:background .15s}
.sr-due-nudge:hover{background:rgba(240,82,82,.18)}
.btn-primary{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 28px;background:var(--acc);color:#0a0b0e;border:none;border-radius:var(--r-sm);font-weight:800;font-size:15px;letter-spacing:.02em;transition:all var(--trans);box-shadow:0 4px 16px var(--acc-glow)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px var(--acc-glow)}
.btn-ghost{background:var(--surf2);border:1px solid var(--bord);color:var(--txt2);padding:10px 20px;border-radius:var(--r-sm);font-size:14px;transition:all var(--trans)}
.btn-ghost:hover{border-color:var(--bord2);color:var(--txt)}

/* ── PROVA TOOLBAR ───────────────────────────────────────── */
.tb{position:sticky;top:54px;z-index:90;background:var(--surf);border-bottom:1px solid var(--bord);backdrop-filter:blur(8px)}
.tb-inner{max-width:860px;margin:0 auto;display:flex;align-items:center;gap:8px;padding:8px 18px;flex-wrap:wrap}
.tb-info{font-size:13px;color:var(--txt2);font-variant-numeric:tabular-nums}
.tb-info b{color:var(--txt)}
.tb-spacer{flex:1}
.tb-btn{background:var(--surf2);border:1px solid var(--bord);border-radius:var(--r-sm);padding:6px 13px;font-size:12.5px;color:var(--txt);transition:all var(--trans);display:inline-flex;align-items:center;gap:6px}
.tb-btn:hover{border-color:var(--bord2);background:var(--surf3)}
.tb-btn.danger{border-color:var(--acc-bord);color:var(--acc);background:var(--acc-dim)}
.tb-btn.danger:hover{background:var(--acc-bg)}
.tb-btn svg{width:12px;height:12px}

/* ── PROVA CONTENT ───────────────────────────────────────── */
#prova-wrap{max-width:860px;margin:0 auto;padding:24px 18px 100px}

/* Discipline header */
.disc-section{margin-bottom:48px}
.disc-hdr{text-align:left;margin:40px 0 16px;background:var(--surf);border-top:3px solid var(--acc);border-bottom:1px solid var(--bord);padding:13px 0 11px;position:relative}
.disc-hdr h3{font-weight:800;font-size:20px;letter-spacing:-.01em;text-transform:none;color:var(--txt);display:flex;align-items:center;gap:10px}

.comando{background:var(--surf2);border:1px solid var(--bord);border-radius:var(--r-sm);padding:12px 16px;font-size:14px;color:var(--txt2);margin-bottom:16px;font-style:italic;line-height:1.5}

/* Question block */
.q-block{border-top:1px solid var(--bord);padding:16px 0;scroll-margin-top:100px}
.q-block:first-of-type{border-top:none;padding-top:4px}
.q-line{display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:start}
.q-tag{display:inline-flex;align-items:center;gap:6px;font-weight:800;font-size:13px;color:var(--acc);flex-shrink:0;padding-top:2px;white-space:nowrap}
.q-tag::before{content:'';width:8px;height:12px;background:var(--acc);clip-path:polygon(0 0,80% 0,100% 50%,80% 100%,0 100%);display:inline-block}
.q-text{font-size:15.5px;line-height:1.65;color:var(--txt)}
.q-text .situacao{display:block;font-style:italic;color:var(--txt2);margin-bottom:8px;padding-left:12px;border-left:2px solid var(--bord2)}
.q-marks{display:flex;gap:6px;flex-shrink:0;padding-top:1px}
.q-mark{width:40px;height:40px;border:1.5px solid var(--bord);border-radius:var(--r-sm);background:var(--surf2);font-weight:800;font-size:14px;color:var(--txt2);display:inline-flex;align-items:center;justify-content:center;transition:all var(--trans)}
.q-mark:hover:not(:disabled){border-color:var(--txt2);color:var(--txt);transform:translateY(-1px)}
.q-mark.sel-c{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.q-mark.sel-e{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.q-mark:disabled{opacity:.5;cursor:default}
/* After gabarito shown, ring correct/wrong */
.q-block.gab-on .q-mark.sel-c.is-right,.q-block.gab-on .q-mark.sel-e.is-right{box-shadow:0 0 0 2px var(--green-bg),0 0 0 3px var(--green)}
.q-block.gab-on .q-mark.sel-c.is-wrong,.q-block.gab-on .q-mark.sel-e.is-wrong{box-shadow:0 0 0 2px var(--red-bg),0 0 0 3px var(--red)}

.q-actions-row{margin-top:10px;padding-left:92px;display:flex;align-items:center;gap:10px}
.q-show-gab{background:transparent;border:1px dashed var(--bord2);border-radius:var(--r-xs);padding:3px 11px;font-size:12px;color:var(--txt3);transition:all var(--trans)}
.q-show-gab:hover{border-style:solid;border-color:var(--acc-bord);color:var(--acc)}
.q-status{font-size:11.5px;color:var(--txt3)}
.q-status .ok{color:var(--green);font-weight:600}
.q-status .er{color:var(--red);font-weight:600}

/* Feedback */
.q-feedback{margin-top:14px;border-radius:var(--r-sm);overflow:hidden;border:1px solid var(--bord);animation:fadeUp .2s ease}
.gab-line{display:flex;align-items:center;gap:8px;padding:9px 14px;background:var(--surf2);border-bottom:1px solid var(--bord);font-size:13px;font-weight:700}
.gab-label{color:var(--txt3);font-size:10px;letter-spacing:.1em;text-transform:uppercase;font-weight:600}
.gab-value{color:var(--txt)}
.gab-badge{margin-left:auto;font-size:11.5px;padding:2px 10px;border-radius:99px;font-weight:700}
.gab-badge.ok{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bord)}
.gab-badge.er{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bord)}
.gab-badge.bk{background:var(--surf3);color:var(--txt3);border:1px solid var(--bord)}

.gab-section{border-top:1px solid var(--bord);background:var(--surf)}
.gab-hdr{display:flex;align-items:center;gap:8px;padding:9px 14px;cursor:pointer;font-size:13px;font-weight:600;background:var(--surf2);border:none;width:100%;text-align:left;color:var(--txt);transition:background var(--trans)}
.gab-hdr:hover{background:var(--surf3)}
.gab-icon{flex-shrink:0}
.gab-lbl{flex:1}
.gab-chev{font-size:11px;color:var(--txt3);transition:transform var(--trans)}
.gab-chev.open{transform:rotate(180deg)}
.gab-body{padding:12px 14px;font-size:14px;line-height:1.7;color:var(--txt2)}
.gab-body.hidden{display:none}
.feynman-text{color:var(--txt);font-size:14.5px;line-height:1.75}
.law-block{font-family:var(--mono);font-size:12px;background:var(--surf2);border:1px solid var(--bord);border-radius:var(--r-xs);padding:11px 13px;white-space:pre-wrap;line-height:1.65;color:var(--txt)}
.copy-btn{display:inline-flex;align-items:center;gap:5px;margin-top:8px;font-size:11.5px;padding:4px 12px;border-radius:5px;border:1px solid var(--bord2);background:var(--surf3);color:var(--txt3);cursor:pointer;transition:all var(--trans);font-family:inherit}
.copy-btn:hover{color:var(--acc);border-color:var(--acc-bord);background:var(--acc-dim)}
.peg-box{display:flex;gap:8px;align-items:flex-start;background:var(--amber-bg);border:1px solid var(--amber-bord);border-radius:var(--r-xs);padding:10px 13px;font-size:13px;color:var(--amber);line-height:1.55}

/* ── TRAP WORDS (Releitura Crítica) ──────────────────────── */
.trap-word{font-weight:800;color:var(--acc);background:var(--acc-dim);border-bottom:2px solid var(--acc);padding:0 3px;border-radius:3px}
.releitura-body{font-size:14.5px;line-height:1.8;color:var(--txt);margin-bottom:10px}
.releitura-body .situacao{display:block;font-style:italic;color:var(--txt2);margin-bottom:8px;padding-left:12px;border-left:2px solid var(--bord2)}
.trap-legend{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--txt3);margin-top:6px;flex-wrap:wrap}
.trap-legend .trap-word{font-size:11.5px;cursor:default}
.trap-found{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;color:var(--acc);font-weight:700}

/* ── AUTOAVALIAÇÃO ────────────────────────────────────────── */
.avaliacao-row{padding:11px 14px;background:var(--surf2);border-top:1px solid var(--bord);display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.avaliacao-lbl{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--txt3);font-weight:600;width:100%;margin-bottom:2px}
.av-btn{border-radius:99px;padding:5px 13px;font-size:12.5px;font-weight:700;border:1.5px solid;cursor:pointer;font-family:inherit;transition:all var(--trans);background:transparent}
.av-btn.dom{border-color:var(--green-bord);color:var(--green)}
.av-btn.dom:hover,.av-btn.dom.sel{background:var(--green-bg);box-shadow:0 0 0 2px var(--green-bord)}
.av-btn.dvd{border-color:var(--amber-bord);color:var(--amber)}
.av-btn.dvd:hover,.av-btn.dvd.sel{background:var(--amber-bg);box-shadow:0 0 0 2px var(--amber-bord)}
.av-btn.lac{border-color:var(--red-bord);color:var(--red)}
.av-btn.lac:hover,.av-btn.lac.sel{background:var(--red-bg);box-shadow:0 0 0 2px var(--red-bord)}
.av-btn.leit{border-color:var(--bord2);color:var(--txt2)}
.av-btn.leit:hover,.av-btn.leit.sel{background:var(--surf3);color:var(--txt);box-shadow:0 0 0 2px var(--bord2)}
.av-set{display:flex;align-items:center;gap:8px;padding:9px 14px;background:var(--surf2);border-top:1px solid var(--bord);font-size:13px}
.av-chip{border-radius:99px;padding:3px 12px;font-size:12px;font-weight:700;border:1.5px solid}
.av-chip.dom{background:var(--green-bg);color:var(--green);border-color:var(--green-bord)}
.av-chip.dvd{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-bord)}
.av-chip.lac{background:var(--red-bg);color:var(--red);border-color:var(--red-bord)}
.av-chip.leit{background:var(--surf3);color:var(--txt2);border-color:var(--bord2)}
.av-change{margin-left:auto;background:transparent;border:1px dashed var(--bord2);border-radius:var(--r-xs);padding:2px 9px;font-size:11.5px;color:var(--txt3);cursor:pointer;font-family:inherit;transition:all var(--trans)}
.av-change:hover{color:var(--acc);border-color:var(--acc-bord)}

/* ── DIAGNÓSTICO (Placar) ─────────────────────────────────── */
.diag-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--bord);border:1px solid var(--bord);border-radius:10px;overflow:hidden;margin-bottom:14px}
@media(max-width:600px){.diag-grid{grid-template-columns:repeat(2,1fr)}}
.diag-cell{background:var(--surf2);padding:14px 10px;text-align:center}
.diag-cell .dn{font-size:26px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums}
.diag-cell .dl{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--txt3);margin-top:5px;font-weight:600;line-height:1.3}
.diag-empty{color:var(--txt3);font-size:14px;font-style:italic;padding:12px 0}

/* ── REVISÃO ──────────────────────────────────────────────── */
#rev-wrap{max-width:860px;margin:0 auto;padding:0 0 100px}
.rev-picker{max-width:580px;margin:0 auto;padding:36px 18px 60px;animation:fadeIn .3s ease}
.rev-picker h2{font-size:clamp(22px,4vw,32px);font-weight:800;font-style:italic;margin-bottom:6px}
.rev-picker .sub{font-size:15px;color:var(--txt2);margin-bottom:28px;line-height:1.5}
.filter-sec-lbl{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--txt3);font-weight:700;margin:22px 0 10px}
.filter-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
@media(max-width:480px){.filter-grid{grid-template-columns:1fr}}
.filter-card{background:var(--surf);border:1.5px solid var(--bord);border-radius:var(--r);padding:15px 16px;text-align:left;cursor:pointer;transition:all var(--trans);font-family:inherit;display:flex;flex-direction:column;gap:3px}
.filter-card:hover:not(:disabled){border-color:var(--acc-bord);background:var(--acc-dim)}
.filter-card.sel{border-color:var(--acc);background:var(--acc-dim);box-shadow:0 0 0 1.5px var(--acc)}
.filter-card:disabled{opacity:.35;cursor:not-allowed;pointer-events:none}
.fc-icon{font-size:20px}
.fc-count{font-size:28px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums}
.fc-count.cr{color:var(--red)}.fc-count.ca{color:var(--amber)}.fc-count.cg{color:var(--green)}.fc-count.ct{color:var(--txt)}
.fc-label{font-size:12px;color:var(--txt2);font-weight:600}
.disc-filter-row{display:flex;flex-wrap:wrap;gap:7px}
.disc-btn{background:var(--surf2);border:1.5px solid var(--bord);border-radius:99px;padding:5px 14px;font-size:13px;font-family:inherit;color:var(--txt2);cursor:pointer;transition:all var(--trans);font-weight:500}
.disc-btn:hover{border-color:var(--acc-bord);color:var(--acc)}
.disc-btn.sel{border-color:var(--acc);color:var(--acc);background:var(--acc-dim)}
.mode-box{background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);overflow:hidden;margin-bottom:24px}
.mode-tabs{display:grid;grid-template-columns:1fr 1fr}
.mode-tab{border:none;background:var(--surf2);color:var(--txt2);font-size:14px;font-weight:700;padding:12px 8px;cursor:pointer;font-family:inherit;border-bottom:2px solid transparent;transition:all var(--trans);display:flex;align-items:center;justify-content:center;gap:6px}
.mode-tab:first-child{border-right:1px solid var(--bord)}
.mode-tab.active{background:var(--surf);color:var(--acc);border-bottom-color:var(--acc)}
.mode-desc-txt{font-size:13px;color:var(--txt2);padding:11px 14px;line-height:1.55;border-top:1px solid var(--bord)}
.rev-tb{position:sticky;top:54px;z-index:90;background:var(--surf);border-bottom:1px solid var(--bord)}
.rev-tb-inner{max-width:860px;margin:0 auto;display:flex;align-items:center;gap:8px;padding:7px 18px;flex-wrap:wrap}
.rev-badge{background:var(--acc-dim);border:1px solid var(--acc-bord);color:var(--acc);border-radius:99px;padding:3px 12px;font-size:12px;font-weight:700;flex-shrink:0}
.rev-orig{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;padding:2px 9px;border-radius:99px;font-weight:600;flex-shrink:0}
.rev-orig.ok{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bord)}
.rev-orig.er{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bord)}
.rev-orig.bk{background:var(--surf3);color:var(--txt3);border:1px solid var(--bord)}
.rev-placar-wrap{max-width:580px;margin:0 auto;padding:32px 18px 100px;animation:fadeUp .4s ease}

/* ── ESPAÇAMENTO INTELIGENTE ──────────────────────────────── */
.sr-badge{display:inline-flex;align-items:center;gap:3px;font-size:10.5px;font-weight:700;border-radius:4px;padding:2px 7px;line-height:1.4;white-space:nowrap}
.sr-badge.due{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bord)}
.sr-badge.soon{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bord)}
.sr-badge.ok{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bord)}
.sr-queue-section{margin-bottom:20px}
.sr-queue-hdr{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--red);font-weight:700;margin-bottom:10px}
.sr-queue-row{display:flex;align-items:center;gap:10px;padding:9px 14px;border-radius:var(--r-sm);background:var(--surf);border:1.5px solid var(--red-bord);margin-bottom:7px;cursor:default;transition:background .15s}
.sr-queue-date{font-size:11px;color:var(--txt3);min-width:52px}
.sr-queue-title{flex:1;font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sr-queue-pct{font-size:13px;font-weight:700;min-width:38px;text-align:right}
.sr-interval-info{font-size:11px;color:var(--txt3);margin-top:4px}
/* ── MODO FOCO ────────────────────────────────────────────── */
#sec-foco{position:fixed;inset:0;z-index:150;background:var(--bg);overflow-y:auto;display:flex;flex-direction:column}
#sec-foco.hidden{display:none!important}
.foco-hdr{position:sticky;top:0;z-index:10;background:var(--bg);border-bottom:1px solid var(--bord2);padding:10px 18px;display:flex;align-items:center;gap:12px}
.foco-qnum{font-size:13px;font-weight:700;color:var(--txt2);white-space:nowrap}
.foco-disc{font-size:11.5px;color:var(--txt3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0}
.foco-prog-wrap{display:flex;align-items:center;gap:8px;min-width:110px}
.foco-progress{height:4px;background:var(--bord);border-radius:2px;flex:1}
.foco-prog-fill{height:100%;background:var(--acc);border-radius:2px;transition:width .4s}
.foco-pct{font-size:11px;font-weight:700;color:var(--acc);min-width:28px;text-align:right}
.foco-body{flex:1;max-width:800px;margin:0 auto;padding:28px 20px 16px;width:100%;animation:fadeIn .2s ease}
.foco-body .q-block{border-color:var(--bord2)}
.foco-body .q-text{font-size:16px;line-height:1.8}
.foco-body .q-tag{font-size:14px;width:42px;height:42px;line-height:42px}
.foco-body .q-mark{height:52px;font-size:17px;font-weight:900;min-width:80px}
.foco-body .q-marks{gap:14px}
.foco-nav{max-width:800px;margin:0 auto 40px;padding:0 20px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.foco-nav-hint{font-size:11px;color:var(--txt3);text-align:center;line-height:1.6}
/* ── QUESTION TIMER ──────────────────────────────────────── */
.qt-badge{display:inline-flex;align-items:center;gap:3px;font-size:10.5px;font-weight:700;border-radius:4px;padding:2px 7px;font-variant-numeric:tabular-nums;letter-spacing:.02em;transition:background .35s,color .35s,border-color .35s;min-width:36px;justify-content:center}
.qt-idle{color:var(--txt3);background:transparent}
.qt-normal{background:var(--surf3);color:var(--txt2)}
.qt-warn{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bord)}
.qt-alert{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bord);animation:qtPulse 1s ease-in-out infinite}
.qt-done{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bord)}
@keyframes qtPulse{0%,100%{opacity:1}50%{opacity:.5}}
#qt-pill{position:fixed;bottom:62px;left:50%;transform:translateX(-50%);max-width:860px;width:calc(100% - 32px);z-index:80;pointer-events:none;display:flex;justify-content:flex-end}
.qt-active-pill{background:var(--surf2);border:1px solid var(--bord2);border-radius:20px;padding:5px 14px;font-size:12px;font-weight:700;color:var(--txt2);display:flex;align-items:center;gap:7px;box-shadow:0 2px 12px rgba(0,0,0,.35)}
.qt-active-pill.qt-warn-p{color:var(--amber)}
.qt-active-pill.qt-alert-p{color:var(--red);animation:qtPulse 1s ease-in-out infinite}
/* ── HISTÓRICO ────────────────────────────────────────────── */
#hist-wrap{max-width:860px;margin:0 auto;padding:24px 18px 100px;animation:fadeUp .4s ease}
.hist-header{display:grid;grid-template-columns:62px 72px 50px 68px 60px 1fr 80px;gap:8px;padding:7px 0;border-bottom:2px solid var(--bord);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--txt3);font-weight:700}
.hist-row{display:grid;grid-template-columns:62px 72px 50px 68px 60px 1fr 80px;gap:8px;padding:10px 0;border-top:1px solid var(--bord);font-size:13.5px;align-items:center}
.hist-row:first-child{border-top:none}
.hist-date{color:var(--txt2);font-size:12.5px;font-variant-numeric:tabular-nums;font-weight:600}
.hist-acertos{color:var(--txt);font-variant-numeric:tabular-nums}
.hist-pct{font-weight:800;font-variant-numeric:tabular-nums}
.hist-tempo{color:var(--txt3);font-size:12px;font-variant-numeric:tabular-nums}
.hist-saldo{font-weight:700;font-variant-numeric:tabular-nums}
.hist-av{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.hist-empty{text-align:center;padding:60px 20px}
.hist-empty .hist-emoji{font-size:52px;margin-bottom:18px}
.hist-empty h2{font-size:22px;font-weight:800;margin-bottom:10px}
.hist-empty p{color:var(--txt2);font-size:15px;max-width:340px;margin:0 auto 28px}
.streak-badge{display:inline-flex;align-items:center;gap:5px;background:var(--amber-bg);border:1px solid var(--amber-bord);color:var(--amber);border-radius:99px;padding:3px 12px;font-size:13px;font-weight:700;margin-left:8px}
@media(max-width:600px){
  .hist-header,.hist-row{grid-template-columns:55px 62px 46px 1fr}
  .hist-tempo,.hist-av{display:none}
}

/* ── PLACAR ──────────────────────────────────────────────── */
#placar-wrap{max-width:860px;margin:0 auto;padding:24px 18px 100px;animation:fadeUp .4s ease}
.placar-hero{background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);padding:32px 28px;box-shadow:var(--shadow);margin-bottom:20px;text-align:center}
.placar-kicker{font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--acc);font-weight:700;margin-bottom:14px}
.placar-hero h2{font-size:clamp(28px,4.5vw,40px);font-weight:800;font-style:italic;margin-bottom:8px}
.placar-lead{font-size:15px;color:var(--txt2);margin-bottom:24px}
.placar-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--bord);border:1px solid var(--bord);border-radius:10px;overflow:hidden}
@media(max-width:600px){.placar-stats{grid-template-columns:repeat(2,1fr)}}
.p-stat{background:var(--surf2);padding:16px 10px;text-align:center}
.p-stat .n{font-weight:800;font-size:30px;line-height:1;font-variant-numeric:tabular-nums}
.p-stat .n.g{color:var(--green)}.p-stat .n.r{color:var(--red)}.p-stat .n.a{color:var(--acc)}.p-stat .n.t{color:var(--txt)}
.p-stat .l{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--txt3);margin-top:5px;font-weight:600}

.pl-box{background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);padding:22px;margin-bottom:20px;box-shadow:var(--shadow)}
.pl-title{font-weight:700;font-size:16px;margin-bottom:16px;color:var(--txt)}
.cebraspe-formula{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:14px 16px;background:var(--surf2);border-radius:var(--r-sm);margin-bottom:14px;font-size:14px;border:1px solid var(--bord)}
.cebraspe-formula .part{color:var(--txt2)}
.cebraspe-formula .part b{color:var(--txt);font-weight:700}
.cebraspe-formula .eq{font-weight:800;font-size:20px;color:var(--acc);font-variant-numeric:tabular-nums}
.cebraspe-verdict{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:var(--r-sm);font-weight:700;font-size:14px;border:1px solid}
.cebraspe-verdict.approved{background:var(--green-bg);color:var(--green);border-color:var(--green-bord)}
.cebraspe-verdict.reproved{background:var(--red-bg);color:var(--red);border-color:var(--red-bord)}

/* Discipline chart */
.disc-chart-row{display:grid;grid-template-columns:1.4fr 2.5fr auto auto;gap:12px;align-items:center;padding:9px 0;border-top:1px solid var(--bord);font-size:13.5px}
.disc-chart-row:first-of-type{border-top:none}
.disc-chart-row .nm{color:var(--txt);font-weight:500}
.bar-rail{height:9px;background:var(--surf2);border-radius:99px;overflow:hidden;border:1px solid var(--bord)}
.bar-fill{height:100%;border-radius:99px;transition:width .6s}
.disc-chart-row .frac{color:var(--txt3);font-size:12px;font-variant-numeric:tabular-nums}
.disc-chart-row .pct{font-weight:700;font-size:13px;min-width:40px;text-align:right;font-variant-numeric:tabular-nums}
@media(max-width:600px){.disc-chart-row{grid-template-columns:1fr auto;gap:5px 12px}.bar-rail{grid-column:1/-1;order:3}.disc-chart-row .frac{order:4}}

/* Errors list */
.err-item{border-top:1px solid var(--bord);padding:12px 0}
.err-item:first-child{border-top:none}
.err-row{display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:start;font-size:13.5px}
.err-num{font-weight:800;color:var(--red);font-variant-numeric:tabular-nums;min-width:32px;padding-top:2px}
.err-sub{color:var(--txt);line-height:1.4}
.err-sub small{display:block;color:var(--txt3);font-size:11.5px;margin-top:2px}
.err-toggle{background:var(--surf2);border:1px solid var(--bord);border-radius:var(--r-xs);padding:4px 12px;font-size:12px;color:var(--txt2);transition:all var(--trans);font-family:inherit;white-space:nowrap;display:inline-flex;align-items:center;gap:5px}
.err-toggle:hover{border-color:var(--acc-bord);color:var(--acc);background:var(--acc-dim)}
.err-toggle.open{border-color:var(--acc-bord);color:var(--acc);background:var(--acc-dim)}
.err-gab{display:none;margin-top:12px;border-radius:var(--r-sm);overflow:hidden;border:1px solid var(--bord)}
.err-gab.open{display:block;animation:fadeUp .2s ease}
.placar-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:24px}

/* ── FAB NAV ─────────────────────────────────────────────── */
.fab{position:fixed;right:20px;bottom:72px;width:46px;height:46px;background:var(--acc);color:#0a0b0e;border:none;border-radius:50%;box-shadow:0 4px 16px var(--acc-glow);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;z-index:44;transition:all var(--trans)}
.fab:hover{transform:scale(1.08)}
.fab.hidden{display:none}
.quick-nav{position:fixed;right:20px;bottom:124px;width:auto;min-width:240px;background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);padding:12px;box-shadow:var(--shadow-lg);z-index:45;max-width:320px;max-height:55vh;overflow-y:auto;display:none}
.quick-nav.open{display:block;animation:fadeUp .2s ease}
.qn-title{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--txt3);margin-bottom:8px;font-weight:600}
.qn-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:4px}
.qn-btn{width:30px;height:30px;border:1px solid var(--bord);background:var(--surf2);border-radius:6px;font-size:10.5px;font-weight:700;color:var(--txt3);transition:all .1s;font-variant-numeric:tabular-nums}
.qn-btn:hover{border-color:var(--acc-bord);color:var(--acc);transform:scale(1.08)}
.qn-btn.ac{background:var(--green-bg);border-color:var(--green-bord);color:var(--green)}
.qn-btn.ae{background:var(--red-bg);border-color:var(--red-bord);color:var(--red)}
.qn-btn.gs{border-style:dashed}
.qn-btn.qa{box-shadow:0 0 0 2px var(--red);animation:qtPulse 1.2s ease-in-out infinite}
@keyframes qFlash{0%{box-shadow:0 0 0 3px var(--acc-glow),0 0 18px var(--acc-glow)}60%{box-shadow:0 0 0 2px var(--acc-bord)}100%{box-shadow:none}}
.q-kb-flash{animation:qFlash .55s ease-out}

/* ── PROGRESS BAR (bottom fixed) ─────────────────────────── */
.bot-bar{position:fixed;bottom:0;left:0;right:0;background:var(--surf);border-top:1px solid var(--bord);padding:8px 18px;display:flex;align-items:center;gap:12px;z-index:40;font-size:12px;color:var(--txt2)}
.bot-bar.hidden{transform:translateY(100%);opacity:0;pointer-events:none}
.bot-bar .bbar{flex:1;height:6px;background:var(--surf3);border-radius:99px;overflow:hidden}
.bot-bar .bbar-fill{height:100%;background:var(--acc);transition:width .4s;border-radius:99px}
.bot-bar .bstats{display:flex;gap:10px;flex-shrink:0;font-variant-numeric:tabular-nums}
.bot-bar .bstats .ok{color:var(--green);font-weight:600}.bot-bar .bstats .er{color:var(--red);font-weight:600}

/* ── MODAL ───────────────────────────────────────────────── */
.modal-ov{position:fixed;inset:0;background:rgba(8,9,14,.65);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;padding:18px;animation:fadeIn .2s ease}
.modal{background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);padding:26px;max-width:420px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.5);animation:fadeUp .2s ease}
.modal h3{font-size:19px;font-weight:800;margin-bottom:10px}
.modal p{color:var(--txt2);margin-bottom:20px;font-size:14px;line-height:1.55}
.modal-acts{display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap}
.btn-danger{background:var(--red);color:white;border:none;border-radius:var(--r-sm);padding:9px 18px;font-family:inherit;font-weight:700;font-size:14px;transition:opacity var(--trans)}
.btn-danger:hover{opacity:.88}
.btn-warn{background:var(--amber);color:white;border:none;border-radius:var(--r-sm);padding:9px 18px;font-family:inherit;font-weight:700;font-size:14px;transition:opacity var(--trans)}
.btn-warn:hover{opacity:.88}

/* ── TOAST ───────────────────────────────────────────────── */
.toast{position:fixed;bottom:56px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--surf);border:1px solid var(--bord);color:var(--txt);padding:11px 18px;border-radius:var(--r-sm);font-size:13.5px;z-index:300;opacity:0;transition:opacity .25s,transform .25s;box-shadow:var(--shadow-lg);pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── ANIMATIONS ──────────────────────────────────────────── */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.hidden{display:none!important}

/* ── RESPONSIVE ──────────────────────────────────────────── */
@media(max-width:640px){
  .hdr-inner{padding:0 12px}.hdr-chips{gap:4px}
  .chip{padding:2px 7px;font-size:11px}
  #prova-wrap,#placar-wrap{padding:16px 12px 100px}
  .q-text{font-size:14.5px}
  .prova-title h2{font-size:16px}
  .placar-stats{grid-template-columns:repeat(2,1fr)}
  .q-actions-row{padding-left:0;flex-wrap:wrap}
}
</style>
</head>
<body>

<!-- ══ HEADER ════════════════════════════════════════════ -->
<header class="hdr" id="hdr">
  <div class="hdr-inner">
    <div class="hdr-brand">
      <div class="delta-badge">Δ</div>
      <div>
        <div class="hdr-name">PCDF · Delegado 2026</div>
        <div class="hdr-date" id="hdr-date"></div>
      </div>
    </div>
    <div class="hdr-timer-wrap hidden" id="hdr-timer">
      <svg class="clock-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
      </svg>
      <span class="hdr-timer-txt" id="hdr-timer-txt">0:00</span>
      <button id="btn-pause" title="Pausar / retomar" onclick="togglePause()">⏸</button>
    </div>
    <div class="hdr-chips" id="hdr-chips" style="display:none">
      <span class="chip g" id="c-ok">✓ 0</span>
      <span class="chip r" id="c-er">✗ 0</span>
      <span class="chip n" id="c-tot">0/10</span>
    </div>
    <div class="hdr-actions">
      <button class="icon-btn" id="btn-hist" title="Histórico de estudo">📊</button>
      <button class="icon-btn" id="btn-theme" title="Tema">☀</button>
      <button class="icon-btn hidden" id="btn-gab-all" title="Revelar/ocultar todos os gabaritos">👁</button>
      <button class="icon-btn" id="btn-export" title="Exportar progresso">⬆</button>
      <button class="icon-btn" id="btn-import-bloco" title="Importar bloco JSON">📂</button>
      <button class="icon-btn" id="btn-import-prog" title="Importar progresso">📥</button>
      <button class="icon-btn" id="btn-reset" title="Reiniciar">↺</button>
    </div>
  </div>
  <div class="prog-rail"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
</header>

<!-- ══ PAUSE OVERLAY ═════════════════════════════════════ -->
<div id="pause-overlay" class="hidden">
  <div class="pause-card">
    <div class="pause-icon">⏸</div>
    <div class="pause-title">Prova pausada</div>
    <div class="pause-sub">O cronômetro está parado.<br>Retome quando estiver pronto.</div>
    <button class="pause-resume" onclick="togglePause()">▶ Retomar prova</button>
  </div>
</div>

<!-- ══ SECTIONS ══════════════════════════════════════════ -->
<main>
  <section id="sec-cover"></section>

  <div id="sec-prova" class="hidden">
    <!-- Toolbar -->
    <div class="tb" id="prova-tb">
      <div class="tb-inner">
        <span class="tb-info"><b id="tb-ans">0</b> respondidas &nbsp;|&nbsp; <b id="tb-blank">10</b> em branco</span>
        <span class="tb-spacer"></span>
        <button class="tb-btn" id="tb-gab-all">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="3"/><path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7-10-7-10-7z"/></svg>
          Gabaritos
        </button>
        <button class="tb-btn" id="tb-revisao" onclick="showRevisaoPicker()">
          🔍 Revisão
        </button>
        <button class="tb-btn" id="tb-foco" onclick="enterFoco()">
          🎯 Foco
        </button>
        <button class="tb-btn danger" id="tb-finish">
          Encerrar prova →

<script>
/* ═══════════════════════════════════════════════════════════
   DATA — inject_bloco.py substitui entre ==INJECT:START== e ==INJECT:END==
   ═══════════════════════════════════════════════════════════ */
/* ==INJECT:START== */
const DEFAULT_BLOCO = {"meta":{"id":"2026-06-19","titulo":"Bloco Diário — Remédios Constitucionais, Extinção de Atos, Fato Típico, Sujeitos Processuais","data":"2026-06-19","totalQuestoes":120,"concurso":"Delegado PCDF 2026","edital":"Edital nº 1, de 3/2/2026","observacao":"Fase 1 — comentários expandidos. 120 questões C/E cobrindo as 10 disciplinas do edital."},"disciplinas":[{"nome":"Direito Penal + Legislação Especial","comando":"Acerca da teoria do crime, dos crimes contra a pessoa e contra o patrimônio, e da legislação penal especial, julgue os itens a seguir.","itens":[{"n":1,"enun":"Segundo a teoria finalista da ação, adotada majoritariamente pela doutrina e jurisprudência brasileiras, o dolo e a culpa são elementos da culpabilidade, e não do fato típico.","gab":"ERRADO","com":"Errado. O finalismo de Welzel mudou o 'endereço' do dolo: ele saiu da culpabilidade (onde morava no causalismo) e foi morar na conduta, dentro do fato típico. Imagine mudar um móvel de cômodo — o objeto é o mesmo, mas o local muda tudo na organização da casa.","fund":"DOUTRINA: 'Welzel, Das Deutsche Strafrecht: a conduta é ação dirigida a um fim — dolo e culpa são o conteúdo finalístico da conduta, pertencendo ao tipo, não à culpabilidade.' | JURISPRUDÊNCIA: 'STF, HC 101.698/RJ, Rel. Min. Luiz Fux, 1ª T., j. 18/10/2011: o ordenamento penal brasileiro adota a teoria finalista da ação.'","peg":"CEBRASPE inverte a posição do dolo — se disser 'dolo na culpabilidade' com referência ao finalismo, é errado.","jur_status":"PENDENTE"},{"n":2,"enun":"De acordo com o Código Penal, a coação física irresistível exclui a conduta e, por conseguinte, o próprio fato típico, ao passo que a coação moral irresistível exclui a culpabilidade por inexigibilidade de conduta diversa.","gab":"CERTO","com":"Certo. A coação física (vis absoluta) elimina a voluntariedade — sem vontade, não há conduta. É como ser empurrado contra alguém: seu corpo se move, mas você não agiu. Já a coação moral (vis compulsiva) preserva a vontade, mas a vicia: você escolheu, mas sob ameaça insuportável — por isso a exclusão é na culpabilidade.","fund":"DOUTRINA: 'Rogério Sanches, Manual de Direito Penal: a coação física irresistível elimina a voluntariedade da conduta, excluindo o fato típico; a coação moral irresistível configura inexigibilidade de conduta diversa, excludente de culpabilidade (art. 22, CP).' | LEI: 'Art. 22, CP: Se o fato é cometido sob coação irresistível ou em estrita obediência a ordem, não manifestamente ilegal, de superior hierárquico, só é punível o autor da coação ou da ordem.'"},{"n":3,"enun":"A tipicidade formal consiste na mera subsunção do fato à norma penal incriminadora, sendo suficiente, por si só, para a configuração do fato típico segundo a doutrina majoritária.","gab":"ERRADO","com":"Errado. A tipicidade formal é necessária, mas não suficiente. É como vestir uma roupa do tamanho certo (tipicidade formal) — ela pode caber, mas se for uma roupa de mentira sem tecido de verdade (sem lesão ao bem jurídico), não serve. Exige-se também a tipicidade material: efetiva lesão ou perigo de lesão.","fund":"DOUTRINA: 'Claus Roxin, Funcionalismo e Imputação Objetiva: a tipicidade exige, além da adequação formal, a lesão material ao bem jurídico tutelado.' | JURISPRUDÊNCIA: 'STF, HC 84.412/SP, Rel. Min. Celso de Mello, 2ª T., j. 19/10/2004: o princípio da insignificância atua como instrumento de interpretação restritiva do tipo penal, excluindo a tipicidade material.'","jur_status":"PENDENTE"},{"n":4,"enun":"Conforme entendimento consolidado do Supremo Tribunal Federal, a aplicação do princípio da insignificância exige a presença cumulativa de quatro vetores: mínima ofensividade da conduta, ausência de periculosidade social da ação, reduzido grau de reprovabilidade do comportamento e inexpressividade da lesão jurídica.","gab":"CERTO","com":"Certo. São os 4 critérios do STF para insignificância, como um check-list de portaria: todos precisam estar marcados para o visitante (o fato) passar. Se faltar qualquer um — por exemplo, a conduta for socialmente perigosa — o fato é típico.","fund":"JURISPRUDÊNCIA: 'STF, HC 84.412/SP, Rel. Min. Celso de Mello, 2ª T., j. 19/10/2004: fixou os 4 vetores cumulativos da insignificância. Reiterado em HC 181.389 AgR, Rel. Min. Gilmar Mendes, 2ª T., j. 14/04/2020.'","jur_status":"PENDENTE"},{"n":5,"enun":"Segundo o Superior Tribunal de Justiça, a restituição imediata e integral do bem furtado é suficiente, por si só, para justificar a aplicação do princípio da insignificância.","gab":"ERRADO","com":"Errado. O STJ firmou tese de que a restituição do bem, isoladamente, não basta para a insignificância. É como devolver um produto roubado de uma loja: o ato de devolver não apaga a gravidade de ter furtado. Outros fatores pesam — valor do bem, circunstâncias, antecedentes.","fund":"JURISPRUDÊNCIA: 'STJ, REsp 1.688.878/SP, Rel. Min. Sebastião Reis Júnior, 3ª Seção, j. 04/12/2023: a restituição imediata e integral do bem furtado, por si só, não justifica o reconhecimento do princípio da insignificância.'","jur_status":"PENDENTE"},{"n":6,"enun":"O nexo de causalidade, no Código Penal brasileiro, é regido pela teoria da equivalência dos antecedentes causais (conditio sine qua non), segundo a qual é causa toda condição sem a qual o resultado não teria ocorrido.","gab":"CERTO","com":"Certo. O art. 13 do CP abraçou a conditio sine qua non: para saber se algo é causa, faça o teste de eliminação hipotética — tire a conduta mentalmente e veja se o resultado desaparece. Se sim, é causa. É como tirar uma peça do dominó: se a fileira para, aquela peça era essencial.","fund":"LEI: 'Art. 13, caput, CP: O resultado, de que depende a existência do crime, somente é imputável a quem lhe deu causa. Considera-se causa a ação ou omissão sem a qual o resultado não teria ocorrido.'"},{"n":7,"enun":"A superveniência de causa relativamente independente que, por si só, produziu o resultado exclui a imputação do resultado ao agente, que responderá apenas pelos atos anteriormente praticados, nos termos do art. 13, § 1º, do Código Penal.","gab":"CERTO","com":"Certo. É o clássico caso do hospital: A esfaqueia B, B vai ao hospital, hospital pega fogo, B morre no incêndio. O incêndio é causa que 'por si só' produziu o resultado — rompe o nexo. A responde pela tentativa de homicídio, não pelo homicídio consumado.","fund":"LEI: 'Art. 13, § 1º, CP: A superveniência de causa relativamente independente exclui a imputação quando, por si só, produziu o resultado; os fatos anteriores, entretanto, imputam-se a quem os praticou.'"},{"n":8,"enun":"Na omissão imprópria, o agente responde pelo resultado naturalístico como se o tivesse causado por ação, desde que possua o dever jurídico de impedir o resultado e que pudesse agir para evitá-lo.","gab":"CERTO","com":"Certo. O garante (art. 13, §2º) é como o salva-vidas da piscina: se uma criança se afoga e ele nada faz, responde como se a tivesse afogado. A lei equipara a omissão à ação quando há dever de agir + possibilidade de agir.","fund":"LEI: 'Art. 13, § 2º, CP: A omissão é penalmente relevante quando o omitente devia e podia agir para evitar o resultado. O dever de agir incumbe a quem: a) tenha por lei obrigação de cuidado, proteção ou vigilância; b) de outra forma, assumiu a responsabilidade de impedir o resultado; c) com seu comportamento anterior, criou o risco da ocorrência do resultado.'"},{"n":9,"enun":"No crime impossível, o Código Penal brasileiro adotou a teoria objetiva pura, segundo a qual tanto a ineficácia absoluta quanto a relativa do meio afastam a tipicidade.","gab":"ERRADO","com":"Errado. O CP adotou a teoria objetiva temperada (não pura): somente a ineficácia absoluta exclui a tipicidade. Se a ineficácia for relativa, há tentativa. É como atirar com arma descarregada (absoluta — impossível matar) versus atirar com pontaria ruim (relativa — pode acertar).","fund":"LEI: 'Art. 17, CP: Não se pune a tentativa quando, por ineficácia absoluta do meio ou por absoluta impropriedade do objeto, é impossível consumar-se o crime.' | DOUTRINA: 'A adoção do adjetivo absoluta pelo legislador indica a teoria objetiva temperada: a ineficácia relativa permite a punição por tentativa.'","peg":"CEBRASPE troca 'temperada' por 'pura' — na teoria pura, qualquer grau de ineficácia afastaria o crime."},{"n":10,"enun":"O erro de tipo essencial inevitável exclui o dolo, mas permite a punição a título de culpa, se prevista a modalidade culposa do crime.","gab":"ERRADO","com":"Errado. O erro de tipo inevitável (escusável) exclui dolo E culpa — o fato é atípico. É o evitável (inescusável) que exclui o dolo mas permite punição culposa. Pense assim: se o erro era impossível de evitar, não há reprovação nenhuma; se dava para evitar com cuidado, há negligência.","fund":"LEI: 'Art. 20, caput, CP: O erro sobre elemento constitutivo do tipo legal de crime exclui o dolo, mas permite a punição por crime culposo, se previsto em lei.' | DOUTRINA: 'O caput refere-se ao erro evitável; o erro inevitável exclui dolo e culpa — fato atípico (art. 20, caput, 1ª parte, interpretação sistemática).'","peg":"CEBRASPE inverte inevitável/evitável. Inevitável = exclui tudo. Evitável = exclui dolo, permite culpa."},{"n":11,"enun":"O homicídio qualificado por motivo fútil é compatível com o homicídio privilegiado por relevante valor moral, podendo coexistir no mesmo fato, desde que a qualificadora seja de natureza objetiva.","gab":"ERRADO","com":"Errado. Motivo fútil e relevante valor moral são ambas circunstâncias de natureza subjetiva — referem-se à motivação do agente. São contraditórias: não se pode matar por motivo insignificante e, ao mesmo tempo, por nobre motivação. O homicídio privilegiado-qualificado só é possível quando a qualificadora é objetiva (meio cruel, por exemplo).","fund":"JURISPRUDÊNCIA: 'STJ, REsp 1.510.484/MG, Rel. Min. Rogerio Schietti, 6ª T.: o homicídio qualificado-privilegiado é possível quando a qualificadora é de natureza objetiva e o privilégio é subjetivo, pois não há contradição.' | DOUTRINA: 'Motivo fútil (art. 121, §2º, II) e relevante valor moral (art. 121, §1º) são ambas subjetivas — incompatíveis entre si.'","jur_status":"PENDENTE"},{"n":12,"enun":"No crime de furto qualificado pelo abuso de confiança, a qualificadora é de natureza objetiva, relacionada ao modo de execução do delito.","gab":"ERRADO","com":"Errado. Abuso de confiança é qualificadora subjetiva — diz respeito à relação pessoal entre agente e vítima, não ao modo de execução. É como trair a confiança de um amigo que lhe emprestou a chave: o problema não é como você entrou, mas a traição da relação de confiança.","fund":"LEI: 'Art. 155, § 4º, II, CP: furto qualificado por abuso de confiança.' | DOUTRINA: 'Rogério Sanches: o abuso de confiança é circunstância subjetiva, pois se refere à relação pessoal de confiança entre agente e vítima, e não ao meio ou modo de execução.'","peg":"CEBRASPE classifica abuso de confiança como objetiva — é subjetiva."},{"n":13,"enun":"Configura-se o crime de latrocínio consumado quando o agente, mediante violência, subtrai a coisa alheia, ainda que a morte da vítima tenha resultado de tentativa, desde que o patrimônio tenha sido efetivamente subtraído.","gab":"ERRADO","com":"Errado. No latrocínio, o resultado morte é o que define a consumação. Súmula 610/STF: há latrocínio consumado quando a subtração não se consuma mas ocorre a morte. A recíproca também vale: se a morte não ocorre, é tentativa de latrocínio, mesmo com subtração consumada.","fund":"JURISPRUDÊNCIA: 'STF, Súmula 610: Há crime de latrocínio, quando o homicídio se consuma, ainda que não realize o agente a subtração de bens da vítima.' | DOUTRINA: 'A consumação do latrocínio depende da morte, não da subtração. Se houve subtração mas apenas lesão corporal, trata-se de tentativa de latrocínio.'","peg":"Latrocínio: morte consuma; subtração sem morte = tentativa. Súmula 610 STF."},{"n":14,"enun":"O crime de peculato-desvio, previsto no art. 312, § 1º, do Código Penal, exige que o agente se aproprie de dinheiro, valor ou bem móvel de que tem a posse em razão do cargo.","gab":"ERRADO","com":"Errado. O peculato-desvio (art. 312, caput, segunda parte) consiste em desviar o bem em proveito próprio ou alheio, não em apropriar-se. Apropriar-se é peculato-apropriação (primeira parte do caput). O § 1º trata do peculato-furto. Cada modalidade tem verbos diferentes.","fund":"LEI: 'Art. 312, caput, CP: Apropriar-se o funcionário público de dinheiro, valor ou qualquer outro bem móvel, público ou particular, de que tem a posse em razão do cargo, ou desviá-lo, em proveito próprio ou alheio. § 1º: Aplica-se a mesma pena, se o funcionário público, embora não tendo a posse do dinheiro, valor ou bem, o subtrai, ou concorre para que seja subtraído, em proveito próprio ou alheio, valendo-se de facilidade que lhe proporciona a qualidade de funcionário.'"},{"n":15,"enun":"O crime de concussão consuma-se com a efetiva obtenção da vantagem indevida exigida pelo funcionário público.","gab":"ERRADO","com":"Errado. Concussão é crime formal: consuma-se com a mera exigência da vantagem indevida, independente de o agente efetivamente recebê-la. É como a extorsão: o crime está na ameaça/exigência, não no pagamento. Se receber, é mero exaurimento.","fund":"LEI: 'Art. 316, caput, CP: Exigir, para si ou para outrem, direta ou indiretamente, ainda que fora da função ou antes de assumi-la, mas em razão dela, vantagem indevida.' | DOUTRINA: 'O verbo nuclear é exigir — crime formal, consumação antecipada. O recebimento é post factum impunível.'"},{"n":16,"enun":"A Lei Maria da Penha (Lei 11.340/2006) é aplicável a relações homoafetivas femininas, conforme entendimento do Superior Tribunal de Justiça.","gab":"CERTO","com":"Certo. A proteção da Lei Maria da Penha não se limita a relações heterossexuais. O STJ reconhece a aplicação em relações homoafetivas entre mulheres — o que importa é a situação de vulnerabilidade baseada no gênero, não a orientação sexual do casal.","fund":"JURISPRUDÊNCIA: 'STJ, REsp 1.977.124/SP, Rel. Min. Rogerio Schietti, 6ª T., j. 05/04/2022: a Lei Maria da Penha se aplica a relações homoafetivas femininas, desde que presente a motivação de gênero.' | LEI: 'Art. 5º, parágrafo único, Lei 11.340/2006: As relações pessoais enunciadas neste artigo independem de orientação sexual.'","jur_status":"PENDENTE"},{"n":17,"enun":"Nos crimes de competência do Tribunal do Júri, o desaforamento pode ser determinado de ofício pelo tribunal competente, independentemente de requerimento do Ministério Público, do assistente, do querelante ou do acusado.","gab":"ERRADO","com":"Errado. O desaforamento não pode ser determinado de ofício pelo tribunal. Depende de requerimento do MP, do assistente, do querelante, do acusado ou mediante representação do juiz competente. O tribunal é provocado — não age espontaneamente.","fund":"LEI: 'Art. 427, CPP: Se o interesse da ordem pública o reclamar ou houver dúvida sobre a imparcialidade do júri ou a segurança pessoal do acusado, o Tribunal, a requerimento do Ministério Público, do assistente, do querelante ou do acusado ou mediante representação do juiz competente, poderá determinar o desaforamento do julgamento para outra comarca.'","peg":"CEBRASPE coloca 'de ofício' para testar se o candidato sabe que depende de requerimento/representação."},{"n":18,"enun":"Segundo o Código Penal, a prescrição da pretensão punitiva, na modalidade retroativa, regula-se pela pena aplicada na sentença, não podendo, em nenhuma hipótese, ter por base pena superior à efetivamente fixada.","gab":"CERTO","com":"Certo. A prescrição retroativa (art. 110, §1º, CP) usa como base a pena concreta fixada na sentença, calculando-se para trás entre os marcos interruptivos. Nunca se usa pena superior à aplicada — seria punir o réu com um prazo prescricional mais longo do que sua condenação justifica.","fund":"LEI: 'Art. 110, § 1º, CP: A prescrição, depois da sentença condenatória com trânsito em julgado para a acusação ou depois de improvido seu recurso, regula-se pela pena aplicada, não podendo, em nenhuma hipótese, ter por termo inicial data anterior à da denúncia ou queixa.'"},{"n":19,"enun":"A embriaguez voluntária completa exclui a imputabilidade penal do agente, segundo a teoria da actio libera in causa adotada pelo Código Penal brasileiro.","gab":"ERRADO","com":"Errado. Pela actio libera in causa, a embriaguez voluntária ou culposa, mesmo se completa, NÃO exclui a imputabilidade. Só a embriaguez completa proveniente de caso fortuito ou força maior exclui (art. 28, §1º, CP). A ideia é que o agente foi livre na causa — quando decidiu beber.","fund":"LEI: 'Art. 28, II, CP: Não excluem a imputabilidade penal a embriaguez, voluntária ou culposa, pelo álcool ou substância de efeitos análogos.' | LEI: 'Art. 28, § 1º, CP: É isento de pena o agente que, por embriaguez completa, proveniente de caso fortuito ou força maior, era, ao tempo da ação ou da omissão, inteiramente incapaz de entender o caráter ilícito do fato ou de determinar-se de acordo com esse entendimento.'"},{"n":20,"enun":"A Lei de Drogas (Lei 11.343/2006) não admite a substituição da pena privativa de liberdade por restritiva de direitos para o condenado por tráfico de entorpecentes, conforme entendimento do Supremo Tribunal Federal.","gab":"ERRADO","com":"Errado. O STF, no HC 97.256/RS (Plenário, 2010), declarou incidentalmente a inconstitucionalidade da vedação do art. 44 da Lei 11.343/2006 e do art. 33, §4º, quanto à proibição de conversão. Portanto, é possível a substituição, se preenchidos os requisitos do art. 44 do CP.","fund":"JURISPRUDÊNCIA: 'STF, HC 97.256/RS, Rel. Min. Ayres Britto, Pleno, j. 01/09/2010: declarou inconstitucional a vedação de substituição de pena privativa de liberdade por restritiva de direitos nos crimes de tráfico.' | LEI: 'Art. 44, Lei 11.343/2006 (parte inconstitucional): vedava a conversão em restritiva de direitos — norma afastada pelo STF.'","jur_status":"PENDENTE"},{"n":21,"enun":"No concurso de pessoas, a participação de menor importância autoriza a redução da pena de um sexto a um terço, segundo o art. 29, § 1º, do Código Penal.","gab":"CERTO","com":"Certo. O partícipe cuja contribuição foi de menor importância (participação de menor importância) tem a pena diminuída de 1/6 a 1/3. É uma causa de diminuição que reconhece graus de participação — nem todo partícipe contribui igualmente para o crime.","fund":"LEI: 'Art. 29, § 1º, CP: Se a participação for de menor importância, a pena pode ser diminuída de um sexto a um terço.'"},{"n":22,"enun":"O flagrante preparado ou provocado caracteriza crime impossível, conforme Súmula 145 do Supremo Tribunal Federal.","gab":"CERTO","com":"Certo. No flagrante preparado, o agente é induzido a cometer o crime e, simultaneamente, providências são tomadas para que não se consume. É como uma armadilha: o crime nunca teria acontecido sem a provocação e nunca poderia se consumar — por isso é crime impossível.","fund":"JURISPRUDÊNCIA: 'STF, Súmula 145: Não há crime, quando a preparação do flagrante pela polícia torna impossível a sua consumação.' | DOUTRINA: 'Diferencia-se do flagrante esperado, em que a polícia aguarda o crime que já estava em preparação pelo agente — este é válido.'"},{"n":23,"enun":"O Estatuto do Desarmamento (Lei 10.826/2003) prevê que o porte ilegal de arma de fogo de uso restrito é crime inafiançável.","gab":"CERTO","com":"Certo. O art. 16, parágrafo único (atual redação dada pela Lei 13.497/2017), estabelece que os crimes de posse ou porte ilegal de arma de fogo de uso restrito são equiparados a hediondos e, portanto, inafiançáveis (art. 2º, II, Lei 8.072/90).","fund":"LEI: 'Art. 16, Lei 10.826/2003: Possuir, deter, portar, adquirir, fornecer, receber, ter em depósito, transportar, ceder, ainda que gratuitamente, emprestar, remeter, empregar, manter sob sua guarda ou ocultar arma de fogo, acessório ou munição de uso restrito. Pena — reclusão, de 3 a 6 anos, e multa.' | LEI: 'Parágrafo único, art. 16: equiparado a hediondo (Lei 13.497/2017).'"},{"n":24,"enun":"A atenuante genérica de confissão espontânea incide na segunda fase da dosimetria da pena, podendo reduzir a pena abaixo do mínimo legal, conforme entendimento consolidado do Superior Tribunal de Justiça.","gab":"ERRADO","com":"Errado. A confissão espontânea é atenuante genérica (art. 65, III, 'd', CP) e incide na 2ª fase. Contudo, a Súmula 231/STJ veda que atenuantes reduzam a pena abaixo do mínimo legal. Só causas de diminuição (3ª fase) podem fazê-lo.","fund":"JURISPRUDÊNCIA: 'STJ, Súmula 231: A incidência da circunstância atenuante não pode conduzir à redução da pena abaixo do mínimo legal.' | LEI: 'Art. 65, III, d, CP: confissão espontânea perante a autoridade — atenuante genérica.'"}]},{"nome":"Direito Processual Penal + Legislação Especial","comando":"A respeito dos sujeitos processuais, das provas, das prisões cautelares e dos procedimentos no processo penal, julgue os itens que se seguem.","itens":[{"n":25,"enun":"O juiz das garantias, introduzido pelo Pacote Anticrime, atua desde a instauração do inquérito policial até o recebimento da denúncia ou queixa-crime, sendo responsável pelo controle da legalidade das medidas cautelares na fase de investigação.","gab":"CERTO","com":"Certo. O juiz das garantias é o 'porteiro' da investigação: garante que as medidas cautelares (interceptação, busca, prisão) respeitem os direitos fundamentais. Sua atuação termina no recebimento da denúncia — daí em diante, quem assume é o juiz da instrução.","fund":"LEI: 'Art. 3º-B, CPP (Lei 13.964/2019): O juiz das garantias é responsável pelo controle da legalidade da investigação criminal e pela salvaguarda dos direitos individuais.' | JURISPRUDÊNCIA: 'STF, ADIs 6298/6299/6300/6305, Pleno, j. 23-24/08/2023: declarou constitucional o juiz das garantias, fixando que sua competência vai até o recebimento da denúncia.'"},{"n":26,"enun":"A decisão de recebimento da denúncia é competência do juiz das garantias, conforme o entendimento fixado pelo Supremo Tribunal Federal ao julgar a constitucionalidade do instituto.","gab":"ERRADO","com":"Errado. O STF fixou que o recebimento da denúncia fica com o juiz da instrução e julgamento, não com o juiz das garantias. A ideia é que o ato de receber a denúncia já é um juízo sobre a viabilidade da ação penal — pertence à fase processual, não à investigativa.","fund":"JURISPRUDÊNCIA: 'STF, ADIs 6298/6299/6300/6305, Pleno, j. 23-24/08/2023: fixou que o recebimento da denúncia permanece com o juiz da instrução e julgamento, não com o juiz das garantias.'","peg":"CEBRASPE pode afirmar que o juiz das garantias recebe a denúncia — errado. Ele atua ATÉ o recebimento, mas quem recebe é o juiz da instrução."},{"n":27,"enun":"O impedimento do juiz no processo penal está previsto em rol taxativo no Código de Processo Penal, gerando presunção absoluta de parcialidade.","gab":"CERTO","com":"Certo. As causas de impedimento (art. 252, CPP) formam rol taxativo e geram presunção absoluta (juris et de jure) de parcialidade. São situações tão graves que a lei não admite prova em contrário — o juiz simplesmente não pode atuar.","fund":"LEI: 'Art. 252, CPP: O juiz não poderá exercer jurisdição no processo em que: I – tiver funcionado seu cônjuge ou parente...; II – ele próprio houver desempenhado qualquer dessas funções...' | DOUTRINA: 'Impedimento = rol taxativo, presunção absoluta. Suspeição (art. 254) = rol exemplificativo, presunção relativa.'"},{"n":28,"enun":"As causas de suspeição do juiz no processo penal estão previstas em rol exemplificativo, gerando presunção relativa de parcialidade, admitindo, portanto, prova em contrário.","gab":"CERTO","com":"Certo. Suspeição (art. 254, CPP) é rol exemplificativo — outras situações podem gerar suspeição além das listadas. A presunção é relativa: o juiz pode demonstrar que, apesar da circunstância, mantém imparcialidade.","fund":"LEI: 'Art. 254, CPP: O juiz dar-se-á por suspeito, e, se não o fizer, poderá ser recusado por qualquer das partes: I – se for amigo íntimo ou inimigo capital de qualquer deles...' | DOUTRINA: 'O rol do art. 254 é exemplificativo (presunção relativa), diferente do art. 252 (impedimento, taxativo, presunção absoluta).'"},{"n":29,"enun":"No processo penal, o juiz pode determinar de ofício a produção antecipada de provas consideradas urgentes e relevantes, observado o contraditório, conforme previsto no art. 156 do CPP.","gab":"CERTO","com":"Certo. Apesar da tensão com o art. 3º-A (sistema acusatório), o art. 156, I, do CPP permite que o juiz ordene de ofício a produção antecipada de provas urgentes. O STF não declarou inconstitucional esse dispositivo ao julgar o Pacote Anticrime.","fund":"LEI: 'Art. 156, I, CPP: A prova da alegação incumbirá a quem a fizer, sendo, porém, facultado ao juiz de ofício: I – ordenar, mesmo antes de iniciada a ação penal, a produção antecipada de provas consideradas urgentes e relevantes, observando a necessidade, adequação e proporcionalidade da medida.'"},{"n":30,"enun":"A falta de defesa técnica no processo penal constitui nulidade relativa, que somente será reconhecida mediante demonstração de efetivo prejuízo ao acusado.","gab":"ERRADO","com":"Errado. A falta de defesa técnica é nulidade absoluta — não exige prova de prejuízo. É a defesa deficiente que gera nulidade relativa (Súmula 523/STF). Pense: sem advogado = processo nulo sempre; com advogado ruim = nulo só se provar que prejudicou.","fund":"JURISPRUDÊNCIA: 'STF, Súmula 523: No processo penal, a falta da defesa constitui nulidade absoluta, mas a sua deficiência só o anulará se houver prova de prejuízo para o réu.' | LEI: 'Art. 261, CPP: Nenhum acusado, ainda que ausente ou foragido, será processado ou julgado sem defensor.'","peg":"CEBRASPE troca 'falta' por 'deficiência' ou vice-versa. Falta = absoluta. Deficiência = relativa (com prejuízo)."},{"n":31,"enun":"O assistente de acusação pode habilitar-se no processo penal a partir da instauração do inquérito policial, atuando ao lado do Ministério Público durante toda a persecução penal.","gab":"ERRADO","com":"Errado. O assistente só pode intervir após o recebimento da denúncia — não atua no inquérito policial. O inquérito é procedimento administrativo, não processual. O assistente é sujeito processual, e só há processo após o recebimento da denúncia.","fund":"LEI: 'Art. 268, CPP: Em todos os termos da ação pública, poderá intervir, como assistente do Ministério Público, o ofendido ou seu representante legal, ou, na falta, qualquer das pessoas mencionadas no art. 31.' | DOUTRINA: 'A expressão ação pública indica fase processual — o assistente não atua no inquérito.'"},{"n":32,"enun":"São legitimados para atuar como assistentes de acusação, na falta do ofendido, o cônjuge, o ascendente, o descendente ou o irmão, denominados pela doutrina de CADI.","gab":"CERTO","com":"Certo. O CADI é o mnemônico clássico: Cônjuge, Ascendente, Descendente, Irmão. Essas pessoas podem atuar como assistentes quando o ofendido não pode — por morte, incapacidade ou outro motivo.","fund":"LEI: 'Art. 31, CPP: No caso de morte do ofendido ou quando declarado ausente por decisão judicial, o direito de oferecer queixa ou prosseguir na ação passará ao cônjuge, ascendente, descendente ou irmão.' | LEI: 'Art. 268, CPP: referência ao art. 31 para legitimação subsidiária do assistente.'"},{"n":33,"enun":"O interrogatório do acusado é o primeiro ato da instrução processual, funcionando como meio de prova a ser valorado pelo juiz na formação de sua convicção.","gab":"ERRADO","com":"Errado. Desde a Lei 11.719/2008, o interrogatório é o último ato da instrução (art. 400, CPP), não o primeiro. Além disso, é meio de defesa — não meio de prova. Ao ser interrogado por último, o réu já conhece todas as provas contra si e pode se defender melhor.","fund":"LEI: 'Art. 400, CPP: Na audiência de instrução e julgamento, a ser realizada no prazo máximo de 60 dias, proceder-se-á à tomada de declarações do ofendido, à inquirição das testemunhas arroladas pela acusação e pela defesa, nesta ordem, ressalvado o disposto no art. 222 deste Código, bem como aos esclarecimentos dos peritos, às acareações e ao reconhecimento de pessoas e coisas, interrogando-se, em seguida, o acusado.'","peg":"CEBRASPE inverte a posição do interrogatório — é o ÚLTIMO ato, não o primeiro."},{"n":34,"enun":"O direito ao silêncio do acusado, previsto na Constituição Federal e no Código de Processo Penal, garante que o silêncio não poderá ser interpretado em prejuízo da defesa.","gab":"CERTO","com":"Certo. O nemo tenetur se detegere (não ser obrigado a produzir prova contra si) é direito fundamental. O silêncio é exercício de direito constitucional — usá-lo contra o réu seria punir quem exerce um direito.","fund":"LEI: 'Art. 5º, LXIII, CF: o preso será informado de seus direitos, entre os quais o de permanecer calado.' | LEI: 'Art. 186, parágrafo único, CPP: O silêncio, que não importará em confissão, não poderá ser interpretado em prejuízo da defesa.'"},{"n":35,"enun":"A prisão preventiva pode ser decretada de ofício pelo juiz durante o curso da ação penal, conforme a redação do art. 311 do CPP dada pelo Pacote Anticrime.","gab":"ERRADO","com":"Errado. O Pacote Anticrime (Lei 13.964/2019) retirou a possibilidade de decretação de ofício. Agora, a preventiva só pode ser decretada a requerimento do MP, do querelante, do assistente ou por representação da autoridade policial. Sistema acusatório: juiz não acusa nem prende de ofício.","fund":"LEI: 'Art. 311, CPP (redação da Lei 13.964/2019): Em qualquer fase da investigação policial ou do processo penal, caberá a prisão preventiva decretada pelo juiz, a requerimento do Ministério Público, do querelante ou do assistente, ou por representação da autoridade policial.'","peg":"CEBRASPE pode usar a redação antiga ('de ofício durante o processo') — Pacote Anticrime eliminou isso."},{"n":36,"enun":"A decisão que decreta a prisão preventiva deve ser fundamentada com base em elementos concretos que justifiquem a medida, não bastando a mera reprodução dos requisitos legais.","gab":"CERTO","com":"Certo. O art. 315, §2º do CPP (Pacote Anticrime) exige que a fundamentação demonstre o nexo concreto entre os fatos e a necessidade da prisão. Fundamentação genérica (apenas copiar o texto da lei) equivale a ausência de fundamentação — gera nulidade.","fund":"LEI: 'Art. 315, § 2º, CPP: Não se considera fundamentada qualquer decisão judicial, seja ela interlocutória, sentença ou acórdão, que: I – limitar-se à indicação, à reprodução ou à paráfrase de ato normativo, sem explicar sua relação com a causa ou a questão decidida; II – empregar conceitos jurídicos indeterminados, sem explicar o motivo concreto de sua incidência no caso.'"},{"n":37,"enun":"O reconhecimento de pessoas, para ser válido, deve observar as formalidades previstas no art. 226 do Código de Processo Penal, inclusive a colocação da pessoa a ser reconhecida ao lado de outras que com ela tiverem semelhança.","gab":"CERTO","com":"Certo. O STJ consolidou (HC 598.886/SC) que as formalidades do art. 226 são obrigatórias, não meras recomendações. O reconhecimento sem observância dessas formalidades — especialmente a colocação lado a lado com pessoas semelhantes — não tem força probatória.","fund":"JURISPRUDÊNCIA: 'STJ, HC 598.886/SC, Rel. Min. Rogerio Schietti Cruz, 6ª T., j. 27/10/2020: as formalidades do art. 226 do CPP são obrigatórias, constituindo garantia mínima para quem é submetido ao reconhecimento.' | LEI: 'Art. 226, II, CPP: a pessoa, cujo reconhecimento se pretender, será colocada, se possível, ao lado de outras que com ela tiverem qualquer semelhança.'","jur_status":"OK"},{"n":38,"enun":"A busca pessoal, segundo o Superior Tribunal de Justiça, prescinde de fundada suspeita quando realizada em contexto de operação policial previamente planejada.","gab":"ERRADO","com":"Errado. O STJ (RHC 158.580/BA) fixou que a busca pessoal exige fundada suspeita prévia, objetiva e específica — mesmo em operação policial. Não basta o contexto genérico da operação: é preciso haver razão concreta para abordar aquela pessoa específica.","fund":"JURISPRUDÊNCIA: 'STJ, RHC 158.580/BA, Rel. Min. Rogerio Schietti Cruz, 6ª T., j. 19/04/2022: a busca pessoal exige fundada suspeita de que a pessoa esteja na posse de arma proibida, objetos ou papéis que constituam corpo de delito, fundada em razões concretas, objetivas e específicas.'","jur_status":"OK"},{"n":39,"enun":"O réu citado por edital que não comparece nem constitui advogado terá o processo e o prazo prescricional suspensos, conforme dispõe o art. 366 do Código de Processo Penal.","gab":"CERTO","com":"Certo. O art. 366 é a regra do 'dupla suspensão': processo + prescrição. A ideia é evitar julgamento à revelia sem ciência real do réu, mas também impedir que a inércia do acusado leve à prescrição.","fund":"LEI: 'Art. 366, CPP: Se o acusado, citado por edital, não comparecer, nem constituir advogado, ficarão suspensos o processo e o curso do prazo prescricional.'"},{"n":40,"enun":"A interceptação telefônica pode ser determinada pelo delegado de polícia, em caso de urgência, durante o inquérito policial, devendo ser comunicada ao juiz em até vinte e quatro horas.","gab":"ERRADO","com":"Errado. A interceptação telefônica depende de ordem judicial — é reserva de jurisdição absoluta (art. 5º, XII, CF). Delegado não pode autorizá-la em nenhuma hipótese, nem mesmo em urgência. Diferente da busca domiciliar, que admite flagrante delito sem mandado.","fund":"LEI: 'Art. 5º, XII, CF: é inviolável o sigilo da correspondência e das comunicações telegráficas, de dados e das comunicações telefônicas, salvo, no último caso, por ordem judicial, nas hipóteses e na forma que a lei estabelecer para fins de investigação criminal ou instrução processual penal.' | LEI: 'Art. 1º, Lei 9.296/1996: A interceptação de comunicações telefônicas dependerá de ordem do juiz competente.'"},{"n":41,"enun":"A execução provisória da pena privativa de liberdade após condenação em segunda instância é admitida pelo Supremo Tribunal Federal, conforme julgamento das Ações Declaratórias de Constitucionalidade 43, 44 e 54.","gab":"ERRADO","com":"Errado. Nas ADCs 43/44/54 (Plenário, 07/11/2019), o STF decidiu que a execução da pena só pode iniciar após o trânsito em julgado. Inverteu o entendimento anterior (HC 126.292/2016) que admitia a execução provisória após 2ª instância.","fund":"JURISPRUDÊNCIA: 'STF, ADCs 43/44/54, Rel. Min. Marco Aurélio, Pleno, j. 07/11/2019: é constitucional a regra do art. 283 do CPP que condiciona o início do cumprimento da pena ao trânsito em julgado da sentença condenatória.' | LEI: 'Art. 283, CPP: Ninguém poderá ser preso senão em flagrante delito ou por ordem escrita e fundamentada da autoridade judiciária competente.'"},{"n":42,"enun":"O acordo de não persecução penal, previsto no art. 28-A do CPP, pode ser proposto pelo Ministério Público para crimes cuja pena mínima seja inferior a quatro anos, desde que o crime não tenha sido cometido com violência ou grave ameaça.","gab":"CERTO","com":"Certo. O ANPP é um instrumento de justiça negocial: o MP propõe condições ao investigado que confessa, evitando o processo. Requisitos: pena mínima < 4 anos, sem violência/grave ameaça, confissão formal. É diferente da transação penal (JECrim) — que exige pena máxima ≤ 2 anos.","fund":"LEI: 'Art. 28-A, CPP: Não sendo caso de arquivamento e tendo o investigado confessado formal e circunstancialmente a prática de infração penal sem violência ou grave ameaça e com pena mínima inferior a 4 (quatro) anos, o Ministério Público poderá propor acordo de não persecução penal.'"},{"n":43,"enun":"A entrada forçada da polícia em domicílio, sem mandado judicial, para execução de prisão em flagrante, somente é lícita se houver fundadas razões, devidamente justificadas a posteriori, conforme entendimento fixado pelo Supremo Tribunal Federal no RE 603.616.","gab":"CERTO","com":"Certo. O STF (Tema 280, RE 603.616) fixou que a entrada sem mandado precisa de fundadas razões, não bastando mera suspeita. E essas razões devem ser justificadas posteriormente — o ônus recai sobre a polícia, não sobre o morador.","fund":"JURISPRUDÊNCIA: 'STF, RE 603.616/RO, Rel. Min. Gilmar Mendes, Pleno, j. 05/11/2015 (Tema 280): a entrada forçada em domicílio sem mandado judicial só é lícita, mesmo em período noturno, quando amparada em fundadas razões, devidamente justificadas a posteriori, que indiquem que dentro da casa ocorre situação de flagrante delito.'","jur_status":"OK"},{"n":44,"enun":"As provas obtidas por meios ilícitos são inadmissíveis no processo penal, contudo, podem ser utilizadas em favor do réu, por aplicação do princípio da proporcionalidade pro reo.","gab":"CERTO","com":"Certo. A vedação às provas ilícitas (art. 5º, LVI, CF) protege o indivíduo contra o Estado. Quando a prova ilícita beneficia o réu, a doutrina majoritária admite seu uso — o direito à liberdade e à ampla defesa prevalece sobre a regra de exclusão.","fund":"LEI: 'Art. 5º, LVI, CF: são inadmissíveis, no processo, as provas obtidas por meios ilícitos.' | DOUTRINA: 'Ada Pellegrini Grinover: a prova ilícita pro reo é admissível pelo princípio da proporcionalidade — os direitos fundamentais do acusado (liberdade, ampla defesa) prevalecem sobre a regra de exclusão.' | JURISPRUDÊNCIA: 'Doutrina e jurisprudência admitem a prova ilícita pro reo por proporcionalidade.'"},{"n":45,"enun":"O Ministério Público, como titular da ação penal pública, não pode requerer a absolvição do réu, devendo sempre sustentar a acusação.","gab":"ERRADO","com":"Errado. O MP é parte imparcial: se, ao final da instrução, se convencer da inocência, deve pedir absolvição. O art. 385 do CPP vai além — permite que o juiz condene mesmo quando o MP pede absolvição. Mas o dever do MP é buscar a verdade, não a condenação a qualquer custo.","fund":"LEI: 'Art. 385, CPP: Nos crimes de ação pública, o juiz poderá proferir sentença condenatória, ainda que o Ministério Público tenha opinado pela absolvição.' | DOUTRINA: 'O MP atua como custus legis — se as provas não sustentam a acusação, deve manifestar-se pela absolvição.'"},{"n":46,"enun":"O assistente de acusação possui prazo supletivo de quinze dias para interpor recurso de apelação, contado a partir do término do prazo concedido ao Ministério Público.","gab":"ERRADO","com":"Errado. O prazo supletivo do assistente não habilitado é de 15 dias, mas conta-se a partir do término do prazo do MP (que é de 5 dias). Porém, o assistente já habilitado tem prazo de 5 dias (art. 598, parágrafo único, CPP). A questão erra ao generalizar 15 dias sem distinguir — e o prazo de apelação do assistente habilitado é 5 dias, não 15.","fund":"LEI: 'Art. 598, parágrafo único, CPP: O prazo do assistente para apelar é de 5 (cinco) dias, contado da publicação ou da intimação da sentença.' | DOUTRINA: 'O prazo supletivo de 15 dias (art. 598, caput) aplica-se ao assistente não habilitado, contado do término do prazo do MP. O habilitado tem prazo próprio de 5 dias.'"}]},{"nome":"Direito Constitucional + Legislação Complementar","comando":"A respeito dos remédios constitucionais, dos direitos e garantias fundamentais e da organização do Estado, julgue os itens subsequentes.","itens":[{"n":47,"enun":"O habeas corpus é ação constitucional que pode ser impetrada por qualquer pessoa, inclusive pelo Ministério Público, em favor de quem sofra ou se ache ameaçado de sofrer violência ou coação em sua liberdade de locomoção, por ilegalidade ou abuso de poder.","gab":"CERTO","com":"Certo. O HC é o remédio mais democrático: qualquer pessoa pode impetrar, inclusive analfabeto, preso, estrangeiro e o próprio MP. Não exige advogado. É o 'pronto-socorro' da liberdade — qualquer um pode chamar a ambulância.","fund":"LEI: 'Art. 5º, LXVIII, CF: conceder-se-á habeas corpus sempre que alguém sofrer ou se achar ameaçado de sofrer violência ou coação em sua liberdade de locomoção, por
