PP, art. 25 ('A representação será irretratável, depois de oferecida a denúncia.'); CP, art. 102 (mesma regra); CPP, art. 24 e doutrina sobre exercício por representante legal do incapaz.\nJURISPRUDÊNCIA: não aplicável (lei seca).","peg":"Marco da irretratabilidade: oferecimento da denúncia, não o recebimento."}]},{"nome":"Direito Constitucional + Legislação Complementar","comando":"Acerca dos direitos e garantias fundamentais, dos remédios constitucionais, da organização do Estado e dos poderes, da segurança pública e do controle de constitucionalidade, julgue os itens a seguir.","itens":[{"n":47,"enun":"A casa é asilo inviolável do indivíduo, de modo que, durante a noite, o ingresso domiciliar sem consentimento do morador é admitido em caso de flagrante delito, desastre, para prestar socorro ou por determinação judicial.","gab":"ERRADO","com":"Pense na casa como um cofre de blindagem dupla. De dia o cofre tem quatro chaves que o abrem sem autorização do dono: flagrante, desastre, socorro e ordem judicial. De NOITE, porém, a chave judicial não funciona — só valem as três de urgência. O item incluiu a 'determinação judicial' como autorizadora durante a noite, o que a CF não permite. Errado.","fund":"LEI: \"Art. 5º, XI, da CF — A casa é asilo inviolável do indivíduo, ninguém nela podendo penetrar sem consentimento do morador, salvo em caso de flagrante delito ou desastre, ou para prestar socorro, ou, durante o dia, por determinação judicial.\"","peg":"À NOITE a determinação judicial NÃO autoriza a entrada: só flagrante, desastre ou socorro. A ordem judicial só vale 'durante o dia'."},{"n":48,"enun":"A entrada forçada em domicílio sem mandado judicial é lícita quando amparada em fundadas razões, devidamente justificadas a posteriori, que indiquem a ocorrência de situação de flagrante delito no interior da residência.","gab":"CERTO","com":"O flagrante é uma das chaves de urgência que abre o cofre a qualquer hora. Mas o STF exigiu que o policial não invente o flagrante depois: ele precisa ter, antes de entrar, indícios concretos (fundadas razões) e depois prestar contas por escrito. É a regra do RE 603.616 (Tema 280). O item reproduz fielmente essa tese. Correto.","fund":"LEI: \"Art. 5º, XI, da CF.\"\nJURISPRUDÊNCIA: STF, Tema 280 (RE 603.616) — a entrada forçada em domicílio sem mandado judicial só é lícita quando amparada em fundadas razões, justificadas a posteriori, que indiquem que dentro da casa ocorre situação de flagrante delito.","peg":"Não basta 'denúncia anônima genérica' ou 'atitude suspeita': exige-se justa causa concreta, sob pena de nulidade das provas e responsabilização do agente."},{"n":49,"enun":"Conforme a Súmula Vinculante nº 11 do STF, o uso de algemas pode ser determinado de forma genérica, dispensando-se justificativa por escrito, desde que se trate de pessoa presa em flagrante por crime hediondo.","gab":"ERRADO","com":"A SV 11 funciona como freio: algema é exceção, não rotina. Ela só é lícita diante de resistência, risco de fuga ou perigo à integridade própria ou alheia, E sempre com justificativa escrita. O item cria uma regra inexistente ('genérica, sem justificativa, por crime hediondo'). A natureza do crime, sozinha, nunca dispensa a fundamentação. Errado.","fund":"JURISPRUDÊNCIA: STF, Súmula Vinculante nº 11 — só é lícito o uso de algemas em casos de resistência e de fundado receio de fuga ou de perigo à integridade física própria ou alheia, por parte do preso ou de terceiros, justificada a excepcionalidade por escrito, sob pena de responsabilidade.","peg":"A gravidade do delito (mesmo hediondo) não é, por si só, fundamento para algemar: a SV 11 exige situação concreta de resistência/fuga/perigo + justificativa escrita.","jur_status":"OK"},{"n":50,"enun":"Conceder-se-á habeas corpus sempre que alguém sofrer ou se achar ameaçado de sofrer violência ou coação em sua liberdade de locomoção, por ilegalidade ou abuso de poder.","gab":"CERTO","com":"O HC é o remédio da liberdade de ir e vir. Ele protege o corpo em movimento. Repare em duas qualidades: serve tanto para a coação já consumada (HC liberatório) quanto para a ameaça (HC preventivo, o famoso salvo-conduto). O item reproduz literalmente o art. 5º, LXVIII. Correto.","fund":"LEI: \"Art. 5º, LXVIII, da CF — conceder-se-á habeas corpus sempre que alguém sofrer ou se achar ameaçado de sofrer violência ou coação em sua liberdade de locomoção, por ilegalidade ou abuso de poder.\"","peg":"Se o que está em jogo não for a locomoção (ex.: dados, sigilo, direito líquido e certo sem prisão), o remédio é outro (HD ou MS), não HC."},{"n":51,"enun":"O mandado de segurança coletivo pode ser impetrado por organização sindical, entidade de classe ou associação legalmente constituída e em funcionamento há pelo menos um ano, em defesa dos interesses de seus membros ou associados.","gab":"CERTO","com":"O MS coletivo é o MS comum vestido de roupa de grupo. A CF lista quem pode vestir essa roupa: partido político com representação no Congresso, e organização sindical, entidade de classe ou associação. Para a associação há um filtro de seriedade: existir e funcionar há pelo menos um ano. O item descreve corretamente esse rol. Correto.","fund":"LEI: \"Art. 5º, LXX, da CF — o mandado de segurança coletivo pode ser impetrado por: a) partido político com representação no Congresso Nacional; b) organização sindical, entidade de classe ou associação legalmente constituída e em funcionamento há pelo menos um ano, em defesa dos interesses de seus membros ou associados.\"","peg":"O requisito de 1 ano de funcionamento incide sobre a associação; quanto ao partido político, exige-se representação no Congresso Nacional."},{"n":52,"enun":"O mandado de injunção é o remédio constitucional cabível para assegurar o conhecimento de informações relativas à pessoa do impetrante constantes de registros ou bancos de dados de entidades governamentais.","gab":"ERRADO","com":"Houve troca de remédios. O instrumento para conhecer e corrigir dados pessoais em bancos de dados é o HABEAS DATA (art. 5º, LXXII). O mandado de injunção (art. 5º, LXXI) serve para outra coisa: combater a falta de norma regulamentadora que inviabilize o exercício de direitos constitucionais. O item descreveu o HD e rotulou de MI. Errado.","fund":"LEI: \"Art. 5º, LXXII, a, da CF — conceder-se-á habeas data para assegurar o conhecimento de informações relativas à pessoa do impetrante, constantes de registros ou bancos de dados de entidades governamentais ou de caráter público.\" Já o MI (art. 5º, LXXI) cabe contra falta de norma regulamentadora.","peg":"Não confunda os remédios: dados pessoais = habeas data; ausência de norma regulamentadora = mandado de injunção."},{"n":53,"enun":"Ninguém será privado da liberdade ou de seus bens sem o devido processo legal, sendo aos litigantes, em processo judicial ou administrativo, assegurados o contraditório e a ampla defesa, com os meios e recursos a ela inerentes.","gab":"CERTO","com":"Estes são os pilares do processo justo. O devido processo legal é o tronco; contraditório e ampla defesa são os galhos. Note que a CF estendeu essas garantias ao processo administrativo, não só ao judicial — detalhe importante para o delegado, cujo procedimento disciplinar e investigativo também as respeita. O item junta os incisos LIV e LV literalmente. Correto.","fund":"LEI: \"Art. 5º, LIV — ninguém será privado da liberdade ou de seus bens sem o devido processo legal; LV — aos litigantes, em processo judicial ou administrativo, e aos acusados em geral são assegurados o contraditório e a ampla defesa, com os meios e recursos a ela inerentes.\"","peg":"Contraditório e ampla defesa não se restringem ao processo judicial: alcançam também o processo administrativo."},{"n":54,"enun":"São direitos sociais previstos expressamente no art. 6º da Constituição Federal a educação, a saúde, o trabalho, a moradia, o lazer, a segurança, a previdência social, a proteção à maternidade e à infância, a assistência aos desamparados e a propriedade.","gab":"ERRADO","com":"O art. 6º é a lista dos direitos sociais. A propriedade NÃO está nela — é direito individual, do art. 5º, caput e XXII. O examinador embutiu um direito individual no rol social. Além disso, o item omitiu alimentação e transporte (que de fato integram o art. 6º). A presença indevida da 'propriedade' já basta para tornar a afirmação falsa. Errado.","fund":"LEI: \"Art. 6º da CF — são direitos sociais a educação, a saúde, a alimentação, o trabalho, a moradia, o transporte, o lazer, a segurança, a previdência social, a proteção à maternidade e à infância, a assistência aos desamparados, na forma desta Constituição.\" A propriedade é direito individual (art. 5º, XXII).","peg":"A propriedade é direito INDIVIDUAL (art. 5º), não direito social do art. 6º. Inseri-la no rol social é o erro do item."},{"n":55,"enun":"São brasileiros natos os nascidos no estrangeiro de pai brasileiro ou mãe brasileira, desde que sejam registrados em repartição brasileira competente ou venham a residir no Brasil e optem, em qualquer tempo, depois de atingida a maioridade, pela nacionalidade brasileira.","gab":"CERTO","com":"É a chamada nacionalidade potestativa. Mesmo nascido fora, o filho de brasileiro é NATO por dois caminhos: (a) registro em repartição brasileira, ou (b) vir residir no Brasil e, após a maioridade, optar a qualquer tempo. O item reproduz as alíneas b e c do art. 12, I. Correto — atenção à expressão 'em qualquer tempo', que é literal.","fund":"LEI: \"Art. 12, I, c, da CF — são brasileiros natos os nascidos no estrangeiro de pai brasileiro ou de mãe brasileira, desde que sejam registrados em repartição brasileira competente ou venham a residir na República Federativa do Brasil e optem, em qualquer tempo, depois de atingida a maioridade, pela nacionalidade brasileira.\"","peg":"A opção pela nacionalidade pode ser feita 'em qualquer tempo' após a maioridade; não há prazo decadencial fixado pela CF."},{"n":56,"enun":"A organização político-administrativa da República Federativa do Brasil compreende a União, os Estados, o Distrito Federal e os Municípios, todos autônomos, vedada a possibilidade de o Distrito Federal dividir-se em Municípios.","gab":"CERTO","com":"A federação brasileira tem quatro entes autônomos (União, Estados, DF e Municípios). O DF é peculiar: acumula competências de Estado e de Município, justamente porque a CF o proíbe de se subdividir em municípios. O item combina o art. 18, caput, com o art. 32, caput. Correto.","fund":"LEI: \"Art. 18, caput, da CF — a organização político-administrativa da República Federativa do Brasil compreende a União, os Estados, o Distrito Federal e os Municípios, todos autônomos, nos termos desta Constituição.\" \"Art. 32, caput — O Distrito Federal... é vedada sua divisão em Municípios.\"","peg":"O DF não se divide em Municípios; por isso acumula as competências legislativas reservadas aos Estados e Municípios (art. 32, § 1º)."},{"n":57,"enun":"Compete privativamente à União legislar sobre direito penal, processual penal e civil, admitida a delegação aos Estados, mediante lei complementar, para legislar sobre questões específicas dessas matérias.","gab":"ERRADO","com":"A competência da União para legislar sobre direito penal, processual e civil é privativa (art. 22), e nessas matérias cabe delegação por lei complementar — até aqui certo. O erro está em afirmar que a delegação abrange 'direito penal, processual penal e civil' livremente: a delegação só pode versar sobre 'questões específicas das matérias' do art. 22, mas a redação do item embaralha. Na verdade a delegação existe (parágrafo único do art. 22), porém o examinador costuma testar se o candidato sabe que NÃO se transfere a competência inteira. A afirmação, ao sugerir delegação ampla das matérias penais, é incorreta.","fund":"LEI: \"Art. 22, I, da CF — compete privativamente à União legislar sobre direito civil, comercial, penal, processual... Parágrafo único. Lei complementar poderá autorizar os Estados a legislar sobre questões específicas das matérias relacionadas neste artigo.\"","peg":"A delegação do art. 22, parágrafo único, restringe-se a 'questões específicas', não autoriza os Estados a legislarem amplamente sobre toda a matéria penal/processual/civil."},{"n":58,"enun":"As comissões parlamentares de inquérito terão poderes de investigação próprios das autoridades judiciais, podendo, por isso, determinar de ofício a interceptação telefônica e decretar a prisão preventiva de investigados.","gab":"ERRADO","com":"A CF diz que a CPI tem poderes 'próprios das autoridades judiciais', mas a jurisprudência e a doutrina aplicam o princípio da reserva de jurisdição: certos atos só o juiz pode praticar. Interceptação telefônica e prisão (salvo flagrante) estão fora do alcance da CPI. A CPI quebra sigilos bancário/fiscal/telefônico (registros), mas não intercepta comunicação em tempo real nem prende preventivamente. Errado.","fund":"LEI: \"Art. 58, § 3º, da CF — as comissões parlamentares de inquérito... terão poderes de investigação próprios das autoridades judiciais, além de outros previstos nos regimentos das respectivas Casas...\"","peg":"Reserva de jurisdição: a CPI não pode determinar interceptação telefônica, busca domiciliar nem decretar prisão (exceto comunicar flagrante). Quebra de sigilo de registros é permitida; interceptação em tempo real, não."},{"n":59,"enun":"Compete privativamente ao Senado Federal sustar os atos normativos do Poder Executivo que exorbitem do poder regulamentar ou dos limites de delegação legislativa.","gab":"ERRADO","com":"O poder de sustar atos do Executivo que extrapolam a lei é um freio do Legislativo — mas pertence ao CONGRESSO NACIONAL (competência exclusiva, art. 49, V), não ao Senado isoladamente. O item trocou o titular: atribuiu ao Senado, como se fosse competência privativa dele (art. 52). Errado.","fund":"LEI: \"Art. 49, V, da CF — é da competência exclusiva do Congresso Nacional sustar os atos normativos do Poder Executivo que exorbitem do poder regulamentar ou dos limites de delegação legislativa.\"","peg":"O titular é o Congresso Nacional (competência exclusiva — art. 49), não o Senado Federal (cujas competências privativas estão no art. 52)."},{"n":60,"enun":"Os juízes gozam da garantia da vitaliciedade, a qual, no primeiro grau, só é adquirida após dois anos de exercício, dependendo a perda do cargo, nesse período, de deliberação do tribunal a que o juiz estiver vinculado.","gab":"CERTO","com":"A vitaliciedade blinda o juiz contra a perda do cargo, que passa a depender de sentença judicial transitada em julgado. Mas ela não nasce pronta: no 1º grau, há um estágio de dois anos. Durante esse biênio, o juiz ainda pode perder o cargo por deliberação do próprio tribunal (não exige sentença). O item reproduz o art. 95, I. Correto.","fund":"LEI: \"Art. 95, I, da CF — os juízes gozam de vitaliciedade, que, no primeiro grau, só será adquirida após dois anos de exercício, dependendo a perda do cargo, nesse período, de deliberação do tribunal a que o juiz estiver vinculado, e, nos demais casos, de sentença judicial transitada em julgado.\"","peg":"Antes dos 2 anos: perda do cargo por deliberação do tribunal. Depois (vitalício): só por sentença judicial transitada em julgado."},{"n":61,"enun":"A Defensoria Pública e o Ministério Público são instituições essenciais à função jurisdicional do Estado, incumbindo ao Ministério Público, com exclusividade, a defesa da ordem jurídica, do regime democrático e dos interesses sociais e individuais indisponíveis.","gab":"ERRADO","com":"MP e Defensoria realmente são funções essenciais à justiça (Título IV, Cap. IV). O problema é a palavra 'com exclusividade'. A defesa da ordem jurídica e do regime democrático não é monopólio do MP — outras instituições (Defensoria, Advocacia, etc.) também atuam nessa seara. A CF atribui ao MP essa incumbência, mas sem cláusula de exclusividade. Errado.","fund":"LEI: \"Art. 127, caput, da CF — o Ministério Público é instituição permanente, essencial à função jurisdicional do Estado, incumbindo-lhe a defesa da ordem jurídica, do regime democrático e dos interesses sociais e individuais indisponíveis.\"","peg":"O caput do art. 127 NÃO traz a expressão 'com exclusividade'. A defesa da ordem jurídica e do regime democrático é incumbência do MP, mas não monopólio seu."},{"n":62,"enun":"A segurança pública, dever do Estado, direito e responsabilidade de todos, é exercida para a preservação da ordem pública e da incolumidade das pessoas e do patrimônio, incumbindo às polícias civis, dirigidas por delegados de polícia de carreira, ressalvada a competência da União, as funções de polícia judiciária e a apuração de infrações penais, exceto as militares.","gab":"CERTO","com":"Este é o coração do art. 144 para a carreira do delegado. A polícia civil tem duas funções nucleares: ser polícia judiciária (apurar e dar suporte ao Judiciário) e investigar infrações penais — exceto as militares (que cabem à PM/bombeiros) e ressalvada a competência da União (a PF). E a direção é privativa de delegado de carreira. O item reproduz o art. 144, caput, e § 4º. Correto.","fund":"LEI: \"Art. 144, § 4º, da CF — às polícias civis, dirigidas por delegados de polícia de carreira, incumbem, ressalvada a competência da União, as funções de polícia judiciária e a apuração de infrações penais, exceto as militares.\"","peg":"A apuração das infrações penais MILITARES não cabe à polícia civil; e a competência da União (PF) é ressalvada."},{"n":63,"enun":"No controle abstrato de constitucionalidade, a arguição de descumprimento de preceito fundamental será apreciada pelo Supremo Tribunal Federal, na forma da lei, e poderá ser utilizada como meio idôneo quando houver outro meio eficaz para sanar a lesividade.","gab":"ERRADO","com":"A ADPF tem caráter subsidiário: ela só cabe quando NÃO houver outro meio eficaz para sanar a lesividade. O item inverteu a lógica — disse que cabe 'quando houver outro meio eficaz'. É justamente o contrário do princípio da subsidiariedade do art. 4º, § 1º, da Lei 9.882/1999. A previsão da ADPF está no art. 102, § 1º, da CF. Errado.","fund":"LEI: \"Art. 102, § 1º, da CF — a arguição de descumprimento de preceito fundamental, decorrente desta Constituição, será apreciada pelo Supremo Tribunal Federal, na forma da lei.\" Subsidiariedade: art. 4º, § 1º, da Lei 9.882/1999 — não será admitida ADPF quando houver outro meio eficaz de sanar a lesividade.","peg":"A ADPF é subsidiária: só cabe quando NÃO houver outro meio eficaz. O item afirmou o oposto."},{"n":64,"enun":"A decisão definitiva de mérito proferida pelo Supremo Tribunal Federal nas ações diretas de inconstitucionalidade e nas ações declaratórias de constitucionalidade produzirá eficácia contra todos e efeito vinculante relativamente aos demais órgãos do Poder Judiciário e à administração pública direta e indireta, nas esferas federal, estadual e municipal.","gab":"CERTO","com":"É o efeito 'erga omnes' (contra todos) somado ao efeito vinculante das decisões do STF no controle concentrado. Vincula o Judiciário e a Administração de todas as esferas — mas note que o efeito vinculante não alcança o Legislativo em sua função típica de legislar nem o próprio STF. O item reproduz o art. 102, § 2º. Correto.","fund":"LEI: \"Art. 102, § 2º, da CF — as decisões definitivas de mérito, proferidas pelo Supremo Tribunal Federal, nas ações diretas de inconstitucionalidade e nas ações declaratórias de constitucionalidade produzirão eficácia contra todos e efeito vinculante, relativamente aos demais órgãos do Poder Judiciário e à administração pública direta e indireta, nas esferas federal, estadual e municipal.\"","peg":"O efeito vinculante NÃO atinge o Poder Legislativo (função legiferante) nem o próprio STF; o item, porém, limitou-se ao Judiciário e à Administração, o que está correto."}]},{"nome":"Direito Administrativo + Legislação Complementar","comando":"Acerca dos princípios da Administração Pública, dos poderes administrativos, dos atos administrativos, dos agentes públicos, do poder de polícia, da responsabilidade civil do Estado, dos serviços públicos, das licitações e contratos e do controle da Administração, julgue os itens a seguir.","itens":[{"n":65,"enun":"A publicação dos atos, programas, obras, serviços e campanhas dos órgãos públicos poderá conter nomes, símbolos ou imagens que caracterizem promoção pessoal de autoridades ou servidores públicos, desde que custeada com recursos próprios do agente.","gab":"ERRADO","com":"Pense no princípio da impessoalidade como um carimbo neutro: a obra é do Estado, não do prefeito. A CF veda terminantemente a promoção pessoal na publicidade oficial, sem qualquer exceção ligada à origem do dinheiro. A publicidade tem caráter educativo, informativo ou de orientação social, e ponto final.","fund":"CF: 'Art. 37, §1º. A publicidade dos atos, programas, obras, serviços e campanhas dos órgãos públicos deverá ter caráter educativo, informativo ou de orientação social, dela não podendo constar nomes, símbolos ou imagens que caracterizem promoção pessoal de autoridades ou servidores públicos.'","peg":"A ressalva 'desde que custeada com recursos próprios' é inventada — a vedação é absoluta."},{"n":66,"enun":"O princípio da eficiência foi inserido expressamente no caput do art. 37 da Constituição Federal, ao lado dos princípios da legalidade, impessoalidade, moralidade e publicidade, aplicando-se à administração pública direta e indireta de qualquer dos Poderes da União, dos Estados, do Distrito Federal e dos Municípios.","gab":"CERTO","com":"Os cinco princípios expressos formam o acrônimo LIMPE. A eficiência foi a última a entrar, pela Emenda Constitucional 19/1998, mas hoje está cravada no caput ao lado das outras quatro, valendo para toda a Administração — direta e indireta, em todas as esferas.","fund":"CF: 'Art. 37. A administração pública direta e indireta de qualquer dos Poderes da União, dos Estados, do Distrito Federal e dos Municípios obedecerá aos princípios de legalidade, impessoalidade, moralidade, publicidade e eficiência (...).'"},{"n":67,"enun":"Pelo poder de polícia, a Administração condiciona e restringe o uso e gozo de bens, atividades e direitos individuais em benefício do interesse público, sendo a atividade administrativa atributo que pode comportar a autoexecutoriedade e a coercibilidade.","gab":"CERTO","com":"Poder de polícia é o freio que a Administração coloca na liberdade individual em nome do coletivo: ela limita, fiscaliza e sanciona. O Código Tributário traz o conceito legal. Seus atributos clássicos são discricionariedade, autoexecutoriedade e coercibilidade — daí a Administração poder, em regra, agir sem ir antes ao juiz.","fund":"CTN: 'Art. 78. Considera-se poder de polícia atividade da administração pública que, limitando ou disciplinando direito, interesse ou liberdade, regula a prática de ato ou abstenção de fato, em razão de interesse público concernente à segurança, à higiene, à ordem, aos costumes (...).'"},{"n":68,"enun":"São requisitos do ato administrativo a competência, a finalidade, a forma, o motivo e o objeto, sendo nulo o ato praticado com desvio de finalidade, assim entendido o praticado visando a fim diverso daquele previsto, explícita ou implicitamente, na regra de competência.","gab":"CERTO","com":"Os cinco elementos do ato (COM-FI-FO-MO-OB) são a espinha dorsal: competência, finalidade, forma, motivo e objeto. Quando o agente usa o poder para um fim diferente do legal — ainda que pareça público — comete desvio de finalidade, espécie de abuso de poder, que vicia a finalidade e gera nulidade.","fund":"Lei 4.717/65: 'Art. 2º, parágrafo único, e) o desvio de finalidade se verifica quando o agente pratica o ato visando a fim diverso daquele previsto, explícita ou implicitamente, na regra de competência.'"},{"n":69,"enun":"Pela teoria dos motivos determinantes, a validade do ato administrativo vincula-se aos motivos indicados como seu fundamento, de modo que, se inexistentes ou falsos os motivos declarados, o ato será inválido, ainda que sua motivação fosse, em tese, dispensável.","gab":"CERTO","com":"Imagine que o gestor exonera um servidor 'por excesso de faltas'. Se ele não tinha faltas, o ato cai — mesmo que pudesse exonerá-lo sem dar motivo. É a teoria dos motivos determinantes: uma vez declarado o motivo, a Administração fica amarrada a ele, e a falsidade ou inexistência do motivo contamina o ato.","fund":"DOUTRINA/JURISPRUDÊNCIA consolidada em lei seca correlata — Lei 9.784/99: 'Art. 50. Os atos administrativos deverão ser motivados, com indicação dos fatos e dos fundamentos jurídicos (...).' A vinculação aos motivos declarados decorre da exigência legal de motivação congruente com os fatos."},{"n":70,"enun":"A Administração pode anular seus próprios atos quando eivados de vícios que os tornem ilegais e revogá-los por motivo de conveniência e oportunidade, sendo que o direito da Administração de anular atos administrativos de que decorram efeitos favoráveis para os destinatários decai em cinco anos, salvo comprovada má-fé, contados da data em que foram praticados.","gab":"CERTO","com":"Dois caminhos para desfazer atos: anulação (por ilegalidade, com efeitos retroativos) e revogação (por conveniência, preservando os efeitos já produzidos). Para proteger a estabilidade das relações, a Lei 9.784/99 dá à Administração o prazo de 5 anos para anular atos benéficos ao cidadão — salvo má-fé, em que não corre prazo.","fund":"Lei 9.784/99: 'Art. 53. A Administração deve anular seus próprios atos, quando eivados de vício de legalidade, e pode revogá-los por motivo de conveniência ou oportunidade (...).' 'Art. 54. O direito da Administração de anular os atos administrativos de que decorram efeitos favoráveis para os destinatários decai em cinco anos, contados da data em que foram praticados, salvo comprovada má-fé.'"},{"n":71,"enun":"As pessoas jurídicas de direito público e as de direito privado prestadoras de serviços públicos respondem pelos danos que seus agentes, nessa qualidade, causarem a terceiros, assegurado o direito de regresso contra o responsável nos casos de dolo ou culpa.","gab":"CERTO","com":"É a responsabilidade civil objetiva do Estado, na modalidade risco administrativo: a vítima não precisa provar culpa do Estado, só o dano e o nexo. Vale também para empresas privadas que prestam serviço público (concessionárias). Mas, contra o agente causador, o Estado só cobra de volta (regresso) se ele agiu com dolo ou culpa.","fund":"CF: 'Art. 37, §6º. As pessoas jurídicas de direito público e as de direito privado prestadoras de serviços públicos responderão pelos danos que seus agentes, nessa qualidade, causarem a terceiros, assegurado o direito de regresso contra o responsável nos casos de dolo ou culpa.'"},{"n":72,"enun":"A responsabilidade civil objetiva do Estado prevista no art. 37, §6º, da Constituição Federal exige, para sua configuração, a demonstração de dolo ou de culpa do agente público causador do dano, na medida em que adotada a teoria da culpa administrativa.","gab":"ERRADO","com":"Aqui está a pegadinha clássica: responsabilidade OBJETIVA dispensa prova de dolo ou culpa do Estado/agente perante a vítima. O Brasil adota a teoria do risco administrativo, não a da culpa. Dolo e culpa só importam depois, na ação de regresso do Estado contra o agente — não para responsabilizar o Estado frente ao lesado.","fund":"CF: 'Art. 37, §6º. (...) responderão pelos danos que seus agentes (...) causarem a terceiros, assegurado o direito de regresso contra o responsável nos casos de dolo ou culpa.' A exigência de dolo/culpa só incide no regresso, não na responsabilização objetiva.","peg":"Trocar 'risco administrativo' (objetiva) por 'culpa administrativa' (subjetiva)."},{"n":73,"enun":"Os atos administrativos vinculados e os discricionários submetem-se ao controle judicial; nos atos discricionários, contudo, o Poder Judiciário não pode substituir o juízo de conveniência e oportunidade do administrador, limitando-se a controlar a legalidade e a observância dos limites do mérito administrativo.","gab":"CERTO","com":"Todo ato — vinculado ou discricionário — pode ser revisto pelo juiz quanto à legalidade. A diferença é que, no ato discricionário, o juiz não troca a escolha do administrador pela sua: o mérito (conveniência e oportunidade) é do gestor. O Judiciário só barra ilegalidades e excessos, sem invadir a margem de liberdade legítima.","fund":"CF: 'Art. 5º, XXXV - a lei não excluirá da apreciação do Poder Judiciário lesão ou ameaça a direito.' O controle alcança a legalidade de qualquer ato, mas o mérito administrativo dos atos discricionários não é substituível pelo juiz."},{"n":74,"enun":"Na Lei nº 14.133/2021, o diálogo competitivo é modalidade de licitação restrita a contratações em que a Administração desenvolva soluções capazes de atender às suas necessidades, devendo o objeto envolver inovação tecnológica ou técnica, impossibilidade de a Administração ter sua necessidade satisfeita sem a adaptação de soluções disponíveis no mercado, ou impossibilidade de as especificações técnicas serem definidas com precisão suficiente pela Administração.","gab":"CERTO","com":"A nova Lei de Licitações criou o diálogo competitivo: a Administração não sabe ainda como resolver o problema, então dialoga com os licitantes para construir a solução. É reservado a casos complexos — inovação tecnológica, necessidade que o mercado pronto não atende, ou objeto cujas especificações a Administração não consegue definir sozinha com precisão.","fund":"Lei 14.133/21: 'Art. 32. A modalidade diálogo competitivo é restrita a contratações em que a Administração: I - vise a contratar objeto que envolva (...) a) inovação tecnológica ou técnica; b) impossibilidade de o órgão (...) ter sua necessidade satisfeita sem a adaptação de soluções disponíveis no mercado; c) impossibilidade de as especificações técnicas serem definidas com precisão suficiente (...).'"},{"n":75,"enun":"Na Lei nº 14.133/2021, a contratação direta por inexigibilidade de licitação aplica-se obrigatoriamente quando o valor da contratação de obras e serviços de engenharia for inferior ao limite legal previsto para a dispensa de licitação em razão do valor, hipótese em que a competição é inviável.","gab":"ERRADO","com":"O item embaralha dois institutos distintos. Contratação de baixo valor é caso de DISPENSA de licitação (art. 75), em que a competição é possível, mas a lei dispensa. INEXIGIBILIDADE (art. 74) é coisa diferente: ocorre quando a competição é inviável (fornecedor exclusivo, serviço técnico singular, artista consagrado). Valor baixo nunca é hipótese de inexigibilidade.","fund":"Lei 14.133/21: 'Art. 74. É inexigível a licitação quando inviável a competição (...).' 'Art. 75. É dispensável a licitação: I - para contratação que envolva valores inferiores a R$ 100.000,00 (...), no caso de obras e serviços de engenharia (...).'","peg":"Confundir dispensa por valor (competição viável) com inexigibilidade (competição inviável)."},{"n":76,"enun":"A administração indireta compreende as autarquias, as fundações públicas, as sociedades de economia mista e as empresas públicas, sendo que a criação de autarquia depende de autorização legislativa, e a sociedade de economia mista é criada diretamente por lei específica, independentemente de registro de seus atos constitutivos.","gab":"ERRADO","com":"O item inverte o regime de criação. A autarquia é CRIADA diretamente por lei específica (nasce com a lei). Já as empresas públicas e sociedades de economia mista têm sua criação AUTORIZADA por lei, mas só ganham personalidade com o registro dos atos constitutivos. O enunciado troca os dois regimes.","fund":"CF: 'Art. 37, XIX - somente por lei específica poderá ser criada autarquia e autorizada a instituição de empresa pública, de sociedade de economia mista e de fundação (...).' A autarquia é criada por lei; as estatais são apenas autorizadas, exigindo registro.","peg":"Inverter: autarquia é criada por lei; SEM/EP são autorizadas por lei e criadas pelo registro."},{"n":77,"enun":"Toda condição ou exigência relativa ao exercício de atividade econômica ou à prestação de serviço público dispensa ato público de liberação por parte da Administração, em razão do princípio da liberdade econômica, vedada qualquer fiscalização posterior.","gab":"ERRADO","com":"Exagero clássico: o poder de polícia continua existindo. A Administração condiciona, fiscaliza e exige licenças/autorizações para atividades e serviços, exatamente para tutelar o interesse público. Liberdade econômica não significa terra de ninguém — a fiscalização administrativa permanece plenamente válida.","fund":"CTN: 'Art. 78. Considera-se poder de polícia atividade da administração pública que, limitando ou disciplinando direito, interesse ou liberdade, regula a prática de ato ou abstenção de fato, em razão de interesse público (...).' A Administração mantém o poder de condicionar e fiscalizar atividades.","peg":"Afirmar que toda exigência é dispensada e que a fiscalização posterior é vedada — nega o poder de polícia."},{"n":78,"enun":"No exercício do poder hierárquico, a Administração pode ordenar, coordenar, controlar, fiscalizar, delegar e avocar atribuições, ao passo que o poder disciplinar autoriza a aplicação de sanções aos servidores e demais pessoas sujeitas à disciplina interna da Administração, sendo ambos os poderes manifestações da relação de subordinação interna.","gab":"ERRADO","com":"O poder hierárquico realmente envolve ordenar, fiscalizar, delegar e avocar — relação de subordinação interna. Mas o poder disciplinar não se restringe à subordinação interna: ele também alcança particulares com vínculo específico com a Administração (ex.: um contratado), não apenas servidores. Dizer que ambos derivam só da subordinação interna torna o item incorreto.","fund":"Lei 9.784/99: 'Art. 11. A competência é irrenunciável e se exerce pelos órgãos administrativos a que foi atribuída como própria, salvo os casos de delegação e avocação legalmente admitidos.' O poder disciplinar abrange também pessoas com vínculo especial (não apenas subordinação hierárquica interna)."},{"n":79,"enun":"Compete privativamente ao Tribunal de Contas da União julgar as contas anuais prestadas pelo Presidente da República, mediante parecer prévio vinculante que substitui a deliberação do Congresso Nacional.","gab":"ERRADO","com":"Há uma exceção importante: as contas do chefe do Executivo NÃO são julgadas pelo Tribunal de Contas, e sim pelo Congresso Nacional (Poder Legislativo). O TCU apenas APRECIA essas contas e emite PARECER PRÉVIO — que é opinativo, não vinculante. O TCU julga as contas dos demais administradores, mas não as do Presidente.","fund":"CF: 'Art. 71. O controle externo (...) será exercido com o auxílio do Tribunal de Contas da União, ao qual compete: I - apreciar as contas prestadas anualmente pelo Presidente da República, mediante parecer prévio (...).' O julgamento dessas contas cabe ao Congresso Nacional (art. 49, IX).","peg":"Trocar 'apreciar mediante parecer prévio' (TCU) por 'julgar'; só o Congresso julga as contas do Presidente."},{"n":80,"enun":"Os atos administrativos gozam dos atributos da presunção de legitimidade, da imperatividade, da autoexecutoriedade e da tipicidade, sendo que a presunção de legitimidade é relativa, admitindo prova em contrário, e a autoexecutoriedade está presente em todos os atos administrativos, independentemente de previsão legal ou situação de urgência.","gab":"ERRADO","com":"A primeira parte está certa: os atributos clássicos e a presunção de legitimidade ser relativa (juris tantum). O erro está no final: a autoexecutoriedade NÃO está em todos os atos — ela depende de previsão legal expressa ou de situação de urgência. Sem isso, a Administração precisa recorrer ao Judiciário para executar.","fund":"DOUTRINA consolidada — a autoexecutoriedade pressupõe previsão legal ou situação de urgência; não é atributo presente em todos os atos. Aplicação do princípio da legalidade (CF, art. 37, caput).","peg":"Generalizar a autoexecutoriedade como presente em todos os atos, sem necessidade de lei ou urgência."}]},{"nome":"Medicina Legal","comando":"Acerca de medicina legal aplicada à atividade policial, julgue os itens a seguir.","itens":[{"n":81,"enun":"Nos ferimentos produzidos por projétil de arma de fogo, a orla de escoriação (ou orla de contusão) é característica típica do orifício de saída, ao passo que o orifício de entrada, em regra, é desprovido de tal sinal e costuma ser maior e mais irregular do que o de saída.","gab":"ERRADO","com":"A questão inverteu tudo. Pense no projétil como um dedo sujo empurrando um tecido: ao furar a pele de fora para dentro, ele esfrega e limpa as bordas, deixando a orla de escoriação (raspagem) e, frequentemente, a orla de enxugo. Logo, a orla de escoriação é sinal do orifício de ENTRADA, não de saída. Além disso, em regra é o orifício de SAÍDA que tende a ser maior e mais irregular (pele estourada de dentro para fora), e não o de entrada. O item trocou as duas chaves.","fund":"DOUTRINA médico-legal consolidada (Hércules, França — Medicina Legal): a orla de escoriação/contusão (e a orla de enxugo) caracterizam o orifício de ENTRADA; o de saída costuma ser maior e irregular. Interface com o art. 129 do CP e a perícia (art. 158 do CPP).","peg":"Atribuir a orla de escoriação ao orifício de saída e inverter o tamanho dos orifícios."},{"n":82,"enun":"A presença de zona de tatuagem (esfumaçamento e incrustação de grãos de pólvora ao redor do orifício de entrada) indica disparo a curta distância, dentro do chamado tiro a queima-roupa, sendo a tatuagem verdadeira característica que NÃO se remove pela simples lavagem da pele.","gab":"CERTO","com":"Imagine borrifar tinta em spray bem perto de uma parede: além da mancha de fumaça (esfumaçamento), grãos vão se cravar na superfície. A pólvora não totalmente queimada incrusta-se na pele formando a tatuagem verdadeira (não sai com lavagem), diferente do esfumaçamento/zona de chamuscamento que é mais superficial. Isso situa o disparo a curta distância (tiro a curta distância / queima-roupa). A irremovibilidade pela lavagem é justamente o que distingue a tatuagem verdadeira da falsa tatuagem.","fund":"DOUTRINA médico-legal (França; Hércules): elementos do tiro a curta distância — zona de chamuscamento, esfumaçamento (zona de tatuagem falsa) e tatuagem verdadeira (incrustação de grãos de pólvora, irremovível por lavagem). Permite estimar a distância do disparo na perícia (art. 158 do CPP).","peg":"Confundir tatuagem verdadeira (incrustação irremovível) com o esfumaçamento, que é removível."},{"n":83,"enun":"Os livores cadavéricos (hipóstases) são manchas que se formam nas regiões de declive do corpo por acúmulo de sangue, e a sua transposição (deslocamento para nova região de declive quando o corpo é mudado de posição) somente é possível enquanto não estiverem completamente fixados, fenômeno que auxilia na estimativa do tempo de morte e na detecção de remoção do cadáver.","gab":"CERTO","com":"Pense no sangue como água dentro de um corpo sem bomba: parada a circulação, ela escorre por gravidade e se acumula nas partes mais baixas, corando-as (livores). No começo, se você vira o corpo, o sangue ainda migra (livor móvel/transponível); com o tempo ele coagula e se fixa, deixando de transpor. Por isso livores fixados em região que não corresponde à posição atual do corpo são forte indício de que o cadáver foi removido após a morte. É dado clássico de cronotanatognose.","fund":"DOUTRINA tanatológica consolidada (França; Hércules): livores hipostáticos — localização em zonas de declive, fase de migração x fase de fixação; valor para cronotanatognose e para revelar mudança de posição/remoção do cadáver (perinecroscopia).","peg":"Afirmar que os livores transpõem mesmo após a fixação completa."},{"n":84,"enun":"Na esganadura, a constrição do pescoço é produzida pela força das próprias mãos do agressor (ou antebraço), o que torna a autoesganadura, como regra, impossível e aponta para a etiologia homicida; já no enforcamento o agente constritor é o laço acionado pelo peso do próprio corpo da vítima.","gab":"CERTO","com":"Três irmãs da asfixia por constrição cervical: enforcamento, estrangulamento e esganadura. O truque é olhar a 'mão' que aperta. No enforcamento, o laço é tensionado pelo peso do corpo (a pessoa 'pende'). No estrangulamento, um laço é apertado por força externa (não o peso do corpo). Na esganadura, o instrumento são as mãos/dedos/antebraço do agressor diretamente. Como ninguém consegue manter as próprias mãos apertando o pescoço até a morte (perde a consciência e relaxa), a esganadura é praticamente sempre homicida.","fund":"DOUTRINA asfixiológica consolidada (França; Hércules): diferenciação entre enforcamento (laço tracionado pelo peso do corpo), estrangulamento (laço por força externa) e esganadura (mãos do agressor); impossibilidade de autoesganadura e presunção de homicídio.","peg":"Trocar o agente constritor entre as modalidades ou admitir autoesganadura."},{"n":85,"enun":"No enforcamento típico, o sulco produzido pelo laço apresenta-se, caracteristicamente, horizontalizado, contínuo (em toda a circunferência do pescoço) e situado abaixo da cartilagem tireoide, ao passo que, no estrangulamento por laço, o sulco tende a ser oblíquo, ascendente em direção ao nó e interrompido na região deste.","gab":"ERRADO","com":"O item trocou os dois quadros. Na física da corda: no ENFORCAMENTO o corpo pende e o laço sobe em direção ao ponto de suspensão, então o sulco é oblíquo/ascendente, alto (acima da tireoide) e interrompido no nó. No ESTRANGULAMENTO alguém puxa o laço lateralmente, com força mais ou menos paralela ao solo: o sulco fica horizontal, baixo e contínuo. O enunciado atribuiu ao enforcamento as características do estrangulamento e vice-versa.","fund":"DOUTRINA asfixiológica consolidada (França; Hércules): sulco do enforcamento = oblíquo, ascendente, alto, interrompido no nó; sulco do estrangulamento = horizontal, baixo, contínuo. O item inverteu os achados. Subsídio à perícia necroscópica (arts. 158-159 do CPP).","peg":"Inverter as características do sulco entre enforcamento e estrangulamento."},{"n":86,"enun":"Para a configuração da conjunção carnal, na sexologia forense, exige-se a introdução, completa ou incompleta, do pênis na cavidade vaginal; atos libidinosos diversos — como o coito anal ou oral — embora possam constituir crime contra a dignidade sexual, não caracterizam, tecnicamente, conjunção carnal.","gab":"CERTO","com":"Em medicina legal, 'conjunção carnal' tem sentido técnico estrito: é a cópula vagínica (pênis na vagina), ainda que sem ejaculação e sem rotura himenal. Tudo o mais que tenha conotação sexual e não seja essa introdução pênis-vagina é 'ato libidinoso diverso da conjunção carnal' (coito anal, oral, manipulação etc.). Após a Lei 12.015/2009, ambos podem caracterizar estupro (art. 213 do CP), mas o conceito médico-legal de conjunção carnal continua restrito à penetração vaginal.","fund":"DOUTRINA de sexologia forense (França; Hércules): conceito técnico de conjunção carnal (introdução do pênis na vagina) versus atos libidinosos diversos. Interface com o art. 213 do CP (estupro).","peg":"Tratar coito anal/oral como conjunção carnal."},{"n":87,"enun":"A rigidez cadavérica (rigor mortis) é fenômeno cadavérico transformativo destrutivo que, uma vez instalada, permanece de forma definitiva no cadáver, não se desfazendo com o avançar do tempo, razão pela qual é o sinal de eleição para a cronotanatognose nas fases tardias da putrefação.","gab":"ERRADO","com":"Vários erros na mesma chave. A rigidez é um fenômeno cadavérico ABIÓTICO (consecutivo), e não transformativo destrutivo (estes são a putrefação e a autólise). Além disso, a rigidez NÃO é definitiva: ela se instala, atinge um auge e depois se DESFAZ (resolução), justamente com o início da putrefação. Por isso ela serve nas primeiras horas/dia, e não nas fases tardias — para a putrefação avançada o método de eleição é a entomologia forense, não a rigidez.","fund":"DOUTRINA tanatológica consolidada (França; Hércules): a rigidez cadavérica é fenômeno consecutivo (abiótico), transitório (instala-se e depois se desfaz com a putrefação); fenômenos transformativos destrutivos são autólise e putrefação. Para fases tardias usa-se a entomologia forense.","peg":"Classificar a rigidez como transformativa/destrutiva e afirmar que é permanente."},{"n":88,"enun":"Atestado médico e laudo pericial são documentos médico-legais equivalentes para fins probatórios no inquérito policial, de modo que o atestado fornecido por médico assistente da vítima substitui, com a mesma eficácia, o exame de corpo de delito direto exigido para a comprovação da materialidade da lesão corporal.","gab":"ERRADO","com":"São documentos de pesos diferentes. O atestado é uma declaração sucinta e simples (afirma um fato sumário, ex.: 'paciente apresenta fratura'). O laudo pericial é peça técnica circunstanciada, elaborada por perito oficial a partir de exame metódico, com descrição, discussão e respostas a quesitos. Para provar a materialidade de infração que deixa vestígios, a lei exige exame de corpo de delito (perícia), e o atestado do médico assistente não o substitui de pleno direito. Confundir os dois é erro clássico.","fund":"DOUTRINA (documentos médico-legais — atestado x laudo) e LEI: art. 158 do CPP (indispensabilidade do exame de corpo de delito quando a infração deixa vestígios) e art. 167 do CPP (prova testemunhal só supre na falta de vestígios). O atestado não tem a mesma eficácia probatória do laudo pericial.","peg":"Equiparar atestado a laudo e dispensar o corpo de delito."},{"n":89,"enun":"A quebra ou contaminação da cadeia de custódia do vestígio coletado em local de crime — assim entendida a documentação cronológica de todas as etapas de manuseio do material desde o reconhecimento até o descarte — compromete a rastreabilidade e a idoneidade da prova pericial, sendo a cadeia de custódia objeto de disciplina expressa no Código de Processo Penal.","gab":"CERTO","com":"Pense na cadeia de custódia como o 'histórico de rastreamento' de uma encomenda: cada vez que alguém toca no pacote, fica registrado quem, quando e onde. Se houver um vão nesse rastreamento, não dá para garantir que o que chegou ao laboratório é exatamente o que foi coletado — a prova perde confiabilidade. O Pacote Anticrime (Lei 13.964/2019) inseriu a cadeia de custódia expressamente no CPP, detalhando suas etapas (reconhecimento, coleta, acondicionamento, transporte, processamento, armazenamento, descarte).","fund":"LEI: arts. 158-A a 158-F do CPP (cadeia de custódia, incluídos pela Lei 13.964/2019), que definem vestígio e as etapas de rastreamento. DOUTRINA: idoneidade/rastreabilidade da prova pericial.","peg":"Negar que a cadeia de custódia tenha previsão expressa no CPP."},{"n":90,"enun":"Nos termos do critério biopsicológico adotado pelo Código Penal, o agente que, ao tempo da ação ou omissão, era inteiramente incapaz de entender o caráter ilícito do fato ou de determinar-se de acordo com esse entendimento, por doença mental ou desenvolvimento mental incompleto ou retardado, é considerado imputável, respondendo normalmente pelo crime.","gab":"ERRADO","com":"Aqui a palavra-chave foi trocada no fim. Quem é inteiramente incapaz de entender o ilícito ou de se autodeterminar por doença mental é INIMPUTÁVEL (isento de pena), não imputável. O CP adota o critério biopsicológico: precisa existir a causa (biológico: doença mental/desenvolvimento incompleto) E a consequência sobre a capacidade (psicológico: não entender ou não se determinar) no momento do fato. Presentes ambos, isenta-se de pena (aplicando-se medida de segurança), não se responsabiliza normalmente.","fund":"LEI: art. 26, caput, do CP (inimputabilidade — isenção de pena por doença mental/desenvolvimento incompleto ou retardado que retire a capacidade de entendimento ou autodeterminação). DOUTRINA psicopatológica forense: critério biopsicológico.","peg":"Trocar 'inimputável/isento de pena' por 'imputável/responde normalmente'."}]},{"nome":"Direito Civil + Legislação Complementar","comando":"Acerca da LINDB, da pessoa natural e jurídica, da prescrição e decadência, dos defeitos do negócio jurídico e da posse, julgue os itens a seguir.","itens":[{"n":91,"enun":"Salvo disposição contrária, a lei brasileira começa a vigorar em todo o país quarenta e cinco dias depois de oficialmente publicada; admitida a republicação do texto da lei, para correção, antes de entrar em vigor, o prazo da vigência começa a correr da nova publicação.","gab":"CERTO","com":"A vacatio legis padrão (quando a própria lei não fixa data) é de 45 dias no Brasil. E há a regra do 'recomeço do relógio': se a lei ainda não entrou em vigor e é republicada para corrigir o texto, o prazo de vacatio reinicia a contar da nova publicação, em relação à parte corrigida. É a literalidade dos §§ do art. 1º da LINDB.","fund":"LEI: art. 1º, caput e § 3º, da LINDB (Decreto-lei 4.657/1942) — vacatio legis de 45 dias e reinício do prazo na hipótese de nova publicação para correção antes da vigência.","peg":"Trocar 45 dias por outro prazo ou negar o reinício do prazo na republicação."},{"n":92,"enun":"Segundo o Código Civil, a personalidade civil da pessoa natural começa desde a concepção, momento a partir do qual o nascituro adquire personalidade plena e a totalidade dos direitos patrimoniais e existenciais, independentemente de vir a nascer com vida.","gab":"ERRADO","com":"A questão antecipou o marco. O Código adota o início da personalidade no NASCIMENTO COM VIDA (basta respirar, ainda que por instantes — comprovável por docimasia), e não na concepção. O nascituro não tem personalidade plena: a lei apenas PÕE A SALVO seus direitos desde a concepção, muitos deles condicionados ao nascimento com vida (ex.: direitos sucessórios). Trocar 'nascimento com vida' por 'concepção' e atribuir personalidade plena ao nascituro é o erro clássico do art. 2º.","fund":"LEI: art. 2º do CC/2002 — 'A personalidade civil da pessoa começa do nascimento com vida; mas a lei põe a salvo, desde a concepção, os direitos do nascituro.' A personalidade não começa da concepção.","peg":"Afirmar que a personalidade começa da concepção, confundindo o início da personalidade com a mera proteção dos direitos do nascituro."},{"n":93,"enun":"A desconsideração da personalidade jurídica, no Código Civil, não acarreta a dissolução ou extinção da pessoa jurídica, limitando-se a estender, em caráter episódico, determinados efeitos de relações obrigacionais aos bens particulares de administradores ou sócios beneficiados, quando configurado abuso caracterizado por desvio de finalidade ou confusão patrimonial.","gab":"CERTO","com":"Desconsiderar é diferente de despersonalizar. A pessoa jurídica continua existindo; o juiz apenas 'levanta o véu' num caso concreto para alcançar o patrimônio dos sócios/administradores que abusaram dela. O CC adota a teoria maior: só cabe diante de abuso, que se manifesta por desvio de finalidade (usar a empresa para fim ilícito/estranho) ou confusão patrimonial (mistura de bens entre sócio e empresa). É medida episódica, não causa de extinção.","fund":"LEI: art. 50 do CC/2002 (com redação dada pela Lei 13.874/2019 — Liberdade Econômica) — desconsideração por abuso da personalidade, caracterizado por desvio de finalidade ou confusão patrimonial; efeitos estendidos episodicamente aos bens de sócios/administradores.","peg":"Equiparar desconsideração a extinção/dissolução da pessoa jurídica."},{"n":94,"enun":"Os prazos de prescrição podem ser livremente alterados pela vontade das partes, ao passo que os de decadência, por serem de ordem pública, jamais admitem qualquer convenção; além disso, a prescrição, uma vez consumada, não pode ser renunciada pelo devedor em nenhuma hipótese.","gab":"ERRADO","com":"Há dois erros embutidos. Primeiro: os prazos de prescrição NÃO podem ser alterados por acordo das partes (art. 192 do CC); quem altera prazos por vontade das partes, em certos limites, é a decadência convencional (a legal é que não se pode renunciar/alterar). A questão inverteu tudo. Segundo: a prescrição já consumada PODE ser renunciada pelo devedor, expressa ou tacitamente, desde que sem prejuízo de terceiro (art. 191). Logo, dois comandos falsos no mesmo item.","fund":"LEI: art. 192 do CC/2002 (prazos de prescrição não podem ser alterados por acordo das partes) e art. 191 do CC/2002 (admite-se renúncia da prescrição já consumada, sem prejuízo de terceiro). A renunciabilidade contraria a afirmação do item.","peg":"Afirmar que a prescrição admite alteração convencional e que sua renúncia é sempre vedada."},{"n":95,"enun":"No negócio jurídico, considera-se coação, vício do consentimento que torna o negócio anulável, a ameaça injusta e grave dirigida a incutir na vítima fundado temor de dano iminente e considerável à sua pessoa, à sua família ou aos seus bens; não se considera coação, contudo, o simples temor reverencial nem o exercício regular de um direito.","gab":"CERTO","com":"Coação vício é a 'vis compulsiva': ameaça que verga a vontade mas não a elimina (a pessoa escolhe ceder para evitar o mal). Para viciar, a ameaça precisa ser injusta, grave e capaz de gerar temor fundado de dano iminente e considerável à pessoa, família ou bens. O CC exclui duas situações: o temor reverencial (medo de desgostar pessoas a quem se deve respeito) e a ameaça que é exercício regular de direito (ex.: 'se não pagar, eu te processo'). É a literalidade dos arts. 151 e 153.","fund":"LEI: arts. 151 e 153 do CC/2002 — definição de coação (ameaça injusta e grave) e exclusão do temor reverencial e do exercício regular de direito. A coação é causa de anulabilidade (art. 171, II).","peg":"Tratar o temor reverencial ou a ameaça de exercício regular de direito como coação."},{"n":96,"enun":"Configura-se o estado de perigo quando alguém, premido da necessidade de salvar-se, ou a pessoa de sua família, de grave dano conhecido pela outra parte, assume obrigação excessivamente onerosa; já a lesão dispensa o conhecimento, pela outra parte, do estado de necessidade ou inexperiência do lesado, bastando a desproporção manifesta entre as prestações no momento da celebração.","gab":"CERTO","com":"São dois 'primos' que se confundem. No estado de perigo (art. 156) há um perigo de dano à pessoa/família e a outra parte SABE disso e se aproveita — pense em quem cobra um valor absurdo para socorrer alguém em afogamento. Na lesão (art. 157) há premente necessidade ou inexperiência que leva o sujeito a uma prestação manifestamente desproporcional, mas NÃO se exige que a outra parte conheça/dolo — basta o desequilíbrio objetivo aferido no momento do contrato. Essa diferença do 'dolo de aproveitamento' é a chave.","fund":"LEI: art. 156 do CC/2002 (estado de perigo — exige que a outra parte conheça o grave dano) e art. 157 do CC/2002 (lesão — premente necessidade ou inexperiência + desproporção manifesta apreciada no momento da celebração, sem exigência de conhecimento pela outra parte).","peg":"Exigir, na lesão, o conhecimento da situação pela outra parte, igualando-a ao estado de perigo."},{"n":97,"enun":"Aquele que, achando-se em relação de dependência para com outro, conserva a posse em nome deste e em cumprimento de ordens ou instruções suas — como o caseiro ou o empregado em relação ao bem do patrão — é considerado, para o Código Civil, possuidor direto, podendo, nessa condição e em nome próprio, manejar as ações possessórias.","gab":"ERRADO","com":"O item descreveu com precisão o fâmulo da posse (detentor) do art. 1.198 — caseiro, empregado, motorista — mas deu a ele o rótulo errado. Quem cuida da coisa em nome de outro, em relação de dependência e seguindo ordens, NÃO é possuidor (nem direto, nem indireto): é mero DETENTOR. Por isso, em regra, não dispõe das ações possessórias em nome próprio. O CC adota a teoria objetiva de Ihering, mas exclui da posse o servidor da posse.","fund":"LEI: art. 1.198 do CC/2002 — 'Considera-se detentor aquele que, achando-se em relação de dependência para com outro, conserva a posse em nome deste e em cumprimento de ordens ou instruções suas.' Não é possuidor; logo, não maneja, em regra, as ações possessórias em nome próprio.","peg":"Rotular o fâmulo da posse (caseiro/empregado) como possuidor direto."},{"n":98,"enun":"É vedado o desforço imediato na proteção da posse, de modo que o possuidor turbado ou esbulhado somente pode recuperar a coisa por meio de provimento judicial, sendo nula qualquer reação de mão própria, ainda que praticada logo após a agressão e com emprego de meios proporcionais.","gab":"ERRADO","com":"O Código autoriza a autotutela da posse, dentro de balizas. O possuidor pode, por sua própria força, manter-se na posse (legítima defesa da posse) ou restituir-se logo após o esbulho (desforço imediato), contanto que aja logo e use só os meios necessários/proporcionais à repulsa. Não está obrigado a esperar o juiz para uma reação imediata. Portanto é falso afirmar que toda reação de mão própria é nula.","fund":"LEI: art. 1.210, § 1º, do CC/2002 — o possuidor turbado ou esbulhado pode, por força própria, manter-se ou restituir-se, contanto que o faça logo, com os meios necessários e sem exceder o indispensável (legítima defesa da posse e desforço imediato).","peg":"Negar a autotutela da posse (desforço imediato) prevista no art. 1.210, § 1º."}]},{"nome":"Direito Tributário + Legislação Complementar","comando":"Acerca do Sistema Tributário Nacional, julgue os itens a seguir.","itens":[{"n":99,"enun":"Tributo é toda prestação pecuniária compulsória, em moeda ou cujo valor nela se possa exprimir, que constitua sanção de ato ilícito, instituída em lei e cobrada mediante atividade administrativa plenamente vinculada.","gab":"ERRADO","com":"O item inverte um elemento nuclear do conceito de tributo. Pense assim: tributo NÃO é castigo. Multa é punição por ato ilícito; tributo é dever que nasce de fatos lícitos (auferir renda, ser proprietário, circular mercadoria). O art. 3º do CTN diz justamente que o tributo é prestação 'que NÃO constitua sanção de ato ilícito'. A questão trocou o 'não constitua' por 'constitua', transformando a definição de tributo na definição de multa. Tudo o mais (pecuniária, compulsória, em lei, atividade vinculada) está correto — o erro está só nessa palavra-chave.","fund":"LEI: CTN, art. 3º — 'Tributo é toda prestação pecuniária compulsória, em moeda ou cujo valor nela se possa exprimir, que não constitua sanção de ato ilícito, instituída em lei e cobrada mediante atividade administrativa plenamente vinculada.'","peg":"Trocar 'não constitua' por 'constitua' é a pegadinha clássica que confunde tributo com multa."},{"n":100,"enun":"A natureza jurídica específica do tributo é determinada pelo fato gerador da respectiva obrigação, sendo irrelevantes, para qualificá-la, a denominação legal e a destinação legal do produto da sua arrecadação.","gab":"CERTO","com":"O CTN adota o critério do fato gerador para identificar a espécie tributária. Imagine que você recebe um boleto: o nome que deram a ele (taxa, contribuição, 'selo') não importa; o que define a natureza é o FATO que disparou a cobrança. Se o fato é uma atuação estatal específica voltada ao contribuinte (serviço, polícia), é taxa; se é um fato do próprio contribuinte sem contraprestação (ter renda), é imposto. O art. 4º manda ignorar a denominação e a destinação do dinheiro. Item reproduz fielmente o caput e os incisos.","fund":"LEI: CTN, art. 4º — 'A natureza jurídica específica do tributo é determinada pelo fato gerador da respectiva obrigação, sendo irrelevantes para qualificá-la: I - a denominação e demais características formais adotadas pela lei; II - a destinação legal do produto da sua arrecadação.'","peg":"No texto seco do CTN o critério é só o fato gerador — não confunda com a crítica doutrinária de que destinação importa nos empréstimos compulsórios e contribuições."},{"n":101,"enun":"A obrigação tributária acessória, decorrente da legislação tributária, tem por objeto as prestações, positivas ou negativas, previstas no interesse da arrecadação ou da fiscalização dos tributos.","gab":"CERTO","com":"O CTN separa a obrigação principal (pagar tributo ou multa — é dar dinheiro) da acessória (fazer ou não fazer algo no interesse do Fisco — emitir nota, escriturar livro, declarar). Pense na principal como 'pagar a conta' e na acessória como 'os deveres de etiqueta' que cercam a fiscalização: prestações positivas (fazer) ou negativas (não fazer, tolerar). O art. 113, §2º descreve exatamente isso. O item está em conformidade literal.","fund":"LEI: CTN, art. 113, §2º — 'A obrigação acessória decorre da legislação tributária e tem por objeto as prestações, positivas ou negativas, nela previstas no interesse da arrecadação ou da fiscalização dos tributos.'","peg":"Acessória decorre de 'legislação' (sentido amplo, inclui atos infralegais); a principal exige 'lei' em sentido estrito."},{"n":102,"enun":"O lançamento reporta-se à data da ocorrência do fato gerador da obrigação e rege-se pela lei então vigente, ainda que posteriormente modificada ou revogada.","gab":"CERTO","com":"Lançamento é o ato pelo qual o Fisco formaliza o crédito (verifica o fato, calcula o tributo, identifica o devedor). A regra de ouro: ele 'congela' a lei do momento do fato gerador. Imagine uma foto tirada no dia em que o fato aconteceu — o lançamento revela essa foto depois, mas usando o filme (a lei) daquela data, mesmo que a lei tenha mudado depois. É o princípio da ultratividade da lei vigente ao tempo do fato gerador, art. 144 do CTN. Item correto.","fund":"LEI: CTN, art. 144, caput — 'O lançamento reporta-se à data da ocorrência do fato gerador da obrigação e rege-se pela lei então vigente, ainda que posteriormente modificada ou revogada.'","peg":"A exceção do §1º (leis sobre procedimento/fiscalização aplicam-se ao lançamento) não desmente a regra material do caput cobrada aqui."},{"n":103,"enun":"O parcelamento do crédito tributário é hipótese de extinção do crédito, equiparando-se, para todos os efeitos, ao pagamento integral do montante devido.","gab":"ERRADO","com":"Aqui há uma troca de prateleira. O CTN tem duas listas distintas: suspensão da exigibilidade (art. 151) e extinção (art. 156). Parcelamento está na lista da SUSPENSÃO (art. 151, VI): enquanto o contribuinte paga as parcelas, o Fisco não pode cobrar/executar, mas o crédito continua existindo — só fica 'em pausa'. Extinção é o que apaga o crédito (pagamento, compensação, transação, prescrição etc., art. 156). Equiparar parcelamento a pagamento integral é erro grosseiro: quem parcela ainda deve. Item errado.","fund":"LEI: CTN, art. 151, VI — 'Suspendem a exigibilidade do crédito tributário: [...] VI - o parcelamento.' (incluído pela LC 104/2001). Confronto com o art. 156, que lista as hipóteses de extinção.","peg":"Parcelamento SUSPENDE; o pagamento das parcelas é que, ao final, extingue. Não confunda a causa com o resultado."},{"n":104,"enun":"É vedado à União, aos Estados, ao Distrito Federal e aos Municípios instituir impostos sobre patrimônio, renda ou serviços, uns dos outros, abrangendo essa imunidade recíproca também as taxas e as contribuições de melhoria.","gab":"ERRADO","com":"A imunidade recíproca protege os entes federativos de cobrarem IMPOSTOS uns dos outros — é uma blindagem do pacto federativo (a União não tributa o patrimônio do Estado, e vice-versa). Mas a CF restringe a vedação a impostos. Taxas (contraprestação por serviço/poder de polícia) e contribuição de melhoria (valorização por obra) NÃO entram na imunidade recíproca: se um ente usa serviço específico de outro, pode haver taxa. O art. 150, VI, 'a', fala só em 'impostos'. O item amplia indevidamente para taxas e contribuições. Errado.","fund":"LEI: CF, art. 150, VI, 'a' — 'Sem prejuízo de outras garantias [...] é vedado à União, aos Estados, ao Distrito Federal e aos Municípios: VI - instituir impostos sobre: a) patrimônio, renda ou serviços, uns dos outros.'","peg":"A imunidade recíproca alcança apenas IMPOSTOS. Estender a taxas/contribuições é a pegadinha mais cobrada do art. 150, VI."}]},{"nome":"Direito Ambiental + Legislação Complementar","comando":"Acerca da proteção ambiental e dos crimes ambientais, julgue os itens a seguir.","itens":[{"n":105,"enun":"Incumbe ao poder público, para assegurar a efetividade do direito ao meio ambiente ecologicamente equilibrado, exigir, na forma da lei, para instalação de obra ou atividade potencialmente causadora de significativa degradação do meio ambiente, estudo prévio de impacto ambiental, ao qual se dará publicidade.","gab":"CERTO","com":"O art. 225, §1º, IV da CF impõe o EIA (Estudo Prévio de Impacto Ambiental) como instrumento de prevenção. Pense no EIA como um 'exame de risco' obrigatório antes de liberar empreendimentos pesados: só se faz a obra depois de avaliar o estrago potencial — e o resultado é público, para a sociedade fiscalizar. A exigência vale para atividade 'potencialmente causadora de significativa degradação'. Item reproduz literalmente o dispositivo, inclusive a publicidade. Correto.","fund":"LEI: CF, art. 225, §1º, IV — '[Incumbe ao poder público] exigir, na forma da lei, para instalação de obra ou atividade potencialmente causadora de significativa degradação do meio ambiente, estudo prévio de impacto ambiental, a que se dará publicidade.'","peg":"O EIA é exigido para degradação SIGNIFICATIVA, não para qualquer atividade. E é prévio — exame antes, não depois."},{"n":106,"enun":"As condutas e atividades consideradas lesivas ao meio ambiente sujeitarão os infratores, pessoas físicas ou jurídicas, a sanções penais e administrativas, independentemente da obrigação de reparar os danos causados.","gab":"CERTO","com":"Este é o fundamento da tríplice responsabilidade ambiental. Um mesmo dano ambiental pode gerar três frentes independentes: penal (crime), administrativa (multa/embargo) e civil (reparar/indenizar). Imagine três portas que se abrem ao mesmo tempo e não se anulam: ser multado não livra de processo penal, e nenhuma das duas livra do dever de reparar. O art. 225, §3º da CF consagra a expressão 'independentemente da obrigação de reparar'. Inclui pessoa jurídica. Item correto.","fund":"LEI: CF, art. 225, §3º — 'As condutas e atividades consideradas lesivas ao meio ambiente sujeitarão os infratores, pessoas físicas ou jurídicas, a sanções penais e administrativas, independentemente da obrigação de reparar os danos causados.'","peg":"As três responsabilidades são independentes e cumulativas — uma não exclui a outra."},{"n":107,"enun":"Conforme a Lei nº 9.605/1998, as pessoas jurídicas serão responsabilizadas penalmente nos casos em que a infração seja cometida por decisão de seu representante legal ou contratual, ou de seu órgão colegiado, no interesse ou benefício da sua entidade, excluindo-se, nessa hipótese, a responsabilidade penal das pessoas físicas autoras, coautoras ou partícipes do mesmo fato.","gab":"ERRADO","com":"A Lei de Crimes Ambientais admite a responsabilidade penal da pessoa jurídica, mas o item erra no final. A regra é a do art. 3º: responsabiliza-se a PJ quando o crime decorre de decisão de representante/órgão e no interesse da entidade — até aqui correto. Porém o parágrafo único diz que isso NÃO exclui a responsabilidade das pessoas físicas. Pense numa empresa que polui por ordem do diretor: a empresa responde E o diretor também. Não há substituição de um pelo outro, há acúmulo (sistema da dupla imputação). O item afirma exclusão das físicas — errado.","fund":"LEI: Lei 9.605/1998, art. 3º, parágrafo único — 'A responsabilidade das pessoas jurídicas não exclui a das pessoas físicas, autoras, coautoras ou partícipes do mesmo fato.'","peg":"Responsabilizar a PJ NÃO afasta a da pessoa física. A palavra 'excluindo-se' é o gatilho do erro."},{"n":108,"enun":"A Política Nacional do Meio Ambiente, instituída pela Lei nº 6.938/1981, tem por órgão consultivo e deliberativo o Conselho Nacional do Meio Ambiente (CONAMA), integrante do Sistema Nacional do Meio Ambiente (SISNAMA).","gab":"CERTO","com":"A Lei 6.938/81 montou o SISNAMA, que é a 'arquitetura' de órgãos ambientais do país. Dentro dele, o CONAMA é o órgão consultivo e deliberativo — quem debate e edita resoluções (normas técnicas). Pense no SISNAMA como uma orquestra de órgãos federais, estaduais e municipais; o CONAMA é a seção que delibera as partituras (resoluções). O art. 6º, II, define o CONAMA exatamente como órgão consultivo e deliberativo do sistema. Item correto.","fund":"LEI: Lei 6.938/1981, art. 6º, II — 'Órgão consultivo e deliberativo: o Conselho Nacional do Meio Ambiente (CONAMA), com a finalidade de assessorar, estudar e propor [...] diretrizes [...] bem como deliberar [...] sobre normas e padrões compatíveis com o meio ambiente.'","peg":"No SISNAMA: órgão superior = Conselho de Governo; consultivo/deliberativo = CONAMA; central = Ministério do Meio Ambiente; executor = IBAMA. Não troque os papéis."},{"n":109,"enun":"Nos crimes ambientais previstos na Lei nº 9.605/1998, a pessoa jurídica poderá ser submetida à pena privativa de liberdade, observado o regime inicial fixado segundo a gravidade da infração.","gab":"ERRADO","com":"Pessoa jurídica não tem corpo para ser presa — logicamente, não cabe pena privativa de liberdade contra ela. A Lei 9.605/98 prevê para a PJ penas próprias e adaptadas à sua natureza: multa, restritivas de direitos (suspensão de atividades, interdição, proibição de contratar com o poder público) e prestação de serviços à comunidade (art. 21). 'Regime inicial' e 'privação de liberdade' são figuras de pessoa física. O item atribui à empresa uma pena impossível. Errado.","fund":"LEI: Lei 9.605/1998, art. 21 — 'As penas aplicáveis isolada, cumulativa ou alternativamente às pessoas jurídicas, de acordo com o disposto no art. 3º, são: I - multa; II - restritivas de direitos; III - prestação de serviços à comunidade.'","peg":"Para PJ só há multa, restritivas de direitos e prestação de serviços. Pena privativa de liberdade e 'regime' não se aplicam a ente moral."}]},{"nome":"Direito Empresarial + Legislação Complementar","comando":"Acerca de direito empresarial, recuperação e falência, julgue os itens a seguir.","itens":[{"n":110,"enun":"Considera-se empresário quem exerce profissionalmente atividade econômica organizada para a produção ou a circulação de bens ou de serviços.","gab":"CERTO","com":"O Código Civil adotou a teoria da empresa: o que caracteriza o empresário não é só vender, mas exercer atividade econômica ORGANIZADA (reunir capital, trabalho, insumos e tecnologia) de forma PROFISSIONAL (habitual, em nome próprio). Pense num dono de padaria que articula forno, farinha, funcionários e ponto comercial: ele organiza fatores de produção. O art. 966, caput, traz essa definição exata. Item correto.","fund":"LEI: Código Civil, art. 966, caput — 'Considera-se empresário quem exerce profissionalmente atividade econômica organizada para a produção ou a circulação de bens ou de serviços.'","peg":"O parágrafo único exclui quem exerce profissão intelectual (científica, literária, artística), salvo se a profissão constituir elemento de empresa."},{"n":111,"enun":"Estabelecimento é todo complexo de bens organizado, para exercício da empresa, por empresário ou por sociedade empresária, podendo ser objeto unitário de direitos e de negócios jurídicos translativos ou constitutivos.","gab":"CERTO","com":"Estabelecimento (ou fundo de comércio) é o conjunto de bens reunidos para o exercício da empresa — máquinas, estoque, ponto, marca, mobiliário. O CC trata esse conjunto como uma universalidade: embora formado por vários bens, pode ser tratado como um todo único em negócios (vender o estabelecimento inteiro, dá-lo em garantia). Pense numa cesta: você negocia a cesta inteira, não fruta por fruta. Art. 1.142, caput. Item correto.","fund":"LEI: Código Civil, art. 1.142, caput — 'Considera-se estabelecimento todo complexo de bens organizado, para exercício da empresa, por empresário, ou por sociedade empresária.' c/c art. 1.143.","peg":"Estabelecimento é o conjunto de BENS (objeto). Não confunda com o empresário (sujeito) nem com a pessoa jurídica (sociedade)."},{"n":112,"enun":"Na sociedade limitada, a responsabilidade de cada sócio é restrita ao valor de suas quotas, não respondendo qualquer sócio, em hipótese alguma, pela integralização do capital social.","gab":"ERRADO","com":"A sociedade limitada tem essa fama: o sócio só arrisca o valor de suas quotas. Mas há um complemento crucial — TODOS os sócios respondem SOLIDARIAMENTE pela integralização do capital social. Pense num grupo que prometeu colocar R$ 100 mil no caixa: se um sócio não pagou sua parte, os demais respondem por ela até completar o capital subscrito. O art. 1.052 limita a responsabilidade ao valor das quotas, MAS impõe a solidariedade pela integralização. O item nega isso ('em hipótese alguma') — errado.","fund":"LEI: Código Civil, art. 1.052, caput — 'Na sociedade limitada, a responsabilidade de cada sócio é restrita ao valor de suas quotas, mas todos respondem solidariamente pela integralização do capital social.'","peg":"O 'mas todos respondem solidariamente pela integralização' é a metade que as bancas escondem. 'Em hipótese alguma' é o gatilho do erro."},{"n":113,"enun":"Estão sujeitos à recuperação judicial, regida pela Lei nº 11.101/2005, o empresário e a sociedade empresária, bem como a empresa pública e a sociedade de economia mista.","gab":"ERRADO","com":"A Lei 11.101/05 disciplina recuperação e falência do devedor empresário, mas exclui expressamente certos entes. O art. 2º, I, afasta a empresa pública e a sociedade de economia mista do regime falimentar/recuperacional. Pense assim: a lógica da falência (liquidar o devedor que quebrou) não combina com entes estatais, sujeitos a regime próprio. O sujeito da recuperação é o empresário e a sociedade empresária (art. 1º), mas a estatal e a SEM ficam de fora. O item as inclui — errado.","fund":"LEI: Lei 11.101/2005, art. 2º, I — 'Esta Lei não se aplica a: I - empresa pública e sociedade de economia mista.' c/c art. 1º (aplica-se ao empresário e à sociedade empresária).","peg":"Empresa pública e sociedade de economia mista estão EXCLUÍDAS da Lei 11.101 (art. 2º, I). Também ficam fora instituições financeiras, seguradoras etc. (art. 2º, II)."},{"n":114,"enun":"A decretação da falência ou o deferimento do processamento da recuperação judicial suspende o curso da prescrição e de todas as ações e execuções em face do devedor, inclusive aquelas dos credores particulares do sócio solidário.","gab":"CERTO","com":"Quando se decreta a falência ou se defere o processamento da recuperação, a lei aciona um 'freio geral' (stay): suspende a prescrição e as ações e execuções contra o devedor, para concentrar tudo no juízo universal e evitar que credores se atropelem. Pense num sinal vermelho que para todo o trânsito de cobranças. O art. 6º, caput, inclui expressamente as ações dos credores particulares do sócio solidário. Item em conformidade com o texto. Correto.","fund":"LEI: Lei 11.101/2005, art. 6º, caput — 'A decretação da falência ou o deferimento do processamento da recuperação judicial implica: I - suspensão do curso da prescrição das obrigações do devedor [...]; II - suspensão das execuções ajuizadas contra o devedor [...]; III - proibição de [...]' e abrange as ações dos credores particulares do sócio solidário.","peg":"O stay period na recuperação judicial tem prazo (180 dias, prorrogável). Mas o item trata da regra geral de suspensão do art. 6º, que está correta."}]},{"nome":"Conhecimentos sobre o DF, PDPM e Primeiros Socorros","comando":"Acerca do Distrito Federal, do PDPM e de primeiros socorros, julgue os itens a seguir.","itens":[{"n":115,"enun":"Ao Distrito Federal são atribuídas as competências legislativas reservadas aos Estados e aos Municípios, sendo vedada a sua divisão em Municípios.","gab":"CERTO","com":"O DF é um ente híbrido: acumula as competências de Estado e de Município ao mesmo tempo (por isso não tem prefeito nem vereadores, e sim Governador e Deputados Distritais). E a CF proíbe que ele se divida em Municípios — Brasília não tem 'cidades' juridicamente autônomas, mas regiões administrativas. O art. 32, caput, traz as duas regras: veda divisão em Municípios e §1º atribui as competências de Estados e Municípios. Item correto.","fund":"LEI: CF, art. 32, caput e §1º — 'O Distrito Federal, vedada sua divisão em Municípios, reger-se-á por lei orgânica [...] §1º Ao Distrito Federal são atribuídas as competências legislativas reservadas aos Estados e Municípios.'","peg":"O DF não se divide em Municípios — tem Regiões Administrativas. E acumula competências estaduais E municipais."},{"n":116,"enun":"A Polícia Civil do Distrito Federal, dirigida por delegado de polícia de carreira, é organizada e mantida diretamente pelo Distrito Federal, a quem cabe arcar integralmente com as despesas de seu pessoal.","gab":"ERRADO","com":"Aqui está a peculiaridade do DF: embora a PCDF seja órgão de segurança do DF, sua organização e manutenção financeira são de responsabilidade da UNIÃO, não do DF. A CF determina que a União organiza e mantém a Polícia Civil, a Polícia Militar e o Corpo de Bombeiros do DF (art. 21, XIV). Pense num condomínio especial: o DF tem a polícia, mas quem paga a folha é a União. O item atribui a manutenção integral ao DF — errado.","fund":"LEI: CF, art. 21, XIV — 'Compete à União: [...] organizar e manter a polícia civil, a polícia penal, a polícia militar e o corpo de bombeiros militar do Distrito Federal.' c/c art. 32, §4º.","peg":"Quem organiza e MANTÉM (paga) as polícias do DF é a UNIÃO (art. 21, XIV), embora sejam órgãos de segurança do DF (art. 144)."},{"n":117,"enun":"Configura violência doméstica e familiar contra a mulher, nos termos da Lei Maria da Penha, qualquer ação ou omissão baseada no gênero que lhe cause morte, lesão, sofrimento físico, sexual ou psicológico e dano moral ou patrimonial, no âmbito da unidade doméstica, da família ou em qualquer relação íntima de afeto.","gab":"CERTO","com":"A Lei 11.340/06 define violência doméstica de forma ampla: não é só agressão física. Abrange morte, lesão, sofrimento físico, sexual, psicológico, e dano moral ou patrimonial — desde que baseada no gênero. E ocorre em três âmbitos: unidade doméstica, família ou relação íntima de afeto (independente de coabitação). Pense numa rede que cobre tanto o soco quanto a humilhação e o controle do dinheiro. Art. 5º, caput e incisos. Item correto.","fund":"LEI: Lei 11.340/2006, art. 5º — 'Para os efeitos desta Lei, configura violência doméstica e familiar contra a mulher qualquer ação ou omissão baseada no gênero que lhe cause morte, lesão, sofrimento físico, sexual ou psicológico e dano moral ou patrimonial: I - no âmbito da unidade doméstica; II - no âmbito da família; III - em qualquer relação íntima de afeto.'","peg":"A relação íntima de afeto independe de coabitação (parágrafo único do art. 5º). E a violência inclui a patrimonial e a moral."},{"n":118,"enun":"Diante de uma vítima adulta consciente que apresenta engasgo com obstrução total das vias aéreas por corpo estranho, a manobra de primeiros socorros indicada é a aplicação de compressões abdominais (manobra de Heimlich), posicionando-se atrás da vítima.","gab":"CERTO","com":"Engasgo com obstrução TOTAL em adulto consciente é a indicação clássica da manobra de Heimlich: o socorrista fica atrás da vítima, abraça a região abdominal acima do umbigo e abaixo das costelas, e faz compressões para dentro e para cima, gerando uma 'tosse artificial' que expele o corpo estranho. Pense em apertar uma garrafa plástica para fazer a rolha saltar. Conduta padronizada nas noções de primeiros socorros do edital. Item correto.","fund":"LEI/PROTOCOLO: Noções de primeiros socorros (
