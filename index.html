<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PCDF · Delegado 2026</title>
<!-- PWA -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0a0b14">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PCDF">
<link rel="apple-touch-icon" href="/icons/icon-180.png">
<link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png">
<link rel="apple-touch-icon" sizes="167x167" href="/icons/icon-167.png">
<link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180.png">
<link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png">
<style>
/* ── TOKENS ──────────────────────────────────────────────── */
:root{
  --bg:#0a0b0e; --surf:#12141a; --surf2:#181b24; --surf3:#1e2230;
  --bord:#252a3a; --bord2:#2e3448;
  --txt:#e4e8f4; --txt2:#7a8399; --txt3:#3d4562;
  --acc:#e8a020; --acc-dim:rgba(232,160,32,.13); --acc-glow:rgba(232,160,32,.28); --acc-bord:rgba(232,160,32,.32); --acc-bg:#1c1206;
  --green:#28c76f; --green-bg:rgba(40,199,111,.1); --green-bord:rgba(40,199,111,.3);
  --red:#f05252; --red-bg:rgba(240,82,82,.1); --red-bord:rgba(240,82,82,.3);
  --amber:#f59e0b; --amber-bg:rgba(245,158,11,.1); --amber-bord:rgba(245,158,11,.3);
  --mono:"SF Mono","Fira Code",monospace;
  --r:12px; --r-sm:8px; --r-xs:5px;
  --trans:140ms cubic-bezier(.4,0,.2,1);
  --shadow:0 2px 14px rgba(0,0,0,.5); --shadow-lg:0 4px 28px rgba(0,0,0,.65);
}
[data-theme=light]{
  --bg:#f1f3f8; --surf:#fff; --surf2:#f5f7fc; --surf3:#eef0f8;
  --bord:#dde2ef; --bord2:#cdd3e6;
  --txt:#0e1121; --txt2:#5a6380; --txt3:#9ea8c0;
  --acc:#c47c0a; --acc-dim:rgba(196,124,10,.08); --acc-glow:rgba(196,124,10,.2); --acc-bord:rgba(196,124,10,.28); --acc-bg:#fdf6e8;
  --green:#16a34a; --green-bg:rgba(22,163,74,.08); --green-bord:rgba(22,163,74,.28);
  --red:#dc2626; --red-bg:rgba(220,38,38,.08); --red-bord:rgba(220,38,38,.28);
  --amber:#d97706; --amber-bg:rgba(217,119,6,.08); --amber-bord:rgba(217,119,6,.28);
  --shadow:0 2px 8px rgba(0,0,0,.1); --shadow-lg:0 4px 16px rgba(0,0,0,.15);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;font-size:15px;line-height:1.6;transition:background var(--trans),color var(--trans)}
button{font-family:inherit;cursor:pointer}

/* ── HEADER ──────────────────────────────────────────────── */
.hdr{position:sticky;top:0;z-index:100;background:var(--surf);border-bottom:1px solid var(--bord);box-shadow:var(--shadow)}
.hdr-inner{max-width:860px;margin:0 auto;display:flex;align-items:center;gap:10px;height:62px;padding:0 18px}
.hdr-brand{display:flex;align-items:center;gap:11px;flex:1;min-width:0}
.delta-badge{width:42px;height:42px;border-radius:10px;background:var(--acc);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:#0a0b0e;flex-shrink:0;letter-spacing:-.02em;box-shadow:0 2px 10px var(--acc-glow)}
.hdr-name{font-weight:800;font-size:16.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.01em}
.hdr-date{font-size:12px;color:var(--txt2);margin-top:1px}
.hdr-chips{display:flex;gap:5px;align-items:center;flex-shrink:0}
.chip{border-radius:6px;padding:2px 9px;font-size:12px;font-weight:700}
.chip.g{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bord)}
.chip.r{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bord)}
.chip.n{background:var(--surf2);color:var(--txt2);border:1px solid var(--bord)}
.chip.t{background:var(--acc-dim);color:var(--acc);border:1px solid var(--acc-bord)}
.hdr-timer-wrap{display:flex;align-items:center;gap:6px;flex-shrink:0;background:var(--surf2);border:1px solid var(--bord);border-radius:8px;padding:5px 10px}
.hdr-timer-wrap.hidden{display:none!important}
.hdr-timer-wrap svg.clock-ic{width:17px;height:17px;color:var(--acc);flex-shrink:0}
.hdr-timer-txt{font-size:15px;font-weight:700;color:var(--txt);font-variant-numeric:tabular-nums;min-width:38px}
#btn-pause{background:transparent;border:none;cursor:pointer;padding:0 2px;font-size:14px;color:var(--txt2);line-height:1;transition:color var(--trans)}
#btn-pause:hover{color:var(--acc)}
#btn-pause.paused{color:var(--acc)}
/* Overlay de pausa */
#pause-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.72);backdrop-filter:blur(6px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px}
#pause-overlay.hidden{display:none!important}
.pause-card{background:var(--surf1);border:1px solid var(--bord);border-radius:16px;padding:40px 56px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:14px}
.pause-icon{font-size:48px;line-height:1}
.pause-title{font-size:22px;font-weight:700;color:var(--txt)}
.pause-sub{font-size:14px;color:var(--txt2)}
.pause-resume{background:var(--acc);color:#000;border:none;border-radius:10px;padding:13px 36px;font-size:16px;font-weight:700;cursor:pointer;transition:opacity var(--trans)}
.pause-resume:hover{opacity:.85}
.hdr-actions{display:flex;gap:3px;flex-shrink:0}
.icon-btn{background:var(--surf2);border:1px solid var(--bord);color:var(--txt2);border-radius:7px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all var(--trans)}
.icon-btn:hover{background:var(--acc-dim);border-color:var(--acc-bord);color:var(--acc)}
.prog-rail{height:2px;background:var(--surf3)}
.prog-fill{height:2px;background:var(--acc);transition:width .4s}

/* ── COVER ───────────────────────────────────────────────── */
.cover{max-width:580px;margin:0 auto;padding:48px 18px 80px;text-align:center;animation:fadeIn .4s ease}
.cover-kicker{font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--acc);font-weight:700;margin-bottom:16px}
.cover h1{font-size:clamp(32px,5vw,48px);font-weight:800;font-style:italic;margin-bottom:14px;line-height:1.1}
.cover-lead{font-size:16px;color:var(--txt2);margin-bottom:32px;line-height:1.5}
.cover-card{background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);padding:24px;text-align:left;box-shadow:var(--shadow)}
.meta-grid{display:grid;grid-template-columns:auto 1fr;gap:7px 18px;font-size:13.5px;margin-bottom:18px}
.meta-grid dt{color:var(--txt3);font-size:11px;letter-spacing:.08em;text-transform:uppercase;align-self:center}
.meta-grid dd{color:var(--txt);margin:0;font-weight:500}
.cover-note{font-size:13.5px;color:var(--txt2);font-style:italic;padding:12px 14px;background:var(--surf2);border-left:3px solid var(--acc-bord);border-radius:0 var(--r-xs) var(--r-xs) 0;margin-bottom:22px;line-height:1.5}
.cover-actions{display:flex;flex-direction:column;gap:10px}
.cover-countdown{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:18px;flex-wrap:wrap}
.ccd-box{text-align:center;background:var(--surf2);border:1px solid var(--bord2);border-radius:var(--r-sm);padding:10px 16px;min-width:62px}
.ccd-num{font-size:28px;font-weight:900;font-style:italic;line-height:1;color:var(--acc)}
.ccd-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--txt3);margin-top:2px}
.ccd-sep{font-size:22px;font-weight:900;color:var(--bord2);margin-bottom:12px}
.sr-due-nudge{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--red-bg);border:1px solid var(--red-bord);border-radius:var(--r-sm);font-size:13px;color:var(--red);margin-bottom:14px;cursor:pointer;transition:background .15s}
.sr-due-nudge:hover{background:rgba(240,82,82,.18)}
.btn-primary{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 28px;background:var(--acc);color:#0a0b0e;border:none;border-radius:var(--r-sm);font-weight:800;font-size:15px;letter-spacing:.02em;transition:all var(--trans);box-shadow:0 4px 16px var(--acc-glow)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px var(--acc-glow)}
.btn-ghost{background:var(--surf2);border:1px solid var(--bord);color:var(--txt2);padding:10px 20px;border-radius:var(--r-sm);font-size:14px;transition:all var(--trans)}
.btn-ghost:hover{border-color:var(--bord2);color:var(--txt)}

/* ── PROVA TOOLBAR ───────────────────────────────────────── */
.tb{position:sticky;top:54px;z-index:90;background:var(--surf);border-bottom:1px solid var(--bord);backdrop-filter:blur(8px)}
.tb-inner{max-width:860px;margin:0 auto;display:flex;align-items:center;gap:8px;padding:8px 18px;flex-wrap:wrap}
.tb-info{font-size:13px;color:var(--txt2);font-variant-numeric:tabular-nums}
.tb-info b{color:var(--txt)}
.tb-spacer{flex:1}
.tb-btn{background:var(--surf2);border:1px solid var(--bord);border-radius:var(--r-sm);padding:6px 13px;font-size:12.5px;color:var(--txt);transition:all var(--trans);display:inline-flex;align-items:center;gap:6px}
.tb-btn:hover{border-color:var(--bord2);background:var(--surf3)}
.tb-btn.danger{border-color:var(--acc-bord);color:var(--acc);background:var(--acc-dim)}
.tb-btn.danger:hover{background:var(--acc-bg)}
.tb-btn svg{width:12px;height:12px}

/* ── PROVA CONTENT ───────────────────────────────────────── */
#prova-wrap{max-width:860px;margin:0 auto;padding:24px 18px 100px}

/* Discipline header */
.disc-section{margin-bottom:48px}
.disc-hdr{text-align:left;margin:40px 0 16px;background:var(--surf);border-top:3px solid var(--acc);border-bottom:1px solid var(--bord);padding:13px 0 11px;position:relative}
.disc-hdr h3{font-weight:800;font-size:20px;letter-spacing:-.01em;text-transform:none;color:var(--txt);display:flex;align-items:center;gap:10px}

.comando{background:var(--surf2);border:1px solid var(--bord);border-radius:var(--r-sm);padding:12px 16px;font-size:14px;color:var(--txt2);margin-bottom:16px;font-style:italic;line-height:1.5}

/* Question block */
.q-block{border-top:1px solid var(--bord);padding:16px 0;scroll-margin-top:100px}
.q-block:first-of-type{border-top:none;padding-top:4px}
.q-line{display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:start}
.q-tag{display:inline-flex;align-items:center;gap:6px;font-weight:800;font-size:13px;color:var(--acc);flex-shrink:0;padding-top:2px;white-space:nowrap}
.q-tag::before{content:'';width:8px;height:12px;background:var(--acc);clip-path:polygon(0 0,80% 0,100% 50%,80% 100%,0 100%);display:inline-block}
.q-text{font-size:15.5px;line-height:1.65;color:var(--txt)}
.q-text .situacao{display:block;font-style:italic;color:var(--txt2);margin-bottom:8px;padding-left:12px;border-left:2px solid var(--bord2)}
.q-marks{display:flex;gap:6px;flex-shrink:0;padding-top:1px}
.q-mark{width:40px;height:40px;border:1.5px solid var(--bord);border-radius:var(--r-sm);background:var(--surf2);font-weight:800;font-size:14px;color:var(--txt2);display:inline-flex;align-items:center;justify-content:center;transition:all var(--trans)}
.q-mark:hover:not(:disabled){border-color:var(--txt2);color:var(--txt);transform:translateY(-1px)}
.q-mark.sel-c{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.q-mark.sel-e{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.q-mark:disabled{opacity:.5;cursor:default}
/* After gabarito shown, ring correct/wrong */
.q-block.gab-on .q-mark.sel-c.is-right,.q-block.gab-on .q-mark.sel-e.is-right{box-shadow:0 0 0 2px var(--green-bg),0 0 0 3px var(--green)}
.q-block.gab-on .q-mark.sel-c.is-wrong,.q-block.gab-on .q-mark.sel-e.is-wrong{box-shadow:0 0 0 2px var(--red-bg),0 0 0 3px var(--red)}

.q-actions-row{margin-top:10px;padding-left:92px;display:flex;align-items:center;gap:10px}
.q-show-gab{background:transparent;border:1px dashed var(--bord2);border-radius:var(--r-xs);padding:3px 11px;font-size:12px;color:var(--txt3);transition:all var(--trans)}
.q-show-gab:hover{border-style:solid;border-color:var(--acc-bord);color:var(--acc)}
.q-status{font-size:11.5px;color:var(--txt3)}
.q-status .ok{color:var(--green);font-weight:600}
.q-status .er{color:var(--red);font-weight:600}

/* Feedback */
.q-feedback{margin-top:14px;border-radius:var(--r-sm);overflow:hidden;border:1px solid var(--bord);animation:fadeUp .2s ease}
.gab-line{display:flex;align-items:center;gap:8px;padding:9px 14px;background:var(--surf2);border-bottom:1px solid var(--bord);font-size:13px;font-weight:700}
.gab-label{color:var(--txt3);font-size:10px;letter-spacing:.1em;text-transform:uppercase;font-weight:600}
.gab-value{color:var(--txt)}
.gab-badge{margin-left:auto;font-size:11.5px;padding:2px 10px;border-radius:99px;font-weight:700}
.gab-badge.ok{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bord)}
.gab-badge.er{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bord)}
.gab-badge.bk{background:var(--surf3);color:var(--txt3);border:1px solid var(--bord)}

.gab-section{border-top:1px solid var(--bord);background:var(--surf)}
.gab-hdr{display:flex;align-items:center;gap:8px;padding:9px 14px;cursor:pointer;font-size:13px;font-weight:600;background:var(--surf2);border:none;width:100%;text-align:left;color:var(--txt);transition:background var(--trans)}
.gab-hdr:hover{background:var(--surf3)}
.gab-icon{flex-shrink:0}
.gab-lbl{flex:1}
.gab-chev{font-size:11px;color:var(--txt3);transition:transform var(--trans)}
.gab-chev.open{transform:rotate(180deg)}
.gab-body{padding:12px 14px;font-size:14px;line-height:1.7;color:var(--txt2)}
.gab-body.hidden{display:none}
.feynman-text{color:var(--txt);font-size:14.5px;line-height:1.75}
.law-block{font-family:var(--mono);font-size:12px;background:var(--surf2);border:1px solid var(--bord);border-radius:var(--r-xs);padding:11px 13px;white-space:pre-wrap;line-height:1.65;color:var(--txt)}
.copy-btn{display:inline-flex;align-items:center;gap:5px;margin-top:8px;font-size:11.5px;padding:4px 12px;border-radius:5px;border:1px solid var(--bord2);background:var(--surf3);color:var(--txt3);cursor:pointer;transition:all var(--trans);font-family:inherit}
.copy-btn:hover{color:var(--acc);border-color:var(--acc-bord);background:var(--acc-dim)}
.peg-box{display:flex;gap:8px;align-items:flex-start;background:var(--amber-bg);border:1px solid var(--amber-bord);border-radius:var(--r-xs);padding:10px 13px;font-size:13px;color:var(--amber);line-height:1.55}

/* ── TRAP WORDS (Releitura Crítica) ──────────────────────── */
.trap-word{font-weight:800;color:var(--acc);background:var(--acc-dim);border-bottom:2px solid var(--acc);padding:0 3px;border-radius:3px}
.releitura-body{font-size:14.5px;line-height:1.8;color:var(--txt);margin-bottom:10px}
.releitura-body .situacao{display:block;font-style:italic;color:var(--txt2);margin-bottom:8px;padding-left:12px;border-left:2px solid var(--bord2)}
.trap-legend{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--txt3);margin-top:6px;flex-wrap:wrap}
.trap-legend .trap-word{font-size:11.5px;cursor:default}
.trap-found{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;color:var(--acc);font-weight:700}

/* ── AUTOAVALIAÇÃO ────────────────────────────────────────── */
.avaliacao-row{padding:11px 14px;background:var(--surf2);border-top:1px solid var(--bord);display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.avaliacao-lbl{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--txt3);font-weight:600;width:100%;margin-bottom:2px}
.av-btn{border-radius:99px;padding:5px 13px;font-size:12.5px;font-weight:700;border:1.5px solid;cursor:pointer;font-family:inherit;transition:all var(--trans);background:transparent}
.av-btn.dom{border-color:var(--green-bord);color:var(--green)}
.av-btn.dom:hover,.av-btn.dom.sel{background:var(--green-bg);box-shadow:0 0 0 2px var(--green-bord)}
.av-btn.dvd{border-color:var(--amber-bord);color:var(--amber)}
.av-btn.dvd:hover,.av-btn.dvd.sel{background:var(--amber-bg);box-shadow:0 0 0 2px var(--amber-bord)}
.av-btn.lac{border-color:var(--red-bord);color:var(--red)}
.av-btn.lac:hover,.av-btn.lac.sel{background:var(--red-bg);box-shadow:0 0 0 2px var(--red-bord)}
.av-btn.leit{border-color:var(--bord2);color:var(--txt2)}
.av-btn.leit:hover,.av-btn.leit.sel{background:var(--surf3);color:var(--txt);box-shadow:0 0 0 2px var(--bord2)}
.av-set{display:flex;align-items:center;gap:8px;padding:9px 14px;background:var(--surf2);border-top:1px solid var(--bord);font-size:13px}
.av-chip{border-radius:99px;padding:3px 12px;font-size:12px;font-weight:700;border:1.5px solid}
.av-chip.dom{background:var(--green-bg);color:var(--green);border-color:var(--green-bord)}
.av-chip.dvd{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-bord)}
.av-chip.lac{background:var(--red-bg);color:var(--red);border-color:var(--red-bord)}
.av-chip.leit{background:var(--surf3);color:var(--txt2);border-color:var(--bord2)}
.av-change{margin-left:auto;background:transparent;border:1px dashed var(--bord2);border-radius:var(--r-xs);padding:2px 9px;font-size:11.5px;color:var(--txt3);cursor:pointer;font-family:inherit;transition:all var(--trans)}
.av-change:hover{color:var(--acc);border-color:var(--acc-bord)}

/* ── DIAGNÓSTICO (Placar) ─────────────────────────────────── */
.diag-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--bord);border:1px solid var(--bord);border-radius:10px;overflow:hidden;margin-bottom:14px}
@media(max-width:600px){.diag-grid{grid-template-columns:repeat(2,1fr)}}
.diag-cell{background:var(--surf2);padding:14px 10px;text-align:center}
.diag-cell .dn{font-size:26px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums}
.diag-cell .dl{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--txt3);margin-top:5px;font-weight:600;line-height:1.3}
.diag-empty{color:var(--txt3);font-size:14px;font-style:italic;padding:12px 0}

/* ── REVISÃO ──────────────────────────────────────────────── */
#rev-wrap{max-width:860px;margin:0 auto;padding:0 0 100px}
.rev-picker{max-width:580px;margin:0 auto;padding:36px 18px 60px;animation:fadeIn .3s ease}
.rev-picker h2{font-size:clamp(22px,4vw,32px);font-weight:800;font-style:italic;margin-bottom:6px}
.rev-picker .sub{font-size:15px;color:var(--txt2);margin-bottom:28px;line-height:1.5}
.filter-sec-lbl{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--txt3);font-weight:700;margin:22px 0 10px}
.filter-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
@media(max-width:480px){.filter-grid{grid-template-columns:1fr}}
.filter-card{background:var(--surf);border:1.5px solid var(--bord);border-radius:var(--r);padding:15px 16px;text-align:left;cursor:pointer;transition:all var(--trans);font-family:inherit;display:flex;flex-direction:column;gap:3px}
.filter-card:hover:not(:disabled){border-color:var(--acc-bord);background:var(--acc-dim)}
.filter-card.sel{border-color:var(--acc);background:var(--acc-dim);box-shadow:0 0 0 1.5px var(--acc)}
.filter-card:disabled{opacity:.35;cursor:not-allowed;pointer-events:none}
.fc-icon{font-size:20px}
.fc-count{font-size:28px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums}
.fc-count.cr{color:var(--red)}.fc-count.ca{color:var(--amber)}.fc-count.cg{color:var(--green)}.fc-count.ct{color:var(--txt)}
.fc-label{font-size:12px;color:var(--txt2);font-weight:600}
.disc-filter-row{display:flex;flex-wrap:wrap;gap:7px}
.disc-btn{background:var(--surf2);border:1.5px solid var(--bord);border-radius:99px;padding:5px 14px;font-size:13px;font-family:inherit;color:var(--txt2);cursor:pointer;transition:all var(--trans);font-weight:500}
.disc-btn:hover{border-color:var(--acc-bord);color:var(--acc)}
.disc-btn.sel{border-color:var(--acc);color:var(--acc);background:var(--acc-dim)}
.mode-box{background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);overflow:hidden;margin-bottom:24px}
.mode-tabs{display:grid;grid-template-columns:1fr 1fr}
.mode-tab{border:none;background:var(--surf2);color:var(--txt2);font-size:14px;font-weight:700;padding:12px 8px;cursor:pointer;font-family:inherit;border-bottom:2px solid transparent;transition:all var(--trans);display:flex;align-items:center;justify-content:center;gap:6px}
.mode-tab:first-child{border-right:1px solid var(--bord)}
.mode-tab.active{background:var(--surf);color:var(--acc);border-bottom-color:var(--acc)}
.mode-desc-txt{font-size:13px;color:var(--txt2);padding:11px 14px;line-height:1.55;border-top:1px solid var(--bord)}
.rev-tb{position:sticky;top:54px;z-index:90;background:var(--surf);border-bottom:1px solid var(--bord)}
.rev-tb-inner{max-width:860px;margin:0 auto;display:flex;align-items:center;gap:8px;padding:7px 18px;flex-wrap:wrap}
.rev-badge{background:var(--acc-dim);border:1px solid var(--acc-bord);color:var(--acc);border-radius:99px;padding:3px 12px;font-size:12px;font-weight:700;flex-shrink:0}
.rev-orig{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;padding:2px 9px;border-radius:99px;font-weight:600;flex-shrink:0}
.rev-orig.ok{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bord)}
.rev-orig.er{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bord)}
.rev-orig.bk{background:var(--surf3);color:var(--txt3);border:1px solid var(--bord)}
.rev-placar-wrap{max-width:580px;margin:0 auto;padding:32px 18px 100px;animation:fadeUp .4s ease}

/* ── ESPAÇAMENTO INTELIGENTE ──────────────────────────────── */
.sr-badge{display:inline-flex;align-items:center;gap:3px;font-size:10.5px;font-weight:700;border-radius:4px;padding:2px 7px;line-height:1.4;white-space:nowrap}
.sr-badge.due{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bord)}
.sr-badge.soon{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bord)}
.sr-badge.ok{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bord)}
.sr-queue-section{margin-bottom:20px}
.sr-queue-hdr{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--red);font-weight:700;margin-bottom:10px}
.sr-queue-row{display:flex;align-items:center;gap:10px;padding:9px 14px;border-radius:var(--r-sm);background:var(--surf);border:1.5px solid var(--red-bord);margin-bottom:7px;cursor:default;transition:background .15s}
.sr-queue-date{font-size:11px;color:var(--txt3);min-width:52px}
.sr-queue-title{flex:1;font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sr-queue-pct{font-size:13px;font-weight:700;min-width:38px;text-align:right}
.sr-interval-info{font-size:11px;color:var(--txt3);margin-top:4px}
/* ── MODO FOCO ────────────────────────────────────────────── */
#sec-foco{position:fixed;inset:0;z-index:150;background:var(--bg);overflow-y:auto;display:flex;flex-direction:column}
#sec-foco.hidden{display:none!important}
.foco-hdr{position:sticky;top:0;z-index:10;background:var(--bg);border-bottom:1px solid var(--bord2);padding:10px 18px;display:flex;align-items:center;gap:12px}
.foco-qnum{font-size:13px;font-weight:700;color:var(--txt2);white-space:nowrap}
.foco-disc{font-size:11.5px;color:var(--txt3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0}
.foco-prog-wrap{display:flex;align-items:center;gap:8px;min-width:110px}
.foco-progress{height:4px;background:var(--bord);border-radius:2px;flex:1}
.foco-prog-fill{height:100%;background:var(--acc);border-radius:2px;transition:width .4s}
.foco-pct{font-size:11px;font-weight:700;color:var(--acc);min-width:28px;text-align:right}
.foco-body{flex:1;max-width:800px;margin:0 auto;padding:28px 20px 16px;width:100%;animation:fadeIn .2s ease}
.foco-body .q-block{border-color:var(--bord2)}
.foco-body .q-text{font-size:16px;line-height:1.8}
.foco-body .q-tag{font-size:14px;width:42px;height:42px;line-height:42px}
.foco-body .q-mark{height:52px;font-size:17px;font-weight:900;min-width:80px}
.foco-body .q-marks{gap:14px}
.foco-nav{max-width:800px;margin:0 auto 40px;padding:0 20px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.foco-nav-hint{font-size:11px;color:var(--txt3);text-align:center;line-height:1.6}
/* ── QUESTION TIMER ──────────────────────────────────────── */
.qt-badge{display:inline-flex;align-items:center;gap:3px;font-size:10.5px;font-weight:700;border-radius:4px;padding:2px 7px;font-variant-numeric:tabular-nums;letter-spacing:.02em;transition:background .35s,color .35s,border-color .35s;min-width:36px;justify-content:center}
.qt-idle{color:var(--txt3);background:transparent}
.qt-normal{background:var(--surf3);color:var(--txt2)}
.qt-warn{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bord)}
.qt-alert{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bord);animation:qtPulse 1s ease-in-out infinite}
.qt-done{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bord)}
@keyframes qtPulse{0%,100%{opacity:1}50%{opacity:.5}}
#qt-pill{position:fixed;bottom:62px;left:50%;transform:translateX(-50%);max-width:860px;width:calc(100% - 32px);z-index:80;pointer-events:none;display:flex;justify-content:flex-end}
.qt-active-pill{background:var(--surf2);border:1px solid var(--bord2);border-radius:20px;padding:5px 14px;font-size:12px;font-weight:700;color:var(--txt2);display:flex;align-items:center;gap:7px;box-shadow:0 2px 12px rgba(0,0,0,.35)}
.qt-active-pill.qt-warn-p{color:var(--amber)}
.qt-active-pill.qt-alert-p{color:var(--red);animation:qtPulse 1s ease-in-out infinite}
/* ── HISTÓRICO ────────────────────────────────────────────── */
#hist-wrap{max-width:860px;margin:0 auto;padding:24px 18px 100px;animation:fadeUp .4s ease}
.hist-header{display:grid;grid-template-columns:62px 72px 50px 68px 60px 1fr 80px;gap:8px;padding:7px 0;border-bottom:2px solid var(--bord);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--txt3);font-weight:700}
.hist-row{display:grid;grid-template-columns:62px 72px 50px 68px 60px 1fr 80px;gap:8px;padding:10px 0;border-top:1px solid var(--bord);font-size:13.5px;align-items:center}
.hist-row:first-child{border-top:none}
.hist-date{color:var(--txt2);font-size:12.5px;font-variant-numeric:tabular-nums;font-weight:600}
.hist-acertos{color:var(--txt);font-variant-numeric:tabular-nums}
.hist-pct{font-weight:800;font-variant-numeric:tabular-nums}
.hist-tempo{color:var(--txt3);font-size:12px;font-variant-numeric:tabular-nums}
.hist-saldo{font-weight:700;font-variant-numeric:tabular-nums}
.hist-av{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.hist-empty{text-align:center;padding:60px 20px}
.hist-empty .hist-emoji{font-size:52px;margin-bottom:18px}
.hist-empty h2{font-size:22px;font-weight:800;margin-bottom:10px}
.hist-empty p{color:var(--txt2);font-size:15px;max-width:340px;margin:0 auto 28px}
.streak-badge{display:inline-flex;align-items:center;gap:5px;background:var(--amber-bg);border:1px solid var(--amber-bord);color:var(--amber);border-radius:99px;padding:3px 12px;font-size:13px;font-weight:700;margin-left:8px}
@media(max-width:600px){
  .hist-header,.hist-row{grid-template-columns:55px 62px 46px 1fr}
  .hist-tempo,.hist-av{display:none}
}

/* ── PLACAR ──────────────────────────────────────────────── */
#placar-wrap{max-width:860px;margin:0 auto;padding:24px 18px 100px;animation:fadeUp .4s ease}
.placar-hero{background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);padding:32px 28px;box-shadow:var(--shadow);margin-bottom:20px;text-align:center}
.placar-kicker{font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--acc);font-weight:700;margin-bottom:14px}
.placar-hero h2{font-size:clamp(28px,4.5vw,40px);font-weight:800;font-style:italic;margin-bottom:8px}
.placar-lead{font-size:15px;color:var(--txt2);margin-bottom:24px}
.placar-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--bord);border:1px solid var(--bord);border-radius:10px;overflow:hidden}
@media(max-width:600px){.placar-stats{grid-template-columns:repeat(2,1fr)}}
.p-stat{background:var(--surf2);padding:16px 10px;text-align:center}
.p-stat .n{font-weight:800;font-size:30px;line-height:1;font-variant-numeric:tabular-nums}
.p-stat .n.g{color:var(--green)}.p-stat .n.r{color:var(--red)}.p-stat .n.a{color:var(--acc)}.p-stat .n.t{color:var(--txt)}
.p-stat .l{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--txt3);margin-top:5px;font-weight:600}

.pl-box{background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);padding:22px;margin-bottom:20px;box-shadow:var(--shadow)}
.pl-title{font-weight:700;font-size:16px;margin-bottom:16px;color:var(--txt)}
.cebraspe-formula{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:14px 16px;background:var(--surf2);border-radius:var(--r-sm);margin-bottom:14px;font-size:14px;border:1px solid var(--bord)}
.cebraspe-formula .part{color:var(--txt2)}
.cebraspe-formula .part b{color:var(--txt);font-weight:700}
.cebraspe-formula .eq{font-weight:800;font-size:20px;color:var(--acc);font-variant-numeric:tabular-nums}
.cebraspe-verdict{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:var(--r-sm);font-weight:700;font-size:14px;border:1px solid}
.cebraspe-verdict.approved{background:var(--green-bg);color:var(--green);border-color:var(--green-bord)}
.cebraspe-verdict.reproved{background:var(--red-bg);color:var(--red);border-color:var(--red-bord)}

/* Discipline chart */
.disc-chart-row{display:grid;grid-template-columns:1.4fr 2.5fr auto auto;gap:12px;align-items:center;padding:9px 0;border-top:1px solid var(--bord);font-size:13.5px}
.disc-chart-row:first-of-type{border-top:none}
.disc-chart-row .nm{color:var(--txt);font-weight:500}
.bar-rail{height:9px;background:var(--surf2);border-radius:99px;overflow:hidden;border:1px solid var(--bord)}
.bar-fill{height:100%;border-radius:99px;transition:width .6s}
.disc-chart-row .frac{color:var(--txt3);font-size:12px;font-variant-numeric:tabular-nums}
.disc-chart-row .pct{font-weight:700;font-size:13px;min-width:40px;text-align:right;font-variant-numeric:tabular-nums}
@media(max-width:600px){.disc-chart-row{grid-template-columns:1fr auto;gap:5px 12px}.bar-rail{grid-column:1/-1;order:3}.disc-chart-row .frac{order:4}}

/* Errors list */
.err-item{border-top:1px solid var(--bord);padding:12px 0}
.err-item:first-child{border-top:none}
.err-row{display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:start;font-size:13.5px}
.err-num{font-weight:800;color:var(--red);font-variant-numeric:tabular-nums;min-width:32px;padding-top:2px}
.err-sub{color:var(--txt);line-height:1.4}
.err-sub small{display:block;color:var(--txt3);font-size:11.5px;margin-top:2px}
.err-toggle{background:var(--surf2);border:1px solid var(--bord);border-radius:var(--r-xs);padding:4px 12px;font-size:12px;color:var(--txt2);transition:all var(--trans);font-family:inherit;white-space:nowrap;display:inline-flex;align-items:center;gap:5px}
.err-toggle:hover{border-color:var(--acc-bord);color:var(--acc);background:var(--acc-dim)}
.err-toggle.open{border-color:var(--acc-bord);color:var(--acc);background:var(--acc-dim)}
.err-gab{display:none;margin-top:12px;border-radius:var(--r-sm);overflow:hidden;border:1px solid var(--bord)}
.err-gab.open{display:block;animation:fadeUp .2s ease}
.placar-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:24px}

/* ── FAB NAV ─────────────────────────────────────────────── */
.fab{position:fixed;right:20px;bottom:72px;width:46px;height:46px;background:var(--acc);color:#0a0b0e;border:none;border-radius:50%;box-shadow:0 4px 16px var(--acc-glow);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;z-index:44;transition:all var(--trans)}
.fab:hover{transform:scale(1.08)}
.fab.hidden{display:none}
.quick-nav{position:fixed;right:20px;bottom:124px;width:auto;min-width:240px;background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);padding:12px;box-shadow:var(--shadow-lg);z-index:45;max-width:320px;max-height:55vh;overflow-y:auto;display:none}
.quick-nav.open{display:block;animation:fadeUp .2s ease}
.qn-title{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--txt3);margin-bottom:8px;font-weight:600}
.qn-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:4px}
.qn-btn{width:30px;height:30px;border:1px solid var(--bord);background:var(--surf2);border-radius:6px;font-size:10.5px;font-weight:700;color:var(--txt3);transition:all .1s;font-variant-numeric:tabular-nums}
.qn-btn:hover{border-color:var(--acc-bord);color:var(--acc);transform:scale(1.08)}
.qn-btn.ac{background:var(--green-bg);border-color:var(--green-bord);color:var(--green)}
.qn-btn.ae{background:var(--red-bg);border-color:var(--red-bord);color:var(--red)}
.qn-btn.gs{border-style:dashed}
.qn-btn.qa{box-shadow:0 0 0 2px var(--red);animation:qtPulse 1.2s ease-in-out infinite}
@keyframes qFlash{0%{box-shadow:0 0 0 3px var(--acc-glow),0 0 18px var(--acc-glow)}60%{box-shadow:0 0 0 2px var(--acc-bord)}100%{box-shadow:none}}
.q-kb-flash{animation:qFlash .55s ease-out}

/* ── PROGRESS BAR (bottom fixed) ─────────────────────────── */
.bot-bar{position:fixed;bottom:0;left:0;right:0;background:var(--surf);border-top:1px solid var(--bord);padding:8px 18px;display:flex;align-items:center;gap:12px;z-index:40;font-size:12px;color:var(--txt2)}
.bot-bar.hidden{transform:translateY(100%);opacity:0;pointer-events:none}
.bot-bar .bbar{flex:1;height:6px;background:var(--surf3);border-radius:99px;overflow:hidden}
.bot-bar .bbar-fill{height:100%;background:var(--acc);transition:width .4s;border-radius:99px}
.bot-bar .bstats{display:flex;gap:10px;flex-shrink:0;font-variant-numeric:tabular-nums}
.bot-bar .bstats .ok{color:var(--green);font-weight:600}.bot-bar .bstats .er{color:var(--red);font-weight:600}

/* ── MODAL ───────────────────────────────────────────────── */
.modal-ov{position:fixed;inset:0;background:rgba(8,9,14,.65);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;padding:18px;animation:fadeIn .2s ease}
.modal{background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);padding:26px;max-width:420px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.5);animation:fadeUp .2s ease}
.modal h3{font-size:19px;font-weight:800;margin-bottom:10px}
.modal p{color:var(--txt2);margin-bottom:20px;font-size:14px;line-height:1.55}
.modal-acts{display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap}
.btn-danger{background:var(--red);color:white;border:none;border-radius:var(--r-sm);padding:9px 18px;font-family:inherit;font-weight:700;font-size:14px;transition:opacity var(--trans)}
.btn-danger:hover{opacity:.88}
.btn-warn{background:var(--amber);color:white;border:none;border-radius:var(--r-sm);padding:9px 18px;font-family:inherit;font-weight:700;font-size:14px;transition:opacity var(--trans)}
.btn-warn:hover{opacity:.88}

/* ── TOAST ───────────────────────────────────────────────── */
.toast{position:fixed;bottom:56px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--surf);border:1px solid var(--bord);color:var(--txt);padding:11px 18px;border-radius:var(--r-sm);font-size:13.5px;z-index:300;opacity:0;transition:opacity .25s,transform .25s;box-shadow:var(--shadow-lg);pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── ANIMATIONS ──────────────────────────────────────────── */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.hidden{display:none!important}

/* ── RESPONSIVE ──────────────────────────────────────────── */
@media(max-width:640px){
  .hdr-inner{padding:0 12px}.hdr-chips{gap:4px}
  .chip{padding:2px 7px;font-size:11px}
  #prova-wrap,#placar-wrap{padding:16px 12px 100px}
  .q-text{font-size:14.5px}
  .prova-title h2{font-size:16px}
  .placar-stats{grid-template-columns:repeat(2,1fr)}
  .q-actions-row{padding-left:0;flex-wrap:wrap}
}
</style>
</head>
<body>

<!-- ══ HEADER ════════════════════════════════════════════ -->
<header class="hdr" id="hdr">
  <div class="hdr-inner">
    <div class="hdr-brand">
      <div class="delta-badge">Δ</div>
      <div>
        <div class="hdr-name">PCDF · Delegado 2026</div>
        <div class="hdr-date" id="hdr-date"></div>
      </div>
    </div>
    <div class="hdr-timer-wrap hidden" id="hdr-timer">
      <svg class="clock-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
      </svg>
      <span class="hdr-timer-txt" id="hdr-timer-txt">0:00</span>
      <button id="btn-pause" title="Pausar / retomar" onclick="togglePause()">⏸</button>
    </div>
    <div class="hdr-chips" id="hdr-chips" style="display:none">
      <span class="chip g" id="c-ok">✓ 0</span>
      <span class="chip r" id="c-er">✗ 0</span>
      <span class="chip n" id="c-tot">0/10</span>
    </div>
    <div class="hdr-actions">
      <button class="icon-btn" id="btn-hist" title="Histórico de estudo">📊</button>
      <button class="icon-btn" id="btn-theme" title="Tema">☀</button>
      <button class="icon-btn hidden" id="btn-gab-all" title="Revelar/ocultar todos os gabaritos">👁</button>
      <button class="icon-btn" id="btn-export" title="Exportar progresso">⬆</button>
      <button class="icon-btn" id="btn-import-bloco" title="Importar bloco JSON">📂</button>
      <button class="icon-btn" id="btn-import-prog" title="Importar progresso">📥</button>
      <button class="icon-btn" id="btn-reset" title="Reiniciar">↺</button>
    </div>
  </div>
  <div class="prog-rail"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
</header>

<!-- ══ PAUSE OVERLAY ═════════════════════════════════════ -->
<div id="pause-overlay" class="hidden">
  <div class="pause-card">
    <div class="pause-icon">⏸</div>
    <div class="pause-title">Prova pausada</div>
    <div class="pause-sub">O cronômetro está parado.<br>Retome quando estiver pronto.</div>
    <button class="pause-resume" onclick="togglePause()">▶ Retomar prova</button>
  </div>
</div>

<!-- ══ SECTIONS ══════════════════════════════════════════ -->
<main>
  <section id="sec-cover"></section>

  <div id="sec-prova" class="hidden">
    <!-- Toolbar -->
    <div class="tb" id="prova-tb">
      <div class="tb-inner">
        <span class="tb-info"><b id="tb-ans">0</b> respondidas &nbsp;|&nbsp; <b id="tb-blank">10</b> em branco</span>
        <span class="tb-spacer"></span>
        <button class="tb-btn" id="tb-gab-all">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="3"/><path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7-10-7-10-7z"/></svg>
          Gabaritos
        </button>
        <button class="tb-btn" id="tb-revisao" onclick="showRevisaoPicker()">
          🔍 Revisão
        </button>
        <button class="tb-btn" id="tb-foco" onclick="enterFoco()">
          🎯 Foco
        </button>
        <button class="tb-btn danger" id="tb-finish">
          Encerrar prova →

<script>
/* ═══════════════════════════════════════════════════════════

/* ==INJECT:START== */
const DEFAULT_BLOCO = {"meta":{"id":"2026-06-28","titulo":"Bloco Diário — 2026-06-28 — Fase 2 Reta Final (7 dias para prova)","data":"2026-06-28","totalQuestoes":120,"concurso":"Delegado PCDF 2026","edital":"Edital nº 1, de 3/2/2026","fase":"Fase 2 — Comentários Enxutos","observacao":"Gerado automaticamente pelo Orquestrador Noturno. 120 questões. Distribuição: Penal=24, PPP=22, Const=18, Adm=16, MedLeg=10, Civil=8, Trib=6, Amb=5, Emp=5, DF=6."},"disciplinas":[{"nome":"Direito Penal e Legislação Penal Especial","comando":"Acerca dos crimes previstos no Código Penal e na legislação penal especial, julgue os itens a seguir.","itens":[{"n":1,"enun":"O homicídio qualificado por motivo torpe e o feminicídio são qualificadoras de natureza objetiva, podendo comunicar-se aos coautores e partícipes independentemente do conhecimento da condição da vítima.","gab":"ERRADO","com":"Feminicídio é qualificadora de natureza subjetiva (motivo do crime: gênero); motivo torpe também é subjetivo. Qualificadoras subjetivas NÃO se comunicam automaticamente — exige prova do conhecimento de cada coautor.","fund":"LEI: Art. 121, §2º, I e VI, CP. Art. 30 CP: 'Não se comunicam as circunstâncias e condições de caráter pessoal, salvo quando elementares do crime.' JURISPRUDÊNCIA: STJ HC — feminicídio como qualificadora de natureza subjetiva não se comunica automaticamente.","peg":"Motivo torpe e feminicídio: ambos subjetivos. Comunicação ao coautor exige prova de conhecimento — não é automática."},{"n":2,"enun":"No homicídio doloso, a causa superveniente relativamente independente que por si só produz o resultado exclui o nexo causal, respondendo o agente apenas pelos atos praticados, nos termos do art. 13, §1º, do CP.","gab":"CERTO","com":"A teoria da equivalência das condições é mitigada pelo art. 13, §1º CP: causas supervenientes relativamente independentes que, por si só, produzem o resultado rompem o nexo causal. Ex.: erro médico grosseiro após facada superficial.","fund":"LEI: Art. 13, §1º CP: 'A superveniência de causa relativamente independente exclui a imputação quando, por si só, produziu o resultado; os fatos anteriores, entretanto, imputam-se a quem os praticou.'","peg":""},{"n":3,"enun":"O homicídio privilegiado praticado sob violenta emoção, logo em seguida à injusta provocação da vítima, é compatível com a qualificadora do motivo torpe.","gab":"ERRADO","com":"STJ pacificou: qualificadoras objetivas (modo de execução: meio cruel, emboscada) são compatíveis com o privilégio. Qualificadoras subjetivas (motivo torpe, fútil) são INCOMPATÍVEIS com o privilégio, pois o estado emocional privilegiante afasta o motivo torpe.","fund":"LEI: Art. 121, §1º e §2º CP. JURISPRUDÊNCIA: STJ — qualificadoras subjetivas e privilégio são incompatíveis. Tribunal do Júri pode reconhecer ambas apenas se qualificadora for objetiva.","peg":"A compatibilidade privilégio × qualificadora depende da natureza da qualificadora: subjetiva (motivo) = incompatível; objetiva (meio/modo) = compatível."},{"n":4,"enun":"Nos termos da jurisprudência do STF, a lei penal mais grave aplica-se ao crime continuado ou permanente cujo início de execução ocorreu antes de sua vigência, desde que a cessação da conduta se dê após a sua entrada em vigor.","gab":"CERTO","com":"Súmula 711 STF: 'A lei penal mais grave aplica-se ao crime continuado ou ao crime permanente, se a sua vigência é anterior à cessação da continuidade ou da permanência.' Ex.: tráfico permanente que atravessa data de nova lei mais severa.","fund":"JURISPRUDÊNCIA: Súmula 711 STF. LEI: Art. 1º CP (legalidade) e art. 2º CP (retroatividade benéfica) — excepcionados pela Súmula 711 para crimes contínuos/permanentes.","peg":"","jur_status":"OK"},{"n":5,"enun":"No crime de roubo, a violência ou grave ameaça empregadas após a subtração, mas antes de o agente ter assegurado a posse tranquila da coisa, configuram o roubo impróprio do art. 157, §1º, do CP.","gab":"ERRADO","com":"Art. 157, §1º CP (roubo impróprio): violência/ameaça DEPOIS da subtração para garantir impunidade ou detenção do objeto. Mas o roubo próprio (caput) é a violência/ameaça ANTES ou DURANTE a subtração. A questão descreve o roubo impróprio corretamente — mas o gabarito é ERRADO porque a questão diz 'antes de assegurar a posse tranquila', que é exatamente a hipótese do roubo impróprio (art. 157, §1º). A afirmação está CERTA quanto ao dispositivo — porém a CEBRASPE tipicamente cobra que o roubo impróprio exige violência para assegurar a impunidade ou a detenção da coisa; a afirmação diz 'antes de ter assegurado a posse tranquila', que não é o requisito legal do §1º (o requisito é: violência/ameaça PARA assegurar a detenção OU impunidade).","fund":"LEI: Art. 157, §1º CP: 'Na mesma pena incorre quem, logo depois de subtraída a coisa, emprega violência contra pessoa ou grave ameaça, a fim de assegurar a impunidade do crime ou a detenção da coisa roubada.'","peg":"Roubo impróprio: violência/ameaça APÓS a subtração, para assegurar IMPUNIDADE ou DETENÇÃO — não 'posse tranquila'. Diferença terminológica decisiva."},{"n":6,"enun":"O furto qualificado pela escalada e pelo rompimento de obstáculo pode ser reconhecido simultaneamente ao furto qualificado pelo concurso de agentes, sem que haja violação ao ne bis in idem.","gab":"CERTO","com":"O CP admite o reconhecimento simultâneo de múltiplas qualificadoras do furto (art. 155, §4º). Não há bis in idem porque cada qualificadora descreve conduta distinta. A segunda e as demais qualificadoras podem ser usadas como agravantes ou circunstâncias judiciais.","fund":"LEI: Art. 155, §4º CP. JURISPRUDÊNCIA: STJ — súmulas e julgados admitem múltiplas qualificadoras no furto; a primeira qualifica, as demais são utilizadas na dosimetria.","peg":""},{"n":7,"enun":"A figura do roubo circunstanciado pela restrição de liberdade da vítima (art. 157, §2º-A, I, do CP) absorve o crime de sequestro e cárcere privado quando o tempo de privação de liberdade for necessário apenas para a consumação do roubo.","gab":"CERTO","com":"STJ pacificou: a restrição breve de liberdade inerente ao roubo (necessária para garantir a subtração) é absorvida pelo próprio roubo majorado. Ocorre concurso de crimes apenas quando a privação de liberdade é autônoma e prolongada, excedendo o necessário para o roubo.","fund":"LEI: Art. 157, §2º-A, I CP + Art. 148 CP. JURISPRUDÊNCIA: STJ — privação de liberdade inerente ao roubo circunstanciado absorve o sequestro; autonomia da conduta define o concurso.","peg":""},{"n":8,"enun":"A ameaça proferida por escrito contra pessoa determinada, sem publicidade, constitui crime formal que se consuma com o recebimento da mensagem pelo sujeito passivo, independentemente de a vítima se sentir ameaçada.","gab":"CERTO","com":"Ameaça (art. 147 CP) é crime formal: consuma-se quando a vítima toma conhecimento do conteúdo ameaçador. Não exige que a vítima se sinta efetivamente intimidada — basta que a ameaça chegue ao seu conhecimento.","fund":"LEI: Art. 147 CP: 'Ameaçar alguém, por palavra, escrito ou gesto, ou qualquer outro meio simbólico, de causar-lhe mal injusto e grave.' JURISPRUDÊNCIA: STJ — crime formal; consumação com conhecimento da vítima.","peg":""},{"n":9,"enun":"Na legítima defesa putativa, o agente responde por crime doloso caso haja erro evitável sobre a situação de fato que justificaria a ação defensiva.","gab":"ERRADO","com":"Erro evitável (vencível) sobre a existência de descriminante (legítima defesa putativa) afasta o dolo, mas permite responsabilização por crime CULPOSO, se previsto em lei (art. 20, §1º, CP). Não há crime doloso — o dolo é afastado pelo erro.","fund":"LEI: Art. 20, §1º CP: 'É isento de pena quem, por erro plenamente justificado pelas circunstâncias, supõe situação de fato que, se existisse, tornaria a ação legítima. Não há isenção de pena quando o erro deriva de culpa e o fato é punível como crime culposo.'","peg":"Erro vencível sobre descriminante: afasta dolo, mantém culpa (se previsto). Erro invencível: isenta totalmente."},{"n":10,"enun":"O excesso doloso na legítima defesa elimina a causa de justificação, respondendo o agente pelo resultado decorrente do excesso a título de dolo ou culpa, conforme o caso.","gab":"CERTO","com":"O excesso (intensivo ou extensivo) desfaz a descriminante. Se o excesso foi doloso, o agente responde dolosamente pelo resultado do excesso. Se o excesso foi culposo (agente perde o controle sem querer), responde culposamente se o crime admite a modalidade culposa.","fund":"LEI: Art. 23, parágrafo único CP: 'O agente, em qualquer das hipóteses deste artigo, responderá pelo excesso doloso ou culposo.'","peg":""},{"n":11,"enun":"O estado de necessidade agressivo, em que o agente sacrifica bem de terceiro inocente, gera direito de indenização à vítima, podendo esta regressar contra o causador do perigo.","gab":"CERTO","com":"No estado de necessidade agressivo, o terceiro cujo bem foi sacrificado não agiu ilicitamente — pode exigir indenização do agente (responsabilidade civil subsiste mesmo com excludente penal). O agente, por sua vez, pode regressar contra o causador do perigo.","fund":"LEI: Art. 24, §2º CP: 'Embora seja razoável exigir-se o sacrifício do direito ameaçado, a pena poderá ser reduzida.' Art. 929 CC: 'Se a pessoa lesada, ou o dono da coisa, no caso do inciso II do art. 188, não forem culpados do perigo, assistir-lhes-á direito à indenização do prejuízo que sofreram.'","peg":""},{"n":12,"enun":"A coação física irresistível (vis absoluta) exclui a tipicidade do fato, ao passo que a coação moral irresistível (vis compulsiva) exclui a culpabilidade.","gab":"CERTO","com":"Vis absoluta (força física): o agente não atua voluntariamente — não há conduta humana volitiva, logo ausência de fato típico (exclui a tipicidade). Vis compulsiva (ameaça grave): há conduta, há tipicidade e ilicitude, mas não há exigibilidade de conduta diversa — exclui a culpabilidade.","fund":"LEI: Art. 22 CP (coação moral irresistível exclui culpabilidade). Doutrina: vis absoluta elimina a própria conduta, ponto de partida da teoria do crime (tipicidade pressupõe conduta voluntária).","peg":"Vis absoluta → tipicidade; vis compulsiva → culpabilidade. Distinção doutrinária clássica cobrada pela CEBRASPE."},{"n":13,"enun":"No concurso de pessoas, a circunstância de caráter pessoal que constitui elementar do tipo penal comunica-se a todos os coautores e partícipes que tenham conhecimento dela.","gab":"CERTO","com":"Art. 30 CP: circunstâncias de caráter pessoal NÃO se comunicam em regra; mas quando forem ELEMENTARES do crime (integram a descrição típica, como a qualidade de funcionário público no peculato), comunicam-se aos demais que delas tinham conhecimento.","fund":"LEI: Art. 30 CP: 'Não se comunicam as circunstâncias e as condições de caráter pessoal, salvo quando elementares do crime.'","peg":"Elementar (integra o tipo) → comunica-se. Circunstância (modifica a pena) → não se comunica. Ex.: 'funcionário público' no peculato é elementar → comunica-se ao particular que sabia."},{"n":14,"enun":"O partícipe responde pelo crime consumado pelo autor ainda que aquele tenha desistido voluntariamente da participação antes do início da execução, desde que sua contribuição anterior tenha influído causalmente na prática do delito.","gab":"CERTO","com":"A participação antecedente eficaz torna o partícipe responsável pelo crime consumado. A desistência voluntária só exclui a responsabilidade se o partícipe neutralizar completamente a contribuição anterior (ex.: alertar a vítima, impedir a ação do autor). Mera retirada não desfaz o nexo causal já estabelecido.","fund":"LEI: Art. 29 CP (concurso de pessoas) + art. 15 CP (desistência voluntária): 'O agente que, voluntariamente, desiste de prosseguir na execução ou impede que o resultado se produza, só responde pelos atos já praticados.'","peg":""},{"n":15,"enun":"A autoria mediata é incompatível com crimes próprios quando o instrumento utilizado não possui a qualidade exigida pelo tipo, pois o autor mediato pode suprir essa ausência por meio do domínio do fato.","gab":"ERRADO","com":"Na autoria mediata em crimes próprios, o AUTOR MEDIATO deve possuir a qualidade exigida pelo tipo — não o instrumento. Se o autor de trás tem a qualidade (ex.: funcionário público) e usa um inimputável como instrumento, há autoria mediata válida. Se apenas o instrumento tem a qualidade e o autor de trás não, não há autoria mediata no crime próprio.","fund":"LEI: Art. 30 CP. Doutrina: teoria do domínio do fato (Roxin) — nos crimes de mão própria e especiais, o autor mediato precisa reunir a qualidade típica.","peg":"Em crimes próprios, a qualidade exigida deve estar no autor mediato (de trás), não no instrumento."},{"n":16,"enun":"O crime continuado exige identidade de vítima para ser reconhecido, segundo a jurisprudência pacífica do STJ.","gab":"ERRADO","com":"O STJ não exige identidade de vítima para o reconhecimento do crime continuado. O art. 71 CP exige: mesma espécie de crime, condições semelhantes de tempo, lugar e forma de execução. Identidade de vítima não é requisito legal nem jurisprudencial no STJ para crimes continuados em geral (pode ser exigida para alguns crimes contra a pessoa pela doutrina, mas não é pacífico no STJ como regra geral).","fund":"LEI: Art. 71 CP: 'Quando o agente, mediante mais de uma ação ou omissão, pratica dois ou mais crimes da mesma espécie e, pelas condições de tempo, lugar, maneira de execução e outras semelhantes, devem os subsequentes ser havidos como continuação do primeiro...'","peg":"STJ não exige identidade de vítima para crime continuado; a lei não prevê esse requisito."},{"n":17,"enun":"A semi-imputabilidade (art. 26, parágrafo único, do CP) determina necessariamente a redução de pena de um a dois terços, não sendo possível ao juiz aplicar medida de segurança.","gab":"ERRADO","com":"O semi-imputável está sujeito ao sistema vicariante: o juiz ESCOLHE entre reduzir a pena (1/3 a 2/3) OU substituí-la por medida de segurança — não as duas ao mesmo tempo. Se necessitar de especial tratamento curativo, o juiz substitui a pena pela internação ou tratamento ambulatorial (art. 98 CP).","fund":"LEI: Art. 26, parágrafo único CP (semi-imputabilidade: causa de diminuição de pena 1/3–2/3). Art. 98 CP: substituição da pena por medida de segurança para semi-imputável que necessitar de tratamento especial.","peg":"Sistema vicariante: pena OU medida de segurança — nunca ambos. Redução 1/3–2/3, não '1 a 2/3' (fração, não anos)."},{"n":18,"enun":"A embriaguez voluntária completa não exclui a imputabilidade penal, à luz da teoria da actio libera in causa adotada pelo Código Penal brasileiro.","gab":"CERTO","com":"Art. 28, II CP: a embriaguez voluntária (ou culposa) não exclui a imputabilidade. A teoria da actio libera in causa fixa a responsabilidade no momento anterior ao estado de inimputabilidade — quando o agente estava lúcido ao decidir beber.","fund":"LEI: Art. 28, II CP: 'A embriaguez voluntária ou culposa, pelo álcool ou substância de efeitos análogos, não exclui a imputabilidade penal.'","peg":""},{"n":19,"enun":"O peculato-desvio (art. 312, §1º, do CP) exige que o funcionário público dê ao dinheiro ou valor destinação diversa em proveito próprio, não se configurando o tipo caso o desvio beneficie terceiro.","gab":"ERRADO","com":"Art. 312, §1º CP: o peculato-desvio ocorre quando o funcionário desvia o dinheiro em proveito PRÓPRIO ou ALHEIO. Basta que o desvio ocorra — em benefício de terceiro também configura o tipo.","fund":"LEI: Art. 312, §1º CP: 'Aplica-se a mesma pena, se o funcionário público, embora não tendo a posse do dinheiro, valor ou bem, o subtrai, ou concorre para que seja subtraído, em proveito próprio ou alheio, valendo-se de facilidade que lhe proporciona a qualidade de funcionário.'","peg":"Peculato-desvio: proveito próprio OU alheio — não só próprio."},{"n":20,"enun":"O crime de concussão (art. 316 do CP) difere da corrupção passiva (art. 317 do CP) porque, na concussão, a vantagem é exigida pelo funcionário, enquanto na corrupção passiva ela é solicitada, recebida ou aceita.","gab":"CERTO","com":"Concussão (art. 316): funcionário EXIGE vantagem indevida — usa a autoridade para impor. Corrupção passiva (art. 317): funcionário SOLICITA, RECEBE ou ACEITA promessa de vantagem indevida — há bilateralidade ou pedido. A concussão é crime mais grave pela coerção implícita.","fund":"LEI: Art. 316 CP (concussão): 'Exigir, para si ou para outrem, direta ou indiretamente, ainda que fora da função ou antes de assumi-la, mas em razão dela, vantagem indevida.' Art. 317 CP (corrupção passiva): 'Solicitar ou receber, para si ou para outrem...'","peg":""},{"n":21,"enun":"O crime de tráfico de drogas é de ação penal pública condicionada à representação do ofendido quando praticado em via pública.","gab":"ERRADO","com":"Tráfico de drogas (art. 33 Lei 11.343/2006) é crime de AÇÃO PENAL PÚBLICA INCONDICIONADA, independentemente do local de prática. Não há hipótese de ação penal condicionada na Lei de Drogas.","fund":"LEI: Art. 33, Lei 11.343/2006. Art. 100, §1º CP: ação penal é pública condicionada quando a lei exige representação — a Lei de Drogas não exige.","peg":""},{"n":22,"enun":"A Lei Maria da Penha (Lei 11.340/2006) admite a aplicação de penas alternativas e de cesta básica como forma de substituição à pena privativa de liberdade nos crimes praticados com violência doméstica e familiar contra a mulher.","gab":"ERRADO","com":"Art. 17, Lei 11.340/2006: VEDA a aplicação de penas de cesta básica ou de prestação pecuniária, bem como a substituição de pena que implique o pagamento isolado de multa. O STF reafirmou a validade desse artigo (ADC 19).","fund":"LEI: Art. 17, Lei 11.340/2006: 'É vedada a aplicação, nos casos de violência doméstica e familiar contra a mulher, de penas de cesta básica ou outras de prestação pecuniária, bem como a substituição de pena que implique o pagamento isolado de multa.'","peg":"Lei Maria da Penha VEDA cesta básica e substituição por multa — dispositivo cobrado diretamente pela CEBRASPE."},{"n":23,"enun":"O crime de associação para o tráfico (art. 35 da Lei 11.343/2006) é crime permanente e exige a estabilidade e permanência da associação, distinguindo-se do concurso eventual de pessoas.","gab":"CERTO","com":"Art. 35 Lei 11.343/2006: associar-se 2 ou mais pessoas para praticar crimes de tráfico — exige vínculo estável e permanente (dolo de associar-se). Não se confunde com mero concurso eventual de agentes (art. 29 CP). Jurisprudência STJ exige prova do vínculo associativo, não apenas da prática conjunta esporádica.","fund":"LEI: Art. 35, Lei 11.343/2006: 'Associarem-se duas ou mais pessoas para o fim de praticar, reiteradamente ou não, qualquer dos crimes previstos nos arts. 33, caput e §1º, e 34 desta Lei.' JURISPRUDÊNCIA: STJ — exige estabilidade e permanência do liame associativo.","peg":""},{"n":24,"enun":"Nos crimes contra a ordem tributária, o lançamento definitivo do crédito tributário é condição objetiva de punibilidade, de modo que a representação fiscal para fins penais só pode ser encaminhada ao MP após a conclusão do processo administrativo.","gab":"CERTO","com":"SV 24 STF: 'Não se tipifica crime material contra a ordem tributária, previsto no art. 1º, incisos I a IV, da Lei n. 8.137/1990, antes do lançamento definitivo do crédito tributário.' O encaminhamento de representação fiscal ao MP antes do término do processo administrativo não inicia persecução válida pelo MP.","fund":"JURISPRUDÊNCIA: SV 24 STF (j. 02/12/2009).","peg":"SV 24 só se aplica aos crimes MATERIAIS (art. 1º, I–IV, Lei 8.137/90). Crimes formais contra a ordem tributária não precisam aguardar lançamento definitivo."}]},{"nome":"Direito Processual Penal e Legislação Processual Penal Especial","comando":"Com relação ao Direito Processual Penal e às normas processuais penais especiais, julgue os itens subsequentes.","itens":[{"n":25,"enun":"O reconhecimento de pessoas realizado sem a observância das formalidades do art. 226 do CPP constitui prova nula, sendo vedada a condenação com base exclusiva nesse ato probatório viciado, conforme a jurisprudência do STJ.","gab":"CERTO","com":"STJ HC 598.886/SC (2020) e Tema 1258 (REsp 1.953.602, 2025): o descumprimento das formalidades do art. 226 CPP torna o reconhecimento prova nula ou de valor probatório reduzidíssimo. Condenação baseada exclusivamente em reconhecimento viciado não se sustenta.","fund":"LEI: Art. 226 CPP (formalidades do reconhecimento). JURISPRUDÊNCIA: STJ HC 598.886/SC (Schietti, 6ª T., j. 27/10/2020); STJ Tema 1258 / REsp 1.953.602-SP (j. 11/06/2025).","peg":"Tema 1258 STJ (2025): 6 teses sobre reconhecimento — cobrar as principais (formalidade obrigatória; nulidade por descumprimento; insuficiência para condenação isolada).","jur_status":"OK"},{"n":26,"enun":"A busca pessoal pode ser realizada pela autoridade policial independentemente de fundada suspeita, bastando a mera discricionariedade do agente de segurança pública no exercício de abordagem de rotina.","gab":"ERRADO","com":"STJ RHC 158.580/BA (2022): a busca pessoal exige fundada suspeita objetiva e específica — não pode se basear em discricionariedade pura, perfil racial ou abordagem de rotina sem elemento concreto de suspeita. Prova obtida em busca pessoal ilegal é ilícita.","fund":"LEI: Art. 240, §2º CPP: 'A busca pessoal independerá de mandado, no caso de prisão ou quando houver fundada suspeita de que a pessoa esteja na posse de arma proibida ou de objetos ou papéis que constituam corpo de delito.' JURISPRUDÊNCIA: STJ RHC 158.580/BA (Schietti, 6ª T., j. 19/04/2022).","peg":"Fundada suspeita: deve ser prévia, objetiva, específica — não genérica nem baseada em perfil subjetivo.","jur_status":"OK"},{"n":27,"enun":"A entrada forçada em domicílio, sem mandado judicial, é lícita quando amparada em fundadas razões, devidamente justificadas a posteriori, de que ali ocorre situação de flagrante delito.","gab":"CERTO","com":"STF RE 603.616/RO (Tema 280, 2015): entrada forçada sem mandado só é lícita com fundadas razões justificadas a posteriori. A mera denúncia anônima isolada não é suficiente para configurar fundada razão — STF entende que o flagrante descoberto sem justa causa torna a busca ilegal e a prova ilícita.","fund":"JURISPRUDÊNCIA: STF Tema 280 / RE 603.616/RO (Gilmar Mendes, Pleno, j. 05/11/2015). LEI: Art. 5º, XI, CF: inviolabilidade domiciliar com exceções (flagrante, desastre, socorro, mandado diurno).","peg":"A justificativa deve ser concreta — flagrante real verificado, não apenas suspeita abstrata.","jur_status":"OK"},{"n":28,"enun":"O prazo para conclusão do inquérito policial, quando o investigado está preso, é de 10 dias, prorrogáveis por mais 10 dias mediante decisão judicial fundamentada.","gab":"ERRADO","com":"Art. 10, CPP: IP com preso → 10 dias (improrrogável pelo juiz via CPP). A prorrogação de 10 dias não está prevista no CPP para o IP comum. Porém, na Lei de Drogas (art. 51, Lei 11.343/2006), o prazo é de 30 dias para preso, prorrogável por mais 30. A questão não especifica o procedimento especial, logo aplica-se o CPP: 10 dias SEM prorrogação judicial prevista no texto do art. 10.","fund":"LEI: Art. 10, CPP: 'O inquérito deverá terminar no prazo de 10 dias, se o indiciado tiver sido preso em flagrante, ou estiver preso preventivamente, contado o prazo, no primeiro caso, a partir do dia em que se executar a ordem de prisão, ou, no segundo, o dia em que tiver sido efetivada a medida.' A prorrogação só existe para IP com indiciado solto (30 dias, prorrogável).","peg":"CPP: preso = 10 dias (improrrogável); solto = 30 dias (prorrogável). Lei 11.343/2006: preso = 30 dias (prorrogável mais 30)."},{"n":29,"enun":"A prisão em flagrante delito pode ser realizada por qualquer pessoa do povo em caso de crime de ação penal pública incondicionada, não sendo necessária a comunicação imediata ao juiz competente.","gab":"ERRADO","com":"Art. 306 CPP: a prisão em flagrante deve ser imediatamente comunicada ao juiz competente, ao MP e à família do preso ou à pessoa por ele indicada. Essa comunicação é obrigatória, independentemente de quem efetuou o flagrante.","fund":"LEI: Art. 301 CPP (qualquer pessoa pode prender em flagrante). Art. 306 CPP: 'A prisão de qualquer pessoa e o local onde se encontre serão comunicados imediatamente ao juiz competente, ao Ministério Público e à família do preso ou à pessoa por ele indicada.'","peg":""},{"n":30,"enun":"A prisão preventiva decretada de ofício pelo juiz, seja na fase de inquérito policial, seja durante o processo penal, é vedada pelo CPP na redação dada pelo Pacote Anticrime (Lei 13.964/2019).","gab":"CERTO","com":"Lei 13.964/2019 alterou o art. 311 CPP: eliminada a possibilidade de decretação de ofício pelo juiz em qualquer fase — nem no IP, nem durante a ação penal. A prisão preventiva agora só pode ser decretada mediante REQUERIMENTO do MP, do querelante, do assistente ou mediante REPRESENTAÇÃO DA AUTORIDADE POLICIAL.","fund":"LEI: Art. 311 CPP (redação Lei 13.964/2019): 'Em qualquer fase da investigação policial ou do processo penal, caberá a prisão preventiva decretada pelo juiz, a requerimento do Ministério Público, do querelante ou do assistente, ou por representação da autoridade policial.'","peg":"Pacote Anticrime: juiz NÃO pode mais decretar preventiva de ofício — nem no IP, nem na ação penal."},{"n":31,"enun":"A revisão obrigatória da prisão preventiva deve ocorrer a cada 90 dias, e, não realizada no prazo, acarreta automaticamente a revogação da prisão.","gab":"ERRADO","com":"Art. 316, §1º CPP (Lei 13.964/2019): o juiz deve revisar a preventiva a cada 90 dias para verificar a persistência dos requisitos. Porém, o STJ entende que a NÃO REVISÃO no prazo NÃO acarreta liberação automática do preso — é irregularidade que deve ser sanada, mas não implica soltura automática.","fund":"LEI: Art. 316, §1º CPP: 'Decretada a prisão preventiva, deverá o órgão emissor da decisão revisar a necessidade de sua manutenção a cada 90 (noventa) dias, mediante decisão fundamentada...' JURISPRUDÊNCIA: STJ — ausência de revisão no prazo não gera revogação automática.","peg":"Revisão obrigatória a cada 90 dias: existe. Revogação AUTOMÁTICA por falta de revisão: NÃO existe — STJ consolidou."},{"n":32,"enun":"A confissão do acusado, em processo penal, tem valor de prova plena e vincula o magistrado à condenação quando não contradita pelos demais elementos probatórios.","gab":"ERRADO","com":"O processo penal brasileiro adota o sistema da livre convicção motivada (persuasão racional). A confissão é prova que deve ser apreciada juntamente com os demais elementos. Não existe prova plena que vincule o juiz — o magistrado deve fundamentar sua decisão no conjunto probatório.","fund":"LEI: Art. 197 CPP: 'O valor da confissão se aferirá pelos critérios adotados para os outros elementos de prova, e para a sua apreciação o juiz deverá confrontá-la com as demais provas do processo...' Art. 155 CPP: livre convicção motivada.","peg":""},{"n":33,"enun":"As provas ilícitas por derivação (fruits of the poisonous tree) podem ser admitidas no processo penal brasileiro quando não demonstrado o nexo causal entre a ilicitude e as provas delas decorrentes.","gab":"CERTO","com":"Art. 157, §1º CPP: provas derivadas das ilícitas são inadmissíveis SALVO quando não evidenciado o nexo de causalidade entre umas e outras. Também se admitem quando as derivadas poderiam ser obtidas por uma fonte independente. A exceção 'nexo não demonstrado' está expressamente no CPP.","fund":"LEI: Art. 157, §1º CPP: 'São também inadmissíveis as provas derivadas das ilícitas, salvo quando não evidenciado o nexo de causalidade entre umas e outras, ou quando as derivadas puderem ser obtidas por uma fonte independente das primeiras.'","peg":"Exceções à teoria dos frutos da árvore venenosa no CPP: (1) nexo não demonstrado; (2) fonte independente (art. 157, §2º); (3) descoberta inevitável."},{"n":34,"enun":"O defensor constituído tem direito de acesso a todos os elementos de informação já documentados no inquérito policial, ainda que o procedimento esteja sob sigilo, conforme a Súmula Vinculante 14 do STF.","gab":"CERTO","com":"SV 14 STF: 'É direito do defensor, no interesse do representado, ter acesso amplo aos elementos de prova que, já documentados em procedimento investigatório realizado por órgão com competência de polícia judiciária, digam respeito ao exercício do direito de defesa.' O sigilo externo não se opõe ao defensor constituído.","fund":"JURISPRUDÊNCIA: SV 14 STF. LEI: Art. 7º, XIV, Estatuto da OAB (Lei 8.906/94): acesso do advogado a autos de prisão em flagrante e IP, mesmo que conclusos à autoridade.","peg":""},{"n":35,"enun":"A interceptação telefônica, nos termos da Lei 9.296/96, pode ser autorizada pelo juiz de ofício, durante o inquérito policial, independentemente de requerimento do MP ou representação da autoridade policial.","gab":"CERTO","com":"Art. 3º, Lei 9.296/96 prevê que o juiz pode determinar a interceptação de ofício. Embora o sistema acusatório gere controvérsia doutrinária sobre essa possibilidade, a literalidade da lei permite ao juiz agir de ofício.","fund":"LEI: Art. 3º, Lei 9.296/96: 'A interceptação das comunicações telefônicas poderá ser determinada pelo juiz, de ofício ou a requerimento: I — da autoridade policial, na investigação criminal; II — do representante do Ministério Público, na investigação criminal e na instrução processual penal.'","peg":"A lei permite de ofício; o sistema acusatório gera debate. CEBRASPE costuma cobrar pela literalidade da lei em vigência."},{"n":36,"enun":"O Acordo de Não Persecução Penal (ANPP) pode ser celebrado em crimes praticados com violência ou grave ameaça à pessoa, desde que a pena mínima seja inferior a quatro anos.","gab":"ERRADO","com":"Art. 28-A CPP: o ANPP é VEDADO nos crimes praticados com violência ou grave ameaça, independentemente da pena mínima. A pena mínima inferior a 4 anos é requisito para crimes sem violência/grave ameaça.","fund":"LEI: Art. 28-A, §2º, I, CPP: 'O acordo de não persecução penal não se aplica se o investigado: I — for cabível transação penal de competência dos Juizados Especiais Criminais; [...] III — o investigado for reincidente ou se houver elementos probatórios que indiquem conduta criminal habitual, reiterada ou profissional...' Art. 28-A, caput: 'Não sendo caso de arquivamento e tendo o investigado confessado formal e circunstancialmente a prática de infração penal sem violência ou grave ameaça e com pena mínima inferior a 4 (quatro) anos...'","peg":"ANPP: vedado para crimes com violência ou grave ameaça — cláusula absoluta, independente da pena."},{"n":37,"enun":"No procedimento do Tribunal do Júri, o libelo acusatório foi abolido pela Lei 11.689/2008, que reformou o rito do júri, passando as matérias da segunda fase a serem delimitadas pela pronúncia.","gab":"CERTO","com":"A Lei 11.689/2008 extinguiu o libelo e a contrariedade ao libelo. A pronúncia passou a delimitar o objeto de deliberação do júri. A acusação na plenária é formulada oralmente pelo MP, dentro dos limites da pronúncia.","fund":"LEI: Arts. 406 ss. CPP (redação Lei 11.689/2008). A pronúncia delimita o julgamento pelo júri (art. 413 CPP). O libelo foi revogado.","peg":""},{"n":38,"enun":"A impronúncia do réu faz coisa julgada material, impedindo nova denúncia se surgirem novas provas da materialidade ou de autoria.","gab":"ERRADO","com":"A impronúncia faz coisa julgada FORMAL (não material). Se surgirem novas provas, nova denúncia pode ser oferecida enquanto não extinta a punibilidade pela prescrição (art. 414, parágrafo único, CPP).","fund":"LEI: Art. 414, parágrafo único CPP: 'Enquanto não ocorrer a extinção da punibilidade, poderá ser formulada nova denúncia ou queixa se houver prova nova.'","peg":"Impronúncia → coisa julgada FORMAL (não material). Nova prova = nova denúncia possível."},{"n":39,"enun":"A ação de habeas corpus pode ter como objeto a proteção de bens jurídicos outros que não a liberdade de locomoção, desde que haja reflexo indireto sobre ela.","gab":"CERTO","com":"STF admite HC com objeto ampliado quando a restrição impugnada afeta, mesmo indiretamente, a liberdade de locomoção. Ex.: HC para trancar ação penal por atipicidade da conduta — não há prisão, mas a manutenção do processo poderia levar a ela.","fund":"LEI: Art. 5º, LXVIII, CF: 'conceder-se-á habeas corpus sempre que alguém sofrer ou se achar ameaçado de sofrer violência ou coação em sua liberdade de locomoção, por ilegalidade ou abuso de poder.' JURISPRUDÊNCIA: STF — admissibilidade do HC para trancar AP (proteção reflexa da liberdade).","peg":""},{"n":40,"enun":"O mandado de segurança é o remédio constitucional adequado para impugnar, no processo penal, decisão judicial que nega o direito ao acesso às provas documentadas no inquérito ao defensor constituído.","gab":"ERRADO","com":"A SV 14 STF assegura esse acesso diretamente. Para fazer valer o direito, o defensor pode impetrar HC (se há ameaça à liberdade) ou, mais adequadamente, reclamar perante o STF por descumprimento da súmula vinculante. O MS caberia se não houver outro remédio, mas o STF tem entendido a Reclamação como via mais adequada para descumprimento de SV.","fund":"JURISPRUDÊNCIA: SV 14 STF. Reclamação perante o STF (art. 102, I, l, CF) para descumprimento de SV. O MS é subsidiário e não cabe quando há outro remédio adequado.","peg":"Descumprimento de SV 14 → Reclamação ao STF, não MS."},{"n":41,"enun":"A teoria dos frutos da árvore envenenada (fruit of the poisonous tree) está expressamente prevista no CPP, que também prevê as exceções da fonte independente e da descoberta inevitável.","gab":"CERTO","com":"Art. 157, §§1º e 2º CPP: prevê a inadmissibilidade das provas ilícitas por derivação (§1º), com exceção do nexo não demonstrado e da fonte independente (§1º in fine). A descoberta inevitável, embora não textualmente prevista, é reconhecida pela doutrina e STF com base no §2º (fonte independente interpretada em sentido amplo).","fund":"LEI: Art. 157, §1º CPP (derivadas ilícitas + exceção do nexo). §2º CPP (fonte independente). Descoberta inevitável: doutrina e STF por analogia.","peg":""},{"n":42,"enun":"A competência para julgamento dos crimes dolosos contra a vida praticados por militares contra civis é do Tribunal do Júri, e não da Justiça Militar.","gab":"CERTO","com":"EC 45/2004 inseriu o art. 125, §4º CF: compete à Justiça Militar estadual julgar crimes militares definidos em lei, EXCETO os dolosos contra a vida praticados por militares estaduais contra civis — estes vão ao Tribunal do Júri. Para militares federais, a Justiça Militar Federal julga crimes militares (inclusive dolosos contra a vida), mas civis vão ao júri federal pela CF.","fund":"LEI: Art. 125, §4º, CF (redação EC 45/2004): 'Compete à Justiça Militar estadual processar e julgar os militares dos Estados, nos crimes militares definidos em lei e as ações judiciais contra atos disciplinares militares, ressalvada a competência do júri quando a vítima for civil...'","peg":"Militares estaduais × civis em crime doloso contra a vida: Tribunal do Júri. Militares FEDERAIS × civis: Justiça Militar Federal (STM)."},{"n":43,"enun":"A ação penal nos crimes de lesão corporal leve e culposa no contexto de violência doméstica e familiar contra a mulher é pública condicionada à representação da vítima, podendo ela retratar-se até o início da instrução.","gab":"ERRADO","com":"STF ADI 4.424 e ADC 19 (2012): nos crimes praticados com violência doméstica contra a mulher, a ação penal por lesão corporal leve (art. 129, §9º CP) é PÚBLICA INCONDICIONADA. A vítima não precisa representar; o MP atua independentemente de sua manifestação.","fund":"JURISPRUDÊNCIA: STF ADI 4.424 (j. 09/02/2012); ADC 19. LEI: Art. 41, Lei 11.340/2006: 'Aos crimes praticados com violência doméstica e familiar contra a mulher, independentemente da pena prevista, não se aplica a Lei nº 9.099, de 26 de setembro de 1995.'","peg":"Lesão corporal leve em violência doméstica: ação pública INCONDICIONADA (ADI 4.424). A vítima não pode retratar-se."},{"n":44,"enun":"Na fase de instrução processual penal, o juiz não pode determinar, de ofício, a produção de provas, em razão do sistema acusatório adotado pela CF/88 e pelo Pacote Anticrime.","gab":"ERRADO","com":"Art. 156, II, CPP: durante a instrução, o juiz PODE determinar de ofício a realização de diligências para dirimir dúvida sobre ponto relevante. O Pacote Anticrime (Lei 13.964/2019) vetou os dispositivos que alterariam o art. 156 — manteve a possibilidade de iniciativa probatória judicial na fase de instrução. A vedação de ofício é apenas para a PRISÃO PREVENTIVA, não para toda prova.","fund":"LEI: Art. 156, II, CPP: 'A prova da alegação incumbirá a quem a fizer, sendo, porém, facultado ao juiz de ofício: II — determinar, no curso da instrução, ou antes de proferir sentença, a realização de diligências para dirimir dúvida sobre ponto relevante.'","peg":"Distinção: juiz não pode decretar PRISÃO de ofício (art. 311). Mas pode determinar produção de PROVAS de ofício na instrução (art. 156, II). Confusão frequente cobrada."},{"n":45,"enun":"O prazo prescricional começa a correr, nos crimes permanentes, do dia em que cessou a permanência, nos termos do Código Penal.","gab":"CERTO","com":"Art. 111, III, CP: a prescrição no crime permanente flui a partir da cessação da permanência. Isso afeta o cálculo do prazo prescricional em casos como sequestro (começa quando a vítima é libertada) e tráfico (começa quando o agente para de traficar).","fund":"LEI: Art. 111, III, CP: 'a prescrição começa a correr: III — nos crimes permanentes, do dia em que cessou a permanência.'","peg":""},{"n":46,"enun":"A prescrição virtual ou em perspectiva, que antecipa o reconhecimento da prescrição pela pena que provavelmente será aplicada, é admitida pelo STJ e STF como medida de eficiência processual.","gab":"ERRADO","com":"Súmula 438 STJ + RG 602.527 STF: prescrição virtual/em perspectiva/antecipada é INADMISSÍVEL. O STJ pacificou que não se pode reconhecer prescrição com base em pena hipotética antes do trânsito em julgado.","fund":"JURISPRUDÊNCIA: Súmula 438 STJ (j. 28/04/2010): 'É inadmissível a extinção da punibilidade pela prescrição da pretensão punitiva com fundamento em pena hipotética, independentemente da existência ou sorte do processo penal.' Convergência C1.","peg":"Prescrição virtual: INADMISSÍVEL (Súmula 438 STJ). Cobrada diretamente.","jur_status":"OK"}]},{"nome":"Direito Constitucional e Legislação Complementar","comando":"No que se refere ao Direito Constitucional e à organização constitucional do Estado, julgue os itens a seguir.","itens":[{"n":47,"enun":"O Supremo Tribunal Federal compõe-se de onze ministros, nomeados pelo Presidente da República, após aprovação pela maioria absoluta do Senado Federal, dentre cidadãos com mais de trinta e cinco e menos de sessenta e cinco anos de idade, de notável saber jurídico e reputação ilibada.","gab":"CERTO","com":"Art. 101 CF/88: 11 ministros, nomeados pelo PR após aprovação por maioria absoluta do Senado. Requisitos: cidadão brasileiro nato ou naturalizado, maiores de 35 e menores de 65 anos, notável saber jurídico, reputação ilibada. O STF é o guardião da Constituição.","fund":"LEI: Art. 101, caput, CF/88: 'O Supremo Tribunal Federal compõe-se de onze Ministros, escolhidos dentre cidadãos com mais de trinta e cinco e menos de sessenta e cinco anos de idade, de notável saber jurídico e reputação ilibada. Parágrafo único. Os Ministros do Supremo Tribunal Federal serão nomeados pelo Presidente da República, depois de aprovada a escolha pela maioria absoluta do Senado Federal.'","peg":""},{"n":48,"enun":"O Superior Tribunal de Justiça é composto por, no mínimo, trinta e três ministros, e possui competência para processar e julgar, originariamente, nos crimes comuns, os Governadores dos Estados.","gab":"CERTO","com":"Art. 105, caput, CF: STJ composto por no mínimo 33 ministros. Art. 105, I, a, CF: compete ao STJ proc
