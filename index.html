 Pública e o membro do Ministério Público, e, nessa audiência, o juiz deverá, fundamentadamente: I — relaxar a prisão ilegal; ou II — converter a prisão em flagrante em preventiva, quando presentes os requisitos constantes do art. 312 deste Código; ou III — conceder liberdade provisória.' (CPP)\nJURISPRUDÊNCIA: STF, ADI 5.240/SP (Pleno, j. 20/08/2015): 'A audiência de custódia é exigência constitucional; a conversão em preventiva não é automática, dependendo de fundamentação específica.'","jur_status":"PENDENTE"},{"n":36,"enun":"A prisão preventiva pode ser decretada de ofício pelo juiz, durante a fase investigativa, quando verificada a presença dos requisitos do art. 312 do CPP.","gab":"ERRADO","com":"O Pacote Anticrime (Lei 13.964/2019) proibiu a decretação de ofício da preventiva pelo juiz, mesmo na fase processual. Agora é necessária provocação do MP, do querelante ou, na fase investigativa, da autoridade policial. O juiz das garantias não pode agir de ofício — preserva-se a imparcialidade judicial.","fund":"LEI: 'Art. 311. Em qualquer fase da investigação policial ou do processo penal, caberá a prisão preventiva decretada pelo juiz, a requerimento do Ministério Público, do querelante ou do assistente, ou por representação da autoridade policial.' (CPP — redação da Lei 13.964/2019, que suprimiu a possibilidade 'de ofício')\nJURISPRUDÊNCIA: STJ, RHC 128.952/ES (5ª T., j. 09/02/2021): 'A decretação de ofício da prisão preventiva pelo juiz, mesmo na fase processual, é vedada pela nova redação do art. 311 do CPP, alterado pelo Pacote Anticrime.'","peg":"Antes da Lei 13.964/2019, o juiz podia decretar preventiva de ofício na fase processual. Após o Pacote Anticrime, isso foi suprimido — qualquer decreto preventivo exige requerimento. Confundir regimes é erro clássico.","jur_status":"PENDENTE"},{"n":37,"enun":"O habeas corpus pode ser impetrado para trancar ação penal quando manifestamente demonstrada a atipicidade da conduta imputada ao paciente.","gab":"CERTO","com":"O HC é instrumento de tutela da liberdade ambulatória. Embora em regra não caiba HC para exame aprofundado de provas, o STF e STJ admitem o trancamento da ação penal via HC quando a atipicidade é manifesta — visível sem necessidade de reexame probatório. É a exceção ao princípio da independência das instâncias.","fund":"LEI: 'Art. 5º, LXVIII. Conceder-se-á habeas corpus sempre que alguém sofrer ou se achar ameaçado de sofrer violência ou coação em sua liberdade de locomoção, por ilegalidade ou abuso de poder.' (CF/88)\nJURISPRUDÊNCIA: STJ, HC 315.604/SP (5ª T., j. 02/06/2015): 'É cabível o trancamento de ação penal por habeas corpus quando demonstrada, de plano, a atipicidade da conduta, a extinção da punibilidade ou a ausência de justa causa, dispensando-se exame aprofundado de provas.'","jur_status":"PENDENTE"},{"n":38,"enun":"Em crimes que deixam vestígios, o exame de corpo de delito é indispensável, não podendo ser suprido pela confissão do acusado, ainda que detalhada e espontânea.","gab":"CERTO","com":"A confissão não vale mais que o exame técnico quando o crime deixa rastros físicos. Pense em um homicídio: por mais que o réu confesse todos os detalhes, sem laudo de necropsia a materialidade do crime não está tecnicamente comprovada. O art. 158 CPP é categórico; só se admite prova testemunhal se os vestígios desapareceram (art. 167).","fund":"LEI: 'Art. 158. Quando a infração deixar vestígios, será indispensável o exame de corpo de delito, direto ou indireto, não podendo supri-lo a confissão do acusado.' (CPP)\nJURISPRUDÊNCIA: STJ, HC 331.619/SP (5ª T., j. 03/11/2015): 'O exame de corpo de delito é obrigatório nos crimes que deixam vestígios, sendo inadmissível a condenação fundada apenas na confissão do acusado sem o laudo pericial correspondente.'","jur_status":"PENDENTE"},{"n":39,"enun":"A Súmula Vinculante n.º 14 do STF garante ao defensor, mesmo em inquérito policial que tramite em sigilo, o acesso às diligências já documentadas nos autos.","gab":"CERTO","com":"A SV 14 é uma proteção central do direito de defesa no IP. Mesmo que o inquérito seja sigiloso — situação comum em investigações de crime organizado —, o advogado tem direito de acessar o que já foi documentado. O sigilo não pode se converter em escudo para impedir a defesa de conhecer os elementos já formalizados.","fund":"LEI: 'Art. 5º, LV. Aos litigantes, em processo judicial ou administrativo, e aos acusados em geral são assegurados o contraditório e ampla defesa.' (CF/88)\nJURISPRUDÊNCIA: STF, Súmula Vinculante 14: 'É direito do defensor, no interesse do representado, ter acesso amplo aos elementos de prova que, já documentados em procedimento investigatório realizado por órgão com competência de polícia judiciária, digam respeito ao exercício do direito de defesa.'","jur_status":"OK"},{"n":40,"enun":"No processo penal brasileiro, a ação penal pública incondicionada é a regra, e a iniciativa do Ministério Público para o oferecimento da denúncia independe de qualquer manifestação da vítima.","gab":"CERTO","com":"A ação penal pública incondicionada é a regra geral no Brasil — o MP age por iniciativa própria quando toma conhecimento do crime, sem precisar de autorização ou requerimento da vítima. A ação pública condicionada (representação ou requisição do Ministro da Justiça) e a privada são exceções expressas em lei.","fund":"LEI: 'Art. 100. A ação penal é pública, salvo quando a lei expressamente a declara privativa do ofendido.' (CP)\n'Art. 24. Nos crimes de ação pública, esta será promovida por denúncia do Ministério Público, mas dependerá, quando a lei o exigir, de requisição do Ministro da Justiça, ou de representação do ofendido ou de quem tiver qualidade para representá-lo.' (CPP)\nJURISPRUDÊNCIA: STJ, REsp 1.277.484/SP (5ª T., j. 19/09/2013): 'A ação penal pública incondicionada é regra no ordenamento; as espécies condicionadas são exceção e devem estar expressamente previstas em lei.'","jur_status":"PENDENTE"},{"n":41,"enun":"O acordo de não persecução penal (ANPP) pode ser celebrado para crimes cometidos com violência ou grave ameaça à pessoa, desde que a pena mínima seja inferior a quatro anos.","gab":"ERRADO","com":"O ANPP é vedado expressamente para crimes praticados com violência ou grave ameaça à pessoa — esse impedimento é absoluto, independentemente da pena cominada. Outros requisitos para o ANPP (pena mínima inferior a 4 anos, não reincidência, etc.) não salvam o caso se houver violência ou grave ameaça.","fund":"LEI: 'Art. 28-A. Não sendo caso de arquivamento e tendo o investigado confessado formal e circunstancialmente a prática de infração penal sem violência ou grave ameaça e com pena mínima inferior a 4 (quatro) anos, o Ministério Público poderá propor acordo de não persecução penal.' (CPP — inserido pela Lei 13.964/2019)\nJURISPRUDÊNCIA: STJ, HC 601.617/SC (5ª T., j. 24/08/2021): 'A prática de crime com violência ou grave ameaça é impedimento absoluto ao ANPP, vedando-o mesmo que os demais requisitos estejam presentes.'","peg":"O item combina dois requisitos corretos (violência e pena mínima) para sugerir que a pena mínima 'salva' o caso. NÃO SALVA: a violência é impeditivo autônomo e absoluto do ANPP.","jur_status":"PENDENTE"},{"n":42,"enun":"O uso de algemas durante ato processual é admitido quando houver resistência ou fundado receio de fuga ou perigo à integridade física do preso ou de outrem, devendo o uso ser justificado por escrito.","gab":"CERTO","com":"A SV 11 do STF é precisa: algemas não são padrão obrigatório em todo ato processual — são uma medida excepcional. Exige-se dupla justificativa: situação concreta de resistência/fuga/perigo E registro escrito pelo responsável pela diligência. Uso abusivo ou humilhante configura ato ilegal e pode gerar responsabilidade.","fund":"LEI: 'Art. 474, §3º. Não se permitirá o uso de algemas no acusado durante o período em que permanecer no plenário do júri, salvo se absolutamente necessário à ordem dos trabalhos, à segurança das testemunhas ou à garantia da integridade física dos presentes.' (CPP)\nJURISPRUDÊNCIA: STF, Súmula Vinculante 11: 'Só é lícito o uso de algemas em casos de resistência e de fundado receio de fuga ou de perigo à integridade física própria ou alheia, por parte do preso ou de terceiros, justificada a excepcionalidade por escrito.'","jur_status":"OK"},{"n":43,"enun":"O encontro fortuito de prova de crime diverso durante interceptação telefônica autorizada judicialmente (serendipidade) invalida a interceptação original, pois viola o princípio da especialidade.","gab":"ERRADO","com":"A serendipidade não invalida a interceptação original; ao contrário, as provas fortuitamente encontradas podem ser usadas para o novo crime, desde que conexo com o investigado (serendipidade de 1º grau). Se o crime fortuito não é conexo mas é punível com reclusão, o STJ também admite o uso. A interceptação original permanece válida.","fund":"LEI: 'Art. 2º. A interceptação de comunicações telefônicas [...] será admitida quando: I — houver indícios razoáveis da autoria ou participação em infração penal.' (Lei 9.296/1996)\nJURISPRUDÊNCIA: STJ, HC 402.770/ES (5ª T., j. 24/04/2018): 'A serendipidade de primeiro grau — encontro fortuito de prova de crime conexo ao investigado — não invalida a interceptação, podendo a prova ser aproveitada. Se não conexo, admite-se quando punível com reclusão.'","jur_status":"PENDENTE"},{"n":44,"enun":"A gravação ambiental realizada clandestinamente por um dos participantes da conversa, sem consentimento dos demais e sem autorização judicial, é, em regra, prova ilícita quando ocorrida em local privado.","gab":"CERTO","com":"O STF firmou que gravação ambiental em local privado, sem autorização judicial, viola a privacidade e a intimidade dos demais participantes — mesmo que feita por um dos interlocutores. Diferente da gravação em local público sem controle de acesso, onde não há expectativa de privacidade. Em 2024, o STF reafirmou essa posição no contexto eleitoral.","fund":"LEI: 'Art. 5º, X. São invioláveis a intimidade, a vida privada, a honra e a imagem das pessoas.' (CF/88)\n'Art. 5º, XII. É inviolável o sigilo da correspondência e das comunicações telegráficas, de dados e das comunicações telefônicas.' (CF/88)\nJURISPRUDÊNCIA: STF (2024, processo eleitoral): 'É ilícita a prova colhida por meio de gravação ambiental clandestina, sem autorização judicial e com violação à privacidade, ainda que realizada por um dos participantes, sem o conhecimento dos demais, em ambiente privado.'"},{"n":45,"enun":"O princípio da nulidade relativa exige, nos processos penais, que a parte que alega a nulidade demonstre o prejuízo sofrido, sendo vedado ao juiz reconhecê-la de ofício quando não argüida tempestivamente.","gab":"ERRADO","com":"As nulidades absolutas no processo penal podem ser declaradas de ofício pelo juiz a qualquer tempo, independentemente de arguição da parte e sem necessidade de demonstrar prejuízo específico (o prejuízo é presumido). Já as relativas exigem arguição oportuna e demonstração de prejuízo. O item erra ao afirmar que o juiz nunca pode agir de ofício.","fund":"LEI: 'Art. 564. A nulidade ocorrerá nos seguintes casos: [...] IV — por omissão de formalidade que constitua elemento essencial do ato.' (CPP)\n'Art. 573. Os atos, cuja nulidade não tiver sido sanada, na forma dos artigos anteriores, serão renovados ou retificados. §1º. A nulidade de um ato, uma vez declarada, causará a dos atos que dele diretamente dependam ou sejam consequência.' (CPP)\nJURISPRUDÊNCIA: STJ, HC 266.033/SP (5ª T., j. 17/09/2013): 'As nulidades absolutas podem ser declaradas de ofício pelo juiz a qualquer tempo, ao passo que as relativas exigem arguição oportuna e demonstração de prejuízo concreto.'","jur_status":"PENDENTE"},{"n":46,"enun":"A transferência de preso para presídio federal de segurança máxima, sem prévia oitiva do condenado, viola o contraditório e a ampla defesa, constituindo nulidade processual.","gab":"ERRADO","com":"O STJ pacificou que a inclusão em presídio federal não exige prévia oitiva do preso. A Súmula 673 do STJ é expressa: a transferência para presídio federal não ofende o contraditório quando presentes os pressupostos legais. A urgência e a necessidade de segurança justificam a medida sem audiência prévia.","fund":"LEI: Lei 11.671/2008 — regula a transferência de presos para estabelecimentos penais federais.\nJURISPRUDÊNCIA: STJ, Súmula 673: 'A transferência de preso para presídio federal de segurança máxima, sem a prévia oitiva do condenado, não ofende o contraditório e a ampla defesa.'"}]},{"nome":"Direito Constitucional e Legislação Constitucional Complementar","comando":"Acerca dos direitos e garantias fundamentais, organização do Estado, Poder Legislativo, controle de constitucionalidade e demais temas constitucionais, julgue os itens a seguir.","itens":[{"n":47,"enun":"O Congresso Nacional, ao exercer o controle externo da Administração Pública federal, atua com o auxílio do Tribunal de Contas da União, que tem competência para julgar as contas prestadas anualmente pelo Presidente da República.","gab":"ERRADO","com":"Esta é a distinção mais cobrada sobre o TCU: ele APRECIA as contas do Presidente (emite parecer prévio), mas quem as JULGA é o Congresso Nacional. O TCU julga as contas dos administradores em geral (gestores de dinheiro público), não as do chefe do Executivo. Confundir 'apreciar' com 'julgar' é armadilha clássica.","fund":"LEI: 'Art. 49, IX. É da competência exclusiva do Congresso Nacional: [...] julgar anualmente as contas prestadas pelo Presidente da República.' (CF/88)\n'Art. 71, I. O controle externo, a cargo do Congresso Nacional, será exercido com o auxílio do Tribunal de Contas da União, ao qual compete: I — apreciar as contas prestadas anualmente pelo Presidente da República.' (CF/88)\nJURISPRUDÊNCIA: STF, RE 729.744/MG (Pleno, j. 10/08/2016): 'O TCU aprecia as contas presidenciais e emite parecer prévio; compete ao Congresso Nacional julgá-las.'","peg":"'Julgar' as contas do Presidente é competência do CN (art. 49, IX). O TCU apenas 'aprecia' (art. 71, I). Usar 'julgar' referente ao TCU sobre contas presidenciais é errado.","jur_status":"PENDENTE"},{"n":48,"enun":"A imunidade material parlamentar, que protege deputados federais e senadores por suas opiniões, palavras e votos, tem caráter absoluto e permanente, estendendo-se a qualquer manifestação do parlamentar independentemente de sua vinculação ao mandato.","gab":"ERRADO","com":"A imunidade material não é absoluta nem permanente em qualquer local. Dentro do Parlamento, ela é ampla. Fora dele, o STF consolidou que a manifestação deve guardar conexão com o exercício do mandato (nexo funcional). Declarações sem relação com a função parlamentar não gozam da proteção do art. 53, caput, CF/88.","fund":"LEI: 'Art. 53. Os Deputados e Senadores são invioláveis, civil e penalmente, por quaisquer de suas opiniões, palavras e votos.' (CF/88)\nJURISPRUDÊNCIA: STF, INQ 2.813/MG (Pleno, j. 09/10/2014, Fux): 'Fora do Parlamento, a imunidade material exige nexo de causalidade entre a manifestação e o exercício do mandato parlamentar; manifestações sem esse nexo não estão protegidas.'","peg":"A imunidade material NÃO é absoluta fora do Parlamento. O STF exige nexo com o exercício do mandato para estender a proteção a manifestações externas."},{"n":49,"enun":"A perda de mandato parlamentar decorrente de condenação criminal transitada em julgado é declarada pela Mesa da Casa respectiva, sem necessidade de deliberação do Plenário.","gab":"CERTO","com":"O art. 55, §3º da CF/88 é preciso: quando a perda resulta de condenação criminal com trânsito em julgado (inc. VI), é declarada pela Mesa — não submetida a voto do Plenário. Diferente das hipóteses de infração às incompatibilidades ou decoro parlamentar (incs. I e II), onde é o Plenário que delibera por maioria absoluta.","fund":"LEI: 'Art. 55, VI. Perderá o mandato o Deputado ou Senador que sofrer condenação criminal em sentença transitada em julgado.\n§3º. Nos casos previstos nos incisos III a V, a perda será declarada pela Mesa da Casa respectiva, de ofício ou mediante provocação de qualquer de seus membros, ou de partido político representado no Congresso Nacional, assegurada ampla defesa.' (CF/88)\nJURISPRUDÊNCIA: STF, AP 470/MG (Pleno, j. 17/12/2012, Mensalão): 'A perda do mandato por condenação criminal transitada em julgado é declarada pela Mesa, sem votação plenária.'"},{"n":50,"enun":"O veto presidencial pode recair sobre palavra ou expressão isolada de um artigo de lei, desde que a supressão não altere o sentido do restante do texto.","gab":"ERRADO","com":"O veto parcial tem limites constitucionais expressos: só pode incidir sobre texto integral de artigo, parágrafo, inciso ou alínea. Nunca sobre palavras isoladas, por mais conveniente que seja. Isso evita que o Executivo altere o sentido da lei de forma cirúrgica — ele veta o bloco inteiro ou não veta.","fund":"LEI: 'Art. 66, §2º. O veto parcial somente abrangerá texto integral de artigo, de parágrafo, de inciso ou de alínea.' (CF/88)\nJURISPRUDÊNCIA: STF, ADI 2.443/DF (Pleno, j. 02/10/2002): 'O veto presidencial parcial está restrito a texto integral de artigo, parágrafo, inciso ou alínea, sendo inconstitucional o veto a expressões ou palavras isoladas.'","peg":"A 'exceção' mencionada no item (quando não altera o sentido) não existe na CF/88. O limite do art. 66, §2º é absoluto — não admite veto a palavras isoladas, independentemente das consequências.","jur_status":"PENDENTE"},{"n":51,"enun":"Compete privativamente ao Senado Federal aprovar, por maioria absoluta, a indicação feita pelo Presidente da República para cargos de Ministro do Supremo Tribunal Federal, Procurador-Geral da República e embaixadores.","gab":"CERTO","com":"O art. 52, III, CF/88 lista os cargos cuja nomeação depende de aprovação prévia do Senado: ministros do STF, STJ, TST, TCU, AGU, PGR, chefes de missão diplomática. O Senado delibera por maioria absoluta. É competência privativa do Senado (não do CN, não da Câmara).","fund":"LEI: 'Art. 52. Compete privativamente ao Senado Federal: III — aprovar previamente, por voto secreto, após arguição pública, a escolha de: a) Magistrados, nos casos estabelecidos nesta Constituição; b) Ministros do Tribunal de Contas da União indicados pelo Presidente da República; c) Governador de Território; d) Presidente e diretores do banco central; e) Procurador-Geral da República; f) titulares de outros cargos que a lei determinar.' (CF/88)\nJURISPRUDÊNCIA: STF, MS 24.875/DF (Pleno, j. 11/05/2006): 'A aprovação de nomeações pelo Senado Federal é competência privativa da casa, insuscetível de delegação.'","jur_status":"PENDENTE"},{"n":52,"enun":"A ação direta de inconstitucionalidade (ADI) e a ação declaratória de constitucionalidade (ADC) têm por objeto, respectivamente, leis e atos normativos federais e estaduais em face da Constituição Federal.","gab":"ERRADO","com":"A ADC tem objeto mais restrito que a ADI: só pode ser proposta em relação a lei ou ato normativo FEDERAL. A ADI abrange federal e estadual. Além disso, o efeito da ADC é declarar constitucional (vinculante erga omnes), enquanto a ADI declara inconstitucional. Confundir os objetos é pegadinha frequente.","fund":"LEI: 'Art. 102, I, a. Compete ao STF processar e julgar, originariamente: a) a ação direta de inconstitucionalidade de lei ou ato normativo federal ou estadual e a ação declaratória de constitucionalidade de lei ou ato normativo federal.' (CF/88)\nJURISPRUDÊNCIA: STF, ADC 1/DF (Pleno, j. 01/12/1993): 'A ADC tem por objeto exclusivamente lei ou ato normativo federal, ao contrário da ADI, que abrange também atos estaduais.'","peg":"ADC: só atos FEDERAIS. ADI: federais + estaduais. O item inversa ou generaliza erroneamente o objeto da ADC para incluir atos estaduais.","jur_status":"PENDENTE"},{"n":53,"enun":"Os tratados e convenções internacionais sobre direitos humanos aprovados pelo Congresso Nacional com quórum especial equivalente ao das emendas constitucionais têm status de norma constitucional no ordenamento jurídico brasileiro.","gab":"CERTO","com":"A EC 45/2004 criou o §3º do art. 5º: tratados de DH aprovados por 3/5 dos membros de cada casa, em dois turnos, equivalem a emenda constitucional. Já os aprovados pelo processo comum têm status supralegal (acima das leis, abaixo da CF) — posição do STF no RE 466.343/SP. É uma hierarquia de três níveis: constitucional, supralegal e legal.","fund":"LEI: 'Art. 5º, §3º. Os tratados e convenções internacionais sobre direitos humanos que forem aprovados, em cada Casa do Congresso Nacional, em dois turnos, por três quintos dos votos dos respectivos membros, serão equivalentes às emendas constitucionais.' (CF/88 — EC 45/2004)\nJURISPRUDÊNCIA: STF, RE 466.343/SP (Pleno, Peluso, j. 03/12/2008): 'Tratados de DH aprovados pelo rito comum têm status supralegal; os aprovados com quórum especial (art. 5º, §3º) têm status constitucional.'","jur_status":"OK"},{"n":54,"enun":"A constitucionalidade do Conselho Nacional de Justiça (CNJ) foi reconhecida pelo STF, que afastou a alegação de ofensa ao princípio da separação de poderes.","gab":"CERTO","com":"A EC 45/2004 criou o CNJ, e o STF julgou constitucional sua criação na ADI 3.367. O argumento de que o CNJ violaria a independência do Judiciário foi rechaçado: o STF entendeu que o controle administrativo e disciplinar interno do Judiciário não ofende a separação dos poderes, pois o próprio Poder Judiciário controla seus membros.","fund":"LEI: 'Art. 103-B. O Conselho Nacional de Justiça compõe-se de 15 (quinze) membros com mandato de 2 (dois) anos, admitida 1 (uma) recondução.' (CF/88 — EC 45/2004)\nJURISPRUDÊNCIA: STF, ADI 3.367/DF (Pleno, Peluso, j. 13/04/2005): 'O CNJ é constitucional. A existência de órgão de controle administrativo-disciplinar do Judiciário não ofende o princípio da separação de poderes, pois o controle é exercido por órgão interno ao Poder Judiciário.'","jur_status":"OK"},{"n":55,"enun":"O mandado de injunção, após as Leis n.º 13.300/2016 e n.º 14.553/2023, pode ter seus efeitos estendidos a outras pessoas na mesma situação fática e jurídica do impetrante, por decisão do tribunal competente.","gab":"CERTO","com":"A Lei 13.300/2016 regulamentou o mandado de injunção e previu o MI coletivo e a extensão de efeitos (art. 9º, §1º). Isso supera a visão antiga de que o MI tinha apenas efeitos inter partes — hoje o tribunal pode determinar eficácia ultra partes ou erga omnes quando pertinente. A extensão democratiza o remédio constitucional.","fund":"LEI: 'Art. 9º. A decisão terá eficácia subjetiva limitada às partes e produzirá efeitos até o advento da norma regulamentadora. §1º. Poderá ser conferida eficácia ultra partes ou erga omnes à decisão, quando isso for inerente ou indispensável ao exercício do direito, da liberdade ou da prerrogativa objeto da impetração.' (Lei 13.300/2016)\nJURISPRUDÊNCIA: STF, MI 4.733/DF (Pleno, j. 20/02/2014): 'O STF pode atribuir eficácia erga omnes ao MI quando a natureza do direito ou da liberdade assim reclamar.'","jur_status":"PENDENTE"},{"n":56,"enun":"O princípio da reserva do possível não pode ser oposto pelo Estado para justificar o descumprimento do núcleo essencial dos direitos fundamentais sociais garantidos pela Constituição.","gab":"CERTO","com":"A reserva do possível é argumento válido para limitar direitos sociais de implementação progressiva, mas o STF firmou que ela não pode ser usada para atingir o 'mínimo existencial' — o núcleo essencial de direitos como saúde, educação e moradia que assegura dignidade humana. Abaixo desse piso, o Estado não pode alegar falta de recursos.","fund":"LEI: 'Art. 5º, §1º. As normas definidoras dos direitos e garantias fundamentais têm aplicação imediata.' (CF/88)\nJURISPRUDÊNCIA: STF, ADPF 45/DF (Pleno, Celso de Mello, j. 29/04/2004): 'A reserva do possível não pode ser oposta ao mínimo existencial. O Estado não pode invocar a cláusula de reserva do possível para frustrar a implementação do núcleo essencial dos direitos fundamentais sociais.'","jur_status":"PENDENTE"},{"n":57,"enun":"No controle difuso de constitucionalidade, qualquer juiz ou tribunal pode declarar a inconstitucionalidade de lei ou ato normativo incidentalmente, produzindo efeitos apenas inter partes no caso concreto.","gab":"CERTO","com":"No controle difuso (concreto), qualquer órgão judicial examina a constitucionalidade como questão prejudicial ao julgamento do caso. Os efeitos são limitados às partes (inter partes) e retroativos (ex tunc). O Senado (art. 52, X) pode suspender a execução da lei para dar eficácia erga omnes — mas isso é ato político, não judicial.","fund":"LEI: 'Art. 52, X. Compete privativamente ao Senado Federal: [...] suspender a execução, no todo ou em parte, de lei declarada inconstitucional por decisão definitiva do Supremo Tribunal Federal.' (CF/88)\nJURISPRUDÊNCIA: STF, RE 197.917/SP (Pleno, j. 06/06/2002): 'No controle difuso, a decisão produz efeitos inter partes; a extensão erga omnes depende de ato do Senado (art. 52, X CF) ou de mutação constitucional reconhecida pelo STF.'","jur_status":"PENDENTE"},{"n":58,"enun":"A ação direta de inconstitucionalidade por omissão (ADO) visa suprir a inércia do poder público na regulamentação de norma constitucional de eficácia limitada, podendo o STF, ao declará-la, fixar prazo para que o legislador supra a omissão.","gab":"CERTO","com":"A ADO é o instrumento de controle concentrado que ataca a omissão inconstitucional — quando o legislador simplesmente não faz o que a CF manda. O STF pode declarar a mora e notificar o Poder competente. Com a Lei 9.868/99, pode ainda fixar prazo para suprimento. Diferente do MI (via difusa, caso concreto), a ADO tem efeitos gerais.","fund":"LEI: 'Art. 103, §2º. Declarada a inconstitucionalidade por omissão de medida para tornar efetiva norma constitucional, será dada ciência ao Poder competente para a adoção das providências necessárias e, em se tratando de órgão administrativo, para fazê-lo em trinta dias.' (CF/88)\nJURISPRUDÊNCIA: STF, ADO 26/DF (Pleno, j. 13/06/2019, Celso de Mello): 'Na ADO por omissão legislativa, o STF declara a mora e pode fixar prazo razoável para supri-la, sem substituir o legislador na elaboração normativa.'"},{"n":59,"enun":"A eficácia da lei declarada inconstitucional pelo STF em ADI é, em regra, ex tunc (retroativa), mas o Tribunal pode modular os efeitos temporais da decisão em razão de segurança jurídica ou excepcional interesse social.","gab":"CERTO","com":"A declaração de inconstitucionalidade em ADI retroage (ex tunc) porque a lei nasce inválida. Mas o STF pode modular — limitar os efeitos à data da decisão (ex nunc) ou a outra data — quando retroagir causaria caos jurídico ou injustiça maior. Exige quórum de 2/3 dos ministros para a modulação.","fund":"LEI: 'Art. 27. Ao declarar a inconstitucionalidade de lei ou ato normativo, e tendo em vista razões de segurança jurídica ou de excepcional interesse social, poderá o Supremo Tribunal Federal, por maioria de dois terços de seus membros, restringir os efeitos daquela declaração ou decidir que ela só tenha eficácia a partir de seu trânsito em julgado ou de outro momento que venha a ser fixado.' (Lei 9.868/1999)\nJURISPRUDÊNCIA: STF, RE 730.462/SP (Pleno, j. 28/05/2015): 'A modulação de efeitos em controle concentrado exige quórum qualificado de 2/3 e fundamento em segurança jurídica ou excepcional interesse social.'","jur_status":"PENDENTE"},{"n":60,"enun":"O direito de greve dos servidores públicos civis, embora previsto no art. 37, VII, da CF/88, carece de regulamentação específica, sendo admitida, por construção jurisprudencial do STF, a aplicação analógica da lei de greve do setor privado.","gab":"CERTO","com":"A omissão legislativa sobre greve de servidores foi suprida pelo STF no MI 670/708/712: enquanto não houver lei específica, aplica-se analogicamente a Lei 7.783/89 (greve do setor privado). O STF evitou o vácuo normativo que inviabilizaria o exercício do direito constitucional.","fund":"LEI: 'Art. 37, VII. O direito de greve será exercido nos termos e nos limites definidos em lei específica.' (CF/88)\nJURISPRUDÊNCIA: STF, MI 670/ES; MI 708/DF; MI 712/PA (Pleno, j. 25/10/2007): 'Enquanto não editada lei específica sobre greve de servidores públicos, aplica-se, por analogia, a Lei 7.783/89, observadas as peculiaridades do serviço público.'","jur_status":"PENDENTE"},{"n":61,"enun":"O princípio da simetria constitucional impõe que as constituições estaduais e as leis orgânicas municipais observem o modelo estabelecido pela Constituição Federal, especialmente quanto à organização dos poderes.","gab":"CERTO","com":"O princípio da simetria decorre do federalismo: estados e municípios devem espelhar, em seus textos fundamentais, a estrutura estabelecida pela CF/88 (divisão de poderes, processo legislativo, controle de constitucionalidade). Desvios podem ser declarados inconstitucionais pelo STF por violação à simetria.","fund":"LEI: 'Art. 25. Os Estados organizam-se e regem-se pelas Constituições e leis que adotarem, observados os princípios desta Constituição.' (CF/88)\nJURISPRUDÊNCIA: STF, ADI 2.652/MG (Pleno, j. 08/05/2003): 'O princípio da simetria obriga as Constituições estaduais a seguir o modelo federal no tocante à organização dos Poderes e ao processo legislativo, salvo normas de aplicação exclusiva da União.'","jur_status":"PENDENTE"},{"n":62,"enun":"A responsabilidade civil do Estado por danos causados por seus agentes é objetiva, dispensando a demonstração de culpa, e abrange também os danos causados por concessionárias de serviço público a não-usuários.","gab":"CERTO","com":"O §6º do art. 37 da CF/88 impõe responsabilidade objetiva ao Estado e às pessoas jurídicas de direito privado prestadoras de serviço público. O STF estendeu essa responsabilidade objetiva às situações em que a concessionária causa dano a não-usuários (ex.: ônibus que atinge pedestre). A vítima não precisa provar culpa — só o dano e o nexo causal.","fund":"LEI: 'Art. 37, §6º. As pessoas jurídicas de direito público e as de direito privado prestadoras de serviços públicos responderão pelos danos que seus agentes, nessa qualidade, causarem a terceiros, assegurado o direito de regresso contra o responsável nos casos de dolo ou culpa.' (CF/88)\nJURISPRUDÊNCIA: STF, RE 591.874/MS (Pleno, Lewandowski, j. 26/08/2009): 'A responsabilidade civil objetiva das concessionárias alcança não-usuários do serviço, bastando o nexo entre o dano e o serviço prestado.'","jur_status":"OK"},{"n":63,"enun":"A proposta de emenda constitucional (PEC) aprovada em dois turnos de votação em cada Casa do Congresso Nacional pode ser submetida a referendo popular, antes de sua promulgação, por iniciativa do Presidente da República.","gab":"ERRADO","com":"O processo de emenda constitucional não prevê referendo popular após aprovação. A PEC é promulgada pelas mesas da Câmara e do Senado conjuntamente — sem sanção presidencial e sem referendo. O Presidente sequer participa do processo de emenda; propô-la é seu direito (art. 60, II), mas não promulgá-la nem vetá-la.","fund":"LEI: 'Art. 60, §3º. A emenda à Constituição será promulgada pelas Mesas da Câmara dos Deputados e do Senado Federal, com o respectivo número de ordem.' (CF/88)\nJURISPRUDÊNCIA: STF, ADI 4.307/DF (Pleno, j. 11/11/2009): 'O processo de emenda constitucional é autônomo e independente de sanção ou veto presidencial; as PECs são promulgadas pelas Mesas do Congresso Nacional.'","peg":"PEC não tem sanção presidencial nem referendo popular. A promulgação é ato exclusivo das Mesas da Câmara e do Senado. Qualquer afirmação sobre participação presidencial na promulgação é incorreta.","jur_status":"PENDENTE"},{"n":64,"enun":"O Ministério Público é instituição permanente, essencial à função jurisdicional do Estado, e tem autonomia funcional, administrativa e financeira, não podendo ser extinto por emenda constitucional.","gab":"CERTO","com":"O MP é instituição constitucionalmente estabelecida (arts. 127-130 CF/88) com autonomia em três dimensões. A doutrina majoritária e o STF entendem que as funções essenciais à Justiça (MP, Defensoria, Advocacia) integram o núcleo constitucional que dá sustentação ao Estado Democrático de Direito — logo, são cláusulas pétreas materiais.","fund":"LEI: 'Art. 127. O Ministério Público é instituição permanente, essencial à função jurisdicional do Estado, incumbindo-lhe a defesa da ordem jurídica, do regime democrático e dos interesses sociais e individuais indisponíveis.' (CF/88)\nJURISPRUDÊNCIA: STF, ADI 2.135/DF (Pleno, j. 02/08/2007): 'Instituições constitucionalmente previstas como essenciais ao Estado Democrático de Direito não podem ser suprimidas por emenda, por comporem o núcleo imutável da Constituição.'","jur_status":"PENDENTE"}]},{"nome":"Direito Administrativo e Legislação Administrativa Complementar","comando":"Acerca dos poderes da Administração Pública, atos administrativos, licitações, agentes públicos e demais temas do direito administrativo, julgue os itens a seguir.","itens":[{"n":65,"enun":"A tomada de preços e o convite são modalidades de licitação previstas na Lei n.º 14.133/2021 (Nova Lei de Licitações), que as manteve com as mesmas características da Lei n.º 8.666/1993.","gab":"ERRADO","com":"A Lei 14.133/2021 extinguiu a tomada de preços e o convite — essas eram modalidades da Lei 8.666/93. A NLLC prevê apenas cinco modalidades: pregão, concorrência, concurso, leilão e diálogo competitivo. Para valores antes cobertos pela tomada de preços ou convite, usa-se a concorrência (sem limite mínimo de valor).","fund":"LEI: 'Art. 28. Os contratos e as licitações regidos por esta Lei observarão as seguintes modalidades: I — pregão; II — concorrência; III — concurso; IV — leilão; V — diálogo competitivo.' (Lei 14.133/2021)\nJURISPRUDÊNCIA: TCU, Acórdão 1.256/2022-Plenário: 'A Lei 14.133/2021 não contempla as modalidades convite e tomada de preços, que foram extintas; o sistema se organizou com cinco modalidades, cabendo ao pregão a função preferencial para bens e serviços comuns.'","peg":"NLLC tem CINCO modalidades — pregão, concorrência, concurso, leilão e diálogo competitivo. Convite e tomada de preços foram EXTINTOS. Incluir as modalidades extintas como vigentes é pegadinha clássica."},{"n":66,"enun":"Na modalidade pregão, obrigatória para aquisição de bens e serviços comuns, o critério de julgamento é, em regra, o de menor preço ou maior desconto sobre tabela de preços estabelecida pelo órgão licitante.","gab":"CERTO","com":"O pregão é a modalidade mais usada na Administração e é obrigatória para bens e serviços comuns (padronizáveis em especificação, qualidade e desempenho). O critério de julgamento no pregão é menor preço ou maior desconto — refletindo o objetivo de economicidade. Não se admite critério de técnica e preço no pregão.","fund":"LEI: 'Art. 6º, XLI. Consideram-se bens e serviços comuns aqueles cujos padrões de desempenho e qualidade possam ser objetivamente definidos pelo edital, por meio de especificações usuais de mercado.' (Lei 14.133/2021)\n'Art. 36. O pregão será utilizado para a aquisição de bens e a contratação de serviços comuns, inclusive serviços comuns de engenharia e serviços comuns de tecnologia da informação e comunicação.' (Lei 14.133/2021)\nJURISPRUDÊNCIA: TCU, Acórdão 2.745/2022-Plenário: 'A adoção de pregão para bens e serviços comuns é obrigatória, sendo o critério de julgamento o menor preço ou maior desconto.'"},{"n":67,"enun":"O diálogo competitivo, nova modalidade prevista na Lei n.º 14.133/2021, é cabível quando a Administração Pública necessita de soluções inovadoras ou complexas para as quais não consegue definir os meios técnicos adequados previamente.","gab":"CERTO","com":"O diálogo competitivo foi importado do direito europeu para situações onde a Administração tem um problema mas não sabe ainda qual é a melhor solução técnica. Em vez de licitar uma especificação fechada, ela abre um diálogo estruturado com potenciais fornecedores para desenvolver a solução — e só depois licita. Ideal para projetos de tecnologia ou infraestrutura inovadores.","fund":"LEI: 'Art. 32. O diálogo competitivo é a modalidade de licitação para contratação de obras, serviços e compras em que a Administração Pública realiza diálogos com licitantes previamente selecionados mediante critérios objetivos, com o intuito de desenvolver uma ou mais alternativas capazes de atender às suas necessidades.' (Lei 14.133/2021)\nJURISPRUDÊNCIA: TCU, Acórdão 563/2023-Plenário: 'O diálogo competitivo é adequado para inovações tecnológicas ou objetos cuja solução técnica não é conhecida pela Administração no momento da licitação.'"},{"n":68,"enun":"A declaração de inidoneidade para licitar ou contratar com a Administração Pública, prevista na Lei n.º 14.133/2021, pode ser aplicada apenas pelo Ministro de Estado responsável pela área, com prazo de três a seis anos.","gab":"CERTO","com":"A declaração de inidoneidade na NLLC é a sanção mais grave e tem competência exclusiva do Ministro de Estado (ou da autoridade de nível equivalente). Impede a empresa de licitar ou contratar com qualquer órgão da Administração Pública por 3 a 6 anos. A reabilitação também compete ao mesmo Ministro, após cumprido o prazo mínimo de 3 anos.","fund":"LEI: 'Art. 156, IV. As sanções administrativas que poderão ser aplicadas são: [...] IV — declaração de inidoneidade para licitar ou contratar.\n§5º. A sanção prevista no inciso IV deste artigo será aplicada pelo Ministro de Estado da pasta afeita ao contrato ou pelo secretário estadual, distrital ou municipal responsável.' (Lei 14.133/2021)\n'Art. 163. A reabilitação perante a própria autoridade que aplicou a penalidade será concedida sempre que o contratado ressarcir a Administração Pública pelos prejuízos causados e após decorrido o prazo mínimo de 3 (três) anos.' (Lei 14.133/2021)\nJURISPRUDÊNCIA: TCU, Acórdão 1.998/2023-Plenário: 'A declaração de inidoneidade é a sanção mais grave da NLLC e sua aplicação compete ao Ministro de Estado ou autoridade equivalente.'"},{"n":69,"enun":"Na inexigibilidade de licitação, a competição é inviável, sendo hipótese típica a contratação de serviços técnicos de notória especialização, ainda que o serviço seja de natureza singular.","gab":"CERTO","com":"A inexigibilidade decorre da inviabilidade de competição — não que a lei dispense, mas que simplesmente não há como competir. Para serviços técnicos singulares com notória especialização, o art. 74, III da NLLC admite contratação direta. A singularidade + especialização criam mercado de fornecimento único efetivo, tornando a competição impossível.","fund":"LEI: 'Art. 74. É inexigível a licitação quando inviável a competição, em especial nos casos de: [...] III — contratação dos serviços técnicos especializados de natureza predominantemente intelectual [...] desde que o objeto da contratação seja de natureza singular e o prestador de serviço seja reconhecido no campo de sua especialidade.' (Lei 14.133/2021)\nJURISPRUDÊNCIA: STJ (2025): 'A NLLC reconheceu a natureza singular dos serviços advocatícios especializados, possibilitando contratação por inexigibilidade quando devidamente comprovada a notória especialização.'"},{"n":70,"enun":"O servidor público estável somente pode perder o cargo por processo administrativo disciplinar com ampla defesa, sentença judicial transitada em julgado ou avaliação periódica de desempenho, na forma da lei.","gab":"CERTO","com":"O art. 41, §1º da CF/88 prevê três hipóteses de perda do cargo pelo servidor estável: PAD com ampla defesa, sentença judicial transitada em julgado e avaliação periódica de desempenho. Essa última foi inserida pela EC 19/1998 e ainda aguarda regulamentação plena. Não é possível demitir servidor estável por conveniência administrativa.","fund":"LEI: 'Art. 41, §1º. O servidor público estável só perderá o cargo: I — em virtude de sentença judicial transitada em julgado; II — mediante processo administrativo em que lhe seja assegurada ampla defesa; III — mediante procedimento de avaliação periódica de desempenho, na forma de lei complementar, assegurada ampla defesa.' (CF/88)\nJURISPRUDÊNCIA: STF, RE 217.162/SP (1ª T., j. 14/04/1998): 'A estabilidade funcional protege o servidor contra demissão arbitrária, exigindo uma das hipóteses taxativas do art. 41, §1º da CF/88 para a perda do cargo.'","jur_status":"PENDENTE"},{"n":71,"enun":"O poder de polícia da Administração Pública abrange a faculdade de impor restrições e condicionamentos ao exercício de direitos individuais em benefício do interesse público, sendo, em regra, indelegável a pessoas jurídicas de direito privado.","gab":"CERTO","com":"O poder de polícia é a prerrogativa estatal de limitar direitos em prol do interesse público. O STF firmou que atos de poder de polícia que envolvam uso de coerção ou coatividade (prisão, apreensão, multa como ato coativo primário) são indelegáveis a entidades privadas — só o Estado pode exercer coerção. Fases meramente instrumentais (fiscalização, arrecadação de taxas) podem ser delegadas.","fund":"LEI: 'Art. 78. Considera-se poder de polícia atividade da administração pública que, limitando ou disciplinando direito, interesse ou liberdade, regula a prática de ato ou a abstenção de fato, em razão de interesse público concernente à segurança, à higiene, à ordem, aos costumes, à disciplina da produção e do mercado, ao exercício de atividades econômicas dependentes de concessão ou autorização do Poder Público.' (CTN)\nJURISPRUDÊNCIA: STF, RE 633.782/MG (Pleno, j. 26/10/2020): 'Os atos de poder de polícia que envolvem coerção são privativos do Estado, insuscetíveis de delegação a entidades privadas; fases instrumentais podem ser terceirizadas.'","peg":"Delegação de poder de polícia: atos coativos (autuação, apreensão) são INDELEGÁVEIS. Fases instrumentais (fiscalização eletrônica de trânsito operada por empresa privada) podem ser delegadas. Confundir ato coativo com atividade instrumental é erro frequente.","jur_status":"PENDENTE"},{"n":72,"enun":"O ato administrativo discricionário, no que se refere ao mérito (conveniência e oportunidade), é passível de controle judicial quando o agente público extrapola os limites do poder discricionário ou viola princípios como razoabilidade e proporcionalidade.","gab":"CERTO","com":"A discricionariedade administrativa não é carta branca — tem limites. O Judiciário não pode substituir o agente na escolha discricionária, mas pode anular o ato quando ela viola a razoabilidade, a proporcionalidade ou extrapola os limites legais. O controle judicial do ato discricionário é sobre a legalidade ampla, não sobre a oportunidade em si.","fund":"LEI: 'Art. 2º. A Administração Pública obedecerá, dentre outros, aos princípios da legalidade, finalidade, motivação, razoabilidade, proporcionalidade, moralidade, ampla defesa, contraditório, segurança jurídica, interesse público e eficiência.' (Lei 9.784/1999)\nJURISPRUDÊNCIA: STJ, REsp 1.531.124/RJ (1ª T., j. 14/03/2017): 'O Poder Judiciário pode controlar o ato administrativo discricionário quando verificada violação aos princípios da razoabilidade e proporcionalidade, sem que isso implique substituição do mérito administrativo.'","jur_status":"PENDENTE"},{"n":73,"enun":"A anulação do ato administrativo ilegal pode ser feita de ofício pela Administração Pública, sendo seus efeitos, em regra, retroativos à data em que o ato foi praticado.","gab":"CERTO","com":"O princípio da autotutela (Súmula 346/473 STF) permite à Administração anular seus próprios atos ilegais, de ofício ou por provocação. A anulação tem efeito ex tunc — retroage, pois o ato nunca deveria ter existido. Diferente da revogação (ato legal mas inconveniente), cujos efeitos são ex nunc.","fund":"LEI: 'Art. 53. A Administração deve anular seus próprios atos, quando eivados de vício de legalidade, e pode revogá-los por motivo de conveniência ou oportunidade, respeitados os direitos adquiridos.' (Lei 9.784/1999)\nJURISPRUDÊNCIA: STF, Súmula 346: 'A administração pública pode declarar a nulidade dos seus próprios atos.'\nSTF, Súmula 473: 'A administração pode anular seus próprios atos, quando eivados de vícios que os tornam ilegais, porque deles não se originam direitos; ou revogá-los, por motivo de conveniência ou oportunidade, respeitados os direitos adquiridos, e ressalvada, em todos os casos, a apreciação judicial.'"},{"n":74,"enun":"A responsabilidade civil do Estado por ato omissivo de seus agentes é objetiva, assim como a responsabilidade por atos comissivos, dispensando-se em ambos os casos a comprovação de culpa.","gab":"ERRADO","com":"A responsabilidade por atos comissivos é objetiva (art. 37, §6º, CF/88). Mas a responsabilidade por atos OMISSIVOS é, segundo a posição majoritária do STF e STJ, SUBJETIVA — exige comprovação de que o Estado tinha o dever específico de agir, foi negligente ao não agir e isso causou o dano. Há minoria que defende a objetividade mesmo na omissão — mas CEBRASPE segue a posição majoritária.","fund":"LEI: 'Art. 37, §6º. As pessoas jurídicas de direito público e as de direito privado prestadoras de serviços públicos responderão pelos danos que seus agentes, nessa qualidade, causarem a terceiros.' (CF/88 — aplica-se a atos comissivos)\nJURISPRUDÊNCIA: STJ, REsp 1.236.863/RS (2ª T., j. 22/05/2012): 'Na responsabilidade omissiva do Estado, exige-se a demonstração de culpa (responsabilidade subjetiva), distinguindo-se da responsabilidade objetiva prevista para atos comissivos.'","peg":"Atos comissivos = responsabilidade OBJETIVA. Atos omissivos = responsabilidade SUBJETIVA (posição dominante STF/STJ). Afirmar que ambos são objetivos é erro clássico.","jur_status":"PENDENTE"},{"n":75,"enun":"A Lei de Improbidade Administrativa (Lei n.º 8.429/1992), com a redação alterada pela Lei n.º 14.230/2021, passou a exigir a comprovação de dolo para a caracterização de atos de improbidade administrativa, afastando a modalidade culposa.","gab":"CERTO","com":"A reforma de 2021 (Lei 14.230) foi profunda: antes, o art. 10 da LIA admitia atos culposos (que causam dano ao erário). Com a nova redação, todos os atos de improbidade passam a exigir dolo — específico, com vontade de praticar o ato e consciência de sua ilicitude. Culpa, mesmo grave, não configura mais improbidade.","fund":"LEI: 'Art. 1º, §1º. Consideram-se atos de improbidade administrativa as condutas dolosas tipificadas nos arts. 9º, 10 e 11 desta Lei, ressalvados tipos previstos em leis especiais.' (Lei 8.429/1992, com redação da Lei 14.230/2021)\n'Art. 1º, §2º. Considera-se dolo a vontade livre e consciente de alcançar o resultado ilícito tipificado nos arts. 9º, 10 e 11 desta Lei, não bastando a voluntariedade do agente.' (Lei 8.429/1992)\nJURISPRUDÊNCIA: STJ, REsp 1.984.570/RJ (1ª S., j. 10/11/2021): 'A Lei 14.230/2021 afastou definitivamente a modalidade culposa de improbidade administrativa; exige-se dolo, sob pena de atipicidade da conduta.'","jur_status":"PENDENTE"},{"n":76,"enun":"A aplicação da teoria da imputação objetiva no direito administrativo sancionador permite que se reconheça a responsabilidade de terceiro pelo ato ímprobo praticado por agente público, quando comprovado que o terceiro se beneficiou do ato.","gab":"ERRADO","com":"A LIA (após a reforma de 2021) passou a restringir o polo passivo da ação de improbidade: apenas o agente público pode figurar como réu principal; o particular que se beneficiou pode ser responsabilizado apenas se tiver concorrido dolosamente para o ato. Não basta o mero benefício — exige-se participação ativa e dolosa do terceiro.","fund":"LEI: 'Art. 3º. As disposições desta Lei são aplicáveis, no que couber, àquele que, mesmo não sendo agente público, induza ou concorra dolosamente para a prática de ato de improbidade.' (Lei 8.429/1992, com redação da Lei 14.230/2021)\nJURISPRUDÊNCIA: STJ, REsp 1.975.263/MG (1ª S., j. 13/12/2022): 'O particular só pode ser réu em ação de improbidade se concorrer ativamente e com dolo para o ato; mero beneficiário passivo não é responsabilizado pela LIA reformada.'","peg":"Pós-reforma 2021: o particular que apenas se BENEFICIA sem concorrer dolosamente NÃO é mais responsável por improbidade. Exige-se participação ativa e dolosa do terceiro.","jur_status":"PENDENTE"},{"n":77,"enun":"O processo administrativo federal, regulado pela Lei n.º 9.784/1999, garante ao administrado o direito à ampla defesa, ao contraditório e ao recurso administrativo, sendo a interposição de recurso suspensiva dos efeitos do ato recorrido.","gab":"ERRADO","com":"O recurso administrativo na Lei 9.784/99 tem efeito suspensivo somente em casos específicos ou quando a lei expressamente o prevê. A regra geral é que o recurso NÃO suspende automaticamente os efeitos do ato recorrido — é necessário pedido expresso e demonstração de perigo de dano, ou disposição legal específica.","fund":"LEI: 'Art. 61. Salvo disposição legal em contrário, o recurso não tem efeito suspensivo.' (Lei 9.784/1999)\nJURISPRUDÊNCIA: STJ, REsp 1.274.807/SP (2ª T., j. 05/06/2012): 'No processo administrativo federal, o efeito do recurso é devolutivo, não suspensivo, salvo disposição legal específica ou decisão da autoridade competente que determine a suspensão do ato recorrido.'","peg":"Na Lei 9.784/99, recurso administrativo NÃO tem efeito suspensivo automático (art. 61). A regra geral é apenas efeito devolutivo. Afirmar que a interposição suspende o ato é errado.","jur_status":"PENDENTE"},{"n":78,"enun":"A Administração Pública pode, nas licitações regidas pela Lei n.º 14.133/2021, exigir dos licitantes garantia de proposta de até cinco por cento do valor estimado do contrato, como condição de participação no certame.","gab":"ERRADO","com":"A NLLC permite exigir garantia de proposta, mas o percentual máximo é de 1% do valor estimado do contrato (não 5%). O percentual de 5% é a garantia de EXECUÇÃO do contrato (art. 96), que é diferente da garantia de proposta (art. 58). Confundir os dois institutos é pegadinha clássica.","fund":"LEI: 'Art. 58. Poderá ser exigida dos licitantes, para fins de garantia, caução em dinheiro, seguro-garantia ou fiança bancária, não superior a 1% (um por cento) do valor estimado do contrato.' (Lei 14.133/2021 — garantia de proposta)\n'Art. 96. A Administração poderá, mediante disposição no edital, exigir prestação de garantia nas contratações, com prazo de validade de, no mínimo, a vigência do contrato, nas modalidades a seguir: [...] §1º. O percentual de garantia contratual exigível no edital não poderá exceder 5% (cinco por cento) do valor inicial do contrato.' (Lei 14.133/2021)\nJURISPRUDÊNCIA: TCU, Acórdão 2.139/2022-Plenário: 'Garantia de proposta: até 1% (art. 58). Garantia de execução: até 5% (art. 96), podendo chegar a 10% em contratos de grande vulto.'","peg":"Duas garantias distintas na NLLC: (1) garantia de PROPOSTA: até 1% (art. 58); (2) garantia de EXECUÇÃO: até 5%, podendo ser 10% (art. 96). Confundir os percentuais é armadilha clássica."},{"n":79,"enun":"O princípio da supremacia do interesse público sobre o privado e o da indisponibilidade do interesse público são considerados os princípios-axioma do direito administrativo, dos quais decorrem as prerrogativas e sujeições especiais da Administração.","gab":"CERTO","com":"Celso Antônio Bandeira de Mello classifica esses dois princípios como os pilares do regime jurídico administrativo: da supremacia decorrem as prerrogativas (poder de polícia, cláusulas exorbitantes); da indisponibilidade decorrem as sujeições (licitação, concurso público, prestação de contas). São os alicerces do direito administrativo brasileiro.","fund":"LEI: 'Art. 37. A administração pública direta e indireta de qualquer dos Poderes da União, dos Estados, do Distrito Federal e dos Municípios obedecerá aos princípios de legalidade, impessoalidade, moralidade, publicidade e eficiência.' (CF/88 — LIMPE)\nJURISPRUDÊNCIA: STJ, REsp 1.203.898/MG (1ª T., j. 01/03/2011): 'Os princípios da supremacia e da indisponibilidade do interesse público fundamentam o regime jurídico-administrativo, justificando prerrogativas como o poder de polícia e sujeições como a obrigatoriedade de licitação.'","jur_status":"PENDENTE"},{"n":80,"enun":"A concessão de uso especial para fins de moradia (CUEM), prevista na Medida Provisória n.º 2.220/2001, assegura ao possuidor de imóvel público urbano, nos casos previstos em lei, o direito ao uso do bem para habitação, sendo o ato de concessão vinculado.","gab":"CERTO","com":"A CUEM é instrumento de regularização fundiária urbana de imóvel público. Preenchidos os requisitos legais (posse mansa, área até 250m², uso como moradia, até 30/06/2001), o pedido gera direito subjetivo do interessado — o ato de concessão é vinculado, não discricionário. O Administrador não pode negar se preenchidos os requisitos.","fund":"LEI: 'Art. 1º. Aquele que, até 30 de junho de 2001, possuiu como seu, por cinco anos, ininterruptamente e sem oposição, até duzentos e cinquenta metros quadrados de imóvel público situado em área urbana, utilizando-o para sua moradia ou de sua família, tem o direito à concessão de uso especial para fins de moradia.' (MP 2.220/2001)\nJURISPRUDÊNCIA: STJ, REsp 1.137.436/SP (1ª T., j. 22/03/2011): 'A CUEM, uma vez preenchidos os requisitos legais, é direito subjetivo do possuidor, e o ato de concessão tem natureza vinculada, não podendo ser negado pela Administração.'","jur_status":"PENDENTE"}]},{"nome":"Medicina Legal","comando":"Acerca de tanatologia forense, traumatologia, sexologia forense e demais temas de medicina legal, julgue os itens a seguir.","itens":[{"n":81,"enun":"O rigor mortis, fenômeno cadavérico transformativo, inicia-se pelos músculos da face e da mandíbula e progride em sentido craniocaudal, atingindo os membros inferiores aproximadamente doze a dezoito horas após a morte.","gab":"CERTO","com":"O rigor mortis (rigidez cadavérica) é fenômeno consecutivo real — começa nos músculos pequenos da face e progride craniocaudalmente (da cabeça para os pés). Inicia entre 2-6h, generaliza-se por volta de 12-18h e começa a desaparecer por volta de 24-48h no mesmo sentido (Lei de Nysten). É importante para estimar o intervalo post mortem.","fund":"LEI: CPP, art. 162 — o exame cadavérico deve ser realizado por dois peritos.\nMEDICINA LEGAL: J.L. Figur Amaral, 'Medicina Legal', 9ª ed.: 'O rigor mortis obedece à Lei de Nysten: instala-se craniocaudalmente e dissolve-se na mesma sequência. Útil na estimativa do intervalo post mortem quando associado a outros fenômenos.'"},{"n":82,"enun":"A livor mortis (lividez cadavérica) forma-se nos locais de declive do corpo pela estase sanguínea pós-morte, e o seu aparecimento começa nas primeiras horas após o óbito, podendo mudar de posição até aproximadamente vinte horas após a morte.","gab":"CERTO","com":"As livideces aparecem entre 1-2h após a morte e se tornam fixas (não mudam ao mudar o corpo de posição) em torno de 8-12h (estágio de fixação variável). Após 20-24h, ficam definitivamente fixas. Se o cadáver é encontrado com livideces em região não condizente com a posição em que foi encontrado, sugere-se que o corpo foi movido após a morte.","fund":"LEI: CPP, art. 158 — exame de corpo de delito é indispensável quando o crime deixa vestígios.\nMEDICINA LEGAL: Hygino Duarte Domingos, 'Medicina Legal': 'A lividez cadavérica torna-se fixa entre 8-12h, permitindo inferências sobre alterações posicionais do cadáver. Livideces em região inesperada indicam manipulação post mortem.'"},{"n":83,"enun":"O fenômeno da putrefação cadavérica ocorre em quatro períodos: coloração, gasoso, coliquativo e esqueletização, sendo influenciado por fatores como temperatura, umidade e presença de microrganismos.","gab":"CERTO","com":"A putrefação é o principal fenômeno destrutivo. Os quatro períodos clássicos são: (1) coloração (mancha verde abdominal); (2) gasoso (enfisema putrefativo); (3) coliquativo (liquefação tecidual); (4) esqueletização. Calor e umidade aceleram o processo; frio e secura retardam. Conhecer isso permite estimar tempo de morte em cadáveres avançados.","fund":"LEI: CPP, arts. 158-163 — regulamentam o exame cadavérico e de corpo de delito.\nMEDICINA LEGAL: Genival Veloso de França, 'Medicina Legal', 10ª ed.: 'A putrefação cadavérica evolui em quatro estágios; o primeiro sinal é a mancha verde na fossa ilíaca direita, pela ação do H2S sobre a hemoglobina.'"},{"n":84,"enun":"A asfixia mecânica por enforcamento apresenta, como sinal específico e patognomônico, o sulco de enforcamento que tem direção oblíqua, ascendente e não fechado na região posterior do pescoço, ao contrário da estrangulação, cujo sulco é horizontal e fechado.","gab":"CERTO","com":"Distinguir enforcamento de estrangulação é questão recorrente em provas de Delegado. No enforcamento, o laço traciona para cima (peso do corpo), gerando sulco oblíquo, ascendente e aberto na região oposta ao nó (geralmente nuca). Na estrangulação (por laço), a pressão é uniforme ao redor do pescoço — sulco horizontal e fechado.","fund":"LEI: CPP, art. 162 — exame cadavérico; art. 164 — reconhecimento do cadáver.\nMEDICINA LEGAL: Hercules Catharino, 'Medicina Legal': 'O sulco de enforcamento é típico: oblíquo, ascendente, em V invertido ou U aberto na nuca, com fundo de canaleta; o de estrangulação é horizontal, fechado, profundo e uniforme.'"},{"n":85,"enun":"No exame de conjunção carnal forçada, a presença de espermatozoides na cavidade vaginal é suficiente para comprovar a materialidade do crime de estupro.","gab":"ERRADO","com":"A presença de espermatozoides comprova apenas a conjunção carnal, não necessariamente sua natureza forçada (crime de estupro). Para comprovar a materialidade do estupro, é preciso verificar sinais de violência (lesões na região genital, petéquias cervicais, lesões corporais associadas). Além disso, ausência de espermatozoides não exclui o crime — preservativo, ejaculação extragenital ou exame tardio.","fund":"LEI: CP, art. 213 — estupro; CPP, art. 158 — exame de corpo de delito é indispensável.\nMEDICINA LEGAL: Genival Veloso de França: 'A presença de espermatozoides demonstra ato sexual, não o crime; a violência deve ser provada por outros achados físicos ou circunstanciais. Ausência de lesões não exclui o estupro em mulheres com hímens complacentes ou com histórico de vida sexual.'","peg":"Sêmen = ato sexual. Violência = lesões físicas. O crime de estupro exige prova da violência ou grave ameaça, não apenas da conjunção carnal. CEBRASPE frequentemente pede essa distinção."},{"n":86,"enun":"O hematoma subdural, frequente no traumatismo cranioencefálico por impacto, resulta do rompimento das veias-ponte (bridging veins) entre a córtex cerebral e os seios venosos da dura-máter.","gab":"CERTO","com":"O hematoma subdural ocorre entre a dura-máter e a aracnoide, geralmente por ruptura das veias-ponte — vasos que conectam a superfície cerebral aos seios durais e são muito suscetíveis a movimentos de aceleração-desaceleração (como no trauma por sacudimento em bebês — shaken baby syndrome). Diferente do extradural (ruptura arterial, art. meníngea média) e do subaracnoide.","fund":"LEI: CPP, art. 162 — exame cadavérico e laudo necroscópico.\nMEDICINA LEGAL: Iwamura ESO, 'Medicina Legal e Trauma': 'Hematoma subdural: ruptura de veias-ponte por aceleração-desaceleração; frequente em idosos (atrofia cerebral tensiona as veias) e lactentes. Hematoma extradural: artéria meníngea média; intervalo lúcido característico.'"},{"n":87,"enun":"A tanatocronodiagnose (estimativa da hora da morte) baseia-se em conjunto de fenômenos cadavéricos, não sendo possível estabelecer com precisão o horário exato do óbito por meio de um único sinal isolado.","gab":"CERTO","com":"Nenhum sinal isolado — temperatura, rigidez, lividez, putrefação — permite estabelecer com exatidão a hora da morte. A tanatocronodiagnose é sempre uma estimativa baseada no conjunto de achados, nas condições ambientais (temperatura, umidade) e nas circunstâncias do caso. O perito informa uma faixa provável de intervalo post mortem.","fund":"LEI: CPP, art. 162 — exame cadavérico.\nMEDICINA LEGAL: Rodrigo Moraes da Cunha, 'Introdução à Medicina Legal': 'A estimativa do intervalo post mortem é sempre probabilística. A combinação de rigor mortis, lividez e temperatura corporal, correlacionada com as condições ambientais, oferece a melhor aproximação.'"},{"n":88,"enun":"A lesão vital é aquela que ocorre em vida (ante mortem) e distingue-se da lesão post mortem pela presença de reação inflamatória, infiltrado leucocitário e coagulação sanguínea no entorno da lesão.","gab":"CERTO","com":"Vitalidade das lesões é crucial para saber se foram causadas antes ou depois da morte. Lesões ante mortem mostram reação vital: hiperemia, hemorragia com infiltrado leucocitário, edema, retração e coagulação. Lesões post mortem têm aspecto diferente — bordas secas, sem infiltrado. Isso determina a causa jurídica da morte.","fund":"LEI: CPP, art. 162 — laudo de necropsia deve apontar causa da morte.\nMEDICINA LEGAL: Genival Veloso de França: 'Os estigmas de vitalidade incluem hemorragia intralesional com coágulos, bordas eritematosas e infiltrado inflamatório; sua presença distingue lesão ante mortem da post mortem.'"},{"n":89,"enun":"A síndrome de Münchhausen por procuração consiste em um transtorno fictício em que o cuidador produz ou simula sintomas de doença em pessoa sob seus cuidados, geralmente uma criança, para obter atenção médica.","gab":"CERTO","com":"Na síndrome de Münchhausen por procuração (MBP — Munchausen by proxy), o cuidador — quase sempre a mãe — cria ou simula doenças na criança para receber atenção médica e compaixão. É forma de abuso infantil grave. O perito deve estar atento a hospitalizações repetidas com sintomas que desaparecem quando a criança é separada do cuidador.","fund":"LEI: ECA, art. 5º — nenhuma criança será objeto de qualquer forma de negligência, discriminação, exploração, violência, crueldade e opressão.\nMEDICINA LEGAL: Hygino Duarte Domingos: 'A MBP é forma de maus-tratos qualificados; o diagnóstico exige equipe multiprofissional e, frequentemente, internação da criança separada da mãe/cuidador para observação do padrão sintomático.'"},{"n":90,"enun":"A intoxicação por monóxido de carbono (CO) produz coloração rósea ou cereja das mucosas e da pele do cadáver, sendo um sinal característico desse tipo de morte.","gab":"CERTO","com":"O CO liga-se à hemoglobina com afinidade 200 vezes maior que o O2, formando carboxiemoglobina (HbCO) de cor vermelho-cereja. Cadáveres de vítimas de incêndio ou escapamento de veículos em ambientes fechados apresentam essa coloração típica nas mucosas, pele e vísceras. É sinal sugestivo, mas não exclusivo — confirmado por dosagem de HbCO.","fund":"LEI: CPP, art. 162 — laudo de necropsia.\nMEDICINA LEGAL: Genival Veloso de França: 'A coloração róseo-cereja da pele e mucosas é achado clássico da intoxicação por CO, resultante da carboxiemoglobina. A confirmação laboratorial por espectrofotometria é obrigatória no laudo.'"}]},{"nome":"Direito Civil e Legislação Civil Complementar","comando":"Acerca de pessoas, negócios jurídicos, responsabilidade civil, família e demais temas do direito civil, julgue os itens a seguir.","itens":[{"n":91,"enun":"A pessoa jurídica de direito privado pode ser desconsiderada, por abuso da personalidade jurídica, quando há desvio de finalidade ou confusão patrimonial entre ela e seus sócios, nos termos do art. 50 do Código Civil.","gab":"CERTO","com":"A desconsideração da personalidade jurídica (disregard of legal entity) é medida excepcional para coibir o uso fraudulento da pessoa jurídica como escudo. O CC/02 adota a teoria maior: exige prova de abuso — desvio de finalidade (uso da PJ para fins ilícitos) ou confusão patrimonial (mistura do patrimônio pessoal com o da empresa). A teoria menor (usada no CDC e ambiental) é mais fácil de aplicar.","fund":"LEI: 'Art. 50. Em caso de abuso da personalidade jurídica, caracterizado pelo desvio de finalidade ou pela confusão patrimonial, pode o juiz, a requerimento da parte, ou do Ministério Público quando lhe couber intervir no processo, desconsiderá-la para que os efeitos de certas e determinadas relações de obrigações sejam estendidos aos bens particulares dos administradores ou sócios da pessoa jurídica beneficiados direta ou indiretamente pelo abuso.' (CC/2002)\nJURISPRUDÊNCIA: STJ, REsp 1.515.895/RS (4ª T., j. 12/02/2019): 'A desconsideração da personalidade jurídica no CC/02 exige prova efetiva de abuso; a mera insolvência ou dissolução irregular não basta — aplica-se a teoria maior.'","jur_status":"PENDENTE"},{"n":92,"enun":"O uso indevido de imagem de pessoa, mesmo sem comprovação de dano material, gera obrigação de indenizar, pois o dano é presumido (in re ipsa) pela jurisprudência consolidada do STJ.","gab":"CERTO","com":"A Súmula 403/STJ consagrou o dano in re ipsa para uso indevido de imagem: não é preciso provar dano concreto (financeiro, moral extenso) — o simples uso não autorizado gera o dever de indenizar. Isso protege a pessoa de campanhas publicitárias ou usos comerciais sem autorização. A indenização é pela própria violação ao direito de imagem.","fund":"LEI: 'Art. 20. Salvo se autorizadas, ou se necessárias à administração da justiça ou à manutenção da ordem pública, a divulgação de escritos, a transmissão da palavra, ou a publicação, a exposição ou a utilização da imagem de uma pessoa poderão ser proibidas, a seu requerimento e sem prejuízo da indenização que couber.' (CC/2002)\nJURISPRUDÊNCIA: STJ, Súmula 403: 'Independe de prova do prejuízo a indenização pela publicação não autorizada de imagem de pessoa com fins econômicos ou comerciais.' (j. 28/10/2009)"},{"n":93,"enun":"O negócio jurídico praticado por incapaz pode ser anulado, sendo o prazo decadencial de quatro anos para a ação anulatória, contado da cessação da incapacidade.","gab":"CERTO","com":"Os negócios praticados por relativamente incapazes sem a assistência devida são anuláveis (não nulos). O prazo decadencial para a ação anulatória é de 4 anos (art. 178, I, CC), contado a partir da cessação da incapacidade — quando o incapaz atinge plena capacidade e pode agir autonomamente.","fund":"LEI: 'Art. 171. Além dos casos expressamente declarados na lei, é anulável o negócio jurídico: I — por incapacidade relativa do agente.' (CC/2002)\n'Art. 178. É de quatro anos o prazo de decadência para pleitear-se a anulação do negócio jurídico, contado: I — no caso de coação, do dia em que ela cessar; II — no de erro, dolo, fraude contra credores, estado de perigo ou lesão, do dia em que se realizou o negócio jurídico; III — no de atos de incapazes, do dia em que cessar a incapacidade.' (CC/2002)\nJURISPRUDÊNCIA: STJ, REsp 1.199.667/SP (3ª T., j. 14/04/2011): 'O prazo decadencial para anular negócio praticado por incapaz relativo é de quatro anos, iniciando-se com a cessação da incapacidade.'","jur_status":"PENDENTE"},{"n":94,"enun":"A responsabilidade civil por dano ambiental é objetiva e baseada na teoria do risco integral, não admitindo excludentes de responsabilidade como caso fortuito, força maior ou culpa exclusiva da vítima.","gab":"CERTO","com":"O dano ambiental aplica a teoria do risco integral — a mais rigorosa: basta o nexo causal entre a atividade e o dano, sem admitir nenhuma excludente clássica. Diferente da teoria do risco criado (do CC), que admite algumas excludentes. Isso foi consolidado pelo STJ no REsp 1.374.284, que afastou o caso fortuito como excludente do dano ambiental.","fund":"LEI: 'Art. 14, §1º. É o poluidor obrigado, independentemente da existência de culpa, a indenizar ou reparar os danos causados ao meio ambiente e a terceiros, afetados por sua atividade.' (Lei 6.938/1981 — Política Nacional do Meio Ambiente)\nJURISPRUDÊNCIA: STJ, REsp 1.374.284/MG (2ª T., j. 27/08/2013): 'A responsabilidade civil por dano ambiental é objetiva, baseada na teoria do risco integral, sendo inadmissível a invocação de caso fortuito, força maior ou culpa exclusiva de terceiro como excludente de responsabilidade.'","jur_status":"OK"},{"n":95,"enun":"O estado de perigo, vício do consentimento previsto no Código Civil, pressupõe que o agente assuma obrigação excessivamente onerosa para salvar a si mesmo ou a membro de sua família de grave dano, conhecendo o outro contratante essa necessidade.","gab":"CERTO","com":"O estado de perigo é a 'extorsão de emergência': você assina um contrato absurdo porque está desesperado para salvar alguém. O CC exige: (1) situação de risco grave (dano à pessoa); (2) necessidade de assumir obrigação desproporcional; (3) conhecimento pelo outro contratante. Sem esse terceiro elemento, o negócio pode não ser anulável por estado de perigo.","fund":"LEI: 'Art. 156. Configura-se o estado de perigo quando alguém, premido da necessidade de salvar-se, ou a pessoa de sua família, de grave dano conhecido pela outra parte, assume obrigação excessivamente onerosa. Parágrafo único. Tratando-se de pessoa não pertencente à família do declarante, o juiz decidirá segundo as circunstâncias.' (CC/2002)\nJURISPRUDÊNCIA: STJ, REsp 918.392/RN (3ª T., j. 11/03/2008): 'O estado de perigo exige o conhecimento da situação de necessidade pela outra parte; sem esse elemento, o negócio pode subsistir ou ser resolvido por outros fundamentos.'","jur_status":"PENDENTE"},{"n":96,"enun":"A posse de boa-fé confere ao possuidor o direito às benfeitorias necessárias e úteis, com direito de retenção pelo valor das últimas, bem como o direito às voluptuárias, se não forem pagas, podendo levantá-las se não houver deterioração da coisa.","gab":"CERTO","com":"O CC diferencia o possuidor de boa-fé do de má-fé quanto às benfeitorias: o de boa-fé tem direito a (1) necessárias com reembolso; (2) úteis com reembolso e direito de retenção; (3) voluptuárias com direito de levantamento (jus tollendi) se não causar dano. O de má-fé só tem direito às necessárias, sem retenção.","fund":"LEI: 'Art. 1.219. O possuidor de boa-fé tem direito à indenização das benfeitorias necessárias e úteis, bem como, quanto às voluptuárias, se não lhe forem pagas, a levantá-las, quando o puder sem detrimento da coisa, e poderá exercer o direito de retenção pelo valor das benfeitorias necessárias e úteis.' (CC/2002)\nJURISPRUDÊNCIA: STJ, REsp 1.335.464/SP (3ª T., j. 12/06/2012): 'O possuidor de boa-fé tem direito de retenção pelas benfeitorias úteis e necessárias; as voluptuárias podem ser levantadas sem detrimento da coisa.'","jur_status":"PENDENTE"},{"n":97,"enun":"O prazo prescricional para a pretensão de reparação civil decorrente de ato ilícito é de três anos, nos termos do Código Civil.","gab":"CERTO","com":"O CC/02 fixou prazo de 3 anos para a pretensão de reparação civil (art. 206, §3º, V), contado da data em que o lesado tiver ciência do fato. Prazo especial menor que o geral de 10 anos. Em relações de consumo, o CDC pode prevalecer (5 anos para o fato do produto/serviço — art. 27 CDC).","fund":"LEI: 'Art. 206, §3º. Prescreve em três anos: [...] V — a pretensão de reparação civil.' (CC/2002)\nJURISPRUDÊNCIA: STJ, REsp 1.228.104/RS (2ª S., j. 24/02/2016): 'O prazo prescricional para ação de reparação de danos é de três anos (art. 206, §3º, V, CC), contado do conhecimento da vítima sobre o dano e sua autoria, conforme a teoria da actio nata subjetiva.'","jur_status":"PENDENTE"},{"n":98,"enun":"No regime da comunhão parcial de bens, os bens adquiridos a título oneroso na constância do casamento comunicam-se ao cônjuge, ainda que adquiridos com proventos do trabalho pessoal de apenas um deles.","gab":"CERTO","com":"A comunhão parcial é o regime padrão (art. 1.640 CC): comunica-se tudo que for adquirido onerosamente durante o casamento — inclusive com salário ou renda de um só cônjuge. O que não se comunica são os bens anteriores ao casamento, os recebidos por herança ou doação durante a união, e os bens de uso pessoal.","fund":"LEI: 'Art. 1.658. No regime de comunhão parcial, comunicam-se os bens que sobrevierem ao casal, na constância do casamento, com as exceções dos artigos seguintes.' (CC/2002)\n'Art. 1.660. Entram na comunhão: [...] I — os bens adquiridos na constância do casamento por título oneroso, ainda que só em nome de um dos cônjuges.' (CC/2002)\nJURISPRUDÊNCIA: STJ, REsp 1.399.199/RS (4ª T., j. 14/03/2017): 'Na comunhão parcial, bens adquiridos onerosamente durante o casamento com proventos de um só cônjuge integram o patrimônio comum do casal.'","jur_status":"PENDENTE"}]},{"nome":"Direito Tributário e Legislação Tributária Complementar","comando":"Acerca do Sistema Tributário Nacional, competência tributária, obrigação tributária e demais temas do direito tributário, julgue os itens a seguir.","itens":[{"n":99,"enun":"O crime tributário material, como a sonegação fiscal (art. 1º da Lei n.º 8.137/1990), apenas se consuma com o lançamento definitivo do crédito tributário, conforme entendimento consolidado pelo Supremo Tribunal Federal.","gab":"CERTO","com":"A SV 24 do STF é categórica: sem lançamento definitivo, não há crime tributário material — tipicidade material exige a confirmação do crédito pelo fisco. Isso significa que a prescrição penal só começa a correr do lançamento definitivo, e não é possível instaurar IP ou denúncia antes disso para crimes do art. 1º da Lei 8.137/90.","fund":"LEI: 'Art. 1º. Constitui crime contra a ordem tributária suprimir ou reduzir tributo, ou contribuição social e qualquer acessório, mediante as seguintes condutas: [...]' (Lei 8.137/1990)\nJURISPRUDÊNCIA: STF, Súmula Vinculante 24: 'Não se tipifica crime material contra a ordem tributária, previsto no art. 1°, incisos I a IV, da Lei n.° 8.137/90, antes do lançamento definitivo do tributo.' (j. 02/12/2009)","jur_status":"OK"},{"n":100,"enun":"As contribuições de melhoria somente podem ser cobradas pelo Poder Público quando houver obra pública que resulte em valorização imobiliária para o proprietário do imóvel, sendo o limite global o custo total da obra.","gab":"CERTO","com":"A contribuição de melhoria tem dois limites constitucionais: (1) limite individual — não pode exceder a valorização do imóvel de cada contribuinte; (2) limite global — o total arrecadado não pode superar o custo da obra. A valorização imobiliária é pressuposto necessário: sem ela, não se pode cobrar.","fund":"LEI: 'Art. 145, III. A União, os Estados, o Distrito Federal e os Municípios poderão instituir os seguintes tributos: [...] III — contribuição de melhoria, decorrente de obras públicas.' (CF/88)\n'Art. 81. A contribuição de melhoria cobrada pela União, pelos Estados, pelo Distrito Federal ou pelos Municípios, no âmbito de suas respectivas atribuições, é instituída para fazer face ao custo de obras públicas de que decorra valorização imobiliária, tendo como limite total a despesa realizada e como limite individual o acréscimo de valor que da obra resultar para cada imóvel beneficiado.' (CTN)\nJURISPRUDÊNCIA: STF, RE 116.966/SP (2ª T., j. 08/03/1994): 'A contribuição de melhoria pressupõe valorização imobiliária; sem ela, o tributo não pode ser cobrado.'","jur_status":"PENDENTE"},{"n":101,"enun":"A isenção tributária, de acordo com o Código Tributário Nacional, dispensa o pagamento do tributo e equivale, juridicamente, à hipótese de não incidência da norma tributária.","gab":"ERRADO","com":"Isenção e não incidência são institutos distintos. Na não incidência, o fato não está no âmbito de abrangência da norma tributária — nunca ocorre o fato gerador. Na isenção, o fato gerador ocorre, mas a lei dispensa o pagamento. Imunidade, por sua vez, é limitação constitucional ao poder de tributar. Confundir esses três conceitos é pegadinha frequente.","fund":"LEI: 'Art. 175. Excluem o crédito tributário: I — a isenção; II — a anistia.' (CTN)\nJURISPRUDÊNCIA: STF, RE 159.026/SP (1ª T., j. 30/08/1994): 'Distinguem-se isenção e não incidência: na isenção, o fato gerador ocorre mas o crédito é excluído por lei; na não incidência, a situação não se enquadra na hipótese de incidência da norma.'","peg":"Isenção ≠ não incidência ≠ imunidade. Isenção: fato gerador ocorre, mas a lei dispensa o crédito (CTN, art. 175). Não incidência: o fato não está no campo de incidência da norma.","jur_status":"PENDENTE"},{"n":102,"enun":"Nos crimes contra a ordem tributária em que houver parcelamento do débito fiscal antes do recebimento da denúncia criminal, extingue-se a punibilidade do agente.","gab":"ERRADO","com":"O parcelamento antes do recebimento da denúncia suspende a pretensão punitiva e a prescrição (não extingue a punibilidade). A extinção da punibilidade ocorre apenas com o pagamento integral do débito — podendo ser antes ou depois da denúncia. Pagamento integral = extinção; parcelamento = apenas suspensão.","fund":"LEI: 'Art. 9º, §1º. A prescrição criminal não corre durante o período de suspensão da pretensão punitiva.' (Lei 10.684/2003 — REFIS) | 'Art. 83, §2º. É suspensa a pretensão punitiva do Estado, referente aos crimes previstos no caput deste artigo, durante o período em que a pessoa física ou a pessoa jurídica relacionada com o agente dos aludidos crimes estiver incluída no parcelamento.' (Lei 9.430/1996)\nJURISPRUDÊNCIA: STJ, REsp 1.640.245/RS (3ª S., j. 14/06/2017): 'O parcelamento do débito tributário antes do recebimento da denúncia suspende a pretensão punitiva e a prescrição; somente o pagamento integral extingue a punibilidade.'","peg":"Parcelamento = SUSPENSÃO da pretensão punitiva. Pagamento integral = EXTINÇÃO da punibilidade. A confusão entre os dois efeitos é clássica e muito cobrada.","jur_status":"PENDENTE"},{"n":103,"enun":"O imposto de renda tem como fato gerador a disponibilidade econômica ou jurídica de renda ou de proventos de qualquer natureza, devendo a lei que o instituir ou majorar aguardar o exercício financeiro seguinte para produzir efeitos.","gab":"CERTO","com":"O IR está sujeito ao princípio da anterioridade (art. 150, III, b — exercício financeiro seguinte) e ao princípio da anterioridade nonagesimal não se aplica ao IR (só à anterioridade de 90 dias em alguns casos). O fato gerador é a disponibilidade econômica (renda efetiva) ou jurídica (direito adquirido à renda, mesmo sem recebimento material).","fund":"LEI: 'Art. 43. O imposto, de competência da União, sobre a renda e proventos de qualquer natureza tem como fato gerador a aquisição da disponibilidade econômica ou jurídica: I — de renda, assim entendido o produto do capital, do trabalho ou da combinação de ambos; II — de proventos de qualquer natureza, assim entendidos os acréscimos patrimoniais não compreendidos no inciso anterior.' (CTN)\nJURISPRUDÊNCIA: STF, RE 232.896/PA (1ª T., j. 02/08/1999): 'O IR submete-se à anterioridade do exercício financeiro (art. 150, III, b CF), mas não à anterioridade nonagesimal (art. 150, III, c CF), exceção expressa na própria Constituição.'","jur_status":"PENDENTE"},{"n":104,"enun":"As imunidades tributárias recíprocas entre os entes federativos, previstas na Constituição Federal, abrangem também as empresas estatais que prestem serviço público em regime de monopólio, sem fins lucrativos.","gab":"CERTO","com":"A imunidade recíproca (art. 150, VI, a CF/88) protege os entes federativos de tributação mútua. O STF estendeu essa imunidade a empresas públicas e sociedades de economia mista que: (1) prestem serviço público, (2) em regime de privilégio (monopólio ou exclusividade), (3) sem fins lucrativos. Ex.: ECT (Correios) goza de imunidade recíproca.","fund":"LEI: 'Art. 150, VI, a. Sem prejuízo de outras garantias asseguradas ao contribuinte, é vedado à União, aos Estados, ao Distrito Federal e aos Municípios: [...] VI — instituir impostos sobre: a) patrimônio, renda ou serviços, uns dos outros.' (CF/88)\nJURISPRUDÊNCIA: STF, RE 601.392/PR (Pleno, j. 28/02/2013): 'A imunidade recíproca alcança as empresas públicas e sociedades de economia mista prestadoras de serviços públicos em regime de monopólio, sem finalidade lucrativa, como a ECT.'","jur_
