status":"PENDENTE"}]},{"nome":"Direito Ambiental e Legislação Ambiental Complementar","comando":"Acerca da política ambiental, crimes ambientais, responsabilidade e demais temas do direito ambiental, julgue os itens a seguir.","itens":[{"n":105,"enun":"A pessoa jurídica pode ser responsabilizada criminalmente por crimes ambientais, conforme previsto na Lei n.º 9.605/1998 (Lei dos Crimes Ambientais), independentemente da responsabilização penal das pessoas físicas.","gab":"CERTO","com":"O Brasil é um dos poucos países que prevê responsabilidade penal da pessoa jurídica, especificamente em crimes ambientais (art. 225, §3º CF/88 + Lei 9.605/98). O STJ e o STF superaram a teoria da dupla imputação (que exigia pessoa física também denunciada) — hoje a PJ pode responder sozinha.","fund":"LEI: 'Art. 3º. As pessoas jurídicas serão responsabilizadas administrativa, civil e penalmente conforme o disposto nesta Lei, nos casos em que a infração seja cometida por decisão de seu representante legal ou contratual, ou de seu órgão colegiado, no interesse ou benefício da sua entidade.' (Lei 9.605/1998)\nJURISPRUDÊNCIA: STF, RE 548.181/PR (1ª T., Rosa Weber, j. 06/08/2013): 'É possível a responsabilização penal da pessoa jurídica por crimes ambientais independentemente da responsabilização concomitante da pessoa física — superação da teoria da dupla imputação.'","jur_status":"OK"},{"n":106,"enun":"O princípio do poluidor-pagador, no direito ambiental brasileiro, não tem caráter punitivo, mas objetiva imputar ao poluidor os custos de prevenção, reparação e repressão dos danos ambientais, internalizando as externalidades negativas de sua atividade.","gab":"CERTO","com":"O poluidor-pagador não é punição — é internalização de custos. Quem gera externalidade negativa ambiental (poluição) deve arcar com os custos sociais dela, e não repassá-los à coletividade. Tem duas faces: preventiva (quem vai poluir paga pelo controle) e repressiva (quem poluiu paga pela reparação).","fund":"LEI: 'Art. 4º. A Política Nacional do Meio Ambiente visará: [...] VII — à imposição, ao poluidor e ao predador, da obrigação de recuperar e/ou indenizar os danos causados e, ao usuário, da contribuição pela utilização de recursos ambientais com fins econômicos.' (Lei 6.938/1981)\nJURISPRUDÊNCIA: STJ, REsp 1.374.284/MG (2ª T., j. 27/08/2013): 'O princípio do poluidor-pagador não tem natureza punitiva, mas de imputação de responsabilidade pelos custos ambientais, visando à internalização das externalidades negativas da atividade poluidora.'","jur_status":"OK"},{"n":107,"enun":"A Lei n.º 9.605/1998 prevê que as penas restritivas de direitos são autônomas e substituem as privativas de liberdade quando fixada pena inferior a quatro anos, o crime for culposo, ou quando as circunstâncias do caso indicarem que essa substituição é suficiente.","gab":"CERTO","com":"A Lei dos Crimes Ambientais inovou ao prever penas restritivas de direito específicas (prestação de serviços à comunidade, interdição temporária de direitos, suspensão parcial ou total das atividades). Os critérios de substituição são similares aos do CP, mas adaptados à natureza dos crimes ambientais — incluindo crimes culposos.","fund":"LEI: 'Art. 7º. As penas restritivas de direitos são autônomas e substituem as privativas de liberdade quando: I — tratar-se de crime culposo ou for aplicada a pena privativa de liberdade inferior a quatro anos; II — a culpabilidade, os antecedentes, a conduta social e a personalidade do condenado, bem como os motivos e as circunstâncias do crime indicarem que a substituição seja suficiente para efeitos de reprovação e prevenção do crime.' (Lei 9.605/1998)\nJURISPRUDÊNCIA: STJ, REsp 1.327.027/PR (2ª T., j. 03/04/2012): 'Os requisitos do art. 7º da Lei 9.605/98 para substituição da pena privativa por restritiva de direitos são similares ao CP, mas incluem a pena inferior a 4 anos, alcançando crimes dolosos de menor potencial.'","jur_status":"PENDENTE"},{"n":108,"enun":"O licenciamento ambiental é ato administrativo vinculado e obrigatório para o exercício de atividades potencialmente causadoras de significativa degradação ambiental, sendo nulo qualquer empreendimento iniciado sem a devida licença prévia.","gab":"ERRADO","com":"O licenciamento ambiental é ato discricionário (não vinculado) — o órgão ambiental avalia a viabilidade do empreendimento segundo critérios técnicos com margem de apreciação. A exigência de EIA/RIMA é para atividades de significativa degradação (art. 225, §1º, IV CF/88). Empreendimentos sem licença podem ser embargados, mas a nulidade automática depende do tipo de irregularidade.","fund":"LEI: 'Art. 225, §1º. Para assegurar a efetividade desse direito, incumbe ao Poder Público: IV — exigir, na forma da lei, para instalação de obra ou atividade potencialmente causadora de significativa degradação do meio ambiente, estudo prévio de impacto ambiental, a que se dará publicidade.' (CF/88)\n'Art. 2º. A localização, construção, instalação, ampliação, modificação e operação de empreendimentos e atividades utilizadores de recursos ambientais efetiva ou potencialmente poluidores [...] dependerão de prévio licenciamento ambiental.' (Resolução CONAMA 237/1997)\nJURISPRUDÊNCIA: STJ, REsp 1.198.727/MG (1ª T., j. 14/08/2012): 'O licenciamento ambiental tem natureza discricionária; o órgão ambiental avalia as condicionantes técnicas e ambientais antes de conceder ou negar a licença.'","peg":"Licenciamento ambiental NÃO é ato vinculado — é discricionário. A obrigatoriedade não transforma o ato em vinculado; o órgão tem margem de apreciação técnica.","jur_status":"PENDENTE"},{"n":109,"enun":"O princípio da prevenção aplica-se quando os riscos ambientais são conhecidos e cientificamente comprovados, enquanto o princípio da precaução incide quando há incerteza científica sobre os efeitos de determinada atividade ao meio ambiente.","gab":"CERTO","com":"A distinção prevenção/precaução é recorrente em provas: prevenção = risco conhecido e comprovado (adota-se medida para evitar o dano certo); precaução = risco incerto, sem consenso científico (adota-se medida cautelar mesmo sem certeza do dano). In dubio pro natura — na dúvida, protege-se o meio ambiente.","fund":"LEI: 'Art. 4º, VI. A Política Nacional do Meio Ambiente visará: [...] à proteção dos ecossistemas, com a preservação de áreas representativas.' (Lei 6.938/1981)\nJURISPRUDÊNCIA: STJ, REsp 1.198.727/MG (1ª T., j. 14/08/2012): 'Prevenção aplica-se a riscos conhecidos e mensuráveis; precaução incide quando a ciência ainda não definiu os riscos, exigindo cautela máxima diante da incerteza.'","jur_status":"PENDENTE"}]},{"nome":"Direito Empresarial e Legislação Empresarial Complementar","comando":"Acerca de direito societário, falência, recuperação judicial e demais temas do direito empresarial, julgue os itens a seguir.","itens":[{"n":110,"enun":"O empresário individual responde pelas obrigações de sua empresa de forma ilimitada, com todo o seu patrimônio pessoal, ao contrário do empresário individual de responsabilidade limitada (EIRELI/SLU), que só responde com o capital social integralizado.","gab":"CERTO","com":"O empresário individual confunde patrimônio pessoal com empresarial — sem separação jurídica. A Sociedade Limitada Unipessoal (SLU — que substituiu a EIRELI pela Lei 14.195/21) permite ao sócio único limitar sua responsabilidade ao capital social. É uma das principais vantagens da pessoa jurídica.","fund":"LEI: 'Art. 966. Considera-se empresário quem exerce profissionalmente atividade econômica organizada para a produção ou a circulação de bens ou de serviços.' (CC/2002)\n'Art. 1.052, §1º. A sociedade limitada pode ser constituída por 1 (uma) ou mais pessoas.' (CC/2002 — com redação da Lei 14.195/2021)\nJURISPRUDÊNCIA: STJ, REsp 1.481.083/PR (3ª T., j. 09/08/2016): 'O empresário individual responde ilimitadamente com seus bens pessoais pelas dívidas empresariais, diversamente das sociedades com responsabilidade limitada, onde a separação patrimonial protege o sócio.'","jur_status":"PENDENTE"},{"n":111,"enun":"Na falência, os créditos trabalhistas são classificados como extraconcursais quando decorrentes de salários vencidos nos três meses anteriores ao pedido de falência, limitados a cinco salários mínimos por trabalhador.","gab":"ERRADO","com":"Os créditos trabalhistas são CONCURSAIS (fazem parte do concurso de credores), não extraconcursais. Na classificação dos créditos na falência, os trabalhistas têm preferência de 1ª classe, mas com limite de 150 salários mínimos por credor. Os extraconcursais são os oriundos de atos do administrador judicial durante a falência.","fund":"LEI: 'Art. 83. A classificação dos créditos na falência obedece à seguinte ordem: I — os créditos derivados da legislação do trabalho, limitados a 150 (cento e cinquenta) salários mínimos por credor.' (Lei 11.101/2005)\n'Art. 84. Serão considerados créditos extraconcursais e serão pagos com precedência sobre os mencionados no art. 83 desta Lei, na ordem a seguir: [atos praticados pelo administrador judicial].' (Lei 11.101/2005)\nJURISPRUDÊNCIA: STJ, REsp 1.438.368/SP (3ª T., j. 11/03/2014): 'Créditos trabalhistas são concursais de 1ª classe, limitados a 150 SM; os extraconcursais são os decorrentes de atos praticados após o decreto de falência.'","peg":"Crédito trabalhista = CONCURSAL (1ª classe, limite 150 SM). Crédito extraconcursal = gerado durante a falência pelo administrador. Confundir os dois é armadilha frequente em provas.","jur_status":"PENDENTE"},{"n":112,"enun":"Na recuperação judicial, o devedor em crise econômico-financeira tem o benefício da suspensão das ações e execuções pelos credores pelo prazo de cento e oitenta dias, prorrogável por igual período, contado do deferimento do processamento da recuperação.","gab":"CERTO","com":"O stay period é o período de proteção durante a recuperação judicial: 180 dias de suspensão de ações e execuções, prorrogáveis por mais 180 dias (Lei 14.112/2020 alterou para permitir a prorrogação única). Protege o devedor para que possa negociar com credores sem ser atingido por execuções durante o processo.","fund":"LEI: 'Art. 6º, §4º. Na recuperação judicial, a suspensão de que trata o caput deste artigo em hipótese nenhuma excederá o prazo improrrogável de 180 (cento e oitenta) dias contado do deferimento do processamento da recuperação judicial, prorrogável por igual prazo, uma única vez.' (Lei 11.101/2005, com redação da Lei 14.112/2020)\nJURISPRUDÊNCIA: STJ, CC 89.549/SP (2ª S., j. 27/05/2009): 'O stay period de 180 dias é regra de proteção ao devedor; a prorrogação requer decisão fundamentada do juiz sobre o andamento das negociações com credores.'","jur_status":"PENDENTE"},{"n":113,"enun":"A teoria da aparência no direito empresarial permite responsabilizar a sociedade empresária por atos praticados por representante sem poderes suficientes, quando terceiro de boa-fé acreditar legitimamente na representação.","gab":"CERTO","com":"A teoria da aparência é a segurança do tráfico jurídico: se a empresa cria as condições para que terceiros acreditem que alguém a representa (pela posição, pelas roupas, pelo ambiente), ela responde pelos atos desse 'representante aparente', mesmo sem procuração. Protege terceiros de boa-fé que agiram confiando em aparência criada pela própria empresa.","fund":"LEI: 'Art. 1.015. No silêncio do contrato, os administradores podem praticar todos os atos pertinentes à gestão da sociedade.' (CC/2002)\nJURISPRUDÊNCIA: STJ, REsp 1.045.847/RS (4ª T., j. 18/08/2009): 'A teoria da aparência obriga a sociedade empresária pelos atos praticados por administrador de fato ou representante aparente, quando terceiro de boa-fé confiou na aparência de poderes criada pela própria empresa.'","jur_status":"PENDENTE"},{"n":114,"enun":"O endosso em branco no direito cambiário transfere o título sem a indicação do endossatário, tornando-o ao portador e permitindo a qualquer possuidor exercer os direitos nele incorporados.","gab":"CERTO","com":"No endosso em branco, o endossante assina o verso do título sem indicar quem receberá — o título circula ao portador. Qualquer pessoa que o possua de boa-fé pode exercer os direitos cartulares. É diferente do endosso em preto (nominativo), que indica o endossatário. O endosso em branco é comum em cheques.","fund":"LEI: 'Art. 8º. O endosso pode ser em branco, sem indicação do endossatário.' (Lei Uniforme de Genebra — Dec. 57.663/1966, relativa a letras de câmbio e notas promissórias)\nJURISPRUDÊNCIA: STJ, REsp 1.068.324/RS (3ª T., j. 01/06/2010): 'O endosso em branco transfere o título e lhe confere caráter ao portador, permitindo que qualquer possuidor de boa-fé o apresente e exija o pagamento.'","jur_status":"PENDENTE"}]},{"nome":"Conhecimentos sobre o DF, Legislação do PDPM e Primeiros Socorros","comando":"Acerca do Plano de Desenvolvimento e Proteção de Mapas do DF, noções de primeiros socorros e legislação específica do Distrito Federal, julgue os itens a seguir.","itens":[{"n":115,"enun":"Em situação de parada cardiorrespiratória (PCR), o socorrista leigo deve iniciar imediatamente as compressões torácicas, com frequência de 100 a 120 compressões por minuto e profundidade de pelo menos 5 cm em adultos.","gab":"CERTO","com":"As Diretrizes da American Heart Association (AHA) 2020 para RCP em adultos por socorrista leigo: iniciar compressões sem verificar pulso, frequência de 100-120/min, profundidade mínima de 5 cm (máximo 6 cm), permitir o retorno completo do tórax entre as compressões. A sequência CAB (Compressões, Airway, Breathing) substituiu o ABC nos protocolos atuais.","fund":"LEI: Lei 13.722/2018 — torna obrigatório o treinamento em manobras de RCP em escolas e empresas.\nPROTOCOLO: AHA Guidelines 2020 — 'Adult Basic Life Support: 100-120 compressions per minute, depth of at least 2 inches (5 cm) but no more than 2.4 inches (6 cm). Allow full chest recoil.'"},{"n":116,"enun":"A manobra de Heimlich, indicada para desobstrução de vias aéreas em caso de engasgo em adultos conscientes, consiste em compressões abdominais subdiafragmáticas repetidas para aumentar a pressão intratorácica e expelir o corpo estranho.","gab":"CERTO","com":"A manobra de Heimlich (Compressão Abdominal) é o procedimento padrão para obstrução total de vias aéreas por corpo estranho em adulto consciente. O socorrista posiciona-se atrás da vítima, coloca o punho fechado entre o umbigo e o externo, envolve com a outra mão e realiza compressões em J (para dentro e para cima). Em gestantes e obesos, compressões torácicas são preferíveis.","fund":"LEI: AHA e ILCOR 2020 Guidelines — Foreign Body Airway Obstruction (FBAO).\nPROTOCOLO: 'Para adulto consciente com obstrução total de VA: 5 golpes nas costas (interescapular) + 5 compressões abdominais (Heimlich), alternando até desobstrução ou perda de consciência.'"},{"n":117,"enun":"O Distrito Federal organiza-se em regiões administrativas criadas por lei distrital, tendo o Governador do DF competências equivalentes às do Prefeito e às do Governador de Estado, acumuladas em virtude da ausência de municípios no DF.","gab":"CERTO","com":"O DF é ente sui generis: tem competências legislativas estaduais E municipais (art. 32, §1º CF/88). Não se divide em municípios — apenas em regiões administrativas. O Governador acumula funções de Governador de Estado e Prefeito. Isso tem impacto tributário (DF cobra ISS e ICMS), legislativo (legisla sobre matérias estaduais e municipais) e administrativo.","fund":"LEI: 'Art. 32, §1º. Ao Distrito Federal são atribuídas as competências legislativas reservadas aos Estados e Municípios.' (CF/88)\n'Art. 32. O Distrito Federal, vedada sua divisão em Municípios, reger-se-á por lei orgânica, votada em dois turnos com interstício mínimo de dez dias, e aprovada por dois terços da Câmara Legislativa.' (CF/88)\nJURISPRUDÊNCIA: STF, ADI 3.756/DF (Pleno, j. 21/06/2007): 'O DF acumula competências estaduais e municipais, sendo vedada a criação de municípios em seu território.'","jur_status":"PENDENTE"},{"n":118,"enun":"A Polícia Civil do Distrito Federal é organizada e mantida pela União, ao contrário das demais polícias civis estaduais, que são mantidas pelos respectivos estados.","gab":"CERTO","com":"Por sua natureza sui generis, o DF tem tratamento diferenciado: a PC-DF e a PM-DF são organizadas e mantidas pela União (art. 21, XIV CF/88), e não pelo DF. A segurança pública do DF é responsabilidade federal — inclusive o custeio e a organização dos quadros. Isso distingue o PCDF das demais corporações estaduais.","fund":"LEI: 'Art. 21. Compete à União: XIV — organizar e manter a polícia civil, a polícia penal, a polícia militar e o corpo de bombeiros militar do Distrito Federal, bem como prestar assistência financeira ao Distrito Federal para a execução de serviços públicos, por meio de fundo próprio.' (CF/88 — com redação da EC 104/2019)\nJURISPRUDÊNCIA: STF, ADI 3.602/DF (Pleno, j. 19/03/2009): 'A PC-DF é corporação federal, organizada e custeada pela União, diferenciando-se das polícias civis estaduais que são vinculadas e custeadas pelos estados.'","jur_status":"PENDENTE"},{"n":119,"enun":"Em casos de suspeita de fratura na coluna vertebral, o socorrista deve imobilizar o pescoço da vítima com as mãos antes de qualquer movimentação e, quando possível, aguardar o suporte médico avançado, evitando retirar o capacete se a vítima estiver em capacete.","gab":"ERRADO","com":"O protocolo atual de primeiro atendimento determina que o capacete DEVE ser retirado antes de avaliar e imobilizar a vítima em parada respiratória — pois o capacete pode impedir a ventilação e o acesso às vias aéreas. A técnica exige dois socorristas. A retenção do capacete era orientação antiga; os protocolos PHTLS e AHA atual indicam sua remoção quando necessário.","fund":"LEI: PHTLS (Prehospital Trauma Life Support), 10ª ed., NAEMSP: 'O capacete deve ser removido quando comprometer a ventilação ou impedir acesso às vias aéreas, utilizando técnica de dois socorristas para manter a imobilização cervical durante a retirada.'"},{"n":120,"enun":"Brasília, capital federal do Brasil, foi inaugurada em 21 de abril de 1960 e tombada como Patrimônio Cultural da Humanidade pela UNESCO em 1987, sendo reconhecida pelo conjunto urbanístico modernista projetado por Oscar Niemeyer e Lúcio Costa.","gab":"CERTO","com":"Brasília foi construída em tempo recorde (cerca de 41 meses) e inaugurada em 21/04/1960, durante o governo Juscelino Kubitschek. O projeto urbanístico (Plano Piloto) é de Lúcio Costa e o arquitetônico de Oscar Niemeyer. A UNESCO tombou o conjunto em 1987 como Patrimônio Cultural da Humanidade, reconhecendo o modernismo brasileiro no urbanismo e arquitetura.","fund":"LEI: Lei Orgânica do DF, art. 1º — o Distrito Federal tem como capital Brasília.\nHISTÓRIA: Decreto 19.040/2019 — regulamentação da gestão do Plano Piloto de Brasília como patrimônio histórico e urbanístico.\nUNESCO: Decisão de 1987 — inscrição de Brasília na Lista do Patrimônio Mundial por sua excepcional importância urbanística e arquitetônica."}]}]};

/* ── TRAP WORDS ──────────────────────────────────────────── */
const TRAP_WORDS=[
  'tão somente','somente','apenas','unicamente','exclusivamente',
  'em qualquer hipótese','em nenhuma hipótese','em qualquer caso','em todo caso',
  'independentemente','independente de','mesmo que','ainda que',
  'obrigatoriamente','obrigatória','obrigatório','necessariamente',
  'imprescindível','indispensável','imediatamente','automaticamente',
  'de pleno direito','por si só','toda vez que','a qualquer tempo',
  'nunca','jamais','sempre','absolutamente','absoluta',
  'é vedado','são vedados','é proibido','são proibidos',
  'não pode','não podem','impossível','é impossível',

].sort((a,b)=>b.length-a.length); // longer phrases first

function _escRx(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}
function highlightTraps(html){
  // html is already HTML-escaped plain text; safe to inject <mark>
  TRAP_WORDS.forEach(w=>{
    const re=new RegExp(`(?<![\\wÀ-ÿ])(${_escRx(w)})(?![\\wÀ-ÿ])`,'gi');

function buildBlocoSummary(){
  const tot=S.flat.length;
  let ok=0,er=0,blank=0;
  S.flat.forEach(x=>{
    const r=S.respostas[x.n];
    if(r===x.item.gab) ok++;
    else if(r) er++;
    else blank++;
  });
  const disc={};
  S.bloco.disciplinas.forEach(d=>{
    let dok=0,der=0;
    d.itens.forEach(it=>{const r=S.respostas[it.n];if(r===it.gab)dok++;else if(r)der++;});
    const short=d.nome.replace('Direito ','').replace(/ e Legislação .*/,'');
    disc[short]={ok:dok,er:der,tot:d.itens.length};
  });
  const avCnt={dom:0,dvd:0,lac:0,leit:0};
  Object.values(S.avaliacoes).forEach(v=>{if(v in avCnt)avCnt[v]++;});
  return {
    blocoId:S.bloco.meta.id, data:S.bloco.meta.data||S.bloco.meta.id,
    titulo:S.bloco.meta.titulo||'',
    totalQuestoes:tot, acertos:ok, erros:er, branco:blank,
    saldo:ok-er, pct:tot>0?Math.round(ok/tot*100):0,
    tempo:S.totalMs, disciplinas:disc, avaliacoes:avCnt,
    finishedAt:Date.now()
  };
}
/* ── SM-2 SPACED REPETITION ──────────────────────────────── */
function computeSRQuality(h){
  // Mapeia desempenho do bloco para quality SM-2 (0–5)
  const pct=h.pct;
  const av=h.avaliacoes||{};
  const avTotal=(av.dom||0)+(av.dvd||0)+(av.lac||0)+(av.leit||0);
  // Base a partir do aproveitamento
  let q;
  if(pct>=90) q=5;
  else if(pct>=80) q=4;
  else if(pct>=70) q=3;
  else if(pct>=55) q=2;
  else if(pct>=40) q=1;
  else q=0;
  // Ajuste pela autoavaliação: muitas lacunas penaliza, muito domínio bonifica
  if(avTotal>0){
    const lacRatio=(av.lac||0)/avTotal;
    const domRatio=(av.dom||0)/avTotal;
    if(lacRatio>0.4 && q>1) q--;
    if(domRatio>0.6 && q<5) q++;
  }
  return Math.max(0,Math.min(5,q));
}
function applySM2(sr,quality){
  // sr = {interval, repetitions, ef} ou null (primeira vez)
  let {interval=1,repetitions=0,ef=2.5}=sr||{};
  if(quality<3){
    // Abaixo do limiar: recomeça intervalo mas mantém EF (penaliza menos)
    repetitions=0; interval=1;
  } else {
    if(repetitions===0) interval=1;
    else if(repetitions===1) interval=6;
    else interval=Math.round(interval*ef);
    ef=ef+(0.1-(5-quality)*(0.08+(5-quality)*0.02));
    ef=Math.max(1.3,Math.round(ef*100)/100);
    repetitions++;
  }
  const next=new Date();
  next.setDate(next.getDate()+interval);
  return {interval,repetitions,ef,nextReview:next.toISOString().slice(0,10)};
}
function srBadgeHtml(sr){
  if(!sr||!sr.nextReview) return '';
  const today=new Date().toISOString().slice(0,10);
  const diff=(new Date(sr.nextReview)-new Date(today))/(1000*60*60*24);
  if(diff<=0)  return `<span class="sr-badge due">⟳ Revisar hoje</span>`;
  if(diff<=2)  return `<span class="sr-badge soon">⟳ ${Math.round(diff)}d</span>`;
  return `<span class="sr-badge ok">⟳ ${fmtDateShort(sr.nextReview)}</span>`;
}

function saveToHistory(){
  try{
    let hist=loadHistory();
    const s=buildBlocoSummary();
    const idx=hist.findIndex(h=>h.blocoId===s.blocoId);
    // Preserva SR anterior (acumula repetições)
    const prevSR=idx>=0?(hist[idx].sr||null):null;
    const quality=computeSRQuality(s);
    s.sr=applySM2(prevSR,quality);
    s.srQuality=quality; // guarda para debug
    if(idx>=0) hist[idx]=s; else hist.push(s);
    if(hist.length>90) hist=hist.slice(-90);
    localStorage.setItem(HIST_KEY,JSON.stringify(hist));
  }catch(e){}
}
function loadHistory(){
  try{const r=localStorage.getItem(HIST_KEY);return r?JSON.parse(r):[]}catch(e){return [];}
}
function buildBarChart(entries){
  if(!entries.length) return '';
  const W=520,H=108,padB=17,padT=13,inner=H-padB-padT;
  const n=entries.length;
  const bW=Math.max(7,Math.min(26,Math.floor((W-16)/n)-3));
  const gap=(W-bW*n)/(n+1);
  let s=`<svg viewBox="0 0 ${W} ${H}" width="100%" xmlns="http://www.w3.org/2000/svg">`;
  // gridlines
  [50,70,90].forEach(pct=>{
    const gy=padT+Math.round((1-pct/100)*inner);
    s+=`<line x1="0" y1="${gy}" x2="${W}" y2="${gy}" stroke="var(--bord)" stroke-width="1"/>`;
    s+=`<text x="2" y="${gy-2}" font-size="7.5" fill="var(--txt3)">${pct}%</text>`;
  });
  // ref line 70%
  const ry=padT+Math.round(.3*inner);
  s+=`<line x1="0" y1="${ry}" x2="${W}" y2="${ry}" stroke="var(--green)" stroke-dasharray="4,3" opacity=".45" stroke-width="1.2"/>`;
  // bars
  entries.forEach((e,i)=>{
    const bH=Math.max(2,Math.round((e.pct/100)*inner));
    const x=gap+i*(bW+gap), y=H-padB-bH;
    const col=e.pct>=70?'var(--green)':e.pct>=50?'var(--acc)':'var(--red)';
    s+=`<rect x="${x.toFixed(1)}" y="${y}" width="${bW}" height="${bH}" rx="3" fill="${col}" opacity=".82"/>`;
    if(bH>16){s+=`<text x="${(x+bW/2).toFixed(1)}" y="${y+bH-4}" text-anchor="middle" font-size="8" fill="rgba(255,255,255,.8)" font-weight="700">${e.pct}%</text>`;}
    else{s+=`<text x="${(x+bW/2).toFixed(1)}" y="${y-2}" text-anchor="middle" font-size="7.5" fill="${col}">${e.pct}%</text>`;}
    const dl=fmtDateShort(e.data).slice(0,5);
    s+=`<text x="${(x+bW/2).toFixed(1)}" y="${H-2}" text-anchor="middle" font-size="7" fill="var(--txt3)">${dl}</text>`;
  });
  s+='</svg>';
  return s;
}

/* ── DATE FORMAT ─────────────────────────────────────────── */
function fmtDateShort(iso){
  // "2026-06-05" → "05.06.26"
  if(!iso) return '';
  const p=iso.split('-');
  if(p.length<3) return iso;
  return `${p[2]}.${p[1]}.${p[0].slice(2)}`;
}

/* ── TIMER ───────────────────────────────────────────────── */
function fmtTime(ms){
  const s=Math.floor(ms/1000), m=Math.floor(s/60), h=Math.floor(m/60);
  if(h>0) return `${h}h ${(m%60).toString().padStart(2,'0')}m`;
  return `${m}:${(s%60).toString().padStart(2,'0')}`;
}
function startTimer(){
  if(S.timerInterval) return;
  S.startedAt=Date.now();
  S.timerInterval=setInterval(()=>{
    const elapsed=S.totalMs+(Date.now()-S.startedAt);
    const el=document.getElementById('hdr-timer-txt');
    if(el) el.textContent=fmtTime(elapsed);
    const bpel=document.getElementById('bp-time');
    if(bpel) bpel.textContent=fmtTime(elapsed);
  },1000);
}
function stopTimer(){
  if(S.timerInterval){clearInterval(S.timerInterval);S.timerInterval=null;}
  if(S.startedAt){S.totalMs+=Date.now()-S.startedAt;S.startedAt=null;}
}

function togglePause(){
  if(S.finished) return;
  S.paused=!S.paused;
  const btn=document.getElementById('btn-pause');
  const overlay=document.getElementById('pause-overlay');
  if(S.paused){
    // Pausa: para timers, bloqueia tela
    stopTimer();
    if(QT.tickInterval){clearInterval(QT.tickInterval);QT.tickInterval=null;}
    if(QT.observer){QT.observer.disconnect();QT.observer=null;}
    QT.visible.clear();
    overlay.classList.remove('hidden');
    btn.textContent='▶';
    btn.classList.add('paused');
    btn.title='Retomar';
  } else {
    // Retoma: esconde overlay, reinicia timers
    overlay.classList.add('hidden');
    btn.textContent='⏸';
    btn.classList.remove('paused');
    btn.title='Pausar';
    // Reinicia apenas se estiver na prova ou no foco
    const inProva=!document.getElementById('sec-prova').classList.contains('hidden');
    const inFoco=FOCO.active;
    if(inProva||inFoco){
      startTimer();
      if(!QT.tickInterval&&!FOCO.active){
        // re-inicia observer e tick na prova normal
        initQTimer();
      } else if(FOCO.active){
        // no foco apenas o tick
        QT.lastTickAt=Date.now();
        QT.tickInterval=setInterval(_qtTick,500);
      }
    }
  }
}

          <span class="gab-icon">💡</span>
          <span class="gab-lbl">Explicação (Feynman)</span>
          <span class="gab-chev open" id="chev-${it.n}-f">▼</span>
        </button>
        <div class="gab-body" id="gb-${it.n}-f"><div class="feynman-text">${it.com||''}</div></div>
      </div>
      <div class="gab-section">
        <button class="gab-hdr" onclick="toggleGabSec(${it.n},'l')">
          <span class="gab-icon">📖</span>
          <span class="gab-lbl">Lei &amp; Jurisprudência</span>
          <span class="gab-chev open" id="chev-${it.n}-l">▼</span>
        </button>
        <div class="gab-body" id="gb-${it.n}-l">
          <div class="law-block">${fundSafe}</div>
          <button class="copy-btn" onclick="copyFund(this,'${fundCopy}')">📋 Copiar lei &amp; jurisprudência</button>
        </div>
      </div>
      ${it.peg?`<div class="gab-section" style="border-top:1px solid var(--bord)">
        <div style="padding:10px 14px"><div class="peg-box">⚠️ &nbsp;<span><strong>Armadilha:</strong> ${it.peg}</span></div></div>
      </div>`:''}
    </div>`;
  }

  return `<div class="q-block${gabOn?' gab-on':''}" id="q-${it.n}" data-n="${it.n}">
    <div class="q-line">
      <span class="q-tag">${it.n}</span>
      <div class="q-text">${enunHtml}</div>
      <div class="q-marks">
        <button class="q-mark${markC}" onclick="markAns(${it.n},'CERTO')" ${disab} title="Certo (C)">C</button>
        <button class="q-mark${markE}" onclick="markAns(${it.n},'ERRADO')" ${disab} title="Errado (E)">E</button>
      </div>
    </div>
    <div class="q-actions-row">
      <button class="q-show-gab" onclick="toggleGab(${it.n})">${gabOn?'Ocultar gabarito':'Ver gabarito'}</button>
      ${statusHtml}
      <span class="qt-badge qt-idle" id="qt-${it.n}">⏱</span>
    </div>
    ${feedbackHtml}
  </div>`;
}

function rerenderQ(n){
  const el=document.getElementById(`q-${n}`);
  if(!el) return;
  const di=S.flat.find(x=>x.n===n)?.discIdx||0;
  el.outerHTML=renderQBlock(S.flat.find(x=>x.n===n).item, di);
}

/* ── ACTIONS ─────────────────────────────────────────────── */
function markAns(n,val){
  if(S.finished) return;
  if(S.respostas[n]===val) delete S.respostas[n];
  else {
    S.respostas[n]=val;
    // Modo Foco: exibe gabarito automaticamente após responder
    if(typeof FOCO!=='undefined' && FOCO.active && !S.gabsShown[n]) S.gabsShown[n]=true;
  }
  save(); rerenderQ(n); updateProgress(); updateQuickNav();
  setTimeout(()=>_qtUpdateBadge(n),0);
}

function toggleGab(n){
  if(S.gabsShown[n]) delete S.gabsShown[n];
  else S.gabsShown[n]=true;
  save(); rerenderQ(n); updateQuickNav();
}

function toggleGabSec(n,key){
  const body=document.getElementById(`gb-${n}-${key}`);
  const chev=document.getElementById(`chev-${n}-${key}`);
  if(!body) return;
  const open=!body.classList.contains('hidden');
  body.classList.toggle('hidden',open);
  if(chev) chev.classList.toggle('open',!open);
}

function toggleAllGabaritos(){
  S.globalGabShown=!S.globalGabShown;
  if(S.globalGabShown) S.gabsShown={};
  save();
  renderProva(); // full re-render
  updateGabAllBtn();
}
function updateGabAllBtn(){
  const b=document.getElementById('btn-gab-all');
  const t=document.getElementById('tb-gab-all');
  const lbl=S.globalGabShown?'🙈':'👁';
  if(b) b.textContent=lbl;
  if(t) t.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="3"/><path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7-10-7-10-7z"/></svg> ${S.globalGabShown?'Ocultar gabaritos':'Gabaritos'}`;
}

/* ── QUICK NAV ───────────────────────────────────────────── */
function renderQuickNav(){
  const grid=document.getElementById('qn-grid');
  if(!grid) return;
  grid.innerHTML=S.flat.map(x=>{
    const a=S.respostas[x.n];
    const g=S.gabsShown[x.n]||S.globalGabShown;
    let cls=a==='CERTO'?'ac':a==='ERRADO'?'ae':'';
    if(g) cls+=' gs';
    // qa: não respondida e acima do limiar de alerta
    if(!a && (QT.times[x.n]||0)>=QT.ALERT) cls+=' qa';
    return `<button class="qn-btn ${cls}" onclick="jumpTo(${x.n})" title="Q.${x.n}${!a&&(QT.times[x.n]||0)>=QT.ALERT?' · ⏱ '+_fmtQT(QT.times[x.n]):''}">${x.n}</button>`;
  }).join('');
}
function updateQuickNav(){ renderQuickNav(); }
function jumpTo(n){
  document.getElementById('quick-nav').classList.remove('open');
  const el=document.getElementById(`q-${n}`);
  if(el) el.scrollIntoView({behavior:'smooth',block:'center'});
}

/* ── PROGRESS ─────────────────────────────────────────────── */
function updateProgress(){
  const tot=S.flat.length;
  let ok=0,er=0,ans=0;
  S.flat.forEach(x=>{
    const r=S.respostas[x.n];
    if(r===x.item.gab) ok++;
    else if(r) er++;
    if(r) ans++;
  });
  const pct=tot?Math.round(ans/tot*100):0;
  const blank=tot-ans;

  // Header
  document.getElementById('c-ok').textContent='✓ '+ok;
  document.getElementById('c-er').textContent='✗ '+er;
  document.getElementById('c-tot').textContent=ans+'/'+tot;
  document.getElementById('prog-fill').style.width=pct+'%';
  // Toolbar
  const tbans=document.getElementById('tb-ans');
  const tbblank=document.getElementById('tb-blank');
  if(tbans) tbans.textContent=ans;
  if(tbblank) tbblank.textContent=blank;
  // Bottom bar
  const bpok=document.getElementById('bp-ok');
  const bper=document.getElementById('bp-er');
  const bpcur=document.getElementById('bp-cur');
  const bptot=document.getElementById('bp-tot');
  const bbar=document.getElementById('bbar-fill');
  if(bpok) bpok.textContent=ok+' ✓';
  if(bper) bper.textContent=er+' ✗';
  if(bpcur) bpcur.textContent=ans;
  if(bptot) bptot.textContent=tot;
  if(bbar) bbar.style.width=pct+'%';
}

/* ── FINISH ──────────────────────────────────────────────── */
function confirmFinish(){
  const blank=S.flat.filter(x=>!S.respostas[x.n]).length;
  if(blank===0){finishProva();return;}
  const el=document.getElementById('modal-root');
  el.innerHTML=`<div class="modal-ov" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <h3>⚠️ Questões em branco</h3>
      <p>Você tem <strong>${blank} questão(ões) em branco</strong>.<br><br>
      Pela fórmula CEBRASPE, itens em branco valem 0 pontos — ao contrário dos errados (−1). Recomenda-se responder todas as questões.</p>
      <div class="modal-acts">
        <button class="btn-ghost" onclick="closeModal()">Voltar e responder</button>
        <button class="btn-warn" onclick="closeModal();finishProva()">Encerrar mesmo assim</button>
      </div>
    </div>
  </div>`;
}
function finishProva(){
  stopTimer(); stopQTimer(); S.finished=true; S.globalGabShown=true; save();
  saveToHistory(); // persiste no histórico cross-bloco
  renderPlacar();
}
function goBackToProva(jumpN){
  S.finished=false; save();
  renderProva();
  if(jumpN) setTimeout(()=>jumpTo(jumpN),300);
}

/* ── MODO FOCO ────────────────────────────────────────────── */
const FOCO={active:false, idx:0, currentN:null};

function enterFoco(startIdx){
  if(!S.bloco){showToast('Carregue um bloco primeiro');return;}
  if(S.finished){showToast('Bloco já encerrado — use a Revisão');return;}
  // Desconecta apenas o observer (para de acumular tempo via scroll),
  // mas mantém QT.tickInterval ativo para continuar contando tempo em Foco
  if(QT.observer){QT.observer.disconnect();QT.observer=null;}
  QT.visible.clear();
  if(!QT.tickInterval){QT.lastTickAt=Date.now();QT.tickInterval=setInterval(_qtTick,500);}
  FOCO.active=true;
  if(startIdx!==undefined){
    FOCO.idx=Math.max(0,Math.min(startIdx,S.flat.length-1));
  } else {
    // começa na primeira não respondida
    const first=S.flat.findIndex(x=>!S.respostas[x.n]);
    FOCO.idx=first>=0?first:0;
  }
  // oculta tudo, exibe foco
  document.getElementById('sec-prova').classList.add('hidden');
  document.getElementById('sec-placar').classList.add('hidden');
  document.getElementById('sec-historico').classList.add('hidden');
  document.getElementById('sec-revisao').classList.add('hidden');
  document.getElementById('sec-cover').innerHTML='';
  document.getElementById('fab').classList.add('hidden');
  document.getElementById('bot-bar').classList.add('hidden');
  document.getElementById('btn-gab-all').classList.add('hidden');
  document.getElementById('hdr-timer').classList.remove('hidden');
  document.getElementById('hdr-chips').style.display='flex';
  document.getElementById('sec-foco').classList.remove('hidden');
  renderFocoQ();
}

function exitFoco(){
  FOCO.active=false; FOCO.currentN=null;
  document.getElementById('sec-foco').classList.add('hidden');
  renderProva(); // reinicia QT via renderProva → initQTimer
}

function renderFocoQ(){
  const x=S.flat[FOCO.idx];
  if(!x) return;
  const it=x.item;
  FOCO.currentN=it.n;

  const total=S.flat.length;
  const answered=Object.keys(S.respostas).length;
  const pct=Math.round(answered/total*100);
  const discShort=x.discNome.replace('Direito ','').replace(/ e Legislação .*/,'');
  const isFirst=FOCO.idx===0;
  const isLast=FOCO.idx===total-1;
  const hasAns=!!S.respostas[it.n];

  const wrap=document.getElementById('foco-wrap');
  wrap.innerHTML=`
    <div class="foco-hdr">
      <button class="tb-btn" onclick="exitFoco()" title="Sair do Modo Foco (Esc)">✕ Sair</button>
      <span class="foco-qnum">Q.${it.n} · ${FOCO.idx+1}/${total}</span>
      <span class="foco-disc">${discShort}</span>
      <div class="foco-prog-wrap">
        <div class="foco-progress"><div class="foco-prog-fill" id="foco-pf" style="width:${pct}%"></div></div>
        <span class="foco-pct">${pct}%</span>
      </div>
    </div>
    <div class="foco-body">
      ${renderQBlock(it, x.discIdx)}
    </div>
    <div class="foco-nav">
      <button class="btn-ghost" onclick="focoPrev()" ${isFirst?'disabled':''} style="min-width:110px" title="← Seta esquerda">← Anterior</button>
      <div class="foco-nav-hint">
        <div>${answered}/${total} respondidas</div>
        <div style="color:var(--txt3)">${hasAns?'→ Enter para avançar':'C / E para responder'}</div>
      </div>
      <button class="btn-${hasAns?'primary':'ghost'}" onclick="focoNext()" ${isLast?'disabled':''} style="min-width:110px" title="→ Seta direita / Enter">
        ${isLast?'Última':'Próxima →'}
      </button>
    </div>`;

  document.getElementById('sec-foco').scrollTop=0;
  // QT: acumula tempo manualmente no tick
}

function focoNext(){
  if(FOCO.idx<S.flat.length-1){FOCO.idx++;renderFocoQ();}
  else showToast('Última questão do bloco');
}
function focoPrev(){
  if(FOCO.idx>0){FOCO.idx--;renderFocoQ();}
}

// Jump para questão específica (usado futuramente por quick-nav em foco)
function focoJumpTo(n){
  const idx=S.flat.findIndex(x=>x.n===n);
  if(idx>=0){FOCO.idx=idx;renderFocoQ();}
}

/* ── QUESTION TIMER ──────────────────────────────────────── */
const QT={
  times:{},         // {n: elapsedMs}
  visible:new Set(),
  lastTickAt:null,
  tickInterval:null,
  observer:null,
  WARN:60000,       // 60s → amber
  ALERT:90000,      // 90s → red + pulse
};

function initQTimer(){
  stopQTimer();
  QT.times={}; QT.visible=new Set(); QT.lastTickAt=Date.now();

  QT.observer=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      const n=parseInt(e.target.dataset.n);
      if(e.isIntersecting) QT.visible.add(n);
      else QT.visible.delete(n);
    });
  },{rootMargin:'-28% 0px -28% 0px',threshold:0});

  document.querySelectorAll('.q-block[data-n]').forEach(el=>QT.observer.observe(el));
  QT.tickInterval=setInterval(_qtTick,500);
}

function stopQTimer(){
  if(QT.tickInterval){clearInterval(QT.tickInterval);QT.tickInterval=null;}
  if(QT.observer){QT.observer.disconnect();QT.observer=null;}
  QT.visible.clear(); QT.lastTickAt=null;
  const pill=document.getElementById('qt-pill');
  if(pill) pill.classList.add('hidden');
}

function _qtTick(){
  const now=Date.now();
  const delta=QT.lastTickAt?now-QT.lastTickAt:0;
  QT.lastTickAt=now;

  let pillN=null, pillMs=0;
  let crossedAlert=false;
  QT.visible.forEach(n=>{
    if(!S.respostas[n]){
      const prevMs=QT.times[n]||0;
      QT.times[n]=prevMs+delta;
      if(QT.times[n]>pillMs){pillMs=QT.times[n];pillN=n;}
      // detecta cruzamento do limiar para atualizar quick nav
      if(prevMs<QT.ALERT && QT.times[n]>=QT.ALERT) crossedAlert=true;
    }
    _qtUpdateBadge(n);
  });
  _qtUpdatePill(pillN,pillMs);
  if(crossedAlert) renderQuickNav();

  // Modo Foco: acumula tempo para a questão visível manualmente
  if(FOCO.active && FOCO.currentN && !S.respostas[FOCO.currentN]){
    QT.times[FOCO.currentN]=(QT.times[FOCO.currentN]||0)+delta;
    _qtUpdateBadge(FOCO.currentN);
    // atualiza % no header do foco
    const pf=document.getElementById('foco-pf');
    if(pf){const t=S.flat.length;const a=Object.keys(S.respostas).length;pf.style.width=Math.round(a/t*100)+'%';}
    const fpct=document.querySelector('.foco-pct');
    if(fpct){const t=S.flat.length;const a=Object.keys(S.respostas).length;fpct.textContent=Math.round(a/t*100)+'%';}
  }
}

function _qtUpdateBadge(n){
  const el=document.getElementById(`qt-${n}`);
  if(!el) return;
  const ms=QT.times[n]||0;
  const answered=!!S.respostas[n];
  if(answered){
    el.className='qt-badge qt-done';
    el.textContent=ms>0?`⏱ ${_fmtQT(ms)}`:'⏱';
    return;
  }
  if(ms<1000){el.className='qt-badge qt-idle';el.textContent='⏱';return;}
  if(ms>=QT.ALERT){el.className='qt-badge qt-alert';el.textContent=`⏱ ${_fmtQT(ms)}`;}
  else if(ms>=QT.WARN){el.className='qt-badge qt-warn';el.textContent=`⏱ ${_fmtQT(ms)}`;}
  else{el.className='qt-badge qt-normal';el.textContent=`⏱ ${_fmtQT(ms)}`;}
}

function _qtUpdatePill(n,ms){
  const pill=document.getElementById('qt-pill');
  if(!pill) return;
  if(!n||ms<8000){pill.classList.add('hidden');return;}
  pill.classList.remove('hidden');
  const inner=pill.querySelector('.qt-active-pill');
  if(!inner) return;
  const cls='qt-active-pill'+(ms>=QT.ALERT?' qt-alert-p':ms>=QT.WARN?' qt-warn-p':'');
  inner.className=cls;
  const icon=ms>=QT.ALERT?'⚠️':ms>=QT.WARN?'⏳':'⏱';
  inner.innerHTML=`${icon} Q.${n} — <span style="font-variant-numeric:tabular-nums">${_fmtQT(ms)}</span>`;
}

function _fmtQT(ms){
  const s=Math.floor(ms/1000);
  return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
}

/* ── PLACAR ──────────────────────────────────────────────── */
function renderPlacar(){
  stopQTimer(); // para timers por questão
  document.getElementById('sec-prova').classList.add('hidden');
  document.getElementById('sec-cover').innerHTML='';
  document.getElementById('sec-placar').classList.remove('hidden');
  document.getElementById('fab').classList.add('hidden');
  document.getElementById('bot-bar').classList.add('hidden');
  document.getElementById('hdr-timer').classList.remove('hidden');
  document.getElementById('hdr-chips').style.display='flex';
  document.getElementById('btn-gab-all').classList.add('hidden');

  const tot=S.flat.length;
  let ok=0,er=0,blank=0;
  S.flat.forEach(x=>{
    const r=S.respostas[x.n];
    if(r===x.item.gab) ok++;
    else if(r) er++;
    else blank++;
  });
  const saldo=ok-er;
  const pct=tot?Math.round(ok/tot*100):0;
  const totalElapsed=S.totalMs;
  const avgMs=ok+er>0?Math.round(totalElapsed/(ok+er)):0;
  const corte=Math.ceil(tot*0.6); // referência 60%
  const approved=saldo>=corte;

  // Disc stats
  const discStats=S.bloco.disciplinas.map(d=>{
    let dok=0,der=0,dtot=d.itens.length;
    d.itens.forEach(it=>{
      const r=S.respostas[it.n];
      if(r===it.gab) dok++;
      else if(r) der++;
    });
    const dpct=dok+der>0?Math.round(dok/(dok+der)*100):null;
    const barColor=dpct===null?'var(--txt3)':dpct>=70?'var(--green)':dpct>=50?'var(--acc)':'var(--red)';
    const short=d.nome.replace('Direito ','').replace(' e Legislação Especial','').replace(' e Legislação Complementar','');
    return {short,ok:dok,er:der,tot:dtot,pct:dpct,barColor};
  });

  const discChartHtml=discStats.map(d=>
    `<div class="disc-chart-row">
      <span class="nm">${d.short}</span>
      <div class="bar-rail"><div class="bar-fill" style="width:${d.pct||0}%;background:${d.barColor}"></div></div>
      <span class="frac">${d.ok}/${d.tot}</span>
      <span class="pct" style="color:${d.barColor}">${d.pct!==null?d.pct+'%':'—'}</span>
    </div>`
  ).join('');

  // Errors list
  const errors=S.flat.filter(x=>S.respostas[x.n]&&S.respostas[x.n]!==x.item.gab);
  function buildErrGab(it){
    const fundSafe=it.fund?it.fund.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):'';
    const fundCopy=it.fund?(it.fund.replace(/\\/g,'\\\\').replace(/"/g,'&quot;').replace(/'/g,"\\'").replace(/\n/g,'\\n')):'';
    return `<div class="gab-line">
        <span class="gab-label">Gabarito</span>
        <span class="gab-value" style="margin-left:6px;font-weight:700">${it.gab}</span>
        <span class="gab-badge er" style="margin-left:auto">Errou ✗</span>
      </div>
      <div class="gab-section">
        <button class="gab-hdr" onclick="toggleErrSec(${it.n},'f')">
          <span class="gab-icon">💡</span>
          <span class="gab-lbl">Explicação (Feynman)</span>
          <span class="gab-chev open" id="echev-${it.n}-f">▼</span>
        </button>
        <div class="gab-body" id="egb-${it.n}-f"><div class="feynman-text">${it.com||''}</div></div>
      </div>
      ${it.fund?`<div class="gab-section">
        <button class="gab-hdr" onclick="toggleErrSec(${it.n},'l')">
          <span class="gab-icon">📖</span>
          <span class="gab-lbl">Lei &amp; Jurisprudência</span>
          <span class="gab-chev open" id="echev-${it.n}-l">▼</span>
        </button>
        <div class="gab-body" id="egb-${it.n}-l">
          <div class="law-block">${fundSafe}</div>
          <button class="copy-btn" onclick="copyFund(this,'${fundCopy}')">📋 Copiar lei &amp; jurisprudência</button>
        </div>
      </div>`:''}
      ${it.peg?`<div class="gab-section" style="border-top:1px solid var(--bord)">
        <div style="padding:10px 14px"><div class="peg-box">⚠️ &nbsp;<span><strong>Armadilha:</strong> ${it.peg}</span></div></div>
      </div>`:''}`;
  }
  const errHtml=errors.length===0
    ?'<p style="color:var(--txt3);font-size:14px">Nenhum erro. Excelente! 🎯</p>'
    :errors.map(x=>{
      const enunShort=x.item.enun.length>90?x.item.enun.slice(0,90)+'…':x.item.enun;
      return `<div class="err-item">
        <div class="err-row">
          <span class="err-num">Q${x.n}</span>
          <div class="err-sub">${enunShort}<small>${x.discNome}</small></div>
          <button class="err-toggle" id="errtog-${x.n}" onclick="toggleErrGab(${x.n})">
            Ver gabarito <span id="errarrow-${x.n}">▼</span>
          </button>
        </div>
        <div class="err-gab" id="errgab-${x.n}">
          ${buildErrGab(x.item)}
        </div>
      </div>`;
    }).join('');

  const wrap=document.getElementById('placar-wrap');
  wrap.innerHTML=`
    <div class="placar-hero">
      <div class="placar-kicker">Resultado Final</div>
      <h2>${pct}% de aproveitamento</h2>
      <p class="placar-lead">Tempo total: ${fmtTime(totalElapsed)} · ${avgMs?'média '+fmtTime(avgMs)+'/questão':''}</p>
      <div class="placar-stats">
        <div class="p-stat"><div class="n g">${ok}</div><div class="l">Acertos</div></div>
        <div class="p-stat"><div class="n r">${er}</div><div class="l">Erros</div></div>
        <div class="p-stat"><div class="n t">${blank}</div><div class="l">Em branco</div></div>
        <div class="p-stat"><div class="n a">${saldo}</div><div class="l">Saldo CEBRASPE</div></div>
      </div>
    </div>

    <div class="pl-box">
      <div class="pl-title">Fórmula CEBRASPE</div>
      <div class="cebraspe-formula">
        <span class="part"><b>${ok}</b> acertos × (+1)</span>
        <span>−</span>
        <span class="part"><b>${er}</b> erros × (−1)</span>
        <span>+</span>
        <span class="part"><b>${blank}</b> em branco × (0)</span>
        <span>=</span>
        <span class="eq">${saldo}</span>
      </div>
      <div class="cebraspe-verdict ${approved?'approved':'reproved'}">
        ${approved?'✅ Simulação: aprovado no corte de referência (saldo ≥ '+corte+')':'❌ Simulação: abaixo do corte de referência (saldo '+saldo+' < '+corte+')'}
      </div>
    </div>

    <div class="pl-box">
      <div class="pl-title">Diagnóstico de Desempenho</div>
      ${(()=>{
        const cnt={dom:0,dvd:0,lac:0,leit:0};
        let total=0;
        S.flat.forEach(x=>{const av=S.avaliacoes[x.n];if(av&&cnt[av]!==undefined){cnt[av]++;total++;}});
        if(total===0) return `<p class="diag-empty">Nenhuma autoavaliação preenchida ainda. Responda as questões e classifique seu desempenho ao ver o gabarito.</p>`;
        const cells=Object.entries(AV_LABELS).map(([k,v])=>`
          <div class="diag-cell">
            <div class="dn" style="color:${k==='dom'?'var(--green)':k==='dvd'?'var(--amber)':k==='lac'?'var(--red)':'var(--txt2)'}">${cnt[k]}</div>
            <div class="dl">${v.icon} ${v.txt}</div>
          </div>`).join('');
        const insight=(()=>{
          if(cnt.lac>0) return `⚠️ ${cnt.lac} lacuna${cnt.lac>1?'s conceituais':' conceitual'} identificada${cnt.lac>1?'s':''} — priorize revisão de lei seca e doutrina.`;
          if(cnt.dvd>0) return `🤔 ${cnt.dvd} questão${cnt.dvd>1?'ões':''} com dúvida — consolide a certeza antes da prova.`;
          if(cnt.leit>0) return `👁 ${cnt.leit} erro${cnt.leit>1?'s':''} de leitura — treine a leitura lenta e marcação de palavras-chave.`;
          return `✅ ${total} questão${total>1?'ões':''} com domínio total avaliado.`;
        })();
        return `<div class="diag-grid">${cells}</div>
          <div style="font-size:13.5px;color:var(--txt2);padding:10px 14px;background:var(--surf2);border-radius:var(--r-sm);border:1px solid var(--bord)">${insight}</div>`;
      })()}
    </div>

    <div class="pl-box">
      <div class="pl-title">Desempenho por Disciplina</div>
      ${discChartHtml}
    </div>

    ${(()=>{
      // QT timing insight — questões mais lentas
      const qtEntries=Object.entries(QT.times)
        .map(([n,ms])=>({n:parseInt(n),ms,answered:!!S.respostas[parseInt(n)],item:S.flat.find(x=>x.n===parseInt(n))?.item}))
        .filter(e=>e.ms>=QT.ALERT && e.item)
        .sort((a,b)=>b.ms-a.ms)
        .slice(0,5);
      if(!qtEntries.length) return '';
      const rows=qtEntries.map(e=>{
        const r=S.respostas[e.n];
        const isRight=r&&r===e.item.gab;
        const statusCls=r?(isRight?'ok':'er'):'bk';
        const statusTxt=r?(isRight?'✓ Acertou':'✗ Errou'):'Não respondida';
        return `<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-top:1px solid var(--bord)">
          <span class="q-tag" style="min-width:36px">${e.n}</span>
          <span class="qt-badge ${r?'qt-done':'qt-alert'}">⏱ ${_fmtQT(e.ms)}</span>
          <span style="flex:1;font-size:12.5px;color:var(--txt2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e.item.enun.replace(/<[^>]+>/g,' ').trim().slice(0,90)}…</span>
          <span style="font-size:11px;font-weight:700;color:${statusCls==='ok'?'var(--green)':statusCls==='er'?'var(--red)':'var(--txt3)'}">${statusTxt}</span>
        </div>`;
      }).join('');
      return `<div class="pl-box">
        <div class="pl-title">⏱ Questões com mais de 1:30 de atenção (${qtEntries.length})</div>
        <p style="font-size:13px;color:var(--txt2);margin-bottom:8px">Questões onde você passou mais tempo — foque nesses pontos na revisão.</p>
        ${rows}
      </div>`;
    })()}

    <div class="pl-box">
      <div class="pl-title">Lista de Erros (${errors.length})</div>
      ${errHtml}
    </div>

    <div class="placar-actions">
      <button class="btn-ghost" onclick="goBackToProva()">← Revisar caderno</button>
      <button class="btn-ghost" onclick="showHistorico()">📊 Histórico</button>
      <button class="btn-ghost" onclick="showRevisaoPicker()">🔍 Revisão</button>
      <button class="btn-ghost" onclick="exportPDF()">⬆ Exportar PDF</button>
      <button class="btn-primary" onclick="confirmStart()">↺ Novo bloco</button>
    </div>`;

  updateProgress();
  window.scrollTo(0,0);
}

/* ── EXPORTAR PDF ────────────────────────────────────────── */
function exportPDF(){
  if(!S.bloco||!S.finished){showToast('Finalize o bloco antes de exportar');return;}
  const w=window.open('','_blank','width=960,height=800');
  if(!w){showToast('Permita pop-ups para exportar o PDF');return;}
  w.document.write(buildReportHTML());
  w.document.close();
}

function buildReportHTML(){
  const tot=S.flat.length;
  let ok=0,er=0,blank=0;
  S.flat.forEach(x=>{
    const r=S.respostas[x.n];
    if(r===x.item.gab) ok++;
    else if(r) er++;
    else blank++;
  });
  const pct=tot>0?Math.round(ok/tot*100):0;
  const saldo=ok-er;
  const totalMs=S.totalMs+(S.startedAt?Date.now()-S.startedAt:0);

  // Discipline rows
  const discRowsHtml=S.bloco.disciplinas.map(d=>{
    let dok=0,der=0;
    d.itens.forEach(it=>{const r=S.respostas[it.n];if(r===it.gab)dok++;else if(r)der++;});
    const dtot=d.itens.length;
    const dpct=dok+der>0?Math.round(dok/(dok+der)*100):null;
    const dsal=dok-der;
    const col=dpct===null?'#888':dpct>=70?'#1a7a3a':dpct>=50?'#b87400':'#c0392b';
    // Mini bar inline SVG
    const bw=dpct!==null?dpct:0;
    const bar=`<div style="display:flex;align-items:center;gap:8px">
      <div style="flex:1;height:6px;background:#eee;border-radius:3px;overflow:hidden">

      </div>
      <span style="font-weight:700;color:${col};min-width:36px;text-align:right">${dpct!==null?dpct+'%':'—'}</span>

    return `<tr>

  // Autoavaliação
  const avCnt={dom:0,dvd:0,lac:0,leit:0};

      const enun=x.item.enun.replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim();
      return `<div style="margin-bottom:14px;padding:12px 14px;border:1px solid #e0e0e0;border-radius:6px;border-left:4px solid #c0392b;page-break-inside:avoid">

    .metric .num{font-size:30px;font-weight:900;font-style:italic;line-height:1}

    .ng{color:#1a7a3a}.nr{color:#c0392b}.na{color:#b87400}.nt{color:#1a1a2e}

/* ── REVISÃO PICKER ──────────────────────────────────────── */

  stopQTimer(); _hideAllSections();
  document.getElementById('sec-revisao').classList.remove('hidden');
  document.getElementById('fab').classList.add('hidden');
  document.getElementById('bot-bar').classList.add('hidden');
  document.getElementById('hdr-timer').classList.add('hidden');
  document.getElementById('hdr-chips').style.display='none';
  document.getElementById('btn-gab-all').classList.add('hidden');

  // Reset picker state
  RPS.filterType=null; RPS.discNome=null; RPS.mode='releitura';

  const filters=[
    {type:'erros',      icon:'✗', cls:'cr', label:'Erros'},
    {type:'branco',     icon:'○', cls:'ct', label:'Em branco'},
    {type:'lac',        icon:'📖', cls:'cr', label:'Lacunas conceituais'},
    {type:'dvd',        icon:'🤔', cls:'ca', label:'Acertei com dúvida'},

  const cards=filters.map(f=>{
    const n=computeFilteredNs(f.type,null).length;

      <span class="fc-icon">${f.icon}</span>
      <span class="fc-count ${f.cls}">${n}</span>
      <span class="fc-label">${f.label}</span>
    </button>`;
  }).join('');

  const discBtns=S.bloco.disciplinas.map(d=>{
    const short=d.nome.replace('Direito ','').replace(/ e Legislação .*/,'');
    const n=computeFilteredNs('disc',d.nome).length;
    return `<button class="disc-btn" id="dc-${short}" onclick="pickRevFilter('disc','${d.nome}',this)" ${n===0?'disabled':''}>
      ${short} <span style="font-size:11px;color:var(--txt3)">(${n})</span>
    </button>`;
  }).join('');

  const wrap=document.getElementById('rev-wrap');
  wrap.innerHTML=`<div class="rev-picker">
    <div class="cover-kicker">Δ Modo Revisão</div>
    <h2>O que revisar?</h2>
    <p class="sub">Selecione o conjunto e o modo de revisão. O desempenho da revisão é calculado separadamente.</p>

    <div class="filter-sec-lbl">Por tipo</div>
    <div class="filter-grid">${cards}</div>

    <div class="filter-sec-lbl">Por disciplina completa</div>
    <div class="disc-filter-row">${discBtns}</div>

    <div class="filter-sec-lbl">Modo</div>
    <div class="mode-box">
      <div class="mode-tabs">
        <button class="mode-tab active" id="rev-mt-r" onclick="pickRevMode('releitura')">📖 Releitura</button>
        <button class="mode-tab" id="rev-mt-t" onclick="pickRevMode('retestar')">🎯 Retestar</button>

    <button class="btn-ghost" style="margin-top:10px;width:100%" onclick="closeRevisao()">← Voltar</button>
  </div>`;
  window.scrollTo(0,0);
