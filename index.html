<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PCDF · Delegado 2026</title>
<!-- PWA -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0a0b14">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PCDF">
<link rel="apple-touch-icon" href="/icons/icon-180.png">
<link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png">
<link rel="apple-touch-icon" sizes="167x167" href="/icons/icon-167.png">
<link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180.png">
<link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png">
<style>
/* ── TOKENS ──────────────────────────────────────────────── */
:root{
  --bg:#0a0b0e; --surf:#12141a; --surf2:#181b24; --surf3:#1e2230;
  --bord:#252a3a; --bord2:#2e3448;
  --txt:#e4e8f4; --txt2:#7a8399; --txt3:#3d4562;
  --acc:#e8a020; --acc-dim:rgba(232,160,32,.13); --acc-glow:rgba(232,160,32,.28); --acc-bord:rgba(232,160,32,.32); --acc-bg:#1c1206;
  --green:#28c76f; --green-bg:rgba(40,199,111,.1); --green-bord:rgba(40,199,111,.3);
  --red:#f05252; --red-bg:rgba(240,82,82,.1); --red-bord:rgba(240,82,82,.3);
  --amber:#f59e0b; --amber-bg:rgba(245,158,11,.1); --amber-bord:rgba(245,158,11,.3);
  --mono:"SF Mono","Fira Code",monospace;
  --r:12px; --r-sm:8px; --r-xs:5px;
  --trans:140ms cubic-bezier(.4,0,.2,1);
  --shadow:0 2px 14px rgba(0,0,0,.5); --shadow-lg:0 4px 28px rgba(0,0,0,.65);
}
[data-theme=light]{
  --bg:#f1f3f8; --surf:#fff; --surf2:#f5f7fc; --surf3:#eef0f8;
  --bord:#dde2ef; --bord2:#cdd3e6;
  --txt:#0e1121; --txt2:#5a6380; --txt3:#9ea8c0;
  --acc:#c47c0a; --acc-dim:rgba(196,124,10,.08); --acc-glow:rgba(196,124,10,.2); --acc-bord:rgba(196,124,10,.28); --acc-bg:#fdf6e8;
  --green:#16a34a; --green-bg:rgba(22,163,74,.08); --green-bord:rgba(22,163,74,.28);
  --red:#dc2626; --red-bg:rgba(220,38,38,.08); --red-bord:rgba(220,38,38,.28);
  --amber:#d97706; --amber-bg:rgba(217,119,6,.08); --amber-bord:rgba(217,119,6,.28);
  --shadow:0 2px 8px rgba(0,0,0,.1); --shadow-lg:0 4px 16px rgba(0,0,0,.15);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;font-size:15px;line-height:1.6;transition:background var(--trans),color var(--trans)}
button{font-family:inherit;cursor:pointer}

/* ── HEADER ──────────────────────────────────────────────── */
.hdr{position:sticky;top:0;z-index:100;background:var(--surf);border-bottom:1px solid var(--bord);box-shadow:var(--shadow)}
.hdr-inner{max-width:860px;margin:0 auto;display:flex;align-items:center;gap:10px;height:62px;padding:0 18px}
.hdr-brand{display:flex;align-items:center;gap:11px;flex:1;min-width:0}
.delta-badge{width:42px;height:42px;border-radius:10px;background:var(--acc);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:#0a0b0e;flex-shrink:0;letter-spacing:-.02em;box-shadow:0 2px 10px var(--acc-glow)}
.hdr-name{font-weight:800;font-size:16.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.01em}
.hdr-date{font-size:12px;color:var(--txt2);margin-top:1px}
.hdr-chips{display:flex;gap:5px;align-items:center;flex-shrink:0}
.chip{border-radius:6px;padding:2px 9px;font-size:12px;font-weight:700}
.chip.g{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bord)}
.chip.r{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bord)}
.chip.n{background:var(--surf2);color:var(--txt2);border:1px solid var(--bord)}
.chip.t{background:var(--acc-dim);color:var(--acc);border:1px solid var(--acc-bord)}
.hdr-timer-wrap{display:flex;align-items:center;gap:6px;flex-shrink:0;background:var(--surf2);border:1px solid var(--bord);border-radius:8px;padding:5px 10px}
.hdr-timer-wrap.hidden{display:none!important}
.hdr-timer-wrap svg.clock-ic{width:17px;height:17px;color:var(--acc);flex-shrink:0}
.hdr-timer-txt{font-size:15px;font-weight:700;color:var(--txt);font-variant-numeric:tabular-nums;min-width:38px}
#btn-pause{background:transparent;border:none;cursor:pointer;padding:0 2px;font-size:14px;color:var(--txt2);line-height:1;transition:color var(--trans)}
#btn-pause:hover{color:var(--acc)}
#btn-pause.paused{color:var(--acc)}
/* Overlay de pausa */
#pause-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.72);backdrop-filter:blur(6px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px}
#pause-overlay.hidden{display:none!important}
.pause-card{background:var(--surf1);border:1px solid var(--bord);border-radius:16px;padding:40px 56px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:14px}
.pause-icon{font-size:48px;line-height:1}
.pause-title{font-size:22px;font-weight:700;color:var(--txt)}
.pause-sub{font-size:14px;color:var(--txt2)}
.pause-resume{background:var(--acc);color:#000;border:none;border-radius:10px;padding:13px 36px;font-size:16px;font-weight:700;cursor:pointer;transition:opacity var(--trans)}
.pause-resume:hover{opacity:.85}
.hdr-actions{display:flex;gap:3px;flex-shrink:0}
.icon-btn{background:var(--surf2);border:1px solid var(--bord);color:var(--txt2);border-radius:7px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all var(--trans)}
.icon-btn:hover{background:var(--acc-dim);border-color:var(--acc-bord);color:var(--acc)}
.prog-rail{height:2px;background:var(--surf3)}
.prog-fill{height:2px;background:var(--acc);transition:width .4s}

/* ── COVER ───────────────────────────────────────────────── */
.cover{max-width:580px;margin:0 auto;padding:48px 18px 80px;text-align:center;animation:fadeIn .4s ease}
.cover-kicker{font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--acc);font-weight:700;margin-bottom:16px}
.cover h1{font-size:clamp(32px,5vw,48px);font-weight:800;font-style:italic;margin-bottom:14px;line-height:1.1}
.cover-lead{font-size:16px;color:var(--txt2);margin-bottom:32px;line-height:1.5}
.cover-card{background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);padding:24px;text-align:left;box-shadow:var(--shadow)}
.meta-grid{display:grid;grid-template-columns:auto 1fr;gap:7px 18px;font-size:13.5px;margin-bottom:18px}
.meta-grid dt{color:var(--txt3);font-size:11px;letter-spacing:.08em;text-transform:uppercase;align-self:center}
.meta-grid dd{color:var(--txt);margin:0;font-weight:500}
.cover-note{font-size:13.5px;color:var(--txt2);font-style:italic;padding:12px 14px;background:var(--surf2);border-left:3px solid var(--acc-bord);border-radius:0 var(--r-xs) var(--r-xs) 0;margin-bottom:22px;line-height:1.5}
.cover-actions{display:flex;flex-direction:column;gap:10px}
.cover-countdown{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:18px;flex-wrap:wrap}
.ccd-box{text-align:center;background:var(--surf2);border:1px solid var(--bord2);border-radius:var(--r-sm);padding:10px 16px;min-width:62px}
.ccd-num{font-size:28px;font-weight:900;font-style:italic;line-height:1;color:var(--acc)}
.ccd-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--txt3);margin-top:2px}
.ccd-sep{font-size:22px;font-weight:900;color:var(--bord2);margin-bottom:12px}
.sr-due-nudge{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--red-bg);border:1px solid var(--red-bord);border-radius:var(--r-sm);font-size:13px;color:var(--red);margin-bottom:14px;cursor:pointer;transition:background .15s}
.sr-due-nudge:hover{background:rgba(240,82,82,.18)}
.btn-primary{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 28px;background:var(--acc);color:#0a0b0e;border:none;border-radius:var(--r-sm);font-weight:800;font-size:15px;letter-spacing:.02em;transition:all var(--trans);box-shadow:0 4px 16px var(--acc-glow)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px var(--acc-glow)}
.btn-ghost{background:var(--surf2);border:1px solid var(--bord);color:var(--txt2);padding:10px 20px;border-radius:var(--r-sm);font-size:14px;transition:all var(--trans)}
.btn-ghost:hover{border-color:var(--bord2);color:var(--txt)}

/* ── PROVA TOOLBAR ───────────────────────────────────────── */
.tb{position:sticky;top:54px;z-index:90;background:var(--surf);border-bottom:1px solid var(--bord);backdrop-filter:blur(8px)}
.tb-inner{max-width:860px;margin:0 auto;display:flex;align-items:center;gap:8px;padding:8px 18px;flex-wrap:wrap}
.tb-info{font-size:13px;color:var(--txt2);font-variant-numeric:tabular-nums}
.tb-info b{color:var(--txt)}
.tb-spacer{flex:1}
.tb-btn{background:var(--surf2);border:1px solid var(--bord);border-radius:var(--r-sm);padding:6px 13px;font-size:12.5px;color:var(--txt);transition:all var(--trans);display:inline-flex;align-items:center;gap:6px}
.tb-btn:hover{border-color:var(--bord2);background:var(--surf3)}
.tb-btn.danger{border-color:var(--acc-bord);color:var(--acc);background:var(--acc-dim)}
.tb-btn.danger:hover{background:var(--acc-bg)}
.tb-btn svg{width:12px;height:12px}

/* ── PROVA CONTENT ───────────────────────────────────────── */
#prova-wrap{max-width:860px;margin:0 auto;padding:24px 18px 100px}

/* Discipline header */
.disc-section{margin-bottom:48px}
.disc-hdr{text-align:left;margin:40px 0 16px;background:var(--surf);border-top:3px solid var(--acc);border-bottom:1px solid var(--bord);padding:13px 0 11px;position:relative}
.disc-hdr h3{font-weight:800;font-size:20px;letter-spacing:-.01em;text-transform:none;color:var(--txt);display:flex;align-items:center;gap:10px}

.comando{background:var(--surf2);border:1px solid var(--bord);border-radius:var(--r-sm);padding:12px 16px;font-size:14px;color:var(--txt2);margin-bottom:16px;font-style:italic;line-height:1.5}

/* Question block */
.q-block{border-top:1px solid var(--bord);padding:16px 0;scroll-margin-top:100px}
.q-block:first-of-type{border-top:none;padding-top:4px}
.q-line{display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:start}
.q-tag{display:inline-flex;align-items:center;gap:6px;font-weight:800;font-size:13px;color:var(--acc);flex-shrink:0;padding-top:2px;white-space:nowrap}
.q-tag::before{content:'';width:8px;height:12px;background:var(--acc);clip-path:polygon(0 0,80% 0,100% 50%,80% 100%,0 100%);display:inline-block}
.q-text{font-size:15.5px;line-height:1.65;color:var(--txt)}
.q-text .situacao{display:block;font-style:italic;color:var(--txt2);margin-bottom:8px;padding-left:12px;border-left:2px solid var(--bord2)}
.q-marks{display:flex;gap:6px;flex-shrink:0;padding-top:1px}
.q-mark{width:40px;height:40px;border:1.5px solid var(--bord);border-radius:var(--r-sm);background:var(--surf2);font-weight:800;font-size:14px;color:var(--txt2);display:inline-flex;align-items:center;justify-content:center;transition:all var(--trans)}
.q-mark:hover:not(:disabled){border-color:var(--txt2);color:var(--txt);transform:translateY(-1px)}
.q-mark.sel-c{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.q-mark.sel-e{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.q-mark:disabled{opacity:.5;cursor:default}
/* After gabarito shown, ring correct/wrong */
.q-block.gab-on .q-mark.sel-c.is-right,.q-block.gab-on .q-mark.sel-e.is-right{box-shadow:0 0 0 2px var(--green-bg),0 0 0 3px var(--green)}
.q-block.gab-on .q-mark.sel-c.is-wrong,.q-block.gab-on .q-mark.sel-e.is-wrong{box-shadow:0 0 0 2px var(--red-bg),0 0 0 3px var(--red)}

.q-actions-row{margin-top:10px;padding-left:92px;display:flex;align-items:center;gap:10px}
.q-show-gab{background:transparent;border:1px dashed var(--bord2);border-radius:var(--r-xs);padding:3px 11px;font-size:12px;color:var(--txt3);transition:all var(--trans)}
.q-show-gab:hover{border-style:solid;border-color:var(--acc-bord);color:var(--acc)}
.q-status{font-size:11.5px;color:var(--txt3)}
.q-status .ok{color:var(--green);font-weight:600}
.q-status .er{color:var(--red);font-weight:600}

/* Feedback */
.q-feedback{margin-top:14px;border-radius:var(--r-sm);overflow:hidden;border:1px solid var(--bord);animation:fadeUp .2s ease}
.gab-line{display:flex;align-items:center;gap:8px;padding:9px 14px;background:var(--surf2);border-bottom:1px solid var(--bord);font-size:13px;font-weight:700}
.gab-label{color:var(--txt3);font-size:10px;letter-spacing:.1em;text-transform:uppercase;font-weight:600}
.gab-value{color:var(--txt)}
.gab-badge{margin-left:auto;font-size:11.5px;padding:2px 10px;border-radius:99px;font-weight:700}
.gab-badge.ok{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bord)}
.gab-badge.er{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bord)}
.gab-badge.bk{background:var(--surf3);color:var(--txt3);border:1px solid var(--bord)}

.gab-section{border-top:1px solid var(--bord);background:var(--surf)}
.gab-hdr{display:flex;align-items:center;gap:8px;padding:9px 14px;cursor:pointer;font-size:13px;font-weight:600;background:var(--surf2);border:none;width:100%;text-align:left;color:var(--txt);transition:background var(--trans)}
.gab-hdr:hover{background:var(--surf3)}
.gab-icon{flex-shrink:0}
.gab-lbl{flex:1}
.gab-chev{font-size:11px;color:var(--txt3);transition:transform var(--trans)}
.gab-chev.open{transform:rotate(180deg)}
.gab-body{padding:12px 14px;font-size:14px;line-height:1.7;color:var(--txt2)}
.gab-body.hidden{display:none}
.feynman-text{color:var(--txt);font-size:14.5px;line-height:1.75}
.law-block{font-family:var(--mono);font-size:12px;background:var(--surf2);border:1px solid var(--bord);border-radius:var(--r-xs);padding:11px 13px;white-space:pre-wrap;line-height:1.65;color:var(--txt)}
.copy-btn{display:inline-flex;align-items:center;gap:5px;margin-top:8px;font-size:11.5px;padding:4px 12px;border-radius:5px;border:1px solid var(--bord2);background:var(--surf3);color:var(--txt3);cursor:pointer;transition:all var(--trans);font-family:inherit}
.copy-btn:hover{color:var(--acc);border-color:var(--acc-bord);background:var(--acc-dim)}
.peg-box{display:flex;gap:8px;align-items:flex-start;background:var(--amber-bg);border:1px solid var(--amber-bord);border-radius:var(--r-xs);padding:10px 13px;font-size:13px;color:var(--amber);line-height:1.55}

/* ── TRAP WORDS (Releitura Crítica) ──────────────────────── */
.trap-word{font-weight:800;color:var(--acc);background:var(--acc-dim);border-bottom:2px solid var(--acc);padding:0 3px;border-radius:3px}
.releitura-body{font-size:14.5px;line-height:1.8;color:var(--txt);margin-bottom:10px}
.releitura-body .situacao{display:block;font-style:italic;color:var(--txt2);margin-bottom:8px;padding-left:12px;border-left:2px solid var(--bord2)}
.trap-legend{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--txt3);margin-top:6px;flex-wrap:wrap}
.trap-legend .trap-word{font-size:11.5px;cursor:default}
.trap-found{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;color:var(--acc);font-weight:700}

/* ── AUTOAVALIAÇÃO ────────────────────────────────────────── */
.avaliacao-row{padding:11px 14px;background:var(--surf2);border-top:1px solid var(--bord);display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.avaliacao-lbl{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--txt3);font-weight:600;width:100%;margin-bottom:2px}
.av-btn{border-radius:99px;padding:5px 13px;font-size:12.5px;font-weight:700;border:1.5px solid;cursor:pointer;font-family:inherit;transition:all var(--trans);background:transparent}
.av-btn.dom{border-color:var(--green-bord);color:var(--green)}
.av-btn.dom:hover,.av-btn.dom.sel{background:var(--green-bg);box-shadow:0 0 0 2px var(--green-bord)}
.av-btn.dvd{border-color:var(--amber-bord);color:var(--amber)}
.av-btn.dvd:hover,.av-btn.dvd.sel{background:var(--amber-bg);box-shadow:0 0 0 2px var(--amber-bord)}
.av-btn.lac{border-color:var(--red-bord);color:var(--red)}
.av-btn.lac:hover,.av-btn.lac.sel{background:var(--red-bg);box-shadow:0 0 0 2px var(--red-bord)}
.av-btn.leit{border-color:var(--bord2);color:var(--txt2)}
.av-btn.leit:hover,.av-btn.leit.sel{background:var(--surf3);color:var(--txt);box-shadow:0 0 0 2px var(--bord2)}
.av-set{display:flex;align-items:center;gap:8px;padding:9px 14px;background:var(--surf2);border-top:1px solid var(--bord);font-size:13px}
.av-chip{border-radius:99px;padding:3px 12px;font-size:12px;font-weight:700;border:1.5px solid}
.av-chip.dom{background:var(--green-bg);color:var(--green);border-color:var(--green-bord)}
.av-chip.dvd{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-bord)}
.av-chip.lac{background:var(--red-bg);color:var(--red);border-color:var(--red-bord)}
.av-chip.leit{background:var(--surf3);color:var(--txt2);border-color:var(--bord2)}
.av-change{margin-left:auto;background:transparent;border:1px dashed var(--bord2);border-radius:var(--r-xs);padding:2px 9px;font-size:11.5px;color:var(--txt3);cursor:pointer;font-family:inherit;transition:all var(--trans)}
.av-change:hover{color:var(--acc);border-color:var(--acc-bord)}

/* ── DIAGNÓSTICO (Placar) ─────────────────────────────────── */
.diag-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--bord);border:1px solid var(--bord);border-radius:10px;overflow:hidden;margin-bottom:14px}
@media(max-width:600px){.diag-grid{grid-template-columns:repeat(2,1fr)}}
.diag-cell{background:var(--surf2);padding:14px 10px;text-align:center}
.diag-cell .dn{font-size:26px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums}
.diag-cell .dl{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--txt3);margin-top:5px;font-weight:600;line-height:1.3}
.diag-empty{color:var(--txt3);font-size:14px;font-style:italic;padding:12px 0}

/* ── REVISÃO ──────────────────────────────────────────────── */
#rev-wrap{max-width:860px;margin:0 auto;padding:0 0 100px}
.rev-picker{max-width:580px;margin:0 auto;padding:36px 18px 60px;animation:fadeIn .3s ease}
.rev-picker h2{font-size:clamp(22px,4vw,32px);font-weight:800;font-style:italic;margin-bottom:6px}
.rev-picker .sub{font-size:15px;color:var(--txt2);margin-bottom:28px;line-height:1.5}
.filter-sec-lbl{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--txt3);font-weight:700;margin:22px 0 10px}
.filter-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
@media(max-width:480px){.filter-grid{grid-template-columns:1fr}}
.filter-card{background:var(--surf);border:1.5px solid var(--bord);border-radius:var(--r);padding:15px 16px;text-align:left;cursor:pointer;transition:all var(--trans);font-family:inherit;display:flex;flex-direction:column;gap:3px}
.filter-card:hover:not(:disabled){border-color:var(--acc-bord);background:var(--acc-dim)}
.filter-card.sel{border-color:var(--acc);background:var(--acc-dim);box-shadow:0 0 0 1.5px var(--acc)}
.filter-card:disabled{opacity:.35;cursor:not-allowed;pointer-events:none}
.fc-icon{font-size:20px}
.fc-count{font-size:28px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums}
.fc-count.cr{color:var(--red)}.fc-count.ca{color:var(--amber)}.fc-count.cg{color:var(--green)}.fc-count.ct{color:var(--txt)}
.fc-label{font-size:12px;color:var(--txt2);font-weight:600}
.disc-filter-row{display:flex;flex-wrap:wrap;gap:7px}
.disc-btn{background:var(--surf2);border:1.5px solid var(--bord);border-radius:99px;padding:5px 14px;font-size:13px;font-family:inherit;color:var(--txt2);cursor:pointer;transition:all var(--trans);font-weight:500}
.disc-btn:hover{border-color:var(--acc-bord);color:var(--acc)}
.disc-btn.sel{border-color:var(--acc);color:var(--acc);background:var(--acc-dim)}
.mode-box{background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);overflow:hidden;margin-bottom:24px}
.mode-tabs{display:grid;grid-template-columns:1fr 1fr}
.mode-tab{border:none;background:var(--surf2);color:var(--txt2);font-size:14px;font-weight:700;padding:12px 8px;cursor:pointer;font-family:inherit;border-bottom:2px solid transparent;transition:all var(--trans);display:flex;align-items:center;justify-content:center;gap:6px}
.mode-tab:first-child{border-right:1px solid var(--bord)}
.mode-tab.active{background:var(--surf);color:var(--acc);border-bottom-color:var(--acc)}
.mode-desc-txt{font-size:13px;color:var(--txt2);padding:11px 14px;line-height:1.55;border-top:1px solid var(--bord)}
.rev-tb{position:sticky;top:54px;z-index:90;background:var(--surf);border-bottom:1px solid var(--bord)}
.rev-tb-inner{max-width:860px;margin:0 auto;display:flex;align-items:center;gap:8px;padding:7px 18px;flex-wrap:wrap}
.rev-badge{background:var(--acc-dim);border:1px solid var(--acc-bord);color:var(--acc);border-radius:99px;padding:3px 12px;font-size:12px;font-weight:700;flex-shrink:0}
.rev-orig{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;padding:2px 9px;border-radius:99px;font-weight:600;flex-shrink:0}
.rev-orig.ok{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bord)}
.rev-orig.er{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bord)}
.rev-orig.bk{background:var(--surf3);color:var(--txt3);border:1px solid var(--bord)}
.rev-placar-wrap{max-width:580px;margin:0 auto;padding:32px 18px 100px;animation:fadeUp .4s ease}

/* ── ESPAÇAMENTO INTELIGENTE ──────────────────────────────── */
.sr-badge{display:inline-flex;align-items:center;gap:3px;font-size:10.5px;font-weight:700;border-radius:4px;padding:2px 7px;line-height:1.4;white-space:nowrap}
.sr-badge.due{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bord)}
.sr-badge.soon{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bord)}
.sr-badge.ok{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bord)}
.sr-queue-section{margin-bottom:20px}
.sr-queue-hdr{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--red);font-weight:700;margin-bottom:10px}
.sr-queue-row{display:flex;align-items:center;gap:10px;padding:9px 14px;border-radius:var(--r-sm);background:var(--surf);border:1.5px solid var(--red-bord);margin-bottom:7px;cursor:default;transition:background .15s}
.sr-queue-date{font-size:11px;color:var(--txt3);min-width:52px}
.sr-queue-title{flex:1;font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sr-queue-pct{font-size:13px;font-weight:700;min-width:38px;text-align:right}
.sr-interval-info{font-size:11px;color:var(--txt3);margin-top:4px}
/* ── MODO FOCO ────────────────────────────────────────────── */
#sec-foco{position:fixed;inset:0;z-index:150;background:var(--bg);overflow-y:auto;display:flex;flex-direction:column}
#sec-foco.hidden{display:none!important}
.foco-hdr{position:sticky;top:0;z-index:10;background:var(--bg);border-bottom:1px solid var(--bord2);padding:10px 18px;display:flex;align-items:center;gap:12px}
.foco-qnum{font-size:13px;font-weight:700;color:var(--txt2);white-space:nowrap}
.foco-disc{font-size:11.5px;color:var(--txt3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0}
.foco-prog-wrap{display:flex;align-items:center;gap:8px;min-width:110px}
.foco-progress{height:4px;background:var(--bord);border-radius:2px;flex:1}
.foco-prog-fill{height:100%;background:var(--acc);border-radius:2px;transition:width .4s}
.foco-pct{font-size:11px;font-weight:700;color:var(--acc);min-width:28px;text-align:right}
.foco-body{flex:1;max-width:800px;margin:0 auto;padding:28px 20px 16px;width:100%;animation:fadeIn .2s ease}
.foco-body .q-block{border-color:var(--bord2)}
.foco-body .q-text{font-size:16px;line-height:1.8}
.foco-body .q-tag{font-size:14px;width:42px;height:42px;line-height:42px}
.foco-body .q-mark{height:52px;font-size:17px;font-weight:900;min-width:80px}
.foco-body .q-marks{gap:14px}
.foco-nav{max-width:800px;margin:0 auto 40px;padding:0 20px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.foco-nav-hint{font-size:11px;color:var(--txt3);text-align:center;line-height:1.6}
/* ── QUESTION TIMER ──────────────────────────────────────── */
.qt-badge{display:inline-flex;align-items:center;gap:3px;font-size:10.5px;font-weight:700;border-radius:4px;padding:2px 7px;font-variant-numeric:tabular-nums;letter-spacing:.02em;transition:background .35s,color .35s,border-color .35s;min-width:36px;justify-content:center}
.qt-idle{color:var(--txt3);background:transparent}
.qt-normal{background:var(--surf3);color:var(--txt2)}
.qt-warn{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bord)}
.qt-alert{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bord);animation:qtPulse 1s ease-in-out infinite}
.qt-done{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bord)}
@keyframes qtPulse{0%,100%{opacity:1}50%{opacity:.5}}
#qt-pill{position:fixed;bottom:62px;left:50%;transform:translateX(-50%);max-width:860px;width:calc(100% - 32px);z-index:80;pointer-events:none;display:flex;justify-content:flex-end}
.qt-active-pill{background:var(--surf2);border:1px solid var(--bord2);border-radius:20px;padding:5px 14px;font-size:12px;font-weight:700;color:var(--txt2);display:flex;align-items:center;gap:7px;box-shadow:0 2px 12px rgba(0,0,0,.35)}
.qt-active-pill.qt-warn-p{color:var(--amber)}
.qt-active-pill.qt-alert-p{color:var(--red);animation:qtPulse 1s ease-in-out infinite}
/* ── HISTÓRICO ────────────────────────────────────────────── */
#hist-wrap{max-width:860px;margin:0 auto;padding:24px 18px 100px;animation:fadeUp .4s ease}
.hist-header{display:grid;grid-template-columns:62px 72px 50px 68px 60px 1fr 80px;gap:8px;padding:7px 0;border-bottom:2px solid var(--bord);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--txt3);font-weight:700}
.hist-row{display:grid;grid-template-columns:62px 72px 50px 68px 60px 1fr 80px;gap:8px;padding:10px 0;border-top:1px solid var(--bord);font-size:13.5px;align-items:center}
.hist-row:first-child{border-top:none}
.hist-date{color:var(--txt2);font-size:12.5px;font-variant-numeric:tabular-nums;font-weight:600}
.hist-acertos{color:var(--txt);font-variant-numeric:tabular-nums}
.hist-pct{font-weight:800;font-variant-numeric:tabular-nums}
.hist-tempo{color:var(--txt3);font-size:12px;font-variant-numeric:tabular-nums}
.hist-saldo{font-weight:700;font-variant-numeric:tabular-nums}
.hist-av{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.hist-empty{text-align:center;padding:60px 20px}
.hist-empty .hist-emoji{font-size:52px;margin-bottom:18px}
.hist-empty h2{font-size:22px;font-weight:800;margin-bottom:10px}
.hist-empty p{color:var(--txt2);font-size:15px;max-width:340px;margin:0 auto 28px}
.streak-badge{display:inline-flex;align-items:center;gap:5px;background:var(--amber-bg);border:1px solid var(--amber-bord);color:var(--amber);border-radius:99px;padding:3px 12px;font-size:13px;font-weight:700;margin-left:8px}
@media(max-width:600px){
  .hist-header,.hist-row{grid-template-columns:55px 62px 46px 1fr}
  .hist-tempo,.hist-av{display:none}
}

/* ── PLACAR ──────────────────────────────────────────────── */
#placar-wrap{max-width:860px;margin:0 auto;padding:24px 18px 100px;animation:fadeUp .4s ease}
.placar-hero{background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);padding:32px 28px;box-shadow:var(--shadow);margin-bottom:20px;text-align:center}
.placar-kicker{font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--acc);font-weight:700;margin-bottom:14px}
.placar-hero h2{font-size:clamp(28px,4.5vw,40px);font-weight:800;font-style:italic;margin-bottom:8px}
.placar-lead{font-size:15px;color:var(--txt2);margin-bottom:24px}
.placar-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--bord);border:1px solid var(--bord);border-radius:10px;overflow:hidden}
@media(max-width:600px){.placar-stats{grid-template-columns:repeat(2,1fr)}}
.p-stat{background:var(--surf2);padding:16px 10px;text-align:center}
.p-stat .n{font-weight:800;font-size:30px;line-height:1;font-variant-numeric:tabular-nums}
.p-stat .n.g{color:var(--green)}.p-stat .n.r{color:var(--red)}.p-stat .n.a{color:var(--acc)}.p-stat .n.t{color:var(--txt)}
.p-stat .l{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--txt3);margin-top:5px;font-weight:600}

.pl-box{background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);padding:22px;margin-bottom:20px;box-shadow:var(--shadow)}
.pl-title{font-weight:700;font-size:16px;margin-bottom:16px;color:var(--txt)}
.cebraspe-formula{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:14px 16px;background:var(--surf2);border-radius:var(--r-sm);margin-bottom:14px;font-size:14px;border:1px solid var(--bord)}
.cebraspe-formula .part{color:var(--txt2)}
.cebraspe-formula .part b{color:var(--txt);font-weight:700}
.cebraspe-formula .eq{font-weight:800;font-size:20px;color:var(--acc);font-variant-numeric:tabular-nums}
.cebraspe-verdict{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:var(--r-sm);font-weight:700;font-size:14px;border:1px solid}
.cebraspe-verdict.approved{background:var(--green-bg);color:var(--green);border-color:var(--green-bord)}
.cebraspe-verdict.reproved{background:var(--red-bg);color:var(--red);border-color:var(--red-bord)}

/* Discipline chart */
.disc-chart-row{display:grid;grid-template-columns:1.4fr 2.5fr auto auto;gap:12px;align-items:center;padding:9px 0;border-top:1px solid var(--bord);font-size:13.5px}
.disc-chart-row:first-of-type{border-top:none}
.disc-chart-row .nm{color:var(--txt);font-weight:500}
.bar-rail{height:9px;background:var(--surf2);border-radius:99px;overflow:hidden;border:1px solid var(--bord)}
.bar-fill{height:100%;border-radius:99px;transition:width .6s}
.disc-chart-row .frac{color:var(--txt3);font-size:12px;font-variant-numeric:tabular-nums}
.disc-chart-row .pct{font-weight:700;font-size:13px;min-width:40px;text-align:right;font-variant-numeric:tabular-nums}
@media(max-width:600px){.disc-chart-row{grid-template-columns:1fr auto;gap:5px 12px}.bar-rail{grid-column:1/-1;order:3}.disc-chart-row .frac{order:4}}

/* Errors list */
.err-item{border-top:1px solid var(--bord);padding:12px 0}
.err-item:first-child{border-top:none}
.err-row{display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:start;font-size:13.5px}
.err-num{font-weight:800;color:var(--red);font-variant-numeric:tabular-nums;min-width:32px;padding-top:2px}
.err-sub{color:var(--txt);line-height:1.4}
.err-sub small{display:block;color:var(--txt3);font-size:11.5px;margin-top:2px}
.err-toggle{background:var(--surf2);border:1px solid var(--bord);border-radius:var(--r-xs);padding:4px 12px;font-size:12px;color:var(--txt2);transition:all var(--trans);font-family:inherit;white-space:nowrap;display:inline-flex;align-items:center;gap:5px}
.err-toggle:hover{border-color:var(--acc-bord);color:var(--acc);background:var(--acc-dim)}
.err-toggle.open{border-color:var(--acc-bord);color:var(--acc);background:var(--acc-dim)}
.err-gab{display:none;margin-top:12px;border-radius:var(--r-sm);overflow:hidden;border:1px solid var(--bord)}
.err-gab.open{display:block;animation:fadeUp .2s ease}
.placar-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:24px}

/* ── FAB NAV ─────────────────────────────────────────────── */
.fab{position:fixed;right:20px;bottom:72px;width:46px;height:46px;background:var(--acc);color:#0a0b0e;border:none;border-radius:50%;box-shadow:0 4px 16px var(--acc-glow);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;z-index:44;transition:all var(--trans)}
.fab:hover{transform:scale(1.08)}
.fab.hidden{display:none}
.quick-nav{position:fixed;right:20px;bottom:124px;width:auto;min-width:240px;background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);padding:12px;box-shadow:var(--shadow-lg);z-index:45;max-width:320px;max-height:55vh;overflow-y:auto;display:none}
.quick-nav.open{display:block;animation:fadeUp .2s ease}
.qn-title{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--txt3);margin-bottom:8px;font-weight:600}
.qn-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:4px}
.qn-btn{width:30px;height:30px;border:1px solid var(--bord);background:var(--surf2);border-radius:6px;font-size:10.5px;font-weight:700;color:var(--txt3);transition:all .1s;font-variant-numeric:tabular-nums}
.qn-btn:hover{border-color:var(--acc-bord);color:var(--acc);transform:scale(1.08)}
.qn-btn.ac{background:var(--green-bg);border-color:var(--green-bord);color:var(--green)}
.qn-btn.ae{background:var(--red-bg);border-color:var(--red-bord);color:var(--red)}
.qn-btn.gs{border-style:dashed}
.qn-btn.qa{box-shadow:0 0 0 2px var(--red);animation:qtPulse 1.2s ease-in-out infinite}
@keyframes qFlash{0%{box-shadow:0 0 0 3px var(--acc-glow),0 0 18px var(--acc-glow)}60%{box-shadow:0 0 0 2px var(--acc-bord)}100%{box-shadow:none}}
.q-kb-flash{animation:qFlash .55s ease-out}

/* ── PROGRESS BAR (bottom fixed) ─────────────────────────── */
.bot-bar{position:fixed;bottom:0;left:0;right:0;background:var(--surf);border-top:1px solid var(--bord);padding:8px 18px;display:flex;align-items:center;gap:12px;z-index:40;font-size:12px;color:var(--txt2)}
.bot-bar.hidden{transform:translateY(100%);opacity:0;pointer-events:none}
.bot-bar .bbar{flex:1;height:6px;background:var(--surf3);border-radius:99px;overflow:hidden}
.bot-bar .bbar-fill{height:100%;background:var(--acc);transition:width .4s;border-radius:99px}
.bot-bar .bstats{display:flex;gap:10px;flex-shrink:0;font-variant-numeric:tabular-nums}
.bot-bar .bstats .ok{color:var(--green);font-weight:600}.bot-bar .bstats .er{color:var(--red);font-weight:600}

/* ── MODAL ───────────────────────────────────────────────── */
.modal-ov{position:fixed;inset:0;background:rgba(8,9,14,.65);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;padding:18px;animation:fadeIn .2s ease}
.modal{background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);padding:26px;max-width:420px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.5);animation:fadeUp .2s ease}
.modal h3{font-size:19px;font-weight:800;margin-bottom:10px}
.modal p{color:var(--txt2);margin-bottom:20px;font-size:14px;line-height:1.55}
.modal-acts{display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap}
.btn-danger{background:var(--red);color:white;border:none;border-radius:var(--r-sm);padding:9px 18px;font-family:inherit;font-weight:700;font-size:14px;transition:opacity var(--trans)}
.btn-danger:hover{opacity:.88}
.btn-warn{background:var(--amber);color:white;border:none;border-radius:var(--r-sm);padding:9px 18px;font-family:inherit;font-weight:700;font-size:14px;transition:opacity var(--trans)}
.btn-warn:hover{opacity:.88}

/* ── TOAST ───────────────────────────────────────────────── */
.toast{position:fixed;bottom:56px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--surf);border:1px solid var(--bord);color:var(--txt);padding:11px 18px;border-radius:var(--r-sm);font-size:13.5px;z-index:300;opacity:0;transition:opacity .25s,transform .25s;box-shadow:var(--shadow-lg);pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── ANIMATIONS ──────────────────────────────────────────── */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.hidden{display:none!important}

/* ── RESPONSIVE ──────────────────────────────────────────── */
@media(max-width:640px){
  .hdr-inner{padding:0 12px}.hdr-chips{gap:4px}
  .chip{padding:2px 7px;font-size:11px}
  #prova-wrap,#placar-wrap{padding:16px 12px 100px}
  .q-text{font-size:14.5px}
  .prova-title h2{font-size:16px}
  .placar-stats{grid-template-columns:repeat(2,1fr)}
  .q-actions-row{padding-left:0;flex-wrap:wrap}
}
</style>
</head>
<body>

<!-- ══ HEADER ════════════════════════════════════════════ -->
<header class="hdr" id="hdr">
  <div class="hdr-inner">
    <div class="hdr-brand">
      <div class="delta-badge">Δ</div>
      <div>
        <div class="hdr-name">PCDF · Delegado 2026</div>
        <div class="hdr-date" id="hdr-date"></div>
      </div>
    </div>
    <div class="hdr-timer-wrap hidden" id="hdr-timer">
      <svg class="clock-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
      </svg>
      <span class="hdr-timer-txt" id="hdr-timer-txt">0:00</span>
      <button id="btn-pause" title="Pausar / retomar" onclick="togglePause()">⏸</button>
    </div>
    <div class="hdr-chips" id="hdr-chips" style="display:none">
      <span class="chip g" id="c-ok">✓ 0</span>
      <span class="chip r" id="c-er">✗ 0</span>
      <span class="chip n" id="c-tot">0/10</span>
    </div>
    <div class="hdr-actions">
      <button class="icon-btn" id="btn-hist" title="Histórico de estudo">📊</button>
      <button class="icon-btn" id="btn-theme" title="Tema">☀</button>
      <button class="icon-btn hidden" id="btn-gab-all" title="Revelar/ocultar todos os gabaritos">👁</button>
      <button class="icon-btn" id="btn-export" title="Exportar progresso">⬆</button>
      <button class="icon-btn" id="btn-import-bloco" title="Importar bloco JSON">📂</button>
      <button class="icon-btn" id="btn-import-prog" title="Importar progresso">📥</button>
      <button class="icon-btn" id="btn-reset" title="Reiniciar">↺</button>
    </div>
  </div>
  <div class="prog-rail"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
</header>

<!-- ══ PAUSE OVERLAY ═════════════════════════════════════ -->
<div id="pause-overlay" class="hidden">
  <div class="pause-card">
    <div class="pause-icon">⏸</div>
    <div class="pause-title">Prova pausada</div>
    <div class="pause-sub">O cronômetro está parado.<br>Retome quando estiver pronto.</div>
    <button class="pause-resume" onclick="togglePause()">▶ Retomar prova</button>
  </div>
</div>

<!-- ══ SECTIONS ══════════════════════════════════════════ -->
<main>
  <section id="sec-cover"></section>

  <div id="sec-prova" class="hidden">
    <!-- Toolbar -->
    <div class="tb" id="prova-tb">
      <div class="tb-inner">
        <span class="tb-info"><b id="tb-ans">0</b> respondidas &nbsp;|&nbsp; <b id="tb-blank">10</b> em branco</span>
        <span class="tb-spacer"></span>
        <button class="tb-btn" id="tb-gab-all">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="3"/><path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7-10-7-10-7z"/></svg>
          Gabaritos
        </button>
        <button class="tb-btn" id="tb-revisao" onclick="showRevisaoPicker()">
          🔍 Revisão
        </button>
        <button class="tb-btn" id="tb-foco" onclick="enterFoco()">
          🎯 Foco
        </button>
        <button class="tb-btn danger" id="tb-finish">
          Encerrar prova →

<script>

const DEFAULT_BLOCO = {"meta":{"id":"2026-06-20","titulo":"Bloco Diário — Ilicitude, Prisão Cautelar, Federação e Servidores Públicos","data":"2026-06-20","totalQuestoes":120,"concurso":"Delegado PCDF 2026","edital":"Edital nº 1, de 3/2/2026","fase":"Fase 1 — comentários expandidos","observacao":"Gerado automaticamente pelo orquestrador noturno (recuperação 20/06/2026). 120 questões C/E. Temas do dia: Ilicitude e Excludentes (Penal), Prisão e Medidas Cautelares (PPP), Federação Brasileira (Const.), Servidores Públicos (Adm.)."},"disciplinas":[{"nome":"Direito Penal e Legislação Especial","comando":"Acerca de ilicitude, excludentes de ilicitude e demais temas de Direito Penal, julgue os itens a seguir.","itens":[{"n":1,"enun":"A legítima defesa pressupõe agressão injusta, atual ou iminente, a direito próprio ou alheio, com uso moderado dos meios necessários para repeli-la, nos termos do art. 25 do CP.","gab":"CERTO","com":"A legítima defesa justifica a conduta do agente que repele agressão injusta real, atual ou iminente, a direito seu ou de terceiro. A moderação é exigida para evitar o excesso punível. O fato continua típico, mas a ilicitude é excluída pelo art. 23, II, CP. A banca CEBRASPE já cobrou os requisitos de forma fracionada, exigindo identificação de qual elemento falta para descaracterizar a excludente.","fund":"LEI: \"Art. 25 do CP: 'Entende-se em legítima defesa quem, usando moderadamente dos meios necessários, repele injusta agressão, atual ou iminente, a direito seu ou de outrem.'\"\nJURISPRUDÊNCIA: \"STJ, Seção Unânime (nov/2025): o excesso culposo na legítima defesa ocorre quando o agente ultrapassa os limites por negligência, imprudência ou imperícia, sem consciência do exagero — punível a título de culpa.\""},{"n":2,"enun":"O STF, no julgamento da ADPF 779, reconheceu como válida a utilização da tese de legítima defesa da honra nos julgamentos pelo Tribunal do Júri em casos de feminicídio.","gab":"ERRADO","com":"O item inverte o entendimento do STF. Na ADPF 779, o Plenário declarou, por unanimidade, a inconstitucionalidade da tese da legítima defesa da honra, proibindo sua utilização nos julgamentos pelo Júri. O fundamento central foi que a honra ferida não constitui agressão injusta atual ou iminente apta a justificar homicídio, instrumentalizando a violência de gênero.","fund":"LEI: \"Art. 25 do CP: 'Entende-se em legítima defesa quem, usando moderadamente dos meios necessários, repele injusta agressão, atual ou iminente...' — a honra ferida não preenche o requisito de agressão injusta atual ou iminente.\"\nJURISPRUDÊNCIA: \"STF, ADPF 779 (Pleno, j. 15/03/2021, rel. Min. Dias Toffoli): declarada inconstitucional a tese da legítima defesa da honra em julgamentos pelo Júri Popular; aplicável a todos os processos em curso.\"","peg":"Armadilha: a ADPF 779 PROIBIU a tese — não a validou. Inversão de conteúdo é técnica clássica CEBRASPE."},{"n":3,"enun":"O excesso culposo na legítima defesa, consolidado pelo STJ em novembro de 2025, ocorre quando o agente ultrapassa os limites da excludente por negligência, imprudência ou imperícia, sem consciência de que os está ultrapassando.","gab":"CERTO","com":"O STJ, em julgamento de seção unânime em novembro de 2025, fixou que o excesso culposo é caracterizado pela inconsciência do exagero: o agente ultrapassa os limites necessários sem perceber, por desatenção ou erro de cálculo. Diferencia-se do excesso doloso, em que o agente percebe que o perigo cessou e continua agredindo intencionalmente. Ambos os excessos são puníveis pelo art. 23, parágrafo único, CP.","fund":"LEI: \"CP, art. 23, parágrafo único: 'O agente, em qualquer das hipóteses deste artigo, responderá pelo excesso doloso ou culposo.'\"\nJURISPRUDÊNCIA: \"STJ, Seção Unânime (nov/2025): excesso culposo na legítima defesa — agente ultrapassa por negligência/imprudência/imperícia os limites do necessário, sem ciência do exagero; responsabilidade penal a título culposo.\"","peg":"Distinção-chave: excesso culposo = sem consciência do exagero; excesso doloso = com consciência. O STJ fixou isso em nov/2025."},{"n":4,"enun":"O estado de necessidade, ao contrário da legítima defesa, pode ser invocado diante de perigo proveniente de qualquer fonte, incluindo forças da natureza, animais e ações humanas culposas ou involuntárias.","gab":"CERTO","com":"Esta é a distinção estrutural entre as duas excludentes: a legítima defesa exige agressão injusta praticada por pessoa humana; o estado de necessidade abrange qualquer perigo atual — seja de origem humana (dolosa ou culposa), animal ou natural. Ambos exigem que o mal causado seja inevitável por outro meio, mas o estado de necessidade não demanda agressão injusta.","fund":"LEI: \"CP, art. 24: 'Considera-se em estado de necessidade quem pratica o fato para salvar de perigo atual, que não provocou por sua vontade, nem podia de outro modo evitar, direito próprio ou alheio, cujo sacrifício, nas circunstâncias, não era razoável exigir-se.'\"\nJURISPRUDÊNCIA: \"STJ, REsp 1.384.074/MG (Sexta Turma, 2014): estado de necessidade pode ser reconhecido em situação de perigo decorrente de animal selvagem; o requisito central é a inevitabilidade por outro meio.\"","jur_status":"PENDENTE"},{"n":5,"enun":"As excludentes de ilicitude do art. 23 do CP afastam a tipicidade do fato, tornando-o atípico.","gab":"ERRADO","com":"O item contém erro técnico fundamental: as excludentes de ilicitude NÃO excluem a tipicidade — o fato permanece típico. A excludente opera na segunda análise do crime (ilicitude), pressupondo que já se constatou a tipicidade do comportamento. O que é excluído é apenas a contrariedade do fato ao ordenamento jurídico. Causas de atipicidade são distintas (ex.: insignificância, falta de elemento do tipo).","fund":"LEI: \"CP, art. 23: 'Não há crime quando o agente pratica o fato: I - em estado de necessidade; II - em legítima defesa; III - em estrito cumprimento de dever legal ou no exercício regular de direito.' — a expressão 'não há crime' decorre da exclusão da ilicitude, não da tipicidade.\"\nJURISPRUDÊNCIA: \"STJ, HC 355.478/SP (5ª Turma, 2016): reconhecida a excludente de legítima defesa afasta a ilicitude; o fato continua típico — distinção relevante para fins de responsabilidade civil.\"","peg":"Armadilha: excludente de ilicitude ≠ excludente de tipicidade. O fato continua típico; apenas a ilicitude é afastada.","jur_status":"PENDENTE"},{"n":6,"enun":"O consentimento do ofendido pode funcionar como causa supralegal de exclusão de ilicitude, desde que o bem jurídico seja disponível e o consentimento seja livre, anterior ao fato e proveniente de pessoa capaz.","gab":"CERTO","com":"O consentimento do ofendido não está previsto expressamente no CP como excludente, mas a doutrina e a jurisprudência o reconhecem como causa supralegal de exclusão de ilicitude (ou de tipicidade, quando o dissenso é elementar do tipo). Os requisitos são: bem jurídico disponível, consentimento livre e anterior, e capacidade do ofendido. A CEBRASPE cobra tanto a distinção de fundamentos quanto os requisitos.","fund":"LEI: \"CP, art. 23 (rol exemplificativo segundo a doutrina majoritária): as excludentes supralegais são reconhecidas doutrinariamente; o consentimento exclui a ilicitude quando o bem é disponível e o tipo não exige o dissenso como elementar.\"\nJURISPRUDÊNCIA: \"STJ, REsp 1.497.701/SP (6ª Turma, 2015): consentimento do ofendido como causa supralegal de exclusão de ilicitude; requisitos: bem disponível, consentimento livre, prévio e pelo titular capaz do bem jurídico.\"","jur_status":"PENDENTE"},{"n":7,"enun":"O CP brasileiro adota a teoria limitada da culpabilidade no que se refere às descriminantes putativas, tratando o erro de tipo permissivo de modo diverso do erro de proibição indireto.","gab":"CERTO","com":"A teoria limitada da culpabilidade (adotada pelo CP) diferencia: (a) erro de tipo permissivo (art. 20, §1°) — o agente erra sobre fato que tornaria a conduta justificada; se escusável, exclui dolo e culpa; se inescusável, exclui dolo mas subsiste culpa; (b) erro de proibição indireto (art. 21) — o agente sabe os fatos mas acredita erroneamente que a conduta é permitida; se escusável, exclui culpabilidade; se inescusável, reduz a pena.","fund":"LEI: \"CP, art. 20, §1°: 'É isento de pena quem, por erro plenamente justificado pelas circunstâncias, supõe situação de fato que, se existisse, tornaria a ação legítima. Não há isenção de pena quando o erro deriva de culpa e o fato é punível como crime culposo.'\"\nJURISPRUDÊNCIA: \"STJ, AgRg no REsp 1.848.014/MG (2020): teoria limitada da culpabilidade é adotada pelo CP brasileiro; erro de tipo permissivo pode excluir dolo sem eliminar culpa nos casos inescusáveis.\"","jur_status":"PENDENTE"},{"n":8,"enun":"Na descriminante putativa por erro de tipo permissivo vencível (inescusável), o agente não responde pelo crime, pois a putatividade elimina qualquer forma de responsabilidade penal.","gab":"ERRADO","com":"O item está errado. O erro de tipo permissivo inescusável (vencível) afasta o dolo, mas não elimina a culpa. O agente responde por crime culposo SE o tipo previr modalidade culposa. A isenção total (de dolo E culpa) ocorre apenas quando o erro é escusável (invencível). A teoria limitada da culpabilidade, adotada pelo CP, opera dessa forma.","fund":"LEI: \"CP, art. 20, §1°: '...Não há isenção de pena quando o erro deriva de culpa e o fato é punível como crime culposo.' — erro inescusável → afasta dolo, mantém culpa.\"\nJURISPRUDÊNCIA: \"STJ, HC 191.028/MG (6ª Turma, 2011): a putatividade inescusável exclui dolo, mas não culpa; o agente pode responder pelo crime culposo se houver previsão legal.\"","peg":"Erro inescusável ≠ isenção total. Afasta dolo; mantém culpa (se prevista). Só o erro escusável isenta integralmente.","jur_status":"PENDENTE"},{"n":9,"enun":"No estrito cumprimento do dever legal, o dever imposto ao agente deve derivar de lei em sentido formal ou material, não bastando ordem de superior hierárquico sem lastro legal.","gab":"CERTO","com":"A excludente de estrito cumprimento do dever legal exige que o dever seja imposto pela lei (formal ou material). Mera ordem de superior, instrução normativa ou regulamento interno, sem amparo em lei, não configura o estrito cumprimento do dever legal. Se o agente obedece a ordem manifestamente ilegal de superior, pode responder pelo excesso; se a ordem é legal, pode valer-se da excludente.","fund":"LEI: \"CP, art. 23, III: 'Não há crime quando o agente pratica o fato: ... em estrito cumprimento de dever legal.' — o dever deve ser legal, não meramente regulamentar.\"\nJURISPRUDÊNCIA: \"STJ, HC 240.180/SP (5ª Turma, 2012): a excludente do estrito cumprimento do dever legal requer que o dever seja previsto em lei; ordem de superior sem base legal não supre o requisito; agente que exagera na execução responde pelo excesso.\"","jur_status":"PENDENTE"},{"n":10,"enun":"A Súmula 145 do STF dispõe que não há flagrante válido quando a polícia prepara a situação de tal modo que torna impossível a consumação do crime, configurando hipótese de crime impossível.","gab":"CERTO","com":"A Súmula 145 STF cristaliza o entendimento de que o flagrante preparado (ou provocado) gera crime impossível pela impossibilidade absoluta de consumação decorrente da intervenção policial. Distingue-se do flagrante esperado (legal), em que a polícia apenas aguarda o crime que ocorreria de qualquer forma. A questão é frequente em provas de Delegado pela importância prática na atividade policial.","fund":"LEI: \"CP, art. 17: 'Não se pune a tentativa quando, por ineficácia absoluta do meio ou por absoluta impropriedade do objeto, é impossível consumar-se o crime.' — fundamento para a Súmula 145 STF.\"\nJURISPRUDÊNCIA: \"STF, Súmula 145: 'Não há crime quando a preparação do flagrante pela polícia torna impossível a sua consumação.' — aplicação do art. 17 CP ao flagrante preparado.\"","jur_status":"OK"},{"n":11,"enun":"A Súmula 711 do STF determina a aplicação da lei penal mais grave ao crime permanente ou continuado se a lei entrou em vigor antes da cessação da atividade criminosa, ainda que mais grave do que a vigente no início da conduta.","gab":"CERTO","com":"O fundamento é que no crime permanente (ex.: sequestro) e no continuado, enquanto a conduta persiste, o tempo do crime se protrai. Se lei mais grave entra em vigor durante essa persistência, aplica-se a lei nova porque não há retroatividade prejudicial — a conduta ainda estava em curso. A Súmula 711 STF pacificou o tema, que era objeto de divergência antes de sua edição.","fund":"LEI: \"CP, art. 4°: 'Considera-se praticado o crime no momento da ação ou omissão, ainda que outro seja o momento do resultado.' — em crimes permanentes, o momento da ação se prolonga.\"\nJURISPRUDÊNCIA: \"STF, Súmula 711: 'A lei penal mais grave aplica-se ao crime continuado ou ao crime permanente, se a sua vigência é anterior à cessação da continuidade ou da permanência.'\""},{"n":12,"enun":"O exercício regular de um direito, como excludente de ilicitude prevista no art. 23, III do CP, pode abranger a prática de esportes violentos como o boxe e o MMA, desde que dentro das regras da modalidade.","gab":"CERTO","com":"O exercício regular de um direito engloba atividades socialmente adequadas e reconhecidas pelo ordenamento como legítimas. A prática de esportes de contato autorizado, dentro das regras e limites regulamentares, configura essa excludente: as lesões decorrentes das regras do esporte não são ilícitas porque decorrem do exercício de um direito reconhecido (praticar esporte regulamentado). O consentimento dos participantes reforça a legitimidade.","fund":"LEI: \"CP, art. 23, III: 'Não há crime quando o agente pratica o fato: ... no exercício regular de direito.' — abrange atividades lícitas reconhecidas pelo ordenamento, incluindo esportes regulamentados.\"\nJURISPRUDÊNCIA: \"STJ, REsp 1.473.087/RS (6ª Turma, 2015): prática de esporte de contato com lesões dentro das regras regulamentares: exercício regular de direito ou consentimento do ofendido; afasta a ilicitude.\"","jur_status":"PENDENTE"},{"n":13,"enun":"A retroatividade benéfica da lei penal aplica-se tanto à lei temporária quanto à lei excepcional, ainda que ao tempo da sentença condenatória já tenha cessado o período de vigência de tais leis.","gab":"ERRADO","com":"O item está errado. As leis temporárias (com prazo fixo) e excepcionais (vigentes em situações de emergência) têm ultra-atividade: continuam se aplicando aos fatos praticados durante sua vigência mesmo após o término desta. A retroatividade benéfica NÃO se aplica a essas leis, pois a revogação não decorre de mudança de valoração, mas da superação do prazo ou da situação. Fundamento: CP, art. 3°.","fund":"LEI: \"CP, art. 3°: 'A lei excepcional ou temporária, embora decorrido o período de sua duração ou cessadas as circunstâncias que a determinaram, aplica-se ao fato praticado durante sua vigência.' — ultra-atividade expressa.\"\nJURISPRUDÊNCIA: \"STJ, RHC 22.465/SP (5ª Turma, 2010): lei temporária e lei excepcional têm ultra-atividade; inaplicável a retroatividade benéfica; o princípio da novatio legis in mellius não alcança essas espécies normativas.\"","peg":"Lei temporária/excepcional tem ULTRA-atividade, não retroatividade benéfica. CP, art. 3° expressa isso.","jur_status":"PENDENTE"},{"n":14,"enun":"Para o CP brasileiro, na teoria unitária adotada para o estado de necessidade, quando o bem sacrificado for de valor maior que o bem salvo, o fato é justificado mas o agente poderá ter a pena reduzida.","gab":"CERTO","com":"O CP adota a teoria unitária para o estado de necessidade: quando o bem salvo tem valor igual ou superior ao sacrificado, há estado de necessidade justificante (exclui ilicitude). Quando o bem salvo é de valor inferior, não há estado de necessidade justificante pelo CP — mas o art. 24, §2° prevê redução de pena obrigatória (1/3 a 2/3), reconhecendo o estado de necessidade exculpante (que parte da doutrina fundamenta como inexigibilidade de conduta diversa).","fund":"LEI: \"CP, art. 24, §2°: 'Embora seja razoável exigir-se o sacrifício do direito ameaçado, a pena poderá ser reduzida de um a dois terços.' — quando o bem sacrificado é de valor superior.\"\nJURISPRUDÊNCIA: \"STJ, HC 297.062/SP (5ª Turma, 2015): teoria unitária do CP para o estado de necessidade; na hipótese em que o bem sacrificado tem valor superior, não há excludente de ilicitude, mas reconhece-se atenuação de pena.\"","jur_status":"PENDENTE"},{"n":15,"enun":"O excesso doloso na legítima defesa pressupõe que o agente, mesmo após a cessação da agressão injusta ou da necessidade de defesa, continua agredindo conscientemente o agressor.","gab":"CERTO","com":"O excesso doloso ocorre quando o agente sabe que o perigo ou a agressão cessou (ou que os limites do necessário já foram ultrapassados) e deliberadamente continua a conduta agressiva. Nessa hipótese, responde pelo resultado típico em toda a extensão dolosa. Distingue-se do excesso culposo, em que não há consciência do exagero. O CP pune ambas as formas no art. 23, parágrafo único.","fund":"LEI: \"CP, art. 23, parágrafo único: 'O agente, em qualquer das hipóteses deste artigo, responderá pelo excesso doloso ou culposo.' — o excesso doloso implica resposta integral pelo crime.\"\nJURISPRUDÊNCIA: \"STJ, HC 398.020/SP (6ª Turma, 2017): configurado o excesso doloso na legítima defesa quando o agente, ciente da cessação do perigo, prossegue na agressão voluntariamente; perde o status de excludente de ilicitude integralmente.\"","jur_status":"PENDENTE"},{"n":16,"enun":"O erro de proibição direto e o erro de proibição indireto têm o mesmo tratamento jurídico no CP brasileiro, ambos podendo excluir ou reduzir a culpabilidade conforme sua escusabilidade.","gab":"CERTO","com":"O CP trata ambas as formas de erro de proibição (art. 21) da mesma forma: se escusável (invencível), isenta de pena (exclui a culpabilidade por ausência de potencial consciência da ilicitude); se inescusável (vencível), reduz a pena de 1/6 a 1/3. O erro de proibição direto diz respeito ao desconhecimento da ilicitude do fato em si; o indireto, ao erro sobre os limites ou pressupostos de uma causa de justificação.","fund":"LEI: \"CP, art. 21: 'O desconhecimento da lei é inescusável. O erro sobre a ilicitude do fato, se inevitável, isenta de pena; se evitável, poderá diminuí-la de um sexto a um terço.' — aplicável ao erro direto e indireto.\"\nJURISPRUDÊNCIA: \"STJ, HC 352.556/SP (5ª Turma, 2016): erro de proibição indireto sobre os limites da legítima defesa segue o regime do art. 21 CP; se inevitável, isenta de pena; se evitável, reduz-a.\"","jur_status":"PENDENTE"},{"n":17,"enun":"A teoria extremada da culpabilidade, ao contrário da teoria limitada adotada pelo CP brasileiro, trata o erro de tipo permissivo como modalidade de erro de proibição, com as mesmas consequências jurídicas.","gab":"CERTO","com":"A teoria extremada (ou radical) da culpabilidade não distingue entre erro de tipo permissivo e erro de proibição: todo erro sobre as descriminantes é tratado como erro de proibição (art. 21 CP), com as consequências de isenção (escusável) ou redução de pena (inescusável). Já a teoria limitada (adotada pelo CP) trata o erro sobre fatos que dariam ensejo à descriminante como erro de tipo permissivo (art. 20, §1° CP), podendo excluir dolo e culpa no caso escusável.","fund":"LEI: \"CP, art. 20, §1°: erro de tipo permissivo (teoria limitada); art. 21: erro de proibição. A distinção entre as teorias reside no enquadramento do erro sobre os pressupostos fáticos das descriminantes.\"\nJURISPRUDÊNCIA: \"STJ, REsp 1.622.781/RJ (5ª Turma, 2017): o CP adota a teoria limitada da culpabilidade; erro sobre fato que tornaria a conduta justificada é erro de tipo permissivo (art. 20, §1°), não erro de proibição.\"","jur_status":"PENDENTE"},{"n":18,"enun":"Para que se configure legítima defesa de terceiro, é imprescindível que o terceiro defiro ou solicite a intervenção do agente que vai em seu socorro.","gab":"ERRADO","com":"O item está errado. A legítima defesa de terceiro não exige qualquer solicitação ou concordância do terceiro defendido. O art. 25 do CP autoriza que o agente repela injusta agressão a direito de 'outrem' sem qualquer restrição quanto ao consentimento do terceiro. A intervenção pode ocorrer mesmo que o terceiro não tenha ciência ou até contra sua vontade expressa (ex.: vítima em pânico que pede para não reagir).","fund":"LEI: \"CP, art. 25: '...repele injusta agressão, atual ou iminente, a direito seu ou de outrem.' — nenhum requisito de consentimento do terceiro.\"\nJURISPRUDÊNCIA: \"STJ, RHC 60.902/SP (5ª Turma, 2015): a legítima defesa de terceiro independe de solicitação ou anuência do titular do bem jurídico defendido; basta a agressão injusta e a moderação nos meios.\"","jur_status":"PENDENTE"},{"n":19,"enun":"O perdão judicial é sentença declaratória de extinção de punibilidade, sem efeitos condenatórios, conforme consagrado na Súmula 18 do STJ.","gab":"CERTO","com":"A Súmula 18 STJ pacificou que o perdão judicial tem natureza de sentença declaratória de extinção da punibilidade, não produzindo efeitos condenatórios (não gera reincidência, não consta de antecedentes para fins de agravação). O perdão judicial é causa de extinção da punibilidade aplicada quando as consequências do fato já atingiram gravemente o próprio agente (ex.: homicídio culposo em que o autor perdeu familiar próximo).","fund":"LEI: \"CP, art. 107, IX: 'Extingue-se a punibilidade: ... IX — pelo perdão judicial, nos casos previstos em lei.' — efeito: extinção da punibilidade.\"\nJURISPRUDÊNCIA: \"STJ, Súmula 18: 'A sentença concessiva do perdão judicial é declaratória da extinção da punibilidade, não subsistindo qualquer efeito condenatório.' — não gera reincidência.\""},{"n":20,"enun":"A Súmula 231 do STJ impede que a atenuante genérica reduza a pena abaixo do mínimo legal, mesmo que seja a única circunstância relevante no caso concreto.","gab":"CERTO","com":"A Súmula 231 STJ cristaliza que as circunstâncias atenuantes (art. 65 CP) não podem levar a pena abaixo do mínimo legal fixado no tipo penal, diferentemente das causas de diminuição de pena (3ª fase do sistema trifásico), que podem sim ultrapassar os limites do tipo. A CEBRASPE cobra essa distinção com frequência, geralmente apresentando hipóteses de cálculo de pena.","fund":"LEI: \"CP, art. 65: 'São circunstâncias que sempre atenuam a pena: ...' — atenuantes operam na 2ª fase do cálculo, dentro dos limites legais.\"\nJURISPRUDÊNCIA: \"STJ, Súmula 231: 'A incidência da circunstância atenuante não pode conduzir à redução da pena abaixo do mínimo legal.' — distinção com causas de diminuição de pena.\""},{"n":21,"enun":"A Súmula Vinculante 11 do STF determina que o uso de algemas só é lícito em casos de resistência, fundado receio de fuga ou perigo à integridade física do preso ou de terceiros, devendo haver registro da situação em autos ou boletim.","gab":"CERTO","com":"A SV 11 STF regulamenta o uso de algemas como medida excepcional, condicionada à resistência, risco de fuga ou perigo à integridade. A obrigatoriedade de registro escrito nos autos ou boletim é requisito formal essencial — a inobservância importa em abuso de autoridade e nulidade do ato processual eventualmente praticado com uso indevido de algemas. Ponto recorrente em provas de Delegado.","fund":"LEI: \"Lei 13.869/2019 (Lei de Abuso de Autoridade), art. 10: 'Decretar a condução coercitiva de testemunha ou investigado manifestamente descabida ou sem prévia intimação de comparecimento voluntário...'\"\nJURISPRUDÊNCIA: \"STF, Súmula Vinculante 11: 'Só é lícito o uso de algemas em casos de resistência e de fundado receio de fuga ou de perigo à integridade física própria ou alheia, por parte do preso ou de terceiros, justificada a excepcionalidade por escrito...'\"","jur_status":"OK"},{"n":22,"enun":"O crime impossível (CP, art. 17) aplica-se quando o meio empregado ou o objeto visado tornam absolutamente impossível a consumação, sendo a tentativa impunível nessa hipótese.","gab":"CERTO","com":"O art. 17 CP traz duas hipóteses de crime impossível: (a) ineficácia absoluta do meio (ex.: tentar matar com substância inócua pensando ser veneno); (b) absoluta impropriedade do objeto (ex.: furtar cadáver pensando ser pessoa viva). Em ambos os casos, a tentativa é impunível porque a consumação era objetivamente impossível. A impossibilidade deve ser absoluta; se relativa, há tentativa punível.","fund":"LEI: \"CP, art. 17: 'Não se pune a tentativa quando, por ineficácia absoluta do meio ou por absoluta impropriedade do objeto, é impossível consumar-se o crime.'\"\nJURISPRUDÊNCIA: \"STF, Súmula 145: 'Não há crime quando a preparação do flagrante pela polícia torna impossível a sua consumação.' — aplicação do art. 17 CP ao flagrante preparado.\"","peg":"Impossibilidade deve ser ABSOLUTA. Impossibilidade relativa = tentativa punível. Cuidado com o advérbio."},{"n":23,"enun":"No estrito cumprimento do dever legal, o policial que usa força física proporcional e necessária para efetuar a prisão em flagrante age amparado pela excludente, não respondendo por eventual lesão corporal leve causada ao preso.","gab":"CERTO","com":"Quando o policial emprega força proporcional e necessária no estrito cumprimento da ordem legal de prisão (flagrante), a lesão decorrente está acobertada pela excludente do art. 23, III, CP. O dever legal é a obrigação de efetuar a prisão (CPP, art. 301 e ss.); a proporcionalidade garante que não há excesso. Se houver exagero, configurar-se-á excesso punível (doloso ou culposo) ou até abuso de autoridade.","fund":"LEI: \"CP, art. 23, III: '...em estrito cumprimento de dever legal...' — o dever do policial de efetuar a prisão em flagrante é legal (CPP, arts. 301-310); a força proporcional é parte do estrito cumprimento.\"\nJURISPRUDÊNCIA: \"STJ, RHC 70.226/RJ (6ª Turma, 2016): uso de força proporcional pelo policial na efetuação de prisão em flagrante é acobertado pelo estrito cumprimento do dever legal; excesso invalida a excludente.\"","jur_status":"PENDENTE"},{"n":24,"enun":"A prescrição virtual ou em perspectiva, que antecipa a extinção da punibilidade com base na pena que seria hipoteticamente aplicada, é aceita pelo STF e pelo STJ como mecanismo de economia processual.","gab":"ERRADO","com":"O item está errado. Tanto o STF quanto o STJ rechaçam a prescrição virtual (em perspectiva ou antecipada). A Súmula 438 STJ e o RE 602.527 STF (Tema RG) firmaram que esse instituto não tem previsão legal e viola o princípio da presunção de não culpabilidade, antecipando a punição sem sentença. A prescrição só pode ser declarada com base em penas concretas, não hipotéticas.","fund":"LEI: \"CP, arts. 109 e 110: prazos de prescrição calculados com base na pena máxima (prescr. da pretensão punitiva abstrata) ou na pena aplicada (prescr. da pretensão punitiva retroativa); prescrição virtual não tem base legal.\"\nJURISPRUDÊNCIA: \"STJ, Súmula 438: 'É inadmissível a extinção da punibilidade pela prescrição da pretensão punitiva com fundamento em pena hipotética, independentemente da existência ou sorte do processo penal.' — convergência com STF (RE 602.527, Tema RG).\"","peg":"Convergência C1: STJ Súmula 438 + STF RE 602.527 — AMBOS rechaçam prescrição virtual. Item clássico de reversão."}]},{"nome":"Direito Processual Penal e Legislação Especial","comando":"Acerca de prisão, medidas cautelares e demais temas de Direito Processual Penal, julgue os itens a seguir.","itens":[{"n":25,"enun":"Nos termos do CPP, após a lavratura do auto de prisão em flagrante, o juiz deve, em até 24 horas, fundamentadamente relaxar a prisão ilegal, converter o flagrante em prisão preventiva ou conceder liberdade provisória, com ou sem fiança.","gab":"CERTO","com":"O art. 310 CPP (com redação do Pacote Anticrime/2019) impõe ao juiz o dever de apreciar o flagrante em 24 horas. As três opções são taxativas: relaxamento da prisão ilegal, conversão em preventiva (se presentes os requisitos do art. 312) ou liberdade provisória (com ou sem fiança). A omissão do juiz pode ensejar relaxamento por excesso de prazo. CEBRASPE explora as opções e os prazos do art. 310.","fund":"LEI: \"CPP, art. 310: 'Após receber o auto de prisão em flagrante, no prazo máximo de até 24 (vinte e quatro) horas após a realização da prisão, o juiz deverá promover audiência de custódia com a presença do acusado...' e: I - relaxar a prisão ilegal; II - converter a prisão em flagrante em preventiva...; III - conceder liberdade provisória...\"\nJURISPRUDÊNCIA: \"STJ, HC 596.308/SP (6ª Turma, 2020): a audiência de custódia é obrigatória no prazo de 24h; a não realização pode ensejar relaxamento da prisão por ilegalidade.\"","jur_status":"PENDENTE"},{"n":26,"enun":"O Tema 1068 do STF firmou tese de repercussão geral no sentido de que a condenação proferida pelo Tribunal do Júri autoriza o início da execução da pena antes do trânsito em julgado, independentemente do cabimento de recursos.","gab":"CERTO","com":"O STF, no Tema 1068, distinguiu a execução provisória pós-Júri da regra geral do art. 283 CPP. O fundamento é a soberania dos veredictos do Júri (CF, art. 5°, XXXVIII, c), que garante maior legitimidade democrática à decisão popular. Mesmo que haja apelação, a execução pode ser iniciada imediatamente após a sessão do Júri. Esta tese é de alta relevância para Delegados porque interfere diretamente nos procedimentos pós-julgamento no Júri.","fund":"LEI: \"CF, art. 5°, XXXVIII, c: 'é reconhecida a instituição do júri, com a organização que lhe der a lei, assegurados: c) a soberania dos veredictos.' — fundamento constitucional para a execução imediata.\"\nJURISPRUDÊNCIA: \"STF, Tema 1068 RG (ARE 1225185, Plenário, j. 2023): 'A prisão do réu condenado pelo Tribunal do Júri, independentemente do quantitativo da pena, é compatível com a Constituição Federal.' — tese vinculante.\"","peg":"Tema 1068 é ESPECÍFICO para o Júri. A regra geral (art. 283 CPP) exige trânsito em julgado — exceto no Júri por força do Tema 1068. Não confundir."},{"n":27,"enun":"A prisão preventiva pode ser decretada de ofício pelo juiz, durante a fase investigatória, quando presentes os requisitos do art. 312 do CPP.","gab":"ERRADO","com":"Desde o Pacote Anticrime (Lei 13.964/2019), a prisão preventiva não pode mais ser decretada de ofício em nenhuma fase — nem na investigação, nem durante o processo. O art. 311 CPP exige requerimento do MP, do querelante, do assistente ou representação da autoridade policial. A vedação da decretação ex officio é uma das principais alterações do Pacote Anticrime e é ponto recorrente em provas de Delegado.","fund":"LEI: \"CPP, art. 311 (redação da Lei 13.964/2019): 'Em qualquer fase da investigação policial ou do processo penal, caberá a prisão preventiva decretada pelo juiz, a requerimento do Ministério Público, do querelante ou do assistente, ou por representação da autoridade policial.' — vedada a decretação ex officio.\"\nJURISPRUDÊNCIA: \"STJ, HC 601.736/RJ (6ª Turma, 2020): após o Pacote Anticrime, é vedada a decretação de prisão preventiva de ofício em qualquer fase; a inobservância torna a prisão ilegal.\"","peg":"Pós-Lei 13.964/2019: ZERO decretação de preventiva de ofício. Questão testa conhecimento da reform do CPP.","jur_status":"PENDENTE"},{"n":28,"enun":"A prisão temporária, prevista na Lei 7.960/89, destina-se exclusivamente à fase de investigação policial e não pode ser decretada após o oferecimento da denúncia.","gab":"CERTO","com":"A prisão temporária é instrumento cautelar do inquérito policial — sua finalidade é viabilizar investigação de infrações específicas (rol taxativo do art. 1° da Lei 7.960/89). Após o oferecimento da denúncia e início da ação penal, não se justifica mais, devendo ser substituída pela prisão preventiva, se cabível. CEBRASPE cobra a distinção entre temporária e preventiva pela fase processual em que cada uma cabe.","fund":"LEI: \"Lei 7.960/89, art. 1°: 'Caberá prisão temporária: I - quando imprescindível para as investigações do inquérito policial; II - quando o indicado não tiver residência fixa...; III - quando houver fundadas razões...' — circunscrita à fase investigatória.\"\nJURISPRUDÊNCIA: \"STJ, HC 370.736/SP (5ª Turma, 2016): a prisão temporária cessa automaticamente ao final do prazo fixado; não é cabível na fase processual, onde a cautelar adequada é a preventiva.\"","jur_status":"PENDENTE"},{"n":29,"enun":"O art. 282, §6° do CPP impõe ao juiz que antes de decretar a prisão preventiva verifique se as medidas cautelares diversas do art. 319 são insuficientes para o caso concreto, sob pena de nulidade.","gab":"CERTO","com":"O princípio da subsidiariedade da prisão preventiva, inserido pelo Pacote Anticrime no art. 282, §6° CPP, exige que o juiz fundamente a impossibilidade ou insuficiência das medidas cautelares diversas antes de decretar a preventiva. O 'sistema escalonado' impõe a prévia análise das 19 medidas do art. 319 CPP. A omissão dessa fundamentação torna a prisão preventiva ilegal.","fund":"LEI: \"CPP, art. 282, §6°: 'A prisão preventiva será determinada quando não for cabível a sua substituição por outra medida cautelar (art. 319).' — subsidiariedade expressa.\"\nJURISPRUDÊNCIA: \"STJ, HC 612.622/SP (6ª Turma, 2021): a preventiva exige fundamentação concreta sobre a insuficiência das cautelares diversas; decreto que ignora o art. 282, §6° é ilegal; concessão de habeas corpus.\"","jur_status":"PENDENTE"},{"n":30,"enun":"Conforme entendimento consolidado do STJ em 2025, a manutenção de prisão cautelar fundamentada exclusivamente na gravidade abstrata do crime ou na quantidade de pena cominada é ilegal.","gab":"CERTO","com":"O STJ, em reiteradas decisões e especialmente na consolidação de 2025 pela Sexta Turma, firmou que a fundamentação abstrata — baseada apenas na gravidade genérica do crime, na clamor público ou na quantidade de pena — não é suficiente para manter a prisão cautelar. Exige-se fundamentação concreta, individualizada e contemporânea, ligada às circunstâncias específicas do caso.","fund":"LEI: \"CPP, art. 315: 'A decisão que decretar, substituir ou denegar a prisão preventiva será sempre motivada e fundamentada.' — exigência de fundamentação concreta, não abstrata.\"\nJURISPRUDÊNCIA: \"STJ, Sexta Turma (2025): prisão cautelar mantida apenas com fundamento na gravidade do crime (abstrata) ou na pena imposta é ilegal; a fundamentação deve ser concreta, atual e individualizada ao caso.\"","peg":"Clamor público + gravidade abstrata = fundamentação INSUFICIENTE. Exige-se fato concreto e individualizado. Regra do STJ 2025."},{"n":31,"enun":"O flagrante esperado, em que a autoridade policial aguarda o momento da prática do crime sem induzir o agente, é válido e não se confunde com o flagrante preparado que gera crime impossível.","gab":"CERTO","com":"A distinção entre flagrante esperado e preparado é essencial: no esperado, a polícia tem conhecimento prévio do crime que vai ocorrer independentemente de sua atuação e apenas aguarda para prender o agente; no preparado (ou provocado), a polícia cria artificialmente a situação que torna a consumação impossível. A Súmula 145 STF só invalida o preparado; o esperado é plenamente lícito.","fund":"LEI: \"CPP, art. 302: modalidades de flagrante; CP, art. 17: crime impossível — base para invalidade do flagrante preparado.\"\nJURISPRUDÊNCIA: \"STF, Súmula 145: 'Não há crime quando a preparação do flagrante pela polícia torna impossível a sua consumação.' — aplicável apenas ao preparado; o flagrante esperado é válido (STJ, REsp 1.679.459/SP, 5ª Turma, 2017).\"","jur_status":"PENDENTE"},{"n":32,"enun":"A Súmula Vinculante 14 do STF assegura ao defensor, mesmo nos inquéritos sigilosos, o acesso aos elementos de prova já documentados nos autos, vedando apenas o acesso a diligências em curso.","gab":"CERTO","com":"A SV 14 STF garante o acesso amplo do defensor aos elementos já documentados no inquérito, ainda que decretado sigilo pelo juiz. O sigilo alcança apenas as diligências em andamento, protegendo sua eficácia investigatória. A restrição do advogado aos autos concluídos viola o contraditório diferido e a ampla defesa. Este é um ponto fixo de provas de Delegado porque integra a atividade diária no inquérito.","fund":"LEI: \"CF, art. 5°, LV: 'aos litigantes, em processo judicial ou administrativo, e aos acusados em geral são assegurados o contraditório e ampla defesa, com os meios e recursos a ela inerentes.'\"\nJURISPRUDÊNCIA: \"STF, Súmula Vinculante 14: 'É direito do defensor, no interesse do representado, ter acesso amplo aos elementos de prova que, já documentados em procedimento investigatório realizado por órgão com competência de polícia judiciária, digam respeito ao exercício do direito de defesa.'\"","jur_status":"OK"},{"n":33,"enun":"O prazo máximo da prisão temporária em crimes hediondos é de 60 dias (30 dias prorrogáveis por mais 30), enquanto nos crimes comuns é de 10 dias (5 dias prorrogáveis por mais 5).","gab":"CERTO","com":"A Lei 7.960/89 fixa o prazo de 5 dias prorrogável por mais 5 nos crimes comuns (total de 10 dias). A Lei 8.072/90 (Crimes Hediondos) prevê prazo de 30 dias prorrogável por mais 30 (total de 60 dias) para os crimes hediondos e equiparados. O vencimento do prazo sem prorrogação implica soltura imediata do preso. CEBRASPE cobra esses prazos com frequência.","fund":"LEI: \"Lei 7.960/89, art. 2°, §§3° e 4°: prazo de 5 dias, prorrogável por mais 5 nos crimes comuns. Lei 8.072/90, art. 2°, §4°: prazo de 30 dias, prorrogável por mais 30 nos crimes hediondos e equiparados.\"\nJURISPRUDÊNCIA: \"STJ, HC 350.742/SP (5ª Turma, 2016): vencido o prazo da prisão temporária sem prorrogação, o preso deve ser posto em liberdade imediatamente, salvo decretação de preventiva.\"","jur_status":"PENDENTE"},{"n":34,"enun":"No reconhecimento de pessoas, as formalidades do art. 226 do CPP são mera recomendação, podendo o juiz valorar o reconhecimento informal como prova suficiente para embasar condenação.","gab":"ERRADO","com":"O item contradiz a jurisprudência consolidada do STJ. No HC 598.886/SC (Schietti, 6ª Turma, 2020) e no Tema 1258 (REsp 1.953.602-SP, j. 11/06/2025), o STJ firmou que as formalidades do art. 226 CPP são obrigatórias, e o reconhecimento que não as observa é prova viciada que não pode, isoladamente, sustentar condenação. A inobservância não é causa automática de absolvição, mas o reconhecimento viciado não pode ser o único fundamento.","fund":"LEI: \"CPP, art. 226: 'Quando houver necessidade de fazer-se o reconhecimento de pessoa, proceder-se-á pela seguinte forma: I - a pessoa que tiver de fazer o reconhecimento será convidada a descrever a pessoa que deva ser reconhecida...' — formalidades obrigatórias, não facultativas.\"\nJURISPRUDÊNCIA: \"STJ, HC 598.886/SC (Schietti, 6ª Turma, j. 27/10/2020): reconhecimento sem as formalidades do art. 226 CPP é prova viciada; não pode fundamentar condenação isolada. STJ, Tema 1258 (REsp 1.953.602-SP, j. 11/06/2025): fixadas 6 teses sobre validade do reconhecimento.\"","peg":"STJ: formalidades do art. 226 CPP são OBRIGATÓRIAS. Reconhecimento informal = prova viciada, não embasamento isolado de condenação.","jur_status":"OK"},{"n":35,"enun":"A busca pessoal é válida sempre que o policial suspeite da prática de crime, independentemente de elementos objetivos que justifiquem a suspeita, em razão do poder geral de cautela da autoridade policial.","gab":"ERRADO","com":"O item contraria o entendimento do STJ. No RHC 158.580/BA (Schietti, 6ª Turma, 2022), o STJ firmou que a busca pessoal exige fundada suspeita prévia, objetiva e específica, não bastando a intuição policial ou o perfil subjetivo do abordado (raça, local, vestimenta genérica). A ausência de elementos concretos que justifiquem a suspeita torna a busca pessoal ilegal e a prova obtida, ilícita.","fund":"LEI: \"CPP, art. 240, §2°: 'Proceder-se-á à busca pessoal quando houver fundada suspeita de que alguém
