ão com competência de polícia judiciária, digam respeito ao exercício do direito de defesa.' | NOTA: O sigilo não abrange o acesso do advogado a elementos já colhidos — apenas a diligências pendentes pode ser restringido.","jur_status":"OK"},{"n":38,"enun":"A entrada forçada em domicílio, sem mandado judicial, durante o período noturno, é lícita quando fundamentada em fundadas razões justificadas objetivamente a posteriori, segundo o entendimento do STF no RE 603.616.","gab":"CERTO","com":"Certo. O STF, no RE 603.616 (Tema 280), admitiu a entrada forçada sem mandado quando houver fundadas razões, mesmo à noite, desde que devidamente justificadas a posteriori. O Delegado precisa dominar esse julgado porque ele baliza o uso das prerrogativas policiais sem mandado.","fund":"JURISPRUDÊNCIA: 'STF, Tema 280 / RE 603.616/RO (Gilmar Mendes, Pleno, j. 05/11/2015): A entrada forçada em domicílio sem mandado judicial apenas é lícita, mesmo em período noturno, quando amparada em fundadas razões, devidamente justificadas a posteriori, que indiquem que dentro da casa ocorre situação de flagrante delito.'","peg":"RE 603.616: lícita SEM mandado com fundadas razões justificadas A POSTERIORI. Mas STJ (RHC 213.070): denúncia anônima exige diligências prévias antes da entrada. Atenção à distinção.","jur_status":"OK"},{"n":39,"enun":"A prisão em flagrante pode ser efetuada por qualquer pessoa, nas hipóteses de flagrante próprio ou impróprio, constituindo-se em dever dos agentes policiais e mera faculdade dos particulares.","gab":"CERTO","com":"Certo. O CPP distingue: para o policial (autoridade policial e seus agentes), a prisão em flagrante é dever funcional; para o particular, é poder-faculdade (pode, mas não é obrigado). O flagrante pode ser próprio (durante o crime), impróprio (logo após, sendo perseguido) ou presumido (encontrado logo depois com instrumentos do crime).","fund":"LEI: 'Art. 301, CPP: Qualquer do povo poderá e as autoridades policiais e seus agentes deverão prender quem quer que seja encontrado em flagrante delito.' | NOTA: Flagrante próprio: art. 302, I e II CPP; impróprio: art. 302, III CPP; presumido: art. 302, IV CPP."},{"n":40,"enun":"O uso de algemas durante o cumprimento de mandado de prisão é autorizado pela Súmula Vinculante n.º 11 do STF, desde que haja resistência do preso, fundado receio de fuga ou perigo à integridade física do preso ou de terceiros, devendo a ocorrência ser justificada por escrito.","gab":"CERTO","com":"Certo. A SV 11 não proíbe algemas — apenas regulamenta seu uso. Três hipóteses autorizam o uso: resistência, risco de fuga e perigo à integridade. A autoridade deve registrar por escrito os motivos. O uso sem justificativa ou em situação desnecessária pode gerar responsabilidade.","fund":"JURISPRUDÊNCIA: 'Súmula Vinculante 11 STF: Só é lícito o uso de algemas em casos de resistência e de fundado receio de fuga ou de perigo à integridade física própria ou alheia, por parte do preso ou de terceiros, justificada a excepcionalidade por escrito, sob pena de responsabilidade disciplinar, civil e penal do agente ou da autoridade e de nulidade da prisão ou do ato processual a que se refere, sem prejuízo da responsabilidade civil do Estado.'","jur_status":"OK"},{"n":41,"enun":"As provas obtidas por meios ilícitos são inadmissíveis no processo penal, sendo igualmente inadmissíveis as chamadas provas ilícitas por derivação, salvo quando não evidenciado o nexo de causalidade entre a ilicitude e a prova derivada.","gab":"CERTO","com":"Certo. A teoria dos frutos da árvore envenenada (fruits of the poisonous tree) foi incorporada ao CPP pelo art. 157, §1º. A prova derivada é ilícita, exceto quando: (a) não há nexo causal com a ilicitude; (b) poderiam ter sido obtidas por fonte independente (independent source doctrine); (c) descoberta inevitável.","fund":"LEI: 'Art. 157, CPP: São inadmissíveis, devendo ser desentranhadas do processo, as provas ilícitas, assim entendidas as obtidas em violação a normas constitucionais ou legais.' / §1º: 'São também inadmissíveis as provas derivadas das ilícitas, salvo quando não evidenciado o nexo de causalidade entre umas e outras, ou quando as derivadas puderem ser obtidas por uma fonte independente das primeiras.'"},{"n":42,"enun":"A transferência de preso para presídio federal de segurança máxima sem prévia oitiva do detento não ofende o princípio do contraditório, segundo a Súmula 673 do STJ.","gab":"CERTO","com":"Certo. A Súmula 673 STJ consagra que a urgência e as razões de segurança pública justificam a transferência antes da oitiva. O contraditório será exercido após a transferência — diferido, não suprimido. É uma situação de contraditório postecipado por necessidade.","fund":"JURISPRUDÊNCIA: 'Súmula 673 STJ: A transferência de preso para presídio federal de segurança máxima independe de prévia manifestação do Poder Judiciário e não ofende o princípio do contraditório.' | DOUTRINA: 'Contraditório diferido: a oitiva é realizada após a medida urgente, sem que haja supressão do direito.'","jur_status":"OK"},{"n":43,"enun":"Segundo a Súmula 444 do STJ, o juiz pode utilizar o inquérito policial e as ações penais em curso para fundamentar o aumento da pena-base do réu na dosimetria.","gab":"ERRADO","com":"Errado. A Súmula 444 STJ veda expressamente o uso de IP e ACP em curso para agravar a pena-base — pois não há condenação, e a presunção de inocência impede que meros procedimentos aumentem a pena. Apenas condenações com trânsito em julgado servem de fundamento para maus antecedentes.","fund":"JURISPRUDÊNCIA: 'Súmula 444 STJ (j. 28/04/2010): É vedada a utilização de inquéritos policiais e ações penais em curso para agravar a pena-base.' | NOTA: STF também adota essa posição (RE 591.054, Pleno, RG) — maus antecedentes exigem condenação transitada em julgado.","peg":"IP e ACP em curso = neutros para fins de dosimetria (S. 444 STJ). Só condenações com TJ contam como maus antecedentes.","jur_status":"OK"},{"n":44,"enun":"O interrogatório do réu, no processo penal, constitui meio de defesa, razão pela qual o acusado não é obrigado a responder às perguntas formuladas, sendo-lhe assegurado o direito ao silêncio sem que isso possa ser usado contra ele.","gab":"CERTO","com":"Certo. O interrogatório é meio de defesa (não meio de prova) — o réu exerce seu direito de se defender ou calar. O silêncio não pode ser interpretado como confissão ou circunstância desfavorável. É o nemo tenetur se detegere, corolário do devido processo legal.","fund":"LEI: 'Art. 5º, LXIII, CF/88: o preso será informado de seus direitos, entre os quais o de permanecer calado, sendo-lhe assegurada a assistência da família e de advogado.' / 'Art. 186, CPP: Depois de devidamente qualificado e cientificado do inteiro teor da acusação, o acusado será informado pelo juiz, antes de iniciar o interrogatório, do seu direito de permanecer calado e de não responder perguntas que lhe forem formuladas.' / Parágrafo único: 'O silêncio, que não importará em confissão, não poderá ser interpretado em prejuízo da defesa.'"},{"n":45,"enun":"Nos crimes de ação penal privada personalíssima, a legitimidade para propor a queixa-crime pertence exclusivamente à vítima, não se transmitindo a seus sucessores mesmo após o falecimento, ocasião em que se extingue a punibilidade.","gab":"CERTO","com":"Certo. A ação penal privada personalíssima é a mais restritiva: apenas a vítima pode oferecer a queixa — não há transmissão aos herdeiros, ao representante legal nem ao cônjuge. Com a morte da vítima, extingue-se a punibilidade (art. 107, I, CP). Hoje, o único exemplo prático no CP é o induzimento a erro essencial ou ocultação de impedimento matrimonial (art. 236 CP).","fund":"LEI: 'Art. 236, CP: Contrair casamento, induzindo em erro essencial o outro contraente, ou ocultando-lhe impedimento que não seja casamento anterior: [...] Parágrafo único: a ação penal depende de queixa do contraente enganado e não pode ser intentada senão depois de transitar em julgado a sentença que, por motivo de erro ou impedimento, anule o casamento.' | DOUTRINA: 'Ação personalíssima: a queixa pertence exclusivamente à vítima — não se transmite a herdeiros nem há substituição processual.'"},{"n":46,"enun":"A citação por edital no processo penal, quando o réu não é encontrado, não suspende o prazo prescricional, apenas autoriza o prosseguimento do feito com a nomeação de defensor dativo.","gab":"ERRADO","com":"Errado. A citação por edital, quando o réu não comparecer nem constituir defensor, suspende o processo E o prazo prescricional (art. 366 CPP). Não se prossegue com defensor dativo automaticamente — o processo fica suspenso. A nomeação de defensor dativo para acompanhar atos urgentes é possível, mas o processo principal fica paralisado.","fund":"LEI: 'Art. 366, CPP: Se o acusado, citado por edital, não comparecer, nem constituir advogado, ficarão suspensos o processo e o curso do prazo prescricional, podendo o juiz determinar a produção antecipada das provas consideradas urgentes e, se for o caso, decretar prisão preventiva...' | NOTA: O processo retoma quando o réu se apresentar ou for citado pessoalmente.","peg":"Citação por edital sem comparecimento = suspensão do processo E da prescrição (art. 366 CPP). Não é prosseguimento com dativo — é paralisação."}]},{"nome":"Direito Constitucional e Legislação Complementar","comando":"Acerca dos direitos e garantias fundamentais, organização do Estado e controle de constitucionalidade, julgue os itens a seguir.","itens":[{"n":47,"enun":"O direito à vida, previsto no art. 5.º, caput, da CF/88, é absoluto e não comporta qualquer restrição por norma infraconstitucional ou mesmo por norma constitucional.","gab":"ERRADO","com":"Errado. A própria CF/88 prevê exceção ao direito à vida: a pena de morte em caso de guerra declarada (art. 5º, XLVII, 'a'). Nenhum direito fundamental é absoluto — todos admitem ponderação. A CF admite a morte como consequência jurídica em hipótese específica.","fund":"LEI: 'Art. 5º, caput, CF: garantindo-se aos brasileiros e aos estrangeiros residentes no País a inviolabilidade do direito à vida...' / 'Art. 5º, XLVII, a, CF: não haverá penas de: morte, salvo em caso de guerra declarada, nos termos do art. 84, XIX.' | DOUTRINA: 'Robert Alexy: direitos fundamentais são mandados de otimização — não são absolutos, mas devem ser realizados na máxima medida do possível.'","peg":"Direito à vida não é absoluto: a CF prevê pena de morte em guerra declarada. Questão que afirme absoluto está ERRADA."},{"n":48,"enun":"O STF, no julgamento da ADC 41, declarou constitucional a política de cotas raciais em concursos públicos federais, reconhecendo que tais medidas afirmativas representam instrumento de igualdade material compatível com o princípio do mérito.","gab":"CERTO","com":"Certo. Na ADC 41 (2017), o STF por unanimidade declarou constitucional a reserva de vagas para negros em concursos federais (Lei 12.990/2014). A decisão consagrou que igualdade material exige tratar desigualmente os desiguais — as cotas corrigem desigualdades históricas sem violar o mérito.","fund":"JURISPRUDÊNCIA: 'STF, ADC 41/DF (Pleno, j. 08/06/2017, rel. Min. Roberto Barroso): As cotas raciais em concursos públicos são constitucionais. As políticas de ação afirmativa baseadas em critério racial são legítimas e constitucionais quando têm como objetivo corrigir desigualdades históricas.' | LEI: 'Lei 12.990/2014: reserva de 20% das vagas em concursos públicos federais para candidatos negros.'","jur_status":"PENDENTE"},{"n":49,"enun":"A eficácia horizontal dos direitos fundamentais significa que esses direitos vinculam não apenas o Estado, mas também as relações entre particulares, sendo aplicada de forma direta pelo STF.","gab":"CERTO","com":"Certo. O STF adota a teoria da eficácia horizontal direta (Drittwirkung): os direitos fundamentais irradiam-se sobre as relações privadas sem necessidade de mediação legislativa. Exemplo: exclusão de associado sem contraditório viola o devido processo (RE 201.819). O Estado não é o único destinatário dos direitos fundamentais.","fund":"JURISPRUDÊNCIA: 'STF, RE 201.819/RJ (2ª T., j. 11/10/2005, rel. Min. Gilmar Mendes): violação ao contraditório e à ampla defesa na exclusão de sócio de entidade privada. Os direitos fundamentais produzem eficácia direta sobre relações entre particulares.' | DOUTRINA: 'Drittwirkung (teoria alemã da eficácia perante terceiros): incorporada pelo STF na jurisprudência sobre relações associativas e trabalhistas.'","jur_status":"PENDENTE"},{"n":50,"enun":"A expressão 'residentes no País', constante do art. 5.º, caput, da CF/88, é interpretada de forma restritiva pelo STF, de modo que estrangeiros em situação de visita turística não são titulares dos direitos fundamentais nele previstos.","gab":"ERRADO","com":"Errado. O STF adota interpretação extensiva: todos os que se encontrem no território brasileiro — inclusive estrangeiros em trânsito, turistas ou indocumentados — são titulares dos direitos fundamentais do art. 5º. A expressão é resquício histórico da Constituição de 1967 e não deve ser lida de forma excludente.","fund":"DOUTRINA/STF: 'A expressão residentes no País não restringe os direitos fundamentais aos estrangeiros residentes — por interpretação sistêmica com o art. 1º, III (dignidade da pessoa humana), os direitos do art. 5º aplicam-se a toda pessoa humana em território brasileiro' (posição doutrinária majoritária e adotada pelo STF em suas decisões sobre habeas corpus de estrangeiros em trânsito).","peg":"'Residentes no País' ≠ exclui turistas. STF: interpretação extensiva — toda pessoa em território brasileiro é titular dos direitos do art. 5º."},{"n":51,"enun":"O mandado de segurança é cabível para proteger direito líquido e certo, não amparado por habeas corpus ou habeas data, quando o responsável pela ilegalidade ou abuso de poder for autoridade pública ou agente de pessoa jurídica no exercício de atribuições do Poder Público.","gab":"CERTO","com":"Certo. O MS protege direito certo e incontestável — não precisa de dilação probatória. A autoridade coatora pode ser pública ou particular no exercício de função pública delegada. Habeas corpus protege locomoção; habeas data protege informações pessoais; mandado de injunção protege contra omissão legislativa.","fund":"LEI: 'Art. 5º, LXIX, CF: conceder-se-á mandado de segurança para proteger direito líquido e certo, não amparado por habeas corpus ou habeas data, quando o responsável pela ilegalidade ou abuso de poder for autoridade pública ou agente de pessoa jurídica no exercício de atribuições do Poder Público.' | LEI: 'Lei 12.016/2009: disciplina o mandado de segurança individual e coletivo.'"},{"n":52,"enun":"O habeas corpus pode ser utilizado para trancamento de ação penal manifestamente inepta ou quando for evidente que o fato narrado não constitui crime, segundo jurisprudência consolidada do STJ e do STF.","gab":"CERTO","com":"Certo. O trancamento de ação penal via habeas corpus é cabível em hipóteses excepcionais: atipicidade manifesta, ausência de justa causa ou extinção da punibilidade evidente. Trata-se de uso indireto do HC para proteger a liberdade — ainda que não haja prisão, o processo em si representa constrangimento à liberdade de locomoção.","fund":"LEI: 'Art. 5º, LXVIII, CF: conceder-se-á habeas corpus sempre que alguém sofrer ou se achar ameaçado de sofrer violência ou coação em sua liberdade de locomoção, por ilegalidade ou abuso de poder.' | JURISPRUDÊNCIA: 'STJ (posição consolidada): o trancamento de ação penal por habeas corpus é admissível quando há atipicidade manifesta, falta de justa causa evidente ou extinção da punibilidade — hipóteses de cognição sumária excepcional.'"},{"n":53,"enun":"A inviolabilidade de domicílio prevista no art. 5.º, XI, da CF/88 cede nas hipóteses taxativas de flagrante delito, desastre, prestação de socorro e, durante o dia, em cumprimento de determinação judicial.","gab":"CERTO","com":"Certo. O art. 5º, XI prevê as quatro exceções ao princípio da inviolabilidade domiciliar. Para o delegado: a entrada noturna sem mandado só é lícita nas hipóteses de flagrante, desastre ou socorro — a execução de mandado judicial em residência apenas pode ocorrer durante o dia.","fund":"LEI: 'Art. 5º, XI, CF: a casa é asilo inviolável do indivíduo, ninguém nela podendo penetrar sem consentimento do morador, salvo em caso de flagrante delito ou desastre, ou para prestar socorro, ou, durante o dia, por determinação judicial.' | JURISPRUDÊNCIA: 'STF, RE 603.616 (Tema 280): entrada forçada sem mandado — lícita com fundadas razões justificadas a posteriori, mesmo à noite, quando flagrante.'"},{"n":54,"enun":"O Supremo Tribunal Federal, no controle difuso de constitucionalidade, exerce competência apenas em sede de recurso extraordinário, não podendo declarar incidentalmente a inconstitucionalidade de norma em sede de habeas corpus ou mandado de segurança.","gab":"ERRADO","com":"Errado. No controle difuso, qualquer juiz ou tribunal pode declarar a inconstitucionalidade incidentalmente em qualquer processo, inclusive habeas corpus, mandado de segurança, ação ordinária etc. O controle difuso não se limita ao recurso extraordinário — este é apenas o caminho para levar a questão ao STF.","fund":"LEI: 'Art. 97, CF: Somente pelo voto da maioria absoluta de seus membros ou dos membros do respectivo órgão especial poderão os tribunais declarar a inconstitucionalidade de lei ou ato normativo do Poder Público.' | DOUTRINA: 'No controle difuso (americano), a inconstitucionalidade é declarada incidentalmente como questão prejudicial em qualquer demanda. O RE ao STF é a via de acesso, não condição para o controle.'"},{"n":55,"enun":"O Conselho Nacional de Justiça (CNJ) é órgão do Poder Judiciário com atribuição de controle administrativo, financeiro e disciplinar de magistrados e servidores, sem exercer funções jurisdicionais.","gab":"CERTO","com":"Certo. O CNJ não tem competência jurisdicional — é órgão de controle administrativo do Judiciário. Ele pode rever atos, aplicar sanções disciplinares e avocas processos administrativos, mas não pode reformar decisões judiciais. Sua constitucionalidade foi declarada pelo STF na ADI 3.367.","fund":"LEI: 'Art. 103-B, CF/88: O Conselho Nacional de Justiça compõe-se de quinze membros... (controle da atuação administrativa e financeira do Poder Judiciário e do cumprimento dos deveres funcionais dos juízes).' | JURISPRUDÊNCIA: 'STF, ADI 3.367/DF (Peluso, Pleno, j. 13/04/2005): o CNJ é órgão constitucional cujas funções de controle externo do Judiciário são compatíveis com a independência do Poder.'","jur_status":"OK"},{"n":56,"enun":"A ação direta de inconstitucionalidade por omissão (ADO) tem como objetivo suprir a mora do legislador quando a ausência de norma regulamentadora torna inviável o exercício de direitos constitucionais, podendo o STF, em caso de omissão total, fixar prazo para que o órgão elabore a norma.","gab":"CERTO","com":"Certo. A ADO (art. 103, §2º, CF) destina-se a combater a síndrome de inefetividade das normas constitucionais. O STF pode dar ciência ao Poder Legislativo (prazo razoável) ou, tratando-se de órgão administrativo, determinar que suprima a omissão em 30 dias.","fund":"LEI: 'Art. 103, §2º, CF: Declarada a inconstitucionalidade por omissão de medida para tornar efetiva norma constitucional, será dada ciência ao Poder competente para a adoção das providências necessárias e, em se tratando de órgão administrativo, para fazê-lo em trinta dias.' | DOUTRINA: 'ADO ≠ Mandado de Injunção: a ADO tem efeitos erga omnes; o MI, em regra, tem efeitos apenas para o impetrante (posição STF após superação da não concretista).'"},{"n":57,"enun":"No julgamento da ADPF 54, o STF declarou inconstitucional a interpretação que criminalizava a interrupção da gravidez de feto anencéfalo, reconhecendo que tal conduta não se subsume ao tipo penal do aborto.","gab":"CERTO","com":"Certo. Em 2012, o STF julgou a ADPF 54 e declarou inconstitucional a incidência dos arts. 124 e 126 CP sobre a interrupção da gravidez de feto anencéfalo. O fundamento foi o direito à saúde, à dignidade da gestante e à autonomia sobre o próprio corpo. A decisão tem eficácia erga omnes.","fund":"JURISPRUDÊNCIA: 'STF, ADPF 54/DF (Britto, Pleno, j. 12/04/2012): É inconstitucional a interpretação segundo a qual a interrupção da gravidez de feto anencéfalo é conduta tipificada nos arts. 124, 126, 128, I e II, do CP. Os arts. 124 e 126 do CP — que criminalizam o aborto — não alcançam a conduta da gestante que, diante de feto anencéfalo, opta pela antecipação terapêutica do parto.'","jur_status":"OK"},{"n":58,"enun":"O STF, no RE 466.343, firmou que os tratados internacionais de direitos humanos aprovados sem quórum qualificado têm status de lei ordinária federal no ordenamento jurídico brasileiro.","gab":"ERRADO","com":"Errado. No RE 466.343 (2008), o STF fixou que os tratados de direitos humanos aprovados sem o quórum qualificado do art. 5º, §3º (3/5 em dois turnos) têm STATUS SUPRALEGAL — acima das leis ordinárias, mas abaixo da Constituição. Foi esse entendimento que fundamentou a vedação à prisão civil do depositário infiel.","fund":"JURISPRUDÊNCIA: 'STF, RE 466.343/SP (Peluso, Pleno, j. 03/12/2008): Os tratados e convenções internacionais sobre direitos humanos, se não incorporados na forma do art. 5º, §3º, CF, têm status supralegal, paralisando a eficácia de legislação infraconstitucional incompatível.' / 'Súmula Vinculante 25: É ilícita a prisão civil de depositário infiel, qualquer que seja a modalidade do depósito.'","peg":"Tratados DH sem quórum qualificado = SUPRALEGAL (acima da lei, abaixo da CF). Aprovados com quórum do art. 5º, §3º = nível CONSTITUCIONAL. Ordinária nunca.","jur_status":"OK"},{"n":59,"enun":"O princípio da vedação ao anonimato, previsto no art. 5.º, IV, da CF/88, proíbe de forma absoluta o uso de denúncias anônimas no processo penal, tornando ilícita qualquer investigação iniciada com base nessas informações.","gab":"ERRADO","com":"Errado. A CF veda o anonimato como forma de exercício de direito de manifestação, mas não proíbe que denúncias anônimas sirvam como ponto de partida para investigações policiais. O que se veda é a admissão da denúncia anônima isolada como prova ou fundamento exclusivo para atos invasivos.","fund":"JURISPRUDÊNCIA: 'STJ, RHC 213.070/SP (2022): denúncia anônima, por si só, não autoriza a entrada em residência — exige diligências prévias para corroborar as informações antes de qualquer medida invasiva.' | DOUTRINA: 'A vedação ao anonimato (art. 5º, IV, CF) não impede o início de investigações policiais com base em delação anônima — impede apenas que a denúncia anônima fundamente isoladamente medidas restritivas.'","peg":"Denúncia anônima PODE iniciar investigação, mas NÃO justifica, isolada, entrada em domicílio ou medidas invasivas. Diligências prévias são obrigatórias.","jur_status":"PENDENTE"},{"n":60,"enun":"A imunidade parlamentar material (inviolabilidade) dos deputados federais e senadores, prevista no art. 53 da CF/88, protege opiniões, palavras e votos manifestados em qualquer lugar, desde que haja nexo com o exercício do mandato.","gab":"CERTO","com":"Certo. A imunidade material (real) é absoluta no âmbito das manifestações realizadas dentro do Congresso. Fora do Parlamento, exige-se nexo com o exercício do mandato. O STF consolidou que a imunidade se estende a opiniões em entrevistas, redes sociais e eventos, desde que haja pertinência temática com a atividade parlamentar.","fund":"LEI: 'Art. 53, CF: Os Deputados e Senadores são invioláveis, civil e penalmente, por quaisquer de suas opiniões, palavras e votos.' | JURISPRUDÊNCIA: 'STF (posição consolidada): fora do Congresso, a imunidade material exige nexo de causalidade entre a declaração e o exercício do mandato — ausente o nexo, não há inviolabilidade.'"},{"n":61,"enun":"O direito à igualdade perante a lei, previsto no art. 5.º, caput, da CF/88, deve ser compreendido apenas em sua dimensão formal, sendo vedado ao Estado adotar políticas de ação afirmativa com base em critérios raciais ou de gênero.","gab":"ERRADO","com":"Errado. A CF adota tanto a igualdade formal quanto a material. A igualdade material exige tratamento diferenciado para corrigir desigualdades históricas e estruturais. Políticas de ação afirmativa — cotas raciais, cotas para PcD, reserva de vagas para mulheres — são constitucionalmente legítimas conforme STF.","fund":"LEI: 'Art. 5º, caput, CF: Todos são iguais perante a lei...' / 'Art. 3º, III, CF: constituem objetivos fundamentais da República Federativa do Brasil: III — erradicar a pobreza e a marginalização e reduzir as desigualdades sociais e regionais.' | JURISPRUDÊNCIA: 'STF, ADPF 186 (cotas UERJ, 2012) e ADC 41 (cotas em concursos federais, 2017): ações afirmativas são constitucionais.'"},{"n":62,"enun":"O habeas data tem por finalidade assegurar o conhecimento de informações relativas à pessoa do impetrante constantes de registros ou bancos de dados de entidades governamentais ou de caráter público.","gab":"CERTO","com":"Certo. O habeas data protege a autodeterminação informativa: acesso, retificação e complementação de dados pessoais em registros públicos ou de acesso coletivo. Diferencia-se do mandado de segurança (ilegalidade geral) e do direito de petição (pedidos em geral).","fund":"LEI: 'Art. 5º, LXXII, CF: conceder-se-á habeas data: a) para assegurar o conhecimento de informações relativas à pessoa do impetrante, constantes de registros ou bancos de dados de entidades governamentais ou de caráter público; b) para a retificação de dados, quando não se prefira fazê-lo por processo sigiloso, judicial ou administrativo.' | Lei 9.507/1997: regulamenta o habeas data."},{"n":63,"enun":"Segundo o STF, o controle de constitucionalidade concentrado exercido pelo Supremo Tribunal Federal produz eficácia erga omnes e efeito vinculante em relação ao Poder Executivo e ao Poder Judiciário, mas não vincula o próprio STF, que pode rever sua jurisprudência.","gab":"CERTO","com":"Certo. O efeito vinculante da ADI/ADC/ADPF alcança os demais órgãos do Executivo e Judiciário — mas o próprio STF não fica vinculado à sua decisão anterior, podendo superá-la (overruling). O STF pode e deve revisar suas posições quando a realidade social ou a interpretação jurídica justificarem a mudança.","fund":"LEI: 'Art. 102, §2º, CF: As decisões definitivas de mérito, proferidas pelo STF, nas ações diretas de inconstitucionalidade e nas ações declaratórias de constitucionalidade produzirão eficácia contra todos e efeito vinculante, relativamente aos demais órgãos do Poder Judiciário e à administração pública direta e indireta, nas esferas federal, estadual e municipal.' | NOTA: O STF não fica vinculado à sua própria decisão — pode superá-la por overruling.","peg":"Efeito vinculante vincula Executivo e demais órgãos do Judiciário — MAS NÃO o próprio STF, que pode fazer overruling."},{"n":64,"enun":"A Constituição Federal de 1988 prevê a possibilidade de intervenção federal nos estados quando estes não pagarem, por dois anos consecutivos, dívida fundada com a União, desde que não se configure força maior.","gab":"CERTO","com":"Certo. A intervenção federal é instrumento excepcional de manutenção da unidade federativa. O art. 34, V, CF autoriza a intervenção quando o estado se recusar a pagar dívida fundada com a União por dois anos consecutivos, salvo caso de força maior.","fund":"LEI: 'Art. 34, V, CF: A União não intervirá nos Estados nem no Distrito Federal, exceto para: V — reorganizar as finanças da unidade da Federação que: a) suspender o pagamento da dívida fundada por mais de dois anos consecutivos, salvo motivo de força maior.' | NOTA: A intervenção é sempre medida extrema e temporária — suspende-se a autonomia estadual em prol da unidade nacional."}]},{"nome":"Direito Administrativo e Legislação Complementar","comando":"Acerca dos atos administrativos, controle da administração e responsabilidade do Estado, julgue os itens a seguir.","itens":[{"n":65,"enun":"Os atos administrativos possuem cinco elementos ou requisitos de validade, segundo a doutrina clássica adotada pela CEBRASPE: competência, forma, finalidade, motivo e objeto.","gab":"CERTO","com":"Certo. O mnemônico CO-FO-FI-MO-OB resume os cinco elementos: Competência (quem pode), Forma (como deve ser exteriorizado), Finalidade (resultado de interesse público visado), Motivo (pressuposto fático e jurídico) e Objeto (conteúdo do ato). Ausência ou vício em qualquer deles invalida o ato.","fund":"DOUTRINA: 'Hely Lopes Meirelles (Direito Administrativo Brasileiro): os elementos do ato administrativo são: sujeito competente (competência), forma (modo de exteriorização), finalidade (resultado de interesse público), motivo (pressuposto fático e jurídico) e objeto (conteúdo imediato do ato).' | NOTA: Para CEBRASPE, os cinco elementos são os da classificação de Hely — atenção a autores que utilizam terminologias diferentes (ex.: alguns chamam competência de 'sujeito')."},{"n":66,"enun":"A teoria dos motivos determinantes impõe que, uma vez declarado o motivo do ato administrativo, ainda que discricionário, este fique vinculado ao motivo declarado, tornando-se inválido caso o motivo seja falso, inexistente ou juridicamente inadequado.","gab":"CERTO","com":"Certo. Ao declinar o motivo, a Administração se autovincul — se o motivo for falso ou inexistente, o ato perde sua legitimidade. É como um contratante que assina um distrato afirmando certa razão: se a razão for comprovadamente falsa, o distrato pode ser anulado. Vale especialmente para atos de exoneração ad nutum com motivação.","fund":"JURISPRUDÊNCIA: 'STJ (posição consolidada): nos atos discricionários em que a Administração declara a motivação, ela fica vinculada a ela. Se o motivo declarado é falso ou inexistente, o ato é nulo pela teoria dos motivos determinantes, independentemente da discricionariedade.' | LEI: 'Art. 50, Lei 9.784/99: Os atos administrativos deverão ser motivados com indicação dos fatos e dos fundamentos jurídicos, quando: I — neguem, limitem ou afetem direitos ou interesses.'","peg":"Ato discricionário SEM declaração de motivo pode ser válido. Ato discricionário COM motivação declarada fica vinculado ao motivo — motivo falso = nulidade."},{"n":67,"enun":"A autoexecutoriedade, atributo que permite à Administração executar diretamente seus atos sem necessidade de autorização judicial prévia, está presente em todos os atos administrativos.","gab":"ERRADO","com":"Errado. A autoexecutoriedade NÃO é atributo universal — apenas existe quando há previsão legal expressa ou quando há urgência que impossibilite a espera da tutela judicial. A cobrança de multas administrativas, por exemplo, não é autoexecutável — requer inscrição em dívida ativa e execução fiscal.","fund":"DOUTRINA: 'Celso Antônio Bandeira de Mello (Curso de Direito Administrativo): a autoexecutoriedade (executividade) não é atributo de todos os atos administrativos — está presente apenas nos casos em que a lei a prevê expressamente ou em situações de urgência. A cobrança de multas depende de execução judicial.' | NOTA: CEBRASPE costuma afirmar que 'autoexecutoriedade está presente em todos os atos' como armadilha → ERRADO.","peg":"Autoexecutoriedade: presente quando lei prevê OU urgência. AUSENTE em: cobrança de multas, indenizações pecuniárias. Afirmação de que 'é atributo universal' → ERRADO."},{"n":68,"enun":"A presunção de legitimidade dos atos administrativos é relativa (juris tantum), razão pela qual o ônus de provar o vício ou ilegalidade do ato recai sobre o particular que o impugna.","gab":"CERTO","com":"Certo. A presunção de legitimidade (ou legalidade) é juris tantum — admite prova em contrário. Por isso, quem alega a ilegalidade do ato deve prová-la. A Administração não precisa demonstrar a validade do ato para que ele produza efeitos imediatos. O particular deve construir sua tese de nulidade.","fund":"DOUTRINA: 'Hely Lopes Meirelles: a presunção de legalidade dos atos administrativos não é absoluta (juris et de jure) — é relativa (juris tantum). Cabe ao interessado impugná-la com elementos probatórios que demonstrem o vício.' | JURISPRUDÊNCIA: 'STJ (posição iterativa): a presunção de validade do ato administrativo milita a favor da Administração — quem alega o vício tem o ônus da prova.'"},{"n":69,"enun":"A anulação do ato administrativo pode ser promovida tanto pela Administração Pública, em exercício do poder de autotutela, quanto pelo Poder Judiciário, produzindo efeitos retroativos (ex tunc), enquanto a revogação produz efeitos prospectivos (ex nunc) e somente pode ser realizada pela Administração.","gab":"CERTO","com":"Certo. Anulação (vício de legalidade): retroage para apagar o ato desde a origem — como se ele nunca tivesse existido. Revogação (conveniência e oportunidade): eficácia ex nunc, preserva os efeitos passados. Apenas a Administração pode revogar — o Judiciário não controla o mérito administrativo.","fund":"JURISPRUDÊNCIA: 'Súmula 473 STJ: A Administração pode anular seus próprios atos quando eivados de vícios que os tornem ilegais, porque deles não se originam direitos; ou revogá-los, por motivo de conveniência ou oportunidade, respeitados os direitos adquiridos e ressalvada, em todos os casos, a apreciação judicial.' | NOTA: O Judiciário ANULA (legalidade), mas NUNCA revoga (mérito é discricionário da Administração).","peg":"Judiciário: só anula (legalidade). Administração: anula E revoga. Efeitos: anulação (ex tunc) × revogação (ex nunc). Questão que diga 'judiciário pode revogar' → ERRADO.","jur_status":"PENDENTE"},{"n":70,"enun":"O STJ, por meio da Súmula 665, publicada em 2024, firmou que é possível o controle judicial do ato administrativo discricionário quanto à proporcionalidade e à razoabilidade, sem que isso implique invasão do mérito administrativo.","gab":"CERTO","com":"Certo. A Súmula 665/STJ consagra o controle jurisdicional ampliado dos atos discricionários: o juiz pode verificar se o ato está dentro dos limites da proporcionalidade e razoabilidade, sem substituir a escolha administrativa. É o controle de juridicidade — garantia contra arbitrariedades.","fund":"JURISPRUDÊNCIA: 'Súmula 665 STJ (2024): É possível o controle judicial do ato administrativo discricionário quanto à proporcionalidade e à razoabilidade, sem invasão do mérito administrativo.' | DOUTRINA: 'O controle de legalidade em sentido amplo (juridicidade) abarca proporcionalidade e razoabilidade — sem que o Judiciário substitua a valoração administrativa.'","peg":"S. 665 STJ (novidade 2024): controle por proporcionalidade/razoabilidade ≠ invasão do mérito. CEBRASPE tende a cobrar súmulas recentes imediatamente após a publicação.","jur_status":"PENDENTE"},{"n":71,"enun":"A responsabilidade civil do Estado por atos de seus agentes é objetiva, na modalidade risco administrativo, bastando ao particular demonstrar o nexo causal entre a conduta do agente e o dano sofrido, independentemente de culpa.","gab":"CERTO","com":"Certo. A teoria do risco administrativo (art. 37, §6º, CF) dispensa a prova de culpa ou dolo do agente — basta nexo causal e dano. A Administração pode excluir ou mitigar a responsabilidade demonstrando culpa exclusiva da vítima, caso fortuito ou força maior (excludentes de nexo causal).","fund":"LEI: 'Art. 37, §6º, CF: As pessoas jurídicas de direito público e as de direito privado prestadoras de serviços públicos responderão pelos danos que seus agentes, nessa qualidade, causarem a terceiros, assegurado o direito de regresso contra o responsável nos casos de dolo ou culpa.' | JURISPRUDÊNCIA: 'STF, RE 591.874/MS (Lewandowski, Pleno, j. 26/08/2009): responsabilidade objetiva das concessionárias frente a não-usuários.'","jur_status":"OK"},{"n":72,"enun":"A improbidade administrativa, após as modificações introduzidas pela Lei n.º 14.230/2021, passou a exigir a comprovação de dolo para a configuração de qualquer das modalidades de atos de improbidade, afastando a modalidade culposa.","gab":"CERTO","com":"Certo. A Lei 14.230/2021 extinguiu a modalidade culposa de improbidade — agora, todas as modalidades (enriquecimento ilícito, lesão ao erário, atentado aos princípios) exigem DOLO. A alteração foi reconhecida pelo STF como aplicável retroativamente às ações em curso (lei mais benéfica).","fund":"LEI: 'Art. 1º, §1º, Lei 8.429/92 (redação da Lei 14.230/2021): Consideram-se atos de improbidade administrativa as condutas dolosas tipificadas nos arts. 9, 10 e 11 desta lei, ressalvados tipos culposos expressamente previstos em lei.' | JURISPRUDÊNCIA: 'STJ (Tema 1199) e STF: a Lei 14.230/2021 retroage para alcançar situações anteriores, excluindo atos culposos anteriores já em curso.'","peg":"Improbidade pós-2021 = sempre DOLOSA. Não existe mais modalidade culposa. Lei 14.230/2021 retroage para ações em curso (lei benéfica ao réu)."},{"n":73,"enun":"O poder de polícia, atributo da Administração Pública que permite restringir e condicionar o exercício de direitos individuais em favor do interesse público, pode ser exercido de forma preventiva (licenças e autorizações) e repressiva (multas e interdições).","gab":"CERTO","com":"Certo. O poder de polícia manifesta-se preventivamente (fiscalização, licenças, autorizações — antes do dano) e repressivamente (multas, apreensões, interdições — após o descumprimento). É a faculdade do Estado de regular, fiscalizar e condicionar comportamentos que afetem o interesse público.","fund":"LEI: 'Art. 78, CTN: Considera-se poder de polícia atividade da administração pública que, limitando ou disciplinando direito, interesse ou liberdade, regula a prática de ato ou abstenção de fato, em razão de interesse público concernente à segurança, à higiene, à ordem, aos costumes, à disciplina da produção e do mercado, ao exercício de atividades econômicas dependentes de concessão ou autorização do Poder Público, à tranquilidade pública ou ao respeito à propriedade e aos direitos individuais ou coletivos.'"},{"n":74,"enun":"Na licitação pública regida pela Lei n.º 14.133/2021 (Nova Lei de Licitações), o diálogo competitivo é modalidade licitatória que pode ser adotada quando o objeto não tiver sido suficientemente precisado pela Administração.","gab":"CERTO","com":"Certo. O diálogo competitivo foi inserido como nova modalidade pela Lei 14.133/2021 para objetos inovadores ou complexos em que a Administração não consegue definir previamente a melhor solução técnica. Permite conversação prévia com os interessados para definir o objeto antes do certame.","fund":"LEI: 'Art. 32, Lei 14.133/2021: O diálogo competitivo é a modalidade de licitação para contratação de obras, serviços e compras em que a Administração Pública realiza diálogos com licitantes previamente selecionados mediante critérios objetivos, com o intuito de desenvolver uma ou mais alternativas capazes de atender às suas necessidades, devendo os licitantes apresentar proposta final após o encerramento dos diálogos.'"},{"n":75,"enun":"Segundo a Lei n.º 9.784/1999, o processo administrativo federal deve observar, entre outros princípios, a ampla defesa, o contraditório, a segurança jurídica e a proporcionalidade, sendo vedada a reformatio in pejus.","gab":"ERRADO","com":"Errado. A Lei 9.784/99 NÃO veda a reformatio in pejus de forma absoluta: no processo administrativo, diferentemente do processo penal, é possível a reforma para pior quando a autoridade superior anula e reprocessa o feito com ampla instrução. A vedação à reformatio in pejus é regra do processo penal (art. 617 CPP), não do administrativo em geral.","fund":"LEI: 'Art. 64, Lei 9.784/99: O órgão competente para decidir o recurso poderá confirmar, modificar, anular ou revogar, total ou parcialmente, a decisão recorrida, se a matéria for de sua competência.' / 'Art. 64, parágrafo único: Se da aplicação do disposto neste artigo puder decorrer gravame à situação do recorrente, este deverá ser cientificado para que formule suas alegações antes da decisão.' | NOTA: Há apenas o contraditório prévio — não vedação absoluta à piora.","peg":"Reformatio in pejus: PROIBIDA no processo PENAL (art. 617 CPP). PERMITIDA no processo ADMINISTRATIVO, com contraditório prévio (art. 64, §único, Lei 9.784/99)."},{"n":76,"enun":"O servidor público estável somente pode ser demitido por sentença judicial transitada em julgado, processo administrativo disciplinar com contraditório e ampla defesa, ou por excesso de despesas com pessoal.","gab":"CERTO","com":"Certo. A CF prevê três hipóteses de perda do cargo pelo estável: sentença judicial transitada em julgado, PAD com garantias constitucionais, e avaliação periódica de desempenho insuficiente (art. 41, §1º, CF). O excesso de despesas com pessoal (art. 169, §4º, CF) também autoriza a exoneração do estável como medida excepcional de ajuste fiscal.","fund":"LEI: 'Art. 41, §1º, CF: O servidor público estável só perderá o cargo: I — em virtude de sentença judicial transitada em julgado; II — mediante processo administrativo em que lhe seja assegurada ampla defesa; III — mediante procedimento de avaliação periódica de desempenho, na forma de lei complementar, assegurada ampla defesa.' / 'Art. 169, §4º, CF: demissão de estável para adequação de despesas.'"},{"n":77,"enun":"O princípio da publicidade, previsto no art. 37, caput, da CF/88, é absoluto e exige a divulgação de todos os atos da Administração Pública, vedando o sigilo em qualquer circunstância.","gab":"ERRADO","com":"Errado. A publicidade não é absoluta: a própria CF ressalva o sigilo quando necessário à segurança da sociedade e do Estado (art. 5º, XXXIII), à intimidade (art. 5º, X) ou para preservar o direito à privacidade. Investigações policiais, por exemplo, podem tramitar em sigilo.","fund":"LEI: 'Art. 5º, XXXIII, CF: todos têm direito a receber dos órgãos públicos informações de seu interesse particular, ou de interesse coletivo ou geral, que serão prestadas no prazo da lei, sob pena de responsabilidade, ressalvadas aquelas cujo sigilo seja imprescindível à segurança da sociedade e do Estado.' | LEI: 'Lei 12.527/2011 (LAI): consagra a publicidade como regra e o sigilo como exceção.'"},{"n":78,"enun":"A cassação de ato administrativo — uma das formas de extinção de atos ampliadores de direitos — ocorre quando o beneficiário descumpre as condições para a manutenção do ato, diversamente da caducidade, que decorre de superveniência de norma legal incompatível.","gab":"CERTO","com":"Certo. A cassação pune o descumprimento das condições pelo próprio beneficiário (ex.: cassação de licença por violação das normas do alvará). A caducidade é objetiva — decorre de norma nova que torna o ato incompatível com o ordenamento. São extinções por causas diversas e com fundamentos distintos.","fund":"DOUTRINA: 'Celso Antônio Bandeira de Mello (Curso de Direito Administrativo): cassação = extinção em razão de ilegalidade superveniente imputável ao destinatário; caducidade = extinção em razão de norma supervenientemente editada que torna inadmissível a situação antes permitida.' | NOTA: Ambas produzem efeitos ex nunc (prospectivos), diferentemente da anulação (ex tunc)."},{"n":79,"enun":"No regime de responsabilidade civil por atos omissivos do Estado, o STF adota a teoria da responsabilidade subjetiva, exigindo comprovação de culpa ou dolo do agente público na omissão causadora do dano.","gab":"ERRADO","com":"Errado. O STF unificou, no Tema 505 de Repercussão Geral (RE 841.526), que a responsabilidade civil do Estado é OBJETIVA mesmo para atos omissivos, desde que a omissão seja do tipo específico (dever legal de agir). A teoria subjetiva permanece para omissões genéricas (Estado como garantidor geral), mas o STF tem avançado para a objetividade.","fund":"JURISPRUDÊNCIA: 'STF, RE 841.526 (Tema 505, Pleno, j. 30/03/2016): A responsabilidade civil estatal, inclusive quando decorrente de omissão, é objetiva, em relação às situações em que o Estado assume especificamente o risco da atividade (ex.: morte de preso sob custódia do Estado).' | NOTA: Para omissões genéricas sem dever específico de agir, a doutrina majoritária ainda aplica responsabilidade subjetiva.","peg":"Responsabilidade por omissão: STF → objetiva quando há dever específico de agir (ex.: morte de preso). Omissão genérica → doutrina diverge, mas STF avança para objetividade."},{"n":80,"enun":"A organização administrativa brasileira compreende a Administração Direta (União, Estados, DF e Municípios) e a Administração Indireta (autarquias, fundações públicas, empresas públicas e sociedades de economia mista), criadas por lei ou autorizadas por lei.","gab":"CERTO","com":"Certo. A distinção é essencial: autarquias e fundações públicas são criadas diretamente por lei. Empresas públicas e sociedades de economia mista são autorizadas por lei e criadas por ato do Poder Executivo (decreto, registro no CNPJ etc.). Todas integram a Administração Indireta e estão sujeitas ao controle do TCU e à supervisão ministerial.","fund":"LEI: 'Art. 37, XIX, CF: Somente por lei específica poderá ser criada autarquia e autorizada a instituição de empresa pública, de sociedade de economia mista e de fundação, cabendo à lei complementar, neste último caso, definir as áreas de sua atuação.' | DL 200/1967: define a estrutura da Administração Federal e as entidades da Administração Indireta."}]},{"nome":"Medicina Legal","comando":"Acerca de tanatologia, lesões corporais, traumatologia forense e toxicologia, julgue os itens a seguir.","itens":[{"n":81,"enun":"O rigor mortis (rigidez cadavérica) instala-se de forma progressiva, iniciando-se pelos músculos da mandíbula e pescoço, seguindo-se para tronco e membros superiores e, por último, para os membros inferiores, com duração aproximada de 24 a 48 horas.","gab":"CERTO","com":"Certo. A rigidez cadavérica segue a lei de Nysten: inicia-se nos músculos da face e pescoço (onde há menor massa muscular), progride craniocaudalmente e cede na mesma ordem. Isso permite ao perito estimar o tempo de morte com relativa precisão nas primeiras horas.","fund":"DOUTRINA: 'Genival Veloso de França (Medicina Legal, 10ª ed.): o rigor mortis começa a aparecer entre 2-6 horas após a morte, atinge o máximo entre 12-24 horas e desaparece em 24-48 horas. Segue a lei de Nysten: mandíbula → pescoço → tronco → membros superiores → membros inferiores.'"},{"n":82,"enun":"A lividez cadavérica (livor mortis) é fenômeno que resulta do acúmulo de sangue nas partes declivosas do corpo após a parada circulatória e pode ser utilizada para estimar a posição do cadáver no momento da morte.","gab":"CERTO","com":"Certo. As livores se formam nas regiões mais baixas do corpo em relação à posição em que o cadáver foi deixado. Quando fixas (após 8-12 horas), indicam que o corpo não foi movido — se os livores estiverem em posição diferente da encontrada, sugerem que o cadáver foi reposicionado.","fund":"DOUTRINA: 'França: a lividez cadavérica começa a aparecer entre 2-4 horas após a morte, fixa-se por volta de 8-12 horas. Livores fixos na face anterior + cadáver em decúbito dorsal = forte indício de que o corpo foi movido. Relevante para a investigação da cena do crime.'"},{"n":83,"enun":"O exame do equimose permite distingui-la da livor mortis (lividez cadavérica), pois a equimose, ao ser comprimida, não desaparece, enquanto a lividez cadavérica perde a coloração à compressão.","gab":"CERTO","com":"Certo. A equimose resulta de extravasamento de sangue nos tecidos (hemorragia intersticial) — o sangue está fora dos vasos e não desfaz à compressão. A lividez decorre de acúmulo sanguíneo intravascular por gravidade — à compressão, desaparece temporariamente (estágios iniciais) ou não desaparece (quando fixada).","fund":"DOUTRINA: 'França: diagnóstico diferencial entre equimose e lividez cadavérica: a equimose não desaparece à vitropressão; a lividez desfaz-se à pressão nas primeiras horas (sangue ainda fluido intravascular) — após a fixação (8-12h), ambas resistem à compressão. Exame com lâmina de vidro (vitropressão).'"},{"n":84,"enun":"No exame de lesões corporais para fins forenses, a contusão simples caracteriza-se como lesão provocada por instrumento de superfície lisa ou irregular que atua por pressão, sem perfuração da pele, podendo gerar equimose, escoriação ou hematoma.","gab":"CERTO","com":"Certo. A contusão é causada por objeto contundente (rombudo) — pressão sem corte. A pele não se rompe necessariamente (ou se rompe de forma irregular). As lesões típicas são equimose (extravasamento de sangue nos tecidos), escoriação (lesão superficial da epiderme) e hematoma (coleção de sangue).","fund":"DOUTRINA: 'Hercules Catunda de Medeiros; França: contusão = lesão causada por instrumento contundente de ação mecânica. Classificação: simples (equimose, escoriação, hematoma), complexas (lacerações) e especiais (contusão de couro cabeludo, contusão do globo ocular).'"},{"n":85,"enun":"O sulco do enforcamento, no caso de enforcamento típico, caracteriza-se por ser oblíquo, interrompido na região cervical posterior, não impresso, de direção ascendente em relação ao ponto fixo.","gab":"CERTO","com":"Certo. No enforcamento típico (nó occipital), o sulco é oblíquo (inclinado), incompleto (interrompido onde fica o nó) e vai em direção ascendente ao nó. No atípico (nó lateral ou anterior), o sulco muda de características. Esse detalhe é cobrado para diferenciar enforcamento de estrangulamento.","fund":"DOUTRINA: 'França: no enforcamento típico, o sulco é: oblíquo, incompleto (interrompido), não impresso (menos profundo), único e localizado na parte superior do pescoço. Diferencia-se do estrangulamento (sulco horizontal, completo, impresso, na parte média do pescoço).'"},{"n":86,"enun":"A asfixia por afogamento é classificada como asfixia mecânica e pode ser diagnosticada pelo encontro de cogumelo de espuma na boca e narinas, dilatação pulmonar (enfisema aquoso) e presença de diatomáceas no sangue ou órgãos parenquimatosos.","gab":"CERTO","com":"Certo. O cogumelo de espuma (espuma brancorosada) é formado pelo batimento da água com o muco e o ar pulmonar. O enfisema aquoso (pulmões volumosos e pesados) e a presença de diatomáceas (microrganismos da água) nos órgãos internos confirmam o afogamento vital — diferenciando do afogamento pós-morte.","fund":"DOUTRINA: 'França: diagnóstico do afogamento vital: cogumelo de espuma (sinal de Lacassagne), pulmões volumosos com líquido (sinal de Paltauf), diatomáceas em sangue e órgãos parenquimatosos (fígado, rins), mancha de Tardieu. A presença de diatomáceas no sangue confirma que o afogamento ocorreu ainda em vida (circulação ativa).'"},{"n":87,"enun":"O prazo decadencial para representação nos crimes de ação penal pública condicionada à representação é de seis meses, contado da data do fato criminoso.","gab":"ERRADO","com":"Errado (questão de medicina legal com interface penal). O prazo de 6 meses começa do dia em que o ofendido SOUBE QUEM É O AUTOR — não da data do crime. No contexto forense, o perito médico pode ser chamado a opinar sobre lesões e o delegado precisa saber que a vítima tem 6 meses a partir da identificação do agressor.","fund":"LEI: 'Art. 38, CPP: [...] dentro do prazo de seis meses, contado do dia em que vier a saber quem é o autor do crime.' | MEDICINA LEGAL: Em crimes sexuais e lesões graves, a vítima pode demorar a identificar o autor — o prazo só flui da identificação, não do fato."},{"n":88,"enun":"O exame de corpo de delito é indispensável nos crimes que deixam vestígios, não podendo ser suprido pela confissão do acusado.","gab":"CERTO","com":"Certo. O art. 158 CPP é expresso: nos crimes que deixam vestígios, o exame de corpo de delito é indispensável — a confissão não o substitui. O corpo de delito direto é feito pelos peritos sobre os vestígios; o indireto, por outros meios quando os vestígios desapareceram (testemunhas, documentos).","fund":"LEI: 'Art. 158, CPP: Quando a infração deixar vestígios, será indispensável o exame de corpo de delito, direto ou indireto, não podendo supri-lo a confissão do acusado.' / 'Art. 167, CPP: Não sendo possível o exame de corpo de delito, por haverem desaparecido os vestígios, a prova testemunhal poderá suprir-lhe a falta.'"},{"n":89,"enun":"A morte encefálica, para fins de diagnóstico forense e doação de órgãos, é estabelecida pela cessação irreversível das funções encefálicas, independentemente da manutenção artificial das funções cardiorrespiratórias.","gab":"CERTO","com":"Certo. A morte encefálica é o critério legal de morte no Brasil para fins de doação de órgãos (Lei 9.434/97). Mesmo que o coração bata artificialmente (UTI), a morte está caracterizada pela cessação total e irreversível das funções encefálicas. Dois médicos não participantes da equipe de transplante devem atestar.","fund":"LEI: 'Art. 3º, Lei 9.434/97: A retirada post mortem de tecidos, órgãos ou partes do corpo humano destinados a transplante ou tratamento deverá ser precedida de diagnóstico de morte encefálica, constatada e registrada por dois médicos não participantes das equipes de remoção e transplante.' | CFM Resolução 2.173/2017: protocolo para diagnóstico de morte encefálica."},{"n":90,"enun":"No exame de local de morte violenta (crime), o Instituto Médico Legal é o responsável pela elaboração do laudo de exame de corpo de delito, enquanto o Instituto de Criminalística é o responsável pelo exame do local do crime.","gab":"CERTO","com":"Certo. No Brasil, os institutos têm competências distintas: o IML realiza a necropsia e emite o laudo tanatológico (exame do cadáver); o IC realiza a perícia do local do crime, analisa vestígios, projéteis, documentos etc. Ambos são órgãos da Polícia Científica ou da Polícia Civil.","fund":"DOUTRINA: 'A distinção entre IML e IC é fundamental para o delegado: o exame de corpo de delito sobre a vítima cadáver é feito pelo IML (necropsia); a análise do local, dos instrumentos do crime, das armas e vestígios físicos é competência do IC (Medicina Legal vs. Criminalística).'"}]},{"nome":"Direito Civil e Legislação Complementar","comando":"Acerca de negócios jurídicos, responsabilidade civil, direitos reais e família, julgue os itens a seguir.","itens":[{"n":91,"enun":"O negócio jurídico é nulo quando celebrado por pessoa absolutamente incapaz, sendo tal nulidade arguível a qualquer tempo, não se sujeitando a prazo de decadência.","gab":"CERTO","com":"Certo. A nulidade absoluta (art. 166 CC) é imprescritível — pode ser alegada a qualquer tempo e por qualquer interessado, inclusive o Ministério Público. Difere da anulabilidade (art. 171 CC), que tem prazo decadencial de 4 anos para ser arguida.","fund":"LEI: 'Art. 166, I, CC: É nulo o negócio jurídico quando: I — celebrado por pessoa absolutamente incapaz.' / 'Art. 169, CC: O negócio jurídico nulo não é suscetível de confirmação, nem convalesce pelo decurso do tempo.' / 'Art. 168, CC: As nulidades dos artigos antecedentes podem ser alegadas por qualquer interessado, ou pelo Ministério Público, quando lhe couber intervir.'"},{"n":92,"enun":"Na responsabilidade civil subjetiva, a prova da culpa ou do dolo do agente causador do dano é ônus do lesado, enquanto na responsabilidade objetiva dispensa-se essa prova, bastando a demonstração do nexo causal e do dano.","gab":"CERTO","com":"Certo. A distinção é central no CC/2002: a regra geral é a responsabilidade subjetiva (art. 186 CC — culpa ou dolo); a objetiva é exceção aplicada nas hipóteses do parágrafo único do art. 927 e em leis especiais. Para danos ambientais, acidentes de trabalho e atividades de risco, aplica-se a objetiva.","fund":"LEI: 'Art. 186, CC: Aquele que, por ação ou omissão voluntária, negligência ou imprudência, violar direito e causar dano a outrem, ainda que exclusivamente moral, comete ato ilícito.' / 'Art. 927, parágrafo único, CC: Haverá obrigação de reparar o dano, independentemente de culpa, nos casos especificados em lei, ou quando a atividade normalmente desenvolvida pelo autor do dano implicar, por sua natureza, risco para os direitos de outrem.'"},{"n":93,"enun":"A multiparentalidade, reconhecida pelo STF no RE 898.060, permite que a pessoa tenha simultaneamente mais de um pai ou mais de uma mãe no registro civil, produzindo todos os efeitos jurídicos inerentes à filiação.","gab":"CERTO","com":"Certo. O STF fixou tese no RE 898.060 (2016) permitindo a multiparentalidade: a existência de vínculo socioafetivo não exclui o vínculo biológico — ambos podem coexistir. Assim, uma pessoa pode ter dois pais (ou duas mães) no registro, com todos os efeitos: herança, alimentos, nome.","fund":"JURISPRUDÊNCIA: 'STF, RE 898.060 (Barroso, Pleno, j. 21/09/2016): tese fixada — 'A paternidade socioafetiva, declarada ou não em registro público, não impede o reconhecimento do vínculo de filiação concomitante baseado na origem biológica, com os efeitos jurídicos próprios.' Multiparentalidade é possível.'"},{"n":94,"enun":"A usucapião especial urbana, prevista no art. 183 da CF/88, exige que o possuidor utilize a área urbana de até duzentos e cinquenta metros quadrados para sua moradia ou de sua família, pelo prazo de cinco anos, sem interrupção e sem oposição, não sendo proprietário de outro imóvel urbano ou rural.","gab":"CERTO","com":"Certo. O art. 183 CF consagra a usucapião especial urbana pro moradia: 250m², 5 anos contínuos e sem oposição, para moradia própria ou familiar, sem ser proprietário de outro imóvel. Não se exige justo título nem boa-fé. Pode ser invocada apenas uma vez.","fund":"LEI: 'Art. 183, CF: Aquele que possuir como sua área urbana de até duzentos e cinquenta metros quadrados, por cinco anos, ininterruptamente e sem oposição, utilizando-a para sua moradia ou de sua família, adquirir-lhe-á o domínio, desde que não seja proprietário de outro imóvel urbano ou rural. §3º: os imóveis públicos não serão adquiridos por usucapião.'"},{"n":95,"enun":"O dano moral, segundo o STJ, é in re ipsa (presumido) nos casos de uso indevido de imagem de pessoa natural sem autorização, dispensando a prova do abalo efetivo à honra ou à reputação.","gab":"CERTO","com":"Certo. A Súmula 403/STJ dispensa a prova de dano concreto no uso indevido de imagem — o dano é presumido pela própria violação do direito à imagem. É a doutrina do dano in re ipsa: basta provar o uso não autorizado para surgir o dever de indenizar.","fund":"JURISPRUDÊNCIA: 'Súmula 403 STJ (j. 28/10/2009): Independe de prova do prejuízo a indenização pela publicação não autorizada de imagem de pessoa com fins econômicos ou comerciais.' | NOTA: O STJ estende a ideia de dano in re ipsa a outras violações de direitos personalíssimos, como uso de nome sem autorização.","jur_status":"OK"},{"n":96,"enun":"A morte presumida, sem decretação de ausência, pode ser declarada pelo juiz em situações em que é extremamente provável a morte de quem estava em perigo de vida, bastando o desaparecimento do corpo.","gab":"CERTO","com":"Certo. O art. 7º CC prevê morte presumida sem ausência quando: (a) é extremamente provável a morte de quem estava em perigo de vida; (b) alguém desaparecido em campanha ou prisioneiro não é encontrado em 2 anos após o término da guerra. O registro civil pode ser feito sem o cadáver.","fund":"LEI: 'Art. 7º, CC: Pode ser declarada a morte presumida, sem decretação de ausência: I — se for extremamente provável a morte de quem estava em perigo de vida; II — se alguém, desaparecido em campanha ou feito prisioneiro, não for encontrado até dois anos após o término da guerra.' | NOTA: Difere da ausência (art. 22 CC), que exige desaparecimento sem deixar notícia e procedimento mais longo."},{"n":97,"enun":"Na alienação parental, nos termos da Lei n.º 12.318/2010, o juiz pode, de forma liminar, reverter a guarda ao genitor alienado ou suspender a autoridade parental do genitor alienador.","gab":"CERTO","com":"Certo. A Lei de Alienação Parental (12.318/2010) permite medidas urgentes para proteger a convivência familiar. O juiz pode, liminarmente, alterar a guarda, ampliar visitas ou suspender a autoridade parental do alienador, visando preservar o vínculo da criança com o genitor alienado.","fund":"LEI: 'Art. 6º, Lei 12.318/2010: Caracterizados atos típicos de alienação parental ou qualquer conduta que dificulte a convivência de criança ou adolescente com genitor, em ação autônoma ou incidental, o juiz poderá, cumulativamente ou não, sem prejuízo da decorrente responsabilidade civil ou criminal e da ampla utilização de instrumentos processuais aptos a inibir ou atenuar seus efeitos: [...] VI — determinar a alteração da guarda para guarda compartilhada ou sua inversão.'"},{"n":98,"enun":"A prescrição e a decadência podem ser renunciadas pelas partes antes de consumadas, sendo lícita a cláusula contratual que antecipadamente afaste qualquer das duas.","gab":"ERRADO","com":"Errado. A renúncia à prescrição é permitida APÓS a consumação (art. 191 CC), não antes. A decadência legal não pode ser renunciada nem antes nem depois (art. 209 CC). A decadência convencional pode ser renunciada. Cláusula que renuncie à prescrição antes de consumada é inválida.","fund":"LEI: 'Art. 191, CC: A renúncia da prescrição pode ser expressa ou tácita, e só valerá, sendo feita, sem prejuízo de terceiro, depois que a prescrição se consumar; tácita é a renúncia quando se presume de fatos do interessado, incompatíveis com a prescrição.' / 'Art. 209, CC: É nula a renúncia à decadência fixada em lei.'"}]},{"nome":"Direito Tributário e Legislação Complementar","comando":"Acerca do sistema tributário nacional, obrigação tributária e crédito tributário, julgue os itens a seguir.","itens":[{"n":99,"enun":"O crime tributário material de sonegação fiscal, conforme Súmula Vinculante 24 do STF, somente se consuma quando houver o lançamento definitivo do tributo.","gab":"CERTO","com":"Certo. A SV 24 é fundamental: o crime de sonegação fiscal (material) não se consuma sem o lançamento definitivo — o tipo penal depende da constituição do crédito tributário. Enquanto a autoridade fiscal não encerra o lançamento (esgotamento das vias administrativas), não há crime consumado.","fund":"JURISPRUDÊNCIA: 'Súmula Vinculante 24 STF (j. 02/12/2009): Não se tipifica crime material contra a ordem tributária, previsto no art. 1º, incisos I a IV, da Lei n.º 8.137/1990, antes do lançamento definitivo do tributo.' | NOTA: Essa SV impede o delegado de instaurar IP antes do lançamento definitivo — condição de procedibilidade.","peg":"SV 24: lançamento definitivo = condição de procedibilidade para o IP de sonegação fiscal material. Sem lançamento definitivo, não há crime consumado.","jur_status":"OK"},{"n":100,"enun":"O IPTU, de competência municipal, é imposto de caráter real, incidindo sobre a propriedade, o domínio útil ou a posse de bem imóvel por natureza ou por acessão física, localizado na zona urbana.","gab":"CERTO","com":"Certo. O IPTU é tributo municipal (art. 156, I, CF) que incide sobre imóveis urbanos. A base de cálculo é o valor venal do imóvel; o fato gerador é a propriedade, o domínio útil ou a posse. É tributo de caráter real — não considera aspectos pessoais do contribuinte.","fund":"LEI: 'Art. 32, CTN: O imposto, de competência dos Municípios, sobre a propriedade predial e territorial urbana tem como fato gerador a propriedade, o domínio útil ou a posse de bem imóvel por natureza ou por acessão física, como definido na lei civil, localizado na zona urbana do Município.'"},{"n":101,"enun":"O lançamento tributário por homologação ocorre quando o sujeito passivo antecipa o pagamento do tributo sem prévio exame da autoridade administrativa, extinguindo o crédito sob condição resolutória da ulterior homologação pelo Fisco.","gab":"CERTO","com":"Certo. No lançamento por homologação (autolançamento), o contribuinte calcula, declara e recolhe o tributo sem intervenção prévia do Fisco. O pagamento extingue o crédito sob condição resolutória — se a homologação não ocorrer em 5 anos (decadência), considera-se tacitamente homologado.","fund":"LEI: 'Art. 150, CTN: O lançamento por homologação, que ocorre quanto aos tributos cuja legislação atribua ao sujeito passivo o dever de antecipar o pagamento sem prévio exame da autoridade administrativa, opera-se pelo ato em que a referida autoridade, tomando conhecimento da atividade assim exercida pelo obrigado, expressamente a homologa.' / §4º: 'Se a lei não fixar prazo à homologação, será ele de cinco anos, a contar da ocorrência do fato gerador; expirado esse prazo sem que a Fazenda Pública se tenha pronunciado, considera-se homologado o lançamento e definitivamente extinto o crédito.'"},{"n":102,"enun":"A imunidade tributária recíproca, prevista no art. 150, VI, a, da CF/88, veda que a União, os Estados, o Distrito Federal e os Municípios instituam impostos sobre o patrimônio, a renda ou os serviços uns dos outros.","gab":"CERTO","com":"Certo. A imunidade recíproca protege o pacto federativo — evita que entes federados se tributem mutuamente, o que representaria interferência na autonomia financeira. Estende-se às autarquias e fundações públicas (art. 150, §2º CF), mas não às empresas estatais que exploram atividade econômica.","fund":"LEI: 'Art. 150, VI, a, CF: Sem prejuízo de outras garantias asseguradas ao contribuinte, é vedado à União, aos Estados, ao Distrito Federal e aos Municípios: VI — instituir impostos sobre: a) patrimônio, renda ou serviços, uns dos outros.' / §2º: 'A vedação do inciso VI, a, é extensiva às autarquias e às fundações instituídas e mantidas pelo Poder Público, no que se refere ao patrimônio, à renda e aos serviços, vinculados a suas finalidades essenciais ou às delas decorrentes.'"},{"n":103,"enun":"A denúncia espontânea, nos termos do art. 138 do CTN, exclui a responsabilidade por infrações tributárias, mas apenas quando acompanhada do pagamento integral do tributo e dos juros de mora, antes do início de qualquer procedimento fiscalizatório.","gab":"CERTO","com":"Certo. A denúncia espontânea exige dois requisitos: (a) pagamento integral do tributo com juros; (b) antes do início de qualquer procedimento administrativo ou medida de fiscalização. Não exclui correção monetária nem juros — apenas a multa de infração. O STJ firmou que declaração sem pagamento não configura denúncia espontânea.","fund":"LEI: 'Art. 138, CTN: A responsabilidade é excluída pela denúncia espontânea da infração, acompanhada, se for o caso, do pagamento do tributo devido e dos juros de mora, ou do depósito da importância arbitrada pela autoridade administrativa, quando o montante do tributo dependa de apuração.' / Parágrafo único: 'Não se considera espontânea a denúncia apresentada após o início de qualquer procedimento administrativo ou medida de fiscalização, relacionados com a infração.'"},{"n":104,"enun":"O Imposto de Renda de Pessoa Física é de competência federal, de natureza pessoal e com alíquotas progressivas conforme a capacidade econômica do contribuinte, em observância ao princípio da capacidade contributiva.","gab":"CERTO","com":"Certo. O IRPF é federal (art. 153, III, CF), graduado segundo a capacidade econômica (art. 145, §1º, CF) e com progressividade de alíquotas. É o exemplo clássico de imposto pessoal — considera aspectos subjetivos do contribuinte (renda, deduções). Difere dos impostos reais (IPTU, ITCMD), que ignoram as características do titular.","fund":"LEI: 'Art. 153, III, CF: Compete à União instituir impostos sobre: III — renda e proventos de qualquer natureza.' / 'Art. 145, §1º, CF: Sempre que possível, os impostos terão caráter pessoal e serão graduados segundo a capacidade econômica do contribuinte.'"}]},{"nome":"Direito Ambiental e Legislação Complementar","comando":"Acerca da tutela constitucional e infraconstitucional do meio ambiente, crimes ambientais e responsabilidade civil ambiental, julgue os itens a seguir.","itens":[{"n":105,"enun":"A responsabilidade civil por danos ambientais, de acordo com a Lei n.º 6.938/1981 e com a jurisprudência do STJ, é objetiva e fundamentada na teoria do risco integral, não admitindo as excludentes tradicionais de culpa exclusiva da vítima, caso fortuito ou força maior.","gab":"CERTO","com":"Certo. O STJ, no REsp 1.374.284, adotou a teoria do risco integral para danos ambientais: não há excludentes de responsabilidade. É diferente do risco administrativo (que admite excludentes). O poluidor responde objetivamente pelo dano, sem possibilidade de afastar o nexo causal por caso fortuito.","fund":"JURISPRUDÊNCIA: 'STJ, REsp 1.374.284 (responsabilidade civil ambiental por risco integral): A responsabilidade civil ambiental é objetiva e regida pela teoria do risco integral — caso fortuito, força maior e culpa exclusiva da vítima não excluem o dever de reparar.' | LEI: 'Art. 14, §1º, Lei 6.938/81: Sem obstar a aplicação das penalidades previstas neste artigo, é o poluidor obrigado, independentemente de existência de culpa, a indenizar ou reparar os danos causados ao meio ambiente e a terceiros.'","peg":"Dano ambiental = risco INTEGRAL (sem excludentes). Dano por atividade estatal = risco ADMINISTRATIVO (com excludentes). Nunca confundir os dois regimes."},{"n":106,"enun":"Os crimes ambientais, previstos na Lei n.º 9.605/1998, podem ser imputados às pessoas jurídicas, que responderão por responsabilidade penal autônoma, desvinculada da necessidade de condenação conjunta de pessoa física.","gab":"CERTO","com":"Certo. O STJ (e depois o STF) superou a teoria da dupla imputação: não é mais necessário imputar conjuntamente pessoa física e jurídica para responsabilizar esta última. A PJ responde penalmente de forma autônoma pelos crimes ambientais da Lei 9.605/98.","fund":"JURISPRUDÊNCIA: 'STJ, RMS 39.173/BA (2014): é admissível a condenação penal de pessoa jurídica pela prática de crimes ambientais ainda que absolvidas as pessoas físicas com quem atuou.' | LEI: 'Art. 3º, Lei 9.605/98: As pessoas jurídicas serão responsabilizadas administrativa, civil e penalmente conforme o disposto nesta Lei, nos casos em que a infração seja cometida por decisão de seu representante legal ou contratual, ou de seu órgão colegiado, no interesse ou benefício da sua entidade.'","jur_status":"PENDENTE"},{"n":107,"enun":"A Área de Preservação Permanente (APP), nos termos do Código Florestal (Lei n.º 12.651/2012), é protegida independentemente de cobertura vegetal, em razão de sua função ambiental de preservar os recursos hídricos, a paisagem, a estabilidade geológica e a biodiversidade.","gab":"CERTO","com":"Certo. A APP é definida em função de sua localização (margens de rios, entorno de nascentes, topos de morros etc.) — não da presença de vegetação. Mesmo desmatada, a área mantém o status de APP e deve ser recuperada. Isso é central para a aplicação da Lei 9.605/98.","fund":"LEI: 'Art. 3º, II, Lei 12.651/2012: Área de Preservação Permanente: área protegida, coberta ou não por vegetação nativa, com a função ambiental de preservar os recursos hídricos, a paisagem, a estabilidade geológica e a biodiversidade, facilitar o fluxo gênico de fauna e flora, proteger o solo e assegurar o bem-estar das populações humanas.'"},{"n":108,"enun":"O crime de poluição, previsto no art. 54 da Lei n.º 9.605/1998, exige o resultado de dano efetivo ao meio ambiente para sua consumação, não admitindo a modalidade de perigo abstrato.","gab":"ERRADO","com":"Errado. O art. 54 da Lei 9.605/98 prevê o crime de poluição como crime de resultado (dano efetivo) no caput, mas o §3º prevê modalidade culposa. Além disso, outras condutas ambientais da lei são de perigo abstrato. O caput do art. 54 exige 'danos à saúde humana', de modo que é crime de dano — mas a lei ambiental como um todo não se restringe a crimes de dano.","fund":"LEI: 'Art. 54, Lei 9.605/98: Causar poluição de qualquer natureza em níveis tais que resultem ou possam resultar em danos à saúde humana, ou que provoquem a mortandade de animais ou a destruição significativa da flora: pena — reclusão, de um a quatro anos, e multa.' | NOTA: O tipo usa 'resultem ou possam resultar' — admite dano efetivo e risco concreto. Não é puramente de dano efetivo.","peg":"Art. 54 da Lei 9.605/98: 'resultem OU possam resultar em danos' — admite tanto o crime de dano quanto o de perigo concreto. Não é exclusivamente crime de resultado/dano."},{"n":109,"enun":"O Ministério Público tem legitimidade ativa para ajuizar ação civil pública em matéria ambiental, podendo atuar como substituto processual na defesa de interesses difusos, como a proteção do meio ambiente.","gab":"CERTO","com":"Certo. O MP tem legitimidade constitucional (art. 129, III, CF) e legal (art. 5º, Lei 7.347/85) para a ACP ambiental. Os interesses ambientais são difusos — pertencentes à coletividade indeterminada — e o MP é o guardião natural dessas tutelas transindividuais.","fund":"LEI: 'Art. 129, III, CF: São funções institucionais do Ministério Público: III — promover o inquérito civil e a ação civil pública, para a proteção do patrimônio público e social, do meio ambiente e de outros interesses difusos e coletivos.' / 'Art. 5º, I, Lei 7.347/85: Têm legitimidade para propor a ação principal e a ação cautelar: I — o Ministério Público.'"}]},{"nome":"Direito Empresarial e Legislação Complementar","comando":"Acerca do direito societário, falência e recuperação de empresas e títulos de crédito, julgue os itens a seguir.","itens":[{"n":110,"enun":"Na sociedade limitada, a responsabilidade dos sócios é limitada ao valor de suas quotas, respondendo solidariamente pela integralização do capital social enquanto este não estiver integralmente integralizado.","gab":"CERTO","com":"Certo. Na Ltda., cada sócio responde apenas pela sua quota — mas todos respondem solidariamente pela integralização total do capital social enquanto ele não for integralizado. Isso significa que se um sócio não pagar sua quota, os demais podem ser chamados a cobrir o valor.","fund":"LEI: 'Art. 1.052, CC: Na sociedade limitada, a responsabilidade de cada sócio é restrita ao valor de suas quotas, mas todos respondem solidariamente pela integralização do capital social.' | NOTA: Após a integralização completa do capital, cessa a responsabilidade solidária dos sócios — cada um responde apenas pelo valor de suas quotas."},{"n":111,"enun":"O cheque é título de crédito que contém uma ordem de pagamento à vista, sendo nula a cláusula que o sujeite a condição, mesmo que aposta pelo próprio emitente.","gab":"CERTO","com":"Certo. O cheque é ordem incondicional de pagamento à vista — não admite cláusula condicional. O cheque pré-datado ('para depósito em data futura') é negócio extracambial válido entre as partes, mas o banco não está obrigado a aguardar a data — pode compensar imediatamente.","fund":"LEI: 'Art. 1º, II, Lei 7.357/85: O cheque contém: II — a ordem incondicional de pagar quantia determinada.' | DOUTRINA: 'A incondicionabilidade é requisito essencial do cheque. Cláusula condicional torna o título inválido como cheque (pode valer como promessa de pagamento — nota promissória — se preenchidos os requisitos desta).'"},{"n":112,"enun":"Na recuperação judicial, o devedor em crise econômico-financeira pode requerer ao Judiciário a suspensão das ações e execuções ajuizadas por credores, sendo esta suspensão denominada stay period, com duração de cento e oitenta dias, prorrogável por mais noventa.","gab":"CERTO","com":"Certo. Após o deferimento do processamento da recuperação judicial, o devedor obtém o stay period de 180 dias (prorrogável por mais 90 em casos excepcionais, conforme Lei 14.112/2020). Durante esse período, credores não podem executar seus créditos — preserva-se a empresa em recuperação.","fund":"LEI: 'Art. 6º, §4º, Lei 11.101/2005 (com redação da Lei 14.112/2020): Na recuperação judicial, as suspensões e a proibição de que tratam os incisos I, II e III do caput deste artigo perdurarão pelo prazo de 180 (cento e oitenta) dias, contado do deferimento do processamento da recuperação, prorrogável por igual período, uma única vez, em caráter excepcional, desde que o devedor não haja concorrido com a superação do prazo.'"},{"n":113,"enun":"O administrador de sociedade anônima está sujeito a responsabilidade civil pelos prejuízos causados à companhia quando agir com culpa ou dolo no exercício de suas funções, respondendo solidariamente com os demais administradores que anuíram ao ato danoso.","gab":"CERTO","com":"Certo. A responsabilidade dos administradores de S/A é subjetiva (culpa ou dolo), diferentemente da responsabilidade objetiva do Estado. Administradores que anuem ao ato danoso ou o conhecem e não registram sua dissidência respondem solidariamente.","fund":"LEI: 'Art. 158, Lei 6.404/76: O administrador não é pessoalmente responsável pelas obrigações que contrair em nome da sociedade [...] Responde, porém, civilmente, pelos prejuízos que causar, quando proceder: I — dentro de suas atribuições ou poderes, com culpa ou dolo; II — com violação da lei ou do estatuto.' / §1º: 'O administrador não é responsável por atos ilícitos de outros administradores, salvo se com eles for conivente, negligente em descobri-los ou se deles tiver conhecimento e não agir para impedir sua prática.'"},{"n":114,"enun":"A desconsideração da personalidade jurídica no direito brasileiro pode ser decretada pelo juiz de ofício, independentemente de requerimento das partes.","gab":"ERRADO","com":"Errado. Após o CPC/2015, a desconsideração da personalidade jurídica obedece a um incidente processual (arts. 133 a 137 CPC) que deve ser requerido pela parte ou pelo MP — o juiz não pode decretá-la de ofício. O incidente garante contraditório prévio ao sócio ou administrador atingido.","fund":"LEI: 'Art. 133, CPC: O incidente de desconsideração da personalidade jurídica será instaurado a pedido da parte ou do Ministério Público, quando lhe couber intervir no processo.' | NOTA: A vedação à decretação de ofício assegura o contraditório ao sócio — um dos maiores avanços do CPC/2015 em relação ao CPC/73."}]},{"nome":"Conhecimentos sobre o DF, PDPM e Primeiros Socorros","comando":"Acerca da organização do Distrito Federal, da Polícia Civil do DF e de primeiros socorros, julgue os itens a seguir.","itens":[{"n":115,"enun":"O Distrito Federal não se divide em municípios, mas em Regiões Administrativas, e sua organização político-administrativa tem natureza sui generis, acumulando competências legislativas estaduais e municipais.","gab":"CERTO","com":"Certo. O DF é ente federativo especial (art. 32 CF) que não pode ser dividido em municípios. Acumula as competências legislativas reservadas aos estados e aos municípios. Suas 35 Regiões Administrativas (RAs) são unidades de administração, não entidades políticas autônomas.","fund":"LEI: 'Art. 32, CF: O Distrito Federal, vedada sua divisão em Municípios, reger-se-á por lei orgânica, votada em dois turnos com interstício mínimo de dez dias, e aprovada por dois terços da Câmara Legislativa, que a promulgará...' / §1º: 'Ao Distrito Federal são atribuídas as competências legislativas reservadas aos Estados e Municípios.'"},{"n":116,"enun":"A Polícia Civil do Distrito Federal, conforme a CF/88, é organizada e mantida pela União, diferentemente das polícias civis estaduais, que são mantidas pelos respectivos estados.","gab":"CERTO","com":"Certo. A PCDF é exceção ao modelo geral: mantida e organizada pela União (art. 21, XIV, CF), embora preste serviço no âmbito do DF. Isso reflete a natureza federal do DF. O Delegado da PCDF é, portanto, servidor federal — mas exerce função de segurança pública distrital.","fund":"LEI: 'Art. 21, XIV, CF: Compete à União: XIV — organizar e manter a polícia civil, a polícia penal, a polícia militar e o corpo de bombeiros militar do Distrito Federal, bem como prestar assistência financeira ao Distrito Federal para a execução de serviços públicos, por meio de fundo próprio.'"},{"n":117,"enun":"Em caso de parada cardiorrespiratória, o protocolo de suporte básico de vida (BLS) recomenda que o socorrista leigo inicie imediatamente as compressões torácicas na frequência de 100 a 120 compressõe
