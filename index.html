<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PCDF · Delegado 2026</title>
<!-- PWA -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0a0b14">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PCDF">
<link rel="apple-touch-icon" href="/icons/icon-180.png">
<link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png">
<link rel="apple-touch-icon" sizes="167x167" href="/icons/icon-167.png">
<link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180.png">
<link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png">
<style>
/* ── TOKENS ──────────────────────────────────────────────── */
:root{
  --bg:#0a0b0e; --surf:#12141a; --surf2:#181b24; --surf3:#1e2230;
  --bord:#252a3a; --bord2:#2e3448;
  --txt:#e4e8f4; --txt2:#7a8399; --txt3:#3d4562;
  --acc:#e8a020; --acc-dim:rgba(232,160,32,.13); --acc-glow:rgba(232,160,32,.28); --acc-bord:rgba(232,160,32,.32); --acc-bg:#1c1206;
  --green:#28c76f; --green-bg:rgba(40,199,111,.1); --green-bord:rgba(40,199,111,.3);
  --red:#f05252; --red-bg:rgba(240,82,82,.1); --red-bord:rgba(240,82,82,.3);
  --amber:#f59e0b; --amber-bg:rgba(245,158,11,.1); --amber-bord:rgba(245,158,11,.3);
  --mono:"SF Mono","Fira Code",monospace;
  --r:12px; --r-sm:8px; --r-xs:5px;
  --trans:140ms cubic-bezier(.4,0,.2,1);
  --shadow:0 2px 14px rgba(0,0,0,.5); --shadow-lg:0 4px 28px rgba(0,0,0,.65);
}
[data-theme=light]{
  --bg:#f1f3f8; --surf:#fff; --surf2:#f5f7fc; --surf3:#eef0f8;
  --bord:#dde2ef; --bord2:#cdd3e6;
  --txt:#0e1121; --txt2:#5a6380; --txt3:#9ea8c0;
  --acc:#c47c0a; --acc-dim:rgba(196,124,10,.08); --acc-glow:rgba(196,124,10,.2); --acc-bord:rgba(196,124,10,.28); --acc-bg:#fdf6e8;
  --green:#16a34a; --green-bg:rgba(22,163,74,.08); --green-bord:rgba(22,163,74,.28);
  --red:#dc2626; --red-bg:rgba(220,38,38,.08); --red-bord:rgba(220,38,38,.28);
  --amber:#d97706; --amber-bg:rgba(217,119,6,.08); --amber-bord:rgba(217,119,6,.28);
  --shadow:0 2px 8px rgba(0,0,0,.1); --shadow-lg:0 4px 16px rgba(0,0,0,.15);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;font-size:15px;line-height:1.6;transition:background var(--trans),color var(--trans)}
button{font-family:inherit;cursor:pointer}

/* ── HEADER ──────────────────────────────────────────────── */
.hdr{position:sticky;top:0;z-index:100;background:var(--surf);border-bottom:1px solid var(--bord);box-shadow:var(--shadow)}
.hdr-inner{max-width:860px;margin:0 auto;display:flex;align-items:center;gap:10px;height:62px;padding:0 18px}
.hdr-brand{display:flex;align-items:center;gap:11px;flex:1;min-width:0}
.delta-badge{width:42px;height:42px;border-radius:10px;background:var(--acc);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:#0a0b0e;flex-shrink:0;letter-spacing:-.02em;box-shadow:0 2px 10px var(--acc-glow)}
.hdr-name{font-weight:800;font-size:16.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.01em}
.hdr-date{font-size:12px;color:var(--txt2);margin-top:1px}
.hdr-chips{display:flex;gap:5px;align-items:center;flex-shrink:0}
.chip{border-radius:6px;padding:2px 9px;font-size:12px;font-weight:700}
.chip.g{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bord)}
.chip.r{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bord)}
.chip.n{background:var(--surf2);color:var(--txt2);border:1px solid var(--bord)}
.chip.t{background:var(--acc-dim);color:var(--acc);border:1px solid var(--acc-bord)}
.hdr-timer-wrap{display:flex;align-items:center;gap:6px;flex-shrink:0;background:var(--surf2);border:1px solid var(--bord);border-radius:8px;padding:5px 10px}
.hdr-timer-wrap.hidden{display:none!important}
.hdr-timer-wrap svg.clock-ic{width:17px;height:17px;color:var(--acc);flex-shrink:0}
.hdr-timer-txt{font-size:15px;font-weight:700;color:var(--txt);font-variant-numeric:tabular-nums;min-width:38px}
#btn-pause{background:transparent;border:none;cursor:pointer;padding:0 2px;font-size:14px;color:var(--txt2);line-height:1;transition:color var(--trans)}
#btn-pause:hover{color:var(--acc)}
#btn-pause.paused{color:var(--acc)}
/* Overlay de pausa */
#pause-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.72);backdrop-filter:blur(6px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px}
#pause-overlay.hidden{display:none!important}
.pause-card{background:var(--surf1);border:1px solid var(--bord);border-radius:16px;padding:40px 56px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:14px}
.pause-icon{font-size:48px;line-height:1}
.pause-title{font-size:22px;font-weight:700;color:var(--txt)}
.pause-sub{font-size:14px;color:var(--txt2)}
.pause-resume{background:var(--acc);color:#000;border:none;border-radius:10px;padding:13px 36px;font-size:16px;font-weight:700;cursor:pointer;transition:opacity var(--trans)}
.pause-resume:hover{opacity:.85}
.hdr-actions{display:flex;gap:3px;flex-shrink:0}
.icon-btn{background:var(--surf2);border:1px solid var(--bord);color:var(--txt2);border-radius:7px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all var(--trans)}
.icon-btn:hover{background:var(--acc-dim);border-color:var(--acc-bord);color:var(--acc)}
.prog-rail{height:2px;background:var(--surf3)}
.prog-fill{height:2px;background:var(--acc);transition:width .4s}

/* ── COVER ───────────────────────────────────────────────── */
.cover{max-width:580px;margin:0 auto;padding:48px 18px 80px;text-align:center;animation:fadeIn .4s ease}
.cover-kicker{font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--acc);font-weight:700;margin-bottom:16px}
.cover h1{font-size:clamp(32px,5vw,48px);font-weight:800;font-style:italic;margin-bottom:14px;line-height:1.1}
.cover-lead{font-size:16px;color:var(--txt2);margin-bottom:32px;line-height:1.5}
.cover-card{background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);padding:24px;text-align:left;box-shadow:var(--shadow)}
.meta-grid{display:grid;grid-template-columns:auto 1fr;gap:7px 18px;font-size:13.5px;margin-bottom:18px}
.meta-grid dt{color:var(--txt3);font-size:11px;letter-spacing:.08em;text-transform:uppercase;align-self:center}
.meta-grid dd{color:var(--txt);margin:0;font-weight:500}
.cover-note{font-size:13.5px;color:var(--txt2);font-style:italic;padding:12px 14px;background:var(--surf2);border-left:3px solid var(--acc-bord);border-radius:0 var(--r-xs) var(--r-xs) 0;margin-bottom:22px;line-height:1.5}
.cover-actions{display:flex;flex-direction:column;gap:10px}
.cover-countdown{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:18px;flex-wrap:wrap}
.ccd-box{text-align:center;background:var(--surf2);border:1px solid var(--bord2);border-radius:var(--r-sm);padding:10px 16px;min-width:62px}
.ccd-num{font-size:28px;font-weight:900;font-style:italic;line-height:1;color:var(--acc)}
.ccd-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--txt3);margin-top:2px}
.ccd-sep{font-size:22px;font-weight:900;color:var(--bord2);margin-bottom:12px}
.sr-due-nudge{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--red-bg);border:1px solid var(--red-bord);border-radius:var(--r-sm);font-size:13px;color:var(--red);margin-bottom:14px;cursor:pointer;transition:background .15s}
.sr-due-nudge:hover{background:rgba(240,82,82,.18)}
.btn-primary{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 28px;background:var(--acc);color:#0a0b0e;border:none;border-radius:var(--r-sm);font-weight:800;font-size:15px;letter-spacing:.02em;transition:all var(--trans);box-shadow:0 4px 16px var(--acc-glow)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px var(--acc-glow)}
.btn-ghost{background:var(--surf2);border:1px solid var(--bord);color:var(--txt2);padding:10px 20px;border-radius:var(--r-sm);font-size:14px;transition:all var(--trans)}
.btn-ghost:hover{border-color:var(--bord2);color:var(--txt)}

/* ── PROVA TOOLBAR ───────────────────────────────────────── */
.tb{position:sticky;top:54px;z-index:90;background:var(--surf);border-bottom:1px solid var(--bord);backdrop-filter:blur(8px)}
.tb-inner{max-width:860px;margin:0 auto;display:flex;align-items:center;gap:8px;padding:8px 18px;flex-wrap:wrap}
.tb-info{font-size:13px;color:var(--txt2);font-variant-numeric:tabular-nums}
.tb-info b{color:var(--txt)}
.tb-spacer{flex:1}
.tb-btn{background:var(--surf2);border:1px solid var(--bord);border-radius:var(--r-sm);padding:6px 13px;font-size:12.5px;color:var(--txt);transition:all var(--trans);display:inline-flex;align-items:center;gap:6px}
.tb-btn:hover{border-color:var(--bord2);background:var(--surf3)}
.tb-btn.danger{border-color:var(--acc-bord);color:var(--acc);background:var(--acc-dim)}
.tb-btn.danger:hover{background:var(--acc-bg)}
.tb-btn svg{width:12px;height:12px}

/* ── PROVA CONTENT ───────────────────────────────────────── */
#prova-wrap{max-width:860px;margin:0 auto;padding:24px 18px 100px}

/* Discipline header */
.disc-section{margin-bottom:48px}
.disc-hdr{text-align:left;margin:40px 0 16px;background:var(--surf);border-top:3px solid var(--acc);border-bottom:1px solid var(--bord);padding:13px 0 11px;position:relative}
.disc-hdr h3{font-weight:800;font-size:20px;letter-spacing:-.01em;text-transform:none;color:var(--txt);display:flex;align-items:center;gap:10px}

.comando{background:var(--surf2);border:1px solid var(--bord);border-radius:var(--r-sm);padding:12px 16px;font-size:14px;color:var(--txt2);margin-bottom:16px;font-style:italic;line-height:1.5}

/* Question block */
.q-block{border-top:1px solid var(--bord);padding:16px 0;scroll-margin-top:100px}
.q-block:first-of-type{border-top:none;padding-top:4px}
.q-line{display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:start}
.q-tag{display:inline-flex;align-items:center;gap:6px;font-weight:800;font-size:13px;color:var(--acc);flex-shrink:0;padding-top:2px;white-space:nowrap}
.q-tag::before{content:'';width:8px;height:12px;background:var(--acc);clip-path:polygon(0 0,80% 0,100% 50%,80% 100%,0 100%);display:inline-block}
.q-text{font-size:15.5px;line-height:1.65;color:var(--txt)}
.q-text .situacao{display:block;font-style:italic;color:var(--txt2);margin-bottom:8px;padding-left:12px;border-left:2px solid var(--bord2)}
.q-marks{display:flex;gap:6px;flex-shrink:0;padding-top:1px}
.q-mark{width:40px;height:40px;border:1.5px solid var(--bord);border-radius:var(--r-sm);background:var(--surf2);font-weight:800;font-size:14px;color:var(--txt2);display:inline-flex;align-items:center;justify-content:center;transition:all var(--trans)}
.q-mark:hover:not(:disabled){border-color:var(--txt2);color:var(--txt);transform:translateY(-1px)}
.q-mark.sel-c{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.q-mark.sel-e{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.q-mark:disabled{opacity:.5;cursor:default}
/* After gabarito shown, ring correct/wrong */
.q-block.gab-on .q-mark.sel-c.is-right,.q-block.gab-on .q-mark.sel-e.is-right{box-shadow:0 0 0 2px var(--green-bg),0 0 0 3px var(--green)}
.q-block.gab-on .q-mark.sel-c.is-wrong,.q-block.gab-on .q-mark.sel-e.is-wrong{box-shadow:0 0 0 2px var(--red-bg),0 0 0 3px var(--red)}

.q-actions-row{margin-top:10px;padding-left:92px;display:flex;align-items:center;gap:10px}
.q-show-gab{background:transparent;border:1px dashed var(--bord2);border-radius:var(--r-xs);padding:3px 11px;font-size:12px;color:var(--txt3);transition:all var(--trans)}
.q-show-gab:hover{border-style:solid;border-color:var(--acc-bord);color:var(--acc)}
.q-status{font-size:11.5px;color:var(--txt3)}
.q-status .ok{color:var(--green);font-weight:600}
.q-status .er{color:var(--red);font-weight:600}

/* Feedback */
.q-feedback{margin-top:14px;border-radius:var(--r-sm);overflow:hidden;border:1px solid var(--bord);animation:fadeUp .2s ease}
.gab-line{display:flex;align-items:center;gap:8px;padding:9px 14px;background:var(--surf2);border-bottom:1px solid var(--bord);font-size:13px;font-weight:700}
.gab-label{color:var(--txt3);font-size:10px;letter-spacing:.1em;text-transform:uppercase;font-weight:600}
.gab-value{color:var(--txt)}
.gab-badge{margin-left:auto;font-size:11.5px;padding:2px 10px;border-radius:99px;font-weight:700}
.gab-badge.ok{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bord)}
.gab-badge.er{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bord)}
.gab-badge.bk{background:var(--surf3);color:var(--txt3);border:1px solid var(--bord)}

.gab-section{border-top:1px solid var(--bord);background:var(--surf)}
.gab-hdr{display:flex;align-items:center;gap:8px;padding:9px 14px;cursor:pointer;font-size:13px;font-weight:600;background:var(--surf2);border:none;width:100%;text-align:left;color:var(--txt);transition:background var(--trans)}
.gab-hdr:hover{background:var(--surf3)}
.gab-icon{flex-shrink:0}
.gab-lbl{flex:1}
.gab-chev{font-size:11px;color:var(--txt3);transition:transform var(--trans)}
.gab-chev.open{transform:rotate(180deg)}
.gab-body{padding:12px 14px;font-size:14px;line-height:1.7;color:var(--txt2)}
.gab-body.hidden{display:none}
.feynman-text{color:var(--txt);font-size:14.5px;line-height:1.75}
.law-block{font-family:var(--mono);font-size:12px;background:var(--surf2);border:1px solid var(--bord);border-radius:var(--r-xs);padding:11px 13px;white-space:pre-wrap;line-height:1.65;color:var(--txt)}
.copy-btn{display:inline-flex;align-items:center;gap:5px;margin-top:8px;font-size:11.5px;padding:4px 12px;border-radius:5px;border:1px solid var(--bord2);background:var(--surf3);color:var(--txt3);cursor:pointer;transition:all var(--trans);font-family:inherit}
.copy-btn:hover{color:var(--acc);border-color:var(--acc-bord);background:var(--acc-dim)}
.peg-box{display:flex;gap:8px;align-items:flex-start;background:var(--amber-bg);border:1px solid var(--amber-bord);border-radius:var(--r-xs);padding:10px 13px;font-size:13px;color:var(--amber);line-height:1.55}

/* ── TRAP WORDS (Releitura Crítica) ──────────────────────── */
.trap-word{font-weight:800;color:var(--acc);background:var(--acc-dim);border-bottom:2px solid var(--acc);padding:0 3px;border-radius:3px}
.releitura-body{font-size:14.5px;line-height:1.8;color:var(--txt);margin-bottom:10px}
.releitura-body .situacao{display:block;font-style:italic;color:var(--txt2);margin-bottom:8px;padding-left:12px;border-left:2px solid var(--bord2)}
.trap-legend{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--txt3);margin-top:6px;flex-wrap:wrap}
.trap-legend .trap-word{font-size:11.5px;cursor:default}
.trap-found{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;color:var(--acc);font-weight:700}

/* ── AUTOAVALIAÇÃO ────────────────────────────────────────── */
.avaliacao-row{padding:11px 14px;background:var(--surf2);border-top:1px solid var(--bord);display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.avaliacao-lbl{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--txt3);font-weight:600;width:100%;margin-bottom:2px}
.av-btn{border-radius:99px;padding:5px 13px;font-size:12.5px;font-weight:700;border:1.5px solid;cursor:pointer;font-family:inherit;transition:all var(--trans);background:transparent}
.av-btn.dom{border-color:var(--green-bord);color:var(--green)}
.av-btn.dom:hover,.av-btn.dom.sel{background:var(--green-bg);box-shadow:0 0 0 2px var(--green-bord)}
.av-btn.dvd{border-color:var(--amber-bord);color:var(--amber)}
.av-btn.dvd:hover,.av-btn.dvd.sel{background:var(--amber-bg);box-shadow:0 0 0 2px var(--amber-bord)}
.av-btn.lac{border-color:var(--red-bord);color:var(--red)}
.av-btn.lac:hover,.av-btn.lac.sel{background:var(--red-bg);box-shadow:0 0 0 2px var(--red-bord)}
.av-btn.leit{border-color:var(--bord2);color:var(--txt2)}
.av-btn.leit:hover,.av-btn.leit.sel{background:var(--surf3);color:var(--txt);box-shadow:0 0 0 2px var(--bord2)}
.av-set{display:flex;align-items:center;gap:8px;padding:9px 14px;background:var(--surf2);border-top:1px solid var(--bord);font-size:13px}
.av-chip{border-radius:99px;padding:3px 12px;font-size:12px;font-weight:700;border:1.5px solid}
.av-chip.dom{background:var(--green-bg);color:var(--green);border-color:var(--green-bord)}
.av-chip.dvd{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-bord)}
.av-chip.lac{background:var(--red-bg);color:var(--red);border-color:var(--red-bord)}
.av-chip.leit{background:var(--surf3);color:var(--txt2);border-color:var(--bord2)}
.av-change{margin-left:auto;background:transparent;border:1px dashed var(--bord2);border-radius:var(--r-xs);padding:2px 9px;font-size:11.5px;color:var(--txt3);cursor:pointer;font-family:inherit;transition:all var(--trans)}
.av-change:hover{color:var(--acc);border-color:var(--acc-bord)}

/* ── DIAGNÓSTICO (Placar) ─────────────────────────────────── */
.diag-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--bord);border:1px solid var(--bord);border-radius:10px;overflow:hidden;margin-bottom:14px}
@media(max-width:600px){.diag-grid{grid-template-columns:repeat(2,1fr)}}
.diag-cell{background:var(--surf2);padding:14px 10px;text-align:center}
.diag-cell .dn{font-size:26px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums}
.diag-cell .dl{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--txt3);margin-top:5px;font-weight:600;line-height:1.3}
.diag-empty{color:var(--txt3);font-size:14px;font-style:italic;padding:12px 0}

/* ── REVISÃO ──────────────────────────────────────────────── */
#rev-wrap{max-width:860px;margin:0 auto;padding:0 0 100px}
.rev-picker{max-width:580px;margin:0 auto;padding:36px 18px 60px;animation:fadeIn .3s ease}
.rev-picker h2{font-size:clamp(22px,4vw,32px);font-weight:800;font-style:italic;margin-bottom:6px}
.rev-picker .sub{font-size:15px;color:var(--txt2);margin-bottom:28px;line-height:1.5}
.filter-sec-lbl{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--txt3);font-weight:700;margin:22px 0 10px}
.filter-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
@media(max-width:480px){.filter-grid{grid-template-columns:1fr}}
.filter-card{background:var(--surf);border:1.5px solid var(--bord);border-radius:var(--r);padding:15px 16px;text-align:left;cursor:pointer;transition:all var(--trans);font-family:inherit;display:flex;flex-direction:column;gap:3px}
.filter-card:hover:not(:disabled){border-color:var(--acc-bord);background:var(--acc-dim)}
.filter-card.sel{border-color:var(--acc);background:var(--acc-dim);box-shadow:0 0 0 1.5px var(--acc)}
.filter-card:disabled{opacity:.35;cursor:not-allowed;pointer-events:none}
.fc-icon{font-size:20px}
.fc-count{font-size:28px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums}
.fc-count.cr{color:var(--red)}.fc-count.ca{color:var(--amber)}.fc-count.cg{color:var(--green)}.fc-count.ct{color:var(--txt)}
.fc-label{font-size:12px;color:var(--txt2);font-weight:600}
.disc-filter-row{display:flex;flex-wrap:wrap;gap:7px}
.disc-btn{background:var(--surf2);border:1.5px solid var(--bord);border-radius:99px;padding:5px 14px;font-size:13px;font-family:inherit;color:var(--txt2);cursor:pointer;transition:all var(--trans);font-weight:500}
.disc-btn:hover{border-color:var(--acc-bord);color:var(--acc)}
.disc-btn.sel{border-color:var(--acc);color:var(--acc);background:var(--acc-dim)}
.mode-box{background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);overflow:hidden;margin-bottom:24px}
.mode-tabs{display:grid;grid-template-columns:1fr 1fr}
.mode-tab{border:none;background:var(--surf2);color:var(--txt2);font-size:14px;font-weight:700;padding:12px 8px;cursor:pointer;font-family:inherit;border-bottom:2px solid transparent;transition:all var(--trans);display:flex;align-items:center;justify-content:center;gap:6px}
.mode-tab:first-child{border-right:1px solid var(--bord)}
.mode-tab.active{background:var(--surf);color:var(--acc);border-bottom-color:var(--acc)}
.mode-desc-txt{font-size:13px;color:var(--txt2);padding:11px 14px;line-height:1.55;border-top:1px solid var(--bord)}
.rev-tb{position:sticky;top:54px;z-index:90;background:var(--surf);border-bottom:1px solid var(--bord)}
.rev-tb-inner{max-width:860px;margin:0 auto;display:flex;align-items:center;gap:8px;padding:7px 18px;flex-wrap:wrap}
.rev-badge{background:var(--acc-dim);border:1px solid var(--acc-bord);color:var(--acc);border-radius:99px;padding:3px 12px;font-size:12px;font-weight:700;flex-shrink:0}
.rev-orig{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;padding:2px 9px;border-radius:99px;font-weight:600;flex-shrink:0}
.rev-orig.ok{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bord)}
.rev-orig.er{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bord)}
.rev-orig.bk{background:var(--surf3);color:var(--txt3);border:1px solid var(--bord)}
.rev-placar-wrap{max-width:580px;margin:0 auto;padding:32px 18px 100px;animation:fadeUp .4s ease}

/* ── ESPAÇAMENTO INTELIGENTE ──────────────────────────────── */
.sr-badge{display:inline-flex;align-items:center;gap:3px;font-size:10.5px;font-weight:700;border-radius:4px;padding:2px 7px;line-height:1.4;white-space:nowrap}
.sr-badge.due{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bord)}
.sr-badge.soon{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bord)}
.sr-badge.ok{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bord)}
.sr-queue-section{margin-bottom:20px}
.sr-queue-hdr{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--red);font-weight:700;margin-bottom:10px}
.sr-queue-row{display:flex;align-items:center;gap:10px;padding:9px 14px;border-radius:var(--r-sm);background:var(--surf);border:1.5px solid var(--red-bord);margin-bottom:7px;cursor:default;transition:background .15s}
.sr-queue-date{font-size:11px;color:var(--txt3);min-width:52px}
.sr-queue-title{flex:1;font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sr-queue-pct{font-size:13px;font-weight:700;min-width:38px;text-align:right}
.sr-interval-info{font-size:11px;color:var(--txt3);margin-top:4px}
/* ── MODO FOCO ────────────────────────────────────────────── */
#sec-foco{position:fixed;inset:0;z-index:150;background:var(--bg);overflow-y:auto;display:flex;flex-direction:column}
#sec-foco.hidden{display:none!important}
.foco-hdr{position:sticky;top:0;z-index:10;background:var(--bg);border-bottom:1px solid var(--bord2);padding:10px 18px;display:flex;align-items:center;gap:12px}
.foco-qnum{font-size:13px;font-weight:700;color:var(--txt2);white-space:nowrap}
.foco-disc{font-size:11.5px;color:var(--txt3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0}
.foco-prog-wrap{display:flex;align-items:center;gap:8px;min-width:110px}
.foco-progress{height:4px;background:var(--bord);border-radius:2px;flex:1}
.foco-prog-fill{height:100%;background:var(--acc);border-radius:2px;transition:width .4s}
.foco-pct{font-size:11px;font-weight:700;color:var(--acc);min-width:28px;text-align:right}
.foco-body{flex:1;max-width:800px;margin:0 auto;padding:28px 20px 16px;width:100%;animation:fadeIn .2s ease}
.foco-body .q-block{border-color:var(--bord2)}
.foco-body .q-text{font-size:16px;line-height:1.8}
.foco-body .q-tag{font-size:14px;width:42px;height:42px;line-height:42px}
.foco-body .q-mark{height:52px;font-size:17px;font-weight:900;min-width:80px}
.foco-body .q-marks{gap:14px}
.foco-nav{max-width:800px;margin:0 auto 40px;padding:0 20px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.foco-nav-hint{font-size:11px;color:var(--txt3);text-align:center;line-height:1.6}
/* ── QUESTION TIMER ──────────────────────────────────────── */
.qt-badge{display:inline-flex;align-items:center;gap:3px;font-size:10.5px;font-weight:700;border-radius:4px;padding:2px 7px;font-variant-numeric:tabular-nums;letter-spacing:.02em;transition:background .35s,color .35s,border-color .35s;min-width:36px;justify-content:center}
.qt-idle{color:var(--txt3);background:transparent}
.qt-normal{background:var(--surf3);color:var(--txt2)}
.qt-warn{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bord)}
.qt-alert{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bord);animation:qtPulse 1s ease-in-out infinite}
.qt-done{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bord)}
@keyframes qtPulse{0%,100%{opacity:1}50%{opacity:.5}}
#qt-pill{position:fixed;bottom:62px;left:50%;transform:translateX(-50%);max-width:860px;width:calc(100% - 32px);z-index:80;pointer-events:none;display:flex;justify-content:flex-end}
.qt-active-pill{background:var(--surf2);border:1px solid var(--bord2);border-radius:20px;padding:5px 14px;font-size:12px;font-weight:700;color:var(--txt2);display:flex;align-items:center;gap:7px;box-shadow:0 2px 12px rgba(0,0,0,.35)}
.qt-active-pill.qt-warn-p{color:var(--amber)}
.qt-active-pill.qt-alert-p{color:var(--red);animation:qtPulse 1s ease-in-out infinite}
/* ── HISTÓRICO ────────────────────────────────────────────── */
#hist-wrap{max-width:860px;margin:0 auto;padding:24px 18px 100px;animation:fadeUp .4s ease}
.hist-header{display:grid;grid-template-columns:62px 72px 50px 68px 60px 1fr 80px;gap:8px;padding:7px 0;border-bottom:2px solid var(--bord);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--txt3);font-weight:700}
.hist-row{display:grid;grid-template-columns:62px 72px 50px 68px 60px 1fr 80px;gap:8px;padding:10px 0;border-top:1px solid var(--bord);font-size:13.5px;align-items:center}
.hist-row:first-child{border-top:none}
.hist-date{color:var(--txt2);font-size:12.5px;font-variant-numeric:tabular-nums;font-weight:600}
.hist-acertos{color:var(--txt);font-variant-numeric:tabular-nums}
.hist-pct{font-weight:800;font-variant-numeric:tabular-nums}
.hist-tempo{color:var(--txt3);font-size:12px;font-variant-numeric:tabular-nums}
.hist-saldo{font-weight:700;font-variant-numeric:tabular-nums}
.hist-av{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.hist-empty{text-align:center;padding:60px 20px}
.hist-empty .hist-emoji{font-size:52px;margin-bottom:18px}
.hist-empty h2{font-size:22px;font-weight:800;margin-bottom:10px}
.hist-empty p{color:var(--txt2);font-size:15px;max-width:340px;margin:0 auto 28px}
.streak-badge{display:inline-flex;align-items:center;gap:5px;background:var(--amber-bg);border:1px solid var(--amber-bord);color:var(--amber);border-radius:99px;padding:3px 12px;font-size:13px;font-weight:700;margin-left:8px}
@media(max-width:600px){
  .hist-header,.hist-row{grid-template-columns:55px 62px 46px 1fr}
  .hist-tempo,.hist-av{display:none}
}

/* ── PLACAR ──────────────────────────────────────────────── */
#placar-wrap{max-width:860px;margin:0 auto;padding:24px 18px 100px;animation:fadeUp .4s ease}
.placar-hero{background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);padding:32px 28px;box-shadow:var(--shadow);margin-bottom:20px;text-align:center}
.placar-kicker{font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--acc);font-weight:700;margin-bottom:14px}
.placar-hero h2{font-size:clamp(28px,4.5vw,40px);font-weight:800;font-style:italic;margin-bottom:8px}
.placar-lead{font-size:15px;color:var(--txt2);margin-bottom:24px}
.placar-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--bord);border:1px solid var(--bord);border-radius:10px;overflow:hidden}
@media(max-width:600px){.placar-stats{grid-template-columns:repeat(2,1fr)}}
.p-stat{background:var(--surf2);padding:16px 10px;text-align:center}
.p-stat .n{font-weight:800;font-size:30px;line-height:1;font-variant-numeric:tabular-nums}
.p-stat .n.g{color:var(--green)}.p-stat .n.r{color:var(--red)}.p-stat .n.a{color:var(--acc)}.p-stat .n.t{color:var(--txt)}
.p-stat .l{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--txt3);margin-top:5px;font-weight:600}

.pl-box{background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);padding:22px;margin-bottom:20px;box-shadow:var(--shadow)}
.pl-title{font-weight:700;font-size:16px;margin-bottom:16px;color:var(--txt)}
.cebraspe-formula{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:14px 16px;background:var(--surf2);border-radius:var(--r-sm);margin-bottom:14px;font-size:14px;border:1px solid var(--bord)}
.cebraspe-formula .part{color:var(--txt2)}
.cebraspe-formula .part b{color:var(--txt);font-weight:700}
.cebraspe-formula .eq{font-weight:800;font-size:20px;color:var(--acc);font-variant-numeric:tabular-nums}
.cebraspe-verdict{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:var(--r-sm);font-weight:700;font-size:14px;border:1px solid}
.cebraspe-verdict.approved{background:var(--green-bg);color:var(--green);border-color:var(--green-bord)}
.cebraspe-verdict.reproved{background:var(--red-bg);color:var(--red);border-color:var(--red-bord)}

/* Discipline chart */
.disc-chart-row{display:grid;grid-template-columns:1.4fr 2.5fr auto auto;gap:12px;align-items:center;padding:9px 0;border-top:1px solid var(--bord);font-size:13.5px}
.disc-chart-row:first-of-type{border-top:none}
.disc-chart-row .nm{color:var(--txt);font-weight:500}
.bar-rail{height:9px;background:var(--surf2);border-radius:99px;overflow:hidden;border:1px solid var(--bord)}
.bar-fill{height:100%;border-radius:99px;transition:width .6s}
.disc-chart-row .frac{color:var(--txt3);font-size:12px;font-variant-numeric:tabular-nums}
.disc-chart-row .pct{font-weight:700;font-size:13px;min-width:40px;text-align:right;font-variant-numeric:tabular-nums}
@media(max-width:600px){.disc-chart-row{grid-template-columns:1fr auto;gap:5px 12px}.bar-rail{grid-column:1/-1;order:3}.disc-chart-row .frac{order:4}}

/* Errors list */
.err-item{border-top:1px solid var(--bord);padding:12px 0}
.err-item:first-child{border-top:none}
.err-row{display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:start;font-size:13.5px}
.err-num{font-weight:800;color:var(--red);font-variant-numeric:tabular-nums;min-width:32px;padding-top:2px}
.err-sub{color:var(--txt);line-height:1.4}
.err-sub small{display:block;color:var(--txt3);font-size:11.5px;margin-top:2px}
.err-toggle{background:var(--surf2);border:1px solid var(--bord);border-radius:var(--r-xs);padding:4px 12px;font-size:12px;color:var(--txt2);transition:all var(--trans);font-family:inherit;white-space:nowrap;display:inline-flex;align-items:center;gap:5px}
.err-toggle:hover{border-color:var(--acc-bord);color:var(--acc);background:var(--acc-dim)}
.err-toggle.open{border-color:var(--acc-bord);color:var(--acc);background:var(--acc-dim)}
.err-gab{display:none;margin-top:12px;border-radius:var(--r-sm);overflow:hidden;border:1px solid var(--bord)}
.err-gab.open{display:block;animation:fadeUp .2s ease}
.placar-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:24px}

/* ── FAB NAV ─────────────────────────────────────────────── */
.fab{position:fixed;right:20px;bottom:72px;width:46px;height:46px;background:var(--acc);color:#0a0b0e;border:none;border-radius:50%;box-shadow:0 4px 16px var(--acc-glow);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;z-index:44;transition:all var(--trans)}
.fab:hover{transform:scale(1.08)}
.fab.hidden{display:none}
.quick-nav{position:fixed;right:20px;bottom:124px;width:auto;min-width:240px;background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);padding:12px;box-shadow:var(--shadow-lg);z-index:45;max-width:320px;max-height:55vh;overflow-y:auto;display:none}
.quick-nav.open{display:block;animation:fadeUp .2s ease}
.qn-title{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--txt3);margin-bottom:8px;font-weight:600}
.qn-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:4px}
.qn-btn{width:30px;height:30px;border:1px solid var(--bord);background:var(--surf2);border-radius:6px;font-size:10.5px;font-weight:700;color:var(--txt3);transition:all .1s;font-variant-numeric:tabular-nums}
.qn-btn:hover{border-color:var(--acc-bord);color:var(--acc);transform:scale(1.08)}
.qn-btn.ac{background:var(--green-bg);border-color:var(--green-bord);color:var(--green)}
.qn-btn.ae{background:var(--red-bg);border-color:var(--red-bord);color:var(--red)}
.qn-btn.gs{border-style:dashed}
.qn-btn.qa{box-shadow:0 0 0 2px var(--red);animation:qtPulse 1.2s ease-in-out infinite}
@keyframes qFlash{0%{box-shadow:0 0 0 3px var(--acc-glow),0 0 18px var(--acc-glow)}60%{box-shadow:0 0 0 2px var(--acc-bord)}100%{box-shadow:none}}
.q-kb-flash{animation:qFlash .55s ease-out}

/* ── PROGRESS BAR (bottom fixed) ─────────────────────────── */
.bot-bar{position:fixed;bottom:0;left:0;right:0;background:var(--surf);border-top:1px solid var(--bord);padding:8px 18px;display:flex;align-items:center;gap:12px;z-index:40;font-size:12px;color:var(--txt2)}
.bot-bar.hidden{transform:translateY(100%);opacity:0;pointer-events:none}
.bot-bar .bbar{flex:1;height:6px;background:var(--surf3);border-radius:99px;overflow:hidden}
.bot-bar .bbar-fill{height:100%;background:var(--acc);transition:width .4s;border-radius:99px}
.bot-bar .bstats{display:flex;gap:10px;flex-shrink:0;font-variant-numeric:tabular-nums}
.bot-bar .bstats .ok{color:var(--green);font-weight:600}.bot-bar .bstats .er{color:var(--red);font-weight:600}

/* ── MODAL ───────────────────────────────────────────────── */
.modal-ov{position:fixed;inset:0;background:rgba(8,9,14,.65);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;padding:18px;animation:fadeIn .2s ease}
.modal{background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);padding:26px;max-width:420px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.5);animation:fadeUp .2s ease}
.modal h3{font-size:19px;font-weight:800;margin-bottom:10px}
.modal p{color:var(--txt2);margin-bottom:20px;font-size:14px;line-height:1.55}
.modal-acts{display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap}
.btn-danger{background:var(--red);color:white;border:none;border-radius:var(--r-sm);padding:9px 18px;font-family:inherit;font-weight:700;font-size:14px;transition:opacity var(--trans)}
.btn-danger:hover{opacity:.88}
.btn-warn{background:var(--amber);color:white;border:none;border-radius:var(--r-sm);padding:9px 18px;font-family:inherit;font-weight:700;font-size:14px;transition:opacity var(--trans)}
.btn-warn:hover{opacity:.88}

/* ── TOAST ───────────────────────────────────────────────── */
.toast{position:fixed;bottom:56px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--surf);border:1px solid var(--bord);color:var(--txt);padding:11px 18px;border-radius:var(--r-sm);font-size:13.5px;z-index:300;opacity:0;transition:opacity .25s,transform .25s;box-shadow:var(--shadow-lg);pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── ANIMATIONS ──────────────────────────────────────────── */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.hidden{display:none!important}

/* ── RESPONSIVE ──────────────────────────────────────────── */
@media(max-width:640px){
  .hdr-inner{padding:0 12px}.hdr-chips{gap:4px}
  .chip{padding:2px 7px;font-size:11px}
  #prova-wrap,#placar-wrap{padding:16px 12px 100px}
  .q-text{font-size:14.5px}
  .prova-title h2{font-size:16px}
  .placar-stats{grid-template-columns:repeat(2,1fr)}
  .q-actions-row{padding-left:0;flex-wrap:wrap}
}
</style>
</head>
<body>

<!-- ══ HEADER ════════════════════════════════════════════ -->
<header class="hdr" id="hdr">
  <div class="hdr-inner">
    <div class="hdr-brand">
      <div class="delta-badge">Δ</div>
      <div>
        <div class="hdr-name">PCDF · Delegado 2026</div>
        <div class="hdr-date" id="hdr-date"></div>
      </div>
    </div>
    <div class="hdr-timer-wrap hidden" id="hdr-timer">
      <svg class="clock-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
      </svg>
      <span class="hdr-timer-txt" id="hdr-timer-txt">0:00</span>
      <button id="btn-pause" title="Pausar / retomar" onclick="togglePause()">⏸</button>
    </div>
    <div class="hdr-chips" id="hdr-chips" style="display:none">
      <span class="chip g" id="c-ok">✓ 0</span>
      <span class="chip r" id="c-er">✗ 0</span>
      <span class="chip n" id="c-tot">0/10</span>
    </div>
    <div class="hdr-actions">
      <button class="icon-btn" id="btn-hist" title="Histórico de estudo">📊</button>
      <button class="icon-btn" id="btn-theme" title="Tema">☀</button>
      <button class="icon-btn hidden" id="btn-gab-all" title="Revelar/ocultar todos os gabaritos">👁</button>
      <button class="icon-btn" id="btn-export" title="Exportar progresso">⬆</button>
      <button class="icon-btn" id="btn-import-bloco" title="Importar bloco JSON">📂</button>
      <button class="icon-btn" id="btn-import-prog" title="Importar progresso">📥</button>
      <button class="icon-btn" id="btn-reset" title="Reiniciar">↺</button>
    </div>
  </div>
  <div class="prog-rail"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
</header>

<!-- ══ PAUSE OVERLAY ═════════════════════════════════════ -->
<div id="pause-overlay" class="hidden">
  <div class="pause-card">
    <div class="pause-icon">⏸</div>
    <div class="pause-title">Prova pausada</div>
    <div class="pause-sub">O cronômetro está parado.<br>Retome quando estiver pronto.</div>
    <button class="pause-resume" onclick="togglePause()">▶ Retomar prova</button>
  </div>
</div>

<!-- ══ SECTIONS ══════════════════════════════════════════ -->
<main>
  <section id="sec-cover"></section>

  <div id="sec-prova" class="hidden">
    <!-- Toolbar -->
    <div class="tb" id="prova-tb">
      <div class="tb-inner">
        <span class="tb-info"><b id="tb-ans">0</b> respondidas &nbsp;|&nbsp; <b id="tb-blank">10</b> em branco</span>
        <span class="tb-spacer"></span>
        <button class="tb-btn" id="tb-gab-all">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="3"/><path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7-10-7-10-7z"/></svg>
          Gabaritos
        </button>
        <button class="tb-btn" id="tb-revisao" onclick="showRevisaoPicker()">
          🔍 Revisão
        </button>
        <button class="tb-btn" id="tb-foco" onclick="enterFoco()">
          🎯 Foco
        </button>
        <button class="tb-btn danger" id="tb-finish">
          Encerrar prova →

<script>
/* ═══════════════════════════════════════════════════════════
   DATA — inject_bloco.py substitui entre ==INJECT:START== e ==INJECT:END==
   ═══════════════════════════════════════════════════════════ */
/* ==INJECT:START== */
const DEFAULT_BLOCO = {"meta":{"id":"2026-06-18","titulo":"Bloco Diário — Direitos Individuais, Atos Adm., Lei Penal no Espaço e Ação Penal","data":"2026-06-18","totalQuestoes":120,"concurso":"Delegado PCDF 2026","edital":"Edital nº 1, de 3/2/2026","fase":"Fase 1 — Comentários Expandidos","observacao":"Bloco gerado em 2026-06-18. 120 questões C/E. Fase 1: comentários Feynman + fundamento jurídico. Temas do dia: Direitos Individuais e Coletivos, Atos Administrativos, Lei Penal no Espaço, Ação Penal Pública e Privada."},"disciplinas":[{"nome":"Direito Penal e Legislação Especial","comando":"Acerca da aplicação da lei penal no espaço, extraterritorialidade, teoria do crime e legislação especial, julgue os itens a seguir.","itens":[{"n":1,"enun":"O Código Penal brasileiro adotou, como regra, o princípio da territorialidade temperada ou mitigada, o que significa que a lei penal nacional aplica-se a fatos praticados no território brasileiro, ressalvadas as exceções previstas em tratados e convenções internacionais, tais como a imunidade diplomática.","gab":"CERTO","com":"Certo. O Brasil adotou a territorialidade não absoluta: a lei nacional vale no território, mas com válvulas de escape. Pense em um estádio com regras próprias — quem entra joga pelas regras da casa; mas diplomatas são como árbitros internacionais que têm imunidade às expulsões do juiz local.","fund":"LEI: 'Art. 5º, CP: Aplica-se a lei brasileira, sem prejuízo de convenções, tratados e regras de direito internacional, ao crime cometido no território nacional.' | DOUTRINA: 'Rogério Greco, Curso de Direito Penal, Vol. I: o CP adotou a territorialidade temperada, pois ressalva expressamente os casos de imunidade previstos em convenções internacionais, como a Convenção de Viena de 1961.'"},{"n":2,"enun":"Um crime cometido dentro de embaixada estrangeira localizada em Brasília está sujeito exclusivamente à lei penal do Estado acreditante, uma vez que a embaixada constitui extensão do território daquele país.","gab":"ERRADO","com":"Errado. A teoria da extraterritorialidade das embaixadas é superada. A embaixada é um imóvel do Estado acreditante situado em território brasileiro — o que existe é imunidade de jurisdição pessoal do diplomata, não imunidade territorial. O crime praticado ali está sujeito à lei penal brasileira.","fund":"LEI: 'Art. 5º, CP: aplica-se a lei brasileira ao crime cometido no território nacional.' | DOUTRINA/DI: 'Convenção de Viena sobre Relações Diplomáticas (1961, promulgada pelo Dec. 56.435/65): a inviolabilidade dos locais da missão (art. 22) protege contra invasão, não confere extraterritorialidade. O Estado acreditante não exerce soberania territorial sobre a embaixada no Estado receptor.'","peg":"Armadilha clássica: a inviolabilidade da embaixada (art. 22, Conv. Viena) ≠ extensão territorial. A soberania do solo permanece brasileira."},{"n":3,"enun":"Conforme o art. 6.º do Código Penal, o crime praticado em parte no Brasil e em parte no exterior considera-se cometido no Brasil, pois o Código adotou a teoria da ubiquidade para definição do lugar do crime.","gab":"CERTO","com":"Certo. Teoria da ubiquidade: o crime é praticado tanto onde a ação ocorreu quanto onde o resultado se produziu (ou deveria se produzir). Como uma flecha disparada de um lado da fronteira que atinge o outro lado — o crime pertence aos dois lados, mas para fins de fixação de jurisdição, o Brasil puxa para si.","fund":"LEI: 'Art. 6º, CP: Considera-se praticado o crime no lugar em que ocorreu a ação ou omissão, no todo ou em parte, bem como onde se produziu ou deveria produzir-se o resultado.' | DOUTRINA: 'A teoria da ubiquidade resolve conflitos de competência internacional (art. 6º CP), enquanto a competência interna entre comarcas segue a teoria do resultado (art. 70 CPP) — não confundir os dois regimes.'"},{"n":4,"enun":"A extraterritorialidade incondicionada da lei penal brasileira aplica-se aos crimes praticados contra a vida ou a liberdade do Presidente da República, ainda que o agente tenha sido condenado e cumprido integralmente a pena no exterior.","gab":"CERTO","com":"Certo. Na extraterritorialidade incondicionada, a lei brasileira se aplica independentemente de qualquer condição — inclusive se o agente já foi julgado e cumpriu pena lá fora. Não há bis in idem formal, mas a pena cumprida no exterior é abatida (art. 8º CP). É como uma dívida com o Estado brasileiro que não desaparece só porque outra 'crença' a cobrou primeiro.","fund":"LEI: 'Art. 7º, I, a, CP: Ficam sujeitos à lei brasileira, embora cometidos no estrangeiro: crimes contra a vida ou a liberdade do Presidente da República.' / 'Art. 7º, §1º, CP: Nos casos do inciso I, o agente é punido segundo a lei brasileira, ainda que absolvido ou condenado no estrangeiro.'","peg":"A absolvição ou condenação estrangeira NÃO impede nova punição no Brasil — na incondicionada, §1º do art. 7º CP afasta qualquer obstrução prévia."},{"n":5,"enun":"Para que a lei penal brasileira se aplique a crime praticado por brasileiro no exterior, basta que o agente ingresse no território nacional após o fato.","gab":"ERRADO","com":"Errado. A extraterritorialidade condicionada exige o preenchimento *cumulativo* de cinco condições (art. 7º, §2º CP). Retornar ao Brasil é apenas uma delas. Se faltar a dupla tipicidade, por exemplo, a lei brasileira não se aplica. São como requisitos de aprovação num concurso: não basta passar numa fase; todas têm que ser superadas.","fund":"LEI: 'Art. 7º, §2º, CP: Nos casos do inciso II, a aplicação da lei brasileira depende do concurso das seguintes condições: a) entrar o agente no território nacional; b) ser o fato punível também no país em que foi praticado; c) estar o crime incluído entre aqueles pelos quais a lei brasileira autoriza a extradição; d) não ter sido o agente absolvido no estrangeiro ou não ter aí cumprido a pena; e) não ter sido o agente perdoado no estrangeiro ou por outro motivo não estar extinta a punibilidade.'","peg":"As cinco condições do §2º são CUMULATIVAS — basta uma ausente para afastar a jurisdição brasileira. Alternatividade não existe aqui."},{"n":6,"enun":"O crime de estupro de vulnerável, embora seja de ação penal pública incondicionada quando praticado no Brasil, passa a ser de ação pública condicionada à representação quando cometido por estrangeiro contra brasileiro no exterior, nos termos do art. 7.º, § 3.º, b, do Código Penal.","gab":"CERTO","com":"Certo. A extraterritorialidade hipercondicionada (art. 7º, §3º, CP) para crimes de estrangeiro contra brasileiro no exterior exige, além das condições do §2º, a representação do ofendido se o crime é de ação condicionada ou privada. O STJ consagrou que o estupro de vulnerável, mesmo sendo incondicionado no Brasil, passa a exigir representação nesse contexto específico.","fund":"LEI: 'Art. 7º, §3º, b, CP: A lei brasileira aplica-se também ao crime cometido por estrangeiro contra brasileiro fora do Brasil se, reunidas as condições previstas no parágrafo anterior: não foi pedida ou foi negada a extradição; houve requisição do Ministro da Justiça.' | JURISPRUDÊNCIA: 'STJ (Buscador Dizer o Direito): não obstante o estupro de vulnerável seja crime de ação pública incondicionada, quando praticado por estrangeiro contra brasileiro no exterior, a ação passa a ser pública condicionada à representação, nos termos do art. 7º, §3º, b, CP.'","peg":"Crime incondicionado no Brasil → condicionado à representação quando cometido por estrangeiro contra brasileiro no exterior (art. 7º, §3º CP). A natureza da ação se altera pelo contexto extraterritorial."},{"n":7,"enun":"O lugar do crime, para fins de fixação de competência entre comarcas distintas no Brasil, é determinado pela teoria da ubiquidade, a mesma adotada pelo art. 6.º do Código Penal para crimes que transcendem o território nacional.","gab":"ERRADO","com":"Errado. Há dois regimes distintos: para crimes internacionais (plurilocais), aplica-se a teoria da ubiquidade (art. 6º CP); para crimes que ocorrem em comarcas distintas dentro do Brasil, o CPP adota a teoria do resultado (art. 70 CPP). Confundir os dois é o clássico erro de prova.","fund":"LEI: 'Art. 6º, CP: teoria da ubiquidade — para fixação de competência internacional.' / 'Art. 70, CPP: A competência será, de regra, determinada pelo lugar em que se consumar a infração, ou, no caso de tentativa, pelo lugar em que for praticado o último ato de execução.' — teoria do resultado/consumação para competência interna.","peg":"Ubiquidade (art. 6º CP) = competência internacional. Resultado/consumação (art. 70 CPP) = competência interna. Nunca intercambiar."},{"n":8,"enun":"No tocante à tentativa de crime impossível, a jurisprudência do STF consagrou o entendimento de que se configura crime impossível quando o agente é induzido por policiais a praticar o delito, hipótese denominada flagrante preparado.","gab":"CERTO","com":"Certo. No flagrante preparado (ou crime de ensaio), a vítima ou o agente provocador cria as condições para que o suspeito cometa o crime e, ao mesmo tempo, impede a consumação — tornando o delito impossível pela inadequação absoluta do meio ou do objeto. É como convidar alguém a roubar um cofre já vazio e prendê-lo na tentativa.","fund":"LEI: 'Art. 17, CP: Não se pune a tentativa quando, por ineficácia absoluta do meio ou por absoluta impropriedade do objeto, é impossível consumar-se o crime.' | JURISPRUDÊNCIA: 'Súmula 145 STF: Não há crime quando a preparação do flagrante pela polícia torna impossível a sua consumação.'","jur_status":"OK"},{"n":9,"enun":"O dolo eventual caracteriza-se quando o agente prevê o resultado como possível e o aceita como indiferente, assumindo o risco de produzi-lo, o que o diferencia da culpa consciente, em que o agente prevê o resultado mas acredita sinceramente que ele não ocorrerá.","gab":"CERTO","com":"Certo. A distinção é sutil mas crucial para provas de Delegado. No dolo eventual: 'tanto faz' (indiferença ao resultado). Na culpa consciente: 'acredito que não vai acontecer' (equívoco sobre a própria habilidade). Um motorista que corre em via escolar às 3h da manhã assume o risco (eventual); quem corre no mesmo local de dia acreditando que está vazio erra por confiança excessiva (culpa consciente).","fund":"LEI: 'Art. 18, I, CP: Diz-se o crime doloso quando o agente quis o resultado ou assumiu o risco de produzi-lo.' | DOUTRINA: 'Claus Roxin: na culpa consciente o agente confia — ainda que levianamente — na não-ocorrência do resultado; no dolo eventual, o agente se mostra indiferente ao resultado, sendo-lhe irrelevante sua produção (teoria do consentimento).'"},{"n":10,"enun":"A Súmula 711 do STF estabelece que a lei penal mais grave se aplica ao crime continuado ou ao crime permanente se a sua vigência é anterior à cessação da continuidade ou da permanência.","gab":"CERTO","com":"Certo. Em crimes permanentes (ex.: sequestro) ou continuados, enquanto o crime ainda está acontecendo, a lei mais grave editada nesse intervalo já se aplica. Não é retroatividade — é aplicação imediata porque o crime ainda está sendo praticado. Como uma fatura de luz: a nova tarifa vale nos meses em que ainda estava ligado o aparelho.","fund":"LEI: 'Art. 5º, XL, CF/88: a lei penal não retroagirá, salvo para beneficiar o réu.' | JURISPRUDÊNCIA: 'Súmula 711 STF: A lei penal mais grave aplica-se ao crime continuado ou ao crime permanente, se a sua vigência é anterior à cessação da continuidade ou da permanência.'","jur_status":"OK"},{"n":11,"enun":"O homicídio qualificado-privilegiado — isto é, aquele em que coexistem uma qualificadora objetiva e uma causa de diminuição de pena privilegiada — é considerado hediondo pelo STF.","gab":"ERRADO","com":"Errado. O STF firmou que o homicídio qualificado-privilegiado NÃO é hediondo. O privilégio (relevante valor moral, violenta emoção) — sempre de natureza subjetiva — é incompatível com as qualificadoras objetivas para fins de hediondez. Crimes hediondos não admitem convivência com privilégio.","fund":"LEI: 'Art. 121, §1º e §2º, CP: homicídio privilegiado (pena reduzida de 1/6 a 1/3) e qualificado.' | JURISPRUDÊNCIA: 'STF, HC 97.252/RS (Pleno): o homicídio privilegiado-qualificado não é hediondo. O STF reiterou que a coexistência de qualificadora objetiva com causa de diminuição privilegiada afasta o caráter hediondo do crime.'","peg":"Qualificadora OBJETIVA (meio cruel, traição) pode coexistir com privilégio SUBJETIVO (violenta emoção). Mas essa combinação AFASTA a hediondez.","jur_status":"PENDENTE"},{"n":12,"enun":"No feminicídio, a qualificadora do homicídio praticado contra mulher por razões da condição do sexo feminino tem natureza objetiva, razão pela qual não é incompatível com o reconhecimento do privilégio.","gab":"ERRADO","com":"Errado. O STJ firmou que a qualificadora do feminicídio tem natureza SUBJETIVA (razões de condição do sexo feminino são um motivo determinante do agente). Por isso, é incompatível com o privilégio — que também é subjetivo. Duas qualificadoras subjetivas não convivem com o privilégio.","fund":"LEI: 'Art. 121, §2º, VI, CP: homicídio qualificado contra a mulher por razões da condição de sexo feminino.' | JURISPRUDÊNCIA: 'STJ, HC 433.898/RS (5ª T., 2019): a qualificadora do feminicídio é de natureza subjetiva e incompatível com o privilégio, diferentemente do que ocorre com qualificadoras objetivas como emprego de veneno ou fogo.'","peg":"Feminicídio = qualificadora SUBJETIVA. Incompatível com privilégio. Erro frequente: confundi-la com qualificadoras objetivas (meio cruel, traição).","jur_status":"PENDENTE"},{"n":13,"enun":"A Lei Maria da Penha (Lei n.º 11.340/2006) aplica-se exclusivamente às relações de conjugalidade ou união estável, não alcançando violência praticada entre irmãos ou entre pai e filha.","gab":"ERRADO","com":"Errado. A Lei Maria da Penha protege a mulher vítima de violência doméstica e familiar, abrangendo relações de parentesco (pais, irmãos, filhos), relações de convivência e relações íntimas de afeto — independentemente de coabitação. A violência entre irmãos, de pai contra filha, ou de ex-namorado contra ex-namorada está no âmbito da lei.","fund":"LEI: 'Art. 5º, II e III, Lei 11.340/2006: entende-se por violência doméstica e familiar contra a mulher qualquer ação ou omissão baseada no gênero que lhe cause morte, lesão, sofrimento físico, sexual ou psicológico e dano moral ou patrimonial: II — no âmbito da família, compreendida como a comunidade formada por indivíduos que são ou se consideram aparentados; III — em qualquer relação íntima de afeto, na qual o agressor conviva ou tenha convivido com a ofendida, independentemente de coabitação.'"},{"n":14,"enun":"De acordo com o entendimento do STF, a ação penal nos crimes de lesão corporal leve praticados no âmbito da Lei Maria da Penha é pública condicionada à representação da vítima.","gab":"ERRADO","com":"Errado. O STF declarou, na ADI 4.424 (2012), que a ação penal nos crimes de lesão corporal leve no contexto da LMP é pública INCONDICIONADA. A decisão foi tomada para proteger a vítima de pressões para retirar a representação. O MP pode e deve agir de ofício, independentemente do desejo da vítima.","fund":"LEI: 'Art. 41, Lei 11.340/2006: Aos crimes praticados com violência doméstica e familiar contra a mulher, independentemente da pena prevista, não se aplica a Lei n.º 9.099/1995.' | JURISPRUDÊNCIA: 'STF, ADI 4.424/DF (Pleno, j. 09/02/2012, rel. Min. Marco Aurélio): declarou a constitucionalidade da interpretação que torna incondicionada a ação penal nos crimes de lesão corporal leve cometidos no âmbito da LMP.'","peg":"Lesão leve fora da LMP = condicionada à representação. Lesão leve DENTRO da LMP = INCONDICIONADA (ADI 4.424/STF). Essa distinção cai em prova.","jur_status":"PENDENTE"},{"n":15,"enun":"Para fins de aplicação da Lei n.º 11.343/2006 (Lei de Drogas), o usuário de drogas que é flagrado com pequena quantidade da substância para consumo pessoal não pratica crime, uma vez que a conduta foi descriminalizada.","gab":"ERRADO","com":"Errado. O art. 28 da Lei 11.343/2006 NÃO descriminalizou o uso — houve apenas despenalização (manteve-se a tipicidade, mas as penas privativas de liberdade foram substituídas por medidas alternativas). O STF, no RE 635.659, decidiu em 2024 pela inconstitucionalidade da criminalização do porte para uso, mas ainda analisa a modulação dos efeitos — até a decisão definitiva transitar, o art. 28 permanece vigente.","fund":"LEI: 'Art. 28, Lei 11.343/2006: Quem adquirir, guardar, tiver em depósito, transportar ou trouxer consigo, para consumo pessoal, drogas sem autorização ou em desacordo com determinação legal ou regulamentar será submetido às seguintes penas: I — advertência; II — prestação de serviços à comunidade; III — medida educativa.' | NOTA: Despenalização ≠ descriminalização: o fato continua sendo crime (típico), mas a consequência não é pena privativa de liberdade.","peg":"Despenalização (art. 28 LDrogas) ≠ descriminalização. O fato ainda é crime — apenas as sanções são alternativas, não prisão."},{"n":16,"enun":"A Lei n.º 13.869/2019 (Lei de Abuso de Autoridade) exige, para a configuração dos crimes nela tipificados, a presença de dolo específico, consistente na finalidade de prejudicar outrem ou de beneficiar a si próprio ou a terceiro, ou ainda de satisfazer capricho pessoal.","gab":"CERTO","com":"Certo. A Lei de Abuso de Autoridade exige o denominado dolo específico (finalidade especial de agir) para que a conduta seja típica. Sem essa motivação especial, o ato pode ser anulado administrativamente, mas não gera crime. É como a diferença entre um médico que erra por negligência e um que age para prejudicar o paciente — só o segundo é crime doloso específico.","fund":"LEI: 'Art. 1º, §1º, Lei 13.869/2019: As condutas descritas nesta Lei constituem crime de abuso de autoridade quando praticadas pelo agente com a finalidade específica de prejudicar outrem ou beneficiar a si mesmo ou a terceiro, ou, ainda, por mero capricho ou satisfação pessoal.' | DOUTRINA: 'Sem a finalidade especial de agir, pode existir falta funcional ou ilegalidade — mas não crime de abuso de autoridade.'","peg":"Ausência do dolo específico (art. 1º, §1º) = atipicidade do crime de abuso de autoridade, ainda que o ato seja ilegal ou abusivo."},{"n":17,"enun":"Nos termos da jurisprudência consolidada do STJ, a reincidência do agente impede, de forma absoluta, o reconhecimento da insignificância penal.","gab":"ERRADO","com":"Errado. O STJ tende a afastar a insignificância quando há reincidência, mas não de forma absoluta. O STF analisa caso a caso, reconhecendo que a reincidência é apenas um dos critérios a ponderar, não um obstáculo intransponível. Há divergência entre os Tribunais — a CEBRASPE geralmente espelha a posição do STF quando há divergência.","fund":"LEI: 'Art. 59, CP: o juiz atenderá à culpabilidade, aos antecedentes, à conduta social, à personalidade do agente...' | JURISPRUDÊNCIA: 'STF, HC 123.734/MG (2ª T., 2014): a reincidência não veda, por si só, a aplicação do princípio da insignificância — devem ser analisadas as circunstâncias concretas do caso. / STJ: em regra afasta a insignificância ao reincidente, mas admite exceções.' | DIVERGÊNCIA D2 — não afirmar como pacificado.","peg":"Divergência STF×STJ: STJ tende a afastar insignificância + reincidência; STF analisa caso a caso. CEBRASPE geralmente não afirma como pacificada a vedação absoluta.","jur_status":"PENDENTE"},{"n":18,"enun":"A progressão de regime para condenado por crime hediondo primário, conforme a redação dada pela Lei n.º 13.964/2019, exige o cumprimento de 40% da pena.","gab":"CERTO","com":"Certo. O Pacote Anticrime trouxe novos percentuais para progressão de regime em crimes hediondos: 40% para primário, 50% para reincidente não específico e 60% para reincidente específico em hediondo. Acabou com a diferença 2/5 (primário) e 3/5 (reincidente) da lei anterior (Lei 11.464/2007), tornando os percentuais mais claros.","fund":"LEI: 'Art. 112, V e VI, LEP (com redação da Lei 13.964/2019): A pena privativa de liberdade será executada em forma progressiva com a transferência para regime menos rigoroso, a ser determinada pelo juiz, quando o preso tiver cumprido ao menos: V — 40% (quarenta por cento) da pena, se o apenado for condenado pela prática de crime hediondo ou equiparado, se for primário; VI — 50% (cinquenta por cento) da pena, se o apenado for condenado pela prática de crime hediondo ou equiparado, com resultado lesão corporal de natureza grave ou morte; VII — 60% (sessenta por cento) da pena, se o apenado for reincidente na prática de crime hediondo ou equiparado.'"},{"n":19,"enun":"Segundo a Súmula 231 do STJ, a incidência de circunstância atenuante pode reduzir a pena abaixo do mínimo legal, desde que haja fundamentação adequada na sentença.","gab":"ERRADO","com":"Errado. A Súmula 231/STJ é clara: atenuante NÃO reduz a pena abaixo do mínimo legal. Isso ocorre apenas nas causas de diminuição de pena (terceira fase da dosimetria). A fundamentação não é capaz de superar esse limite — ele é absoluto para as circunstâncias atenuantes na segunda fase.","fund":"JURISPRUDÊNCIA: 'Súmula 231 STJ: A incidência da circunstância atenuante não pode conduzir à redução da pena abaixo do mínimo legal.' | DOUTRINA: 'A trifásica de Nelson Hungria: 1ª fase — pena-base; 2ª fase — agravantes/atenuantes (não ultrapassam limites legais); 3ª fase — causas de aumento/diminuição (podem ultrapassar).'","peg":"Atenuante: não rompe o mínimo (S. 231 STJ). Causa de diminuição: pode sim. Confundir as fases da dosimetria é erro fatal em questões objetivas.","jur_status":"OK"},{"n":20,"enun":"O STF, nas ADCs 43, 44 e 54, fixou o entendimento de que o cumprimento da pena privativa de liberdade somente pode ter início após o trânsito em julgado da sentença penal condenatória.","gab":"CERTO","com":"Certo. Em novembro de 2019, o STF superou o HC 126.292 (execução após 2ª instância) e restabeleceu a garantia constitucional: pena somente após trânsito em julgado (art. 5º, LVII, CF). É o princípio da presunção de inocência em sua plenitude. Esse julgado é indispensável para o cargo de Delegado.","fund":"LEI: 'Art. 5º, LVII, CF/88: ninguém será considerado culpado até o trânsito em julgado de sentença penal condenatória.' / 'Art. 283, CPP: Ninguém poderá ser preso senão em flagrante delito ou por ordem escrita e fundamentada da autoridade judiciária competente, em decorrência de sentença condenatória transitada em julgado...' | JURISPRUDÊNCIA: 'STF, ADCs 43, 44 e 54 (Pleno, j. 07/11/2019): execução provisória da pena antes do trânsito em julgado viola o art. 5º, LVII, CF. SUPEROU o HC 126.292/2016.'"},{"n":21,"enun":"O perdão judicial, segundo a Súmula 18 do STJ, constitui sentença condenatória, produzindo, portanto, os efeitos secundários da condenação, como a reincidência e os efeitos civis.","gab":"ERRADO","com":"Errado. O perdão judicial é sentença DECLARATÓRIA extintiva da punibilidade — não condenatória. Por isso, não gera reincidência, não constará de folha de antecedentes para fins penais e não produz efeitos civis de uma condenação.","fund":"JURISPRUDÊNCIA: 'Súmula 18 STJ: A sentença concessiva do perdão judicial é declaratória da extinção da punibilidade, não subsistindo qualquer efeito condenatório.' | DOUTRINA: 'Diferente do sursis (suspensão condicional da pena), que pressupõe condenação, o perdão judicial extingue a punibilidade sem condenação, não gerando os efeitos secundários típicos desta.'","jur_status":"OK"},{"n":22,"enun":"No concurso formal impróprio (ou imperfeito), o juiz aplica cumulativamente as penas de cada crime, diferentemente do concurso formal próprio, em que se aplica somente a mais grave ou, sendo iguais, uma delas aumentada de um sexto a metade.","gab":"CERTO","com":"Certo. O concurso formal próprio ocorre quando uma única ação produz vários resultados sem desígnios autônomos: aplica-se a pena mais grave acrescida de 1/6 a 1/2. O impróprio ocorre quando o agente, com uma única ação, intencionalmente produz crimes distintos: cumulam-se as penas. É como um motorista que atropela acidentalmente várias pessoas (formal próprio) vs. um atirador que planeja matar várias vítimas com um único disparo (formal impróprio).","fund":"LEI: 'Art. 70, CP: Quando o agente, mediante uma só ação ou omissão, pratica dois ou mais crimes, idênticos ou não, aplica-se-lhe a mais grave das penas cabíveis ou, se iguais, somente uma delas, mas aumentada, em qualquer caso, de um sexto até metade. As penas aplicam-se, entretanto, cumulativamente, se a ação ou omissão é dolosa e os crimes concorrentes resultam de desígnios autônomos, consoante o disposto no artigo anterior.'"},{"n":23,"enun":"O instituto da prescrição virtual ou antecipada, por meio do qual o juiz projeta a pena que seria aplicada ao condenado e, com base nela, antecipa a declaração de extinção da punibilidade, é amplamente aceito pela jurisprudência brasileira.","gab":"ERRADO","com":"Errado. A prescrição virtual ou em perspectiva é inadmissível no ordenamento brasileiro, conforme a Súmula 438/STJ e a Repercussão Geral 602.527/STF. Não se pode calcular prescrição com base numa pena hipotética — isso violaria o princípio da presunção de inocência e da inevitabilidade da persecução penal.","fund":"JURISPRUDÊNCIA: 'Súmula 438 STJ (j. 28/04/2010): É inadmissível a extinção da punibilidade pela prescrição da pretensão punitiva com fundamento em pena hipotética, independentemente da existência ou sorte do processo penal.' | CONVERGÊNCIA C1: STF (RG 602.527) e STJ (S. 438) convergem na inadmissibilidade da prescrição virtual.","peg":"Prescrição virtual = inadmissível. STF e STJ convergem (Convergência C1). Qualquer questão que a apresente como aceita está errada.","jur_status":"OK"},{"n":24,"enun":"No concurso material de crimes, o réu cometeu dois ou mais crimes mediante duas ou mais ações ou omissões, aplicando-se a regra da cumulação das penas de cada crime.","gab":"CERTO","com":"Certo. No concurso material (art. 69 CP), há pluralidade de ações E pluralidade de crimes — cumulam-se as penas. É diferente do formal (uma ação, vários crimes) e do continuado (vários crimes, mas por ficção jurídica trata-se de crime único aumentado). Para o Delegado, identificar o concurso correto impacta diretamente o cálculo da prescrição e a competência.","fund":"LEI: 'Art. 69, CP: Quando o agente, mediante mais de uma ação ou omissão, pratica dois ou mais crimes, idênticos ou não, aplicam-se cumulativamente as penas privativas de liberdade em que haja incorrido. No caso de aplicação cumulativa de penas de reclusão e de detenção, executa-se primeiro aquela.'"}]},{"nome":"Direito Processual Penal e Legislação Especial","comando":"Acerca da ação penal pública e privada, inquérito policial, provas e medidas cautelares, julgue os itens a seguir.","itens":[{"n":25,"enun":"A ação penal pública incondicionada rege-se pelo princípio da obrigatoriedade, o que significa que o Ministério Público é obrigado a oferecer denúncia sempre que houver justa causa, não lhe sendo facultado arquivar o inquérito policial sem submissão ao controle judicial.","gab":"CERTO","com":"Certo. No sistema brasileiro, o MP não tem discricionariedade para arquivar um inquérito sem levar ao Judiciário — o princípio da obrigatoriedade impõe a denúncia quando há justa causa. O arquivamento requer decisão do juiz (ou, após a Lei 13.964/2019, do órgão competente de revisão do MP).","fund":"LEI: 'Art. 28, CPP (redação original): Ordenado o arquivamento do inquérito policial ou de quaisquer peças de informação, o órgão do Ministério Público comunicará à vítima, ao investigado e à autoridade policial e encaminhará os autos para a instância de revisão ministerial para fins de homologação.' | DOUTRINA: 'Princípio da obrigatoriedade: presentes as condições da ação penal, o MP não dispõe de discricionariedade para não oferecer denúncia.'"},{"n":26,"enun":"A representação do ofendido, nas ações penais públicas condicionadas a esse requisito, é condição de procedibilidade e possui prazo decadencial de seis meses, contado do dia em que o ofendido veio a saber quem é o autor do crime.","gab":"CERTO","com":"Certo. A representação é condição de procedibilidade para a ação penal condicionada: sem ela, o inquérito não pode ser instaurado e a denúncia não pode ser oferecida. O prazo de 6 meses é decadencial (extingue a punibilidade) e começa a correr da identificação do autor — não da data do fato.","fund":"LEI: 'Art. 38, CPP: Salvo disposição em contrário, o ofendido, ou seu representante legal, decairá do direito de queixa ou de representação, se não o exercer dentro do prazo de seis meses, contado do dia em que vier a saber quem é o autor do crime.' / 'Art. 107, IV, CP: Extingue-se a punibilidade pela decadência.'","peg":"O prazo de 6 meses começa do CONHECIMENTO DO AUTOR, não da data do crime. Erro frequente: confundir os dois marcos temporais."},{"n":27,"enun":"A representação criminal, nas ações penais condicionadas, pode ser retratada pelo ofendido a qualquer momento, inclusive após o início do processo penal.","gab":"ERRADO","com":"Errado. A retratação da representação é admitida apenas até o OFERECIMENTO da denúncia pelo MP. Após a denúncia ser entregue em cartório, a representação torna-se irretratável. É como um cheque já depositado — não é mais possível pedir de volta ao banco.","fund":"LEI: 'Art. 25, CPP: A representação será irretratável, depois de oferecida a denúncia.' | NOTA: Distinguir representação (ação condicionada) de queixa-crime (ação privada): na queixa, o perdão pode ser dado até o trânsito em julgado — mas na representação, a irretratabilidade é anterior."},{"n":28,"enun":"Para a instauração do inquérito policial em crimes de ação penal pública incondicionada, o delegado de polícia pode agir de ofício, sem necessidade de representação do ofendido ou de requisição de autoridade.","gab":"CERTO","com":"Certo. Na ação incondicionada, a autoridade policial pode instaurar inquérito por portaria, de ofício, ao tomar conhecimento do fato (art. 5º, I, CPP). O delegado não depende de autorização ou representação — age pela própria competência funcional. Essa é uma das prerrogativas centrais do cargo.","fund":"LEI: 'Art. 5º, I, CPP: Nos crimes de ação pública o inquérito policial será iniciado: I — de ofício; II — mediante requisição da autoridade judiciária ou do Ministério Público, ou a requerimento do ofendido ou de quem tiver qualidade para representá-lo.' | NOTA: Em crimes de ação condicionada, a instauração de ofício não é admitida antes da representação."},{"n":29,"enun":"O crime de estelionato, após as modificações promovidas pelo Pacote Anticrime (Lei n.º 13.964/2019), passou a ser, em regra, de ação penal pública condicionada à representação, com exceções para quando praticado contra a Administração Pública, idoso, vulnerável ou instituição financeira pública.","gab":"CERTO","com":"Certo. O Pacote Anticrime inseriu o §5º no art. 171 CP, tornando o estelionato crime de ação condicionada — salvo nas hipóteses excepcionais listadas. Para o delegado, isso significa que não pode mais instaurar IP de ofício para estelionato simples sem representação da vítima.","fund":"LEI: 'Art. 171, §5º, CP (Lei 13.964/2019): Somente se procede mediante representação, salvo se a vítima for: a Administração Pública, direta ou indireta; criança ou adolescente; pessoa com deficiência mental; maior de 70 (setenta) anos de idade ou incapaz.' | STJ: a mudança retroage para processos em andamento não transitados em julgado (novatio legis in mellius).","peg":"Estelionato pós-2019 = condicionado à representação (REGRA). Exceções: Adm. Pública, criança/adolescente, deficiente mental, idoso ≥70. Sem representação, IP não pode ser instaurado de ofício."},{"n":30,"enun":"A ação penal privada subsidiária da pública é cabível quando o Ministério Público deixar de oferecer denúncia dentro do prazo legal, sendo inadmissível quando o órgão ministerial pede o arquivamento do inquérito.","gab":"CERTO","com":"Certo. A subsidiária nasce da inércia do MP: se ele não age no prazo, a vítima pode tomar a frente com a queixa-crime subsidiária. Mas se o MP pediu arquivamento (mesmo que a vítima discorde), não cabe subsidiária — o MP não ficou inerte; tomou uma decisão. É como dar ao herdeiro o direito de cobrar a dívida se o credor original esquece, mas não se o credor deliberadamente perdoa.","fund":"LEI: 'Art. 29, CPP: Será admitida ação privada nos crimes de ação pública, se esta não for intentada no prazo legal, cabendo ao Ministério Público aditar a queixa, repudiá-la e oferecer denúncia substitutiva...' | STJ (2024): não cabe subsidiária por mera discordância da tipificação atribuída pelo MP — inércia é pressuposto inafastável.","peg":"Subsidiária = pressupõe INÉRCIA do MP (silêncio). Pedido de arquivamento ou denúncia por tipo diferente ≠ inércia. Não cabe subsidiária nesses casos."},{"n":31,"enun":"A queixa-crime, instrumento da ação penal privada, deve ser oferecida pelo próprio ofendido ou por seu representante legal, sendo vedada a sua ratificação por procurador com poderes especiais para o ato.","gab":"ERRADO","com":"Errado. A queixa-crime pode ser oferecida pelo ofendido pessoalmente ou por procurador com poderes especiais para o ato (art. 44 CPP). A exigência é que os poderes sejam específicos para a queixa — não basta procuração geral.","fund":"LEI: 'Art. 44, CPP: A queixa poderá ser dada por procurador com poderes especiais, devendo constar do instrumento do mandato o nome do querelado e a menção do fato criminoso, salvo quando essas indicações não puderem ser feitas.' | DOUTRINA: 'O mandato ad judicia não é suficiente para a queixa — exige-se procuração com indicação do querelado e do fato.'"},{"n":32,"enun":"A perempção, causa extintiva da punibilidade própria da ação penal privada, ocorre quando o querelante deixa de promover o andamento do processo durante trinta dias consecutivos.","gab":"CERTO","com":"Certo. A perempção pune a inércia do querelante durante o processo — se ele abandona a queixa por 30 dias, o Estado presume o abandono da pretensão punitiva e extingue a punibilidade. É como a deserção em processo cível: quem não aparece perde.","fund":"LEI: 'Art. 60, I, CPP: Nos casos em que somente se procede mediante queixa, considerar-se-á perempta a ação penal: I — quando, iniciada esta, o querelante deixar de promover o andamento do processo durante 30 (trinta) dias seguidos; II — quando, falecendo o querelante, ou sobrevindo sua incapacidade, não comparecer em juízo, para prosseguir no processo, dentro do prazo de 60 (sessenta) dias, qualquer das pessoas a quem couber fazê-lo.'"},{"n":33,"enun":"Em relação ao reconhecimento de pessoas, o STJ firmou entendimento, no julgamento do REsp 1.953.602-SP (Tema 1258), de que o descumprimento das formalidades do art. 226 do CPP gera nulidade relativa, sanável pela ausência de prejuízo demonstrado.","gab":"ERRADO","com":"Errado. O STJ, no HC 598.886 (Schietti, 2020) e posteriormente consolidado no Tema 1258 (REsp 1.953.602-SP, j. 11/06/2025), firmou que o reconhecimento realizado sem as formalidades do art. 226 CPP é prova de valor probatório reduzido e não pode, por si só, sustentar condenação. A nulidade é mais grave que simples sanabilidade por ausência de prejuízo.","fund":"JURISPRUDÊNCIA: 'STJ, HC 598.886/SC (Schietti, 6ª T., j. 27/10/2020): as formalidades do art. 226 CPP são obrigatórias; reconhecimento viciado não pode fundamentar condenação isolada.' / 'STJ, Tema 1258 / REsp 1.953.602-SP (j. 11/06/2025, DJEN 30/06/2025): 6 teses sobre reconhecimento de pessoas, consolidando os requisitos e as consequências do descumprimento.'","peg":"Descumprimento das formalidades do art. 226 CPP NÃO é mera irregularidade sanável — tem consequência probatória severa. Reconhecimento viciado não sustenta condenação isolada.","jur_status":"OK"},{"n":34,"enun":"O princípio do in dubio pro reo aplica-se tanto na fase de instrução processual quanto na fase de pronúncia, impedindo que o juiz pronuncie o acusado quando existir dúvida razoável sobre a autoria ou a materialidade do fato.","gab":"ERRADO","com":"Errado. Na fase de pronúncia, vige o in dubio pro societate — dúvida razoável sobre autoria leva à pronúncia, não à absolvição sumária. O in dubio pro reo só aplica-se plenamente na sentença condenatória (plenário do júri ou sentença do juiz singular). Na pronúncia, basta indícios suficientes de autoria e prova da materialidade.","fund":"LEI: 'Art. 413, CPP: O juiz, fundamentadamente, pronunciará o acusado, se convencido da materialidade do fato e da existência de indícios suficientes de autoria ou de participação.' | DOUTRINA: 'In dubio pro societate na pronúncia: a dúvida sobre a autoria não impede o envio ao Júri — cabe aos jurados decidir. Critério: indícios suficientes, não certeza.'","peg":"In dubio pro reo → na sentença. In dubio pro societate → na pronúncia (Júri). Confundir as fases é erro clássico."},{"n":35,"enun":"A prisão preventiva pode ser decretada de ofício pelo juiz, em qualquer fase da persecução penal, inclusive durante o inquérito policial, independentemente de representação da autoridade policial ou de requerimento do Ministério Público.","gab":"ERRADO","com":"Errado. Após a Lei 13.964/2019 (Pacote Anticrime), o juiz não pode mais decretar prisão preventiva de ofício em nenhuma fase — nem durante o inquérito nem durante o processo. A preventiva exige requerimento do MP, do querelante, do assistente ou representação da autoridade policial.","fund":"LEI: 'Art. 311, CPP (redação da Lei 13.964/2019): Em qualquer fase da investigação policial ou do processo penal, caberá a prisão preventiva decretada pelo juiz, a requerimento do Ministério Público, do querelante ou do assistente, ou por representação da autoridade policial.' | NOTA: Antes do Pacote Anticrime, a decretação de ofício durante o processo era admitida — agora, vedada.","peg":"Pacote Anticrime (2019): proibiu decretação de preventiva de ofício em QUALQUER fase. Antes, era admitida durante o processo (não o IP). Atenção à mudança."},{"n":36,"enun":"A busca pessoal, segundo o STJ, pode ser realizada pela autoridade policial desde que presente suspeita razoável de que o indivíduo traga consigo objetos que constituam prova de infração penal, sendo dispensável que a suspeita seja objetiva e prévia.","gab":"ERRADO","com":"Errado. O STJ, no RHC 158.580/BA (Schietti, 2022), firmou que a busca pessoal exige FUNDADA SUSPEITA prévia, objetiva e específica — não basta suspeita vaga, perfil de suspeito ou apenas o nervosismo do abordado. A fundada suspeita deve ser objetivamente demonstrável e anterior à abordagem.","fund":"LEI: 'Art. 240, §2º, CPP: Proceder-se-á à busca pessoal quando houver fundada suspeita de que alguém oculte consigo arma proibida ou objetos mencionados nas letras b a f e letra h do parágrafo anterior.' | JURISPRUDÊNCIA: 'STJ, RHC 158.580/BA (Schietti, 6ª T., j. 19/04/2022): busca pessoal exige fundada suspeita prévia, objetiva e específica — não basta suspeita genérica baseada em perfil.'","peg":"Busca pessoal lícita = fundada suspeita OBJETIVA e PRÉVIA. Suspeita vaga, nervosismo isolado, perfil racial ou local não bastam (STJ, RHC 158.580).","jur_status":"OK"},{"n":37,"enun":"O acesso do advogado a todos os elementos de informação que digam respeito ao investigado, mesmo nos inquéritos policiais que tramitem sob sigilo, é garantido pela Súmula Vinculante n.º 14 do STF.","gab":"CERTO","com":"Certo. A SV 14 garante ao defensor o acesso ao inquérito, mesmo em sigilo, quanto aos elementos já documentados relativos ao investigado. O sigilo do IP não pode ser oposto ao advogado — apenas aos demais investigados e ao público em geral. Essa garantia é essencial para o exercício da ampla defesa.","fund":"JURISPRUDÊNCIA: 'Súmula Vinculante 14 STF: É direito do defensor, no interesse do representado, ter acesso amplo aos elementos de prova que, já documentados em procedimento investigatório realizado por órg
