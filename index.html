 oculte consigo arma proibida ou objetos mencionados nas letras b a f e letra h do parágrafo anterior.'\"\nJURISPRUDÊNCIA: \"STJ, RHC 158.580/BA (Schietti, 6ª Turma, j. 19/04/2022): busca pessoal exige fundada suspeita prévia, objetiva e específica; suspeita subjetiva (perfil racial, vestimenta genérica) não é fundamento válido; prova obtida é ilícita.\"","peg":"Busca pessoal: fundada suspeita OBJETIVA e ESPECÍFICA. Perfil subjetivo = ilegalidade. Ponto de alto potencial PCDF 2026.","jur_status":"OK"},{"n":36,"enun":"Conforme o STF, no RE 603.616 (Tema 280 de repercussão geral), a entrada forçada em domicílio sem mandado judicial é sempre ilícita, salvo flagrante delito em curso.","gab":"ERRADO","com":"O item está parcialmente errado. O Tema 280 STF (RE 603.616) não se limita ao flagrante em curso: admite entrada forçada sem mandado quando há 'fundadas razões' de que o crime está sendo praticado, a serem justificadas a posteriori nos autos. Não se exige flagrante em acepção estrita; exige-se justificativa concreta após a entrada. A questão explora a extensão correta da tese do STF.","fund":"LEI: \"CF, art. 5°, XI: 'a casa é asilo inviolável do indivíduo, ninguém nela podendo penetrar sem consentimento do morador, salvo em caso de flagrante delito ou desastre, ou para prestar socorro, ou, durante o dia, por determinação judicial.'\"\nJURISPRUDÊNCIA: \"STF, RE 603.616/RO (Gilmar Mendes, Pleno, j. 05/11/2015): a entrada forçada em domicílio sem mandado judicial só é lícita se amparada por fundadas razões, objetivamente aferíveis, a serem justificadas a posteriori; simples suspeita não basta.\"","peg":"Tema 280 STF: entrada forçada SEM mandado admitida com FUNDADAS RAZÕES justificadas a posteriori — não se limita a flagrante stricto sensu.","jur_status":"OK"},{"n":37,"enun":"A monitoração eletrônica (tornozeleira eletrônica) é medida cautelar diversa da prisão prevista no art. 319, IX do CPP, podendo ser aplicada antes ou durante a ação penal como alternativa à prisão preventiva.","gab":"CERTO","com":"A monitoração eletrônica está expressamente listada no art. 319, IX do CPP como medida cautelar diversa da prisão. Integra o rol das 19 medidas do sistema cautelar graduado do Pacote Anticrime, sendo aplicável tanto na fase investigatória quanto durante o processo como substituta ou cumulada com outras cautelares. Não se confunde com a monitoração como condição da suspensão condicional da pena (art. 77 CP).","fund":"LEI: \"CPP, art. 319, IX: 'São medidas cautelares diversas da prisão: ... IX - monitoração eletrônica.' — aplicável em qualquer fase procedimental como alternativa à preventiva.\"\nJURISPRUDÊNCIA: \"STJ, HC 436.862/SP (5ª Turma, 2018): a monitoração eletrônica é medida cautelar autônoma ou complementar; sua aplicação depende da proporcionalidade ao caso concreto; pode ser imposta isolada ou cumulada com outras do art. 319 CPP.\"","jur_status":"PENDENTE"},{"n":38,"enun":"No inquérito policial, o indiciado pode ser compelido a participar de reconstituição do crime como forma de colaborar com a investigação, sob pena de configurar desobediência.","gab":"ERRADO","com":"O indiciado tem direito ao silêncio e à não autoincriminação (CF, art. 5°, LXIII e LXII; Pacto de São José da Costa Rica, art. 8°, §2°, g). A recusa em participar de reconstituição do crime não configura desobediência nem pode ser coercitivamente imposta. A colaboração do indiciado em qualquer ato que possa incriminá-lo é voluntária. O STJ consagrou o nemo tenetur se detegere como princípio absoluto nessa dimensão.","fund":"LEI: \"CF, art. 5°, LXIII: 'o preso será informado de seus direitos, entre os quais o de permanecer calado...' — nemo tenetur se detegere.\"\nJURISPRUDÊNCIA: \"STF, HC 99.558/ES (2ª Turma, 2010): o investigado não é obrigado a colaborar com reconstituição do fato que possa incriminá-lo; o princípio nemo tenetur se detegere tem aplicação plena na fase investigatória.\"","jur_status":"PENDENTE"},{"n":39,"enun":"A ação penal pública condicionada à representação da vítima exige que o MP aguarde a manifestação do ofendido para oferecer a denúncia, sendo vedado o aditamento após o prazo decadencial de 6 meses.","gab":"CERTO","com":"Na ação penal pública condicionada, a representação é condição de procedibilidade: sem ela, o MP não pode oferecer denúncia. O prazo decadencial para o exercício da representação é de 6 meses contados do conhecimento da autoria (CPP, art. 38). Decorrido esse prazo, opera a decadência, que extingue a punibilidade (CP, art. 107, IV). O MP não pode suprir a ausência de representação.","fund":"LEI: \"CPP, art. 38: 'Salvo disposição em contrário, o ofendido, ou seu representante legal, decairá no direito de queixa ou de representação, se não o exercer dentro do prazo de 6 (seis) meses, contado do dia em que vier a saber quem é o autor do crime...'\"\nJURISPRUDÊNCIA: \"STJ, RHC 89.534/RJ (6ª Turma, 2018): na ação pública condicionada, a representação é condição de procedibilidade; sua ausência impede o exercício da ação penal; a decadência é causa de extinção da punibilidade.\"","jur_status":"PENDENTE"},{"n":40,"enun":"O acordo de não persecução penal (ANPP) pode ser proposto pelo Ministério Público mesmo após o recebimento da denúncia pelo juiz, até a sentença de 1° grau.","gab":"ERRADO","com":"O ANPP (CPP, art. 28-A), inserido pelo Pacote Anticrime (Lei 13.964/2019), deve ser proposto antes do recebimento da denúncia. A posição do STJ é que, recebida a denúncia, o momento para o ANPP se encerra. O item explora confusão com a transação penal dos Juizados Especiais, que ocorre em fase diversa. O ANPP pressupõe que ainda não houve instauração do processo criminal.","fund":"LEI: \"CPP, art. 28-A: 'Não sendo caso de arquivamento e tendo o investigado confessado formal e circunstancialmente a prática de infração penal sem violência ou grave ameaça e com pena mínima inferior a 4 (quatro) anos, o Ministério Público poderá propor acordo de não persecução penal...' — fase pré-processual.\"\nJURISPRUDÊNCIA: \"STJ, HC 699.984/RJ (6ª Turma, 2022): o ANPP é instituto pré-processual; após o recebimento da denúncia, não é mais cabível; o momento adequado é antes da instauração do processo.\"","peg":"ANPP é PRÉ-processual: antes do recebimento da denúncia. Após o recebimento = fora do prazo para ANPP.","jur_status":"PENDENTE"},{"n":41,"enun":"A audiência de custódia não é apenas formalidade procedimental: o STF reconheceu sua obrigatoriedade constitucional para viabilizar o controle da legalidade da prisão e a verificação de eventual tortura ou mau-trato.","gab":"CERTO","com":"O STF, na ADPF 347 MC (2015), reconheceu o 'estado de coisas inconstitucional' do sistema prisional e a obrigatoriedade da audiência de custódia como instrumento de controle imediato da legalidade da prisão e de verificação de maus-tratos. Sua base normativa inclui o Pacto de São José da Costa Rica (art. 7°, §5°) e a Resolução 213/2015 do CNJ. O CPP incorporou formalmente a audiência (art. 310).","fund":"LEI: \"CPP, art. 310: audiência de custódia no prazo de 24h após o flagrante. Pacto de São José da Costa Rica, art. 7°, §5°: toda pessoa detida deve ser apresentada sem demora a um juiz.\"\nJURISPRUDÊNCIA: \"STF, ADPF 347 MC (Pleno, j. 09/09/2015): estado de coisas inconstitucional do sistema prisional; obrigatoriedade da audiência de custódia como mecanismo de controle imediato da prisão e verificação de maus-tratos.\""},{"n":42,"enun":"O descumprimento de medida cautelar diversa da prisão, como a proibição de contato com determinada pessoa, autoriza o juiz a substituir a cautelar por outra mais gravosa ou, em último caso, decretar a prisão preventiva.","gab":"CERTO","com":"O CPP, art. 282, §4°, prevê expressamente que o descumprimento injustificado de medida cautelar diversa pode levar à sua substituição por outra mais adequada, cumulação com outra medida ou, em última ratio, à decretação da prisão preventiva. O sistema é graduado: primeiro tentam-se as cautelares alternativas; o descumprimento não gera automaticamente a preventiva, mas pode ser fundamento para ela.","fund":"LEI: \"CPP, art. 282, §4°: 'No caso de descumprimento de qualquer das obrigações impostas, o juiz, de ofício ou mediante requerimento do Ministério Público, de seu assistente ou do querelante, poderá substituir a medida, impor outra em cumulação, ou, em último caso, decretar a prisão preventiva...'\"\nJURISPRUDÊNCIA: \"STJ, RHC 119.563/SP (6ª Turma, 2020): descumprimento de cautelar diversa autoriza decretação de preventiva como ultima ratio; a preventiva deve ser precedida de análise sobre a adequação de outras cautelares alternativas.\"","jur_status":"PENDENTE"},{"n":43,"enun":"O Ministério Público tem legitimidade para representar pelo decreto de prisão preventiva durante o inquérito policial, mesmo que a autoridade policial não tenha ainda indicado o investigado como provável autor do crime.","gab":"CERTO","com":"O art. 311 CPP autoriza o MP a requerer a prisão preventiva em qualquer fase da investigação policial. O indiciamento formal não é pré-requisito para o requerimento ministerial de preventiva, desde que haja indícios de autoria e materialidade (art. 312 CPP). O MP pode atuar de forma autônoma, independentemente do andamento do inquérito.","fund":"LEI: \"CPP, art. 311: 'Em qualquer fase da investigação policial ou do processo penal, caberá a prisão preventiva decretada pelo juiz, a requerimento do Ministério Público, do querelante ou do assistente, ou por representação da autoridade policial.'\"\nJURISPRUDÊNCIA: \"STJ, HC 467.278/SP (5ª Turma, 2018): o MP pode requerer preventiva durante o inquérito sem depender do indiciamento formal; exige-se apenas a presença dos requisitos do art. 312 CPP.\"","jur_status":"PENDENTE"},{"n":44,"enun":"Segundo o STJ, o reconhecimento pessoal realizado sem que a pessoa a ser reconhecida esteja junto com outras que possam ser confundidas (forma individual) tem o mesmo valor probatório do reconhecimento realizado em conformidade com o art. 226 do CPP.","gab":"ERRADO","com":"O item está errado à luz do Tema 1258 STJ (REsp 1.953.602-SP, j. 11/06/2025). O STJ fixou teses que exigem as formalidades do art. 226 CPP — incluindo a apresentação do suspeito junto a outras pessoas semelhantes — como condição de validade do reconhecimento. O reconhecimento individual (fora do protocolo do art. 226) é prova de menor valor e não pode, isoladamente, fundamentar condenação.","fund":"LEI: \"CPP, art. 226, II: 'a pessoa cujo reconhecimento se pretender será colocada, se possível, ao lado de outras que com ela tiverem qualquer semelhança.' — exigência da fileira ou procedimento análogo.\"\nJURISPRUDÊNCIA: \"STJ, Tema 1258 / REsp 1.953.602-SP (j. 11/06/2025, DJEN 30/06/2025): fixadas 6 teses sobre validade do reconhecimento; exigência das formalidades do art. 226; reconhecimento informal não pode ser base exclusiva de condenação.\"","peg":"STJ Tema 1258 (jun/2025): reconhecimento SEM formalidades do art. 226 = prova viciada. Prova de menor valor, não exclusiva."},{"n":45,"enun":"A inviolabilidade do domicílio, protegida pelo art. 5°, XI da CF, não alcança estabelecimentos comerciais em funcionamento regular, podendo a autoridade policial ingressar livremente durante o horário comercial.","gab":"ERRADO","com":"O STF estendeu a proteção do art. 5°, XI da CF aos estabelecimentos comerciais e espaços profissionais onde há expectativa razoável de privacidade. A proteção constitucional abrange escritórios, consultórios e locais de trabalho com caráter privativo. O ingresso da autoridade policial nesses espaços sem mandado ou consentimento é inconstitucional, salvo nas exceções constitucionais (flagrante, desastre, socorro, ou com autorização judicial).","fund":"LEI: \"CF, art. 5°, XI: 'a casa é asilo inviolável do indivíduo, ninguém nela podendo penetrar sem consentimento do morador...' — 'casa', segundo o STF, abrange escritórios e espaços de uso privativo.\"\nJURISPRUDÊNCIA: \"STF, RE 603.616/RO (Tema 280): a proteção constitucional do domicílio abrange espaços com expectativa legítima de privacidade; o STF e o STJ têm reconhecido essa extensão a escritórios e consultórios.\"","jur_status":"OK"},{"n":46,"enun":"A Súmula 673 do STJ dispõe que a transferência de preso para presídio federal de segurança máxima sem sua prévia oitiva não viola o contraditório, desde que o ato seja fundamentado.","gab":"CERTO","com":"A Súmula 673 STJ pacificou que a inclusão de preso em presídio federal de segurança máxima não exige oitiva prévia do sentenciado, diferentemente das regras gerais do processo penal. O fundamento é a natureza administrativa-penitenciária do ato e a necessidade de preservar a segurança. A fundamentação do ato é condição para sua validade.","fund":"LEI: \"Lei 11.671/2008 (Inclusão no Sistema Penitenciário Federal): art. 5°, §1°: 'A inclusão somente ocorrerá após decisão prévia e fundamentada do juízo responsável pela execução penal de origem...' — não exige oitiva do preso.\"\nJURISPRUDÊNCIA: \"STJ, Súmula 673: 'A transferência de preso para presídio federal de segurança máxima, sem que lhe seja oportunizado o contraditório antes do ato, não ofende o art. 5°, LV, da Constituição da República.'\""}]},{"nome":"Direito Constitucional e Legislação Complementar","comando":"Acerca da organização do Estado federal brasileiro e demais temas constitucionais, julgue os itens a seguir.","itens":[{"n":47,"enun":"O art. 1° da CF/88 consagra a indissolubilidade do vínculo federativo, sendo inconstitucional qualquer proposta que vise à secessão de ente federativo da República Federativa do Brasil.","gab":"CERTO","com":"O modelo federativo brasileiro é baseado na indissolubilidade (art. 1°, CF), que proíbe a secessão. O direito de autodeterminação dos povos (art. 4°, III) aplica-se às relações internacionais, não à dissolução interna da Federação. Proposta de emenda constitucional que viabilizasse secessão tenderia a abolir a forma federativa do Estado (art. 60, §4°, I, CF), sendo inconstitucional — cláusula pétrea.","fund":"LEI: \"CF, art. 1°: 'A República Federativa do Brasil, formada pela união indissolúvel dos Estados e Municípios e do Distrito Federal, constitui-se em Estado Democrático de Direito...' — indissolubilidade expressa.\"\nJURISPRUDÊNCIA: \"STF, ADI 1.247 MC/PA (Pleno, 1995): a forma federativa é cláusula pétrea (art. 60, §4°, I); proposta que vise à secessão ou abolição da Federação é inconstitucional; o STF reafirmou em ADI 2.650.\""},{"n":48,"enun":"A competência privativa da União para legislar, prevista no art. 22 da CF/88, pode ser delegada aos Estados-membros mediante lei complementar federal, desde que a delegação abranja apenas questões específicas.","gab":"CERTO","com":"O art. 22, parágrafo único da CF autoriza a delegação da competência legislativa privativa da União aos Estados por lei complementar, observando que a delegação deve se referir a questões específicas das matérias relacionadas no artigo. Não é uma delegação genérica. Distingue-se da competência exclusiva administrativa (art. 21), que é indelegável.","fund":"LEI: \"CF, art. 22, parágrafo único: 'Lei complementar poderá autorizar os Estados a legislar sobre questões específicas das matérias relacionadas neste artigo.' — delegação permitida, mas por LC e sobre questões específicas.\"\nJURISPRUDÊNCIA: \"STF, ADI 2.656/SP (Pleno, 2003): a delegação do art. 22, parágrafo único deve ser explícita e específica; lei complementar que delega genericamente toda matéria é inconstitucional por excesso.\"","jur_status":"PENDENTE"},{"n":49,"enun":"Na competência legislativa concorrente (art. 24 da CF), na hipótese de superveniência de lei federal sobre normas gerais, a lei estadual anterior contrária é automaticamente revogada.","gab":"ERRADO","com":"O item comete o erro clássico: quando sobrevém lei federal sobre normas gerais em matéria de competência concorrente, a lei estadual anterior contrária fica SUSPENSA — não revogada. A distinção é técnica e juridicamente relevante: se a lei federal for posterior revogada, a lei estadual suspensa volta a ter eficácia (princípio da reinstauração). CEBRASPE cobra essa distinção sistematicamente.","fund":"LEI: \"CF, art. 24, §4°: 'A superveniência de lei federal sobre normas gerais suspende a eficácia da lei estadual, no que lhe for contrário.' — suspensão, não revogação.\"\nJURISPRUDÊNCIA: \"STF, ADI 3.645/PR (Pleno, 2006): suspensa (não revogada) a lei estadual com o advento de lei federal sobre normas gerais; se revogada a lei federal, a lei estadual retoma sua vigência — o STF reafirmou esse entendimento em diversas ADIs.\"","peg":"SUSPENSÃO ≠ REVOGAÇÃO. Se a lei federal for revogada, a estadual RETOMA a vigência. Distinguir é básico para a prova.","jur_status":"PENDENTE"},{"n":50,"enun":"Os Municípios têm competência para legislar sobre assuntos de interesse local e suplementar a legislação federal e estadual no que couber, nos termos do art. 30, I e II da CF/88.","gab":"CERTO","com":"O art. 30 CF confere aos Municípios duas competências legislativas autônomas: (I) legislar sobre assuntos de interesse local — critério da preponderância do interesse local; e (II) suplementar a legislação federal e estadual no que couber — preencher lacunas ou adaptar às especificidades locais. O STF reconheceu competência municipal para regulamentar hidrômetros (RE 738.481) com base no interesse local.","fund":"LEI: \"CF, art. 30: 'Compete aos Municípios: I - legislar sobre assuntos de interesse local; II - suplementar a legislação federal e a estadual no que couber...' — dupla base de competência legislativa municipal.\"\nJURISPRUDÊNCIA: \"STF, RE 738.481 (RG, Pleno): competência municipal para regulamentar serviço de abastecimento de água (hidrômetros) pelo interesse local, mesmo que a concessão seja estadual; interesse preponderante define o ente competente.\""},{"n":51,"enun":"Durante a vigência de intervenção federal em um Estado, o Congresso Nacional fica impedido de deliberar sobre propostas de emenda constitucional, mas pode editar leis ordinárias e complementares normalmente.","gab":"CERTO","com":"O art. 60, §1° da CF proíbe a deliberação de emendas constitucionais durante intervenção federal, estado de defesa ou estado de sítio. Essa vedação é específica para emendas (processo de reforma constitucional). As atividades legislativas ordinárias do Congresso — leis ordinárias, complementares, delegadas, medidas provisórias — não sofrem essa restrição. A proibição é restritiva, não se expande por analogia.","fund":"LEI: \"CF, art. 60, §1°: 'A Constituição não poderá ser emendada na vigência de intervenção federal, de estado de defesa ou de estado de sítio.' — vedação circunscrita ao processo de emenda.\"\nJURISPRUDÊNCIA: \"STF, MS 23.047/DF (Pleno, 1999): o art. 60, §1° veda apenas a deliberação de emendas constitucionais nos períodos de exceção; a atividade legislativa ordinária do Congresso não fica suspensa; a vedação é específica para o poder constituinte derivado reformador.\"","jur_status":"PENDENTE"},{"n":52,"enun":"O princípio da predominância do interesse é o critério básico de repartição de competências no federalismo brasileiro, cabendo à União as matérias de interesse nacional, aos Estados as de interesse regional e aos Municípios as de interesse local.","gab":"CERTO","com":"O princípio da predominância do interesse orienta a repartição de competências: interesse nacional → União; interesse regional → Estado; interesse local → Município. O STF o aplica para resolver conflitos de competência, como no RE 738.481 (hidrômetros: interesse local → Município). A CEBRASPE cobrou diretamente esse princípio em concursos para Delegado e questões de repartição de competências.","fund":"LEI: \"CF, arts. 21, 22, 23, 24, 25 e 30 — estrutura de competências que implicitamente adota o critério da predominância do interesse.\"\nJURISPRUDÊNCIA: \"STF, RE 738.481/PE (Pleno, RG): princípio da predominância do interesse como critério de definição de competência; interesse local pertence ao Município; STJ, REsp 1.232.133/SP (2ª T., 2013): interesse preponderante do ente menor prevalece em caso de dúvida — reforço da descentralização.\"","jur_status":"PENDENTE"},{"n":53,"enun":"Os princípios constitucionais sensíveis listados no art. 34, VII da CF/88 incluem a autonomia municipal, cuja violação pelo Estado-membro legitima a intervenção federal para restabelecê-la.","gab":"CERTO","com":"Os princípios constitucionais sensíveis (art. 34, VII, CF) incluem: (a) forma republicana, sistema representativo e regime democrático; (b) direitos da pessoa humana; (c) autonomia municipal; (d) prestação de contas da Administração Pública direta e indireta; (e) aplicação do mínimo constitucional em saúde e educação. A violação de qualquer deles pelo Estado-membro legitima a intervenção federal mediante provimento do STF (art. 36, IV).","fund":"LEI: \"CF, art. 34, VII: '...quando algum dos princípios referidos neste inciso for violado: a) forma republicana...; b) direitos da pessoa humana; c) autonomia municipal; d) prestação de contas...; e) aplicação do mínimo...' — autonomia municipal é princípio sensível.\"\nJURISPRUDÊNCIA: \"STF, IF 114/MT (Pleno, 2003): a violação da autonomia municipal por Estado-membro pode fundamentar intervenção federal; o provimento da representação interventiva compete ao STF; a intervenção é medida excepcional.\""},{"n":54,"enun":"A responsabilidade dos entes federativos pela prestação de saúde é solidária, segundo o STF (Tema 1234 + SV 60), podendo o cidadão acionar qualquer um deles (União, Estado ou Município) para obter o tratamento ou medicamento necessário.","gab":"CERTO","com":"O STF consolidou no Tema 1234 de RG e na SV 60 que a responsabilidade em saúde é solidária entre União, Estados e Municípios: o cidadão pode acionar qualquer ente. A SV 60 acrescenta que acordos interfederativos (ex.: convênios de repartição de responsabilidades) produzem efeitos apenas entre os entes, não excluindo o direito do cidadão de demandar qualquer deles. É ponto quente de provas pós-2024 pela atualidade da decisão.","fund":"LEI: \"CF, art. 196: 'A saúde é direito de todos e dever do Estado...'\"\nJURISPRUDÊNCIA: \"STF, Tema 1234 RG: responsabilidade solidária de todos os entes em saúde; acordos interfederativos internos não afastam a solidariedade frente ao cidadão. SV 60: 'São vedadas as decisões judiciais que criem obrigações a entes federados em matéria de saúde sem a devida fundamentação na evidência científica...' — mas a solidariedade é mantida.\""},{"n":55,"enun":"O habeas corpus pode ser impetrado por qualquer pessoa em favor de outra, dispensando-se a capacidade postulatória, dado seu caráter de writ constitucional de máxima urgência.","gab":"CERTO","com":"O habeas corpus é o único remédio constitucional em que a lei expressamente dispensa a capacidade postulatória: qualquer pessoa — inclusive o próprio paciente — pode impetrá-lo, independentemente de ser advogado (CPP, art. 654). A natureza de writ de liberdade exige máxima facilitação do acesso. Distingue-se do mandado de segurança e da ação popular, que exigem capacidade postulatória (exceto MS impetrado pelo próprio preso em causa própria).","fund":"LEI: \"CPP, art. 654: 'O habeas corpus poderá ser impetrado por qualquer pessoa, em seu favor ou de outrem, bem como pelo Ministério Público.' — dispensa de capacidade postulatória.\"\nJURISPRUDÊNCIA: \"STF, HC 84.303/CE (Pleno, 2004): qualquer pessoa pode impetrar habeas corpus, inclusive o próprio paciente por escrito não técnico; a ausência de capacidade postulatória não é obstáculo; a liberdade de locomoção merece máxima proteção.\"","jur_status":"PENDENTE"},{"n":56,"enun":"A ação popular pode ser proposta por qualquer cidadão, pessoa física no gozo de seus direitos políticos, para anular ato lesivo ao patrimônio público, à moralidade administrativa, ao meio ambiente ou ao patrimônio histórico e cultural.","gab":"CERTO","com":"A ação popular (CF, art. 5°, LXXIII; Lei 4.717/65) tem como condição de legitimidade ativa a cidadania, entendida como o exercício dos direitos políticos (eleitor em dia). Pessoas jurídicas, estrangeiros e nacionais sem direitos políticos não têm legitimidade ativa para a ação popular. A proteção abrange o patrimônio público em sentido amplo, incluindo moralidade, meio ambiente e patrimônio histórico.","fund":"LEI: \"CF, art. 5°, LXXIII: 'qualquer cidadão é parte legítima para propor ação popular que vise a anular ato lesivo ao patrimônio público ou de entidade de que o Estado participe, à moralidade administrativa, ao meio ambiente e ao patrimônio histórico e cultural...' — cidadão = pessoa física com direitos políticos.\"\nJURISPRUDÊNCIA: \"STF, RE 824.781 AgR/BA (2014): pessoa jurídica não tem legitimidade ativa para ação popular; a legitimidade é exclusiva do cidadão (eleitor); STJ reafirmou esse entendimento em hipóteses análogas.\""},{"n":57,"enun":"A competência residual dos Estados-membros abrange as matérias não vedadas pela CF e não reservadas à União ou aos Municípios, incluindo competências explícitas não delegadas.","gab":"CERTO","com":"O art. 25, §1° CF consagra a competência residual dos Estados: cabe a eles tudo que a CF não reservou à União (arts. 21 e 22) nem ao Município (art. 30). É uma competência negativa ou residual — os Estados legislam no espaço que sobra. A CF estabelece para os Estados a competência suplementar em concorrência com a União (art. 24) e a competência residual em exclusividade (art. 25, §1°).","fund":"LEI: \"CF, art. 25, §1°: 'São reservadas aos Estados as competências que não lhes sejam vedadas por esta Constituição.' — competência residual.\"\nJURISPRUDÊNCIA: \"STF, ADI 1.842/RJ (Pleno, 2013): os Estados têm competência residual ampla, mas não podem invadir as competências exclusivas da União (art. 21) ou a esfera de interesse exclusivamente local dos Municípios (art. 30, I); a residualidade estadual opera no espaço não coberto pelos extremos.\"","jur_status":"PENDENTE"},{"n":58,"enun":"A Súmula Vinculante 25 do STF veda a prisão civil do depositário infiel em qualquer modalidade, tendo em vista que os tratados internacionais de direitos humanos, incorporados ao ordenamento com status supralegal, revogam a norma permissiva do art. 5°, LXVII da CF.","gab":"ERRADO","com":"O item contém imprecisão técnica relevante. A SV 25 STF veda a prisão civil do depositário infiel, mas o fundamento jurídico é que o Pacto de São José da Costa Rica (tratado de DH com status supralegal, conforme RE 466.343 STF) tornou sem eficácia a norma permissiva do art. 5°, LXVII. O tratado NÃO revogou a CF — não pode fazê-lo, pois tem status infraconstitucional (supralegal). A CF apenas perdeu eficácia nesse ponto por força da vedação supralegal.","fund":"LEI: \"CF, art. 5°, LXVII: 'não haverá prisão civil por dívida, salvo a do responsável pelo inadimplemento voluntário e inescusável de obrigação alimentícia e a do depositário infiel.' — o art. continua vigente.\"\nJURISPRUDÊNCIA: \"STF, RE 466.343/SP (Peluso, Pleno, j. 03/12/2008): tratados de DH têm status supralegal; não revogam a CF, mas afastam a eficácia de normas infraconstitucionais que permitam a prisão; SV 25: 'É ilícita a prisão civil de depositário infiel, qualquer que seja a modalidade do depósito.'\"","peg":"Tratados DH = SUPRALEGAL (não constitucional). Não revogam a CF; apenas afastam eficácia de norma permissiva infraconstitucional. Distinção CRUCIAL.","jur_status":"OK"},{"n":59,"enun":"A Constituição Federal pode ser emendada mediante proposta de 1/3 dos membros de qualquer das Casas do Congresso Nacional, do Presidente da República ou de mais da metade das Assembleias Legislativas estaduais, manifestando-se cada uma pela maioria relativa de seus membros.","gab":"ERRADO","com":"O item contém dois erros: (1) a proposta de emenda por Assembleias Legislativas exige 'mais da metade' das ALs, mas cada uma deve se manifestar pela MAIORIA RELATIVA de seus membros — isso está correto; (2) porém, o art. 60, III exige que as Assembleias aprovem pela maioria RELATIVA, e o item pode induzir confusão com a maioria absoluta. O erro central é no quórum de aprovação no Congresso: a emenda exige 3/5 dos membros de cada Casa, em dois turnos — não maioria relativa das Casas.","fund":"LEI: \"CF, art. 60, I, II, III: proposta de 1/3 de qualquer Casa; do Presidente; ou de mais da metade das ALs (maioria relativa cada). §2°: aprovação por 3/5 dos membros de cada Casa, em dois turnos de votação.\"\nJURISPRUDÊNCIA: \"STF, ADI 830/DF (Pleno, 1993): o processo de emenda constitucional exige as formalidades do art. 60; a votação final em cada Casa exige 3/5 dos membros em dois turnos; desvio desse quórum torna a emenda inconstitucional.\"","jur_status":"PENDENTE"},{"n":60,"enun":"O Distrito Federal não pode ser dividido em Municípios, nos termos do art. 32 da CF/88, acumulando as competências legislativas reservadas aos Estados e Municípios.","gab":"CERTO","com":"O art. 32 CF veda expressamente a divisão do DF em Municípios. O DF tem natureza sui generis: acumula as competências dos Estados e dos Municípios (art. 32, §1°). Por essa razão, legisla tanto sobre matérias estaduais quanto municipais. A câmara legislativa do DF tem competência similar ao conjunto de Assembleia Legislativa + Câmara Municipal. CEBRASPE cobra essa singularidade com frequência em questões sobre organização territorial.","fund":"LEI: \"CF, art. 32: 'O Distrito Federal, vedada sua divisão em Municípios, reger-se-á por lei orgânica...' §1°: 'Ao Distrito Federal são atribuídas as competências legislativas reservadas aos Estados e Municípios.'\"\nJURISPRUDÊNCIA: \"STF, ADI 3.756/DF (Pleno, 2007): o DF acumula competências estaduais e municipais; a vedação à divisão em Municípios é expressa na CF e constitui cláusula especial da organização política do DF; nenhuma emenda pode criar Município no DF sem ruptura constitucional.\"","jur_status":"PENDENTE"},{"n":61,"enun":"O mandado de injunção, conforme entendimento atual do STF, tem eficácia apenas inter partes, sendo vedado ao tribunal estender seus efeitos a todos que se encontram na mesma situação do impetrante.","gab":"ERRADO","com":"O STF superou a teoria não-concretista (inter partes) e adota hoje, consolidada pela Lei 13.300/2016 (Lei do Mandado de Injunção), a teoria concretista geral em determinados casos. O STF pode dar efeito erga omnes à decisão em MI quando se tratar de omissão que afete número indeterminado de pessoas e a extensão seja necessária para a efetividade do direito. A Lei 13.300/2016 regulamenta os efeitos do MI, permitindo sua extensão a casos análogos.","fund":"LEI: \"Lei 13.300/2016, art. 9°, §1°: 'Poderá ser conferida eficácia ultra partes ou erga omnes à decisão, quando isso for inerente ou indispensável ao exercício do direito, da liberdade ou da prerrogativa objeto da impetração.' — eficácia erga omnes é possível.\"\nJURISPRUDÊNCIA: \"STF, MI 712/PA (Pleno, 2007): adoção da teoria concretista geral em MI coletivo sobre greve de servidores públicos; extensão a todos os trabalhadores em greve; reafirmado no MI 758/PA e consolidado na Lei 13.300/2016.\"","peg":"STF SUPEROU a teoria não-concretista (inter partes). MI pode ter efeito erga omnes por Lei 13.300/2016.","jur_status":"PENDENTE"},{"n":62,"enun":"A ADI 3.367 do STF declarou constitucional a criação do Conselho Nacional de Justiça (CNJ) pela EC 45/2004, afastando a arguição de violação à separação dos poderes e à autonomia do Poder Judiciário.","gab":"CERTO","com":"O STF, na ADI 3.367/DF, considerou constitucional o CNJ por entender que o controle externo do Judiciário (por órgão interno, criado por emenda) não viola a separação de poderes, pois o CNJ é órgão integrante do próprio Poder Judiciário (art. 92, I-A, CF). A atribuição de controle administrativo e disciplinar ao CNJ é compatível com a Constituição e não implica subordinação a outro poder.","fund":"LEI: \"CF, art. 103-B: 'O Conselho Nacional de Justiça compõe-se de 15 (quinze) membros...' — criado pela EC 45/2004.\"\nJURISPRUDÊNCIA: \"STF, ADI 3.367/DF (Peluso, Pleno, j. 13/04/2005): constitucionalidade do CNJ; o Conselho é órgão do Judiciário, não externo a ele; a separação de poderes é preservada; o controle administrativo pelo CNJ é compatível com a autonomia institucional do Poder Judiciário.\"","jur_status":"OK"},{"n":63,"enun":"A regra da anterioridade tributária anual (art. 150, III, b da CF) veda a cobrança de tributos no mesmo exercício financeiro em que publicada a lei instituidora, sendo aplicável a todos os tributos federais, estaduais e municipais sem exceção.","gab":"ERRADO","com":"O item está errado porque a anterioridade anual comporta exceções expressas na CF. Impostos como o IPI, II (importação), IE (exportação), IOF, IEG (imposto extraordinário de guerra), empréstimo compulsório para calamidade/guerra e CIDE-combustíveis podem ser cobrados antes de completado o exercício financeiro. O item afirma 'sem exceção', o que é incorreto e clássica armadilha CEBRASPE em tributário.","fund":"LEI: \"CF, art. 150, III, b: anterioridade anual como regra. Art. 150, §1°: exceções — II, IE, IPI, IOF, IEG, empréstimo compulsório de calamidade/guerra; e art. 177, §4°: CIDE-combustíveis pode ser reduzida/reestabelecida sem anterioridade.\"\nJURISPRUDÊNCIA: \"STF, RE 566.290/RS (Pleno, 2007): anterioridade anual é garantia fundamental do contribuinte; suas exceções são taxativas e previstas na própria CF; o rol do art. 150, §1° não pode ser ampliado por lei ordinária ou complementar.\"","peg":"'Sem exceção' é armadilha. II, IE, IPI, IOF e IEG não se submetem à anterioridade anual. Lista taxativa na CF.","jur_status":"PENDENTE"},{"n":64,"enun":"O STF reconhece responsabilidade objetiva dos prestadores de serviços públicos por danos causados a terceiros não-usuários do serviço, com base no art. 37, §6° da CF, conforme decidido no RE 591.874.","gab":"CERTO","com":"No RE 591.874/MS (Lewandowski, Pleno, j. 26/08/2009), o STF estendeu a responsabilidade objetiva do art. 37, §6° CF às concessionárias e permissionárias de serviços públicos também em relação a terceiros que não são usuários do serviço. O caso envolveu acidente causado por ônibus de empresa de transporte que atingiu pedestre (não-usuário). A responsabilidade objetiva não se limita ao usuário, sendo extensível a qualquer pessoa atingida.","fund":"LEI: \"CF, art. 37, §6°: 'As pessoas jurídicas de direito público e as de direito privado prestadoras de serviços públicos responderão pelos danos que seus agentes, nessa qualidade, causarem a terceiros...' — abrange terceiros em geral.\"\nJURISPRUDÊNCIA: \"STF, RE 591.874/MS (Lewandowski, Pleno, j. 26/08/2009): responsabilidade objetiva de concessionária de serviço público alcança terceiros não-usuários; o art. 37, §6° CF não restringe o 'terceiro' ao usuário do serviço.\"","jur_status":"OK"}]},{"nome":"Direito Administrativo e Legislação Complementar","comando":"Acerca de servidores públicos, regime jurídico e demais temas de Direito Administrativo, julgue os itens a seguir.","itens":[{"n":65,"enun":"A estabilidade no cargo público efetivo é adquirida após 3 anos de efetivo exercício, nos termos do art. 41 da CF/88 com a redação da EC 19/1998, que alterou o prazo originalmente fixado de 2 anos.","gab":"CERTO","com":"A EC 19/1998 alterou o art. 41 CF, ampliando o prazo de aquisição de estabilidade de 2 para 3 anos de efetivo exercício. A Lei 8.112/90, em seu texto original (art. 20), previa estágio probatório de 2 anos; com a EC 19, o prazo do estágio probatório foi tacitamente ampliado para 3 anos, coincidindo com o prazo da estabilidade constitucional. CEBRASPE já cobrou diretamente a distinção entre o prazo original e o atual.","fund":"LEI: \"CF, art. 41 (redação da EC 19/1998): 'São estáveis após três anos de efetivo exercício os servidores nomeados para cargo de provimento efetivo em virtude de concurso público.'\"\nJURISPRUDÊNCIA: \"STJ, MS 21.948/DF (Seção, 2017): o prazo de estabilidade é de 3 anos desde a EC 19/1998; a Lei 8.112/90 foi tacitamente alterada; servidor exonerado no estágio probatório antes de 3 anos sem avaliação negativa tem direito à reintegração.\"","jur_status":"PENDENTE"},{"n":66,"enun":"O STF, na ADI 2135 julgada em outubro de 2024, declarou constitucional a EC 19/1998, que possibilitou a supressão do regime jurídico único (RJU) para novos servidores públicos, com modulação de efeitos ex nunc para preservar os direitos dos servidores atuais.","gab":"CERTO","com":"Em outubro de 2024, o STF, por 8 × 3, julgou constitucional a EC 19/1998 que abriu a possibilidade de os entes federativos adotarem regime de emprego público (CLT) para novos servidores, extinguindo a obrigatoriedade do RJU. A modulação ex nunc garante que os servidores que ingressaram sob a Lei 8.112/90 mantêm todos os seus direitos, incluindo estabilidade e RPPS. Decisão recente de altíssimo potencial de cobrança.","fund":"LEI: \"CF, art. 39 (redação original): regime jurídico único obrigatório. EC 19/1998: permitiu a adoção de regime diverso. Lei 8.112/90: RJU dos servidores federais — mantido para os atuais servidores.\"\nJURISPRUDÊNCIA: \"STF, ADI 2135/DF (Pleno, out/2024, 8×3): EC 19/1998 é constitucional; possibilidade de CLT para novos servidores; modulação ex nunc — servidores atuais não são atingidos; mantêm estabilidade e RPPS; redação original do art. 39 não é restaurada para os futuros servidores.\"","peg":"ADI 2135 (out/2024): EC 19 CONSTITUCIONAL. Servidores ATUAIS mantêm direitos. Novos servidores podem ser CLT. Modulação EX NUNC.","jur_status":"PENDENTE"},{"n":67,"enun":"A perda do cargo estável do servidor público pode ocorrer por sentença judicial transitada em julgado, por processo administrativo disciplinar com contraditório, por avaliação periódica de desempenho insuficiente e por excesso de despesas com pessoal, nos termos do art. 41, §1° da CF.","gab":"CERTO","com":"O art. 41, §1° CF lista QUATRO hipóteses taxativas de perda do cargo estável. Muitos candidatos conhecem apenas as duas primeiras (sentença e PAD) e desconhecem as hipóteses III (avaliação insuficiente de desempenho) e IV (excesso de gastos — LC 101/2000, art. 169). A CEBRASPE explora a completude do rol com frequência, afirmando que apenas 'três' hipóteses existem para induzir erro.","fund":"LEI: \"CF, art. 41, §1°: perda do cargo estável: I - sentença judicial transitada em julgado; II - PAD com garantia de contraditório e ampla defesa; III - avaliação periódica de desempenho insuficiente; IV - excesso de despesas (LC 101). Art. 169, §4° CF: autoriza exoneração por excesso de gastos com pessoal.\"\nJURISPRUDÊNCIA: \"STJ, MS 22.648/DF (Seção, 2017): o rol do art. 41, §1° é taxativo; a exoneração de servidor estável fora das hipóteses previstas é nula; reintegração com ressarcimento de vencimentos.\"","jur_status":"PENDENTE"},{"n":68,"enun":"O cargo em comissão, de livre nomeação e exoneração, não exige concurso público e pode ser provido por qualquer pessoa, sendo vedada apenas sua criação em número que comprometa a proporcionalidade com os cargos efetivos de carreira.","gab":"CERTO","com":"O art. 37, V CF autoriza a criação de cargos em comissão de livre nomeação e exoneração, sem exigência de concurso, para funções de direção, chefia e assessoramento. A restrição constitucional é que a lei que criar esses cargos deve estabelecer a percentagem dos cargos em comissão que serão obrigatoriamente preenchidos por servidores de carreira (impedindo o esvaziamento das carreiras por comissionados).","fund":"LEI: \"CF, art. 37, V: 'as funções de confiança, exercidas exclusivamente por servidores ocupantes de cargo efetivo, e os cargos em comissão, a serem preenchidos por servidores de carreira nos casos, condições e percentuais mínimos previstos em lei, destinam-se apenas às atribuições de direção, chefia e assessoramento.'\"\nJURISPRUDÊNCIA: \"STF, ADI 3.602/GO (Pleno, 2016): lei que cria cargos em comissão fora das funções de direção, chefia e assessoramento é inconstitucional; os cargos comissionados não podem ser de execução ordinária da atividade pública.\"","jur_status":"PENDENTE"},{"n":69,"enun":"A função de confiança difere do cargo em comissão porque pode ser exercida exclusivamente por servidores ocupantes de cargo efetivo, sendo uma designação adicional e temporária, sem necessidade de concurso.","gab":"CERTO","com":"A distinção entre função de confiança e cargo em comissão é fundamental para a prova de Delegado: a função de confiança só pode ser atribuída a servidor efetivo (concursado), sendo uma acumulação remunerada de atribuições de direção/chefia/assessoramento ao cargo de carreira. O cargo em comissão, por sua vez, pode ser ocupado por qualquer pessoa, inclusive sem vínculo com o serviço público. Ambos são de livre exoneração/reversão.","fund":"LEI: \"CF, art. 37, V: 'as funções de confiança, exercidas exclusivamente por servidores ocupantes de cargo efetivo... e os cargos em comissão, a serem preenchidos por servidores de carreira nos casos... destinam-se apenas às atribuições de direção, chefia e assessoramento.'\"\nJURISPRUDÊNCIA: \"STF, RE 518.690 AgR/RJ (2ª Turma, 2010): distinção entre função de confiança (exclusiva de efetivo) e cargo em comissão (aberto a qualquer pessoa dentro do limite constitucional); designação para função de confiança de não-efetivo é inconstitucional.\""},{"n":70,"enun":"O STJ consolidou em 2024 que a exoneração de servidor estável sem a instauração e conclusão de processo administrativo disciplinar com contraditório é nula, gerando direito à reintegração, ainda que a exoneração seja anterior à decisão final do PAD.","gab":"CERTO","com":"O STJ firmou que o servidor estável só pode perder o cargo por PAD com pleno contraditório e ampla defesa. A exoneração sem PAD — mesmo que formalmente encoberta por outro fundamento — é nula de pleno direito e gera reintegração imediata com pagamento dos vencimentos retroativos. A decisão de 2024 reforçou que essa regra se aplica inclusive quando a exoneração precede a conclusão do PAD.","fund":"LEI: \"CF, art. 41, §1°, II: perda do cargo estável somente mediante PAD com garantia de contraditório e ampla defesa.\"\nJURISPRUDÊNCIA: \"STJ, RMS 62.154/DF (Seção, 2024): exoneração de servidor estável sem PAD é nula mesmo que praticada antes da decisão final do processo administrativo; reintegração imediata; ressarcimento dos vencimentos retroativos; a nulidade é de pleno direito.\"","jur_status":"PENDENTE"},{"n":71,"enun":"A anulação de ato administrativo ilegal produz efeitos retroativos (ex tunc), enquanto a revogação por razões de oportunidade e conveniência produz efeitos a partir da data da revogação (ex nunc), ressalvados os direitos adquiridos.","gab":"CERTO","com":"Esta é a distinção clássica em Direito Administrativo: anulação (ilegalidade) → efeito ex tunc, desfaz retroativamente os efeitos; revogação (conveniência/oportunidade) → efeito ex nunc, preserva os efeitos já produzidos e os direitos adquiridos. A CEBRASPE cobra essa distinção amplamente, especialmente o binômio 'ilegalidade/ex tunc' vs. 'oportunidade/ex nunc'.","fund":"LEI: \"Lei 9.784/99, art. 54: prazo de 5 anos para a Administração anular atos com efeitos favoráveis ao administrado, salvo má-fé. Distinção anulação/revogação: doutrina consolidada pelo STF e STJ.\"\nJURISPRUDÊNCIA: \"STF, Súmula 473: 'A administração pode anular seus próprios atos, quando eivados de vícios que os tornam ilegais, porque deles não se originam direitos; ou revogá-los, por motivo de conveniência ou oportunidade, respeitados os direitos adquiridos...'\""},{"n":72,"enun":"O poder de polícia da Administração Pública pode ser delegado a pessoas jurídicas de direito privado integrantes da Administração Indireta, como empresas públicas, quando exercido em regime de monopólio, conforme entendimento do STF no RE 633.782.","gab":"CERTO","com":"O STF, no RE 633.782 (Tema 532 RG), fixou que o poder de polícia pode ser delegado a entidades privadas da Administração Indireta que possuam regime de monopólio e não concorram com o setor privado. A vedação à delegação de poder de polícia a pessoas jurídicas de direito privado (para evitar favorecimento em contexto concorrencial) não se aplica quando há monopólio. A fiscalização de trânsito por empresa pública foi o caso paradigmático.","fund":"LEI: \"CF, art. 37, XIX: criação de empresas públicas e sociedades de economia mista exige autorização legislativa; Código Civil, arts. 98-103 (bens públicos e privados).\"\nJURISPRUDÊNCIA: \"STF, RE 633.782 (Tema 532 RG, Pleno): é constitucional a delegação do poder de polícia a pessoas jurídicas de direito privado integrantes da Administração Indireta, desde que o ente privado atue em regime de monopólio; empresas concorrenciais não podem receber essa delegação.\""},{"n":73,"enun":"O prazo decadencial para a Administração Pública anular seus próprios atos que tenham gerado efeitos favoráveis ao administrado de boa-fé é de 5 anos, contados da data em que foram praticados, nos termos do art. 54 da Lei 9.784/99.","gab":"CERTO","com":"O art. 54 da Lei 9.784/99 (Lei do Processo Administrativo Federal) consagra o prazo decadencial de 5 anos para a autotutela administrativa sobre atos com efeitos favoráveis ao administrado. Passado esse prazo, o ato não pode mais ser anulado, preservando a segurança jurídica e a boa-fé do administrado. A ressalva é que o prazo não corre para atos obtidos mediante má-fé.","fund":"LEI: \"Lei 9.784/99, art. 54: 'O direito da Administração de anular os atos administrativos de que decorram efeitos favoráveis para os destinatários decai em cinco anos, contados da data em que foram praticados, salvo comprovada má-fé.'\"\nJURISPRUDÊNCIA: \"STJ, MS 14.041/DF (Seção, 2011): o prazo decadencial de 5 anos do art. 54 da Lei 9.784/99 alcança a Administração Federal; superado esse prazo, o ato favorável ao administrado de boa-fé torna-se inatacável pela via administrativa.\"","jur_status":"PENDENTE"},{"n":74,"enun":"A improbidade administrativa, após as alterações promovidas pela Lei 14.230/2021, passou a exigir o dolo genérico para a caracterização dos atos de improbidade que causem dano ao erário, afastando a modalidade culposa.","gab":"ERRADO","com":"A Lei 14.230/2021 alterou radicalmente a Lei 8.429/92: agora a improbidade exige DOLO ESPECÍFICO (elemento subjetivo qualificado) para TODAS as modalidades de atos de improbidade — inclusive os que causam dano ao erário. A culpa foi completamente afastada como elemento suficiente para a improbidade. Não se trata de 'dolo genérico', mas de dolo específico: a vontade consciente de praticar o ato ímprobo.","fund":"LEI: \"Lei 8.429/92, art. 1°, §1° (redação da Lei 14.230/2021): 'Consideram-se atos de improbidade administrativa as condutas dolosas tipificadas nos arts. 9°, 10 e 11 desta Lei, ressalvados tipos culposos expressamente previstos em lei.' — dolo específico exigido; culpa afastada.\"\nJURISPRUDÊNCIA: \"STJ, REsp 2.012.010/MG (1ª Turma, 2023): após a Lei 14.230/2021, a caracterização de improbidade exige dolo específico; não basta o dolo genérico; a culpa foi eliminada; retroatividade das regras mais benéficas ao réu.\"","peg":"Lei 14.230/2021: dolo ESPECÍFICO — não genérico. Culpa AFASTADA completamente. Retroatividade in bonam partem.","jur_status":"PENDENTE"},{"n":75,"enun":"Conforme o art. 37, §6° da CF, o Estado responde objetivamente pelos danos que seus agentes, nessa qualidade, causarem a terceiros, sendo assegurado o direito de regresso contra o agente causador do dano, caso tenha agido com dolo ou culpa.","gab":"CERTO","com":"A responsabilidade civil do Estado é objetiva (teoria do risco administrativo) no art. 37, §6° CF: o Estado responde independentemente de culpa, bastando nexo causal entre a conduta do agente e o dano. O regresso contra o agente é assegurado constitucionalmente, mas depende de comprovação de dolo ou culpa do agente — o regresso é subjetivo. O Estado não pode se recusar a indenizar alegando culpa exclusiva do agente; deve indenizar e depois buscar o regresso.","fund":"LEI: \"CF, art. 37, §6°: 'As pessoas jurídicas de direito público... responderão pelos danos que seus agentes, nessa qualidade, causarem a terceiros, assegurado o direito de regresso contra o responsável nos casos de dolo ou culpa.'\"\nJURISPRUDÊNCIA: \"STF, RE 1.027.633/SP (Tema 940 RG, Pleno, 2019): responsabilidade objetiva do Estado; ação de regresso contra o agente exige comprovação de dolo ou culpa; a prescrição do regresso é de 3 anos.\"","jur_status":"PENDENTE"},{"n":76,"enun":"O ato administrativo vinculado, ao contrário do discricionário, não admite revogação pela Administração, pois seus elementos estão completamente determinados por lei, não sobrando margem de mérito administrativo.","gab":"CERTO","com":"A revogação é instrumento de controle do mérito administrativo: aplica-se aos atos discricionários (onde há juízo de oportunidade e conveniência). O ato vinculado, cujos requisitos estão completamente fixados em lei, não tem mérito: ou é legal (e deve ser mantido) ou é ilegal (e deve ser anulado). Não há espaço para revogação por razões de conveniência num ato vinculado, pois a conveniência já foi definida pelo legislador.","fund":"LEI: \"Não há dispositivo expresso, mas a doutrina é unânime: atos vinculados só admitem anulação (por ilegalidade); atos discricionários admitem revogação (por oportunidade e conveniência), respeitados direitos adquiridos.\"\nJURISPRUDÊNCIA: \"STF, MS 25.025/DF (2ª Turma, 2006): ato vinculado não comporta revogação; a Administração não pode invocar conveniência onde a lei não abriu margem de escolha; apenas a ilegalidade justifica desfazimento.\"","jur_status":"PENDENTE"},{"n":77,"enun":"O princípio da moralidade administrativa previsto no art. 37, caput da CF/88 é princípio autônomo, podendo fundamentar, isoladamente, a anulação de ato administrativo lícito que ofenda a ética e a probidade na condução dos negócios públicos.","gab":"CERTO","com":"A moralidade foi consagrada como princípio constitucional autônomo pelo art. 37, caput CF, não se confundindo com a legalidade. O STF reconhece que um ato pode ser formalmente legal e ainda assim violar a moralidade administrativa, sendo passível de controle pelo Judiciário por esse fundamento autônomo. A ação popular e a ação de improbidade administrativa têm a moralidade como fundamento próprio de atuação.","fund":"LEI: \"CF, art. 37, caput: 'A administração pública direta e indireta de qualquer dos Poderes da União, dos Estados, do Distrito Federal e dos Municípios obedecerá aos princípios de legalidade, impessoalidade, moralidade, publicidade e eficiência...'\"\nJURISPRUDÊNCIA: \"STF, MS 22.801/DF (Pleno, 1997): moralidade é princípio autônomo; ato que viola a ética administrativa pode ser anulado com base exclusiva na moralidade, independentemente de ilegalidade formal; o STF reafirmou no MS 23.627/DF.\"","jur_status":"PENDENTE"},{"n":78,"enun":"A acumulação de dois cargos de professor em atividade é permitida pela CF/88, desde que haja compatibilidade de horários e que a remuneração total não ultrapasse o teto constitucional previsto no art. 37, XI.","gab":"CERTO","com":"O art. 37, XVI, b CF permite a acumulação de dois cargos de professor como exceção à regra geral de proibição de acumulação. As condições são: compatibilidade de horários (condição formal) e respeito ao teto constitucional do art. 37, XI (condição remuneratória). O STF firmou que a compatibilidade de horários é requisito indispensável, cujo descumprimento sujeita o servidor à exoneração de um dos cargos.","fund":"LEI: \"CF, art. 37, XVI, b: '...é vedada a acumulação remunerada de cargos públicos, exceto, quando houver compatibilidade de horários, observado em qualquer caso o disposto no inciso XI: ... b) a de um cargo de professor com outro técnico ou científico...' — a letra b permite dois cargos de professor.\"\nJURISPRUDÊNCIA: \"STF, RE 831.702 AgR/MG (2ª Turma, 2015): a acumulação de dois cargos de professor é constitucional; a compatibilidade de horários é requisito formal obrigatório; o descumprimento sujeita o servidor a processo administrativo e exoneração do cargo acessório.\""},{"n":79,"enun":"O servidor público estável, nos termos do art. 41, §3° da CF, pode ser colocado em disponibilidade remunerada, com vencimentos proporcionais ao tempo de serviço, quando o cargo que ocupa for declarado desnecessário ou extinto.","gab":"CERTO","com":"O art. 41, §3° CF regula a disponibilidade: quando o cargo do servidor estável é extinto ou declarado desnecessário, ele não pode ser simplesmente demitido — é posto em disponibilidade com remuneração proporcional ao tempo de serviço, aguardando aproveitamento em cargo compatível. Trata-se de garantia constitucional que protege o estável contra a extinção arbitrária do cargo. Distingue-se da hipótese do art. 41, §1°, IV (excesso de gastos).","fund":"LEI: \"CF, art. 41, §3°: 'Extinto o cargo ou declarada a sua desnecessidade, o servidor estável ficará em disponibilidade, com remuneração proporcional ao tempo de serviço, até seu adequado aproveitamento em outro cargo.' — garantia do estável.\"\nJURISPRUDÊNCIA: \"STJ, MS 19.289/DF (Seção, 2015): a disponibilidade constitucional é garantia do servidor estável; a extinção do cargo sem previsão de disponibilidade ou aproveitamento é inconstitucional; a remuneração proporcional deve ser calculada com base nos anos de efetivo exercício.\"","jur_status":"PENDENTE"},{"n":80,"enun":"A licitação é dispensada, e não dispensável, nos casos em que a lei determina que não é necessária, como na contratação de serviços técnicos especializados de natureza singular com notória especialização do contratado.","gab":"ERRADO","com":"O item inverte as categorias. Serviços técnicos especializados com notória especialização configuram hipótese de licitação INEXIGÍVEL (art. 74, III da Lei 14.133/2021), não dispensada nem dispensável. A inexigibilidade ocorre quando há inviabilidade de competição (art. 74 da Lei 14.133/2021). A dispensa (art. 75) e a dispensabilidade (art. 75, §3°) são hipóteses diversas: a competição seria possível, mas a lei permite contratar diretamente.","fund":"LEI: \"Lei 14.133/2021, art. 74, III: 'É inexigível a licitação quando inviável a competição, em especial nos casos de: III - contratação de profissional do setor artístico, diretamente ou por meio de empresário exclusivo, desde que consagrado pela crítica especializada...' Art. 74, caput: inexigibilidade por inviabilidade.\"\nJURISPRUDÊNCIA: \"STJ, REsp 1.678.751/SP (2ª Turma, 2019): a inexigibilidade de licitação para serviços técnicos especializados com notória especialização exige singularidade do serviço e inadequação ao processo competitivo; a mera expertise não basta; o objeto deve ser insubstituível por terceiros.\"","peg":"DISPENSA (lei autoriza sem competição) ≠ INEXIGIBILIDADE (competição inviável). Serviços de notória especialização = INEXIGÍVEL, não dispensado.","jur_status":"PENDENTE"}]},{"nome":"Medicina Legal","comando":"Acerca de Medicina Legal e suas aplicações na atividade policial, julgue os itens a seguir.","itens":[{"n":81,"enun":"A tanatologia forense classifica os fenômenos cadavéricos em abióticos (imediatos e consecutivos) e transformativos (destrutivos e conservadores), sendo o rigor mortis fenômeno abiótico consecutivo.","gab":"CERTO","com":"Os fenômenos cadavéricos abióticos imediatos são: cessação das funções circulatória, respiratória e nervosa. Os consecutivos incluem: resfriamento, desidratação, livor mortis e rigor mortis. Os transformativos dividem-se em destrutivos (putrefação, autólise, maceração) e conservadores (mumificação, saponificação, corificação). A classificação é exigida em provas de Medicina Legal para Delegado.","fund":"LEI: \"CPP, art. 162: obrigatoriedade da autópsia para morte violenta ou suspeita; art. 158: laudo pericial indispensável nas infrações que deixam vestígios.\"\nJURISPRUDÊNCIA: \"STJ, HC 287.490/SP (5ª Turma, 2014): o laudo necroscópico é prova técnica de natureza irrepetível; sua ausência pode inviabilizar a persecução penal nos crimes que deixam vestígios.\"","jur_status":"PENDENTE"},{"n":82,"enun":"O rigor mortis se instala em ordem céfalo-caudal (da cabeça para os membros inferiores), atinge plenitude em 12–24 horas e desaparece espontaneamente em 36–72 horas, servindo como parâmetro para estimativa do intervalo post mortem.","gab":"CERTO","com":"O rigor mortis é fenômeno bioquímico causado pelo acúmulo de ácido lático na musculatura após a morte. Instala-se primeiro nos músculos menores (face, pescoço), depois nos grandes grupos musculares — ordem céfalo-caudal. Sua persistência e dissolução são influenciadas por temperatura, estado físico do cadáver e agentes externos. A estimativa de IML via rigor tem limitações e deve ser conjugada com outros parâmetros.","fund":"LEI: \"CPP, art. 162: 'A autópsia será feita pelo menos seis horas depois do óbito, salvo se os peritos, pela evidência dos sinais de morte, julgarem que pode ser feita antes daquele prazo.' — a espera mínima relaciona-se à estabilização de fenômenos como o rigor.\"\nJURISPRUDÊNCIA: \"TJSP: o rigor mortis como parâmetro isolado é impreciso; recomenda-se conjugar com livor mortis, temperatura retal e outros dados para estimativa fidedigna do IML.\""},{"n":83,"enun":"A lividez cadavérica (livor mortis) é fenômeno abiótico consecutivo que resulta da hipóstase sanguínea, fixando-se definitivamente após 8–12 horas, sendo utilizada para estimar o intervalo post mortem e detectar eventual mudança de posição do cadáver.","gab":"CERTO","com":"O livor mortis resulta do acúmulo de sangue por gravidade nas partes declives do corpo após a morte. Nas primeiras horas é móvel (pode ser revertido pela pressão ou mudança de posição); após 8–12 horas fixa-se. A presença de livores em posição incompatível com a encontrada no cadáver indica mudança post mortem do corpo — relevante para a investigação criminal. A cor dos livores também pode indicar causa mortis (cereja: CO; cinza-azulada: asfixia).","fund":"LEI: \"CPP, art. 169: 'Para o efeito de ser procedido ao exame do lugar onde houver ocorrido a infração, assim como dos objetos que nele se encontrarem, a autoridade providenciará imediatamente para que não se altere o estado das coisas...'\"\nJURISPRUDÊNCIA: \"STJ, HC 224.306/AM (5ª Turma, 2012): a preservação do local de crime e dos fenômenos cadavéricos é obrigação da autoridade policial; alteração do local pode configurar perda irrecuperável de prova essencial.\"","jur_status":"PENDENTE"},{"n":84,"enun":"A morte encefálica é definida como a cessação irreversível das funções de todo o encéfalo, incluindo o tronco cerebral, sendo diagnosticada por dois médicos sem participação na equipe de transplante, conforme a Resolução CFM 2.173/2017.","gab":"CERTO","com":"A morte encefálica é o critério legal de morte no Brasil para fins de transplante de órgãos (Lei 9.434/97, art. 3°). A Resolução CFM 2.173/2017 regulamenta o protocolo diagnóstico: dois médicos independentes (sem participação na equipe de transplante), com exame clínico específico e exame complementar confirmatório. Não se confunde com coma (que preserva funções do tronco encefálico).","fund":"LEI: \"Lei 9.434/97, art. 3°: 'A retirada post mortem de tecidos, órgãos ou partes do corpo humano destinados a transplante ou tratamento deverá ser precedida de diagnóstico de morte encefálica, constatada e registrada por dois médicos não participantes das equipes de remoção e transplante...' — dois médicos independentes.\"\nJURISPRUDÊNCIA: \"CFR: Resolução CFM 2.173/2017 regulamenta o protocolo de diagnóstico de morte encefálica no Brasil; a inobservância do protocolo pode gerar responsabilização profissional e criminal.\""},{"n":85,"enun":"No enforcamento, o sulco produzido no pescoço pelo laço é em regra único, oblíquo, incompleto e ascendente, diferenciando-se do estrangulamento, em que o sulco tende a ser horizontal, completo e no mesmo nível em todo o pescoço.","gab":"CERTO","com":"Esta é a distinção clássica em asfixiologia forense: enforcamento (peso do corpo como força) → sulco oblíquo, incompleto, ascente em direção ao nó; estrangulamento (força externa aplicada diretamente) → sulco horizontal, completo, uniforme. A identificação do tipo de sulco é fundamental para distinguir morte natural, suicida ou homicida na asfixia mecânica por constrição do pescoço.","fund":"LEI: \"CPP, arts. 158 e 159: obrigatoriedade do exame pericial nos crimes que deixam vestígios; arts. 162–163: autópsia e exame externo do cadáver.\"\nJURISPRUDÊNCIA: \"STJ, RHC 103.002/MG (6ª Turma, 2019): laudo pericial de asfixia mecânica deve descrever as características do sulco, a posição, completude e angulação; laudo omisso pode ser impugnado pela defesa como insuficiente.\"","jur_status":"PENDENTE"},{"n":86,"enun":"O exame de corpo de delito é indispensável nas infrações penais que deixam vestígios materiais, não podendo ser suprido pela confissão do acusado, nos termos do art. 158 do CPP.","gab":"CERTO","com":"O art. 158 CPP é expresso: quando a infração deixa vestígios, o exame pericial é imprescindível — não pode ser substituído pela confissão. A confissão é valorada como elemento de prova apenas nas infrações que não deixam vestígios ou quando os vestígios desapareceram. A inobservância da obrigação pericial pode gerar nulidade do processo, especialmente em crimes de resultado (homicídio, lesão corporal, estupro com vestígios, etc.).","fund":"LEI: \"CPP, art. 158: 'Quando a infração deixar vestígios, será indispensável o exame de corpo de delito, direto ou indireto, não podendo supri-lo a confissão do acusado.'\"\nJURISPRUDÊNCIA: \"STJ, HC 416.213/MS (6ª Turma, 2018): a falta de exame de corpo de delito em crime que deixa vestígios é nulidade absoluta; a confissão não supre a ausência pericial; a condenação sem laudo é nula.\"","jur_status":"PENDENTE"},{"n":87,"enun":"As lesões contusas (equimoses e hematomas) resultantes de trauma por instrumento de superfície romba podem não coincidir topograficamente com o local do impacto, em razão do deslocamento do sangue extravasado pelos planos fasciais.","gab":"CERTO","com":"Fenômeno importante na medicina legal forense: equimoses tardias podem surgir em local distante do trauma (ex.: fratura de base de crânio com equimose periorbital — sinal de Battle e sinal de oculos). Isso decorre do deslocamento do sangue pelos planos fasciais e aponeuróticos. O perito deve registrar esse fenômeno para não interpretar erroneamente a localização da lesão como local do impacto.","fund":"LEI: \"CPP, art. 159, §1°: o laudo pericial deve descrever detalhadamente as lesões; CPP, art. 168: no caso de lesões, o exame pode ser realizado a qualquer tempo.\"\nJURISPRUDÊNCIA: \"STJ, REsp 1.520.395/SC (5ª Turma, 2015): o perito deve consignar no laudo a possibilidade de deslocamento das lesões contusas; a ausência de registro pode comprometer a avaliação da dinâmica do crime.\"","jur_status":"PENDENTE"},{"n":88,"enun":"A conjuntivite hemorrágica (petéquias conjuntivais) é sinal de Tardieu que pode estar presente em diversas formas de asfixia mecânica, não sendo exclusiva do enforcamento.","gab":"CERTO","com":"As manchas de Tardieu (petéquias subpleurais e subpericárdicas; petéquias conjuntivais) são sinais gerais de morte por asfixia, não exclusivos de uma modalidade. Podem ser encontradas no enforcamento, estrangulamento, sufocação, afogamento e outras formas de asfixia. A exclusividade para o enforcamento seria erro técnico. Em provas de Delegado, a banca testa o conhecimento sobre a distribuição e especificidade de cada sinal de asfixia.","fund":"LEI: \"CPP, art. 162: autópsia com exame dos órgãos internos e externos — permite identificação das manchas de Tardieu.\"\nJURISPRUDÊNCIA: \"STJ, HC 143.229/RO (5ª Turma, 2010): laudo de morte por asfixia deve descrever os sinais específicos e gerais; manchas de Tardieu são indícios de asfixia em geral, não determinam isoladamente a modalidade do crime.\"","jur_status":"PENDENTE"},{"n":89,"enun":"O laudo de exame de lesão corporal deve conter, necessariamente, descrição das lesões com indicação do instrumento produtor, natureza e gravidade, além de prognóstico de periculosidade de vida quando cabível, nos termos do art. 129 do CP e art. 168 do CPP.","gab":"CERTO","com":"O exame de lesão corporal tem dupla finalidade jurídico-médica: comprovar a existência da lesão e qualificá-la juridicamente (leve, grave ou gravíssima) segundo o CP. O laudo deve descrever a localização, características, instrumento provável e consequências previsíveis (incapacidade para ocupações habituais, perigo de vida, debilidade permanente, etc.). A qualificação da lesão interfere diretamente na tipificação do crime e na competência do juízo.","fund":"LEI: \"CPP, art. 168: 'Em caso de lesões corporais, se o primeiro exame pericial tiver sido feito antes de decorrido o prazo de 30 dias, deverá ser feito o exame complementar.' CP, art. 129, §1°: lesão corporal grave (incapacidade > 30 dias, perigo de vida, etc.).\"\nJURISPRUDÊNCIA: \"STJ, RHC 60.918/MG (5ª Turma, 2016): o exame complementar de lesão corporal é obrigatório nos casos em que a lesão ainda não se consolidou após 30 dias; a ausência do complementar pode impedir a qualificação como grave.\"","jur_status":"PENDENTE"},{"n":90,"enun":"A embriaguez forçada ou acidental, que torna o agente incapaz de entender o caráter ilícito do fato ou de determinar-se de acordo com esse entendimento, exclui a imputabilidade penal, salvo nos crimes dolosos praticados em actio libera in causa.","gab":"CERTO","com":"A embriaguez acidental (fortuita ou por caso fortuito/força maior) que gera incapacidade plena de entendimento exclui a culpabilidade (CP, art. 28, §1° e §2°). A actio libera in causa (ALIC) é exceção: quando o agente se embriaga voluntariamente prevendo que praticará crime em estado de embriaguez, a responsabilidade é antecipada para o momento da ingestão da substância. CEBRASPE cobra a distinção entre embriaguez voluntária, culposa e fortuita.","fund":"LEI: \"CP, art. 28, §1°: 'É isento de pena o agente que, por embriaguez completa, proveniente de caso fortuito ou força maior, era, ao tempo da ação ou da omissão, inteiramente incapaz de entender o caráter ilícito do fato ou de determinar-se de acordo com esse entendimento.'\"\nJURISPRUDÊNCIA: \"STJ, HC 310.661/RS (5ª Turma, 2015): a embriaguez fortuita plena exclui a imputabilidade (art. 28, §1° CP); a ALIC afasta a excludente quando o agente se embriagou voluntariamente prevendo a prática do crime; distinção é essencial no contexto de crimes de trânsito.\"","jur_status":"PENDENTE"}]},{"nome":"Direito Civil e Legislação Complementar","comando":"Acerca de Direito Civil e institutos correlatos, julgue os itens a seguir.","itens":[{"n":91,"enun":"Nos termos do art. 186 do Código Civil, configura ato ilícito aquele que, por ação ou omissão voluntária, negligência ou imprudência, viola direito e causa dano a outrem, ainda que exclusivamente moral.","gab":"CERTO","com":"O art. 186 CC consagra a cláusula geral de ilícito civil: inclui a conduta omissiva, a culpa na modalidade negligência, imprudência e imperícia, e expressamente reconhece o dano moral como fundamento suficiente para a responsabilização. O dano exclusivamente moral já foi pacificado no STF e STJ como indenizável — a Súmula 403 STJ exemplifica com o uso indevido de imagem. CEBRASPE cobra a abrangência do art. 186.","fund":"LEI: \"CC, art. 186: 'Aquele que, por ação ou omissão voluntária, negligência ou imprudência, violar direito e causar dano a outrem, ainda que exclusivamente moral, comete ato ilícito.'\"\nJURISPRUDÊNCIA: \"STJ, Súmula 403: 'Independe de prova do prejuízo a indenização pela publicação não autorizada de imagem de pessoa com fins econômicos ou comerciais.' — dano moral in re ipsa.\""},{"n":92,"enun":"A responsabilidade civil subjetiva exige a demonstração de culpa (dolo ou culpa em sentido estrito) do agente, além do dano e do nexo causal, diferenciando-se da responsabilidade objetiva, que prescinde da comprovação de culpa.","gab":"CERTO","com":"A distinção subjetiva × objetiva é elementar em responsabilidade civil. Na subjetiva (art. 186 CC): culpa + dano + nexo. Na objetiva (art. 927, parágrafo único CC; art. 37, §6° CF; CDC; direito ambiental): dano + nexo, sem necessidade de culpa. A responsabilidade do Estado (art. 37, §6° CF) e do fornecedor de produto defeituoso (CDC) são objetivas por excelência.","fund":"LEI: \"CC, art. 927: 'Aquele que, por ato ilícito (arts. 186 e 187), causar dano a outrem, fica obrigado a repará-lo.' Parágrafo único: 'Haverá obrigação de reparar o dano, independentemente de culpa, nos casos especificados em lei, ou quando a atividade normalmente desenvolvida pelo autor do dano implicar, por sua natureza, risco para os direitos de outrem.'\"\nJURISPRUDÊNCIA: \"STJ, REsp 1.374.284/MG: responsabilidade ambiental é objetiva e integral (risco integral); nem mesmo culpa exclusiva da vítima exclui a obrigação de reparar.\"","jur_status":"OK"},{"n":93,"enun":"A Súmula 403 do STJ determina que o uso indevido de imagem de pessoa com fins econômicos independe de prova de prejuízo efetivo para ensejar indenização, sendo o dano presumido (in re ipsa).","gab":"CERTO","com":"A Súmula 403 STJ consagra o dano moral in re ipsa no uso não autorizado de imagem com fins comerciais: a simples violação do direito de imagem, sem necessidade de prova de humilhação, dor ou prejuízo concreto, gera dano presumido. O fundamento é a dignidade da pessoa humana e o direito de personalidade sobre a própria imagem (CC, art. 20). CEBRASPE cobra a extensão do conceito de dano moral in re ipsa.","fund":"LEI: \"CC, art. 20: 'Salvo se autorizadas, ou se necessárias à administração da justiça ou à manutenção da ordem pública, a divulgação de escritos, a transmissão da palavra, ou a publicação, a exposição ou a utilização da imagem de uma pessoa poderão ser proibidas, a seu requerimento e sem prejuízo da indenização que couber...'\"\nJURISPRUDÊNCIA: \"STJ, Súmula 403 (j. 28/10/2009): 'Independe de prova do prejuízo a indenização pela publicação não autorizada de imagem de pessoa com fins econômicos ou comerciais.' — dano in re ipsa.\""},{"n":94,"enun":"A nulidade absoluta do negócio jurídico pode ser sanada pelo decurso do tempo ou pela confirmação das partes, ao contrário da anulabilidade, que é sanável por confirmação ou pelo decurso do prazo decadencial.","gab":"ERRADO","com":"O item inverte a regra: a NULIDADE ABSOLUTA (art. 166 CC) NÃO se sana pelo tempo nem pela confirmação das partes — é imprescritível e insanável. A ANULABILIDADE (art. 171 CC) SIM pode ser sanada: pelo decurso do prazo decadencial (arts. 178–179 CC) ou pela confirmação expressa ou tácita (art. 172 CC). A distinção é fundamental para a aplicação das consequências processuais e materiais.","fund":"LEI: \"CC, art. 169: 'O negócio jurídico nulo não é suscetível de confirmação, nem convalesce pelo decurso do tempo.' CC, art. 172: 'O negócio anulável pode ser confirmado pelas partes, salvo direito de terceiro.'\"\nJURISPRUDÊNCIA: \"STJ, REsp 1.192.695/AM (3ª Turma, 2012): nulidade absoluta é insanável, declarável de ofício e imprescritível; anulabilidade é sanável por confirmação e sujeita a prazo decadencial — distinção fundamental em atos de transmissão de imóvel.\"","peg":"Nulidade = INSANÁVEL (não sana por tempo nem confirmação). Anulabilidade = SANÁVEL (confirmação ou prazo decadencial).","jur_status":"PENDENTE"},{"n":95,"enun":"A usucapião especial urbana, prevista no art. 183 da CF e art. 1.240 do CC, exige posse ininterrupta por 5 anos, área máxima de 250 m², utilização para moradia do possuidor ou sua família, e ausência de outro imóvel urbano ou rural do requerente.","gab":"CERTO","com":"A usucapião especial urbana tem requisitos cumulativos: (a) posse de área urbana de até 250 m²; (b) por 5 anos ininterruptos sem oposição; (c) utilização para moradia do possuidor ou família; (d) não ser proprietário de outro imóvel urbano ou rural. A Súmula 340 STF veda usucapião sobre bens públicos dominicais; quanto a bens públicos em geral, a vedação é constitucional (art. 183, §3° CF).","fund":"LEI: \"CF, art. 183, §3°: 'Os imóveis públicos não serão adquiridos por usucapião.' CC, art. 1.240: usucapião especial urbano — requisitos.\"\nJURISPRUDÊNCIA: \"STF, Súmula 340: 'Desde a vigência do Código Civil, os bens dominicais, como os demais bens públicos, não podem ser adquiridos por usucapião.' — vedação ampla de usucapião sobre qualquer bem público.\""},{"n":96,"enun":"O prazo prescricional geral para as ações pessoais no Código Civil de 2002 é de 10 anos, conforme o art. 205, sendo contado da data da violação do direito.","gab":"CERTO","com":"O CC/2002 fixou como prazo prescricional geral (cláusula de fechamento) o de 10 anos para ações pessoais que não tenham prazo específico (art. 205). Distingue-se dos prazos especiais (art. 206): 1, 2, 3, 4 ou 5 anos, conforme o tipo de pretensão. O prazo geral de 10 anos aplica-se residualmente quando nenhum prazo específico for aplicável. O STJ firmou que o prazo começa com a violação (princípio da actio nata).","fund":"LEI: \"CC, art. 205: 'A prescrição ocorre em dez anos, quando a lei não lhe haja fixado prazo menor.'\"\nJURISPRUDÊNCIA: \"STJ, REsp 1.360.133/MG (1ª Turma, 2014): o prazo de 10 anos é residual; quando há prazo específico no art. 206 CC, prevalece este; a actio nata (início da contagem na violação) é o critério adotado pelo STJ.\"","jur_status":"PENDENTE"},{"n":97,"enun":"A desconsideração da personalidade jurídica, prevista no art. 50 do Código Civil, exige comprovação de desvio de finalidade ou confusão patrimonial, sendo inaplicável pelo simples inadimplemento das obrigações da pessoa jurídica.","gab":"CERTO","com":"A teoria maior da desconsideração (CC, art. 50) exige, além do inadimplemento, a comprovação de abuso da personalidade jurídica manifestado pelo desvio de finalidade (atos praticados fora do objeto social) ou pela confusão patrimonial (mistura do patrimônio da PJ com o pessoal dos sócios). O simples inadimplemento não autoriza a desconsideração. Distingue-se da teoria menor (CDC, art. 28, §5°), que é mais ampla.","fund":"LEI: \"CC, art. 50: 'Em caso de abuso da personalidade jurídica, caracterizado pelo desvio de finalidade ou pela confusão patrimonial, pode o juiz, a requerimento da parte, ou do Ministério Público quando lhe couber intervir no processo, desconsiderá-la para que os efeitos de certas e determinadas relações de obrigações sejam estendidos aos bens particulares dos administradores ou sócios da pessoa jurídica.'\"\nJURISPRUDÊNCIA: \"STJ, REsp 1.696.396/MT (3ª Turma, 2019): a teoria maior do CC exige desvio de finalidade ou confusão patrimonial; o mero inadimplemento não basta; a teoria menor do CDC (art. 28, §5°) é mais ampla e admite desconsideração por simples insolvência.\"","jur_status":"PENDENTE"},{"n":98,"enun":"O direito real de propriedade confere ao seu titular os poderes de usar, gozar, dispor da coisa e reavê-la do poder de quem quer que injustamente a possua ou detenha, conforme o art. 1.228 do Código Civil.","gab":"CERTO","com":"O art. 1.228 CC consagra os 4 atributos clássicos da propriedade (mnemônico GRUD): gozar, usar, reivindicar (reaver), dispor. A propriedade tem função social (CF, art. 5°, XXIII e art. 170, III): seu exercício deve ser conforme os limites constitucionais e legais. O direito de reaver da coisa é exercido pela ação reivindicatória (bem imóvel) ou reintegração de posse (quando há posse e não apenas detenção).","fund":"LEI: \"CC, art. 1.228: 'O proprietário tem a faculdade de usar, gozar e dispor da coisa, e o direito de reavê-la do poder de quem quer que injustamente a possua ou detenha.'\"\nJURISPRUDÊNCIA: \"STJ, REsp 1.650.574/PR (4ª Turma, 2018): a função social da propriedade limita o exercício do direito real; o desuso da propriedade não extingue o direito, mas pode viabilizar a usucapião em favor do possuidor qualificado.\"","jur_status":"PENDENTE"}]},{"nome":"Direito Tributário e Legislação Complementar","comando":"Acerca de Direito Tributário e das limitações ao poder de tributar, julgue os itens a seguir.","itens":[{"n":99,"enun":"A Súmula Vinculante 24 do STF estabelece que os crimes de sonegação fiscal que dependem de lançamento tributário definitivo como elemento do tipo só se consumam após o encerramento do processo administrativo fiscal.","gab":"CERTO","com":"A SV 24 STF afirma que o crime material contra a ordem tributária (art. 1° da Lei 8.137/90), que exige supressão ou redução de tributo como elemento do tipo, só se consuma com o lançamento definitivo do crédito tributário. Antes disso, não há tipo consumado, pois a existência do tributo não está definitivamente constituída. Isso tem impacto direto no inquérito policial: delegado não pode indiciá-lo antes do lançamento definitivo.","fund":"LEI: \"Lei 8.137/90, art. 1°: crime material contra a ordem tributária — supressão ou redução de tributo como elemento do tipo. CTN, arts. 142 e ss.: lançamento tributário.\"\nJURISPRUDÊNCIA: \"STF, Súmula Vinculante 24: 'Não se tipifica crime material contra a ordem tributária, previsto no art. 1°, incisos I a IV, da Lei n° 8.137/1990, antes do lançamento definitivo do tributo.' — consumação após o lançamento definitivo.\"","jur_status":"OK"},{"n":100,"enun":"A imunidade tributária recíproca, prevista no art. 150, VI, a da CF/88, que proíbe a União, os Estados e os Municípios de instituírem impostos sobre o patrimônio, renda ou serviços uns dos outros, estende-se às empresas públicas e sociedades de economia mista que prestam serviços públicos em regime não concorrencial.","gab":"CERTO","com":"O STF estendeu a imunidade recíproca às empresas públicas e sociedades de economia mista quando: (a) prestam serviço público; (b) em regime não concorrencial; (c) sem fins lucrativos distribuídos aos sócios. O fundamento é evitar que um ente federativo tribute, indiretamente, a atividade de outro. Empresas que atuam em regime concorrencial com o setor privado não se beneficiam da imunidade (ECT, Infraero: reconhecida a imunidade).","fund":"LEI: \"CF, art. 150, VI, a: 'Sem prejuízo de outras garantias asseguradas ao contribuinte, é vedado à União, aos Estados, ao Distrito Federal e aos Municípios: VI - instituir impostos sobre: a) patrimônio, renda ou serviços, uns dos outros.'\"\nJURISPRUDÊNCIA: \"STF, RE 407.099/RS (Pleno, 2004): Infraero goza de imunidade recíproca porque presta serviço público em regime de monopólio; RE 601.392 (Pleno, 2013): ECT goza de imunidade recíproca em relação a todos os serviços postais, inclusive os que poderiam ser explorados por particulares.\"","jur_status":"PENDENTE"},{"n":101,"enun":"O imposto de importação (II), o imposto de exportação (IE), o IOF e o IPI não se submetem ao princípio da anterioridade anual, podendo ter suas alíquotas majoradas e cobradas imediatamente, por serem instrumentos de regulação econômica.","gab":"CERTO","com":"Esses tributos são exceções expressas ao princípio da anterioridade anual (CF, art. 150, §1°) porque têm natureza extrafiscal e servem como instrumentos de política econômica do governo — a majoração imediata é necessária para eficácia da regulação. O IPI, porém, submete-se à anterioridade nonagesimal (90 dias). Já o II, IE e IOF são exceções tanto à anualidade quanto à nonagesimalidade.","fund":"LEI: \"CF, art. 150, §1°: exceções à anterioridade anual — II, IE, IPI, IOF, IEG, empréstimo compulsório de calamidade/guerra. CF, art. 150, III, c: anterioridade nonagesimal — exceções incluem II, IE, IOF (mas não o IPI).\"\nJURISPRUDÊNCIA: \"STF, RE 566.290/RS (Pleno, 2007): a anterioridade nonagesimal visa proteger o contribuinte contra aumentos surpresa; II, IE e IOF são exceções a ambas as anterioridades por razões de política econômica; o IPI só é exceção à anual, submetendo-se à nonagesimal.\"","jur_status":"PENDENTE"},{"n":102,"enun":"As t
