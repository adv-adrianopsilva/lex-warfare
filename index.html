<!DOCTYPE html>
<html lang="pt-BR" data-theme="auto">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prova CEBRASPE — Delegado PCDF 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500&display=swap">

<style>
/* ============================================================
   THEME
   ============================================================ */
:root {
  --paper:        #F4F1E8;
  --paper-card:   #FBFAF5;
  --paper-mute:   #ECE6D6;
  --ink:          #1A1F1A;
  --ink-soft:     #3D423D;
  --ink-muted:    #76705F;
  --line:         #D4CDB8;
  --line-soft:    #E8E1D0;
  --accent:       #2F5D3A;
  --accent-soft:  #DFE9DF;
  --correct:      #2E7D32;
  --correct-bg:   #E4EFE5;
  --wrong:        #B83B3B;
  --wrong-bg:     #F4E1DE;
  --warn:         #8A5A00;
  --warn-bg:      #F4EBD3;
  --shadow-card:  0 1px 0 rgba(40,38,30,.04), 0 12px 32px -8px rgba(40,38,30,.10);
  --shadow-hi:    0 2px 0 rgba(40,38,30,.06), 0 20px 48px -12px rgba(40,38,30,.16);
  --radius:       12px;
  --maxw:         780px;
}
[data-theme="dark"] {
  --paper:        #1E1A14;
  --paper-card:   #2A251D;
  --paper-mute:   #251F18;
  --ink:          #ECE3CC;
  --ink-soft:     #C4BBA3;
  --ink-muted:    #8A8270;
  --line:         #3D362A;
  --line-soft:    #322B22;
  --accent:       #7BAB7E;
  --accent-soft:  #2D3F2F;
  --correct:      #8FBF8F;
  --correct-bg:   #283328;
  --wrong:        #D88080;
  --wrong-bg:     #3A2825;
  --warn:         #C9A05A;
  --warn-bg:      #322A1B;
  --shadow-card:  0 1px 0 rgba(0,0,0,.3), 0 12px 32px -8px rgba(0,0,0,.4);
  --shadow-hi:    0 2px 0 rgba(0,0,0,.4), 0 20px 48px -12px rgba(0,0,0,.5);
}
@media (prefers-color-scheme: dark) {
  :root[data-theme="auto"] {
    --paper:        #1E1A14;
    --paper-card:   #2A251D;
    --paper-mute:   #251F18;
    --ink:          #ECE3CC;
    --ink-soft:     #C4BBA3;
    --ink-muted:    #8A8270;
    --line:         #3D362A;
    --line-soft:    #322B22;
    --accent:       #7BAB7E;
    --accent-soft:  #2D3F2F;
    --correct:      #8FBF8F;
    --correct-bg:   #283328;
    --wrong:        #D88080;
    --wrong-bg:     #3A2825;
    --warn:         #C9A05A;
    --warn-bg:      #322A1B;
    --shadow-card:  0 1px 0 rgba(0,0,0,.3), 0 12px 32px -8px rgba(0,0,0,.4);
    --shadow-hi:    0 2px 0 rgba(0,0,0,.4), 0 20px 48px -12px rgba(0,0,0,.5);
  }
}

/* ============================================================
   RESET + BASE
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  margin: 0; padding: 0;
  background: var(--paper);
  color: var(--ink);
  font-family: 'Newsreader', Georgia, serif;
  font-size: 17px;
  line-height: 1.55;
  font-feature-settings: "kern" 1, "liga" 1;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  transition: background-color .3s ease, color .3s ease;
  background-image: radial-gradient(circle at 1px 1px, rgba(40,38,30,.03) 1px, transparent 0);
  background-size: 24px 24px;
  display: flex; flex-direction: column; min-height: 100vh;
}
[data-theme="dark"] body,
:root[data-theme="auto"] body { 
  background-image: radial-gradient(circle at 1px 1px, rgba(255,250,235,.02) 1px, transparent 0);
}
@media (prefers-color-scheme: dark) {
  :root[data-theme="auto"] body {
    background-image: radial-gradient(circle at 1px 1px, rgba(255,250,235,.02) 1px, transparent 0);
  }
}
main { flex: 1 0 auto; width: 100%; }
h1, h2, h3, h4 {
  font-family: 'Fraunces', Georgia, serif;
  font-weight: 600;
  letter-spacing: -.01em;
  line-height: 1.15;
  margin: 0;
}
button { font-family: inherit; color: inherit; cursor: pointer; }

/* ============================================================
   HEADER
   ============================================================ */
.app-header {
  position: sticky; top: 0; z-index: 50;
  background: rgba(244, 241, 232, 0.92);
  backdrop-filter: saturate(140%) blur(8px);
  -webkit-backdrop-filter: saturate(140%) blur(8px);
  border-bottom: 1px solid var(--line);
  padding: 12px 22px;
  display: flex; align-items: center; justify-content: space-between; gap: 16px;
  transition: background-color .3s ease, border-color .3s ease;
}
[data-theme="dark"] .app-header,
:root[data-theme="auto"] .app-header { background: rgba(30, 26, 20, 0.92); }
@media (prefers-color-scheme: dark) {
  :root[data-theme="auto"] .app-header { background: rgba(30, 26, 20, 0.92); }
}

.brand { display: flex; flex-direction: column; line-height: 1.1; }
.brand-name {
  font-family: 'Fraunces', serif; font-weight: 700; font-size: 17px; letter-spacing: .02em;
}
.brand-sub {
  font-size: 11px; color: var(--ink-muted); letter-spacing: .05em;
  text-transform: uppercase; font-weight: 500; margin-top: 1px;
}

.header-controls { display: flex; align-items: center; gap: 4px; }
.icon-btn {
  width: 36px; height: 36px;
  display: inline-flex; align-items: center; justify-content: center;
  background: transparent; border: 1px solid transparent; border-radius: 8px;
  color: var(--ink-soft); transition: all .15s ease;
  position: relative;
}
.icon-btn:hover {
  background: var(--paper-mute); border-color: var(--line-soft); color: var(--ink);
}
.icon-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
.icon-btn svg { width: 17px; height: 17px; stroke-width: 1.7; }
.icon-btn .label {
  position: absolute; bottom: -28px; left: 50%; transform: translateX(-50%);
  background: var(--ink); color: var(--paper);
  font-size: 11px; padding: 3px 8px; border-radius: 4px; white-space: nowrap;
  opacity: 0; pointer-events: none; transition: opacity .15s ease;
  font-family: 'Newsreader', serif; font-weight: 500;
}
.icon-btn:hover .label { opacity: 1; transition-delay: .4s; }

.header-info {
  display: flex; align-items: center; gap: 14px;
  font-size: 13px; color: var(--ink-muted);
  font-variant-numeric: tabular-nums;
}
.header-info b { color: var(--ink); font-weight: 600; }
.header-info .sep { width: 1px; height: 14px; background: var(--line); }
.header-info .clock {
  display: inline-flex; align-items: center; gap: 5px;
}
.header-info .clock svg { width: 13px; height: 13px; }

/* ============================================================
   MAIN
   ============================================================ */
main { max-width: var(--maxw); margin: 0 auto; padding: 24px 22px 60px; }

/* ============================================================
   COVER
   ============================================================ */
.cover { text-align: center; padding: 48px 12px 80px; animation: fadeIn .5s ease; }
.cover-kicker {
  font-size: 12px; letter-spacing: .25em; text-transform: uppercase;
  color: var(--accent); font-weight: 600; margin-bottom: 14px;
}
.cover h1 {
  font-size: clamp(36px, 6vw, 52px);
  font-weight: 700; font-style: italic; margin-bottom: 14px;
}
.cover .lead {
  font-size: 18px; color: var(--ink-soft);
  max-width: 520px; margin: 0 auto 36px; line-height: 1.5;
}
.cover-card {
  max-width: 560px; margin: 0 auto;
  background: var(--paper-card); border: 1px solid var(--line);
  border-radius: var(--radius); padding: 28px;
  box-shadow: var(--shadow-card); text-align: left;
}
.cover-grid {
  display: grid; grid-template-columns: auto 1fr; gap: 8px 18px;
  font-size: 14px; margin-bottom: 22px;
}
.cover-grid dt {
  color: var(--ink-muted); font-size: 11px;
  letter-spacing: .08em; text-transform: uppercase; align-self: center;
}
.cover-grid dd { margin: 0; color: var(--ink); }
.cover-note {
  font-size: 14px; color: var(--ink-soft); font-style: italic;
  padding: 14px 16px; background: var(--paper-mute);
  border-left: 3px solid var(--accent); border-radius: 0 6px 6px 0;
  margin-bottom: 26px; line-height: 1.5;
}
.btn-primary {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 14px 28px;
  background: var(--ink); color: var(--paper);
  border: none; border-radius: 10px;
  font-family: 'Fraunces', serif; font-weight: 600; font-size: 17px;
  letter-spacing: .01em; transition: all .15s ease;
  box-shadow: 0 1px 0 rgba(0,0,0,.06), 0 6px 16px -6px rgba(40,38,30,.3);
}
.btn-primary:hover {
  transform: translateY(-1px);
  box-shadow: 0 2px 0 rgba(0,0,0,.06), 0 10px 22px -6px rgba(40,38,30,.35);
}
.btn-primary:active { transform: translateY(0); }
.btn-primary svg { width: 16px; height: 16px; }
.cover-secondary { margin-top: 24px; display: flex; justify-content: center; gap: 8px; }
.btn-ghost {
  background: transparent; border: 1px solid var(--line);
  color: var(--ink-soft); padding: 8px 14px; border-radius: 8px;
  font-size: 14px; transition: all .15s ease; font-family: inherit;
}
.btn-ghost:hover {
  border-color: var(--ink-soft); color: var(--ink); background: var(--paper-card);
}

/* ============================================================
   PROVA OBJETIVA HEADER (CEBRASPE chevron)
   ============================================================ */
.prova-title {
  text-align: center; margin: 8px 0 32px;
  padding-bottom: 4px;
  position: relative;
}
.prova-title .pt-bar {
  display: flex; align-items: center; gap: 12px;
  justify-content: center;
}
.prova-title h2 {
  font-family: 'Fraunces', serif;
  font-weight: 700; font-size: 22px;
  letter-spacing: .14em; text-transform: uppercase;
  color: var(--ink); white-space: nowrap;
}
.prova-title .chevron {
  height: 22px; background: var(--ink); flex-shrink: 0;
  width: 64px;
  clip-path: polygon(0 0, 100% 0, 85% 50%, 100% 100%, 0 100%, 15% 50%);
}
.prova-title .sub {
  font-size: 13px; color: var(--ink-muted);
  letter-spacing: .12em; text-transform: uppercase;
  font-weight: 500; margin-top: 10px;
}

/* ============================================================
   DISCIPLINE HEADER
   ============================================================ */
.disc-section { margin-bottom: 40px; }
.disc-header {
  text-align: center; margin: 40px 0 18px;
  background: var(--paper-card);
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
  padding: 12px 0;
  position: relative;
}
.disc-header h3 {
  font-family: 'Fraunces', serif; font-weight: 700;
  font-size: 16px; letter-spacing: .15em; text-transform: uppercase;
  color: var(--ink);
}

/* ============================================================
   COMANDO
   ============================================================ */
.comando {
  background: var(--paper-mute);
  border: 1px solid var(--line-soft);
  border-radius: 6px;
  padding: 14px 18px;
  font-size: 15.5px;
  color: var(--ink-soft);
  margin-bottom: 18px;
  text-align: justify; hyphens: auto; line-height: 1.5;
}

/* ============================================================
   QUESTION ROW (caderno de prova)
   ============================================================ */
.q-block {
  border-top: 1px solid var(--line-soft);
  padding: 18px 0;
  scroll-margin-top: 80px;
}
.q-block:first-of-type { border-top: none; padding-top: 8px; }

.q-line {
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 14px;
  align-items: start;
}

.q-tag {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: 'Fraunces', serif; font-weight: 600;
  font-size: 14px; letter-spacing: .02em; color: var(--ink);
  flex-shrink: 0; padding-top: 1px;
  white-space: nowrap;
}
.q-tag::before {
  content: '';
  width: 9px; height: 13px;
  background: var(--ink);
  clip-path: polygon(0 0, 80% 0, 100% 50%, 80% 100%, 0 100%);
  display: inline-block;
}

.q-text {
  font-size: 16.5px; line-height: 1.6;
  text-align: justify; hyphens: auto;
  color: var(--ink);
}
.q-text .situacao {
  display: block; font-style: italic;
  color: var(--ink-soft); margin-bottom: 8px;
  padding-left: 12px; border-left: 2px solid var(--line);
}
.q-text .assertiva-prefix { font-weight: 600; }

.q-marks {
  display: flex; gap: 6px;
  flex-shrink: 0;
  padding-top: 1px;
}
.q-mark {
  width: 38px; height: 38px;
  border: 1.5px solid var(--line);
  border-radius: 8px;
  background: var(--paper-card);
  font-family: 'Fraunces', serif;
  font-weight: 700; font-size: 15px;
  color: var(--ink-soft);
  display: inline-flex; align-items: center; justify-content: center;
  transition: all .15s ease;
}
.q-mark:hover {
  border-color: var(--ink-soft); color: var(--ink); transform: translateY(-1px);
}
.q-mark.selected-c {
  background: var(--correct); border-color: var(--correct); color: white;
}
.q-mark.selected-e {
  background: var(--wrong); border-color: var(--wrong); color: white;
}

/* When gabarito revealed, show whether mark was right */
.q-block.show-gab .q-mark.selected-c.is-right,
.q-block.show-gab .q-mark.selected-e.is-right {
  box-shadow: 0 0 0 2px var(--correct-bg), 0 0 0 3px var(--correct);
}
.q-block.show-gab .q-mark.selected-c.is-wrong,
.q-block.show-gab .q-mark.selected-e.is-wrong {
  box-shadow: 0 0 0 2px var(--wrong-bg), 0 0 0 3px var(--wrong);
}

/* show-gab button + feedback */
.q-actions-row {
  margin-top: 10px; padding-left: 96px;
  display: flex; align-items: center; gap: 12px;
  font-size: 13px;
}
.q-show-gab {
  background: transparent; border: 1px dashed var(--line);
  border-radius: 6px; padding: 4px 12px;
  font-size: 12px; color: var(--ink-muted);
  font-family: inherit; transition: all .15s ease;
}
.q-show-gab:hover {
  border-style: solid; border-color: var(--accent); color: var(--accent);
}
.q-status-inline {
  font-size: 12px; color: var(--ink-muted);
  font-variant-numeric: tabular-nums;
}
.q-status-inline .ok { color: var(--correct); font-weight: 600; }
.q-status-inline .er { color: var(--wrong); font-weight: 600; }

.q-feedback {
  margin-top: 14px; padding: 14px 18px;
  background: var(--paper-mute);
  border-radius: 8px; border-left: 3px solid var(--accent);
  font-size: 14.5px; line-height: 1.6;
  animation: fadeUp .25s ease;
  margin-left: 0;
}
.q-feedback .gab-line {
  font-family: 'Fraunces', serif; font-weight: 600;
  margin-bottom: 10px; font-size: 14px;
  letter-spacing: .04em;
  display: flex; align-items: center; gap: 8px;
}
.q-feedback .gab-line .gab-label { color: var(--ink-muted); text-transform: uppercase; font-size: 11px; letter-spacing: .1em; }
.q-feedback .gab-line .gab-value { color: var(--ink); font-size: 15px; }
.q-feedback .gab-line .gab-result {
  margin-left: auto;
  font-size: 12px; padding: 2px 10px; border-radius: 99px;
}
.q-feedback .gab-line .gab-result.ok { background: var(--correct-bg); color: var(--correct); }
.q-feedback .gab-line .gab-result.er { background: var(--wrong-bg); color: var(--wrong); }

.q-feedback dl { display: grid; gap: 14px; margin: 0; }
.q-feedback dt {
  font-size: 11px; font-weight: 600;
  letter-spacing: .1em; text-transform: uppercase;
  color: var(--ink-muted); margin-bottom: 4px;
}
.q-feedback dd { 
  margin: 0; color: var(--ink); text-align: justify;
  white-space: pre-line;
}
.q-feedback .peg dt { color: var(--warn); }
.q-feedback .peg dd {
  font-style: italic; color: var(--warn);
  background: var(--warn-bg); padding: 8px 12px;
  border-radius: 6px; border-left: 3px solid var(--warn);
  white-space: pre-line;
}
/* Highlight LEI / JURISPRUDÊNCIA / DOUTRINA labels */
.q-feedback dd strong.label {
  display: inline-block;
  font-family: 'Fraunces', serif;
  font-weight: 700;
  font-size: 12px;
  letter-spacing: .08em;
  color: var(--accent);
  margin-top: 2px;
}

/* ============================================================
   PROVA TOOLBAR (sticky)
   ============================================================ */
.prova-toolbar {
  position: sticky; top: 60px; z-index: 30;
  background: rgba(244, 241, 232, 0.94);
  backdrop-filter: saturate(140%) blur(8px);
  padding: 10px 0;
  margin: 0 0 18px;
  border-bottom: 1px solid var(--line-soft);
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
}
[data-theme="dark"] .prova-toolbar,
:root[data-theme="auto"] .prova-toolbar { background: rgba(30, 26, 20, 0.94); }
@media (prefers-color-scheme: dark) {
  :root[data-theme="auto"] .prova-toolbar { background: rgba(30, 26, 20, 0.94); }
}
.tb-info {
  font-size: 13px; color: var(--ink-muted);
  font-variant-numeric: tabular-nums;
}
.tb-info b { color: var(--ink); font-weight: 600; }
.tb-spacer { flex: 1; }
.tb-btn {
  background: var(--paper-card); border: 1px solid var(--line);
  border-radius: 8px; padding: 7px 13px;
  font-size: 13px; color: var(--ink); font-family: inherit;
  transition: all .15s ease;
  display: inline-flex; align-items: center; gap: 6px;
}
.tb-btn:hover { border-color: var(--ink-soft); background: var(--paper-mute); }
.tb-btn.primary {
  background: var(--ink); color: var(--paper); border-color: var(--ink);
}
.tb-btn.primary:hover { background: var(--ink-soft); }
.tb-btn svg { width: 13px; height: 13px; }

/* Quick navigation grid (jump to question) */
.quick-nav {
  position: fixed; right: 24px; bottom: 24px;
  width: auto;
  background: var(--paper-card);
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 12px;
  box-shadow: var(--shadow-hi);
  z-index: 45;
  max-width: 320px;
  max-height: 60vh;
  overflow-y: auto;
  display: none;
}
.quick-nav.open { display: block; animation: fadeUp .2s ease; }
.quick-nav-title {
  font-size: 11px; letter-spacing: .1em;
  text-transform: uppercase; color: var(--ink-muted);
  margin-bottom: 8px; font-weight: 600;
}
.quick-nav-grid {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  gap: 4px;
}
.quick-nav-grid button {
  width: 32px; height: 32px;
  border: 1px solid var(--line);
  background: var(--paper);
  border-radius: 6px;
  font-size: 11px; font-family: 'Fraunces', serif; font-weight: 600;
  color: var(--ink-soft);
  transition: all .12s ease;
  font-variant-numeric: tabular-nums;
}
.quick-nav-grid button:hover {
  border-color: var(--ink); color: var(--ink); transform: scale(1.06);
}
.quick-nav-grid button.answered-c {
  background: var(--correct-bg); border-color: var(--correct); color: var(--correct);
}
.quick-nav-grid button.answered-e {
  background: var(--wrong-bg); border-color: var(--wrong); color: var(--wrong);
}
.quick-nav-grid button.gab-shown {
  border-style: dashed;
}
.fab-nav {
  position: fixed; right: 24px; bottom: 24px;
  width: 48px; height: 48px;
  background: var(--ink); color: var(--paper);
  border: none; border-radius: 50%;
  box-shadow: 0 6px 16px rgba(0,0,0,.2);
  display: inline-flex; align-items: center; justify-content: center;
  transition: all .2s ease;
  z-index: 44;
  font-family: 'Fraunces', serif; font-weight: 600;
}
.fab-nav:hover { transform: scale(1.08); }
.fab-nav svg { width: 20px; height: 20px; }
.fab-nav.hidden { display: none; }

/* ============================================================
   PLACAR
   ============================================================ */
.placar { animation: fadeUp .5s ease; margin-bottom: 32px; }
.placar-hero {
  background: var(--paper-card); border: 1px solid var(--line);
  border-radius: var(--radius); padding: 36px 32px;
  box-shadow: var(--shadow-card); margin-bottom: 22px; text-align: center;
}
.placar-kicker {
  font-size: 12px; letter-spacing: .25em; text-transform: uppercase;
  color: var(--accent); font-weight: 600; margin-bottom: 12px;
}
.placar-hero h2 {
  font-size: clamp(32px, 5vw, 42px);
  font-weight: 700; font-style: italic; margin-bottom: 8px;
}
.placar-lead { font-size: 16px; color: var(--ink-soft); margin-bottom: 28px; }
.placar-stats {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px;
  background: var(--line); border: 1px solid var(--line);
  border-radius: 10px; overflow: hidden;
}
.placar-stat { background: var(--paper-card); padding: 18px 12px; text-align: center; }
.placar-stat .num {
  font-family: 'Fraunces', serif; font-weight: 700; font-size: 32px;
  line-height: 1; color: var(--ink); font-variant-numeric: tabular-nums;
}
.placar-stat .num.correct { color: var(--correct); }
.placar-stat .num.wrong { color: var(--wrong); }
.placar-stat .lbl {
  font-size: 11px; letter-spacing: .1em; text-transform: uppercase;
  color: var(--ink-muted); margin-top: 6px; font-weight: 600;
}
@media (max-width: 600px) { .placar-stats { grid-template-columns: repeat(2, 1fr); } }

.cebraspe-box, .disc-stats, .errors-list {
  background: var(--paper-card); border: 1px solid var(--line);
  border-radius: var(--radius); padding: 24px;
  margin-bottom: 22px; box-shadow: var(--shadow-card);
}
.cebraspe-title, .disc-stats-title, .errors-list h3 {
  font-family: 'Fraunces', serif; font-weight: 600; font-size: 17px;
  margin-bottom: 14px; color: var(--ink);
}
.cebraspe-formula {
  display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  padding: 16px 18px; background: var(--paper-mute);
  border-radius: 8px; margin-bottom: 14px; font-size: 15px;
}
.cebraspe-formula .part { color: var(--ink-soft); }
.cebraspe-formula .part b { color: var(--ink); font-weight: 600; }
.cebraspe-formula .equals {
  font-family: 'Fraunces', serif; font-weight: 700; font-size: 22px;
  color: var(--ink); font-variant-numeric: tabular-nums;
}
.cebraspe-verdict {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px; border-radius: 8px; font-weight: 600;
}
.cebraspe-verdict.approved { background: var(--correct-bg); color: var(--correct); }
.cebraspe-verdict.reproved { background: var(--wrong-bg); color: var(--wrong); }
.cebraspe-verdict svg { width: 18px; height: 18px; }

.disc-row {
  display: grid; grid-template-columns: 1.6fr 2fr auto auto;
  gap: 14px; align-items: center;
  padding: 8px 0; border-top: 1px solid var(--line-soft); font-size: 14px;
}
.disc-row:first-of-type { border-top: none; }
.disc-row .nm { color: var(--ink); font-weight: 500; }
.disc-row .bar {
  height: 8px; background: var(--line-soft); border-radius: 99px;
  position: relative; overflow: hidden;
}
.disc-row .bar i {
  display: block; height: 100%; background: var(--accent); border-radius: 99px;
}
.disc-row .frac { color: var(--ink-muted); font-variant-numeric: tabular-nums; font-size: 13px; }
.disc-row .pct {
  font-family: 'Fraunces', serif; font-weight: 600;
  font-variant-numeric: tabular-nums; font-size: 14px;
  color: var(--ink); min-width: 42px; text-align: right;
}
@media (max-width: 600px) {
  .disc-row { grid-template-columns: 1fr auto; gap: 6px 14px; }
  .disc-row .bar { grid-column: 1 / -1; order: 3; }
  .disc-row .frac { order: 4; }
}

.errors-list ul { list-style: none; margin: 0; padding: 0; }
.errors-list li {
  display: grid; grid-template-columns: auto 1fr auto;
  gap: 12px; align-items: center;
  padding: 10px 0; border-top: 1px solid var(--line-soft); font-size: 14px;
}
.errors-list li:first-child { border-top: none; }
.errors-list .e-num {
  font-family: 'Fraunces', serif; font-weight: 600; color: var(--wrong);
  font-variant-numeric: tabular-nums; min-width: 36px;
}
.errors-list .e-sub { color: var(--ink); line-height: 1.4; }
.errors-list .e-sub small {
  display: block; color: var(--ink-muted); font-size: 12px; margin-top: 2px;
}
.errors-list .e-go {
  background: transparent; border: 1px solid var(--line); border-radius: 6px;
  padding: 4px 10px; font-size: 12px; color: var(--ink-soft);
  transition: all .15s ease; font-family: inherit;
}
.errors-list .e-go:hover { border-color: var(--accent); color: var(--accent); }

/* ============================================================
   MODAL + TOAST
   ============================================================ */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(20, 18, 14, 0.5);
  backdrop-filter: blur(4px);
  z-index: 100;
  display: flex; align-items: center; justify-content: center; padding: 20px;
  animation: fadeIn .2s ease;
}
.modal {
  background: var(--paper-card);
  border-radius: var(--radius);
  padding: 28px; max-width: 440px; width: 100%;
  box-shadow: 0 20px 60px rgba(0,0,0,.3);
  animation: fadeUp .2s ease;
}
.modal h3 { font-family: 'Fraunces', serif; margin-bottom: 10px; font-size: 20px; }
.modal p { color: var(--ink-soft); margin-bottom: 22px; font-size: 15px; line-height: 1.5; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
.btn-danger {
  background: var(--wrong); color: white; border: none; border-radius: 8px;
  padding: 9px 18px; font-family: inherit; font-weight: 600; font-size: 14px;
  transition: opacity .15s ease;
}
.btn-danger:hover { opacity: .9; }
.btn-warn {
  background: var(--warn); color: white; border: none; border-radius: 8px;
  padding: 9px 18px; font-family: inherit; font-weight: 600; font-size: 14px;
  transition: opacity .15s ease;
}
.btn-warn:hover { opacity: .9; }

.toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--ink); color: var(--paper);
  padding: 12px 20px; border-radius: 8px;
  font-size: 14px; z-index: 200;
  opacity: 0; transition: opacity .3s ease, transform .3s ease;
  box-shadow: 0 10px 30px rgba(0,0,0,.3);
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ============================================================
   FOOTER
   ============================================================ */
.app-footer {
  text-align: center; padding: 28px 22px;
  font-size: 12px; color: var(--ink-muted);
  letter-spacing: .05em; font-style: italic;
  border-top: 1px solid var(--line-soft);
  margin-top: 60px;
}

/* ============================================================
   ANIMATIONS + UTILITIES
   ============================================================ */
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.hidden { display: none !important; }

/* ============================================================

@media (max-width: 640px) {
  main { padding: 16px 14px 80px; }
  .app-header { padding: 10px 14px; }

  .brand-sub { font-size: 10px; }

  .cover { padding: 24px 8px 60px; }

  .prova-title h2 { font-size: 17px; }
  .prova-title .chevron { width: 36px; height: 18px; }

}
</style>

<script>
// ============================================================

const DEFAULT_BLOCO = {"meta":{"id":"2026-05-30-Exp120","titulo":"Bloco 30/05 — Expandido Completo (Fase 1)","data":"2026-05-30","totalQuestoes":120,"concurso":"Delegado de Polícia — PCDF 2026","edital":"Edital nº 1, de 3/2/2026","observacao":"Versão completa da Fase 1: TODAS as 120 questões com comentários expandidos no padrão Feynman — lei literal do dispositivo pertinente e trecho selecionado de jurisprudência STF/STJ (com identificação completa do julgado). Cobertura: Penal 24 + ProcPenal 22 + Constitucional 18 + Administrativo 16 + Medicina Legal 10 + Civil 8 + Tributário 6 + Ambiental 5 + Empresarial 5 + DF/PDPM/Socorros 6. Jurisprudência verificada em portal.stf.jus.br e scon.stj.jus.br até 3/2/2026."},"disciplinas":[{"nome":"Direito Penal e Legislação Penal Especial","comando":"Acerca dos princípios penais, da aplicação da lei penal, da teoria do crime, da teoria da pena e da legislação penal especial, à luz da doutrina e da jurisprudência dominante dos tribunais superiores, julgue os itens.","itens":[{"n":1,"enun":"O princípio da intervenção mínima orienta que o direito penal deve atuar apenas quando os demais ramos do ordenamento jurídico se mostrarem insuficientes para a proteção do bem jurídico tutelado.","gab":"CERTO","com":"Subsidiariedade + fragmentariedade compõem a intervenção mínima. O direito penal é ultima ratio: só entra quando civil, administrativo e tributário não bastam. Analogia: é como o pronto-socorro — você só vai quando o clínico geral não resolveu. Princípio implícito, com assento constitucional na dignidade da pessoa humana.","fund":"LEI: Art. 1º, III, da CF/1988: \"A República Federativa do Brasil... tem como fundamentos: (...) III - a dignidade da pessoa humana.\"\n\nDOUTRINA: A intervenção mínima é construção dogmática (Hassemer, Roxin) com lastro constitucional implícito nos arts. 1º, III, e 5º, XXXIX, da CF. Decompõe-se em subsidiariedade (último recurso) e fragmentariedade (proteção apenas a bens jurídicos essenciais)."},{"n":2,"enun":"O princípio da legalidade penal exige lei em sentido estrito, anterior, escrita, certa e estrita, sendo vedado o emprego da analogia in malam partem na criação de tipos penais ou na agravação de penas.","gab":"CERTO","com":"O nullum crimen sine lege se decompõe em cinco vertentes: lei (escrita, em sentido estrito), prévia (anterior), estrita (vedada analogia in malam partem), certa (taxativa, vedando tipos abertos demais) e necessária (intervenção mínima). Analogia in malam partem é vedada; in bonam partem, admitida. Analogia: é como regra de futebol — não dá pra inventar falta nova durante o jogo para prejudicar o time adversário, mas pode-se interpretar a favor.","fund":"LEI: Art. 5º, XXXIX, da CF/1988: \"Não há crime sem lei anterior que o defina, nem pena sem prévia cominação legal.\"\n\nArt. 1º do CP: \"Não há crime sem lei anterior que o defina. Não há pena sem prévia cominação legal.\"\n\nDOUTRINA: Cinco vertentes clássicas (Roxin): lex scripta, praevia, stricta, certa e necessaria."},{"n":3,"enun":"Aplica-se a lei brasileira aos crimes cometidos no estrangeiro contra o patrimônio ou a fé pública da União, do Distrito Federal, de estado, de território, de município, de empresa pública, sociedade de economia mista, autarquia ou fundação instituída pelo Poder Público.","gab":"CERTO","com":"Extraterritorialidade incondicionada (art. 7º, I, b, CP): pune-se no Brasil mesmo crime cometido lá fora, sem precisar de pedido, condenação prévia ou dupla tipicidade — basta o bem jurídico ser do Brasil. Analogia: é como um banco aplicar regra interna em qualquer filial no mundo — onde quer que aconteça, o problema é dele.","fund":"LEI: Art. 7º, I, b, do CP: \"Ficam sujeitos à lei brasileira, embora cometidos no estrangeiro: I - os crimes: (...) b) contra o patrimônio ou a fé pública da União, do Distrito Federal, de Estado, de Território, de Município, de empresa pública, sociedade de economia mista, autarquia ou fundação instituída pelo Poder Público.\"\n\nTrata-se de extraterritorialidade INCONDICIONADA (art. 7º, §1º, CP): aplica-se a lei brasileira ainda que o agente tenha sido absolvido ou condenado no estrangeiro."},{"n":4,"enun":"No concurso aparente de normas, aplica-se o princípio da especialidade quando uma norma contém os elementos de outra (gênero) e ainda outros que a especializam, prevalecendo a especial sobre a geral.","gab":"CERTO","com":"Lex specialis derogat generali. O tipo especial absorve o geral porque traz elementos adicionais (especializantes). Clássico: infanticídio é homicídio + 'puerpério' + 'próprio filho' — esses dois elementos especializam. Analogia: cardiologista é médico, mas cardiologista é especial — quem é cardiologista trata como cardiologista, não como clínico geral.","fund":"LEI: Não há artigo expresso no CP sobre concurso aparente. É construção doutrinária pacífica.\n\nDOUTRINA: Princípios do concurso aparente de normas (Aníbal Bruno, Bitencourt, Nucci): (i) especialidade — norma especial prefere a geral; (ii) subsidiariedade — norma primária prefere a subsidiária; (iii) consunção (absorção) — fato consunto absorvido por fato consuntivo; (iv) alternatividade — tipos mistos alternativos. Especialidade é a relação lógica de gênero/espécie."},{"n":5,"enun":"Pela teoria da imputação objetiva, somente é típica a conduta que crie ou incremente um risco juridicamente proibido e que esse risco se realize no resultado, dentro do alcance do tipo.","gab":"CERTO","com":"A imputação objetiva acrescenta um filtro normativo ao nexo causal naturalístico (teoria da equivalência das condições, art. 13 CP). Não basta a conduta ter causado o resultado; é preciso que ela tenha criado/incrementado risco juridicamente proibido E que esse risco se realize no resultado. Analogia: dirigir até a casa de alguém não é 'matar' essa pessoa, mesmo que ela morra ao receber a visita — falta o risco proibido na conduta de dirigir.","fund":"LEI: Art. 13 do CP (causalidade): \"O resultado, de que depende a existência do crime, somente é imputável a quem lhe deu causa.\"\n\nDOUTRINA: A teoria da imputação objetiva (Roxin, Jakobs) acrescenta ao nexo causal naturalístico os critérios normativos: (i) criação de risco juridicamente proibido; (ii) realização do risco no resultado; (iii) resultado dentro do alcance do tipo. Atua como filtro corretivo da causalidade ampla do art. 13 CP."},{"n":6,"enun":"A tentativa é punida com a pena correspondente ao crime consumado, reduzida de um a dois terços, considerando-se na dosagem da redução a maior ou menor proximidade da consumação (iter criminis percorrido).","gab":"CERTO","com":"O CP adota a teoria objetiva temperada para a tentativa: pune-se com a pena do crime consumado, reduzida de 1/3 a 2/3, conforme o iter criminis percorrido — quanto mais próximo da consumação, menor a redução. Não é a vontade que se pune integralmente (subjetiva), nem se isenta totalmente (extrema objetiva). Analogia: é como meio gol no futebol — vale como esforço, mas não como gol.","fund":"LEI: Art. 14, II e parágrafo único, do CP: \"II - tentado, quando, iniciada a execução, não se consuma por circunstâncias alheias à vontade do agente. Parágrafo único - Salvo disposição em contrário, pune-se a tentativa com a pena correspondente ao crime consumado, diminuída de um a dois terços.\"\n\nDOUTRINA: Teoria objetiva temperada (adotada pelo CP) — a tentativa expressa menor lesividade, justificando a redução proporcional ao iter percorrido."},{"n":7,"enun":"Situação hipotética: o agente, acreditando estar agindo conforme a lei, praticou conduta proibida em razão de erro inevitável sobre a ilicitude do fato. Assertiva: nessa hipótese, exclui-se a culpabilidade, isentando o agente de pena.","gab":"CERTO","com":"Erro de proibição INEVITÁVEL (escusável) exclui a culpabilidade — faltava ao agente a potencial consciência da ilicitude, que é elemento da culpabilidade. Resultado: isenção de pena. Se o erro fosse evitável (inescusável), apenas reduziria a pena (1/6 a 1/3). Analogia: é como dirigir num país onde é mão inglesa achando que é mão direita — se você não tinha como saber, não te multam.","fund":"LEI: Art. 21 do CP: \"O desconhecimento da lei é inescusável. O erro sobre a ilicitude do fato, se inevitável, isenta de pena; se evitável, poderá diminuí-la de um sexto a um terço.\"\n\nParágrafo único: \"Considera-se evitável o erro se o agente atua ou se omite sem a consciência da ilicitude do fato, quando lhe era possível, nas circunstâncias, ter ou atingir essa consciência.\"\n\nDOUTRINA: A potencial consciência da ilicitude é elemento da culpabilidade (teoria normativa pura — Welzel). Sua ausência (erro inevitável) afasta a reprovabilidade do injusto.","peg":"Erro INEVITÁVEL = isenção (exclui culpabilidade). Erro EVITÁVEL = redução de 1/6 a 1/3. Bancas trocam um pelo outro."},{"n":8,"enun":"As penas privativas de liberdade serão executadas em regime progressivo, segundo o mérito do condenado, observados os critérios objetivos e subjetivos previstos na Lei de Execução Penal.","gab":"CERTO","com":"O sistema é progressivo: o condenado avança do regime mais gravoso ao menos gravoso conforme cumpre fração da pena (critério objetivo) e demonstra mérito (critério subjetivo, hoje bastante atrelado a comportamento carcerário). A Lei 13.964/2019 (Pacote Anticrime) atualizou as frações do art. 112 da LEP. Analogia: é como progressão de cinto em arte marcial — você sobe se preencher tempo + comportamento.","fund":"LEI: Art. 33, §2º, do CP: \"As penas privativas de liberdade deverão ser executadas em forma progressiva, segundo o mérito do condenado, observados os seguintes critérios e ressalvadas as hipóteses de transferência a regime mais rigoroso (...).\"\n\nArt. 112 da LEP (redação Lei 13.964/2019): A progressão exige cumprimento de fração que varia de 16% (primário, sem violência/grave ameaça) até 70% (reincidente em hediondo com resultado morte), além de boa conduta carcerária comprovada pelo diretor."},{"n":9,"enun":"As penas restritivas de direitos substituem a pena privativa de liberdade quando a condenação for por crime culposo ou, quando doloso, com pena não superior a quatro anos, sem violência ou grave ameaça, presentes os demais requisitos.","gab":"CERTO","com":"Substituição alternativa (não cumulativa): cabe se o crime é (i) doloso com pena ≤ 4 anos sem violência ou grave ameaça à pessoa, OU (ii) culposo (qualquer pena), mais requisitos subjetivos (não reincidente em doloso + culpabilidade, antecedentes etc. favoráveis). Analogia: é como pena alternativa para infração de trânsito — em vez de cadeia, presta serviço à comunidade.","fund":"LEI: Art. 44 do CP: \"As penas restritivas de direitos são autônomas e substituem as privativas de liberdade, quando: I - aplicada pena privativa de liberdade não superior a quatro anos e o crime não for cometido com violência ou grave ameaça à pessoa ou, qualquer que seja a pena aplicada, se o crime for culposo; II - o réu não for reincidente em crime doloso; III - a culpabilidade, os antecedentes, a conduta social e a personalidade do condenado, bem como os motivos e as circunstâncias indicarem que essa substituição seja suficiente.\"\n\nA reincidência em crime doloso é, em regra, óbice; porém o §3º admite a substituição se a medida for socialmente recomendável e a reincidência não for específica."},{"n":10,"enun":"Configura estupro de vulnerável manter conjunção carnal ou praticar outro ato libidinoso com menor de 14 anos, sendo irrelevante eventual consentimento da vítima.","gab":"CERTO","com":"O STJ pacificou pela Súmula 593 que a vulnerabilidade etária é ABSOLUTA: consentimento, experiência sexual prévia e relacionamento amoroso são irrelevantes. A lei tutela o desenvolvimento sexual da criança e do adolescente como bem jurídico indisponível. Analogia: é como dirigir antes dos 18 — não importa o quanto você 'saiba' dirigir, a lei estabeleceu um critério objetivo intransponível.","fund":"LEI: Art. 217-A, caput, do CP: \"Ter conjunção carnal ou praticar outro ato libidinoso com menor de 14 (catorze) anos: Pena - reclusão, de 8 (oito) a 15 (quinze) anos.\"\n\nJURISPRUDÊNCIA: STJ, Súmula 593 (Terceira Seção, j. 25/10/2017, DJe 06/11/2017): \"O crime de estupro de vulnerável se configura com a conjunção carnal ou prática de ato libidinoso com menor de 14 anos, sendo irrelevante eventual consentimento da vítima para a prática do ato, sua experiência sexual anterior ou existência de relacionamento amoroso com o agente.\" "},{"n":11,"enun":"A interceptação de comunicações telefônicas, em qualquer modalidade, pode ser determinada de ofício pelo juiz para apuração de qualquer infração penal, desde que indispensável à investigação.","gab":"ERRADO","com":"Dois erros simultâneos. (i) Interceptação só cabe em crimes punidos com RECLUSÃO (não 'qualquer infração penal'); (ii) o Pacote Anticrime (Lei 13.964/2019) inseriu o art. 3º-A no CPP, vedando a atuação de ofício do juiz na fase investigatória — sistema acusatório. Cabe à autoridade policial ou ao MP requerer; o juiz apenas decide.","fund":"LEI: Art. 1º da Lei 9.296/1996: \"A interceptação de comunicações telefônicas, de qualquer natureza, para prova em investigação criminal e em instrução processual penal, observará o disposto nesta Lei e dependerá de ordem do juiz competente da ação principal, sob segredo de justiça.\"\n\nArt. 2º, III: \"Não será admitida a interceptação de comunicações telefônicas quando ocorrer qualquer das seguintes hipóteses: (...) III - o fato investigado constituir infração penal punida, no máximo, com pena de detenção.\"\n\nArt. 3º-A do CPP (incluído pela Lei 13.964/2019): \"O juiz não poderá, na fase de investigação, atuar de ofício.\"\n\nA interceptação na fase investigatória só pode ser determinada mediante representação da autoridade policial ou requerimento do MP (art. 3º da Lei 9.296/1996).","peg":"Combina duas armadilhas no mesmo item: 'qualquer infração' (errado, só reclusão) e 'de ofício' (errado, vedado pelo art. 3º-A CPP)."},{"n":12,"enun":"Constitui crime, no Estatuto da Pessoa Idosa, abandonar o idoso em hospitais, casas de saúde, entidades de longa permanência ou congêneres, ou não prover suas necessidades básicas, quando obrigado por lei ou mandado.","gab":"CERTO","com":"O Estatuto criminaliza expressamente o abandono do idoso por quem tem dever de cuidá-lo — reflexo do princípio da proteção integral. Tipo específico, não se confunde com o art. 133 do CP (abandono de incapaz genérico). Pena de detenção de 6 meses a 3 anos, e multa.","fund":"LEI: Art. 98 da Lei 10.741/2003 (Estatuto da Pessoa Idosa): \"Abandonar o idoso em hospitais, casas de saúde, entidades de longa permanência, ou congêneres, ou não prover suas necessidades básicas, quando obrigado por lei ou mandato: Pena - detenção de 6 (seis) meses a 3 (três) anos e multa.\" "},{"n":13,"enun":"No Código de Trânsito Brasileiro, o homicídio culposo praticado na direção de veículo automotor sob influência de álcool ou outra substância psicoativa que determine dependência tem pena majorada em relação ao tipo simples.","gab":"CERTO","com":"O CTB tem o homicídio culposo na direção (art. 302, caput) e prevê figura mais grave (§3º) quando há embriaguez. Reação legislativa à crescente impunidade dos motoristas embriagados — a pena salta para 5 a 8 anos, sem a circunstância prevista no caput (2 a 4 anos). Analogia: é como agravante para quem briga com soco inglês — instrumental qualificado, resposta penal mais severa.","fund":"LEI: Art. 302, §3º, da Lei 9.503/1997 (CTB): \"Se o agente conduz veículo automotor sob a influência de álcool ou de qualquer outra substância psicoativa que determine dependência: Penas - reclusão, de cinco a oito anos, e suspensão ou proibição do direito de se obter a permissão ou a habilitação para dirigir veículo automotor.\"\n\nCaput do art. 302 (homicídio culposo simples no trânsito): \"Penas - detenção, de dois a quatro anos, e suspensão ou proibição de se obter a permissão ou a habilitação para dirigir veículo automotor.\" "},{"n":14,"enun":"Os crimes ambientais previstos na Lei nº 9.605/1998 admitem a aplicação da transação penal e da suspensão condicional do processo, observados os requisitos próprios desses institutos.","gab":"CERTO","com":"A Lei dos Crimes Ambientais expressamente prevê a aplicação dos institutos despenalizadores da Lei 9.099/95 (transação penal e suspensão condicional do processo), observados os requisitos próprios. Política criminal: para os crimes ambientais menos graves, restauração e reparação interessam mais que cárcere. Analogia: prefere-se a 'multa + plantio de mudas' à prisão.","fund":"LEI: Art. 27 da Lei 9.605/1998: \"Nos crimes ambientais de menor potencial ofensivo, a proposta de aplicação imediata de pena restritiva de direitos ou multa, prevista no art. 76 da Lei nº 9.099, de 26 de setembro de 1995, somente poderá ser formulada desde que tenha havido a prévia composição do dano ambiental, de que trata o art. 74 da mesma lei, salvo em caso de comprovada impossibilidade.\"\n\nArt. 28 da mesma lei estende as regras do art. 89 da Lei 9.099/95 (sursis processual) com condições específicas."},{"n":15,"enun":"Situação hipotética: agente reincidente foi processado pelo furto de produto de pequeno valor em um mercado. Assertiva: segundo orientação predominante do STJ, a reincidência ou a habitualidade delitiva, em regra, afastam a aplicação do princípio da insignificância.","gab":"CERTO","com":"Tendência consolidada do STJ: a reiteração revela maior reprovabilidade da conduta, em regra afastando a bagatela (princípio da insignificância). O STF, em contrapartida, faz análise caso a caso (cf. divergência D2 no lastro da skill). O item é correto porque usa 'em regra' / 'orientação predominante' — não absolutiza.","fund":"LEI: O princípio da insignificância é construção jurisprudencial (Roxin) sem previsão legal expressa, mas com lastro constitucional na intervenção mínima.\n\nJURISPRUDÊNCIA: STJ, orientação predominante das 5ª e 6ª Turmas (AgRg no HC 765.327, AgRg no AREsp 2.180.124, entre outros): a reincidência ou a contumácia, em regra, afasta a aplicação do princípio da insignificância, por demonstrar maior reprovabilidade da conduta e desprezo às normas. Eventual exceção exige análise concreta da insignificância sob os quatro vetores (mínima ofensividade, ausência de periculosidade, reduzida reprovabilidade, inexpressividade da lesão).\n\nSTF (entendimento concorrente): analisa caso a caso, podendo aplicar a insignificância mesmo a reincidente quando os vetores estão presentes (HC 137.422, HC 123.108).","peg":"Item é CORRETO porque usa 'em regra'/'orientação predominante'. Se dissesse 'sempre' afasta a insignificância, seria ERRADO."},{"n":16,"enun":"Considera-se em legítima defesa quem, usando moderadamente dos meios necessários, repele injusta agressão, atual ou iminente, a direito seu ou de outrem.","gab":"CERTO","com":"Quatro requisitos clássicos: (i) agressão injusta (antijurídica); (ii) atual ou iminente (não passada nem futura remota); (iii) meios necessários (proporcionais ao que está disponível); (iv) uso moderado (sem excesso) — em defesa de direito próprio ou de terceiro. Analogia: é o 'right of self-defense' — você pode reagir, mas com força equivalente, não atirando em quem te empurrou.","fund":"LEI: Art. 25 do CP: \"Entende-se em legítima defesa quem, usando moderadamente dos meios necessários, repele injusta agressão, atual ou iminente, a direito seu ou de outrem.\"\n\nParágrafo único (incluído pela Lei 13.964/2019): \"Observados os requisitos previstos no caput deste artigo, considera-se também em legítima defesa o agente de segurança pública que repele agressão ou risco de agressão a vítima mantida refém durante a prática de crimes.\" "},{"n":17,"enun":"O concurso material, o concurso formal e o crime continuado constituem espécies de concurso de crimes, sendo que no crime continuado se aplica a pena de um só dos crimes, se idênticas, ou a mais grave, se diversas, aumentada de um sexto a dois terços.","gab":"CERTO","com":"Crime continuado adota a EXASPERAÇÃO (uma só pena, aumentada). É diferente do material (somam-se penas — cúmulo material) e do formal próprio (uma pena aumentada de 1/6 a 1/2 quando os crimes derivam de uma só ação). Analogia: é como uma assinatura mensal cumulada — não somam-se os meses, paga-se um valor 'majorado' que representa o conjunto.","fund":"LEI: Art. 71, caput, do CP: \"Quando o agente, mediante mais de uma ação ou omissão, pratica dois ou mais crimes da mesma espécie e, pelas condições de tempo, lugar, maneira de execução e outras semelhantes, devem os subsequentes ser havidos como continuação do primeiro, aplica-se-lhe a pena de um só dos crimes, se idênticas, ou a mais grave, se diversas, aumentada, em qualquer caso, de um sexto a dois terços.\"\n\nArt. 69 (concurso material): \"Quando o agente, mediante mais de uma ação ou omissão, pratica dois ou mais crimes, idênticos ou não, aplicam-se cumulativamente as penas privativas de liberdade em que haja incorrido.\"\n\nArt. 70 (concurso formal): \"Quando o agente, mediante uma só ação ou omissão, pratica dois ou mais crimes, idênticos ou não, aplica-se-lhe a mais grave das penas cabíveis ou, se iguais, somente uma delas, mas aumentada, em qualquer caso, de um sexto até metade.\" "},{"n":18,"enun":"Situação hipotética: durante a execução de um sequestro, entrou em vigor lei que tornou mais grave a pena do crime. Assertiva: segundo entendimento sumulado do STF, aplica-se ao caso a lei penal mais grave, ainda que sua vigência seja posterior ao início da privação da liberdade.","gab":"CERTO","com":"Crime permanente: a consumação se renova a cada instante (sequestro, cárcere privado, posse ilegal de arma). Se uma lei mais grave entra em vigor durante a permanência, ela incide — o agente está perpetrando o crime sob a nova lei. Não há violação à irretroatividade porque a conduta continua sendo praticada. Analogia: se você invade uma propriedade em janeiro e fica lá até dezembro, e em junho aumentam a multa — você paga a multa nova porque ainda estava invadindo quando ela entrou em vigor.","fund":"LEI: Art. 2º, parágrafo único, do CP: \"A lei posterior, que de qualquer modo favorecer o agente, aplica-se aos fatos anteriores, ainda que decididos por sentença condenatória transitada em julgado.\"\n\nArt. 5º, XL, da CF/1988: \"A lei penal não retroagirá, salvo para beneficiar o réu.\"\n\nJURISPRUDÊNCIA: STF, Súmula 711 (Sessão Plenária de 24/09/2003, DJ 09-13/10/2003): \"A lei penal mais grave aplica-se ao crime continuado ou ao crime permanente, se a sua vigência é anterior à cessação da continuidade ou da permanência.\" ","peg":"Crime PERMANENTE/CONTINUADO + lei mais grave durante a execução = APLICA-SE a lei nova (Súmula 711). Não confunda com retroatividade gravosa, que continua vedada."},{"n":19,"enun":"O peculato culposo, no qual o funcionário público concorre culposamente para o crime de outrem, admite, quanto à reparação do dano, regra específica que extingue a punibilidade se a reparação anteceder a sentença irrecorrível.","gab":"CERTO","com":"Regra única do peculato CULPOSO (art. 312, §3º): se a reparação do dano ocorrer ANTES do trânsito em julgado da condenação, extingue-se a punibilidade; se posterior, apenas reduz a pena pela metade. É exceção ao regime geral — no peculato doloso, a reparação não tem esse efeito extintivo (vale como atenuante ou arrependimento posterior se feita até a denúncia).","fund":"LEI: Art. 312, §3º, do CP: \"No caso do parágrafo anterior [peculato culposo], a reparação do dano, se precede à sentença irrecorrível, extingue a punibilidade; se lhe é posterior, reduz de metade a pena imposta.\"\n\nArt. 312, §2º (peculato culposo): \"Se o funcionário concorre culposamente para o crime de outrem: Pena - detenção, de três meses a um ano.\" "},{"n":20,"enun":"A organização criminosa é caracterizada pela associação de 4 (quatro) ou mais pessoas estruturalmente ordenada e caracterizada pela divisão de tarefas, com o objetivo de obter vantagem mediante a prática de infrações penais cujas penas máximas sejam superiores a 4 (quatro) anos, ou que sejam de caráter transnacional.","gab":"CERTO","com":"Definição legal da ORCRIM exige 4 elementos cumulativos: (i) 4 ou mais pessoas; (ii) estrutura ordenada; (iii) divisão de tarefas, ainda que informalmente; (iv) finalidade de obter vantagem mediante prática de infrações com pena máxima superior a 4 anos OU de caráter transnacional. Não confundir com associação criminosa (art. 288 CP — 3 pessoas, sem essas exigências adicionais).","fund":"LEI: Art. 1º, §1º, da Lei 12.850/2013: \"Considera-se organização criminosa a associação de 4 (quatro) ou mais pessoas estruturalmente ordenada e caracterizada pela divisão de tarefas, ainda que informalmente, com objetivo de obter, direta ou indiretamente, vantagem de qualquer natureza, mediante a prática de infrações penais cujas penas máximas sejam superiores a 4 (quatro) anos, ou que sejam de caráter transnacional.\" "},{"n":21,"enun":"O agente que efetua disparo de arma de fogo em via pública, sem provocar lesão a terceiros, comete crime previsto no Estatuto do Desarmamento, que é hediondo independentemente da finalidade do disparo.","gab":"ERRADO","com":"O disparo de arma de fogo (art. 15 do Estatuto) NÃO é hediondo. A Lei 8.072/1990 lista, no art. 1º, parágrafo único, os crimes equiparados a hediondos do Estatuto do Desarmamento — e o disparo (art. 15) NÃO está nessa lista. São equiparados: posse/porte ilegal de arma de fogo de uso restrito (art. 16), comércio ilegal (art. 17) e tráfico internacional de arma (art. 18). Disparo (art. 15) é crime comum, não hediondo.","fund":"LEI: Art. 15 da Lei 10.826/2003 (Estatuto do Desarmamento): \"Disparar arma de fogo ou acionar munição em lugar habitado ou em suas adjacências, em via pública ou em direção a ela, desde que essa conduta não tenha como finalidade a prática de outro crime: Pena - reclusão, de 2 (dois) a 4 (quatro) anos, e multa.\"\n\nArt. 1º, parágrafo único, da Lei 8.072/1990 (rol dos crimes equiparados a hediondos do Estatuto do Desarmamento): \"Consideram-se também hediondos, tentados ou consumados: (...) II - posse ou porte ilegal de arma de fogo de uso proibido, previsto no art. 16 da Lei nº 10.826, de 22 de dezembro de 2003; III - comércio ilegal de armas de fogo, previsto no art. 17 da Lei nº 10.826, de 22 de dezembro de 2003; IV - tráfico internacional de arma de fogo, acessório ou munição, previsto no art. 18 da Lei nº 10.826, de 22 de dezembro de 2003.\"\n\nO art. 15 (disparo) NÃO consta — logo, não é hediondo.","peg":"Disparo de arma (art. 15) NÃO é hediondo. Só os arts. 16, 17 e 18 do Estatuto entram no rol equiparado. Cuidado com 'qualquer crime de arma é hediondo'."},{"n":22,"enun":"O crime de lavagem de dinheiro, após a Lei nº 12.683/2012, pode ter como infração antecedente qualquer infração penal, não estando mais restrito ao rol taxativo originalmente previsto.","gab":"CERTO","com":"A Lei 12.683/2012 (reforma da Lei de Lavagem) ABRIU o rol: qualquer infração penal (inclusive contravenção, em tese) pode ser antecedente. Antes, vigorava rol taxativo (8 hipóteses). Mudança de modelo: do 'rol fechado' para o 'rol aberto'. Analogia: antes era uma lista de chaves específicas que abriam o cofre; agora qualquer chave abre, desde que produza vantagem ilícita.","fund":"LEI: Art. 1º, caput, da Lei 9.613/1998 (com redação dada pela Lei 12.683/2012): \"Ocultar ou dissimular a natureza, origem, localização, disposição, movimentação ou propriedade de bens, direitos ou valores provenientes, direta ou indiretamente, de infração penal: Pena - reclusão, de 3 (três) a 10 (dez) anos, e multa.\"\n\nANTES (redação original de 1998): o caput exigia que os bens fossem \"provenientes, direta ou indiretamente, de crime\" listado em rol taxativo de oito incisos (tráfico, terrorismo, contrabando, extorsão, contra a administração pública, contra o sistema financeiro, contra ORCRIM, contra ordem econômica). A Lei 12.683/2012 substituiu o rol fechado pela cláusula genérica \"infração penal\"."},{"n":23,"enun":"O crime de tortura, no caso de ser praticado por agente público no exercício da função, é majorado e o sentenciado, em regra, cumpre a pena inicialmente em regime fechado.","gab":"CERTO","com":"Tortura é equiparada a hediondo (CF, art. 5º, XLIII). A condição de agente público no exercício da função é majorante específica (art. 1º, §4º, I, Lei 9.455). Política criminal: severidade máxima quando o autor é o agente do Estado (lógica de proteção dos cidadãos contra o abuso estatal).","fund":"LEI: Art. 1º, §4º, da Lei 9.455/1997: \"Aumenta-se a pena de um sexto até um terço: I - se o crime é cometido por agente público; II - se o crime é cometido contra criança, gestante, portador de deficiência, adolescente ou maior de 60 (sessenta) anos; III - se o crime é cometido mediante sequestro.\"\n\nArt. 1º, §7º: \"O condenado por crime previsto nesta Lei, salvo a hipótese do § 2º, iniciará o cumprimento da pena em regime fechado.\" "},{"n":24,"enun":"O agente que, durante a execução de roubo, mantém a vítima em seu poder, restringindo sua liberdade por tempo juridicamente relevante, responde, exclusivamente, por crime de extorsão mediante sequestro.","gab":"ERRADO","com":"Não vira extorsão mediante sequestro (art. 159 CP) — o caso é roubo com a MAJORANTE de restrição de liberdade da vítima (art. 157, §2º, V). A armadilha do item está em sugerir 'concurso de crimes' ou 'subsunção a outro tipo', mas o legislador previu a hipótese DENTRO do próprio roubo, como causa de aumento.","fund":"LEI: Art. 157, §2º, V, do CP: \"A pena aumenta-se de 1/3 (um terço) até metade: (...) V - se o agente mantém a vítima em seu poder, restringindo sua liberdade.\"\n\nDiferença com extorsão mediante sequestro (art. 159 CP): nesta, a privação de liberdade é o MEIO essencial para obter vantagem econômica como condição de resgate, é crime autônomo. No roubo com restrição (art. 157, §2º, V), a restrição é circunstância acessória ao roubo já consumado/em execução, configurando majorante e não delito autônomo.","peg":"Roubo com restrição (157, §2º, V) ≠ Extorsão mediante sequestro (159). Bancas trocam um pelo outro com frequência."}]},{"nome":"Direito Processual Penal e Legislação Especial","comando":"A respeito dos princípios do processo penal, da competência, das provas, da prisão, dos recursos e da legislação especial, conforme o CPP e a jurisprudência dominante do STF e do STJ, julgue os itens.","itens":[{"n":25,"enun":"O sistema acusatório, adotado expressamente no processo penal brasileiro pela reforma de 2019, caracteriza-se pela separação das funções de acusar, defender e julgar, vedando-se a iniciativa probatória do juiz na fase de investigação.","gab":"CERTO","com":"O Pacote Anticrime (Lei 13.964/2019) inseriu o art. 3º-A no CPP, consagrando expressamente a estrutura acusatória do processo penal brasileiro. A inovação principal: o juiz NÃO PODE mais determinar produção de provas de ofício na fase investigatória, preservando-se sua imparcialidade. Analogia: é como árbitro de futebol — ele apita o jogo, não corre atrás da bola para fazer gol.","fund":"LEI: Art. 3º-A do CPP (incluído pela Lei 13.964/2019): \"O processo penal terá estrutura acusatória, vedadas a iniciativa do juiz na fase de investigação e a substituição da atuação probatória do órgão de acusação.\"\n\nDOUTRINA: O sistema acusatório se contrapõe ao inquisitorial — separa as funções de acusar (MP), defender (acusado/defesa) e julgar (juiz). A imparcialidade do julgador é garantida pelo afastamento de sua atuação probatória inicial."},{"n":26,"enun":"O princípio do nemo tenetur se detegere assegura ao investigado e ao acusado o direito de não produzir prova contra si mesmo, abrangendo o direito ao silêncio e a recusa em participar de reconstituição do crime.","gab":"CERTO","com":"Nemo tenetur se detegere: ninguém é obrigado a produzir prova contra si mesmo. Decorre da presunção de inocência e do direito à não autoincriminação. Cobre o direito ao silêncio (não falar), recusa a participar de reconstituição, recusa a fornecer material genético sem ordem judicial e recusa ao bafômetro. Analogia: é como o direito a um advogado no filme americano — você não precisa ajudar a montar o caso contra você.","fund":"LEI: Art. 5º, LXIII, da CF/1988: \"O preso será informado de seus direitos, entre os quais o de permanecer calado, sendo-lhe assegurada a assistência da família e de advogado.\"\n\nArt. 8º, item 2, \"g\", do Pacto de São José da Costa Rica (Decreto 678/1992): \"Direito de não ser obrigada a depor contra si mesma, nem a declarar-se culpada.\"\n\nJURISPRUDÊNCIA: STF entende que o princípio abrange recusa a colaborar com reconstituição (HC 69.026, Rel. Min. Celso de Mello) e fornecimento de material genético compulsório sem lei autorizadora (HC 71.373, Pleno, Rel. Min. Marco Aurélio)."},{"n":27,"enun":"Determina a conexão a reunião dos processos para julgamento conjunto, quando duas ou mais infrações houverem sido praticadas, ao mesmo tempo, por várias pessoas reunidas, ou por várias pessoas em concurso, embora diverso o tempo e o lugar, ou por várias pessoas, umas contra as outras.","gab":"CERTO","com":"Conexão intersubjetiva por simultaneidade (art. 76, I, primeira parte): duas ou mais infrações praticadas ao mesmo tempo por várias pessoas reunidas. É a 'conexão objetiva' do briga generalizada. Reúnem-se os processos para evitar decisões contraditórias e por economia processual.","fund":"LEI: Art. 76 do CPP: \"A competência será determinada pela conexão: I - se, ocorrendo duas ou mais infrações, houverem sido praticadas, ao mesmo tempo, por várias pessoas reunidas, ou por várias pessoas em concurso, embora diverso o tempo e o lugar, ou por várias pessoas, umas contra as outras.\" "},{"n":28,"enun":"A continência caracteriza-se quando duas ou mais pessoas forem acusadas pela mesma infração, ou quando, no caso de concurso formal de crimes, houver imputação a uma só pessoa.","gab":"CERTO","com":"Continência: 'continência por cumulação subjetiva' (duas ou mais pessoas acusadas pela mesma infração) e 'continência por cumulação objetiva' (concurso formal — uma só ação produz dois ou mais crimes imputáveis a uma só pessoa). Diferente da conexão (várias infrações). Analogia: continência = um saco com várias frutas dentro; conexão = vários sacos diferentes ligados.","fund":"LEI: Art. 77 do CPP: \"A competência será determinada pela continência quando: I - duas ou mais pessoas forem acusadas pela mesma infração; II - no caso de infração cometida nas condições previstas nos arts. 51, § 1º, 53, segunda parte, e 54 do Código Penal.\" (referência aos atuais arts. 70, 73 e 74 — concurso formal, erro na execução, resultado diverso do pretendido)"},{"n":29,"enun":"Faz coisa julgada material a sentença penal condenatória que se tornou irrecorrível, impedindo nova ação penal pelo mesmo fato contra o mesmo réu, em respeito ao princípio do ne bis in idem.","gab":"CERTO","com":"Coisa julgada material em processo penal: a sentença transitada em julgado encerra definitivamente o caso, vedando nova ação penal pelo mesmo fato contra o mesmo réu. Materialização do ne bis in idem (não duas vezes pelo mesmo). Em caso de tentativa nova, cabe HC para trancamento. Analogia: é como o juiz no futebol que apita o final do jogo — não dá pra recomeçar a partida pelo mesmo motivo.","fund":"LEI: Art. 5º, XXXVI, da CF/1988: \"A lei não prejudicará o direito adquirido, o ato jurídico perfeito e a coisa julgada.\"\n\nArt. 110 do CPP: \"Nas questões de jurisdição, o juiz não pode renunciar à sua competência, nem cedê-la ao juiz cuja jurisdição seja superior.\"\n\nArt. 8º, item 4, do Pacto de São José: \"O acusado absolvido por sentença passada em julgado não poderá ser submetido a novo processo pelos mesmos fatos.\" "},{"n":30,"enun":"A ação civil ex delicto pode ser proposta no juízo cível para o ressarcimento dos danos causados pelo crime, sendo a sentença penal condenatória transitada em julgado título executivo na esfera cível.","gab":"CERTO","com":"Ação civil ex delicto: a vítima/sucessores podem buscar reparação na esfera cível pelo dano do crime. A sentença penal condenatória transitada em julgado vale como TÍTULO EXECUTIVO no cível (art. 91, I, CP + art. 63, CPP). Pode-se ainda já obter o valor mínimo de reparação na própria sentença penal (art. 387, IV, CPP — incluído pela Lei 11.719/2008).","fund":"LEI: Art. 63 do CPP: \"Transitada em julgado a sentença condenatória, poderão promover-lhe a execução, no juízo cível, para o efeito da reparação do dano, o ofendido, seu representante legal ou seus herdeiros.\"\n\nArt. 91, I, do CP: \"São efeitos da condenação: I - tornar certa a obrigação de indenizar o dano causado pelo crime.\"\n\nArt. 387, IV, do CPP: \"O juiz, ao proferir sentença condenatória: (...) IV - fixará valor mínimo para reparação dos danos causados pela infração, considerando os prejuízos sofridos pelo ofendido.\" "},{"n":31,"enun":"Situação hipotética: policiais, sem mandado e durante a noite, ingressaram em residência sob suspeita de tráfico de drogas em seu interior, vindo a apreender entorpecentes. Assertiva: segundo o STF, tal ingresso é lícito se amparado em fundadas razões, justificadas a posteriori, que indiquem situação de flagrante delito.","gab":"CERTO","com":"Tese do Tema 280: ingresso forçado em domicílio sem mandado, mesmo à noite, só é lícito quando há FUNDADAS RAZÕES, justificadas a posteriori, de que dentro da casa ocorre situação de flagrante. Não basta denúncia anônima isolada. Sem isso → nulidade da prova e responsabilização do agente. Analogia: é como entrar em um carro alheio sem chave — só pode se houver fogo dentro (evidência forte de emergência).","fund":"LEI: Art. 5º, XI, da CF/1988: \"A casa é asilo inviolável do indivíduo, ninguém nela podendo penetrar sem consentimento do morador, salvo em caso de flagrante delito ou desastre, ou para prestar socorro, ou, durante o dia, por determinação judicial.\"\n\nJURISPRUDÊNCIA: STF, RE 603.616/RO, Rel. Min. Gilmar Mendes, Tribunal Pleno, j. 05/11/2015, DJe 10/05/2016 (Tema 280, RG) — tese fixada: \"A entrada forçada em domicílio sem mandado judicial só é lícita, mesmo em período noturno, quando amparada em fundadas razões, devidamente justificadas a posteriori, que indiquem que dentro da casa ocorre situação de flagrante delito, sob pena de responsabilidade disciplinar, civil e penal do agente ou da autoridade, e de nulidade dos atos praticados.\" ","peg":"Não basta denúncia anônima isolada. Exige-se elementos prévios objetivos de flagrante em curso; a posteriori o agente JUSTIFICA por escrito."},{"n":32,"enun":"A Lei nº 13.431/2017 (Lei Henry Borel) estabelece o sistema de garantia de direitos da criança e do adolescente vítima ou testemunha de violência, prevendo a escuta especializada e o depoimento especial como mecanismos para evitar a revitimização.","gab":"CERTO","com":"A Lei 13.431/2017 (sistema de garantia de direitos da criança e do adolescente vítima ou testemunha de violência) trouxe dois institutos: (i) escuta especializada — quando a criança procura serviços de proteção e narra os fatos para profissional capacitado; (ii) depoimento especial — quando a criança presta declarações em sede judicial/policial, em sala adequada, com profissional especializado, sem revitimização. A Lei 14.344/2022 (Lei Henry Borel) reforça a proteção em violência doméstica/familiar contra criança e adolescente.","fund":"LEI: Art. 7º da Lei 13.431/2017: \"Escuta especializada é o procedimento de entrevista sobre situação de violência com criança ou adolescente perante órgão da rede de proteção, limitado o relato estritamente ao necessário para o cumprimento de sua finalidade.\"\n\nArt. 8º: \"Depoimento especial é o procedimento de oitiva de criança ou adolescente vítima ou testemunha de violência perante autoridade policial ou judiciária.\"\n\nArt. 1º da Lei 14.344/2022: \"Esta Lei cria mecanismos para a prevenção e o enfrentamento da violência doméstica e familiar contra a criança e o adolescente, nos termos do § 8º do art. 226 e do § 4º do art. 227 da Constituição Federal, da Convenção sobre os Direitos da Criança (...).\" ","peg":"Cuidado: a Lei 13.431/2017 trata da CRIANÇA/ADOLESCENTE; a Lei 14.344/2022 (Lei Henry Borel) trata especificamente da VIOLÊNCIA DOMÉSTICA contra criança/adolescente."},{"n":33,"enun":"A Lei nº 9.807/1999 dispõe sobre a proteção a vítimas e testemunhas ameaçadas, prevendo medidas como a inclusão em programa de proteção e, em casos excepcionais, alteração do nome do beneficiário.","gab":"CERTO","com":"A Lei 9.807/1999 institui o Programa Federal de Assistência a Vítimas e a Testemunhas Ameaçadas, prevê medidas como segurança na residência, escolta para deslocamentos, transferência de residência, ajuda financeira mensal, suspensão temporária das atividades profissionais e, em caráter excepcional, ALTERAÇÃO DE NOME do beneficiário e dependentes (art. 9º). Mecanismo de proteção forte para incentivar colaboração e proteger denunciantes em casos graves.","fund":"LEI: Art. 7º da Lei 9.807/1999: \"Os programas compreendem, dentre outras, as seguintes medidas, aplicáveis isolada ou cumulativamente em benefício da pessoa protegida, segundo a gravidade e as circunstâncias de cada caso: I - segurança na residência, incluindo o controle de telecomunicações; II - escolta e segurança nos deslocamentos da residência, inclusive para fins de trabalho ou para a prestação de depoimentos; III - transferência de residência ou acomodação provisória em local compatível com a proteção; IV - preservação da identidade, imagem e dados pessoais; V - ajuda financeira mensal (...).\"\n\nArt. 9º: \"Em casos excepcionais e considerando as características e a gravidade da coação ou ameaça, poderá o conselho deliberativo encaminhar requerimento da pessoa protegida ao juiz competente para registros públicos objetivando a alteração de nome completo.\" "},{"n":34,"enun":"O reconhecimento de pessoas, segundo entendimento dominante do STJ, deve observar obrigatoriamente as formalidades do art. 226 do CPP, sob pena de invalidade do ato, não bastando, isoladamente, para sustentar a condenação.","gab":"CERTO","com":"Marco da virada jurisprudencial: STJ, no HC 598.886/SC (Rel. Min. Schietti, 6ª T., 2020), abandonou a tese de 'mera recomendação' do art. 226 e passou a exigir o procedimento como GARANTIA MÍNIMA. Sem observância, reconhecimento é prova INVÁLIDA, especialmente quando único elemento condenatório. Analogia: é como check-list de aeronave antes de decolar — pular itens compromete a segurança do julgamento.","fund":"LEI: Art. 226 do CPP: \"Quando houver necessidade de fazer-se o reconhecimento de pessoa, proceder-se-á pela seguinte forma: I - a pessoa que tiver de fazer o reconhecimento será convidada a descrever a pessoa que deva ser reconhecida; II - a pessoa, cujo reconhecimento se pretender, será colocada, se possível, ao lado de outras que com ela tiverem qualquer semelhança, convidando-se quem tiver de fazer o reconhecimento a apontá-la; III - se houver razão para recear que a pessoa chamada para o reconhecimento, por efeito de intimidação ou outra influência, não diga a verdade em face da pessoa que deve ser reconhecida, a autoridade providenciará para que esta não veja aquela; IV - do ato de reconhecimento lavrar-se-á auto pormenorizado, subscrito pela autoridade, pela pessoa chamada para proceder ao reconhecimento e por duas testemunhas presenciais.\"\n\nJURISPRUDÊNCIA: STJ, HC 598.886/SC, Rel. Min. Rogerio Schietti Cruz, 6ª Turma, j. 27/10/2020, DJe 18/12/2020 — tese fixada: \"O reconhecimento de pessoa, presencialmente ou por fotografia, realizado na fase do inquérito policial, apenas é apto, para identificar o réu e fixar a autoria delitiva, quando observadas as formalidades previstas no art. 226 do Código de Processo Penal e quando corroborado por outras provas colhidas na fase judicial, sob o crivo do contraditório e da ampla defesa.\" ","peg":"STJ supera tese antiga ('mera recomendação'). Hoje: formalidades do art. 226 = garantia mínima, sob pena de invalidade."},{"n":35,"enun":"A prisão preventiva, após o pacote anticrime, somente pode ser decretada mediante requerimento do Ministério Público, do querelante ou assistente, ou por representação da autoridade policial, vedada a iniciativa do juiz.","gab":"CERTO","com":"Pacote Anticrime (Lei 13.964/2019) reforçou o sistema acusatório: prisão preventiva NÃO pode mais ser decretada de ofício pelo juiz. Exige-se requerimento do MP, do querelante ou assistente, ou representação da autoridade policial. Trava processual contra a juiz inquisidor.","fund":"LEI: Art. 311 do CPP (redação Lei 13.964/2019): \"Em qualquer fase da investigação policial ou do processo penal, caberá a prisão preventiva decretada pelo juiz, a requerimento do Ministério Público, do querelante ou do assistente, ou por representação da autoridade policial.\"\n\nANTES da Lei 13.964/2019, o art. 311 permitia decretação \"de ofício\" pelo juiz na fase processual — possibilidade hoje vedada.","peg":"Antes do Anticrime, o juiz podia decretar preventiva de ofício no curso da ação. Hoje, NÃO PODE em hipótese alguma — fase investigatória ou processual."},{"n":36,"enun":"Situação hipotética: o juiz, no curso da ação penal, conduziu interrogatório do réu antes da oitiva das testemunhas, em violação ao rito ordinário. Assertiva: tal inversão, embora irregular, somente conduzirá à nulidade se houver demonstração de prejuízo concreto à defesa.","gab":"CERTO","com":"Princípio do prejuízo (art. 563 CPP): 'pas de nullité sans grief' — não há nulidade sem prejuízo. A inversão da ordem de oitiva, embora irregular, só gera nulidade se causar prejuízo concreto à defesa. Analogia: é como receber um produto em embalagem trocada — se chegou inteiro e funcionando, não tem dano que justifique devolver.","fund":"LEI: Art. 563 do CPP: \"Nenhum ato será declarado nulo, se da nulidade não resultar prejuízo para a acusação ou para a defesa.\"\n\nArt. 400 do CPP (procedimento ordinário): \"Na audiência de instrução e julgamento, a ser realizada no prazo máximo de 60 (sessenta) dias, proceder-se-á à tomada de declarações do ofendido, à inquirição das testemunhas arroladas pela acusação e pela defesa, nesta ordem, ressalvado o disposto no art. 222 deste Código, bem como aos esclarecimentos dos peritos, às acareações e ao reconhecimento de pessoas e coisas, interrogando-se, em seguida, o acusado.\"\n\nJURISPRUDÊNCIA: STJ e STF têm aplicado consistentemente o princípio do prejuízo (pas de nullité sans grief) nas alegações de nulidade processual, exigindo demonstração concreta do dano."},{"n":37,"enun":"O habeas corpus pode ser impetrado por qualquer pessoa, em favor próprio ou de terceiro, bem como pelo Ministério Público, sendo seu cabimento condicionado à existência de coação ou ameaça à liberdade de locomoção decorrente de ilegalidade ou abuso de poder.","gab":"CERTO","com":"Habeas corpus: instrumento de tutela da liberdade ambulatória. Pode ser impetrado por QUALQUER PESSOA (até analfabeto, sem advogado), em favor próprio ou de terceiro. O MP também tem legitimidade. Cabimento: coação ou ameaça à liberdade de locomoção, por ilegalidade ou abuso de poder. Analogia: é o '911' processual da liberdade — qualquer um pode acionar.","fund":"LEI: Art. 5º, LXVIII, da CF/1988: \"Conceder-se-á habeas corpus sempre que alguém sofrer ou se achar ameaçado de sofrer violência ou coação em sua liberdade de locomoção, por ilegalidade ou abuso de poder.\"\n\nArt. 654 do CPP: \"O habeas corpus poderá ser impetrado por qualquer pessoa, em seu favor ou de outrem, bem como pelo Ministério Público.\" "},{"n":38,"enun":"A revisão criminal é cabível, em favor do condenado, em qualquer tempo, antes ou após a extinção da pena, mas somente pode ser proposta após o trânsito em julgado da sentença condenatória.","gab":"CERTO","com":"Revisão criminal: ação autônoma de impugnação que pode ser proposta a qualquer tempo (mesmo após a extinção da pena ou morte do condenado, em favor da memória), MAS exige o trânsito em julgado da condenação como pressuposto. Não é instrumento ordinário; cabível só nas hipóteses do art. 621 (sentença contrária ao texto da lei, condenação fundada em prova falsa ou descoberta de novas provas).","fund":"LEI: Art. 621 do CPP: \"A revisão dos processos findos será admitida: I - quando a sentença condenatória for contrária ao texto expresso da lei penal ou à evidência dos autos; II - quando a sentença condenatória se fundar em depoimentos, exames ou documentos comprovadamente falsos; III - quando, após a sentença, se descobrirem novas provas de inocência do condenado ou de circunstância que determine ou autorize diminuição especial da pena.\"\n\nArt. 622 do CPP: \"A revisão poderá ser requerida em qualquer tempo, antes da extinção da pena ou após. Parágrafo único - Não será admissível a reiteração do pedido, salvo se fundado em novas provas.\" ","peg":"Trânsito em julgado é PRESSUPOSTO. Cabível antes ou depois da extinção da pena, mas nunca antes do trânsito."},{"n":39,"enun":"O ônus da prova, no processo penal, recai integralmente sobre a acusação quanto aos fatos constitutivos do direito de punir, ao passo que ao acusado incumbe demonstrar excludentes de ilicitude ou de culpabilidade quando alegadas.","gab":"CERTO","com":"No processo penal, vigora a presunção de inocência: o ônus da prova quanto aos fatos constitutivos do direito de punir (autoria, materialidade, dolo/culpa) é INTEGRAL da acusação. Ao acusado cabe apenas o ônus de demonstrar excludentes (ilicitude ou culpabilidade) quando alegadas. In dubio pro reo na dúvida quanto à culpa. Analogia: é o oposto do cível — quem afirma prova, e o réu não precisa provar que NÃO fez.","fund":"LEI: Art. 156 do CPP: \"A prova da alegação incumbirá a quem a fizer, sendo, porém, facultado ao juiz de ofício: I - ordenar, mesmo antes de iniciada a ação penal, a produção antecipada de provas consideradas urgentes e relevantes, observando a necessidade, adequação e proporcionalidade da medida; II - determinar, no curso da instrução, ou antes de proferir sentença, a realização de diligências para dirimir dúvida sobre ponto relevante.\"\n\nArt. 5º, LVII, da CF/1988: \"Ninguém será considerado culpado até o trânsito em julgado de sentença penal condenatória.\" ","peg":"Cuidado: o ônus quanto ao FATO (autoria/materialidade) é da acusação; quanto às EXCLUDENTES (legítima defesa, etc.), do acusado, na proporção que basta para gerar dúvida razoável."},{"n":40,"enun":"Situação hipotética: em abordagem policial sem mandado, a busca pessoal foi motivada apenas pela aparência do indivíduo e, somente após iniciada, o agente encontrou material ilícito. Assertiva: para o STJ, a fundada suspeita exige elementos objetivos prévios à diligência, não bastando a descoberta posterior do ilícito para legitimar a busca já iniciada sem justa causa.","gab":"CERTO","com":"Tese do RHC 158.580/BA: a 'fundada suspeita' (art. 244 CPP) é REQUISITO PRÉVIO da busca pessoal, baseada em juízo de probabilidade objetivo. Alegação vaga de 'atitude suspeita' ou de 'aparência suspeita' NÃO basta. Encontrar drogas depois não convalida a busca ilegal. Analogia: é como pedir a alguém para abrir a mala sem motivo — encontrar contrabando depois não legitima a abordagem.","fund":"LEI: Art. 244 do CPP: \"A busca pessoal independerá de mandado, no caso de prisão ou quando houver fundada suspeita de que a pessoa esteja na posse de arma proibida ou de objetos ou papéis que constituam corpo de delito, ou quando a medida for determinada no curso de busca domiciliar.\"\n\nJURISPRUDÊNCIA: STJ, RHC 158.580/BA, Rel. Min. Rogerio Schietti Cruz, 6ª Turma, j. 19/04/2022, DJe 25/04/2022 (Informativo 735) — tese fixada: \"Exige-se, em termos de standard probatório para busca pessoal ou veicular sem mandado judicial, a existência de fundada suspeita (justa causa) – baseada em um juízo de probabilidade, descrita com a maior precisão possí
