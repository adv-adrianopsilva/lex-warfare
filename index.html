<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PCDF · Delegado 2026</title>
<!-- PWA -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0a0b14">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PCDF">
<link rel="apple-touch-icon" href="/icons/icon-180.png">
<link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png">
<link rel="apple-touch-icon" sizes="167x167" href="/icons/icon-167.png">
<link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180.png">
<link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png">
<style>
/* ── TOKENS ──────────────────────────────────────────────── */
:root{
  --bg:#0a0b0e; --surf:#12141a; --surf2:#181b24; --surf3:#1e2230;
  --bord:#252a3a; --bord2:#2e3448;
  --txt:#e4e8f4; --txt2:#7a8399; --txt3:#3d4562;
  --acc:#e8a020; --acc-dim:rgba(232,160,32,.13); --acc-glow:rgba(232,160,32,.28); --acc-bord:rgba(232,160,32,.32); --acc-bg:#1c1206;
  --green:#28c76f; --green-bg:rgba(40,199,111,.1); --green-bord:rgba(40,199,111,.3);
  --red:#f05252; --red-bg:rgba(240,82,82,.1); --red-bord:rgba(240,82,82,.3);
  --amber:#f59e0b; --amber-bg:rgba(245,158,11,.1); --amber-bord:rgba(245,158,11,.3);
  --mono:"SF Mono","Fira Code",monospace;
  --r:12px; --r-sm:8px; --r-xs:5px;
  --trans:140ms cubic-bezier(.4,0,.2,1);
  --shadow:0 2px 14px rgba(0,0,0,.5); --shadow-lg:0 4px 28px rgba(0,0,0,.65);
}
[data-theme=light]{
  --bg:#f1f3f8; --surf:#fff; --surf2:#f5f7fc; --surf3:#eef0f8;
  --bord:#dde2ef; --bord2:#cdd3e6;
  --txt:#0e1121; --txt2:#5a6380; --txt3:#9ea8c0;
  --acc:#c47c0a; --acc-dim:rgba(196,124,10,.08); --acc-glow:rgba(196,124,10,.2); --acc-bord:rgba(196,124,10,.28); --acc-bg:#fdf6e8;
  --green:#16a34a; --green-bg:rgba(22,163,74,.08); --green-bord:rgba(22,163,74,.28);
  --red:#dc2626; --red-bg:rgba(220,38,38,.08); --red-bord:rgba(220,38,38,.28);
  --amber:#d97706; --amber-bg:rgba(217,119,6,.08); --amber-bord:rgba(217,119,6,.28);
  --shadow:0 2px 8px rgba(0,0,0,.1); --shadow-lg:0 4px 16px rgba(0,0,0,.15);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;font-size:15px;line-height:1.6;transition:background var(--trans),color var(--trans)}
button{font-family:inherit;cursor:pointer}

/* ── HEADER ──────────────────────────────────────────────── */
.hdr{position:sticky;top:0;z-index:100;background:var(--surf);border-bottom:1px solid var(--bord);box-shadow:var(--shadow)}
.hdr-inner{max-width:860px;margin:0 auto;display:flex;align-items:center;gap:10px;height:62px;padding:0 18px}
.hdr-brand{display:flex;align-items:center;gap:11px;flex:1;min-width:0}
.delta-badge{width:42px;height:42px;border-radius:10px;background:var(--acc);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:#0a0b0e;flex-shrink:0;letter-spacing:-.02em;box-shadow:0 2px 10px var(--acc-glow)}
.hdr-name{font-weight:800;font-size:16.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.01em}
.hdr-date{font-size:12px;color:var(--txt2);margin-top:1px}
.hdr-chips{display:flex;gap:5px;align-items:center;flex-shrink:0}
.chip{border-radius:6px;padding:2px 9px;font-size:12px;font-weight:700}
.chip.g{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bord)}
.chip.r{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bord)}
.chip.n{background:var(--surf2);color:var(--txt2);border:1px solid var(--bord)}
.chip.t{background:var(--acc-dim);color:var(--acc);border:1px solid var(--acc-bord)}
.hdr-timer-wrap{display:flex;align-items:center;gap:6px;flex-shrink:0;background:var(--surf2);border:1px solid var(--bord);border-radius:8px;padding:5px 10px}
.hdr-timer-wrap.hidden{display:none!important}
.hdr-timer-wrap svg.clock-ic{width:17px;height:17px;color:var(--acc);flex-shrink:0}
.hdr-timer-txt{font-size:15px;font-weight:700;color:var(--txt);font-variant-numeric:tabular-nums;min-width:38px}
#btn-pause{background:transparent;border:none;cursor:pointer;padding:0 2px;font-size:14px;color:var(--txt2);line-height:1;transition:color var(--trans)}
#btn-pause:hover{color:var(--acc)}
#btn-pause.paused{color:var(--acc)}
/* Overlay de pausa */
#pause-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.72);backdrop-filter:blur(6px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px}
#pause-overlay.hidden{display:none!important}
.pause-card{background:var(--surf1);border:1px solid var(--bord);border-radius:16px;padding:40px 56px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:14px}
.pause-icon{font-size:48px;line-height:1}
.pause-title{font-size:22px;font-weight:700;color:var(--txt)}
.pause-sub{font-size:14px;color:var(--txt2)}
.pause-resume{background:var(--acc);color:#000;border:none;border-radius:10px;padding:13px 36px;font-size:16px;font-weight:700;cursor:pointer;transition:opacity var(--trans)}
.pause-resume:hover{opacity:.85}
.hdr-actions{display:flex;gap:3px;flex-shrink:0}
.icon-btn{background:var(--surf2);border:1px solid var(--bord);color:var(--txt2);border-radius:7px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all var(--trans)}
.icon-btn:hover{background:var(--acc-dim);border-color:var(--acc-bord);color:var(--acc)}
.prog-rail{height:2px;background:var(--surf3)}
.prog-fill{height:2px;background:var(--acc);transition:width .4s}

/* ── COVER ───────────────────────────────────────────────── */
.cover{max-width:580px;margin:0 auto;padding:48px 18px 80px;text-align:center;animation:fadeIn .4s ease}
.cover-kicker{font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--acc);font-weight:700;margin-bottom:16px}
.cover h1{font-size:clamp(32px,5vw,48px);font-weight:800;font-style:italic;margin-bottom:14px;line-height:1.1}
.cover-lead{font-size:16px;color:var(--txt2);margin-bottom:32px;line-height:1.5}
.cover-card{background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);padding:24px;text-align:left;box-shadow:var(--shadow)}
.meta-grid{display:grid;grid-template-columns:auto 1fr;gap:7px 18px;font-size:13.5px;margin-bottom:18px}
.meta-grid dt{color:var(--txt3);font-size:11px;letter-spacing:.08em;text-transform:uppercase;align-self:center}
.meta-grid dd{color:var(--txt);margin:0;font-weight:500}
.cover-note{font-size:13.5px;color:var(--txt2);font-style:italic;padding:12px 14px;background:var(--surf2);border-left:3px solid var(--acc-bord);border-radius:0 var(--r-xs) var(--r-xs) 0;margin-bottom:22px;line-height:1.5}
.cover-actions{display:flex;flex-direction:column;gap:10px}
.cover-countdown{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:18px;flex-wrap:wrap}
.ccd-box{text-align:center;background:var(--surf2);border:1px solid var(--bord2);border-radius:var(--r-sm);padding:10px 16px;min-width:62px}
.ccd-num{font-size:28px;font-weight:900;font-style:italic;line-height:1;color:var(--acc)}
.ccd-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--txt3);margin-top:2px}
.ccd-sep{font-size:22px;font-weight:900;color:var(--bord2);margin-bottom:12px}
.sr-due-nudge{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--red-bg);border:1px solid var(--red-bord);border-radius:var(--r-sm);font-size:13px;color:var(--red);margin-bottom:14px;cursor:pointer;transition:background .15s}
.sr-due-nudge:hover{background:rgba(240,82,82,.18)}
.btn-primary{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 28px;background:var(--acc);color:#0a0b0e;border:none;border-radius:var(--r-sm);font-weight:800;font-size:15px;letter-spacing:.02em;transition:all var(--trans);box-shadow:0 4px 16px var(--acc-glow)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px var(--acc-glow)}
.btn-ghost{background:var(--surf2);border:1px solid var(--bord);color:var(--txt2);padding:10px 20px;border-radius:var(--r-sm);font-size:14px;transition:all var(--trans)}
.btn-ghost:hover{border-color:var(--bord2);color:var(--txt)}

/* ── PROVA TOOLBAR ───────────────────────────────────────── */
.tb{position:sticky;top:54px;z-index:90;background:var(--surf);border-bottom:1px solid var(--bord);backdrop-filter:blur(8px)}
.tb-inner{max-width:860px;margin:0 auto;display:flex;align-items:center;gap:8px;padding:8px 18px;flex-wrap:wrap}
.tb-info{font-size:13px;color:var(--txt2);font-variant-numeric:tabular-nums}
.tb-info b{color:var(--txt)}
.tb-spacer{flex:1}
.tb-btn{background:var(--surf2);border:1px solid var(--bord);border-radius:var(--r-sm);padding:6px 13px;font-size:12.5px;color:var(--txt);transition:all var(--trans);display:inline-flex;align-items:center;gap:6px}
.tb-btn:hover{border-color:var(--bord2);background:var(--surf3)}
.tb-btn.danger{border-color:var(--acc-bord);color:var(--acc);background:var(--acc-dim)}
.tb-btn.danger:hover{background:var(--acc-bg)}
.tb-btn svg{width:12px;height:12px}

/* ── PROVA CONTENT ───────────────────────────────────────── */
#prova-wrap{max-width:860px;margin:0 auto;padding:24px 18px 100px}

/* Discipline header */
.disc-section{margin-bottom:48px}
.disc-hdr{text-align:left;margin:40px 0 16px;background:var(--surf);border-top:3px solid var(--acc);border-bottom:1px solid var(--bord);padding:13px 0 11px;position:relative}
.disc-hdr h3{font-weight:800;font-size:20px;letter-spacing:-.01em;text-transform:none;color:var(--txt);display:flex;align-items:center;gap:10px}

.comando{background:var(--surf2);border:1px solid var(--bord);border-radius:var(--r-sm);padding:12px 16px;font-size:14px;color:var(--txt2);margin-bottom:16px;font-style:italic;line-height:1.5}

/* Question block */
.q-block{border-top:1px solid var(--bord);padding:16px 0;scroll-margin-top:100px}
.q-block:first-of-type{border-top:none;padding-top:4px}
.q-line{display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:start}
.q-tag{display:inline-flex;align-items:center;gap:6px;font-weight:800;font-size:13px;color:var(--acc);flex-shrink:0;padding-top:2px;white-space:nowrap}
.q-tag::before{content:'';width:8px;height:12px;background:var(--acc);clip-path:polygon(0 0,80% 0,100% 50%,80% 100%,0 100%);display:inline-block}
.q-text{font-size:15.5px;line-height:1.65;color:var(--txt)}
.q-text .situacao{display:block;font-style:italic;color:var(--txt2);margin-bottom:8px;padding-left:12px;border-left:2px solid var(--bord2)}
.q-marks{display:flex;gap:6px;flex-shrink:0;padding-top:1px}
.q-mark{width:40px;height:40px;border:1.5px solid var(--bord);border-radius:var(--r-sm);background:var(--surf2);font-weight:800;font-size:14px;color:var(--txt2);display:inline-flex;align-items:center;justify-content:center;transition:all var(--trans)}
.q-mark:hover:not(:disabled){border-color:var(--txt2);color:var(--txt);transform:translateY(-1px)}
.q-mark.sel-c{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.q-mark.sel-e{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.q-mark:disabled{opacity:.5;cursor:default}
/* After gabarito shown, ring correct/wrong */
.q-block.gab-on .q-mark.sel-c.is-right,.q-block.gab-on .q-mark.sel-e.is-right{box-shadow:0 0 0 2px var(--green-bg),0 0 0 3px var(--green)}
.q-block.gab-on .q-mark.sel-c.is-wrong,.q-block.gab-on .q-mark.sel-e.is-wrong{box-shadow:0 0 0 2px var(--red-bg),0 0 0 3px var(--red)}

.q-actions-row{margin-top:10px;padding-left:92px;display:flex;align-items:center;gap:10px}
.q-show-gab{background:transparent;border:1px dashed var(--bord2);border-radius:var(--r-xs);padding:3px 11px;font-size:12px;color:var(--txt3);transition:all var(--trans)}
.q-show-gab:hover{border-style:solid;border-color:var(--acc-bord);color:var(--acc)}
.q-status{font-size:11.5px;color:var(--txt3)}
.q-status .ok{color:var(--green);font-weight:600}
.q-status .er{color:var(--red);font-weight:600}

/* Feedback */
.q-feedback{margin-top:14px;border-radius:var(--r-sm);overflow:hidden;border:1px solid var(--bord);animation:fadeUp .2s ease}
.gab-line{display:flex;align-items:center;gap:8px;padding:9px 14px;background:var(--surf2);border-bottom:1px solid var(--bord);font-size:13px;font-weight:700}
.gab-label{color:var(--txt3);font-size:10px;letter-spacing:.1em;text-transform:uppercase;font-weight:600}
.gab-value{color:var(--txt)}
.gab-badge{margin-left:auto;font-size:11.5px;padding:2px 10px;border-radius:99px;font-weight:700}
.gab-badge.ok{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bord)}
.gab-badge.er{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bord)}
.gab-badge.bk{background:var(--surf3);color:var(--txt3);border:1px solid var(--bord)}

.gab-section{border-top:1px solid var(--bord);background:var(--surf)}
.gab-hdr{display:flex;align-items:center;gap:8px;padding:9px 14px;cursor:pointer;font-size:13px;font-weight:600;background:var(--surf2);border:none;width:100%;text-align:left;color:var(--txt);transition:background var(--trans)}
.gab-hdr:hover{background:var(--surf3)}
.gab-icon{flex-shrink:0}
.gab-lbl{flex:1}
.gab-chev{font-size:11px;color:var(--txt3);transition:transform var(--trans)}
.gab-chev.open{transform:rotate(180deg)}
.gab-body{padding:12px 14px;font-size:14px;line-height:1.7;color:var(--txt2)}
.gab-body.hidden{display:none}
.feynman-text{color:var(--txt);font-size:14.5px;line-height:1.75}
.law-block{font-family:var(--mono);font-size:12px;background:var(--surf2);border:1px solid var(--bord);border-radius:var(--r-xs);padding:11px 13px;white-space:pre-wrap;line-height:1.65;color:var(--txt)}
.copy-btn{display:inline-flex;align-items:center;gap:5px;margin-top:8px;font-size:11.5px;padding:4px 12px;border-radius:5px;border:1px solid var(--bord2);background:var(--surf3);color:var(--txt3);cursor:pointer;transition:all var(--trans);font-family:inherit}
.copy-btn:hover{color:var(--acc);border-color:var(--acc-bord);background:var(--acc-dim)}
.peg-box{display:flex;gap:8px;align-items:flex-start;background:var(--amber-bg);border:1px solid var(--amber-bord);border-radius:var(--r-xs);padding:10px 13px;font-size:13px;color:var(--amber);line-height:1.55}

/* ── TRAP WORDS (Releitura Crítica) ──────────────────────── */
.trap-word{font-weight:800;color:var(--acc);background:var(--acc-dim);border-bottom:2px solid var(--acc);padding:0 3px;border-radius:3px}
.releitura-body{font-size:14.5px;line-height:1.8;color:var(--txt);margin-bottom:10px}
.releitura-body .situacao{display:block;font-style:italic;color:var(--txt2);margin-bottom:8px;padding-left:12px;border-left:2px solid var(--bord2)}
.trap-legend{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--txt3);margin-top:6px;flex-wrap:wrap}
.trap-legend .trap-word{font-size:11.5px;cursor:default}
.trap-found{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;color:var(--acc);font-weight:700}

/* ── AUTOAVALIAÇÃO ────────────────────────────────────────── */
.avaliacao-row{padding:11px 14px;background:var(--surf2);border-top:1px solid var(--bord);display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.avaliacao-lbl{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--txt3);font-weight:600;width:100%;margin-bottom:2px}
.av-btn{border-radius:99px;padding:5px 13px;font-size:12.5px;font-weight:700;border:1.5px solid;cursor:pointer;font-family:inherit;transition:all var(--trans);background:transparent}
.av-btn.dom{border-color:var(--green-bord);color:var(--green)}
.av-btn.dom:hover,.av-btn.dom.sel{background:var(--green-bg);box-shadow:0 0 0 2px var(--green-bord)}
.av-btn.dvd{border-color:var(--amber-bord);color:var(--amber)}
.av-btn.dvd:hover,.av-btn.dvd.sel{background:var(--amber-bg);box-shadow:0 0 0 2px var(--amber-bord)}
.av-btn.lac{border-color:var(--red-bord);color:var(--red)}
.av-btn.lac:hover,.av-btn.lac.sel{background:var(--red-bg);box-shadow:0 0 0 2px var(--red-bord)}
.av-btn.leit{border-color:var(--bord2);color:var(--txt2)}
.av-btn.leit:hover,.av-btn.leit.sel{background:var(--surf3);color:var(--txt);box-shadow:0 0 0 2px var(--bord2)}
.av-set{display:flex;align-items:center;gap:8px;padding:9px 14px;background:var(--surf2);border-top:1px solid var(--bord);font-size:13px}
.av-chip{border-radius:99px;padding:3px 12px;font-size:12px;font-weight:700;border:1.5px solid}
.av-chip.dom{background:var(--green-bg);color:var(--green);border-color:var(--green-bord)}
.av-chip.dvd{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-bord)}
.av-chip.lac{background:var(--red-bg);color:var(--red);border-color:var(--red-bord)}
.av-chip.leit{background:var(--surf3);color:var(--txt2);border-color:var(--bord2)}
.av-change{margin-left:auto;background:transparent;border:1px dashed var(--bord2);border-radius:var(--r-xs);padding:2px 9px;font-size:11.5px;color:var(--txt3);cursor:pointer;font-family:inherit;transition:all var(--trans)}
.av-change:hover{color:var(--acc);border-color:var(--acc-bord)}

/* ── DIAGNÓSTICO (Placar) ─────────────────────────────────── */
.diag-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--bord);border:1px solid var(--bord);border-radius:10px;overflow:hidden;margin-bottom:14px}
@media(max-width:600px){.diag-grid{grid-template-columns:repeat(2,1fr)}}
.diag-cell{background:var(--surf2);padding:14px 10px;text-align:center}
.diag-cell .dn{font-size:26px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums}
.diag-cell .dl{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--txt3);margin-top:5px;font-weight:600;line-height:1.3}
.diag-empty{color:var(--txt3);font-size:14px;font-style:italic;padding:12px 0}

/* ── REVISÃO ──────────────────────────────────────────────── */
#rev-wrap{max-width:860px;margin:0 auto;padding:0 0 100px}
.rev-picker{max-width:580px;margin:0 auto;padding:36px 18px 60px;animation:fadeIn .3s ease}
.rev-picker h2{font-size:clamp(22px,4vw,32px);font-weight:800;font-style:italic;margin-bottom:6px}
.rev-picker .sub{font-size:15px;color:var(--txt2);margin-bottom:28px;line-height:1.5}
.filter-sec-lbl{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--txt3);font-weight:700;margin:22px 0 10px}
.filter-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
@media(max-width:480px){.filter-grid{grid-template-columns:1fr}}
.filter-card{background:var(--surf);border:1.5px solid var(--bord);border-radius:var(--r);padding:15px 16px;text-align:left;cursor:pointer;transition:all var(--trans);font-family:inherit;display:flex;flex-direction:column;gap:3px}
.filter-card:hover:not(:disabled){border-color:var(--acc-bord);background:var(--acc-dim)}
.filter-card.sel{border-color:var(--acc);background:var(--acc-dim);box-shadow:0 0 0 1.5px var(--acc)}
.filter-card:disabled{opacity:.35;cursor:not-allowed;pointer-events:none}
.fc-icon{font-size:20px}
.fc-count{font-size:28px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums}
.fc-count.cr{color:var(--red)}.fc-count.ca{color:var(--amber)}.fc-count.cg{color:var(--green)}.fc-count.ct{color:var(--txt)}
.fc-label{font-size:12px;color:var(--txt2);font-weight:600}
.disc-filter-row{display:flex;flex-wrap:wrap;gap:7px}
.disc-btn{background:var(--surf2);border:1.5px solid var(--bord);border-radius:99px;padding:5px 14px;font-size:13px;font-family:inherit;color:var(--txt2);cursor:pointer;transition:all var(--trans);font-weight:500}
.disc-btn:hover{border-color:var(--acc-bord);color:var(--acc)}
.disc-btn.sel{border-color:var(--acc);color:var(--acc);background:var(--acc-dim)}
.mode-box{background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);overflow:hidden;margin-bottom:24px}
.mode-tabs{display:grid;grid-template-columns:1fr 1fr}
.mode-tab{border:none;background:var(--surf2);color:var(--txt2);font-size:14px;font-weight:700;padding:12px 8px;cursor:pointer;font-family:inherit;border-bottom:2px solid transparent;transition:all var(--trans);display:flex;align-items:center;justify-content:center;gap:6px}
.mode-tab:first-child{border-right:1px solid var(--bord)}
.mode-tab.active{background:var(--surf);color:var(--acc);border-bottom-color:var(--acc)}
.mode-desc-txt{font-size:13px;color:var(--txt2);padding:11px 14px;line-height:1.55;border-top:1px solid var(--bord)}
.rev-tb{position:sticky;top:54px;z-index:90;background:var(--surf);border-bottom:1px solid var(--bord)}
.rev-tb-inner{max-width:860px;margin:0 auto;display:flex;align-items:center;gap:8px;padding:7px 18px;flex-wrap:wrap}
.rev-badge{background:var(--acc-dim);border:1px solid var(--acc-bord);color:var(--acc);border-radius:99px;padding:3px 12px;font-size:12px;font-weight:700;flex-shrink:0}
.rev-orig{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;padding:2px 9px;border-radius:99px;font-weight:600;flex-shrink:0}
.rev-orig.ok{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bord)}
.rev-orig.er{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bord)}
.rev-orig.bk{background:var(--surf3);color:var(--txt3);border:1px solid var(--bord)}
.rev-placar-wrap{max-width:580px;margin:0 auto;padding:32px 18px 100px;animation:fadeUp .4s ease}

/* ── ESPAÇAMENTO INTELIGENTE ──────────────────────────────── */
.sr-badge{display:inline-flex;align-items:center;gap:3px;font-size:10.5px;font-weight:700;border-radius:4px;padding:2px 7px;line-height:1.4;white-space:nowrap}
.sr-badge.due{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bord)}
.sr-badge.soon{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bord)}
.sr-badge.ok{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bord)}
.sr-queue-section{margin-bottom:20px}
.sr-queue-hdr{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--red);font-weight:700;margin-bottom:10px}
.sr-queue-row{display:flex;align-items:center;gap:10px;padding:9px 14px;border-radius:var(--r-sm);background:var(--surf);border:1.5px solid var(--red-bord);margin-bottom:7px;cursor:default;transition:background .15s}
.sr-queue-date{font-size:11px;color:var(--txt3);min-width:52px}
.sr-queue-title{flex:1;font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sr-queue-pct{font-size:13px;font-weight:700;min-width:38px;text-align:right}
.sr-interval-info{font-size:11px;color:var(--txt3);margin-top:4px}
/* ── MODO FOCO ────────────────────────────────────────────── */
#sec-foco{position:fixed;inset:0;z-index:150;background:var(--bg);overflow-y:auto;display:flex;flex-direction:column}
#sec-foco.hidden{display:none!important}
.foco-hdr{position:sticky;top:0;z-index:10;background:var(--bg);border-bottom:1px solid var(--bord2);padding:10px 18px;display:flex;align-items:center;gap:12px}
.foco-qnum{font-size:13px;font-weight:700;color:var(--txt2);white-space:nowrap}
.foco-disc{font-size:11.5px;color:var(--txt3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0}
.foco-prog-wrap{display:flex;align-items:center;gap:8px;min-width:110px}
.foco-progress{height:4px;background:var(--bord);border-radius:2px;flex:1}
.foco-prog-fill{height:100%;background:var(--acc);border-radius:2px;transition:width .4s}
.foco-pct{font-size:11px;font-weight:700;color:var(--acc);min-width:28px;text-align:right}
.foco-body{flex:1;max-width:800px;margin:0 auto;padding:28px 20px 16px;width:100%;animation:fadeIn .2s ease}
.foco-body .q-block{border-color:var(--bord2)}
.foco-body .q-text{font-size:16px;line-height:1.8}
.foco-body .q-tag{font-size:14px;width:42px;height:42px;line-height:42px}
.foco-body .q-mark{height:52px;font-size:17px;font-weight:900;min-width:80px}
.foco-body .q-marks{gap:14px}
.foco-nav{max-width:800px;margin:0 auto 40px;padding:0 20px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.foco-nav-hint{font-size:11px;color:var(--txt3);text-align:center;line-height:1.6}
/* ── QUESTION TIMER ──────────────────────────────────────── */
.qt-badge{display:inline-flex;align-items:center;gap:3px;font-size:10.5px;font-weight:700;border-radius:4px;padding:2px 7px;font-variant-numeric:tabular-nums;letter-spacing:.02em;transition:background .35s,color .35s,border-color .35s;min-width:36px;justify-content:center}
.qt-idle{color:var(--txt3);background:transparent}
.qt-normal{background:var(--surf3);color:var(--txt2)}
.qt-warn{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bord)}
.qt-alert{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bord);animation:qtPulse 1s ease-in-out infinite}
.qt-done{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bord)}
@keyframes qtPulse{0%,100%{opacity:1}50%{opacity:.5}}
#qt-pill{position:fixed;bottom:62px;left:50%;transform:translateX(-50%);max-width:860px;width:calc(100% - 32px);z-index:80;pointer-events:none;display:flex;justify-content:flex-end}
.qt-active-pill{background:var(--surf2);border:1px solid var(--bord2);border-radius:20px;padding:5px 14px;font-size:12px;font-weight:700;color:var(--txt2);display:flex;align-items:center;gap:7px;box-shadow:0 2px 12px rgba(0,0,0,.35)}
.qt-active-pill.qt-warn-p{color:var(--amber)}
.qt-active-pill.qt-alert-p{color:var(--red);animation:qtPulse 1s ease-in-out infinite}
/* ── HISTÓRICO ────────────────────────────────────────────── */
#hist-wrap{max-width:860px;margin:0 auto;padding:24px 18px 100px;animation:fadeUp .4s ease}
.hist-header{display:grid;grid-template-columns:62px 72px 50px 68px 60px 1fr 80px;gap:8px;padding:7px 0;border-bottom:2px solid var(--bord);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--txt3);font-weight:700}
.hist-row{display:grid;grid-template-columns:62px 72px 50px 68px 60px 1fr 80px;gap:8px;padding:10px 0;border-top:1px solid var(--bord);font-size:13.5px;align-items:center}
.hist-row:first-child{border-top:none}
.hist-date{color:var(--txt2);font-size:12.5px;font-variant-numeric:tabular-nums;font-weight:600}
.hist-acertos{color:var(--txt);font-variant-numeric:tabular-nums}
.hist-pct{font-weight:800;font-variant-numeric:tabular-nums}
.hist-tempo{color:var(--txt3);font-size:12px;font-variant-numeric:tabular-nums}
.hist-saldo{font-weight:700;font-variant-numeric:tabular-nums}
.hist-av{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.hist-empty{text-align:center;padding:60px 20px}
.hist-empty .hist-emoji{font-size:52px;margin-bottom:18px}
.hist-empty h2{font-size:22px;font-weight:800;margin-bottom:10px}
.hist-empty p{color:var(--txt2);font-size:15px;max-width:340px;margin:0 auto 28px}
.streak-badge{display:inline-flex;align-items:center;gap:5px;background:var(--amber-bg);border:1px solid var(--amber-bord);color:var(--amber);border-radius:99px;padding:3px 12px;font-size:13px;font-weight:700;margin-left:8px}
@media(max-width:600px){
  .hist-header,.hist-row{grid-template-columns:55px 62px 46px 1fr}
  .hist-tempo,.hist-av{display:none}
}

/* ── PLACAR ──────────────────────────────────────────────── */
#placar-wrap{max-width:860px;margin:0 auto;padding:24px 18px 100px;animation:fadeUp .4s ease}
.placar-hero{background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);padding:32px 28px;box-shadow:var(--shadow);margin-bottom:20px;text-align:center}
.placar-kicker{font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--acc);font-weight:700;margin-bottom:14px}
.placar-hero h2{font-size:clamp(28px,4.5vw,40px);font-weight:800;font-style:italic;margin-bottom:8px}
.placar-lead{font-size:15px;color:var(--txt2);margin-bottom:24px}
.placar-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--bord);border:1px solid var(--bord);border-radius:10px;overflow:hidden}
@media(max-width:600px){.placar-stats{grid-template-columns:repeat(2,1fr)}}
.p-stat{background:var(--surf2);padding:16px 10px;text-align:center}
.p-stat .n{font-weight:800;font-size:30px;line-height:1;font-variant-numeric:tabular-nums}
.p-stat .n.g{color:var(--green)}.p-stat .n.r{color:var(--red)}.p-stat .n.a{color:var(--acc)}.p-stat .n.t{color:var(--txt)}
.p-stat .l{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--txt3);margin-top:5px;font-weight:600}

.pl-box{background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);padding:22px;margin-bottom:20px;box-shadow:var(--shadow)}
.pl-title{font-weight:700;font-size:16px;margin-bottom:16px;color:var(--txt)}
.cebraspe-formula{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:14px 16px;background:var(--surf2);border-radius:var(--r-sm);margin-bottom:14px;font-size:14px;border:1px solid var(--bord)}
.cebraspe-formula .part{color:var(--txt2)}
.cebraspe-formula .part b{color:var(--txt);font-weight:700}
.cebraspe-formula .eq{font-weight:800;font-size:20px;color:var(--acc);font-variant-numeric:tabular-nums}
.cebraspe-verdict{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:var(--r-sm);font-weight:700;font-size:14px;border:1px solid}
.cebraspe-verdict.approved{background:var(--green-bg);color:var(--green);border-color:var(--green-bord)}
.cebraspe-verdict.reproved{background:var(--red-bg);color:var(--red);border-color:var(--red-bord)}

/* Discipline chart */
.disc-chart-row{display:grid;grid-template-columns:1.4fr 2.5fr auto auto;gap:12px;align-items:center;padding:9px 0;border-top:1px solid var(--bord);font-size:13.5px}
.disc-chart-row:first-of-type{border-top:none}
.disc-chart-row .nm{color:var(--txt);font-weight:500}
.bar-rail{height:9px;background:var(--surf2);border-radius:99px;overflow:hidden;border:1px solid var(--bord)}
.bar-fill{height:100%;border-radius:99px;transition:width .6s}
.disc-chart-row .frac{color:var(--txt3);font-size:12px;font-variant-numeric:tabular-nums}
.disc-chart-row .pct{font-weight:700;font-size:13px;min-width:40px;text-align:right;font-variant-numeric:tabular-nums}
@media(max-width:600px){.disc-chart-row{grid-template-columns:1fr auto;gap:5px 12px}.bar-rail{grid-column:1/-1;order:3}.disc-chart-row .frac{order:4}}

/* Errors list */
.err-item{border-top:1px solid var(--bord);padding:12px 0}
.err-item:first-child{border-top:none}
.err-row{display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:start;font-size:13.5px}
.err-num{font-weight:800;color:var(--red);font-variant-numeric:tabular-nums;min-width:32px;padding-top:2px}
.err-sub{color:var(--txt);line-height:1.4}
.err-sub small{display:block;color:var(--txt3);font-size:11.5px;margin-top:2px}
.err-toggle{background:var(--surf2);border:1px solid var(--bord);border-radius:var(--r-xs);padding:4px 12px;font-size:12px;color:var(--txt2);transition:all var(--trans);font-family:inherit;white-space:nowrap;display:inline-flex;align-items:center;gap:5px}
.err-toggle:hover{border-color:var(--acc-bord);color:var(--acc);background:var(--acc-dim)}
.err-toggle.open{border-color:var(--acc-bord);color:var(--acc);background:var(--acc-dim)}
.err-gab{display:none;margin-top:12px;border-radius:var(--r-sm);overflow:hidden;border:1px solid var(--bord)}
.err-gab.open{display:block;animation:fadeUp .2s ease}
.placar-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:24px}

/* ── FAB NAV ─────────────────────────────────────────────── */
.fab{position:fixed;right:20px;bottom:72px;width:46px;height:46px;background:var(--acc);color:#0a0b0e;border:none;border-radius:50%;box-shadow:0 4px 16px var(--acc-glow);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;z-index:44;transition:all var(--trans)}
.fab:hover{transform:scale(1.08)}
.fab.hidden{display:none}
.quick-nav{position:fixed;right:20px;bottom:124px;width:auto;min-width:240px;background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);padding:12px;box-shadow:var(--shadow-lg);z-index:45;max-width:320px;max-height:55vh;overflow-y:auto;display:none}
.quick-nav.open{display:block;animation:fadeUp .2s ease}
.qn-title{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--txt3);margin-bottom:8px;font-weight:600}
.qn-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:4px}
.qn-btn{width:30px;height:30px;border:1px solid var(--bord);background:var(--surf2);border-radius:6px;font-size:10.5px;font-weight:700;color:var(--txt3);transition:all .1s;font-variant-numeric:tabular-nums}
.qn-btn:hover{border-color:var(--acc-bord);color:var(--acc);transform:scale(1.08)}
.qn-btn.ac{background:var(--green-bg);border-color:var(--green-bord);color:var(--green)}
.qn-btn.ae{background:var(--red-bg);border-color:var(--red-bord);color:var(--red)}
.qn-btn.gs{border-style:dashed}
.qn-btn.qa{box-shadow:0 0 0 2px var(--red);animation:qtPulse 1.2s ease-in-out infinite}
@keyframes qFlash{0%{box-shadow:0 0 0 3px var(--acc-glow),0 0 18px var(--acc-glow)}60%{box-shadow:0 0 0 2px var(--acc-bord)}100%{box-shadow:none}}
.q-kb-flash{animation:qFlash .55s ease-out}

/* ── PROGRESS BAR (bottom fixed) ─────────────────────────── */
.bot-bar{position:fixed;bottom:0;left:0;right:0;background:var(--surf);border-top:1px solid var(--bord);padding:8px 18px;display:flex;align-items:center;gap:12px;z-index:40;font-size:12px;color:var(--txt2)}
.bot-bar.hidden{transform:translateY(100%);opacity:0;pointer-events:none}
.bot-bar .bbar{flex:1;height:6px;background:var(--surf3);border-radius:99px;overflow:hidden}
.bot-bar .bbar-fill{height:100%;background:var(--acc);transition:width .4s;border-radius:99px}
.bot-bar .bstats{display:flex;gap:10px;flex-shrink:0;font-variant-numeric:tabular-nums}
.bot-bar .bstats .ok{color:var(--green);font-weight:600}.bot-bar .bstats .er{color:var(--red);font-weight:600}

/* ── MODAL ───────────────────────────────────────────────── */
.modal-ov{position:fixed;inset:0;background:rgba(8,9,14,.65);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;padding:18px;animation:fadeIn .2s ease}
.modal{background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);padding:26px;max-width:420px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.5);animation:fadeUp .2s ease}
.modal h3{font-size:19px;font-weight:800;margin-bottom:10px}
.modal p{color:var(--txt2);margin-bottom:20px;font-size:14px;line-height:1.55}
.modal-acts{display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap}
.btn-danger{background:var(--red);color:white;border:none;border-radius:var(--r-sm);padding:9px 18px;font-family:inherit;font-weight:700;font-size:14px;transition:opacity var(--trans)}
.btn-danger:hover{opacity:.88}
.btn-warn{background:var(--amber);color:white;border:none;border-radius:var(--r-sm);padding:9px 18px;font-family:inherit;font-weight:700;font-size:14px;transition:opacity var(--trans)}
.btn-warn:hover{opacity:.88}

/* ── TOAST ───────────────────────────────────────────────── */
.toast{position:fixed;bottom:56px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--surf);border:1px solid var(--bord);color:var(--txt);padding:11px 18px;border-radius:var(--r-sm);font-size:13.5px;z-index:300;opacity:0;transition:opacity .25s,transform .25s;box-shadow:var(--shadow-lg);pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── ANIMATIONS ──────────────────────────────────────────── */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.hidden{display:none!important}

/* ── RESPONSIVE ──────────────────────────────────────────── */
@media(max-width:640px){
  .hdr-inner{padding:0 12px}.hdr-chips{gap:4px}
  .chip{padding:2px 7px;font-size:11px}
  #prova-wrap,#placar-wrap{padding:16px 12px 100px}
  .q-text{font-size:14.5px}
  .prova-title h2{font-size:16px}
  .placar-stats{grid-template-columns:repeat(2,1fr)}
  .q-actions-row{padding-left:0;flex-wrap:wrap}
}
</style>
</head>
<body>

<!-- ══ HEADER ════════════════════════════════════════════ -->
<header class="hdr" id="hdr">
  <div class="hdr-inner">
    <div class="hdr-brand">
      <div class="delta-badge">Δ</div>
      <div>
        <div class="hdr-name">PCDF · Delegado 2026</div>
        <div class="hdr-date" id="hdr-date"></div>
      </div>
    </div>
    <div class="hdr-timer-wrap hidden" id="hdr-timer">
      <svg class="clock-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
      </svg>
      <span class="hdr-timer-txt" id="hdr-timer-txt">0:00</span>
      <button id="btn-pause" title="Pausar / retomar" onclick="togglePause()">⏸</button>
    </div>
    <div class="hdr-chips" id="hdr-chips" style="display:none">
      <span class="chip g" id="c-ok">✓ 0</span>
      <span class="chip r" id="c-er">✗ 0</span>
      <span class="chip n" id="c-tot">0/10</span>
    </div>
    <div class="hdr-actions">
      <button class="icon-btn" id="btn-hist" title="Histórico de estudo">📊</button>
      <button class="icon-btn" id="btn-theme" title="Tema">☀</button>
      <button class="icon-btn hidden" id="btn-gab-all" title="Revelar/ocultar todos os gabaritos">👁</button>
      <button class="icon-btn" id="btn-export" title="Exportar progresso">⬆</button>
      <button class="icon-btn" id="btn-import-bloco" title="Importar bloco JSON">📂</button>
      <button class="icon-btn" id="btn-import-prog" title="Importar progresso">📥</button>
      <button class="icon-btn" id="btn-reset" title="Reiniciar">↺</button>
    </div>
  </div>
  <div class="prog-rail"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
</header>

<!-- ══ PAUSE OVERLAY ═════════════════════════════════════ -->
<div id="pause-overlay" class="hidden">
  <div class="pause-card">
    <div class="pause-icon">⏸</div>
    <div class="pause-title">Prova pausada</div>
    <div class="pause-sub">O cronômetro está parado.<br>Retome quando estiver pronto.</div>
    <button class="pause-resume" onclick="togglePause()">▶ Retomar prova</button>
  </div>
</div>

<!-- ══ SECTIONS ══════════════════════════════════════════ -->
<main>
  <section id="sec-cover"></section>

  <div id="sec-prova" class="hidden">
    <!-- Toolbar -->
    <div class="tb" id="prova-tb">
      <div class="tb-inner">
        <span class="tb-info"><b id="tb-ans">0</b> respondidas &nbsp;|&nbsp; <b id="tb-blank">10</b> em branco</span>
        <span class="tb-spacer"></span>
        <button class="tb-btn" id="tb-gab-all">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="3"/><path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7-10-7-10-7z"/></svg>
          Gabaritos
        </button>
        <button class="tb-btn" id="tb-revisao" onclick="showRevisaoPicker()">
          🔍 Revisão
        </button>
        <button class="tb-btn" id="tb-foco" onclick="enterFoco()">
          🎯 Foco
        </button>
        <button class="tb-btn danger" id="tb-finish">
          Encerrar prova →

<script>

/* ==INJECT:START== */
const DEFAULT_BLOCO = {"meta":{"id":"2026-06-24","titulo":"Bloco Diário — Fase 2 | Penal · PPP · Const · Adm · MedLeg · Civil · Trib · Amb · Emp · DF","data":"2026-06-24","totalQuestoes":120,"fase":"Fase 2 (23/06–30/06/2026) — comentários enxutos, ritmo de prova real","concurso":"Delegado PCDF 2026","edital":"Edital nº 1, de 3/2/2026","observacao":"Bloco gerado autonomamente pelo orquestrador noturno. Calibragem: 20% diretos / 45% médios / 35% difíceis."},"disciplinas":[{"nome":"Direito Penal e Legislação Especial","comando":"Acerca de Direito Penal, legislação especial e jurisprudência dos tribunais superiores, julgue os itens a seguir.","itens":[{"n":1,"enun":"O homicídio qualificado-privilegiado é compatível com a modalidade dolosa específica qualificada, conforme entendimento consolidado do Supremo Tribunal Federal, permitindo a coexistência de privilégio e qualificadora de natureza subjetiva.","gab":"ERRADO","com":"O STF admite o homicídio qualificado-privilegiado somente quando o privilégio (motivo de relevante valor moral/social ou domínio de violenta emoção) convive com qualificadoras OBJETIVAS (meio ou modo). Qualificadoras subjetivas — como motivo torpe ou fútil — são incompatíveis com o privilégio.","fund":"CP, art. 121, §1º e §2º. STF: HC 103.575 — qualificadoras subjetivas não coexistem com o privilégio; qualificadoras objetivas sim.","peg":"A pegadinha é afirmar compatibilidade irrestrita. Só são compatíveis as qualificadoras OBJETIVAS."},{"n":2,"enun":"O erro de tipo essencial inevitável exclui o dolo, mas permite a responsabilização do agente a título de culpa, se houver previsão legal do tipo culposo.","gab":"ERRADO","com":"Erro de tipo essencial INEVITÁVEL (escusável) exclui dolo E culpa. O erro de tipo essencial EVITÁVEL (inescusável) exclui apenas o dolo, sendo possível a responsabilização culposa se houver previsão do tipo culposo.","fund":"CP, art. 20, caput: 'O erro sobre elemento constitutivo do tipo legal de crime exclui o dolo, mas permite a punição por crime culposo, se previsto em lei.' A exclusão da culpa ocorre somente no erro inevitável."},{"n":3,"enun":"Nos termos da Súmula 711 do STF, a lei penal mais grave aplica-se ao crime permanente ou continuado, ainda que sua vigência seja anterior ao início da conduta, desde que vigente antes de sua cessação.","gab":"CERTO","com":"Na constância do crime permanente ou continuado, não há retroatividade gravosa proibida: o agente pode e deve aplicar a lei mais grave que surgiu durante a execução, pois a conduta ainda está em andamento.","fund":"Súmula 711 STF: 'A lei penal mais grave aplica-se ao crime continuado ou ao crime permanente, se a sua vigência é anterior à cessação da continuidade ou da permanência.'","jur_status":"OK"},{"n":4,"enun":"A tentativa é admissível no crime culposo quando o agente prevê o resultado e assume o risco de produzi-lo.","gab":"ERRADO","com":"Tentativa é incompatível com crime culposo. Dolo eventual também não admite tentativa segundo a doutrina majoritária. Não existe tentativa culposa — a tentativa exige dolo direto de consumar o crime.","fund":"CP, art. 18, II: culpa = agente não quis nem assumiu o risco. CP, art. 14, II: tentativa pressupõe intenção de consumar. Doutrina: crime culposo é incompatível com tentativa."},{"n":5,"enun":"A organização criminosa, nos termos da Lei 12.850/2013, exige a associação de ao menos quatro pessoas com caráter estável e permanente para a prática de infrações cujas penas máximas sejam superiores a quatro anos ou de caráter transnacional.","gab":"CERTO","com":"A Lei 12.850/2013 define organização criminosa com 4 elementos cumulativos: (1) 4 ou mais pessoas; (2) estruturalmente ordenada; (3) caráter estável ou permanente; (4) objetivo de praticar infrações com pena máx > 4 anos ou de caráter transnacional.","fund":"Lei 12.850/2013, art. 1º, §1º: 'Considera-se organização criminosa a associação de 4 (quatro) ou mais pessoas estruturalmente ordenada e caracterizada pela divisão de tarefas, ainda que informalmente, com objetivo de obter, direta ou indiretamente, vantagem de qualquer natureza, mediante a prática de infrações penais cujas penas máximas sejam superiores a 4 anos, ou que sejam de caráter transnacional.'"},{"n":6,"enun":"O acordo de não persecução penal (ANPP) pode ser celebrado com investigado reincidente específico em crime praticado com violência ou grave ameaça à pessoa, desde que o promotor entenda necessário e suficiente para reprovação do fato.","gab":"ERRADO","com":"O ANPP é vedado expressamente quando: (i) o crime é praticado com violência ou grave ameaça à pessoa; (ii) o investigado é reincidente, não importa a conclusão do promotor. São vedações objetivas, não sujeitas à discricionariedade.","fund":"CPP, art. 28-A, §2º: 'O acordo de não persecução penal não se aplica nas hipóteses em que: I – não for cabível a transação penal; II – o crime for cometido com violência ou grave ameaça à pessoa; III – o agente for reincidente ou tiver sido beneficiado nos 5 (cinco) anos anteriores com ANPP, transação penal ou suspensão condicional do processo.'","peg":"A discricionariedade do MP não afasta as vedações legais objetivas do art. 28-A, §2º."},{"n":7,"enun":"A confissão formal e circunstanciada do crime é requisito obrigatório para a celebração do acordo de não persecução penal.","gab":"CERTO","com":"O ANPP exige que o investigado confesse formal e circunstanciadamente a prática da infração penal. A confissão é condição sine qua non para o acordo — sem ela, não há ANPP válido.","fund":"CPP, art. 28-A, caput: '...mediante a proposta do Ministério Público, observados os requisitos... confissão formal e circunstanciada...'"},{"n":8,"enun":"No roubo impróprio (art. 157, §1º, do CP), a violência ou grave ameaça deve ser empregada imediatamente após a subtração, para garantir a detenção da coisa ou a impunidade do crime.","gab":"CERTO","com":"O roubo impróprio ocorre quando a violência/ameaça é posterior à subtração. A lei exige nexo temporal e causal: a força é empregada 'logo depois' da subtração, com finalidade específica (detenção da coisa ou impunidade/fuga).","fund":"CP, art. 157, §1º: 'Na mesma pena incorre quem, logo depois de subtraída a coisa, emprega violência contra pessoa ou grave ameaça, a fim de assegurar a impunidade do crime ou a detenção da coisa para si ou para terceiro.'"},{"n":9,"enun":"O crime de associação criminosa (art. 288 do CP) consuma-se com a estabilidade e a permanência da associação, independentemente da prática de crimes pelos associados.","gab":"CERTO","com":"Associação criminosa é crime autônomo e de mera conduta: consuma-se com a reunião estável de 3 ou mais pessoas para o fim de cometer crimes, sem necessidade da efetiva prática dos crimes visados.","fund":"CP, art. 288: 'Associarem-se 3 (três) ou mais pessoas, para o fim específico de cometer crimes.' A doutrina e a jurisprudência majoritárias exigem estabilidade e permanência, diferenciando-a do mero concurso eventual."},{"n":10,"enun":"A execução da pena privativa de liberdade deve ser iniciada somente após o trânsito em julgado da sentença condenatória, segundo entendimento vinculante do Supremo Tribunal Federal.","gab":"CERTO","com":"O STF, julgando as ADCs 43, 44 e 54 (Pleno, 07/11/2019), fixou que a execução da pena só pode começar após o trânsito em julgado, em razão do art. 283 do CPP e da presunção de inocência (CF, art. 5º, LVII).","fund":"ADCs 43/44/54 STF (Marco Aurélio, Pleno, j. 07/11/2019); CF/88, art. 5º, LVII; CPP, art. 283."},{"n":11,"enun":"A violência doméstica e familiar contra a mulher, conforme entendimento do STF e do STJ, é apurada mediante ação penal pública incondicionada, prescindindo de representação da vítima.","gab":"CERTO","com":"O STF (ADI 4.424/DF) e o STJ (Súmula 542) pacificaram: a ação penal nos crimes de violência doméstica contra a mulher (Lei 11.340/2006) é pública incondicionada, independentemente de representação. A retratação da vítima não impede a persecução penal.","fund":"STF, ADI 4.424/DF (Marco Aurélio, Pleno, j. 09/02/2012). STJ, Súmula 542: 'A ação penal relativa ao crime de lesão corporal resultante de violência doméstica contra a mulher é pública incondicionada.'","jur_status":"PENDENTE"},{"n":12,"enun":"O perdão judicial extingue a punibilidade, gerando condenação do réu e, consequentemente, reincidência caso ele pratique novo crime no prazo de 5 anos.","gab":"ERRADO","com":"O perdão judicial é reconhecido por sentença declaratória extintiva da punibilidade, que NÃO gera condenação nem reincidência. O STJ consolidou isso na Súmula 18.","fund":"STJ, Súmula 18: 'A sentença concessiva do perdão judicial é declaratória da extinção da punibilidade, não subsistindo qualquer efeito condenatório.'"},{"n":13,"enun":"A atenuante da menoridade relativa (ser o agente menor de 21 anos ao tempo do crime) pode reduzir a pena abaixo do mínimo legal previsto para o tipo penal.","gab":"ERRADO","com":"O STJ consolidou que atenuante não pode reduzir a pena aquém do mínimo legal, assim como agravante não pode elevá-la além do máximo. Isso vale inclusive para a atenuante da menoridade relativa.","fund":"STJ, Súmula 231: 'A incidência da circunstância atenuante não pode conduzir à redução da pena abaixo do mínimo legal.'"},{"n":14,"enun":"No concurso formal perfeito (art. 70, caput, do CP), o agente pratica dois ou mais crimes com ações distintas, recebendo a maior das penas aplicada com aumento de um sexto até metade.","gab":"ERRADO","com":"No concurso formal IMPERFEITO (unidade de ação, pluralidade de crimes com desígnios autônomos), aplica-se o cúmulo material. No PERFEITO (uma só ação, dois ou mais crimes, sem desígnios autônomos), aplica-se a pena mais grave acrescida de 1/6 a 1/2. O item erra ao dizer 'ações distintas' — isso é concurso material.","fund":"CP, art. 70: 'Quando o agente, mediante uma só ação ou omissão, pratica dois ou mais crimes...' Ações DISTINTAS = concurso material (art. 69 CP).","peg":"Confundir ação única (formal) com ações distintas (material) é o erro clássico nesta matéria."},{"n":15,"enun":"A reincidência, por ser circunstância de caráter subjetivo, prepondera sobre as atenuantes no momento de fixação da pena, nos termos do Código Penal.","gab":"CERTO","com":"O CP, art. 67, determina que, no concurso de agravantes e atenuantes, a pena deve ser aproximada ao limite indicado pelas circunstâncias preponderantes. São preponderantes aquelas de natureza subjetiva: motivo do crime, personalidade do agente e reincidência.","fund":"CP, art. 67: 'No concurso de agravantes e atenuantes, a pena deve aproximar-se do limite indicado pelas circunstâncias preponderantes, entendendo-se como tais as que resultam dos motivos determinantes do crime, da personalidade do agente e da reincidência.'"},{"n":16,"enun":"O crime de tortura praticado por particular que constrange alguém com emprego de violência para provocar ação de natureza criminosa, sem envolvimento de agente público, é tipificado pela Lei 9.455/1997.","gab":"CERTO","com":"A Lei 9.455/97 tipifica a tortura praticada tanto por agente público (art. 1º, II) como por particular (art. 1º, I). A modalidade do art. 1º, I não exige a figura do agente público, ao contrário da Convenção ONU.","fund":"Lei 9.455/1997, art. 1º, I, 'b': 'Constitui crime de tortura: I – constranger alguém com emprego de violência ou grave ameaça, causando-lhe sofrimento físico ou mental: b) para provocar ação ou omissão de natureza criminosa.'"},{"n":17,"enun":"O porte de drogas para consumo pessoal, previsto no art. 28 da Lei 11.343/2006, não configura crime, pois foi descriminalizado pela referida lei.","gab":"ERRADO","com":"O STF (RE 635.659 — Tema 506) concluiu pela inconstitucionalidade da criminalização do porte para uso pessoal (julgamento ainda com modulação pendente). Contudo, a posição vigente é a de DESPENALIZAÇÃO (não descriminalização): a conduta continua ilícita, apenas não se aplicam penas privativas de liberdade.","fund":"Lei 11.343/2006, art. 28: conduta ilícita (infração penal), mas sujeita apenas a advertência, prestação de serviço à comunidade ou medida educativa. STF RE 635.659/SP: inconstitucionalidade em julgamento (atenção: acompanhar modulação).","peg":"Descriminalização ≠ Despenalização. A conduta continua ilícita — só as sanções mudam.","jur_status":"PENDENTE"},{"n":18,"enun":"A legítima defesa real e a legítima defesa putativa são recíprocas e simultâneas, podendo ambas os agentes ser reconhecidos em estado de necessidade.","gab":"ERRADO","com":"Não existe legítima defesa real recíproca: o agressor não tem direito a ela contra a reação do agredido. A legítima defesa putativa pode ser simultânea à real em caso de aberratio (erro bilateral), mas isso não gera estado de necessidade.","fund":"CP, art. 25: 'Entende-se em legítima defesa quem, usando moderadamente dos meios necessários, repele injusta agressão, atual ou iminente, a direito seu ou de outrem.' A agressão do primeiro agente é INJUSTA, logo não pode invocar legítima defesa real contra a reação do agredido."},{"n":19,"enun":"Nos crimes hediondos e equiparados, a progressão de regime exige o cumprimento de 40% da pena, para condenados primários, e de 60% para reincidentes em crime hediondo.","gab":"CERTO","com":"Após a Lei 13.964/2019 (Pacote Anticrime), os percentuais de progressão de regime para crimes hediondos foram alterados: 40% (primário), 50% (primário com resultado morte), 60% (reincidente não específico) e 70% (reincidente específico em hediondo com resultado morte).","fund":"Lei 8.072/1990, art. 2º, §2º (com redação da Lei 13.964/2019): 'A progressão de regime, no caso dos condenados pelos crimes previstos neste artigo, dar-se-á após o cumprimento de 2/5 (dois quintos) da pena, se o apenado for primário, e de 3/5 (três quintos), se reincidente, observado o disposto nos §§3º e 4º deste artigo.'","peg":"Atenção: 40% = 2/5; 60% = 3/5. Os percentuais do Pacote Anticrime (2019) são diferentes dos anteriores (1/6, 1/4, 1/3)."},{"n":20,"enun":"A homotransfobia foi enquadrada pelo Supremo Tribunal Federal como conduta equivalente ao racismo, sujeitando-se à tipificação da Lei 7.716/1989, até que o Congresso edite lei específica.","gab":"CERTO","com":"O STF, nas ADO 26 e MI 4.733 (Celso de Mello, Pleno, j. 13/06/2019), enquadrou a homofobia e transfobia como condutas equivalentes ao racismo social, tipificadas na Lei 7.716/1989, por omissão inconstitucional do legislador.","fund":"STF, ADO 26/DF e MI 4.733/DF (j. 13/06/2019): homotransfobia = racismo social; aplica-se Lei 7.716/89 até edição de lei específica pelo Congresso.","jur_status":"PENDENTE"},{"n":21,"enun":"A pena restritiva de direitos substitui a pena privativa de liberdade quando o crime doloso não exceder quatro anos e não tiver sido praticado com violência ou grave ameaça, sendo o condenado primário ou com circunstâncias favoráveis.","gab":"CERTO","com":"O art. 44 do CP estabelece os requisitos cumulativos para a substituição: (i) pena aplicada não superior a 4 anos, (ii) não praticado com violência ou grave ameaça, (iii) réu não reincidente em crime doloso, (iv) circunstâncias judiciais favoráveis.","fund":"CP, art. 44: 'As penas restritivas de direitos são autônomas e substituem as privativas de liberdade, quando: I – aplicada pena privativa de liberdade não superior a quatro anos e o crime não for cometido com violência ou grave ameaça à pessoa ou, qualquer que seja a pena aplicada, se o crime for culposo; II – o réu não for reincidente em crime doloso; III – a culpabilidade, os antecedentes, a conduta social e a personalidade do condenado, bem como os motivos e as circunstâncias indicarem que essa substituição seja suficiente.'"},{"n":22,"enun":"O crime de peculato (art. 312 do CP) é crime próprio que exige a qualidade de funcionário público no autor, mas admite a participação de particular.","gab":"CERTO","com":"Peculato é crime próprio (só funcionário público pode ser autor imediato), mas a participação de particular é possível nos termos do art. 30 do CP: as condições de caráter pessoal do funcionário se comunicam aos partícipes quando elementares do crime.","fund":"CP, art. 312: peculato — exige condição de funcionário público. CP, art. 30: 'Não se comunicam as circunstâncias e as condições de caráter pessoal, salvo quando elementares do crime.' A qualidade de funcionário público é elementar do tipo."},{"n":23,"enun":"No crime de corrupção passiva (art. 317 do CP), a consumação ocorre com o recebimento da vantagem indevida, não sendo suficiente a mera solicitação pelo funcionário público.","gab":"ERRADO","com":"Corrupção passiva é crime formal e de ação múltipla alternativa: consuma-se com a solicitação, recebimento OU aceitação de vantagem indevida. Não exige a efetiva entrega da vantagem — a mera solicitação já consuma o crime.","fund":"CP, art. 317: 'Solicitar ou receber, para si ou para outrem, direta ou indiretamente, ainda que fora da função ou antes de assumi-la, mas em razão dela, vantagem indevida...' — múltiplas modalidades, todas consumadas com a conduta, não com o resultado."},{"n":24,"enun":"Segundo o Supremo Tribunal Federal, o porte ilegal de arma de fogo com numeração raspada configura crime permanente, sendo o flagrante possível a qualquer momento durante a conduta.","gab":"CERTO","com":"O STF e o STJ reconhecem que o porte ilegal de arma de fogo é crime permanente — a conduta se prolonga no tempo enquanto o agente mantém a posse da arma. Durante toda a permanência é possível a prisão em flagrante.","fund":"Lei 10.826/2003 (Estatuto do Desarmamento), arts. 14 e 16. STJ e STF: porte ilegal = crime permanente; flagrante é cabível a qualquer momento. A numeração raspada agrava a pena (art. 16, §1º, IV)."}]},{"nome":"Direito Processual Penal e Legislação Especial","comando":"No que se refere ao Direito Processual Penal, à jurisprudência dos tribunais superiores e à legislação especial, julgue os seguintes itens.","itens":[{"n":25,"enun":"O inquérito policial tem natureza jurídica de procedimento administrativo de cunho inquisitório, sendo dispensável para o oferecimento da denúncia quando o Ministério Público dispuser de elementos suficientes de autoria e materialidade.","gab":"CERTO","com":"O IP é dispensável: o MP pode oferecer denúncia com base em peças de informação externas ao IP. O inquérito não é condição de procedibilidade da ação penal pública incondicionada — é dispensável (CPP, art. 46, §1º).","fund":"CPP, art. 46, §1º: 'O prazo de 5 dias (réu preso) e 15 dias (réu solto) fluirá para o MP oferecer a denúncia, estando ele com os autos.' CPP, art. 12: 'O inquérito policial acompanhará a denúncia...quando servir de base a ela.' — uso condicional evidencia dispensabilidade."},{"n":26,"enun":"O acesso do defensor aos elementos de informação já documentados no inquérito policial não pode ser restringido pelo delegado, mesmo em procedimentos sigilosos, conforme Súmula Vinculante 14 do STF.","gab":"CERTO","com":"A SV 14 assegura ao defensor acesso pleno às provas já produzidas e documentadas no IP, mesmo sigiloso. O acesso pode ser restringido apenas quanto às diligências em andamento e ao relatório não finalizado.","fund":"SV 14 STF: 'É direito do defensor, no interesse do representado, ter acesso amplo aos elementos de prova que, já documentados em procedimento investigatório realizado por órgão com competência de polícia judiciária, digam respeito ao exercício do direito de defesa.'"},{"n":27,"enun":"A prisão em flagrante delito é modalidade de prisão cautelar que, por si só, autoriza o encarceramento do indiciado pelo prazo máximo de 30 dias sem manifestação judicial.","gab":"ERRADO","com":"A prisão em flagrante é pré-cautelar, não cautelar. Deve ser comunicada ao juiz imediatamente; em até 24h, o auto de prisão em flagrante (APF) deve ser encaminhado ao juiz, que decidirá: converter em preventiva, relaxar ou conceder liberdade provisória. Não há prazo de 30 dias sem controle judicial.","fund":"CF/88, art. 5º, LXII: 'A prisão de qualquer pessoa e o local onde se encontre serão comunicados imediatamente ao juiz competente...' CPP, art. 310: após receber o APF, o juiz, fundamentadamente, relaxará, converterá em preventiva ou concederá liberdade provisória."},{"n":28,"enun":"A prisão preventiva pode ser decretada de ofício pelo juiz durante a fase investigatória, quando evidenciada a necessidade para garantia da ordem pública.","gab":"ERRADO","com":"Após o Pacote Anticrime (Lei 13.964/2019), o juiz não pode mais decretar a prisão preventiva de ofício em nenhuma fase — nem na investigação nem no processo. Sempre depende de requerimento do MP, assistente, querelante ou representação da autoridade policial.","fund":"CPP, art. 311 (Lei 13.964/2019): 'Em qualquer fase da investigação policial ou do processo penal, caberá a prisão preventiva decretada pelo juiz, a requerimento do Ministério Público, do querelante ou do assistente, ou por representação da autoridade policial.' A decretação de ofício foi suprimida.","peg":"Antes do Pacote Anticrime, o juiz podia decretar de ofício na fase processual. Após a Lei 13.964/2019, NUNCA de ofício."},{"n":29,"enun":"As provas obtidas por meio ilícito são inadmissíveis no processo penal, podendo ser utilizadas apenas em benefício do réu, por aplicação do princípio da proporcionalidade.","gab":"CERTO","com":"O CPP proíbe as provas ilícitas (art. 157). Contudo, a doutrina e parte da jurisprudência admitem a prova ilícita pro reo, com base na proporcionalidade: o direito à liberdade prevalece sobre a vedação de provas ilícitas quando usada em favor do acusado.","fund":"CF/88, art. 5º, LVI: 'São inadmissíveis, no processo, as provas obtidas por meios ilícitos.' CPP, art. 157: vedação à prova ilícita e às derivadas. Doutrina majoritária e STF: proporcionalidade permite a prova ilícita pro reo."},{"n":30,"enun":"O reconhecimento de pessoas realizado sem observância das formalidades do art. 226 do CPP — como a não apresentação simultânea de outras pessoas semelhantes — é absolutamente nulo e não pode fundamentar a condenação.","gab":"CERTO","com":"O STJ, no HC 598.886/SC (Schietti, 6ª T., j. 27/10/2020) e no Tema 1258 (j. 11/06/2025), consolidou que o reconhecimento irregular não pode sustentar condenação isolada e que as formalidades do art. 226 são obrigatórias, não mera recomendação.","fund":"CPP, art. 226. STJ HC 598.886/SC (Schietti, 6ª T., j. 27/10/2020): formalidades obrigatórias; reconhecimento viciado não sustenta condenação isolada. STJ Tema 1258 / REsp 1.953.602-SP (j. 11/06/2025): 6 teses sobre reconhecimento de pessoas.","peg":"Antes de 2020, o STJ tratava o art. 226 como recomendação. Após HC 598.886, é obrigação — posição consolidada no Tema 1258 (2025).","jur_status":"OK"},{"n":31,"enun":"A busca pessoal sem mandado judicial é lícita quando o policial suspeita genericamente da pessoa abordada, com base em sua aparência, local e horário.","gab":"ERRADO","com":"O STJ (RHC 158.580/BA, Schietti, 6ª T., j. 19/04/2022) firmou que a busca pessoal sem mandado exige fundada suspeita PRÉVIA, OBJETIVA E ESPECÍFICA, não bastando suspeita genérica baseada em aparência, local ou horário. A suspeita deve ser articulável e demonstrável.","fund":"CPP, art. 244: 'A busca pessoal independerá de mandado, no caso de prisão ou quando houver fundada suspeita de que a pessoa esteja na posse de arma proibida ou de objetos ou papéis que constituam corpo de delito...' STJ RHC 158.580/BA (j. 19/04/2022): suspeita objetiva e específica.","peg":"Local 'de risco' e horário noturno sozinhos NÃO bastam para fundada suspeita. É preciso elemento concreto e articulável.","jur_status":"OK"},{"n":32,"enun":"A interceptação telefônica exige prévia autorização judicial, devendo ser decretada para apuração de infrações penais punidas com reclusão.","gab":"CERTO","com":"A Lei 9.296/1996 exige: (i) autorização judicial; (ii) infração punida com reclusão; (iii) inexistência de outros meios de prova; (iv) indícios razoáveis de autoria ou participação. Sem esses requisitos, a interceptação é ilícita.","fund":"Lei 9.296/1996, art. 2º: 'Não será admitida a interceptação de comunicações telefônicas quando ocorrer qualquer das seguintes hipóteses: I – não houver indícios razoáveis da autoria ou participação em infração penal; II – a prova puder ser feita por outros meios disponíveis; III – o fato investigado constituir infração penal punida, no máximo, com pena de detenção.'"},{"n":33,"enun":"O juiz das garantias, criado pela Lei 13.964/2019, é responsável pelo controle da fase investigatória e tem competência para o processo e julgamento das infrações penais ao final do inquérito.","gab":"ERRADO","com":"O juiz das garantias (arts. 3º-A a 3º-F do CPP) atua EXCLUSIVAMENTE na fase investigatória. Ao final do IP, passa a competência ao juiz da instrução e julgamento — que não pode ter contato com o IP (sistema acusatório). A eficácia dos arts. está suspensa por liminar do STF nas ADIs 6298/6299/6300/6305.","fund":"CPP, arts. 3º-A a 3º-F (Lei 13.964/2019). STF: eficácia suspensa por liminares nas ADIs 6298/6299/6300/6305. Função do juiz das garantias: apenas fase pré-processual; a instrução e julgamento ficam com juiz distinto."},{"n":34,"enun":"A colaboração premiada é meio de obtenção de prova e negócio jurídico processual; as declarações do colaborador, por si sós, são suficientes para fundamentar condenação, desde que corroboradas por outros elementos.","gab":"ERRADO","com":"As declarações do colaborador JAMAIS bastam, por si sós, para fundamentar condenação — mesmo que existam outros elementos. A lei exige que as declarações sejam CORROBORADAS por outros meios de prova. Afirmar que 'corroboração é suficiente' inverte a lógica: a corroboração é necessária, mas a declaração isolada nunca é fundamento válido.","fund":"Lei 12.850/2013, art. 4º, §16: 'Nenhuma sentença condenatória será proferida com fundamento apenas nas declarações de agente colaborador.' Ou seja: obrigatoriamente outros meios de prova."},{"n":35,"enun":"A audiência de custódia deve ocorrer em até 24 horas após a prisão em flagrante, com apresentação do preso ao juiz e, quando possível, ao defensor e ao Ministério Público.","gab":"CERTO","com":"A audiência de custódia é obrigatória no Brasil (Resolução CNJ 213/2015; art. 287 CPP, após Pacote Anticrime): o preso deve ser apresentado ao juiz em até 24h da prisão para controle da legalidade, verificação de maus-tratos e decisão sobre a liberdade.","fund":"Resolução CNJ 213/2015, art. 1º. CPP, art. 287 (Lei 13.964/2019). Pacto de San José da Costa Rica, art. 7.5."},{"n":36,"enun":"A entrada forçada em domicílio sem mandado judicial, durante o dia, é lícita desde que fundada em justa causa objetivamente demonstrável a posteriori.","gab":"CERTO","com":"O STF (RE 603.616/RO — Tema 280, Gilmar Mendes, j. 05/11/2015) admitiu a entrada forçada sem mandado quando houver fundadas razões — que devem ser demonstradas concretamente. A justificação a posteriori é admitida, mas as razões precisam ser objetivas e comprovadas.","fund":"STF, RE 603.616/RO (Gilmar Mendes, Pleno, j. 05/11/2015, Tema 280): 'A entrada forçada em domicílio sem mandado judicial só é lícita, mesmo em período diurno, quando amparada em fundadas razões, devidamente justificadas a posteriori, que indiquem que dentro da casa ocorre situação de flagrante delito.'","jur_status":"OK"},{"n":37,"enun":"Nos crimes de ação penal privada, a queixa deve ser oferecida no prazo decadencial de 6 meses, a contar do dia em que o ofendido tomar conhecimento de quem é o autor do crime.","gab":"CERTO","com":"O prazo decadencial para o exercício do direito de queixa na ação penal privada é de 6 meses, a contar do conhecimento do autor do crime (dies a quo). Ultrapassado esse prazo, extingue-se a punibilidade pela decadência.","fund":"CPP, art. 38: 'Salvo disposição em contrário, o ofendido, ou seu representante legal, decairá no direito de queixa ou de representação, se não o exercer dentro do prazo de 6 meses, contado do dia em que vier a saber quem é o autor do crime...'"},{"n":38,"enun":"É vedada ao magistrado, antes do recebimento da denúncia, a consulta aos autos do inquérito policial para fundamentar a decisão de recebimento ou rejeição.","gab":"ERRADO","com":"O juiz analisa os autos do IP para verificar os requisitos do art. 395 do CPP e decidir entre receber ou rejeitar a denúncia. O acesso ao IP pelo juiz nessa fase é legal e necessário. O sistema acusatório restringe a influência do IP na fase de instrução — não no juízo de admissibilidade.","fund":"CPP, arts. 395-396. O sistema acusatório (art. 3º-A CPP, eficácia suspensa) visa separar investigação de instrução processual, mas o juiz competente pode verificar os elementos do IP para receber/rejeitar a peça acusatória."},{"n":39,"enun":"A nulidade absoluta no processo penal pode ser reconhecida de ofício pelo juiz em qualquer fase processual, independentemente de arguição pela parte.","gab":"CERTO","com":"Nulidades absolutas (que atingem garantias constitucionais essenciais) podem e devem ser reconhecidas de ofício, a qualquer tempo, sem necessidade de provocação das partes. Nulidades relativas, por outro lado, exigem arguição no momento oportuno, sob pena de preclusão.","fund":"CPP, art. 563 e ss. Doutrina e jurisprudência: nulidades absolutas = cognoscíveis de ofício, sem preclusão; nulidades relativas = dependem de arguição tempestiva."},{"n":40,"enun":"O princípio do juiz natural veda a criação de tribunais de exceção e garante que ninguém será processado senão pela autoridade competente, conforme a CF/88.","gab":"CERTO","com":"O princípio do juiz natural é garantia constitucional dual: (i) proibição de tribunal de exceção (CF, art. 5º, XXXVII); (ii) garantia do juiz natural pré-constituído (CF, art. 5º, LIII). Ambas asseguram a imparcialidade e a predeterminação do julgador.","fund":"CF/88, art. 5º, XXXVII: 'Não haverá juízo ou tribunal de exceção.' CF/88, art. 5º, LIII: 'Ninguém será processado nem sentenciado senão pela autoridade competente.'"},{"n":41,"enun":"No procedimento do Tribunal do Júri, a desclassificação do crime doloso contra a vida pelo Conselho de Sentença implica a remessa dos autos ao juiz presidente para julgamento.","gab":"CERTO","com":"Se o Júri desclassifica o crime para um que não é da competência do Tribunal do Júri (ex: homicídio culposo), o juiz presidente assume a competência para julgamento do crime desclassificado, na mesma sessão, sem remessa a outro juízo.","fund":"CPP, art. 492, §1º: 'Se houver desclassificação da infração para outra da competência do juiz singular, ao presidente do Tribunal do Júri caberá proferir sentença em seguida, aplicando-se, quando o delito resultante da nova tipificação for considerado pela lei como infração penal de menor potencial ofensivo, o disposto nos arts. 69 e seguintes da Lei n. 9.099, de 26 de setembro de 1995.'"},{"n":42,"enun":"A prova emprestada é admitida no processo penal brasileiro, desde que tenha sido produzida em processo anterior com observância do contraditório e que a parte contra quem será usada tenha participado daquele processo.","gab":"CERTO","com":"A prova emprestada é válida quando: (i) produzida com contraditório no processo de origem; (ii) a parte contra quem será usada participou do processo original. Se a parte não participou do processo de origem, a prova pode ser usada como indício, mas não como prova direta.","fund":"Princípio do contraditório (CF, art. 5º, LV). Doutrina e STF/STJ: a prova emprestada deve garantir contraditório quanto a sua admissão e valoração no novo processo. REsp e HC iterativos do STJ sobre o tema."},{"n":43,"enun":"O agravo em execução é o recurso adequado para impugnar decisões proferidas pelo juízo de execução penal, como indeferimento de progressão de regime.","gab":"CERTO","com":"O recurso contra decisões do juízo da execução penal é o agravo em execução (LEP, art. 197), sem efeito suspensivo, diferenciando-se da apelação. Exemplos: progressão de regime, livramento condicional, remição de pena.","fund":"LEP, art. 197: 'Das decisões proferidas pelo Juiz caberá recurso de agravo, sem efeito suspensivo.' Incide sobre matérias de execução penal: progressão, regressão de regime, saída temporária, detração, etc."},{"n":44,"enun":"A suspeição do juiz deve ser arguida antes de ser proferida a sentença, sob pena de preclusão, exceto nas hipóteses de impedimento, que podem ser reconhecidas a qualquer tempo.","gab":"CERTO","com":"Suspeição (art. 254 CPP) é causa de nulidade relativa, sujeita a preclusão — deve ser arguida antes da sentença. Impedimento (art. 252 CPP) é causa de nulidade absoluta — pode ser reconhecido a qualquer tempo, inclusive de ofício.","fund":"CPP, arts. 252-254 e 112. Doutrina: impedimento = nulidade absoluta (cognoscível de ofício, sem preclusão); suspeição = nulidade relativa (sujeita a preclusão temporal)."},{"n":45,"enun":"O habeas corpus pode ser utilizado para questionar o mérito do reconhecimento fotográfico realizado em flagrante, desde que a ilegalidade seja manifesta nos autos.","gab":"CERTO","com":"O HC é cabível sempre que houver coação ilegal à liberdade de locomoção. Questões de ilegalidade manifesta — como prova ilícita ou nulidade absoluta verificável nos próprios autos — são cognoscíveis em HC, mesmo sem reexame de provas.","fund":"CF/88, art. 5º, LXVIII. CPP, art. 647. STF e STJ: HC não é via adequada para reanálise de provas (Súmula 7 STJ), mas ilegalidade manifesta nos autos pode ser conhecida.","jur_status":"OK"},{"n":46,"enun":"Nos crimes de ação penal pública condicionada à representação, a retratação da representação pela vítima é possível até o oferecimento da denúncia pelo Ministério Público.","gab":"CERTO","com":"A vítima pode retratar a representação antes de oferecida a denúncia. Após o oferecimento, não é mais possível a retratação — pois a ação penal pública já foi iniciada e pertence ao Estado.","fund":"CPP, art. 25: 'A representação será irretratável depois de oferecida a denúncia.' Interpretação a contrario: antes da denúncia, é possível retratar."}]},{"nome":"Direito Constitucional e Legislação Complementar","comando":"Acerca de Direito Constitucional, controle de constitucionalidade e jurisprudência do Supremo Tribunal Federal, julgue os itens subsequentes.","itens":[{"n":47,"enun":"O Poder Judiciário (STF e STJ), ao contrário do Poder Legislativo, não pode criar direito novo por meio de suas decisões, devendo se limitar a aplicar a lei ao caso concreto.","gab":"ERRADO","com":"O STF, no controle concentrado de constitucionalidade, cria efeitos erga omnes e vinculantes com eficácia similar à lei. As súmulas vinculantes, as teses de repercussão geral e as decisões em ações diretas têm caráter normativo. O STJ, em recursos repetitivos, fixa teses com força vinculante horizontal.","fund":"CF/88, arts. 102, §2º (ADI/ADC) e 103-A (SV). O STF tem papel normativo ao fixar interpretações constitucionais vinculantes, aproximando-se da função legiferante em certos aspectos."},{"n":48,"enun":"A dignidade da pessoa humana, fundamento da República (CF, art. 1º, III), é um valor absoluto que não pode ser ponderado com outros princípios constitucionais.","gab":"ERRADO","com":"Nenhum princípio constitucional é absoluto — inclusive a dignidade da pessoa humana. A ponderação entre princípios é inerente ao Estado Democrático de Direito. Exemplos: dignidade vs. segurança pública, dignidade vs. liberdade de imprensa. O STF realiza ponderação caso a caso.","fund":"CF/88, art. 1º, III. Doutrina de Alexy: princípios são mandados de otimização que cedem mediante ponderação. STF: não há hierarquia absoluta entre princípios constitucionais — colisões são resolvidas pela proporcionalidade."},{"n":49,"enun":"A ação direta de inconstitucionalidade por omissão (ADO) e o mandado de injunção (MI) têm o mesmo objeto — suprir a omissão legislativa inconstitucional —, mas diferem quanto ao órgão competente e ao efeito da decisão.","gab":"CERTO","com":"ADO: controle concentrado no STF (CF, art. 103, §2º), efeito erga omnes, ciência ao órgão para adotar as providências. MI: controle difuso/concentrado (STF ou Tribunal), efeito inter partes ou erga omnes, pode conceder diretamente o direito ao impetrante.","fund":"CF/88, arts. 5º, LXXI (MI) e 103, §2º (ADO). STF: MI 670, 708, 712 (direito de greve) — efeito erga omnes. ADO 26 — homofobia. Diferença essencial: MI pode conceder o exercício do direito; ADO apenas informa ao legislador."},{"n":50,"enun":"No controle difuso de constitucionalidade, a decisão do STF declarando a inconstitucionalidade de norma em recurso extraordinário tem efeitos entre as partes, sendo necessária resolução do Senado Federal para extensão erga omnes.","gab":"CERTO","com":"No controle difuso, a declaração de inconstitucionalidade tem efeito inter partes, exceto no STF (Pleno). Para eficácia erga omnes, o art. 52, X da CF prevê a suspensão pelo Senado Federal. Contudo, o STF adota a tese da 'mutação constitucional': em RE com repercussão geral, o Senado torna a decisão obrigatória para todos.","fund":"CF/88, art. 52, X: Senado pode suspender lei declarada inconstitucional pelo STF no controle difuso. Mas a tese da mutação constitucional (RE 197.917 e RE 600.885) tende a tornar desnecessária a suspensão quando há Tema fixado com repercussão geral."},{"n":51,"enun":"A arguição de descumprimento de preceito fundamental (ADPF) tem caráter subsidiário, sendo cabível somente quando não houver outro meio eficaz de sanar a lesividade ao preceito fundamental.","gab":"CERTO","com":"A ADPF tem natureza subsidiária (Lei 9.882/1999, art. 4º, §1º): somente é admitida quando outro instrumento constitucional (ADI, ADC, ADO) não seja adequado ou suficiente para sanar a lesão. É 'ação residual' do controle concentrado.","fund":"Lei 9.882/1999, art. 4º, §1º: 'Não será admitida arguição de descumprimento de preceito fundamental quando houver qualquer outro meio eficaz de sanar a lesividade.'"},{"n":52,"enun":"Os tratados e convenções internacionais sobre direitos humanos aprovados pelo Congresso Nacional com quórum qualificado (3/5, em dois turnos, em cada Casa) têm status de emenda constitucional.","gab":"CERTO","com":"Após a EC 45/2004, tratados de DH aprovados pelo procedimento especial têm estatura de emenda constitucional (CF, art. 5º, §3º). Os tratados anteriores à EC 45, sem esse procedimento, têm status supralegal (RE 466.343/SP — Peluso).","fund":"CF/88, art. 5º, §3º (EC 45/2004): 'Os tratados e convenções internacionais sobre direitos humanos que forem aprovados, em cada Casa do Congresso Nacional, em dois turnos, por três quintos dos votos dos respectivos membros, serão equivalentes às emendas constitucionais.' STF, RE 466.343/SP (j. 03/12/2008): status supralegal para tratados anteriores.","peg":"Tratados de DH aprovados antes da EC 45 = supralegais. Aprovados após, com quórum qualificado = emenda constitucional.","jur_status":"OK"},{"n":53,"enun":"O mandado de segurança preventivo pode ser impetrado antes da ocorrência do ato coator, desde que o impetrante demonstre que a ameaça é real, atual e iminente.","gab":"CERTO","com":"O MS preventivo protege de ameaça real, séria e objetivamente demonstrável a direito líquido e certo. Não é mera expectativa subjetiva — a iminência do ato coator deve ser objetivamente verificável e não hipotética.","fund":"CF/88, art. 5º, LXIX. Lei 12.016/2009, art. 1º: 'Conceder-se-á mandado de segurança para proteger direito líquido e certo, não amparado por habeas corpus ou habeas data, sempre que, ilegalmente ou com abuso de poder, qualquer pessoa física ou jurídica sofrer violação ou houver justo receio de sofrê-la...'"},{"n":54,"enun":"Os deputados e senadores gozam de imunidade penal (material) por suas opiniões, palavras e votos expressos em plenário ou em qualquer local, desde que no exercício do mandato.","gab":"CERTO","com":"A imunidade material (inviolabilidade) é absoluta quando os atos são praticados no plenário ou nas comissões; quando praticados fora do Parlame
