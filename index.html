/* ==INJECT:START== */
const DEFAULT_BLOCO = {"meta":{"id":"2026-06-25","titulo":"Bloco Diário — Tanatologia · LODF · Ambiental · Resp. Civil Objetiva (2026-06-25)","data":"2026-06-25","totalQuestoes":120,"concurso":"Delegado PCDF 2026","edital":"Edital nº 1, de 3/2/2026","fase":"Fase 2 — Reta Final (comentários enxutos)","observacao":"120 questões C/E — Penal(24) + PPP(22) + Const(18) + Adm(16) + Demais(40). Gerado pelo Orquestrador em 2026-06-25."},"disciplinas":[{"nome":"Direito Penal e Legislação Penal Especial","comando":"Acerca dos institutos de direito penal material e legislação penal especial aplicáveis ao concurso de Delegado de Polícia do PCDF, julgue os itens a seguir.","itens":[{"n":1,"enun":"O dolo eventual e a culpa consciente distinguem-se pelo elemento volitivo: no dolo eventual o agente assume o risco de produzir o resultado; na culpa consciente, o agente prevê o resultado mas acredita sinceramente que ele não ocorrerá.","gab":"CERTO","com":"Distinção clássica, frequentemente cobrada. O elemento intelectivo (previsão) está presente em ambos; o que diferencia é a aceitação ou não do resultado.","fund":"CP, art. 18, I (in fine) — dolo eventual: quem assume o risco de produzi-lo. Doutrina majoritária: Nelson Hungria, Damásio de Jesus."},{"n":2,"enun":"A teoria adotada pelo Código Penal para o nexo de causalidade é a da equivalência dos antecedentes causais (conditio sine qua non), sem qualquer temperamento.","gab":"ERRADO","com":"O CP adota a conditio sine qua non (art. 13), mas tempera com a teoria da imputação objetiva nos casos de superveniência de causa relativamente independente (art. 13, §1º). A doutrina moderna aplica a imputação objetiva para afastar o nexo em certos casos.","fund":"CP, art. 13, caput e §1º. STJ: imputação objetiva como filtro do nexo causal.","peg":"O CP usa conditio temperada pelo §1º (causa superveniente) — não pura."},{"n":3,"enun":"Na legítima defesa putativa, o agente responderá por crime culposo se o erro sobre a situação de fato era evitável.","gab":"CERTO","com":"Erro de tipo permissivo (descriminante putativa): se inevitável, exclui dolo e culpa; se evitável, exclui dolo, mas permite punição por culpa (se previsto em lei).","fund":"CP, art. 20, §1º. Teoria limitada da culpabilidade (adotada pelo CP de 1984)."},{"n":4,"enun":"Segundo a Súmula 711 do STF, a lei penal mais grave aplica-se ao crime continuado ou permanente, desde que sua vigência tenha se iniciado antes da cessação da continuidade ou da permanência.","gab":"CERTO","com":"Súmula 711 STF: se a lei mais grave entrou em vigor antes de cessar o crime permanente/continuado, aplica-se sem retroatividade proibida — o crime ainda estava em curso.","fund":"SV 711 STF; CP, art. 5º (princípio da anterioridade).","peg":"Não viola irretroatividade: a conduta (permanente/continuada) alcançou a vigência da lei mais grave."},{"n":5,"enun":"O crime de perigo abstrato dispensa a comprovação de risco concreto ao bem jurídico tutelado, sendo presumido o perigo pela lei.","gab":"CERTO","com":"No crime de perigo abstrato (ou presumido), a periculosidade da conduta é presumida pelo legislador. Ex.: porte ilegal de arma de fogo (art. 14 da Lei 10.826/03).","fund":"STF RE 583.523 (Pleno): constitucionalidade dos crimes de perigo abstrato; porte ilegal é crime formal."},{"n":6,"enun":"A desistência voluntária e o arrependimento eficaz rompem o nexo causal, respondendo o agente somente pelos atos já praticados.","gab":"CERTO","com":"Chamada de 'ponte de ouro': o agente desiste ou impede o resultado; responde pelos atos anteriores, não pela tentativa. Ex.: atira, mas presta socorro — responde por lesão, não por tentativa de homicídio.","fund":"CP, art. 15."},{"n":7,"enun":"O arrependimento posterior reduz a pena de 1/3 a 2/3 em qualquer crime cometido com ou sem violência ou grave ameaça, desde que a reparação ocorra até o recebimento da denúncia.","gab":"ERRADO","com":"O arrependimento posterior só se aplica a crimes cometidos SEM violência ou grave ameaça à pessoa. A reparação deve ocorrer até o recebimento da denúncia (e não da queixa). Crimes com violência: não cabível.","fund":"CP, art. 16.","peg":"Exclui crimes com violência ou grave ameaça — ponto cobrado pela CEBRASPE."},{"n":8,"enun":"Segundo o STJ, a aplicação do princípio da insignificância a réu reincidente é vedada de forma absoluta.","gab":"ERRADO","com":"Posição do STJ: reincidência é fator que, via de regra, afasta a insignificância, mas NÃO de forma absoluta — o STJ analisa caso a caso. Divergência D2 do lastro: STF é ainda mais casuístico.","fund":"Divergência D2 — STJ tende a afastar; STF analisa caso a caso. Súmula 444 STJ (proibição de usar IP na pena-base, tema conexo).","peg":"Vedação não é absoluta — CEBRASPE já cobrou a nuance.","jur_status":"OK"},{"n":9,"enun":"No concurso material de crimes, as penas são somadas; no concurso formal perfeito, aplica-se a mais grave aumentada de 1/6 a 1/2.","gab":"CERTO","com":"Concurso material (art. 69): soma. Concurso formal perfeito/próprio (art. 70, caput): pena mais grave + aumento de 1/6 a 1/2. Concurso formal imperfeito/impróprio: soma (como material).","fund":"CP, arts. 69 e 70."},{"n":10,"enun":"No crime continuado, a pena do crime mais grave é aumentada de 1/6 a 2/3; se a continuação for específica (dolosa, mesma vítima, com violência ou grave ameaça), o aumento pode ser de 1/6 a 3 vezes.","gab":"CERTO","com":"Art. 71: crime continuado simples — 1/6 a 2/3. Art. 71, parágrafo único: crime continuado específico (violência ou ameaça, mesma vítima) — 1/6 até 3 vezes.","fund":"CP, art. 71 e parágrafo único.","peg":"Continuado específico: 3 vezes (não 2/3) — confusão clássica."},{"n":11,"enun":"O crime impossível pressupõe a absoluta ineficácia do meio ou a absoluta impropriedade do objeto, não se configurando a tentativa punível.","gab":"CERTO","com":"Art. 17 CP: crime impossível = absoluta ineficácia do meio (ex.: veneno incapaz de matar) ou absoluta impropriedade do objeto (ex.: matar cadáver). Relativa ineficácia/impropriedade → tentativa punível.","fund":"CP, art. 17; SV 145 STF: flagrante preparado = crime impossível.","peg":"Absoluta — relativa não exclui a punição pela tentativa."},{"n":12,"enun":"Conforme o Estatuto do Desarmamento (Lei 10.826/2003), o porte ilegal de arma de fogo de uso permitido é crime de perigo abstrato, sendo dispensada a demonstração de potencialidade lesiva no caso concreto.","gab":"CERTO","com":"STF RE 583.523 (Pleno, 2013): o porte ilegal é crime de perigo abstrato; a apreensão da arma carregada (ou não) configura o crime; desnecessária perícia de potencialidade lesiva concreta.","fund":"Lei 10.826/03, art. 14; STF RE 583.523."},{"n":13,"enun":"Na Lei Maria da Penha (Lei 11.340/2006), a violência doméstica e familiar contra a mulher exige necessariamente relação íntima de afeto entre agressor e vítima.","gab":"ERRADO","com":"A Lei 11.340/06 protege a mulher em contexto de violência doméstica ou familiar, incluindo também parentes, pessoas que convivam ou tenham convivido — não se exige relação íntima de afeto. A lei tem quatro hipóteses de incidência (art. 5º, I a III).","fund":"Lei 11.340/06, art. 5º, I (âmbito doméstico), II (âmbito familiar), III (relação íntima de afeto). Não se limita ao III.","peg":"Relação íntima de afeto é UMA das hipóteses, não a única."},{"n":14,"enun":"O perdão judicial, previsto no art. 121, §5º, do CP (homicídio culposo), é sentença declaratória de extinção da punibilidade, não gerando reincidência.","gab":"CERTO","com":"Súmula 18 STJ: o perdão judicial é declaratório — não condena, não gera reincidência nem efeitos secundários da condenação.","fund":"CP, art. 121, §5º; Súmula 18 STJ.","peg":"Não é condenatório — sem efeito de reincidência.","jur_status":"OK"},{"n":15,"enun":"Responde por homicídio doloso qualificado o médico que, durante cirurgia eletiva, por erro grosseiro injustificável, leva o paciente à morte.","gab":"ERRADO","com":"Erro médico grosseiro pode configurar homicídio culposo qualificado (art. 121, §4º, CP) — imprudência/negligência/imperícia. Para homicídio doloso, necessário dolo (direto ou eventual). Erro médico, em regra, não configura dolo eventual.","fund":"CP, art. 121, §3º (culposo) e §4º (culposo qualificado por ser médico). Art. 18, I (dolo).","peg":"Erro médico grosseiro = culpa qualificada, não dolo eventual — salvo prova específica de aceitação do resultado."},{"n":16,"enun":"Para a configuração do feminicídio (art. 121, §2º, VI, CP), exige-se que o crime seja cometido por homem contra mulher.","gab":"ERRADO","com":"O feminicídio exige que o crime seja cometido contra a mulher por razão de condição de sexo feminino (violência doméstica ou menosprezo/discriminação). O agressor não precisa ser homem — pode ser qualquer pessoa (inclusive mulher).","fund":"CP, art. 121, §2º, VI; §2º-A (conceito de razão de condição de sexo feminino).","peg":"Feminicídio ≠ homicídio por homem. É razão de condição feminina — agente pode ser qualquer pessoa."},{"n":17,"enun":"Na Lei de Drogas (Lei 11.343/2006), o tráfico privilegiado (art. 33, §4º) permite a redução da pena de 1/6 a 2/3 ao réu primário, de bons antecedentes, que não integre organização criminosa nem se dedique a atividades criminosas.","gab":"CERTO","com":"Art. 33, §4º Lei 11.343/06: tráfico privilegiado — todos os requisitos cumulativos (primariedade + bons antecedentes + não integrar ORCRIM + não se dedicar a atividades criminosas). Pena: redução de 1/6 a 2/3.","fund":"Lei 11.343/06, art. 33, §4º; STJ: requisitos são cumulativos."},{"n":18,"enun":"O STF entende que o tráfico privilegiado (art. 33, §4º, Lei 11.343/06) não tem natureza hedionda, não sendo equiparado a hediondo para fins de progressão de regime.","gab":"CERTO","com":"STF HC 118.533 (Pleno, 2016): o tráfico privilegiado NÃO é equiparado a hediondo. Afastada a vedação de progressão de regime e outros benefícios próprios dos crimes hediondos.","fund":"STF HC 118.533/MS (Pleno, j. 23/06/2016); Lei 8.072/90.","peg":"Tráfico simples e qualificado = hediondo. Tráfico privilegiado = NÃO hediondo (STF 2016).","jur_status":"PENDENTE"},{"n":19,"enun":"O crime de lavagem de dinheiro (Lei 9.613/98) exige, desde a redação original da lei, que o delito antecedente seja um dos crimes expressamente listados em rol taxativo.","gab":"ERRADO","com":"A Lei 12.683/2012 alterou a Lei 9.613/98, eliminando o rol taxativo de crimes antecedentes. Desde 2012, qualquer infração penal (crime ou contravenção) pode ser antecedente da lavagem de dinheiro.","fund":"Lei 9.613/98, art. 1º (redação dada pela Lei 12.683/2012).","peg":"Antes de 2012: rol taxativo. Após 2012: qualquer infração penal."},{"n":20,"enun":"Nos crimes contra a ordem tributária (Lei 8.137/90), o tipo objetivo somente se consuma com o lançamento definitivo do crédito tributário, conforme entendimento sumulado do STF.","gab":"CERTO","com":"SV 24 STF (j. 02/12/2009): antes de constituído definitivamente o crédito tributário (lançamento definitivo), não há crime material contra a ordem tributária.","fund":"SV 24 STF; Lei 8.137/90, art. 1º.","peg":"Crime material tributário = só se consuma com lançamento definitivo (SV 24). Antes disso: sem crime."},{"n":21,"enun":"No ECA, o ato infracional praticado por adolescente de 17 anos pode ensejar a aplicação da medida socioeducativa de internação, ainda que sem violência ou grave ameaça, se o adolescente reiterou atos infracionais graves.","gab":"CERTO","com":"ECA, art. 122, III: internação cabível quando o adolescente descumprir reiteradamente outras medidas. STJ: reiteração de atos infracionais graves (mesmo sem violência) pode justificar internação.","fund":"ECA, art. 122, I (violência/grave ameaça), II (reincidência em ato grave), III (descumprimento reiterado)."},{"n":22,"enun":"O sujeito ativo do crime de peculato (art. 312 CP) pode ser qualquer pessoa, desde que aja em conjunto com funcionário público.","gab":"ERRADO","com":"O peculato é crime próprio: o sujeito ativo deve ser funcionário público. O particular que concorre (art. 30 CP) pode ser coautor/partícipe, mas o crime só existe se ao menos um dos agentes for funcionário público.","fund":"CP, art. 312 (peculato — sujeito ativo: funcionário público); art. 30 (elementar comunicável).","peg":"Crime próprio de funcionário público — particular é partícipe/coautor via comunicabilidade do art. 30."},{"n":23,"enun":"O crime de corrupção passiva se consuma no momento em que o funcionário público solicita a vantagem indevida, independentemente de obtê-la.","gab":"CERTO","com":"Art. 317 CP: corrupção passiva — solicitar, receber ou aceitar promessa. O tipo é alternativo e misto. A simples solicitação já consuma o crime (crime formal).","fund":"CP, art. 317; STJ: crime formal — consuma-se com a solicitação/recebimento/aceitação da promessa."},{"n":24,"enun":"Nos crimes de abuso de autoridade (Lei 13.869/2019), exige-se para a configuração do tipo penal que o agente atue com dolo específico de prejudicar outrem ou beneficiar a si mesmo ou a terceiro, ou ainda por mero capricho ou satisfação pessoal.","gab":"CERTO","com":"Lei 13.869/19, art. 1º, §1º: elemento subjetivo especial — finalidade específica: prejudicar outrem, beneficiar a si ou terceiro, ou mero capricho/satisfação pessoal. Ausência → atipicidade.","fund":"Lei 13.869/19, art. 1º, §1º.","peg":"Dolo específico obrigatório — mero abuso sem a finalidade do §1º é atípico pela lei 13.869."}]},{"nome":"Direito Processual Penal e Legislação Processual Especial","comando":"No que concerne ao direito processual penal, às garantias processuais e à legislação processual especial, julgue os itens.","itens":[{"n":25,"enun":"O inquérito policial é peça informativa de natureza administrativa, inquisitória e sigilosa, podendo o indiciado ser privado do acesso aos autos mesmo após o encerramento das investigações.","gab":"ERRADO","com":"SV 14 STF: assegurado ao defensor, em qualquer fase da investigação ou processo, acesso amplo aos autos, às provas e diligências já documentadas — mesmo no IP sigiloso.","fund":"SV 14 STF; CPP, art. 20; Lei 8.906/94 (Estatuto OAB), art. 7º, XIV.","peg":"Sigilo do IP não impede acesso do defensor às provas já documentadas (SV 14)."},{"n":26,"enun":"A prisão em flagrante delito dispensa ordem judicial escrita, podendo qualquer do povo prender quem quer que seja encontrado em flagrante de crime.","gab":"CERTO","com":"CF, art. 5º, LXI: prisão só por flagrante ou por ordem judicial escrita. CPP, art. 301: qualquer pessoa pode prender quem está em flagrante; autoridade policial tem o dever de prender.","fund":"CF, art. 5º, LXI; CPP, art. 301."},{"n":27,"enun":"De acordo com o STF, a entrada forçada em domicílio, sem mandado judicial, pode ser realizada pela polícia quando houver fundadas razões, devendo ser justificada a posteriori.","gab":"CERTO","com":"STF Tema 280 / RE 603.616/RO (Pleno, 05/11/2015): entrada forçada em domicílio sem mandado é lícita quando há fundadas razões, a serem justificadas posteriormente.","fund":"STF Tema 280 (RE 603.616/RO, Gilmar Mendes, 05/11/2015); CF, art. 5º, XI.","jur_status":"OK"},{"n":28,"enun":"A busca pessoal pode ser realizada pela autoridade policial independentemente de fundada suspeita, bastando o interesse público na prevenção criminal.","gab":"ERRADO","com":"STJ RHC 158.580/BA (Schietti, 6ª T., 19/04/2022): a busca pessoal exige fundada suspeita prévia, objetiva e específica. Interesse genérico de prevenção não autoriza revistas indiscriminadas.","fund":"CPP, art. 240, §2º; STJ RHC 158.580/BA (Schietti, 6ª T., j. 19/04/2022).","peg":"Fundada suspeita prévia, objetiva e específica — não qualquer suspeita vaga.","jur_status":"OK"},{"n":29,"enun":"Segundo o STJ, o reconhecimento fotográfico de pessoa suspeita, realizado sem observância das formalidades do art. 226 do CPP, não pode, por si só, servir de fundamento para a condenação.","gab":"CERTO","com":"STJ HC 598.886/SC (Schietti, 6ª T., 27/10/2020): formalidades do art. 226 CPP são obrigatórias; reconhecimento viciado não sustenta condenação isoladamente.","fund":"CPP, art. 226; STJ HC 598.886/SC (j. 27/10/2020); STJ Tema 1258 (REsp 1.953.602-SP, j. 11/06/2025).","jur_status":"OK"},{"n":30,"enun":"O acordo de não persecução penal (ANPP), introduzido pela Lei 13.964/2019, pode ser proposto pelo Ministério Público ao investigado, desde que a pena mínima cominada ao crime seja inferior a 4 anos.","gab":"CERTO","com":"CPP, art. 28-A: ANPP cabível quando a pena mínima for inferior a 4 anos e o crime não tiver sido cometido com violência ou grave ameaça. Investigado confessa e cumpre condições.","fund":"CPP, art. 28-A (Lei 13.964/2019)."},{"n":31,"enun":"A execução provisória da pena, antes do trânsito em julgado da sentença penal condenatória, é inconstitucional conforme decidido pelo STF nas ADCs 43, 44 e 54.","gab":"CERTO","com":"STF ADCs 43/44/54 (Pleno, 07/11/2019): confirmado que a execução da pena exige o trânsito em julgado (art. 283 CPP e art. 5º, LVII CF). HC 126.292/2016 está superado.","fund":"CF, art. 5º, LVII; CPP, art. 283; STF ADCs 43/44/54 (07/11/2019).","peg":"HC 126.292/STF (execução após 2ª instância) está superado pelas ADCs 43/44/54."},{"n":32,"enun":"A colaboração premiada é meio de obtenção de prova que pode ser celebrada pelo Delegado de Polícia na fase de investigação, prescindindo de homologação judicial.","gab":"ERRADO","com":"A colaboração premiada (Lei 12.850/13, art. 4º, §6º) exige homologação judicial pelo juiz competente, que verificará sua regularidade, legalidade e voluntariedade. O Delegado pode propor, mas não dispensar a homologação.","fund":"Lei 12.850/13, art. 4º, §§4º e 6º; STF Pet 7.074 (homologação pelo STF no caso Lula Maranhão).","peg":"Homologação judicial é imprescindível — Delegado pode propor, não homologar."},{"n":33,"enun":"Nos termos da Lei de Organizações Criminosas (Lei 12.850/2013), organização criminosa é a associação de 4 ou mais pessoas estruturalmente ordenada e caracterizada pela divisão de tarefas, para obter vantagem de qualquer natureza, mediante a prática de infrações penais com penas máximas superiores a 4 anos ou de caráter transnacional.","gab":"CERTO","com":"Conceito literal do art. 1º, §1º da Lei 12.850/13. Pontos-chave: ≥ 4 pessoas, estruturalmente ordenada, divisão de tarefas, vantagem de qualquer natureza, infrações com pena máx. > 4 anos ou caráter transnacional.","fund":"Lei 12.850/13, art. 1º, §1º.","peg":"Pena MÁXIMA > 4 anos (não mínima). 4 ou mais pessoas (não 3)."},{"n":34,"enun":"O juiz das garantias, previsto nos arts. 3º-A a 3º-F do CPP (Lei 13.964/2019), está em plena vigência e é aplicado em todos os tribunais do país.","gab":"ERRADO","com":"O juiz das garantias tem previsão legal (Lei 13.964/2019), mas está com eficácia suspensa por liminares do STF nas ADIs 6298/6299/6300/6305 desde 2020. Não está em vigor na prática.","fund":"CPP, arts. 3º-A a 3º-F (Lei 13.964/2019); STF ADIs 6298/6299/6300/6305 (liminares suspendendo a eficácia).","peg":"Existe no CPP, mas eficácia suspensa por liminar do STF — não está em vigor."},{"n":35,"enun":"A prisão preventiva pode ser decretada de ofício pelo juiz durante a fase de investigação policial, independentemente de requerimento do Ministério Público ou da autoridade policial.","gab":"ERRADO","com":"Após a Lei 13.964/2019, o juiz não pode decretar prisão preventiva de ofício em nenhuma fase (nem investigação, nem processo). Exige requerimento do MP, Delegado (na investigação) ou do querelante/assistente (no processo).","fund":"CPP, art. 311 (redação dada pela Lei 13.964/2019).","peg":"Vedação de decretação de ofício foi introduzida pelo Pacote Anticrime (2019) — mudança relevante."},{"n":36,"enun":"A interceptação telefônica judicial autorizada (Lei 9.296/96) tem prazo de 15 dias, renovável por igual período, sem limite de renovações, desde que comprovada a indispensabilidade do meio de prova.","gab":"CERTO","com":"Lei 9.296/96, art. 5º: prazo de 15 dias, renovável por igual período (15 dias), sem limite expresso de renovações, desde que comprovada necessidade. STJ: prorrogações devem ser fundamentadas.","fund":"Lei 9.296/96, art. 5º; STJ: renovações devem ser devidamente motivadas."},{"n":37,"enun":"A prova ilícita pode ser utilizada no processo penal em favor do réu (prova ilícita pro reo), mesmo que tenha sido obtida por meio de conduta criminosa do acusado.","gab":"CERTO","com":"Prevalece na doutrina e jurisprudência que a prova ilícita pro reo é admitida, especialmente quando em jogo a liberdade do acusado. A vedação do art. 157 CPP visa proteger o réu, não condená-lo.","fund":"CPP, art. 157; CF, art. 5º, LVI. Doutrina (Ada Pellegrini Grinover, Eugênio Pacelli): admissão excepcional pro reo.","peg":"Pro reo é exceção admitida — a vedação do art. 157 não impede absolutamente."},{"n":38,"enun":"A teoria dos frutos da árvore envenenada (fruit of the poisonous tree) aplica-se no direito processual penal brasileiro, impondo a inadmissibilidade das provas obtidas por derivação de prova ilícita.","gab":"CERTO","com":"CPP, art. 157, §1º: provas derivadas das ilícitas também são inadmissíveis, salvo quando puderem ser obtidas por fonte independente ou quando houver nexo atenuado (purged taint doctrine).","fund":"CPP, art. 157, §§1º e 2º (Lei 11.690/2008).","peg":"Exceções: fonte independente (§1º) e nexo causalmente atenuado (§1º in fine)."},{"n":39,"enun":"O Ministério Público tem legitimidade prioritária para a execução da pena de multa, sendo a Fazenda Pública legitimada de forma subsidiária, conforme pacificado pelo STF na ADI 3.150.","gab":"CERTO","com":"STF ADI 3.150/DF (Pleno, 13/12/2018) + art. 51, §1º CP (Lei 13.964/2019): MP é legitimado prioritário para executar multa penal; Fazenda Pública tem legitimidade subsidiária. Súmula 521 STJ está superada.","fund":"STF ADI 3.150/DF (j. 13/12/2018); CP, art. 51, §1º; Súmula 521 STJ: SUPERADA.","peg":"Súmula 521 STJ (Fazenda exclusiva) está superada pela ADI 3.150 + Pacote Anticrime.","jur_status":"OK"},{"n":40,"enun":"O habeas corpus pode ser utilizado para trancar inquérito policial quando demonstrada a falta de justa causa para as investigações.","gab":"CERTO","com":"STJ e STF admitem HC para trancar IP quando manifesta a atipicidade da conduta, presença de causa excludente de punibilidade ou total ausência de indícios. Porém, o trancamento é medida excepcional.","fund":"CF, art. 5º, LXVIII; CPP, art. 647 e seguintes; STJ: HC para trancar IP é excepcional."},{"n":41,"enun":"A audiência de custódia deve ser realizada no prazo de 24 horas após a lavratura do auto de prisão em flagrante, podendo ser adiada por motivo de força maior.","gab":"CERTO","com":"Resolução CNJ 213/2015 e art. 310, caput, CPP (Lei 13.964/2019): apresentação à autoridade judicial no prazo de 24 horas. STF ADPF 347: audiência de custódia é direito fundamental, adiamento só por força maior.","fund":"CPP, art. 310 (Lei 13.964/2019); Resolução CNJ 213/2015; STF ADPF 347.","peg":"Prazo: 24 horas — não 48h. Adiamento só por força maior."},{"n":42,"enun":"A delação premiada de corréu, sem outros elementos de prova, é suficiente para fundamentar decreto condenatório.","gab":"ERRADO","com":"STJ e STF: a delação premiada (colaboração premiada) do corréu, por si só, não é suficiente para sustentar condenação. Exige corroboração por outros meios de prova.","fund":"Lei 12.850/13, art. 4º, §16: declarações do colaborador não se prestam, sozinhas, à condenação. STF RHC 147.063."},{"n":43,"enun":"A competência para julgamento dos crimes praticados por Delegado de Polícia do PCDF no exercício de suas funções é do Tribunal de Justiça do DF e Territórios (TJDFT).","gab":"ERRADO","com":"O TJDFT é organizado e mantido pela União. Delegados do PCDF são servidores federais (a PCDF é mantida pela União). Crimes funcionais de Delegados federais são julgados pelo TRF (em grau de prerrogativa de função, se previsto).","fund":"CF, art. 21, XIV; LOMAN; Regimento TJDFT. Nota: competência sujeita à análise caso a caso pela lei e pela CF.","peg":"PCDF é mantida pela União — a competência é federal, não estadual/distrital."},{"n":44,"enun":"O prazo para conclusão do inquérito policial no caso de réu preso é de 10 dias, improrrogável, e para réu solto é de 30 dias, prorrogável.","gab":"CERTO","com":"CPP, art. 10: réu preso = 10 dias (improrrogável pelo CPP comum); réu solto = 30 dias, prorrogável. Observação: a Lei de Drogas prevê prazo diferente (30 + 30 dias para preso).","fund":"CPP, art. 10; Lei 11.343/06, art. 51 (drogas: 30 dias para preso, prorrogável por mais 30).","peg":"Réu preso no CPP comum: 10 dias (Lei de Drogas tem prazo diferente)."},{"n":45,"enun":"O silêncio do investigado durante o interrogatório policial não pode ser interpretado em seu desfavor, garantindo-lhe a Constituição o direito ao não autoincriminação.","gab":"CERTO","com":"CF, art. 5º, LXIII: direito ao silêncio. Nemo tenetur se detegere — o silêncio não pode ser interpretado como confissão nem como prova contrária ao réu.","fund":"CF, art. 5º, LXIII; CPP, art. 186, parágrafo único (após Lei 10.792/2003)."},{"n":46,"enun":"O flagrante esperado, diferentemente do flagrante preparado, não configura crime impossível, sendo a prisão lícita e o fato típico.","gab":"CERTO","com":"Flagrante esperado: polícia aguarda o crime que o agente praticaria naturalmente — lícito. Flagrante preparado (SV 145 STF): a polícia induz o agente à prática do crime — crime impossível, prisão ilegal.","fund":"SV 145 STF; STJ distinção flagrante esperado × preparado.","peg":"Esperado (lícito) ≠ Preparado (crime impossível, induzido)."}]},{"nome":"Direito Constitucional e Legislação Complementar","comando":"Acerca de direito constitucional, controle de constitucionalidade e direitos fundamentais, julgue os itens.","itens":[{"n":47,"enun":"O princípio da máxima efetividade das normas constitucionais impõe que ao intérprete seja vedado dar à norma constitucional sentido que lhe subtraia eficácia.","gab":"CERTO","com":"Princípio hermenêutico constitucional: a norma constitucional deve ser interpretada de modo a otimizar sua eficácia, vedada interpretação que esvazie o preceito.","fund":"Doutrina constitucional; José Joaquim Gomes Canotilho; STF — uso frequente na hermenêutica constitucional."},{"n":48,"enun":"A ação de descumprimento de preceito fundamental (ADPF) tem natureza subsidiária, sendo cabível apenas quando não houver outro meio eficaz de sanar a lesão ao preceito fundamental.","gab":"CERTO","com":"Lei 9.882/99, art. 4º, §1º: a ADPF tem caráter subsidiário — só é admitida quando não existir outro instrumento processual constitucional apto a sanar a lesividade.","fund":"CF, art. 102, §1º; Lei 9.882/99, art. 4º, §1º.","peg":"Subsidiariedade é requisito expresso — ADPF não substitui ADI quando esta for cabível."},{"n":49,"enun":"No controle difuso de constitucionalidade, a decisão do STF que declara lei inconstitucional tem efeito erga omnes independentemente de resolução do Senado Federal.","gab":"ERRADO","com":"No controle difuso, a decisão do STF tem efeito inter partes. Para eficácia erga omnes, é necessária comunicação ao Senado Federal (CF, art. 52, X), que pode suspender a execução da lei. STF vem discutindo a 'mutação constitucional' do art. 52, X (Rcl 4335), mas não está consolidada.","fund":"CF, art. 52, X; STF Rcl 4335/AC (teoria da abstrativização — ainda controvertida).","peg":"No difuso, efeito é inter partes — Senado suspende para efeito erga omnes (regra ainda vigente)."},{"n":50,"enun":"A emenda constitucional pode restringir direitos e garantias individuais desde que não os abolicionize, pois apenas a abolição total configura violação à cláusula pétrea.","gab":"ERRADO","com":"STF: cláusula pétrea protege o núcleo essencial dos direitos fundamentais — não apenas veda a abolição total, mas também a redução substancial (erosão do núcleo). Emendas que esvaziam o conteúdo essencial violam a cláusula.","fund":"CF, art. 60, §4º, IV; STF ADI 3685 e doutrina do núcleo essencial.","peg":"Cláusula pétrea protege o núcleo — não exige abolição total para ser violada."},{"n":51,"enun":"O mandado de segurança coletivo pode ser impetrado por partido político com representação no Congresso Nacional em defesa de interesses de seus membros ou de toda a coletividade.","gab":"ERRADO","com":"CF, art. 5º, LXX: MS coletivo por partido político é para defender seus membros (não a coletividade em geral). Entidades de classe e associações podem defender interesses dos filiados.","fund":"CF, art. 5º, LXX, 'a' (partido político — representação no CN); 'b' (organização sindical, entidade de classe, associação — em defesa de membros).","peg":"Partido político: MS coletivo para seus membros/filiados, não para toda a coletividade."},{"n":52,"enun":"A imunidade parlamentar material (inviolabilidade) dos deputados federais e senadores se estende a opiniões, palavras e votos proferidos fora do mandato, desde que conexos à função parlamentar.","gab":"ERRADO","com":"A imunidade material protege opiniões/palavras/votos proferidos no exercício do mandato e conexos à função parlamentar. Não há extensão a período fora do mandato. Após a extinção do mandato, a imunidade não persiste.","fund":"CF, art. 53, caput; STF: imunidade material é restrita ao exercício do mandato.","peg":"Imunidade material: mandato ativo + nexo com função. Extinto o mandato = sem imunidade."},{"n":53,"enun":"Segundo o STF, os tratados internacionais de direitos humanos aprovados com o quórum especial (art. 5º, §3º, CF) têm status de emenda constitucional; os demais, aprovados pelo rito ordinário, têm status supralegal.","gab":"CERTO","com":"STF RE 466.343 (Pleno, 03/12/2008): tratados DH aprovados pelo rito do art. 5º, §3º = EC; demais tratados DH = status supralegal (abaixo da CF, acima das leis).","fund":"CF, art. 5º, §§2º e 3º; STF RE 466.343/SP (Peluso, Pleno, 03/12/2008).","jur_status":"OK"},{"n":54,"enun":"A proibição de retrocesso social (effet cliquet) é princípio constitucional que impede o legislador de reduzir nível de proteção já conquistado em matéria de direitos sociais.","gab":"CERTO","com":"Princípio implícito reconhecido pelo STF: o legislador não pode regredir em conquistas sociais consolidadas sem justificativa proporcional. Limita o legislador infraconstitucional.","fund":"CF, art. 5º, §2º (princípios implícitos); doutrina (Canotilho); STF: reconhecimento como limitação ao legislador ordinário."},{"n":55,"enun":"O princípio da separação dos poderes impede o controle judicial de políticas públicas, que constitui atividade exclusiva do Poder Executivo.","gab":"ERRADO","com":"STF reconhece a possibilidade de controle judicial de políticas públicas quando o mínimo existencial está em jogo ou quando há omissão inconstitucional do Executivo/Legislativo. ADPF 347: reconhecida intervenção do STF para garantir direitos dos presos.","fund":"CF, arts. 2º e 102; STF ADPF 347 (estado de coisas inconstitucional); STA 175 (fornecimento de medicamento).","peg":"Controle judicial é possível, especialmente para garantir mínimo existencial."},{"n":56,"enun":"A ação popular pode ser proposta por qualquer cidadão (eleitor) para anular ato lesivo ao patrimônio público ou de entidade de que o Estado participe.","gab":"CERTO","com":"CF, art. 5º, LXXIII: ação popular — legitimidade: cidadão (eleitor). Objeto: anular ato lesivo ao patrimônio público, moralidade administrativa, meio ambiente e patrimônio histórico-cultural.","fund":"CF, art. 5º, LXXIII; Lei 4.717/65."},{"n":57,"enun":"O STF reconheceu a constitucionalidade do Conselho Nacional de Justiça (CNJ), por entender que a autonomia do Poder Judiciário não é absoluta e que o CNJ representa órgão de controle administrativo interno.","gab":"CERTO","com":"STF ADI 3.367/DF (Peluso, Pleno, 13/04/2005): CNJ é constitucional. A criação de órgão de controle externo-administrativo do Judiciário não viola a separação dos poderes.","fund":"STF ADI 3.367/DF (Peluso, Pleno, j. 13/04/2005); CF, art. 103-B.","jur_status":"OK"},{"n":58,"enun":"O estado de sítio pode ser decretado pelo Presidente da República, após autorização do Congresso Nacional, nas hipóteses de comoção grave de repercussão nacional ou ocorrência de fatos que comprovem eficácia de medida tomada durante o estado de defesa.","gab":"CERTO","com":"CF, art. 137, I: comoção grave de repercussão nacional. Art. 137, II: declaração de estado de guerra ou resposta a agressão armada estrangeira. Observação: a hipótese do art. 137, I inclui 'ineficácia de medida do estado de defesa'.","fund":"CF, arts. 136 (estado de defesa) e 137 (estado de sítio).","peg":"Estado de sítio exige autorização do CN (não apenas comunicação posterior, como no estado de defesa)."},{"n":59,"enun":"O princípio da isonomia, previsto no art. 5º, caput, da CF, permite tratamento diferenciado entre pessoas em situações distintas, desde que haja fundamentação racional e proporcional para a distinção.","gab":"CERTO","com":"Igualdade material (e não apenas formal): tratar igualmente os iguais e desigualmente os desiguais, na medida da desigualdade. Discriminações positivas (cotas, acessibilidade) são constitucionais.","fund":"CF, art. 5º, caput; STF: igualdade material + proporcionalidade."},{"n":60,"enun":"A vedação ao uso de algemas, salvo em casos de resistência ou fundado receio de fuga ou perigo à integridade física, está prevista em Súmula Vinculante do STF e exige justificativa escrita da autoridade.","gab":"CERTO","com":"SV 11 STF: uso de algemas só é lícito em caso de resistência, fundado receio de fuga ou perigo à integridade física própria ou alheia — por parte do preso ou de terceiros, justificado por escrito.","fund":"SV 11 STF."},{"n":61,"enun":"A competência do STF para processar e julgar, originariamente, os membros do Congresso Nacional em infrações penais comuns é irrestrita, abrangendo todos os crimes cometidos por eles, ainda que sem nexo com o mandato.","gab":"CERTO","com":"CF, art. 102, I, 'b': STF processa e julga Deputados Federais e Senadores por infrações penais comuns — a competência abrange qualquer crime, não exige nexo com o mandato. Difere da imunidade material (que exige nexo).","fund":"CF, art. 102, I, 'b'; STF: foro por prerrogativa de função abrange todos os crimes cometidos durante o exercício do mandato.","peg":"Distinção: imunidade material (nexo obrigatório) × foro por prerrogativa (qualquer crime durante o mandato)."},{"n":62,"enun":"As normas constitucionais de eficácia limitada produzem efeitos jurídicos imediatos no plano constitucional, mas dependem de lei integradora para produzirem efeitos plenos no plano infraconstitucional.","gab":"CERTO","com":"Teoria de José Afonso da Silva: normas de eficácia limitada (programáticas e de princípio institutivo) têm aplicabilidade mediata; produzem efeitos mínimos (ex.: revogam leis anteriores incompatíveis) mas precisam de lei para plena eficácia.","fund":"Doutrina de José Afonso da Silva; STF — reconhece efeito negativo das normas programáticas."},{"n":63,"enun":"A intervenção federal nos Estados, prevista na CF, pode ser decretada pelo Presidente da República de ofício para pôr fim a grave comprometimento da ordem pública.","gab":"CERTO","com":"CF, art. 34, III e 36, I: para pôr fim a grave comprometimento da ordem pública, o PR pode decretar intervenção de ofício (espontaneamente), sem necessidade de solicitação.","fund":"CF, arts. 34, III e 36, I (decreto de ofício pelo PR).","peg":"Em algumas hipóteses, a intervenção exige solicitação do Governador ou requisição do STJ/STF; na 'ordem pública', o PR age de ofício."},{"n":64,"enun":"A cláusula de reserva de plenário (full bench) exige que a declaração de inconstitucionalidade de lei ou ato normativo pelo Tribunal seja feita pelo voto da maioria absoluta de seus membros.","gab":"CERTO","com":"CF, art. 97 e SV 10 STF: tribunais só podem declarar inconstitucionalidade de lei ou ato normativo pela maioria absoluta dos membros do pleno ou órgão especial.","fund":"CF, art. 97; SV 10 STF."}]},{"nome":"Direito Administrativo e Legislação Administrativa Complementar","comando":"No que se refere ao direito administrativo, atos, agentes e responsabilidade civil do Estado, julgue os itens.","itens":[{"n":65,"enun":"O ato administrativo discricionário, ao contrário do vinculado, não pode ser controlado pelo Poder Judiciário em nenhuma hipótese, por constituir âmbito de reserva da Administração.","gab":"ERRADO","com":"O ato discricionário pode ser controlado pelo Judiciário quanto à legalidade, moralidade, proporcionalidade e razoabilidade. O Judiciário não substitui o mérito administrativo (conveniência e oportunidade), mas controla os limites externos.","fund":"CF, art. 5º, XXXV; STF e STJ: controle de juridicidade abrange legalidade e princípios (moralidade, proporcionalidade)."},{"n":66,"enun":"A teoria do órgão (Teoria da Imputação Volitiva), elaborada por Otto von Gierke e desenvolvida por Jellinek, resolve o problema da representação do Estado ao afirmar que a vontade do agente público é imputada diretamente ao ente estatal.","gab":"CERTO","com":"Teoria do órgão: o agente público não representa o Estado (teoria da representação) — ele é parte do Estado, e sua vontade é imputada diretamente ao ente. Assim, a relação é orgânica, não de representação.","fund":"Doutrina de Direito Administrativo (Di Pietro, Hely Lopes Meirelles); teoria do órgão como fundamento da responsabilidade estatal."},{"n":67,"enun":"A responsabilidade civil extracontratual do Estado pelos danos causados por seus agentes é objetiva, fundada na teoria do risco administrativo, admitindo excludentes como a culpa exclusiva da vítima.","gab":"CERTO","com":"CF, art. 37, §6º: responsabilidade objetiva (risco administrativo) — não exige culpa do agente; basta dano + nexo causal. Admite excludentes: culpa exclusiva da vítima, força maior, caso fortuito externo.","fund":"CF, art. 37, §6º; STF RE 591.874 (Lewandowski, Pleno, 26/08/2009): resp. objetiva de concessionária por dano a não-usuário.","peg":"Risco administrativo ≠ risco integral — admite excludentes."},{"n":68,"enun":"A concessionária de serviço público responde objetivamente pelos danos causados tanto a usuários quanto a não-usuários do serviço.","gab":"CERTO","com":"STF RE 591.874/MS (Lewandowski, Pleno, 26/08/2009): concessionárias respondem objetivamente perante usuários e não-usuários. O art. 37, §6º, CF abrange ambos.","fund":"STF RE 591.874/MS (Pleno, 26/08/2009).","jur_status":"OK"},{"n":69,"enun":"O poder hierárquico da Administração Pública permite que o superior imponha, de forma genérica, normas de conduta a seus subordinados, bem como avoque atribuições delegadas e aplique sanções disciplinares.","gab":"CERTO","com":"Poder hierárquico: subordinação, vigilância, avocação, delegação e aplicação de sanções disciplinares. Permite ao superior dar ordens, fiscalizar, avocar e punir.","fund":"Lei 9.784/99; doutrina (Hely Lopes Meirelles, Di Pietro)."},{"n":70,"enun":"No direito brasileiro, o servidor público estável somente pode ser demitido por sentença judicial transitada em julgado, sendo vedada a demissão por processo administrativo disciplinar.","gab":"ERRADO","com":"CF, art. 41, §1º: a perda do cargo do servidor estável depende de sentença judicial transitada em julgado, processo administrativo (com ampla defesa), ou procedimento de avaliação periódica de desempenho (EC 19/98). Demissão por PAD é constitucionalmente prevista.","fund":"CF, art. 41, §1º, I, II e III; Lei 8.112/90, art. 127 (demissão como penalidade).","peg":"PAD com ampla defesa também pode levar à demissão de estável — não exige sentença judicial."},{"n":71,"enun":"A Administração Pública pode anular seus próprios atos quando eivados de ilegalidade, e revogar os atos discricionários por razões de conveniência e oportunidade, observada a decadência.","gab":"CERTO","com":"Súmula 473 STF: Administração pode anular (atos ilegais) ou revogar (atos discricionários — conveniência e oportunidade), desde que não lesione direitos adquiridos. Decadência administrativa: 5 anos (Lei 9.784/99, art. 54).","fund":"Súmula 473 STF; Lei 9.784/99, arts. 53 e 54.","jur_status":"PENDENTE"},{"n":72,"enun":"A improbidade administrativa prevista na Lei 8.429/92, com as alterações da Lei 14.230/21, somente pode ser cometida com dolo específico, sendo afastada a modalidade culposa.","gab":"CERTO","com":"Lei 14.230/2021 alterou substancialmente a Lei 8.429/92: passou a exigir dolo específico para todos os atos de improbidade. A modalidade culposa (que existia para dano ao erário) foi eliminada.","fund":"Lei 8.429/92, art. 1º, §1º (redação dada pela Lei 14.230/2021).","peg":"Antes de 2021: culpa admitida para dano ao erário. Após Lei 14.230/21: só dolo específico."},{"n":73,"enun":"No regime das licitações (Lei 14.133/2021), a modalidade pregão é adequada para a contratação de bens e serviços comuns, cujo padrão de desempenho possa ser definido objetivamente.","gab":"CERTO","com":"Lei 14.133/2021, art. 6º, XLI e art. 29: pregão para bens e serviços comuns (padrão objetivo). Diferencia-se da concorrência, usada para contratos de maior complexidade.","fund":"Lei 14.133/2021, arts. 6º, XLI, 28, V e 29."},{"n":74,"enun":"O princípio da autotutela administrativa permite que a Administração revise seus atos ilegais independentemente de provocação do Poder Judiciário.","gab":"CERTO","com":"Súmula 346 STF: a Administração pode declarar a nulidade de seus próprios atos. Súmula 473 STF: pode anular (ilegalidade) ou revogar (oportunidade/conveniência), preservando direitos adquiridos.","fund":"Súmulas 346 e 473 STF; Lei 9.784/99, art. 53."},{"n":75,"enun":"O ato administrativo praticado por agente de fato (funcionário irregularmente investido no cargo) é nulo de pleno direito, não produzindo efeitos em nenhuma hipótese.","gab":"ERRADO","com":"Teoria do funcionário de fato (agente putativo): os atos praticados são válidos em relação a terceiros de boa-fé, para preservar a segurança jurídica e a continuidade do serviço público. A nulidade da investidura não contamina os atos.","fund":"Doutrina de Hely Lopes Meirelles, Di Pietro; STJ: teoria da aparência — atos do agente de fato são válidos perante terceiros de boa-fé.","peg":"Agente de fato: atos válidos para terceiros de boa-fé pela teoria da aparência."},{"n":76,"enun":"O contrato administrativo, diferentemente do contrato privado, admite a alteração unilateral pela Administração (cláusulas exorbitantes), sendo vedada a alteração consensual.","gab":"ERRADO","com":"O contrato administrativo admite tanto a alteração unilateral (cláusulas exorbitantes — poder de modificação) quanto a alteração consensual (bilateral), desde que não prejudique a equação econômico-financeira. Ambas são possíveis.","fund":"Lei 14.133/2021, arts. 124 a 136 (alterações contratuais).","peg":"Alteração unilateral não exclui a consensual — equívoco comum."},{"n":77,"enun":"A decadência administrativa para anulação de atos administrativos ilegais favoráveis ao administrado é de 5 anos, não correndo em caso de má-fé.","gab":"CERTO","com":"Lei 9.784/99, art. 54: prazo decadencial de 5 anos para anulação de atos favoráveis ao particular, desde que praticados de boa-fé. Má-fé: o prazo decadencial não corre.","fund":"Lei 9.784/99, art. 54; STJ: má-fé afasta a proteção decadencial.","peg":"Decadência só protege o particular de boa-fé — má-fé não gera proteção."},{"n":78,"enun":"A Administração Pública direta, autárquica e fundacional sujeita-se ao dever de licitar, enquanto as empresas públicas e sociedades de economia mista que exploram atividade econômica ficam dispensadas de licitação.","gab":"ERRADO","com":"As empresas públicas e sociedades de economia mista também devem licitar, mas seguem regime próprio (Lei 13.303/2016 — Estatuto das Estatais). Há hipóteses de dispensa e inexigibilidade específicas.","fund":"CF, art. 173, §1º, III; Lei 13.303/2016 (Estatuto das Estatais).","peg":"Estatais: regime próprio de licitação (Lei 13.303), não dispensa total."},{"n":79,"enun":"O ato administrativo tem como atributos a presunção de legitimidade, a autoexecutoriedade, a imperatividade e a tipicidade, sendo a autoexecutoriedade presente em todos os atos administrativos.","gab":"ERRADO","com":"Autoexecutoriedade NÃO está presente em todos os atos administrativos. Está presente em situações de urgência ou quando prevista em lei. Ex.: multa precisa de execução judicial (cobrança) — não é autoexecutável na cobrança.","fund":"Doutrina (Di Pietro, Hely Lopes); atributos: presunção de legitimidade (presente em todos), imperatividade, autoexecutoriedade (não universal), tipicidade.","peg":"Autoexecutoriedade não é atributo universal — cobrado com frequência."},{"n":80,"enun":"Os bens públicos de uso especial, como as repartições e edifícios públicos, são alienáveis mediante prévia desafetação.","gab":"CERTO","com":"CC, arts. 98 e 100: bens de uso especial são inalienáveis enquanto afetados. Após desafetação (declaração de dominicalidade), passam a ser alienáveis, seguindo as exigências legais.","fund":"CC, art. 100 (bens de uso especial: inalienáveis enquanto afetados); art. 101 (dominicais: alienáveis na forma da lei). Súmula 340 STF: bens públicos dominicais não admitem usucapião.","jur_status":"OK"}]},{"nome":"Medicina Legal · Direito Civil · Tributário · Ambiental · Empresarial · Conhecimentos DF","comando":"Acerca das disciplinas complementares do edital do Delegado PCDF 2026 — medicina legal, direito civil, tributário, ambiental, empresarial e conhecimentos DF —, julgue os itens.","itens":[{"n":81,"enun":"Na tanatologia forense, o algor mortis (esfriamento cadavérico) é o fenômeno mais preciso para estimar a hora da morte, sendo preferido pelos peritos em relação à rigidez cadavérica.","gab":"ERRADO","com":"O esfriamento é o mais VARIÁVEL dos fenômenos — dependente de temperatura ambiente, roupa, peso e ventilação. Não é o mais preciso. A rigidez e os livores (em conjunto) são mais utilizados nas primeiras horas.","fund":"Doutrina: Hélio Gomes, Croce — algor mortis: variável, não é parâmetro mais confiável para a cronotanatognose.","peg":"Esfriamento: útil mas variável — não é o mais preciso."},{"n":82,"enun":"Os livores cadavéricos surgem entre 2 e 3 horas após a morte e fixam-se definitivamente em 8 a 12 horas, tornando-se imóveis após esse período.","gab":"CERTO","com":"Surgimento: 2–3h. Mobilidade: até 8–12h. Fixação definitiva: a partir de 8–12h. Após a fixação, os livores não mudam de posição, o que indica tempo de morte superior a 8–12h.","fund":"Doutrina médico-legal (Croce, Hélio Gomes). CEBRASPE cobrou PC-AL 2023 e PC-RO 2022."},{"n":83,"enun":"A rigidez cadavérica (rigor mortis) progride no sentido caudo-cefálico, iniciando nos membros inferiores e progredindo em direção à cabeça, conforme a Lei de Nysten-Sommer.","gab":"ERRADO","com":"Lei de Nysten-Sommer: a rigidez progride no sentido CÉFALO-caudal (da cabeça para os pés) — não caudo-cefálico. Inicia entre 1–2h, atinge o máximo em 8–12h e desaparece em 24–48h.","fund":"Doutrina médico-legal — Lei de Nysten-Sommer: sentido céfalo-caudal. CEBRASPE cobrou PC-RO 2022.","peg":"Cefálo-caudal (cabeça → pés) — a inversão é a armadilha clássica."},{"n":84,"enun":"A putrefação cadavérica apresenta a mancha verde como primeiro sinal visível, surgindo tipicamente na fossa ilíaca direita em razão da proximidade com o ceco e sua flora bacteriana.","gab":"CERTO","com":"Primeira fase da putrefação: fase cromática — mancha verde abdominal na fossa ilíaca direita (ceco = maior concentração de flora bacteriana colônica). Em clima tropical: surge em 24–48h.","fund":"Doutrina médico-legal (Hélio Gomes, Croce). Tempo: 24–48h em clima tropical.","peg":"Fossa ilíaca DIREITA (não esquerda) — ponto cobrado por inversão."},{"n":85,"enun":"A saponificação cadavérica (adipocera) é fenômeno conservador construtivo que ocorre em ambientes secos e quentes, pela transformação da gordura corporal em substância gordurosa resistente à decomposição.","gab":"ERRADO","com":"A saponificação ocorre em ambientes ÚMIDOS e quentes — a gordura é convertida em ácidos graxos (substância semelhante ao sabão). Ambientes secos e quentes favorecem a MUMIFICAÇÃO (dessecação).","fund":"Doutrina médico-legal: saponificação (úmido+quente) × mumificação (seco+quente+ventilado).","peg":"Saponificação = úmido; mumificação = seco — inversão é a armadilha."},{"n":86,"enun":"Em medicina legal, a comoriência é presumida quando dois ou mais indivíduos falecem na mesma ocasião e não se pode determinar quem morreu primeiro, conforme previsto no Código Civil.","gab":"CERTO","com":"CC, art. 8º: comoriência — morte simultânea presumida. Tem relevância jurídica para fins de sucessão (herança). A cronotanatognose é usada para tentar estabelecer a premoriência (quem morreu antes).","fund":"CC, art. 8º; medicina legal: cronotanatognose como instrumento para afastar a comoriência."},{"n":87,"enun":"A entomologia forense é uma técnica auxiliar da cronotanatognose que permite estimar o intervalo pós-morte por meio da análise das espécies de insetos e do estágio de desenvolvimento da fauna cadavérica.","gab":"CERTO","com":"Entomologia forense: cada espécie coloniza o cadáver em estágio específico de decomposição. A análise do ciclo biológico dos insetos (moscas, besouros) permite estimar o tempo de morte, especialmente em casos avançados.","fund":"Doutrina médico-legal; método auxiliar de grande utilidade quando outros fenômenos já se completaram."},{"n":88,"enun":"O fenômeno cadavérico denominado corificação é a transformação do tecido cutâneo em substância semelhante ao couro, favorecida por terrenos calcários e ambientes secos.","gab":"CERTO","com":"Corificação: fenômeno conservador — a pele adquire aspecto de couro (corium = couro). Favorecido por terrenos calcários, argilosos e ambientes secos. Distingue-se da mumificação (dessecação total) e da saponificação.","fund":"Doutrina médico-legal (Hélio Gomes); fenômenos conservadores: mumificação, saponificação, corificação, calcificação."},{"n":89,"enun":"A morte encefálica, critério jurídico e médico para a morte, exige a ausência de atividade encefálica, incluindo o tronco cerebral, comprovada por exame complementar, conforme a Resolução CFM 2.173/2017.","gab":"CERTO","com":"Resolução CFM 2.173/2017: morte encefálica = cessação de atividade do encéfalo (córtex + tronco), irreversível, comprovada por exame clínico e complementar. Requisito para transplante de órgãos (Lei 9.434/97).","fund":"Resolução CFM 2.173/2017; Lei 9.434/97 (transplante de órgãos)."},{"n":90,"enun":"A determinação do sexo de restos cadavéricos esqueléticos é feita com maior precisão pela análise da pelve, sendo o osso ilíaco o mais dimórfico do esqueleto humano.","gab":"CERTO","com":"Antropologia forense: a pelve é o osso com maior dimorfismo sexual (95% de acerto). O crânio é o segundo mais dimórfico. O osso ilíaco tem características distintas em homens (mais estreito e profundo) e mulheres (mais largo e raso).","fund":"Medicina legal — antropologia forense; Croce; Hélio Gomes."},{"n":91,"enun":"A responsabilidade civil objetiva pelo risco, prevista no art. 927, parágrafo único, do Código Civil, exige a demonstração de culpa do agente para que surja o dever de indenizar.","gab":"ERRADO","com":"Responsabilidade objetiva: dispensa a culpa — basta dano + nexo causal + atividade de risco. O art. 927, §ú CC é a cláusula geral de responsabilidade objetiva pelo risco criado.","fund":"CC, art. 927, parágrafo único; STF Tema 932: constitucionalidade da responsabilidade objetiva em atividades de risco.","peg":"Objetiva = sem culpa. Essa é a regra do parágrafo único — cobrado pela inversão."},{"n":92,"enun":"A teoria do risco integral, aplicada pelo STJ aos danos ambientais, não admite excludentes de responsabilidade, como caso fortuito, força maior ou culpa exclusiva da vítima.","gab":"CERTO","com":"STJ (REsp 1.374.284 e orientação consolidada): dano ambiental = risco integral. Não se admite excludentes — o poluidor responde independentemente de culpa, caso fortuito ou força maior.","fund":"Lei 6.938/81, art. 14, §1º; STJ REsp 1.374.284; STJ Tema Repetitivo out/2023 (propter rem).","peg":"Risco integral (ambiental) ≠ risco criado (CC art. 927, §ú) — o primeiro não admite excludentes."},{"n":93,"enun":"O dano moral por inscrição indevida em cadastros de inadimplentes (SPC/Serasa) é presumido (in re ipsa), dispensando a prova do sofrimento concreto pelo inscrito.","gab":"CERTO","com":"STJ (Súmula 385 c/c orientação consolidada): inscrição indevida gera dano moral presumido. Atenção: Súmula 385 STJ exige que a primeira inscrição seja indevida; se houver outra legítima prévia, o dano deixa de ser presumido.","fund":"STJ Súmula 385; orientação consolidada sobre dano moral in re ipsa.","peg":"Se há outra inscrição legítima prévia: dano não é presumido (Súmula 385 STJ)."},{"n":94,"enun":"O Código Civil adota, como regra geral, a responsabilidade civil subjetiva, exigindo para o dever de indenizar a demonstração de ação ou omissão, culpa, dano e nexo causal.","gab":"CERTO","com":"CC, art. 186 (ato ilícito) + art. 927 (dever de indenizar): regra geral é a responsabilidade subjetiva. A exceção objetiva está no art. 927, parágrafo único (risco) e em normas especiais (CDC, Lei 6.938/81, etc.).","fund":"CC, arts. 186 e 927."},{"n":95,"enun":"A culpa concorrente da vítima exclui a responsabilidade civil do agente causador do dano.","gab":"ERRADO","com":"CC, art. 945: a culpa concorrente da vítima não exclui — reduz proporcionalmente a indenização. Somente a culpa EXCLUSIVA da vítima exclui o dever de indenizar do agente.","fund":"CC, art. 945 (culpa concorrente: redução proporcional); art. 936 e 938 (excludentes).","peg":"Concorrente = reduz. Exclusiva = exclui. Trocar os efeitos é a armadilha clássica."},{"n":96,"enun":"No Estado de Necessidade como excludente de responsabilidade civil, o agente que causar dano a terceiro inocente para salvar direito próprio ou alheio deverá indenizar o prejudicado, com direito de regresso contra o causador do perigo.","gab":"CERTO","com":"CC, art. 929: a vítima inocente é indenizada mesmo em estado de necessidade. O agente tem ação regressiva contra o causador do perigo (art. 930). Difere do estado de necessidade penal (que exclui o crime).","fund":"CC, arts. 929 e 930.","peg":"No cível: estado de necessidade não exclui o dever de indenizar a vítima inocente — diferente do penal."},{"n":97,"enun":"Segundo o STF (Tema 932), a responsabilidade civil do empregador por danos decorrentes de acidente de trabalho em atividades de risco é objetiva, com base no art. 927, parágrafo único, do Código Civil, sendo tal previsão constitucional.","gab":"CERTO","com":"STF Tema 932 (RE 828.040, Pleno): o art. 927, §ú CC é constitucional e permite a responsabilidade objetiva do empregador em atividades de risco, complementando o art. 7º, XXVIII CF (que prevê culpa como regra mínima).","fund":"STF Tema 932 (RE 828.040); CC, art. 927, §ú; CF, art. 7º, XXVIII."},{"n":98,"enun":"A prescrição da pretensão reparatória de danos materiais e morais decorrentes de ato ilícito civil, segundo a regra geral do Código Civil, é de 3 anos.","gab":"CERTO","com":"CC, art. 206, §3º, V: prescrição de 3 anos para reparação de danos civis (ato ilícito). Atenção: há prazos especiais para certas hipóteses (ex.: 5 anos para ação regressiva do Estado contra servidor — art. 37, §5º CF).","fund":"CC, art. 206, §3º, V."},{"n":99,"enun":"O princípio da anterioridade tributária plena (art. 150, III, 'b', CF) exige que a lei instituidora ou majoradora do tributo seja publicada no exercício financeiro anterior ao de sua cobrança, sem exceções.","gab":"ERRADO","com":"O art. 150, III, 'b' CF prevê a anterioridade anual, mas há exceções expressas: IPI, II, IE, IOF, empréstimos compulsórios de guerra/calamidade, imposto de guerra — estão fora da anterioridade anual.","fund":"CF, art. 150, III, 'b' e art. 150, §1º (exceções).","peg":"Exceções à anterioridade plena existem e são cobradas — II, IE, IPI, IOF, IEG, EC de guerra/calamidade."},{"n":100,"enun":"O lançamento tributário por declaração (misto) ocorre quando o contribuinte declara os fatos geradores e a autoridade fiscal efetua o lançamento com base nessas informações.","gab":"CERTO","com":"CTN, art. 147: lançamento por declaração — contribuinte declara, autoridade lança. Exemplos históricos: ITBI, ITCMD em alguns estados.","fund":"CTN, art. 147."},{"n":101,"enun":"A imunidade tributária recíproca veda que os entes federativos tributem uns aos outros com impostos, alcançando também as autarquias e fundações públicas instituídas e mantidas pelo Poder Público.","gab":"CERTO","com":"CF, art. 150, VI, 'a' e §2º: imunidade recíproca entre União, Estados, DF e Municípios, extensiva às autarquias e fundações públicas (quando vinculadas às finalidades essenciais). Não se estende a empresas públicas e SEM que exploram atividade econômica.","fund":"CF, art. 150, VI, 'a', §§2º e 3º.","peg":"Extensão às autarquias e fundações públicas — não se estende a EP/SEM que exploram atividade econômica."},{"n":102,"enun":"O ICMS incide sobre a prestação de serviços de comunicação iniciada no exterior e recebida no Brasil.","gab":"CERTO","com":"CF, art. 155, II: ICMS incide sobre prestações de serviços de comunicação, por qualquer meio, inclusive onerosas iniciadas no exterior. O estado destinatário tem competência para o ICMS-comunicação interestadual.","fund":"CF, art. 155, II; LC 87/96 (Lei Kandir)."},{"n":103,"enun":"A taxa pode ter como base de cálculo idêntica à dos impostos, sem qualquer vedação constitucional.","gab":"ERRADO","com":"CF, art. 145, §2º: as taxas não podem ter base de cálculo própria de impostos. SV 29 STF: pode haver elementos comuns na base de cálculo (ex.: área do imóvel para taxa de coleta de lixo), mas a identidade total é vedada.","fund":"CF, art. 145, §2º; SV 29 STF.","peg":"SV 29 STF: pode ter elemento coincidente na base; identidade total = vedada."},{"n":104,"enun":"A contribuição de melhoria, espécie tributária, tem como fato gerador a realização de obra pública da qual decorra valorização imobiliária, sendo limitada ao custo total da obra e ao valor individual da valorização.","gab":"CERTO","com":"CF, art. 145, III; CTN, arts. 81 e 82: contribuição de melhoria — limite global: custo da obra; limite individual: valorização do imóvel. Deve observar os dois limites.","fund":"CF, art. 145, III; CTN, arts. 81 e 82.","peg":"Dois limites: custo total da obra E valorização individual — deve respeitar ambos (o menor deles)."},{"n":105,"enun":"Segundo o STJ (Tema Repetitivo de out/2023), o adquirente de imóvel rural degradado responde pela obrigação de recomposição ambiental, ainda que não tenha causado o dano, em razão do caráter propter rem da obrigação.","gab":"CERTO","com":"STJ Tema Repetitivo (out/2023): obrigações ambientais têm natureza propter rem — seguem o bem. O adquirente responde pela recuperação mesmo sem ter causado a degradação.","fund":"STJ REsp 1.374.284; STJ Tema Repetitivo out/2023 (propter rem ambiental)."},{"n":106,"enun":"A responsabilidade civil ambiental é objetiva, fundada na teoria do risco integral, não admitindo excludentes como caso fortuito, força maior ou culpa exclusiva da vítima.","gab":"CERTO","com":"Lei 6.938/81, art. 14, §1º: responsabilidade objetiva ambiental. STJ: risco integral (sem excludentes). Diferente da responsabilidade objetiva do Estado (risco administrativo — admite excludentes).","fund":"Lei 6.938/81, art. 14, §1º; STJ REsp 1.374.284."},{"n":107,"enun":"A infração administrativa ambiental se consuma apenas pela ação — atos omissivos não configuram infração administrativa ambiental nos termos do Decreto 6.514/2008.","gab":"ERRADO","com":"Art. 70 da Lei 9.605/98 e art. 2º do Decreto 6.514/08: infração ambiental = ação OU omissão que viole regras de uso, gozo, promoção, proteção ou recuperação do meio ambiente.","fund":"Lei 9.605/98, art. 70; Decreto 6.514/2008, art. 2º.","peg":"Omissão também configura infração — a definição legal const TRAP_WORDS=[
  'tão somente','somente','apenas','unicamente','exclusivamente',

  'independentemente','independente de','mesmo que','ainda que',

  'imprescindível','indispensável','imediatamente','automaticamente',
  'de pleno direito','por si só','toda vez que','a qualquer tempo',
  'nunca','jamais','sempre','absolutamente','absoluta',
  'é vedado','são vedados','é proibido','são proibidos',
  'não pode','não podem','impossível','é impossível',
  'salvo','exceto','ressalvado','ressalvada',
  'expressamente','tacitamente'
].sort((a,b)=>b.length-a.length); // longer phrases first

function _escRx(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}
function highlightTraps(html){
  // html is already HTML-escaped plain text; safe to inject <mark>
  TRAP_WORDS.forEach(w=>{
    const re=new RegExp(`(?<![\\wÀ-ÿ])(${_escRx(w)})(?![\\wÀ-ÿ])`,'gi');
    html=html.replace(re,'<mark class="trap-word">$1</mark>');
  });
  return html;
}

function computeFilteredNs(type, disc){
  return S.flat.filter(x=>{
    const dm = !disc || x.discNome === disc;
    if(type==='erros')        return dm && S.respostas[x.n] && S.respostas[x.n]!==x.item.gab;
    if(type==='branco')       return dm && !S.respostas[x.n];
    if(type==='lac')          return dm && S.avaliacoes[x.n]==='lac';
    if(type==='dvd')          return dm && S.avaliacoes[x.n]==='dvd';
    if(type==='problematicos') return dm && (
      (S.respostas[x.n] && S.respostas[x.n]!==x.item.gab) ||
      !S.respostas[x.n] || S.avaliacoes[x.n]==='lac');
    if(type==='disc')         return x.discNome===disc;
    return false;
  }).map(x=>x.n);
}

function buildBlocoSummary(){
  const tot=S.flat.length;
  let ok=0,er=0,blank=0;
  S.flat.forEach(x=>{
    const r=S.respostas[x.n];
    if(r===x.item.gab) ok++;
    else if(r) er++;
    else blank++;
  });
  const disc={};
  S.bloco.disciplinas.forEach(d=>{
    let dok=0,der=0;
    d.itens.forEach(it=>{const r=S.respostas[it.n];if(r===it.gab)dok++;else if(r)der++;});
    const short=d.nome.replace('Direito ','').replace(/ e Legislação .*/,'');
    disc[short]={ok:dok,er:der,tot:d.itens.length};
  });
  const avCnt={dom:0,dvd:0,lac:0,leit:0};
  Object.values(S.avaliacoes).forEach(v=>{if(v in avCnt)avCnt[v]++;});
  return {
    blocoId:S.bloco.meta.id, data:S.bloco.meta.data||S.bloco.meta.id,
    titulo:S.bloco.meta.titulo||'',
    totalQuestoes:tot, acertos:ok, erros:er, branco:blank,
    saldo:ok-er, pct:tot>0?Math.round(ok/tot*100):0,
    tempo:S.totalMs, disciplinas:disc, avaliacoes:avCnt,
    finishedAt:Date.now()
  };
}
/* ── SM-2 SPACED REPETITION ──────────────────────────────── */
function computeSRQuality(h){
  // Mapeia desempenho do bloco para quality SM-2 (0–5)
  const pct=h.pct;
  const av=h.avaliacoes||{};
  const avTotal=(av.dom||0)+(av.dvd||0)+(av.lac||0)+(av.leit||0);
  // Base a partir do aproveitamento
  let q;
  if(pct>=90) q=5;
  else if(pct>=80) q=4;
  else if(pct>=70) q=3;
  else if(pct>=55) q=2;
  else if(pct>=40) q=1;
  else q=0;
  // Ajuste pela autoavaliação: muitas lacunas penaliza, muito domínio bonifica
  if(avTotal>0){
    const lacRatio=(av.lac||0)/avTotal;
    const domRatio=(av.dom||0)/avTotal;
    if(lacRatio>0.4 && q>1) q--;
    if(domRatio>0.6 && q<5) q++;
  }
  return Math.max(0,Math.min(5,q));
}
function applySM2(sr,quality){
  // sr = {interval, repetitions, ef} ou null (primeira vez)
  let {interval=1,repetitions=0,ef=2.5}=sr||{};
  if(quality<3){
    // Abaixo do limiar: recomeça intervalo mas mantém EF (penaliza menos)
    repetitions=0; interval=1;
  } else {
    if(repetitions===0) interval=1;
    else if(repetitions===1) interval=6;
    else interval=Math.round(interval*ef);
    ef=ef+(0.1-(5-quality)*(0.08+(5-quality)*0.02));
    ef=Math.max(1.3,Math.round(ef*100)/100);
    repetitions++;
  }
  const next=new Date();
  next.setDate(next.getDate()+interval);
  return {interval,repetitions,ef,nextReview:next.toISOString().slice(0,10)};
}
function srBadgeHtml(sr){
  if(!sr||!sr.nextReview) return '';
  const today=new Date().toISOString().slice(0,10);
  const diff=(new Date(sr.nextReview)-new Date(today))/(1000*60*60*24);
  if(diff<=0)  return `<span class="sr-badge due">⟳ Revisar hoje</span>`;
  if(diff<=2)  return `<span class="sr-badge soon">⟳ ${Math.round(diff)}d</span>`;
  return `<span class="sr-badge ok">⟳ ${fmtDateShort(sr.nextReview)}</span>`;
}

function saveToHistory(){
  try{
    let hist=loadHistory();
    const s=buildBlocoSummary();
    const idx=hist.findIndex(h=>h.blocoId===s.blocoId);
    // Preserva SR anterior (acumula repetições)
    const prevSR=idx>=0?(hist[idx].sr||null):null;
    const quality=computeSRQuality(s);
    s.sr=applySM2(prevSR,quality);
    s.srQuality=quality; // guarda para debug
    if(idx>=0) hist[idx]=s; else hist.push(s);
    if(hist.length>90) hist=hist.slice(-90);
    localStorage.setItem(HIST_KEY,JSON.stringify(hist));
  }catch(e){}
}
function loadHistory(){
  try{const r=localStorage.getItem(HIST_KEY);return r?JSON.parse(r):[]}catch(e){return [];}
}
function buildBarChart(entries){
  if(!entries.length) return '';
  const W=520,H=108,padB=17,padT=13,inner=H-padB-padT;
  const n=entries.length;
  const bW=Math.max(7,Math.min(26,Math.floor((W-16)/n)-3));
  const gap=(W-bW*n)/(n+1);
  let s=`<svg viewBox="0 0 ${W} ${H}" width="100%" xmlns="http://www.w3.org/2000/svg">`;
  // gridlines
  [50,70,90].forEach(pct=>{
    const gy=padT+Math.round((1-pct/100)*inner);
    s+=`<line x1="0" y1="${gy}" x2="${W}" y2="${gy}" stroke="var(--bord)" stroke-width="1"/>`;
    s+=`<text x="2" y="${gy-2}" font-size="7.5" fill="var(--txt3)">${pct}%</text>`;
  });
  // ref line 70%
  const ry=padT+Math.round(.3*inner);
  s+=`<line x1="0" y1="${ry}" x2="${W}" y2="${ry}" stroke="var(--green)" stroke-dasharray="4,3" opacity=".45" stroke-width="1.2"/>`;
  // bars
  entries.forEach((e,i)=>{
    const bH=Math.max(2,Math.round((e.pct/100)*inner));
    const x=gap+i*(bW+gap), y=H-padB-bH;
    const col=e.pct>=70?'var(--green)':e.pct>=50?'var(--acc)':'var(--red)';
    s+=`<rect x="${x.toFixed(1)}" y="${y}" width="${bW}" height="${bH}" rx="3" fill="${col}" opacity=".82"/>`;
    if(bH>16){s+=`<text x="${(x+bW/2).toFixed(1)}" y="${y+bH-4}" text-anchor="middle" font-size="8" fill="rgba(255,255,255,.8)" font-weight="700">${e.pct}%</text>`;}
    else{s+=`<text x="${(x+bW/2).toFixed(1)}" y="${y-2}" text-anchor="middle" font-size="7.5" fill="${col}">${e.pct}%</text>`;}
    const dl=fmtDateShort(e.data).slice(0,5);
    s+=`<text x="${(x+bW/2).toFixed(1)}" y="${H-2}" text-anchor="middle" font-size="7" fill="var(--txt3)">${dl}</text>`;
  });
  s+='</svg>';
  return s;
}

/* ── DATE FORMAT ─────────────────────────────────────────── */
function fmtDateShort(iso){
  // "2026-06-05" → "05.06.26"
  if(!iso) return '';
  const p=iso.split('-');
  if(p.length<3) return iso;
  return `${p[2]}.${p[1]}.${p[0].slice(2)}`;
}

/* ── TIMER ───────────────────────────────────────────────── */
function fmtTime(ms){
  const s=Math.floor(ms/1000), m=Math.floor(s/60), h=Math.floor(m/60);
  if(h>0) return `${h}h ${(m%60).toString().padStart(2,'0')}m`;
  return `${m}:${(s%60).toString().padStart(2,'0')}`;
}
function startTimer(){
  if(S.timerInterval) return;
  S.startedAt=Date.now();
  S.timerInterval=setInterval(()=>{
    const elapsed=S.totalMs+(Date.now()-S.startedAt);
    const el=document.getElementById('hdr-timer-txt');
    if(el) el.textContent=fmtTime(elapsed);
    const bpel=document.getElementById('bp-time');
    if(bpel) bpel.textContent=fmtTime(elapsed);
  },1000);
}
function stopTimer(){
  if(S.timerInterval){clearInterval(S.timerInterval);S.timerInterval=null;}
  if(S.startedAt){S.totalMs+=Date.now()-S.startedAt;S.startedAt=null;}
}

function togglePause(){
  if(S.finished) return;
  S.paused=!S.paused;
  const btn=document.getElementById('btn-pause');
  const overlay=document.getElementById('pause-overlay');
  if(S.paused){
    // Pausa: para timers, bloqueia tela
    stopTimer();
    if(QT.tickInterval){clearInterval(QT.tickInterval);QT.tickInterval=null;}
    if(QT.observer){QT.observer.disconnect();QT.observer=null;}
    QT.visible.clear();
    overlay.classList.remove('hidden');
    btn.textContent='▶';
    btn.classList.add('paused');
    btn.title='Retomar';
  } else {
    // Retoma: esconde overlay, reinicia timers
    overlay.classList.add('hidden');
    btn.textContent='⏸';
    btn.classList.remove('paused');
    btn.title='Pausar';
    // Reinicia apenas se estiver na prova ou no foco
    const inProva=!document.getElementById('sec-prova').classList.contains('hidden');
    const inFoco=FOCO.active;
    if(inProva||inFoco){
      startTimer();
      if(!QT.tickInterval&&!FOCO.active){
        // re-inicia observer e tick na prova normal
        initQTimer();
      } else if(FOCO.active){
        // no foco apenas o tick
        QT.lastTickAt=Date.now();
        QT.tickInterval=setInterval(_qtTick,500);
      }
    }
  }
}
