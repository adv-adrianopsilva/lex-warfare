axas cobradas pela União, pelos Estados e pelos Municípios em razão do exercício do poder de polícia ou pela utilização de serviço público específico e divisível devem observar o princípio da equivalência, vedando-se que seu valor ultrapasse o custo do serviço prestado.","gab":"CERTO","com":"A taxa tem como fato gerador o exercício do poder de polícia ou a utilização de serviço público específico e divisível (CF, art. 145, II; CTN, art. 77). O STF firmou que a base de cálculo da taxa deve ser vinculada ao custo do serviço; taxa com base de cálculo idêntica à de imposto é inconstitucional (SV 29). A equivalência não exige correspondência matemática exata, mas razoabilidade entre o valor cobrado e o custo do serviço.","fund":"LEI: \"CF, art. 145, II: 'A União, os Estados, o Distrito Federal e os Municípios poderão instituir os seguintes tributos: II - taxas, em razão do exercício do poder de polícia ou pela utilização, efetiva ou potencial, de serviços públicos específicos e divisíveis, prestados ao contribuinte ou postos a sua disposição.'\"\nJURISPRUDÊNCIA: \"STF, SV 29: 'É constitucional a adoção, no cálculo do valor de taxa, de um ou mais elementos da base de cálculo própria de determinado imposto, desde que não haja integral identidade entre uma base e outra.' — taxa e imposto não podem ter base de cálculo idêntica.\""},{"n":103,"enun":"O lançamento por homologação (autolançamento) ocorre quando o sujeito passivo apura e declara o tributo e antecipa seu pagamento sem prévio exame da autoridade fiscal, que homologa expressa ou tacitamente ao verificar a regularidade do ato.","gab":"CERTO","com":"O lançamento por homologação (CTN, art. 150) é a modalidade mais comum em tributos como IRPJ, CSLL, PIS, COFINS e ICMS. O contribuinte apura, declara e paga; a Fazenda tem 5 anos para homologar expressamente ou, sendo silente, ocorre a homologação tácita (decadência do direito de constituir o crédito). A ausência de pagamento antecipado descaracteriza essa modalidade.","fund":"LEI: \"CTN, art. 150: 'O lançamento por homologação, que ocorre quanto aos tributos cuja legislação atribua ao sujeito passivo o dever de antecipar o pagamento sem prévio exame da autoridade administrativa, opera-se pelo ato em que a referida autoridade, tomando conhecimento da atividade assim exercida pelo obrigado, expressamente a homologa.'\"\nJURISPRUDÊNCIA: \"STJ, EREsp 436.835/MG (Seção, 2003): a declaração sem pagamento não configura lançamento por homologação; o prazo para constituição do crédito se inicia da declaração (5+5 anos); o STJ fixou a 'tese dos 5+5 anos'.\"","jur_status":"PENDENTE"},{"n":104,"enun":"A contribuição de melhoria pode ser cobrada pelos entes federativos em decorrência de obras públicas que resultem em valorização imobiliária, sendo o valor cobrado limitado ao custo da obra e ao valor individual da valorização do imóvel beneficiado.","gab":"CERTO","com":"A contribuição de melhoria (CF, art. 145, III; CTN, arts. 81–82) tem como fato gerador a valorização imobiliária decorrente de obra pública. Seus limites são duplos: (a) limite global — não pode ultrapassar o custo total da obra; (b) limite individual — não pode ultrapassar o quantum de valorização do imóvel de cada contribuinte. Ambos os limites devem ser observados cumulativamente.","fund":"LEI: \"CTN, art. 81: 'A contribuição de melhoria cobrada pela União, pelos Estados, pelo Distrito Federal ou pelos Municípios, no âmbito de suas respectivas atribuições, é instituída para fazer face ao custo de obras públicas de que decorra valorização imobiliária, tendo como limite total a despesa realizada e como limite individual o acréscimo de valor que da obra resultar para cada imóvel beneficiado.'\"\nJURISPRUDÊNCIA: \"STJ, REsp 1.521.227/SP (2ª Turma, 2016): a contribuição de melhoria exige valorização imobiliária efetiva (não presumida); os dois limites (global e individual) são cumulativos; a ausência de valorização impede a cobrança.\"","jur_status":"PENDENTE"}]},{"nome":"Direito Ambiental e Legislação Complementar","comando":"Acerca de Direito Ambiental e responsabilidade por danos ao meio ambiente, julgue os itens a seguir.","itens":[{"n":105,"enun":"A responsabilidade civil por danos ambientais é objetiva e regida pela teoria do risco integral, segundo a qual nem mesmo a culpa exclusiva da vítima ou o caso fortuito e a força maior excluem o nexo causal e a obrigação de reparar o dano.","gab":"CERTO","com":"O STJ, no REsp 1.374.284, consolidou a adoção da teoria do risco integral para a responsabilidade civil ambiental: não há excludentes de nexo causal (caso fortuito, força maior, culpa exclusiva da vítima). O poluidor responde objetivamente e integralmente pelo dano, seja ele principal ou derivado. Fundamenta-se no princípio do poluidor-pagador (CF, art. 225, §3°; Lei 6.938/81).","fund":"LEI: \"Lei 6.938/81, art. 14, §1°: 'Sem obstar a aplicação das penalidades previstas neste artigo, é o poluidor obrigado, independentemente da existência de culpa, a indenizar ou reparar os danos causados ao meio ambiente e a terceiros, afetados por sua atividade.'\"\nJURISPRUDÊNCIA: \"STJ, REsp 1.374.284/MG (1ª Turma, j. 27/08/2013): responsabilidade civil ambiental é objetiva e adota a teoria do risco integral; caso fortuito, força maior e culpa exclusiva da vítima não excluem a obrigação de reparar.\"","jur_status":"OK"},{"n":106,"enun":"O crime ambiental, nos termos da Lei 9.605/98, pode ser imputado à pessoa jurídica, que responde penalmente de forma autônoma e independente da responsabilização de seus dirigentes pessoas físicas.","gab":"CERTO","com":"O STJ e o STF superaram a exigência de dupla imputação (PJ + pessoa física concomitantemente). Após o STJ (REsp 610.114) e o STF (RE 548.181), a PJ pode ser responsabilizada penalmente de forma autônoma, sem necessidade de identificação simultânea do gestor responsável. Fundamento: art. 225, §3° CF e art. 3° da Lei 9.605/98. A responsabilidade penal da PJ se soma à civil e administrativa.","fund":"LEI: \"Lei 9.605/98, art. 3°: 'As pessoas jurídicas serão responsabilizadas administrativa, civil e penalmente conforme o disposto nesta Lei, nos casos em que a infração seja cometida por decisão de seu representante legal ou contratual, ou de seu órgão colegiado, no interesse ou benefício da sua entidade.'\"\nJURISPRUDÊNCIA: \"STF, RE 548.181/PR (1ª Turma, j. 06/08/2013, Rel. Min. Rosa Weber): a PJ pode ser responsabilizada penalmente de forma autônoma, sem a necessidade de imputação concomitante da pessoa física; superação da teoria da dupla imputação.\"","jur_status":"OK"},{"n":107,"enun":"O princípio do poluidor-pagador previsto na Política Nacional do Meio Ambiente impõe ao empreendedor a internalização dos custos ambientais de sua atividade, abrangendo tanto medidas preventivas quanto a obrigação de reparar danos efetivamente causados.","gab":"CERTO","com":"O princípio do poluidor-pagador (PPP) tem dupla dimensão: (a) preventiva — o empreendedor arca com os custos de prevenção de danos antes que ocorram (licenciamento, EIA-RIMA, medidas mitigadoras); (b) repressiva — o poluidor internaliza os custos da reparação dos danos causados. O PPP não é 'licença para poluir mediante pagamento': a obrigação primária é de não poluir; o pagamento é consequência, não condição.","fund":"LEI: \"Lei 6.938/81, art. 4°, VII: 'A Política Nacional do Meio Ambiente visará: ... VII - à imposição, ao poluidor e ao predador, da obrigação de recuperar e/ou indenizar os danos causados e, ao usuário, da contribuição pela utilização de recursos ambientais com fins econômicos.'\"\nJURISPRUDÊNCIA: \"STJ, REsp 1.269.494/MG (2ª Turma, 2013): o PPP não é mera obrigação pecuniária; o poluidor tem obrigação primária de recuperar o dano in natura (recuperação ambiental) e subsidiária de indenizar; as obrigações podem ser cumulativas.\"","jur_status":"PENDENTE"},{"n":108,"enun":"O licenciamento ambiental de empreendimentos com impacto local é de competência exclusiva do Município, enquanto empreendimentos de impacto nacional ou regional competem ao IBAMA, conforme a LC 140/2011.","gab":"ERRADO","com":"O item simplifica indevidamente. A LC 140/2011 definiu a competência material de cada ente para o licenciamento ambiental, mas não de forma binária. Estados também têm competência licenciatória (art. 8° LC 140/2011). O IBAMA (federal) atua em empreendimentos de impacto nacional, transfronteiriço ou em unidades de conservação federais. Municípios têm competência para impacto local (art. 9°, XIV, a). Estados atuam nas demais hipóteses (art. 8°, XIV). A divisão é tríplice.","fund":"LEI: \"LC 140/2011, arts. 7° (União), 8° (Estados) e 9° (Municípios): cada ente tem competência própria para licenciamento ambiental conforme a abrangência e natureza do impacto do empreendimento.\"\nJURISPRUDÊNCIA: \"STF, RE 286.789/RS (1ª Turma, 2003): competência ambiental é concorrente (art. 23, VI, CF); a LC 140/2011 distribuiu as atribuições de forma pragmática; a conflito de competências resolve-se pela abrangência do impacto.\"","jur_status":"PENDENTE"},{"n":109,"enun":"A área de preservação permanente (APP) é protegida pelo Código Florestal (Lei 12.651/2012) independentemente de estar coberta por vegetação nativa ou degradada, vedando-se em regra supressão, exploração e intervenção nessa área.","gab":"CERTO","com":"As APPs têm proteção legal objetiva: são definidas pela localização (margens de rios, topos de morro, encostas íngremes, etc.), independentemente de estarem cobertas ou não por vegetação. Mesmo a APP degradada é protegida — incide obrigação de recuperação. As intervenções são excepcionais (utilidade pública, interesse social ou baixo impacto, art. 3° e ss. da Lei 12.651/2012). A distinção entre APP e Reserva Legal é frequente em provas.","fund":"LEI: \"Lei 12.651/2012, art. 4°: APPs definidas pela localização, não pela cobertura vegetal; art. 7°: 'A vegetação situada em Área de Preservação Permanente deverá ser mantida pelo proprietário da área, possuidor ou ocupante a qualquer título, pessoa física ou jurídica, de direito público ou privado.'\"\nJURISPRUDÊNCIA: \"STF, ADI 4.903/DF (Pleno, 2018): o Código Florestal de 2012 é constitucional em suas linhas gerais; as APPs continuam protegidas objetivamente; o STF rejeitou ação que pretendia ampliar a proteção para além do texto da lei.\"","jur_status":"PENDENTE"}]},{"nome":"Direito Empresarial e Legislação Complementar","comando":"Acerca de Direito Empresarial e institutos correlatos, julgue os itens a seguir.","itens":[{"n":110,"enun":"O empresário individual responde ilimitadamente com seu patrimônio pessoal pelas dívidas contraídas no exercício da atividade empresarial, salvo se tiver se constituído como Empresário Individual de Responsabilidade Limitada (EIRELI) ou como Sociedade Unipessoal.","gab":"CERTO","com":"O empresário individual comum não tem limitação de responsabilidade: responde com todo o seu patrimônio pessoal pelas obrigações empresariais. A EIRELI (antes da absorção pela Unipessoal) e a Sociedade Unipessoal são formas de limitação de responsabilidade. A Lei 14.195/2021 transformou as EIRELIs em Sociedades Limitadas Unipessoais. A ausência de separação patrimonial é o risco principal do empresário individual puro.","fund":"LEI: \"CC, art. 966: 'Considera-se empresário quem exerce profissionalmente atividade econômica organizada...' — sem limitação de responsabilidade. Lei 14.195/2021: absorção da EIRELI pela Sociedade Limitada Unipessoal, com responsabilidade limitada ao capital social.\"\nJURISPRUDÊNCIA: \"STJ, REsp 1.568.703/SP (4ª Turma, 2017): o empresário individual não goza da separação patrimonial de que gozam as pessoas jurídicas; responde com todos os seus bens pelo passivo empresarial.\"","jur_status":"PENDENTE"},{"n":111,"enun":"A falência é processo concursal que visa à liquidação do ativo do devedor insolvente para pagamento dos credores, observando-se a ordem de classificação dos créditos prevista na Lei 11.101/2005.","gab":"CERTO","com":"A falência (Lei 11.101/2005) organiza a liquidação patrimonial do devedor insolvente. A ordem de classificação dos créditos é: (a) créditos extraconcursais; (b) créditos trabalhistas e acidentários (limite de 150 salários-mínimos); (c) créditos com garantia real; (d) créditos tributários; (e) créditos com privilégio especial; (f) créditos com privilégio geral; (g) créditos quirografários; (h) multas; (i) créditos subordinados. Créditos extraconcursais têm prioridade sobre todos.","fund":"LEI: \"Lei 11.101/2005, art. 83: ordem de classificação dos créditos na falência; art. 84: créditos extraconcursais (pagos primeiro). A recuperação judicial (arts. 47 e ss.) visa à preservação da empresa.\"\nJURISPRUDÊNCIA: \"STJ, REsp 1.784.657/SP (3ª Turma, 2020): os créditos tributários têm preferência sobre quirografários mas são postergados em relação a trabalhistas e com garantia real; a ordem do art. 83 é rígida e não pode ser alterada por acordo entre credores.\"","jur_status":"PENDENTE"},{"n":112,"enun":"A recuperação judicial tem por objetivo viabilizar a superação da situação de crise econômico-financeira do devedor, a fim de permitir a manutenção da fonte produtora, do emprego dos trabalhadores e dos interesses dos credores, nos termos do art. 47 da Lei 11.101/2005.","gab":"CERTO","com":"O art. 47 da Lei 11.101/2005 enuncia o princípio da preservação da empresa como fundamento da recuperação judicial. Diferentemente da falência (liquidação), a recuperação judicial busca reestruturar o devedor em crise para que continue operando. O STJ tem ampliado a proteção à empresa em recuperação, vedando medidas que inviabilizem o plano de recuperação aprovado pelos credores.","fund":"LEI: \"Lei 11.101/2005, art. 47: 'A recuperação judicial tem por objetivo viabilizar a superação da situação de crise econômico-financeira do devedor, a fim de permitir a manutenção da fonte produtora, do emprego dos trabalhadores e dos interesses dos credores, promovendo, assim, a preservação da empresa, sua função social e o estímulo à atividade econômica.'\"\nJURISPRUDÊNCIA: \"STJ, REsp 1.729.484/SP (3ª Turma, 2019): o princípio da preservação da empresa fundamenta a extensão dos efeitos da recuperação; a penhora de bem essencial ao plano de recuperação pode ser suspensa em homenagem ao art. 47.\"","jur_status":"PENDENTE"},{"n":113,"enun":"O registro do empresário na Junta Comercial é constitutivo de sua personalidade jurídica, de modo que, sem o registro, não há como reconhecer juridicamente as obrigações contraídas em nome da empresa.","gab":"ERRADO","com":"O item está errado. O registro é condição para a regularidade do empresário, mas não para o reconhecimento de suas obrigações. A empresa irregular (não registrada) não tem personalidade jurídica, mas as obrigações por ela contraídas são válidas e exigíveis. O empresário irregular responde ilimitadamente e não pode usufruir de benefícios como a recuperação judicial. O CC, art. 967 impõe o registro, mas o art. 986 reconhece a validade dos atos da sociedade não registrada.","fund":"LEI: \"CC, art. 967: 'É obrigatória a inscrição do empresário no Registro Público de Empresas Mercantis da respectiva sede...' Art. 986: 'Enquanto não inscritos os atos constitutivos, reger-se-á a sociedade, exceto por ações em organização, pelo disposto neste Capítulo [sociedades não personificadas].' — obrigações são reconhecidas.\"\nJURISPRUDÊNCIA: \"STJ, REsp 1.536.130/MG (3ª Turma, 2016): a falta de registro impede o acesso a benefícios como a recuperação judicial e a falência, mas não invalida as obrigações contraídas; o credor pode exigi-las do empresário irregular.\"","jur_status":"PENDENTE"},{"n":114,"enun":"A desconsideração da personalidade jurídica exige ação própria ou incidente processual, não podendo ser declarada de ofício pelo juiz no bojo de processo de execução, segundo o entendimento do STJ após o CPC/2015.","gab":"CERTO","com":"O CPC/2015, arts. 133–137, regulamentou o incidente de desconsideração da personalidade jurídica: é necessário o incidente processual contraditório, com citação do sócio ou da PJ (na desconsideração inversa) para se defender antes de qualquer constrição patrimonial. A desconsideração de ofício pelo juiz no processo executivo, sem o incidente, viola o contraditório e o due process of law. O STJ consolidou essa vedação após o CPC/2015.","fund":"LEI: \"CPC/2015, art. 133: 'O incidente de desconsideração da personalidade jurídica será instaurado a pedido da parte ou do Ministério Público, quando lhe couber intervir no processo.' — impossibilidade de decretação ex officio.\"\nJURISPRUDÊNCIA: \"STJ, REsp 1.786.986/SP (4ª Turma, 2019): após o CPC/2015, a desconsideração exige o incidente contraditório (arts. 133-137 CPC); a decretação de ofício viola o princípio do contraditório e torna a constrição patrimonial nula.\"","jur_status":"PENDENTE"}]},{"nome":"Conhecimentos sobre o DF, PDPM e Primeiros Socorros","comando":"Acerca da organização do Distrito Federal, do Plano Distrital de Polícia e Segurança Pública (PDPM) e de primeiros socorros, julgue os itens a seguir.","itens":[{"n":115,"enun":"O Distrito Federal é vedado de ser dividido em Municípios, acumulando as competências tributárias e legislativas reservadas tanto aos Estados quanto aos Municípios, conforme dispõem o art. 32 e o art. 155 da CF.","gab":"CERTO","com":"O DF possui natureza jurídica única na Federação: a CF veda sua divisão em Municípios (art. 32, caput) e atribui ao DF as competências legislativas e tributárias dos Estados e dos Municípios (arts. 32, §1°; 147; 155 da CF). O DF institui ISS (tributo municipal), IPTU, ICMS, IPVA e outros tributos de ambos os entes. A CLDF exerce as funções de Assembleia Legislativa e de Câmara Municipal simultaneamente.","fund":"LEI: \"CF, art. 32, §1°: 'Ao Distrito Federal são atribuídas as competências legislativas reservadas aos Estados e Municípios.' CF, art. 147: 'Competem à União, em Território Federal, os impostos estaduais e, se o Território não for dividido em Municípios, cumulativamente, os impostos municipais; ao Distrito Federal cabem os impostos municipais.'\"\nJURISPRUDÊNCIA: \"STF, ADI 3.756/DF (Pleno, 2007): o DF tem natureza jurídica sui generis; acumula competências de Estado e Município; a proibição de criação de Municípios no DF é cláusula constitucional expressa e não pode ser alterada por EC.\"","jur_status":"PENDENTE"},{"n":116,"enun":"Nos termos da Lei Orgânica do Distrito Federal, o Governador do DF exerce funções análogas às de Governador de Estado, mas não acumula as atribuições de Prefeito Municipal, pois o DF não tem Municípios.","gab":"CERTO","com":"Em razão da vedação do art. 32 CF à criação de Municípios no DF, não há Prefeito — o Governador do DF é a única autoridade executiva do território, exercendo funções que, nos demais entes, seriam divididas entre o Governador (Estado) e o Prefeito (Município). O DF, portanto, não tem Câmara Municipal nem Prefeito; a Câmara Legislativa do DF exerce as funções legislativas estaduais e municipais.","fund":"LEI: \"LODF, art. 80: 'O Governador do Distrito Federal é o Chefe do Poder Executivo...' — exerce atribuições de Governador de Estado; inexistência de Municípios no DF implica acumulação das funções de chefe do executivo local.\"\nJURISPRUDÊNCIA: \"STF, ADI 3.756/DF: a CLDF exerce funções de Assembleia Legislativa e Câmara Municipal; o Governador do DF exerce as atribuições executivas tanto de âmbito estadual quanto municipal, dada a vedação de criação de Municípios.\"","jur_status":"PENDENTE"},{"n":117,"enun":"Em situação de parada cardiorrespiratória (PCR), o protocolo de Suporte Básico de Vida (BLS) recomenda iniciar as manobras com 30 compressões torácicas seguidas de 2 ventilações de resgate (relação 30:2), priorizando as compressões sobre as ventilações.","gab":"CERTO","com":"O protocolo BLS (Basic Life Support) da American Heart Association (AHA), adotado no Brasil pelo CFM, preconiza a sequência C-A-B: Circulation (compressões) → Airway (via aérea) → Breathing (ventilação). A relação é 30 compressões para 2 ventilações. As compressões devem ser fortes (≥5 cm de profundidade no adulto) e rápidas (100–120/min), com mínimas interrupções. A priorização das compressões sobre ventilações é alteração do protocolo mais recente (antes era A-B-C).","fund":"LEI: \"Resolução CFM 2.173/2017 (morte encefálica); Protocolo BLS AHA 2020: sequência C-A-B; 30 compressões torácicas antes de 2 ventilações; frequência de 100–120 compressões/min; profundidade ≥5 cm; retorno completo do tórax.\"\nJURISPRUDÊNCIA: \"STJ: as provas técnicas de primeiros socorros nos concursos policiais seguem os protocolos AHA/CFM vigentes; a desatualização do candidato quanto à sequência BLS é causa frequente de erro em provas.\""},{"n":118,"enun":"Em caso de vítima de choque anafilático, o socorrista treinado deve administrar epinefrina (adrenalina) intramuscular como primeira medida terapêutica, sendo esta a intervenção de maior eficácia para reverter a reação alérgica grave.","gab":"CERTO","com":"A epinefrina (adrenalina) intramuscular é o tratamento de primeira linha no choque anafilático: via intramuscular (preferida à endovenosa pelo socorrista não médico), face anterolateral da coxa, dose de 0,3–0,5 mg (adultos). O socorrista leigo com auto-injetor pode aplicar o EpiPen. No contexto de agente policial com treinamento de primeiros socorros, a adrenalina IM é o procedimento correto. A questão diferencia 'socorrista treinado' de 'socorrista leigo não treinado'.","fund":"LEI: \"Protocolo ACLS (Advanced Cardiovascular Life Support) AHA: epinefrina 1:1000, 0,3–0,5 mg IM na anafilaxia; Resolução CFM: manejo da anafilaxia em urgência — adrenalina IM é mandatória como 1ª linha.\"\nJURISPRUDÊNCIA: \"SBAI (Sociedade Brasileira de Alergia e Imunologia): guideline de anafilaxia — adrenalina IM como tratamento de primeira linha; atraso na aplicação é fator independente de risco de morte; demais medidas (antihistamínicos, corticoides) são adjuvantes.\""},{"n":   'independentemente','independente de','mesmo que','ainda que',

].sort((a,b)=>b.length-a.length); // longer phrases first

function _escRx(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}
function highlightTraps(html){
  // html is already HTML-escaped plain text; safe to inject <mark>
  TRAP_WORDS.forEach(w=>{
    const re=new RegExp(`(?<![\\wÀ-ÿ])(${_escRx(w)})(?![\\wÀ-ÿ])`,'gi');
    html=html.replace(re,'<mark class="trap-word">$1</mark>');
  });
  return html;
}

function computeFilteredNs(type, disc){
  return S.flat.filter(x=>{
    const dm = !disc || x.discNome === disc;
    if(type==='erros')        return dm && S.respostas[x.n] && S.respostas[x.n]!==x.item.gab;
    if(type==='branco')       return dm && !S.respostas[x.n];
    if(type==='lac')          return dm && S.avaliacoes[x.n]==='lac';
    if(type==='dvd')          return dm && S.avaliacoes[x.n]==='dvd';
    if(type==='problematicos') return dm && (
      (S.respostas[x.n] && S.respostas[x.n]!==x.item.gab) ||
      !S.respostas[x.n] || S.avaliacoes[x.n]==='lac');
    if(type==='disc')         return x.discNome===disc;
    return false;
  }).map(x=>x.n);
}

function buildBlocoSummary(){
  const tot=S.flat.length;
  let ok=0,er=0,blank=0;
  S.flat.forEach(x=>{
    const r=S.respostas[x.n];
    if(r===x.item.gab) ok++;
    else if(r) er++;
    else blank++;
  });
  const disc={};
  S.bloco.disciplinas.forEach(d=>{
    let dok=0,der=0;
    d.itens.forEach(it=>{const r=S.respostas[it.n];if(r===it.gab)dok++;else if(r)der++;});
    const short=d.nome.replace('Direito ','').replace(/ e Legislação .*/,'');
    disc[short]={ok:dok,er:der,tot:d.itens.length};
  });
  const avCnt={dom:0,dvd:0,lac:0,leit:0};
  Object.values(S.avaliacoes).forEach(v=>{if(v in avCnt)avCnt[v]++;});
  return {
    blocoId:S.bloco.meta.id, data:S.bloco.meta.data||S.bloco.meta.id,
    titulo:S.bloco.meta.titulo||'',
    totalQuestoes:tot, acertos:ok, erros:er, branco:blank,
    saldo:ok-er, pct:tot>0?Math.round(ok/tot*100):0,
    tempo:S.totalMs, disciplinas:disc, avaliacoes:avCnt,
    finishedAt:Date.now()
  };
}
/* ── SM-2 SPACED REPETITION ──────────────────────────────── */
function computeSRQuality(h){
  // Mapeia desempenho do bloco para quality SM-2 (0–5)
  const pct=h.pct;
  const av=h.avaliacoes||{};
  const avTotal=(av.dom||0)+(av.dvd||0)+(av.lac||0)+(av.leit||0);
  // Base a partir do aproveitamento
  let q;
  if(pct>=90) q=5;
  else if(pct>=80) q=4;
  else if(pct>=70) q=3;
  else if(pct>=55) q=2;
  else if(pct>=40) q=1;
  else q=0;
  // Ajuste pela autoavaliação: muitas lacunas penaliza, muito domínio bonifica
  if(avTotal>0){
    const lacRatio=(av.lac||0)/avTotal;
    const domRatio=(av.dom||0)/avTotal;
    if(lacRatio>0.4 && q>1) q--;
    if(domRatio>0.6 && q<5) q++;
  }
  return Math.max(0,Math.min(5,q));
}
function applySM2(sr,quality){
  // sr = {interval, repetitions, ef} ou null (primeira vez)
  let {interval=1,repetitions=0,ef=2.5}=sr||{};
  if(quality<3){
    // Abaixo do limiar: recomeça intervalo mas mantém EF (penaliza menos)
    repetitions=0; interval=1;
  } else {
    if(repetitions===0) interval=1;
    else if(repetitions===1) interval=6;
    else interval=Math.round(interval*ef);
    ef=ef+(0.1-(5-quality)*(0.08+(5-quality)*0.02));
    ef=Math.max(1.3,Math.round(ef*100)/100);
    repetitions++;
  }
  const next=new Date();
  next.setDate(next.getDate()+interval);
  return {interval,repetitions,ef,nextReview:next.toISOString().slice(0,10)};
}
function srBadgeHtml(sr){
  if(!sr||!sr.nextReview) return '';
  const today=new Date().toISOString().slice(0,10);
  const diff=(new Date(sr.nextReview)-new Date(today))/(1000*60*60*24);
  if(diff<=0)  return `<span class="sr-badge due">⟳ Revisar hoje</span>`;
  if(diff<=2)  return `<span class="sr-badge soon">⟳ ${Math.round(diff)}d</span>`;
  return `<span class="sr-badge ok">⟳ ${fmtDateShort(sr.nextReview)}</span>`;
}

function saveToHistory(){
  try{
    let hist=loadHistory();
    const s=buildBlocoSummary();
    const idx=hist.findIndex(h=>h.blocoId===s.blocoId);
    // Preserva SR anterior (acumula repetições)
    const prevSR=idx>=0?(hist[idx].sr||null):null;
    const quality=computeSRQuality(s);
    s.sr=applySM2(prevSR,quality);
    s.srQuality=quality; // guarda para debug
    if(idx>=0) hist[idx]=s; else hist.push(s);
    if(hist.length>90) hist=hist.slice(-90);
    localStorage.setItem(HIST_KEY,JSON.stringify(hist));
  }catch(e){}
}

function buildBarChart(entries){
  if(!entries.length) return '';
  const W=520,H=108,padB=17,padT=13,inner=H-padB-padT;
  const n=entries.length;
  const bW=Math.max(7,Math.min(26,Math.floor((W-16)/n)-3));
  const gap=(W-bW*n)/(n+1);
  let s=`<svg viewBox="0 0 ${W} ${H}" width="100%" xmlns="http://www.w3.org/2000/svg">`;
  // gridlines
  [50,70,90].forEach(pct=>{
    const gy=padT+Math.round((1-pct/100)*inner);
    s+=`<line x1="0" y1="${gy}" x2="${W}" y2="${gy}" stroke="var(--bord)" stroke-width="1"/>`;
    s+=`<text x="2" y="${gy-2}" font-size="7.5" fill="var(--txt3)">${pct}%</text>`;
  });
  // ref line 70%
  const ry=padT+Math.round(.3*inner);
  s+=`<line x1="0" y1="${ry}" x2="${W}" y2="${ry}" stroke="var(--green)" stroke-dasharray="4,3" opacity=".45" stroke-width="1.2"/>`;
  // bars
  entries.forEach((e,i)=>{
    const bH=Math.max(2,Math.round((e.pct/100)*inner));
    const x=gap+i*(bW+gap), y=H-padB-bH;
    const col=e.pct>=70?'var(--green)':e.pct>=50?'var(--acc)':'var(--red)';
    s+=`<rect x="${x.toFixed(1)}" y="${y}" width="${bW}" height="${bH}" rx="3" fill="${col}" opacity=".82"/>`;
    if(bH>16){s+=`<text x="${(x+bW/2).toFixed(1)}" y="${y+bH-4}" text-anchor="middle" font-size="8" fill="rgba(255,255,255,.8)" font-weight="700">${e.pct}%</text>`;}
    else{s+=`<text x="${(x+bW/2).toFixed(1)}" y="${y-2}" text-anchor="middle" font-size="7.5" fill="${col}">${e.pct}%</text>`;}
    const dl=fmtDateShort(e.data).slice(0,5);
    s+=`<text x="${(x+bW/2).toFixed(1)}" y="${H-2}" text-anchor="middle" font-size="7" fill="var(--txt3)">${dl}</text>`;
  });
  s+='</svg>';
  return s;
}

/* ── DATE FORMAT ─────────────────────────────────────────── */
function fmtDateShort(iso){
  // "2026-06-05" → "05.06.26"
  if(!iso) return '';
  const p=iso.split('-');
  if(p.length<3) return iso;
  return `${p[2]}.${p[1]}.${p[0].slice(2)}`;
}

/* ── TIMER ───────────────────────────────────────────────── */
function fmtTime(ms){
  const s=Math.floor(ms/1000), m=Math.floor(s/60), h=Math.floor(m/60);
  if(h>0) return `${h}h ${(m%60).toString().padStart(2,'0')}m`;
  return `${m}:${(s%60).toString().padStart(2,'0')}`;
}
function startTimer(){
  if(S.timerInterval) return;
  S.startedAt=Date.now();
  S.timerInterval=setInterval(()=>{
    const elapsed=S.totalMs+(Date.now()-S.startedAt);
    const el=document.getElementById('hdr-timer-txt');
    if(el) el.textContent=fmtTime(elapsed);
    const bpel=document.getElementById('bp-time');
    if(bpel) bpel.textContent=fmtTime(elapsed);
  },1000);
}
function stopTimer(){
  if(S.timerInterval){clearInterval(S.timerInterval);S.timerInterval=null;}
  if(S.startedAt){S.totalMs+=Date.now()-S.startedAt;S.startedAt=null;}
}

function togglePause(){
  if(S.finished) return;
  S.paused=!S.paused;
  const btn=document.getElementById('btn-pause');
  const overlay=document.getElementById('pause-overlay');
  if(S.paused){
    // Pausa: para timers, bloqueia tela
    stopTimer();
    if(QT.tickInterval){clearInterval(QT.tickInterval);QT.tickInterval=null;}
    if(QT.observer){QT.observer.disconnect();QT.observer=null;}
    QT.visible.clear();
    overlay.classList.remove('hidden');
    btn.textContent='▶';
    btn.classList.add('paused');
    btn.title='Retomar';
  } else {
    // Retoma: esconde overlay, reinicia timers
    overlay.classList.add('hidden');
    btn.textContent='⏸';
    btn.classList.remove('paused');
    btn.title='Pausar';
    // Reinicia apenas se estiver na prova ou no foco
    const inProva=!document.getElementById('sec-prova').classList.contains('hidden');
    const inFoco=FOCO.active;
    if(inProva||inFoco){
      startTimer();
      if(!QT.tickInterval&&!FOCO.active){
        // re-inicia observer e tick na prova normal
        initQTimer();
      } else if(FOCO.active){
        // no foco apenas o tick
        QT.lastTickAt=Date.now();
        QT.tickInterval=setInterval(_qtTick,500);
      }
    }
  }
}

/* ── RENDER PROVA ─────────────────────────────────────────── */
function renderProva(){
  document.getElementById('sec-cover').innerHTML='';
  document.getElementById('sec-placar').classList.add('hidden');
  document.getElementById('sec-prova').classList.remove('hidden');
  document.getElementById('hdr-timer').classList.remove('hidden');
  document.getElementById('hdr-chips').style.display='flex';
  document.getElementById('btn-gab-all').classList.remove('hidden');
  document.getElementById('fab').classList.remove('hidden');
  document.getElementById('bot-bar').classList.remove('hidden');

  const wrap=document.getElementById('prova-wrap');
  let html='';

  const dateLabel=fmtDateShort(S.bloco.meta.data);
  if(dateLabel){document.getElementById('hdr-date').textContent=dateLabel;}
  S.bloco.disciplinas.forEach((d,di)=>{
    const short=d.nome.replace('Direito ','').replace(' e Legislação Especial','').replace(' e Legislação Complementar','');
    html+=`<div class="disc-section" id="disc-${di}">
      <div class="disc-hdr"><h3>${short}</h3></div>
      <div class="comando">${d.comando}</div>
      ${d.itens.map(it=>renderQBlock(it,di)).join('')}
    </div>`;
  });
  wrap.innerHTML=html;

  updateProgress();
  renderQuickNav();
  updateGabAllBtn();
  startTimer();
  initQTimer();
  window.scrollTo(0,0);
}

function renderQBlock(it,di){
  const ans=S.respostas[it.n];
  const gabOn=S.gabsShown[it.n]||S.globalGabShown;
  const isRight=ans&&ans===it.gab;
  const isWrong=ans&&ans!==it.gab;

  const markC=ans==='CERTO'?` sel-c${gabOn?(isRight?' is-right':' is-wrong'):''}`:' ';
  const markE=ans==='ERRADO'?` sel-e${gabOn?(isRight?' is-right':' is-wrong'):''}`:' ';
  const disab=S.finished?'disabled':'';

  let enunHtml=it.enun;
  const m=enunHtml.match(/^(Situação hipotética[^.]*\.)(.*)/s);
  if(m) enunHtml=`<span class="situacao">${m[1].trim()}</span>${m[2].trim()}`;

  let statusHtml='';
  if(gabOn&&ans){
    statusHtml=`<span class="q-status">${isRight?'<span class="ok">✓ Acertou</span>':'<span class="er">✗ Errou</span>'}</span>`;
  }else if(gabOn&&!ans){
    statusHtml=`<span class="q-status" style="color:var(--txt3)">Em branco</span>`;
  }

  let feedbackHtml='';
  if(gabOn){
    const fundSafe=escHtml(it.fund||'');
    const fundCopy=(it.fund||'').replace(/\\/g,'\\\\').replace(/"/g,'&quot;').replace(/'/g,"\\'").replace(/\n/g,'\\n');
    const gabBadgeCls=ans?(isRight?'ok':'er'):'bk';
    const gabBadgeTxt=ans?(isRight?'Acertou ✓':'Errou ✗'):'Em branco';

    // ── Releitura Crítica (enunciado com traps destacados) ──
    const mR=it.enun.match(/^(Situação hipotética[^.]*\.)(.*)/s);
    let relitHtml;
    if(mR){
      relitHtml=`<span class="situacao">${highlightTraps(escHtml(mR[1].trim()))}</span>${highlightTraps(escHtml(mR[2].trim()))}`;
    } else {
      relitHtml=highlightTraps(escHtml(it.enun));
    }
    const trapCount=(relitHtml.match(/class="trap-word"/g)||[]).length;

    // ── Autoavaliação ──
    const av=S.avaliacoes[it.n];
    let avHtml;
    if(av){
      const avl=AV_LABELS[av];
      avHtml=`<div class="av-set">
        <span style="color:var(--txt3);font-size:11.5px;text-transform:uppercase;letter-spacing:.08em;font-weight:600">Autoavaliação:</span>
        <span class="av-chip ${avl.cls}">${avl.icon} ${avl.txt}</span>
        <button class="av-change" onclick="setAvaliacao(${it.n},null)">alterar</button>
      </div>`;
    } else {
      const btns=Object.entries(AV_LABELS).map(([k,v])=>
        `<button class="av-btn ${v.cls}" onclick="setAvaliacao(${it.n},'${k}')">${v.icon} ${v.txt}</button>`
      ).join('');
      avHtml=`<div class="avaliacao-row">
        <div class="avaliacao-lbl">Como você se saiu nessa questão?</div>
        ${btns}
      </div>`;
    }

    feedbackHtml=`<div class="q-feedback">
      <div class="gab-line">
        <span class="gab-label">Gabarito</span>
        <span class="gab-value">&nbsp;${it.gab}</span>
        <span class="gab-badge ${gabBadgeCls}">${gabBadgeTxt}</span>
      </div>
      ${avHtml}
      ${trapCount>0?`<div class="gab-section">
        <button class="gab-hdr" onclick="toggleGabSec(${it.n},'r')">
          <span class="gab-icon">🔍</span>
          <span class="gab-lbl">Releitura Crítica</span>
          <span style="margin-left:auto;margin-right:8px" class="trap-found">⚑ ${trapCount} armadilha${trapCount>1?'s':''}</span>
          <span class="gab-chev open" id="chev-${it.n}-r">▼</span>
        </button>
        <div class="gab-body" id="gb-${it.n}-r">
          <div class="releitura-body">${relitHtml}</div>
          <div class="trap-legend">Palavras destacadas:
            ${TRAP_WORDS.filter(w=>new RegExp(`(?<![\\wÀ-ÿ])${_escRx(w)}(?![\\wÀ-ÿ])`,'i').test(it.enun)).slice(0,8).map(w=>`<mark class="trap-word">${w}</mark>`).join(' ')}
          </div>
        </div>
      </div>`:''}
      <div class="gab-section">
        <button class="gab-hdr" onclick="toggleGabSec(${it.n},'f')">
          <span class="gab-icon">💡</span>
          <span class="gab-lbl">Explicação (Feynman)</span>
          <span class="gab-chev open" id="chev-${it.n}-f">▼</span>
        </button>
        <div class="gab-body" id="gb-${it.n}-f"><div class="feynman-text">${it.com||''}</div></div>
      </div>
      <div class="gab-section">
        <button class="gab-hdr" onclick="toggleGabSec(${it.n},'l')">
          <span class="gab-icon">📖</span>
          <span class="gab-lbl">Lei &amp; Jurisprudência</span>
          <span class="gab-chev open" id="chev-${it.n}-l">▼</span>
        </button>
        <div class="gab-body" id="gb-${it.n}-l">
          <div class="law-block">${fundSafe}</div>
          <button class="copy-btn" onclick="copyFund(this,'${fundCopy}')">📋 Copiar lei &amp; jurisprudência</button>
        </div>
      </div>
      ${it.peg?`<div class="gab-section" style="border-top:1px solid var(--bord)">

      </div>`:''}

  return `<div class="q-block${gabOn?' gab-on':''}" id="q-${it.n}" data-n="${it.n}">
    <div class="q-line">

      <div class="q-text">${enunHtml}</div>
      <div class="q-marks">
        <button class="q-mark${markC}" onclick="markAns(${it.n},'CERTO')" ${disab} title="Certo (C)">C</button>
        <button class="q-mark${markE}" onclick="markAns(${it.n},'ERRADO')" ${disab} title="Errado (E)">E</button>
      </div>
    </div>
    <div class="q-actions-row">
      <button class="q-show-gab" onclick="toggleGab(${it.n})">${gabOn?'Ocultar gabarito':'Ver gabarito'}</button>
      ${statusHtml}
      <span class="qt-badge qt-idle" id="qt-${it.n}">⏱</span>

    ${feedbackHtml}

}

function rerenderQ(n){
  const el=document.getElementById(`q-${n}`);
  if(!el) return;
  const di=S.flat.find(x=>x.n===n)?.discIdx||0;
  el.outerHTML=renderQBlock(S.flat.find(x=>x.n===n).item, di);
}

/* ── ACTIONS ─────────────────────────────────────────────── */
function markAns(n,val){
  if(S.finished) return;
  if(S.respostas[n]===val) delete S.respostas[n];
  else {
    S.respostas[n]=val;
    // Modo Foco: exibe gabarito automaticamente após responder
    if(typeof FOCO!=='undefined' && FOCO.active && !S.gabsShown[n]) S.gabsShown[n]=true;
  }
  save(); rerenderQ(n); updateProgress(); updateQuickNav();
  setTimeout(()=>_qtUpdateBadge(n),0);
}

function toggleGab(n){
  if(S.gabsShown[n]) delete S.gabsShown[n];
  else S.gabsShown[n]=true;
  save(); rerenderQ(n); updateQuickNav();
}

function toggleGabSec(n,key){
  const body=document.getElementById(`gb-${n}-${key}`);
  const chev=document.getElementById(`chev-${n}-${key}`);
  if(!body) return;
  const open=!body.classList.contains('hidden');
  body.classList.toggle('hidden',open);
  if(chev) chev.classList.toggle('open',!open);
}

function toggleAllGabaritos(){
  S.globalGabShown=!S.globalGabShown;
  if(S.globalGabShown) S.gabsShown={};
  save();
  renderProva(); // full re-render
  updateGabAllBtn();
}
function updateGabAllBtn(){
  const b=document.getElementById('btn-gab-all');
  const t=document.getElementById('tb-gab-all');
  const lbl=S.globalGabShown?'🙈':'👁';
  if(b) b.textContent=lbl;
  if(t) t.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="3"/><path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7-10-7-10-7z"/></svg> ${S.globalGabShown?'Ocultar gabaritos':'Gabaritos'}`;
}

/* ── QUICK NAV ───────────────────────────────────────────── */
function renderQuickNav(){
  const grid=document.getElementById('qn-grid');
  if(!grid) return;
  grid.innerHTML=S.flat.map(x=>{
    const a=S.respostas[x.n];
    const g=S.gabsShown[x.n]||S.globalGabShown;
    let cls=a==='CERTO'?'ac':a==='ERRADO'?'ae':'';
    if(g) cls+=' gs';
    // qa: não respondida e acima do limiar de alerta
    if(!a && (QT.times[x.n]||0)>=QT.ALERT) cls+=' qa';
    return `<button class="qn-btn ${cls}" onclick="jumpTo(${x.n})" title="Q.${x.n}${!a&&(QT.times[x.n]||0)>=QT.ALERT?' · ⏱ '+_fmtQT(QT.times[x.n]):''}">${x.n}</button>`;
  }).join('');
}
function updateQuickNav(){ renderQuickNav(); }
function jumpTo(n){
  document.getElementById('quick-nav').classList.remove('open');
  const el=document.getElementById(`q-${n}`);
  if(el) el.scrollIntoView({behavior:'smooth',block:'center'});
}

/* ── PROGRESS ─────────────────────────────────────────────── */
function updateProgress(){
  const tot=S.flat.length;
  let ok=0,er=0,ans=0;
  S.flat.forEach(x=>{
    const r=S.respostas[x.n];
    if(r===x.item.gab) ok++;
    else if(r) er++;
    if(r) ans++;
  });
  const pct=tot?Math.round(ans/tot*100):0;
  const blank=tot-ans;

  // Header
  document.getElementById('c-ok').textContent='✓ '+ok;
  document.getElementById('c-er').textContent='✗ '+er;
  document.getElementById('c-tot').textContent=ans+'/'+tot;
  document.getElementById('prog-fill').style.width=pct+'%';
  // Toolbar
  const tbans=document.getElementById('tb-ans');
  const tbblank=document.getElementById('tb-blank');
  if(tbans) tbans.textContent=ans;
  if(tbblank) tbblank.textContent=blank;
  // Bottom bar
  const bpok=document.getElementById('bp-ok');
  const bper=document.getElementById('bp-er');
  const bpcur=document.getElementById('bp-cur');
  const bptot=document.getElementById('bp-tot');
  const bbar=document.getElementById('bbar-fill');
  if(bpok) bpok.textContent=ok+' ✓';
  if(bper) bper.textContent=er+' ✗';
  if(bpcur) bpcur.textContent=ans;
  if(bptot) bptot.textContent=tot;
  if(bbar) bbar.style.width=pct+'%';
}

    </div>

/* ── MODO FOCO ────────────────────────────────────────────── */
const FOCO={active:false, idx:0, currentN:null};

function enterFoco(startIdx){
  if(!S.bloco){showToast('Carregue um bloco primeiro');return;}
  if(S.finished){showToast('Bloco já encerrado — use a Revisão');return;}
  // Desconecta apenas o observer (para de acumular tempo via scroll),
  // mas mantém QT.tickInterval ativo para continuar contando tempo em Foco
  if(QT.observer){QT.observer.disconnect();QT.observer=null;}
  QT.visible.clear();
  if(!QT.tickInterval){QT.lastTickAt=Date.now();QT.tickInterval=setInterval(_qtTick,500);}
  FOCO.active=true;
  if(startIdx!==undefined){
    FOCO.idx=Math.max(0,Math.min(startIdx,S.flat.length-1));
  } else {
    // começa na primeira não respondida
    const first=S.flat.findIndex(x=>!S.respostas[x.n]);
    FOCO.idx=first>=0?first:0;
  }
  // oculta tudo, exibe foco
  document.getElementById('sec-prova').classList.add('hidden');
  document.getElementById('sec-placar').classList.add('hidden');
  document.getElementById('sec-historico').classList.add('hidden');
  document.getElementById('sec-revisao').classList.add('hidden');
  document.getElementById('sec-cover').innerHTML='';
  document.getElementById('fab').classList.add('hidden');
  document.getElementById('bot-bar').classList.add('hidden');
  document.getElementById('btn-gab-all').classList.add('hidden');
  document.getElementById('hdr-timer').classList.remove('hidden');
  document.getElementById('hdr-chips').style.display='flex';
  document.getElementById('sec-foco').classList.remove('hidden');
  renderFocoQ();
}

function exitFoco(){
  FOCO.active=false; FOCO.currentN=null;
  document.getElementById('sec-foco').classList.add('hidden');
  renderProva(); // reinicia QT via renderProva → initQTimer
}

function renderFocoQ(){
  const x=S.flat[FOCO.idx];
  if(!x) return;
  const it=x.item;
  FOCO.currentN=it.n;

  const total=S.flat.length;
  const answered=Object.keys(S.respostas).length;
  const pct=Math.round(answered/total*100);
  const discShort=x.discNome.replace('Direito ','').replace(/ e Legislação .*/,'');
  const isFirst=FOCO.idx===0;
  const isLast=FOCO.idx===total-1;
  const hasAns=!!S.respostas[it.n];

  const wrap=document.getElementById('foco-wrap');
  wrap.innerHTML=`
    <div class="foco-hdr">
      <button class="tb-btn" onclick="exitFoco()" title="Sair do Modo Foco (Esc)">✕ Sair</button>
      <span class="foco-qnum">Q.${it.n} · ${FOCO.idx+1}/${total}</span>
      <span class="foco-disc">${discShort}</span>
      <div class="foco-prog-wrap">
        <div class="foco-progress"><div class="foco-prog-fill" id="foco-pf" style="width:${pct}%"></div></div>
        <span class="foco-pct">${pct}%</span>
      </div>
    </div>
    <div class="foco-body">
      ${renderQBlock(it, x.discIdx)}
    </div>
    <div class="foco-nav">
      <button class="btn-ghost" onclick="focoPrev()" ${isFirst?'disabled':''} style="min-width:110px" title="← Seta esquerda">← Anterior</button>
      <div class="foco-nav-hint">
        <div>${answered}/${total} respondidas</div>
        <div style="color:var(--txt3)">${hasAns?'→ Enter para avançar':'C / E para responder'}</div>
      </div>
      <button class="btn-${hasAns?'primary':'ghost'}" onclick="focoNext()" ${isLast?'disabled':''} style="min-width:110px" title="→ Seta direita / Enter">
        ${isLast?'Última':'Próxima →'}
      </button>
    </div>`;

  document.getElementById('sec-foco').scrollTop=0;
  // QT: acumula tempo manualmente no tick
}

function focoNext(){
  if(FOCO.idx<S.flat.length-1){FOCO.idx++;renderFocoQ();}
  else showToast('Última questão do bloco');
}
function focoPrev(){
  if(FOCO.idx>0){FOCO.idx--;renderFocoQ();}
}

// Jump para questão específica (usado futuramente por quick-nav em foco)
function focoJumpTo(n){
  const idx=S.flat.findIndex(x=>x.n===n);
  if(idx>=0){FOCO.idx=idx;renderFocoQ();}
}

/* ── QUESTION TIMER ──────────────────────────────────────── */
const QT={
  times:{},         // {n: elapsedMs}
  visible:new Set(),
  lastTickAt:null,
  tickInterval:null,
  observer:null,
  WARN:60000,       // 60s → amber
  ALERT:90000,      // 90s → red + pulse
};

function initQTimer(){
  stopQTimer();
  QT.times={}; QT.visible=new Set(); QT.lastTickAt=Date.now();

  QT.observer=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      const n=parseInt(e.target.dataset.n);
      if(e.isIntersecting) QT.visible.add(n);
      else QT.visible.delete(n);
    });
  },{rootMargin:'-28% 0px -28% 0px',threshold:0});

  document.querySelectorAll('.q-block[data-n]').forEach(el=>QT.observer.observe(el));
  QT.tickInterval=setInterval(_qtTick,500);
}

function stopQTimer(){
  if(QT.tickInterval){clearInterval(QT.tickInterval);QT.tickInterval=null;}
  if(QT.observer){QT.observer.disconnect();QT.observer=null;}
  QT.visible.clear(); QT.lastTickAt=null;
  const pill=document.getElementById('qt-pill');
  if(pill) pill.classList.add('hidden');
}

function _qtTick(){
  const now=Date.now();
  const delta=QT.lastTickAt?now-QT.lastTickAt:0;
  QT.lastTickAt=now;

  let pillN=null, pillMs=0;
  let crossedAlert=false;
  QT.visible.forEach(n=>{
    if(!S.respostas[n]){
      const prevMs=QT.times[n]||0;
      QT.times[n]=prevMs+delta;
      if(QT.times[n]>pillMs){pillMs=QT.times[n];pillN=n;}
      // detecta cruzamento do limiar para atualizar quick nav
      if(prevMs<QT.ALERT && QT.times[n]>=QT.ALERT) crossedAlert=true;
    }
    _qtUpdateBadge(n);
  });
  _qtUpdatePill(pillN,pillMs);
  if(crossedAlert) renderQuickNav();

  // Modo Foco: acumula tempo para a questão visível manualmente
  if(FOCO.active && FOCO.currentN && !S.respostas[FOCO.currentN]){
    QT.times[FOCO.currentN]=(QT.times[FOCO.currentN]||0)+delta;
    _qtUpdateBadge(FOCO.currentN);
    // atualiza % no header do foco
    const pf=document.getElementById('foco-pf');
    if(pf){const t=S.flat.length;const a=Object.keys(S.respostas).length;pf.style.width=Math.round(a/t*100)+'%';}
    const fpct=document.querySelector('.foco-pct');
    if(fpct){const t=S.flat.length;const a=Object.keys(S.respostas).length;fpct.textContent=Math.round(a/t*100)+'%';}
  }
}

function _qtUpdateBadge(n){
  const el=document.getElementById(`qt-${n}`);
  if(!el) return;
  const ms=QT.times[n]||0;
  const answered=!!S.respostas[n];
  if(answered){
    el.className='qt-badge qt-done';
    el.textContent=ms>0?`⏱ ${_fmtQT(ms)}`:'⏱';
    return;
  }
  if(ms<1000){el.className='qt-badge qt-idle';el.textContent='⏱';return;}
  if(ms>=QT.ALERT){el.className='qt-badge qt-alert';el.textContent=`⏱ ${_fmtQT(ms)}`;}
  else if(ms>=QT.WARN){el.className='qt-badge qt-warn';el.textContent=`⏱ ${_fmtQT(ms)}`;}
  else{el.className='qt-badge qt-normal';el.textContent=`⏱ ${_fmtQT(ms)}`;}
}

function _qtUpdatePill(n,ms){
  const pill=document.getElementById('qt-pill');
  if(!pill) return;
  if(!n||ms<8000){pill.classList.add('hidden');return;}
  pill.classList.remove('hidden');
  const inner=pill.querySelector('.qt-active-pill');
  if(!inner) return;
  const cls='qt-active-pill'+(ms>=QT.ALERT?' qt-alert-p':ms>=QT.WARN?' qt-warn-p':'');
  inner.className=cls;
  const icon=ms>=QT.ALERT?'⚠️':ms>=QT.WARN?'⏳':'⏱';
  inner.innerHTML=`${icon} Q.${n} — <span style="font-variant-numeric:tabular-nums">${_fmtQT(ms)}</span>`;
}

function _fmtQT(ms){
  const s=Math.floor(ms/1000);
  return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
}

/* ── PLACAR ──────────────────────────────────────────────── */
function renderPlacar(){
  stopQTimer(); // para timers por questão
  document.getElementById('sec-prova').classList.add('hidden');
  document.getElementById('sec-cover').innerHTML='';
  document.getElementById('sec-placar').classList.remove('hidden');
  document.getElementById('fab').classList.add('hidden');
  document.getElementById('bot-bar').classList.add('hidden');
  document.getElementById('hdr-timer').classList.remove('hidden');
  document.getElementById('hdr-chips').style.display='flex';
  document.getElementById('btn-gab-all').classList.add('hidden');

  const tot=S.flat.length;
  let ok=0,er=0,blank=0;
  S.flat.forEach(x=>{
    const r=S.respostas[x.n];
    if(r===x.item.gab) ok++;
    else if(r) er++;
    else blank++;
  });
  const saldo=ok-er;
  const pct=tot?Math.round(ok/tot*100):0;
  const totalElapsed=S.totalMs;
  const avgMs=ok+er>0?Math.round(totalElapsed/(ok+er)):0;
  const corte=Math.ceil(tot*0.6); // referência 60%
  const approved=saldo>=corte;

  // Disc stats
  const discStats=S.bloco.disciplinas.map(d=>{
    let dok=0,der=0,dtot=d.itens.length;
    d.itens.forEach(it=>{
      const r=S.respostas[it.n];
      if(r===it.gab) dok++;
      else if(r) der++;
    });
    const dpct=dok+der>0?Math.round(dok/(dok+der)*100):null;
    const barColor=dpct===null?'var(--txt3)':dpct>=70?'var(--green)':dpct>=50?'var(--acc)':'var(--red)';
    const short=d.nome.replace('Direito ','').replace(' e Legislação Especial','').replace(' e Legislação Complementar','');
    return {short,ok:dok,er:der,tot:dtot,pct:dpct,barColor};
  });

  const discChartHtml=discStats.map(d=>
    `<div class="disc-chart-row">
      <span class="nm">${d.short}</span>
      <div class="bar-rail"><div class="bar-fill" style="width:${d.pct||0}%;background:${d.barColor}"></div></div>
      <span class="frac">${d.ok}/${d.tot}</span>
      <span class="pct" style="color:${d.barColor}">${d.pct!==null?d.pct+'%':'—'}</span>
    </div>`
  ).join('');

  // Errors list
  const errors=S.flat.filter(x=>S.respostas[x.n]&&S.respostas[x.n]!==x.item.gab);
  function buildErrGab(it){
    const fundSafe=it.fund?it.fund.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):'';
    const fundCopy=it.fund?(it.fund.replace(/\\/g,'\\\\').replace(/"/g,'&quot;').replace(/'/g,"\\'").replace(/\n/g,'\\n')):'';
    return `<div class="gab-line">
        <span class="gab-label">Gabarito</span>
        <span class="gab-value" style="margin-left:6px;font-weight:700">${it.gab}</span>
        <span class="gab-badge er" style="margin-left:auto">Errou ✗</span>
      </div>
      <div class="gab-section">
        <button class="gab-hdr" onclick="toggleErrSec(${it.n},'f')">
          <span class="gab-icon">💡</span>
          <span class="gab-lbl">Explicação (Feynman)</span>
          <span class="gab-chev open" id="echev-${it.n}-f">▼</span>
        </button>
        <div class="gab-body" id="egb-${it.n}-f"><div class="feynman-text">${it.com||''}</div></div>
      </div>
      ${it.fund?`<div class="gab-section">
        <button class="gab-hdr" onclick="toggleErrSec(${it.n},'l')">
          <span class="gab-icon">📖</span>
          <span class="gab-lbl">Lei &amp; Jurisprudência</span>
          <span class="gab-chev open" id="echev-${it.n}-l">▼</span>
        </button>
        <div class="gab-body" id="egb-${it.n}-l">
          <div class="law-block">${fundSafe}</div>
          <button class="copy-btn" onclick="copyFund(this,'${fundCopy}')">📋 Copiar lei &amp; jurisprudência</button>
        </div>
      </div>`:''}
      ${it.peg?`<div class="gab-section" style="border-top:1px solid var(--bord)">
        <div style="padding:10px 14px"><div class="peg-box">⚠️ &nbsp;<span><strong>Armadilha:</strong> ${it.peg}</span></div></div>
      </div>`:''}`;
  }
  const errHtml=errors.length===0
    ?'<p style="color:var(--txt3);font-size:14px">Nenhum erro. Excelente! 🎯</p>'
    :errors.map(x=>{
      const enunShort=x.item.enun.length>90?x.item.enun.slice(0,90)+'…':x.item.enun;
      return `<div class="err-item">
        <div class="err-row">
          <span class="err-num">Q${x.n}</span>
          <div class="err-sub">${enunShort}<small>${x.discNome}</small></div>
          <button class="err-toggle" id="errtog-${x.n}" onclick="toggleErrGab(${x.n})">
            Ver gabarito <span id="errarrow-${x.n}">▼</span>
          </button>
        </div>
        <div class="err-gab" id="errgab-${x.n}">
          ${buildErrGab(x.item)}
        </div>
      </div>`;
    }).join('');

  const wrap=document.getElementById('placar-wrap');
  wrap.innerHTML=`
    <div class="placar-hero">
      <div class="placar-kicker">Resultado Final</div>
      <h2>${pct}% de aproveitamento</h2>
      <p class="placar-lead">Tempo total: ${fmtTime(totalElapsed)} · ${avgMs?'média '+fmtTime(avgMs)+'/questão':''}</p>
      <div class="placar-stats">
        <div class="p-stat"><div class="n g">${ok}</div><div class="l">Acertos</div></div>
        <div class="p-stat"><div class="n r">${er}</div><div class="l">Erros</div></div>
        <div class="p-stat"><div class="n t">${blank}</div><div class="l">Em branco</div></div>
        <div class="p-stat"><div class="n a">${saldo}</div><div class="l">Saldo CEBRASPE</div></div>
      </div>
    </div>

    <div class="pl-box">
      <div class="pl-title">Fórmula CEBRASPE</div>
      <div class="cebraspe-formula">
        <span class="part"><b>${ok}</b> acertos × (+1)</span>
        <span>−</span>
        <span class="part"><b>${er}</b> erros × (−1)</span>
        <span>+</span>
        <span class="part"><b>${blank}</b> em branco × (0)</span>
        <span>=</span>
        <span class="eq">${saldo}</span>
      </div>
      <div class="cebraspe-verdict ${approved?'approved':'reproved'}">
        ${approved?'✅ Simulação: aprovado no corte de referência (saldo ≥ '+corte+')':'❌ Simulação: abaixo do corte de referência (saldo '+saldo+' < '+corte+')'}
      </div>
    </div>

    <div class="pl-box">
      <div class="pl-title">Diagnóstico de Desempenho</div>
      ${(()=>{
        const cnt={dom:0,dvd:0,lac:0,leit:0};
        let total=0;
        S.flat.forEach(x=>{const av=S.avaliacoes[x.n];if(av&&cnt[av]!==undefined){cnt[av]++;total++;}});
        if(total===0) return `<p class="diag-empty">Nenhuma autoavaliação preenchida ainda. Responda as questões e classifique seu desempenho ao ver o gabarito.</p>`;
        const cells=Object.entries(AV_LABELS).map(([k,v])=>`
          <div class="diag-cell">
            <div class="dn" style="color:${k==='dom'?'var(--green)':k==='dvd'?'var(--amber)':k==='lac'?'var(--red)':'var(--txt2)'}">${cnt[k]}</div>
            <div class="dl">${v.icon} ${v.txt}</div>
          </div>`).join('');
        const insight=(()=>{
          if(cnt.lac>0) return `⚠️ ${cnt.lac} lacuna${cnt.lac>1?'s conceituais':' conceitual'} identificada${cnt.lac>1?'s':''} — priorize revisão de lei seca e doutrina.`;
          if(cnt.dvd>0) return `🤔 ${cnt.dvd} questão${cnt.dvd>1?'ões':''} com dúvida — consolide a certeza antes da prova.`;
          if(cnt.leit>0) return `👁 ${cnt.leit} erro${cnt.leit>1?'s':''} de leitura — treine a leitura lenta e marcação de palavras-chave.`;
          return `✅ ${total} questão${total>1?'ões':''} com domínio total avaliado.`;
        })();
        return `<div class="diag-grid">${cells}</div>
          <div style="font-size:13.5px;color:var(--txt2);padding:10px 14px;background:var(--surf2);border-radius:var(--r-sm);border:1px solid var(--bord)">${insight}</div>`;
      })()}
    </div>

    <div class="pl-box">
      <div class="pl-title">Desempenho por Disciplina</div>
      ${discChartHtml}
    </div>

    ${(()=>{
      // QT timing insight — questões mais lentas
      const qtEntries=Object.entries(QT.times)
        .map(([n,ms])=>({n:parseInt(n),ms,answered:!!S.respostas[parseInt(n)],item:S.flat.find(x=>x.n===parseInt(n))?.item}))
        .filter(e=>e.ms>=QT.ALERT && e.item)
        .sort((a,b)=>b.ms-a.ms)
        .slice(0,5);
      if(!qtEntries.length) return '';
      const rows=qtEntries.map(e=>{
        const r=S.respostas[e.n];
        const isRight=r&&r===e.item.gab;
        const statusCls=r?(isRight?'ok':'er'):'bk';
        const statusTxt=r?(isRight?'✓ Acertou':'✗ Errou'):'Não respondida';
        return `<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-top:1px solid var(--bord)">
          <span class="q-tag" style="min-width:36px">${e.n}</span>
          <span class="qt-badge ${r?'qt-done':'qt-alert'}">⏱ ${_fmtQT(e.ms)}</span>
          <span style="flex:1;font-size:12.5px;color:var(--txt2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e.item.enun.replace(/<[^>]+>/g,' ').trim().slice(0,90)}…</span>
          <span style="font-size:11px;font-weight:700;color:${statusCls==='ok'?'var(--green)':statusCls==='er'?'var(--red)':'var(--txt3)'}">${statusTxt}</span>
        </div>`;
      }).join('');
      return `<div class="pl-box">
        <div class="pl-title">⏱ Questões com mais de 1:30 de atenção (${qtEntries.length})</div>
        <p style="font-size:13px;color:var(--txt2);margin-bottom:8px">Questões onde você passou mais tempo — foque nesses pontos na revisão.</p>
        ${rows}
      </div>`;
    })()}

    <div class="pl-box">
      <div class="pl-title">Lista de Erros (${errors.length})</div>
      ${errHtml}
    </div>

    <div class="placar-actions">
      <button class="btn-ghost" onclick="goBackToProva()">← Revisar caderno</button>
      <button class="btn-ghost" onclick="showHistorico()">📊 Histórico</button>
      <button class="btn-ghost" onclick="showRevisaoPicker()">🔍 Revisão</button>
      <button class="btn-ghost" onclick="exportPDF()">⬆ Exportar PDF</button>
      <button class="btn-primary" onclick="confirmStart()">↺ Novo bloco</button>
    </div>`;

  updateProgress();
  window.scrollTo(0,0);
}

function exportPDF(){
  if(!S.bloco||!S.finished){showToast('Finalize o bloco antes de exportar');return;}
  const w=window.open('','_blank','width=960,height=800');
  if(!w){showToast('Permita pop-ups para exportar o PDF');return;}
  w.document.write(buildReportHTML());
  w.document.close();
}

function buildReportHTML(){

  let ok=0,er=0,blank=0;
  S.flat.forEach(x=>{
    const r=S.respostas[x.n];

    else if(r) er++;
    else blank++;

  const pct=tot>0?Math.round(ok/tot*100):0;

  const discRowsHtml=S.bloco.disciplinas.map(d=>{
    let dok=0,der=0;
    d.itens.forEach(it=>{const r=S.respostas[it.n];if(r===it.gab)dok++;else if(r)der++;});
    const dtot=d.itens.length;
    const dpct=dok+der>0?Math.round(dok/(dok+der)*100):null;
    const dsal=dok-der;
    const col=dpct===null?'#888':dpct>=70?'#1a7a3a':dpct>=50?'#b87400':'#c0392b';

    const bw=dpct!==null?dpct:0;

      <div style="flex:1;height:6px;background:#eee;border-radius:3px;overflow:hidden">

      </div>
      <span style="font-weight:700;color:${col};min-width:36px;text-align:right">${dpct!==null?dpct+'%':'—'}</span>

    return `<tr>
      <td>${d.nome}</td>
      <td style="text-align:center">${dok}/${dtot}</td>
      <td style="width:160px">${bar}</td>
      <td style="text-align:center;font-weight:700;color:${dsal>=0?'#1a7a3a':'#c0392b'}">${dsal>=0?'+':''}${dsal}</td>
    </tr>`;

  // Autoavaliação
  const avCnt={dom:0,dvd:0,lac:0,leit:0};

    .metric{text-align:center;padding:12px 16px;border:1px solid #e8e8e8;border-radius:8px;min-width:90px}
    .metric .num{font-size:30px;font-weight:900;font-style:italic;line-height:1}
    .metric .lbl{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:#888;margin-top:4px}

  ${errors.length>0?`<div class="page-break">

  <div class="footer">

  <script>window.onload=function(){window.print();}<\/script>
