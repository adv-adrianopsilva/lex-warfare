essar e julgar os Governadores dos Estados e do DF nos crimes comuns. (Obs.: nos crimes de responsabilidade, a competência é de órgão especial — Assembleias Legislativas/Câmara Legislativa, via impeachment.)","fund":"LEI: Art. 105, caput, CF: 'O Superior Tribunal de Justiça compõe-se de, no mínimo, trinta e três Ministros.' Art. 105, I, a, CF: competência para processar e julgar os Governadores dos Estados e do DF nos crimes comuns.","peg":"STJ julga Governadores em crimes COMUNS. Crimes de RESPONSABILIDADE de Governadores: Assembleias Legislativas (impeachment). Distinção cobrada."},{"n":49,"enun":"A Constituição Federal de 1988 veda expressamente a criação de Tribunais de Exceção e o julgamento por tribunal criado após a prática do crime, em respeito ao princípio do juiz natural.","gab":"CERTO","com":"Art. 5º, XXXVII e LIII, CF: 'não haverá juízo ou tribunal de exceção' (inciso XXXVII) e 'ninguém será processado nem sentenciado senão pela autoridade competente' (inciso LIII). Juiz natural = previsão anterior ao fato e vedação de tribunais ad hoc.","fund":"LEI: Art. 5º, XXXVII, CF: 'não haverá juízo ou tribunal de exceção.' Art. 5º, LIII, CF: 'ninguém será processado nem sentenciado senão pela autoridade competente.'","peg":""},{"n":50,"enun":"A ação declaratória de constitucionalidade (ADC) pode ter como objeto lei municipal, desde que haja controvérsia relevante sobre sua constitucionalidade nos tribunais.","gab":"ERRADO","com":"ADC tem como objeto leis ou atos normativos FEDERAIS, não estaduais ou municipais. A ADI pode ter objeto federal ou estadual. A ADPF pode ser usada para leis municipais (caráter subsidiário). ADC → somente lei ou ato normativo federal.","fund":"LEI: Art. 102, I, a, CF: 'a ação direta de inconstitucionalidade de lei ou ato normativo federal ou estadual e a ação declaratória de constitucionalidade de lei ou ato normativo federal.' ADC → FEDERAL apenas.","peg":"ADC = lei federal apenas. ADI = federal ou estadual. ADPF = qualquer ato público (incluindo municipal). Distinção essencial."},{"n":51,"enun":"O controle difuso de constitucionalidade pode ser exercido por qualquer órgão jurisdicional, sendo que a declaração incidental de inconstitucionalidade produz efeitos inter partes e ex tunc.","gab":"CERTO","com":"No controle difuso (via de exceção), qualquer juiz ou tribunal pode declarar inconstitucional norma aplicável ao caso concreto. Os efeitos são: inter partes (entre as partes do processo) e ex tunc (retroativos, desfazem os efeitos desde a origem da lei). A modulação de efeitos no difuso é possível, mas não a regra.","fund":"LEI: Art. 97 CF (cláusula de reserva de plenário). Doutrina: controle difuso → efeitos inter partes, ex tunc; controle concentrado → erga omnes, ex tunc (salvo modulação art. 27, Lei 9.868/99).","peg":""},{"n":52,"enun":"O Senado Federal pode suspender a execução de lei ou ato normativo declarado inconstitucional por decisão definitiva do STF tanto no controle difuso quanto no concentrado, conforme a CF/88.","gab":"ERRADO","com":"Art. 52, X, CF: o Senado suspende lei declarada inconstitucional pelo STF apenas no controle DIFUSO. No controle concentrado (ADI/ADC), a decisão já tem efeitos erga omnes e vinculantes por força da própria CF — não é necessária a intervenção do Senado.","fund":"LEI: Art. 52, X, CF: 'Compete privativamente ao Senado Federal: X — suspender a execução, no todo ou em parte, de lei declarada inconstitucional por decisão definitiva do Supremo Tribunal Federal.' Incide no controle difuso — no concentrado, os efeitos erga omnes decorrem da própria CF (art. 102, §2º).","peg":"Senado = suspende no controle DIFUSO. No concentrado: desnecessário (erga omnes automático)."},{"n":53,"enun":"A súmula vinculante aprovada pelo STF vincula todos os órgãos do Poder Judiciário e a administração pública direta e indireta, nos âmbitos federal, estadual e municipal, mas não vincula o próprio STF nem o Poder Legislativo no exercício de sua função típica.","gab":"CERTO","com":"Art. 103-A CF: a SV vincula os demais órgãos do Judiciário e a Administração Pública. Não vincula: o STF (que pode revisá-la); o Poder Legislativo no exercício da função normativa (pode editar lei contrária). Vincula a Administração, incluindo o Executivo.","fund":"LEI: Art. 103-A, CF: 'O Supremo Tribunal Federal poderá, de ofício ou por provocação, mediante decisão de dois terços dos seus membros, após reiteradas decisões sobre matéria constitucional, aprovar súmula que, a partir de sua publicação na imprensa oficial, terá efeito vinculante em relação aos demais órgãos do Poder Judiciário e à administração pública direta e indireta, nas esferas federal, estadual e municipal...'","peg":"SV não vincula: STF (pode revisar/cancelar) e Legislativo (pode legislar de modo contrário — mas o STF pode então rever a SV). Vincula: todos os outros órgãos judiciais + toda a Administração."},{"n":54,"enun":"A arguição de descumprimento de preceito fundamental (ADPF) possui caráter subsidiário, somente sendo admitida quando não houver outro instrumento constitucional apto a sanar a lesão a preceito fundamental.","gab":"CERTO","com":"Art. 4º, §1º, Lei 9.882/99: 'Não será admitida arguição de descumprimento de preceito fundamental quando houver qualquer outro meio eficaz de sanar a lesividade.' A ADPF é subsidiária por expressa disposição legal.","fund":"LEI: Art. 4º, §1º, Lei 9.882/99 (princípio da subsidiariedade da ADPF).","peg":""},{"n":55,"enun":"As imunidades parlamentares formais (processuais) garantem que o parlamentar federal não possa ser preso, salvo em flagrante de crime inafiançável, nem processado sem licença da Casa respectiva.","gab":"ERRADO","com":"EC 35/2001 alterou o art. 53, §§2º–4º CF: atualmente NÃO é necessária licença da Casa para que o parlamentar seja processado. A Casa pode, por voto de maioria de seus membros, sustar o processo a pedido do partido, por prazo determinado. A imunidade processual passou de licença prévia para sustação deliberativa.","fund":"LEI: Art. 53, §2º CF (redação EC 35/2001): 'Desde a expedição do diploma, os membros do Congresso Nacional não poderão ser presos, salvo em flagrante de crime inafiançável. Nesse caso, os autos serão remetidos dentro de vinte e quatro horas à Casa respectiva, para que, pelo voto da maioria de seus membros, resolva sobre a prisão.' §3º: sustação do processo, não licença para processar.","peg":"Antes da EC 35/2001: licença prévia. Depois: sem licença, mas com possibilidade de sustação pela Casa. Questão cobra a mudança pós-EC 35."},{"n":56,"enun":"Os tratados e convenções internacionais sobre direitos humanos aprovados por cada Casa do Congresso Nacional, em dois turnos, por três quintos dos votos dos respectivos membros, equivalem às emendas constitucionais.","gab":"CERTO","com":"Art. 5º, §3º, CF (inserido pela EC 45/2004): os tratados de DH aprovados com o procedimento qualificado (dois turnos, três quintos em cada Casa) têm status de emenda constitucional. Os demais tratados de DH, aprovados com quórum ordinário, têm status supralegal (STF RE 466.343).","fund":"LEI: Art. 5º, §3º CF: 'Os tratados e convenções internacionais sobre direitos humanos que forem aprovados, em cada Casa do Congresso Nacional, em dois turnos, por três quintos dos votos dos respectivos membros, serão equivalentes às emendas constitucionais.' JURISPRUDÊNCIA: RE 466.343/SP STF (Peluso, Pleno, j. 03/12/2008): tratados DH não submetidos ao rito → status supralegal.","peg":"Distinção: rito qualificado (3/5, 2 turnos) = emenda. Rito ordinário = supralegal. Tratados comuns (não DH) = lei ordinária."},{"n":57,"enun":"O Conselho Nacional de Justiça (CNJ) exerce controle administrativo, financeiro e disciplinar sobre o Poder Judiciário, podendo avocar processos disciplinares em curso e rever decisões administrativas dos tribunais.","gab":"CERTO","com":"Art. 103-B, §4º, CF: o CNJ pode rever, de ofício ou mediante provocação, os processos disciplinares julgados pelos Tribunais, desde que não decorrido prazo decadencial. Pode avocar processos em curso. NÃO possui controle sobre atos JURISDICIONAIS (decisões em processos judiciais). ADI 3.367 STF confirmou a constitucionalidade do CNJ.","fund":"LEI: Art. 103-B, §4º, II e III, CF. JURISPRUDÊNCIA: ADI 3.367/DF STF (Peluso, Pleno, j. 13/04/2005): constitucionalidade do CNJ.","peg":"CNJ controla: atos administrativos, disciplinares, financeiros dos tribunais. NÃO controla: atos jurisdicionais (decisões em processo). STF não está sujeito ao CNJ."},{"n":58,"enun":"A intervenção federal nos estados é medida excepcional, cujo decreto pode ser editado de ofício pelo Presidente da República para coibir a descontinuidade dos serviços essenciais definidos no art. 34, I a VII, da CF.","gab":"ERRADO","com":"Nem sempre o PR age de ofício. A intervenção federal pode ser: (a) decretada de ofício pelo PR (art. 34, I, II, III) em algumas hipóteses; (b) depender de solicitação do Poder Legislativo ou Executivo coacto (art. 34, III); (c) depender de requisição do STF, STJ ou TSE (art. 34, IV e VI); (d) depender de provimento do STJ/STF em representação do PGR (art. 34, VII). Não é todas de ofício.","fund":"LEI: Art. 34, CF (hipóteses de intervenção federal). Art. 36, CF (procedimento: ofício, solicitação ou requisição, conforme a hipótese).","peg":"O PR só pode agir DE OFÍCIO nas hipóteses dos incisos I, II e III do art. 34 CF. Nos demais casos, depende de requisição dos órgãos indicados."},{"n":59,"enun":"A regra de imunidade material dos parlamentares federais os protege de responsabilidade civil e criminal por opiniões, palavras e votos proferidos no exercício da função legislativa, com cobertura absoluta independentemente do local onde proferidos.","gab":"ERRADO","com":"Art. 53, caput, CF: imunidade material protege opiniões, palavras e votos. STF: a imunidade tem cobertura absoluta quando dentro da Casa; quando fora da Casa (entrevistas, declarações externas), exige conexão com o exercício do mandato para ser protegida. Imunidade fora do plenário não é absoluta — STF avalia o nexo com a função parlamentar.","fund":"LEI: Art. 53, caput, CF. JURISPRUDÊNCIA: STF — imunidade material 'absoluta' no exercício das funções parlamentares; declarações fora da Casa exigem nexo com o mandato para a proteção.","peg":"Imunidade material: absoluta no plenário/Casa; condicionada ao nexo mandato-declaração fora da Casa. CEBRASPE cobra 'independentemente do local' — ERRADO."},{"n":60,"enun":"A perda do mandato parlamentar por infidelidade partidária é decretada pela Mesa da Casa legislativa, mediante provocação do partido, resguardado o devido processo legal ao parlamentar.","gab":"CERTO","com":"STF — resolução do TSE regulamentou a perda de mandato por infidelidade partidária. A Mesa da Casa (Câmara ou Senado) é competente para decretar a perda, mediante provocação do partido prejudicado, assegurado contraditório e ampla defesa ao parlamentar.","fund":"JURISPRUDÊNCIA: STF MS 26.602/DF, 26.603/DF, 26.604/DF (2007): mandato pertence ao partido; infidelidade partidária sem justa causa gera perda do mandato. Procedimento: TSE (resolução) → Mesa da Casa.","peg":"","jur_status":"PENDENTE"},{"n":61,"enun":"Nos casos de impeachment do Presidente da República, o julgamento é realizado pelo Senado Federal sob a presidência do Presidente do Supremo Tribunal Federal, exigindo-se aprovação de dois terços dos membros do Senado para a condenação.","gab":"CERTO","com":"Art. 52, I e parágrafo único, CF: compete ao Senado processar e julgar o PR nos crimes de responsabilidade. O julgamento é presidido pelo Presidente do STF, e a condenação exige 2/3 dos senadores (maioria qualificada). A pena é perda do cargo com inabilitação por 8 anos.","fund":"LEI: Art. 52, I e parágrafo único, CF: 'Compete privativamente ao Senado Federal: I — processar e julgar o Presidente e o Vice-Presidente da República nos crimes de responsabilidade... Parágrafo único. Nos casos previstos nos incisos I e II, funcionará como Presidente o do Supremo Tribunal Federal, limitando-se a condenação, que somente será proferida por dois terços dos votos do Senado Federal, à perda do cargo...'","peg":""},{"n":62,"enun":"O Poder Judiciário exerce função atípica administrativa quando organiza seus servidores, nomeia e exonera magistrados e servidores, e administra seus próprios bens.","gab":"CERTO","com":"A função típica do Judiciário é jurisdicional. Funções atípicas: administrativa (organizar a máquina judiciária, nomear servidores, gerir bens) e normativa (regimentos internos dos tribunais). A CF garante autonomia administrativa e financeira ao Judiciário (art. 99).","fund":"LEI: Art. 99, CF: 'Ao Poder Judiciário é assegurada autonomia administrativa e financeira.' Art. 96, I, CF: competência dos tribunais para organizar seus serviços administrativos.","peg":""},{"n":63,"enun":"A Emenda Constitucional pode ser aprovada em sessão unicameral do Congresso Nacional, ou seja, com voto conjunto de deputados e senadores.","gab":"ERRADO","com":"Art. 60, §2º, CF: a PEC é discutida e votada em cada Casa do CN em DOIS TURNOS, com aprovação por 3/5 dos membros — sempre em votação separada, câmara e senado em turnos distintos. Não há sessão unicameral para PECs.","fund":"LEI: Art. 60, §2º CF: 'A proposta será discutida e votada em cada Casa do Congresso Nacional, em dois turnos, considerando-se aprovada se obtiver, em ambos, três quintos dos votos dos respectivos membros.'","peg":"PEC: duas Casas, dois turnos cada, 3/5. Não é sessão conjunta (unicameral) — cada Casa vota separadamente."},{"n":64,"enun":"As cláusulas pétreas previstas na CF/88 incluem a separação dos poderes, os direitos e garantias individuais, o voto direto, secreto, universal e periódico, e a forma republicana de governo.","gab":"ERRADO","com":"Art. 60, §4º CF lista: forma federativa, voto direto/secreto/universal/periódico, separação dos poderes, direitos e garantias individuais. A forma REPUBLICANA de governo NÃO está expressamente no §4º. A questão inclui 'forma republicana' como cláusula pétrea expressa — ERRADO.","fund":"LEI: Art. 60, §4º CF: 'Não será objeto de deliberação a proposta de emenda tendente a abolir: I — a forma federativa de Estado; II — o voto direto, secreto, universal e periódico; III — a separação dos Poderes; IV — os direitos e garantias individuais.'","peg":"CLÁUSULAS PÉTREAS (art. 60, §4º): federalismo, voto (DSUP), separação de poderes, direitos individuais. FORMA REPUBLICANA: NÃO consta no texto — distinguir de 'forma federativa'."}]},{"nome":"Direito Administrativo e Legislação Complementar","comando":"Julgue os itens subsequentes, relativos ao Direito Administrativo e temas correlatos.","itens":[{"n":65,"enun":"A responsabilidade civil objetiva do Estado prevista no art. 37, §6º, da CF/88 aplica-se também aos prestadores de serviços públicos, como as concessionárias, ainda que o dano seja causado a não usuários do serviço.","gab":"CERTO","com":"STF RE 591.874 (Tema 130): a responsabilidade objetiva das concessionárias se estende a terceiros não usuários do serviço. A CF, art. 37, §6º, abrange 'danos que seus agentes causem a terceiros', sem restringir a usuários.","fund":"JURISPRUDÊNCIA: STF RE 591.874/MS (Lewandowski, Pleno, j. 26/08/2009): 'As pessoas jurídicas de direito privado prestadoras de serviço público respondem objetivamente pelos danos que causarem a terceiros, independentemente de serem usuários do serviço.'","peg":"Concessionária × não usuário: responsabilidade objetiva. STF confirmou expressamente.","jur_status":"OK"},{"n":66,"enun":"A teoria do risco administrativo, adotada pelo art. 37, §6º, da CF/88, admite que o Estado afaste ou atenue sua responsabilidade mediante prova de culpa exclusiva ou concorrente da vítima.","gab":"CERTO","com":"A teoria do risco administrativo (não integral) admite excludentes e atenuantes: culpa exclusiva da vítima exclui totalmente a responsabilidade do Estado; culpa concorrente atenua proporcionalmente. A teoria do risco integral (responsabilidade absoluta) não admite nenhuma excludente — é adotada excepcionalmente (dano nuclear, terrorismo em aeronaves, etc.).","fund":"LEI: Art. 37, §6º CF. Doutrina: teoria do risco administrativo (regra geral) × risco integral (excepcional). STJ e STF confirmam admissibilidade de excludentes no risco administrativo.","peg":"Risco administrativo: admite excludentes (culpa exclusiva/concorrente da vítima, caso fortuito externo, força maior). Risco integral: NÃO admite excludentes — aplicado em casos específicos (dano nuclear, ANAC)."},{"n":67,"enun":"O fato de um preposto da Administração Pública, agindo fora do exercício das funções, causar dano a terceiro não gera responsabilidade objetiva do Estado, pois ausente o nexo de imputação funcional.","gab":"ERRADO","com":"O STF entende que mesmo agindo 'fora' das funções formais, se o agente se utilizou do cargo para praticar o ato (nexo aparente com a função), o Estado responde objetivamente. A teoria da aparência amplia o nexo de imputação quando a posição funcional do agente facilitou o dano.","fund":"JURISPRUDÊNCIA: STF — nexo de imputação ampliado: mesmo atos praticados 'em razão do cargo' (não apenas 'no exercício') geram responsabilidade do Estado. STJ adota posição similar para agentes que se valem da função para causar dano.","peg":"'No exercício das funções' é interpretado amplamente: inclui atos praticados 'em razão do cargo' (nexo aparente). Agente completamente fora do cargo → pode afastar responsabilidade objetiva."},{"n":68,"enun":"O poder hierárquico da Administração Pública permite que o superior hierárquico anule os atos ilegais praticados por seus subordinados, mas não os atos discricionários que entenda inconvenientes.","gab":"ERRADO","com":"O poder hierárquico confere ao superior a competência para ANULAR atos ilegais (controle de legalidade) E para REVOGAR atos discricionários por conveniência e oportunidade. A anulação pressupõe ilegalidade; a revogação pressupõe mérito administrativo — ambas cabíveis no poder hierárquico.","fund":"LEI: Princípio da autotutela (Súmulas 346 e 473 STF). Doutrina: poder hierárquico inclui anulação por ilegalidade e revogação por conveniência/oportunidade, além de avocar, delegar, rever, fiscalizar.","peg":"Hierarquia: ANULA (ilegalidade) + REVOGA (conveniência) + avoca + delega. A questão restringe apenas à anulação — ERRADO."},{"n":69,"enun":"O ato administrativo que visa a atingir um fim diverso do previsto em lei caracteriza desvio de finalidade (desvio de poder), vício que contamina o elemento 'motivo' do ato e o torna anulável.","gab":"ERRADO","com":"O desvio de finalidade contamina o elemento FINALIDADE do ato administrativo, não o motivo. Além disso, o vício de finalidade torna o ato NULO (nulidade absoluta), não apenas anulável. Desvio de finalidade = excesso de poder (incompetência) ou abuso de finalidade (fim diverso do previsto).","fund":"LEI: Art. 2º, parágrafo único, e, Lei 9.784/99: 'Nos processos administrativos serão observados... o desvio de finalidade.' Doutrina: desvio de finalidade contamina o elemento 'finalidade' (não 'motivo'); ato é NULO.","peg":"Desvio de finalidade: elemento = FINALIDADE (não motivo). Consequência = NULIDADE (não anulabilidade). Três erros potenciais em uma questão."},{"n":70,"enun":"A licitação dispensada e a licitação dispensável são situações distintas: na primeira, a lei determina a dispensa; na segunda, o administrador tem discricionariedade para decidir se dispensa ou não.","gab":"CERTO","com":"Lei 14.133/2021: licitação DISPENSADA (art. 74 ou situações de impossibilidade jurídica de competição) → ato vinculado, a lei impõe a dispensa. Licitação DISPENSÁVEL (art. 75) → ato discricionário, o administrador pode ou não licitar. Distinção mantida na nova lei.","fund":"LEI: Arts. 74 e 75, Lei 14.133/2021. Licitação dispensada (art. 74): casos em que a lei determina a dispensa. Licitação dispensável (art. 75): casos em que o administrador pode dispensar (discricionariedade).","peg":"Dispensada = vinculado (lei obriga a dispensa). Dispensável = discricionário (lei autoriza mas não obriga). Distinção clássica mantida na Lei 14.133/2021."},{"n":71,"enun":"A improbidade administrativa, nos termos da Lei 8.429/92 com a redação dada pela Lei 14.230/2021, exige a comprovação de dolo para a configuração de qualquer ato de improbidade, tendo sido eliminada a modalidade culposa.","gab":"CERTO","com":"Lei 14.230/2021 reformou profundamente a LIA: eliminou a improbidade por CULPA (art. 1º, §1º: 'considera-se ímprobo o agente público que pratica o ato doloso'). Somente dolo (direto e específico, em regra) configura improbidade. Também exigiu o elemento subjetivo 'dolo específico' para os atos de enriquecimento ilícito e lesão ao erário.","fund":"LEI: Art. 1º, §1º, Lei 8.429/92 (redação Lei 14.230/2021): 'Consideram-se atos de improbidade administrativa as condutas dolosas tipificadas nos arts. 9º, 10 e 11 desta Lei, ressalvados tipos previstos em leis especiais.' Art. 1º, §2º: 'Considera-se dolosa a ação ou omissão que, consciente e voluntariamente, pratica o ato descrito nos arts. 9º, 10 e 11 desta Lei.'","peg":"Pós-Lei 14.230/2021: SÓ DOLO configura improbidade. Culpa foi eliminada. Mudança drástica cobrada pela CEBRASPE."},{"n":72,"enun":"Na Administração Pública, o princípio da legalidade determina que o administrador só pode agir quando a lei autoriza expressamente, enquanto o particular pode agir em tudo que a lei não proíbe.","gab":"CERTO","com":"Essa distinção é um axioma do Direito Administrativo: princípio da legalidade para a Administração = só pode fazer o que a lei permite (legalidade estrita ou positiva). Para o particular: tudo que a lei não proíbe é permitido (legalidade negativa ou autonomia privada).","fund":"LEI: Art. 37, caput, CF: princípio da legalidade para a Administração. Art. 5º, II, CF: 'ninguém será obrigado a fazer ou deixar de fazer alguma coisa senão em virtude de lei' (legalidade para o particular).","peg":""},{"n":73,"enun":"O servidor público estável somente perderá o cargo mediante sentença judicial transitada em julgado, procedimento administrativo disciplinar com ampla defesa, ou avaliação periódica de desempenho com garantias de contraditório e ampla defesa.","gab":"CERTO","com":"Art. 41, §1º, CF: servidor estável perde o cargo em três situações: I — sentença judicial transitada em julgado; II — PAD com ampla defesa; III — avaliação periódica de desempenho. Todas as três hipóteses estão no texto constitucional.","fund":"LEI: Art. 41, §1º, I, II e III, CF: 'O servidor público estável só perderá o cargo: I — em virtude de sentença judicial transitada em julgado; II — mediante processo administrativo em que lhe seja assegurada ampla defesa; III — mediante procedimento de avaliação periódica de desempenho, na forma de lei complementar, assegurada ampla defesa.'","peg":""},{"n":74,"enun":"O regime jurídico único (RJU) é obrigatório para todos os entes da federação, vedando-se a adoção de regime celetista para servidores da Administração Direta e autarquias.","gab":"ERRADO","com":"Após a EC 19/1998, o art. 39 CF permitiu que a União, estados, DF e municípios adotassem regime único 'para os servidores da administração pública direta, das autarquias e das fundações públicas'. O STF suspendeu a expressão que permitia regimes múltiplos (MC na ADI 2.135); atualmente, com a cautelar em vigor, mantém-se o entendimento de que o RJU é obrigatório para a Adm. Direta e autarquias. Porém, empresas públicas e sociedades de economia mista seguem o regime celetista (CLT) — não o RJU.","fund":"LEI: Art. 39, caput, CF (redação EC 19/1998). STF — ADI 2.135 (cautelar suspendendo a EC 19/1998, restaurando a redação original que exige RJU). Empresas públicas e SEMs: regime CLT (art. 173, §1º, II, CF).","peg":"RJU obrigatório: Adm. Direta, autarquias e fundações públicas (cautelar STF ADI 2.135). Empresas públicas e SEMs: CLT (não RJU)."},{"n":75,"enun":"A teoria da imputação volitiva ou teoria do órgão (Teoria Orgânica de Otto Gierke) explica a responsabilidade do Estado ao reconhecer que a vontade dos agentes públicos é imputada diretamente ao ente estatal, não sendo eles pessoalmente responsáveis por seus atos funcionais perante terceiros.","gab":"CERTO","com":"A teoria do órgão (Gierke) superou a teoria do mandato e a teoria da representação: o agente público não representa o Estado, é parte de seu organismo. Sua vontade é a vontade do órgão/Estado. A responsabilidade perante terceiros é imputada ao Estado; o agente responde internamente via ação regressiva (art. 37, §6º, CF, parte final).","fund":"LEI: Art. 37, §6º CF: 'ficando assegurado o direito de regresso contra o responsável nos casos de dolo ou culpa.' Doutrina: teoria do órgão (Gierke) — imputação volitiva direta ao ente.","peg":""},{"n":76,"enun":"Pode o administrador público revogar ato administrativo que conferiu direito adquirido ao particular, como a concessão de aposentadoria, mediante o pagamento de indenização.","gab":"ERRADO","com":"Ato que gerou direito adquirido ao particular não pode ser revogado — é insuscetível de revogação (Súmula 473 STF in fine: a Administração pode anular seus atos ilegais, e revogar os inconvenientes, mas neste caso resguardados os direitos adquiridos). Aposentadoria concedida validamente gera direito adquirido → irrevogável.","fund":"JURISPRUDÊNCIA: Súmula 473 STF: 'A administração pode anular seus próprios atos, quando eivados de vícios que os tornam ilegais, porque deles não se originam direitos; ou revogá-los, por motivo de conveniência ou oportunidade, respeitados os direitos adquiridos, e ressalvada, em todos os casos, a apreciação judicial.' LEI: Art. 53, Lei 9.784/99.","peg":"Revogação é vedada quando o ato gerou direito adquirido — independentemente de indenização.","jur_status":"PENDENTE"},{"n":77,"enun":"O prazo decadencial para a Administração anular atos administrativos ilegais dos quais decorram efeitos favoráveis para os destinatários é de cinco anos, contados da data em que foram praticados.","gab":"CERTO","com":"Art. 54, Lei 9.784/99: 'O direito da Administração de anular os atos administrativos de que decorram efeitos favoráveis para os destinatários decai em cinco anos, contados da data em que foram praticados, salvo comprovada má-fé.' Protege a segurança jurídica e boa-fé do administrado.","fund":"LEI: Art. 54, caput, Lei 9.784/99.","peg":"5 anos da data do ato. Exceção: má-fé do beneficiário → sem prazo decadencial."},{"n":78,"enun":"Nos termos da Lei 8.112/90, a demissão do servidor público federal por ato de improbidade administrativa, prevista no art. 132, IV, produz efeitos imediatos após a publicação do ato demissório, independentemente do trânsito em julgado na ação de improbidade.","gab":"CERTO","com":"A demissão administrativa (PAD) é sanção da esfera disciplinar — autônoma em relação à esfera judicial de improbidade. A sanção de demissão pode ser aplicada pela Administração no PAD sem aguardar o trânsito em julgado da ação judicial de improbidade. Independência das instâncias.","fund":"LEI: Art. 132, IV, Lei 8.112/90: demissão por improbidade. Art. 125, Lei 8.112/90: as sanções civis, penais e administrativas são independentes entre si.","peg":""},{"n":79,"enun":"As organizações sociais (OS) e as organizações da sociedade civil de interesse público (OSCIP) integram a administração pública indireta federal.","gab":"ERRADO","com":"OS (Lei 9.637/98) e OSCIP (Lei 9.790/99) são entidades do TERCEIRO SETOR — pessoas jurídicas de direito privado sem fins lucrativos. NÃO integram a Administração Pública (nem direta, nem indireta). São parceiras da Administração mediante contratos de gestão (OS) ou termos de parceria (OSCIP).","fund":"LEI: Lei 9.637/98 (OS); Lei 9.790/99 (OSCIP). Doutrina: Terceiro Setor — entidades privadas colaboradoras do Estado, não componentes da estrutura administrativa.","peg":"OS e OSCIP: terceiro setor = privadas sem fins lucrativos. NÃO são Administração Indireta (que inclui autarquias, fundações públicas, empresas públicas, SEMs)."},{"n":80,"enun":"A concessão comum de serviço público, disciplinada pela Lei 8.987/95, exige licitação obrigatória na modalidade concorrência ou leilão, e o concessionário remunera-se pela cobrança de tarifas dos usuários.","gab":"CERTO","com":"Lei 8.987/95: a concessão comum exige licitação (concorrência ou leilão, nos termos da Lei 14.133/2021). O concessionário se remunera pela tarifa cobrada dos usuários — diferença essencial em relação à PPP (contraprestação pecuniária do Poder Público em parceria). A repartição de riscos e a adequação do serviço são obrigações do concessionário.","fund":"LEI: Art. 2º, II, Lei 8.987/95: 'concessão de serviço público: a delegação de sua prestação, feita pelo poder concedente, mediante licitação, na modalidade de concorrência ou de leilão, a pessoa jurídica ou consórcio de empresas que demonstre capacidade para seu desempenho...'","peg":"Concessão comum = tarifa do usuário. PPP concessão patrocinada = tarifa + contraprestação pública. PPP concessão administrativa = sem tarifa, só contraprestação pública."}]},{"nome":"Disciplinas Complementares (Medicina Legal, Direito Civil, Tributário, Ambiental, Empresarial, Conhecimentos DF)","comando":"Julgue os itens a seguir, relativos às disciplinas complementares do edital do concurso.","itens":[{"n":81,"enun":"As queimaduras de 3º grau caracterizam-se pela presença de flictenas (bolhas) e intensa dor na região atingida, em razão da destruição total das camadas da pele.","gab":"ERRADO","com":"Queimaduras de 3º grau destroem todas as camadas da pele, incluindo as terminações nervosas — por isso SÃO INDOLORES (destruição da inervação). As flictenas são características do 2º grau (epiderme + derme superficial), com intensa dor (terminações nervosas preservadas).","fund":"Doutrina: Croce & Croce, Medicina Legal. 3º grau: destruição total da pele, ausência de dor, aparência esbranquiçada/carbonizada. 2º grau: flictenas + dor.","peg":"Inversão clássica: dor intensa = 2º grau (nervo preservado). Ausência de dor = 3º grau (nervo destruído). Cobrado pela troca propositada."},{"n":82,"enun":"A chamada 'posição de pugilista' ou 'posição de boxeador' observada em corpos carbonizados deve ser interpretada pelo perito como indício de que a vítima tentou se defender antes de morrer.","gab":"ERRADO","com":"A posição de pugilista/boxeador é fenômeno POST-MORTAL decorrente da retração das proteínas musculares pela ação do calor intenso — não tem relação com defesa ante-mortal. O perito não pode interpretá-la como sinal de luta ou defesa. É dado de cronotanatognose, não de tanato-traumatológico.","fund":"Doutrina: Hygino Hércules, Medicina Legal e Criminalística. Posição de pugilista: retração cadavérica por calor, idêntica nas vítimas conscientes ou inconscientes no momento do incêndio.","peg":""},{"n":83,"enun":"A marca de Lichtenberg (arborescência ou figura arbórea) é sinal patognomônico de fulguração, observada na pele como ramificação em forma de leque, resultado da descarga elétrica atmosférica.","gab":"CERTO","com":"A figura de Lichtenberg (arborescência) é lesão cutânea ramificada, vermelho-rosada, resultante do raio. É considerada patognomônica de fulguração — sua presença confirma eletricidade atmosférica. Não é produzida por eletricidade industrial.","fund":"Doutrina: Croce & Croce; Hygino Hércules. Marca de Lichtenberg = fulguração (raio). Marca de Jelinek = eletricidade industrial (ponto de entrada).","peg":"Lichtenberg = raio (arborescência). Jelinek = eletricidade industrial (cratera com bordas elevadas). Não confundir."},{"n":84,"enun":"Na perícia de vítima de eletricidade industrial, a ausência de marcas visíveis na pele exclui a hipótese de eletrocussão, pois a passagem da corrente elétrica sempre deixa vestígios externos identificáveis.","gab":"ERRADO","com":"Em até 30-40% dos casos de eletrocussão industrial não há marcas externas visíveis. A morte pode ocorrer por fibrilação ventricular sem deixar vestígio cutâneo. A ausência de marca NÃO exclui a eletrocussão — o perito deve investigar contexto, posição da vítima, circuito elétrico e alterações internas (rabdomiólise).","fund":"Doutrina: Hygino Hércules — 'a eletricidade pode matar sem deixar marca perceptível à inspeção externa'. Exames complementares (histopatologia, toxicologia, análise do local) são essenciais.","peg":"Ausência de marca ≠ descarte de eletrocussão. Peg frequente: a banca afirma que sem marca não há eletrocussão — ERRADO."},{"n":85,"enun":"A síndrome de descompressão, também conhecida como 'mal dos mergulhadores' ou doença descompressiva, decorre da formação de bolhas de dióxido de carbono no sangue e tecidos causada pela ascensão rápida na coluna d'água.","gab":"ERRADO","com":"A síndrome de descompressão é causada por bolhas de NITROGÊNIO (N₂), não de CO₂. Em pressões elevadas (mergulho), o N₂ se dissolve no sangue. Com a ascensão rápida, a pressão cai abruptamente e o N₂ se libera em forma de bolhas — embolismo gasoso. Tratamento: câmara hiperbárica.","fund":"Doutrina: Medicina Legal — síndrome de descompressão: N₂ em bolhas, não CO₂. Câmara hiperbárica comprime novamente o N₂ para dissolução gradual.","peg":"N₂ (nitrogênio) = correto. CO₂ = errado. Detalhe técnico cobrado pela CEBRASPE."},{"n":86,"enun":"A radiação ionizante em doses suficientemente altas pode causar a síndrome de irradiação aguda, que se manifesta pela supressão da medula óssea, com consequente leucopenia, plaquetopenia e anemia, além de suscetibilidade a infecções.","gab":"CERTO","com":"Síndrome hematopoiética da irradiação aguda (1-3 Sv): a radiação destrói células da medula óssea (leucócitos, plaquetas, eritrócitos), gerando aplasia medular. O paciente fica vulnerável a infecções oportunistas, sangramentos e anemia. Em doses maiores (3-6 Sv): síndrome gastrointestinal; acima de 6 Sv: síndrome neurovascular.","fund":"Doutrina: Medicina Legal — síndrome de irradiação aguda, classificação por dose em Sievert.","peg":""},{"n":87,"enun":"A queimadura solar (eritema por UV) corresponde a uma queimadura de 1º grau, enquanto a bolha solar (flictena por UV) corresponde a uma queimadura de 2º grau superficial.","gab":"CERTO","com":"A energia radiante do sol (UV) produz os mesmos graus de queimadura que a energia térmica convencional: eritema (1º grau, só hiperemia); flictena/bolha (2º grau, comprometimento dérmico). A queimadura solar grave pode chegar ao 2º grau profundo.","fund":"Doutrina: Medicina Legal — queimaduras por radiação UV seguem a mesma classificação por graus.","peg":""},{"n":88,"enun":"No estudo da cronotanatognose, a temperatura ambiente é fator relevante para a estimativa do tempo de morte, pois o calor ambiental retarda a decomposição e o frio a acelera.","gab":"ERRADO","com":"É o inverso: calor ambiental ACELERA a decomposição (favorece o crescimento bacteriano e a putrefação); frio RETARDA (preserva o corpo — princípio das câmaras frigoríficas forenses). Essa inversão é armadilha clássica de questão de medicina legal.","fund":"Doutrina: tanatologia forense — temperatura como fator de alteração cadavérica. Calor: acelera putrefação. Frio: retarda, podendo levar à mumificação por dessecação em ambiente frio e seco.","peg":"Calor = acelera decomposição. Frio = retarda. Questão apresenta o inverso — peg clássico."},{"n":89,"enun":"A regra dos 9 de Wallace é utilizada para estimar a extensão das queimaduras em adultos, atribuindo 9% à cabeça e pescoço, 9% a cada membro superior, 18% ao tronco anterior, 18% ao tronco posterior e 18% a cada membro inferior.","gab":"CERTO","com":"Regra dos 9 de Wallace (adultos): cabeça+pescoço=9%, cada MS=9%, tronco anterior=18%, tronco posterior=18%, cada MI=18%, genitália=1% — total=100%. Em crianças, usa-se a tabela de Lund-Browder (cabeça proporcionalmente maior). A extensão determina a gravidade: > 20% → queimadura grave.","fund":"Doutrina: Medicina Legal e Cirurgia de Urgência — regra dos 9 (Wallace). Distinção adultos × crianças (Lund-Browder).","peg":"A questão diz 18% para cada MI — CERTO (cada MI = 18%). Atenção: cada MS = 9%, não 18%. Armadilha: confundir MI (18%) e MS (9%)."},{"n":90,"enun":"O barotrauma por hiperpressão, causado por explosões, pode produzir ruptura de vísceras ocas (pulmão, tímpano, intestino) sem que haja lesão externa aparente, dificultando o diagnóstico necroscópico sem abertura das cavidades.","gab":"CERTO","com":"Explosões geram onda de choque (hiperpressão) que se transmite preferencialmente para vísceras ocas (ar/líquido dentro). O pulmão pode apresentar contusão hemorrágica, o tímpano ruptura bilateral e o intestino laceração — sem lesão externa visível. Autópsia completa é obrigatória para diagnosticar 'blast injuries'.","fund":"Doutrina: traumatologia forense — lesões por explosão (blast injuries); síndrome do barotrauma. Abertura de todas as cavidades no exame necroscópico é indispensável.","peg":""},{"n":91,"enun":"A simulação relativa do negócio jurídico, nos termos do art. 167 do Código Civil, gera a nulidade absoluta do negócio simulado, mas o negócio dissimulado poderá subsistir se for válido na substância e na forma.","gab":"CERTO","com":"Art. 167 CC: a simulação é causa de nulidade absoluta (negócio simulado = nulo). Mas o §1º do art. 167 salvaguarda o negócio oculto (dissimulado): se ele reúne todos os requisitos de validade (art. 104 CC), pode produzir efeitos. Ex.: compra e venda que encobre doação — a compra e venda é nula, mas a doação pode valer.","fund":"LEI: Art. 167, caput CC: nulidade por simulação. Art. 167, §1º CC: 'Haverá simulação nos negócios jurídicos quando: I — aparentarem conferir ou transmitir direitos a pessoas diversas daquelas às quais realmente se conferem, ou transmitem; II — contiverem declaração, confissão, condição ou cláusula não verdadeira; III — os instrumentos particulares forem antedatados, ou pós-datados.' §1º: o negócio dissimulado é válido se atendidos os requisitos de substância e forma.","peg":""},{"n":92,"enun":"A anulabilidade do negócio jurídico por dolo pode ser arguida por qualquer interessado e pelo Ministério Público, sem prazo, em razão da relevância do vício para a ordem jurídica.","gab":"ERRADO","com":"Negócio anulável por dolo é vício do consentimento → tutela interesse PRIVADO. Só o PREJUDICADO pode arguir (não qualquer interessado, não o MP). E há prazo decadencial de 4 anos (art. 178, II, CC). Diferente da nulidade absoluta (qualquer interessado + MP, sem prazo).","fund":"LEI: Art. 177 CC: 'A anulabilidade não tem efeito antes de julgada por sentença, nem se pronuncia de ofício; só os interessados a podem alegar, e aproveita exclusivamente aos que a alegarem, salvo o caso de solidariedade ou indivisibilidade.' Art. 178, II CC: prazo de 4 anos para anular por dolo.","peg":"Anulabilidade = só o prejudicado, no prazo de 4 anos. Nulidade = qualquer interessado + MP + juiz ex officio, sem prazo."},{"n":93,"enun":"O estado de perigo, como defeito do negócio jurídico, prescinde da demonstração de dolo de aproveitamento da outra parte, bastando a necessidade da pessoa de salvar-se de grave dano pessoal.","gab":"ERRADO","com":"Art. 156 CC: estado de perigo EXIGE dolo de aproveitamento da outra parte que conhecia a situação de perigo. Diferente da lesão (art. 157): basta a desproporção resultante de premente necessidade ou inexperiência, SEM exigência de dolo de aproveitamento. Distinção fundamental.","fund":"LEI: Art. 156 CC: 'Configura-se o estado de perigo quando alguém, premido da necessidade de salvar-se, ou a pessoa de sua família, de grave dano conhecido pela outra parte, assume obrigação excessivamente onerosa.'","peg":"Estado de perigo: exige dolo de aproveitamento. Lesão: não exige. Questão troca os requisitos — peg direto."},{"n":94,"enun":"A fraude contra credores, prevista nos arts. 158 a 165 do Código Civil, pode ser desconstituída por meio de ação pauliana, cujo prazo decadencial é de quatro anos, contados da data do ato fraudulento.","gab":"CERTO","com":"Art. 178, II, CC: prazo de 4 anos para anulação por fraude contra credores (ação pauliana), contados da data do ato. A ação pauliana desconfigura o negócio feito em fraude ao credor quirografário (devedor insolvente aliena bens). Legitimidade: credores quirografários (não hipotecários).","fund":"LEI: Art. 178, II, CC: '4 (quatro) anos, na hipótese do inciso II do art. 1.650...' Art. 165 CC (ação pauliana): prazo e legitimidade. Art. 158 CC: alienação de bens por devedor insolvente.","peg":""},{"n":95,"enun":"O erro que vicia o negócio jurídico deve ser substancial e perceptível ao declaratário diligente (escusável), não se admitindo a anulação por erro grosseiro ou detectável com mínima diligência.","gab":"CERTO","com":"Art. 138 CC: são anuláveis os negócios jurídicos em que houve erro substancial (art. 139) e escusável. O CC de 2002 substituiu o requisito de 'erro perdoável/escusável' pela noção de que o declaratário, segundo a boa-fé objetiva, deveria ter percebido — erro grosseiro que um homem médio detectaria não justifica anulação.","fund":"LEI: Art. 138 CC: 'São anuláveis os negócios jurídicos, quando as declarações de vontade emanarem de erro substancial que poderia ser percebido por pessoa de diligência normal, em face das circunstâncias do negócio.'","peg":"Erro escusável: não percebido por pessoa diligente normal. Erro inescusável (grosseiro): percebido por qualquer pessoa diligente → não anula."},{"n":96,"enun":"A nulidade absoluta do negócio jurídico opera de pleno direito, produzindo efeitos imediatamente, e não pode ser objeto de confirmação pelas partes nem convalesce pelo decurso do tempo.","gab":"CERTO","com":"Art. 168 CC: a nulidade pode ser alegada por qualquer interessado e pelo MP; juiz pode pronunciar de ofício. Art. 169 CC: 'O negócio jurídico nulo não é suscetível de confirmação, nem convalesce pelo decurso do tempo.' Nulidade opera ex tunc (retroativamente) e ex lege (automática).","fund":"LEI: Art. 168, parágrafo único CC + Art. 169 CC.","peg":""},{"n":97,"enun":"A coação como vício do consentimento, para invalidar o negócio jurídico, não precisa ser irresistível, sendo suficiente que a ameaça cause temor ao ameaçado, ainda que não configure grave dano.","gab":"ERRADO","com":"Art. 151 CC: a coação é vício do consentimento quando a ameaça for fundada em dano iminente e considerável à pessoa ou bens do ameaçado ou de sua família — deve ser grave (considerável), séria (dano possível de ser causado), atual ou iminente. Temor reverencial (medo de desagradar superior) não é coação (art. 153 CC).","fund":"LEI: Art. 151 CC: 'A coação, para viciar a declaração de vontade, há de ser tal que incuta ao paciente fundado temor de dano iminente e considerável à sua pessoa, à sua família, ou aos seus bens.' Art. 153 CC: 'Não se considera coação a ameaça do exercício normal de um direito, nem o simples temor reverencial.'","peg":"Coação: ameaça de dano CONSIDERÁVEL e IMINENTE — não qualquer temor. Temor reverencial não vicia."},{"n":98,"enun":"O negócio jurídico praticado por agente em estado de embriaguez acidental completa, que o privou totalmente do discernimento no momento do ato, é nulo de pleno direito.","gab":"CERTO","com":"Art. 166, I, CC: são nulos os negócios celebrados por agente absolutamente incapaz. Art. 3º CC c/c art. 4º: embriaguez acidental que priva totalmente o discernimento equipara o agente ao incapaz absoluto (inciso III do art. 3º — redação atual: 'que, por causa transitória ou permanente, não puderem exprimir sua vontade'). Incapacidade transitória por embriaguez acidental total → nulidade.","fund":"LEI: Art. 3º, III CC (incapacidade absoluta por impossibilidade de exprimir vontade). Art. 166, I CC (nulidade por agente absolutamente incapaz).","peg":"Embriaguez voluntária: responsabilidade penal mantida (actio libera in causa). Embriaguez ACIDENTAL + perda TOTAL do discernimento → incapacidade temporária → nulidade civil."},{"n":99,"enun":"Segundo o Código Tributário Nacional, a obrigação tributária principal tem por objeto o pagamento de tributo ou penalidade pecuniária, enquanto a obrigação acessória consiste em prestações positivas ou negativas instituídas pela legislação tributária.","gab":"CERTO","com":"Art. 113 CTN: obrigação principal = pagar tributo ou multa. Obrigação acessória = fazer, não fazer ou tolerar, para fins de fiscalização (ex.: emitir nota fiscal, escriturar livros, não destruir documentos). A acessória não segue necessariamente a principal — pode existir independentemente.","fund":"LEI: Art. 113, §§1º e 2º CTN: '§1º A obrigação principal surge com a ocorrência do fato gerador, tem por objeto o pagamento de tributo ou penalidade pecuniária e extingue-se juntamente com o crédito dela decorrente. §2º A obrigação acessória decorrente da legislação tributária tem por objeto as prestações, positivas ou negativas, nela previstas no interesse da arrecadação ou da fiscalização dos tributos.'","peg":""},{"n":100,"enun":"O lançamento tributário por homologação, previsto no art. 150 do CTN, ocorre quando a atividade de verificação do fato gerador é feita pela própria autoridade fiscal, sem qualquer colaboração do contribuinte.","gab":"ERRADO","com":"Lançamento por HOMOLOGAÇÃO: o CONTRIBUINTE faz a apuração, calcula e paga antecipadamente. A autoridade fiscal depois HOMOLOGA (tácita ou expressamente) o pagamento. É o oposto do descrito — é o contribuinte que faz, não a autoridade. Lançamento de OFÍCIO: a autoridade faz tudo (art. 149 CTN).","fund":"LEI: Art. 150 CTN: 'O lançamento por homologação, que ocorre quanto aos tributos cuja legislação atribua ao sujeito passivo o dever de antecipar o pagamento sem prévio exame da autoridade administrativa, opera-se pelo ato em que a referida autoridade, tomando conhecimento da atividade assim exercida pelo obrigado, expressamente a homologa.'","peg":"Homologação = contribuinte antecipa; fisco confirma (homologa). Ofício = fisco faz tudo. Confusão frequente."},{"n":101,"enun":"O Imposto sobre Circulação de Mercadorias e Serviços (ICMS) é de competência dos estados e do DF, mas a CF veda que as alíquotas aplicáveis nas operações interestaduais sejam fixadas pelos próprios estados unilateralmente.","gab":"CERTO","com":"Art. 155, §2º, IV, CF: as alíquotas interestaduais e de exportação do ICMS são fixadas pelo SENADO FEDERAL (resolução do Senado). Os estados só fixam alíquotas internas. Nas operações interestaduais, a diferença de alíquota (DIFAL) pertence ao estado de destino.","fund":"LEI: Art. 155, §2º, IV, CF: 'resolução do Senado Federal, de iniciativa do Presidente da República ou de um terço dos Senadores, aprovada pela maioria absoluta de seus membros, estabelecerá as alíquotas aplicáveis às operações e prestações, interestaduais e de exportação.'","peg":""},{"n":102,"enun":"A imunidade tributária recíproca prevista na CF veda que a União, os estados, o DF e os municípios instituam impostos sobre o patrimônio, renda ou serviços uns dos outros, mas não abrange as empresas públicas e sociedades de economia mista.","gab":"ERRADO","com":"STF estende a imunidade recíproca às empresas públicas e SEMs que prestem serviços públicos essenciais sem fins lucrativos e sem concorrência com a iniciativa privada (ex.: Correios, INFRAERO). A imunidade recíproca pode ser estendida por interpretação teleológica quando o ente é instrumento do Estado.","fund":"LEI: Art. 150, VI, a, CF (imunidade recíproca). JURISPRUDÊNCIA: STF — imunidade recíproca estendida a EPs e SEMs prestadoras de serviço público essencial sem finalidade lucrativa (ex.: ACO 765/RJ — Correios).","peg":"EP e SEM que exploram atividade econômica em concorrência → SEM imunidade. EP e SEM que prestam serviço público essencial sem fins lucrativos → COM imunidade (STF). Distinção crítica."},{"n":103,"enun":"O Simples Nacional, regime tributário diferenciado para microempresas e empresas de pequeno porte, é regulamentado por lei complementar federal, em razão da exigência constitucional para o tratamento favorecido dessas empresas.","gab":"CERTO","com":"Art. 146, III, d, CF (inserido pela EC 42/2003): lei complementar deve definir tratamento diferenciado e favorecido para ME e EPP. A LC 123/2006 institui o Simples Nacional — arrecadação unificada de tributos federais, estaduais (ICMS) e municipais (ISS) em um único documento de arrecadação (DAS).","fund":"LEI: Art. 146, III, d, CF. LC 123/2006 (Estatuto Nacional ME/EPP e Simples Nacional).","peg":""},{"n":104,"enun":"Nos crimes contra a ordem tributária previstos no art. 1º da Lei 8.137/90, o tipo penal se consuma com a prática da ação fraudulenta, independentemente da constituição definitiva do crédito tributário pela autoridade fiscal.","gab":"ERRADO","com":"SV 24 STF: nos crimes MATERIAIS contra a ordem tributária (art. 1º, I–IV, Lei 8.137/90), o tipo se consuma apenas com o LANÇAMENTO DEFINITIVO do crédito tributário. Enquanto o processo administrativo fiscal está em curso, não há crime consumado — não corre prescrição, não há justa causa para denúncia.","fund":"JURISPRUDÊNCIA: SV 24 STF: 'Não se tipifica crime material contra a ordem tributária, previsto no art. 1º, incisos I a IV, da Lei n. 8.137/1990, antes do lançamento definitivo do crédito tributário.'","peg":"Crime tributário MATERIAL (art. 1º): lançamento definitivo = condição objetiva de punibilidade. Crime tributário FORMAL (art. 2º): consuma com a ação, sem necessidade de lançamento."},{"n":105,"enun":"A responsabilidade penal da pessoa jurídica por crimes ambientais, nos termos da Lei 9.605/98, exige a simultânea responsabilização da pessoa física que praticou o ato em seu benefício — chamada teoria da dupla imputação.","gab":"ERRADO","com":"STF RE 548.181/PR (2013): ABANDONOU a teoria da dupla imputação. A PJ pode ser responsabilizada criminalmente por crime ambiental mesmo sem a identificação ou responsabilização simultânea da pessoa física. Posição consolidada no STJ após o julgamento do STF.","fund":"JURISPRUDÊNCIA: STF RE 548.181/PR (j. 2013): abandono da teoria da dupla imputação. LEI: Art. 3º, Lei 9.605/98 (responsabilidade penal da PJ).","peg":"Dupla imputação obrigatória: SUPERADA (STF 2013). PJ pode responder sozinha. Questão testando diretamente o julgado.","jur_status":"OK"},{"n":106,"enun":"A Lei 9.605/98 prevê pena de 2 a 5 anos de reclusão para maus-tratos praticados contra cães e gatos, em virtude das alterações inseridas pela Lei 14.064/2020 (Lei Sansão).","gab":"CERTO","com":"Lei Sansão (Lei 14.064/2020) inseriu o §2º no art. 32 da Lei 9.605/98: 'A pena é aumentada de um sexto a um terço, se ocorrer morte do animal, e de um terço à metade, se o crime for praticado contra cão ou gato.' Na prática: a pena base do art. 32 é 3 meses a 1 ano; para cão ou gato, com morte, a pena pode alcançar 2 a 5 anos (redação da Lei 14.064/2020 inseriu §1-A: 'Quem praticar ato de abuso, maus-tratos, ferir ou mutilar animais silvestres, domésticos ou domesticados, nativos ou exóticos, será punido com pena de detenção, de 1 (um) a 4 (quatro) anos, multa e proibição da guarda.' E para cão/gato: 2 a 5 anos).","fund":"LEI: Art. 32, §1º-A e §2º, Lei 9.605/98 (inseridos pela Lei 14.064/2020): pena de 2 a 5 anos para maus-tratos a cão ou gato.","peg":""},{"n":107,"enun":"Os crimes contra a fauna previstos na Lei 9.605/98 são, em regra, de ação penal pública incondicionada, dispensando qualquer forma de representação da vítima ou do órgão ambiental competente.","gab":"CERTO","com":"Todos os crimes da Lei 9.605/98 são de AÇÃO PENAL PÚBLICA INCONDICIONADA — o MP age independentemente de representação da vítima ou do IBAMA. Não há crime ambiental de ação penal privada ou condicionada à representação na Lei 9.605/98.","fund":"LEI: Lei 9.605/98 — ausência de qualquer dispositivo que exija representação. Art. 26, Lei 9.605/98: nas infrações penais a cargo do Ministério Público. Regra geral do CPP: ação pública incondicionada como regra.","peg":""},{"n":108,"enun":"A área de preservação permanente (APP) pode ser suprimida mediante autorização do órgão ambiental competente, mesmo sem a aprovação do Conselho Nacional do Meio Ambiente (CONAMA), desde que o Estado justifique utilidade pública ou interesse social.","gab":"CERTO","com":"Código Florestal (Lei 12.651/2012), art. 7º e art. 8º: a supressão de APP em caso de utilidade pública, interesse social ou baixo impacto ambiental pode ser autorizada pelo órgão ambiental competente (SEMA estadual, IBAMA etc.) sem necessidade de deliberação do CONAMA. O CONAMA atua principalmente na regulamentação geral, não na autorização caso a caso.","fund":"LEI: Arts. 7º, 8º e 3º, incisos VIII e IX, Lei 12.651/2012 (Código Florestal).","peg":""},{"n":109,"enun":"Nos termos da Lei 9.605/98, é crime punível com pena de reclusão de 1 a 4 anos provocar incêndio em mata ou floresta, sendo a pena aumentada de metade se o crime for culposo.","gab":"ERRADO","com":"Art. 41, Lei 9.605/98: provocar incêndio em mata ou floresta → 2 a 4 anos de RECLUSÃO. Parágrafo único: se o crime é CULPOSO, a pena é de DETENÇÃO de 6 meses a 1 ano. Não há 'aumento de metade' para o culposo — a forma culposa tem pena própria (detenção) e menor.","fund":"LEI: Art. 41, Lei 9.605/98: 'Provocar incêndio em mata ou floresta: Pena — reclusão, de dois a quatro anos, e multa. Parágrafo único. Se o crime é culposo, a pena é de detenção, de seis meses a um ano, e multa.'","peg":"Pena do art. 41: 2 a 4 anos (não 1 a 4). Culposo: detenção 6m a 1a (não aumento de metade). Dois erros em um item."},{"n":110,"enun":"O endosso em branco transforma o título de crédito em título ao portador, podendo ser transferido por mera tradição, sem necessidade de novo endosso.","gab":"CERTO","com":"Art. 913 CC: o endosso em branco (sem identificação do endossatário) transforma o título em ao portador — qualquer detentor pode exercer os direitos. O portador pode completar o endosso, endossar em preto, ou transferir por tradição.","fund":"LEI: Art. 913, CC: 'O endossatário de endosso em branco pode mudá-lo para endosso em preto, completando-o com o seu nome ou de terceiro; pode endossar novamente o título, em branco ou em preto; ou pode transferi-lo sem novo endosso.'","peg":""},{"n":111,"enun":"A duplicata mercantil, diferentemente da nota promissória, pode ser protestada por falta de pagamento mesmo sem ter sido aceita pelo sacado, mediante apresentação de prova hábil do vínculo obrigacional.","gab":"CERTO","com":"Lei 5.474/68: a duplicata pode ser protestada por falta de aceite, falta de devolução ou falta de pagamento, mesmo sem o aceite, mediante a exibição do título (original), do comprovante de entrega da mercadoria ou da prestação do serviço. STJ admite execução de duplicata virtual sem aceite + nota fiscal/comprovante de entrega.","fund":"LEI: Art. 15, Lei 5.474/68. JURISPRUDÊNCIA: STJ — execução de duplicata virtual sem aceite com nota fiscal e comprovante de entrega válidos.","peg":""},{"n":112,"enun":"O pedido de recuperação judicial, nos termos da Lei 11.101/2005, deve ser apresentado ao juiz com a lista de credores, relação de bens dos sócios, demonstrações contábeis dos três últimos exercícios e certidão de regularidade fiscal.","gab":"ERRADO","com":"Art. 51, Lei 11.101/2005: a petição inicial de recuperação judicial NÃO exige certidão de regularidade fiscal — ela é substituída por certidão de créditos tributários (situação dos débitos). A Lei 14.112/2020 facilitou o acesso à recuperação judicial, e a exigência de quitação fiscal é objeto de controvérsia (STF permitiu RJ sem certidão fiscal em algumas hipóteses).","fund":"LEI: Art. 51, Lei 11.101/2005 — documentos exigidos. Não inclui certidão de regularidade fiscal como requisito intransponível (STF afastou tal exigência como impeditivo).","peg":"Regularidade fiscal NÃO é requisito insuperável para RJ — STF e lei não exigem certidão de regularidade fiscal como condição sine qua non."},{"n":113,"enun":"Na falência, os créditos trabalhistas têm preferência sobre os créditos com garantia real, mas o valor dos créditos trabalhistas com tal preferência está limitado a 150 salários mínimos por credor.","gab":"CERTO","com":"Art. 83, I, Lei 11.101/2005: créditos trabalhistas até 150 SM por credor têm preferência máxima. O excedente dos 150 SM desce para a classe de crédito quirografário. Créditos com garantia real (hipoteca, penhor) ficam na 2ª posição, depois dos trabalhistas limitados e dos créditos com privilégio especial/geral.","fund":"LEI: Art. 83, I, Lei 11.101/2005: 'A classificação dos créditos na falência obedece à seguinte ordem: I — os créditos derivados da legislação do trabalho, limitados a 150 (cento e cinquenta) salários-mínimos por credor...'","peg":"150 SM: limite para crédito trabalhista com preferência máxima. Excedente → quirografário. Não há preferência ilimitada dos trabalhistas sobre garantias reais."},{"n":114,"enun":"O empresário individual pode requerer a recuperação judicial, ao passo que a empresa individual de responsabilidade limitada (EIRELI) foi extinta pelo Código Civil, com a conversão automática para a sociedade limitada unipessoal.","gab":"CERTO","com":"Lei 14.195/2021 extinguiu a EIRELI: as EIRELIs existentes foram automaticamente convertidas em sociedades limitadas unipessoais. A SLU (Ltda. com um sócio) passou a ser a forma de limitação de responsabilidade para empresário individual. O empresário individual pode requerer RJ (art. 48, Lei 11.101/2005).","fund":"LEI: Art. 41, Lei 14.195/2021: conversão automática de EIRELI em Ltda unipessoal. Art. 48, Lei 11.101/2005: legitimidade do empresário individual para RJ.","peg":"EIRELI extinta em 2021 — questão cobra conhecimento da atualização legislativa."},{"n":115,"enun":"O Distrito Federal possui competência tributária cumulativa, podendo instituir e cobrar tanto os impostos estaduais (como ICMS e IPVA) quanto os impostos municipais (como ISS e IPTU), em virtude da sua natureza jurídica de ente sui generis.","gab":"CERTO","com":"Art. 155 e 156 CF + art. 32, §1º CF: o DF acumula as competências tributárias dos estados (ICMS, IPVA, ITCMD) e dos municípios (ISS, IPTU, ITBI). Isso decorre da vedação de criação de municípios no DF (art. 32 CF) — sem municípios, o DF exerce as competências deles.","fund":"LEI: Art. 32, §1º CF: 'Ao Distrito Federal são atribuídas as competências legislativas reservadas aos Estados e Municípios.' Art. 155 e 156 CF.","peg":""},{"n":116,"enun":"A RIDE do DF e Entorno, criada pela LC 94/1998, é uma pessoa jurídica de direito público com autonomia orçamentária, podendo celebrar contratos e firmar convênios em nome dos municípios que a integram.","gab":"ERRADO","com":"A RIDE NÃO é pessoa jurídica de direito público nem possui autonomia orçamentária ou personalidade jurídica própria. É instrumento de planejamento e cooperação federativa — gerida pelo COARIDE, mas sem personalidade jurídica autônoma. Os municípios que a integram mantêm sua autonomia individual.","fund":"LEI: LC 94/1998 + Decreto 7.469/2011 (COARIDE). A RIDE é região funcional de planejamento, não ente federativo nem pessoa jurídica.","peg":"RIDE: sem personalidade jurídica, sem autonomia orçamentária. COARIDE: órgão gestor sem personalidade própria. Municipios integrantes mantêm autonomia."},{"n":117,"enun":"As Regiões Administrativas (RAs) do Distrito Federal são criadas por lei distrital, mas os administradores regionais são eleitos diretamente pela população de cada RA.","gab":"ERRADO","com":"Os administradores regionais do DF são NOMEADOS pelo Governador do DF — não são eleitos. As RAs não possuem autonomia política própria (sem câmara municipal, sem prefeito eleito). São divisões administrativas desconcentradas do GDF, geridas por servidor de confiança nomeado.","fund":"LEI: Lei Orgânica do DF (LODF) — administradores regionais nomeados pelo Governador. CF, art. 32: veda divisão do DF em municípios, logo sem eleições de prefeitos de RAs.","peg":"RAs: administrador nomeado pelo Governador, não eleito. Ausência de autonomia política = ausência de eleições locais para RAs."},{"n":118,"enun":"Compete à União organizar e manter a Polícia Civil, a Polícia Militar e o Corpo de Bombeiros Militar do Distrito Federal, remunerando seus servidores, embora o Governador do DF seja responsável pela nomeação do Delegado-Geral da PCDF.","gab":"CERTO","com":"Art. 21, XIV, CF: União organiza e mantém (custeia) as forças policiais e bombeiros do DF. Porém, a gestão operacional e as nomeações dos cargos de chefia (como Delegado-Geral) são atribuições do Governador do DF, conforme a LODF. Há dualidade: financiamento federal + gestão estadual.","fund":"LEI: Art. 21, XIV, CF: 'Compete à União: XIV — organizar e manter a polícia civil, a polícia penal, a polícia militar e o corpo de bombeiros militar do Distrito Federal, bem como prestar assistência financeira ao Distrito Federal para a execução de serviços públicos...' LODF: nomeação do Delegado-Geral pelo Governador.","peg":"União: organiza e MANTÉM (paga). Governador: nomeia os chefes (Delegado-Geral da PCDF, Comandante PMDF). Distinção fina cobrada pela CEBRASPE."},{"n":119,"enun":"O PDPM (Plano Distrital de Política para as Mulheres) é um instrumento de planejamento do GDF que institui diretrizes para a política de enfrentamento à violência contra a mulher no DF, alinhado à Lei Maria da Penha.","gab":"CERTO","com":"O PDPM integra as políticas distritais de proteção à mulher, articulado com a Secretaria da Mulher do GDF e com os serviços de enfrentamento à violência doméstica no DF. A PCDF tem papel central na execução: flagrantes de violência doméstica, medidas protetivas e investigação de feminicídios.","fund":"LODF + PDPM (Decreto distrital). Lei 11.340/2006 (Lei Maria da Penha) — aplicável no DF como em todo o território nacional.","peg":""},{"n":120,"enun":"No Distrito Federal, o PIB per capita figura entre os mais altos do país, em razão da concentração de servidores públicos federais e de atividades do setor de serviços, o que resulta, paradoxalmente, em elevada desigualdade interna medida pelo índice de Gini.","gab":"CERTO","com":"DF tem o maior PIB per capita do Brasil (concentrado no funcionalismo federal e serviços), mas também uma das maiores desigualdades internas: o contraste entre o Plano Piloto (Lago Sul, Asa Norte) e as RAs periféricas (Ceilândia, Estrutural) é expressivo. IDH médio alto (0,824, 1º no Brasil), mas Gini elevado.","fund":"IBGE — dados do DF: PIB per capita líder nacional. IDH 1º colocado. Gini elevado — paradoxo de desigualdade em ente de alto rendimento médio.","peg":""}]}]};
/* ==INJECT:END== */

/* ── TRAP WORDS ──────────────────────────────────────────── */
const TRAP_WORDS=[
  'tão somente','somente','apenas','unicamente','exclusivamente',
  'em qualquer hipótese','em nenhuma hipótese','em qualquer caso','em todo caso',
  'independentemente','independente de','mesmo que','ainda que',
  'obrigatoriamente','obrigatória','obrigatório','necessariamente',
  'imprescindível','indispensável','imediatamente','automaticamente',
  'de pleno direito','por si só','toda vez que','a qualquer tempo',
  'nunca','jamais','sempre','absolutamente','absoluta',
  'é vedado','são vedados','é proibido','são proibidos',
  'não pode','não podem','impossível','é impossível',
  'salvo','exceto','ressalvado','ressalvada',
  'expressamente','tacitamente'
].sort((a,b)=>b.length-a.length); // longer phrases first

function _escRx(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}
function highlightTraps(html){
  // html is already HTML-escaped plain text; safe to inject <mark>
  TRAP_WORDS.forEach(w=>{
    const re=new RegExp(`(?<![\\wÀ-ÿ])(${_escRx(w)})(?![\\wÀ-ÿ])`,'gi');
    html=html.replace(re,'<mark class="trap-word">$1</mark>');
  });
  return html;
}

function computeFilteredNs(type, disc){
  return S.flat.filter(x=>{
    const dm = !disc || x.discNome === disc;
    if(type==='erros')        return dm && S.respostas[x.n] && S.respostas[x.n]!==x.item.gab;
    if(type==='branco')       return dm && !S.respostas[x.n];
    if(type==='lac')          return dm && S.avaliacoes[x.n]==='lac';
    if(type==='dvd')          return dm && S.avaliacoes[x.n]==='dvd';
    if(type==='problematicos') return dm && (
      (S.respostas[x.n] && S.respostas[x.n]!==x.item.gab) ||
      !S.respostas[x.n] || S.avaliacoes[x.n]==='lac');
    if(type==='disc')         return x.discNome===disc;
    return false;
  }).map(x=>x.n);
}

/* ── HISTÓRICO ───────────────────────────────────────────── */
function buildBlocoSummary(){
  const tot=S.flat.length;
  let ok=0,er=0,blank=0;
  S.flat.forEach(x=>{
    const r=S.respostas[x.n];
    if(r===x.item.gab) ok++;
    else if(r) er++;
    else blank++;
  });
  const disc={};
  S.bloco.disciplinas.forEach(d=>{
    let dok=0,der=0;
    d.itens.forEach(it=>{const r=S.respostas[it.n];if(r===it.gab)dok++;else if(r)der++;});
    const short=d.nome.replace('Direito ','').replace(/ e Legislação .*/,'');
    disc[short]={ok:dok,er:der,tot:d.itens.length};
  });
  const avCnt={dom:0,dvd:0,lac:0,leit:0};
  Object.values(S.avaliacoes).forEach(v=>{if(v in avCnt)avCnt[v]++;});
  return {
    blocoId:S.bloco.meta.id, data:S.bloco.meta.data||S.bloco.meta.id,
    titulo:S.bloco.meta.titulo||'',
    totalQuestoes:tot, acertos:ok, erros:er, branco:blank,
    saldo:ok-er, pct:tot>0?Math.round(ok/tot*100):0,
    tempo:S.totalMs, disciplinas:disc, avaliacoes:avCnt,
    finishedAt:Date.now()
  };
}
/* ── SM-2 SPACED REPETITION ──────────────────────────────── */
function computeSRQuality(h){
  // Mapeia desempenho do bloco para quality SM-2 (0–5)
  const pct=h.pct;
  const av=h.avaliacoes||{};
  const avTotal=(av.dom||0)+(av.dvd||0)+(av.lac||0)+(av.leit||0);
  // Base a partir do aproveitamento
  let q;
  if(pct>=90) q=5;
  else if(pct>=80) q=4;
  else if(pct>=70) q=3;
  else if(pct>=55) q=2;
  else if(pct>=40) q=1;
  else q=0;
  // Ajuste pela autoavaliação: muitas lacunas penaliza, muito domínio bonifica
  if(avTotal>0){
    const lacRatio=(av.lac||0)/avTotal;
    const domRatio=(av.dom||0)/avTotal;
    if(lacRatio>0.4 && q>1) q--;
    if(domRatio>0.6 && q<5) q++;
  }
  return Math.max(0,Math.min(5,q));
}
function applySM2(sr,quality){
  // sr = {interval, repetitions, ef} ou null (primeira vez)
  let {interval=1,repetitions=0,ef=2.5}=sr||{};
  if(quality<3){
    // Abaixo do limiar: recomeça intervalo mas mantém EF (penaliza menos)
    repetitions=0; interval=1;
  } else {
    if(repetitions===0) interval=1;
    else if(repetitions===1) interval=6;
    else interval=Math.round(interval*ef);
    ef=ef+(0.1-(5-quality)*(0.08+(5-quality)*0.02));
    ef=Math.max(1.3,Math.round(ef*100)/100);
    repetitions++;
  }
  const next=new Date();
  next.setDate(next.getDate()+interval);
  return {interval,repetitions,ef,nextReview:next.toISOString().slice(0,10)};
}
function srBadgeHtml(sr){
  if(!sr||!sr.nextReview) return '';
  const today=new Date().toISOString().slice(0,10);
  const diff=(new Date(sr.nextReview)-new Date(today))/(1000*60*60*24);
  if(diff<=0)  return `<span class="sr-badge due">⟳ Revisar hoje</span>`;
  if(diff<=2)  return `<span class="sr-badge soon">⟳ ${Math.round(diff)}d</span>`;
  return `<span class="sr-badge ok">⟳ ${fmtDateShort(sr.nextReview)}</span>`;
}

function saveToHistory(){
  try{
    let hist=loadHistory();
    const s=buildBlocoSummary();
    const idx=hist.findIndex(h=>h.blocoId===s.blocoId);
    // Preserva SR anterior (acumula repetições)
    const prevSR=idx>=0?(hist[idx].sr||null):null;
    const quality=computeSRQuality(s);
    s.sr=applySM2(prevSR,quality);
    s.srQuality=quality; // guarda para debug
    if(idx>=0) hist[idx]=s; else hist.push(s);
    if(hist.length>90) hist=hist.slice(-90);
    localStorage.setItem(HIST_KEY,JSON.stringify(hist));
  }catch(e){}
}
function loadHistory(){
  try{const r=localStorage.getItem(HIST_KEY);return r?JSON.parse(r):[]}catch(e){return [];}
}
function buildBarChart(entries){
  if(!entries.length) return '';
  const W=520,H=108,padB=17,padT=13,inner=H-padB-padT;
  const n=entries.length;
  const bW=Math.max(7,Math.min(26,Math.floor((W-16)/n)-3));
  const gap=(W-bW*n)/(n+1);
  let s=`<svg viewBox="0 0 ${W} ${H}" width="100%" xmlns="http://www.w3.org/2000/svg">`;
  // gridlines
  [50,70,90].forEach(pct=>{
    const gy=padT+Math.round((1-pct/100)*inner);
    s+=`<line x1="0" y1="${gy}" x2="${W}" y2="${gy}" stroke="var(--bord)" stroke-width="1"/>`;
    s+=`<text x="2" y="${gy-2}" font-size="7.5" fill="var(--txt3)">${pct}%</text>`;
  });
  // ref line 70%
  const ry=padT+Math.round(.3*inner);
  s+=`<line x1="0" y1="${ry}" x2="${W}" y2="${ry}" stroke="var(--green)" stroke-dasharray="4,3" opacity=".45" stroke-width="1.2"/>`;
  // bars
  entries.forEach((e,i)=>{
    const bH=Math.max(2,Math.round((e.pct/100)*inner));
    const x=gap+i*(bW+gap), y=H-padB-bH;
    const col=e.pct>=70?'var(--green)':e.pct>=50?'var(--acc)':'var(--red)';
    s+=`<rect x="${x.toFixed(1)}" y="${y}" width="${bW}" height="${bH}" rx="3" fill="${col}" opacity=".82"/>`;
    if(bH>16){s+=`<text x="${(x+bW/2).toFixed(1)}" y="${y+bH-4}" text-anchor="middle" font-size="8" fill="rgba(255,255,255,.8)" font-weight="700">${e.pct}%</text>`;}
    else{s+=`<text x="${(x+bW/2).toFixed(1)}" y="${y-2}" text-anchor="middle" font-size="7.5" fill="${col}">${e.pct}%</text>`;}
    const dl=fmtDateShort(e.data).slice(0,5);
    s+=`<text x="${(x+bW/2).toFixed(1)}" y="${H-2}" text-anchor="middle" font-size="7" fill="var(--txt3)">${dl}</text>`;
  });
  s+='</svg>';
  return s;
}

/* ── DATA ─────────────────────────────────────────────────── */
function flattenBloco(b){
  const arr=[];
  b.disciplinas.forEach((d,di)=>{
    d.itens.forEach(it=>arr.push({n:it.n,discIdx:di,discNome:d.nome,cmd:d.comando,item:it}));
  });
  return arr;
}
function loadBloco(b){
  S.bloco=b; S.flat=flattenBloco(b);
  S.respostas={}; S.gabsShown={}; S.globalGabShown=false;
  S.avaliacoes={};
  S.totalMs=0; S.startedAt=null; S.finished=false;
}

/* ── DATE FORMAT ─────────────────────────────────────────── */
function fmtDateShort(iso){
  // "2026-06-05" → "05.06.26"
  if(!iso) return '';
  const p=iso.split('-');
  if(p.length<3) return iso;
  return `${p[2]}.${p[1]}.${p[0].slice(2)}`;
}

/* ── TIMER ───────────────────────────────────────────────── */
function fmtTime(ms){
  const s=Math.floor(ms/1000), m=Math.floor(s/60), h=Math.floor(m/60);
  if(h>0) return `${h}h ${(m%60).toString().padStart(2,'0')}m`;
  return `${m}:${(s%60).toString().padStart(2,'0')}`;
}
function startTimer(){
  if(S.timerInterval) return;
  S.startedAt=Date.now();
  S.timerInterval=setInterval(()=>{
    const elapsed=S.totalMs+(Date.now()-S.startedAt);
    const el=document.getElementById('hdr-timer-txt');
    if(el) el.textContent=fmtTime(elapsed);
    const bpel=document.getElementById('bp-time');
    if(bpel) bpel.textContent=fmtTime(elapsed);
  },1000);
}
function stopTimer(){
  if(S.timerInterval){clearInterval(S.timerInterval);S.timerInterval=null;}
  if(S.startedAt){S.totalMs+=Date.now()-S.startedAt;S.startedAt=null;}
}

function togglePause(){
  if(S.finished) return;
  S.paused=!S.paused;
  const btn=document.getElementById('btn-pause');
  const overlay=document.getElementById('pause-overlay');
  if(S.paused){
    // Pausa: para timers, bloqueia tela
    stopTimer();
    if(QT.tickInterval){clearInterval(QT.tickInterval);QT.tickInterval=null;}
    if(QT.observer){QT.observer.disconnect();QT.observer=null;}
    QT.visible.clear();
    overlay.classList.remove('hidden');
    btn.textContent='▶';
    btn.classList.add('paused');
    btn.title='Retomar';
  } else {
    // Retoma: esconde overlay, reinicia timers
    overlay.classList.add('hidden');
    btn.textContent='⏸';
    btn.classList.remove('paused');
    btn.title='Pausar';
    // Reinicia apenas se estiver na prova ou no foco
    const inProva=!document.getElementById('sec-prova').classList.contains('hidden');
    const inFoco=FOCO.active;
    if(inProva||inFoco){
      startTimer();
      if(!QT.tickInterval&&!FOCO.active){
        // re-inicia observer e tick na prova normal
        initQTimer();
      } else if(FOCO.active){
        // no foco apenas o tick
        QT.lastTickAt=Date.now();
        QT.tickInterval=setInterval(_qtTick,500);
      }
    }
  }
}
