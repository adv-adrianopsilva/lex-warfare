<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PCDF · Delegado 2026</title>
<!-- PWA -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0a0b14">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PCDF">
<link rel="apple-touch-icon" href="/icons/icon-180.png">
<link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png">
<link rel="apple-touch-icon" sizes="167x167" href="/icons/icon-167.png">
<link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180.png">
<link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png">
<style>
/* ── TOKENS ──────────────────────────────────────────────── */
:root{
  --bg:#0a0b0e; --surf:#12141a; --surf2:#181b24; --surf3:#1e2230;
  --bord:#252a3a; --bord2:#2e3448;
  --txt:#e4e8f4; --txt2:#7a8399; --txt3:#3d4562;
  --acc:#e8a020; --acc-dim:rgba(232,160,32,.13); --acc-glow:rgba(232,160,32,.28); --acc-bord:rgba(232,160,32,.32); --acc-bg:#1c1206;
  --green:#28c76f; --green-bg:rgba(40,199,111,.1); --green-bord:rgba(40,199,111,.3);
  --red:#f05252; --red-bg:rgba(240,82,82,.1); --red-bord:rgba(240,82,82,.3);
  --amber:#f59e0b; --amber-bg:rgba(245,158,11,.1); --amber-bord:rgba(245,158,11,.3);
  --mono:"SF Mono","Fira Code",monospace;
  --r:12px; --r-sm:8px; --r-xs:5px;
  --trans:140ms cubic-bezier(.4,0,.2,1);
  --shadow:0 2px 14px rgba(0,0,0,.5); --shadow-lg:0 4px 28px rgba(0,0,0,.65);
}
[data-theme=light]{
  --bg:#f1f3f8; --surf:#fff; --surf2:#f5f7fc; --surf3:#eef0f8;
  --bord:#dde2ef; --bord2:#cdd3e6;
  --txt:#0e1121; --txt2:#5a6380; --txt3:#9ea8c0;
  --acc:#c47c0a; --acc-dim:rgba(196,124,10,.08); --acc-glow:rgba(196,124,10,.2); --acc-bord:rgba(196,124,10,.28); --acc-bg:#fdf6e8;
  --green:#16a34a; --green-bg:rgba(22,163,74,.08); --green-bord:rgba(22,163,74,.28);
  --red:#dc2626; --red-bg:rgba(220,38,38,.08); --red-bord:rgba(220,38,38,.28);
  --amber:#d97706; --amber-bg:rgba(217,119,6,.08); --amber-bord:rgba(217,119,6,.28);
  --shadow:0 2px 8px rgba(0,0,0,.1); --shadow-lg:0 4px 16px rgba(0,0,0,.15);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;font-size:15px;line-height:1.6;transition:background var(--trans),color var(--trans)}
button{font-family:inherit;cursor:pointer}

/* ── HEADER ──────────────────────────────────────────────── */
.hdr{position:sticky;top:0;z-index:100;background:var(--surf);border-bottom:1px solid var(--bord);box-shadow:var(--shadow)}
.hdr-inner{max-width:860px;margin:0 auto;display:flex;align-items:center;gap:10px;height:62px;padding:0 18px}
.hdr-brand{display:flex;align-items:center;gap:11px;flex:1;min-width:0}
.delta-badge{width:42px;height:42px;border-radius:10px;background:var(--acc);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:#0a0b0e;flex-shrink:0;letter-spacing:-.02em;box-shadow:0 2px 10px var(--acc-glow)}
.hdr-name{font-weight:800;font-size:16.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.01em}
.hdr-date{font-size:12px;color:var(--txt2);margin-top:1px}
.hdr-chips{display:flex;gap:5px;align-items:center;flex-shrink:0}
.chip{border-radius:6px;padding:2px 9px;font-size:12px;font-weight:700}
.chip.g{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bord)}
.chip.r{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bord)}
.chip.n{background:var(--surf2);color:var(--txt2);border:1px solid var(--bord)}
.chip.t{background:var(--acc-dim);color:var(--acc);border:1px solid var(--acc-bord)}
.hdr-timer-wrap{display:flex;align-items:center;gap:6px;flex-shrink:0;background:var(--surf2);border:1px solid var(--bord);border-radius:8px;padding:5px 10px}
.hdr-timer-wrap.hidden{display:none!important}
.hdr-timer-wrap svg.clock-ic{width:17px;height:17px;color:var(--acc);flex-shrink:0}
.hdr-timer-txt{font-size:15px;font-weight:700;color:var(--txt);font-variant-numeric:tabular-nums;min-width:38px}
#btn-pause{background:transparent;border:none;cursor:pointer;padding:0 2px;font-size:14px;color:var(--txt2);line-height:1;transition:color var(--trans)}
#btn-pause:hover{color:var(--acc)}
#btn-pause.paused{color:var(--acc)}
/* Overlay de pausa */
#pause-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.72);backdrop-filter:blur(6px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px}
#pause-overlay.hidden{display:none!important}
.pause-card{background:var(--surf1);border:1px solid var(--bord);border-radius:16px;padding:40px 56px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:14px}
.pause-icon{font-size:48px;line-height:1}
.pause-title{font-size:22px;font-weight:700;color:var(--txt)}
.pause-sub{font-size:14px;color:var(--txt2)}
.pause-resume{background:var(--acc);color:#000;border:none;border-radius:10px;padding:13px 36px;font-size:16px;font-weight:700;cursor:pointer;transition:opacity var(--trans)}
.pause-resume:hover{opacity:.85}
.hdr-actions{display:flex;gap:3px;flex-shrink:0}
.icon-btn{background:var(--surf2);border:1px solid var(--bord);color:var(--txt2);border-radius:7px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all var(--trans)}
.icon-btn:hover{background:var(--acc-dim);border-color:var(--acc-bord);color:var(--acc)}
.prog-rail{height:2px;background:var(--surf3)}
.prog-fill{height:2px;background:var(--acc);transition:width .4s}

/* ── COVER ───────────────────────────────────────────────── */
.cover{max-width:580px;margin:0 auto;padding:48px 18px 80px;text-align:center;animation:fadeIn .4s ease}
.cover-kicker{font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--acc);font-weight:700;margin-bottom:16px}
.cover h1{font-size:clamp(32px,5vw,48px);font-weight:800;font-style:italic;margin-bottom:14px;line-height:1.1}
.cover-lead{font-size:16px;color:var(--txt2);margin-bottom:32px;line-height:1.5}
.cover-card{background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);padding:24px;text-align:left;box-shadow:var(--shadow)}
.meta-grid{display:grid;grid-template-columns:auto 1fr;gap:7px 18px;font-size:13.5px;margin-bottom:18px}
.meta-grid dt{color:var(--txt3);font-size:11px;letter-spacing:.08em;text-transform:uppercase;align-self:center}
.meta-grid dd{color:var(--txt);margin:0;font-weight:500}
.cover-note{font-size:13.5px;color:var(--txt2);font-style:italic;padding:12px 14px;background:var(--surf2);border-left:3px solid var(--acc-bord);border-radius:0 var(--r-xs) var(--r-xs) 0;margin-bottom:22px;line-height:1.5}
.cover-actions{display:flex;flex-direction:column;gap:10px}
.cover-countdown{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:18px;flex-wrap:wrap}
.ccd-box{text-align:center;background:var(--surf2);border:1px solid var(--bord2);border-radius:var(--r-sm);padding:10px 16px;min-width:62px}
.ccd-num{font-size:28px;font-weight:900;font-style:italic;line-height:1;color:var(--acc)}
.ccd-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--txt3);margin-top:2px}
.ccd-sep{font-size:22px;font-weight:900;color:var(--bord2);margin-bottom:12px}
.sr-due-nudge{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--red-bg);border:1px solid var(--red-bord);border-radius:var(--r-sm);font-size:13px;color:var(--red);margin-bottom:14px;cursor:pointer;transition:background .15s}
.sr-due-nudge:hover{background:rgba(240,82,82,.18)}
.btn-primary{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 28px;background:var(--acc);color:#0a0b0e;border:none;border-radius:var(--r-sm);font-weight:800;font-size:15px;letter-spacing:.02em;transition:all var(--trans);box-shadow:0 4px 16px var(--acc-glow)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px var(--acc-glow)}
.btn-ghost{background:var(--surf2);border:1px solid var(--bord);color:var(--txt2);padding:10px 20px;border-radius:var(--r-sm);font-size:14px;transition:all var(--trans)}
.btn-ghost:hover{border-color:var(--bord2);color:var(--txt)}

/* ── PROVA TOOLBAR ───────────────────────────────────────── */
.tb{position:sticky;top:54px;z-index:90;background:var(--surf);border-bottom:1px solid var(--bord);backdrop-filter:blur(8px)}
.tb-inner{max-width:860px;margin:0 auto;display:flex;align-items:center;gap:8px;padding:8px 18px;flex-wrap:wrap}
.tb-info{font-size:13px;color:var(--txt2);font-variant-numeric:tabular-nums}
.tb-info b{color:var(--txt)}
.tb-spacer{flex:1}
.tb-btn{background:var(--surf2);border:1px solid var(--bord);border-radius:var(--r-sm);padding:6px 13px;font-size:12.5px;color:var(--txt);transition:all var(--trans);display:inline-flex;align-items:center;gap:6px}
.tb-btn:hover{border-color:var(--bord2);background:var(--surf3)}
.tb-btn.danger{border-color:var(--acc-bord);color:var(--acc);background:var(--acc-dim)}
.tb-btn.danger:hover{background:var(--acc-bg)}
.tb-btn svg{width:12px;height:12px}

/* ── PROVA CONTENT ───────────────────────────────────────── */
#prova-wrap{max-width:860px;margin:0 auto;padding:24px 18px 100px}

/* Discipline header */
.disc-section{margin-bottom:48px}
.disc-hdr{text-align:left;margin:40px 0 16px;background:var(--surf);border-top:3px solid var(--acc);border-bottom:1px solid var(--bord);padding:13px 0 11px;position:relative}
.disc-hdr h3{font-weight:800;font-size:20px;letter-spacing:-.01em;text-transform:none;color:var(--txt);display:flex;align-items:center;gap:10px}

.comando{background:var(--surf2);border:1px solid var(--bord);border-radius:var(--r-sm);padding:12px 16px;font-size:14px;color:var(--txt2);margin-bottom:16px;font-style:italic;line-height:1.5}

/* Question block */
.q-block{border-top:1px solid var(--bord);padding:16px 0;scroll-margin-top:100px}
.q-block:first-of-type{border-top:none;padding-top:4px}
.q-line{display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:start}
.q-tag{display:inline-flex;align-items:center;gap:6px;font-weight:800;font-size:13px;color:var(--acc);flex-shrink:0;padding-top:2px;white-space:nowrap}
.q-tag::before{content:'';width:8px;height:12px;background:var(--acc);clip-path:polygon(0 0,80% 0,100% 50%,80% 100%,0 100%);display:inline-block}
.q-text{font-size:15.5px;line-height:1.65;color:var(--txt)}
.q-text .situacao{display:block;font-style:italic;color:var(--txt2);margin-bottom:8px;padding-left:12px;border-left:2px solid var(--bord2)}
.q-marks{display:flex;gap:6px;flex-shrink:0;padding-top:1px}
.q-mark{width:40px;height:40px;border:1.5px solid var(--bord);border-radius:var(--r-sm);background:var(--surf2);font-weight:800;font-size:14px;color:var(--txt2);display:inline-flex;align-items:center;justify-content:center;transition:all var(--trans)}
.q-mark:hover:not(:disabled){border-color:var(--txt2);color:var(--txt);transform:translateY(-1px)}
.q-mark.sel-c{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.q-mark.sel-e{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.q-mark:disabled{opacity:.5;cursor:default}
/* After gabarito shown, ring correct/wrong */
.q-block.gab-on .q-mark.sel-c.is-right,.q-block.gab-on .q-mark.sel-e.is-right{box-shadow:0 0 0 2px var(--green-bg),0 0 0 3px var(--green)}
.q-block.gab-on .q-mark.sel-c.is-wrong,.q-block.gab-on .q-mark.sel-e.is-wrong{box-shadow:0 0 0 2px var(--red-bg),0 0 0 3px var(--red)}

.q-actions-row{margin-top:10px;padding-left:92px;display:flex;align-items:center;gap:10px}
.q-show-gab{background:transparent;border:1px dashed var(--bord2);border-radius:var(--r-xs);padding:3px 11px;font-size:12px;color:var(--txt3);transition:all var(--trans)}
.q-show-gab:hover{border-style:solid;border-color:var(--acc-bord);color:var(--acc)}
.q-status{font-size:11.5px;color:var(--txt3)}
.q-status .ok{color:var(--green);font-weight:600}
.q-status .er{color:var(--red);font-weight:600}

/* Feedback */
.q-feedback{margin-top:14px;border-radius:var(--r-sm);overflow:hidden;border:1px solid var(--bord);animation:fadeUp .2s ease}
.gab-line{display:flex;align-items:center;gap:8px;padding:9px 14px;background:var(--surf2);border-bottom:1px solid var(--bord);font-size:13px;font-weight:700}
.gab-label{color:var(--txt3);font-size:10px;letter-spacing:.1em;text-transform:uppercase;font-weight:600}
.gab-value{color:var(--txt)}
.gab-badge{margin-left:auto;font-size:11.5px;padding:2px 10px;border-radius:99px;font-weight:700}
.gab-badge.ok{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bord)}
.gab-badge.er{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bord)}
.gab-badge.bk{background:var(--surf3);color:var(--txt3);border:1px solid var(--bord)}

.gab-section{border-top:1px solid var(--bord);background:var(--surf)}
.gab-hdr{display:flex;align-items:center;gap:8px;padding:9px 14px;cursor:pointer;font-size:13px;font-weight:600;background:var(--surf2);border:none;width:100%;text-align:left;color:var(--txt);transition:background var(--trans)}
.gab-hdr:hover{background:var(--surf3)}
.gab-icon{flex-shrink:0}
.gab-lbl{flex:1}
.gab-chev{font-size:11px;color:var(--txt3);transition:transform var(--trans)}
.gab-chev.open{transform:rotate(180deg)}
.gab-body{padding:12px 14px;font-size:14px;line-height:1.7;color:var(--txt2)}
.gab-body.hidden{display:none}
.feynman-text{color:var(--txt);font-size:14.5px;line-height:1.75}
.law-block{font-family:var(--mono);font-size:12px;background:var(--surf2);border:1px solid var(--bord);border-radius:var(--r-xs);padding:11px 13px;white-space:pre-wrap;line-height:1.65;color:var(--txt)}
.copy-btn{display:inline-flex;align-items:center;gap:5px;margin-top:8px;font-size:11.5px;padding:4px 12px;border-radius:5px;border:1px solid var(--bord2);background:var(--surf3);color:var(--txt3);cursor:pointer;transition:all var(--trans);font-family:inherit}
.copy-btn:hover{color:var(--acc);border-color:var(--acc-bord);background:var(--acc-dim)}
.peg-box{display:flex;gap:8px;align-items:flex-start;background:var(--amber-bg);border:1px solid var(--amber-bord);border-radius:var(--r-xs);padding:10px 13px;font-size:13px;color:var(--amber);line-height:1.55}

/* ── TRAP WORDS (Releitura Crítica) ──────────────────────── */
.trap-word{font-weight:800;color:var(--acc);background:var(--acc-dim);border-bottom:2px solid var(--acc);padding:0 3px;border-radius:3px}
.releitura-body{font-size:14.5px;line-height:1.8;color:var(--txt);margin-bottom:10px}
.releitura-body .situacao{display:block;font-style:italic;color:var(--txt2);margin-bottom:8px;padding-left:12px;border-left:2px solid var(--bord2)}
.trap-legend{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--txt3);margin-top:6px;flex-wrap:wrap}
.trap-legend .trap-word{font-size:11.5px;cursor:default}
.trap-found{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;color:var(--acc);font-weight:700}

/* ── AUTOAVALIAÇÃO ────────────────────────────────────────── */
.avaliacao-row{padding:11px 14px;background:var(--surf2);border-top:1px solid var(--bord);display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.avaliacao-lbl{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--txt3);font-weight:600;width:100%;margin-bottom:2px}
.av-btn{border-radius:99px;padding:5px 13px;font-size:12.5px;font-weight:700;border:1.5px solid;cursor:pointer;font-family:inherit;transition:all var(--trans);background:transparent}
.av-btn.dom{border-color:var(--green-bord);color:var(--green)}
.av-btn.dom:hover,.av-btn.dom.sel{background:var(--green-bg);box-shadow:0 0 0 2px var(--green-bord)}
.av-btn.dvd{border-color:var(--amber-bord);color:var(--amber)}
.av-btn.dvd:hover,.av-btn.dvd.sel{background:var(--amber-bg);box-shadow:0 0 0 2px var(--amber-bord)}
.av-btn.lac{border-color:var(--red-bord);color:var(--red)}
.av-btn.lac:hover,.av-btn.lac.sel{background:var(--red-bg);box-shadow:0 0 0 2px var(--red-bord)}
.av-btn.leit{border-color:var(--bord2);color:var(--txt2)}
.av-btn.leit:hover,.av-btn.leit.sel{background:var(--surf3);color:var(--txt);box-shadow:0 0 0 2px var(--bord2)}
.av-set{display:flex;align-items:center;gap:8px;padding:9px 14px;background:var(--surf2);border-top:1px solid var(--bord);font-size:13px}
.av-chip{border-radius:99px;padding:3px 12px;font-size:12px;font-weight:700;border:1.5px solid}
.av-chip.dom{background:var(--green-bg);color:var(--green);border-color:var(--green-bord)}
.av-chip.dvd{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-bord)}
.av-chip.lac{background:var(--red-bg);color:var(--red);border-color:var(--red-bord)}
.av-chip.leit{background:var(--surf3);color:var(--txt2);border-color:var(--bord2)}
.av-change{margin-left:auto;background:transparent;border:1px dashed var(--bord2);border-radius:var(--r-xs);padding:2px 9px;font-size:11.5px;color:var(--txt3);cursor:pointer;font-family:inherit;transition:all var(--trans)}
.av-change:hover{color:var(--acc);border-color:var(--acc-bord)}

/* ── DIAGNÓSTICO (Placar) ─────────────────────────────────── */
.diag-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--bord);border:1px solid var(--bord);border-radius:10px;overflow:hidden;margin-bottom:14px}
@media(max-width:600px){.diag-grid{grid-template-columns:repeat(2,1fr)}}
.diag-cell{background:var(--surf2);padding:14px 10px;text-align:center}
.diag-cell .dn{font-size:26px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums}
.diag-cell .dl{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--txt3);margin-top:5px;font-weight:600;line-height:1.3}
.diag-empty{color:var(--txt3);font-size:14px;font-style:italic;padding:12px 0}

/* ── REVISÃO ──────────────────────────────────────────────── */
#rev-wrap{max-width:860px;margin:0 auto;padding:0 0 100px}
.rev-picker{max-width:580px;margin:0 auto;padding:36px 18px 60px;animation:fadeIn .3s ease}
.rev-picker h2{font-size:clamp(22px,4vw,32px);font-weight:800;font-style:italic;margin-bottom:6px}
.rev-picker .sub{font-size:15px;color:var(--txt2);margin-bottom:28px;line-height:1.5}
.filter-sec-lbl{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--txt3);font-weight:700;margin:22px 0 10px}
.filter-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
@media(max-width:480px){.filter-grid{grid-template-columns:1fr}}
.filter-card{background:var(--surf);border:1.5px solid var(--bord);border-radius:var(--r);padding:15px 16px;text-align:left;cursor:pointer;transition:all var(--trans);font-family:inherit;display:flex;flex-direction:column;gap:3px}
.filter-card:hover:not(:disabled){border-color:var(--acc-bord);background:var(--acc-dim)}
.filter-card.sel{border-color:var(--acc);background:var(--acc-dim);box-shadow:0 0 0 1.5px var(--acc)}
.filter-card:disabled{opacity:.35;cursor:not-allowed;pointer-events:none}
.fc-icon{font-size:20px}
.fc-count{font-size:28px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums}
.fc-count.cr{color:var(--red)}.fc-count.ca{color:var(--amber)}.fc-count.cg{color:var(--green)}.fc-count.ct{color:var(--txt)}
.fc-label{font-size:12px;color:var(--txt2);font-weight:600}
.disc-filter-row{display:flex;flex-wrap:wrap;gap:7px}
.disc-btn{background:var(--surf2);border:1.5px solid var(--bord);border-radius:99px;padding:5px 14px;font-size:13px;font-family:inherit;color:var(--txt2);cursor:pointer;transition:all var(--trans);font-weight:500}
.disc-btn:hover{border-color:var(--acc-bord);color:var(--acc)}
.disc-btn.sel{border-color:var(--acc);color:var(--acc);background:var(--acc-dim)}
.mode-box{background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);overflow:hidden;margin-bottom:24px}
.mode-tabs{display:grid;grid-template-columns:1fr 1fr}
.mode-tab{border:none;background:var(--surf2);color:var(--txt2);font-size:14px;font-weight:700;padding:12px 8px;cursor:pointer;font-family:inherit;border-bottom:2px solid transparent;transition:all var(--trans);display:flex;align-items:center;justify-content:center;gap:6px}
.mode-tab:first-child{border-right:1px solid var(--bord)}
.mode-tab.active{background:var(--surf);color:var(--acc);border-bottom-color:var(--acc)}
.mode-desc-txt{font-size:13px;color:var(--txt2);padding:11px 14px;line-height:1.55;border-top:1px solid var(--bord)}
.rev-tb{position:sticky;top:54px;z-index:90;background:var(--surf);border-bottom:1px solid var(--bord)}
.rev-tb-inner{max-width:860px;margin:0 auto;display:flex;align-items:center;gap:8px;padding:7px 18px;flex-wrap:wrap}
.rev-badge{background:var(--acc-dim);border:1px solid var(--acc-bord);color:var(--acc);border-radius:99px;padding:3px 12px;font-size:12px;font-weight:700;flex-shrink:0}
.rev-orig{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;padding:2px 9px;border-radius:99px;font-weight:600;flex-shrink:0}
.rev-orig.ok{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bord)}
.rev-orig.er{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bord)}
.rev-orig.bk{background:var(--surf3);color:var(--txt3);border:1px solid var(--bord)}
.rev-placar-wrap{max-width:580px;margin:0 auto;padding:32px 18px 100px;animation:fadeUp .4s ease}

/* ── ESPAÇAMENTO INTELIGENTE ──────────────────────────────── */
.sr-badge{display:inline-flex;align-items:center;gap:3px;font-size:10.5px;font-weight:700;border-radius:4px;padding:2px 7px;line-height:1.4;white-space:nowrap}
.sr-badge.due{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bord)}
.sr-badge.soon{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bord)}
.sr-badge.ok{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bord)}
.sr-queue-section{margin-bottom:20px}
.sr-queue-hdr{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--red);font-weight:700;margin-bottom:10px}
.sr-queue-row{display:flex;align-items:center;gap:10px;padding:9px 14px;border-radius:var(--r-sm);background:var(--surf);border:1.5px solid var(--red-bord);margin-bottom:7px;cursor:default;transition:background .15s}
.sr-queue-date{font-size:11px;color:var(--txt3);min-width:52px}
.sr-queue-title{flex:1;font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sr-queue-pct{font-size:13px;font-weight:700;min-width:38px;text-align:right}
.sr-interval-info{font-size:11px;color:var(--txt3);margin-top:4px}
/* ── MODO FOCO ────────────────────────────────────────────── */
#sec-foco{position:fixed;inset:0;z-index:150;background:var(--bg);overflow-y:auto;display:flex;flex-direction:column}
#sec-foco.hidden{display:none!important}
.foco-hdr{position:sticky;top:0;z-index:10;background:var(--bg);border-bottom:1px solid var(--bord2);padding:10px 18px;display:flex;align-items:center;gap:12px}
.foco-qnum{font-size:13px;font-weight:700;color:var(--txt2);white-space:nowrap}
.foco-disc{font-size:11.5px;color:var(--txt3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0}
.foco-prog-wrap{display:flex;align-items:center;gap:8px;min-width:110px}
.foco-progress{height:4px;background:var(--bord);border-radius:2px;flex:1}
.foco-prog-fill{height:100%;background:var(--acc);border-radius:2px;transition:width .4s}
.foco-pct{font-size:11px;font-weight:700;color:var(--acc);min-width:28px;text-align:right}
.foco-body{flex:1;max-width:800px;margin:0 auto;padding:28px 20px 16px;width:100%;animation:fadeIn .2s ease}
.foco-body .q-block{border-color:var(--bord2)}
.foco-body .q-text{font-size:16px;line-height:1.8}
.foco-body .q-tag{font-size:14px;width:42px;height:42px;line-height:42px}
.foco-body .q-mark{height:52px;font-size:17px;font-weight:900;min-width:80px}
.foco-body .q-marks{gap:14px}
.foco-nav{max-width:800px;margin:0 auto 40px;padding:0 20px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.foco-nav-hint{font-size:11px;color:var(--txt3);text-align:center;line-height:1.6}
/* ── QUESTION TIMER ──────────────────────────────────────── */
.qt-badge{display:inline-flex;align-items:center;gap:3px;font-size:10.5px;font-weight:700;border-radius:4px;padding:2px 7px;font-variant-numeric:tabular-nums;letter-spacing:.02em;transition:background .35s,color .35s,border-color .35s;min-width:36px;justify-content:center}
.qt-idle{color:var(--txt3);background:transparent}
.qt-normal{background:var(--surf3);color:var(--txt2)}
.qt-warn{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bord)}
.qt-alert{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bord);animation:qtPulse 1s ease-in-out infinite}
.qt-done{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bord)}
@keyframes qtPulse{0%,100%{opacity:1}50%{opacity:.5}}
#qt-pill{position:fixed;bottom:62px;left:50%;transform:translateX(-50%);max-width:860px;width:calc(100% - 32px);z-index:80;pointer-events:none;display:flex;justify-content:flex-end}
.qt-active-pill{background:var(--surf2);border:1px solid var(--bord2);border-radius:20px;padding:5px 14px;font-size:12px;font-weight:700;color:var(--txt2);display:flex;align-items:center;gap:7px;box-shadow:0 2px 12px rgba(0,0,0,.35)}
.qt-active-pill.qt-warn-p{color:var(--amber)}
.qt-active-pill.qt-alert-p{color:var(--red);animation:qtPulse 1s ease-in-out infinite}
/* ── HISTÓRICO ────────────────────────────────────────────── */
#hist-wrap{max-width:860px;margin:0 auto;padding:24px 18px 100px;animation:fadeUp .4s ease}
.hist-header{display:grid;grid-template-columns:62px 72px 50px 68px 60px 1fr 80px;gap:8px;padding:7px 0;border-bottom:2px solid var(--bord);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--txt3);font-weight:700}
.hist-row{display:grid;grid-template-columns:62px 72px 50px 68px 60px 1fr 80px;gap:8px;padding:10px 0;border-top:1px solid var(--bord);font-size:13.5px;align-items:center}
.hist-row:first-child{border-top:none}
.hist-date{color:var(--txt2);font-size:12.5px;font-variant-numeric:tabular-nums;font-weight:600}
.hist-acertos{color:var(--txt);font-variant-numeric:tabular-nums}
.hist-pct{font-weight:800;font-variant-numeric:tabular-nums}
.hist-tempo{color:var(--txt3);font-size:12px;font-variant-numeric:tabular-nums}
.hist-saldo{font-weight:700;font-variant-numeric:tabular-nums}
.hist-av{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.hist-empty{text-align:center;padding:60px 20px}
.hist-empty .hist-emoji{font-size:52px;margin-bottom:18px}
.hist-empty h2{font-size:22px;font-weight:800;margin-bottom:10px}
.hist-empty p{color:var(--txt2);font-size:15px;max-width:340px;margin:0 auto 28px}
.streak-badge{display:inline-flex;align-items:center;gap:5px;background:var(--amber-bg);border:1px solid var(--amber-bord);color:var(--amber);border-radius:99px;padding:3px 12px;font-size:13px;font-weight:700;margin-left:8px}
@media(max-width:600px){
  .hist-header,.hist-row{grid-template-columns:55px 62px 46px 1fr}
  .hist-tempo,.hist-av{display:none}
}

/* ── PLACAR ──────────────────────────────────────────────── */
#placar-wrap{max-width:860px;margin:0 auto;padding:24px 18px 100px;animation:fadeUp .4s ease}
.placar-hero{background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);padding:32px 28px;box-shadow:var(--shadow);margin-bottom:20px;text-align:center}
.placar-kicker{font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--acc);font-weight:700;margin-bottom:14px}
.placar-hero h2{font-size:clamp(28px,4.5vw,40px);font-weight:800;font-style:italic;margin-bottom:8px}
.placar-lead{font-size:15px;color:var(--txt2);margin-bottom:24px}
.placar-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--bord);border:1px solid var(--bord);border-radius:10px;overflow:hidden}
@media(max-width:600px){.placar-stats{grid-template-columns:repeat(2,1fr)}}
.p-stat{background:var(--surf2);padding:16px 10px;text-align:center}
.p-stat .n{font-weight:800;font-size:30px;line-height:1;font-variant-numeric:tabular-nums}
.p-stat .n.g{color:var(--green)}.p-stat .n.r{color:var(--red)}.p-stat .n.a{color:var(--acc)}.p-stat .n.t{color:var(--txt)}
.p-stat .l{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--txt3);margin-top:5px;font-weight:600}

.pl-box{background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);padding:22px;margin-bottom:20px;box-shadow:var(--shadow)}
.pl-title{font-weight:700;font-size:16px;margin-bottom:16px;color:var(--txt)}
.cebraspe-formula{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:14px 16px;background:var(--surf2);border-radius:var(--r-sm);margin-bottom:14px;font-size:14px;border:1px solid var(--bord)}
.cebraspe-formula .part{color:var(--txt2)}
.cebraspe-formula .part b{color:var(--txt);font-weight:700}
.cebraspe-formula .eq{font-weight:800;font-size:20px;color:var(--acc);font-variant-numeric:tabular-nums}
.cebraspe-verdict{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:var(--r-sm);font-weight:700;font-size:14px;border:1px solid}
.cebraspe-verdict.approved{background:var(--green-bg);color:var(--green);border-color:var(--green-bord)}
.cebraspe-verdict.reproved{background:var(--red-bg);color:var(--red);border-color:var(--red-bord)}

/* Discipline chart */
.disc-chart-row{display:grid;grid-template-columns:1.4fr 2.5fr auto auto;gap:12px;align-items:center;padding:9px 0;border-top:1px solid var(--bord);font-size:13.5px}
.disc-chart-row:first-of-type{border-top:none}
.disc-chart-row .nm{color:var(--txt);font-weight:500}
.bar-rail{height:9px;background:var(--surf2);border-radius:99px;overflow:hidden;border:1px solid var(--bord)}
.bar-fill{height:100%;border-radius:99px;transition:width .6s}
.disc-chart-row .frac{color:var(--txt3);font-size:12px;font-variant-numeric:tabular-nums}
.disc-chart-row .pct{font-weight:700;font-size:13px;min-width:40px;text-align:right;font-variant-numeric:tabular-nums}
@media(max-width:600px){.disc-chart-row{grid-template-columns:1fr auto;gap:5px 12px}.bar-rail{grid-column:1/-1;order:3}.disc-chart-row .frac{order:4}}

/* Errors list */
.err-item{border-top:1px solid var(--bord);padding:12px 0}
.err-item:first-child{border-top:none}
.err-row{display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:start;font-size:13.5px}
.err-num{font-weight:800;color:var(--red);font-variant-numeric:tabular-nums;min-width:32px;padding-top:2px}
.err-sub{color:var(--txt);line-height:1.4}
.err-sub small{display:block;color:var(--txt3);font-size:11.5px;margin-top:2px}
.err-toggle{background:var(--surf2);border:1px solid var(--bord);border-radius:var(--r-xs);padding:4px 12px;font-size:12px;color:var(--txt2);transition:all var(--trans);font-family:inherit;white-space:nowrap;display:inline-flex;align-items:center;gap:5px}
.err-toggle:hover{border-color:var(--acc-bord);color:var(--acc);background:var(--acc-dim)}
.err-toggle.open{border-color:var(--acc-bord);color:var(--acc);background:var(--acc-dim)}
.err-gab{display:none;margin-top:12px;border-radius:var(--r-sm);overflow:hidden;border:1px solid var(--bord)}
.err-gab.open{display:block;animation:fadeUp .2s ease}
.placar-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:24px}

/* ── FAB NAV ─────────────────────────────────────────────── */
.fab{position:fixed;right:20px;bottom:72px;width:46px;height:46px;background:var(--acc);color:#0a0b0e;border:none;border-radius:50%;box-shadow:0 4px 16px var(--acc-glow);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;z-index:44;transition:all var(--trans)}
.fab:hover{transform:scale(1.08)}
.fab.hidden{display:none}
.quick-nav{position:fixed;right:20px;bottom:124px;width:auto;min-width:240px;background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);padding:12px;box-shadow:var(--shadow-lg);z-index:45;max-width:320px;max-height:55vh;overflow-y:auto;display:none}
.quick-nav.open{display:block;animation:fadeUp .2s ease}
.qn-title{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--txt3);margin-bottom:8px;font-weight:600}
.qn-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:4px}
.qn-btn{width:30px;height:30px;border:1px solid var(--bord);background:var(--surf2);border-radius:6px;font-size:10.5px;font-weight:700;color:var(--txt3);transition:all .1s;font-variant-numeric:tabular-nums}
.qn-btn:hover{border-color:var(--acc-bord);color:var(--acc);transform:scale(1.08)}
.qn-btn.ac{background:var(--green-bg);border-color:var(--green-bord);color:var(--green)}
.qn-btn.ae{background:var(--red-bg);border-color:var(--red-bord);color:var(--red)}
.qn-btn.gs{border-style:dashed}
.qn-btn.qa{box-shadow:0 0 0 2px var(--red);animation:qtPulse 1.2s ease-in-out infinite}
@keyframes qFlash{0%{box-shadow:0 0 0 3px var(--acc-glow),0 0 18px var(--acc-glow)}60%{box-shadow:0 0 0 2px var(--acc-bord)}100%{box-shadow:none}}
.q-kb-flash{animation:qFlash .55s ease-out}

/* ── PROGRESS BAR (bottom fixed) ─────────────────────────── */
.bot-bar{position:fixed;bottom:0;left:0;right:0;background:var(--surf);border-top:1px solid var(--bord);padding:8px 18px;display:flex;align-items:center;gap:12px;z-index:40;font-size:12px;color:var(--txt2)}
.bot-bar.hidden{transform:translateY(100%);opacity:0;pointer-events:none}
.bot-bar .bbar{flex:1;height:6px;background:var(--surf3);border-radius:99px;overflow:hidden}
.bot-bar .bbar-fill{height:100%;background:var(--acc);transition:width .4s;border-radius:99px}
.bot-bar .bstats{display:flex;gap:10px;flex-shrink:0;font-variant-numeric:tabular-nums}
.bot-bar .bstats .ok{color:var(--green);font-weight:600}.bot-bar .bstats .er{color:var(--red);font-weight:600}

/* ── MODAL ───────────────────────────────────────────────── */
.modal-ov{position:fixed;inset:0;background:rgba(8,9,14,.65);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;padding:18px;animation:fadeIn .2s ease}
.modal{background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);padding:26px;max-width:420px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.5);animation:fadeUp .2s ease}
.modal h3{font-size:19px;font-weight:800;margin-bottom:10px}
.modal p{color:var(--txt2);margin-bottom:20px;font-size:14px;line-height:1.55}
.modal-acts{display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap}
.btn-danger{background:var(--red);color:white;border:none;border-radius:var(--r-sm);padding:9px 18px;font-family:inherit;font-weight:700;font-size:14px;transition:opacity var(--trans)}
.btn-danger:hover{opacity:.88}
.btn-warn{background:var(--amber);color:white;border:none;border-radius:var(--r-sm);padding:9px 18px;font-family:inherit;font-weight:700;font-size:14px;transition:opacity var(--trans)}
.btn-warn:hover{opacity:.88}

/* ── TOAST ───────────────────────────────────────────────── */
.toast{position:fixed;bottom:56px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--surf);border:1px solid var(--bord);color:var(--txt);padding:11px 18px;border-radius:var(--r-sm);font-size:13.5px;z-index:300;opacity:0;transition:opacity .25s,transform .25s;box-shadow:var(--shadow-lg);pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── ANIMATIONS ──────────────────────────────────────────── */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.hidden{display:none!important}

/* ── RESPONSIVE ──────────────────────────────────────────── */
@media(max-width:640px){
  .hdr-inner{padding:0 12px}.hdr-chips{gap:4px}
  .chip{padding:2px 7px;font-size:11px}
  #prova-wrap,#placar-wrap{padding:16px 12px 100px}
  .q-text{font-size:14.5px}
  .prova-title h2{font-size:16px}
  .placar-stats{grid-template-columns:repeat(2,1fr)}
  .q-actions-row{padding-left:0;flex-wrap:wrap}
}
</style>
</head>
<body>

<!-- ══ HEADER ════════════════════════════════════════════ -->
<header class="hdr" id="hdr">
  <div class="hdr-inner">
    <div class="hdr-brand">
      <div class="delta-badge">Δ</div>
      <div>
        <div class="hdr-name">PCDF · Delegado 2026</div>
        <div class="hdr-date" id="hdr-date"></div>
      </div>
    </div>
    <div class="hdr-timer-wrap hidden" id="hdr-timer">
      <svg class="clock-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
      </svg>
      <span class="hdr-timer-txt" id="hdr-timer-txt">0:00</span>
      <button id="btn-pause" title="Pausar / retomar" onclick="togglePause()">⏸</button>
    </div>
    <div class="hdr-chips" id="hdr-chips" style="display:none">
      <span class="chip g" id="c-ok">✓ 0</span>
      <span class="chip r" id="c-er">✗ 0</span>
      <span class="chip n" id="c-tot">0/10</span>
    </div>
    <div class="hdr-actions">
      <button class="icon-btn" id="btn-hist" title="Histórico de estudo">📊</button>
      <button class="icon-btn" id="btn-theme" title="Tema">☀</button>
      <button class="icon-btn hidden" id="btn-gab-all" title="Revelar/ocultar todos os gabaritos">👁</button>
      <button class="icon-btn" id="btn-export" title="Exportar progresso">⬆</button>
      <button class="icon-btn" id="btn-import-bloco" title="Importar bloco JSON">📂</button>
      <button class="icon-btn" id="btn-import-prog" title="Importar progresso">📥</button>
      <button class="icon-btn" id="btn-reset" title="Reiniciar">↺</button>
    </div>
  </div>
  <div class="prog-rail"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
</header>

<!-- ══ PAUSE OVERLAY ═════════════════════════════════════ -->
<div id="pause-overlay" class="hidden">
  <div class="pause-card">
    <div class="pause-icon">⏸</div>
    <div class="pause-title">Prova pausada</div>
    <div class="pause-sub">O cronômetro está parado.<br>Retome quando estiver pronto.</div>
    <button class="pause-resume" onclick="togglePause()">▶ Retomar prova</button>
  </div>
</div>

<!-- ══ SECTIONS ══════════════════════════════════════════ -->
<main>
  <section id="sec-cover"></section>

  <div id="sec-prova" class="hidden">
    <!-- Toolbar -->
    <div class="tb" id="prova-tb">
      <div class="tb-inner">
        <span class="tb-info"><b id="tb-ans">0</b> respondidas &nbsp;|&nbsp; <b id="tb-blank">10</b> em branco</span>
        <span class="tb-spacer"></span>
        <button class="tb-btn" id="tb-gab-all">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="3"/><path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7-10-7-10-7z"/></svg>
          Gabaritos
        </button>
        <button class="tb-btn" id="tb-revisao" onclick="showRevisaoPicker()">
          🔍 Revisão
        </button>
        <button class="tb-btn" id="tb-foco" onclick="enterFoco()">
          🎯 Foco
        </button>
        <button class="tb-btn danger" id="tb-finish">
          Encerrar prova →

<script>
/* ═══════════════════════════════════════════════════════════
   DATA — inject_bloco.py substitui entre ==INJECT:START== e ==INJECT:END==
   ═══════════════════════════════════════════════════════════ */
/* ==INJECT:START== */
const DEFAULT_BLOCO = {"meta":{"id":"2026-06-23","titulo":"Bloco Diário — Fase 2 (Reta Final) · Rodízio amplo das 10 disciplinas","data":"2026-06-23","totalQuestoes":120,"concurso":"Delegado PCDF 2026","edital":"Edital nº 1, de 3/2/2026","observacao":"Fase 2 — Dia A. Revisão ampla das densas congeladas + parciais. Ancoragem em lei seca; jurisprudência restrita ao lastro verificado (SV11, Tema 280, Súm. 444/438 STJ, HC 598.886, divergência D1). Zero jurisprudência não verificada."},"disciplinas":[{"nome":"Direito Penal + Legislação Especial","comando":"Acerca da lei penal no tempo e no espaço, teoria do crime (tipicidade, ilicitude, culpabilidade, erro e iter criminis), teoria da pena e extinção da punibilidade, crimes em espécie e legislação penal especial (Drogas, Desarmamento, Tortura, Organização Criminosa, Lavagem e Maria da Penha), julgue os itens a seguir.","itens":[{"n":1,"enun":"A lei penal mais benéfica retroage para alcançar fatos anteriores à sua vigência, salvo se já tiver ocorrido o trânsito em julgado da sentença condenatória, hipótese em que a coisa julgada impede a retroatividade.","gab":"ERRADO","com":"Pensa na lei mais branda como um perdão parcial que corre atrás do passado: se surge depois e favorece o réu, ela alcança o fato MESMO que o processo já tenha acabado e a condenação esteja definitiva. O trânsito em julgado NÃO é uma parede que segura a lei benéfica — o item inventa essa barreira.","fund":"LEI: CP, art. 2º, parágrafo único: 'A lei posterior, que de qualquer modo favorecer o agente, aplica-se aos fatos anteriores, ainda que decididos por sentença condenatória transitada em julgado.'","peg":"O trânsito em julgado NÃO barra a lex mitior (o item afirma o oposto da lei)."},{"n":2,"enun":"De acordo com o Código Penal, considera-se praticado o crime no momento da produção do resultado, ainda que outro tenha sido o momento da ação ou omissão.","gab":"ERRADO","com":"Aqui o CP adota a teoria da atividade para o TEMPO do crime: vale o momento da CONDUTA (ação ou omissão), não o do resultado. É o contrário do que o item afirma. O resultado é que importa para o LUGAR do crime (teoria da ubiquidade), não para o tempo.","fund":"LEI: CP, art. 4º: 'Considera-se praticado o crime no momento da ação ou omissão, ainda que outro seja o momento do resultado.'","peg":"Troca proposital: tempo = teoria da atividade (conduta), não do resultado."},{"n":3,"enun":"No erro de tipo essencial inevitável, exclui-se o dolo, mas o agente pode responder por crime culposo se houver previsão legal da modalidade culposa.","gab":"ERRADO","com":"Erro de tipo INEVITÁVEL (escusável) apaga tudo: exclui dolo E culpa, logo o fato fica atípico. Quem pode gerar punição por culpa é o erro de tipo EVITÁVEL (vencível). O item inverteu o resultado do erro inevitável.","fund":"LEI: CP, art. 20, caput: 'O erro sobre elemento constitutivo do tipo legal de crime exclui o dolo, mas permite a punição por crime culposo, se previsto em lei.' (a punição por culpa pressupõe erro EVITÁVEL; o inevitável exclui dolo e culpa).","peg":"Inevitável exclui dolo E culpa; só o evitável deixa resíduo culposo."},{"n":4,"enun":"Na desistência voluntária e no arrependimento eficaz, o agente responde apenas pelos atos já praticados, afastando-se a punição pela tentativa do crime inicialmente pretendido.","gab":"CERTO","com":"Imagine que a pessoa já começou a escalar o muro do crime, mas desce por vontade própria antes de chegar ao topo (desistência) ou desfaz o estrago a tempo (arrependimento eficaz). Ela não responde pela tentativa do crime maior, só pelo que efetivamente já causou (a 'ponte de ouro').","fund":"LEI: CP, art. 15: 'O agente que, voluntariamente, desiste de prosseguir na execução ou impede que o resultado se produza, só responde pelos atos já praticados.'"},{"n":5,"enun":"Considere que um agente, querendo matar a vítima, dispara contra um manequim que supunha ser a pessoa-alvo. Nesse caso, há crime impossível por absoluta impropriedade do objeto, e o agente não responde por tentativa de homicídio.","gab":"CERTO","com":"Atirar num manequim achando que é gente é como tentar afogar uma estátua: o objeto material (a pessoa viva) simplesmente não existe naquele alvo. Por absoluta impropriedade do objeto, o resultado nunca seria possível, então não há tentativa punível.","fund":"LEI: CP, art. 17: 'Não se pune a tentativa quando, por ineficácia absoluta do meio ou por absoluta impropriedade do objeto, é impossível consumar-se o crime.'","peg":"Manequim = objeto absolutamente impróprio (não há pessoa viva), logo crime impossível."},{"n":6,"enun":"Não há excesso punível em legítima defesa quando o agente, podendo repelir injusta agressão atual com meios moderados, opta por reação claramente desproporcional por mero capricho.","gab":"ERRADO","com":"A legítima defesa exige meios MODERADOS. Se a pessoa exagera de propósito (dolosamente), ela responde pelo excesso. O item diz que 'não há excesso punível', mas o art. 23, parágrafo único, prevê justamente a punição do excesso doloso ou culposo.","fund":"LEI: CP, art. 25 (legítima defesa: meios necessários moderadamente); art. 23, parágrafo único: 'O agente, em qualquer das hipóteses deste artigo, responderá pelo excesso doloso ou culposo.'","peg":"Reação desproporcional por capricho = excesso doloso, sim punível."},{"n":7,"enun":"A emoção e a paixão excluem a imputabilidade penal, isentando o agente de pena quando este pratica o crime sob forte abalo emocional.","gab":"ERRADO","com":"Sangue quente não apaga a responsabilidade: emoção e paixão NÃO excluem a imputabilidade. No máximo a emoção, sob certas condições, pode reduzir a pena (atenuante ou minorante em alguns crimes), mas nunca isenta. O CP é expresso nisso.","fund":"LEI: CP, art. 28, I: 'Não excluem a imputabilidade penal: I - a emoção ou a paixão.'","peg":"Emoção/paixão NÃO isentam de pena."},{"n":8,"enun":"O agente que comete crime sob coação moral irresistível ou em estrita obediência a ordem, não manifestamente ilegal, de superior hierárquico, fica isento de pena, respondendo pelo fato o autor da coação ou da ordem.","gab":"CERTO","com":"Quando alguém age como um fantoche, ou porque foi forçado por coação moral que não dava para resistir, ou porque cumpriu ordem de superior que não parecia ilegal, a culpabilidade dele é afastada. Quem segura a corda do fantoche (o coator ou quem deu a ordem) é que responde.","fund":"LEI: CP, art. 22: 'Se o fato é cometido sob coação irresistível ou em estrita obediência a ordem, não manifestamente ilegal, de superior hierárquico, só é punível o autor da coação ou da ordem.'","peg":"Coação moral IRRESISTÍVEL e ordem NÃO manifestamente ilegal: isenção. Detalhe das palavras-chave."},{"n":9,"enun":"As penas restritivas de direitos são autônomas e substituem as privativas de liberdade, podendo, em regra, ser aplicadas cumulativamente com a pena privativa de liberdade na mesma condenação.","gab":"ERRADO","com":"Restritivas de direitos funcionam como uma TROCA: entram no lugar da prisão (são substitutivas), não somam com ela. O item erra ao dizer que se aplicam cumulativamente com a privativa de liberdade. Elas são autônomas e substitutivas.","fund":"LEI: CP, art. 44, caput: 'As penas restritivas de direitos são autônomas e substituem as privativas de liberdade...'","peg":"Substituem, não somam com a prisão."},{"n":10,"enun":"Na fixação da pena-base, o juiz não pode considerar inquéritos policiais e ações penais em curso para agravar a circunstância judicial dos maus antecedentes.","gab":"CERTO","com":"Processo em andamento não é condenação: enquanto não houver trânsito em julgado, vale a presunção de inocência. Por isso o STJ pacificou que inquéritos e ações penais em curso não podem pesar como maus antecedentes na primeira fase da dosimetria.","fund":"JURISPRUDÊNCIA: STJ, Súmula 444: 'É vedada a utilização de inquéritos policiais e ações penais em curso para agravar a pena-base.'","peg":"Súmula 444 STJ: nada de processo em curso na pena-base."},{"n":11,"enun":"Reconhecida a prescrição da pretensão punitiva pela pena em concreto fixada na sentença ainda não transitada em julgado, calculada de forma retroativa, é admissível também a chamada prescrição em perspectiva ou virtual.","gab":"ERRADO","com":"A prescrição retroativa (com base na pena concreta da sentença) existe. Já a 'virtual' ou 'em perspectiva' — quando o juiz antecipa uma pena hipotética que nem foi fixada — é inadmissível. O item mistura as duas para induzir a aceitar a virtual.","fund":"JURISPRUDÊNCIA: STJ, Súmula 438: 'É inadmissível a extinção da punibilidade pela prescrição da pretensão punitiva com fundamento em pena hipotética, independentemente da existência ou sorte do processo penal.'","peg":"Prescrição virtual/em perspectiva (pena hipotética) NÃO existe no ordenamento."},{"n":12,"enun":"O perdão judicial, nas hipóteses legalmente previstas, é causa de extinção da punibilidade, e a sentença que o concede não será considerada para fins de reincidência.","gab":"CERTO","com":"O perdão judicial é o juiz dizendo 'a própria desgraça já te puniu o suficiente' (ex.: o pai que mata culposamente o filho no trânsito). Extingue a punibilidade e, por súmula consolidada e pelo próprio CP, a sentença que perdoa não gera reincidência.","fund":"LEI: CP, art. 107, IX (extinção da punibilidade pelo perdão judicial nos casos previstos em lei); CP, art. 120: 'A sentença que conceder perdão judicial não será considerada para efeitos de reincidência.'"},{"n":13,"enun":"No furto privilegiado, exige-se que o agente seja primário e que a coisa furtada seja de pequeno valor; preenchidos esses requisitos, o juiz fica obrigado a aplicar somente a pena de multa, vedada a substituição da reclusão por detenção.","gab":"ERRADO","com":"O furto privilegiado abre TRÊS caminhos ALTERNATIVOS ao juiz — substituir reclusão por detenção, reduzir de 1/3 a 2/3, OU só multa — e não obriga a aplicar apenas multa. O item trava o juiz numa única saída e proíbe a substituição, contrariando o § 2º.","fund":"LEI: CP, art. 155, § 2º: 'Se o criminoso é primário, e é de pequeno valor a coisa furtada, o juiz pode substituir a pena de reclusão pela de detenção, diminuí-la de um a dois terços, ou aplicar somente a pena de multa.'","peg":"São três opções ALTERNATIVAS do juiz; nada de multa obrigatória nem vedação à detenção."},{"n":14,"enun":"Caracteriza roubo, e não furto, a subtração de coisa móvel alheia em que o agente, logo depois de subtraída a coisa, emprega violência contra pessoa para assegurar a impunidade do crime ou a detenção da coisa para si.","gab":"CERTO","com":"É o roubo impróprio: a violência não vem ANTES para tomar a coisa, mas DEPOIS, para garantir a fuga ou segurar o produto. A subtração começa como furto e 'vira' roubo no momento em que entra a violência ou grave ameaça pós-subtração.","fund":"LEI: CP, art. 157, § 1º: 'Na mesma pena incorre quem, logo depois de subtraída a coisa, emprega violência contra pessoa ou grave ameaça, a fim de assegurar a impunidade do crime ou a detenção da coisa para si ou para terceiro.'","peg":"Roubo impróprio = violência/ameaça LOGO DEPOIS da subtração."},{"n":15,"enun":"O crime de peculato-furto ocorre quando o funcionário público, embora não tenha a posse do dinheiro, valor ou bem, subtrai-o, ou concorre para que seja subtraído, valendo-se da facilidade que lhe proporciona a qualidade de funcionário.","gab":"CERTO","com":"No peculato-furto o servidor NÃO tinha a posse do bem (diferente do peculato comum, em que ele já tinha): ele se aproveita da chave-mestra que o cargo lhe dá para subtrair. É a 'facilidade' do crachá que o torna peculato e não furto comum.","fund":"LEI: CP, art. 312, § 1º: 'Aplica-se a mesma pena, se o funcionário público, embora não tendo a posse do dinheiro, valor ou bem, o subtrai, ou concorre para que seja subtraído, em proveito próprio ou alheio, valendo-se da facilidade que lhe proporciona a qualidade de funcionário.'"},{"n":16,"enun":"Pratica o crime de concussão o funcionário público que solicita, para si ou para outrem, direta ou indiretamente, em razão da função, vantagem indevida.","gab":"ERRADO","com":"O verbo da concussão é EXIGIR (impor, com o peso do cargo). 'Solicitar' (pedir) é o núcleo da corrupção passiva (art. 317). O item troca o verbo e descreve, na verdade, corrupção passiva, não concussão.","fund":"LEI: CP, art. 316, caput: 'Exigir, para si ou para outrem, direta ou indiretamente, ainda que fora da função ou antes de assumi-la, mas em razão dela, vantagem indevida.' (solicitar = art. 317, corrupção passiva).","peg":"Concussão = EXIGIR; 'solicitar' é corrupção passiva."},{"n":17,"enun":"A causa de aumento de pena pelo emprego de arma de fogo no roubo é incompatível com a prática do delito na forma majorada pelo concurso de duas ou mais pessoas, sendo vedada a incidência cumulativa de majorantes.","gab":"ERRADO","com":"Nada impede que num mesmo roubo incidam duas majorantes diferentes (arma de fogo + concurso de pessoas). A lei não veda a cumulação; cada causa de aumento tem fundamento próprio. O item cria uma proibição que não existe.","fund":"LEI: CP, art. 157, § 2º-A, I (arma de fogo) e § 2º, II (concurso de pessoas): majorantes autônomas, que podem coexistir no mesmo fato.","peg":"Majorantes do roubo PODEM se acumular; não há vedação legal."},{"n":18,"enun":"Na Lei de Drogas, o agente que adquire, guarda ou traz consigo, para consumo pessoal, droga sem autorização legal, está sujeito, entre outras, à pena de advertência sobre os efeitos das drogas e de prestação de serviços à comunidade, não se cominando pena privativa de liberdade.","gab":"CERTO","com":"O porte para consumo pessoal (art. 28) é o único caso da Lei de Drogas que NÃO tem prisão: as respostas são advertência, prestação de serviços à comunidade e medida educativa de comparecimento a programa. É a despenalização da posse para uso próprio.","fund":"LEI: Lei 11.343/2006, art. 28, I, II e III: penas de advertência sobre os efeitos das drogas, prestação de serviços à comunidade e medida educativa de comparecimento a programa ou curso educativo.","peg":"Art. 28 (uso) não tem pena privativa de liberdade."},{"n":19,"enun":"Na Lei de Drogas, o tráfico privilegiado, aplicável ao agente primário, de bons antecedentes, que não se dedique a atividades criminosas nem integre organização criminosa, permite a redução da pena de um sexto a dois terços.","gab":"CERTO","com":"O 'tráfico privilegiado' (§ 4º do art. 33) é um desconto para o traficante de primeira viagem: precisa preencher quatro requisitos cumulativos (primário, bons antecedentes, não se dedicar ao crime e não integrar orgcrim). Atendidos todos, o juiz reduz de 1/6 a 2/3.","fund":"LEI: Lei 11.343/2006, art. 33, § 4º: 'os agentes...desde que sejam primários, de bons antecedentes, não se dediquem às atividades criminosas nem integrem organização criminosa, poderão ter as penas reduzidas de um sexto a dois terços.'","peg":"Quatro requisitos CUMULATIVOS; fração 1/6 a 2/3."},{"n":20,"enun":"Conforme o Estatuto do Desarmamento, o crime de posse irregular de arma de fogo de uso permitido consuma-se com o porte do armamento em via pública, sendo atípica a mera manutenção da arma no interior da residência.","gab":"ERRADO","com":"O Estatuto separa POSSE de PORTE. Manter arma dentro de casa ou no trabalho sem registro já é o crime de POSSE irregular (art. 12) — não é atípico. Levar a arma para a rua é PORTE (art. 14). O item confunde os dois e nega o crime de posse domiciliar.","fund":"LEI: Lei 10.826/2003, art. 12: 'Possuir ou manter sob sua guarda arma de fogo...de uso permitido, em desacordo com determinação legal ou regulamentar, no interior de sua residência ou dependência desta, ou, ainda, no seu local de trabalho...'","peg":"Posse (em casa/trabalho) já é crime; não exige porte em via pública."},{"n":21,"enun":"Constitui crime de tortura constranger alguém com emprego de violência ou grave ameaça, causando-lhe sofrimento físico ou mental, com o fim de obter informação, declaração ou confissão da vítima ou de terceira pessoa.","gab":"CERTO","com":"A tortura-prova/persecutória é exatamente essa: usar violência ou grave ameaça para causar sofrimento e arrancar informação, declaração ou confissão. O texto reproduz a alínea 'a' do art. 1º, I, da Lei de Tortura.","fund":"LEI: Lei 9.455/1997, art. 1º, I, 'a': 'Constranger alguém com emprego de violência ou grave ameaça, causando-lhe sofrimento físico ou mental: a) com o fim de obter informação, declaração ou confissão da vítima ou de terceira pessoa.'"},{"n":22,"enun":"Para a configuração do crime de organização criminosa, a Lei 12.850/2013 exige a associação de quatro ou mais pessoas estruturalmente ordenada e caracterizada pela divisão de tarefas, com o objetivo de obter vantagem mediante a prática de infrações penais cujas penas máximas sejam superiores a quatro anos.","gab":"CERTO","com":"A receita da organização criminosa tem números exatos: 4 ou mais pessoas, estrutura ordenada com divisão de tarefas, e crimes-alvo com pena máxima ACIMA de 4 anos (ou de caráter transnacional). O texto bate com o art. 1º, § 1º.","fund":"LEI: Lei 12.850/2013, art. 1º, § 1º: 'associação de 4 (quatro) ou mais pessoas estruturalmente ordenada e caracterizada pela divisão de tarefas...com objetivo de obter, direta ou indiretamente, vantagem de qualquer natureza, mediante a prática de infrações penais cujas penas máximas sejam superiores a 4 (quatro) anos, ou que sejam de caráter transnacional.'","peg":"4+ pessoas e pena máxima SUPERIOR a 4 anos (não 'igual ou superior')."},{"n":23,"enun":"Na Lei de Lavagem de Dinheiro, a punição do crime de lavagem depende de o autor ter sido previamente condenado pela infração penal antecedente, da qual provêm os bens, direitos ou valores ocultados.","gab":"ERRADO","com":"A lavagem é autônoma: não precisa de condenação prévia pelo crime que gerou o dinheiro sujo. Basta indícios suficientes da infração antecedente para processar a lavagem. Exigir condenação anterior travaria o combate à reciclagem de capitais.","fund":"LEI: Lei 9.613/1998, art. 2º, II e § 1º: o processo e julgamento da lavagem independem do processo e julgamento das infrações penais antecedentes, bastando indícios suficientes da existência da infração antecedente.","peg":"Lavagem é AUTÔNOMA; não exige condenação prévia pelo crime antecedente."},{"n":24,"enun":"Nos termos da Lei Maria da Penha, configura violência doméstica e familiar contra a mulher qualquer ação ou omissão baseada no gênero que lhe cause morte, lesão, sofrimento físico, sexual ou psicológico e dano moral ou patrimonial, no âmbito da unidade doméstica, da família ou em qualquer relação íntima de afeto, independentemente de coabitação.","gab":"CERTO","com":"A Lei Maria da Penha não exige que agressor e vítima morem juntos: a relação íntima de afeto conta mesmo sem coabitação (ex.: namorado que não mora com a vítima). O conceito abarca violência física, psicológica, sexual, patrimonial e moral, baseada no gênero.","fund":"LEI: Lei 11.340/2006, art. 5º, caput e III: violência no âmbito da unidade doméstica, da família ou 'em qualquer relação íntima de afeto, na qual o agressor conviva ou tenha convivido com a ofendida, independentemente de coabitação.'","peg":"Independe de coabitação na relação íntima de afeto."}]},{"nome":"Direito Processual Penal + Legislação Especial","comando":"Acerca do inquérito policial, do indiciamento, das prisões cautelares, das medidas cautelares diversas, da competência, da ação penal, do reconhecimento de pessoas, da interceptação telefônica, da cadeia de custódia, do acordo de não persecução penal e das provas em geral, julgue os itens a seguir.","itens":[{"n":25,"enun":"O inquérito policial, por ter natureza de procedimento administrativo inquisitorial e destinar-se à formação da opinio delicti do titular da ação penal, não comporta, em regra, o contraditório e a ampla defesa, de modo que eventuais vícios nele havidos não contaminam, por si sós, a ação penal subsequente.","gab":"CERTO","com":"Pense no inquérito como o rascunho de uma investigação: ele serve para o delegado juntar pistas e o MP decidir se acusa ou não. Como ainda não há acusado formal se defendendo de uma imputação, não existe o jogo de tese e antítese (contraditório). Por isso, um erro de rascunho não derruba a peça final.","fund":"LEI: CPP, art. 12 (inquérito acompanha a denúncia/queixa quando lhe servir de base) e doutrina consolidada sobre a natureza inquisitiva. CPP, art. 564 trata das nulidades do processo, não do inquérito.\nJURISPRUDÊNCIA: não aplicável (lei seca).","peg":"O erro clássico seria afirmar que o inquérito exige contraditório pleno; sua natureza é inquisitorial."},{"n":26,"enun":"O indiciamento é ato privativo do delegado de polícia, devendo ocorrer por meio de análise técnico-jurídica do fato que apontará a autoria, materialidade e suas circunstâncias.","gab":"CERTO","com":"Indiciar é o delegado apontar formalmente, com base técnica, quem é o provável autor do crime. A lei reservou esse ato exclusivamente a ele: nem o juiz nem o promotor podem mandar indiciar alguém, porque é o delegado quem conduz a investigação e tem a expertise para esse juízo.","fund":"LEI: Lei 12.830/2013, art. 2º, §6º: 'O indiciamento, privativo do delegado de polícia, dar-se-á por ato fundamentado, mediante análise técnico-jurídica do fato, que deverá indicar a autoria, materialidade e suas circunstâncias.'\nJURISPRUDÊNCIA: não aplicável (lei seca).","peg":"Cuidado: a banca às vezes troca 'privativo do delegado' por 'do Ministério Público' ou 'do juiz'."},{"n":27,"enun":"O delegado de polícia, ao receber requisição de instauração de inquérito feita pelo juiz ou pelo membro do Ministério Público, encontra-se vinculado e obrigado ao indiciamento da pessoa investigada, ainda que a análise técnico-jurídica do fato não aponte autoria.","gab":"ERRADO","com":"A requisição obriga a abrir a investigação, mas indiciar é outra coisa. O indiciamento depende de um juízo técnico do próprio delegado sobre quem é o provável autor. Se as provas não apontam autoria, não há indiciamento por ordem de fora: seria como obrigar um médico a dar um diagnóstico que os exames não confirmam.","fund":"LEI: Lei 12.830/2013, art. 2º, §6º (indiciamento decorre de análise técnico-jurídica do delegado). O indiciamento não é vinculado a requisição externa; depende de elementos de autoria.\nJURISPRUDÊNCIA: não aplicável (lei seca).","peg":"A pegadinha funde dever de instaurar com suposto dever de indiciar."},{"n":28,"enun":"A prisão temporária poderá ser decretada de ofício pelo juiz, desde que presentes os requisitos legais e demonstrada a imprescindibilidade da medida para as investigações do inquérito policial.","gab":"ERRADO","com":"A temporária só nasce de provocação: representação da autoridade policial ou requerimento do MP. O juiz não pode decretá-la sozinho. Após o Pacote Anticrime, o juiz deixou de ser protagonista das cautelares: ele decide, mas não inicia. Pense no juiz como árbitro, não como um dos times.","fund":"LEI: Lei 7.960/1989, art. 2º: a prisão temporária será decretada pelo juiz 'em face da representação da autoridade policial ou de requerimento do Ministério Público'. CPP, art. 282, §2º (vedação à decretação de ofício de cautelares).\nJURISPRUDÊNCIA: não aplicável (lei seca).","peg":"O 'de ofício' é a chave do erro: a temporária nunca é de ofício."},{"n":29,"enun":"Tratando-se de crime de extorsão mediante sequestro, o prazo da prisão temporária é de cinco dias, prorrogável por igual período em caso de extrema e comprovada necessidade.","gab":"ERRADO","com":"O prazo de 5 + 5 dias é a regra geral. Mas a extorsão mediante sequestro é crime hediondo, e para hediondos e equiparados o prazo salta para 30 dias, prorrogável por mais 30. A banca adora trocar os prazos: o de hediondo é o dobro reforçado, não o regime comum.","fund":"LEI: Lei 7.960/1989, art. 2º (regra: 5 dias + 5); Lei 8.072/1990, art. 2º, §4º: nos crimes hediondos a prisão temporária terá prazo de 30 dias, prorrogável por igual período. Extorsão mediante sequestro é hedionda (Lei 8.072/90, art. 1º, IV).\nJURISPRUDÊNCIA: não aplicável (lei seca).","peg":"Confunde-se o prazo geral (5+5) com o de hediondo (30+30)."},{"n":30,"enun":"A prisão preventiva pode ser decretada como garantia da ordem pública, da ordem econômica, por conveniência da instrução criminal ou para assegurar a aplicação da lei penal, sendo vedada sua decretação de ofício pelo juiz, ainda no curso da ação penal.","gab":"CERTO","com":"São os quatro fundamentos clássicos da preventiva. E desde o Pacote Anticrime, o juiz não pode decretá-la sozinho nem durante o processo: precisa de requerimento do MP, do querelante/assistente, ou de representação policial. O sistema acusatório separou quem investiga/acusa de quem julga.","fund":"LEI: CPP, art. 312 (fundamentos: ordem pública, ordem econômica, conveniência da instrução, aplicação da lei penal); CPP, art. 311 (decretação 'a requerimento do Ministério Público, do querelante ou do assistente, ou por representação da autoridade policial', vedando o ofício).\nJURISPRUDÊNCIA: não aplicável (lei seca).","peg":"Pós-2019, não há mais preventiva de ofício em nenhuma fase."},{"n":31,"enun":"Decretada a prisão preventiva, o órgão emissor da decisão fica dispensado de revisar periodicamente a necessidade de sua manutenção, dado o caráter definitivo da medida até o trânsito em julgado.","gab":"ERRADO","com":"A preventiva não é eterna por si só. A lei impõe que o juiz reavalie a cada 90 dias se ela ainda é necessária, por decisão fundamentada. É como uma medicação forte: o médico precisa reavaliar de tempos em tempos, não deixar o paciente tomando indefinidamente sem revisão.","fund":"LEI: CPP, art. 316, parágrafo único: 'o órgão emissor da decisão deverá revisar a necessidade de sua manutenção a cada 90 (noventa) dias, mediante decisão fundamentada, de ofício, sob pena de tornar a prisão ilegal.'\nJURISPRUDÊNCIA: não aplicável (lei seca).","peg":"A revisão a cada 90 dias é obrigatória; a preventiva não é 'definitiva'."},{"n":32,"enun":"Entre as medidas cautelares diversas da prisão, o juiz pode impor o monitoramento eletrônico, a proibição de ausentar-se da comarca quando a permanência seja conveniente ou necessária para a investigação ou instrução, e a internação provisória do acusado nas hipóteses de crimes praticados com violência ou grave ameaça, quando os peritos concluírem ser inimputável ou semi-imputável e houver risco de reiteração.","gab":"CERTO","com":"O art. 319 traz um cardápio de medidas alternativas à prisão, justamente para evitar o cárcere quando algo mais brando resolve. Monitoramento eletrônico, proibição de sair da comarca e internação provisória do inimputável perigoso estão todos nessa lista. É a lógica de só prender em último caso.","fund":"LEI: CPP, art. 319: IV (proibição de ausentar-se da comarca); VII (internação provisória do acusado nas hipóteses de crimes com violência/grave ameaça, quando peritos concluírem inimputabilidade/semi-imputabilidade e risco de reiteração); IX (monitoração eletrônica).\nJURISPRUDÊNCIA: não aplicável (lei seca).","peg":"Todos os três incisos existem no art. 319; nenhum é inventado."},{"n":33,"enun":"No caso de prisão em flagrante, a autoridade policial pode, por sua própria decisão e independentemente de manifestação judicial, conceder fiança ao preso quando se tratar de infração cuja pena privativa de liberdade máxima não seja superior a quatro anos.","gab":"CERTO","com":"Para crimes mais leves (pena máxima até 4 anos), o próprio delegado pode arbitrar fiança ali na delegacia, sem esperar o juiz. É um filtro de razoabilidade: não faz sentido manter preso quem responde por crime de menor gravidade e pode garantir o comparecimento com uma garantia financeira.","fund":"LEI: CPP, art. 322: 'A autoridade policial somente poderá conceder fiança nos casos de infração cuja pena privativa de liberdade máxima não seja superior a 4 (quatro) anos.'\nJURISPRUDÊNCIA: não aplicável (lei seca).","peg":"Acima de 4 anos, a fiança é privativa do juiz (art. 322, parágrafo único)."},{"n":34,"enun":"O uso de algemas é admitido como regra geral nas conduções de presos, dispensando-se justificativa específica, dada a presunção de periculosidade inerente à condição de detido.","gab":"ERRADO","com":"Algema é exceção, não regra. Só se justifica diante de resistência, risco de fuga ou perigo à integridade de alguém — e por escrito. A condição de preso, por si só, não autoriza algemar: presumir periculosidade de todo detido viola a dignidade e a presunção de inocência.","fund":"LEI: CPP, art. 474, §3º e Decreto 8.858/2016.\nJURISPRUDÊNCIA: STF, Súmula Vinculante 11: só é lícito o uso de algemas em casos de resistência, fundado receio de fuga ou perigo à integridade física própria ou alheia, justificada a excepcionalidade por escrito.","peg":"A SV 11 inverte a lógica: algema é excepcional e fundamentada por escrito.","jur_status":"OK"},{"n":35,"enun":"O ingresso forçado em domicílio sem mandado judicial é lícito quando amparado em fundadas razões, devidamente justificadas a posteriori, que indiquem estar ocorrendo, no interior da residência, situação de flagrante delito, como na hipótese de crime permanente de tráfico de drogas.","gab":"CERTO","com":"A casa é asilo inviolável, mas há exceção: flagrante. Em crimes permanentes, como guardar drogas para tráfico, o crime se prolonga no tempo, então o flagrante é contínuo. Mas o policial precisa ter razões concretas antes de entrar e justificá-las depois — não pode entrar por 'pressentimento' e inventar a justificativa.","fund":"LEI: CF, art. 5º, XI (inviolabilidade do domicílio, salvo flagrante delito).\nJURISPRUDÊNCIA: STF, Tema 280 (RE 603.616): a entrada forçada em domicílio sem mandado exige fundadas razões de flagrante, justificadas a posteriori, sob pena de responsabilidade e nulidade dos atos.","peg":"A chave é a fundada razão ANTERIOR ao ingresso, justificada depois."},{"n":36,"enun":"Segundo o entendimento do Superior Tribunal de Justiça, é exigência indispensável e pacífica que o consentimento do morador para o ingresso domiciliar seja documentado por registro audiovisual, sob pena de nulidade, posicionamento integralmente compartilhado pelo Supremo Tribunal Federal.","gab":"ERRADO","com":"Aqui há uma divergência real, não consenso. A 6ª Turma do STJ passou a exigir registro do consentimento, mas o STF (RE 1.342.077) afastou essa obrigatoriedade por falta de previsão constitucional. Dizer que ambos exigem o registro 'pacificamente' é falso: os tribunais convergem só no núcleo do Tema 280 (justa causa anterior), não nesse ponto.","fund":"LEI: CF, art. 5º, XI.\nJURISPRUDÊNCIA: DIVERGÊNCIA — STJ (6ª Turma) passou a exigir documentação/registro audiovisual do consentimento; STF (RE 1.342.077, Min. Alexandre de Moraes) afastou a obrigatoriedade por ausência de previsão constitucional. Convergem apenas no núcleo do Tema 280 (justa causa anterior ao ingresso).","peg":"A banca afirma falso consenso entre STF e STJ sobre o registro audiovisual."},{"n":37,"enun":"O reconhecimento de pessoa far-se-á com a observância das formalidades legais, devendo a pessoa que tiver de fazê-lo descrever previamente a pessoa a ser reconhecida, que será colocada, se possível, ao lado de outras que com ela tiverem qualquer semelhança.","gab":"CERTO","com":"O art. 226 é um roteiro de garantias: primeiro a testemunha descreve o suspeito, depois ele é colocado em meio a pessoas parecidas. Isso evita o erro de 'apontar o único que aparece'. É como uma fila de identificação justa, e não mostrar uma só foto sugerindo a resposta.","fund":"LEI: CPP, art. 226, I (a pessoa que tiver de fazer o reconhecimento descreverá a pessoa a ser reconhecida) e II (colocação ao lado de outras semelhantes, se possível).\nJURISPRUDÊNCIA: não aplicável (lei seca; reprodução fiel do art. 226).","peg":"O enunciado reproduz fielmente os incisos I e II do art. 226."},{"n":38,"enun":"Conforme entendimento do Superior Tribunal de Justiça, a inobservância das formalidades do art. 226 do CPP torna inválido o reconhecimento, o qual, isoladamente considerado, não serve para fundamentar condenação, admitindo-se, contudo, que outras provas independentes e idôneas embasem o decreto condenatório.","gab":"CERTO","com":"O STJ deixou de tratar o art. 226 como mera recomendação: suas formalidades são obrigatórias. Reconhecimento feito de qualquer jeito é inválido e, sozinho, não condena ninguém. Mas se houver outras provas independentes e robustas, a condenação se sustenta nelas, não no reconhecimento defeituoso.","fund":"LEI: CPP, art. 226.\nJURISPRUDÊNCIA: STJ, HC 598.886/SC: as formalidades do art. 226 do CPP são obrigatórias; o reconhecimento em desacordo é inválido e, isolado, não sustenta condenação, admitida prova independente.","peg":"Note: não basta 'ratificação em juízo' para sanar o vício; exige-se prova independente.","jur_status":"OK"},{"n":39,"enun":"A interceptação de comunicações telefônicas poderá ser determinada pelo juiz, de ofício ou a requerimento, ainda que o fato investigado constitua infração penal punida, no máximo, com pena de detenção.","gab":"ERRADO","com":"A interceptação é medida grave e tem um limite de gravidade: não cabe se o crime for punido só com detenção. A lei a veda exatamente nesse caso. É uma trava de proporcionalidade: não se quebra o sigilo telefônico para apurar infrações de menor potencial ofensivo.","fund":"LEI: Lei 9.296/1996, art. 2º, III: não será admitida a interceptação quando 'o fato investigado constituir infração penal punida, no máximo, com pena de detenção'.\nJURISPRUDÊNCIA: não aplicável (lei seca).","peg":"Crime punido com detenção não admite interceptação telefônica."},{"n":40,"enun":"O prazo da interceptação telefônica não poderá exceder quinze dias, renovável por igual tempo uma única vez, vedada qualquer prorrogação adicional ainda que comprovada a indispensabilidade do meio de prova.","gab":"ERRADO","com":"O prazo é mesmo de 15 dias, renovável por igual período — mas a lei não diz 'uma única vez'. A jurisprudência admite sucessivas renovações enquanto persistir a necessidade, desde que fundamentadas. A trava está na vedação inventada de 'uma única renovação'.","fund":"LEI: Lei 9.296/1996, art. 5º: a decisão indicará a forma de execução da diligência, que não poderá exceder o prazo de 15 dias, 'renovável por igual tempo uma vez comprovada a indispensabilidade do meio de prova'. A lei não limita a renovação a uma única vez.\nJURISPRUDÊNCIA: não aplicável (lei seca).","peg":"O erro é a vedação absoluta de prorrogações além de uma; a lei condiciona à indispensabilidade, sem teto fixo de vezes."},{"n":41,"enun":"O início da cadeia de custódia da prova ocorre com a apreensão de vestígio pela autoridade no momento da formalização do laudo pericial, sendo o rastreamento anterior a esse marco juridicamente irrelevante.","gab":"ERRADO","com":"A cadeia de custódia começa antes, no reconhecimento do vestígio na cena do crime, e segue por etapas até o laudo. Pensar que ela só inicia no laudo é desprezar todo o rastreamento que garante que a prova não foi adulterada. A corrente de custódia é justamente proteger o vestígio desde o primeiro contato.","fund":"LEI: CPP, art. 158-A, §1º: o início da cadeia de custódia dá-se com a preservação do local de crime ou com procedimentos policiais ou periciais nos quais seja detectada a existência de vestígio; art. 158-B (etapas: reconhecimento, isolamento, fixação, coleta, etc.).\nJURISPRUDÊNCIA: não aplicável (lei seca).","peg":"A cadeia inicia no reconhecimento do vestígio, não na formalização do laudo."},{"n":42,"enun":"O acordo de não persecução penal poderá ser proposto pelo Ministério Público, não sendo o caso de arquivamento e tendo o investigado confessado formal e circunstanciadamente a prática de infração penal sem violência ou grave ameaça e com pena mínima inferior a quatro anos.","gab":"CERTO","com":"O ANPP é um acordo: o MP deixa de processar se o investigado, que confessou, cumprir certas condições. Cabe em crimes sem violência ou grave ameaça e com pena mínima abaixo de 4 anos. É um filtro de eficiência: resolve casos médios sem o desgaste de um processo completo.","fund":"LEI: CPP, art. 28-A, caput: 'Não sendo caso de arquivamento e tendo o investigado confessado formal e circunstancialmente a prática de infração penal sem violência ou grave ameaça e com pena mínima inferior a 4 (quatro) anos, o Ministério Público poderá propor acordo de não persecução penal (...).'\nJURISPRUDÊNCIA: não aplicável (lei seca).","peg":"Requisitos cumulativos: sem violência/grave ameaça + pena mínima < 4 anos + confissão."},{"n":43,"enun":"Para aferir a pena mínima cominada ao delito e a consequente possibilidade de propositura do acordo de não persecução penal, devem ser consideradas as causas de aumento e diminuição aplicáveis ao caso concreto.","gab":"CERTO","com":"Para saber se a pena mínima fica abaixo de 4 anos, não se olha só a pena base do tipo: aplica-se o aumento ou a diminuição que o caso comportar. É como calcular o preço final de um produto considerando descontos e acréscimos, não apenas a etiqueta original.","fund":"LEI: CPP, art. 28-A, §1º: 'Para aferição da pena mínima cominada ao delito a que se refere o caput deste artigo, serão consideradas as causas de aumento e diminuição aplicáveis ao caso concreto.'\nJURISPRUDÊNCIA: não aplicável (lei seca).","peg":"Causas de aumento e diminuição entram no cálculo da pena mínima do ANPP."},{"n":44,"enun":"Em razão do princípio do livre convencimento motivado, é admissível ao juiz utilizar inquéritos policiais e ações penais em curso para agravar a pena-base do réu a título de maus antecedentes.","gab":"ERRADO","com":"Inquérito e processo em andamento ainda não têm condenação definitiva. Usar isso para agravar a pena viola a presunção de inocência: a pessoa ainda não foi condenada. A súmula barra exatamente esse atalho. Antecedente ruim é condenação transitada em julgado, não mera apuração em curso.","fund":"LEI: CP, art. 59 (circunstâncias judiciais, incluindo antecedentes); CF, art. 5º, LVII (presunção de inocência).\nJURISPRUDÊNCIA: STJ, Súmula 444: 'É vedada a utilização de inquéritos policiais e ações penais em curso para agravar a pena-base.'\nNota: súmula vincula a vedação a inquéritos/ações em curso.","peg":"Súmula 444: processos em curso não servem como maus antecedentes."},{"n":45,"enun":"No concurso entre a jurisdição comum e a militar, prevalecendo a conexão, há a reunião dos processos em um único juízo; tratando-se, porém, de crimes dolosos contra a vida praticados por militar contra civil, a competência será do tribunal do júri.","gab":"CERTO","com":"Regra geral, conexão reúne processos. Mas a Justiça Militar tem uma blindagem: ela não atrai a comum por conexão. E há uma exceção marcante — militar que mata civil dolosamente responde perante o júri (justiça comum), não a militar, por opção legislativa de proteger a vida do civil.","fund":"LEI: CPP, art. 79, I (a unidade de processo por conexão/continência não se aplica no concurso entre jurisdição comum e a militar); CPP, art. 9º, §1º, do CPM/Lei 9.299/1996 (crimes dolosos contra a vida de civil por militar competem à justiça comum/júri).\nJURISPRUDÊNCIA: não aplicável (lei seca).","peg":"A conexão não une jurisdição comum e militar; crime doloso contra vida de civil vai ao júri."},{"n":46,"enun":"Nos crimes de ação penal pública condicionada, a representação do ofendido é irretratável após o oferecimento da denúncia, e, sendo o ofendido menor de 18 anos ou incapaz, o direito de representação será exercido por seu representante legal.","gab":"CERTO","com":"Na ação pública condicionada, a vítima precisa autorizar (representar) para o MP agir. Ela pode voltar atrás, mas só até a denúncia ser oferecida; depois disso, não há mais retratação. E se a vítima for menor ou incapaz, quem representa é o representante legal — a criança não exerce sozinha esse direito.","fund":"LEI: C
