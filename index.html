definitivas de mérito, proferidas pelo Supremo Tribunal Federal, nas ações declaratórias de constitucionalidade de lei ou ato normativo federal, produzirão eficácia contra todos e efeito vinculante [...].' Art. 27, Lei 9.868/99: modulação de efeitos."},{"n":53,"enun":"O mandado de segurança coletivo pode ser impetrado por partido político com representação no Congresso Nacional, organização sindical, entidade de classe ou associação legalmente constituída e em funcionamento há pelo menos um ano.","gab":"CERTO","com":"O art. 5º, LXX, CF elenca os legitimados ao MS coletivo: partido político com representação no CN e organização sindical, entidade de classe ou associação legal em funcionamento há pelo menos 1 ano. O prazo de 1 ano não se aplica a partidos.","fund":"LEI: Art. 5º, LXX, CF: 'o mandado de segurança coletivo pode ser impetrado por: a) partido político com representação no Congresso Nacional; b) organização sindical, entidade de classe ou associação legalmente constituída e em funcionamento há pelo menos um ano [...].'","peg":"O requisito de 1 ano aplica-se apenas à entidade de classe/associação — não ao partido político."},{"n":54,"enun":"O princípio da unidade de tesouraria, previsto no art. 164 da Constituição Federal, determina que os recursos de caixa do Tesouro Nacional sejam unificados, cabendo ao Banco Central do Brasil a função de depositário dos recursos da União.","gab":"CERTO","com":"O art. 164, §3º, CF estabelece que as disponibilidades de caixa da União sejam depositadas no Banco Central; dos Estados, DF e Municípios, em instituições financeiras oficiais, ressalvados os casos prescritos em lei.","fund":"LEI: Art. 164, §3º, CF: 'As disponibilidades de caixa da União serão depositadas no banco central; as dos Estados, do Distrito Federal, dos Municípios e dos órgãos ou entidades do Poder Público e das empresas por ele controladas, em instituições financeiras oficiais [...].' Princípio da unidade de tesouraria: art. 56, Lei 4.320/64."},{"n":55,"enun":"A imunidade parlamentar material (inviolabilidade) protege o parlamentar federal de quaisquer atos praticados fora do mandato, desde que em razão dele.","gab":"ERRADO","com":"A imunidade material dos deputados e senadores (art. 53, CF) protege opiniões, palavras e votos no exercício do mandato. Após a EC 35/2001, o STF passou a entender que a inviolabilidade se aplica aos atos praticados no exercício do mandato ou em razão dele — não a atos anteriores ao mandato.","fund":"LEI: Art. 53, CF: 'Os Deputados e Senadores são invioláveis, civil e penalmente, por quaisquer de suas opiniões, palavras e votos.' O nexo com o mandato é pressuposto da proteção.","peg":"A imunidade material não se estende a atos praticados antes do mandato ou sem nexo com o exercício parlamentar."},{"n":56,"enun":"A responsabilidade civil objetiva do Estado, prevista no art. 37, §6º, da CF/88, aplica-se também às concessionárias de serviços públicos em relação a danos causados a terceiros não usuários do serviço.","gab":"CERTO","com":"O STF, no RE 591.874/MS (Pleno, j. 26/08/2009), fixou que a responsabilidade objetiva das concessionárias alcança não apenas os usuários, mas também os não usuários que sofram dano em decorrência da prestação do serviço. A proteção constitucional é ampla.","fund":"JURISPRUDÊNCIA: STF, RE 591.874/MS, Ricardo Lewandowski, Pleno, j. 26/08/2009: responsabilidade objetiva da concessionária — alcança usuários e não usuários do serviço público. Art. 37, §6º, CF: 'as pessoas jurídicas de direito público e as de direito privado prestadoras de serviços públicos responderão pelos danos que seus agentes [...] causarem a terceiros [...]'","jur_status":"OK"},{"n":57,"enun":"A imunidade tributária recíproca (art. 150, VI, a, CF) protege os entes federativos da cobrança de impostos sobre o patrimônio, renda e serviços uns dos outros, tendo natureza de cláusula pétrea.","gab":"CERTO","com":"A imunidade tributária recíproca é decorrência do princípio federativo e, por isso, o STF a classifica como cláusula pétrea implícita. É vedada a cobrança de impostos entre União, Estados, DF e Municípios sobre patrimônio, renda e serviços relacionados às suas atividades essenciais.","fund":"LEI: Art. 150, VI, a, CF: vedação de imposto da União sobre patrimônio/renda/serviços dos Estados/DF/Municípios e vice-versa. JURISPRUDÊNCIA: STF — imunidade recíproca como desdobramento do federalismo (cláusula pétrea)."},{"n":58,"enun":"O habeas corpus pode ser impetrado por qualquer pessoa em favor do paciente, independentemente de capacidade postulatória, não sendo necessária a representação por advogado.","gab":"CERTO","com":"O HC é ação de natureza constitucional que dispensa a capacidade postulatória: qualquer pessoa, o próprio paciente ou terceiro em seu favor, pode impetrar o habeas corpus, inclusive sem advogado. É exceção ao princípio do jus postulandi restrito.","fund":"LEI: Art. 654, CPP: 'O habeas corpus poderá ser impetrado por qualquer pessoa, em seu favor ou de outrem, bem como pelo Ministério Público.' A capacidade postulatória não é exigida por expressa disposição legal."},{"n":59,"enun":"A interceptação de correspondência e comunicações telegráficas é protegida pelo art. 5º, XII, da CF/88, admitindo-se sua violação somente por ordem judicial para fins de investigação criminal ou instrução processual penal.","gab":"CERTO","com":"O art. 5º, XII, CF protege o sigilo das comunicações, admitindo quebra apenas por ordem judicial e nos casos de investigação criminal ou instrução processual penal. Para interceptação telefônica, exige-se ainda o rito da Lei 9.296/96.","fund":"LEI: Art. 5º, XII, CF: 'é inviolável o sigilo da correspondência e das comunicações telegráficas, de dados e das comunicações telefônicas, salvo, no último caso, por ordem judicial, nas hipóteses e na forma que a lei estabelecer para fins de investigação criminal ou instrução processual penal.'"},{"n":60,"enun":"Nos termos da Constituição Federal, o Ministério Público possui exclusividade na propositura da ação penal pública, sendo vedada ao ofendido ou a seu representante legal qualquer forma de iniciativa processual penal.","gab":"ERRADO","com":"A ação penal privada (principal e subsidiária) é exercida pelo ofendido ou por seu representante legal. Na ação penal privada subsidiária da pública, o ofendido tem legitimidade quando o MP queda inerte no prazo legal (art. 5º, LIX, CF).","fund":"LEI: Art. 5º, LIX, CF: 'será admitida ação privada nos crimes de ação pública, se esta não for intentada no prazo legal.' Art. 100, §2º, CP: ação penal privada subsidiária. A exclusividade do MP se limita à ação penal pública.","peg":"A exclusividade ministerial é na ação PÚBLICA — a ação privada (inclusive subsidiária) pertence ao ofendido."},{"n":61,"enun":"O controle difuso de constitucionalidade pode ser exercido por qualquer juiz ou tribunal, em qualquer processo e a qualquer tempo, ao passo que o controle concentrado é reservado ao STF e aos Tribunais de Justiça.","gab":"CERTO","com":"No controle difuso (incidental), qualquer juízo pode declarar inconstitucional uma lei no caso concreto. No controle concentrado, o STF tem competência para ADI, ADC e ADPF federais; os TJs têm competência para ADI estadual em face da constituição estadual.","fund":"LEI: Art. 97, CF: cláusula de reserva de plenário — somente pelo voto da maioria absoluta do pleno ou do órgão especial. Art. 102, I, a, CF: STF julga ADI, ADC e ADPF. Art. 125, §2º, CF: TJs em face das constituições estaduais."},{"n":62,"enun":"As cláusulas pétreas previstas no art. 60, §4º, da CF/88 são insuscetíveis de deliberação por proposta de emenda constitucional tendente a aboli-las, mas podem ser regulamentadas infraconstitucionalmente para maior efetividade.","gab":"CERTO","com":"As cláusulas pétreas vedam emendas que tendam a abolir, não que restrinjam parcialmente ou regulamentem infraconstitucionalmente. A regulamentação infraconstitucional das cláusulas pétreas para torná-las mais efetivas é permitida.","fund":"LEI: Art. 60, §4º, CF: 'Não será objeto de deliberação a proposta de emenda tendente a abolir: I — a forma federativa de Estado; II — o voto direto, secreto, universal e periódico; III — a separação dos Poderes; IV — os direitos e garantias individuais.'"},{"n":63,"enun":"O Estado de Defesa e o Estado de Sítio são medidas de caráter excepcional previstas na Constituição Federal, diferindo quanto à gravidade e ao procedimento de decretação. O Estado de Defesa é decretado com prévia autorização do Congresso Nacional.","gab":"ERRADO","com":"O Estado de Defesa é decretado pelo Presidente da República após ouvir o Conselho da República e o Conselho de Defesa Nacional, com posterior aprovação do Congresso. Não há autorização prévia — o controle é posterior. O Estado de Sítio exige autorização prévia do Congresso.","fund":"LEI: Art. 136, CF: Estado de Defesa — decreto presidencial, depois aprovação pelo CN por maioria absoluta. Art. 137, CF: Estado de Sítio — autorização prévia do CN. Diferença fundamental: controle posterior (Defesa) vs. prévio (Sítio).","peg":"Estado de Defesa: controle posterior. Estado de Sítio: autorização prévia do Congresso — não confundir."},{"n":64,"enun":"O princípio da legalidade tributária, consubstanciado no art. 150, I, da CF, exige lei em sentido formal para a criação ou majoração de tributos, admitindo-se medida provisória para esse fim, conforme entendimento consolidado do STF.","gab":"CERTO","com":"O STF admite medida provisória para criar ou aumentar tributos, desde que sua conversão em lei ocorra antes do exercício financeiro seguinte (se exigível anterioridade). A vedação do art. 62, §1º, III, CF alcança matéria reservada a lei complementar, não toda matéria tributária.","fund":"LEI: Art. 150, I, CF: legalidade tributária. Art. 62, §1º, III, CF: MP vedada para matéria reservada a lei complementar. JURISPRUDÊNCIA: STF — admite MP para tributos não reservados a LC, com conversão no prazo adequado."}]},{"nome":"Direito Administrativo e Legislação Complementar","comando":"Relativamente ao direito administrativo e à organização administrativa do Estado, julgue os itens a seguir.","itens":[{"n":65,"enun":"O poder de polícia exercido pela Administração Pública pode ser objeto de concessão ou delegação a pessoa jurídica de direito privado, desde que se trate de atividade meramente fiscalizatória, sem caráter coercitivo ou sancionatório.","gab":"ERRADO","com":"O STF, no RE 633.782/MG (Tema 532, j. 26/10/2020), distinguiu as fases do poder de polícia: as fases de consentimento e fiscalização (atos não-coercitivos) podem ser delegadas a pessoas jurídicas de direito privado da Administração; as fases de ordem (normativa) e sanção (punitiva) são indelegáveis. A delegação irrestrita ao setor privado é vedada.","fund":"JURISPRUDÊNCIA: STF, RE 633.782/MG, Tema 532, Luiz Fux, Pleno, j. 26/10/2020: poder de polícia — fases de consentimento e fiscalização são delegáveis a pessoas jurídicas privadas integrantes da Administração; ordem e sanção são indelegáveis.","peg":"A vedação não é absoluta para todo o poder de polícia — é limitada às fases de ordem normativa e sanção coercitiva.","jur_status":"PENDENTE"},{"n":66,"enun":"Nos termos da Lei 14.133/2021 (Nova Lei de Licitações), o modo de disputa nas licitações pode ser aberto, fechado ou combinado, sendo que o modo aberto é o padrão para a modalidade pregão.","gab":"CERTO","com":"A Lei 14.133/21 prevê os modos de disputa aberto (lances sucessivos públicos), fechado (propostas sigilosas) e combinado (fechado e depois aberto). O pregão utiliza o modo aberto como padrão, com possibilidade do combinado.","fund":"LEI: Art. 56, Lei 14.133/21: 'O modo de disputa poderá ser aberto, fechado ou combinado.' Art. 17, II, c/c art. 29, §1º, Lei 14.133/21: pregão — modo aberto por padrão."},{"n":67,"enun":"A improbidade administrativa, após as alterações promovidas pela Lei 14.230/2021, exige comprovação do elemento subjetivo dolo para a responsabilização do agente, sendo inadmissível a modalidade culposa.","gab":"CERTO","com":"A Lei 14.230/21 eliminou a modalidade culposa de improbidade. Hoje, todas as condutas de improbidade exigem dolo (específico, segundo a maioria dos tribunais). A culpa isolada não mais configura improbidade administrativa.","fund":"LEI: Art. 1º, §1º, Lei 8.429/92 (red. Lei 14.230/21): 'Consideram-se atos de improbidade administrativa as condutas dolosas tipificadas nos arts. 9º, 10 e 11 desta Lei, ressalvados tipos culposos expressamente previstos em lei.' — Na prática, a reforma extinguiu a culpa como elemento suficiente."},{"n":68,"enun":"Os atos administrativos discricionários submetem-se ao controle jurisdicional quanto à legalidade, mas o Poder Judiciário não pode apreciar o mérito administrativo (conveniência e oportunidade) do ato.","gab":"CERTO","com":"O controle jurisdicional dos atos discricionários é limitado à legalidade e, hodiernamente, à razoabilidade e proporcionalidade. O Judiciário não pode substituir a apreciação de mérito (conveniência e oportunidade) do administrador, salvo quando viola a lei ou os princípios constitucionais.","fund":"LEI: Art. 5º, XXXV, CF: inafastabilidade do controle jurisdicional — abrange legalidade. Doutrina majoritária: discricionariedade não abrange oportunidade/conveniência na apreciação judicial — apenas legalidade lata (inclusive razoabilidade)."},{"n":69,"enun":"A teoria da imputação (órgão) no direito administrativo dispensa a necessidade de vínculo formal entre o agente e o Estado para que os atos praticados sejam atribuídos ao ente público, bastando que o agente aja aparentemente como funcionário público.","gab":"ERRADO","com":"A teoria do órgão (Jellinek) imputa ao Estado os atos praticados por seus agentes no exercício da função. Não é a mera aparência que fundamenta a imputação — é o vínculo funcional real. A aparência pode fundar, em alguns casos, a responsabilidade estatal por fato de prepostos não formalizados, mas essa é situação distinta.","fund":"DOUTRINA: Teoria do Órgão (Otto von Gierke / Jellinek): órgãos são centros de competência imputáveis ao Estado; os atos dos agentes públicos são atos do Estado pelo vínculo funcional, não pela aparência."},{"n":70,"enun":"O servidor público estável somente pode perder o cargo mediante sentença judicial transitada em julgado, processo administrativo com ampla defesa ou procedimento de avaliação periódica de desempenho, conforme o art. 41 da CF/88.","gab":"CERTO","com":"O art. 41, §1º, CF prevê as três hipóteses de perda do cargo do servidor estável: (I) sentença judicial trânsita; (II) processo administrativo com ampla defesa; (III) avaliação periódica de desempenho insuficiente, na forma da lei complementar, assegurada a defesa.","fund":"LEI: Art. 41, §1º, CF: 'O servidor público estável só perderá o cargo: I — em virtude de sentença judicial transitada em julgado; II — mediante processo administrativo em que lhe seja assegurada ampla defesa; III — mediante procedimento de avaliação periódica de desempenho, na forma de lei complementar, assegurada ampla defesa.'"},{"n":71,"enun":"O prazo prescricional para a Fazenda Pública propor ação de ressarcimento ao erário em face de atos de improbidade administrativa dolosa é imprescritível, conforme entendimento do STF.","gab":"CERTO","com":"O STF, no RE 669.069/MG (Tema 666, Pleno), fixou que a ação de ressarcimento ao erário decorrente de atos dolosos de improbidade é imprescritível (art. 37, §5º, CF). Atos culposos e não enquadráveis como improbidade podem sujeitar-se à prescrição comum.","fund":"JURISPRUDÊNCIA: STF, RE 669.069/MG, Tema 666, Teori Zavascki: ações de ressarcimento por improbidade DOLOSA = imprescritíveis (art. 37, §5º, CF). Art. 37, §5º, CF: 'a lei estabelecerá os prazos de prescrição para ilícitos [...] salvo as respectivas ações de ressarcimento.'","peg":"Imprescritibilidade limitada aos atos DOLOSOS de improbidade — atos culposos prescrevem nos termos da lei.","jur_status":"PENDENTE"},{"n":72,"enun":"A autotutela administrativa permite à Administração Pública anular seus próprios atos ilegais, independentemente de provocação do interessado ou do Judiciário. Porém, o exercício da autotutela é vedado quando o ato ilegal tiver gerado situação consolidada há mais de cinco anos.","gab":"CERTO","com":"A Lei 9.784/99 (art. 54) limita a autotutela ao prazo de 5 anos — depois desse prazo, a anulação de ato ilegal que gerou efeitos favoráveis ao administrado fica vedada, salvo comprovada má-fé. As Súmulas 346 e 473 do STF reconhecem a autotutela.","fund":"LEI: Art. 54, Lei 9.784/99: 'O direito da Administração de anular os atos administrativos de que decorram efeitos favoráveis para os destinatários decai em cinco anos, contados da data em que foram praticados, salvo comprovada má-fé.' Súmula 473/STF: pode anular ou revogar os próprios atos."},{"n":73,"enun":"A responsabilidade civil extracontratual do Estado por atos omissivos segue, em regra, a teoria subjetiva, exigindo comprovação de culpa ou dolo do agente público, diferentemente dos atos comissivos, que se sujeitam à responsabilidade objetiva.","gab":"CERTO","com":"Prevalece no STF e na doutrina majoritária que atos omissivos do Estado geram responsabilidade subjetiva (culpa anônima da Administração ou falta de serviço), enquanto atos comissivos geram responsabilidade objetiva (art. 37, §6º, CF).","fund":"LEI: Art. 37, §6º, CF: responsabilidade objetiva — atos comissivos de agentes. Doutrina: responsabilidade subjetiva por omissão — teoria da faute du service / culpa anônima. JURISPRUDÊNCIA: STF — majoritariamente adota responsabilidade subjetiva por omissão.","peg":"Há divergência doutrinária e jurisprudencial — o STF tende à subjetiva para omissão genérica; há exceções para omissão específica."},{"n":74,"enun":"A empresa pública e a sociedade de economia mista, quando prestadoras de serviço público, sujeitam-se ao regime de responsabilidade civil objetiva previsto no art. 37, §6º, da CF/88.","gab":"CERTO","com":"O art. 37, §6º, CF inclui as pessoas jurídicas de direito privado prestadoras de serviços públicos no regime de responsabilidade objetiva. Empresas públicas e SEM que prestam serviço público (e não atividade econômica) enquadram-se nessa hipótese.","fund":"LEI: Art. 37, §6º, CF: 'as pessoas jurídicas de direito público e as de direito privado prestadoras de serviços públicos responderão pelos danos que seus agentes, nessa qualidade, causarem a terceiros [...].' Empresas estatais prestadoras de serviço público: responsabilidade objetiva."},{"n":75,"enun":"Os princípios expressos da Administração Pública contidos no art. 37, caput, da CF/88 são: legalidade, impessoalidade, moralidade, publicidade e eficiência. A violação de qualquer deles pode caracterizar ato de improbidade.","gab":"CERTO","com":"O art. 37, caput, CF lista os 5 princípios expressos: LIMPE (legalidade, impessoalidade, moralidade, publicidade, eficiência). O art. 11 da Lei 8.429/92 (Lei de Improbidade) tipifica a violação a princípios da Administração como ato ímprobo, sujeito às sanções da lei.","fund":"LEI: Art. 37, caput, CF: legalidade, impessoalidade, moralidade, publicidade e eficiência. Art. 11, Lei 8.429/92: atos que violam princípios da Administração — improbidade administrativa (dolo exigido após Lei 14.230/21)."},{"n":76,"enun":"A modalidade de licitação 'diálogo competitivo', prevista na Lei 14.133/2021, é restrita a contratações que envolvam inovação tecnológica ou técnica, sendo vedada para objetos cujas especificações sejam conhecidas pela Administração.","gab":"CERTO","com":"O diálogo competitivo (art. 32 da Lei 14.133/21) é modalidade prevista para situações em que a Administração não consegue sozinha especificar o objeto — envolve inovação tecnológica, técnica ou quando a solução mais adequada não está disponível no mercado.","fund":"LEI: Art. 32, Lei 14.133/21: 'O diálogo competitivo é a modalidade de licitação para contratação de obras, serviços e compras em que a Administração Pública realiza diálogos com licitantes previamente selecionados mediante critérios objetivos, com o intuito de desenvolver uma ou mais alternativas capazes de atender às suas necessidades [...].' Vedado quando o objeto é perfeitamente especificável."},{"n":77,"enun":"O princípio da supremacia do interesse público sobre o privado autoriza a Administração a revogar atos administrativos vinculados por razões de conveniência e oportunidade, mesmo que já tenham gerado direitos adquiridos para os administrados.","gab":"ERRADO","com":"Atos vinculados não comportam revogação por conveniência e oportunidade — somente anulação por ilegalidade. Além disso, atos que já geraram direitos adquiridos não são revogáveis (Súmula 473/STF). A revogação tem limites: atos vinculados, atos que geraram direitos adquiridos e atos que esgotaram seus efeitos são irrevogáveis.","fund":"JURISPRUDÊNCIA: Súmula 473/STF: 'A administração pode anular seus próprios atos, quando estalagmeados de vícios que os tornam ilegais, porque deles não se originam direitos; ou revogá-los, por motivo de conveniência ou oportunidade, respeitados os direitos adquiridos [...].' Revogação: somente atos discricionários que não geraram direitos.","peg":"Ato vinculado → somente anulação (por ilegalidade), nunca revogação. Ato que gerou direito adquirido → irrevogável."},{"n":78,"enun":"O processo administrativo disciplinar (PAD), na Lei 8.112/90, é obrigatório para aplicação das penas de suspensão por mais de 30 dias, demissão, cassação de aposentadoria e destituição de cargo em comissão.","gab":"CERTO","com":"A Lei 8.112/90 exige PAD com contraditório e ampla defesa para as penalidades mais graves: suspensão > 30 dias, demissão, cassação de aposentadoria e destituição. Para suspensão de até 30 dias, admite-se sindicância.","fund":"LEI: Art. 146, parágrafo único, Lei 8.112/90: PAD é obrigatório para suspensão superior a 30 dias, demissão, cassação de aposentadoria ou disponibilidade e destituição de cargo em comissão. Art. 145, II: sindicância com prazo de 30 dias pode resultar em penalidades mais leves."},{"n":79,"enun":"O poder regulamentar da Administração Pública, exercido pelo Chefe do Poder Executivo mediante decreto, não pode inovar na ordem jurídica, limitando-se a explicitar e operacionalizar a execução das leis.","gab":"CERTO","com":"O decreto regulamentar (art. 84, IV, CF) não pode criar direitos ou obrigações não previstos em lei — é instrumento de execução da lei, não de criação de direito novo. A inovação na ordem jurídica é reservada à lei em sentido formal.","fund":"LEI: Art. 84, IV, CF: 'expedir decretos e regulamentos para fiel execução das leis.' Doutrina e STF: regulamentos executivos não podem inovar — se inovam, são ilegais. Exceção: decretos autônomos do art. 84, VI, CF (organização interna, sem criar obrigações)."},{"n":80,"enun":"Segundo a teoria dos motivos determinantes, a validade do ato administrativo está vinculada à veracidade e à adequação dos motivos declarados pela Administração, de modo que, se os motivos forem falsos ou inexistentes, o ato será inválido.","gab":"CERTO","com":"A teoria dos motivos determinantes vincula a Administração aos motivos que declarou como fundamento do ato — se o motivo for falso, inexistente ou inapropriado, o ato é inválido. Isso ocorre mesmo nos atos discricionários cuja motivação não seria legalmente exigida.","fund":"DOUTRINA: Teoria dos Motivos Determinantes — adotada pelo STJ e STF. Se a Administração motiva voluntariamente um ato, fica vinculada à veracidade e adequação dos motivos declarados. Falso motivo: nulidade do ato."}]},{"nome":"Medicina Legal","comando":"No que se refere à medicina legal aplicada à atividade policial, julgue os itens a seguir.","itens":[{"n":81,"enun":"Na psicopatologia forense, o critério adotado pelo Código Penal brasileiro para aferição da inimputabilidade é o biopsicológico, que exige a presença simultânea de doença mental (critério biológico) e da incapacidade de entender o caráter ilícito ou de se determinar de acordo com esse entendimento (critério psicológico).","gab":"CERTO","com":"O CP adotou o critério biopsicológico (ou psicobiológico) para o art. 26, caput: não basta a doença mental — é necessário que ela produza a incapacidade de entender ou de querer. A ausência de qualquer dos dois pressupostos mantém a imputabilidade.","fund":"LEI: Art. 26, CP: 'por doença mental ou desenvolvimento mental incompleto ou retardado, era, ao tempo da ação ou da omissão, inteiramente incapaz de entender o caráter ilícito do fato ou de determinar-se de acordo com esse entendimento.' — dois pressupostos cumulativos."},{"n":82,"enun":"O laudo do exame de sanidade mental produzido por dois peritos oficiais tem força probatória absoluta, vinculando o juiz ao diagnóstico nele constante.","gab":"ERRADO","com":"O laudo pericial de sanidade mental, embora relevante, não tem força probatória absoluta. O juiz aprecia livremente a prova, podendo afastar as conclusões periciais desde que fundamente sua decisão. O art. 182 do CPP é expresso: o juiz não está adstrito ao laudo.","fund":"LEI: Art. 182, CPP: 'O juiz não ficará adstrito ao laudo, podendo aceitá-lo ou rejeitá-lo, no todo ou em parte.' Art. 149, CPP: o exame é feito por dois peritos, mas o resultado não vincula o julgador.","peg":"O laudo é prova técnica — relevantíssima, mas não absoluta. O juiz tem liberdade fundamentada de apreciação."},{"n":83,"enun":"A tanatologia forense estabelece que os livores cadavéricos (livor mortis) fixam-se definitivamente após aproximadamente 8 a 12 horas do óbito, tornando-se imóveis e não desaparecendo com a pressão.","gab":"CERTO","com":"Os livores cadavéricos iniciam-se entre 1–2 h após a morte e ficam móveis (comprimidos, desaparecem e surgem em outro local) até cerca de 8–12 h. Após esse período, fixam-se e tornam-se imóveis. A presença de livores fixos indica que a morte ocorreu há mais de 12 h.","fund":"MED. LEGAL: Tanatologia — livores cadavéricos (livor mortis): início 1–2 h; confluência 4–6 h; fixação 8–12 h (imóveis, não desaparecem com pressão). Utilidade forense: posição do cadáver e estimativa do óbito."},{"n":84,"enun":"Na traumatologia forense, a chamada 'zona de tatuagem' ao redor do orifício de entrada de projétil de arma de fogo indica que o disparo foi efetuado a curta distância, com partículas de pólvora incrustadas na pele.","gab":"CERTO","com":"A zona de tatuagem (também chamada de tatuagem por pólvora ou de chama) é formada por grãos de pólvora não queimada e incandescente incrustados na pele ao redor do orifício de entrada, indicando disparo a curta distância (até cerca de 50 cm). Não é possível remover por lavagem.","fund":"MED. LEGAL: Traumatologia forense — tiro a curta distância: zona de tatuagem (pólvora incrustada, irremovível); zona de chamuscamento (queimadura); zona de esfumaçamento (fuligem — removível). Esses achados indicam proximidade do cano ao corpo."},{"n":85,"enun":"A rigidez cadavérica (rigor mortis) inicia-se pelos músculos da mandíbula e da face, propagando-se descendo para o restante do corpo em sentido craniocaudal.","gab":"CERTO","com":"O rigor mortis segue a lei de Nysten: inicia-se nos músculos da mandíbula/face e propaga-se de forma descendente (céfalo-caudal) para o pescoço, tronco e membros. A instalação completa ocorre entre 6–12 h após o óbito.","fund":"MED. LEGAL: Rigor mortis (rigidez cadavérica) — Lei de Nysten: início em músculos menores (mandíbula, face), progressão cefalocaudal. Início: 2–4 h pós-óbito; instalação completa: 6–12 h; resolução: 24–48 h (por autólise)."},{"n":86,"enun":"O Protocolo de Istambul é um conjunto de normas internacionais para documentação e avaliação pericial de casos de tortura e maus-tratos, tendo sido adotado pela ONU como guia para perícias médico-legais nesse contexto.","gab":"CERTO","com":"O Protocolo de Istambul (1999), formalmente denominado 'Manual para Investigação e Documentação Eficazes da Tortura e Outras Penas ou Tratamentos Cruéis, Desumanos ou Degradantes', foi adotado pela ONU e serve como padrão internacional para perícias em casos de tortura.","fund":"FONTE: ONU, Manual on Effective Investigation and Documentation of Torture and Other Cruel, Inhuman or Degrading Treatment or Punishment (Protocolo de Istambul, 1999). No Brasil: utilizado em laudos periciais envolvendo art. 1º, Lei 9.455/97."},{"n":87,"enun":"Na sexologia forense, o exame pericial em crimes sexuais deve ser realizado preferencialmente nas primeiras 72 horas após o evento, pois após esse período os vestígios biológicos podem se perder.","gab":"CERTO","com":"Os vestígios biológicos (sêmen, sangue, células epiteliais) degradam-se rapidamente. As primeiras 72 h são o período ideal para coleta de material biológico com possibilidade de identificação de DNA. A lei (art. 158-A e ss., CPP) enfatiza a preservação e coleta imediata dos vestígios.","fund":"MED. LEGAL: Sexologia forense — coleta de vestígios em crimes sexuais: janela ideal de 72 h para exame. Art. 158-A, CPP (cadeia de custódia): obrigatoriedade de preservação dos vestígios coletados."},{"n":88,"enun":"Na hipótese de semi-imputabilidade, o sistema adotado pelo Código Penal é o vicariante, pelo qual o juiz pode optar entre reduzir a pena em um terço a dois terços ou substituí-la por medida de segurança, sendo vedada a aplicação simultânea de ambas.","gab":"CERTO","com":"O sistema vicariante (art. 98 CP), adotado a partir da Reforma de 1984, substitui o antigo sistema duplo binário (pena + medida de segurança cumulativamente). Para o semi-imputável, o juiz opta: ou reduz a pena (1/3 a 2/3) ou substitui por medida de segurança.","fund":"LEI: Art. 98, CP: 'Na hipótese do parágrafo único do art. 26 deste Código e necessitando o condenado de especial tratamento curativo, a pena privativa de liberdade pode ser substituída pela internação, ou tratamento ambulatorial [...].' Sistema vicariante: escolha entre pena reduzida OU medida de segurança."},{"n":89,"enun":"O orifício de saída do projétil de arma de fogo, em regra, é menor que o orifício de entrada, em função da deformação sofrida pelo projétil ao penetrar os tecidos.","gab":"ERRADO","com":"O orifício de saída é tipicamente maior que o de entrada, pois o projétil perde estabilidade e velocidade ao atravessar os tecidos e sai tumbleando (girando em torno de seu eixo), com maior diâmetro de lesão. O orifício de entrada é menor e mais regular; o de saída é irregular e maior.","fund":"MED. LEGAL: Traumatologia por arma de fogo — orifício de entrada: pequeno, regular, bordas invertidas, com anel de contusão; orifício de saída: maior, irregular, bordas evertidas, sem anel de contusão."},{"n":90,"enun":"A putrefação cadavérica, fenômeno tardio transformativo, inicia-se preferencialmente no abdome, em razão da maior concentração de bactérias intestinais que iniciam a decomposição.","gab":"CERTO","com":"A putrefação inicia-se no ceco e na fossa ilíaca direita (maior concentração bacteriana intestinal), com a mancha verde começando na fossa ilíaca direita. O processo é acelerado pelo calor e pela umidade.","fund":"MED. LEGAL: Putrefação cadavérica — fenômenos tardios destrutivos: (1) coloração (mancha verde de Brouardel); (2) gasificação; (3) liquefação; (4) esqueletização. Início: ceco/fossa ilíaca direita → mancha verde → difusão."}]},{"nome":"Direito Civil e Legislação Complementar","comando":"Acerca do direito civil e dos institutos do Código Civil de 2002, julgue os itens a seguir.","itens":[{"n":91,"enun":"A prescrição extingue a pretensão e não o direito subjetivo em si, razão pela qual o pagamento de dívida prescrita não caracteriza enriquecimento ilícito do credor.","gab":"CERTO","com":"A prescrição atinge a pretensão (direito de ação exigível), não o direito material. O direito subjetivo persiste, por isso o devedor que paga dívida prescrita não pode pleitear restituição — o pagamento é válido. Não há enriquecimento ilícito do credor.","fund":"LEI: Art. 189, CC: 'Violado o direito, nasce para o titular a pretensão, a qual se extingue, pela prescrição.' Art. 882, CC: 'Não se pode repetir o que se pagou para solver dívida prescrita, ou cumprir obrigação judicialmente inexigível.'"},{"n":92,"enun":"O prazo prescricional geral para ações de reparação civil extracontratual contra particulares é de três anos, nos termos do art. 206, §3º, V, do Código Civil.","gab":"CERTO","com":"O art. 206, §3º, V, CC fixa prazo de 3 anos para a pretensão de reparação civil (responsabilidade extracontratual). Para ações contra a Fazenda Pública, prevalece o prazo de 5 anos do Decreto 20.910/1932.","fund":"LEI: Art. 206, §3º, V, CC: 'Em três anos: V — a pretensão de reparação civil.' Decreto 20.910/1932, art. 1º: prescrição quinquenal para ações contra a Fazenda Pública — prevalece sobre o CC."},{"n":93,"enun":"A decadência legal, ao contrário da prescrição, não pode ser suspensa ou interrompida, e deve ser pronunciada de ofício pelo juiz, independentemente de alegação da parte.","gab":"CERTO","com":"A decadência legal tem regime rígido: não suspende, não interrompe (art. 207 CC) e deve ser reconhecida de ofício pelo juiz (art. 210 CC). A renúncia à decadência legal é nula (art. 209 CC). Só a decadência convencional pode ser afastada e não é reconhecida de ofício.","fund":"LEI: Art. 207, CC: 'Salvo disposição legal em contrário, não se aplicam à decadência as normas que impedem, suspendem ou interrompem a prescrição.' Art. 209, CC: nulidade da renúncia. Art. 210, CC: reconhecimento de ofício."},{"n":94,"enun":"A prescrição não corre contra os absolutamente incapazes, conforme o art. 198, I, do Código Civil, de modo que o prazo prescricional somente começa a fluir quando a incapacidade cessar.","gab":"CERTO","com":"O art. 198, I, CC estabelece que a prescrição não corre contra os absolutamente incapazes (art. 3º CC: menores de 16 anos, e excepcionalmente outros, conforme a lei). O prazo começa a fluir apenas quando a incapacidade cessa.","fund":"LEI: Art. 198, I, CC: 'Também não corre a prescrição: I — contra os incapazes de que trata o art. 3º deste Código.' Art. 3º, CC: menores de dezesseis anos — únicos absolutamente incapazes após o Estatuto da Pessoa com Deficiência (Lei 13.146/2015)."},{"n":95,"enun":"A interrupção da prescrição, ao contrário da suspensão, faz com que o prazo recomeça a correr do zero, podendo ser declarada quantas vezes se fizer necessário no mesmo processo.","gab":"ERRADO","com":"A interrupção faz o prazo recomeçar do zero — correto. Porém, ela só pode ocorrer uma única vez (art. 202, caput, CC). A repetição de atos interruptivos em relação ao mesmo débito não produz novo reinício do prazo.","fund":"LEI: Art. 202, CC: 'A interrupção da prescrição, que somente poderá ocorrer uma vez [...].' O rol dos atos interruptivos segue o parágrafo único do art. 202 CC.","peg":"A interrupção reinicia o prazo do zero (não suspende), mas só pode ocorrer UMA vez — diferente da suspensão, que pode ocorrer múltiplas vezes."},{"n":96,"enun":"O negócio jurídico anulável, ao contrário do nulo, produz efeitos jurídicos enquanto não for anulado, e a ação anulatória sujeita-se a prazo decadencial.","gab":"CERTO","com":"O negócio anulável produz efeitos enquanto não houver sentença que o anule (eficácia provisória). A ação anulatória é de natureza constitutiva negativa e submete-se a prazo decadencial (art. 178–179 CC), não prescricional.","fund":"LEI: Art. 177, CC: 'A anulabilidade não tem efeito antes de julgada por sentença, nem se pronuncia de ofício [...].' Art. 178, CC: prazo de 4 anos para anulação. Art. 179, CC: 2 anos (regra geral). Ação constitutiva → prazo decadencial."},{"n":97,"enun":"O abuso de direito, previsto no art. 187 do Código Civil, constitui ato ilícito e pode gerar responsabilidade civil independentemente de culpa do agente.","gab":"CERTO","com":"O art. 187 CC tipifica o abuso de direito como ato ilícito. A doutrina majoritária e o STJ entendem que o abuso de direito prescinde de culpa — basta o exercício do direito em desconformidade com os limites impostos por seu fim econômico ou social, pela boa-fé ou pelos bons costumes.","fund":"LEI: Art. 187, CC: 'Também comete ato ilícito o titular de um direito que, ao exercê-lo, excede manifestamente os limites impostos pelo seu fim econômico ou social, pela boa-fé ou pelos bons costumes.' JURISPRUDÊNCIA: STJ — responsabilidade objetiva por abuso de direito."},{"n":98,"enun":"A boa-fé objetiva, como princípio norteador das relações civis, impõe às partes deveres laterais de conduta, como informação, lealdade e cooperação, independentemente do conteúdo expresso do contrato.","gab":"CERTO","com":"A boa-fé objetiva (art. 422 CC) cria deveres laterais (acessórios) que existem mesmo que não estejam escritos no contrato: deveres de informação, lealdade, proteção, cooperação e cuidado. A violação desses deveres é chamada de 'culpa in contrahendo' (pré-contratual) ou 'culpa post pactum finitum' (pós-contratual).","fund":"LEI: Art. 422, CC: 'Os contratantes são obrigados a guardar, assim na conclusão do contrato, como em sua execução, os princípios de probidade e boa-fé.' Doutrina: boa-fé objetiva como fonte de deveres laterais/acessórios."}]},{"nome":"Direito Tributário e Legislação Complementar","comando":"No que se refere ao direito tributário e ao Código Tributário Nacional, julgue os itens a seguir.","itens":[{"n":99,"enun":"A taxa é espécie tributária vinculada à atuação específica do Estado, podendo ter como fato gerador o exercício regular do poder de polícia ou a utilização, efetiva ou potencial, de serviço público específico e divisível.","gab":"CERTO","com":"O art. 77 do CTN e o art. 145, II, CF definem a taxa: tributo vinculado à contraprestação de atividade estatal específica — exercício do poder de polícia OU utilização de serviço público específico e divisível (efetiva ou potencial). Não pode ter base de cálculo de impostos.","fund":"LEI: Art. 77, CTN: 'As taxas cobradas pela União, pelos Estados, pelo Distrito Federal ou pelos Municípios, no âmbito de suas respectivas atribuições, têm como fato gerador o exercício regular do poder de polícia, ou a utilização, efetiva ou potencial, de serviço público específico e divisível [...].' Art. 145, II, CF."},{"n":100,"enun":"O lançamento tributário por homologação, previsto no art. 150 do CTN, ocorre quando a atividade de lançamento é efetuada pelo sujeito passivo, cabendo à Fazenda Pública apenas homologar o que foi declarado e pago.","gab":"CERTO","com":"No lançamento por homologação (autolançamento), o contribuinte apura e recolhe o tributo antecipadamente, sem prévio exame da autoridade. A Fazenda tem 5 anos para homologar (expressa ou tacitamente). Passado esse prazo sem manifestação, ocorre a homologação tácita e a extinção do crédito.","fund":"LEI: Art. 150, CTN: 'O lançamento por homologação, que ocorre quanto aos tributos cuja legislação atribua ao sujeito passivo o dever de antecipar o pagamento sem prévio exame da autoridade administrativa [...].' Art. 150, §4º: prazo de 5 anos para homologação."},{"n":101,"enun":"A responsabilidade tributária dos sócios administradores de pessoa jurídica por débitos tributários desta pressupõe a dissolução irregular da sociedade ou a prática de atos com excesso de poderes.","gab":"CERTO","com":"O art. 135, III, CTN responsabiliza pessoalmente os sócios-gerentes que agirem com excesso de poderes ou infração da lei, contrato social ou estatutos. A Súmula 435/STJ estabelece que a dissolução irregular da sociedade presume o redirecionamento ao sócio gerente.","fund":"LEI: Art. 135, III, CTN: responsabilidade pessoal dos diretores, gerentes ou representantes — excesso de poderes ou infração de lei, contrato social ou estatutos. JURISPRUDÊNCIA: Súmula 435/STJ: 'Presume-se dissolvida irregularmente a empresa que deixar de funcionar no seu domicílio fiscal, sem comunicação aos órgãos competentes [...]'."},{"n":102,"enun":"Nos termos do CTN, o crédito tributário somente pode ser constituído pelo lançamento, que é ato privativo da autoridade fiscal, sendo vedado ao contribuinte fazê-lo.","gab":"ERRADO","com":"O lançamento é ato da autoridade tributária, mas existe o lançamento por homologação (art. 150 CTN) em que o próprio contribuinte calcula e recolhe o tributo, cabendo à Fazenda apenas confirmar. A declaração do contribuinte (DCTF, GIA, etc.) tem o efeito de confissão de dívida e dispensa novo lançamento para inscrição em dívida ativa.","fund":"LEI: Art. 142, CTN: 'Compete privativamente à autoridade administrativa constituir o crédito tributário pelo lançamento [...].' Art. 150, CTN: lançamento por homologação — o contribuinte antecipa o pagamento. As duas modalidades convivem no sistema.","peg":"No lançamento por homologação, o contribuinte pratica atos que equivalem ao autolançamento — a autoridade apenas confirma."},{"n":103,"enun":"O crime tributário material, previsto no art. 1º da Lei 8.137/1990, somente se consuma com o lançamento definitivo do tributo, conforme a Súmula Vinculante 24 do STF.","gab":"CERTO","com":"A Súmula Vinculante 24 do STF fixou que o crime contra a ordem tributária (art. 1º, Lei 8.137/90) é material e somente se consuma com o lançamento definitivo, após esgotamento da via administrativa. Antes disso, não há justa causa para a ação penal.","fund":"JURISPRUDÊNCIA: SV 24/STF: 'Não se tipifica crime material contra a ordem tributária, previsto no art. 1º, incisos I a IV, da Lei nº 8.137/90, antes do lançamento definitivo do correspondente crédito fiscal.' j. 02/12/2009."},{"n":104,"enun":"A concessão de isenção tributária a um grupo específico de contribuintes, sem extensão a outros em situação equivalente, pode violar o princípio constitucional da isonomia tributária.","gab":"CERTO","com":"O princípio da isonomia tributária (art. 150, II, CF) veda tratamento desigual entre contribuintes em situação equivalente. Isenções que discriminem sem fundamento objetivo e razoável violam a isonomia e podem ser afastadas pelo Judiciário.","fund":"LEI: Art. 150, II, CF: 'é vedado instituir tratamento desigual entre contribuintes que se encontrem em situação equivalente, proibida qualquer distinção em razão de ocupação profissional ou função por eles exercida [...].' Art. 111, CTN: isenção deve ser interpretada literalmente."}]},{"nome":"Direito Ambiental e Legislação Complementar","comando":"Acerca do direito ambiental e da legislação de proteção ao meio ambiente, julgue os itens a seguir.","itens":[{"n":105,"enun":"A pessoa jurídica pode ser responsabilizada penalmente por crimes ambientais, conforme previsto na Lei 9.605/1998, independentemente da responsabilização simultânea das pessoas físicas autoras do crime.","gab":"CERTO","com":"O STF, no RE 548.181/PR (Pleno, j. 06/08/2013), superou a teoria da dupla imputação necessária: a pessoa jurídica pode ser responsabilizada criminalmente por crimes ambientais SEM necessidade de condenação simultânea da pessoa física. Basta a imputação contra a PJ.","fund":"JURISPRUDÊNCIA: STF, RE 548.181/PR, Rosa Weber, 1ª T., j. 06/08/2013: responsabilidade penal da PJ por crime ambiental independe de condenação simultânea da pessoa física — superação da dupla imputação. Art. 3º, Lei 9.605/98: responsabilidade penal da PJ.","jur_status":"OK"},{"n":106,"enun":"A responsabilidade civil por danos ambientais segue a teoria do risco integral, de modo que nem mesmo caso fortuito, força maior ou fato de terceiro excluem o dever de reparar.","gab":"CERTO","com":"O STJ, no REsp 1.374.284 e em outros precedentes, adotou a teoria do risco integral para a responsabilidade civil ambiental: trata-se de responsabilidade objetiva sem excludentes (não há exoneração por caso fortuito, força maior ou fato de terceiro). A obrigação de reparar é propter rem.","fund":"JURISPRUDÊNCIA: STJ, REsp 1.374.284: responsabilidade civil ambiental — risco integral, sem excludentes. Art. 14, §1º, Lei 6.938/81: responsabilidade objetiva por dano ambiental. Obrigação propter rem (STJ): vincula o proprietário atual, independentemente de quem causou o dano."},{"n":107,"enun":"Nos crimes ambientais da Lei 9.605/1998, a ação penal é exclusivamente pública incondicionada, e a competência para processá-los pode ser da Justiça Federal quando os danos afetam bens da União.","gab":"CERTO","com":"A ação penal nos crimes ambientais é pública incondicionada. A competência é da Justiça Federal quando o crime envolve bens, serviços ou interesses da União ou autarquias federais (art. 109, IV, CF) — como áreas de preservação federal, parques nacionais ou danos a espécies protegidas por órgão federal.","fund":"LEI: Art. 26, Lei 9.605/98: ação penal pública incondicionada. Art. 109, IV, CF: competência federal para crimes contra interesses/bens da União. Ibama como autarquia federal: lesões a seus bens → JF."},{"n":108,"enun":"O Estudo de Impacto Ambiental (EIA) é exigido para toda e qualquer obra ou atividade potencialmente causadora de significativa degradação ambiental, sendo o licenciamento ambiental condicionado à sua realização.","gab":"CERTO","com":"O art. 225, §1º, IV, CF exige o EIA para obras ou atividades potencialmente causadoras de significativa degradação ambiental. O EIA é pressuposto do licenciamento ambiental nessas hipóteses, sendo o resultado de acesso público.","fund":"LEI: Art. 225, §1º, IV, CF: 'exigir, na forma da lei, para instalação de obra ou atividade potencialmente causadora de significativa degradação do meio ambiente, estudo prévio de impacto ambiental, a que se dará publicidade.' Resolução CONAMA 237/97: disciplina o licenciamento ambiental."},{"n":109,"enun":"As sanções penais aplicáveis às pessoas jurídicas por crimes ambientais incluem multa, restrição de direitos e prestação de serviços à comunidade, sendo vedada a pena de dissolução forçada da empresa.","gab":"ERRADO","com":"O art. 24 da Lei 9.605/98 prevê expressamente a pena de liquidação forçada da pessoa jurídica quando ela for constituída ou usada precipuamente para permitir, facilitar ou ocultar crime. A dissolução forçada é sanção prevista em lei.","fund":"LEI: Art. 21, Lei 9.605/98: penas para PJ — multa, restrição de direitos e prestação de serviços à comunidade. Art. 24, Lei 9.605/98: 'A pessoa jurídica constituída ou utilizada, preponderantemente, com o fim de permitir, facilitar ou ocultar a prática de crime definido nesta Lei terá decretada sua liquidação forçada [...].'","peg":"A liquidação forçada (dissolução) da PJ é sanção prevista no art. 24 — não é vedada."}]},{"nome":"Direito Empresarial e Legislação Complementar","comando":"No que se refere ao direito empresarial e aos institutos do Código Civil e da legislação especial empresarial, julgue os itens a seguir.","itens":[{"n":110,"enun":"A duplicata mercantil, título de crédito criado pelo direito brasileiro, pode ser protestada por indicação quando o sacado retiver o original sem aceite e sem devolução.","gab":"CERTO","com":"A duplicata por indicação (art. 13, §1º, Lei 5.474/68) é mecanismo que permite ao credor apresentar ao cartório os dados da duplicata retida pelo devedor, viabilizando o protesto sem necessidade do título original. É instituto típico do direito brasileiro.","fund":"LEI: Art. 13, §1º, Lei 5.474/68: 'Por falta de aceite, de devolução ou de pagamento, protesta-se a duplicata mediante apresentação do título ao cartório, quando não houver sido recusado.' Art. 15, II: quando não há a devolução da duplicata, protesta-se por indicação."},{"n":111,"enun":"Na sociedade limitada regida pelo Código Civil, a responsabilidade dos sócios é limitada ao valor de suas quotas, mas todos os sócios respondem solidariamente pela integralização do capital social.","gab":"CERTO","com":"Nas sociedades limitadas, cada sócio responde apenas pelo valor de sua quota. Porém, todos os sócios respondem solidariamente pela integralização do capital social total — se um sócio não integralizou sua parte, os demais respondem solidariamente com ele perante terceiros.","fund":"LEI: Art. 1.052, CC: 'Na sociedade limitada, a responsabilidade de cada sócio é restrita ao valor de suas quotas, mas todos respondem solidariamente pela integralização do capital social.' Este é o traço característico da responsabilidade na LTDA."},{"n":112,"enun":"A recuperação judicial, prevista na Lei 11.101/2005, tem como objetivo viabilizar a superação da crise econômico-financeira do devedor, a fim de permitir a manutenção da fonte produtora, do emprego dos trabalhadores e dos interesses dos credores.","gab":"CERTO","com":"O art. 47 da Lei 11.101/05 estabelece explicitamente esses três objetivos da recuperação judicial: manter a atividade produtiva, preservar os empregos e atender aos interesses dos credores. É o princípio da preservação da empresa.","fund":"LEI: Art. 47, Lei 11.101/2005: 'A recuperação judicial tem por objetivo viabilizar a superação da situação de crise econômico-financeira do devedor, a fim de permitir a manutenção da fonte produtora, do emprego dos trabalhadores e dos interesses dos credores, promovendo, assim, a preservação da empresa [...]'"},{"n":113,"enun":"O cheque é título de crédito que pode ser emitido com cláusula 'à ordem' ou 'não à ordem', sendo que, neste último caso, é intransferível por endosso.","gab":"CERTO","com":"O cheque 'à ordem' é transferível por endosso. O cheque 'não à ordem' (cruzado especial ou com cláusula expressa) não admite endosso — a transferência só se dá por cessão civil de crédito. A cláusula 'não à ordem' limita a circulabilidade.","fund":"LEI: Art. 8º, Lei 7.357/85: 'O cheque à ordem é transmissível por via de endosso. O cheque não à ordem do respectivo tomador só é transmissível pela forma e com os efeitos de cessão de crédito.'"},{"n":114,"enun":"A teoria da desconsideração da personalidade jurídica, prevista no art. 50 do CC/2002, exige, para sua aplicação, a demonstração de abuso da personalidade jurídica caracterizado pelo desvio de finalidade ou pela confusão patrimonial.","gab":"CERTO","com":"A desconsideração da personalidade jurídica (disregard doctrine) no CC/2002, com a redação da Lei 13.874/2019, exige prova do abuso da personalidade jurídica, manifestado pelo desvio de finalidade (subjetivo) ou pela confusão patrimonial (objetivo). Mera insolvência não basta.","fund":"LEI: Art. 50, CC (red. Lei 13.874/19): 'Em caso de abuso da personalidade jurídica, caracterizado pelo desvio de finalidade ou pela confusão patrimonial, pode o juiz, a requerimento da parte, ou do Ministério Público quando lhe couber intervir no processo, desconsiderá-la [...]'."}]},{"nome":"Conhecimentos do Distrito Federal — PDPM — Primeiros Socorros","comando":"Acerca dos conhecimentos específicos do Distrito Federal, do Plano Distrital de Políticas para as Mulheres e das noções de primeiros socorros, julgue os itens a seguir.","itens":[{"n":115,"enun":"A Reanimação Cardiopulmonar (RCP) em adultos deve ser iniciada com compressões torácicas, seguida de abertura das vias aéreas e ventilações, na sequência C-A-B, conforme as diretrizes da American Heart Association desde 2010.","gab":"CERTO","com":"Desde as diretrizes da AHA de 2010, a sequência é C-A-B (Compressões → Airway → Breathing). Antes, era A-B-C. A prioridade às compressões visa manter o fluxo sanguíneo desde o início do atendimento. Relação compressões:ventilações = 30:2.","fund":"PROTOCOLO: AHA Guidelines 2010/2020 — sequência C-A-B: (1) C: 30 compressões a 100–120/min, ≥ 5 cm de profundidade; (2) A: abertura das vias aéreas (head-tilt/chin-lift); (3) B: 2 ventilações de 1 segundo cada. Repetir ciclos."},{"n":116,"enun":"Na manobra de Heimlich em vítima adulta consciente com obstrução severa de vias aéreas, o socorrista deve posicionar-se atrás da vítima e realizar compressões abdominais com os punhos abaixo do processo xifoide do esterno.","gab":"ERRADO","com":"As compressões abdominais na manobra de Heimlich são aplicadas ABAIXO do esterno e ACIMA do umbigo — não abaixo do processo xifoide, que indicaria posição muito baixa. O punho deve ser posicionado entre o umbigo e o apêndice xifoide, aplicando pressão para dentro e para cima.","fund":"PROTOCOLO: Manobra de Heimlich — posição correta: punho fechado entre umbigo e apêndice xifoide (base do esterno), com compressões para dentro e para cima. Posição abaixo do xifoide seria incorreta e ineficaz.","peg":"Acima do umbigo e abaixo do esterno (não abaixo do xifoide) — a banca frequentemente inverte as referências anatômicas."},{"n":117,"enun":"Em lactentes (menores de 1 ano) com obstrução de vias aéreas por corpo estranho, a manobra de Heimlich deve ser realizada com compressões abdominais, assim como em adultos.","gab":"ERRADO","com":"Em lactentes, a técnica de desobstrução é diferente: 5 golpes nas costas (região interescapular) + 5 compressões torácicas (duas a três dedos abaixo da linha mamilar). NUNCA compressões abdominais em lactentes — risco de lesão de vísceras.","fund":"PROTOCOLO: OVACE (Obstrução de Vias Aéreas por Corpo Estranho) em lactentes: 5 golpes nas costas + 5 compressões torácicas. A manobra de Heimlich (compressão abdominal) é CONTRAINDICADA em lactentes.","peg":"Compressão abdominal em lactente = ERRADO. Golpes nas costas + compressões TORÁCICAS = correto."},{"n":118,"enun":"O Desfibrilador Externo Automático (DEA) deve ser utilizado em todos os casos de parada cardiorrespiratória, independentemente do ritmo cardíaco identificado.","gab":"ERRADO","com":"O DEA só indica choque elétrico (desfibrilação) nos ritmos desfibriláveis: Fibrilação Ventricular (FV) e Taquicardia Ventricular sem pulso (TV sp). Nos ritmos não desfibriláveis (Assistolia e AESP), o DEA não recomenda choque — apenas RCP deve ser continuada.","fund":"PROTOCOLO: AHA Guidelines — ritmos desfibriláveis: FV e TV sp → DEA indica choque. Ritmos não desfibriláveis: Assistolia e AESP → apenas RCP. O DEA analisa o ritmo automaticamente e informa se o choque é indicado.","peg":"DEA não é aplicado indiscriminadamente — depende do ritmo. Assistolia e AESP: apenas RCP, sem choque."},{"n":119,"enun":"A Lei Orgânica do Distrito Federal, promulgada em 1993, estabelece as competências do Distrito Federal, que acumula as atribuições de Estado e de Município, sendo vedada a sua divisão em municípios.","gab":"CERTO","com":"O art. 32 da CF/88 veda a divisão do DF em municípios. O DF tem natureza jurídica sui generis: acumula competências estaduais e municipais, sendo governado por um Governador eleito, com Câmara Legislativa com atribuições de Assembleia Legislativa e Câmara Municipal.","fund":"LEI: Art. 32, CF/88: 'O Distrito Federal, vedada sua divisão em Municípios, reger-se-á por lei orgânica [...].' Art. 32, §1º: DF tem competências estaduais e municipais. Lei Orgânica do DF (1993): organização do DF."},{"n":120,"enun":"O Plano Distrital de Políticas para as Mulheres (PDPM) do Distrito Federal é instrumento de planejamento com o objetivo de transversalizar a perspectiva de gênero nas políticas públicas distritais, implementando ações para o enfrentamento da violência contra a mulher e a promoção da igualdade.","gab":"CERTO","com":"O PDPM é o instrumento de planejamento de médio prazo do GDF para as políticas voltadas às mulheres. Incorpora a perspectiva de gênero de forma transversal nas políticas públicas, com eixos temáticos que incluem enfrentamento à violência, autonomia econômica, saúde e educação.","fund":"FONTE: Plano Distrital de Políticas para as Mulheres (PDPM) — GDF. Alinhado ao Plano Nacional de Políticas para as Mulheres (PNPM) e à Lei 11.340/2006 (Lei Maria da Penha). Transversalidade de gênero como diretriz central."}]}]};

/* ── TRAP WORDS ──────────────────────────────────────────── */
const TRAP_WORDS=[
  'tão somente','somente','apenas','unicamente','exclusivamente',
  'em qualquer hipótese','em nenhuma hipótese','em qualquer caso','em todo caso',
  'independentemente','independente de','mesmo que','ainda que',
  'obrigatoriamente','obrigatória','obrigatório','necessariamente',
  'imprescindível','indispensável','imediatamente','automaticamente',
  'de pleno direito','por si só','toda vez que','a qualquer tempo',
  'nunca','jamais','sempre','absolutamente','absoluta',
  'é vedado','são vedados','é proibido','são proibidos',
  'não pode','não podem','impossível','é impossível',
  'salvo','exceto','ressalvado','ressalvada',
  'expressamente','tacitamente'
].sort((a,b)=>b.length-a.length); // longer phrases first

function _escRx(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}
function highlightTraps(html){
  // html is already HTML-escaped plain text; safe to inject <mark>
  TRAP_WORDS.forEach(w=>{
    const re=new RegExp(`(?<![\\wÀ-ÿ])(${_escRx(w)})(?![\\wÀ-ÿ])`,'gi');
    html=html.replace(re,'<mark class="trap-word">$1</mark>');
  });
  return html;
}

function computeFilteredNs(type, disc){
  return S.flat.filter(x=>{
    const dm = !disc || x.discNome === disc;
    if(type==='erros')        return dm && S.respostas[x.n] && S.respostas[x.n]!==x.item.gab;
    if(type==='branco')       return dm && !S.respostas[x.n];
    if(type==='lac')          return dm && S.avaliacoes[x.n]==='lac';
    if(type==='dvd')          return dm && S.avaliacoes[x.n]==='dvd';
    if(type==='problematicos') return dm && (
      (S.respostas[x.n] && S.respostas[x.n]!==x.item.gab) ||
      !S.respostas[x.n] || S.avaliacoes[x.n]==='lac');
    if(type==='disc')         return x.discNome===disc;
    return false;
  }).map(x=>x.n);
}

/* ── HISTÓRICO ───────────────────────────────────────────── */
function buildBlocoSummary(){
  const tot=S.flat.length;
  let ok=0,er=0,blank=0;
  S.flat.forEach(x=>{
    const r=S.respostas[x.n];
    if(r===x.item.gab) ok++;
    else if(r) er++;
    else blank++;
  });
  const disc={};
  S.bloco.disciplinas.forEach(d=>{
    let dok=0,der=0;
    d.itens.forEach(it=>{const r=S.respostas[it.n];if(r===it.gab)dok++;else if(r)der++;});
    const short=d.nome.replace('Direito ','').replace(/ e Legislação .*/,'');
    disc[short]={ok:dok,er:der,tot:d.itens.length};
  });
  const avCnt={dom:0,dvd:0,lac:0,leit:0};
  Object.values(S.avaliacoes).forEach(v=>{if(v in avCnt)avCnt[v]++;});
  return {
    blocoId:S.bloco.meta.id, data:S.bloco.meta.data||S.bloco.meta.id,
    titulo:S.bloco.meta.titulo||'',
    totalQuestoes:tot, acertos:ok, erros:er, branco:blank,
    saldo:ok-er, pct:tot>0?Math.round(ok/tot*100):0,
    tempo:S.totalMs, disciplinas:disc, avaliacoes:avCnt,
    finishedAt:Date.now()
  };
}
/* ── SM-2 SPACED REPETITION ──────────────────────────────── */
function computeSRQuality(h){
  // Mapeia desempenho do bloco para quality SM-2 (0–5)
  const pct=h.pct;
  const av=h.avaliacoes||{};
  const avTotal=(av.dom||0)+(av.dvd||0)+(av.lac||0)+(av.leit||0);
  // Base a partir do aproveitamento
  let q;
  if(pct>=90) q=5;
  else if(pct>=80) q=4;
  else if(pct>=70) q=3;
  else if(pct>=55) q=2;
  else if(pct>=40) q=1;
  else q=0;
  // Ajuste pela autoavaliação: muitas lacunas penaliza, muito domínio bonifica
  if(avTotal>0){
    const lacRatio=(av.lac||0)/avTotal;
    const domRatio=(av.dom||0)/avTotal;
    if(lacRatio>0.4 && q>1) q--;
    if(domRatio>0.6 && q<5) q++;
  }
  return Math.max(0,Math.min(5,q));
}
function applySM2(sr,quality){
  // sr = {interval, repetitions, ef} ou null (primeira vez)
  let {interval=1,repetitions=0,ef=2.5}=sr||{};
  if(quality<3){
    // Abaixo do limiar: recomeça intervalo mas mantém EF (penaliza menos)
    repetitions=0; interval=1;
  } else {
    if(repetitions===0) interval=1;
    else if(repetitions===1) interval=6;
    else interval=Math.round(interval*ef);
    ef=ef+(0.1-(5-quality)*(0.08+(5-quality)*0.02));
    ef=Math.max(1.3,Math.round(ef*100)/100);
    repetitions++;
  }
  const next=new Date();
  next.setDate(next.getDate()+interval);
  return {interval,repetitions,ef,nextReview:next.toISOString().slice(0,10)};
}
function srBadgeHtml(sr){
  if(!sr||!sr.nextReview) return '';
  const today=new Date().toISOString().slice(0,10);
  const diff=(new Date(sr.nextReview)-new Date(today))/(1000*60*60*24);
  if(diff<=0)  return `<span class="sr-badge due">⟳ Revisar hoje</span>`;
  if(diff<=2)  return `<span class="sr-badge soon">⟳ ${Math.round(diff)}d</span>`;
  return `<span class="sr-badge ok">⟳ ${fmtDateShort(sr.nextReview)}</span>`;
}

function saveToHistory(){
  try{
    let hist=loadHistory();
    const s=buildBlocoSummary();
    const idx=hist.findIndex(h=>h.blocoId===s.blocoId);
    // Preserva SR anterior (acumula repetições)
    const prevSR=idx>=0?(hist[idx].sr||null):null;
    const quality=computeSRQuality(s);
    s.sr=applySM2(prevSR,quality);
    s.srQuality=quality; // guarda para debug
    if(idx>=0) hist[idx]=s; else hist.push(s);
    if(hist.length>90) hist=hist.slice(-90);
    localStorage.setItem(HIST_KEY,JSON.stringify(hist));
  }catch(e){}
}
function loadHistory(){
  try{const r=localStorage.getItem(HIST_KEY);return r?JSON.parse(r):[]}catch(e){return [];}
}
function buildBarChart(entries){
  if(!entries.length) return '';
  const W=520,H=108,padB=17,padT=13,inner=H-padB-padT;
  const n=entries.length;
  const bW=Math.max(7,Math.min(26,Math.floor((W-16)/n)-3));
  const gap=(W-bW*n)/(n+1);
  let s=`<svg viewBox="0 0 ${W} ${H}" width="100%" xmlns="http://www.w3.org/2000/svg">`;
  // gridlines
  [50,70,90].forEach(pct=>{
    const gy=padT+Math.round((1-pct/100)*inner);
    s+=`<line x1="0" y1="${gy}" x2="${W}" y2="${gy}" stroke="var(--bord)" stroke-width="1"/>`;
    s+=`<text x="2" y="${gy-2}" font-size="7.5" fill="var(--txt3)">${pct}%</text>`;
  });
  // ref line 70%
  const ry=padT+Math.round(.3*inner);
  s+=`<line x1="0" y1="${ry}" x2="${W}" y2="${ry}" stroke="var(--green)" stroke-dasharray="4,3" opacity=".45" stroke-width="1.2"/>`;
  // bars
  entries.forEach((e,i)=>{
    const bH=Math.max(2,Math.round((e.pct/100)*inner));
    const x=gap+i*(bW+gap), y=H-padB-bH;
    const col=e.pct>=70?'var(--green)':e.pct>=50?'var(--acc)':'var(--red)';
    s+=`<rect x="${x.toFixed(1)}" y="${y}" width="${bW}" height="${bH}" rx="3" fill="${col}" opacity=".82"/>`;
    if(bH>16){s+=`<text x="${(x+bW/2).toFixed(1)}" y="${y+bH-4}" text-anchor="middle" font-size="8" fill="rgba(255,255,255,.8)" font-weight="700">${e.pct}%</text>`;}
    else{s+=`<text x="${(x+bW/2).toFixed(1)}" y="${y-2}" text-anchor="middle" font-size="7.5" fill="${col}">${e.pct}%</text>`;}
    const dl=fmtDateShort(e.data).slice(0,5);
    s+=`<text x="${(x+bW/2).toFixed(1)}" y="${H-2}" text-anchor="middle" font-size="7" fill="var(--txt3)">${dl}</text>`;
  });
  s+='</svg>';
  return s;
}

/* ── DATE FORMAT ─────────────────────────────────────────── */
function fmtDateShort(iso){
  // "2026-06-05" → "05.06.26"
  if(!iso) return '';
  const p=iso.split('-');
  if(p.length<3) return iso;
  return `${p[2]}.${p[1]}.${p[0].slice(2)}`;
}

/* ── TIMER ───────────────────────────────────────────────── */
function fmtTime(ms){
  const s=Math.floor(ms/1000), m=Math.floor(s/60), h=Math.floor(m/60);
  if(h>0) return `${h}h ${(m%60).toString().padStart(2,'0')}m`;
  return `${m}:${(s%60).toString().padStart(2,'0')}`;
}
function startTimer(){
  if(S.timerInterval) return;
  S.startedAt=Date.now();
  S.timerInterval=setInterval(()=>{
    const elapsed=S.totalMs+(Date.now()-S.startedAt);
    const el=document.getElementById('hdr-timer-txt');
    if(el) el.textContent=fmtTime(elapsed);
    const bpel=document.getElementById('bp-time');
    if(bpel) bpel.textContent=fmtTime(elapsed);
  },1000);
}
function stopTimer(){
  if(S.timerInterval){clearInterval(S.timerInterval);S.timerInterval=null;}
  if(S.startedAt){S.totalMs+=Date.now()-S.startedAt;S.startedAt=null;}
}

function togglePause(){
  if(S.finished) return;
  S.paused=!S.paused;
  const btn=document.getElementById('btn-pause');
  const overlay=document.getElementById('pause-overlay');
  if(S.paused){
    // Pausa: para timers, bloqueia tela
    stopTimer();
    if(QT.tickInterval){clearInterval(QT.tickInterval);QT.tickInterval=null;}
    if(QT.observer){QT.observer.disconnect();QT.observer=null;}
    QT.visible.clear();
    overlay.classList.remove('hidden');
    btn.textContent='▶';
    btn.classList.add('paused');
    btn.title='Retomar';
  } else {
    // Retoma: esconde overlay, reinicia timers
    overlay.classList.add('hidden');
    btn.textContent='⏸';
    btn.classList.remove('paused');
    btn.title='Pausar';
    // Reinicia apenas se estiver na prova ou no foco
    const inProva=!document.getElementById('sec-prova').classList.contains('hidden');
    const inFoco=FOCO.active;
    if(inProva||inFoco){
      startTimer();
      if(!QT.tickInterval&&!FOCO.active){
        // re-inicia observer e tick na prova normal
        initQTimer();
      } else if(FOCO.active){
        // no foco apenas o tick
        QT.lastTickAt=Date.now();
        QT.tickInterval=setInterval(_qtTick,500);
      }
    }
  }
}

  setTimeout(()=>_qtUpdateBadge(n),0);

  S.flat.forEach(x=>{
    const r=S.respostas[x.n];
    if(r===x.item.gab) ok++;
    else if(r) er++;
    if(r) ans++;
  });
  const pct=tot?Math.round(ans/tot*100):0;
  const blank=tot-ans;

  // Header
  document.getElementById('c-ok').textContent='✓ '+ok;
  document.getElementById('c-er').textContent='✗ '+er;
  document.getElementById('c-tot').textContent=ans+'/'+tot;
  document.getElementById('prog-fill').style.width=pct+'%';
  // Toolbar
  const tbans=document.getElementById('tb-ans');
  const tbblank=document.getElementById('tb-blank');
  if(tbans) tbans.textContent=ans;
  if(tbblank) tbblank.textContent=blank;
  // Bottom bar
  const bpok=document.getElementById('bp-ok');
  const bper=document.getElementById('bp-er');
  const bpcur=document.getElementById('bp-cur');
  const bptot=document.getElementById('bp-tot');
  const bbar=document.getElementById('bbar-fill');
  if(bpok) bpok.textContent=ok+' ✓';
  if(bper) bper.textContent=er+' ✗';
  if(bpcur) bpcur.textContent=ans;
  if(bptot) bptot.textContent=tot;
  if(bbar) bbar.style.width=pct+'%';
}

/* ── FINISH ──────────────────────────────────────────────── */
function confirmFinish(){
  const blank=S.flat.filter(x=>!S.respostas[x.n]).length;
  if(blank===0){finishProva();return;}
  const el=document.getElementById('modal-root');
  el.innerHTML=`<div class="modal-ov" onclick="if(event.target===this)closeModal()">

      <div class="modal-acts">
        <button class="btn-ghost" onclick="closeModal()">Voltar e responder</button>

    </div>

}
function finishProva(){
  stopTimer(); stopQTimer(); S.finished=true; S.globalGabShown=true; save();

}
function goBackToProva(jumpN){
  S.finished=false; save();

}

/* ── MODO FOCO ────────────────────────────────────────────── */
const FOCO={active:false, idx:0, currentN:null};

function enterFoco(startIdx){
  if(!S.bloco){showToast('Carregue um bloco primeiro');return;}
  if(S.finished){showToast('Bloco já encerrado — use a Revisão');return;}
  // Desconecta apenas o observer (para de acumular tempo via scroll),
  // mas mantém QT.tickInterval ativo para continuar contando tempo em Foco
  if(QT.observer){QT.observer.disconnect();QT.observer=null;}
  QT.visible.clear();
  if(!QT.tickInterval){QT.lastTickAt=Date.now();QT.tickInterval=setInterval(_qtTick,500);}
  FOCO.active=true;
  if(startIdx!==undefined){
    FOCO.idx=Math.max(0,Math.min(startIdx,S.flat.length-1));
  } else {
    // começa na primeira não respondida
    const first=S.flat.findIndex(x=>!S.respostas[x.n]);
    FOCO.idx=first>=0?first:0;
  }
  // oculta tudo, exibe foco
  document.getElementById('sec-prova').classList.add('hidden');
  document.getElementById('sec-placar').classList.add('hidden');
  document.getElementById('sec-historico').classList.add('hidden');
  document.getElementById('sec-revisao').classList.add('hidden');
  document.getElementById('sec-cover').innerHTML='';
  document.getElementById('fab').classList.add('hidden');
  document.getElementById('bot-bar').classList.add('hidden');
  document.getElementById('btn-gab-all').classList.add('hidden');
  document.getElementById('hdr-timer').classList.remove('hidden');
  document.getElementById('hdr-chips').style.display='flex';
  document.getElementById('sec-foco').classList.remove('hidden');
  renderFocoQ();
}

function exitFoco(){
  FOCO.active=false; FOCO.currentN=null;
  document.getElementById('sec-foco').classList.add('hidden');
  renderProva(); // reinicia QT via renderProva → initQTimer
}

function renderFocoQ(){
  const x=S.flat[FOCO.idx];
  if(!x) return;
  const it=x.item;
  FOCO.currentN=it.n;

  const total=S.flat.length;
  const answered=Object.keys(S.respostas).length;
  const pct=Math.round(answered/total*100);
  const discShort=x.discNome.replace('Direito ','').replace(/ e Legislação .*/,'');
  const isFirst=FOCO.idx===0;
  const isLast=FOCO.idx===total-1;
  const hasAns=!!S.respostas[it.n];

  const wrap=document.getElementById('foco-wrap');
  wrap.innerHTML=`
    <div class="foco-hdr">
      <button class="tb-btn" onclick="exitFoco()" title="Sair do Modo Foco (Esc)">✕ Sair</button>
      <span class="foco-qnum">Q.${it.n} · ${FOCO.idx+1}/${total}</span>
      <span class="foco-disc">${discShort}</span>
      <div class="foco-prog-wrap">
        <div class="foco-progress"><div class="foco-prog-fill" id="foco-pf" style="width:${pct}%"></div></div>
        <span class="foco-pct">${pct}%</span>
      </div>
    </div>
    <div class="foco-body">
      ${renderQBlock(it, x.discIdx)}
    </div>
    <div class="foco-nav">
      <button class="btn-ghost" onclick="focoPrev()" ${isFirst?'disabled':''} style="min-width:110px" title="← Seta esquerda">← Anterior</button>
      <div class="foco-nav-hint">
        <div>${answered}/${total} respondidas</div>
        <div style="color:var(--txt3)">${hasAns?'→ Enter para avançar':'C / E para responder'}</div>
      </div>
      <button class="btn-${hasAns?'primary':'ghost'}" onclick="focoNext()" ${isLast?'disabled':''} style="min-width:110px" title="→ Seta direita / Enter">
        ${isLast?'Última':'Próxima →'}
      </button>
    </div>`;

  document.getElementById('sec-foco').scrollTop=0;
  // QT: acumula tempo manualmente no tick
}

function focoNext(){
  if(FOCO.idx<S.flat.length-1){FOCO.idx++;renderFocoQ();}
  else showToast('Última questão do bloco');
}
function focoPrev(){
  if(FOCO.idx>0){FOCO.idx--;renderFocoQ();}
}

// Jump para questão específica (usado futuramente por quick-nav em foco)
function focoJumpTo(n){
  const idx=S.flat.findIndex(x=>x.n===n);
  if(idx>=0){FOCO.idx=idx;renderFocoQ();}
}

/* ── QUESTION TIMER ──────────────────────────────────────── */
const QT={
  times:{},         // {n: elapsedMs}
  visible:new Set(),
  lastTickAt:null,
  tickInterval:null,
  observer:null,
  WARN:60000,       // 60s → amber
  ALERT:90000,      // 90s → red + pulse
};

function initQTimer(){
  stopQTimer();
  QT.times={}; QT.visible=new Set(); QT.lastTickAt=Date.now();

  QT.observer=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      const n=parseInt(e.target.dataset.n);
      if(e.isIntersecting) QT.visible.add(n);
      else QT.visible.delete(n);
    });
  },{rootMargin:'-28% 0px -28% 0px',threshold:0});

  document.querySelectorAll('.q-block[data-n]').forEach(el=>QT.observer.observe(el));
  QT.tickInterval=setInterval(_qtTick,500);
}

function stopQTimer(){
  if(QT.tickInterval){clearInterval(QT.tickInterval);QT.tickInterval=null;}
  if(QT.observer){QT.observer.disconnect();QT.observer=null;}
  QT.visible.clear(); QT.lastTickAt=null;
  const pill=document.getElementById('qt-pill');
  if(pill) pill.classList.add('hidden');
}

function _qtTick(){
  const now=Date.now();
  const delta=QT.lastTickAt?now-QT.lastTickAt:0;
  QT.lastTickAt=now;

  let pillN=null, pillMs=0;
  let crossedAlert=false;
  QT.visible.forEach(n=>{
    if(!S.respostas[n]){
      const prevMs=QT.times[n]||0;
      QT.times[n]=prevMs+delta;
      if(QT.times[n]>pillMs){pillMs=QT.times[n];pillN=n;}
      // detecta cruzamento do limiar para atualizar quick nav
      if(prevMs<QT.ALERT && QT.times[n]>=QT.ALERT) crossedAlert=true;
    }
    _qtUpdateBadge(n);
  });
  _qtUpdatePill(pillN,pillMs);
  if(crossedAlert) renderQuickNav();

  // Modo Foco: acumula tempo para a questão visível manualmente
  if(FOCO.active && FOCO.currentN && !S.respostas[FOCO.currentN]){
    QT.times[FOCO.currentN]=(QT.times[FOCO.currentN]||0)+delta;
    _qtUpdateBadge(FOCO.currentN);
    // atualiza % no header do foco
    const pf=document.getElementById('foco-pf');
    if(pf){const t=S.flat.length;const a=Object.keys(S.respostas).length;pf.style.width=Math.round(a/t*100)+'%';}
    const fpct=document.querySelector('.foco-pct');
    if(fpct){const t=S.flat.length;const a=Object.keys(S.respostas).length;fpct.textContent=Math.round(a/t*100)+'%';}
  }
}

function _qtUpdateBadge(n){
  const el=document.getElementById(`qt-${n}`);
  if(!el) return;
  const ms=QT.times[n]||0;
  const answered=!!S.respostas[n];
  if(answered){
    el.className='qt-badge qt-done';
    el.textContent=ms>0?`⏱ ${_fmtQT(ms)}`:'⏱';
    return;
  }
  if(ms<1000){el.className='qt-badge qt-idle';el.textContent='⏱';return;}
  if(ms>=QT.ALERT){el.className='qt-badge qt-alert';el.textContent=`⏱ ${_fmtQT(ms)}`;}
  else if(ms>=QT.WARN){el.className='qt-badge qt-warn';el.textContent=`⏱ ${_fmtQT(ms)}`;}
  else{el.className='qt-badge qt-normal';el.textContent=`⏱ ${_fmtQT(ms)}`;}
}

function _qtUpdatePill(n,ms){
  const pill=document.getElementById('qt-pill');
  if(!pill) return;
  if(!n||ms<8000){pill.classList.add('hidden');return;}
  pill.classList.remove('hidden');
  const inner=pill.querySelector('.qt-active-pill');
  if(!inner) return;
  const cls='qt-active-pill'+(ms>=QT.ALERT?' qt-alert-p':ms>=QT.WARN?' qt-warn-p':'');
  inner.className=cls;
  const icon=ms>=QT.ALERT?'⚠️':ms>=QT.WARN?'⏳':'⏱';
  inner.innerHTML=`${icon} Q.${n} — <span style="font-variant-numeric:tabular-nums">${_fmtQT(ms)}</span>`;
}

function _fmtQT(ms){
  const s=Math.floor(ms/1000);
  return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
}

  // Errors list
  const errors=S.flat.filter(x=>S.respostas[x.n]&&S.respostas[x.n]!==x.item.gab);
  function buildErrGab(it){
    const fundSafe=it.fund?it.fund.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):'';
    const fundCopy=it.fund?(it.fund.replace(/\\/g,'\\\\').replace(/"/g,'&quot;').replace(/'/g,"\\'").replace(/\n/g,'\\n')):'';
    return `<div class="gab-line">

      <button class="btn-primary" onclick="confirmStart()">↺ Novo bloco</button>
    </div>`;

  updateProgress();
  window.scrollTo(0,0);
}

    const r=S.respostas[x.n];
    if(r===x.item.gab) ok++;
    else if(r) er++;
    else blank++;
  });

  const totalMs=S.totalMs+(S.startedAt?Date.now()-S.startedAt:0);

  const now=new Date();

    @media print{body{padding:0;max-width:none}@page{margin:18mm 16mm;size:A4}

    .metric .num{font-size:30px;font-weight:900;font-style:italic;line-height:1}
    .metric .lbl{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:#888;margin-top:4px}

    .diag-row{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:20px}

  <div class="sec-lbl">Resultado Geral — ${tot} questões</div>
  <div class="hero">

    <div class="metric"><div class="num nr">${er}</div><div class="lbl">Erros</div></div>
    <div class="metric"><div class="num nt">${blank}</div><div class="lbl">Em Branco</div></div>

  <div class="sec-lbl">Desempenho por Disciplina</div>

  ${avTotal>0?`<div class="sec-lbl">Diagnóstico — Autoavaliação (${avTotal} respostas)</div>

  ${avCnt.lac>0?`<div style="margin-bottom:20px;padding:10px 14px;background:#fff5f5;border:1px solid #f5c6c6;border-radius:6px;font-size:12.5px;color:#8b0000">⚠️ ${avCnt.lac} lacuna${avCnt.lac>1?'s conceituais':' conceitual'} identificada${avCnt.lac>1?'s':''} — revisão prioritária antes da prova.</div>`:''}
  `:''}

  ${errors.length>0?`<div class="page-break">
  <div class="sec-lbl">Questões Erradas (${errors.length})</div>
  ${errHtmlStr}
  </div>`:`<div style="margin-top:12px">${errHtmlStr}</div>`}

  <div class="footer">

  <script>window.onload=function(){window.print();}<\/script>
