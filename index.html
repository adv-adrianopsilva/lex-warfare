bstituído pelo ofendido ou pela autoridade policial na promoção da denúncia.'"},{"n":38,"enun":"O prazo para o MP oferecer denúncia nos crimes afiançáveis, quando o investigado estiver preso, é de quinze dias, contados do recebimento dos autos do inquérito policial.","gab":"ERRADO","com":"Errado. O prazo para o MP oferecer denúncia é de 5 dias quando o réu estiver preso, e 15 dias quando estiver solto (art. 46, CPP). A questão inverteu os prazos. Para investigados presos, a urgência exige o prazo menor de 5 dias.","fund":"LEI: 'Art. 46, CPP: O prazo para oferecimento da denúncia, estando o réu preso, será de 5 dias, contados da data em que o órgão do Ministério Público receber os autos do inquérito policial, e de 15 dias, se o réu estiver solto ou afiançado.' | JURISPRUDÊNCIA: 'STJ, HC 172.932/RS, 5ª T.: o prazo de 5 dias para denúncia com réu preso é improrrogável; o excesso de prazo pode ensejar o relaxamento da prisão.'","jur_status":"PENDENTE"},{"n":39,"enun":"A ação penal nos crimes de estupro é pública incondicionada, independentemente de a vítima ser maior ou menor de idade.","gab":"CERTO","com":"Certo. Com a Lei 12.015/2009, os crimes contra a liberdade sexual (inclusive estupro) passaram a ser de ação penal pública condicionada à representação quando a vítima for maior de 18 anos. Porém, em 2018, a Lei 13.718 tornou o estupro de ação pública INCONDICIONADA em todos os casos.","fund":"LEI: 'Art. 225, CP (redação dada pela Lei 13.718/2018): Nos crimes definidos nos Capítulos I e II deste Título, procede-se mediante ação penal pública incondicionada.' | JURISPRUDÊNCIA: 'STJ, HC 443.896/SP, 6ª T.: após a Lei 13.718/2018, os crimes de estupro (art. 213 CP) e estupro de vulnerável (art. 217-A CP) são de ação penal pública incondicionada, independentemente da idade da vítima.'","peg":"Lei 13.718/2018 tornou todos os crimes sexuais (Capítulos I e II, Título VI, CP) de ação pública incondicionada. Antes era condicionada à representação para vítima maior. Pegadinha clássica.","jur_status":"PENDENTE"},{"n":40,"enun":"O acordo de não persecução penal (ANPP), previsto no art. 28-A do CPP, pode ser celebrado pelo Ministério Público em crimes praticados com violência ou grave ameaça à pessoa.","gab":"ERRADO","com":"Errado. O ANPP é expressamente vedado em crimes praticados com violência ou grave ameaça à pessoa (art. 28-A, §2º, I, CPP). Também é vedado para crimes hediondos, vítima mulher em violência doméstica, entre outros. O ANPP é cabível em crimes com pena mínima de até 4 anos, sem violência ou ameaça.","fund":"LEI: 'Art. 28-A, CPP: Não sendo caso de arquivamento e tendo o investigado confessado formal e circunstancialmente a prática de infração penal sem violência ou grave ameaça e com pena mínima inferior a 4 anos, o Ministério Público poderá propor acordo de não persecução penal. §2º O acordo de não persecução penal não se aplica: I – se for cabível transação penal de competência dos Juizados Especiais Criminais.' | JURISPRUDÊNCIA: 'STJ, HC 604.199/SP, 5ª T.: o ANPP é vedado para crimes praticados com violência ou grave ameaça, pois sua ratio é o estímulo à resolução consensual de conflitos de menor gravidade.'","jur_status":"PENDENTE"},{"n":41,"enun":"A prova obtida ilicitamente por particular (não-agente estatal) pode ser admitida no processo penal, pois a vedação constitucional do art. 5º, LVI, da CF/88 aplica-se exclusivamente à atividade probatória do Estado.","gab":"ERRADO","com":"Errado. A proibição de provas ilícitas (art. 5º, LVI, CF/88) tem eficácia erga omnes — aplica-se tanto ao Estado quanto ao particular. Prova obtida por particular mediante violação de sigilo, invasão de privacidade ou tortura, por exemplo, é inadmissível no processo.","fund":"LEI: 'Art. 5º, LVI, CF/88: são inadmissíveis, no processo, as provas obtidas por meios ilícitos. Art. 157, CPP: São inadmissíveis, devendo ser desentranhadas do processo, as provas ilícitas, assim entendidas as obtidas em violação a normas constitucionais ou legais.' | JURISPRUDÊNCIA: 'STJ, RHC 26.827/SP, 6ª T.: a vedação às provas ilícitas tem natureza objetiva e não se limita à atuação estatal; provas obtidas por particulares com violação de direitos fundamentais são igualmente inadmissíveis.'","peg":"Proibição de prova ilícita = erga omnes. Aplica-se a particular e ao Estado. A assertiva tentou restringir ao Estado — ERRADA.","jur_status":"PENDENTE"},{"n":42,"enun":"A teoria da descoberta inevitável, positivada no CPP, permite que a prova derivada de prova ilícita seja admitida quando demonstrado que ela seria obtida por meios lícitos independentes, mesmo que de forma hipotética.","gab":"CERTO","com":"Certo. O art. 157, §2º, do CPP prevê a descoberta inevitável: se a prova derivada seria obtida por meios lícitos independentes, é admissível. O STF reconhece o caráter hipotético da demonstração — basta provar que havia uma fonte lícita independente que inevitavelmente conduziria àquela prova.","fund":"LEI: 'Art. 157, §2º, CPP: Considera-se fonte independente aquela que por si só, seguindo os trâmites típicos e de praxe, próprios da investigação ou instrução criminal, seria capaz de conduzir ao fato objeto da prova.' | JURISPRUDÊNCIA: 'STF, HC 83.921/RJ, 1ª T.: a descoberta inevitável é reconhecida como exceção à teoria dos frutos da árvore envenenada; a demonstração da inevitabilidade pode ser hipotética, desde que baseada em elementos concretos do caso.'","peg":"Descoberta inevitável ≠ fonte independente. São institutos distintos: a descoberta inevitável é hipotética (seria encontrada); a fonte independente é real (existe caminho lícito paralelo).","jur_status":"PENDENTE"},{"n":43,"enun":"A Lei 9.296/1996, que regulamenta as interceptações telefônicas, autoriza a prorrogação do prazo de monitoramento por tempo indeterminado, desde que a autoridade policial demonstre necessidade continuada.","gab":"ERRADO","com":"Errado. A Lei 9.296/1996 prevê prazo de 15 dias, renovável por igual período, uma vez comprovada a indispensabilidade. O STJ admite múltiplas renovações quando devidamente fundamentadas, mas não existe autorização para prorrogação por 'tempo indeterminado'.","fund":"LEI: 'Art. 5º, Lei 9.296/1996: A decisão será fundamentada, sob pena de nulidade, indicando também a forma de execução da diligência, que não poderá exceder o prazo de quinze dias, renovável por igual tempo uma vez comprovada a indispensabilidade do meio de prova.' | JURISPRUDÊNCIA: 'STJ, HC 143.805/SP, 6ª T.: as prorrogações das interceptações telefônicas são admissíveis enquanto subsistir a necessidade investigativa, desde que cada renovação seja fundamentada; contudo, não há prazo indeterminado — exige-se decisão judicial específica para cada prorrogação.'","jur_status":"PENDENTE"},{"n":44,"enun":"O habeas corpus pode ser impetrado para trancar ação penal quando demonstrada a manifesta ausência de justa causa para a persecução criminal.","gab":"CERTO","com":"Certo. O STJ e o STF admitem o trancamento de ação penal via habeas corpus quando demonstrada de plano a manifesta atipicidade da conduta, a ausência de justa causa ou a extinção da punibilidade. É uso excepcional do HC, mas reconhecido.","fund":"LEI: 'Art. 648, I, CPP: A coação considerar-se-á ilegal quando não houver justa causa.' | JURISPRUDÊNCIA: 'STJ, HC 503.474/SP, 5ª T.: é admissível o trancamento de ação penal por habeas corpus quando, de plano e sem necessidade de exame aprofundado de prova, verificar-se a manifesta atipicidade da conduta, a extinção da punibilidade ou a ausência de justa causa para a persecução.'","peg":"HC pode trancar ação penal — mas é EXCEPCIONAL. Exige demonstração de plano, sem análise aprofundada de prova. Hipóteses: atipicidade manifesta, extinção da punibilidade, ausência de justa causa.","jur_status":"PENDENTE"},{"n":45,"enun":"O prazo de conclusão do inquérito policial no caso de investigado preso é de dez dias, improrrogável, contados da data da efetivação da prisão.","gab":"CERTO","com":"Certo. O art. 10 do CPP estabelece 10 dias para conclusão do IP com investigado preso (improrrogável) e 30 dias quando solto (prorrogável). Esse prazo é regra geral — leis especiais (como a Lei de Drogas) preveem prazos próprios.","fund":"LEI: 'Art. 10, CPP: O inquérito deverá terminar no prazo de 10 dias, se o indiciado tiver sido preso em flagrante, ou estiver preso preventivamente, contado o prazo, neste caso, a partir do dia em que se executar a ordem de prisão; ou no prazo de 30 dias, quando estiver solto, mediante fiança ou sem ela.' | JURISPRUDÊNCIA: 'STJ, RHC 76.473/SP, 5ª T.: o excesso de prazo no encerramento do IP com investigado preso pode ensejar o relaxamento da prisão por constrangimento ilegal (art. 648, II, CPP).'","jur_status":"PENDENTE"},{"n":46,"enun":"O procedimento do Tribunal do Júri admite a revisão criminal de sentença absolutória, quando verificada, após o julgamento, prova nova capaz de modificar o resultado.","gab":"ERRADO","com":"Errado. A revisão criminal somente é admitida para beneficiar o réu — atacar sentença condenatória. Sentença absolutória do Júri é irrecorrível no mérito (princípio da soberania dos veredictos e non reformatio in pejus). Não há revisão criminal contra absolvição.","fund":"LEI: 'Art. 621, CPP: A revisão dos processos findos será admitida quando: I – a sentença condenatória for contrária ao texto expresso da lei penal ou à evidência dos autos. Art. 593, §3º, CPP: Se a apelação se fundar no no III, d, deste artigo, e o tribunal ad quem se convencer de que a decisão dos jurados é manifestamente contrária à prova dos autos, dar-se-á provimento ao recurso para sujeitar o réu a novo julgamento.' | JURISPRUDÊNCIA: 'STF, RvC 5.647/SP, Pleno: a revisão criminal é via exclusivamente pro reo; não existe revisão criminal contra sentença absolutória, ainda que prolatada pelo Tribunal do Júri.'"}]},{"nome":"Direito Constitucional e Legislação Complementar","comando":"Acerca dos direitos fundamentais, da organização do Estado, do controle de constitucionalidade e das funções essenciais à Justiça, julgue os itens a seguir.","itens":[{"n":47,"enun":"O princípio da dignidade da pessoa humana, previsto como fundamento da República no art. 1º, III, da CF/88, possui eficácia negativa, impedindo normas que a violem, mas não eficácia positiva capaz de impor prestações estatais.","gab":"ERRADO","com":"Errado. O STF reconhece dupla eficácia da dignidade: negativa (invalida normas incompatíveis) e positiva (impõe ao Estado condutas ativas para promoção da dignidade). A assertiva nega a eficácia positiva, o que contraria a jurisprudência dominante do STF.","fund":"LEI: 'Art. 1º, III, CF/88: A República Federativa do Brasil tem como fundamento: III – a dignidade da pessoa humana.' | JURISPRUDÊNCIA: 'STF, ADPF 1.107 (j. 23/05/2024): a dignidade da pessoa humana possui dupla eficácia — negativa (invalidação de normas violadoras) e positiva (obriga o Estado a adotar políticas de promoção); a investigação do histórico sexual da vítima viola a dignidade e a igualdade, sendo vedada.'","peg":"Dignidade tem eficácia NEGATIVA e POSITIVA. STF reconhece ambas. Questão que nega a positiva está ERRADA."},{"n":48,"enun":"Todo o poder emana do povo, que o exerce exclusivamente por meio de representantes eleitos, conforme previsto no parágrafo único do art. 1º da CF/88.","gab":"ERRADO","com":"Errado. O povo exerce o poder por representantes eleitos OU diretamente, nos termos da Constituição. O advérbio 'exclusivamente' elimina o exercício direto do poder (plebiscito, referendo, iniciativa popular), tornando a assertiva errada.","fund":"LEI: 'Art. 1º, parágrafo único, CF/88: Todo o poder emana do povo, que o exerce por meio de representantes eleitos ou diretamente, nos termos desta Constituição.' | JURISPRUDÊNCIA: 'STF, ADI 3.741/DF: o exercício direto do poder popular (plebiscito, referendo, iniciativa popular de lei) é direito fundamental de participação política e não pode ser suprimido nem restringido de forma desproporcional.'","peg":"Clássica pegadinha CEBRASPE: substituição de 'ou diretamente' por 'exclusivamente por representantes'. Art. 1º, § único: poder exercido por representantes OU DIRETAMENTE.","jur_status":"PENDENTE"},{"n":49,"enun":"Os tratados e convenções internacionais sobre direitos humanos, aprovados pelo Congresso Nacional com quórum qualificado previsto no art. 5º, §3º, da CF/88, equivalem às emendas constitucionais.","gab":"CERTO","com":"Certo. O art. 5º, §3º, da CF/88 (EC 45/2004) prevê que tratados de direitos humanos aprovados em dois turnos nas duas Casas, com 3/5 dos membros, têm hierarquia de emenda constitucional. Sem esse quórum, têm status supralegal (RE 466.343/STF).","fund":"LEI: 'Art. 5º, §3º, CF/88: Os tratados e convenções internacionais sobre direitos humanos que forem aprovados, em cada Casa do Congresso Nacional, em dois turnos, por três quintos dos votos dos respectivos membros, serão equivalentes às emendas constitucionais.' | JURISPRUDÊNCIA: 'STF, RE 466.343/SP (Peluso, Pleno, j. 03/12/2008): tratados de DH não aprovados com o quórum qualificado têm status supralegal (acima da lei ordinária, abaixo da CF); se aprovados com quórum do art. 5º, §3º, têm hierarquia de emenda constitucional.'","peg":"Tratado DH com quórum qualificado = emenda constitucional. Sem quórum = status SUPRALEGAL (não infraconstitucional, não constitucional). STF: RE 466.343.","jur_status":"OK"},{"n":50,"enun":"O mandado de segurança coletivo pode ser impetrado por partido político com representação no Congresso Nacional, independentemente da pertinência temática entre o objeto do mandamus e as finalidades institucionais do partido.","gab":"CERTO","com":"Certo. O STF entende que partidos políticos com representação no CN têm legitimidade ampla para impetrar MS coletivo, sem necessidade de pertinência temática estrita. O partido defende interesses difusos e coletivos de seus membros e da sociedade.","fund":"LEI: 'Art. 5º, LXX, CF/88: O mandado de segurança coletivo pode ser impetrado por: a) partido político com representação no Congresso Nacional.' | JURISPRUDÊNCIA: 'STF, MS 23.625/DF, Pleno: o partido político com representação parlamentar tem legitimidade para impetrar MS coletivo, dispensada a pertinência temática com seus fins estatutários; a legitimação é ampla para defender interesses dos filiados e da coletividade.'","jur_status":"PENDENTE"},{"n":51,"enun":"A cláusula de reserva de plenário exige que a inconstitucionalidade de lei ou ato normativo seja declarada pelo voto da maioria absoluta dos membros do tribunal ou de seu órgão especial.","gab":"CERTO","com":"Certo. O art. 97 da CF/88 (cláusula de reserva de plenário ou 'full bench') exige maioria absoluta dos membros do tribunal ou de seu órgão especial para declarar a inconstitucionalidade. Turmas isoladas não podem declarar inconstitucionalidade — devem suscitar incidente ao Pleno.","fund":"LEI: 'Art. 97, CF/88: Somente pelo voto da maioria absoluta de seus membros ou dos membros do respectivo órgão especial poderão os tribunais declarar a inconstitucionalidade de lei ou ato normativo do Poder Público.' | JURISPRUDÊNCIA: 'STF, Súmula Vinculante 10: Viola a cláusula de reserva de plenário (CF, artigo 97) a decisão de órgão fracionário de tribunal que, embora não declare expressamente a inconstitucionalidade de lei ou ato normativo do poder público, afasta sua incidência, no todo ou em parte.'","peg":"SV 10: afastar a aplicação da lei (mesmo sem declarar inconstitucionalidade) por órgão fracionário VIOLA a reserva de plenário.","jur_status":"PENDENTE"},{"n":52,"enun":"Na ação direta de inconstitucionalidade (ADI), o STF pode, por maioria de dois terços dos seus membros, modular os efeitos da decisão para que a inconstitucionalidade produzam efeitos prospectivos, preservando situações consolidadas.","gab":"CERTO","com":"Certo. O art. 27 da Lei 9.868/1999 autoriza o STF a modular os efeitos da declaração de inconstitucionalidade por maioria de 2/3 (8 ministros), por razões de segurança jurídica ou excepcional interesse social. Os efeitos podem ser prospectivos (ex nunc) ou fixados a partir de determinada data.","fund":"LEI: 'Art. 27, Lei 9.868/1999: Ao declarar a inconstitucionalidade de lei ou ato normativo, e tendo em vista razões de segurança jurídica ou de excepcional interesse social, poderá o Supremo Tribunal Federal, por maioria de dois terços de seus membros, restringir os efeitos daquela declaração ou decidir que ela só tenha eficácia a partir de seu trânsito em julgado ou de outro momento que venha a ser fixado.' | JURISPRUDÊNCIA: 'STF, ADI 2.240/BA (j. 09/05/2007): o STF modulou os efeitos da inconstitucionalidade para preservar o município criado, por razões de segurança jurídica.'","jur_status":"PENDENTE"},{"n":53,"enun":"O controle difuso de constitucionalidade pode ser realizado por qualquer juiz ou tribunal, mas a declaração incidental de inconstitucionalidade por tribunal exige a observância da cláusula de reserva de plenário.","gab":"CERTO","com":"Certo. No controle difuso, qualquer órgão jurisdicional afasta a aplicação da lei inconstitucional no caso concreto. Mas quando um tribunal (colegiado) declara a inconstitucionalidade, deve observar o art. 97 da CF/88 (reserva de plenário), sob pena de nulidade.","fund":"LEI: 'Art. 97, CF/88 e SV 10/STF.' | JURISPRUDÊNCIA: 'STF, RE 240.096/RJ, Pleno: no controle difuso, qualquer juiz pode afastar a lei inconstitucional no caso concreto; quando o tribunal o faz, deve observar a reserva de plenário (art. 97, CF), salvo se já houver pronunciamento do Pleno ou do STF sobre a questão (art. 949, parágrafo único, CPC).'","jur_status":"PENDENTE"},{"n":54,"enun":"A arguição de descumprimento de preceito fundamental (ADPF) é cabível quando não houver outro meio eficaz para sanar a lesividade ao preceito fundamental, caracterizando-se como ação de caráter subsidiário.","gab":"CERTO","com":"Certo. O princípio da subsidiariedade da ADPF (art. 4º, §1º, Lei 9.882/1999) determina que ela somente é admitida quando não houver outro meio eficaz de sanar a lesividade. É ação de caráter residual no controle concentrado.","fund":"LEI: 'Art. 4º, §1º, Lei 9.882/1999: Não será admitida arguição de descumprimento de preceito fundamental quando houver qualquer outro meio eficaz de sanar a lesividade.' | JURISPRUDÊNCIA: 'STF, ADPF 33-MC/PA (Gilmar Mendes, Pleno): a ADPF tem caráter subsidiário; o parâmetro é a inexistência de outro instrumento eficaz — não basta a existência teórica de outro meio; este deve ser efetivamente capaz de sanar a lesão ao preceito fundamental.'","peg":"ADPF = subsidiária. Não basta existir outro meio — ele deve ser EFICAZ. STF distingue os dois critérios."},{"n":55,"enun":"O Ministério Público possui autonomia funcional e administrativa, mas não autonomia financeira, cabendo ao Poder Executivo a fixação de seu orçamento.","gab":"ERRADO","com":"Errado. O MP possui autonomia funcional, administrativa E financeira. Tem capacidade de elaborar sua proposta orçamentária, observados os limites da LDO (art. 127, §3º, CF/88). A autonomia financeira é essencial para sua independência.","fund":"LEI: 'Art. 127, §2º, CF/88: Ao Ministério Público é assegurada autonomia funcional e administrativa, podendo, observado o disposto no art. 169, propor ao Poder Legislativo a criação e extinção de seus cargos e serviços auxiliares, provendo-os por concurso público de provas ou de provas e títulos, a política remuneratória e os planos de carreira; a lei disporá sobre sua organização e funcionamento. §3º: O Ministério Público elaborará sua proposta orçamentária dentro dos limites estabelecidos na lei de diretrizes orçamentárias.' | JURISPRUDÊNCIA: 'STF, ADI 4.154/AL: a autonomia financeira do MP (arts. 127, §§ 2º e 3º, CF) impede que o Executivo esvazie o orçamento ministerial de forma arbitrária; o MP elabora sua própria proposta orçamentária.'","jur_status":"PENDENTE"},{"n":56,"enun":"O habeas corpus tem como objeto a proteção do direito de locomoção e pode ser impetrado em face de ato de particular que ilegalmente restrinja a liberdade de ir e vir de alguém.","gab":"CERTO","com":"Certo. O habeas corpus protege a liberdade de locomoção (ir, vir e permanecer) contra qualquer coação ilegal — incluindo atos de particulares (ex.: hospital que retém paciente por dívidas, clube que impede saída de sócio). Não se limita à coação estatal.","fund":"LEI: 'Art. 5º, LXVIII, CF/88: Conceder-se-á habeas corpus sempre que alguém sofrer ou se achar ameaçado de sofrer violência ou coação em sua liberdade de locomoção, por ilegalidade ou abuso de poder.' | JURISPRUDÊNCIA: 'STF, HC 78.952/RJ, Pleno: o habeas corpus pode ser impetrado contra ato de particular que ilegalmente restrinja a liberdade de locomoção; a expressão \"por ilegalidade ou abuso de poder\" não se limita à autoridade pública.'","jur_status":"PENDENTE"},{"n":57,"enun":"A imunidade parlamentar material (ou inviolabilidade) dos membros do Congresso Nacional protege as opiniões, palavras e votos dos parlamentares no exercício do mandato, com eficácia dentro e fora do Parlamento.","gab":"CERTO","com":"Certo. A imunidade material (art. 53, CF/88) é absoluta para atos praticados no exercício do mandato e em razão dele. O STF firmou que o nexo com o mandato expande a proteção para fora do plenário. Sem nexo com o mandato, a imunidade material não protege.","fund":"LEI: 'Art. 53, CF/88: Os Deputados e Senadores são invioláveis, civil e penalmente, por quaisquer de suas opiniões, palavras e votos.' | JURISPRUDÊNCIA: 'STF, AP 522/RS (Pleno): a imunidade material protege o parlamentar por manifestações com nexo de implicação recíproca com o exercício do mandato; manifestações sem qualquer vinculação ao mandato não estão cobertas pela inviolabilidade.'","peg":"Imunidade material fora do Parlamento exige NEXO COM O MANDATO. Sem nexo → sem imunidade. Posição pacífica do STF."},{"n":58,"enun":"A Defensoria Pública goza de autonomia funcional e administrativa, sendo vedada ao Poder Executivo estadual a interferência em sua estrutura orgânica ou em seus orçamentos.","gab":"CERTO","com":"Certo. A EC 74/2013 estendeu à Defensoria Pública estadual a autonomia funcional, administrativa e orçamentária análoga à conferida ao MP e à OAB. O STF declarou inconstitucional lei que condicionava a Defensoria ao Executivo.","fund":"LEI: 'Art. 134, §2º, CF/88: Às Defensorias Públicas Estaduais são asseguradas autonomia funcional e administrativa e a iniciativa de sua proposta orçamentária dentro dos limites estabelecidos na lei de diretrizes orçamentárias e subordinação ao disposto no art. 99, §2º.' | JURISPRUDÊNCIA: 'STF, ADI 4.270/SC: é inconstitucional lei que submete a Defensoria Pública à Secretaria de Estado; a EC 74/2013 garantiu autonomia plena às DPEs, vedando interferência do Executivo em sua organização e orçamento.'","jur_status":"PENDENTE"},{"n":59,"enun":"A ação popular, prevista no art. 5º, LXXIII, da CF/88, pode ser proposta por qualquer cidadão para anular ato lesivo ao patrimônio público ou de entidade de que o Estado participe, sendo isenta de custas judiciais, salvo comprovada má-fé.","gab":"CERTO","com":"Certo. A ação popular é gratuita para o cidadão de boa-fé (art. 5º, LXXIII, CF). Apenas em caso de má-fé comprovada o autor arcará com as custas e honorários. É direito de participação política direta do cidadão no controle do poder.","fund":"LEI: 'Art. 5º, LXXIII, CF/88: Qualquer cidadão é parte legítima para propor ação popular que vise a anular ato lesivo ao patrimônio público ou de entidade de que o Estado participe, à moralidade administrativa, ao meio ambiente e ao patrimônio histórico e cultural, ficando o autor, salvo comprovada má-fé, isento de custas judiciais e do ônus da sucumbência.' | JURISPRUDÊNCIA: 'STJ, AREsp 1.225.286/RJ: o cidadão é parte legítima para ação popular; pessoa jurídica não tem legitimidade; apenas o cidadão no exercício de seus direitos políticos pode ajuizá-la.'","jur_status":"PENDENTE"},{"n":60,"enun":"O Conselho Nacional de Justiça (CNJ) e o Conselho Nacional do Ministério Público (CNMP) têm competência para apreciar a constitucionalidade de leis e atos normativos no exercício de seu poder disciplinar e fiscalizatório.","gab":"ERRADO","com":"Errado. CNJ e CNMP não têm competência para declarar a inconstitucionalidade de leis — essa função é exclusiva do Poder Judiciário. O CNJ exerce controle administrativo, disciplinar e correcional; não faz controle de constitucionalidade.","fund":"LEI: 'Art. 103-B, §4º, CF/88: Compete ao Conselho o controle da atuação administrativa e financeira do Poder Judiciário e do cumprimento dos deveres funcionais dos juízes.' | JURISPRUDÊNCIA: 'STF, MS 28.872-AgR/DF (Celso de Mello, Pleno): o CNJ não tem competência para declarar a inconstitucionalidade de leis; apenas o Poder Judiciário, por seus órgãos competentes, pode exercer o controle de constitucionalidade.'"},{"n":61,"enun":"O controle de constitucionalidade preventivo realizado pelo Poder Judiciário é cabível mediante mandado de segurança impetrado por parlamentar contra ato do presidente de Casa legislativa que submete à votação proposição que manifestamente viola o processo legislativo constitucional.","gab":"CERTO","com":"Certo. O STF admite controle preventivo pelo Judiciário em caso de mandado de segurança impetrado por parlamentar quando há violação manifesta do processo legislativo constitucional. É exceção ao controle repressivo clássico.","fund":"LEI: 'Art. 5º, LXIX, CF/88: conceder-se-á mandado de segurança para proteger direito líquido e certo, não amparado por habeas corpus ou habeas data, quando o responsável pela ilegalidade ou abuso de poder for autoridade pública.' | JURISPRUDÊNCIA: 'STF, MS 22.503/DF (Maurício Corrêa, Pleno): o STF admite mandado de segurança de parlamentar para controle preventivo de constitucionalidade, quando o processo legislativo viola norma constitucional que garante ao parlamentar o direito de não participar de votação inconstitucional.'","peg":"Controle preventivo judicial = excepcional. Só por MS de parlamentar, só contra violação do processo legislativo constitucional. Não é controle concentrado — é incidental.","jur_status":"PENDENTE"},{"n":62,"enun":"A repartição de competências entre União, estados, Distrito Federal e municípios na CF/88 adota o modelo da enumeração das competências da União e dos municípios, conferindo aos estados a competência residual.","gab":"CERTO","com":"Certo. A CF/88 enumera as competências privativas da União (art. 22) e os municípios têm competência para assuntos de interesse local (art. 30, I). Os estados têm competência residual — o que não foi atribuído à União, aos municípios ou expressamente reservado, fica com os estados (art. 25, §1º).","fund":"LEI: 'Art. 25, §1º, CF/88: São reservadas aos Estados as competências que não lhes sejam vedadas por esta Constituição.' | JURISPRUDÊNCIA: 'STF, ADI 2.544/RS (Sepúlveda Pertence, Pleno): o modelo constitucional de 1988 reserva aos estados a competência residual; as competências da União são explicitadas no texto; os estados detêm tudo que a CF não expressamente atribuiu à União ou aos municípios.'","jur_status":"PENDENTE"},{"n":63,"enun":"As cláusulas pétreas da CF/88 impedem a supressão de direitos por emenda constitucional, mas não obstam a ampliaçao de direitos fundamentais por lei infraconstitucional.","gab":"CERTO","com":"Certo. As cláusulas pétreas (art. 60, §4º, CF) protegem o núcleo essencial contra a supressão ou esvaziamento. Elas não impedem que leis infraconstitucionais ampliem direitos — ao contrário, isso é estimulado. A vedação é à redução, não à expansão de direitos.","fund":"LEI: 'Art. 60, §4º, CF/88: Não será objeto de deliberação a proposta de emenda tendente a abolir: IV – os direitos e garantias individuais.' | JURISPRUDÊNCIA: 'STF, ADI 939/DF (Sydney Sanches, Pleno): as cláusulas pétreas vedam emendas que tendam a ABOLIR ou ENFRAQUECER os direitos fundamentais; não impedem sua ampliação por emenda ou por lei ordinária que os expanda.'","peg":"Cláusula pétrea = vedação à SUPRESSÃO/ENFRAQUECIMENTO. Não impede AMPLIAÇÃO de direitos. A questão afirma que a lei ordinária pode ampliar — CERTO.","jur_status":"PENDENTE"},{"n":64,"enun":"O direito de greve dos servidores públicos civis, previsto no art. 37, VII, da CF/88, é exercido nos termos e nos limites definidos em lei específica, e, na ausência dessa lei, o STF determinou a aplicação analógica da Lei 7.783/1989.","gab":"CERTO","com":"Certo. O STF (MI 708, 670 e 712) declarou a omissão legislativa e determinou que, até a edição da lei específica, aplica-se analogicamente a Lei 7.783/1989 (greve dos trabalhadores privados) ao servidores públicos. A norma constitucional tem eficácia limitada dependente de lei regulamentadora.","fund":"LEI: 'Art. 37, VII, CF/88: o direito de greve será exercido nos termos e nos limites definidos em lei específica.' | JURISPRUDÊNCIA: 'STF, MI 708/DF (Gilmar Mendes, Pleno, j. 25/10/2007): na omissão legislativa, aplica-se analogicamente a Lei 7.783/1989 aos servidores públicos; o mandado de injunção não apenas declara a omissão, mas concretiza o direito até que venha a lei específica (teoria concretista geral).'","jur_status":"OK"}]},{"nome":"Direito Administrativo e Legislação Complementar","comando":"Acerca dos princípios, dos atos administrativos, dos agentes públicos, da responsabilidade civil do Estado e do controle da administração, julgue os itens a seguir.","itens":[{"n":65,"enun":"O princípio da legalidade administrativa impõe à Administração Pública a observância estrita da lei, de modo que somente pode fazer o que a lei expressamente autoriza, ao contrário do particular, que pode fazer tudo o que a lei não proíbe.","gab":"CERTO","com":"Certo. Legalidade administrativa = vinculação positiva à lei (só pode o que a lei permite). Para o particular, legalidade residual (pode tudo que a lei não proíbe). É a diferença entre um servidor público e um cidadão comum: o servidor tem manual de instruções que deve seguir; o cidadão tem apenas lista de proibições.","fund":"LEI: 'Art. 37, caput, CF/88: A administração pública direta e indireta de qualquer dos Poderes da União, dos Estados, do Distrito Federal e dos Municípios obedecerá aos princípios de legalidade, impessoalidade, moralidade, publicidade e eficiência.' | JURISPRUDÊNCIA: 'STF, RE 236.345/SP: a Administração Pública está vinculada positivamente à lei (princípio da legalidade); não pode criar obrigações ou restringir direitos sem expressa autorização legal, ao contrário do particular que atua no espaço não vedado pela norma.'","jur_status":"PENDENTE"},{"n":66,"enun":"O princípio da eficiência, previsto no art. 37, caput, da CF/88, já constava do texto constitucional originário de 1988, pois reflete exigência inerente ao Estado Democrático de Direito.","gab":"ERRADO","com":"Errado. A eficiência foi inserida no art. 37, caput, pela EC 19/1998 (Reforma Administrativa). Não constava do texto original de 1988. A CF/88 originalmente previa apenas legalidade, impessoalidade, moralidade e publicidade (LIMP).","fund":"LEI: 'Art. 37, caput, CF/88 (com redação dada pela EC 19/1998): A administração pública direta e indireta ... obedecerá aos princípios de legalidade, impessoalidade, moralidade, publicidade e eficiência.' | JURISPRUDÊNCIA: 'STJ, MS 20.119/DF, 1ª S.: o princípio da eficiência foi introduzido no texto constitucional pela EC 19/1998; sua origem está na Reforma Gerencial do Estado; antes de 1998, o texto do art. 37 continha apenas LIMP.'","peg":"LIMPE: a eficiência não era original de 1988 — entrou pela EC 19/1998. Questão que afirma ser 'originária de 1988' → ERRADA.","jur_status":"PENDENTE"},{"n":67,"enun":"Os atos administrativos vinculados, ao contrário dos discricionários, não admitem controle jurisdicional quanto à legalidade, visto que o legislador já definiu os critérios de conveniência e oportunidade.","gab":"ERRADO","com":"Errado. Todos os atos administrativos (vinculados e discricionários) admitem controle jurisdicional de legalidade. O Judiciário não pode invadir o mérito discricionário (conveniência e oportunidade), mas pode controlar a legalidade de qualquer ato. A assertiva confunde legalidade com mérito.","fund":"LEI: 'Art. 5º, XXXV, CF/88: a lei não excluirá da apreciação do Poder Judiciário lesão ou ameaça a direito.' | JURISPRUDÊNCIA: 'STF, RE 633.703/MG (Gilmar Mendes, Pleno): o Judiciário controla a legalidade, a moralidade e a proporcionalidade dos atos discricionários; não pode, porém, substituir o administrador na valoração de conveniência e oportunidade — esse é o núcleo insindicável do mérito.'","peg":"Todo ato admite controle de LEGALIDADE. O que o Judiciário não pode invadir é o MÉRITO (conveniência e oportunidade). Nunca confundir.","jur_status":"PENDENTE"},{"n":68,"enun":"O desvio de finalidade nos atos administrativos constitui vício de legalidade que possibilita a anulação do ato pela própria Administração ou pelo Poder Judiciário.","gab":"CERTO","com":"Certo. O desvio de finalidade (ou desvio de poder) é vício de legalidade — o ato persegue fim distinto do previsto em lei. Como vício, autoriza a anulação pelo próprio Poder Executivo (autotutela) ou pelo Judiciário. É diferente da revogação (ato legal, mas inoportuno).","fund":"LEI: 'Art. 2º, parágrafo único, e, Lei 4.717/1965 (Lei da Ação Popular): considera-se ocorrido o desvio de finalidade quando o agente pratica o ato visando a fim diverso daquele previsto, explícita ou implicitamente, na regra de competência.' | JURISPRUDÊNCIA: 'STJ, RMS 37.082/RJ, 1ª T.: o desvio de finalidade vicia o ato administrativo em sua legalidade, autorizando sua anulação pela Administração (Súmula 473/STF) ou pelo Judiciário; distingue-se da revogação, que pressupõe ato legal mas inconveniente.'","jur_status":"PENDENTE"},{"n":69,"enun":"A responsabilidade civil do Estado por atos omissivos ilícitos é subjetiva, exigindo a demonstração de culpa ou dolo do agente estatal, ao contrário da responsabilidade por atos comissivos, que é objetiva.","gab":"CERTO","com":"Certo. A responsabilidade objetiva (art. 37, §6º, CF) aplica-se aos atos comissivos do Estado. Nos atos omissivos ilícitos (descumprimento de dever legal específico de agir), prevalece na jurisprudência a responsabilidade subjetiva — exige-se prova de culpa do Estado (omissão culposa). STF e STJ convergem nesse ponto.","fund":"LEI: 'Art. 37, §6º, CF/88: As pessoas jurídicas de direito público e as de direito privado prestadoras de serviços públicos responderão pelos danos que seus agentes, nessa qualidade, causarem a terceiros, assegurado o direito de regresso contra o responsável nos casos de dolo ou culpa.' | JURISPRUDÊNCIA: 'STF, ARE 1.243.672/SP (Tema 897, j. 26/11/2020): a responsabilidade do Estado por atos omissivos exige demonstração de culpa (responsabilidade subjetiva); para atos comissivos, a responsabilidade é objetiva (art. 37, §6º, CF).'","peg":"Responsabilidade por OMISSÃO = subjetiva (exige culpa). Por COMISSÃO = objetiva. STF e STJ convergem — mas a questão é polêmica em doutrina.","jur_status":"PENDENTE"},{"n":70,"enun":"Concessionárias de serviços públicos respondem objetivamente por danos causados a usuários e não-usuários dos serviços, conforme decidiu o STF no RE 591.874/MS.","gab":"CERTO","com":"Certo. O STF (RE 591.874/MS) firmou que a responsabilidade objetiva das pessoas jurídicas de direito privado prestadoras de serviços públicos (art. 37, §6º, CF) alcança tanto usuários quanto não-usuários. O cidadão que não contratou o serviço mas foi atingido também tem direito à reparação objetiva.","fund":"LEI: 'Art. 37, §6º, CF/88.' | JURISPRUDÊNCIA: 'STF, RE 591.874/MS (Lewandowski, Pleno, j. 26/08/2009): as concessionárias de serviço público respondem objetivamente pelos danos causados a terceiros usuários e não-usuários do serviço; a expressão \"causarem a terceiros\" do art. 37, §6º, CF, abrange qualquer pessoa que seja atingida pela prestação do serviço.'","jur_status":"OK"},{"n":71,"enun":"A improbidade administrativa prevista na Lei 8.429/92, com as alterações da Lei 14.230/2021, exige dolo do agente para a configuração de qualquer das modalidades de ato ímprobo, tendo sido afastada a responsabilidade por culpa.","gab":"CERTO","com":"Certo. A Lei 14.230/2021 reformou profundamente a Lei de Improbidade. O art. 1º, §1º, passou a exigir dolo específico (direto) para todos os atos de improbidade. A improbidade culposa foi extirpada do sistema — nem mesmo a modalidade de dano ao erário admite mais culpa.","fund":"LEI: 'Art. 1º, §1º, Lei 8.429/92 (redação dada pela Lei 14.230/2021): Consideram-se atos de improbidade administrativa as condutas dolosas tipificadas nos arts. 9º, 10 e 11 desta Lei, ressalvados tipos previstos em leis especiais.' | JURISPRUDÊNCIA: 'STJ, AREsp 1.959.029/SP, 1ª S. (j. 08/11/2022): após a Lei 14.230/2021, apenas condutas DOLOSAS configuram improbidade; o dolo deve ser específico e direto; a improbidade culposa foi extinta, não sendo possível responsabilizar agente por mera negligência ou imprudência.'","peg":"Lei 14.230/2021 exige DOLO DIRETO para improbidade. Culpa e dolo eventual não bastam. Mudança fundamental cobrada pela CEBRASPE.","jur_status":"PENDENTE"},{"n":72,"enun":"Os servidores públicos investidos em cargo de provimento efetivo adquirem estabilidade após o estágio probatório de três anos, e sua demissão exige processo administrativo disciplinar com garantias do contraditório e da ampla defesa.","gab":"CERTO","com":"Certo. O art. 41 da CF/88 prevê estabilidade após 3 anos de efetivo exercício e aprovação em avaliação especial. A perda do cargo do estável exige PAD com contraditório e ampla defesa, ou processo judicial transitado em julgado, ou avaliação periódica de desempenho insuficiente.","fund":"LEI: 'Art. 41, CF/88: São estáveis após três anos de efetivo exercício os servidores nomeados para cargo de provimento efetivo em virtude de concurso público. §1º O servidor público estável só perderá o cargo: I – em virtude de sentença judicial transitada em julgado; II – mediante processo administrativo em que lhe seja assegurada ampla defesa; III – mediante procedimento de avaliação periódica de desempenho, na forma de lei complementar, assegurada ampla defesa.' | JURISPRUDÊNCIA: 'STF, MS 23.780/DF: a demissão de servidor estável sem o devido processo administrativo é nula, por violação ao contraditório e à ampla defesa (art. 41, §1º, II, CF).'","jur_status":"PENDENTE"},{"n":73,"enun":"Os bens públicos dominicais, por não serem destinados a uso comum ou especial, podem ser alienados, sendo admissível, excepcionalmente, a usucapião desses bens quando o particular os ocupa por lapso temporal superior a cinco anos.","gab":"ERRADO","com":"Errado. Os bens públicos (de qualquer categoria — uso comum, uso especial ou dominicais) são inalienáveis e não podem ser objeto de usucapião. A Súmula 340 do STF e o art. 102 do CC são expressos: bens públicos não se adquirem por usucapião.","fund":"LEI: 'Art. 102, CC: Os bens públicos não estão sujeitos a usucapião. Súmula 340/STF: Desde a vigência do Código Civil, os bens dominicais, como os demais bens públicos, não podem ser adquiridos por usucapião.' | JURISPRUDÊNCIA: 'STF, RE 218.324/SP: a inalienabilidade e a impossibilidade de usucapião são características de todos os bens públicos; os bens dominicais podem ser alienados, mas apenas nos termos e requisitos legais (autorização, avaliação prévia, licitação), nunca por usucapião.'","peg":"Bens públicos dominicais PODEM ser alienados (com requisitos legais), mas NUNCA por usucapião. Súmula 340/STF e art. 102/CC são expressos.","jur_status":"PENDENTE"},{"n":74,"enun":"O poder de polícia administrativa pode ser delegado a pessoas jurídicas de direito privado, desde que não incluam o exercício do ciclo de polícia na fase de consentimento.","gab":"ERRADO","com":"Errado. O STF (RE 633.782/MG, Tema 532) firmou que as atividades que envolvam poder de coerção (fiscalização e sanção) e o consentimento de polícia não podem ser delegadas a entidades privadas. Apenas as atividades de apoio material e instrumental podem ser terceirizadas.","fund":"LEI: 'Art. 78, CTN: Considera-se poder de polícia atividade da administração pública que, limitando ou disciplinando direito, interesse ou liberdade, regula a prática de ato ou abstenção de fato em razão de interesse público.' | JURISPRUDÊNCIA: 'STF, RE 633.782/MG (Rosa Weber, Pleno, j. 26/10/2020, Tema 532): o poder de polícia (consentimento, fiscalização e sanção) não pode ser delegado a entidades de direito privado; somente atividades preparatórias materiais e instrumentais admitem terceirização.'","peg":"STF Tema 532: poder de polícia (inclusive consentimento, fiscalização e sanção) NÃO pode ser delegado a privados. Atividades de apoio material SIM.","jur_status":"PENDENTE"},{"n":75,"enun":"A licitação na modalidade pregão, prevista na Lei 14.133/2021, é cabível para aquisição de bens e serviços comuns, podendo ser realizada na forma eletrônica ou presencial.","gab":"CERTO","com":"Certo. O pregão (Lei 14.133/2021) é destinado a bens e serviços comuns, cuja proposta pode ser selecionada exclusivamente pelo critério de menor preço ou maior desconto. A forma eletrônica é preferencial; a presencial é admitida excepcionalmente.","fund":"LEI: 'Art. 6º, XLI e XLII, Lei 14.133/2021: define pregão como modalidade de licitação obrigatória para aquisição de bens e serviços comuns cujo critério de julgamento é o menor preço ou maior desconto. Art. 17, §2º: o pregão deve ser realizado preferencialmente de forma eletrônica.' | JURISPRUDÊNCIA: 'TCU, Acórdão 2.569/2021-Plenário: a Lei 14.133/2021 tornou o pregão eletrônico a forma preferencial; a presencial exige justificativa técnica fundamentada no processo administrativo.'"},{"n":76,"enun":"A Lei 14.133/2021 (Nova Lei de Licitações) revogou imediatamente a Lei 8.666/1993, a Lei 10.520/2002 (Pregão) e a Lei 12.462/2011 (RDC), que deixaram de vigorar na data de sua publicação.","gab":"ERRADO","com":"Errado. A Lei 14.133/2021 previu período de transição: as leis anteriores (8.666/93, 10.520/02 e 12.462/11) coexistiram com a nova lei até 01/04/2023. A partir de então, as normas antigas foram revogadas. A revogação não foi imediata na publicação.","fund":"LEI: 'Art. 193, Lei 14.133/2021: Ficam revogados, após decorridos 2 anos da publicação desta Lei, os arts. 89 a 108 da Lei nº 8.666, de 21 de junho de 1993; e a Lei nº 8.666, de 21 de junho de 1993, a Lei nº 10.520, de 17 de julho de 2002, e os arts. 1º a 47-A da Lei nº 12.462, de 4 de agosto de 2011.' | JURISPRUDÊNCIA: 'TCU, Acórdão 1.296/2022-Plenário: durante o período de transição, órgãos podiam licitar pelas regras antigas ou pela nova lei; a revogação definitiva das leis anteriores ocorreu em 01/04/2023.'"},{"n":77,"enun":"O processo administrativo federal, regido pela Lei 9.784/1999, assegura ao administrado o direito ao contraditório e à ampla defesa, inclusive para atos que possam afetar seus interesses.","gab":"CERTO","com":"Certo. A Lei 9.784/1999 consagra o contraditório e a ampla defesa no processo administrativo (arts. 2º e 26 a 32). O STF (SV 3) é claro: não há direito a contraditório antes de ato de mero indeferimento liminar, mas há quando o ato afeta interesse do administrado.","fund":"LEI: 'Art. 2º, Lei 9.784/1999: A Administração Pública obedecerá, dentre outros, aos princípios da legalidade, finalidade, motivação, razoabilidade, proporcionalidade, moralidade, ampla defesa, contraditório, segurança jurídica, interesse público e eficiência.' | JURISPRUDÊNCIA: 'STF, SV 3: Nos processos perante o Tribunal de Contas da União asseguram-se o contraditório e a ampla defesa quando da decisão puder resultar anulação ou revogação de ato administrativo que beneficie o interessado.'"},{"n":78,"enun":"A prescrição intercorrente em processo administrativo disciplinar, prevista na Lei 8.112/1990, é de cinco anos e corre a partir do momento em que o processo permanece paralisado por inércia da Administração.","gab":"CERTO","com":"Certo. O STJ e o STF reconhecem a prescrição intercorrente no PAD. A Lei 8.112/1990 prevê prazo prescricional de 5 anos para a maioria das infrações. A Administração que paralisa o PAD sem justificativa por prazo superior à metade do prazo prescricional incorre em prescrição intercorrente.","fund":"LEI: 'Art. 142, Lei 8.112/1990: A ação disciplinária prescreverá: I – em 5 anos, quanto às infrações puníveis com demissão, cassação de aposentadoria ou disponibilidade e destituição de cargo em comissão; II – em 2 anos, quanto à suspensão; III – em 180 dias, quanto à advertência.' | JURISPRUDÊNCIA: 'STJ, MS 20.558/DF, 1ª S.: a prescrição intercorrente no PAD é reconhecida quando o processo permanece paralisado por inércia administrativa por prazo superior a 140 dias (metade do menor prazo prescricional — 180 dias da advertência).'","jur_status":"PENDENTE"},{"n":79,"enun":"O tombamento de bem cultural privado, por constituir limitação ao direito de propriedade, exige prévia indenização ao proprietário.","gab":"ERRADO","com":"Errado. O tombamento é limitação administrativa ao uso da propriedade — não transfere o domínio nem importa despossamento. Por isso, em regra, não gera indenização. Apenas se o tombamento impedir o uso normal da propriedade e houver prova de dano específico é que caberá indenização.","fund":"LEI: 'Decreto-Lei 25/1937: regula o tombamento de bens de valor histórico, artístico e cultural.' | JURISPRUDÊNCIA: 'STF, RE 219.626/SP: o tombamento, como modalidade de limitação administrativa ao uso da propriedade, não exige indenização prévia; indenização só é devida quando a restrição impede totalmente o exercício do direito de propriedade ou quando há esvaziamento econômico do bem tombado.'","peg":"Tombamento = limitação administrativa = SEM indenização prévia. Indenização só se houver esvaziamento econômico do bem. Não confundir com desapropriação (justa e prévia).","jur_status":"PENDENTE"},{"n":80,"enun":"A autotutela administrativa, consagrada nas Súmulas 346 e 473 do STF, permite à Administração anular seus próprios atos ilegais independentemente de provocação do Judiciário.","gab":"CERTO","com":"Certo. A autotutela é poder-dever da Administração: ela pode (e deve) anular seus atos ilegais e revogar os inconvenientes, sem precisar acionar o Judiciário. Trata-se de manifestação do princípio da legalidade e da supremacia do interesse público.","fund":"LEI: 'Súmula 346/STF: A Administração Pública pode declarar a nulidade dos seus próprios atos. Súmula 473/STF: A administração pode anular seus próprios atos, quando eivados de vícios que os tornam ilegais, porque deles não se originam direitos; ou revogá-los, por motivo de conveniência ou oportunidade, respeitados os direitos adquiridos, e ressalvada, em todos os casos, a apreciação judicial.' | JURISPRUDÊNCIA: 'STJ, RMS 41.239/MG, 1ª T.: a autotutela administrativa é dever e não mera faculdade; a omissão da Administração em anular ato ilegal pode configurar desvio de poder ou violação ao princípio da legalidade.'","jur_status":"PENDENTE"}]},{"nome":"Medicina Legal","comando":"Acerca de tanatologia, traumatologia forense, sexologia forense e toxicologia médico-legal, julgue os itens a seguir.","itens":[{"n":81,"enun":"Na tanatologia forense, o rigor mortis constitui fenômeno cadavérico transformativo destrutivo que tem início nas pálpebras e mandíbula, atingindo progressivamente os membros inferiores.","gab":"ERRADO","com":"Errado. O rigor mortis é fenômeno cadavérico abiótico (de inatividade biológica), não transformativo. É resultado da ausência de ATP muscular, que impede o relaxamento das fibras musculares. Começa pelos músculos da face (pálpebras, mandíbula) e desce progressivamente — correto nessa parte — mas a classificação como 'transformativo destrutivo' está errada.","fund":"LEI: 'Art. 162, CPP: A autópsia será feita pelo menos seis horas depois do óbito, salvo se os peritos, pela evidência dos sinais de morte, julgarem que possa ser feita antes daquele prazo.' | JURISPRUDÊNCIA: classificação doutrinária (França, Delton Croce): fenômenos cadavéricos abióticos (rigor mortis, livor mortis, algor mortis) são sinais de morte; transformativos (putrefação, mumificação, saponificação) modificam estruturalmente o cadáver. Rigor mortis = abiótico.","peg":"Rigor mortis = fenômeno ABIÓTICO (não transformativo). Começa na face (pálpebras, mandíbula) e desce — isso está correto. O erro está na classificação como 'transformativo destrutivo'."},{"n":82,"enun":"O livor mortis (livores cadavéricos) pode ser utilizado para estimar a posição do cadáver após a morte, pois se forma nas partes declives do corpo por acúmulo de sangue, sendo fixo antes de 6 a 12 horas após o óbito.","gab":"ERRADO","com":"Errado. Os livores se tornam FIXOS (não removíveis pela mudança de posição) apenas após 12 a 18 horas, aproximadamente. Antes disso (período móvel), eles podem se deslocar se o cadáver for mudado de posição. A assertiva encurtou o prazo para 6 a 12 horas, o que está incorreto.","fund":"LEI: Medicina Legal — doutrina de Delton Croce e Genival Veloso de França: livores cadavéricos surgem entre 30 minutos e 2 horas após a morte; são móveis (deslocam-se com a posição) nas primeiras 12–18 horas; fixam-se definitivamente após esse período, sendo úteis para verificar se o cadáver foi movido post mortem.","peg":"Livores: móveis até ~12-18h, fixos depois. A assertiva disse 'fixos antes de 6-12h' — prazo errado. Livor fixo mas em posição anatômica incongruente indica movimentação post mortem."},{"n":83,"enun":"Para fins de medicina legal, denomina-se lesão contusa aquela produzida por instrumento de superfície romba, como bastão ou pedra, caracterizando-se por equimose, escoriação e laceração, ao contrário das lesões cortantes, produzidas por instrumentos de gume.","gab":"CERTO","com":"Certo. A traumatologia forense classifica os instrumentos pelo mecanismo de lesão: contundente (energia cinética, superfície romba) → lesões contusas (equimose, hematoma, escoriação, laceração). Instrumentos cortantes (bisturi, lâmina) → feridas incisas. A distinção importa para identificar a causa e o instrumento utilizado.","fund":"LEI: Medicina Legal — Hélio Gomes e Genival Veloso de França: lesão contusa = produzida por instrumento contundente (sem corte); lesão cortante = produzida por instrumentos de gume; lesão punctória (furante) = instrumentos pontiagudos. O exame de corpo de delito deve descrever a morfologia da lesão para identificar o instrumento."},{"n":84,"enun":"Na asfixia mecânica por enforcamento, a equimose em faixa ao redor do pescoço (sulco do enforcamento) é tipicamente horizontal, de profundidade uniforme e se interrompe na região de inserção do laço.","gab":"ERRADO","com":"Errado. No enforcamento, o sulco é oblíquo ou em ângulo, de profundidade desuniforme (mais profundo nas laterais, mais raso ou interrompido na região onde o laço se fixa — nó ou ponto de apoio). O sulco horizontal e de profundidade uniforme é típico da esganadura (asfixia manual) ou do garroteamento, não do enforcamento.","fund":"LEI: Medicina Legal — Genival Veloso de França e Delton Croce: no enforcamento, o sulco do pescoço é incompleto (interrompido no ponto de fixação do laço), oblíquo e de profundidade desuniforme; no garroteamento e esganadura, o sulco tende a ser horizontal e completo.","peg":"Enforcamento: sulco oblíquo, desuniforme, interrompido no nó. Garroteamento: sulco horizontal, uniforme, completo. CEBRASPE cobra essa distinção frequentemente."},{"n":85,"enun":"O exame de conjunção carnal em vítima de estupro deve ser realizado preferencialmente antes de a vítima urinar, defecar, banhar-se ou trocar de roupa, visando à preservação de elementos biológicos do agressor.","gab":"CERTO","com":"Certo. A sexologia forense determina que o exame pericial deve ser realizado o mais precocemente possível, com a vítima preservando o máximo de elementos materiais (espermatozoides, DNA do agressor, fibras de roupa). O banho, a troca de roupa e demais atos destroem provas biológicas fundamentais.","fund":"LEI: 'Art. 168, CPP: Em caso de lesões corporais, se o primeiro exame for inconclusivo, proceder-se-á a exame complementar por determinação da autoridade policial ou judiciária, de ofício, ou a requerimento do Ministério Público, do ofendido ou do acusado, ou de seu defensor.' | Medicina Legal — França e Croce: o exame de recente conjunção carnal é mais eficaz em até 72 horas, com cadeia de custódia preservada."},{"n":86,"enun":"A embriaguez alcoólica, para fins de medicina legal e Código Penal, pode ser avaliada com base em critérios clínicos e laboratoriais, sendo considerada embriaguez completa a alcoolemia igual ou superior a 1,5 g/L de sangue.","gab":"CERTO","com":"Certo. O CP e a medicina legal utilizam critérios clínicos (sintomatologia) e laboratoriais (alcoolemia). Para efeitos médico-legais, considera-se: embriaguez incompleta ≈ 0,6 a 1,5 g/L; embriaguez completa ≥ 1,5 g/L. Esses parâmetros balizam a perícia em PAD e processos penais.","fund":"LEI: 'Art. 28, II, §§1º e 2º, CP: embriaguez completa e incompleta. Decreto 6.488/2008: define concentração de 0,6 g/L para infração administrativa de trânsito.' | Medicina Legal — Croce e França: alcoolemia de 1,5 g/L como limiar da embriaguez completa para fins de imputabilidade penal."},{"n":87,"enun":"O fenômeno da putrefação cadavérica é influenciado pela temperatura do ambiente, sendo acelerado em ambientes quentes e úmidos e retardado em ambientes frios e secos.","gab":"CERTO","com":"Certo. A putrefação é causada pela ação de bactérias anaeróbias que decompõem os tecidos. O calor e a umidade aceleram o processo (proliferação bacteriana); o frio e a secura retardam. Por isso, cadáveres em regiões tropicais decompostos rapidamente e em regiões frias preservados por mais tempo.","fund":"LEI: Medicina Legal — Genival Veloso de França: putrefação é fenômeno transformativo destrutivo influenciado por temperatura (calor acelera), umidade (umidade favorece), presença de ar (aerobiose pode acelerar fase inicial), e integridade do cadáver. Lei de Casper: cadáver a céu aberto decompõe 8× mais rápido do que na água e 2× mais rápido do que enterrado."},{"n":88,"enun":"A lesão contusa denominada hematoma difere da equimose por se caracterizar como coleção de sangue nos tecidos subcutâneos, resultando em massa palpável, enquanto a equimose é infiltração de sangue sem coleção.","gab":"CERTO","com":"Certo. Na traumatologia forense: equimose = infiltração hemorrágica difusa (sangue extravasado entre tecidos, sem formar coleção palpável); hematoma = coleção circunscrita de sangue que forma massa palpável. A evolução da cor da equimose (vermelha → violácea → amarelada) permite estimar o tempo da lesão.","fund":"LEI: Medicina Legal — Hélio Gomes e França: equimose (lesão difusa, sem coleção) vs. hematoma (coleção de sangue com massa palpável). A datação da equimose pela evolução cromática é ferramenta pericial para estimar o tempo do evento traumático, especialmente em casos de violência doméstica."},{"n":89,"enun":"A Síndrome do Bebê Sacudido (Shaken Baby Syndrome) tem como característica pericial a tríade de hematoma subdural, hemorragia retiniana e edema cerebral, podendo não apresentar sinais externos de trauma.","gab":"CERTO","com":"Certo. A Síndrome do Bebê Sacudido é forma de violência contra criança que não deixa marcas externas, mas produz lesões internas graves (tríade pericial). O perito deve estar atento à discrepância entre a história clínica dos pais e os achados periciais. Importa para crimes de maus-tratos e homicídio contra vulneráveis.","fund":"LEI: 'Arts. 136 a 139-A, CP: maus tratos e violência doméstica contra criança. ECA, art. 227, CF/88.' | Medicina Legal — Croce: a SBS é causada por aceleração-desaceleração rotacional do encéfalo infantil; a tríade hematoma subdural + hemorragia retiniana + encefalopatia hipóxico-isquêmica é o achado pericial típico, sem sinais externos de trauma."},{"n":90,"enun":"A toxicologia médico-legal analisa o comportamento das substâncias tóxicas no organismo, abrangendo as fases de absorção, distribuição, metabolização e eliminação, denominadas em conjunto como farmacocinética forense.","gab":"CERTO","com":"Certo. A toxicocinética forense estuda o que o organismo faz com a substância tóxica (absorção, distribuição, metabolização/biotransformação e excreção — ADME). É fundamental para determinar a dose, a via de administração e o tempo decorrido entre a ingestão e o óbito ou a coleta da amostra pericial.","fund":"LEI: Medicina Legal — Delton Croce e Croce Júnior: toxicodinâmica (o que a toxina faz ao organismo) vs. toxicocinética (o que o organismo faz com a toxina: ADME). Para perícia, interessa especialmente a meia-vida de eliminação da substância para correlacionar a concentração encontrada com o momento da ingestão."}]},{"nome":"Direito Civil e Legislação Complementar","comando":"Acerca da teoria geral do negócio jurídico, dos direitos da personalidade, das obrigações, da responsabilidade civil e do direito de família, julgue os itens a seguir.","itens":[{"n":91,"enun":"O negócio jurídico celebrado com dolo é anulável, ao passo que o celebrado com simulação, por configurar nulidade absoluta, pode ser declarado nulo de ofício pelo juiz.","gab":"CERTO","com":"Certo. O Código Civil distingue: dolo (vício de consentimento) → anulabilidade (art. 171, II, CC); simulação → nulidade absoluta (art. 167, CC). A nulidade absoluta pode ser declarada pelo juiz de ofício, a requerimento ou pelo MP; a anulabilidade exige provocação da parte interessada.","fund":"LEI: 'Art. 167, CC: É nulo o negócio jurídico simulado, mas subsistirá o que se dissimulou, se válido for na substância e na forma. Art. 171, II, CC: É anulável o negócio jurídico por vício resultante de dolo.' | JURISPRUDÊNCIA: 'STJ, REsp 1.394.008/SP: a simulação gera nulidade absoluta (art. 167, CC), declarável de ofício pelo juiz; o dolo gera anulabilidade, que decai em 4 anos (art. 178, II, CC).'","jur_status":"PENDENTE"},{"n":92,"enun":"Os direitos da personalidade são intransmissíveis, irrenunciáveis e extrapatrimoniais, sendo nulo o negócio jurídico pelo qual o titular abdique permanentemente de seu direito à imagem.","gab":"CERTO","com":"Certo. Os direitos da personalidade (art. 11, CC) são intransmissíveis e irrenunciáveis. É possível autorizar o uso da imagem de forma limitada e revogável, mas não abdicar permanentemente do direito à imagem — tal renúncia seria nula por contrariar norma cogente.","fund":"LEI: 'Art. 11, CC: Com exceção dos casos previstos em lei, os direitos da personalidade são intransmissíveis e irrenunciáveis, não podendo o seu exercício sofrer limitação voluntária.' | JURISPRUDÊNCIA: 'STJ, Súmula 403: independe de prova do prejuízo a indenização pela publicação não autorizada de imagem de pessoa com fins econômicos ou comerciais (dano in re ipsa, j. 28/10/2009).'"},{"n":93,"enun":"A responsabilidade civil por danos ambientais, conforme entendimento do STJ, é objetiva e solidária, fundamentada na teoria do risco integral, independentemente da licitude da atividade e da licença ambiental obtida.","gab":"CERTO","com":"Certo. O STJ (REsp 1.374.284) adota a teoria do risco integral para a responsabilidade ambiental: não se admite excludentes de responsabilidade (caso fortuito, força maior, fato de terceiro). A licença ambiental não afasta a obrigação de reparar o dano.","fund":"LEI: 'Art. 14, §1º, Lei 6.938/1981: o poluidor é obrigado a indenizar ou reparar os danos causados ao meio ambiente e aos terceiros afetados, independentemente da existência de culpa.' | JURISPRUDÊNCIA: 'STJ, REsp 1.374.284/MG (Benedito Gonçalves, 1ª S.): a responsabilidade por dano ambiental é objetiva, fundada no risco integral; inadmissíveis excludentes de fortuito, força maior ou fato de terceiro; a licença ambiental não exclui o dever de reparação.'","jur_status":"OK"},{"n":94,"enun":"No direito brasileiro, a usucapião ordinária de imóvel exige posse mansa, pacífica, contínua e com justo título e boa-fé pelo prazo de dez anos, podendo esse prazo ser reduzido à metade se o possuidor estabelecer moradia habitual no imóvel.","gab":"CERTO","com":"Certo. A usucapião ordinária (art. 1.242, CC) exige 10 anos com justo título e boa-fé. Reduz-se para 5 anos se o possuidor estabeleceu moradia ou realizou investimentos de interesse social e econômico (art. 1.242, § único, CC).","fund":"LEI: 'Art. 1.242, CC: Adquire também a propriedade do imóvel aquele que, contínua e incontestadamente, com justo título e boa-fé, o possuir por dez anos. Parágrafo único: Será de cinco anos o prazo previsto neste artigo se o imóvel houver sido adquirido, onerosamente, com base no registro constante do respectivo cartório, cancelada posteriormente, desde que os possuidores nele tiverem estabelecido a sua moradia, ou realizado investimentos de interesse social e econômico.' | JURISPRUDÊNCIA: 'STJ, EREsp 1.345.432/SC: na usucapião ordinária, o prazo de 10 anos reduz-se à metade (5 anos) quando o possuidor estabelece moradia habitual no imóvel e tem justo título e boa-fé.'","jur_status":"PENDENTE"},{"n":95,"enun":"O Estatuto da Pessoa com Deficiência (Lei 13.146/2015) alterou o Código Civil para incluir as pessoas com deficiência como relativamente incapazes.","gab":"ERRADO","com":"Errado. A Lei 13.146/2015 (EPD) reformou profundamente o regime de incapacidades. As pessoas com deficiência passaram a ser plenamente CAPAZES (art. 6º, EPD). O EPD removeu as pessoas com deficiência mental do rol de incapazes e criou a tomada de decisão apoiada como alternativa à curatela.","fund":"LEI: 'Art. 6º, Lei 13.146/2015: A deficiência não afeta a plena capacidade civil da pessoa, inclusive para: I – casar-se e constituir união estável; II – exercer direitos sexuais e reprodutivos; III – exercer o direito de decidir sobre o número de filhos e de ter acesso a informações adequadas sobre reprodução e planejamento familiar.' | JURISPRUDÊNCIA: 'STJ, REsp 1.836.847/SP: após o EPD (Lei 13.146/2015), a pessoa com deficiência é plenamente capaz; a curatela passou a ter caráter excepcional e restrito aos atos patrimoniais e negociais, não afetando direitos existenciais.'","peg":"EPD tornou a pessoa com deficiência PLENAMENTE CAPAZ — não relativamente incapaz. A questão inverteu o resultado da reforma legislativa.","jur_status":"PENDENTE"},{"n":96,"enun":"O reconhecimento de filho por qualquer dos genitores é irrevogável, ainda que realizado por menor de dezoito anos, produzindo efeitos a partir do nascimento do reconhecido.","gab":"CERTO","com":"Certo. O reconhecimento de filhos (art. 1.609, CC) é irrevogável — ato unilateral, voluntário e definitivo. Pode ser feito por menor (emancipado ou não), e seus efeitos retroagem ao nascimento (efeito ex tunc) ou à concepção, para efeitos hereditários.","fund":"LEI: 'Art. 1.609, CC: O reconhecimento dos filhos havidos fora do casamento é irrevogável e será feito: I – no registro do nascimento; II – por escritura pública ou escrito particular, a ser arquivado em cartório; III – por testamento, ainda que incidentalmente manifestado; IV – por manifestação direta e expressa perante o juiz, ainda que o reconhecimento não haja sido o objeto único e principal do ato que o contém. Art. 1.610, CC: O reconhecimento não pode ser revogado, nem mesmo quando feito em testamento.' | JURISPRUDÊNCIA: 'STJ, REsp 1.493.857/SP: o reconhecimento de filho é irrevogável; seus efeitos retroagem ao nascimento.'","jur_status":"PENDENTE"},{"n":97,"enun":"A teoria da perda de uma chance é reconhecida pelo STJ como modalidade autônoma de responsabilidade civil, exigindo que a chance perdida seja real, séria e apreciável, não bastando mera expectativa ou esperança.","gab":"CERTO","com":"Certo. O STJ consagrou a teoria da perda de uma chance. O dano indenizável é a própria perda da chance (não o resultado que poderia advir). A chance deve ser real, séria e com relevante probabilidade de êxito — não se indeniza expectativas genéricas ou remotas.","fund":"LEI: 'Art. 927, CC: Aquele que, por ato ilícito (arts. 186 e 187), causar dano a outrem, fica obrigado a repará-lo.' | JURISPRUDÊNCIA: 'STJ, REsp 1.190.180/RS (Luis Felipe Salomão, 4ª T.): a perda de uma chance é modalidade autônoma de responsabilidade civil; a chance perdida deve ser real e séria (probabilidade > 50% segundo alguns julgados, ou ao menos relevante); mera expectativa não é indenizável.'","jur_status":"PENDENTE"},{"n":98,"enun":"O contrato de locação residencial urbana celebrado por escrito com prazo determinado, na hipótese de denúncia antecipada pelo locatário antes do término do prazo, sujeita-o ao pagamento de multa proporcional ao período de cumprimento do contrato, salvo convenção em contrário.","gab":"CERTO","com":"Certo. A Lei 8.245/1991 (Lei do Inquilinato) prevê multa proporcional ao período faltante quando o locatário denuncia antecipadamente o contrato de prazo determinado. A multa deve ser proporcional ao período de cumprimento — não pode exceder o valor fixado para descumprimento total.","fund":"LEI: 'Art. 4º, Lei 8.245/1991: Durante o prazo estipulado para a duração do contrato, não poderá o locador reaver o imóvel alugado. O locatário, todavia, poderá devolvê-lo, pagando a multa pactuada, proporcional ao período de cumprimento do contrato, ou, na sua falta, a que for judicialmente estipulada.' | JURISPRUDÊNCIA: 'STJ, REsp 1.287.945/SP: a multa pela denúncia antecipada deve ser calculada proporcionalmente ao tempo faltante para o término do contrato, não podendo ultrapassar o total contratado.'","jur_status":"PENDENTE"}]},{"nome":"Direito Tributário e Legislação Complementar","comando":"Acerca do sistema tributário nacional, das limitações constitucionais ao poder de tributar e das obrigações tributárias, julgue os itens a seguir.","itens":[{"n":99,"enun":"O princípio da legalidade tributária exige que os tributos sejam instituídos e majorados apenas por lei, sendo vedada a fixação de alíquotas por ato do Poder Executivo, sem exceção.","gab":"ERRADO","com":"Errado. A CF/88 prevê exceções ao princípio da legalidade tributária estrita: II, IE, IPI, IOF (arts. 153, §1º) e CIDE-combustíveis (art. 177, §4º, I, b) admitem alteração de alíquotas por ato do Executivo (decreto presidencial), dentro dos limites legais. A afirmação 'sem exceção' é incorreta.","fund":"LEI: 'Art. 150, I, CF/88: É vedado à União, Estados, DF e Municípios exigir ou aumentar tributo sem lei que o estabeleça. Art. 153, §1º, CF/88: É facultado ao Poder Executivo, atendidas as condições e os limites estabelecidos em lei, alterar as alíquotas dos impostos enumerados nos incisos I, II, IV e V.' | JURISPRUDÊNCIA: 'STF, RE 343.446/SC: o art. 153, §1º, CF, é exceção constitucional ao princípio da legalidade; o II, IE, IPI e IOF podem ter alíquotas alteradas por decreto, desde que dentro dos parâmetros legais.'","peg":"Exceções ao princípio da legalidade tributária: II, IE, IPI, IOF, CIDE-combustíveis. Alíquotas podem ser alteradas por decreto. 'Sem exceção' = ERRADO.","jur_status":"PENDENTE"},{"n":100,"enun":"O princípio da anterioridade anual exige que a lei que instituiu ou aumentou tributo seja anterior ao exercício financeiro em que o tributo será exigido, sendo aplicável a todos os tributos federais, estaduais e municipais.","gab":"ERRADO","com":"Errado. Há exceções ao princípio da anterioridade anual: II, IE, IPI, IOF, impostos extraordinários de guerra e empréstimos compulsórios de guerra/calamidade são exceções expressas (art. 150, §1º, CF). Ademais, as contribuições para financiamento da seguridade social seguem apenas a anterioridade nonagesimal (não a anual).","fund":"LEI: 'Art. 150, III, b e c, CF/88: é vedado cobrar tributos no mesmo exercício financeiro em que haja sido publicada a lei que os instituiu ou aumentou (anterioridade anual); antes de decorridos noventa dias da data em que haja sido publicada a lei (anterioridade nonagesimal). Art. 150, §1º, CF/88: exceções aos dois princípios de anterioridade.' | JURISPRUDÊNCIA: 'STF, RE 566.032/RS: as contribuições sociais (art. 195, CF) seguem apenas a anterioridade nonagesimal do art. 195, §6º, não a anual do art. 150, III, b.'","peg":"Anterioridade anual ≠ anterioridade nonagesimal (90 dias). II, IE, IPI, IOF = exceções a ambas. A frase 'aplicável a todos' = ERRADA.","jur_status":"PENDENTE"},{"n":101,"enun":"O Imposto sobre Serviços de Qualquer Natureza (ISS) é de competência municipal e incide sobre serviços constantes de lista prevista em lei complementar federal, cujas alíquotas mínimas e máximas também são fixadas por lei complementar.","gab":"CERTO","com":"Certo. O ISS é tributo municipal (art. 156, III, CF/88), mas sua lista de serviços e alíquotas mínimas e máximas são fixadas por lei complementar federal (LC 116/2003). As alíquotas máximas são de 5% (LC 116/2003) e mínimas de 2% (EC 37/2002 e LC 157/2016).","fund":"LEI: 'Art. 156, III, §3º, CF/88: Cabe à lei complementar: I – fixar as suas alíquotas máximas e mínimas. Art. 8º, II, LC 116/2003: A alíquota máxima do Imposto sobre Serviços de Qualquer Natureza é de 5%.' | JURISPRUDÊNCIA: 'STF, RE 592.905/SC: o ISS incide sobre serviços da lista da LC 116/2003; a lista é taxativa, mas admite interpretação extensiva para enquadrar subtipos de serviço.'","jur_status":"PENDENTE"},{"n":102,"enun":"A denúncia espontânea, prevista no art. 138 do CTN, exclui a multa moratória quando o contribuinte confessa a infração e efetua o pagamento do tributo com os juros de mora antes de qualquer procedimento administrativo ou medida de fiscalização.","gab":"CERTO","com":"Certo. A denúncia espontânea (art. 138, CTN) exclui a responsabilidade pela infração (multa) quando o contribuinte: (a) confessa espontaneamente; (b) paga o tributo com os acréscimos legais (juros de mora); (c) antes de qualquer procedimento fiscal. Os juros de mora são devidos, mas a multa é excluída.","fund":"LEI: 'Art. 138, CTN: A responsabilidade é excluída pela denúncia espontânea da infração, acompanhada, se for o caso, do pagamento do tributo devido e dos juros de mora, ou do depósito da importância arbitrada pela autoridade administrativa, quando o montante do tributo dependa de apuração.' | JURISPRUDÊNCIA: 'STJ, REsp 1.149.022/SP (repetitivo): a denúncia espontânea exclui a multa moratória, mas não os juros de mora; exige pagamento integral antes do início do procedimento fiscal; parcelamento não é suficiente (Súmula 208/TFR: multa persiste no parcelamento após autuação).'","peg":"Denúncia espontânea exclui MULTA (moratória e de ofício), mas NÃO os juros. E somente se o pagamento for ANTES de qualquer procedimento fiscal.","jur_status":"PENDENTE"},{"n":103,"enun":"Nos crimes contra a ordem tributária, o STF, por meio da Súmula Vinculante 24, estabelece que o crime material somente se consuma com o lançamento definitivo do crédito tributário, vedada, antes disso, a instauração de inquérito policial.","gab":"ERRADO","com":"Errado. A SV 24 impede apenas o oferecimento de denúncia (justa causa para ação penal), não a instauração do inquérito policial. O IP pode ser aberto para apurar indícios de crime tributário antes do encerramento do PAF. O que se veda é a denúncia e a prisão cautelar antes do lançamento definitivo.","fund":"LEI: 'SV 24/STF: Não se tipifica crime material contra a ordem tributária, previsto no art. 1°, incisos I a IV, da Lei n° 8.137/90, antes do lançamento definitivo do crédito tributário.' | JURISPRUDÊNCIA: 'STF, HC 85.051/MG: a SV 24 não impede a instauração do inquérito policial antes do lançamento definitivo; veda apenas a ação penal (denúncia); o IP pode ser instaurado para investigar a prática dos atos que poderão configurar crime após o lançamento.'","peg":"SV 24 impede DENÚNCIA (ação penal), não INQUÉRITO POLICIAL. Essa é a distinção que a CEBRASPE explora. Delegado pode instaurar IP antes do lançamento definitivo.","jur_status":"PENDENTE"},{"n":104,"enun":"O lançamento tributário por homologação ocorre quando a legislação atribui ao sujeito passivo o dever de apurar e antecipar o pagamento do tributo, aguardando a Fazenda Pública confirmar ou não o montante declarado.","gab":"CERTO","com":"Certo. No lançamento por homologação (art. 150, CTN), o contribuinte calcula o tributo, declara e paga antecipadamente; a Fazenda Pública tem 5 anos para homologar expressamente (ou homologação tácita pelo decurso do prazo). É o mais comum (IR, ICMS, IPI).","fund":"LEI: 'Art. 150, CTN: O lançamento por homologação, que ocorre quanto aos tributos cuja legislação atribua ao sujeito passivo o dever de antecipar o pagamento sem prévio exame da autoridade administrativa, opera-se pelo ato em que a referida autoridade, tomando conhecimento da atividade assim exercida pelo obrigado, expressamente a homologa. §4º: se a lei não fixar prazo a homologação, será ele de cinco anos, a contar da ocorrência do fato gerador; expirado esse prazo sem que a Fazenda Pública se tenha pronunciado, considera-se homologado o lançamento e definitivamente extinto o crédito.' | JURISPRUDÊNCIA: 'STJ, EREsp 435.835/SC (recurso repetitivo): a homologação tácita ocorre pelo simples decurso do prazo de 5 anos sem manifestação do Fisco; após isso, extingue-se o crédito tributário.'","jur_status":"PENDENTE"}]},{"nome":"Direito Ambiental e Legislação Complementar","comando":"Acerca dos princípios ambientais, das áreas de preservação, dos crimes ambientais e da responsabilidade ambiental, julgue os itens a seguir.","itens":[{"n":105,"enun":"O princípio do poluidor-pagador não tem caráter punitivo, mas preventivo e reparatório: impõe ao agente que produz externalidades negativas ambientais a responsabilidade de internalizar os custos de prevenção e reparação do dano.","gab":"CERTO","com":"Certo. O princípio do poluidor-pagador (PPP) visa à internalização dos custos ambientais pelo poluidor — quem polui arca com os custos de prevenção, controle e reparação. Não é punição (isso seria o princípio do protetor-recebedor e as sanções penais), mas instrumento econômico de imputação de responsabilidade.","fund":"LEI: 'Art. 4º, VII, Lei 6.938/1981: a imposição, ao poluidor e ao predador, da obrigação de recuperar e/ou indenizar os danos causados.' | JURISPRUDÊNCIA: 'STJ, REsp 1.090.968/SP: o princípio do poluidor-pagador não é punitivo, mas tem dimensão preventiva e reparatória; busca internalizar externalidades ambientais negativas para desestimular comportamentos danosos ao meio ambiente.'","jur_status":"PENDENTE"},{"n":106,"enun":"A pessoa jurídica pode ser responsabilizada penalmente por crimes ambientais independentemente da responsabilização das pessoas físicas que a integram, conforme entendimento atual do STJ.","gab":"CERTO","com":"Certo. O STJ (REsp 1.977.172/SP, 2022) reviu sua jurisprudência e passou a admitir a responsabilidade penal da pessoa jurídica por crime ambiental de forma autônoma, sem necessidade de dupla imputação (da PJ e da PF conjuntamente). Acompanhou a tendência do STF.","fund":"LEI: 'Art. 225, §3º, CF/88: As condutas e atividades consideradas lesivas ao meio ambiente sujeitarão os infratores, pessoas físicas ou jurídicas, a sanções penais e administrativas. Art. 3º, Lei 9.605/1998: As pessoas jurídicas serão responsabilizadas administrativa, civil e penalmente conforme o disposto nesta Lei, nos casos em que a infração seja cometida por decisão de seu representante legal ou contratual, ou de seu órgão colegiado.' | JURISPRUDÊNCIA: 'STJ, REsp 1.977.172/SP (Rogério Schietti, 6ª T., j. 04/10/2022): abandono da teoria da dupla imputação; PJ pode ser responsabilizada penalmente por crime ambiental de forma AUTÔNOMA, sem necessidade de condenação simultânea de pessoa física.'","peg":"STJ MUDOU sua posição em 2022: abandonou a teoria da dupla imputação. PJ pode ser condenada criminalmente por crime ambiental SEM necessidade de condenação simultânea de PF. Mudança recentíssima — alta relevância para a PCDF.","jur_status":"PENDENTE"},{"n":107,"enun":"As Áreas de Preservação Permanente (APPs), previstas no Código Florestal (Lei 12.651/2012), são protegidas independentemente de o proprietário ter causado o desmatamento, cabendo-lhe a obrigação propter rem de recuperação.","gab":"CERTO","com":"Certo. A obrigação de preservar e recuperar APPs é propter rem (vinculada à coisa, não à pessoa): o atual proprietário ou possuidor é obrigado a recuperar a área degradada, ainda que o dano tenha sido causado por terceiro ou pelo proprietário anterior.","fund":"LEI: 'Art. 7º, Lei 12.651/2012: A vegetação situada em Área de Preservação Permanente deverá ser mantida pelo proprietário da área, possuidor ou ocupante a qualquer título, pessoa física ou jurídica, de direito público ou privado.' | JURISPRUDÊNCIA: 'STJ, REsp 1.251.697/PR (repetitivo): a obrigação de recuperação de APP é propter rem; o adquirente responde pela reparação, independentemente de ter sido o responsável pelo dano ambiental.'","peg":"APP = obrigação PROPTER REM. Comprou o imóvel com APP degradada → você é obrigado a recuperar, mesmo que não tenha causado o dano.","jur_status":"PENDENTE"},{"n":108,"enun":"Nos crimes ambientais previstos na Lei 9.605/1998, a responsabilidade penal da pessoa física exige dolo específico, sendo insuficiente a mera conduta culposa.","gab":"ERRADO","com":"Errado. A Lei de Crimes Ambientais prevê expressamente crimes culposos (ex.: art. 38, parágrafo único; art. 40, §2º; art. 62, parágrafo único). Para crimes culposos ambientais, a culpa (imprudência, negligência, imperícia) é suficiente. Não se exige dolo específico.","fund":"LEI: 'Art. 6º, Lei 9.605/1998: Para imposição e gradação da penalidade, a autoridade competente observará: I – a gravidade do fato, tendo em vista os motivos da infração e suas consequências para a saúde pública e para o meio ambiente; II – os antecedentes do infrator quanto ao cumprimento da legislação de interesse ambiental; III – a situação econômica do infrator, no caso de multa. Art. 38, parágrafo único, Lei 9.605/1998: Se o crime é culposo, a pena é reduzida à metade.' | JURISPRUDÊNCIA: 'STJ, HC 265.178/SP, 6ª T.: a Lei 9.605/1998 admite crimes ambientais na modalidade culposa, quando expressamente prevista; o dolo específico não é exigido para a tipificação de crimes ambientais em geral.'","jur_status":"PENDENTE"},{"n":109,"enun":"A responsabilidade civil por dano ambiental é imprescritível, pois o meio ambiente é bem de uso comum do povo, constitucionalmente protegido como direito de todos.","gab":"CERTO","com":"Certo. O STJ firmou que a pretensão de reparação de dano ambiental é imprescritível. O meio ambiente equilibrado é direito fundamental de titularidade difusa, e o dano ambiental tem natureza permanente (persiste enquanto não reparado). A ação civil de reparação não prescreve.","fund":"LEI: 'Art. 225, CF/88: Todos têm direito ao meio ambiente ecologicamente equilibrado, bem de uso comum do povo e essencial à sadia qualidade de vida, impondo-se ao Poder Público e à coletividade o dever de defendê-lo e preservá-lo para as presentes e futuras gerações.' | JURISPRUDÊNCIA: 'STJ, REsp 1.120.117/AC (repetitivo): a pretensão de reparação do dano ambiental é imprescritível; o dano ao meio ambiente é de natureza permanente e continuada; o bem ambiental é de titularidade difusa e intergeracional.'","jur_status":"PENDENTE"}]},{"nome":"Direito Empresarial e Legislação Complementar","comando":"Acerca do direito societário, do direito cambiário, da recuperação de empresas e da falência, julgue os itens a seguir.","itens":[{"n":110,"enun":"A teoria da desconsideração da personalidade jurídica, prevista no art. 50 do Código Civil, exige a demonstração do abuso de personalidade caracterizado por desvio de finalidade ou confusão patrimonial.","gab":"CERTO","com":"Certo. A desconsideração da personalidade jurídica pelo CC exige abuso da personalidade jurídica — caracterizado por desvio de finalidade (uso da pessoa jurídica para fins ilícitos) ou confusão patrimonial (mistura
